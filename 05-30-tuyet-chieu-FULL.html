"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Để xây dựng Raving Fan: Cần tập trung tất cả nguồn lực vào việc tìm hiểu nhu cầu thực</span></div>\n<p class=\"body-txt\">\nsự của khách hàng và biến việc tìm hiểu này thành một phần trong quy trình kinh doanh\n \ncủa bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Luôn đáp ứng nhu cầu: &quot;Không ai được phép nói không với khách hàng, không ai được</span></div>\n<p class=\"body-txt\">\nphép nói không với nhu cầu của khách hàng.&quot; Bởi vì giải quyết nhu cầu chính là lúc bạn\n \nchiếm được tình cảm từ khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Xây dựng mối quan hệ có lợi cho hai bên: Đây là một mối quan hệ có lợi cho cả khách</span></div>\n<p class=\"body-txt\">\nhàng và người bán hàng. Mối quan hệ này không chỉ giúp bạn bán được hàng mà còn\n \ngiúp khách hàng tìm thêm khách hàng cho bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Chỉ số KPI cho nhân viên kinh doanh: Một trong những chỉ tiêu KPI quan trọng để đo</span></div>\n<p class=\"body-txt\">\nlường nhân viên kinh doanh là &quot;mối quan hệ thân tình&quot; mà họ có được trong quá trình\n \nkinh doanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Hai &quot;thần chú&quot; để có Raving Fan:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Xác định được rõ ràng điều bạn thực sự muốn là gì.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Hàng ngày tìm kiếm cái điều khách hàng muốn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Mối quan hệ bền vững: Là mối quan hệ có đi có lại giữa hai bên, nơi nhu cầu của khách</span></div>\n<p class=\"body-txt\">\nhàng và nhu cầu của chính bạn đều được thỏa mãn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Raving Fan là văn hóa: Raving Fan không chỉ là hành động của một hay hai người mà cần</span></div>\n<p class=\"body-txt\">\nphải được chuyển thành văn hóa của doanh nghiệp. Khi toàn bộ doanh nghiệp quan tâm\n \ntới lợi ích của khách hàng, khách hàng sẽ trở thành Raving Fan, mang lại lượng khách\n \nhàng dồi dào và không bao giờ dừng lại.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Chuyển từ &quot;yêu sản phẩm&quot; sang &quot;yêu khách hàng&quot; và lợi ích của họ: Đây là nền tảng triết</span></div>\n<p class=\"body-txt\">\nlý xuyên suốt bài giảng. Thay vì chỉ chăm chăm vào sản phẩm và cố gắng bán nó, doanh\n \nnghiệp cần đặt khách hàng và nhu cầu/lợi ích của họ lên hàng đầu. Điều này quan trọng\n \nvì nó thay đổi toàn bộ trọng tâm kinh doanh, từ định hướng sản phẩm sang định hướng\n \nkhách hàng, mở ra con đường xây dựng lòng trung thành và các mối quan hệ bền vững,\n \ntừ đó thúc đẩy doanh thu tự động mà không tốn kém chi phí marketing.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Biến việc tìm hiểu nhu cầu khách hàng thành văn hóa doanh nghiệp: Diễn giả nhấn mạnh</span></div>\n<p class=\"body-txt\">\nviệc tìm hiểu nhu cầu khách hàng không chỉ là nhiệm vụ của một bộ phận mà phải được\n \nthấm nhuần bởi mọi cấp độ nhân viên, trở thành một quy trình kinh doanh liên tục. Điều\n \nnày quan trọng vì nó đảm bảo rằng mọi tương tác với khách hàng đều xoay quanh việc\n \nhiểu và đáp ứng nhu cầu của họ, thay vì chỉ cố gắng bán. Khi mỗi cá nhân trong công ty\n \nđều &quot;săm soi&quot; lợi ích của khách hàng, doanh nghiệp sẽ có khả năng đổi mới, thích nghi và\n \ntạo ra giá trị thực sự, biến khách hàng thành những Raving Fan tự nguyện.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Tập trung xây dựng mối quan hệ có lợi cho cả hai bên: Mối quan hệ bền vững không phải</span></div>\n<p class=\"body-txt\">\nlà sự phục tùng một chiều mà là sự trao đổi giá trị song phương. Doanh nghiệp cần xác\n \nđịnh rõ nhu cầu của mình và cũng hiểu rõ nhu cầu của khách hàng để cả hai bên cùng có\n \nlợi. Điều này quan trọng vì nó định nghĩa lại bản chất của giao dịch, không chỉ là mua\n \nbán một lần mà là xây dựng sự hợp tác lâu dài. Khi khách hàng cảm thấy lợi ích của họ\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><p class=\"body-txt\">\nđược đáp ứng và họ cũng đang giúp doanh nghiệp phát triển, họ sẽ trở thành những\n \nngười ủng hộ nhiệt tình, thậm chí giới thiệu khách hàng mới.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Nếu bạn yêu thích sản phẩm của bạn, bạn là người thất bại. Nhưng bạn yêu quý khách hàng,\n \nbạn sẽ là người thành công.”\n \n“Không ai được phép nói không với khách hàng, không ai được phép nói không với nhu cầu\n \ncủa khách hàng.”\n \n“Hãy tuyển những người biết quan tâm tới lợi ích của khách hàng và sa thải những người còn\n \nlại.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Bài 28: Bán nhiều hơn quảng cáo</h3>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Tóm tắt. Buổi giảng này tập trung vào chiến lược &quot;bán nhiều hơn quảng cáo&quot; để tạo ra</h3>\n<p class=\"body-txt\">\n&quot;raving fans&quot; (khách hàng cuồng nhiệt). Cốt lõi là luôn tìm cách vượt quá sự mong đợi và\n \nthậm chí là sức tưởng tượng của khách hàng bằng cách trao đi giá trị và sự tử tế nhiều hơn\n \nnhững gì đã hứa hoặc quảng cáo. Thay vì chỉ tập trung vào việc liệt kê tính năng, doanh\n \nnghiệp nên để khách hàng trải nghiệm và tự khám phá những giá trị vượt trội, từ đó xây\n \ndựng lòng trung thành bền vững.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Mục tiêu: Bán nhiều hơn quảng cáo.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Khách hàng luôn mong muốn được nhiều hơn sự mong đợi của họ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Để tạo ra &quot;raving fans&quot;, doanh nghiệp cần liên tục tập trung vào trao đi giá trị nhiều hơn</span></div>\n<p class=\"body-txt\">\nnhững gì đã nói trước đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Nên bớt quảng cáo đi và tập trung vào việc giao những điều tốt hơn cho khách hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Áp dụng chiến lược 3:1 hoặc 4:1: Quảng cáo 1, giao cho khách hàng 3 hoặc 4 (lần giá trị).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Điều quan trọng là vượt quá sự mong đợi và vượt quá sự tưởng tượng của khách hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Đừng bao giờ nói tất cả những lợi ích hay tính năng sản phẩm trong quảng cáo.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Hãy để cho khách hàng trải nghiệm sản phẩm và tự phát hiện ra những điều đó.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Ví dụ minh họa: Một diễn giả nước ngoài đã tự động nâng cấp hạng bay (từ Economy lên</span></div>\n<p class=\"body-txt\">\nBusiness), có xe limousine đón miễn phí từ sân bay về khách sạn, và cử người hỗ trợ làm\n \nthủ tục hải quan trước để thông quan nhanh hơn – những điều không có trong hợp đồng\n \nnhưng khiến khách hàng vô cùng phấn khích.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Luôn tự hỏi bằng cách nào đó bạn có thể đáp ứng nhiều hơn mong đợi của khách hàng,</span></div>\n<p class=\"body-txt\">\nnhiều hơn cả quảng cáo của bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Một trong những yếu tố tuyệt vời nhất là &quot;sự tử tế&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Sự tử tế không cần quảng cáo nhưng khách hàng có thể dễ dàng đón nhận.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Mỗi khi tiếp xúc với khách hàng, hãy cho họ cảm nhận được sự tử tế của bạn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Với sự sáng tạo, bạn có thể tạo ra những sự kỳ diệu, những trải nghiệm tuyệt vời mà</span></div>\n<p class=\"body-txt\">\nkhách hàng có thể không bao giờ quên.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Mua dịch vụ, sản phẩm của đối thủ cạnh tranh để học hỏi từ chính họ, từ đó nâng cao</span></div>\n<p class=\"body-txt\">\nkhả năng phục vụ khách hàng của chính mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Việc của bạn là đáp ứng tốt hơn những nhu cầu của khách hàng và đáp ứng tốt hơn cả</span></div>\n<p class=\"body-txt\">\nnhững quảng cáo bạn đã từng đưa ra.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Chiến lược &quot;Bán nhiều hơn quảng cáo&quot; và tỷ lệ 3:1/4:1: Đây là tư duy cốt lõi chuyển dịch</span></div>\n<p class=\"body-txt\">\ntrọng tâm từ việc chỉ đơn thuần chào mời sản phẩm/dịch vụ sang việc chủ động tạo ra\n \ngiá trị vượt trội. Nó quan trọng vì nó định hình lại cách doanh nghiệp tương tác với\n \nkhách hàng, không chỉ để bán được hàng mà còn để xây dựng mối quan hệ lâu dài, biến\n \nkhách hàng thành những người ủng hộ nhiệt thành (raving fans).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Vượt quá sự mong đợi và tưởng tượng của khách hàng: Đây là chìa khóa để tạo ra những</span></div>\n<p class=\"body-txt\">\ntrải nghiệm &quot;wow&quot;. Khi khách hàng nhận được nhiều hơn những gì họ nghĩ, họ không\n \nchỉ hài lòng mà còn phấn khích, kể lại cho người khác và trở thành kênh marketing miễn\n \nphí mạnh mẽ nhất. Điều này quan trọng vì nó đi sâu vào tâm lý con người, tạo ra cảm xúc\n \ntích cực mạnh mẽ, giúp doanh nghiệp nổi bật giữa thị trường cạnh tranh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Sức mạnh của &quot;sự tử tế&quot;: Diễn giả nhấn mạnh &quot;sự tử tế không cần quảng cáo nhưng</span></div>\n<p class=\"body-txt\">\nkhách hàng có thể dễ dàng đón nhận&quot;. Đây là yếu tố con người, cảm xúc, tạo kết nối\n \nmạnh mẽ và khác biệt hóa, thường bị bỏ qua trong môi trường kinh doanh. Trong một\n \nthế giới đầy thông tin và quảng cáo, sự tử tế chân thành là một &quot;quảng cáo&quot; mạnh mẽ\n \nnhất, xây dựng niềm tin và lòng trung thành mà tiền bạc khó mua được.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Bán nhiều hơn quảng cáo.”\n \n“Khách hàng luôn luôn mong muốn được nhiều hơn sự mong đợi của họ.”\n \n“Sự tử tế không cần quảng cáo, nhưng khách hàng có thể dễ dàng đón nhận.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Bài 29: Giúp khách hàng đạt được kết quả</h3>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Tóm tắt. Buổi giảng này tập trung vào chiến lược tạo &quot;raving fan&quot; (khách hàng cuồng nhiệt)</h3>\n<p class=\"body-txt\">\nbằng cách tập trung giúp khách hàng đạt được *kết quả* họ mong muốn từ sản phẩm, thay\n \nvì chỉ bán sản phẩm hay quan tâm đến doanh số. Diễn giả nhấn mạnh rằng khách hàng luôn\n \nmua kết quả, không phải sản phẩm. Để làm được điều này, doanh nghiệp cần chủ động hỗ\n \ntrợ khách hàng sử dụng sản phẩm một cách hiệu quả nhất, thậm chí sau khi hợp đồng đã kết\n \nthúc hoặc bảo hành đã hết, thông qua việc theo dõi và hướng dẫn tận tình.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Chiến lược tạo &quot;raving fan&quot; là giúp khách hàng đạt được kết quả.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Khách hàng không bao giờ muốn mua sản phẩm, họ muốn mua kết quả mà sản phẩm</span></div>\n<p class=\"body-txt\">\nmang lại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Mọi nỗ lực, nguồn năng lượng, tài nguyên của bạn đều nên hướng tới việc giúp khách</span></div>\n<p class=\"body-txt\">\nhàng đạt được kết quả họ mong muốn từ sản phẩm.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Ví dụ về mua TV: Người bán hàng (cửa hàng điện máy) chỉ treo TV lên và không hướng</span></div>\n<p class=\"body-txt\">\ndẫn đầy đủ tính năng. Người mua không biết TV có thể dùng internet, cài phần mềm, lưu\n \nphim.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Ví dụ về Hãng sản phẩm TV: Hãng gọi điện cho khách hàng sau 2 ngày để hỏi về việc lắp</span></div>\n<p class=\"body-txt\">\nđặt, bắt sóng, và sau đó hướng dẫn chi tiết cách sử dụng các tính năng nâng cao\n \n(internet, cài phần mềm, lưu phim) qua điện thoại, trực tuyến.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Hãng TV không chỉ bán TV mà bán cả &quot;trải nghiệm TV&quot; bằng cách chủ động hỗ trợ khách</span></div>\n<p class=\"body-txt\">\nhàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Ví dụ về khóa học: Có một đội ngũ (ekip sale) theo dõi liên tục sự phát triển của học viên</span></div>\n<p class=\"body-txt\">\nsau khóa học.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Đội ngũ này giúp học viên từng bước ứng dụng bài học vào cuộc sống kinh doanh và</span></div>\n<p class=\"body-txt\">\nthường xuyên gọi điện nhắc nhở nếu học viên không ứng dụng (dù điều này không nằm\n \ntrong hợp đồng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Mục đích là giúp học viên giữ được năng lượng, kiến thức để đạt được kết quả trong</span></div>\n<p class=\"body-txt\">\ncuộc sống.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Khi học viên đạt được kết quả, họ sẽ vô cùng phấn khích và thường xuyên giới thiệu</span></div>\n<p class=\"body-txt\">\nkhóa học cho những người thân quen khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Đừng quan tâm đến doanh số, hãy giúp khách hàng đạt được kết quả vì đó là điều họ</span></div>\n<p class=\"body-txt\">\nmong muốn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Ngay cả khi hợp đồng đã kết thúc, bảo hành đã hết, vẫn hãy giúp khách hàng đạt được</span></div>\n<p class=\"body-txt\">\nkết quả bằng sản phẩm của bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Lời khuyên: Ngay lập tức gọi điện cho khách hàng đã từng mua hàng, giúp đỡ họ sử dụng</span></div>\n<p class=\"body-txt\">\nsản phẩm hiệu quả hơn để tạo ra những &quot;raving fan&quot; đầu tiên.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Khách hàng mua kết quả, không mua sản phẩm: Đây là tư duy cốt lõi nhất. Thay vì tập</span></div>\n<p class=\"body-txt\">\ntrung vào đặc điểm hay tính năng của sản phẩm, doanh nghiệp cần hiểu rõ lợi ích cuối\n \ncùng mà khách hàng muốn đạt được và làm mọi cách để họ đạt được điều đó. Điều này\n \nthay đổi toàn bộ trọng tâm từ giao dịch sang giá trị.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Hỗ trợ sau bán hàng chủ động và toàn diện để đạt kết quả: Khác với chăm sóc khách</span></div>\n<p class=\"body-txt\">\nhàng truyền thống (chỉ giải quyết vấn đề khi có), chiến lược này yêu cầu chủ động theo\n \ndõi, hướng dẫn khách hàng sử dụng tối đa tiềm năng của sản phẩm để đạt được mục tiêu\n \ncủa họ, ngay cả khi không có nghĩa vụ hợp đồng. Đây là yếu tố then chốt biến khách hàng\n \nthông thường thành &quot;raving fan&quot; và người giới thiệu trung thành.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Ưu tiên kết quả khách hàng hơn doanh số tức thời: Việc tập trung vào doanh số dễ khiến</span></div>\n<p class=\"body-txt\">\ndoanh nghiệp bỏ qua trải nghiệm và kết quả lâu dài của khách hàng. Khi đặt kết quả của\n \nkhách hàng lên hàng đầu, họ sẽ cảm thấy được quan tâm thực sự, từ đó tăng lòng trung\n \nthành, mua lại và giới thiệu, tạo ra dòng doanh thu bền vững hơn nhiều so với việc chỉ\n \nchạy theo các mục tiêu doanh số ngắn hạn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Trích dẫn</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Khách hàng không bao giờ muốn mua sản phẩm của bạn, họ muốn mua kết quả mà sản phẩm\n \ncủa bạn mang lại cho khách hàng.”\n \n“Họ bán cho tôi cái TV, nhưng họ bán cho tôi cả cái trải nghiệm TV bằng cách gọi điện cho tôi\n \nnữa.”\n \n“Đừng quan tâm đến doanh số nữa mà hãy giúp cho khách hàng đạt được kết quả bởi vì kết\n \nquả chính là một trong những điều mà khách hàng vô cùng mong muốn từ bạn.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Bài 30: Kinh doanh minh bạch</h3>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Tóm tắt. Buổi giảng này tập trung vào chiến lược kinh doanh minh bạch như một phương</h3>\n<p class=\"body-txt\">\npháp cốt lõi để xây dựng &quot;Raving Fans&quot; và củng cố lòng tin của khách hàng. Diễn giả nhấn\n \nmạnh sự cần thiết phải nhanh chóng thông báo cho khách hàng mọi diễn biến, đặc biệt là khi\n \ndoanh nghiệp gặp khủng hoảng hoặc vấn đề, thay vì che giấu thông tin. Việc cung cấp đầy đủ\n \nvà chính xác tất cả thông tin về sản phẩm, bao gồm cả những điểm chưa hoàn hảo, sẽ giúp\n \nkhách hàng tin cậy hơn và sẵn sàng ủng hộ doanh nghiệp vượt qua khó khăn, từ đó tạo ra lợi\n \nthế cạnh tranh bền vững.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Chiến lược tiếp theo để xây dựng &quot;Raving Fans&quot; là kinh doanh trong một môi trường</span></div>\n<p class=\"body-txt\">\nminh bạch.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Hãy tạo ra sự minh bạch trong công việc kinh doanh của bạn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Điều thứ nhất: Hãy nói cho khách hàng biết điều gì đang diễn ra trong doanh nghiệp của</span></div>\n<p class=\"body-txt\">\nbạn, đặc biệt là khi gặp khủng hoảng hoặc vấn đề.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Ví dụ về hãng nước ngọt ở Việt Nam đã cố tình bưng bít thông tin về vật phẩm lạ trong</span></div>\n<p class=\"body-txt\">\nsản phẩm, dẫn đến khủng hoảng truyền thông lớn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Ví dụ về hãng socola nước ngoài đã thông báo và thu hồi toàn bộ sản phẩm trên toàn thế</span></div>\n<p class=\"body-txt\">\ngiới ngay lập tức khi phát hiện một mảnh nhựa nhỏ bị bong ra từ máy móc, dù không xác\n \nđịnh được lô sản phẩm nào bị ảnh hưởng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Hành động minh bạch như của hãng socola giúp khách hàng càng yêu quý, trung thành</span></div>\n<p class=\"body-txt\">\nvà tin cậy sản phẩm hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Điều thứ hai: Trong quá trình bán hàng, hãy thông tin tất cả những điều tuyệt vời nhất</span></div>\n<p class=\"body-txt\">\nđến cho khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Không cố gắng che đậy hay &quot;make-up&quot; (làm tốt hơn) sản phẩm của chúng ta.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Cung cấp đầy đủ thông tin chính xác như sản phẩm vốn có, bao gồm cả những thông tin</span></div>\n<p class=\"body-txt\">\nkhông hoàn hảo, để khách hàng quyết định mua. Điều này giúp khách hàng tin cậy hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Làm được điều minh bạch ở Việt Nam hiện tại rất khó, nhưng nếu làm được, doanh</span></div>\n<p class=\"body-txt\">\nnghiệp sẽ trở thành một trong những doanh nghiệp đi đầu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Minh bạch sẽ giúp tạo ra &quot;Raving Fans&quot;, khách hàng sẽ ủng hộ và sẵn sàng đứng về phía</span></div>\n<p class=\"body-txt\">\ndoanh nghiệp để giúp vượt qua khủng hoảng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Khi gặp khủng hoảng, khách hàng là người có thể giúp đỡ được doanh nghiệp.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">★ Điểm quan trọng nhất</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Minh bạch trong khủng hoảng là chìa khóa xây dựng lòng tin vững chắc: Diễn giả nhấn</span></div>\n<p class=\"body-txt\">\nmạnh việc chủ động thông báo ngay lập tức và toàn diện khi doanh nghiệp gặp phải vấn\n \nđề hoặc khủng hoảng (ví dụ hãng socola thu hồi toàn cầu vì mảnh nhựa nhỏ). Điều này\n \nquan trọng vì trong những thời điểm khó khăn, sự trung thực và trách nhiệm cao không\n \nchỉ giữ chân mà còn biến khách hàng thành &quot;fan cuồng&quot; sẵn sàng đồng hành, thay vì\n \nquay lưng chỉ trích.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Thông tin chân thực, không &quot;làm đẹp&quot; sản phẩm tạo ra sự tin cậy dài hạn: Việc cung cấp</span></div>\n<p class=\"body-txt\">\nthông tin đầy đủ, chính xác về sản phẩm, kể cả những khía cạnh chưa hoàn hảo, giúp\n \nkhách hàng đưa ra quyết định mua hàng sáng suốt và có kỳ vọng đúng đắn. Điều này\n \nquan trọng hơn việc chỉ tô hồng sản phẩm, vì nó xây dựng một mối quan hệ dựa trên sự\n \nminh bạch và tôn trọng, tránh được những hiểu lầm hoặc thất vọng sau này, từ đó tạo\n \ndựng lòng tin bền vững.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Minh bạch là lợi thế cạnh tranh tiên phong ở thị trường Việt Nam: Diễn giả nhận định</span></div>\n<p class=\"body-txt\">\nrằng việc thực hiện sự minh bạch một cách triệt để còn nhiều thách thức tại Việt Nam.\n \nTuy nhiên, chính vì điều đó, những doanh nghiệp dám đi đầu và thực hiện tốt sự minh\n \nbạch sẽ nổi bật, tạo được sự khác biệt lớn, thu hút và giữ chân khách hàng chất lượng,\n \nqua đó trở thành những người dẫn dắt thị trường.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Hãy nói cho khách hàng biết điều gì đang diễn ra trong doanh nghiệp của bạn.”\n \n“Hãy minh bạch với khách hàng của bạn, mọi thông tin càng minh bạch càng tốt.”\n \n“Hãy luôn nhớ, khi gặp khủng hoảng, khách hàng là người có thể giúp đỡ được bạn.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Bài 31: Đối xử với khách hàng tốt nhất</h3>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Tóm tắt. Buổi học tập trung vào chiến lược tạo ra &quot;raving fan&quot; (người hâm mộ cuồng nhiệt)</h3>\n<p class=\"body-txt\">\nbằng cách tưởng thưởng đặc biệt cho những khách hàng tốt nhất. Doanh nghiệp cần xác\n \nđịnh và cung cấp những ưu đãi độc quyền, vượt trội cho nhóm khách hàng cao cấp này, biến\n \nhọ thành &quot;premium customer&quot;. Việc này không chỉ giúp giữ chân khách hàng mà còn biến họ\n \nthành những người ủng hộ nhiệt thành nhất, mang lại giá trị lâu dài cho thương hiệu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Chính sách quan trọng là &quot;hãy tưởng thưởng cho những khách hàng tốt nhất với những</span></div>\n<p class=\"body-txt\">\nđiều tốt nhất&quot; để tạo ra &quot;raving fan&quot; cho doanh nghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Ví dụ điển hình là chính sách Bông Sen Vàng của Vietnam Airlines: khách hàng thường</span></div>\n<p class=\"body-txt\">\nxuyên được cấp thẻ, hưởng các ưu đãi như thưởng chuyến bay (có thể tặng người khác),\n \ncheck-in trên toàn hệ thống và toàn thế giới, check-in ưu tiên, lối đi riêng, phòng chờ\n \nriêng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Khi trở thành một khách hàng đặc biệt, bạn sẽ được ưu đãi nhiều hơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Để có &quot;raving fan&quot;, bạn cần tạo ra một nhóm khách hàng đặc biệt với những ưu đãi đặc</span></div>\n<p class=\"body-txt\">\nbiệt, đến một mức độ nào đó sẽ trở thành khách hàng cao cấp (premium).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Khách hàng cao cấp sẽ được ưu đãi nhiều hơn so với khách hàng khác, bao gồm nhiều</span></div>\n<p class=\"body-txt\">\nquyền lợi hơn, ưu tiên nhiều hơn, mua với giá tốt hơn, nhiều discount hơn, nhiều chính\n \nsách hỗ trợ hơn, phòng chờ đặc biệt hơn và sự hỗ trợ tuyệt vời hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Diễn giả cũng chia sẻ kinh nghiệm cá nhân khi tham gia các khóa học ở mức cao nhất và</span></div>\n<p class=\"body-txt\">\nnhận được những đối xử đặc biệt (bữa ăn miễn phí, ưu tiên khách sạn, thương thảo giá\n \ntốt hơn).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Diễn giả cũng áp dụng chính sách này cho nhóm khách hàng Premium của mình, cho</span></div>\n<p class=\"body-txt\">\nphép họ tham dự gần như miễn phí toàn bộ khóa học, ưu đãi giá tốt hơn bất kỳ khách\n \nhàng nào, check-in sớm, luôn ngồi hàng ghế đầu, có thẻ đeo riêng và ra vào bất kỳ lúc\n \nnào.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">&quot;Càng đặc biệt bao nhiêu, bạn càng dễ dàng có raving fan bấy nhiêu.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài tập thực hành: Liệt kê ra những quyền lợi đặc biệt mà bạn có thể tạo ra cho nhóm</span></div>\n<p class=\"body-txt\">\nkhách hàng đặc biệt nhất của mình ngay bây giờ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Chiến lược Tưởng thưởng cho Khách hàng Tốt nhất để tạo Raving Fan: Đây là cốt lõi của</span></div>\n<p class=\"body-txt\">\nbuổi giảng. Thay vì cố gắng làm hài lòng tất cả mọi người, doanh nghiệp nên tập trung\n \nnguồn lực vào nhóm khách hàng mang lại giá trị cao nhất và biến họ thành những người\n \nủng hộ cuồng nhiệt. Điều này quan trọng vì &quot;raving fan&quot; không chỉ duy trì sự gắn bó mà\n \ncòn trở thành kênh marketing truyền miệng mạnh mẽ nhất, mang lại khách hàng mới\n \nmột cách tự nhiên và bền vững.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Sự khác biệt hóa và Độc quyền trong ưu đãi: Các ví dụ như Bông Sen Vàng của Vietnam</span></div>\n<p class=\"body-txt\">\nAirlines hay chính sách Premium của diễn giả đều nhấn mạnh việc cung cấp những đặc\n \nquyền *vượt trội* và *không thể tìm thấy ở bất kỳ nơi nào khác* cho khách hàng đặc\n \nbiệt. Điều này không chỉ là giảm giá mà còn là những trải nghiệm ưu tiên, tiện nghi và\n \ncảm giác được trân trọng. Nó quan trọng vì tạo ra rào cản chuyển đổi (khó rời bỏ vì đã\n \nquen với đặc quyền), đồng thời củng cố nhận thức về giá trị thương hiệu trong mắt\n \nkhách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Tỷ lệ thuận giữa &quot;đặc biệt&quot; và khả năng tạo &quot;raving fan&quot;: Câu nói &quot;Càng đặc biệt bao</span></div>\n<p class=\"body-txt\">\nnhiêu, bạn càng dễ dàng có raving fan bấy nhiêu&quot; là một nguyên lý rõ ràng. Nó khuyến\n \nkhích doanh nghiệp không ngần ngại trong việc sáng tạo và cung cấp những điều tốt\n \nnhất có thể cho khách hàng ưu tú. Điều này quan trọng vì nó định hướng tư duy tập\n \ntrung vào việc tạo ra những trải nghiệm *độc đáo và không thể quên*, thay vì chỉ dừng\n \nlại ở những ưu đãi thông thường.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Hãy tưởng thưởng cho những khách hàng tốt nhất với những điều tốt nhất.”\n \n“Hãy luôn tạo ra những điều tuyệt vời hơn cho những khách hàng đặc biệt này.”\n \n“Càng đặc biệt bao nhiêu, bạn càng dễ dàng có raving fan bấy nhiêu.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#e53935\">Bài 32: Người cho đi là người chiến thắng</h3>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Tóm tắt. Buổi giảng này tập trung vào chiến lược &quot;Givers Win&quot; (Người cho đi là người chiến</h3>\n<p class=\"body-txt\">\nthắng) để xây dựng &quot;Raving Fan&quot; (khách hàng cuồng nhiệt) cho doanh nghiệp. Cốt lõi là bạn\n \ncàng cho đi nhiều giá trị (không chỉ cho cộng đồng mà còn cho từng khách hàng), vượt xa\n \nmong đợi của họ, thì bạn càng dễ dàng chiến thắng trong trò chơi kinh doanh và nhận được\n \nsự mến mộ, trung thành cũng như niềm vui nội tâm. Diễn giả khuyến khích bắt đầu hành\n \nđộng cho đi ngay lập tức và đừng chờ đợi.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Diễn giả giới thiệu chiến lược &quot;Givers Win&quot; để xây dựng &quot;Raving Fan&quot; trong doanh</span></div>\n<p class=\"body-txt\">\nnghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">&quot;Những người cho đi là những người chiến thắng trong trò chơi này.&quot; Càng cho đi nhiều,</span></div>\n<p class=\"body-txt\">\ncàng dễ dàng tạo ra &quot;Raving Fan&quot; cho doanh nghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Hãy tham gia vào nhiều hoạt động từ thiện cho cộng đồng (cả do mình tạo ra hoặc do</span></div>\n<p class=\"body-txt\">\nngười khác tạo ra) để nhận được lòng tin và sự mến mộ từ công chúng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Việc cho đi không chỉ giúp công chúng biết đến bạn nhiều hơn mà quan trọng nhất là</span></div>\n<p class=\"body-txt\">\nmang lại một cảm xúc đặc biệt, sự yêu thương và lòng biết ơn từ bên trong trái tim\n \nngười cho đi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Không chỉ cho đi cộng đồng, mà còn cho đi bất kỳ ai, đặc biệt là cho khách hàng của bạn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Mặc dù khách hàng đã được đáp ứng tốt hơn mong đợi, bạn vẫn luôn có thể cho đi nhiều</span></div>\n<p class=\"body-txt\">\nhơn nữa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Ví dụ về cách cho đi khách hàng: tặng quà vào những dịp đặc biệt như sinh nhật cá nhân</span></div>\n<p class=\"body-txt\">\nhoặc ngày thành lập công ty của khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Tạo ra nhiều mối quan hệ và những trải nghiệm đặc biệt, thú vị cho khách hàng (ví dụ:</span></div>\n<p class=\"body-txt\">\nkhách sạn 5 sao biết sở thích khách hàng để tặng quà trên đầu giường, viết thư tay bởi\n \ntổng giám đốc, hoặc sắp đặt bữa sáng riêng với đồ uống yêu thích của khách).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Những trải nghiệm đặc biệt và thú vị này sẽ tạo ra &quot;sự trung thành mãi mãi&quot; từ khách</span></div>\n<p class=\"body-txt\">\nhàng, khiến họ ca ngợi bạn với bạn bè và những người xung quanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Cho đi có rất nhiều góc độ, nhưng hãy luôn nhớ rằng &quot;Givers Win&quot;. Bạn càng cho đi, bạn</span></div>\n<p class=\"body-txt\">\nsẽ càng là người chiến thắng trong trò chơi chinh phục khách hàng này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Thách thức: Hãy tạo ra những thứ mà bạn có thể cho được khách hàng của mình ngay</span></div>\n<p class=\"body-txt\">\ntrong ngày hôm nay. Bắt đầu ngay bây giờ, không cần chờ đợi.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">&quot;Givers Win&quot; là triết lý nền tảng cho sự thành công bền vững: Diễn giả nhấn mạnh rằng</span></div>\n<p class=\"body-txt\">\nviệc cho đi không chỉ là hành động thiện nguyện mà là một chiến lược kinh doanh và\n \nphát triển cá nhân mạnh mẽ. Nó tạo ra lòng tin, sự mến mộ từ công chúng và khách\n \nhàng, là nền tảng để xây dựng &quot;Raving Fan&quot; (khách hàng cuồng nhiệt), những người sẽ\n \ntrung thành và giới thiệu doanh nghiệp. Điều này quan trọng vì nó đảo ngược tư duy tập\n \ntrung vào việc nhận, chuyển sang tập trung vào giá trị trao đi trước để kiến tạo mối quan\n \nhệ lâu dài.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Cho đi vượt ngoài mong đợi và cá nhân hóa trải nghiệm khách hàng: Thay vì chỉ đáp ứng</span></div>\n<p class=\"body-txt\">\ncác yêu cầu cơ bản, việc tặng quà vào dịp đặc biệt, cá nhân hóa dịch vụ (biết sở thích, thư\n \ntay riêng từ lãnh đạo, bữa ăn riêng) tạo ra sự kết nối sâu sắc và lòng trung thành &quot;mãi\n \nmãi&quot;. Điều này quan trọng vì trong thị trường cạnh tranh, khách hàng dễ dàng chuyển\n \nđổi. Trải nghiệm cá nhân hóa, vượt mong đợi là yếu tố then chốt để giữ chân và biến\n \nkhách hàng thành người ủng hộ trung thành, không chỉ mua hàng mà còn quảng bá cho\n \nbạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Lợi ích kép từ việc cho đi: Hạnh phúc nội tâm và thành công bên ngoài: Diễn giả không</span></div>\n<p class=\"body-txt\">\nchỉ nói về lợi ích kinh doanh (khách hàng, công chúng biết đến) mà còn nhấn mạnh &quot;cảm\n \nxúc vô cùng đặc biệt&quot; và sự yêu thương, lòng biết ơn mà người cho đi nhận được từ bên\n \ntrong. Điều này quan trọng vì nó liên kết thành công bên ngoài với sự thỏa mãn nội tâm,\n \ntạo động lực bền vững và ý nghĩa hơn cho hành động cho đi, tránh trường hợp &quot;cho đi&quot;\n \nchỉ vì mục đích vụ lợi.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Những người cho đi là những người chiến thắng trong trò chơi này.”\n \n“Bạn càng cho đi nhiều bao nhiêu, bạn càng dễ dàng chiến thắng trong trò chơi tạo ra Raving\n \nFan cho doanh nghiệp của mình.”\n \n“Bên trong trái tim của bạn, một dòng một cái cảm xúc vô cùng đặc biệt khi bạn được cho đi.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Bài 33: Kết thúc</h3>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Tóm tắt. Buổi học này là phần gần kết thúc của chương &quot;Tạo ra khách hàng cuồng nhiệt&quot;</h3>\n<p class=\"body-txt\">\nhay còn gọi là Raving Fan. Nội dung tập trung vào việc biến khách hàng thông thường thành\n \nnhững người hâm mộ cuồng nhiệt, sẵn sàng lan tỏa và ủng hộ doanh nghiệp một cách mạnh\n \nmẽ. Đây là một khái niệm mới mẻ nhưng vô cùng quan trọng đối với sự phát triển bền vững\n \ncủa doanh nghiệp.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Đây là phần gần kết thúc của một chương quan trọng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Chương này có tên là &quot;Tạo ra khách hàng cuồng nhiệt&quot; hay còn gọi là &quot;Raving Fan&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Đây có thể là một điều vô cùng mới đối với doanh nghiệp của bạn.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Chương &quot;Tạo ra khách hàng cuồng nhiệt&quot; (Raving Fan) là vô cùng quan trọng: Điều này</span></div>\n<p class=\"body-txt\">\nnhấn mạnh tầm quan trọng của việc không chỉ có khách hàng mà phải có những khách\n \nhàng yêu mến, trung thành và sẵn sàng giới thiệu sản phẩm/dịch vụ của bạn cho người\n \nkhác. Đây là yếu tố sống còn để doanh nghiệp phát triển bền vững và giảm chi phí\n \nmarketing.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Khái niệm &quot;Raving Fan&quot; có thể mới mẻ với nhiều doanh nghiệp: Việc diễn giả nhấn mạnh</span></div>\n<p class=\"body-txt\">\nđây là điều &quot;vô cùng mới&quot; cho thấy nhiều doanh nghiệp Việt Nam có thể chưa thực sự\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><p class=\"body-txt\">\nchú trọng hoặc chưa biết cách xây dựng một cộng đồng khách hàng cuồng nhiệt. Việc\n \nhọc và áp dụng khái niệm này sẽ là một lợi thế cạnh tranh đáng kể.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Chúng ta đã gần kết thúc một cái chương vô cùng quan trọng, chương tạo ra khách hàng\n \ncuồng nhiệt hay còn gọi là Raving Fan.”\n \n“Đây có thể là một điều vô cùng mới đối với doanh nghiệp của bạn.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Bài 34: Tổng kết khóa học</h3>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Tóm tắt. Buổi học này là lời kết thúc cho khóa học bán hàng, nhấn mạnh rằng khóa học chỉ</h3>\n<p class=\"body-txt\">\nlà sự khởi đầu. Cốt lõi của thành công là phải *hành động ngay lập tức* những gì đã học,\n \nkhông ngừng lặp lại những điều hiệu quả cho đến khi chúng trở thành thói quen, và liên tục\n \nhọc hỏi để mở rộng năng lực. Diễn giả cũng đặc biệt đề cập đến việc xây dựng &quot;Raving Fan&quot;\n \n(khách hàng cuồng nhiệt) và đào tạo đội nhóm để phát triển doanh nghiệp bền vững.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Khóa học bán hàng này mới chỉ là bước khởi đầu cho sự nghiệp kinh doanh.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Cần áp dụng toàn bộ những gì đã học để phát triển công việc kinh doanh và toàn bộ đội</span></div>\n<p class=\"body-txt\">\nnhóm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Nếu không hành động thì sẽ không bao giờ có kết quả.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Đừng tin những gì được nói trong chương trình học, không cần phân biệt đúng hay sai.</span></div>\n<p class=\"body-txt\">\nĐiều quan trọng nhất là bạn cần phải *làm nó* bằng chính trải nghiệm của mình để biết\n \nnó đúng hay không đúng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Điều gì đúng, hãy tiếp tục dùng nó và triển khai cho toàn bộ đội nhóm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Điều gì không đúng hoặc không hiệu quả, có thể tạm thời bỏ nó đi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Điều gì có hiệu quả, bạn cần *liên tục, liên tục, liên tục, liên tục dùng nó* cho đến khi nó</span></div>\n<p class=\"body-txt\">\nbiến thành thói quen.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Chỉ khi bạn biến nó thành thói quen, sự nghiệp kinh doanh của bạn mới có thể thay đổi</span></div>\n<p class=\"body-txt\">\nđược.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Khóa học đã giúp:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Tìm ra những khách hàng tiềm năng không giới hạn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Tư duy đúng để đặt lịch hẹn với khách hàng thành công.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Phương pháp trình bày, chốt sale và xử lý sự từ chối để gia tăng tỷ lệ chuyển đổi đơn</span></div>\n<p class=\"body-txt\">\nhàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Chỉ ra từng bước để xây dựng &quot;Raving Fan&quot; (bí quyết có khách hàng cuồng nhiệt trong</span></div>\n<p class=\"body-txt\">\ndoanh nghiệp) – một điều lần đầu tiên ở Việt Nam.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Mục tiêu là xây dựng và phát triển một doanh nghiệp trường tồn thông qua bán hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Để trở nên thành công hơn, cần không ngừng học hỏi về bán hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Hãy lập kế hoạch đọc thêm nhiều sách và học thêm nhiều khóa học về bán hàng để mở</span></div>\n<p class=\"body-txt\">\nrộng năng lực.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Đừng quên đào tạo cho đội nhóm kinh doanh để sử dụng đòn bẩy nguồn nhân lực, giúp</span></div>\n<p class=\"body-txt\">\ncông việc kinh doanh phát triển lên nấc thang mới.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Khóa học này mới chỉ là sự khởi đầu, còn nhiều khóa học khác đang chờ đón.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Nếu hài lòng với khóa học, hãy chia sẻ nó trên trang cá nhân để nhiều người bạn của bạn</span></div>\n<p class=\"body-txt\">\ncũng có thể thay đổi cuộc đời họ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Hành động là chìa khóa và sự lặp lại biến kiến thức thành thói quen: Diễn giả nhấn mạnh</span></div>\n<p class=\"body-txt\">\nrằng việc không hành động sẽ không bao giờ tạo ra kết quả. Hơn nữa, những gì đã học\n \ncần được *liên tục* thực hành cho đến khi nó trở thành thói quen. Điều này quan trọng\n \nvì nó chuyển đổi lý thuyết thành kỹ năng thực thụ, giúp người học không chỉ biết mà còn\n \nthực hiện công việc bán hàng một cách tự nhiên và hiệu quả, đảm bảo sự bền vững trong\n \nkinh doanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Xây dựng &quot;Raving Fan&quot; (khách hàng cuồng nhiệt) là chiến lược kinh doanh bền vững:</span></div>\n<p class=\"body-txt\">\nKhái niệm &quot;Raving Fan&quot; – những khách hàng không chỉ mua sản phẩm mà còn yêu thích\n \nvà chủ động giới thiệu – được giới thiệu như một bí quyết quan trọng. Điều này đắt giá vì\n \nnó định hướng doanh nghiệp không chỉ tập trung vào bán hàng một lần mà còn tạo dựng\n \nmối quan hệ sâu sắc, tạo ra nguồn khách hàng trung thành và lan tỏa giá trị, giúp doanh\n \nnghiệp phát triển trường tồn và giảm chi phí marketing.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Liên tục học hỏi và đào tạo đội nhóm là đòn bẩy phát triển: Buổi giảng kết thúc với lời</span></div>\n<p class=\"body-txt\">\nkhuyên về việc không ngừng học hỏi (đọc sách, tham gia khóa học) và đào tạo cho đội\n \nngũ kinh doanh. Điều này quan trọng vì nó đảm bảo sự phát triển liên tục của cả cá nhân\n \nvà tổ chức. Trong môi trường kinh doanh thay đổi nhanh chóng, việc nâng cao năng lực\n \ncho toàn bộ đội nhóm thông qua giáo dục là cách tốt nhất để tạo ra đòn bẩy, giúp doanh\n \nnghiệp mở rộng quy mô và đạt được những thành tựu lớn hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Hãy luôn nhớ rằng nếu không hành động thì sẽ không bao giờ có kết quả.”\n \n“Điều gì có hiệu quả với bạn, bạn cần liên tục, liên tục, liên tục, liên tục dùng nó. Bạn chỉ dùng\n \nnó cho đến khi nó biến thành thói quen thì lúc đó nó mới thực sự là của bạn.”\n \n“Nếu bạn thực sự hài lòng với khóa học này, đừng quên chia sẻ khóa học này trên trang cá\n \nnhân của bạn để nhiều người bạn của bạn có thể biết đến khóa học này, bằng cách đó họ sẽ\n \nthay đổi cuộc đời của mình như cách bạn đã đang thay đổi cuộc đời của bạn.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><p class=\"body-txt\">\nLời kết\n \nHết khoá 30 Tuyệt Chiêu Gia Tăng Doanh Số. Đọc để LÀM, không phải để biết — biến mỗi bài\n \nhọc thành hành động cụ thể.\n</p></div></div>",
"<div class=\"pg pg-cover\" style=\"border-top:5px solid #e53935\">\n  <div class=\"cover-wrap\">\n    <div class=\"cover-title\">30 Tuyệt Chiêu Bán Hàng</div>\n    <div class=\"cover-sub\" style=\"color:#e53935\">Học để ứng dụng · Áp dụng để thành công</div>\n    <div class=\"cover-tag\" style=\"color:#e53935;margin-top:24px\">QNPA Pickleball Academy</div>\n  </div>\n</div>"];
const N=pages.length;
let cur=0;
const book=document.getElementById('book');
const fill=document.getElementById('progress-fill');
const info=document.getElementById('page-info');
const jump=document.getElementById('page-jump');
const btnP=document.getElementById('btn-prev');
const btnN=document.getElementById('btn-next');
function render(){
  book.innerHTML=pages[cur];
  fill.style.width=((cur+1)/N*100)+'%';
  info.textContent=(cur+1)+' / '+N;
  jump.value=cur+1;
  btnP.disabled=cur===0;
  btnN.disabled=cur===N-1;
  window.scrollTo(0,0);
}
function next(){if(cur<N-1){cur++;render();}}
function prev(){if(cur>0){cur--;render();}}
function goTo(n){cur=Math.max(0,Math.min(N-1,n));render();}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown')next();
  else if(e.key==='ArrowLeft'||e.key==='PageUp')prev();
});
render();
</script>
</body>
