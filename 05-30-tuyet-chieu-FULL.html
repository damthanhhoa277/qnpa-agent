<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<title>30 Tuyệt Chiêu Bán Hàng</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#e8eaf0;font-family:'Segoe UI',Arial,sans-serif}
body{display:flex;flex-direction:column;align-items:center;padding:18px 10px 24px}

/* Book wrapper */
#book-wrap{width:720px;max-width:98vw;display:flex;flex-direction:column}

/* Top bar: title + page info */
#top-bar{display:flex;justify-content:space-between;align-items:center;
          margin-bottom:6px;padding:0 2px}
#book-title{font-size:13px;font-weight:600;color:#444;white-space:nowrap;
             overflow:hidden;text-overflow:ellipsis;max-width:60%}
#page-info{font-size:13px;color:#666;white-space:nowrap}

/* Progress bar */
#progress-bar{width:100%;height:3px;background:#d0d0d0;border-radius:2px;margin-bottom:10px}
#progress-fill{height:100%;border-radius:2px;transition:width .3s;background:#e53935}

/* Page */
.pg{width:100%;min-height:540px;background:#ffffff;border-radius:6px;
     box-shadow:0 2px 16px rgba(0,0,0,.12);overflow:hidden}

/* Cover */
.pg-cover{display:flex;justify-content:center;align-items:center;min-height:540px}
.cover-wrap{text-align:center;padding:60px 40px}
.cover-tag{font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;font-weight:600}
.cover-title{font-size:28px;font-weight:700;color:#1a1a1a;line-height:1.4;margin-bottom:16px}
.cover-sub{font-size:14px;font-weight:500}

/* Content page */
.pg-content{}
.pg-inner{padding:28px 36px 32px;overflow-y:auto;max-height:540px}
.pg-inner::-webkit-scrollbar{width:5px}
.pg-inner::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

/* Typography */
.sec-hdr{font-size:12px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
          margin:18px 0 8px;padding-bottom:5px;border-bottom:1px solid #eee}
.sec-hdr:first-child{margin-top:0}
.body-txt{font-size:14px;color:#2d2d2d;line-height:1.8;margin-bottom:10px;text-align:justify}
.bullet{display:flex;gap:10px;margin:5px 0}
.bul-dot{font-size:18px;line-height:1.4;flex-shrink:0;margin-top:-1px}
.bul-txt{font-size:13.5px;color:#2d2d2d;line-height:1.7}

/* Navigation */
#nav{display:flex;align-items:center;gap:14px;margin-top:12px}
.nav-btn{background:#fff;border:2px solid #e53935;color:#e53935;padding:8px 24px;
          border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;
          transition:all .15s;letter-spacing:.5px}
.nav-btn:hover{background:#e53935;color:#fff}
.nav-btn:disabled{opacity:.35;cursor:default}
#page-jump{width:52px;text-align:center;border:1px solid #ccc;border-radius:5px;
            padding:6px;font-size:13px;color:#444}
</style>
</head>
<body>
<div id="book-wrap">
  <div id="top-bar">
    <div id="book-title">30 Tuyệt Chiêu Bán Hàng</div>

  </div>

</div>
<div id="nav">
  <button class="nav-btn" id="btn-prev" onclick="prev()" disabled>◄ Trước</button>
  <input id="page-jump" type="number" min="1" max="60" value="1"
         onchange="goTo(+this.value-1)" title="Nhảy đến trang">
  <button class="nav-btn" id="btn-next" onclick="next()">Tiếp ►</button>
</div>
<script>
const pages=["<div class=\"pg pg-cover\" style=\"border-top:5px solid #e53935\">\n  <div class=\"cover-wrap\">\n    <div class=\"cover-tag\" style=\"color:#e53935\">Sổ Tay Tinh Hoa · QNPA</div>\n    <div class=\"cover-title\">30 Tuyệt Chiêu Bán Hàng</div>\n    <div class=\"cover-sub\" style=\"color:#e53935\">58 trang nội dung đầy đủ</div>\n  </div>\n</div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><p class=\"body-txt\">\n30 Tuyệt Chiêu Gia Tăng Doanh\n \nSố\n \nSổ tay tinh hoa\n</p>\n<p class=\"body-txt\">\nTổng hợp 34 bài\n \nNguồn: khoá học 30 Tuyệt Chiêu Gia Tăng Doanh Số\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><p class=\"body-txt\">\nLời mở\n \nQuyển sách này tổng hợp tinh hoa khoá 30 Tuyệt Chiêu Gia Tăng Doanh Số, do AI nghe lại\n \ntừng bài giảng và chắt lọc thành: tóm tắt, ý chính, điểm quan trọng nhất, và trích dẫn đáng\n \nnhớ.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><p class=\"body-txt\">\nMục lục\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Chương 1</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 1: Mindset trong bán hàng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 2: Tư duy của người bán hàng thành công</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Chương 2</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 3: Quà tặng miễn phí</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 4: Chiến lược bể cá</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 5: Chiến lược đuổi theo tiền của bạn</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 6: Chiến lược lời giới thiệu</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 7: Cách trình bày 60s</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 8: Chiến lược vòng ảnh hưởng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 9: Chiến lược tạo landing page</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 10: Nói chuyện trước công chúng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 11: Tổng kết</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Chương 3</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 12: Chiến lược tăng tỉ lệ đặt cuộc hẹn</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 13: Nhóm tính cách khách hàng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 14: Xây dựng mối quan hệ thân tình</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 15: Xác định chính xác nhu cầu khách hàng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 16: Chuyển tính năng thành lợi ích</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 17: Xác định USP, điểm độc đáo trong bán hàng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 18: 7 bước kể chuyện bán hàng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 19: Chốt sales- đòn kết thúc</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 20: Xử lý sự từ chối</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 21: Tổng kết</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Chương 4</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 22: Upsale</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 23: Downsale</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 24: Đóng gói sản phẩm</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 25: Nhân bản hệ thống bán hàng với chương trình Refferal</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Chương 5</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 26: Tổng quan về Raving Fan</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 27: Văn hóa Raving Fan</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 28: Bán nhiều hơn quảng cáo</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 29: Giúp khách hàng đạt được kết quả</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 30: Kinh doanh minh bạch</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 31: Đối xử với khách hàng tốt nhất</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 32: Người cho đi là người chiến thắng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 33: Kết thúc</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài 34: Tổng kết khóa học</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#e53935\">Chương 1</h3>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Bài 1: Mindset trong bán hàng</h3>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Tóm tắt. Buổi giảng này tập trung vào việc thay đổi tư duy cốt lõi về bán hàng để đạt được</h3>\n<p class=\"body-txt\">\nthành công. Diễn giả nhấn mạnh rằng để giỏi bán hàng, cần phải thực sự yêu thích công việc\n \nnày và từ bỏ những niềm tin tiêu cực. Quan trọng nhất, người bán hàng phải có tư duy &quot;bán\n \nhàng là phục vụ&quot;, không chỉ đáp ứng mà còn phải vượt qua cả sự mong đợi và tưởng tượng\n \ncủa khách hàng để tạo ra những khách hàng cuồng nhiệt.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Hầu hết những gì có trong cuộc đời là do tư duy, và &quot;những gì có ở trong đầu thì sẽ có ở</span></div>\n<p class=\"body-txt\">\ntrên tay.&quot; Để bán hàng thành công, cần có tư duy của người bán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bài tập thực hành về việc share đường link khóa học trên Facebook cho thấy đa số mọi</span></div>\n<p class=\"body-txt\">\nngười không làm theo đề nghị lần đầu (99,9% thất bại) vì có suy nghĩ &quot;bán hàng là xấu&quot;\n \nhoặc không thích bán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Sau lời đề nghị lần hai, chỉ có 20% người share, cho thấy nhiều người không yêu thích</span></div>\n<p class=\"body-txt\">\nviệc bán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Tư duy đầu tiên: Để giỏi trong lĩnh vực bán hàng, bạn cần ngay lập tức thay đổi tư duy và</span></div>\n<p class=\"body-txt\">\nphải yêu thích, đam mê công việc bán hàng. Bạn không thể trở nên giỏi trong lĩnh vực\n \nmà bạn không yêu thích.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Tư duy thứ hai: Ngừng lặp đi lặp lại những thông điệp tiêu cực như &quot;tôi không giỏi về</span></div>\n<p class=\"body-txt\">\nlĩnh vực bán hàng.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Cần tạo ra những bản tuyên bố mới (positive affirmations) và đọc đi đọc lại hàng ngày</span></div>\n<p class=\"body-txt\">\nđể cài đặt những niềm tin mới, tích cực về bán hàng vào tư duy của mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Tư duy quan trọng nhất: Bán hàng là phục vụ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bán hàng không phải là lấy tiền của ai đó, mà là cơ hội để mang tài năng, hàng hóa, dịch</span></div>\n<p class=\"body-txt\">\nvụ đến khách hàng, làm cho cuộc sống của họ trở nên tốt hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Trong thời đại hiện đại, hàng hóa gần như tốt giống nhau; chỉ hàng hóa tốt không thì</span></div>\n<p class=\"body-txt\">\nchưa đủ để chiến thắng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Phục vụ khách hàng không chỉ là đáp ứng sự mong đợi hay vượt quá sự mong đợi của</span></div>\n<p class=\"body-txt\">\nhọ. &quot;Phục vụ khách hàng là vượt quá cả sự tưởng tượng của khách hàng.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Chỉ những công ty có sản phẩm kèm dịch vụ vượt quá sự mong đợi của khách hàng mới</span></div>\n<p class=\"body-txt\">\ncó thể chiến thắng trong trò chơi bán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Thái độ phục vụ của người bán hàng là một trong những cách quan trọng nhất để tạo ra</span></div>\n<p class=\"body-txt\">\n&quot;khách hàng cuồng nhiệt&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Hầu hết mọi người đều khó có thể làm giảm cái tôi cá nhân của mình, điều này gây khó</span></div>\n<p class=\"body-txt\">\nkhăn trong bán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Tổng kết: Bán hàng thành công phụ thuộc vào tư duy của bạn, cần thay đổi tư duy để yêu</span></div>\n<p class=\"body-txt\">\nthích, đam mê bán hàng và tập luyện bán hàng ngay lập tức mỗi khi có cơ hội, với thái độ\n \nphục vụ ở cấp độ cao nhất, luôn vượt quá sự mong đợi của khách hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">★ Điểm quan trọng nhất</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Chuyển đổi tư duy từ &quot;bán hàng là xấu/lấy tiền&quot; sang &quot;bán hàng là phục vụ&quot; và &quot;yêu</span></div>\n<p class=\"body-txt\">\nthích việc bán hàng&quot;: Đây là nền tảng cốt lõi để bất kỳ ai cũng có thể phát triển kỹ năng\n \nbán hàng. Nếu không có tình yêu và sự đam mê với công việc, khó lòng duy trì động lực\n \nvà nỗ lực để trở nên xuất sắc, đặc biệt khi đối mặt với những định kiến tiêu cực về bán\n \nhàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Định nghĩa lại mức độ &quot;phục vụ khách hàng&quot;: Diễn giả nhấn mạnh rằng phục vụ không</span></div>\n<p class=\"body-txt\">\nchỉ là đáp ứng hay vượt quá mong đợi, mà phải là &quot;vượt quá cả sự tưởng tượng của\n \nkhách hàng.&quot; Trong một thị trường cạnh tranh nơi sản phẩm tương đồng, việc tạo ra trải\n \nnghiệm phi thường và không thể dự đoán được sẽ tạo ra sự khác biệt lớn, xây dựng lòng\n \ntrung thành mạnh mẽ và tạo ra &quot;khách hàng cuồng nhiệt&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Tầm quan trọng của việc &quot;cài đặt&quot; tư duy thông qua tuyên bố và luyện tập: Ý tưởng</span></div>\n<p class=\"body-txt\">\n&quot;những gì có trong đầu thì sẽ có ở trên tay&quot; được cụ thể hóa bằng việc đọc đi đọc lại các\n \nbản tuyên bố tích cực về bán hàng. Điều này chỉ ra rằng tư duy không phải là điều tĩnh\n \ntại mà có thể được rèn luyện và thay đổi có chủ đích, tạo ra những niềm tin và hành vi\n \nmới dẫn đến thành công.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Những gì có ở trong đầu thì sẽ có ở trên tay.”\n \n“Nếu bạn không yêu thích bán hàng, bạn không bao giờ trở thành người bán hàng giỏi. Bạn\n \nkhông thể trở nên giỏi trong lĩnh vực mà bạn không yêu thích.”\n \n“Bán hàng là phục vụ, là vượt qua cả sự mong đợi của khách hàng, vượt quá cả sự tưởng\n \ntượng của khách hàng.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Bài 2: Tư duy của người bán hàng thành công</h3>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Tóm tắt. Buổi giảng này giới thiệu triết lý &quot;bán hàng bằng trái tim&quot; hoàn toàn khác biệt so</h3>\n<p class=\"body-txt\">\nvới các phương pháp lôi kéo khách hàng truyền thống. Cốt lõi là đặt lợi ích, mục tiêu và sự\n \nhài lòng của khách hàng lên hàng đầu, yêu thương và tôn trọng họ như gia đình để xây dựng\n \nmối quan hệ bền vững. Mục tiêu cuối cùng không chỉ là doanh số hay &quot;win-win&quot;, mà là đạt\n \nđược trạng thái &quot;mọi người liên quan đều chiến thắng&quot;, mang lại cả tiền bạc lẫn sự hạnh\n \nphúc cho tất cả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Hầu hết các chiến lược bán hàng hiện có đều tập trung vào việc lôi kéo thật nhiều khách</span></div>\n<p class=\"body-txt\">\nhàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Để chiến thắng trong trò chơi bán hàng, cần có một chiến lược hoàn toàn khác: &quot;bán</span></div>\n<p class=\"body-txt\">\nhàng bằng trái tim&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Để bán hàng bằng trái tim, hãy luôn yêu quý, tôn trọng khách hàng và đặt mục đích của</span></div>\n<p class=\"body-txt\">\nkhách hàng lên trên mục đích của bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Quan tâm tới hiệu quả dành cho khách hàng hơn là mục tiêu doanh số cá nhân.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Cách tiếp cận này giúp bạn giữ chân và dễ dàng mở rộng khách hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Để thực hiện được điều này, bạn cần phải học hỏi để có thể làm lớn hơn.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Quy tắc số 1 để thành công trong bán hàng: Hãy kết nối, kết thân với khách hàng trong</span></div>\n<p class=\"body-txt\">\nbất kỳ giai đoạn nào.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Quy tắc số 2: Không bao giờ tranh luận với khách hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Quy tắc số 3: Hãy tập trung mọi nguồn lực vào điều mà khách hàng muốn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Quy tắc số 4: Hãy yêu thương khách hàng như thể gia đình của bạn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Áp dụng những nguyên tắc này sẽ giúp bạn nhanh chóng trở thành người dẫn đầu trong</span></div>\n<p class=\"body-txt\">\nbán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bằng cách yêu thương khách hàng, Diễn giả đã có hàng vạn khách hàng trong lĩnh vực</span></div>\n<p class=\"body-txt\">\nluật kinh doanh, luật sở hữu trí tuệ và hàng chục ngàn khách hàng trong lĩnh vực đào tạo\n \nphát triển tiềm năng con người, trở thành top đầu trong các ngành của mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Từ nay, bạn không cần phải nỗ lực vất vả để lôi kéo khách hàng, chỉ cần yêu thương</span></div>\n<p class=\"body-txt\">\nkhách hàng và bán bằng cả trái tim.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Khi bán hàng, mục tiêu là để cả bạn và khách hàng đều hạnh phúc và có tiền.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Để chiến thắng trong trò chơi bán hàng, không chỉ là &quot;win-win&quot; (bạn thắng, khách hàng</span></div>\n<p class=\"body-txt\">\nthắng), mà &quot;mọi người liên quan đều chiến thắng&quot; (bạn, khách hàng, toàn bộ thị trường,\n \nmôi trường, người thân trong gia đình khách hàng, doanh nghiệp của bạn).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Một cuộc bán hàng thành công thực sự là khi tất cả những ai liên quan đều chiến thắng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Chúng ta không chỉ cần doanh số, chúng ta cần cả sự hạnh phúc cho mọi người – đó mới</span></div>\n<p class=\"body-txt\">\nlà tư duy chiến thắng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Tiền bạc rất quan trọng, nhưng hạnh phúc cũng quan trọng không kém, và bạn sẽ có cả</span></div>\n<p class=\"body-txt\">\nhai.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Triết lý &quot;Bán hàng bằng trái tim&quot; và đặt lợi ích khách hàng lên hàng đầu: Đây là luận</span></div>\n<p class=\"body-txt\">\nđiểm cốt lõi, thay đổi hoàn toàn tư duy bán hàng từ việc &quot;lôi kéo&quot; sang &quot;yêu thương, tôn\n \ntrọng&quot; khách hàng. Nó quan trọng vì nó định hướng người bán tập trung vào việc tạo ra\n \ngiá trị thực sự cho khách hàng, giải quyết vấn đề của họ và đặt mục tiêu của họ trên mục\n \ntiêu cá nhân. Điều này không chỉ xây dựng mối quan hệ bền vững mà còn tự động dẫn\n \nđến thành công về doanh số và sự phát triển bền vững.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Tư duy &quot;mọi người liên quan đều chiến thắng&quot; (All-Win): Vượt xa khái niệm &quot;win-win&quot;</span></div>\n<p class=\"body-txt\">\ntruyền thống, Diễn giả nhấn mạnh rằng một cuộc bán hàng thực sự thành công là khi tất\n \ncả các bên liên quan (bản thân, khách hàng, thị trường, môi trường, gia đình khách hàng,\n \ndoanh nghiệp) đều thắng lợi. Điều này quan trọng vì nó thúc đẩy một cách tiếp cận kinh\n \ndoanh có đạo đức, có trách nhiệm xã hội, tạo ra một hệ sinh thái tích cực và lâu dài, nơi\n \nmọi hành động đều hướng đến lợi ích chung, củng cố uy tín và vị thế của doanh nghiệp.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Để chúng ta trở thành một người chiến thắng trong trò chơi bán hàng, chúng ta phải có một\n \ncái chiến lược hoàn toàn khác, đó là bán hàng bằng trái tim.”\n \n“Hãy luôn quan tâm tới hiệu quả dành cho khách hàng hơn là quan tâm tới mục tiêu doanh số\n \ncủa bạn.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Hãy luôn nhớ, chúng ta không chỉ cần doanh số, chúng ta cần cả sự hạnh phúc cho mọi người.\n \nĐó mới là tư duy chiến thắng trong trò chơi bán hàng.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Chương 2</h3>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Bài 3: Quà tặng miễn phí</h3>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Tóm tắt. Buổi giảng này tập trung vào khái niệm &quot;mồi câu&quot; (bait) trong internet marketing,</h3>\n<p class=\"body-txt\">\nvới mục tiêu tạo ra số lượng khách hàng tiềm năng vô hạn. Cốt lõi là hiểu rõ nhu cầu của\n \nkhách hàng để tạo ra những sản phẩm hoặc nội dung giá trị, miễn phí nhưng chất lượng cao.\n \nNhững &quot;mồi câu&quot; này giúp thu thập thông tin khách hàng tiềm năng, từ đó áp dụng các chiến\n \nsách bán hàng tiếp theo một cách hiệu quả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Mục tiêu của buổi học là &quot;tạo ra số lượng khách hàng tiềm năng vô hạn&quot; thông qua chiến</span></div>\n<p class=\"body-txt\">\nlược &quot;mồi câu&quot; trong marketing.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Để có &quot;mồi câu&quot; tuyệt vời, cần hiểu rõ nhu cầu của khách hàng. Đây là khái niệm quan</span></div>\n<p class=\"body-txt\">\ntrọng bậc nhất trong marketing.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Cần xác định chính xác tập khách hàng mục tiêu: họ là ai, bao nhiêu tuổi, sở thích và</span></div>\n<p class=\"body-txt\">\nmong muốn của họ là gì.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Sau khi tìm ra nhu cầu của nhóm khách hàng tiềm năng, chọn một nhu cầu cần thiết nhất</span></div>\n<p class=\"body-txt\">\ntrong nhóm đó để tập trung.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">&quot;Mồi câu&quot; là bất kỳ điều gì có thể gửi tới khách hàng một cách miễn phí.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Các dạng &quot;mồi câu&quot; có thể là: file PDF, đoạn video ngắn, ebook, khóa học online/offline,</span></div>\n<p class=\"body-txt\">\nhoặc một chiến dịch email marketing.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">&quot;Mồi câu&quot; phải đảm bảo hai yếu tố quan trọng: &quot;miễn phí&quot; và &quot;chất lượng cao&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Cách triển khai: Tạo ra nhiều &quot;mồi câu&quot; chất lượng cao, miễn phí và đưa lên một trang</span></div>\n<p class=\"body-txt\">\nweb để khách hàng tải về.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Khi khách hàng muốn tải &quot;mồi câu&quot;, họ cần phải điền thông tin (email hoặc tên) để nhận.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Việc này giúp thu thập được một bộ sưu tập email và tên của khách hàng tiềm năng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Sử dụng danh sách khách hàng tiềm năng này để áp dụng các chính sách bán hàng sau</span></div>\n<p class=\"body-txt\">\nđó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Kết quả kinh doanh của diễn giả cho thấy hơn 30% doanh số đến từ hệ thống này.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Lời khuyên: Hãy giữ mọi thứ đơn giản để đạt hiệu quả cao.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Tập trung vào nhu cầu của khách hàng, không phải thứ bạn muốn cho họ: Diễn giả nhấn</span></div>\n<p class=\"body-txt\">\nmạnh qua ví dụ &quot;Nếu bạn muốn câu cá thì đừng dùng cà rốt&quot;, nghĩa là phải cho khách\n \nhàng thứ họ muốn chứ không phải thứ mình có sẵn hay mình nghĩ là tốt. Điều này quan\n \ntrọng vì nó chuyển đổi tư duy marketing từ sản phẩm sang khách hàng, đảm bảo &quot;mồi\n \ncâu&quot; thực sự thu hút đúng đối tượng và giải quyết đúng vấn đề của họ.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">&quot;Mồi câu&quot; phải &quot;miễn phí&quot; nhưng có &quot;chất lượng cao&quot;: Sự &quot;miễn phí&quot; giúp dễ dàng tiếp</span></div>\n<p class=\"body-txt\">\ncận và thu hút khách hàng tiềm năng ban đầu. Tuy nhiên, yếu tố &quot;chất lượng cao&quot; là cực\n \nkỳ then chốt để xây dựng lòng tin, uy tín, và tạo ra giá trị thực sự cho khách hàng. Nếu\n \n&quot;mồi câu&quot; chất lượng thấp, nó sẽ phản tác dụng, làm mất đi sự tin tưởng và khiến khách\n \nhàng không muốn tiếp tục tương tác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Mục đích cuối cùng của &quot;mồi câu&quot; là thu thập thông tin khách hàng tiềm năng để bán</span></div>\n<p class=\"body-txt\">\nhàng sau đó: &quot;Mồi câu&quot; không chỉ đơn thuần là việc cho đi. Mục tiêu chiến lược là biến\n \nngười xem thành khách hàng tiềm năng có thông tin liên hệ (email/tên). Điều này cho\n \nphép doanh nghiệp tiếp tục nuôi dưỡng mối quan hệ, giới thiệu các sản phẩm/dịch vụ\n \ntrả phí phù hợp, từ đó chuyển đổi họ thành khách hàng thực sự. Nó là bước đầu tiên và\n \nquan trọng nhất trong phễu bán hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Nếu bạn muốn câu cá thì đừng dùng cà rốt.”\n \n“Nhu cầu của khách hàng là một trong những khái niệm quan trọng bậc nhất trong\n \nmarketing.”\n \n“Nó phải được miễn phí và có chất lượng cao.”\n \n“Đơn giản mới có thể có hiệu quả cao.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Bài 4: Chiến lược bể cá</h3>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Tóm tắt. Buổi giảng giới thiệu &quot;Chiến lược Bể cá&quot;, một phương pháp đơn giản nhưng hiệu</h3>\n<p class=\"body-txt\">\nquả để mở rộng mạng lưới và tìm kiếm khách hàng tiềm năng. Chiến lược này tập trung vào\n \nviệc thu thập các danh thiếp (name card) bị bỏ quên tại các sự kiện kết nối thương mại hoặc\n \ngiao lưu doanh nhân, sau đó chủ động liên hệ và follow-up với những người này để xây dựng\n \nmối quan hệ. Mục tiêu là chuyển hóa các contact thành khách hàng trực tiếp hoặc thành\n \nnguồn giới thiệu khách hàng cho doanh nghiệp, tận dụng tối đa tài nguyên sẵn có mà không\n \ntốn nhiều chi phí.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Giới thiệu Chiến lược Bể cá: Đây là một chiến lược được diễn giả phát hiện và đánh giá là</span></div>\n<p class=\"body-txt\">\nvô cùng hay trong quá trình làm việc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bối cảnh thực hiện: Chiến lược này được áp dụng tại các tổ chức/chương trình kết nối</span></div>\n<p class=\"body-txt\">\nthương mại, networking, giao lưu doanh nhân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">&quot;Hồ cá&quot; name card: Tại các sự kiện này, người tham dự thường bỏ name card của họ vào</span></div>\n<p class=\"body-txt\">\nmột cái lọ nhỏ được gọi là &quot;hồ cá&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Thực trạng name card bị bỏ quên: Thông thường, sau buổi, những name card này không</span></div>\n<p class=\"body-txt\">\nđược trân trọng và thường bị bỏ lại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Thu thập name card: Diễn giả chủ động tiến tới xin hoặc mượn các name card đó, sau đó</span></div>\n<p class=\"body-txt\">\nsao chụp lại nếu cần.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Quy trình Follow-up sau sự kiện:</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Sau khi kết thúc chương trình, gọi điện thoại hoặc gửi email cho những người có name</span></div>\n<p class=\"body-txt\">\ncard.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Nội dung cuộc gọi/email: bày tỏ niềm vui được gặp tại chương trình, mong muốn được</span></div>\n<p class=\"body-txt\">\nkết nối, tìm hiểu về công việc kinh doanh của họ và đề xuất &quot;tôi có thể giúp đỡ được bạn\n \ngì không?&quot;. Đây là những câu hỏi xã giao nhưng có mục đích.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Giá trị của name card: Diễn giả nhấn mạnh đây là một nguồn tài nguyên vô cùng tuyệt</span></div>\n<p class=\"body-txt\">\nvời.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Xử lý thông tin:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Nếu là khách hàng tiềm năng của mình, nhập thông tin vào cơ sở dữ liệu.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Nếu không phải khách hàng tiềm năng trực tiếp, có thể giới thiệu và mong muốn kết nối</span></div>\n<p class=\"body-txt\">\nđể họ có thể giới thiệu khách hàng cho mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Khuyến nghị tổng quát: Tham gia nhiều hơn vào các tổ chức/chương trình kết nối</span></div>\n<p class=\"body-txt\">\nthương mại và giao lưu doanh nhân để tìm thấy khách hàng tiềm năng của mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Ưu điểm của chiến lược: Đơn giản, không có chi phí (hoặc chi phí rất thấp), nhưng có thể</span></div>\n<p class=\"body-txt\">\nmang lại hiệu quả cao.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Khai thác tài nguyên bị lãng phí: Chiến lược này dạy về cách nhìn nhận và tận dụng</span></div>\n<p class=\"body-txt\">\nnhững cơ hội mà người khác bỏ qua. Việc thu thập name card bị &quot;bỏ quên&quot; tại các sự\n \nkiện biến thông tin tưởng chừng vô giá trị thành một kho dữ liệu khách hàng tiềm năng\n \nhoặc đối tác quý giá. Điều này quan trọng vì nó khuyến khích tư duy chủ động, sáng tạo\n \ntrong việc tìm kiếm khách hàng với chi phí thấp nhất.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Chiến lược follow-up có mục đích: Không chỉ đơn thuần là thu thập name card, mà là</span></div>\n<p class=\"body-txt\">\nmột quy trình follow-up bài bản, bắt đầu bằng thiện chí kết nối, tìm hiểu nhu cầu đối\n \nphương và đề xuất giúp đỡ. Cách tiếp cận này giúp xây dựng mối quan hệ thực sự,\n \nchuyển đổi một mảnh giấy thành một cơ hội kinh doanh bền vững, đồng thời giúp lọc ra\n \nkhách hàng tiềm năng hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Tối ưu hóa mọi mối quan hệ: Chiến lược này không giới hạn việc tìm kiếm khách hàng</span></div>\n<p class=\"body-txt\">\ntrực tiếp mà còn mở rộng ra việc xây dựng mạng lưới giới thiệu. Ngay cả khi một contact\n \nkhông trở thành khách hàng, họ vẫn có thể trở thành người giới thiệu quý giá. Điều này\n \ngiúp tối đa hóa giá trị từ mỗi contact, mở rộng phạm vi tiếp cận thị trường mà không cần\n \nđầu tư thêm vào việc tìm kiếm khách hàng mới.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Đây là một chiến lược vô cùng hay mà trong quá trình làm việc của tôi đã phát hiện ra cái\n \nđiều này.”\n \n“Và nói chung, đó là những câu hỏi xã giao sau cái chương trình và đây chính là một nguồn tài\n \nnguyên vô cùng tuyệt vời.”\n \n“Chiến lược Hồ cá là một chiến lược vô cùng tuyệt vời, đơn giản, không có chi phí nhưng lại có\n \nthể có hiệu quả với bạn.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#e53935\">Bài 5: Chiến lược đuổi theo tiền của bạn</h3>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Tóm tắt. Buổi giảng này giới thiệu chiến lược &quot;Follow Your Money&quot;, khuyến khích người</h3>\n<p class=\"body-txt\">\nnghe thay đổi cách nhìn về người bán hàng. Thay vì chỉ coi họ là nhà cung cấp dịch vụ, hãy\n \nbiến họ thành khách hàng tiềm năng hoặc đối tác giới thiệu. Bằng cách đối xử trân trọng, xây\n \ndựng mối quan hệ và thậm chí hỗ trợ họ, bạn có thể tận dụng mạng lưới khách hàng rộng\n \nlớn của người bán để mở rộng cơ sở khách hàng của chính mình.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Giới thiệu chiến lược &quot;Follow Your Money&quot; (Đuổi theo tiền của bạn).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Thực tế phổ biến: Hầu hết mọi người đối xử với nhà cung cấp/người bán hàng một cách</span></div>\n<p class=\"body-txt\">\nkhông công bằng, cho rằng người có tiền là người có quyền lực cao nhất.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bí quyết: Biến bất kỳ người bán hàng nào bán cho bạn thành khách hàng tiềm năng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Khi mua hàng từ người bán, bạn có cơ hội để nói chuyện, xin số điện thoại, thông tin liên</span></div>\n<p class=\"body-txt\">\nlạc của họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Với tư cách là người mua, bạn có &quot;năng lượng&quot; lớn hơn người bán ở thời điểm đó.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Hãy làm quen, mong họ giúp đỡ; và trong quá trình giao dịch, bạn sẽ chăm sóc ngược lại</span></div>\n<p class=\"body-txt\">\nngười bán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Giới thiệu về dịch vụ/sản phẩm kinh doanh của bạn cho người bán hàng và đưa họ vào</span></div>\n<p class=\"body-txt\">\ndanh sách khách hàng tiềm năng của bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Chiến lược này được hầu hết những người bán hàng thành công quan tâm, vì họ coi</span></div>\n<p class=\"body-txt\">\ntrọng mọi người, đặc biệt là những người bán hàng khác, và sẵn sàng trở thành khách\n \nhàng tiềm năng của bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Điểm quan trọng nhất: Người bán hàng thành công quen biết vô cùng nhiều khách hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Do đó, hãy đối xử với người bán hàng một cách yêu thương, trân trọng, quý mến.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Họ có thể không chỉ mua hàng của bạn mà còn có khả năng giới thiệu khách hàng mới</span></div>\n<p class=\"body-txt\">\ncho bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Kết luận: &quot;Hãy đi theo những người bán hàng cho bạn&quot; vì họ là những người đáng quan</span></div>\n<p class=\"body-txt\">\ntâm nhất để gia tăng lượng khách hàng tiềm năng của bạn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Đảo ngược vai trò: Biến người bán thành khách hàng tiềm năng và đối tác giới thiệu: Đây</span></div>\n<p class=\"body-txt\">\nlà một insight mạnh mẽ, thách thức tư duy kinh doanh truyền thống. Thay vì chỉ coi\n \nngười bán là kênh cung cấp, chiến lược này đề xuất xây dựng mối quan hệ để họ trở\n \nthành nguồn giới thiệu khách hàng hoặc thậm chí là khách hàng trực tiếp của bạn. Điều\n \nnày cực kỳ quan trọng vì nó mở ra một kênh marketing &quot; truyền miệng&quot; (referral\n \nmarketing) có độ tin cậy và hiệu quả cao, tận dụng mối quan hệ sẵn có thay vì phải tìm\n \nkiếm khách hàng mới hoàn toàn từ đầu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Tận dụng mạng lưới khách hàng của người bán: Diễn giả nhấn mạnh rằng những người</span></div>\n<p class=\"body-txt\">\nbán hàng thành công thường có một mạng lưới khách hàng rộng lớn. Bằng cách xây\n \ndựng mối quan hệ tốt với họ (bắt đầu từ việc bạn là người mua của họ), bạn không chỉ có\n \nthêm một liên hệ mà còn có thể tiếp cận gián tiếp đến toàn bộ mạng lưới khách hàng mà\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><p class=\"body-txt\">\nhọ đã dày công xây dựng. Điều này quan trọng vì nó giúp bạn mở rộng tầm ảnh hưởng\n \nvà tiếp cận thị trường mục tiêu một cách hiệu quả, thông qua sự giới thiệu đáng tin cậy.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Sử dụng &quot;năng lượng&quot; của người mua để xây dựng mối quan hệ: Khi bạn là người mua,</span></div>\n<p class=\"body-txt\">\nbạn đang ở vị thế có &quot;năng lượng&quot; (quyền lực) nhất định. Insight này khuyến khích tận\n \ndụng vị thế này không phải để đòi hỏi mà để chủ động xây dựng mối quan hệ, thu thập\n \nthông tin và giới thiệu về bản thân/doanh nghiệp một cách tự nhiên. Nó giúp biến một\n \ngiao dịch mua bán thông thường thành một cơ hội networking có giá trị, đặt nền móng\n \ncho các mối quan hệ kinh doanh lâu dài.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Tôi biến bất kỳ một người bán hàng nào cho tôi trở thành khách hàng tiềm năng.”\n \n“Hãy luôn nhớ, người bán hàng thành công, họ quen biết vô cùng nhiều khách hàng, cho nên\n \nhãy đối xử với những người bán hàng một cách thật là yêu thương, thật là trân trọng, thật là\n \nquý mến và họ sẽ có thể trở thành cái người mà giới thiệu khách hàng cho bạn.”\n \n“Những người bán hàng cho bạn là những người đáng quan tâm nhất.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Bài 6: Chiến lược lời giới thiệu</h3>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Tóm tắt. Buổi giảng này tập trung vào chiến lược &quot;Hệ thống giới thiệu khách hàng&quot;</h3>\n<p class=\"body-txt\">\n(Referral System) như một phương pháp thiết yếu để tạo ra số lượng khách hàng tiềm năng\n \nkhông giới hạn. Diễn giả nhấn mạnh rằng hơn 60% số người mua hàng trên toàn thế giới\n \nđến từ lời giới thiệu, do đó, các doanh nghiệp cần chủ động xây dựng và biến việc xin lời giới\n \nthiệu từ khách hàng hài lòng thành một văn hóa nội bộ. Để thành công, doanh nghiệp cần\n \nliên tục mang lại giá trị gia tăng, xây dựng mối quan hệ bền chặt và giữ vị trí &quot;Top of Mind&quot;\n \ntrong suy nghĩ của khách hàng và đối tác.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Tầm quan trọng của việc tạo ra số lượng khách hàng tiềm năng không giới hạn thông</span></div>\n<p class=\"body-txt\">\nqua &quot;hệ thống giới thiệu khách hàng&quot; (Referral System).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Hệ thống giới thiệu hoạt động khi những người khác (khách hàng, người quen, bất kỳ ai)</span></div>\n<p class=\"body-txt\">\ntiếp tục giới thiệu khách hàng mới cho doanh nghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Thống kê cho thấy hơn 60% số lượng người mua hàng trên toàn thế giới được mua hàng</span></div>\n<p class=\"body-txt\">\nthông qua lời giới thiệu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Có hai cách chính để xây dựng hệ thống giới thiệu khách hàng:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Tham gia các mạng lưới doanh nhân, hiệp hội doanh nghiệp, hoặc hiệp hội networking</span></div>\n<p class=\"body-txt\">\nđể tìm kiếm cơ hội.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Xây dựng hệ thống giới thiệu khách hàng nội bộ, biến nó thành một văn hóa trong doanh</span></div>\n<p class=\"body-txt\">\nnghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Cần chủ động đề nghị lời giới thiệu từ cả khách hàng tiềm năng khi tiếp xúc và đặc biệt là</span></div>\n<p class=\"body-txt\">\ntừ khách hàng đã mua hàng, đã trải nghiệm sản phẩm/dịch vụ (nhóm quan trọng nhất).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Hướng dẫn cụ thể cho người giới thiệu: nói rõ khi nào có ai quan tâm giống họ thì hãy</span></div>\n<p class=\"body-txt\">\ngiới thiệu đến công ty hoặc đến bạn.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Khách hàng hài lòng là nguồn giới thiệu vô cùng lớn; doanh nghiệp cần chủ động đưa hệ</span></div>\n<p class=\"body-txt\">\nthống này vào trong công việc kinh doanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Ví dụ cụ thể từ kinh nghiệm: đề nghị học viên giới thiệu bạn bè đến các hội thảo miễn</span></div>\n<p class=\"body-txt\">\nphí, các chương trình miễn phí tiếp theo, các khóa học trả phí nếu thấy bổ ích, và chia sẻ\n \nchương trình lên Facebook.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Xây dựng mối quan hệ thân tình, chân tình, yêu thương với những người bên ngoài giúp</span></div>\n<p class=\"body-txt\">\nhọ sẵn sàng giới thiệu khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Giới thiệu chiến lược &quot;Top of Mind&quot;: Luôn nằm ở phía trên trong suy nghĩ của mọi người</span></div>\n<p class=\"body-txt\">\nđể họ nghĩ đến bạn đầu tiên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Để đạt được &quot;Top of Mind&quot;, cần: xuất hiện nhiều hơn trước mặt họ, mang lại nhiều giá trị</span></div>\n<p class=\"body-txt\">\ngia tăng hơn, yêu thương họ nhiều hơn, và xây dựng mối quan hệ bền chặt hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Nhấn mạnh lại rằng 60% khách hàng đến từ lời giới thiệu.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Hơn 60% khách hàng đến từ lời giới thiệu: Con số này là một minh chứng hùng hồn về</span></div>\n<p class=\"body-txt\">\nhiệu quả vượt trội của kênh giới thiệu so với các hình thức marketing khác. Nó quan\n \ntrọng vì nó thay đổi cách nhìn về nguồn khách hàng, khuyến khích doanh nghiệp tập\n \ntrung đầu tư vào trải nghiệm khách hàng và mối quan hệ thay vì chỉ chạy quảng cáo trả\n \nphí.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Xây dựng hệ thống giới thiệu nội bộ và biến nó thành văn hóa doanh nghiệp: Việc tích</span></div>\n<p class=\"body-txt\">\nhợp việc xin lời giới thiệu vào mọi quy trình và tư duy của doanh nghiệp là mấu chốt để\n \nkhai thác tối đa tiềm năng của kênh này. Nó quan trọng vì nó đảm bảo sự chủ động, nhất\n \nquán và liên tục, không để bất kỳ cơ hội nào bị bỏ lỡ, giúp kênh giới thiệu phát triển bền\n \nvững.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Chiến lược &quot;Top of Mind&quot; thông qua tạo giá trị và xây dựng mối quan hệ: Để được giới</span></div>\n<p class=\"body-txt\">\nthiệu, doanh nghiệp không chỉ cần tốt mà còn cần được ghi nhớ. Việc liên tục xuất hiện,\n \ncung cấp giá trị gia tăng và xây dựng mối quan hệ chân thành, bền chặt là cách để trở\n \nthành lựa chọn hàng đầu trong tâm trí người giới thiệu. Điều này quan trọng vì nó biến\n \nkhách hàng và đối tác thành những &quot;đại sứ thương hiệu&quot; tự nguyện, mang lại nguồn\n \nkhách hàng chất lượng cao và miễn phí.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Hãy luôn nhớ rằng để nâng cao được số lượng khách hàng tiềm năng của bạn thì hệ thống\n \ngiới thiệu khách hàng là một hệ thống vô cùng quan trọng trong toàn bộ cấu trúc kinh doanh\n \ncủa bạn.”\n \n“Hãy luôn nhớ rằng khách hàng được hài lòng sẽ luôn cho bạn vô cùng nhiều lời giới thiệu.”\n \n“Bạn cần phải ở bên lúc nào cũng phải nằm ở phía bên trên trong suy nghĩ của mọi người.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Bài 7: Cách trình bày 60s</h3>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Tóm tắt. Buổi giảng này giới thiệu về &quot;bài trình bày 60 giây&quot; – một công cụ vô cùng quan</h3>\n<p class=\"body-txt\">\ntrọng giúp doanh nghiệp gia tăng doanh số và tìm kiếm khách hàng tiềm năng. Cốt lõi của\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><p class=\"body-txt\">\nbài trình bày này không phải để bán hàng trực tiếp mà là để người nghe hiểu rõ về lĩnh vực,\n \nsản phẩm/dịch vụ và đối tượng khách hàng mong muốn của bạn, từ đó họ có thể giới thiệu\n \nkhách hàng cho bạn. Bài trình bày được chia thành 5 phần ngắn gọn, dễ nhớ, và có thể được\n \nluyện tập để sử dụng mọi lúc mọi nơi nhằm mở rộng mạng lưới khách hàng không giới hạn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Giới thiệu bài trình bày 60 giây: Đây là một công cụ quan trọng để gia tăng doanh số và</span></div>\n<p class=\"body-txt\">\ntìm kiếm khách hàng tiềm năng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bối cảnh sử dụng: Gặp gỡ nhanh chóng trong thang máy, hội thảo, buổi gặp gỡ</span></div>\n<p class=\"body-txt\">\nnetworking, những nơi có thời gian giới thiệu rất ngắn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Mục tiêu chính: Biến 60 giây quý giá thành cơ hội để tìm kiếm người giới thiệu khách</span></div>\n<p class=\"body-txt\">\nhàng cho bạn (referral).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Không phải để bán hàng trực tiếp: Bài 60 giây này không nhằm mục đích bán hàng, mà</span></div>\n<p class=\"body-txt\">\nđể giúp mọi người biết khách hàng của bạn là ai và giới thiệu khách hàng cho bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Luyện tập và chuẩn bị: Nên tạo nhiều phiên bản (30s, 1 phút, 2 phút, 5 phút) nhưng hãy</span></div>\n<p class=\"body-txt\">\ntập trung luyện tập bản 60 giây để mang sẵn trong túi và có thể trình bày bất kỳ lúc nào.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Cấu trúc 5 phần của bài trình bày 60 giây:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Phần 1 (5-10 giây): Ngắn gọn về sản phẩm, dịch vụ hoặc lĩnh vực bạn đang tham gia.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Phần 2 (10-15 giây): Mở rộng giới thiệu về sản phẩm/dịch vụ bằng câu chuyện, USP</span></div>\n<p class=\"body-txt\">\n(điểm bán hàng độc đáo) hoặc đặc trưng để khách hàng hình dung rõ ràng hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Phần 3 (5-10 giây): Nói rõ hơn về một câu chuyện hoặc về khách hàng mà bạn đang</span></div>\n<p class=\"body-txt\">\nmong muốn tìm kiếm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Phần 4 (Kêu gọi hành động): Nêu rõ điều bạn muốn người đối diện làm gì cho bạn (ví dụ:</span></div>\n<p class=\"body-txt\">\ngiới thiệu khách hàng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Phần 5 (5 giây): Tổng kết lại tên và ngành nghề kinh doanh của bạn, vì người nghe có thể</span></div>\n<p class=\"body-txt\">\nquên sau khi bạn trình bày.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Quy trình tối ưu hóa: Đây là bài tập khó, cần dành nhiều thời gian tạo ra nhiều mẫu khác</span></div>\n<p class=\"body-txt\">\nnhau, thử nghiệm trong thực tiễn, giữ lại mẫu hiệu quả và bỏ mẫu không hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Ứng dụng rộng rãi: Có thể sử dụng ở bất kỳ đâu và bất kỳ lúc nào có cơ hội gặp gỡ (hội</span></div>\n<p class=\"body-txt\">\nthảo, câu lạc bộ, xe điện, gara ô tô, đánh tennis, golf...).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Bí quyết: Không giới thiệu sản phẩm để bán hàng, mà giới thiệu để đối tác tìm kiếm</span></div>\n<p class=\"body-txt\">\nkhách hàng cho mình. Đây là chiến lược thông minh để mở rộng khách hàng không giới\n \nhạn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Mục tiêu cốt lõi là tạo sự giới thiệu (referral), không phải bán hàng trực tiếp: Diễn giả</span></div>\n<p class=\"body-txt\">\nnhấn mạnh đi nhấn mạnh lại rằng bài 60 giây không phải để bán hàng. Điều này cực kỳ\n \nquan trọng vì nó thay đổi hoàn toàn cách tiếp cận trong giao tiếp. Thay vì áp lực phải\n \nchốt sale, bạn chỉ cần giúp người nghe hiểu rõ để họ có thể trở thành &quot;cánh tay nối dài&quot;\n \ntìm kiếm khách hàng hộ bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Làm rõ đối tượng khách hàng mong muốn: Trong phần 3 và 4 của cấu trúc, diễn giả</span></div>\n<p class=\"body-txt\">\nhướng dẫn nói rõ hơn về khách hàng mục tiêu và kêu gọi người nghe giới thiệu *đúng\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><p class=\"body-txt\">\nđối tượng đó*. Điều này giúp người nghe dễ dàng liên tưởng đến những người trong\n \nmạng lưới của họ có nhu cầu, thay vì phải tự suy luận xem sản phẩm/dịch vụ của bạn\n \ndành cho ai.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Cấu trúc 5 phần rõ ràng, dễ áp dụng: Diễn giả cung cấp một khuôn khổ cụ thể, dễ nhớ để</span></div>\n<p class=\"body-txt\">\nxây dựng một bài nói ngắn gọn nhưng đầy đủ thông tin. Điều này giúp người học có thể\n \nthực hành và tối ưu hóa thông điệp của mình một cách có hệ thống, đảm bảo truyền tải\n \nđược những nội dung cần thiết trong thời gian giới hạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Thử nghiệm và lặp lại liên tục: Lời khuyên tạo nhiều mẫu, thử nghiệm, giữ lại mẫu hiệu</span></div>\n<p class=\"body-txt\">\nquả và loại bỏ mẫu không hiệu quả cho thấy đây là một quá trình liên tục cải tiến. Nó\n \ngiúp bạn tìm ra phiên bản tối ưu nhất cho từng bối cảnh hoặc đối tượng khác nhau, đảm\n \nbảo hiệu quả lâu dài.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Bài 60 giây này được sử dụng không phải để bán hàng. Hãy luôn nhớ giúp cho tôi, bài 60 giây\n \nnày không phải để bán hàng, bài 60 giây này để giúp cho mọi người có thể biết khách hàng\n \ncủa bạn là ai và từ đó có thể giới thiệu khách hàng cho bạn.”\n \n“Cái bí quyết ở đây trong trò chơi này là chúng ta không giới thiệu về sản phẩm của ta để bán\n \nhàng, mà ta giới thiệu sản phẩm dịch vụ của ta cho đối tác để họ tìm kiếm khách hàng cho ta.”\n \n“[...] mang sẵn trong túi và bất kỳ khi nào bạn cũng có thể mang ra để trình bày cho đối tác\n \ncủa bạn.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Bài 8: Chiến lược vòng ảnh hưởng</h3>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Tóm tắt. Buổi này giới thiệu chiến lược &quot;Vòng ảnh hưởng&quot; (Circle of Influence - COI), một</h3>\n<p class=\"body-txt\">\nphương pháp marketing chủ động tạo ra lời giới thiệu. Cốt lõi của chiến lược là khi bán được\n \nsản phẩm cho một cá nhân, hãy chủ động tiếp cận và giới thiệu sản phẩm, tính năng, và lợi\n \ních cho toàn bộ người thân, bạn bè, hàng xóm của khách hàng đó. Mục tiêu là biến những\n \nngười trong &quot;vòng ảnh hưởng&quot; này thành khách hàng tiềm năng hoặc quan trọng hơn là\n \nnhững &quot;nguồn khách hàng&quot; giới thiệu mới trong tương lai mà không tốn thêm chi phí quảng\n \ncáo.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Chiến lược được giới thiệu là &quot;Vòng ảnh hưởng&quot; (Circle of Influence - COI), một hình</span></div>\n<p class=\"body-txt\">\nthức chủ động tạo ra lời giới thiệu (referral) thay vì thụ động chờ đợi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Cách thực hiện: Khi bán được một sản phẩm cho một khách hàng, hãy đến gia đình của</span></div>\n<p class=\"body-txt\">\nhọ và nhờ họ mời toàn bộ người thân (ông bà, cha mẹ, con cái, anh em) và hàng xóm\n \nđến.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Tại buổi gặp, giới thiệu chi tiết về sản phẩm, tính năng và những lợi ích mà sản phẩm</span></div>\n<p class=\"body-txt\">\nmang lại cho toàn bộ gia đình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Mục tiêu của việc tiếp cận &quot;vòng ảnh hưởng&quot; là biến họ thành khách hàng tiềm năng, họ</span></div>\n<p class=\"body-txt\">\ncó thể mua hàng vào một lúc nào đó trong tương lai.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Mục tiêu thứ hai (quan trọng hơn) là biến họ thành &quot;người giới thiệu khách hàng&quot; cho</span></div>\n<p class=\"body-txt\">\nmình vào một lúc nào đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Diễn giả chia sẻ kinh nghiệm áp dụng thành công chiến lược này trong lĩnh vực bảo hiểm</span></div>\n<p class=\"body-txt\">\nnhân thọ hơn 10 năm trước, khi được hướng dẫn bán cho cả gia đình sau khi bán được\n \nhợp đồng cho một người.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Chiến lược COI giúp mở rộng sự ảnh hưởng, chăm sóc khách hàng tốt hơn, có thêm</span></div>\n<p class=\"body-txt\">\nkhách hàng mới và đặc biệt là có thêm nguồn khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Chiến lược này có thể sử dụng bất kỳ khi nào mà không tốn thêm chi phí (chỉ tốn thêm</span></div>\n<p class=\"body-txt\">\nmột chút thời gian).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Diễn giả nhấn mạnh: &quot;Nguồn khách hàng thì luôn quan trọng hơn khách hàng mới.&quot;</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Chủ động tạo ra &quot;lời giới thiệu&quot; có hệ thống: Thay vì chỉ chờ đợi khách hàng tự giới</span></div>\n<p class=\"body-txt\">\nthiệu, chiến lược COI dạy cách chủ động đi đến vòng tròn quan hệ của khách hàng hiện\n \ntại để giới thiệu sản phẩm/dịch vụ. Điều này quan trọng vì nó chuyển từ một hoạt động\n \nmarketing bị động sang chủ động, giúp doanh nghiệp kiểm soát tốt hơn nguồn khách\n \nhàng và tăng tỷ lệ chuyển đổi nhờ vào yếu tố tin cậy từ mối quan hệ sẵn có.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Tối đa hóa giá trị từ một khách hàng ban đầu: Một giao dịch thành công không chỉ dừng</span></div>\n<p class=\"body-txt\">\nlại ở khách hàng trực tiếp. Chiến lược này mở rộng tầm ảnh hưởng và tiềm năng kinh\n \ndoanh từ một giao dịch duy nhất ra toàn bộ mạng lưới của khách hàng. Điều này đắt giá\n \nvì giúp giảm đáng kể chi phí thu hút khách hàng mới (CAC) và tăng giá trị vòng đời\n \nkhách hàng (LTV) bằng cách tận dụng triệt để lòng tin và mối quan hệ xã hội.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Tầm quan trọng của &quot;nguồn khách hàng&quot; vượt trội so với &quot;khách hàng mới&quot;: Câu nói</span></div>\n<p class=\"body-txt\">\n&quot;Nguồn khách hàng thì luôn quan trọng hơn khách hàng mới&quot; là một insight cực kỳ đắt\n \ngiá. Khách hàng mới chỉ là một giao dịch tại một thời điểm, nhưng một &quot;nguồn khách\n \nhàng&quot; (người giới thiệu) có thể mang lại nhiều khách hàng mới liên tục theo thời gian,\n \ntạo ra một dòng chảy kinh doanh bền vững và hiệu quả về chi phí lâu dài cho doanh\n \nnghiệp.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Mỗi khi tôi bán được một sản phẩm cho một gia đình mà ai đó, tôi thường đến gia đình của\n \nhọ và nhờ họ mời toàn bộ người thân trong gia đình đến để tôi giới thiệu về cái sản phẩm của\n \ntôi, để tôi hướng dẫn về cái tính năng sản phẩm của tôi, để tôi giới thiệu về những cái lợi ích\n \nmà sản phẩm của tôi có thể mang lại cho toàn bộ gia đình.”\n \n“Nguồn khách hàng thì luôn quan trọng hơn khách hàng mới.”\n \n“Đây là một chiến lược bạn có thể sử dụng bất kỳ khi nào không tốn thêm chi phí, mất thêm\n \nmột chút thời gian nhưng bạn sẽ có cơ hội chăm sóc khách hàng tốt hơn, bạn sẽ có được thêm\n \nđược "<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#e53935\">Bài 9: Chiến lược tạo landing page</h3>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Tóm tắt. Buổi giảng này tập trung vào chiến lược sử dụng Landing Page (LP) để tạo ra</h3>\n<p class=\"body-txt\">\nkhách hàng tiềm năng một cách hiệu quả. Thay vì một trang web chung cho nhiều sản phẩm,\n \ntrọng tâm là tạo một LP riêng biệt cho từng sản phẩm/dịch vụ, kèm theo chiến lược &quot;quà\n \ntặng miễn phí&quot; (sản phẩm/tài liệu giá trị) để thu thập thông tin liên hệ của khách hàng. Mục\n \ntiêu là chăm sóc những khách hàng tiềm năng này để cuối cùng chuyển đổi họ thành người\n \nmua, đồng thời nhấn mạnh rằng LP không cần cầu kỳ, sự đơn giản và hành động là yếu tố\n \nthen chốt.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Landing Page (LP) là một chiến lược vô cùng tuyệt vời để tạo ra khách hàng tiềm năng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Chiến lược truyền thống là tạo một trang web với nhiều sản phẩm bên trong.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Chiến lược đề xuất là: với mỗi một sản phẩm, mỗi một dịch vụ, tạo riêng cho nó một</span></div>\n<p class=\"body-txt\">\ntrang web (Landing Page).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">LP sẽ giới thiệu về sản phẩm, các tính năng, lợi ích, và các chiến lược khiến khách hàng</span></div>\n<p class=\"body-txt\">\nmong muốn sản phẩm đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Một phần quan trọng là cho khách hàng download miễn phí một sản phẩm/tài liệu liên</span></div>\n<p class=\"body-txt\">\nquan (gọi là &quot;chiến lược quà tặng miễn phí&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Với mỗi sản phẩm chính, sẽ có một sản phẩm miễn phí đi kèm trên LP.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Nếu khách hàng mua sản phẩm chính thì tốt; nếu không mua, họ vẫn có thể download</span></div>\n<p class=\"body-txt\">\nsản phẩm miễn phí.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Khi khách hàng download sản phẩm miễn phí, họ sẽ để lại thông tin liên lạc.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Với thông tin liên lạc này, doanh nghiệp có thể tiếp tục chăm sóc khách hàng (nurturing)</span></div>\n<p class=\"body-txt\">\nđể tăng tỷ lệ chuyển đổi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Một Landing Page không cần cầu kỳ: có thể có domain riêng hoặc không cần, chỉ cần</span></div>\n<p class=\"body-txt\">\nhosting đơn giản, trang trí đơn giản.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Thậm chí không cần hình ảnh, chỉ cần chữ và một form thu thập thông tin cũng có thể</span></div>\n<p class=\"body-txt\">\nđem lại hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Nếu có khả năng thì làm LP đẹp; nếu không, làm LP đơn giản cũng được. &quot;Đơn giản còn</span></div>\n<p class=\"body-txt\">\nhơn không làm gì cả.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Ví dụ minh họa: Một doanh nghiệp đào tạo âm nhạc tạo một LP hướng dẫn mọi người</span></div>\n<p class=\"body-txt\">\ntập thanh nhạc đơn giản (miễn phí), sau đó giới thiệu khóa học dạy nhạc trả phí qua\n \nemail.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Chiến lược &quot;Mỗi sản phẩm/dịch vụ một Landing Page riêng biệt&quot;: Đây là sự thay đổi tư</span></div>\n<p class=\"body-txt\">\nduy căn bản so với việc gom tất cả vào một website. Nó quan trọng vì giúp tập trung\n \nthông điệp marketing cho một mục tiêu cụ thể, tối ưu hóa trải nghiệm người dùng, và dễ\n \ndàng đo lường hiệu quả của từng chiến dịch. Khách hàng không bị phân tâm bởi quá\n \nnhiều lựa chọn, tăng khả năng chuyển đổi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Sử dụng &quot;Quà tặng miễn phí&quot; để thu thập thông tin liên lạc: Đây là phương pháp chủ chốt</span></div>\n<p class=\"body-txt\">\nđể xây dựng danh sách khách hàng tiềm năng chất lượng. Quan trọng vì nó tạo ra giá trị\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><p class=\"body-txt\">\ncho khách hàng trước khi họ phải cam kết mua hàng, xây dựng lòng tin, và cho phép\n \ndoanh nghiệp tiếp tục tương tác, chăm sóc khách hàng qua các kênh khác (ví dụ email\n \nmarketing) ngay cả khi họ chưa mua sản phẩm chính.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">&quot;Đơn giản còn hơn không làm gì cả&quot;: Câu nói này giải phóng nhiều người khỏi nỗi lo về</span></div>\n<p class=\"body-txt\">\nsự hoàn hảo ban đầu. Nó quan trọng vì khuyến khích hành động và thử nghiệm nhanh\n \nchóng. Thay vì trì hoãn vì muốn làm một thứ thật &quot;đẹp&quot; hoặc &quot;cầu kỳ&quot; mà không bao giờ\n \nbắt đầu, việc triển khai một LP đơn giản nhưng đúng chiến lược vẫn có thể mang lại hiệu\n \nquả, từ đó học hỏi và cải thiện.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Landing page là một chiến lược để tạo ra khách hàng tiềm năng vô cùng tuyệt vời.”\n \n“Với mỗi một sản phẩm, mỗi một dịch vụ, chúng tôi tạo ra một riêng cho nó một trang web.”\n \n“Đơn giản còn hơn không làm gì cả.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Bài 10: Nói chuyện trước công chúng</h3>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Tóm tắt. Buổi giảng này tập trung vào giá trị to lớn của việc nói chuyện trước công chúng</h3>\n<p class=\"body-txt\">\nnhư một công cụ xây dựng kinh doanh và marketing. Diễn giả nhấn mạnh rằng việc này\n \nkhông chỉ thu hút lượng lớn khách hàng tiềm năng mà còn tạo ra hiệu ứng truyền miệng\n \nmạnh mẽ, biến người nói thành lãnh đạo, người có ảnh hưởng được công chúng yêu thích.\n \nĐể đạt được điều này, cần có tư duy &quot;mọi điều bạn có thể làm được&quot;, bắt đầu luyện tập từ\n \nnhững nhóm nhỏ và dần dần mở rộng, bởi tất cả các doanh nhân thành công đều đã và đang\n \nlàm điều này.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Nói chuyện trước công chúng là một công cụ vô cùng lợi hại để xây dựng hệ thống kinh</span></div>\n<p class=\"body-txt\">\ndoanh, mang đến rất nhiều khách hàng tiềm năng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Lý do là mọi người đều muốn tham dự các hội thảo, chương trình để học thêm kỹ năng</span></div>\n<p class=\"body-txt\">\nhoặc thông tin nhằm cải thiện cuộc sống của họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Quan trọng hơn, những người tham dự chương trình sẽ quay trở về, nói thêm về bạn, và</span></div>\n<p class=\"body-txt\">\nlần tới sẽ mang bạn bè, người thân đến chương trình của bạn, tạo ra một nguồn khách\n \nhàng tiềm năng khổng lồ theo thời gian.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Nói chuyện trước công chúng không hề dễ với tất cả mọi người, nhưng cần có tư duy</span></div>\n<p class=\"body-txt\">\nrằng &quot;mọi điều bạn có thể làm được&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Thành công trong việc này đòi hỏi một quá trình phát triển và luyện tập: bắt đầu với</span></div>\n<p class=\"body-txt\">\nnhững chương trình nhỏ hơn (5, 10 người), sau đó tăng dần lên 50, hàng trăm, hàng\n \nngàn người.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Thời lượng nói chuyện cũng cần luyện tập tăng dần: từ 15-20 phút, lên 50 phút, 3 giờ,</span></div>\n<p class=\"body-txt\">\nrồi một ngày, ba ngày, năm ngày.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Khi bạn đứng trước công chúng, bạn trở thành người lãnh đạo (leader), người có ảnh</span></div>\n<p class=\"body-txt\">\nhưởng, người được công chúng yêu thích, và vì thế họ sẽ yêu thích sản phẩm và dịch vụ\n \ncủa bạn.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Diễn giả đưa ví dụ về một học viên ở TP.HCM đã xây dựng công ty môi giới bất động sản</span></div>\n<p class=\"body-txt\">\nvô cùng thành công nhờ đứng trước công chúng để đào tạo và thu hút nhân tài, tổ chức\n \nhội thảo giới thiệu sản phẩm với hàng ngàn người tham dự.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Nếu bạn tin rằng mình có thể làm được, bạn sẽ làm được; nếu bạn không tin, bạn chắc</span></div>\n<p class=\"body-txt\">\nchắn sẽ không bao giờ thử.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Nguyên tắc là &quot;bạn dùng nó, bạn có nó. Nếu bạn không dùng nó, bạn sẽ không bao giờ có</span></div>\n<p class=\"body-txt\">\nnó&quot; đối với kỹ năng này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Tất cả những doanh nhân hàng đầu thế giới và ở Việt Nam đều đứng nói chuyện trước</span></div>\n<p class=\"body-txt\">\ncông chúng. Đó là việc bạn cần phải làm để tạo ra lượng khách hàng tiềm năng khổng lồ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Tạo ra nguồn khách hàng tiềm năng khổng lồ và hiệu ứng truyền miệng tự nhiên: Diễn</span></div>\n<p class=\"body-txt\">\ngiả chỉ ra rằng việc nói chuyện trước công chúng không chỉ thu hút khách hàng trực tiếp\n \nmà còn kích hoạt cơ chế &quot;truyền miệng&quot; mạnh mẽ. Những người tham dự hài lòng sẽ trở\n \nlại và giới thiệu thêm bạn bè, người thân, tạo ra một vòng lặp tích cực và bền vững. Điều\n \nnày cực kỳ quan trọng vì nó cho phép doanh nghiệp phát triển một cách hữu cơ, giảm\n \nphụ thuộc vào các kênh marketing trả phí và xây dựng một cộng đồng khách hàng trung\n \nthành.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Biến bạn thành người lãnh đạo và có ảnh hưởng: Khi bạn tự tin đứng trước công chúng</span></div>\n<p class=\"body-txt\">\nđể chia sẻ kiến thức, bạn ngay lập tức được định vị là chuyên gia, là người dẫn dắt trong\n \nlĩnh vực của mình. Vị thế này mang lại sự tin tưởng và yêu mến từ khán giả, điều mà các\n \nhình thức quảng cáo thông thường khó đạt được. Từ đó, công chúng sẽ dễ dàng tin\n \ntưởng và yêu thích sản phẩm, dịch vụ của bạn hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Tư duy và kiên trì là chìa khóa để bắt đầu và phát triển: Diễn giả thừa nhận rằng nói</span></div>\n<p class=\"body-txt\">\ntrước công chúng không dễ, nhưng ông nhấn mạnh rằng nếu có niềm tin &quot;mọi điều bạn\n \ncó thể làm được&quot; và sự quyết tâm luyện tập (bắt đầu từ nhóm nhỏ, tăng dần quy mô và\n \nthời lượng), bất kỳ ai cũng có thể thành công. Điều này gỡ bỏ rào cản tâm lý cho nhiều\n \nngười và khuyến khích họ bắt đầu một hành trình có thể thay đổi cục diện kinh doanh.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Nói chuyện trước công chúng sẽ mang đến cho bạn vô cùng nhiều cái khách hàng tiềm năng.”\n \n“Mọi điều bạn có thể làm được.”\n \n“Khi bạn đứng trước công chúng, bạn trở thành người lãnh đạo, bạn trở thành người có ảnh\n \nhưởng, bạn trở thành người được công chúng yêu thích và vì thế mà họ sẽ yêu thích sản phẩm\n \nvà dịch vụ của bạn.”\n \n“Bạn dùng nó, bạn có nó. Nếu bạn không dùng nó, bạn sẽ không bao giờ có nó.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Bài 11: Tổng kết</h3>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Tóm tắt. Buổi giảng này tập trung vào chiến lược tìm kiếm khách hàng tiềm năng, nhấn</h3>\n<p class=\"body-txt\">\nmạnh tư duy cốt lõi rằng &quot;khách hàng tiềm năng là không giới hạn&quot;. Diễn giả hướng dẫn cách\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e53935\"><div class=\"pg-inner\"><p class=\"body-txt\">\nliên tục áp dụng các chiến lược đã học, đồng thời thử nghiệm phương pháp mới và chủ động\n \ntìm kiếm lời giới thiệu cũng như nói chuyện trước công chúng để thu hút khách hàng. Buổi\n \nhọc cũng đề cập đến tầm quan trọng của việc lưu trữ thông tin khách hàng tiềm năng và đặc\n \nbiệt là kỹ năng chuyển đổi họ thành khách hàng thực sự.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#e53935\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Khách hàng tiềm năng là không giới hạn – đây là tư duy cốt lõi cần phải tin tưởng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Cần liên tục áp dụng các chiến lược tìm kiếm khách hàng tiềm năng, phối hợp, kết hợp</span></div>\n<p class=\"body-txt\">\nvà tìm ra phương pháp mới phù hợp với bản thân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Một trong những chiến lược cần thường xuyên sử dụng là chủ động tìm kiếm &quot;lời giới</span></div>\n<p class=\"body-txt\">\nthiệu&quot; từ phía bên ngoài như khách hàng, người thân yêu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Một chiến lược khác được đề nghị sử dụng về lâu về dài là &quot;đứng nói chuyện trước công</span></div>\n<p class=\"body-txt\">\nchúng&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Dù áp dụng phương pháp nào, nếu có hiệu quả thì hãy liên tục áp dụng, và liên tục thử</span></div>\n<p class=\"body-txt\">\nnghiệm những phương án mới để có nhiều khách hàng tiềm năng hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e53935\">•</span><span class=\"bul-txt\">Mỗi khi khách hàng tiềm năng tìm đến, hãy lưu toàn bộ
