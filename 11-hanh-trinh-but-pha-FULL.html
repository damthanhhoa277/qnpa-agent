"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><p class=\"body-txt\">\nthực sự &quot;yêu&quot; và phục vụ khách hàng, giá trị tạo ra sẽ lớn hơn, dẫn đến sự phát triển và\n \nlòng trung thành, vượt trội so với các đối thủ chỉ tập trung vào sản phẩm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Có chiến lược thoát khỏi doanh nghiệp: Nghe có vẻ nghịch lý nhưng rất chiến lược. Nó</span></div>\n<p class=\"body-txt\">\nnhắc nhở rằng doanh nghiệp chỉ là một phương tiện để đạt được mục tiêu cá nhân. Việc\n \ncó kế hoạch thoát (bán, chuyển giao, rút lui) giúp người chủ giữ được sự linh hoạt,\n \nkhông bị ràng buộc quá mức và đưa ra quyết định lý trí hơn khi doanh nghiệp không còn\n \nphù hợp với tầm nhìn hoặc khi mục tiêu cá nhân đã đạt được.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Thách thức dành cho những người thành công và khó khăn dành cho những người bỏ</span></div>\n<p class=\"body-txt\">\ncuộc&quot;: Câu nói này nhấn mạnh tầm quan trọng của tư duy và thái độ đối với các trở ngại.\n \nNgười thành công nhìn nhận vấn đề là &quot;thách thức&quot; cần vượt qua để phát triển, trong khi\n \nngười bỏ cuộc coi đó là &quot;khó khăn&quot; không thể vượt qua. Điều này ảnh hưởng trực tiếp\n \nđến hành động, khả năng kiên trì và cuối cùng là kết quả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Nếu bạn tạo ra lợi nhuận nhưng không đáp ứng được nhu cầu của khách hàng thì công việc\n \nkinh doanh sẽ không lâu dài.”\n \n“Yêu thích khách hàng chứ không yêu thích sản phẩm.”\n \n“Thách thức dành cho những người thành công và khó khăn dành cho những người bỏ cuộc.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 34: Cột chống &amp; Chiến lược 10x10</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi học này tập trung vào việc xây dựng một &quot;đế chế kinh doanh bền vững&quot; thông</h3>\n<p class=\"body-txt\">\nqua mô hình &quot;Pantheon&quot; – một nền móng vững chắc và nhiều cây cột chống. Nền móng\n \nchính là hệ thống phễu kinh doanh (funnel system) ẩn mình, còn các cây cột chống là các\n \nkênh marketing đa dạng. Để thành công, doanh nghiệp cần tập trung tạo ra giá trị cho khách\n \nhàng và đồng thời đảm bảo lợi nhuận, đồng thời phải có nhiều kênh marketing (chiến lược\n \n10x10) để chống chịu rủi ro và gia tăng cơ hội.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mục tiêu: Xây dựng một đế chế kinh doanh bền vững, trường tồn theo thời gian.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ẩn dụ Pantheon: Mô hình kinh doanh bền vững giống như đền thờ Pantheon với nền</span></div>\n<p class=\"body-txt\">\nmóng sâu và nhiều cột chống.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nền móng vững chắc: Đối với kinh doanh, đây chính là &quot;hệ thống phễu&quot; (funnel system)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">phần ẩn, không nhìn thấy được từ bên ngoài và là cơ sở kinh doanh cốt lõi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sản phẩm bề mặt: Những gì khách hàng nhìn thấy trên mặt đất thường là các &quot;sản phẩm</span></div>\n<p class=\"body-txt\">\nfree&quot; (miễn phí) hoặc các sản phẩm bán sau này trong hệ thống phễu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cột chống: Để đỡ đế chế, cần rất nhiều &quot;cây cột chống&quot;. Nếu chỉ có một cột, nó sẽ sụp đổ.</span></div>\n<p class=\"body-txt\">\nDiễn giả đề xuất ít nhất 10 cột.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mục tiêu của kinh doanh: Tạo ra &quot;giá trị cho khách hàng&quot;. Mục tiêu cá nhân là &quot;giá trị cho</span></div>\n<p class=\"body-txt\">\nbản thân mình&quot;.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Định nghĩa &quot;kinh doanh&quot;: Một tổ chức có lợi nhuận và tạo ra giá trị cho khách hàng. Nếu</span></div>\n<p class=\"body-txt\">\nchỉ có lợi nhuận mà không có giá trị cho khách hàng, doanh nghiệp sẽ sụp đổ. Nếu không\n \ncó lợi nhuận, nó chỉ là tổ chức từ thiện.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Kết nối nền móng và cột chống: Cần kết nối hệ thống phễu với các cây cột chống. Những</span></div>\n<p class=\"body-txt\">\ncây cột chống này chính là các &quot;kênh marketing&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Trích dẫn của Jay Abraham: &quot;Nếu bạn tấn công thị trường từ nhiều vị trí khác nhau mà</span></div>\n<p class=\"body-txt\">\nđối thủ của bạn không làm, bạn có đủ, bạn sẽ có tất cả những lợi thế và nó sẽ đem đến,\n \nnó sẽ gia tăng được cơ hội thành công và lợi nhuận cho bạn.&quot; (07:24-07:39)\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Các kênh marketing đa dạng: Ví dụ như marketing qua điện thoại, hệ thống giới thiệu</span></div>\n<p class=\"body-txt\">\n(referrals), hợp tác (Joint Venture), gửi thư trực tiếp (Direct Mail), quảng cáo\n \n(advertising), sản phẩm backend, endorsement.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chiến lược 10x10:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cần chọn ít nhất 6-10 kênh marketing khác nhau để dẫn khách vào hệ thống phễu.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Đối với mỗi kênh marketing, cần có 10 &quot;viên gạch&quot; (phương án/cách tiếp cận) khác nhau</span></div>\n<p class=\"body-txt\">\nđể triển khai.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ví dụ: Kênh Facebook có thể có Facebook post, Facebook image, Facebook video. Kênh</span></div>\n<p class=\"body-txt\">\nReferral có thể là tham gia BNI, phát triển hệ thống affiliate, tự xây dựng hệ thống\n \nreferral riêng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nguy hiểm của việc phụ thuộc vào một kênh: Nếu chỉ dựa vào một kênh (ví dụ</span></div>\n<p class=\"body-txt\">\nFacebook) mà kênh đó thay đổi chính sách hoặc đóng cửa, doanh nghiệp sẽ bị tiêu tùng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Thực hành: Viết xuống 10 kênh marketing và 10 phương án cho mỗi kênh thật nhanh,</span></div>\n<p class=\"body-txt\">\nkhông cần đánh giá hiệu quả ngay.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mô hình &quot;Pantheon&quot;: Nền tảng vững chắc và nhiều cột chống. Đây là ẩn dụ cốt lõi xuyên</span></div>\n<p class=\"body-txt\">\nsuốt buổi giảng. Nền móng vững chắc (hệ thống phễu) là yếu tố chiến lược ẩn mình giúp\n \ndoanh nghiệp tồn tại, trong khi nhiều cột chống (kênh marketing đa dạng) đảm bảo sự\n \nổn định và khả năng mở rộng. Điều này quan trọng vì nó chỉ ra rằng sự bền vững không\n \nchỉ đến từ một khía cạnh (ví dụ chỉ bán hàng tốt) mà phải từ cấu trúc tổng thể, vừa có\n \nchiều sâu vừa có chiều rộng, chống lại sự sụp đổ khi một phần nào đó gặp vấn đề.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chiến lược 10x10 cho kênh Marketing. Diễn giả nhấn mạnh phải có ít nhất 10 kênh</span></div>\n<p class=\"body-txt\">\nmarketing khác nhau và mỗi kênh lại có 10 phương án triển khai. Điều này vô cùng quan\n \ntrọng vì nó cung cấp một khuôn khổ cụ thể, hành động được để đa dạng hóa nguồn\n \nkhách hàng, giảm thiểu rủi ro khi một kênh nào đó bị ảnh hưởng (như Facebook thay đổi\n \nchính sách) và mở rộng phạm vi tiếp cận thị trường một cách toàn diện.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mối quan hệ mật thiết giữa Giá trị Khách hàng và Lợi nhuận. Buổi giảng làm rõ rằng một</span></div>\n<p class=\"body-txt\">\ndoanh nghiệp thực sự phải tạo ra giá trị cho khách hàng *và* tạo ra lợi nhuận. Thiếu một\n \ntrong hai đều dẫn đến thất bại: không có giá trị khách hàng sẽ sụp đổ, không có lợi\n \nnhuận sẽ không còn là kinh doanh mà trở thành từ thiện. Điểm này quan trọng vì nó\n \nđịnh nghĩa rõ mục đích tồn tại của doanh nghiệp, giúp người học cân bằng giữa phục vụ\n \nkhách hàng và duy trì khả năng tài chính.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Nếu bạn tấn công thị trường từ nhiều vị trí khác nhau mà đối thủ của bạn không làm, bạn có\n \nđủ, bạn sẽ có tất cả những lợi thế và nó sẽ đem đến, nó sẽ gia tăng được cơ hội thành công và\n \nlợi nhuận cho bạn.”\n \n“Nếu không có lợi nhuận thì không gọi là kinh doanh. Chúng ta sẽ trở thành tổ chức từ thiện.”\n \n“Nếu công ty mà có lợi nhuận mà khách hàng không nhận được giá trị, thì điều gì diễn ra các\n \nanh chị? Nó làm sao? Nó sụp đổ.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 35: Chiến lược đua xe đạp nước rút</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi giảng sử dụng video đua xe đạp Tour de France để minh họa tầm quan trọng</h3>\n<p class=\"body-txt\">\ncủa làm việc nhóm và hỗ trợ bên ngoài trong kinh doanh. Diễn giả nhấn mạnh rằng không ai\n \ncó thể chiến thắng hoặc trở nên nổi bật nếu làm việc một mình. Thành công đến từ việc xây\n \ndựng một đội nhóm kinh doanh mạnh mẽ, có chiến lược rõ ràng, và biết tận dụng các nguồn\n \nlực hỗ trợ từ bên ngoài, đặc biệt ở những thời điểm quyết định để đạt được mục tiêu cuối\n \ncùng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Buổi giảng bắt đầu bằng việc phân tích một đoạn video từ giải đua xe đạp Tour de</span></div>\n<p class=\"body-txt\">\nFrance, so sánh các vai trò trong đoàn đua với các vai trò trong doanh nghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Dù đua xe đạp là môn cá nhân, không ai có thể giành chiến thắng nếu chơi một mình; giải</span></div>\n<p class=\"body-txt\">\nthưởng bao giờ cũng đến từ một đội đua được tổ chức chuyên nghiệp nhất.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Để chiến thắng trong chặng nước rút, có bốn yếu tố quan trọng: tốc độ, gia tốc, vị trí và</span></div>\n<p class=\"body-txt\">\nsự hỗ trợ của đồng đội ở kilomet cuối cùng. Diễn giả nhấn mạnh &quot;sự hỗ trợ của đồng đội\n \nở kilomet cuối cùng là quan trọng nhất&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chiến thuật đội nhóm bao gồm việc các vận động viên dẫn đường cản gió (cản gió 100%)</span></div>\n<p class=\"body-txt\">\nđể vận động viên về đích (được tiết kiệm năng lượng, chỉ cần dùng 62%) có thể bảo toàn\n \nthể lực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Các đồng đội sẵn sàng kiệt sức, rút về vị trí cuối và tách khỏi đoàn đua sau khi hoàn</span></div>\n<p class=\"body-txt\">\nthành nhiệm vụ dẫn đường và cản gió.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vận động viên về đích (được gọi là vận động viên nước rút) thường ở vị trí cuối trong</span></div>\n<p class=\"body-txt\">\ntop dẫn đầu để tiết kiệm năng lượng, trước khi bứt phá ở những mét cuối cùng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tương tự, trong kinh doanh, chúng ta không thể chiến thắng hoặc &quot;outstanding&quot; nếu</span></div>\n<p class=\"body-txt\">\nkinh doanh một mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cần phải xây dựng một đội nhóm kinh doanh vững mạnh.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vận động viên chiến thắng không phải là vận động viên thường xuyên dẫn đầu, mà là</span></div>\n<p class=\"body-txt\">\nngười biết tận dụng chiến thuật và sự hỗ trợ để đạt được mục tiêu cuối cùng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Không nhất thiết phải dẫn đầu liên tục trong kinh doanh, nhưng cần luôn khác biệt để</span></div>\n<p class=\"body-txt\">\ngiành chiến thắng và quan trọng là phải có sự hỗ trợ từ tất cả các nguồn lực bên ngoài.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Việc sử dụng nguồn lực bên ngoài nhờ sự hỗ trợ là vô cùng quan trọng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Kết luận: Cần phải xây dựng một đội nhóm kinh doanh cho mình.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chiến thắng không thể đạt được khi hoạt động một mình: Diễn giả lặp đi lặp lại thông</span></div>\n<p class=\"body-txt\">\nđiệp này từ đầu đến cuối buổi giảng, nhấn mạnh rằng dù là thể thao hay kinh doanh, việc\n \nđơn độc sẽ không mang lại thành công. Điều này quan trọng vì nó thách thức tư duy\n \n&quot;anh hùng cá nhân&quot; và đặt nền móng cho triết lý hợp tác và làm việc nhóm trong mọi\n \nlĩnh vực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sự hỗ trợ chiến lược của đồng đội là yếu tố quyết định, đặc biệt vào thời điểm cuối cùng:</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài học về &quot;sự hỗ trợ của đồng đội ở kilomet cuối cùng&quot; là quan trọng nhất cho thấy</h3>\n<p class=\"body-txt\">\nchiến thắng không chỉ là sức mạnh cá nhân mà là một chiến lược tập thể được thực hiện\n \nhoàn hảo. Các thành viên sẵn sàng hy sinh (cản gió, kiệt sức và rút lui) để người chủ chốt\n \ncó lợi thế. Điều này quan trọng vì nó định nghĩa lại khái niệm &quot;lãnh đạo&quot; và &quot;chiến\n \nthắng&quot;, tập trung vào chiến thuật, sự phối hợp ăn ý và sự hy sinh vì mục tiêu chung của\n \ncả đội.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Người chiến thắng thực sự không phải lúc nào cũng là người dẫn đầu liên tục: Vận động</span></div>\n<p class=\"body-txt\">\nviên về đích thường là người biết bảo toàn năng lượng nhờ sự hỗ trợ của đồng đội, ẩn\n \nmình ở phía sau và bứt phá đúng lúc. Điều này quan trọng vì nó thay đổi quan niệm về\n \nviệc &quot;dẫn đầu&quot; trong kinh doanh; không phải lúc nào cũng cần phô trương sức mạnh hay\n \nđứng đầu mọi bảng xếp hạng, mà cần có chiến lược thông minh để đạt được mục tiêu\n \ncuối cùng một cách hiệu quả nhất.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tận dụng nguồn lực bên ngoài là chìa khóa thành công: Bên cạnh đội nhóm nội bộ, việc</span></div>\n<p class=\"body-txt\">\nmở rộng và tìm kiếm sự hỗ trợ từ các nguồn lực bên ngoài là vô cùng quan trọng. Điều\n \nnày quan trọng vì nó mở rộng tầm nhìn về &quot;đội nhóm&quot; ra khỏi phạm vi nội bộ, khuyến\n \nkhích doanh nghiệp tìm kiếm sự hợp tác, đối tác và các công cụ hỗ trợ từ môi trường\n \nrộng lớn hơn để tăng cường sức mạnh tổng thể.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Không có ai có thể dành được chiến thắng nếu bạn chơi đua xe đạp một mình.”\n \n“Sự hỗ trợ của đồng đội ở kilomet cuối cùng là quan trọng nhất.”\n \n“Bạn không thể outstanding nếu bạn kinh doanh một mình.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 36: 3 Nhóm người trong doanh nghiệp</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi học tập trung phân tích ba vai trò cốt lõi trong bất kỳ doanh nghiệp nào:</h3>\n<p class=\"body-txt\">\nChuyên gia, Lãnh đạo và Doanh nhân. Diễn giả đã định nghĩa rõ nhiệm vụ và mối quan hệ\n \ntương hỗ giữa ba nhóm người này. Cốt lõi của bài giảng là Doanh nhân phải xây dựng tầm\n \nnhìn và thu hút được những Lãnh đạo giỏi, để những Lãnh đạo này tạo môi trường và hỗ trợ\n \ntối đa cho các Chuyên gia, từ đó giúp doanh nghiệp tạo ra giá trị thực sự và đáp ứng nhu cầu\n \ncủa thị trường.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ba nhóm người cốt lõi trong doanh nghiệp: Để một &quot;chiếc xe&quot; (doanh nghiệp) đi được,</span></div>\n<p class=\"body-txt\">\ncần có ba nhóm người chính: Chuyên gia, Lãnh đạo, và Doanh nhân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chuyên gia (Expert):</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Là người am hiểu chuyên môn sâu sắc và vô cùng giỏi trong lĩnh vực của mình.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Trực tiếp tạo ra giá trị và đáp ứng nhu cầu của khách hàng/cộng đồng một cách sáng tạo,</span></div>\n<p class=\"body-txt\">\ntuyệt vời.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Hầu hết các doanh nghiệp bắt đầu bởi một chuyên gia (ví dụ: diễn giả là chuyên gia trong</span></div>\n<p class=\"body-txt\">\nlĩnh vực giảng dạy).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Lãnh đạo (Leader):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Là người dẫn dắt, truyền cảm hứng, động viên, hỗ trợ và làm thay đổi cuộc đời người</span></div>\n<p class=\"body-txt\">\nkhác, không phải là người quản lý.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nhiệm vụ chính là phục vụ (hỗ trợ) các chuyên gia bằng cách tổ chức mọi nguồn lực (bao</span></div>\n<p class=\"body-txt\">\ngồm nhân lực) và tạo ra môi trường để chuyên gia có thể cung cấp giá trị ổn định cho thị\n \ntrường.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Người lãnh đạo phải có năng lực và vai trò của doanh nhân là tìm kiếm những người có</span></div>\n<p class=\"body-txt\">\nnăng lực lãnh đạo.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Doanh nhân (Entrepreneur):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nhiệm vụ 1: Tạo ra và giữ vững tầm nhìn (mục tiêu số 2 trong sơ đồ nào đó).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nhiệm vụ 2: Thu hút và tương tác hiệu quả với các nhà lãnh đạo.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nhiệm vụ 3: Tiên đoán và sẵn sàng đối mặt, đón nhận các rủi ro trong công việc kinh</span></div>\n<p class=\"body-txt\">\ndoanh (lên xuống của thị trường).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nhiệm vụ 4: Làm việc với nhóm lãnh đạo và quản lý để xây dựng một hệ thống liên tục</span></div>\n<p class=\"body-txt\">\ntăng khả năng cho nhóm chuyên gia, nhằm đáp ứng yêu cầu của cộng đồng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mối quan hệ tổng thể giữa ba nhóm:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nhóm Chuyên gia là nhóm tạo ra giá trị và đáp ứng nhu cầu của cộng đồng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nhóm Lãnh đạo có nhiệm vụ tạo ra một môi trường để hỗ trợ cho nhóm Chuyên gia.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nhóm Doanh nhân có nhiệm vụ thu hút nhóm Lãnh đạo.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Kết luận: Nếu bạn là doanh nhân, bạn cần phải hoàn thiện con người mình để có thể thu</span></div>\n<p class=\"body-txt\">\nhút được nhóm lãnh đạo đến với bạn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mối quan hệ phục vụ ngược: Diễn giả định nghĩa &quot;Lãnh đạo là người phục vụ cho chuyên</span></div>\n<p class=\"body-txt\">\ngia&quot; và &quot;Doanh nhân thì nhiệm vụ của họ là thu hút nhóm lãnh đạo.&quot; Điều này đảo ngược\n \nquan niệm truyền thống về cấp bậc, nhấn mạnh rằng vai trò lãnh đạo là hỗ trợ những\n \nngười trực tiếp tạo ra giá trị (chuyên gia), và vai trò của doanh nhân là chiến lược hơn,\n \ntập trung vào việc thu hút và định hướng đội ngũ lãnh đạo.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Lãnh đạo là người tạo môi trường và hỗ trợ: Khác với quản lý, lãnh đạo tập trung vào</span></div>\n<p class=\"body-txt\">\nviệc tổ chức nguồn lực và truyền cảm hứng để đội ngũ chuyên gia phát huy tối đa năng\n \nlực. Điều này quan trọng vì nó giúp doanh nghiệp tối ưu hóa khả năng sáng tạo và hiệu\n \nsuất của những người làm ra sản phẩm/dịch vụ cốt lõi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vai trò chiến lược của Doanh nhân: Ngoài việc tạo tầm nhìn, nhiệm vụ hàng đầu của</span></div>\n<p class=\"body-txt\">\ndoanh nhân là &quot;thu hút và tương tác hiệu quả với các nhà lãnh đạo&quot;. Điều này cho thấy\n \ndoanh nhân cần tập trung vào việc xây dựng bộ khung lãnh đạo vững chắc, những người\n \nsẽ vận hành và hỗ trợ đội ngũ bên dưới, thay vì tự mình quản lý mọi thứ.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Chúng ta không thể đi chiếc xe một mình, chúng ta cần có rất là nhiều người để đi cùng chúng\n \nta.”\n \n“Lãnh đạo là người phục vụ cho chuyên gia.”\n \n“Nếu các bạn là doanh nhân, thì bạn cần phải tìm kiếm và thu hút ra nhóm lãnh đạo.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 37: Bài tập</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi học này tập trung vào việc định vị bản thân và doanh nghiệp thông qua việc</h3>\n<p class=\"body-txt\">\nhiểu sâu sắc khách hàng. Cốt lõi là thay đổi tư duy từ sản phẩm/dịch vụ sang khách hàng, trả\n \nlời các câu hỏi quan trọng về &quot;Bạn là ai?&quot;, &quot;Bạn cần ai?&quot;, và đặc biệt là &quot;Khách hàng của bạn là\n \nai, họ cần gì hiện tại và tương lai?&quot;. Diễn giả nhấn mạnh rằng thành công đến từ việc giải\n \nquyết vấn đề của khách hàng và tiên đoán được nhu cầu tương lai của họ, định nghĩa lại\n \n&quot;nghề&quot; không phải bằng sản phẩm mà bằng giá trị mang lại cho khách hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Câu hỏi 1: Bạn là ai? (trong 3 nhóm: skill producer/chuyên gia, entrepreneur/doanh</span></div>\n<p class=\"body-txt\">\nnhân, leader/lãnh đạo) – chọn cái mình mạnh nhất hiện tại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Câu hỏi 2: Bạn cần ai? – Ghi xuống đặc tính của nhóm người bạn cần để giúp bạn đạt mục</span></div>\n<p class=\"body-txt\">\ntiêu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Câu hỏi 3: Bạn muốn trở thành ai? (không nhất thiết phải là doanh nhân).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Câu hỏi phụ 3: Để trở thành người đó, bạn cần thu hút ai về phía mình?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Câu hỏi 4: Khách hàng hiện tại của bạn đang là ai? (nhóm người, không phải con người</span></div>\n<p class=\"body-txt\">\ncụ thể).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Câu hỏi 5: Khách hàng lý tưởng của bạn là thế nào? (khách hàng trong mơ, có đặc tính</span></div>\n<p class=\"body-txt\">\ngì).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Khách hàng hiện tại có thể không phải là khách hàng lý tưởng, cần điều chỉnh để tìm ra</span></div>\n<p class=\"body-txt\">\nkhách hàng lý tưởng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ví dụ: Khách hàng lý tưởng của diễn giả là chủ doanh nghiệp, có thu nhập trên 10 tỷ</span></div>\n<p class=\"body-txt\">\nđồng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Câu hỏi 6: Khách hàng của tôi cần gì (hiện tại)?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Câu hỏi 7: Khách hàng của tôi có thể cần điều gì trong tương lai? (Đây là câu hỏi tuyệt</span></div>\n<p class=\"body-txt\">\nvời, giúp tiên đoán trước nhu cầu khách hàng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tầm quan trọng của việc trả lời các câu hỏi: Giúp biết cần tìm đối tác/nhân sự nào, cần</span></div>\n<p class=\"body-txt\">\nhỗ trợ nguồn lực gì, và phát triển sản phẩm/dịch vụ trong tương lai.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Quy tắc 15 giây: Mọi suy nghĩ trong đầu cần được ghi xuống giấy trong vòng 15 giây,</span></div>\n<p class=\"body-txt\">\nkhông phân biệt đúng sai.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phân tích khách hàng: Cần phân tích và liệt kê từng nhóm khách hàng khác nhau (ví dụ</span></div>\n<p class=\"body-txt\">\nUber có 6 nhóm khách hàng với nhu cầu khác nhau).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Số lượng và giá trị trọn đời (LVC): Số lượng khách hàng lý tưởng và giá trị trọn đời của</span></div>\n<p class=\"body-txt\">\nhọ là những con số rất quan trọng cần xác định rõ.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Từ &quot;nghề&quot;: Hầu hết mọi người định nghĩa &quot;nghề&quot; của mình bằng sản phẩm/dịch vụ họ</span></div>\n<p class=\"body-txt\">\nbán (Oracle, bảo hiểm, điện máy, chăn ga gối đệm).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mô hình kinh doanh mở rộng: Câu hỏi số 7 là bí quyết để mở rộng kinh doanh bằng cách</span></div>\n<p class=\"body-txt\">\ncung cấp thêm sản phẩm/dịch vụ mới hoặc thành lập các công ty mới dựa trên những gì\n \nkhách hàng cần trong tương lai (ví dụ: cần tiền thì mở ngân hàng, cần logistics thì mở\n \ncông ty logistics).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Triết lý kinh doanh cốt lõi: &quot;Doanh nhân yêu sản phẩm thì CHẾT. Doanh nhân yêu khách</span></div>\n<p class=\"body-txt\">\nhàng thì THÀNH CÔNG.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Định nghĩa đúng về nghề: &quot;Khi hỏi làm nghề gì, câu trả lời là: Tôi giúp ai đạt được điều</span></div>\n<p class=\"body-txt\">\ngì.&quot;\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chuyển từ tư duy sản phẩm sang tư duy khách hàng và tương lai: Đây là điểm mấu chốt.</span></div>\n<p class=\"body-txt\">\nThay vì chỉ tập trung vào sản phẩm/dịch vụ hiện có (mà nhiều người gọi nhầm là\n \n&quot;nghề&quot;), doanh nghiệp cần định nghĩa mình qua việc *ai là khách hàng*, *họ cần gì hiện\n \ntại*, và *họ có thể cần gì trong tương lai*.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Giúp doanh nghiệp thoát khỏi lối mòn sản phẩm, mở rộng tầm nhìn</span></div>\n<p class=\"body-txt\">\nvề thị trường và cơ hội, đồng thời xây dựng mối quan hệ sâu sắc hơn với khách hàng\n \ndựa trên việc đáp ứng các nhu cầu chưa được nhận ra. Đây là nền tảng cho sự phát triển\n \nbền vững và đổi mới.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sử dụng nhu cầu tương lai của khách hàng làm kim chỉ nam cho tăng trưởng và đa dạng</span></div>\n<p class=\"body-txt\">\nhóa: Câu hỏi &quot;Khách hàng của tôi có thể cần điều gì trong tương lai?&quot; không chỉ là dự\n \nđoán mà còn là chiến lược để mở rộng các sản phẩm, dịch vụ, thậm chí cả các lĩnh vực\n \nkinh doanh mới.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Cho phép doanh nghiệp tạo ra một hệ sinh thái giá trị xung quanh</span></div>\n<p class=\"body-txt\">\nkhách hàng hiện có, tận dụng tối đa mối quan hệ và sự thấu hiểu khách hàng để giảm\n \nthiểu rủi ro khi thâm nhập thị trường mới. Đây là cách để trở thành đối tác toàn diện,\n \nthay vì chỉ là nhà cung cấp đơn lẻ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Định nghĩa lại &quot;nghề&quot; theo giá trị mang lại: Không phải &quot;tôi bán bảo hiểm&quot; hay &quot;tôi làm</span></div>\n<p class=\"body-txt\">\nchăn ga gối đệm&quot;, mà là &quot;tôi giúp ai đạt được điều gì&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Giúp doanh nghiệp truyền tải sứ mệnh và giá trị cốt lõi một cách</span></div>\n<p class=\"body-txt\">\nmạnh mẽ, khác biệt và ý nghĩa hơn. Nó tập trung vào lợi ích cuối cùng mà khách hàng\n \nnhận được, từ đó tạo ra sự kết nối cảm xúc và lòng trung thành, đồng thời mở rộng\n \nphạm vi tiềm năng của doanh nghiệp vượt ra ngoài khuôn khổ sản phẩm cụ thể.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Doanh nhân yêu sản phẩm thì CHẾT. Doanh nhân yêu khách hàng thì THÀNH CÔNG.”\n \n“Khách hàng của tôi có thể cần điều gì trong tương lai? Câu hỏi này mới là câu hỏi tuyệt vời.”\n \n“Khi hỏi làm nghề gì, câu trả lời là: Tôi giúp ai đạt được điều gì.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 38: Hệ thống Marketing Online</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi giảng này tập trung vào việc xây dựng một hệ thống marketing online hiệu</h3>\n<p class=\"body-txt\">\nquả, đặc biệt là thông qua email marketing. Diễn giả trình bày cấu trúc một phễu bán hàng\n \nchi tiết, từ việc thu hút khách hàng tiềm năng bằng Squeeze Page, đến các bước nuôi dưỡng\n \nmối quan hệ qua email tự động (Autoresponder), Newsletter và tối ưu hóa doanh thu bằng\n \nOne-Time Offer (OTO) cùng các sản phẩm cao cấp (High-End Product). Toàn bộ hệ thống\n \nđược xây dựng dựa trên nguyên lý cốt lõi &quot;Know, Like, Trust&quot;.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Internet marketing là một công cụ vô cùng tuyệt vời cho hệ thống marketing online.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nguyên lý cốt lõi của marketing là &quot;Know, Like, Trust&quot; (Biết, Thích, Tin tưởng).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Squeeze Page (trang số 2): Nhiệm vụ là nhận email của khách hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Email thu thập được sẽ gửi sang hệ thống database (số 6).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Khi nhận được email, hệ thống phải gửi cho khách hàng một email đầu tiên (bước số 5)</span></div>\n<p class=\"body-txt\">\nđể thông báo họ đã nhận được quà.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sau khi nhập email, khách hàng sẽ được chuyển đến Thank You Page (trang số 3).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Trên trang Thank You Page (trang số 3) thường có một One-Time Offer (OTO - trang số</span></div>\n<p class=\"body-txt\">\n4/ô tô), là một trang bán hàng một lần.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">One-Time Offer (OTO) là lời chào hàng &quot;hoặc bây giờ hoặc không bao giờ&quot;, nó sẽ không</span></div>\n<p class=\"body-txt\">\nbao giờ hiển thị lại. OTO giúp tăng doanh thu trung bình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sau khi hệ thống dữ liệu được gửi vào database, có hai hệ thống làm việc tiếp tục:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Autoresponder (hệ thống số 7): Hệ thống làm việc tự động, gửi email tuần tự.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Newsletter (hệ thống số 8): Tương tự Autoresponder nhưng gửi thủ công, không tự</span></div>\n<p class=\"body-txt\">\nđộng và tuần tự.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phễu số 9: Gồm nhiều ngăn, mỗi ngăn tương tự như một trang One-Time Offer, là chuỗi</span></div>\n<p class=\"body-txt\">\ncác trang bán hàng. Có thể có nhiều phễu số 9 khác nhau.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Dưới cùng của phễu là High-End Product (sản phẩm cao cấp).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phía trên cùng của phễu có thể có các hệ thống referral khác (nguồn giới thiệu khác).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Công cụ được sử dụng cho các bước 2 (Squeeze Page), 3 (Thank You Page), 4 (One-Time</span></div>\n<p class=\"body-txt\">\nOffer) và 9 (phễu bán hàng) là MinhPT.com/web.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Công cụ được sử dụng cho các bước 5 (email thông báo), 6 (database), 7</span></div>\n<p class=\"body-txt\">\n(Autoresponder) và 8 (Newsletter) là MinhPT.com/email.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Lời khuyên là sử dụng các công cụ này và đừng lo lắng về độ khó vì chúng rất dễ.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nguyên lý &quot;Know, Like, Trust&quot; là kim chỉ nam cho mọi chiến lược marketing: Đây là nền</span></div>\n<p class=\"body-txt\">\ntảng quan trọng nhất để xây dựng mối quan hệ bền vững với khách hàng, không chỉ tập\n \ntrung vào giao dịch mua bán tức thời. Việc xây dựng sự tin tưởng và yêu thích là chìa\n \nkhóa để khách hàng sẵn sàng đón nhận và mua các sản phẩm, dịch vụ của bạn về lâu dài.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">One-Time Offer (OTO) là chiến lược tối ưu hóa doanh thu hiệu quả: Bằng cách đưa ra</span></div>\n<p class=\"body-txt\">\nmột lời chào hàng độc quyền, có giới hạn thời gian ngay sau khi khách hàng thực hiện\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><p class=\"body-txt\">\nmột cam kết nhỏ (như đăng ký email), doanh nghiệp có thể tăng đáng kể giá trị đơn\n \nhàng trung bình. Điều này tận dụng động lực mua hàng đang cao và tạo cảm giác cấp\n \nbách, khuyến khích hành động ngay lập tức.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Hệ thống tự động hóa email (Autoresponder và Newsletter) là xương sống của việc nuôi</span></div>\n<p class=\"body-txt\">\ndưỡng khách hàng: Việc thiết lập các chuỗi email tự động và các bản tin định kỳ giúp duy\n \ntrì liên lạc, cung cấp giá trị, và dẫn dắt khách hàng qua các giai đoạn của phễu bán hàng\n \nmà không cần can thiệp thủ công liên tục. Điều này giải phóng thời gian và nguồn lực,\n \nđồng thời đảm bảo rằng khách hàng luôn được chăm sóc và tiếp xúc với thương hiệu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Nguyên lý của marketing đó là Know, Like, Trust.”\n \n“One-Time Offer hoặc bây giờ hoặc không bao giờ.”\n \n“Việc của anh chị là sử dụng nó và đừng quan tâm đến độ khó của nó bởi vì nó rất dễ.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 39: Phễu &amp; Nguyên lý hoạt động của Email Marketing</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi giảng tập trung vào nguyên lý hoạt động của Email Marketing, đặc biệt là hệ</h3>\n<p class=\"body-txt\">\nthống Autoresponder, dựa trên nguyên lý phễu. Mục tiêu cốt lõi là xây dựng lòng tin (Know-\n \nLike-Trust) với khách hàng thông qua chuỗi email tự động, tuần tự, nhằm chuyển đổi họ từ\n \nngười biết đến thành khách hàng yêu quý và tin cậy, từ đó tăng tỷ lệ chuyển đổi và doanh\n \nthu mà không tốn nhiều chi phí. Buổi học cũng nhấn mạnh việc thiết lập hệ thống marketing\n \ntự động &quot;xây xong quên&quot; và cách giảm thiểu rủi ro cho khách hàng khi thu thập thông tin.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phân biệt phễu bán hàng và phễu marketing:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phễu số 9 là phễu bán hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phễu số 7 là phễu marketing (Email Marketing).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nguyên lý phễu: Là quá trình lọc và đưa xuống tầng sâu, tìm ra thứ mình muốn nhất</span></div>\n<p class=\"body-txt\">\n(khách hàng chất lượng nhất).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Email Marketing hoạt động theo nguyên lý phễu: Sử dụng hệ thống Autoresponder (hệ</span></div>\n<p class=\"body-txt\">\nthống gửi email tự động).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mục tiêu của Email Marketing: Thực hiện nguyên lý marketing cốt lõi: Know (biết) -&gt;</span></div>\n<p class=\"body-txt\">\nLike (thích) -&gt; Trust (tin cậy).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Email 0 (hoặc ban đầu): Giúp khách hàng &quot;biết&quot; chúng ta.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Các email tiếp theo: Giúp khách hàng &quot;thích&quot; chúng ta (bằng cách cung cấp giá trị, kể</span></div>\n<p class=\"body-txt\">\nchuyện, v.v.).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sau cùng: Giúp khách hàng &quot;tin cậy&quot; chúng ta.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cách ghi bài hiệu quả: Dùng biểu tượng và màu sắc để dễ nhớ (biểu tượng mắt/mồm cho</span></div>\n<p class=\"body-txt\">\nKnow, ngón cái cho Like, trái tim cho Trust).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Quy trình kinh doanh qua email: Từ &quot;biết&quot; -&gt; &quot;thích&quot; -&gt; &quot;tin cậy&quot; thông qua chuỗi email</span></div>\n<p class=\"body-txt\">\ntuần tự được thiết kế trước.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vị trí trong các công thức:</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Trong thang bậc kinh doanh: Email marketing chuyển đổi khách hàng từ tầng 2 (danh</span></div>\n<p class=\"body-txt\">\nsách khách hàng) lên tầng 3 (khách hàng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Trong công thức tăng doanh thu (3 tham số): Nó nằm ở tham số số 1 (thu hút traffic và</span></div>\n<p class=\"body-txt\">\nchuyển đổi ban đầu).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sử dụng Patreon (squeeze page) để thu thập lead: Trang đích ít rủi ro hơn trang bán</span></div>\n<p class=\"body-txt\">\nhàng, giúp khách hàng dễ dàng đăng nhập.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Loại bỏ 2 rủi ro chính của khách hàng khi đăng ký:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mất thời gian: Chỉ yêu cầu thông tin tối thiểu (thường là chỉ email).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Lộ thông tin (bị spam): Cam kết bảo mật thông tin, không tiết lộ cho bên thứ ba. Nhấn</span></div>\n<p class=\"body-txt\">\nmạnh &quot;Nói như thế nào, mình làm như vậy.&quot; (walk the talk).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chuỗi email Autoresponder: Tiếp tục làm nhiệm vụ Know-Like-Trust, theo quy tắc phễu</span></div>\n<p class=\"body-txt\">\n(ban đầu nhiều, sau ít dần).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chiến lược để có tỷ lệ đăng nhập cao và không tốn chi phí:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sử dụng &quot;Email Marketing Bomb nguyên tử&quot; để tạo đột phá mà không tốn tiền.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ví dụ thành công: Anh Lộc tạo 2000 leads/đêm, diễn giả Khương có hàng trăm nghìn</span></div>\n<p class=\"body-txt\">\nlike.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nguyên lý có thể áp dụng cho mọi ngành, mọi lĩnh vực, không chỉ email.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cấu hình hệ thống Autoresponder:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Email 0: Tặng quà (e.g., sách điện tử).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Hầu hết khách hàng không tải xuống ngay, cần email nhắc nhở.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Email 1: Nhắc lại quà tặng, khuyến khích tải xuống (sau 24h nếu chưa tải/click). Sử dụng</span></div>\n<p class=\"body-txt\">\n&quot;trigger&quot; (kích hoạt) là &quot;not download&quot; hoặc &quot;not click&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chiến lược &quot;nhặt xu lắt nhắt&quot;:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Gửi các email tuần tự với những đề nghị giá trị nhỏ, hoặc yêu cầu hành động nhỏ (ví dụ:</span></div>\n<p class=\"body-txt\">\nxin 2 đô để mua bia, bán hosting 5 đô, mời đi Uber miễn phí).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mục đích không phải kiếm tiền từ những khoản nhỏ này, mà để lọc (filter) khách hàng có</span></div>\n<p class=\"body-txt\">\nthẻ tín dụng, sẵn sàng hành động và thực sự yêu quý/tin tưởng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tầm quan trọng của lòng tin:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nhiệm vụ chính của Email Marketing là &quot;xây dựng lòng tin&quot; (Build Trust).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Email có thể bán hàng, nhưng hiệu quả không cao nếu chưa có lòng tin.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cần thời gian để khách hàng tin cậy thông qua hệ thống email tuần tự này.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Thông báo sách: Diễn giả có sách về email marketing miễn phí tại</span></div>\n<p class=\"body-txt\">\nMinhpt.com/emailbook (phiên bản ebook và giấy).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nguyên lý phễu &quot;Know-Like-Trust&quot; (KLT) là nền tảng cốt lõi trong marketing: Diễn giả</span></div>\n<p class=\"body-txt\">\nnhấn mạnh KLT là quy trình kinh doanh quan trọng nhất, áp dụng không chỉ cho email\n \nmà cho mọi lĩnh vực. Email marketing chỉ là công cụ để tự động hóa và tối ưu hóa quá\n \ntrình này, chuyển đổi từ người biết đến thành người tin tưởng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Nó cung cấp một khung tư duy rõ ràng về hành trình khách hàng,</span></div>\n<p class=\"body-txt\">\ngiúp doanh nghiệp xây dựng chiến lược truyền thông và bán hàng hiệu quả theo từng\n \nbước, tập trung vào việc tạo giá trị và mối quan hệ thay vì chỉ bán hàng trực tiếp.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Thiết lập hệ thống Autoresponder &quot;xây xong quên&quot; (Build and Forget): Một khi hệ thống</span></div>\n<p class=\"body-txt\">\nautoresponder được thiết lập với chuỗi email tuần tự theo nguyên tắc KLT, nó sẽ tự\n \nđộng hoạt động và tạo ra kết quả mà không cần sự can thiệp liên tục. Diễn giả nhắc đến\n \nviệc email được soạn từ 6-7 năm trước vẫn hoạt động hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Nó giải phóng thời gian và nguồn lực quý giá cho chủ doanh nghiệp,</span></div>\n<p class=\"body-txt\">\nbiến marketing thành một tài sản tự động hóa, bền vững và có khả năng mở rộng. Điều\n \nnày đặc biệt hữu ích cho các doanh nghiệp nhỏ và vừa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Loại bỏ rủi ro cho khách hàng khi thu thập thông tin để tăng tỷ lệ chuyển đổi ban đầu:</span></div>\n<p class=\"body-txt\">\nĐể khách hàng dễ dàng đăng ký vào hệ thống (thông qua squeeze page), cần giảm thiểu\n \nrủi ro cho họ: mất thời gian (chỉ yêu cầu email) và lộ thông tin (cam kết bảo mật, &quot;nói là\n \nlàm&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là chìa khóa để thu hút lượng lớn lead chất lượng cao ngay từ</span></div>\n<p class=\"body-txt\">\nđầu, giảm rào cản tham gia và tăng tỷ lệ chuyển đổi đăng ký. Sự minh bạch và thực hiện\n \nđúng cam kết bảo mật thông tin sẽ củng cố niềm tin ngay từ những tương tác đầu tiên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sử dụng &quot;lắt nhắt&quot; (những yêu cầu nhỏ) để lọc và xây dựng mối quan hệ bền vững: Việc</span></div>\n<p class=\"body-txt\">\ngửi các email với những yêu cầu nhỏ (ví dụ: xin 2 đô, mời đi Uber miễn phí) không phải\n \nđể kiếm tiền trực tiếp từ những khoản này, mà để lọc ra khách hàng sẵn sàng hành động,\n \ncó thẻ tín dụng (nếu có yêu cầu thanh toán), và thực sự yêu quý, tin tưởng doanh nghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Nó giúp xác định phân khúc khách hàng chất lượng cao, đồng thời</span></div>\n<p class=\"body-txt\">\ncủng cố lòng tin và sự tương tác trước khi đưa ra các đề nghị giá trị lớn hơn. Đây là một\n \ncách tinh tế để &quot;đủ lông đủ cánh&quot; trước khi &quot;bán&quot; một cách nghiêm túc, tối ưu hóa hiệu\n \nquả bán hàng sau này.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Phễu là nguyên lý. Nguyên lý của cái phễu này thế này, tức là ta lọc và ta đưa xuống tầng sâu\n \nthứ mà ta muốn nhất.”\n \n“Các anh chị luôn nhớ mình minh bạch thông tin với khách hàng, mình nói như thế nào, mình\n \nlàm như vậy.”\n \n“Xây xong quên, build and forget. Xây xong một lần, lần sau tôi quên luôn.”\n \n“Nhiệm vụ của Email Marketing làm nhiệm vụ chính là gì? Xây dựng lòng tin.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 40: Hỏi - Đáp</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi học tập trung vào chiến lược email marketing hiệu quả, bao gồm tần suất gửi</h3>\n<p class=\"body-txt\">\nthư, quy trình bán hàng qua email và cách tránh thư rác (spam). Diễn giả cũng giới thiệu các\n \nbậc diễn giả copywriting và chia sẻ phương pháp viết email để xây dựng lòng tin, thúc đẩy\n \ndoanh số, và những điều cần tránh để đảm bảo email đến được hộp thư đến.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tần suất gửi email: Email được gửi theo quy luật ngẫu nhiên nhưng có chủ đích, giãn</span></div>\n<p class=\"body-txt\">\ncách khoảng 7-10 ngày một lần để tránh làm khách hàng quên hoặc bị làm phiền.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Quy trình bán hàng qua email:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Email được sử dụng để xây dựng lòng tin (các bước 7 và 8 trong hệ thống của diễn giả).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sau đó, email sẽ dẫn khách hàng đến trang bán hàng (bước 2, 3, 4, 9).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Có thể gửi nhiều email đến cùng một trang bán hàng cho đến khi khách hàng thực hiện</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">hành động mua.</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tỷ lệ nội dung bán hàng trong email:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nguyên tắc 80/20 (80% nội dung giá trị, 20% bán hàng) là tốt.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tuy nhiên, nếu không có điều kiện để soạn nội dung giá trị, bán hàng 100% vẫn tốt hơn</span></div>\n<p class=\"body-txt\">\nlà không bán gì.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nguồn học hỏi viết email hiệu quả:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">diễn giả (người diễn giả).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Joe Vitale (J.O.E V.I.T.A.L.E): Nổi tiếng với những email có nội dung dài (chủ yếu là chữ</span></div>\n<p class=\"body-txt\">\nký dài), nhưng mục đích cuối cùng là dẫn đến trang bán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Gary Halbert (H.A.L.B.E.R.T.O.L.O.G.Y): Được coi là ông tổ của nghề viết thư quảng cáo,</span></div>\n<p class=\"body-txt\">\nvới những bức thư đã tạo ra hàng chục triệu đô la doanh thu. Trang web tổng hợp các\n \nbức thư của ông được cung cấp miễn phí (The Gary Halbert Letter).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cách tránh email bị vào spam:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Kiểm tra điểm spam (spam score): Sử dụng các công cụ như Google tìm kiếm &quot;How to</span></div>\n<p class=\"body-txt\">\nscore spam email&quot; để kiểm tra điểm email trước khi gửi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nội dung email: Ưu tiên chữ thuần túy, tránh quá nhiều màu sắc, hình ảnh, chữ in đậm,</span></div>\n<p class=\"body-txt\">\nin nghiêng. Viết như một email thông thường.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chữ ký (signature): Email có chữ ký (ví dụ: &quot;Sincerely,&quot; &quot;Yours truly&quot;) thường được coi</span></div>\n<p class=\"body-txt\">\nlà thật và ít bị đánh dấu spam hơn thư quảng cáo.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Từ khóa: Tránh các từ khóa spammer hay dùng. Nên tự viết nội dung, không sao chép.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Độ dài thư: Thư ngắn gọn thường ít bị spam hơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chất lượng danh sách email: Chỉ gửi cho danh sách email do người dùng tự nguyện đăng</span></div>\n<p class=\"body-txt\">\nký. Tránh các danh sách có quá nhiều email &quot;chết&quot; hoặc không tương tác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tỷ lệ khiếu nại spam thấp: Giữ tỷ lệ khiếu nại dưới 0.3% (tức là không quá 3 khiếu nại</span></div>\n<p class=\"body-txt\">\ntrên 1000 email gửi đi).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">IP gửi thư uy tín: Sử dụng các dịch vụ email marketing trả phí (như GetResponse) có hệ</span></div>\n<p class=\"body-txt\">\nthống IP uy tín, được kiểm soát chặt chẽ và thường xuyên kiểm tra.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Landing Page và Squeeze Page: Landing Page là thuật ngữ chung; Squeeze Page, Capture</span></div>\n<p class=\"body-txt\">\nPage là các tên gọi cụ thể cho loại trang đích có mục đích chính là thu thập email.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Xử lý dữ liệu email cũ không hợp lệ: Nên xóa bỏ hoàn toàn dữ liệu email cũ không rõ</span></div>\n<p class=\"body-txt\">\nnguồn gốc hoặc không được người dùng tự nguyện đăng ký (ví dụ: Ctrl+A, Delete, Empty\n \nTrash).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Số lượng và vị trí hyperlink trong email:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nên thử nghiệm để tìm ra hiệu quả tốt nhất cho từng email.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Có thể đặt nhiều liên kết ở các vị trí chiến lược như dòng thứ tư từ trên xuống, giữa, tại</span></div>\n<p class=\"body-txt\">\nmốc 75% của bức thư, cuối bức thư và ở phần PS (Postscript).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chiến lược email marketing kết hợp xây dựng niềm tin và bán hàng bền bỉ: Diễn giả</span></div>\n<p class=\"body-txt\">\nnhấn mạnh rằng email không chỉ dùng để bán hàng trực tiếp mà còn là công cụ xây dựng\n \nmối quan hệ và lòng tin với khách hàng (các bước 7, 8). Sau khi niềm tin được củng cố,\n \nemail sẽ dẫn khách hàng đến trang bán hàng (bước 9). Điểm cốt lõi là sự kiên trì: có thể\n \ngửi nhiều email dẫn đến cùng một trang bán hàng, thậm chí lặp lại nhiều lần (như Joe\n \nVitale gửi 12 lần cho một sản phẩm trong 6 tháng) cho đến khi khách hàng mua, không\n \nbỏ cuộc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Nhiều nhà tiếp thị thường tập trung vào doanh số ngắn hạn hoặc gửi</span></div>\n<p class=\"body-txt\">\nquá ít email theo dõi. Cách tiếp cận này giúp xây dựng mối quan hệ lâu dài, tối đa hóa tỷ\n \nlệ chuyển đổi và doanh thu bằng sự bền bỉ, có chiến lược.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tầm quan trọng của chất lượng email và cách tránh spam: Diễn giả cung cấp một danh</span></div>\n<p class=\"body-txt\">\nsách chi tiết các yếu tố quan trọng để email không bị rơi vào thư mục spam, bao gồm:\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">nội dung email thuần văn bản (tránh màu sắc, hình ảnh, định dạng phức tạp), có chữ ký</h3>\n<p class=\"body-txt\">\nrõ ràng, tránh từ khóa spam, độ dài thư hợp lý, chất lượng danh sách người nhận (tự\n \nnguyện đăng ký), tỷ lệ khiếu nại thấp (&lt;0.3%), và sử dụng IP gửi thư có uy tín (thông\n \nqua các dịch vụ email marketing chuyên nghiệp).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Khả năng email đến được hộp thư đến là yếu tố nền tảng cho mọi</span></div>\n<p class=\"body-txt\">\nchiến dịch email marketing. Bỏ qua các yếu tố này sẽ khiến email không tiếp cận được\n \nkhách hàng, làm cho mọi nỗ lực tiếp thị trở nên vô ích. Đây là những lời khuyên thực tế\n \ngiúp doanh nghiệp tránh được những sai lầm phổ biến.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sức mạnh của copywriting đỉnh cao và cách học hỏi từ chuyên gia: Giới thiệu Gary</span></div>\n<p class=\"body-txt\">\nHalbert, &quot;ông tổ&quot; của nghề viết thư quảng cáo, và trang web tập hợp tất cả các lá thư của\n \nông (&quot;The Gary Halbert Letter&quot;) được cung cấp miễn phí. Những bức thư này đã tạo ra\n \nhàng chục triệu đô la doanh thu, thậm chí có khả năng cứu vãn hôn nhân hay cải thiện\n \nsức khỏe. Diễn giả nhấn mạnh việc truy cập và học hỏi từ nguồn tài liệu này là vô cùng\n \nquý giá.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Kỹ năng viết quảng cáo (copywriting) là động lực chính thúc đẩy</span></div>\n<p class=\"body-txt\">\ndoanh số. Việc học hỏi từ một bậc diễn giả trong lĩnh vực này và có quyền truy cập vào\n \ncác ví dụ thực tế, đã được chứng minh hiệu quả (đặc biệt khi chúng miễn phí) mang lại\n \nlợi thế cạnh tranh rất lớn. Nó giúp chuyển trọng tâm từ các khía cạnh kỹ thuật sang nghệ\n \nthuật thuyết phục bằng văn bản, vốn là mục tiêu cuối cùng của email bán hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Quy luật của tôi là quy luật ngẫu nhiên.”\n \n“Tôi không biết bằng cách nào bạn có mặt ở website này. Tôi không quan tâm bằng cách nào\n \nbạn có mặt ở website này... nhưng đây là trang web mà tôi diễn giả muốn nói với các bạn rằng\n \nnó là trang web giá trị nhất trên toàn bộ internet và tôi muốn giới thiệu đến các bạn ngày hôm\n \nnay.”\n \n“Hãy mạnh dạn xóa đi thì sẽ kiếm được tiền.”\n \n“Thử thì biết được.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 41: Trở thành người ai cũng muốn làm việc cùng</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi giảng tập trung vào phát triển cá nhân để trở thành người mà người khác</h3>\n<p class=\"body-txt\">\nmuốn làm việc cùng. Điều này đòi hỏi phát triển kỹ năng giao tiếp (trình bày, lắng nghe, ghi\n \nchép), đọc sách để mở rộng kiến thức, và đặc biệt là cẩn trọng trong việc lựa chọn, thay đổi\n \nnhóm bạn bè/mối quan hệ (peer group) sao cho phù hợp với mục tiêu phát triển bản thân\n \nvà kinh doanh. Mục tiêu cuối cùng là xây dựng mạng lưới quan hệ chất lượng, mang lại giá\n \ntrị cho cả hai bên.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mục tiêu là trở thành người mà những người khác muốn làm việc cùng với mình.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Điều này đồng nghĩa với việc trở thành một người dẫn dắt (leader), hoặc doanh</span></div>\n<p class=\"body-txt\">\nnhân/nhà kinh doanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tiền bạc của bạn tương xứng với những mối quan hệ mà bạn có.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Kỹ năng phát triển cá nhân quan trọng nhất là &quot;kỹ năng trình bày cho người khác hiểu</span></div>\n<p class=\"body-txt\">\nđiều mình đang nghĩ&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Để trình bày hiệu quả, cần tuân thủ 4 nguyên tắc:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nói thật đơn giản.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Hỏi nhiều hơn nói.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nghe nhiều hơn (sau khi hỏi).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ghi xuống mọi điều bạn nghe được (ưu tiên giấy và bút chì vì giúp học nhanh gấp 3 lần</span></div>\n<p class=\"body-txt\">\nvà hiển thị vật lý).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Đọc sách là rất cần thiết cho phát triển cá nhân, đặc biệt là các dòng sách phát triển cá</span></div>\n<p class=\"body-txt\">\nnhân từ các tác giả như Jim Rohn (Jim Zone), Napoleon Hill, Jack Canfield, Zig Ziglar,\n \nJohn C. Maxwell (John C. Maxweo).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Thay đổi nhóm bạn bè (peer group) của mình.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cứ mỗi lần thay đổi nhóm bạn bè, cuộc đời sẽ sang trang mới.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nên xóa bỏ những mối quan hệ không còn phù hợp và kết nối lại từ đầu, lựa chọn người</span></div>\n<p class=\"body-txt\">\ncó giá trị hơn mình để chơi cùng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mối quan hệ cần có sự trao đổi giá trị hai chiều: bạn có giá trị cho họ và họ có giá trị cho</span></div>\n<p class=\"body-txt\">\nbạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Hãy cẩn trọng với &quot;người tốt&quot; nếu họ kéo bạn lại hoặc không hỗ trợ mục tiêu của bạn.</span></div>\n<p class=\"body-txt\">\nNgay cả cha mẹ cũng có thể vô tình kìm hãm nếu bạn cứ đi theo lối mòn của họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nhóm người bạn gặp thường xuyên là rất quan trọng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chỉ nên chơi với nhóm người mà họ nói chuyện về điều bạn muốn hướng tới; nếu không,</span></div>\n<p class=\"body-txt\">\nhãy chấm dứt mối quan hệ đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bạn phải thuộc về nhóm 20% những người dẫn đầu, có giá trị.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Trở thành người mà người khác muốn làm việc cùng: Đây là cốt lõi của bài giảng, chuyển</span></div>\n<p class=\"body-txt\">\ntrọng tâm từ việc theo đuổi mục tiêu cá nhân sang việc phát triển bản thân để trở nên có\n \ngiá trị đối với người khác. Khi bạn trở thành một người có khả năng dẫn dắt, có kỹ năng\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><p class=\"body-txt\">\nvà giá trị, tự khắc cơ hội và những người đồng hành sẽ tìm đến, thúc đẩy sự phát triển cá\n \nnhân và kinh doanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tiền bạc của bạn tương xứng với những mối quan hệ mà bạn có: Insight này nhấn mạnh</span></div>\n<p class=\"body-txt\">\nmối liên hệ trực tiếp giữa chất lượng và số lượng mối quan hệ với thành công tài chính.\n \nĐiều này không chỉ nói về việc &quot;quen biết&quot; mà còn về khả năng tạo ra giá trị và được tin\n \ntưởng trong các mối quan hệ, đặc biệt là trong kinh doanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Thay đổi nhóm bạn bè và chỉ chơi với nhóm người nói chuyện về mục tiêu của mình:</span></div>\n<p class=\"body-txt\">\nĐây là một lời khuyên táo bạo nhưng cực kỳ thực tế. Môi trường và những người xung\n \nquanh ảnh hưởng rất lớn đến suy nghĩ và hành động của mỗi người. Việc chủ động lựa\n \nchọn và loại bỏ những mối quan hệ không phục vụ mục tiêu, thậm chí phải &quot;cẩn trọng\n \nvới người tốt&quot; nếu họ vô tình kìm hãm, là bước đi then chốt để đột phá và đạt được\n \nthành công mong muốn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Hãy trở thành người mà những người khác muốn làm việc cùng với mình.”\n \n“Tiền bạc của bạn tương xứng với những mối quan hệ mà bạn có.”\n \n“Cho nên hãy cẩn trọng với người tốt.”\n \n“Bạn chỉ chơi với cái nhóm mà họ nói chuyện về cái điều bạn muốn thôi.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 42: Vòng lặp 8 Module trong kinh doanh</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi học này giới thiệu một &quot;vòng lặp trong kinh doanh&quot; gồm 8 module cốt lõi,</h3>\n<p class=\"body-txt\">\nđược thiết kế để giúp các doanh nghiệp vừa và nhỏ xây dựng và vận hành hiệu quả. Cốt lõi\n \ncủa mô hình là tập trung vào việc xác định thị trường ngách, tạo thông điệp giá trị, chọn\n \nkênh tiếp cận, xây dựng hệ thống phễu để chuyển đổi khách hàng tiềm năng, và đặc biệt là\n \ntạo ra trải nghiệm khách hàng vượt trội để tăng giá trị trọn đời khách hàng (LVC) và xây\n \ndựng khách hàng cuồng nhiệt (Raving Fan) nhằm đạt được sự đột phá trong kinh doanh.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vòng lặp trong kinh doanh: Gồm 8 module cần vận hành liên tục, phù hợp cho doanh</span></div>\n<p class=\"body-txt\">\nnghiệp có số vốn dưới 100 tỷ VND.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Module 1: Niche (Thị trường mục tiêu):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Xác định rõ &quot;bạn muốn điều gì?&quot; (mục tiêu/điểm B).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Phục vụ ai?&quot; và &quot;họ cần gì?&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Ta có sản phẩm gì để cung cấp cho họ?&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Là người &quot;thiết kế mô hình kinh doanh&quot;, không phải &quot;thiết kế dự án/phương án kinh</span></div>\n<p class=\"body-txt\">\ndoanh&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cần dành nhiều thời gian để tìm kiếm và xác định các thị trường ngách.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Module 2: Message (Thông điệp):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phát triển kỹ năng diễn đạt thông tin.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Quan trọng nhất là &quot;nói về lợi ích của khách hàng&quot; chứ không phải sản phẩm.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chỉ tập trung vào những &quot;lợi ích mà khách hàng nhận được&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Module 3: Medium (Kênh/Phương tiện):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chính là &quot;cái ao&quot; nơi khách hàng xuất hiện.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Là &quot;phương tiện&quot; để đặt thông điệp vào đó và tìm kiếm khách hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chiến lược cần xác định và thử nghiệm nhiều kênh khác nhau (ví dụ: chiến lược 10x10).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Module 4: Lead (Khách hàng tiềm năng):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Niche là tất cả mọi người, Lead là những khách hàng tiềm năng đã cung cấp ít nhất một</span></div>\n<p class=\"body-txt\">\nthông tin.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sử dụng &quot;chiến lược phễu&quot; để chuyển đổi từ khách hàng tiềm năng lên các cấp bậc cao</span></div>\n<p class=\"body-txt\">\nhơn (Outstanding).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chiến lược bao gồm: Free, Back-end, Outstanding, Raving Fan.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Module 5: Sale Strategy (Chiến lược bán hàng):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Quá trình chuyển đổi từ Lead thành Shopper (người mua hàng) và từ Shopper thành</span></div>\n<p class=\"body-txt\">\nCustomer (khách hàng trung thành).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Các chiến lược này cần được viết xuống và bổ sung hàng ngày, có thể tự động hóa.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Module 6: Wow Experience (Trải nghiệm đặc biệt):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Giúp khách hàng có những trải nghiệm đặc biệt.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Việc bán sản phẩm không còn quan trọng bằng việc cung cấp trải nghiệm đặc biệt.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Trải nghiệm này phải đến từ các dịch vụ và những người chuyên gia (skill producer).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Công ty nào có dịch vụ/trải nghiệm khách hàng tốt hơn sẽ chiến thắng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Module 7: LVC (Lifetime Value Customer - Giá trị trọn đời khách hàng):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tập trung vào LVC giúp đối thủ không bao giờ đuổi kịp bạn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">LVC mang lại nguồn tài chính dồi dào cho các chiến dịch quảng cáo và khuyến mãi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mục tiêu là giúp khách hàng &quot;mua hàng thêm một lần nữa&quot; và chuyển từ người mua</span></div>\n<p class=\"body-txt\">\nhàng thành khách hàng trung thành.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Hệ thống phễu là công cụ chính để tăng LVC, giúp khách hàng mua nhiều lần hơn, giá trị</span></div>\n<p class=\"body-txt\">\nđơn hàng cao hơn, và có nhiều khách hàng hơn đối thủ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Module 8: Raving Fan (Khách hàng cuồng nhiệt):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Xây dựng Raving Fan là một phần quan trọng để có nguồn khách hàng vô tận.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Thay đổi KPI bao gồm &quot;khách hàng mua hàng quay trở lại&quot; và &quot;khách hàng mua hàng do</span></div>\n<p class=\"body-txt\">\ngiới thiệu&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Làm cho mọi người thích thú khi giới thiệu khách hàng cho bạn bằng cách &quot;Add more</span></div>\n<p class=\"body-txt\">\nvalue&quot; (gia tăng giá trị).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nguyên tắc vòng lặp: Mỗi khi bạn phát hiện một chiến lược mới, hãy điền nó vào hệ</span></div>\n<p class=\"body-txt\">\nthống và lặp lại vòng quay. Mỗi vòng quay sẽ giúp bạn lớn hơn ở vòng trước.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sức mạnh của sự đơn giản: Toàn bộ kiến thức tuy đơn giản và quen thuộc nhưng được</span></div>\n<p class=\"body-txt\">\nsắp đặt lại theo một cấu trúc đặc biệt, tạo nên sức mạnh đột phá.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tập trung vào lợi ích khách hàng thay vì sản phẩm: Diễn giả nhấn mạnh rằng &quot;Doanh</span></div>\n<p class=\"body-txt\">\nnhân yêu thích sản phẩm thì thất bại. Doanh nhân yêu thích khách hàng thì thành công.&quot;\n \nĐiều này cực kỳ quan trọng vì trong một thị trường cạnh tranh, khách hàng mua giải\n</p></div></div>",
