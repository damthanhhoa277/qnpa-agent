"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Để kinh doanh, điều đầu tiên cần xác định là thị trường.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Thị trường quan trọng nhất không phải con người, mà là nhu cầu và mong muốn (Needs</span></div>\n<p class=\"body-txt\">\nand Wants) của họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cần tìm ra điểm cốt lõi nhất trong thị trường để phục vụ khách hàng, là điểm mấu chốt</span></div>\n<p class=\"body-txt\">\nkhiến khách hàng luôn đi theo mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Các ví dụ về điểm cốt lõi:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phở 24: Sự nhất quán của các cửa hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">iPhone:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Với người Việt: Sang trọng, đẳng cấp (biểu hiện qua việc đặt điện thoại trên bàn).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Với người Mỹ/thị trường thế giới: Sự đơn giản và trang trọng (elegant).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">BMW X5: Dành cho giới trẻ, yêu thích sự hành động, mạnh mẽ (active).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mercedes E500: Dành cho doanh nhân lịch lãm, trưởng thành (elegant).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sau khi xác định thị trường (customer segment), cần định vị giá trị cốt lõi (core value /</span></div>\n<p class=\"body-txt\">\nvalue proposition - VP) mà sản phẩm/dịch vụ mang lại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Một sản phẩm chỉ nên phục vụ một giá trị quan trọng nhất mà ta muốn cung cấp, không</span></div>\n<p class=\"body-txt\">\nthể phục vụ tất cả các nhu cầu và mong muốn của khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Quy trình đúng là luôn bắt đầu từ khách hàng (customer segment/niche) và nhu cầu của</span></div>\n<p class=\"body-txt\">\nhọ, sau đó mới xác định giá trị cốt lõi và thiết kế sản phẩm. Không bắt đầu từ sản phẩm\n \nmình có.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tất cả các sản phẩm/dịch vụ trong một doanh nghiệp đều phải xoay quanh và phục vụ</span></div>\n<p class=\"body-txt\">\nmột giá trị cốt lõi duy nhất đã định vị cho đối tượng khách hàng đã chọn (áp dụng\n \nnguyên lý fractal, đệ quy).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Những sản phẩm không đáp ứng được cốt lõi hoặc sai đối tượng khách hàng nên được</span></div>\n<p class=\"body-txt\">\nloại bỏ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bắt đầu từ khách hàng và nhu cầu cốt lõi của họ, không phải từ sản phẩm: Diễn giả nhấn</span></div>\n<p class=\"body-txt\">\nmạnh sai lầm phổ biến là doanh nghiệp thường bán những gì mình có (ví dụ: có dừa thì\n \nbán dừa) thay vì tìm hiểu khách hàng cần gì. Việc xuất phát từ &quot;Customer Segment&quot; và\n \nxác định &quot;Needs and Wants&quot; cùng &quot;Core Value/Value Proposition&quot; giúp doanh nghiệp\n \ntạo ra sản phẩm/dịch vụ thực sự giải quyết vấn đề và được thị trường đón nhận, tránh\n \nlãng phí nguồn lực và tối ưu hóa hiệu quả kinh doanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Một sản phẩm/dịch vụ chỉ nên tập trung phục vụ MỘT giá trị cốt lõi quan trọng nhất:</span></div>\n<p class=\"body-txt\">\nKhông thể và không nên cố gắng phục vụ tất cả các nhu cầu và mong muốn. Việc tập\n \ntrung vào &quot;một giá trị nào quan trọng nhất&quot; giúp doanh nghiệp định hình rõ ràng sản\n \nphẩm, tạo lợi thế cạnh tranh khác biệt, và xây dựng thông điệp truyền thông mạch lạc,\n \ndễ nhớ. Ví dụ điển hình là iPhone phục vụ &quot;sang trọng/đơn giản&quot;, không phải &quot;trải\n \nnghiệm&quot; chung chung cho mọi người.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Thị trường quan trọng nhất không phải là con người nào cả, mà là cái nhu cầu và mong\n \nmuốn của họ mới là điều quan trọng.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Một sản phẩm thì phục vụ được một cái giá trị nào quan trọng nhất mà ta muốn phục vụ mà\n \nthôi.”\n \n“Tôi bắt đầu từ khách hàng, chứ tôi không bắt đầu từ sản phẩm.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 24: Công thức gia tăng doanh thu</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi học tập trung vào công thức tăng doanh thu của Jay Abraham, dựa trên ba</h3>\n<p class=\"body-txt\">\ntham số chính: số lượng khách hàng, doanh thu trung bình trên mỗi giao dịch, và số lần lặp\n \nlại mua hàng. Diễn giả đã minh họa cách áp dụng công thức này qua bài toán thực tế, cho\n \nthấy việc điều chỉnh từng tham số có thể ảnh hưởng đến tổng doanh thu và đặc biệt là lợi\n \nnhuận. Buổi học cũng nhấn mạnh tầm quan trọng của việc học tích cực theo phương pháp\n \nVAK để ghi nhớ và áp dụng hiệu quả các kiến thức kinh doanh.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Diễn giả giới thiệu công thức tăng doanh thu của Jay Abraham, bao gồm 3 tham số.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tham số 1: Số lượng khách hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tham số 2: Doanh thu trung bình (trên mỗi giao dịch/khách hàng).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tham số 3: Số lần lặp lại mua hàng (hay còn gọi là số lần mua trung bình).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Công thức tính Doanh thu = Số lượng khách hàng x Doanh thu trung bình x Số lần lặp lại</span></div>\n<p class=\"body-txt\">\nmua hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Diễn giả nhấn mạnh việc tương tác và lặp lại kiến thức theo phương pháp VAK (Visual –</span></div>\n<p class=\"body-txt\">\nnhìn, Auditory – nghe, Kinesthetic – vận động) để giúp học viên ghi nhớ tốt hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Minh họa bằng bài toán &quot;hạt điều&quot;:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tình huống ban đầu: 1000 khách hàng, giá 380.000 VNĐ/kg, số lần mua trung bình 2.2</span></div>\n<p class=\"body-txt\">\nlần =&gt; Tổng doanh thu 836 triệu VNĐ. Lợi nhuận ước tính là 176 triệu VNĐ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tình huống thay đổi: Tăng giá lên 700.000 VNĐ/kg, dẫn đến giảm số lượng khách hàng</span></div>\n<p class=\"body-txt\">\nxuống 600 và giảm số lần mua trung bình xuống 1.5 lần =&gt; Tổng doanh thu 630 triệu\n \nVNĐ. Lợi nhuận ước tính là 360 triệu VNĐ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Kết luận từ bài toán: Việc tăng giá (doanh thu trung bình) có thể dẫn đến giảm số lượng</span></div>\n<p class=\"body-txt\">\nkhách hàng và số lần mua lặp lại, nhưng vẫn có thể mang lại lợi nhuận cao hơn đáng kể\n \n(360 triệu &gt; 176 triệu).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Thảo luận về khả năng tăng &quot;doanh thu trung bình&quot; ngay cả trong các ngành có giá cố</span></div>\n<p class=\"body-txt\">\nđịnh (như đại lý, bảo hiểm, bán hàng đa cấp, đại lý xe máy/ô tô) bằng cách bán sản phẩm\n \ncó giá trị cao hơn, gói dịch vụ bổ sung hoặc up-sell/cross-sell.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Công thức tăng trưởng tổng quát: Để tính tỷ lệ tăng trưởng tổng thể, sử dụng công thức</span></div>\n<p class=\"body-txt\">\n`(1+x) * (1+y) * (1+z) - 1`, trong đó x, y, z là tỷ lệ phần trăm tăng trưởng của mỗi tham\n \nsố.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ví dụ: Nếu số lượng khách hàng tăng 3 lần (x=2), doanh thu trung bình tăng 3 lần (y=2),</span></div>\n<p class=\"body-txt\">\nvà số lần mua trung bình tăng 1.1 lần (z=0.1) =&gt; Doanh thu tổng thể sẽ tăng khoảng 9.9\n \nlần.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Công thức 3 tham số của Jay Abraham là kim chỉ nam để tăng trưởng: Thay vì tập trung</span></div>\n<p class=\"body-txt\">\nmù quáng vào một yếu tố (như chỉ cố gắng tìm thêm khách hàng mới), công thức này\n \ncung cấp một cái nhìn toàn diện, cho phép doanh nghiệp phân tích và tối ưu hóa ở ba\n \nkhía cạnh khác nhau: mở rộng tệp khách hàng, tăng giá trị mỗi giao dịch, và khuyến\n \nkhích khách hàng quay lại thường xuyên. Điều này giúp doanh nghiệp có nhiều đòn bẩy\n \nđể tác động đến doanh thu và lợi nhuận.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mục tiêu cuối cùng là lợi nhuận, không phải lúc nào cũng là doanh thu lớn: Bài toán &quot;hạt</span></div>\n<p class=\"body-txt\">\nđiều&quot; là một minh chứng đắt giá. Nó chỉ ra rằng việc chấp nhận giảm doanh thu tổng\n \n(bằng cách tăng giá, khiến mất đi một phần khách hàng và tần suất mua) vẫn có thể\n \nmang lại lợi nhuận cao hơn đáng kể. Điều này quan trọng vì nó thách thức quan niệm\n \nphổ biến &quot;doanh thu là vua&quot; và định hướng doanh nghiệp tập trung vào hiệu quả sinh\n \nlời.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Luôn có cách tăng doanh thu trung bình, ngay cả khi giá sản phẩm cố định: Diễn giả nhấn</span></div>\n<p class=\"body-txt\">\nmạnh rằng ngay cả các mô hình kinh doanh có giá cố định (đại lý, bảo hiểm, ô tô) vẫn có\n \nthể tăng giá trị trung bình mỗi giao dịch. Điều này có thể thực hiện thông qua việc bán\n \ncác phiên bản sản phẩm cao cấp hơn, cung cấp các dịch vụ bổ sung, hoặc tạo ra các gói\n \nsản phẩm có giá trị gia tăng. Insight này mở ra tư duy linh hoạt và sáng tạo cho các\n \ndoanh nghiệp tưởng chừng bị giới hạn bởi cấu trúc giá.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Để tăng doanh thu có bao nhiêu tham số? Ba! Có ba tham số.”\n \n“Các anh chị hãy quyết định cho mình con số là bao nhiêu... Đầu tiên các anh chị phải biết mình\n \nmuốn gì. Mình muốn tăng được lợi nhuận của mình lên bao nhiêu thì mình sẽ quyết định.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Chương 5</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 25: Mô hình Canvas</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi giảng này giới thiệu về Business Model Canvas (Mô hình kinh doanh) như</h3>\n<p class=\"body-txt\">\nmột phương pháp cốt lõi để gia tăng số lượng khách hàng. Diễn giả nhấn mạnh tầm quan\n \ntrọng của việc xác định rõ phân khúc khách hàng (Customer Segment) và giá trị đề xuất\n \n(Value Proposition) trước khi đi sâu vào các khía cạnh khác của mô hình kinh doanh. Đây là\n \nhai yếu tố then chốt giúp định vị và định hướng cho toàn bộ hoạt động kinh doanh, thường\n \nbị các doanh nghiệp bỏ qua khi họ có xu hướng bắt đầu từ sản phẩm trước.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Buổi học giới thiệu khái niệm &quot;Business Model&quot; (Mô hình kinh doanh) là một phương</span></div>\n<p class=\"body-txt\">\npháp để gia tăng số lượng khách hàng, khuyến khích học viên tìm hiểu thêm về nó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mô hình kinh doanh được chia thành 9 ô (như Business Model Canvas).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Khi thiết kế hoặc phân tích một mô hình kinh doanh, cần điền vào các ô theo thứ tự:</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Customer Segment (CS - Phân khúc khách hàng): &quot;Chúng ta phục vụ ai?&quot;, &quot;Bạn tạo giá trị</span></div>\n<p class=\"body-txt\">\ncho ai?&quot;, &quot;Ai là khách hàng quan trọng nhất của bạn?&quot;, &quot;Đặc điểm của nhóm khách hàng\n \nnày là gì?&quot;, &quot;Họ có cần gì, có nhu cầu gì?&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Value Proposition (VP - Giá trị đề xuất): &quot;Giá trị bạn muốn mang đến cho khách hàng là</span></div>\n<p class=\"body-txt\">\ngì?&quot;, &quot;Vấn đề của khách hàng mà bạn có thể giải quyết cho họ là gì?&quot;, &quot;Những sản\n \nphẩm/dịch vụ hoặc gói sản phẩm/dịch vụ nào bạn có thể mang đến cho khách hàng của\n \nmình?&quot;, &quot;Nhu cầu nào mà khách hàng mong muốn được thỏa mãn?&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Diễn giả nhấn mạnh rằng Customer Segment và Value Proposition là hai câu hỏi quan</span></div>\n<p class=\"body-txt\">\ntrọng nhất cần trả lời *trước khi* thiết kế bất kỳ mô hình kinh doanh nào. Hầu hết mọi\n \nngười thường bắt đầu từ sản phẩm (Value Proposition) nhưng đúng ra phải bắt đầu từ\n \nphân khúc khách hàng trước.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Channels (Kênh phân phối): &quot;Có những kênh nào mà bạn có thể phân phối hàng hóa tới</span></div>\n<p class=\"body-txt\">\ncho khách hàng?&quot; (ví dụ: nhà sách, sự kiện trực tiếp, internet online). &quot;Kênh nào là kênh\n \ntốt nhất?&quot;, &quot;Làm thế nào để ta tương tác được với khách hàng ở trong kênh đó?&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sử dụng ví von để dễ hiểu: CS là &quot;câu loại cá nào?&quot;, VP là &quot;cá thích ăn gì?&quot;, Channels là</span></div>\n<p class=\"body-txt\">\n&quot;câu cá ở đâu?&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Customer Relationship (CR - Quan hệ khách hàng): &quot;Làm thế nào để chúng ta tìm họ, giữ</span></div>\n<p class=\"body-txt\">\nhọ và phát triển họ?&quot;, &quot;Mối quan hệ cần phát triển đến mức nào?&quot;, &quot;Tương tác với các\n \ncông việc kinh doanh khác ra sao?&quot;, &quot;Kiếm một khách hàng hết bao nhiêu tiền?&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Key Activities (KA - Hoạt động chính): &quot;Những hành động chính nào bạn cần làm?&quot; (Ví</span></div>\n<p class=\"body-txt\">\ndụ: sản xuất, bán hàng, marketing). Những hành động liên quan đến kênh phân phối,\n \nquan hệ khách hàng, lợi nhuận.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Key Resources (KR - Nguồn lực chính): &quot;Những nguồn lực chính mà bạn cần sử dụng?&quot;</span></div>\n<p class=\"body-txt\">\nNhững nguồn lực cần cho giá trị đề xuất, kênh phân phối, quan hệ khách hàng, lợi nhuận.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Key Partners (KP - Đối tác chính): &quot;Đối tác chính của chúng ta là ai?&quot;, &quot;Ai là nhà cung cấp</span></div>\n<p class=\"body-txt\">\nchính cho ta?&quot;, &quot;Nguồn lực nào ta cần sử dụng để phát triển đối tác chính này?&quot;, &quot;Những\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">hành động chính nào mà đối tác cần phải thực hiện?&quot;.</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">7 thành phần trên (CS, VP, Channels, CR, KA, KR, KP) là nền tảng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Revenue Stream (RS - Dòng doanh thu): Đây là phần quan trọng bậc nhất ở phần &quot;back-</span></div>\n<p class=\"body-txt\">\nend&quot;. &quot;Những giá trị nào mà khách hàng mong muốn được trả tiền cho nó?&quot;, &quot;Họ đang\n \nchi trả hiện tại như thế nào?&quot;, &quot;Mô hình lợi nhuận được phân bổ ra sao?&quot;, &quot;Chiến lược giá\n \nanh chị đang áp dụng là gì?&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Diễn giả đề xuất một chiến lược giá ngược lại thị trường: &quot;tăng giá&quot; thay vì &quot;giảm giá&quot;</span></div>\n<p class=\"body-txt\">\n(như ví dụ Uber vs. taxi).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cost Structure (CS - Cấu trúc chi phí): (Được nhắc đến là &quot;dòng chi phí&quot; nhưng không đi</span></div>\n<p class=\"body-txt\">\nsâu vào chi tiết trong đoạn này, chỉ nằm ở ô cuối cùng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Kết luận lại: Khi làm kinh doanh, *luôn bắt đầu từ Customer Segment và Value</span></div>\n<p class=\"body-txt\">\nProposition*, vì đây là hai điều quan trọng nhất định vị toàn bộ công trình kinh doanh.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Luôn bắt đầu từ phân khúc khách hàng (Customer Segment) và giá trị đề xuất (Value</span></div>\n<p class=\"body-txt\">\nProposition): Diễn giả nhấn mạnh rằng hầu hết các doanh nghiệp mắc lỗi khi bắt đầu từ\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><p class=\"body-txt\">\nsản phẩm mà bỏ qua việc xác định rõ ai là khách hàng và giá trị cốt lõi mà họ mang lại.\n \nViệc định vị đúng khách hàng và giá trị sẽ định hình toàn bộ chiến lược kinh doanh. Điều\n \nnày quan trọng vì nó đặt khách hàng vào trung tâm, giúp doanh nghiệp tạo ra sản\n \nphẩm/dịch vụ thực sự phù hợp với nhu cầu thị trường, thay vì cố gắng bán cái mình có.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Giá trị là giải quyết vấn đề của khách hàng và những gì họ sẵn sàng trả tiền: Value</span></div>\n<p class=\"body-txt\">\nProposition không chỉ là liệt kê tính năng sản phẩm/dịch vụ, mà là khả năng giải quyết\n \ncác vấn đề cụ thể của khách hàng và thỏa mãn những nhu cầu mà họ mong muốn được\n \nđáp ứng. Hơn nữa, phải xác định được &quot;những giá trị nào mà khách hàng mong muốn\n \nđược trả tiền cho nó&quot;, thậm chí là sẵn sàng trả giá cao. Điều này giúp doanh nghiệp tập\n \ntrung vào việc tạo ra giá trị thực sự có thể chuyển đổi thành doanh thu bền vững.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chiến lược giá đối nghịch thị trường (tăng giá thay vì giảm giá): Diễn giả thách thức suy</span></div>\n<p class=\"body-txt\">\nnghĩ thông thường rằng giảm giá là cách thu hút khách hàng. Ông gợi ý việc đi ngược lại\n \nthị trường bằng cách áp dụng chiến lược tăng giá, ngụ ý rằng khi giá trị được định vị rõ\n \nràng và mạnh mẽ, khách hàng sẽ sẵn lòng trả nhiều hơn. Điều này quan trọng vì nó\n \nkhuyến khích doanh nghiệp tập trung vào nâng cao giá trị và chất lượng dịch vụ thay vì\n \ncạnh tranh bằng giá, giúp xây dựng thương hiệu mạnh mẽ và lợi nhuận cao hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Hai cái điều này [Customer Segment và Value Proposition] là điều quan trọng nhất mà các\n \nanh chị cần phải làm. Còn những thứ khác mình có thể vay mượn được. Nhưng cái một và cái\n \nhai này nó sẽ định vị cái công trình kinh doanh của anh chị là ai.”\n \n“Giờ, chúng ta đi ngược lại thị trường áp dụng một chiến lược giá là tăng giá.”\n \n“Bạn tạo giá trị cho ai? Ai là khách hàng quan trọng nhất của bạn?”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 26: Thay đổi và làm chủ cuộc sống</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi học này tập trung vào hai bộ công cụ quan trọng để làm chủ cuộc đời và thay</h3>\n<p class=\"body-txt\">\nđổi cuộc sống: bốn hành động cốt lõi và năm nguyên tắc làm việc hiệu quả. Bốn hành động\n \nbao gồm làm nhiều hơn việc có hiệu quả, làm ít đi việc kém hiệu quả, bắt đầu những điều\n \nmới, và ngừng hoàn toàn những việc không cần thiết. Năm nguyên tắc giúp xây dựng môi\n \ntrường tích cực, khuyến khích sự chia sẻ cởi mở, đặt câu hỏi, hỗ trợ lẫn nhau và đảm bảo\n \nmọi người đều được bày tỏ ý kiến. Diễn giả cũng nhấn mạnh giá trị của việc ra quyết định\n \nnhanh chóng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">4 cách để thay đổi cuộc sống (từ Brian Tracy):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Làm một số việc nhiều hơn (những việc có hiệu quả).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Làm một số việc ít đi (những việc kém hiệu quả).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bắt đầu làm một việc gì đó mới.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ngừng một số việc đã làm (những việc không cần thiết hoặc có hại).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Đừng bao giờ cố gắng làm một việc không có hiệu quả, càng làm càng chết. Cần hàng</span></div>\n<p class=\"body-txt\">\nngày kiểm tra và chấm dứt ngay những việc không cần làm nữa.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">5 nguyên tắc để làm chủ cuộc đời:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tất cả mọi người đều tích cực, tận tụy với thành công của họ (đừng đổ lỗi cho người</span></div>\n<p class=\"body-txt\">\nkhác, vấn đề thường là do mình không làm chủ được các con số).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chia sẻ ý tưởng, quan điểm một cách cởi mở.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Hỏi thật nhiều câu hỏi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tìm cách giúp đỡ, động viên.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Thay phiên cho mỗi người đều được lên tiếng nói, được nói tiếng nói của mình.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nếu có vấn đề không giải quyết được, dừng nó lại là tốt nhất.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phương pháp trả lời nhanh:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Hãy luôn cho mình 15 giây để trả lời mọi câu hỏi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cái gì nói trong 15 giây thì nó là sự thật.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Công thức thay đổi cuộc sống&quot; với 4 hành động cụ thể: Điểm quan trọng là nó cung cấp</span></div>\n<p class=\"body-txt\">\nmột khuôn khổ rõ ràng, dễ áp dụng để phân loại và điều chỉnh các hành vi, thói quen,\n \nhoặc chiến lược kinh doanh. Việc xác định rõ cái gì nên làm nhiều hơn, cái gì nên bỏ bớt,\n \ncái gì nên bắt đầu và cái gì nên chấm dứt giúp cá nhân/doanh nghiệp tối ưu hóa nguồn\n \nlực và đạt được sự thay đổi tích cực một cách có hệ thống, thay vì làm việc một cách cảm\n \ntính.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nguyên tắc &quot;Tất cả mọi người đều tích cực, tận tụy với thành công&quot;: Insight này thay đổi</span></div>\n<p class=\"body-txt\">\nhoàn toàn góc nhìn trong giải quyết vấn đề. Thay vì đổ lỗi cho đối tác, khách hàng hay\n \nđồng nghiệp thiếu hợp tác, chúng ta nhận ra rằng họ cũng đang nỗ lực hết mình theo\n \ncách của họ. Vấn đề phát sinh thường không phải do ý đồ xấu mà do thiếu thông tin, sự\n \nhiểu biết, hoặc chúng ta chưa &quot;làm chủ được các con số&quot;. Điều này thúc đẩy chúng ta tập\n \ntrung vào việc cải thiện giao tiếp, phân tích dữ liệu và tìm giải pháp mang tính xây dựng\n \nhơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Khuyến khích &quot;Chia sẻ ý tưởng, quan điểm một cách cởi mở&quot; và &quot;Hỏi thật nhiều câu hỏi&quot;:</span></div>\n<p class=\"body-txt\">\nĐây là nền tảng cho sự học hỏi, sáng tạo và giải quyết vấn đề hiệu quả trong mọi môi\n \ntrường, đặc biệt là kinh doanh. Sự cởi mở trong chia sẻ giúp loại bỏ rào cản thông tin,\n \nthúc đẩy sự minh bạch. Việc đặt câu hỏi liên tục và sâu sắc giúp khai thác thông tin, làm\n \nrõ vấn đề và tìm ra những giải pháp tiềm năng mà không ai nghĩ tới nếu chỉ giữ im lặng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Nếu không giải quyết được, dừng nó lại là tốt nhất&quot;: Đây là một triết lý quan trọng về</span></div>\n<p class=\"body-txt\">\nquản lý rủi ro và hiệu quả. Nó nhắc nhở rằng không phải mọi vấn đề đều có thể hoặc cần\n \nphải giải quyết. Có những lúc, việc cố gắng duy trì một dự án, một mối quan hệ, hay một\n \nthói quen không hiệu quả chỉ làm tiêu tốn thêm nguồn lực quý giá. Biết khi nào nên từ\n \nbỏ là một kỹ năng lãnh đạo và quản lý cá nhân cần thiết để tái phân bổ năng lượng vào\n \nnhững việc có triển vọng hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Đừng bao giờ cố gắng làm một cái việc mà nó không có hiệu quả, càng làm càng chết.”\n \n“Tất cả mọi người ở trong những hoàn cảnh của họ, họ đều vô cùng tận tụy và nỗ lực.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Cái gì nói trong 15 giây thì nó là cái sự thật.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 27: Sản phẩm của tôi là tuyệt vời</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi giảng tập trung vào các câu hỏi cốt lõi mà mọi chủ doanh nghiệp cần trả lời rõ</h3>\n<p class=\"body-txt\">\nràng để xây dựng và vận hành một doanh nghiệp thành công. Diễn giả nhấn mạnh việc tìm\n \nphân khúc khách hàng, giá trị cốt lõi, liên tục đổi mới sản phẩm, và đặc biệt là chất lượng sản\n \nphẩm/dịch vụ là chìa khóa quyết định danh tiếng. Học viên phải tính toán chi phí, lợi nhuận,\n \nđiểm hòa vốn và phân biệt rõ cách phục vụ sản phẩm và phục vụ khách hàng. Kết thúc buổi\n \nhọc, diễn giả khẳng định hai yếu tố then chốt cho thành công là marketing và đổi mới\n \n(innovation).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sau khi tìm được phân khúc khách hàng và giá trị cốt lõi, doanh nghiệp cần liên tục tạo</span></div>\n<p class=\"body-txt\">\nra những sản phẩm mới.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chất lượng sản phẩm và dịch vụ là chìa khóa quyết định danh tiếng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Để đo lường chất lượng sản phẩm và dịch vụ, hãy lắng nghe khách hàng nói &quot;Đây là một</span></div>\n<p class=\"body-txt\">\nsản phẩm tuyệt vời&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Những câu hỏi quan trọng cần ghi nhớ để kinh doanh thành công:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ai là khách hàng lý tưởng của tôi?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Họ mong muốn điều gì?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sản phẩm tốt nhất bán cho họ là gì?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sản phẩm được bán ra như thế nào?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ai sẽ là người bán sản phẩm đó?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bao nhiêu tiền cho một sản phẩm và lãi bao nhiêu tiền cho một sản phẩm?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sản phẩm được giao cho khách hàng như thế nào?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chi phí cho mỗi sản phẩm là bao nhiêu (bao gồm chi phí mua hàng, lưu kho, vận chuyển,</span></div>\n<p class=\"body-txt\">\nlắp đặt, tiền lãi, nhân công và các chi phí khác)?\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sản phẩm được phục vụ như thế nào?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Khách hàng được phục vụ như thế nào (phân biệt rõ cách phục vụ sản phẩm và cách</span></div>\n<p class=\"body-txt\">\nphục vụ khách hàng, ví dụ sản phẩm dọn lên đĩa, nhưng khách hàng được phục vụ bởi cô\n \ngái mang đĩa đến)?\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ai là người làm những điều này?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Giá trị mà bạn có thể thêm vào cho sản phẩm/dịch vụ của bạn là gì?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Giá trị *duy nhất* chỉ có bạn mới có thể thêm vào sản phẩm/dịch vụ là gì?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Về mặt tài chính, cần tính được:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Giá vốn hàng bán.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Lợi nhuận ròng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Điểm hòa vốn (bán bao nhiêu sản phẩm một tháng thì hòa vốn).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nếu không trả lời được rõ ràng và cụ thể từng câu hỏi trên, thì không nên kinh doanh</span></div>\n<p class=\"body-txt\">\nmà nên đi làm thuê.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Trong kinh doanh để thành công, cần chú ý đến hai việc: Marketing và Đổi mới</span></div>\n<p class=\"body-txt\">\n(Innovation).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Đổi mới (Innovation) là việc làm một số việc nhiều hơn, bớt đi một số việc, dừng một số</span></div>\n<p class=\"body-txt\">\nviệc và làm thêm một việc gì mới.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chất lượng sản phẩm và dịch vụ là chìa khóa quyết định danh tiếng, và nó được đo</span></div>\n<p class=\"body-txt\">\nlường bằng chính lời nhận xét &quot;Đây là một sản phẩm tuyệt vời&quot; từ khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">*Vì sao quan trọng:* Diễn giả không chỉ nói về chất lượng mà còn đưa ra một cách đo</span></div>\n<p class=\"body-txt\">\nlường cụ thể, trực tiếp từ cảm nhận của khách hàng. Điều này nhấn mạnh rằng danh\n \ntiếng thực sự đến từ sự hài lòng của người dùng cuối, không phải chỉ các chỉ số nội bộ.\n \nNó định hướng doanh nghiệp phải thực sự tập trung vào việc tạo ra trải nghiệm xuất sắc\n \nđể khách hàng tự nguyện khen ngợi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Việc trả lời rõ ràng và cụ thể từng câu hỏi kinh doanh cốt lõi là điều kiện tiên quyết cho</span></div>\n<p class=\"body-txt\">\nsự thành công; nếu không, thì không nên kinh doanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">*Vì sao quan trọng:* Đây là lời cảnh báo mạnh mẽ và rất thực tế. Nó cho thấy rằng kinh</span></div>\n<p class=\"body-txt\">\ndoanh không phải là một trò chơi may rủi hay dựa vào cảm tính, mà đòi hỏi sự hiểu biết\n \nsâu sắc, chi tiết về mọi khía cạnh từ khách hàng, sản phẩm, chi phí đến giá trị độc đáo.\n \nNếu thiếu nền tảng này, mọi nỗ lực kinh doanh đều có thể dẫn đến thất bại và thiệt hại,\n \nthậm chí diễn giả khuyên nên đi làm thuê.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Hai yếu tố cốt lõi để thành công trong kinh doanh là Marketing và Đổi mới (Innovation).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">*Vì sao quan trọng:* Marketing giúp đưa sản phẩm đến khách hàng và tạo ra doanh thu.</span></div>\n<p class=\"body-txt\">\nTuy nhiên, Đổi mới (Innovation) mới là yếu tố giúp doanh nghiệp duy trì sức cạnh tranh,\n \nphát triển bền vững và thích ứng với thị trường thay đổi. Đổi mới không chỉ là tạo ra cái\n \nmới hoàn toàn, mà còn bao gồm việc tối ưu hóa, loại bỏ những thứ không hiệu quả và cải\n \nthiện những gì đang có, liên tục nâng cao giá trị và hiệu suất.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Để đo lường được sản phẩm và dịch vụ thì đo lường câu nói: &#x27;Đây là một sản phẩm tuyệt vời&#x27;\n \ntừ khách hàng.”\n \n“Nếu bạn không thể trả lời rõ ràng và cụ thể từng câu hỏi ở bên trên thì không kinh doanh\n \nnữa.”\n \n“Đổi mới đó là làm một số việc bạn cần phải làm nhiều hơn. Bớt đi một số việc và làm một số\n \nviệc nhiều hơn. Dừng một số việc và làm thêm một việc gì mới.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 28: Thang và phễu</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi giảng tập trung vào hai hoạt động cốt lõi của doanh nghiệp là marketing và</h3>\n<p class=\"body-txt\">\nđổi mới liên tục. Để đạt được kết quả mới, cả cá nhân và công việc kinh doanh đều phải\n \nkhông ngừng đổi mới, vượt qua giới hạn của chính mình và cải thiện mỗi ngày. Diễn giả giới\n \nthiệu mô hình kinh doanh dựa trên hệ thống phễu và thang bậc sản phẩm, trong đó sản\n \nphẩm miễn phí (mồi câu) đóng vai trò quan trọng để khách hàng trải nghiệm, từ đó dẫn dắt\n \nhọ leo lên &quot;thang sản phẩm&quot; để trở thành &quot;Raving Fan&quot; (khách hàng cuồng nhiệt).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Hai hoạt động quan trọng nhất của doanh nghiệp là marketing và đổi mới.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Không thể dùng cách cũ để đạt được kết quả mới; cần liên tục đổi mới bản thân và công</span></div>\n<p class=\"body-txt\">\nviệc kinh doanh, vì điều tốt của hôm nay có thể không còn tốt ngày mai.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Kẻ thù lớn nhất của con người là chính mình; phải chiến thắng chính mình mỗi ngày.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cần lập kế hoạch để ngày mai tốt hơn ngày hôm nay bằng cách bỏ đi một số việc cũ và</span></div>\n<p class=\"body-txt\">\nlàm thêm/làm mới một số việc khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Xây dựng mô hình kinh doanh dựa trên hệ thống phễu (sales funnel).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Thiết kế &quot;thang bậc khách hàng&quot; để biến khách hàng mua một lần thành &quot;Raving Fan&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phát triển &quot;thang sản phẩm&quot; (product ladder) để dẫn dắt khách hàng từ sản phẩm này</span></div>\n<p class=\"body-txt\">\nsang sản phẩm khác, với các sản phẩm mới được bổ sung liên tục.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mô hình &quot;mồi câu và lưỡi câu&quot; (bait and hook) là một chiến lược hiệu quả, trong đó cung</span></div>\n<p class=\"body-txt\">\ncấp sản phẩm miễn phí (&quot;mồi câu&quot;) giúp khách hàng trải nghiệm không rủi ro, từ đó\n \n&quot;biết&quot; (know) về doanh nghiệp.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tư duy đổi mới liên tục và vượt qua chính mình: Diễn giả nhấn mạnh &quot;Không thể làm</span></div>\n<p class=\"body-txt\">\ntheo cái cũ để có được kết quả mới&quot; và &quot;Kẻ thù lớn nhất của con người là ai? ... Là chính\n \nmình. ... bạn phải chiến thắng chính mình mỗi ngày.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là nền tảng cho mọi sự phát triển. Nếu cá nhân và doanh nghiệp</span></div>\n<p class=\"body-txt\">\nkhông chấp nhận thay đổi và không ngừng cải thiện bản thân, họ sẽ không thể thích nghi\n \nvới thị trường luôn biến động và sẽ nhanh chóng bị bỏ lại phía sau. Nó đặt trách nhiệm\n \nlên chính chủ doanh nghiệp và đội ngũ của mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Xây dựng mô hình kinh doanh dựa trên hệ thống phễu và thang sản phẩm: Việc thiết kế</span></div>\n<p class=\"body-txt\">\nmột chuỗi sản phẩm/dịch vụ theo thang bậc để dẫn dắt khách hàng từ những tương tác\n \nđầu tiên cho đến khi trở thành &quot;Raving Fan&quot; là cực kỳ quan trọng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Mô hình này tối ưu hóa giá trị trọn đời của khách hàng (Customer</span></div>\n<p class=\"body-txt\">\nLifetime Value) thay vì chỉ tập trung vào một giao dịch duy nhất. Nó giúp xây dựng mối\n \nquan hệ lâu dài, tăng doanh thu bền vững, giảm chi phí tìm kiếm khách hàng mới và tạo\n \nra một hệ thống kinh doanh có khả năng mở rộng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chiến lược &quot;Mồi câu và lưỡi câu&quot; (sản phẩm miễn phí): Cung cấp sản phẩm hoặc dịch vụ</span></div>\n<p class=\"body-txt\">\nmiễn phí ở đầu phễu để khách hàng có cơ hội trải nghiệm mà không gặp rủi ro, từ đó họ\n \n&quot;biết&quot; về doanh nghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là cách hiệu quả để phá vỡ rào cản ban đầu, thu hút một lượng</span></div>\n<p class=\"body-txt\">\nlớn khách hàng tiềm năng và xây dựng niềm tin. Khi khách hàng đã có trải nghiệm tích\n \ncực và không rủi ro, họ sẽ sẵn sàng hơn để tiến lên các bậc tiếp theo của thang sản phẩm,\n \nmua các dịch vụ có giá trị cao hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Bạn không thể làm theo cái cũ để có được kết quả mới.”\n \n“Kẻ thù lớn nhất của con người là ai? Là chính mình.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Ngày mai phải tốt hơn ngày hôm nay.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 29: LVC - Sản phẩm miễn phí</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi giảng tập trung vào khái niệm Giá trị trọn đời của khách hàng (LVC - Lifetime</h3>\n<p class=\"body-txt\">\nValue Customer) và cách tối đa hóa nó. Để đạt được điều này, doanh nghiệp cần xây dựng\n \nmột &quot;phễu sản phẩm&quot; đa dạng nhưng có một &quot;cốt lõi&quot; giá trị xuyên suốt. Diễn giả nhấn mạnh\n \nchiến lược &quot;cửa trước miễn phí, chất lượng cao&quot; để thu hút và lọc khách hàng tiềm năng, từ\n \nđó dẫn dắt họ đến các sản phẩm trả phí ở &quot;cửa sau&quot;, đảm bảo nguồn doanh thu bền vững và\n \ntăng trưởng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Giới thiệu khái niệm LVC (Lifetime Value Customer) – Giá trị trọn đời của một khách</span></div>\n<p class=\"body-txt\">\nhàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">LVC là tổng số tiền khách hàng chi trả từ lúc bắt đầu làm khách hàng cho đến khi họ</span></div>\n<p class=\"body-txt\">\nkhông mua hàng nữa (hoặc doanh nghiệp đóng cửa).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ví dụ minh họa LVC qua chiến lược của Samsung: sẵn sàng chi 2000 USD để có một</span></div>\n<p class=\"body-txt\">\nkhách hàng mới (chuyển từ iPhone sang) vì khách đó sẽ mua rất nhiều sản phẩm\n \nSamsung khác (điện thoại, TV, máy giặt, tủ lạnh...) trong suốt cuộc đời, mang lại giá trị\n \nhàng chục ngàn đô.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Để tăng LVC, cần đa dạng hóa sản phẩm và tập hợp chúng vào một &quot;cốt lõi&quot; giá trị xuyên</span></div>\n<p class=\"body-txt\">\nsuốt.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Cốt lõi&quot; này là đặc tính/giá trị mà mọi sản phẩm phải mang trong mình; khi thiết kế sản</span></div>\n<p class=\"body-txt\">\nphẩm, nếu không có đặc tính này thì không xếp vào cùng nhóm sản phẩm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Trình bày mô hình &quot;Phễu sản phẩm&quot;: khách hàng đi từ sản phẩm ban đầu (trên) xuống</span></div>\n<p class=\"body-txt\">\ncác sản phẩm tiếp theo (dưới). Phễu này cũng phải có một &quot;lõi&quot; xuyên suốt từ trên xuống\n \ndưới.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Diễn giả dạy &quot;phương pháp&quot; để tự làm, tự tạo ra kiến thức và mô hình kinh doanh,</span></div>\n<p class=\"body-txt\">\nkhông chỉ truyền đạt kiến thức sẵn có.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Công thức để gia tăng LVC là tăng doanh thu trung bình trên mỗi đơn hàng VÀ tăng số</span></div>\n<p class=\"body-txt\">\nlần mua lặp lại (số lần mua trung bình).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Giới thiệu khái niệm &quot;Cửa trước&quot; (Front End - FE) và &quot;Cửa sau&quot; (Back End - BE).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Cửa trước&quot; là nơi thu hút khách hàng ban đầu bằng sản phẩm &quot;miễn phí nhưng có giá</span></div>\n<p class=\"body-txt\">\ntrị cao&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Cửa sau&quot; là các sản phẩm trả phí mà khách hàng sẽ mua sau khi đã trải nghiệm sản</span></div>\n<p class=\"body-txt\">\nphẩm cửa trước.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Việc quan trọng là đưa thật nhiều khách hàng vào &quot;cửa trước&quot; bằng sản phẩm miễn phí</span></div>\n<p class=\"body-txt\">\ncó chất lượng cao.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Trong sản phẩm &quot;miễn phí có giá trị cao&quot; ở cửa trước, cần thiết kế &quot;cái lõi&quot; thật rõ ràng,</span></div>\n<p class=\"body-txt\">\nnó đóng vai trò là &quot;bộ lọc khách hàng&quot; (qualify).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bước &quot;qualify&quot; (lọc/đạt chuẩn): chỉ làm việc, bán hàng hoặc dạy cho những khách hàng</span></div>\n<p class=\"body-txt\">\nđạt chuẩn theo &quot;cái lõi&quot; này. Nếu khách hàng không đạt chuẩn thì bỏ qua, đừng lo lắng\n \nnếu họ không nhận sản phẩm miễn phí.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cốt lõi xuyên suốt cho tất cả sản phẩm: Diễn giả nhấn mạnh rằng mọi sản phẩm, dù đa</span></div>\n<p class=\"body-txt\">\ndạng đến đâu, đều phải có một &quot;lõi&quot; giá trị chung và xuyên suốt. Điều này quan trọng vì\n \nnó không chỉ tạo ra sự nhất quán trong thương hiệu mà còn giúp định hình chiến lược\n \nsản phẩm tổng thể, đảm bảo mỗi sản phẩm đều góp phần củng cố giá trị cốt lõi và nuôi\n \ndưỡng lòng trung thành của khách hàng, từ đó tối đa hóa LVC. Nó giúp doanh nghiệp\n \nkhông bị phân tán mà tập trung vào một giá trị cốt lõi duy nhất.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chiến lược &quot;Cửa trước miễn phí, giá trị cao&quot; và &quot;Cửa sau&quot;: Đây là một công cụ mạnh mẽ</span></div>\n<p class=\"body-txt\">\nđể thu hút, xây dựng lòng tin và chuyển đổi khách hàng. Việc cung cấp một sản phẩm\n \nmiễn phí nhưng có chất lượng và giá trị thực sự cao ở &quot;cửa trước&quot; giúp phá vỡ rào cản\n \nban đầu, chứng minh năng lực và tạo thiện cảm với khách hàng tiềm năng. Từ đó, họ sẽ\n \ndễ dàng hơn để tin tưởng và mua các sản phẩm trả phí ở &quot;cửa sau&quot;. Điểm mấu chốt là\n \n*miễn phí nhưng phải chất lượng cao*, nếu không sẽ không có tác dụng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Lọc khách hàng (Qualify) thông qua cốt lõi ở cửa trước: Cái &quot;lõi&quot; của sản phẩm miễn phí</span></div>\n<p class=\"body-txt\">\nkhông chỉ là giá trị mà còn đóng vai trò là &quot;bộ lọc&quot; khách hàng. Việc thiết kế sản phẩm\n \nmiễn phí để nó làm rõ &quot;lõi&quot; này giúp doanh nghiệp xác định được ai là khách hàng thực\n \nsự tiềm năng, có nhu cầu phù hợp và trân trọng giá trị mình mang lại. Điều này cực kỳ\n \nquan trọng để tối ưu hóa nguồn lực, tránh lãng phí thời gian và công sức vào những\n \nkhách hàng không phù hợp, chỉ tập trung vào những người có khả năng trở thành LVC\n \ncao.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Giá trị trọn đời của một khách hàng, tức là từ lúc họ vào trong chúng ta trở thành khách\n \nhàng cho đến khi mà họ không mua hàng nữa hoặc họ chết hoặc chúng ta đóng cửa thì họ chi\n \ntrả cho chúng ta bao tiền.”\n \n“Đau đầu cửa trước, sung sướng cửa sau.”\n \n“Cái lõi này nó sẽ là cái lõi để mà xuyên suốt toàn bộ cái hành trình này. Cho nên nó giống như\n \ncái filter, cái lọc, cái bộ lọc khách hàng.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 30: LVC - Con cá và lưỡi câu</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi giảng này tập trung vào chiến lược kinh doanh thông qua phép ẩn dụ câu cá,</h3>\n<p class=\"body-txt\">\nnhấn mạnh việc xác định đúng khách hàng tiềm năng (&quot;cá&quot;), mồi câu (&quot;sản phẩm miễn phí&quot;),\n \nlưỡi câu (&quot;phễu&quot;) và kênh tiếp cận (&quot;hồ nước&quot;). Mục tiêu cốt lõi là tạo ra sự thay đổi cho\n \nkhách hàng và tăng giá trị vòng đời khách hàng (LVC) bằng cách thiết kế một hệ thống sản\n \nphẩm đa dạng nhưng có chung giá trị cốt lõi. Diễn giả cũng đưa ra cách kiểm tra hiệu quả\n \nbằng cách theo dõi trạng thái, sự tập trung và câu chuyện của học viên.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mô hình kinh doanh theo phép ẩn dụ câu cá:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cá: Xác định đúng &quot;con cá&quot; muốn câu – là khách hàng tiềm năng.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mồi: Xác định &quot;mồi câu&quot; mà cá thích ăn – là sản phẩm miễn phí.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Lưỡi câu: Xác định &quot;lưỡi câu&quot; sử dụng – là phễu (hệ thống phễu được thiết kế).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Hồ nước/Kênh: Xác định nơi câu cá – là kênh phân phối (channel, địa điểm nơi có cá).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Định nghĩa lại các yếu tố kinh doanh:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Khách hàng tiềm năng = &quot;Cá&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sản phẩm miễn phí = &quot;Mồi câu&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phễu = &quot;Lưỡi câu&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Kênh phân phối = &quot;Hồ nước&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mục tiêu của kinh doanh: Để kinh doanh thành công, phải xác định đúng loại cá, đúng</span></div>\n<p class=\"body-txt\">\nloại mồi nó ăn, đúng loại lưỡi câu và đúng nơi có cá để câu. Trong mô hình kinh doanh,\n \nđó là xác định đúng Customer Segment, Value Proposition, Activity, Resource và\n \nChannel.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Need &amp; Want (Lõi): Khách hàng tiềm năng lấy mồi câu của ta vì nó giải quyết được nhu</span></div>\n<p class=\"body-txt\">\ncầu/mong muốn (Need &amp; Want) của họ. Tất cả các sản phẩm tiếp theo (sản phẩm 2, 3, 4,\n \n5...) cũng phải có chung cái &quot;lõi&quot; nhu cầu/mong muốn này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mục tiêu khóa học/sản phẩm: Phải tạo ra sự thay đổi cho người học/khách hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cách kiểm tra sự thay đổi:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Trạng thái (Physiology): Quan sát trạng thái của học viên/khách hàng (ví dụ: sẵn sàng</span></div>\n<p class=\"body-txt\">\nhọc hay chán nản).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tập trung (Focus): Xem họ đang tập trung vào điều gì (tích cực hay tiêu cực).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Câu chuyện (Story): Nghe những câu chuyện họ kể.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tăng giá trị vòng đời khách hàng (LVC - Lifetime Value of Customer):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Hệ thống sản phẩm đa dạng và xuyên suốt giúp khách hàng mua nhiều lần hơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Khách hàng trải nghiệm sản phẩm 1, nếu thích sẽ mua tiếp sản phẩm 2, 3, 4, 5.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nếu không có hệ thống này, khách hàng có thích cũng không mua được gì thêm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sự đa dạng của sản phẩm: Vô cùng quan trọng nhưng phải có chung một giá trị cốt lõi</span></div>\n<p class=\"body-txt\">\n(Value Proposition - VP).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mô hình câu cá cho chiến lược kinh doanh: Đây là một ẩn dụ mạnh mẽ và dễ hiểu, giúp</span></div>\n<p class=\"body-txt\">\nđơn giản hóa các khái niệm phức tạp về thị trường mục tiêu, sản phẩm, kênh phân phối\n \nvà chiến lược tiếp thị. Nó quan trọng vì nó cung cấp một khung tư duy rõ ràng để bất kỳ\n \ndoanh nghiệp nào cũng có thể áp dụng để định hình và đánh giá chiến lược của mình\n \nmột cách hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Need &amp; Want (Giá trị cốt lõi) là &quot;Lõi&quot;: Điểm này nhấn mạnh rằng tất cả các sản phẩm, đặc</span></div>\n<p class=\"body-txt\">\nbiệt là các sản phẩm trong &quot;phễu&quot; tiếp theo, phải liên quan và giải quyết cùng một nhu\n \ncầu hoặc mong muốn cốt lõi của khách hàng. Điều này quan trọng vì nó đảm bảo sự nhất\n \nquán trong giá trị cung cấp, xây dựng lòng tin và sự gắn kết của khách hàng, đồng thời\n \ntối ưu hóa việc chuyển đổi và giữ chân khách hàng qua các sản phẩm khác nhau.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mục tiêu cuối cùng là tạo ra &quot;Sự thay đổi&quot;: Dù kinh doanh hay giảng dạy, sản phẩm/dịch</span></div>\n<p class=\"body-txt\">\nvụ phải mang lại một sự thay đổi tích cực cho khách hàng. Điều này quan trọng vì nó\n \nchuyển trọng tâm từ việc chỉ bán hàng sang việc tạo ra giá trị thực sự. Khi khách hàng\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><p class=\"body-txt\">\ntrải nghiệm sự thay đổi tích cực, họ sẽ gắn bó, tin tưởng và trở thành khách hàng trung\n \nthành, đồng thời là kênh marketing truyền miệng hiệu quả nhất.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Thứ nhất là chúng ta phải xác định được là chúng ta đi câu con gì ạ? ... Đúng rồi, chúng ta\n \nphải đi xác định rõ con cá này là khách hàng tiềm năng.”\n \n“Khi ta chọn cái mặt hàng ta đưa lên thì ta phải có đủ cái lõi này ở xuyên suốt.”\n \n“Sự đa dạng của sản phẩm là vô cùng quan trọng. Nhưng mà đã là đa dạng thì phải đa dạng\n \ncùng chung cái gì ạ? Chung cái giá trị cốt lõi.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 31: Chiến lược tăng LVC</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi giảng này tập trung vào chiến lược xây dựng hệ thống phễu bán hàng để tối</h3>\n<p class=\"body-txt\">\nđa hóa giá trị trọn đời của khách hàng (LVC - Lifetime Value of Customer). Diễn giả trình bày\n \ncách sử dụng sản phẩm miễn phí chất lượng cao để thu hút khách hàng, sau đó chuyển đổi\n \nhọ thành người mua các sản phẩm tiêu dùng liên tục, và áp dụng chiến lược upsell/downsell\n \nđể tăng doanh thu và giữ chân khách hàng. Mục tiêu cuối cùng là xây dựng lòng trung thành,\n \nbiến khách hàng thành &quot;raving fan&quot; (người hâm mộ cuồng nhiệt) thông qua chuỗi sản phẩm\n \nđược thiết kế có chủ đích.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sản phẩm miễn phí chất lượng cao (Free Product): Dùng để thu hút khách hàng, không</span></div>\n<p class=\"body-txt\">\ncần bao phủ toàn bộ thị trường, chỉ cần một phân khúc nhỏ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sản phẩm tiêu dùng liên tục (Continuously Consumed Product): Đây là bí quyết để giữ</span></div>\n<p class=\"body-txt\">\nkhách hàng trong cuộc trò chuyện (&quot;keep them in conversation&quot;) và tạo doanh thu đều\n \nđặn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">*Ví dụ:* Bán máy lọc nước rồi bán lõi lọc định kỳ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">*Kỹ thuật:* Định kỳ (ví dụ 3 tháng) gửi email/tin nhắn nhắc nhở thay thế lõi lọc, nhấn</span></div>\n<p class=\"body-txt\">\nmạnh rằng lõi cũ dù vẫn tốt nhưng &quot;sức khỏe có thể bị ảnh hưởng&quot;. Đồng thời, cử chuyên\n \ngia đến thay và giới thiệu sản phẩm máy lọc nước/lõi lọc mới tốt hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sản phẩm Upsell (Bán kèm): Sản phẩm có liên quan được bán thêm khi khách hàng đã</span></div>\n<p class=\"body-txt\">\nmua sản phẩm chính.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">*Quy tắc lựa chọn:* Luôn đưa ra lựa chọn &quot;có-có&quot; (Yes-Yes), không bao giờ là &quot;Yes-No&quot;.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ví dụ: &quot;Tráng miệng bằng thạch rau câu hay hoa quả?&quot;, thay vì &quot;Có tráng miệng không?&quot;.</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">*Mục tiêu:* Upsell liên tục cho đến khi khách hàng không mua nữa thì thôi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sản phẩm Downsell: Nếu khách hàng từ chối mua sản phẩm upsell, cung cấp một sản</span></div>\n<p class=\"body-txt\">\nphẩm có giá trị thấp hơn hoặc khác loại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Miễn phí (quay lại): Nếu khách hàng vẫn không mua sản phẩm downsell, cho họ một sản</span></div>\n<p class=\"body-txt\">\nphẩm miễn phí để kéo họ trở lại vào phễu và bắt đầu lại chu trình upsell.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Hệ thống Phễu (Sales Funnel): Tổng hợp các chiến lược sản phẩm đa dạng (miễn phí,</span></div>\n<p class=\"body-txt\">\ntiêu dùng liên tục, upsell, downsell) để luân chuyển khách hàng qua các tầng, tối ưu hóa\n \ndoanh thu và LVC.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">*Cấu trúc phễu:*</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tầng ngoài: Thị trường mục tiêu (Niche).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tầng 1 (Free Product): Lead (khách hàng tiềm năng, đã cung cấp thông tin để nhận miễn</span></div>\n<p class=\"body-txt\">\nphí).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tầng 2 (Sản phẩm tiêu dùng liên tục): Shopper (người mua hàng lần đầu).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tầng 3 (Upsell): Customer (khách hàng, mua thường xuyên hơn).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tầng 4 (Upsell tiếp): Member (thành viên, quen thuộc và mua nhiều).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tầng 5 (Upsell cao cấp): Advocate (người ủng hộ, giới thiệu).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tầng 6 (Sản phẩm back-end giá rất cao): Raving Fan (người hâm mộ cuồng nhiệt).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Lượng khách hàng giảm dần theo các tầng phễu từ trên xuống dưới.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Giá trị trọn đời của khách hàng (LVC): Tính toán giá trị trung bình mà một khách hàng</span></div>\n<p class=\"body-txt\">\nmang lại trong suốt quá trình tương tác với doanh nghiệp. Việc này cho phép doanh\n \nnghiệp biết mình sẵn sàng chi bao nhiêu tiền để có được một khách hàng miễn phí.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Lợi ích của hệ thống phễu: Giúp khách hàng dễ dàng mua hàng hơn, người bán dễ dàng</span></div>\n<p class=\"body-txt\">\nbán hàng hơn và tăng độ trung thành của khách hàng theo thời gian.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chiến lược sản phẩm tiêu dùng liên tục và &quot;Keep them in conversation&quot;: Đây là chìa khóa</span></div>\n<p class=\"body-txt\">\nđể duy trì mối quan hệ liên tục với khách hàng và tạo ra dòng doanh thu ổn định. Việc\n \nđịnh kỳ nhắc nhở khách hàng về nhu cầu thay thế (dù sản phẩm cũ vẫn dùng được\n \nnhưng có &quot;nguy cơ&quot; tiềm ẩn) không chỉ thúc đẩy doanh số mà còn giữ tương tác, tạo\n \ndựng lòng tin qua dịch vụ chăm sóc, biến mỗi lần tiếp xúc thành cơ hội bán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nguyên tắc lựa chọn &quot;có-có&quot; trong Upsell: Thay vì hỏi câu hỏi đóng &quot;có-không&quot; dễ dẫn</span></div>\n<p class=\"body-txt\">\nđến từ chối, việc đưa ra hai lựa chọn tích cực giúp khách hàng cảm thấy họ có quyền\n \nkiểm soát, đồng thời vẫn dẫn dắt họ đến việc mua thêm sản phẩm, dịch vụ, từ đó tăng giá\n \ntrị đơn hàng mà không gây khó chịu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Hệ thống Phễu (Sales Funnel) và LVC: Phễu không chỉ là một chuỗi bán hàng mà là một</span></div>\n<p class=\"body-txt\">\nchiến lược toàn diện để xây dựng lòng trung thành và tối đa hóa giá trị trọn đời của\n \nkhách hàng. Việc hiểu và tính toán LVC giúp doanh nghiệp nhận ra giá trị thực sự của\n \nmỗi khách hàng tiềm năng, từ đó sẵn sàng đầu tư chi phí marketing để thu hút họ, ngay\n \ncả khi sản phẩm đầu tiên được cung cấp miễn phí. Điều này dịch chuyển tư duy từ giao\n \ndịch đơn lẻ sang mối quan hệ dài hạn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Keep them in conversation.”\n \n“Bán phở thì phải bán gì? Bán quẩy.”\n \n“Chúng ta sẽ sẵn sàng bỏ ra 20 đô la để có một khách hàng miễn phí.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 32: Quảng cáo dựa trên cốt lõi sản phẩm</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi học này tập trung giải quyết vấn đề quảng cáo trên Facebook cho các sản</h3>\n<p class=\"body-txt\">\nphẩm bị hạn chế (như dược phẩm, thực phẩm chức năng, đa cấp) thường xuyên gặp phải\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><p class=\"body-txt\">\ntình trạng bị cấm hoặc thay đổi chính sách. Diễn giả hướng dẫn một chiến lược cốt lõi: thay\n \nvì quảng cáo trực tiếp sản phẩm hay thương hiệu, hãy tập trung vào &quot;cái lõi&quot; – tức là lợi ích\n \nvà kết quả thực tế mà khách hàng sẽ đạt được. Kỹ thuật này giúp lách các quy định quảng\n \ncáo nghiêm ngặt mà vẫn thu hút khách hàng hiệu quả bằng cách đánh vào mong muốn và\n \ncảm xúc của họ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nhiều công ty thuộc các ngành nghề đặc thù (phân phối đa cấp, dược phẩm, thực phẩm</span></div>\n<p class=\"body-txt\">\nchức năng) gặp khó khăn trong việc quảng cáo trên Facebook do bị cấm hoặc yêu cầu\n \ncấp phép liên tục khi chính sách thay đổi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sai lầm phổ biến của đa số là quảng cáo trực tiếp &quot;sản phẩm&quot; hoặc &quot;thương hiệu&quot; của</span></div>\n<p class=\"body-txt\">\nmình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Giải pháp cốt lõi là không quảng cáo sản phẩm, mà quảng cáo &quot;cái lõi&quot; của nó.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Cái lõi&quot; ở đây được định nghĩa là &quot;tính năng&quot; hoặc &quot;lợi ích&quot; mà sản phẩm mang lại cho</span></div>\n<p class=\"body-txt\">\nkhách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cần tập trung quảng cáo vào &quot;lợi ích của sản phẩm&quot;, tức là những gì khách hàng *có thể</span></div>\n<p class=\"body-txt\">\nđạt được* sau khi sử dụng sản phẩm/dịch vụ. Ví dụ: &quot;tạo nên sự đột phá cho sự phát\n \ntriển của kinh doanh&quot; thay vì &quot;khóa học kinh doanh đột phá&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Khi đưa ra lời kêu gọi hành động, hãy liên kết trực tiếp với lợi ích mà khách hàng nhận</span></div>\n<p class=\"body-txt\">\nđược (ví dụ: &quot;Nếu biết bí quyết đó, bấm vào đây&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Lưu ý riêng: Facebook cấm các hình ảnh &quot;before &amp; after&quot; (trước và sau). Thay vào đó,</span></div>\n<p class=\"body-txt\">\nhãy sử dụng ngôn ngữ để diễn đạt mong muốn đạt được kết quả đó một cách tích cực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Kỹ thuật này có thể áp dụng rộng rãi cho nhiều ngành khác như bảo hiểm nhân thọ,</span></div>\n<p class=\"body-txt\">\ndược, thuốc và thực phẩm chức năng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chuyển đổi từ quảng cáo &quot;sản phẩm/thương hiệu&quot; sang &quot;lợi ích/kết quả&quot;: Đây là chiến</span></div>\n<p class=\"body-txt\">\nlược marketing cốt lõi và quan trọng nhất được diễn giả nhấn mạnh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Nó giúp các doanh nghiệp trong ngành bị hạn chế vượt qua rào cản</span></div>\n<p class=\"body-txt\">\nkiểm duyệt của các nền tảng quảng cáo như Facebook một cách hợp pháp và hiệu quả.\n \nĐồng thời, nó trực tiếp đánh vào tâm lý khách hàng vì người tiêu dùng luôn quan tâm\n \nđến *giá trị họ nhận được* (lợi ích, giải pháp, kết quả) hơn là bản thân tính năng hay tên\n \ngọi của sản phẩm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Kỹ thuật "<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Linh hoạt trong truyền tải thông điệp khi kênh bị hạn chế: Ví dụ về việc Facebook cấm</span></div>\n<p class=\"body-txt\">\nhình ảnh &quot;before &amp; after&quot; nhưng vẫn có thể truyền tải thông điệp mong muốn thông qua\n \nngôn ngữ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Điều này dạy về sự sáng tạo và thích ứng trong marketing. Khi một</span></div>\n<p class=\"body-txt\">\nphương tiện truyền tải thông điệp bị chặn (ví dụ: hình ảnh), cần phải tìm cách khác để\n \nđạt được mục tiêu (ví dụ: dùng ngôn ngữ gợi hình ảnh, gợi cảm xúc về kết quả mong\n \nmuốn).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Các anh chị đừng có quảng cáo cái sản phẩm. Mà quảng cáo cái gì ạ? Quảng cáo cái lõi cho\n \ntôi.”\n \n“Tập trung vào quảng cáo cái lợi ích của sản phẩm.”\n \n“Bạn có thể có một cái cổ họng nói liên tục, hoạt động liên tục như cổ trong 50 ngày mà không\n \nhề gặp vấn đề gì.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Chương 6</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 33: Bài tập - Trả lời các câu hỏi</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi giảng tập trung vào việc định nghĩa và phân biệt rõ ràng giữa &quot;công việc&quot; và</h3>\n<p class=\"body-txt\">\n&quot;kinh doanh&quot; dựa trên mục đích cá nhân và mục đích của doanh nghiệp. Diễn giả trình bày\n \nmột khuôn khổ gồm 5 bước (xác định điểm xuất phát, điểm đến, khoảng cách, khó khăn và\n \nchiến lược vượt qua) để lập &quot;bản đồ&quot; cho mọi mục tiêu trong cuộc sống và kinh doanh. Cốt\n \nlõi là sự cần thiết phải yêu thích khách hàng chứ không phải sản phẩm, tạo ra giá trị vượt\n \ntrội và có chiến lược thoát khỏi doanh nghiệp khi nó không còn phục vụ mục đích cá nhân.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mục đích của một doanh nghiệp: Thay đổi cuộc sống của khách hàng của bạn và tạo ra</span></div>\n<p class=\"body-txt\">\nmột hệ thống có giá trị cho xã hội.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phục vụ khách hàng: Doanh nghiệp cần phải phục vụ khách hàng một cách vô cùng đặc</span></div>\n<p class=\"body-txt\">\nbiệt và duy nhất, liên tục cho họ những điều họ muốn và cần.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Lợi nhuận: Tạo ra lợi nhuận là quan trọng, nhưng nếu chỉ tạo lợi nhuận mà không đáp</span></div>\n<p class=\"body-txt\">\nứng được nhu cầu của khách hàng thì công việc kinh doanh sẽ không lâu dài.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mục đích cá nhân từ doanh nghiệp: Một doanh nghiệp lý tưởng là tạo ra một hệ thống ổn</span></div>\n<p class=\"body-txt\">\nđịnh cho phép bạn liên tục nâng cao chất lượng sống của mình và cuộc sống của những\n \nngười bạn phục vụ, hướng tới sự viên mãn, tự do, và sống cuộc đời mơ ước.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Lỗi tư duy phổ biến: Hầu hết mọi người quan tâm tới *làm việc* chứ không quan tâm tới</span></div>\n<p class=\"body-txt\">\n*kết quả*.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Điều gì làm cho công việc kinh doanh phát triển: Tạo ra giá trị cho khách hàng lớn hơn</span></div>\n<p class=\"body-txt\">\nbất kỳ người nào trên thị trường.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bí mật: Yêu thích khách hàng chứ không yêu thích sản phẩm. (Bạn phải yêu thích khách</span></div>\n<p class=\"body-txt\">\nhàng chứ không phải là sản phẩm).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Công việc vs. Kinh doanh: Nếu doanh nghiệp của bạn đáp ứng *nhu cầu của bạn* chứ</span></div>\n<p class=\"body-txt\">\nkhông phải *nhu cầu của khách hàng*, thì đó là công việc chứ không phải kinh doanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phân biệt mục đích: Cần có sự phân biệt giữa mục đích của doanh nghiệp (phục vụ khách</span></div>\n<p class=\"body-txt\">\nhàng) và mục đích của cá nhân (những gì bạn lấy ra được từ doanh nghiệp). Hai mục\n \nđích này khác nhau hoàn toàn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chiến lược thoát: Bạn cần có chiến lược thoát khỏi doanh nghiệp của mình.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Doanh nghiệp như một phương tiện: (Hình dung doanh nghiệp như một chiếc ô tô) Cái</span></div>\n<p class=\"body-txt\">\nxe là doanh nghiệp, chúng ta là đội nhóm. Mục đích của doanh nghiệp là đến được đích,\n \nmục đích của cá nhân là đạt được điều mình muốn. Nếu không cùng mục đích, ta phải\n \nxuống xe hoặc thay thế xe mới. Doanh nghiệp chẳng qua chỉ là phương tiện để chúng ta\n \nđạt mục đích của mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Lập tầm nhìn/mục tiêu: Hãy viết xuống điều bạn thực sự muốn từ công việc của mình</span></div>\n<p class=\"body-txt\">\n(tầm nhìn), ví dụ về tài chính (6000 tỷ), mục tiêu ngắn hạn, dài hạn cho cả doanh nghiệp\n \nvà cá nhân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">5 bước lập &quot;bản đồ&quot; hành trình:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Xác định xe (doanh nghiệp): Điểm xuất phát (A).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Xác định điểm muốn đến (B): Mục tiêu mong muốn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Xác định điểm mình đang ở đâu: Tình hình hiện tại so với điểm A.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Khoảng cách: Tính toán khoảng cách từ A đến B (B - A).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Khó khăn: Xác định tất cả những khó khăn, rào cản khiến mình chưa đạt được điều này</span></div>\n<p class=\"body-txt\">\n(bao gồm cả yếu tố bên trong và bên ngoài).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Thách thức vs. Khó khăn: Thách thức dành cho những người thành công và khó khăn</span></div>\n<p class=\"body-txt\">\ndành cho những người bỏ cuộc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chia nhỏ hành trình: Cần chia hành trình thành những chặng nhỏ và lập kế hoạch cho</span></div>\n<p class=\"body-txt\">\ntừng ngày.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Thực hành và ứng dụng: Phương pháp lập bản đồ này vô cùng quan trọng và có thể áp</span></div>\n<p class=\"body-txt\">\ndụng trong mọi lĩnh vực của cuộc sống: kinh doanh, cuộc sống, gia đình, hôn nhân, học\n \ntập. Nó giúp tính toán những bước tiếp theo để tạo ra đột phá.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phân biệt &quot;công việc&quot; và &quot;kinh doanh&quot; dựa trên mục đích: Điểm cốt lõi là nhận diện liệu</span></div>\n<p class=\"body-txt\">\nbạn đang xây dựng một doanh nghiệp phục vụ nhu cầu của thị trường/khách hàng (kinh\n \ndoanh) hay chỉ là một công cụ để đáp ứng nhu cầu cá nhân của bạn (công việc). Điều này\n \nquan trọng vì nó định hướng toàn bộ chiến lược, sự tập trung và tiềm năng phát triển\n \nbền vững. Nếu chỉ chạy theo lợi ích cá nhân mà bỏ qua nhu cầu khách hàng, doanh\n \nnghiệp khó lòng tồn tại lâu dài.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Yêu thích khách hàng chứ không yêu thích sản phẩm: Đây là một thay đổi tư duy mạnh</span></div>\n<p class=\"body-txt\">\nmẽ. Thay vì chỉ chú trọng vào việc tạo ra sản phẩm/dịch vụ hoàn hảo theo ý mình, doanh\n \nnghiệp cần đặt khách hàng làm trung tâm, hiểu rõ vấn đề và mong muốn của họ. Khi\n</p></div></div>",
