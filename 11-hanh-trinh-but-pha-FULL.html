=\"body-txt\">\ntriển nội tại và kết quả vật chất. Nó là một động lực mạnh mẽ để mỗi người ý thức được\n \nrằng việc đầu tư vào bản thân (kiến thức, kỹ năng, tư duy, cảm xúc) không chỉ mang lại\n \ngiá trị tinh thần mà còn trực tiếp ảnh hưởng đến mức độ giàu có và khả năng duy trì sự\n \ngiàu có đó.\n \n---\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Teacher is a leader.”\n \n“Lifelong learning.”\n \n“Phát triển bản thân quan trọng hơn phát triển kinh doanh.”\n \n“Phát triển cá nhân rồi mới phát triển kinh doanh.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 11: Peer groups</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi học tập trung vào chiến lược phát triển bản thân và doanh nghiệp thông qua</h3>\n<p class=\"body-txt\">\nviệc xây dựng Peer Group (nhóm bạn đồng đẳng) gồm những người xuất sắc và không\n \nngừng học hỏi. Diễn giả nhấn mạnh việc chọn lựa những người giỏi hơn mình, học hỏi các\n \nkiến thức, bí quyết (tips &amp; tricks) từ họ, và sau đó áp dụng một cách có chọn lọc để đẩy\n \nnhanh tốc độ phát triển. Đây là con đường hiệu quả để liên tục nâng cao trình độ và vượt lên\n \nchính mình, luôn vây quanh bởi những người ham học và thành công.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Thế giới vận hành theo nguyên tắc &quot;Ngưu tầm ngưu, mã tầm mã&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Khi thuộc về một nhóm nào đó, cá nhân phải tham gia vào cuộc đua của nhóm đó. Một</span></div>\n<p class=\"body-txt\">\ncon ngựa đau có thể khiến cả tàu bỏ cỏ, cho thấy ảnh hưởng của cá nhân đến tập thể.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Kể câu chuyện về cuộc đua với Paul (người từng đứng số 1 thế giới Clickbank, diễn giả</span></div>\n<p class=\"body-txt\">\nđứng số 5). Sau 2 năm, diễn giả đã vượt lên Paul về trình độ.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Khi Paul nhìn thấy sự tiến bộ của diễn giả, anh ta buộc phải học hỏi và chạy nhanh hơn.</span></div>\n<p class=\"body-txt\">\nĐây là bài học lớn nhất mà Paul học được từ diễn giả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ngược lại, diễn giả cũng học được từ Paul. Trong một Peer Group, mỗi người đều có</span></div>\n<p class=\"body-txt\">\nnhững điểm hơn ta mà ta không biết.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vì vậy, cần phải chọn cho mình một nhóm Peer Group (nhóm bạn đồng đẳng).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Diễn giả không thích cách bán hàng của Joe Bauer nhưng đề nghị học viên đi học từ ông</span></div>\n<p class=\"body-txt\">\nấy vì ông có nhiều &quot;tip and trick&quot; (mẹo và thủ thuật).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Việc học hỏi các &quot;tip and trick&quot; là quan trọng, nhưng việc dùng hay không dùng là do lựa</span></div>\n<p class=\"body-txt\">\nchọn của mỗi người. (Diễn giả đưa ví dụ về việc có thể thay đổi người nhưng không dùng\n \ncho người mình không yêu quý).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cần vây quanh mình bởi những người thích học hỏi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Một bí quyết quan trọng là chơi với những người thích đọc sách và hỏi họ đang đọc gì.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chơi với những nhà doanh nghiệp thành công và hỏi họ đang học ông diễn giả nào, bởi vì</span></div>\n<p class=\"body-txt\">\ntất cả những doanh nghiệp thành công đều đang học từ một ai đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bí quyết cuối cùng là chọn cho mình một Peer Group bởi những người đang học tập</span></div>\n<p class=\"body-txt\">\nkhông ngừng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sức mạnh của Peer Group và nguyên tắc &quot;Ngưu tầm ngưu, mã tầm mã&quot;: Diễn giả nhấn</span></div>\n<p class=\"body-txt\">\nmạnh rằng môi trường xung quanh định hình con người. Việc chủ động chọn một nhóm\n \nnhững người giỏi, thành công và ham học hỏi sẽ thúc đẩy bản thân phải nỗ lực, cải thiện\n \nliên tục. Nó tạo ra áp lực tích cực và nguồn cảm hứng không giới hạn, đồng thời cảnh báo\n \nrằng năng lượng tiêu cực của một cá nhân có thể ảnh hưởng đến cả nhóm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Học hỏi không ngừng từ mọi người, ngay cả khi bạn đã vượt trội: Câu chuyện về Paul và</span></div>\n<p class=\"body-txt\">\ndiễn giả minh họa rằng ngay cả khi bạn đã vượt qua một đối thủ hoặc đạt đến một trình\n \nđộ cao, bạn vẫn có thể học hỏi từ họ. Diễn giả khẳng định &quot;mỗi một con người trong peer\n \ntrong cái hàng ngang hàng đó đều hơn ta một cái gì đó mà ta không biết.&quot; Điều này\n \nkhuyến khích một thái độ khiêm tốn, liên tục tìm kiếm kiến thức mới và phá vỡ tư duy\n \n&quot;đã đủ giỏi&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Học hỏi các &quot;tip and trick&quot; nhưng áp dụng có chọn lọc: Diễn giả khuyên chúng ta nên học</span></div>\n<p class=\"body-txt\">\nhỏi các mẹo và thủ thuật từ những người giỏi, nhưng đồng thời nhấn mạnh rằng &quot;dùng\n \nhay không dùng là do lựa chọn của mình.&quot; Điều này dạy về sự chủ động, tư duy phản\n \nbiện và khả năng tùy chỉnh kiến thức cho phù hợp với bản thân, mục tiêu hoặc mối quan\n \nhệ cụ thể, thay vì sao chép một cách máy móc.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Ngưu tầm ngưu, mã tầm mã.”\n \n“Nếu anh ta đứng đầu thế giới như vậy thì kiểu gì cũng có điều để ta học anh ta.”\n \n“Cái bí quyết ở đây là chọn cho mình một Peer Group bởi những người đang học tập không\n \nngừng.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#00838f\">Chương 3</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 12: Tam giác thành công trong doanh nghiệp</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi học tập trung phân tích sai lầm phổ biến của các doanh nghiệp vừa và nhỏ là</h3>\n<p class=\"body-txt\">\ntập trung vào sản phẩm hoặc vận hành, thay vì marketing và bán hàng. Nguyên nhân cốt lõi\n \nlà việc người khởi nghiệp thường giỏi chuyên môn nhưng thiếu kiến thức kinh doanh, dẫn\n \nđến bi kịch thất bại và lặp lại sai lầm của &quot;ông chủ ngu&quot;. Để thành công, diễn giả khuyên cần\n \nthay đổi tư duy, phân bổ ít nhất 60% nguồn lực cho marketing và bán hàng, 20% cho sản\n \nphẩm và 20% cho vận hành.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Các doanh nghiệp vừa và nhỏ cần làm ba việc chính: có sản phẩm để kinh doanh, vận</span></div>\n<p class=\"body-txt\">\nhành hệ thống kinh doanh, và thực hiện công việc marketing cùng bán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sai lầm lớn nhất của hầu hết mọi người là tập trung vào sản phẩm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bi kịch theo cuốn sách *The E-Myth*:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chúng ta thường bắt đầu công việc kinh doanh dựa trên chuyên môn được đào tạo (ví</span></div>\n<p class=\"body-txt\">\ndụ: học luật ra làm luật sư, học kế toán ra làm kế toán, học kiến trúc ra làm kiến trúc sư).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tuy nhiên, chúng ta được đào tạo về chuyên môn ngành của mình nhưng không được</span></div>\n<p class=\"body-txt\">\nđào tạo về kinh doanh trong ngành đó, dẫn đến việc giỏi chuyên môn nhưng không giỏi\n \nkinh doanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Khi đi làm cho một ông chủ, thường ông chủ đó cũng là người giỏi chuyên môn nhưng</span></div>\n<p class=\"body-txt\">\nkhông giỏi kinh doanh, dẫn đến vận hành kém hiệu quả, sản phẩm bị tồn kho, kinh\n \ndoanh đi xuống và lương thấp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Người làm thuê cảm thấy chán nản, quyết định tự ra kinh doanh và cuối cùng trở thành</span></div>\n<p class=\"body-txt\">\n&quot;thằng chủ ngu hơn&quot; vì lặp lại sai lầm cũ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Để tránh bi kịch này, cần thay đổi tư duy:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Đừng bao giờ tập trung vào sản phẩm nếu không phải là một &quot;đại gia&quot; có rất nhiều tiền,</span></div>\n<p class=\"body-txt\">\nbởi việc tạo ra sản phẩm tốt rất khó và trong một &quot;thế giới phẳng&quot;, luôn có người làm ra\n \nsản phẩm tốt hơn. Tập trung vào sản phẩm sẽ tốn rất nhiều nguồn lực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sai lầm thứ hai là tập trung vào vận hành (lo làm &quot;G-E-U&quot; / CEO), điều này cũng khiến</span></div>\n<p class=\"body-txt\">\ndoanh nghiệp không còn thời gian để tập trung vào bán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Công việc cần tập trung (phân bổ nguồn lực):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ít nhất 60% nguồn lực được dành cho marketing và bán hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">20% cho tìm kiếm và phát triển sản phẩm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">20% cho việc vận hành doanh nghiệp.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nguồn gốc của bi kịch khởi nghiệp là được đào tạo chuyên môn mà thiếu đào tạo kinh</span></div>\n<p class=\"body-txt\">\ndoanh: Diễn giả nhấn mạnh rằng nhiều người khởi nghiệp từ chính chuyên môn họ đã\n \nhọc (kế toán, kiến trúc, luật sư) mà không có bất kỳ kiến thức hay kỹ năng nào về kinh\n \ndoanh, marketing, và vận hành. Điều này khiến họ giỏi việc &quot;làm nghề&quot; nhưng lại yếu\n \nkém trong việc &quot;làm kinh doanh&quot;, dẫn đến thất bại hoặc trở thành những người chủ vận\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><p class=\"body-txt\">\nhành kém hiệu quả, lặp lại vòng luẩn quẩn của sự thiếu hiểu biết về thị trường và quản\n \nlý doanh nghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tuyệt đối không tập trung vào sản phẩm nếu không phải là &quot;đại gia&quot;: Trong một &quot;thế</span></div>\n<p class=\"body-txt\">\ngiới phẳng&quot;, việc làm ra một sản phẩm tốt không đảm bảo thành công vì sẽ luôn có đối\n \nthủ làm ra sản phẩm &quot;tốt hơn&quot;. Đổ quá nhiều nguồn lực vào sản phẩm mà không có lợi\n \nthế cạnh tranh về quy mô hoặc khả năng đổi mới vượt trội sẽ chỉ làm cạn kiệt nguồn lực.\n \nĐiều này quan trọng vì nó thách thức tư duy truyền thống &quot;hữu xạ tự nhiên hương&quot; và\n \nđịnh hướng doanh nghiệp tập trung vào việc tạo giá trị khác biệt và khả năng tiếp thị.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phân bổ nguồn lực ưu tiên cho marketing và bán hàng (ít nhất 60%): Đây là một định</span></div>\n<p class=\"body-txt\">\nhướng chiến lược rõ ràng và mang tính hành động. Diễn giả chỉ ra rằng việc bán được\n \nhàng và marketing hiệu quả mới là yếu tố sống còn, giúp doanh nghiệp tồn tại và phát\n \ntriển. Việc phân bổ nguồn lực cụ thể 60% marketing/bán hàng, 20% sản phẩm và 20%\n \nvận hành giúp các doanh nghiệp nhỏ có một lộ trình rõ ràng để thoát khỏi tình trạng\n \n&quot;sản xuất rồi để trong kho&quot;.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Chúng ta được đào tạo về cái ngành của chúng ta, nhưng cuối cùng mình không được đào tạo\n \nkinh doanh về cái ngành của mình, nhưng mình lại bước vào kinh doanh cái ngành của mình\n \nvà đấy chính là cái sai lầm.”\n \n“Đừng có bao giờ tập trung vào sản phẩm nếu các anh chị không phải là một cái đại gia,\n \nkhông phải có rất nhiều tiền, vì sản phẩm rất là khó.”\n \n“Nếu bạn làm ra một sản phẩm tốt thì ngay lập tức có một người làm ra sản phẩm tốt hơn.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 13: Sông Nin và biển chết</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi giảng nhấn mạnh triết lý &quot;cho đi&quot; là chìa khóa để đạt được sự trù phú, thành</h3>\n<p class=\"body-txt\">\ncông và hạnh phúc trong cuộc sống lẫn kinh doanh. Thông qua hình ảnh đối lập giữa Sông\n \nNin và Biển Chết, diễn giả khẳng định rằng việc liên tục tạo giá trị, giúp đỡ và quan tâm đến\n \nngười khác sẽ mang lại sự phát triển bền vững, thay vì chỉ biết giữ cho riêng mình. Thành\n \ncông thực sự không nằm ở việc bạn giỏi đến đâu, mà ở việc bạn giúp đỡ được bao nhiêu\n \nngười.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Analogy Sông Nin và Biển Chết: Cả Sông Nin và Biển Chết đều có cùng một nguồn nước.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Đặc điểm Sông Nin: Trù phú, tạo ra sự sống màu mỡ, luôn chảy, cho nước đi và nhận</span></div>\n<p class=\"body-txt\">\nnước mới vào, mang phù sa khắp mọi nơi, làm mọi thứ xung quanh trở nên trù phú.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Đặc điểm Biển Chết: Không có bất kỳ sự sống nào, chỉ biết nhận nguồn nước vào trong</span></div>\n<p class=\"body-txt\">\nmình rồi bốc hơi, muối khoáng đọng lại, không có sự vật nào sống được.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ứng dụng vào cuộc đời con người: Chúng ta cùng sinh ra nhưng trở nên khác biệt bởi</span></div>\n<p class=\"body-txt\">\n&quot;sự cho đi&quot; của mỗi người.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nguyên tắc &quot;cho đi - nhận lại&quot;: Nếu bạn cho đi càng nhiều, bạn càng có cơ hội được nhận</span></div>\n<p class=\"body-txt\">\nnhiều &quot;nguồn nước&quot; mới.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Hậu quả của việc giữ lại: Nếu chỉ giữ cho bản thân, bạn sẽ trở thành &quot;biển chết&quot;, không</span></div>\n<p class=\"body-txt\">\ncó gì ngoài muối mặn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bí quyết thành công trong kinh doanh: Không phải là bạn giỏi bao nhiêu, mà là bạn giúp</span></div>\n<p class=\"body-txt\">\nđỡ được bao nhiêu người trong cuộc đời này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tạo giá trị cho người khác: Bạn cần phải trở nên có giá trị với con người khác, không</span></div>\n<p class=\"body-txt\">\nphải có giá trị với bản thân mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mối quan tâm quan trọng hơn năng lực: Mọi người sẽ không quan tâm bạn giỏi thế nào,</span></div>\n<p class=\"body-txt\">\nmà họ quan tâm bạn quan tâm tới họ ra sao. (&quot;People don&#x27;t care how much you know,\n \npeople just know how much you care&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Làm người khác vui vẻ, mình cũng vui vẻ: Làm cho mọi người được bừng sáng lên, bạn</span></div>\n<p class=\"body-txt\">\nsẽ được bừng sáng lên; làm cho người khác vui vẻ, bạn sẽ trở nên vui vẻ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cơ hội để thay đổi: Đây là lúc để bạn lột cái lớp mặt nạ đã gìn giữ bạn ở đó trong một</span></div>\n<p class=\"body-txt\">\nkhoảng thời gian rất dài.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sự thịnh vượng đến từ việc cho đi liên tục: Diễn giả sử dụng hình ảnh Sông Nin và Biển</span></div>\n<p class=\"body-txt\">\nChết để minh họa rõ nét rằng sự trù phú, phát triển bền vững và sự sống chỉ có thể tồn\n \ntại khi có sự luân chuyển, trao đổi và cho đi. Việc chỉ biết nhận và giữ lại sẽ dẫn đến sự\n \nđình trệ và &quot;chết chóc&quot;. Điều này quan trọng vì nó định hình lại tư duy về cách xây dựng\n \nthành công, từ một hành trình tích lũy cá nhân sang một quá trình đóng góp và tạo giá trị\n \nchung.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Giá trị thực sự nằm ở việc giúp đỡ người khác: Đây là một thay đổi trọng tâm trong quan</span></div>\n<p class=\"body-txt\">\nđiểm về thành công. Thay vì tập trung vào việc tự thân trở nên &quot;giỏi nhất&quot; hay tích lũy\n \nnhiều nhất cho bản thân, diễn giả khẳng định bí quyết thành công là &quot;giúp đỡ được bao\n \nnhiêu người&quot;. Insight này quan trọng vì nó chuyển hướng nỗ lực từ việc tự khẳng định\n \nbản thân sang việc giải quyết vấn đề và tạo ra lợi ích cho cộng đồng, khách hàng, từ đó\n \nmới nhận lại được giá trị tương xứng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mối quan tâm chân thành là yếu tố then chốt để kết nối và xây dựng giá trị: Câu nói</span></div>\n<p class=\"body-txt\">\n&quot;People don&#x27;t care how much you know, people just know how much you care&quot; là một\n \ntriết lý sâu sắc. Nó nhấn mạnh rằng trong mọi mối quan hệ, đặc biệt là trong kinh doanh,\n \nsự chân thành, quan tâm và đồng cảm sẽ tạo ra sự kết nối mạnh mẽ và bền vững hơn rất\n \nnhiều so với kiến thức hay kỹ năng thuần túy. Khách hàng và đối tác sẽ chọn người quan\n \ntâm đến họ, chứ không chỉ người giỏi nhất.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Nếu bạn cho đi càng nhiều bao nhiêu, thì bạn càng có cơ hội được nhận những nguồn nước\n \nmới bấy nhiêu.”\n \n“Bí quyết thành công trong kinh doanh không phải là bạn giỏi bao nhiêu, mà quan trọng nhất\n \nlà bạn giúp đỡ được bao nhiêu người trong cuộc đời này.”\n \n“People don&#x27;t care how much you know, people just know how much you care.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 14: Những gì đưa bạn đến A thì không thể đưa bạn đến B</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi giảng nhấn mạnh rằng những gì đã đưa bạn đến thành công hiện tại sẽ không</h3>\n<p class=\"body-txt\">\nđủ để đưa bạn đến những thành công lớn hơn trong tương lai. Để tiến bộ, mỗi cá nhân cần\n \nhọc cách &quot;buông bỏ&quot; kiến thức, kinh nghiệm cũ và cả con người cũ của mình – một quá trình\n \nđược gọi là &quot;unlearn&quot; (ăn lơn). Quá trình này được ví như việc làm rỗng một chiếc ly để có\n \nthể chứa đựng thêm những điều mới mẻ và tốt đẹp hơn, trước khi tái học (&quot;relearn&quot;) những\n \nđiều cũ với một góc nhìn mới.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nguyên lý &quot;Cái đã mang bạn đến đây, không thể mang bạn đến kia&quot;: Những phương</span></div>\n<p class=\"body-txt\">\npháp, kiến thức, và con người bạn ở thời điểm hiện tại đã giúp bạn đạt được thành công\n \nnhất định (điểm B), nhưng chúng sẽ không đủ để giúp bạn vươn tới mục tiêu tiếp theo\n \n(điểm B1).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bi kịch của sự tự mãn: Nhiều người đạt đến điểm B, cảm thấy tự hào về sự giỏi giang của</span></div>\n<p class=\"body-txt\">\nmình và nghĩ rằng mình đã khác biệt so với trước đây, nhưng rồi lại bị &quot;kẹt&quot; lại ở điểm B\n \nđó mà không thể tiến lên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sự cần thiết của &quot;buông bỏ&quot;: Để trở thành một con người tốt hơn và tiến tới mục tiêu</span></div>\n<p class=\"body-txt\">\nmới, bạn cần phải &quot;buông bỏ con người cũ của mình&quot; và &quot;cởi lớp mặt nạ&quot; của những kiến\n \nthức đã có.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Quá trình &quot;Unlearn&quot; (Ăn lơn): Đây là quá trình xóa bỏ đi những kiến thức cũ. Diễn giả ví</span></div>\n<p class=\"body-txt\">\nvon với việc &quot;quên thật nhanh mọi thứ&quot; để trở thành một &quot;con người rỗng tuếch&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ngụ ngôn &quot;Cái ly rỗng&quot;: Bạn chỉ có thể thêm nước vào nếu cái ly của bạn rỗng. Nếu ly đã</span></div>\n<p class=\"body-txt\">\nđầy, mọi giọt nước mới rót vào sẽ chỉ chảy ra ngoài. Điều này minh họa cho việc nếu bạn\n \nnghĩ mình đã biết hết hoặc không sẵn lòng bỏ đi những gì đã có, bạn sẽ không thể tiếp\n \nnhận thêm kiến thức mới.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Lý do bị kẹt: Việc không unlearn là lý do khiến bạn bị mắc kẹt ở một vị trí hoặc giai đoạn</span></div>\n<p class=\"body-txt\">\nnào đó trong cuộc sống/sự nghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ba quá trình liên tục:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Learn (học tập): Học những điều mới.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Unlearn (xóa bỏ đi): Xóa bỏ những kiến thức cũ để tạo không gian cho cái mới.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Relearn (học lại): Học lại những điều chúng ta đã biết với một góc nhìn mới mẻ hoặc cập</span></div>\n<p class=\"body-txt\">\nnhật.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tầm quan trọng của sự liên tục: Ba quá trình này diễn ra liên tục. Nếu chúng ta nghĩ</span></div>\n<p class=\"body-txt\">\nmình đã biết rồi thì không thể học thêm được nữa, nên phải unlearn để học thêm điều\n \nmới. Đồng thời, những điều cũ cũng rất tốt, nên cần relearn chúng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Những gì mang bạn đến đây thì không thể mang bạn đến kia&quot;: Câu nói này là cốt lõi của</span></div>\n<p class=\"body-txt\">\ntoàn bộ buổi giảng, thách thức sự tự mãn và tư duy lối mòn. Nó buộc người nghe phải\n \nnhận ra rằng thành công trong quá khứ không đảm bảo cho tương lai và cần phải liên\n \ntục đổi mới để vượt qua giới hạn hiện tại.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Quá trình &quot;Unlearn&quot; (Xóa bỏ kiến thức cũ): Đây là một khái niệm mạnh mẽ và thường bị</span></div>\n<p class=\"body-txt\">\nbỏ qua. Thay vì chỉ tích lũy kiến thức (learn), việc chủ động loại bỏ những gì đã cũ,\n \nkhông còn phù hợp hoặc thậm chí là rào cản lại càng quan trọng để tạo ra không gian\n \ncho sự phát triển vượt bậc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ngụ ngôn &quot;Cái ly rỗng&quot;: Hình ảnh ẩn dụ này cực kỳ hiệu quả để minh họa tầm quan trọng</span></div>\n<p class=\"body-txt\">\ncủa sự khiêm tốn và cởi mở. Nó trực tiếp chỉ ra rằng nếu chúng ta không &quot;làm rỗng&quot; bản\n \nthân khỏi những định kiến, kinh nghiệm cũ, hoặc sự tự mãn, chúng ta sẽ không thể tiếp\n \nthu được bất kỳ điều mới mẻ, dù cho chúng có giá trị đến đâu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Những gì mang bạn đến đây thì không thể mang bạn đến kia.”\n \n“Bạn chỉ có thể làm cái ly rỗng thì bạn mới có thể chứa thêm nước vào được.”\n \n“Learn là quá trình học tập, unlearn là xóa bỏ đi, relearn là học lại những điều chúng ta đã\n \nbiết.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 15: Xác định thị trường mục tiêu</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi học này nhấn mạnh tầm quan trọng cốt lõi của việc xác định rõ thị trường</h3>\n<p class=\"body-txt\">\nmục tiêu (hay thị trường ngách) trong kinh doanh và marketing. Diễn giả khẳng định rằng\n \nmọi nỗ lực sẽ thất bại nếu không biết khách hàng của mình là ai, không có doanh nghiệp nào\n \nđủ lớn để phục vụ tất cả mọi người. Để thành công, doanh nghiệp cần phân tích sâu về nhân\n \nkhẩu học, sở thích, ngành nghề, thu nhập và thói quen chi tiêu của nhóm khách hàng mục\n \ntiêu. Ngoài ra, việc xác định các thị trường thứ cấp để mở rộng dịch vụ cũng được đề cập, với\n \nmục tiêu cuối cùng là tìm ra giải pháp cho một vấn đề đủ lớn và đạt ngưỡng doanh thu mong\n \nmuốn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cảm xúc chi phối toàn bộ trò chơi cuộc đời, bao gồm cả trò chơi kinh doanh.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Điều quan trọng bậc nhất trong kinh doanh là xác định được thị trường mục tiêu, hay</span></div>\n<p class=\"body-txt\">\ncòn gọi là &quot;niche&quot; (thị trường ngách) hoặc &quot;prospect&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Thị trường mục tiêu là &quot;bất kỳ ai thuộc về thị trường mục tiêu của chúng ta&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bí quyết kinh doanh thành công là phải biết rõ thị trường mục tiêu của mình.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sai lầm phổ biến là cho rằng &quot;khách hàng của tôi là tất cả&quot;, nhưng thực tế không ai đủ</span></div>\n<p class=\"body-txt\">\nlớn để làm được điều đó (ví dụ: Samsung có các dòng sản phẩm Note Z, Note V phục vụ\n \ncác nhóm khách hàng khác nhau).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Xác định rõ thị trường mục tiêu là điều tiên quyết để thành công trong marketing.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nếu sai hoặc không biết thị trường mục tiêu của mình, bạn sẽ thất bại.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cách làm để tìm ra thị trường mục tiêu: Trả lời các câu hỏi sau:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">1. Xác định rõ Demography (nhân khẩu học):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Giới tính (đàn ông hay đàn bà).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tuổi (phải xác định rõ; nếu có nhiều độ tuổi khác nhau thì phải customize, tối ưu hóa,</span></div>\n<p class=\"body-txt\">\nphân nhỏ sản phẩm theo từng lứa tuổi).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Địa bàn họ ở đâu (vị trí địa lý).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">2. Xác định Sở thích: Họ thích cái gì (thích đọc cuốn sách nào, thích xem phim gì, thích đi</span></div>\n<p class=\"body-txt\">\nngủ giờ nào...). Phải biết rõ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">*Ví dụ: Facebook là kênh marketing tốt nhất vì biết tất cả những điều này, giúp tiết kiệm</span></div>\n<p class=\"body-txt\">\ntiền quảng cáo đại trà.*\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">3. Ngành nghề kinh doanh và vị trí công việc của họ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">4. Mức thu nhập của họ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">*Ví dụ: Google có thể target những người có thu nhập trên 20 triệu đồng/tháng, hoặc</span></div>\n<p class=\"body-txt\">\nnhững người có thẻ tín dụng.*\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">5. Thói quen chi tiêu.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">*Ví dụ: những người thích chi tiêu online.*</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Đây là những việc để xác định nhân khẩu học và sở thích.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bên cạnh thị trường chính, còn có thể xác định thị trường thứ cấp.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Thị trường thứ cấp là: khi đã có nhóm khách hàng chính, chúng ta có thể bán thêm cái gì</span></div>\n<p class=\"body-txt\">\nvào đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">*Ví dụ: Nếu thị trường chính là người có nhu cầu thiết kế nhà, thị trường thứ cấp có thể</span></div>\n<p class=\"body-txt\">\nlà dịch vụ xây nhà.*\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Khi tìm ra một vấn đề đủ lớn của thị trường, thì đấy chính là thị trường ngách.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sau khi tìm ra nhóm người và vấn đề của họ, cần trả lời thêm hai câu hỏi:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Có sản phẩm hoặc dịch vụ nào có thể giải quyết được vấn đề của họ không?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cần bán bao nhiêu sản phẩm/dịch vụ đó thì đạt được ngưỡng 1 triệu đô la?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài tập chỉ có vậy: làm đi làm lại các bước trên, mỗi ngày một trang.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Xác định rõ thị trường mục tiêu là yếu tố tiên quyết cho thành công: &quot;Điều quan trọng</span></div>\n<p class=\"body-txt\">\nbậc nhất... đó là bạn xác định được thị trường mục tiêu.&quot; Diễn giả nhấn mạnh: &quot;Nếu bạn\n \nsai về thị trường mục tiêu hoặc không biết thị trường mục tiêu của mình, bạn sẽ thất\n \nbại.&quot; Insight này cực kỳ quan trọng vì nó định hướng toàn bộ chiến lược kinh doanh. Mọi\n \nnguồn lực từ phát triển sản phẩm, dịch vụ cho đến các hoạt động marketing sẽ được tối\n \nưu hóa khi tập trung vào đúng đối tượng khách hàng, tránh lãng phí và tăng hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Khách hàng không phải là tất cả mọi người: &quot;Bạn không đủ lớn để làm những việc đó.</span></div>\n<p class=\"body-txt\">\nNgay cả Samsung khi bán điện thoại Note, nó cũng chỉ bán cho một nhóm người nào đó\n \ntrong xã hội mà thôi.&quot; Đây là một lời cảnh tỉnh đắt giá giúp doanh nghiệp tránh tư duy\n \ndàn trải. Việc nhận ra giới hạn của mình và tập trung vào một phân khúc cụ thể (thị\n \ntrường ngách) cho phép doanh nghiệp tạo ra giá trị độc đáo, xây dựng thương hiệu\n \nmạnh mẽ và cạnh tranh hiệu quả hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phân tích sâu sắc về nhân khẩu học, sở thích và thói quen chi tiêu của khách hàng: Các</span></div>\n<p class=\"body-txt\">\nyếu tố như giới tính, tuổi, địa bàn, sở thích, ngành nghề, thu nhập, thói quen chi tiêu là\n \nchìa khóa để &quot;biết tất cả mọi điều này&quot;. &quot;Tại sao Facebook lại là kênh marketing tốt nhất\n \nlúc này là vì chúng ta biết tất cả mọi điều này. Ta đỡ tốn tiền cho cái việc quảng cáo đại\n \ntrà.&quot; Việc hiểu rõ từng khía cạnh của khách hàng giúp doanh nghiệp vẽ nên chân dung\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><p class=\"body-txt\">\nkhách hàng chi tiết, từ đó cá nhân hóa sản phẩm, dịch vụ và thông điệp truyền thông, tối\n \nưu hóa kênh tiếp cận và giảm chi phí quảng cáo, tăng tỷ lệ chuyển đổi.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Cảm xúc nó sẽ chi phối toàn bộ trò chơi trong cuộc đời của chúng ta, bao gồm cả trò chơi kinh\n \ndoanh.”\n \n“Điều quan trọng bậc nhất, quan trọng bậc nhất, quan trọng vô cùng quan trọng, đó là bạn xác\n \nđịnh được thị trường mục tiêu.”\n \n“Nếu như bạn không biết thị trường mục tiêu của mình thì bạn luôn nói rằng khách hàng của\n \ntôi là tất cả. Không, không có thứ tất cả đâu. Bạn không đủ lớn để làm những việc đó.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 16: Danh sách khách hàng tiềm năng</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi giảng này tập trung vào khái niệm cốt lõi trong marketing internet là &quot;Danh</h3>\n<p class=\"body-txt\">\nsách khách hàng tiềm năng&quot; (lead). Diễn giả nhấn mạnh rằng đây là danh sách những người\n \nđã tự nguyện cung cấp thông tin cá nhân (như email, tên) để đổi lấy giá trị, chứ không phải\n \ndanh sách mua bán trên thị trường. Việc xác định rõ thị trường mục tiêu và thu thập thông\n \ntin từ họ một cách hợp pháp là vô cùng quan trọng để xây dựng danh sách chất lượng, tránh\n \nlãng phí tài nguyên và không hiệu quả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Danh sách khách hàng tiềm năng (lead) là yếu tố phải kiếm được trong kinh doanh.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phân biệt &quot;prospect&quot; và &quot;lead&quot;:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Prospect&quot; (khách hàng tiềm năng): Là những người có tiềm năng trở thành khách hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Lead&quot; (danh sách khách hàng tiềm năng): Là những khách hàng đã *cho chúng ta một</span></div>\n<p class=\"body-txt\">\nmẩu thông tin* của họ (ví dụ: điền vào form, cung cấp tên, email). Lead không phải là\n \nkhách hàng cuối cùng mà là bước đầu tiên trong phễu bán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Xác định thị trường mục tiêu: Cần xác định rõ ba yếu tố chính của thị trường mục tiêu:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nghề nghiệp/Đối tượng kinh doanh: Ví dụ: người làm kinh doanh.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Địa bàn kinh doanh: Ví dụ: thành phố Hồ Chí Minh.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Độ tuổi: Ví dụ: 24 đến 34 tuổi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Thu thập thông tin: Chỉ lấy thông tin của thị trường mục tiêu đã xác định, không phải lấy</span></div>\n<p class=\"body-txt\">\nthông tin của tất cả mọi người.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phân biệt danh sách chất lượng và rác:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mua danh sách email/danh sách khách hàng trên thị trường là &quot;rác&quot; và không hiệu quả.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Danh sách khách hàng tiềm năng chất lượng là do người đó tự nguyện điền thông tin vào</span></div>\n<p class=\"body-txt\">\nform cho mình.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Khái niệm &quot;Lead&quot;: &quot;Danh sách khách hàng tiềm năng&quot; (lead) là những người tự nguyện</span></div>\n<p class=\"body-txt\">\ncung cấp thông tin cho bạn (qua form đăng ký, v.v.). Đây là một insight cực kỳ quan\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><p class=\"body-txt\">\ntrọng vì nó định nghĩa lại nền tảng của chiến lược marketing hiệu quả. Thay vì tiếp cận\n \nmù quáng hoặc spam, tập trung vào lead giúp doanh nghiệp xây dựng mối quan hệ ban\n \nđầu, tăng tỷ lệ chuyển đổi và tối ưu chi phí.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Xác định thị trường mục tiêu rõ ràng: Việc phân loại khách hàng tiềm năng theo nghề</span></div>\n<p class=\"body-txt\">\nnghiệp, địa bàn và độ tuổi giúp doanh nghiệp tập trung nguồn lực vào đúng đối tượng.\n \nĐiều này quan trọng vì nó là kim chỉ nam cho mọi hoạt động marketing, từ việc tạo nội\n \ndung, chọn kênh phân phối, đến việc tối ưu hóa thông điệp, đảm bảo tính liên quan và\n \nhiệu quả cao nhất.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tuyệt đối không mua danh sách khách hàng: Diễn giả gọi thẳng việc mua danh sách là</span></div>\n<p class=\"body-txt\">\n&quot;rác&quot;. Điều này quan trọng vì nó giúp tránh lãng phí tiền bạc, thời gian và công sức vào\n \nnhững chiến dịch không mang lại kết quả, đồng thời bảo vệ uy tín thương hiệu khỏi việc\n \nbị gắn mác &quot;spam&quot;.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Chúng ta phải kiếm được cái gì ạ? Danh sách khách hàng tiềm năng.”\n \n“Cái dưới là khách hàng tiềm năng, cái trên là danh sách khách hàng tiềm năng. Nó khác nhau\n \nnhư thế nào? Cái từ trên ấy, cái từ dưới là prospect, cái từ thứ hai là prospect. Trong kinh\n \ndoanh đột phá, à trong kinh doanh Money Call Live chúng ta gọi là lead, LEAD.”\n \n“Đấy là lý do tại sao một số người đi học chương trình không học chương trình của tôi mà lại\n \ncuối cùng nói rằng là email marketing là em mua một cái danh sách ở ngoài thị trường. Có\n \nđược không ạ? Không, đấy là gì? Đấy là gì? Đấy là rác.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 17: Nhóm mua hàng</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi giảng này tập trung phân tích về &quot;nhóm mua hàng&quot; (shopper) trong</h3>\n<p class=\"body-txt\">\nmarketing. Diễn giả nhấn mạnh rằng nhóm này chỉ thực hiện giao dịch mua bán một lần và\n \nkhông hề có sự trung thành với người bán. Họ dễ dàng chuyển sang đối thủ cạnh tranh nếu\n \ncó giá tốt hơn hoặc sản phẩm mới hơn, và chủ yếu đến để &quot;soi&quot; (tìm hiểu, đánh giá). Do đó,\n \nchúng ta không nên quá kỳ vọng hay tập trung vào việc tạo sự trung thành ở nhóm khách\n \nhàng này.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Giới thiệu &quot;nhóm mua hàng&quot; (shopper) là đối tượng chính của buổi học.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Định nghĩa nhóm mua hàng là những người thực hiện chi trả tiền một lần để mua một</span></div>\n<p class=\"body-txt\">\nmón hàng nào đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">So sánh độ trung thành của nhóm mua hàng với các nhóm khác:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nhóm 1 (nhóm đầu tiên, không biết ta là ai): không có trung thành (bằng 0, thậm chí</span></div>\n<p class=\"body-txt\">\nâm).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nhóm 2 (có biết chút ít): có rất ít trung thành, không đáng kể.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nhóm 3 (nhóm mua hàng): có một chút rất nhỏ về trung thành, nhưng sẽ dễ dàng</span></div>\n<p class=\"body-txt\">\nchuyển sang đối thủ nếu có hàng rẻ hơn hoặc sản phẩm mới về.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Kết luận rằng cả ba nhóm trên đều không có sự trung thành.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Lời khuyên: Không nên quá quan tâm đến nhóm khách hàng không có trung thành này.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Lấy ví dụ về học viên đã mua khóa học để minh họa họ là &quot;người mua hàng&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Xác nhận rằng &quot;người mua hàng&quot; chưa phải là &quot;người trung thành&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mục đích chính của nhóm mua hàng (shopper) là đến để &quot;soi&quot; (tìm hiểu, đánh giá).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nhóm mua hàng (shopper) sẵn sàng từ bỏ và ra đi bất cứ lúc nào.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nhấn mạnh lại rằng nhóm mua hàng không có chút trung thành nào.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Người mua hàng (Shopper) không phải là khách hàng trung thành: Diễn giả khẳng định</span></div>\n<p class=\"body-txt\">\nrõ ràng rằng việc một người mua sản phẩm/dịch vụ của bạn không đồng nghĩa với việc\n \nhọ có lòng trung thành. Họ chỉ quan tâm đến giá trị giao dịch hiện tại và sẵn sàng bỏ đi\n \nkhi có lựa chọn tốt hơn. Điều này quan trọng vì nhiều doanh nghiệp lầm tưởng rằng mọi\n \nngười mua đều là khách hàng và sẽ quay lại, dẫn đến việc không đầu tư đúng mức vào\n \ncác chiến lược xây dựng mối quan hệ dài hạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mục đích chính của người mua hàng là &quot;soi&quot; (tìm hiểu/đánh giá): Diễn giả chỉ ra rằng</span></div>\n<p class=\"body-txt\">\nnhóm mua hàng đến với bạn chủ yếu để xem xét, đánh giá sản phẩm hoặc dịch vụ. Họ là\n \nnhững người dò xét, tìm kiếm lợi ích tức thì chứ không phải xây dựng mối quan hệ.\n \nInsight này giúp doanh nghiệp hiểu rõ tâm lý của nhóm đối tượng này, tránh đặt kỳ vọng\n \nsai lầm và điều chỉnh chiến lược tiếp cận phù hợp, có thể là tập trung vào việc tạo ấn\n \ntượng ban đầu mạnh mẽ thay vì cố gắng giữ chân ngay lập tức.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Không nên quá quan tâm đến nhóm không có trung thành: Đây là một lời khuyên thẳng</span></div>\n<p class=\"body-txt\">\nthắn, gợi ý rằng doanh nghiệp nên phân bổ nguồn lực một cách chiến lược. Thay vì cố\n \ngắng &quot;giữ chân&quot; những người mua hàng không có ý định trung thành, nên tập trung vào\n \nviệc biến họ thành các nhóm khách hàng có giá trị cao hơn, hoặc chuyển hướng nguồn\n \nlực sang những phân khúc có tiềm năng trung thành lớn hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Nhóm mua hàng này đến đây để soi là chính.”\n \n“Mua hàng đã trung thành chưa? Chưa. Chưa.”\n \n“Cái nhóm này họ sẵn sàng từ bỏ chúng ta mà ra đi. Họ ra đi bất kỳ lúc nào.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 18: Nhóm khách hàng</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi giảng tập trung vào tầm quan trọng của nhóm khách hàng &quot;5 sao&quot; – những</h3>\n<p class=\"body-txt\">\nngười đã mua hàng ít nhất hai lần. Diễn giả nhấn mạnh rằng lòng trung thành của nhóm\n \nkhách hàng này cao gấp 10 lần so với những người chỉ mua hàng một lần. Mục tiêu cốt lõi\n \ncủa mọi doanh nghiệp là phải thiết kế hệ thống để giúp khách hàng mua hàng thêm một lần\n \nnữa, vì đây là yếu tố then chốt tạo nên sự khác biệt và thành công bền vững.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nhóm &quot;khách hàng&quot; là nhóm quan trọng nhất trong các bậc thang, được đánh giá 5 sao.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nhóm khách hàng &quot;5 sao&quot; là những người mua hàng của doanh nghiệp ít nhất thêm một</span></div>\n<p class=\"body-txt\">\nlần nữa (tức là mua từ hai lần trở lên).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nếu ngành kinh doanh của bạn không có nhóm khách hàng này, cần xem xét lại cách xây</span></div>\n<p class=\"body-txt\">\ndựng ngành kinh doanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Khách hàng&quot; (mua từ 2 lần trở lên) và &quot;người mua hàng&quot; (mua 1 lần) có lòng trung</span></div>\n<p class=\"body-txt\">\nthành khác nhau gấp 10 lần.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cụ thể, nhóm khách hàng đã mua từ 2 lần trở lên có tỉ lệ mua lại lần 3 cao hơn gấp 10 lần</span></div>\n<p class=\"body-txt\">\nso với nhóm người mua hàng chỉ mua 1 lần và mua lại lần 2.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nếu khách hàng mua được thêm một lần nữa (lần thứ 2), thì họ có xu hướng sẽ dễ dàng</span></div>\n<p class=\"body-txt\">\nmua ở lần thứ 3.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tất cả những gì cần làm trong công thức &quot;outstanding&quot; (tạo sự khác biệt) là giúp cho</span></div>\n<p class=\"body-txt\">\nkhách hàng mua hàng thêm một lần nữa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ví dụ về việc người dùng iPhone đã mua nhiều lần rất khó chuyển sang Samsung, hay sự</span></div>\n<p class=\"body-txt\">\ntrung thành với thương hiệu BlackBerry Passport.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phần quan trọng nhất của công thức &quot;outstanding&quot; là bạn phải thiết kế một hệ thống</span></div>\n<p class=\"body-txt\">\ngiúp cho khách hàng mua hàng thêm một lần nữa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ngay cả trong khóa học của diễn giả, việc bán khóa học rẻ hơn là để khuyến khích học</span></div>\n<p class=\"body-txt\">\nviên mua thêm một lần nữa.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Lòng trung thành tăng vọt sau lần mua thứ hai: Diễn giả nhấn mạnh &quot;Nếu khách hàng</span></div>\n<p class=\"body-txt\">\nmua hàng lần 2 thì họ có lòng trung thành cao gấp 10 lần những người mua hàng đầu\n \ntiên.&quot; Điều này cực kỳ quan trọng vì nó chỉ ra một điểm bùng phát về hành vi khách\n \nhàng. Vượt qua ngưỡng mua lần đầu để đạt được lần mua thứ hai là chìa khóa để chuyển\n \nđổi người mua thành khách hàng trung thành, mang lại giá trị lâu dài hơn cho doanh\n \nnghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mục tiêu tối thượng: Khuyến khích mua thêm một lần nữa: &quot;Tất cả những gì bạn cần làm</span></div>\n<p class=\"body-txt\">\ntrong công thức Outstanding... là giúp cho khách hàng mua hàng thêm một lần nữa.&quot; Đây\n \nlà kim chỉ nam hành động. Thay vì chỉ tập trung vào việc thu hút khách hàng mới, doanh\n \nnghiệp cần tập trung vào việc tạo ra trải nghiệm và chiến lược để khách hàng hiện tại\n \nquay lại. Điều này giúp tối ưu hóa chi phí marketing và xây dựng một cơ sở khách hàng\n \nbền vững.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sự khác biệt giữa &quot;người mua hàng&quot; và &quot;khách hàng&quot;: Khái niệm &quot;khách hàng 5 sao&quot;</span></div>\n<p class=\"body-txt\">\nđược định nghĩa là người mua từ hai lần trở lên. Sự phân biệt này quan trọng vì nó giúp\n \ndoanh nghiệp nhận diện và ưu tiên đúng nhóm đối tượng để đầu tư nguồn lực chăm sóc\n \nvà duy trì, thay vì coi tất cả những người đã từng mua hàng đều như nhau.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Nhóm 5 sao, nhóm khách hàng là nhóm mua hàng của ta ít nhất thêm một lần nữa.”\n \n“Nếu khách hàng mua hàng lần 2 thì họ có lòng trung thành cao gấp 10 lần những người mua\n \nhàng đầu tiên.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Tất cả những gì bạn cần làm trong công thức Outstanding, công thức làm chúng ta trở nên\n \nkhác biệt này là giúp cho khách hàng mua hàng thêm một lần nữa.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 19: Nhóm thành viên</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi giảng này tập trung vào tầm quan trọng của việc xây dựng và quản lý nhóm</h3>\n<p class=\"body-txt\">\nkhách hàng thành viên (membership) để tạo dựng lòng trung thành và khuyến khích hành vi\n \nmua hàng lặp lại. Diễn giả nhấn mạnh rằng membership là mức độ trung thành cao nhất,\n \ngiúp doanh nghiệp giữ chân khách hàng thông qua các chính sách tích điểm, nâng hạng và\n \nưu đãi đặc biệt. Khi trở thành thành viên, khách hàng sẽ ưu tiên sử dụng dịch vụ của doanh\n \nnghiệp mình, ngay cả khi có lựa chọn khác, từ đó tạo ra doanh số bền vững và khách hàng\n \ntrọn đời.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nhóm khách hàng &quot;thành viên&quot; là nhóm khách hàng trung thành, đã có lòng trung thành</span></div>\n<p class=\"body-txt\">\nban đầu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Để trở thành thành viên (member), khách hàng cần đạt một &quot;ngưỡng&quot; mua hàng nhất</span></div>\n<p class=\"body-txt\">\nđịnh (ví dụ: tổng giá trị mua hàng hoặc số lần mua).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Khi đạt ngưỡng, khách hàng sẽ được phát thẻ thành viên (thẻ giấy, thẻ cứng, thẻ điện</span></div>\n<p class=\"body-txt\">\ntử).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Membership là mức độ trung thành cao hơn nữa so với khách hàng thông thường.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Doanh nghiệp cần phải xây dựng một chính sách rõ ràng cho chương trình membership,</span></div>\n<p class=\"body-txt\">\nbao gồm thẻ tích điểm cho thành viên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Điểm tích lũy có thể được chuyển đổi thành tiền hoặc các ưu đãi khác.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ví dụ về hãng hàng không Vietnam Airlines: tích điểm dặm bay để nâng hạng thành viên</span></div>\n<p class=\"body-txt\">\n(Silver, Titanium, Gold) và được hưởng nhiều quyền lợi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Các ưu đãi của hạng thành viên cao cấp (ví dụ Gold) bao gồm: ưu tiên check-in, ưu tiên</span></div>\n<p class=\"body-txt\">\nchỗ ngồi gần khoang hạng nhất, đi lối đi riêng, và được vào hơn 160 phòng chờ (lounge)\n \ntrên khắp thế giới.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Khách hàng hạng Gold còn có thể được tự động nâng hạng lên Business class nếu máy</span></div>\n<p class=\"body-txt\">\nbay quá tải mà không phải trả thêm tiền.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Dặm bay tích lũy hàng năm hoặc hàng tháng có thể chuyển đổi thành vé máy bay miễn</span></div>\n<p class=\"body-txt\">\nphí.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Khách hàng có membership sẽ ưu tiên sử dụng dịch vụ của hãng đó (ví dụ: chọn Vietnam</span></div>\n<p class=\"body-txt\">\nAirlines vì là người Việt và được tích điểm), ngay cả khi giá có thể cao hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nếu hãng yêu thích không có tuyến bay, khách hàng sẽ chọn hãng trong liên minh của</span></div>\n<p class=\"body-txt\">\nhãng đó để tiếp tục tích điểm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Việc làm thẻ thành viên giúp giữ chân khách hàng mua lặp lại từ lần thứ 3, 10, đến lần</span></div>\n<p class=\"body-txt\">\nthứ 100.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Membership là mức độ trung thành cao nhất và là chiến lược giữ chân khách hàng cốt</span></div>\n<p class=\"body-txt\">\nlõi: Diễn giả nhấn mạnh membership không chỉ là một chương trình khuyến mãi mà là\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><p class=\"body-txt\">\nmột cam kết về mối quan hệ lâu dài, chuyển đổi khách hàng một lần thành khách hàng\n \ntrọn đời, tạo ra nguồn doanh thu ổn định và dự đoán được.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Hệ thống phân hạng và tích điểm rõ ràng, có lợi ích cụ thể là động lực mạnh mẽ thúc đẩy</span></div>\n<p class=\"body-txt\">\nhành vi mua hàng lặp lại: Ví dụ về các hạng thành viên hàng không (Silver, Titanium,\n \nGold) và việc đổi dặm bay lấy vé miễn phí/nâng hạng cho thấy khách hàng sẵn sàng cam\n \nkết và thậm chí chi trả cao hơn để tận dụng những ưu đãi này, từ đó tăng giá trị trọn đời\n \ncủa khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Lòng trung thành từ membership khiến khách hàng ưu tiên doanh nghiệp của bạn, ngay</span></div>\n<p class=\"body-txt\">\ncả khi có lựa chọn thay thế cạnh tranh: Điều này được minh họa qua việc diễn giả sẵn\n \nsàng chọn Vietnam Airlines dù có thể đắt hơn, vì lợi ích tích điểm và yếu tố cảm tính. Nó\n \ncho thấy membership tạo ra một &quot;rào cản chuyển đổi&quot; vững chắc, giữ chân khách hàng\n \nmột cách hiệu quả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“membership đó là cái mức độ trung thành cao hơn nữa.”\n \n“Đó chính là cái lý do mà bạn cần phải có membership.”\n \n“Làm cái thẻ thành viên các anh chị tăng thêm được một khoản tiền khối đấy, giữ được khách\n \nhàng mua lại lần một, lần hai rồi thì bây giờ lần ba, lần 10, lần 40, lần 50, lần 100 chính là cái\n \nthẻ thành viên này.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 20: Nhóm ủng hộ &amp; Raving fan</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi giảng tập trung vào hai cấp độ của khách hàng trung thành: nhóm ủng hộ</h3>\n<p class=\"body-txt\">\n(Advocates) và nhóm fan cuồng (Raving Fans). Nhóm ủng hộ luôn mua sản phẩm, giữ\n \nthương hiệu trong tâm trí và chia sẻ một cách say mê khi được hỏi. Nhóm fan cuồng vượt\n \ntrội hơn, họ tự nguyện quảng bá và bán sản phẩm/dịch vụ của bạn một cách say mê, vô điều\n \nkiện mà không cần được yêu cầu. Mục tiêu là xây dựng và nuôi dưỡng những nhóm khách\n \nhàng này để tạo ra kênh marketing tự nhiên và bền vững.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Giới thiệu về &quot;nhóm ủng hộ&quot; (tiếng Anh là Advocate, giống như luật sư, người bảo chữa).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Đặc trưng của nhóm ủng hộ:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Bán gì cũng mua&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Luôn tham dự/sử dụng sản phẩm/dịch vụ mới.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sản phẩm và dịch vụ của bạn nằm trong &quot;top of mind&quot; của họ (luôn nằm trong đầu, danh</span></div>\n<p class=\"body-txt\">\nsách dẫn đầu).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Khi bạn hỏi về sản phẩm/dịch vụ, họ sẽ nói về bạn một cách &quot;say mê&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ví dụ về &quot;top of mind&quot;: &quot;Ông diễn giả nào đáng học nhất Việt Nam?&quot; -&gt; &quot;Ông diễn giả&quot;;</span></div>\n<p class=\"body-txt\">\n&quot;Điện thoại nào đáng mua nhất?&quot; -&gt; &quot;Samsung Note 7 (hoặc Note 6, Note 5)&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Giới thiệu về &quot;nhóm fan cuồng&quot; (tiếng Anh là Raving Fan) - cấp độ cao hơn nhóm ủng hộ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Đặc trưng của nhóm fan cuồng:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nhóm ủng hộ là &quot;hỏi thì mới nói&quot;.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nhóm fan cuồng là &quot;không hỏi mà cũng nói&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Họ đi bán hàng cho bạn một cách &quot;say mê, vô điều kiện&quot;.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phân biệt rõ ràng các cấp độ khách hàng trung thành: Từ &quot;nhóm ủng hộ&quot; đến &quot;nhóm fan</span></div>\n<p class=\"body-txt\">\ncuồng&quot; giúp doanh nghiệp có cái nhìn sâu sắc về mức độ gắn kết của khách hàng. Điều\n \nnày quan trọng vì nó cho phép các chiến lược chăm sóc và phát triển mối quan hệ khách\n \nhàng được thiết kế phù hợp hơn, từ đó tối ưu hóa việc biến khách hàng thành tài sản\n \nmarketing có giá trị.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sức mạnh của sự &quot;say mê&quot; trong truyền miệng: Khách hàng nói về sản phẩm/dịch vụ</span></div>\n<p class=\"body-txt\">\nmột cách &quot;say mê&quot; là yếu tố then chốt tạo nên sự tin cậy và lan tỏa. Sự chân thành và\n \nnhiệt huyết này có sức thuyết phục mạnh mẽ hơn bất kỳ quảng cáo trả tiền nào. Điều\n \nnày quan trọng vì nó tạo ra hiệu ứng viral tự nhiên, giúp giảm chi phí marketing và xây\n \ndựng thương hiệu vững chắc hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Fan cuồng&quot; là kênh bán hàng miễn phí và hiệu quả nhất: Khả năng &quot;không hỏi mà cũng</span></div>\n<p class=\"body-txt\">\nnói&quot; và &quot;đi bán hàng cho bạn một cách say mê vô điều kiện&quot; của fan cuồng biến họ thành\n \nmột đội ngũ bán hàng không lương, đáng tin cậy. Điều này cực kỳ quan trọng đối với mọi\n \ndoanh nghiệp vì nó mang lại doanh số bền vững, tăng trưởng tự nhiên và mở rộng thị\n \ntrường với chi phí gần như bằng không.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Họ bán gì cũng mua.”\n \n“Ai đó mà hỏi tôi về điện thoại Samsung, tôi sẽ nói một cách say mê về cái thứ điện thoại kỳ\n \ndiệu trên hành tinh này.”\n \n“Cái nhóm fan cuồng này là cái nhóm không hỏi mà cũng nói. Họ đi bán hàng cho bạn một\n \ncách say mê vô điều kiện.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 21: Tôi và khách hàng là mối quan hệ 3 chiều</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi học này tập trung vào việc xây dựng mối quan hệ ba chiều bền vững với</h3>\n<p class=\"body-txt\">\nkhách hàng, vượt ra ngoài các giao dịch một hay hai chiều thông thường. Cốt lõi là chuyển\n \nđổi khách hàng từ những người mua một lần thành &quot;customer&quot; mua lặp lại, và sau đó thành\n \n&quot;Raving Fan&quot; – những người cuồng nhiệt, có cùng mục tiêu với doanh nghiệp và chủ động\n \nquảng bá sản phẩm/dịch vụ. Điều này đảm bảo sự tăng trưởng bền vững và lòng trung\n \nthành tuyệt đối, giúp doanh nghiệp tập trung nguồn lực hiệu quả hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mối quan hệ giữa &quot;tôi&quot; (người bán) và &quot;khách hàng&quot; là mối quan hệ ba chiều, không phải</span></div>\n<p class=\"body-txt\">\nhai chiều.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chiều thứ nhất: Tôi phải đáp ứng yêu cầu của khách hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Để làm được điều này, cần biết rõ &quot;khách hàng của ta là ai&quot; và &quot;khách hàng của ta cần</span></div>\n<p class=\"body-txt\">\nđiều gì&quot;.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nếu không đáp ứng yêu cầu của khách hàng, sẽ không bao giờ có tiền.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chiều thứ hai: Khách hàng cũng phải đáp ứng yêu cầu của tôi (người bán).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Yêu cầu quan trọng nhất là khách hàng phải &quot;mua lại lần nữa&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nếu khách hàng không mua lại, họ không phải là khách hàng để tập trung chăm sóc; nên</span></div>\n<p class=\"body-txt\">\ntập trung vào những &quot;customer&quot; (mua lại nhiều lần, được ví như 3 sao, 5 sao) với nỗ lực\n \nít hơn nhưng mang lại hiệu quả cao hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cần chủ động nói cho khách hàng biết &quot;tao rất cần mày mua thêm một lần nữa để mày</span></div>\n<p class=\"body-txt\">\ntrở thành customer của tao.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nếu khách hàng không mua thêm, ta không cần lo lắng vì &quot;ở ngoài kia còn rất nhiều&quot;</span></div>\n<p class=\"body-txt\">\nkhách hàng khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chiều thứ ba: Mối quan hệ hai chiều không đủ bền vững vì nhu cầu của cả hai bên có thể</span></div>\n<p class=\"body-txt\">\nthay đổi theo thời gian. Chiều thứ ba là khi &quot;mong muốn của anh cũng là mong muốn của\n \ntôi&quot; – cả khách hàng và doanh nghiệp cùng chung một mục đích.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Khách hàng ở giai đoạn này được gọi là &quot;Raving Fan&quot; (cuồng nhiệt), họ trung thành gần</span></div>\n<p class=\"body-txt\">\nnhư tuyệt đối và nhu cầu của họ cũng là nhu cầu của doanh nghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Raving Fan&quot; chủ động muốn bán hàng (quảng bá) cho nhãn hiệu/thương hiệu/con</span></div>\n<p class=\"body-txt\">\nngười mà mình cuồng nhiệt.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mục đích chung của Raving Fan và doanh nghiệp là giúp những người khác đạt được</span></div>\n<p class=\"body-txt\">\nmục đích giống họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Diễn giả sử dụng ví dụ về hôn nhân (tình nhau -&gt; tiền hôn nhân/hôn nhân -&gt; bền vững)</span></div>\n<p class=\"body-txt\">\nđể minh họa ba giai đoạn của mối quan hệ, nhấn mạnh sự cần thiết của mục tiêu chung\n \nđể mối quan hệ bền vững.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Trong kinh doanh, việc thay thế khách hàng khi họ không đáp ứng nhu cầu của ta dễ</span></div>\n<p class=\"body-txt\">\ndàng hơn nhiều so với trong mối quan hệ gia đình, do các yếu tố văn hóa, lịch sử và định\n \nkiến xã hội.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Quan trọng là phải xác định rõ mình đang bán loại hàng hóa/dịch vụ gì để áp dụng chiến</span></div>\n<p class=\"body-txt\">\nlược phù hợp.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chuyển từ mối quan hệ một/hai chiều sang &quot;ba chiều&quot;: Điều này cực kỳ quan trọng vì nó</span></div>\n<p class=\"body-txt\">\nđịnh hướng doanh nghiệp xây dựng mối quan hệ đối tác bền vững với khách hàng,\n \nkhông chỉ dừng lại ở việc đáp ứng nhu cầu khách hàng hay khuyến khích mua lại. Mối\n \nquan hệ ba chiều là khi mục tiêu của khách hàng cũng là mục tiêu của doanh nghiệp, tạo\n \nra sự cam kết sâu sắc và lâu dài, là nền tảng cho sự phát triển bền vững.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tập trung vào việc biến khách hàng thành &quot;Raving Fan&quot;: &quot;Raving Fan&quot; là tài sản vô giá</span></div>\n<p class=\"body-txt\">\ncủa doanh nghiệp. Họ không chỉ là những người mua lặp lại với lòng trung thành gần\n \nnhư tuyệt đối mà còn là những đại sứ thương hiệu tự nguyện, chủ động giới thiệu và\n \nquảng bá sản phẩm/dịch vụ. Việc này giúp doanh nghiệp giảm chi phí marketing, tăng\n \ndoanh số thông qua lời truyền miệng và tạo dựng uy tín vững chắc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chủ động yêu cầu khách hàng đáp ứng nhu cầu của mình (ví dụ: mua lại): Điều này quan</span></div>\n<p class=\"body-txt\">\ntrọng vì nó thiết lập một mối quan hệ cân bằng, nơi cả hai bên đều có sự trao đổi và cam\n \nkết. Bằng cách chủ động yêu cầu, doanh nghiệp có thể lọc bỏ những khách hàng không\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><p class=\"body-txt\">\nphù hợp cho mối quan hệ dài hạn và tập trung nguồn lực vào những khách hàng có tiềm\n \nnăng trở thành &quot;customer&quot; thực sự và &quot;Raving Fan&quot;, tối ưu hóa hiệu quả kinh doanh.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Cái ta muốn nhất là khách hàng mua lại lần nữa.”\n \n“Nếu nó không mua thì sao? Thì chẳng sao cả! Bởi vì ở ngoài kia còn rất nhiều nữa.”\n \n“Mong muốn của anh cũng là mong muốn của tôi.”\n \n“Raving Fan là khách hàng và doanh nghiệp cùng chung một mục đích.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Chương 4</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 22: Từ bỏ doanh nghiệp của mình</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi giảng này tập trung vào tư duy kinh doanh bền vững, nhấn mạnh tầm quan</h3>\n<p class=\"body-txt\">\ntrọng của việc xây dựng và duy trì một nền tảng khách hàng vững chắc thay vì chỉ tập trung\n \nvào sản phẩm. Diễn giả sử dụng hình ảnh &quot;điều hòa nhiệt độ&quot; và &quot;quỹ đạo 22 độ&quot; để minh\n \nhọa sự dao động của doanh nghiệp và cách để ổn định nó. Cốt lõi là phải yêu thương và cung\n \ncấp giá trị cho khách hàng, sẵn sàng thay đổi sản phẩm hoặc thậm chí từ bỏ một doanh\n \nnghiệp nếu nó không còn hiệu quả, miễn là nền tảng khách hàng vẫn còn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tư duy về nhiệt độ và quỹ đạo 22 độ: So sánh doanh nghiệp với một cái thang nhiệt độ,</span></div>\n<p class=\"body-txt\">\nnơi các điều hòa (suy nghĩ, cách làm) điều chỉnh để giữ nhiệt độ (doanh nghiệp) ở mức\n \n22 độ (trạng thái ổn định, mong muốn).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ý nghĩa của 4 năm nỗ lực: 4 năm nỗ lực không quan trọng bằng khoảnh khắc tìm ra công</span></div>\n<p class=\"body-txt\">\nthức để đưa doanh nghiệp về &quot;quỹ đạo 22 độ&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Khi doanh nghiệp &quot;chết&quot;: Khi doanh nghiệp lệch khỏi quỹ đạo hoặc thất bại, đừng lo</span></div>\n<p class=\"body-txt\">\nlắng, có hai kiểu làm: khôi phục nó hoặc &quot;đập mới&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sự gắn bó với doanh nghiệp: Con người thường không có gan để &quot;đập bỏ&quot; một doanh</span></div>\n<p class=\"body-txt\">\nnghiệp đã gắn bó đủ lâu, kể cả khi nó không còn hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nền tảng vững chắc: Bí quyết kinh doanh thành công là xây dựng một nền tảng vững</span></div>\n<p class=\"body-txt\">\nchắc, đó là tập khách hàng. (Diễn giả nhấn mạnh đây là điều quan trọng nhất).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Minh họa hệ sinh thái kinh doanh: Diễn giả giới thiệu mô hình kinh doanh của mình với</span></div>\n<p class=\"body-txt\">\nnhiều công ty (công ty luật, BNI, công ty đào tạo doanh nhân, công ty coaching) đều có\n \nchung một nền tảng khách hàng là &quot;doanh nhân&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Lợi thế cạnh tranh từ nền tảng khách hàng chung: Khi có một nền tảng khách hàng</span></div>\n<p class=\"body-txt\">\nchung, marketing cho một công ty sẽ kéo khách hàng đến các công ty khác trong hệ sinh\n \nthái một cách tự nhiên. Dù đối thủ không thể bỏ ra chi phí quảng cáo lớn cho một dịch vụ\n \nnhỏ, diễn giả vẫn làm được vì ông có thể bán chéo nhiều dịch vụ khác cho cùng một\n \nkhách hàng.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Không yêu sản phẩm, hãy yêu khách hàng: Triết lý cốt lõi là doanh nhân không nên yêu</span></div>\n<p class=\"body-txt\">\nthích sản phẩm mà phải yêu thích khách hàng. Sản phẩm không còn phù hợp thì &quot;tiêu\n \ndiệt nó đi&quot;, thay đổi hoặc loại bỏ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mô hình kinh doanh linh hoạt: Nếu một công ty trong hệ sinh sinh thái không có khách</span></div>\n<p class=\"body-txt\">\nhàng hoặc không hiệu quả, có thể đóng cửa hoặc bán nó đi mà không ảnh hưởng lớn đến\n \ntoàn bộ hệ thống vì nền tảng khách hàng chung vẫn còn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nền tảng khách hàng vững chắc là tài sản quan trọng nhất: Diễn giả nhấn mạnh việc xây</span></div>\n<p class=\"body-txt\">\ndựng một &quot;tập khách hàng&quot; chung cho nhiều doanh nghiệp khác nhau. Điều này cực kỳ\n \nquan trọng vì nó tạo ra một lợi thế cạnh tranh khổng lồ: chi phí marketing cho một\n \nkhách hàng có thể được bù đắp và sinh lời từ nhiều sản phẩm/dịch vụ khác nhau trong\n \nhệ sinh thái. Khách hàng là trung tâm, sản phẩm có thể thay đổi nhưng khách hàng vẫn ở\n \nlại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tư duy &quot;không yêu sản phẩm, yêu khách hàng&quot;: Đây là một insight đắt giá. Nhiều doanh</span></div>\n<p class=\"body-txt\">\nnghiệp mắc kẹt vì quá gắn bó với sản phẩm/dịch vụ của mình, ngay cả khi nó không còn\n \nphù hợp với thị trường. Diễn giả dạy rằng phải sẵn sàng từ bỏ hoặc thay đổi sản phẩm\n \nnếu nó không đáp ứng được nhu cầu khách hàng nữa, miễn là bạn vẫn giữ được khách\n \nhàng. Điều này giúp doanh nghiệp linh hoạt và thích ứng nhanh với thị trường thay đổi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Lợi thế từ hệ sinh thái đồng nhất: Việc tất cả các doanh nghiệp trong hệ thống đều phục</span></div>\n<p class=\"body-txt\">\nvụ cùng một nhóm đối tượng khách hàng (ví dụ: &quot;doanh nhân&quot;) giúp tối ưu hóa chi phí\n \nvà nỗ lực. Một nỗ lực marketing hoặc một khách hàng ban đầu có thể tạo ra doanh thu\n \ngấp nhiều lần khi được bán chéo các sản phẩm/dịch vụ khác nhau. Điều này cũng giúp\n \nđối thủ khó lòng cạnh tranh nếu họ chỉ tập trung vào một sản phẩm đơn lẻ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Cái 4 năm đấy nó không hề có một ý nghĩa nào cả. Trong 4 năm đấy nó có một khoảnh khắc\n \nnào đấy đã tìm ra một công thức nào đấy để đưa ông vào cái quỹ đạo 22 độ này.”\n \n“Doanh nhân yêu thích sản phẩm? Chết! Doanh nhân yêu thích khách hàng? Sống!”\n \n“Không cần sản phẩm, tiêu diệt nó đi, tiêu diệt nó đi, tiêu diệt nó đi nếu nó không còn phù hợp\n \nvới thị trường nữa.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 23: Need &amp; Want</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi học tập trung vào chiến lược kinh doanh cốt lõi: không bắt đầu từ sản phẩm,</h3>\n<p class=\"body-txt\">\nmà từ việc xác định rõ khách hàng mục tiêu và nhu cầu, mong muốn cốt lõi nhất của họ.\n \nDoanh nghiệp cần định vị một giá trị cốt lõi duy nhất mà mình muốn mang lại, sau đó thiết\n \nkế mọi sản phẩm và dịch vụ xoay quanh giá trị này để phục vụ đúng đối tượng khách hàng\n \nđã chọn. Việc này giúp đảm bảo mọi hoạt động kinh doanh đều hướng tới việc tạo ra &quot;sự\n \nthay đổi&quot; có ý nghĩa cho khách hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3></div></div>",
