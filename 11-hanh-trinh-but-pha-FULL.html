<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hành Trình Bứt Phá</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#e8eaf0;font-family:'Segoe UI',Arial,sans-serif}
body{display:flex;flex-direction:column;align-items:center;padding:18px 10px 24px}

/* Book wrapper */
#book-wrap{width:720px;max-width:98vw;display:flex;flex-direction:column}

/* Top bar: title + page info */
#top-bar{display:flex;justify-content:space-between;align-items:center;
          margin-bottom:6px;padding:0 2px}
#book-title{font-size:13px;font-weight:600;color:#444;white-space:nowrap;
             overflow:hidden;text-overflow:ellipsis;max-width:60%}
#page-info{font-size:13px;color:#666;white-space:nowrap}

/* Progress bar */
#progress-bar{width:100%;height:3px;background:#d0d0d0;border-radius:2px;margin-bottom:10px}
#progress-fill{height:100%;border-radius:2px;transition:width .3s;background:#00838f}

/* Page */
.pg{width:100%;min-height:540px;background:#ffffff;border-radius:6px;
     box-shadow:0 2px 16px rgba(0,0,0,.12);overflow:hidden}

/* Cover */
.pg-cover{display:flex;justify-content:center;align-items:center;min-height:540px}
.cover-wrap{text-align:center;padding:60px 40px}
.cover-tag{font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;font-weight:600}
.cover-title{font-size:28px;font-weight:700;color:#1a1a1a;line-height:1.4;margin-bottom:16px}
.cover-sub{font-size:14px;font-weight:500}

/* Content page */
.pg-content{}
.pg-inner{padding:28px 36px 32px;overflow-y:auto;max-height:540px}
.pg-inner::-webkit-scrollbar{width:5px}
.pg-inner::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

/* Typography */
.sec-hdr{font-size:12px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
          margin:18px 0 8px;padding-bottom:5px;border-bottom:1px solid #eee}
.sec-hdr:first-child{margin-top:0}
.body-txt{font-size:14px;color:#2d2d2d;line-height:1.8;margin-bottom:10px;text-align:justify}
.bullet{display:flex;gap:10px;margin:5px 0}
.bul-dot{font-size:18px;line-height:1.4;flex-shrink:0;margin-top:-1px}
.bul-txt{font-size:13.5px;color:#2d2d2d;line-height:1.7}

/* Navigation */
#nav{display:flex;align-items:center;gap:14px;margin-top:12px}
.nav-btn{background:#fff;border:2px solid #00838f;color:#00838f;padding:8px 24px;
          border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;
          transition:all .15s;letter-spacing:.5px}
.nav-btn:hover{background:#00838f;color:#fff}
.nav-btn:disabled{opacity:.35;cursor:default}
#page-jump{width:52px;text-align:center;border:1px solid #ccc;border-radius:5px;
            padding:6px;font-size:13px;color:#444}
</style>
</head>
<body>
<div id="book-wrap">

    <div id="book-title">Hành Trình Bứt Phá</div>

  </div>
  <div id="progress-bar"><div id="progress-fill" style="width:1.3%"></div></div>
  <div id="book"></div>
</div>
<div id="nav">
  <button class="nav-btn" id="btn-prev" onclick="prev()" disabled>◄ Trước</button>
  <input id="page-jump" type="number" min="1" max="77" value="1"
         onchange="goTo(+this.value-1)" title="Nhảy đến trang">
  <button class="nav-btn" id="btn-next" onclick="next()">Tiếp ►</button>
</div>
<script>
const pages=["<div class=\"pg pg-cover\" style=\"border-top:5px solid #00838f\">\n  <div class=\"cover-wrap\">\n    <div class=\"cover-tag\" style=\"color:#00838f\">Sổ Tay Tinh Hoa · QNPA</div>\n    <div class=\"cover-title\">Hành Trình Bứt Phá</div>\n    <div class=\"cover-sub\" style=\"color:#00838f\">75 trang nội dung đầy đủ</div>\n  </div>\n</div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><p class=\"body-txt\">\nHành Trình Bứt Phá Kinh\n \nDoanh\n \nSổ tay tinh hoa\n</p>\n<p class=\"body-txt\">\nTổng hợp 44 bài\n \nNguồn: khoá học Hành Trình Bứt Phá Kinh Doanh\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><p class=\"body-txt\">\nLời mở\n \nQuyển sách này tổng hợp tinh hoa khoá Hành Trình Bứt Phá Kinh Doanh, do AI nghe lại từng\n \nbài giảng và chắt lọc thành: tóm tắt, ý chính, điểm quan trọng nhất, và trích dẫn đáng nhớ.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><p class=\"body-txt\">\nMục lục\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Chương 1</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 1: Mô hình kinh doanh kiếm 40 triệu đô trong 2 tháng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 2: Chiếc bút chì cùn còn hơn bộ não thông minh</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Chương 2</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 3: Nghệ thuật chinh phục mục tiêu và ăn mừng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 4: Phân biệt triệu chứng và nguyên nhân trong kinh doanh</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 5: Chế ngự hay để nỗi sợ điều khiển</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 6: Bài học sau thất bại</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 7: Thà đứng bét nhóm đầu còn hơn dẫn đầu nhóm sau</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 8: Nghi thức</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 9: Phân tích case study và logical levers</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 10: Life long learning</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 11: Peer groups</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Chương 3</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 12: Tam giác thành công trong doanh nghiệp</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 13: Sông Nin và biển chết</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 14: Những gì đưa bạn đến A thì không thể đưa bạn đến B</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 15: Xác định thị trường mục tiêu</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 16: Danh sách khách hàng tiềm năng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 17: Nhóm mua hàng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 18: Nhóm khách hàng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 19: Nhóm thành viên</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 20: Nhóm ủng hộ &amp; Raving fan</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 21: Tôi và khách hàng là mối quan hệ 3 chiều</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Chương 4</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 22: Từ bỏ doanh nghiệp của mình</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 23: Need &amp; Want</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 24: Công thức gia tăng doanh thu</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Chương 5</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 25: Mô hình Canvas</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 26: Thay đổi và làm chủ cuộc sống</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 27: Sản phẩm của tôi là tuyệt vời</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 28: Thang và phễu</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 29: LVC - Sản phẩm miễn phí</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 30: LVC - Con cá và lưỡi câu</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 31: Chiến lược tăng LVC</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 32: Quảng cáo dựa trên cốt lõi sản phẩm</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Chương 6</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 33: Bài tập - Trả lời các câu hỏi</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 34: Cột chống &amp; Chiến lược 10x10</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 35: Chiến lược đua xe đạp nước rút</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 36: 3 Nhóm người trong doanh nghiệp</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 37: Bài tập</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 38: Hệ thống Marketing Online</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 39: Phễu &amp; Nguyên lý hoạt động của Email Marketing</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 40: Hỏi - Đáp</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 41: Trở thành người ai cũng muốn làm việc cùng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 42: Vòng lặp 8 Module trong kinh doanh</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 43: Công thức của sự thay đổi</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bài 44: Phương pháp RPM</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#00838f\">Chương 1</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 1: Mô hình kinh doanh kiếm 40 triệu đô trong 2 tháng</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi giảng phân tích một mô hình kinh doanh nến đơn giản nhưng đã tạo ra doanh</h3>\n<p class=\"body-txt\">\nthu 40 triệu đô la trong 2 năm, bằng cách biến một sản phẩm thông thường thành trải\n \nnghiệm &quot;săn kho báu&quot; cho khách hàng. Diễn giả nhấn mạnh rằng mô hình kinh doanh không\n \nđược bảo hộ sở hữu trí tuệ. Do đó, điều cốt lõi là phải biết cách phân tích thành công của\n \nngười khác, sau đó sao chép và áp dụng chúng vào doanh nghiệp của mình một cách thông\n \nminh để tạo ra đột phá.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Giới thiệu về một mô hình kinh doanh nến rất đơn giản đã tạo ra 40 triệu đô la doanh</span></div>\n<p class=\"body-txt\">\nthu trong vòng 2 năm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sản phẩm là cây nến trong cốc thủy tinh, bên trong có bấc và sáp parafin màu, mùi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bước 1: Thắp nến lên, tận hưởng mùi thơm và ánh sáng của nến.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bước 2: Khi thấy một mảnh giấy vàng (gold foil) xuất hiện trong sáp nến, nhẹ nhàng tắt</span></div>\n<p class=\"body-txt\">\nnến, lấy mảnh vàng ra và tháo nó ra.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bước 3: Bên trong mảnh vàng có một chiếc nhẫn quý (jewel) với một dòng chữ được</span></div>\n<p class=\"body-txt\">\nkhắc. Người mua lên trang web và nhập dòng chữ đó vào.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bước 4: Người mua có cơ hội thắng các giải thưởng tiền mặt trị giá $100, $1,000 hoặc</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">$10,000.</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bí quyết kinh doanh của họ là 4 bước đơn giản này, đã mang lại doanh số xấp xỉ 100 tỷ</span></div>\n<p class=\"body-txt\">\nđồng mỗi năm chỉ từ việc bán nến.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Khi tìm hiểu một mô hình kinh doanh thành công, cần tìm ra điểm thành công của họ là</span></div>\n<p class=\"body-txt\">\ngì và phân tích kỹ lưỡng tại sao họ thành công.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bí quyết là nhanh chóng phân tích được mô hình kinh doanh đó và đưa nó vào hệ thống</span></div>\n<p class=\"body-txt\">\nkinh doanh của mình (ví dụ: Unica đã phân tích và sao chép Udemy).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mô hình kinh doanh không được bảo hộ sở hữu trí tuệ, nên hoàn toàn có thể sao chép</span></div>\n<p class=\"body-txt\">\nmô hình kinh doanh của người khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Điều quan trọng là phải có bí quyết để phân tích mô hình kinh doanh, từ đó có thể tự xây</span></div>\n<p class=\"body-txt\">\ndựng hoặc tùy chỉnh các mô hình phù hợp cho riêng mình.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mô hình kinh doanh không được bảo hộ sở hữu trí tuệ: Đây là một thông tin cực kỳ đắt</span></div>\n<p class=\"body-txt\">\ngiá vì nó mở ra một chân trời mới cho việc học hỏi và phát triển. Các doanh nghiệp có\n \nthể tự do nghiên cứu, phân tích và áp dụng những mô hình đã được chứng minh hiệu\n \nquả từ các đối thủ hoặc ngành khác mà không phải lo lắng về vấn đề pháp lý. Điều này\n \nkhuyến khích tư duy đổi mới dựa trên nền tảng thành công sẵn có.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bí quyết nằm ở khả năng phân tích và sao chép thông minh: Thành công không nhất</span></div>\n<p class=\"body-txt\">\nthiết phải đến từ việc sáng tạo ra thứ gì đó hoàn toàn mới, mà còn có thể đến từ việc\n \nphân tích sâu sắc các mô hình đã thành công, hiểu rõ *tại sao* chúng thành công, và sau\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><p class=\"body-txt\">\nđó điều chỉnh, áp dụng chúng một cách phù hợp với bối cảnh và nguồn lực của mình.\n \nĐiều này giúp tối ưu hóa nguồn lực và giảm thiểu rủi ro.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tạo giá trị bất ngờ và trải nghiệm khám phá cho khách hàng: Mô hình kinh doanh nến</span></div>\n<p class=\"body-txt\">\nthành công không chỉ bán sản phẩm vật lý mà còn bán một &quot;trò chơi&quot; hoặc &quot;kho báu&quot; ẩn\n \ngiấu. Việc thêm yếu tố bất ngờ, sự thú vị vào trải nghiệm mua hàng giúp biến một sản\n \nphẩm đơn thuần thành một hành trình khám phá, tạo sự khác biệt và thu hút, giữ chân\n \nkhách hàng hiệu quả hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Mô hình kinh doanh là đối tượng không được bảo hộ sở hữu trí tuệ.”\n \n“Tất cả bí quyết kinh doanh của họ chỉ có vậy.”\n \n“Khi mà nhìn thấy một mô hình kinh doanh, cái bí quyết ở đây là các anh chị phải nhanh chóng\n \nphân tích được nó và sau đó các anh chị đưa nó vào trong hệ thống kinh doanh của chúng ta.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 2: Chiếc bút chì cùn còn hơn bộ não thông minh</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi giảng nhấn mạnh tầm quan trọng của việc ghi lại các ý tưởng, dù là nhỏ nhất,</h3>\n<p class=\"body-txt\">\nbằng bút chì và sổ tay. Diễn giả khẳng định việc viết ra giúp cụ thể hóa ý tưởng, biến chúng\n \nthành hành động và có giá trị tiềm năng. Buổi này cũng giới thiệu phương pháp &quot;iconic&quot;\n \n(biểu tượng hóa) – tư duy và ghi chép bằng hình ảnh – để tăng cường khả năng ghi nhớ và\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">hành động, ngay cả trong bối cảnh kinh doanh số hóa hay những khác biệt văn hóa khi làm</h3>\n<p class=\"body-txt\">\năn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Điều quan trọng nhất là cần có bút và sổ để ghi lại ngay những ý tưởng kinh doanh hay.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Diễn giả trích dẫn hai câu nói làm nền tảng cho thành công của mình:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Một mẩu bút chì cùn thì có tác dụng hơn cả một bộ não siêu phàm.&quot; (Ý nghĩa: việc ghi lại</span></div>\n<p class=\"body-txt\">\ngiúp lưu giữ và hành động hiệu quả hơn so với chỉ nhớ trong đầu).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Hãy mua lấy một cây bút chì giá 5 cent, một quyển sổ giá 10 cent. Và sau đó ghi xuống</span></div>\n<p class=\"body-txt\">\nnhững ý tưởng triệu đô.&quot; (Ý nghĩa: giá trị của ý tưởng không nằm ở công cụ ghi chép mà\n \nở hành động ghi chép).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Diễn giả minh họa bằng cách cho xem những quyển sổ dày đặc ý tưởng được ghi bằng</span></div>\n<p class=\"body-txt\">\nbút chì của mình, gọi chúng là &quot;những quyển sổ triệu đô&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Trong bối cảnh kinh doanh ở Việt Nam, ngay cả thương mại điện tử cũng cần phải thông</span></div>\n<p class=\"body-txt\">\nthuộc địa lý, văn hóa và thói quen của người bản địa (ví dụ: việc thu tiền mặt, cần viết ra\n \ngiấy để giao dịch coupon).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Khác biệt văn hóa và thói quen này là lý do nhiều người nước ngoài thất bại trong kinh</span></div>\n<p class=\"body-txt\">\ndoanh ở Việt Nam, vì họ không hiểu rằng nhiều giao dịch &quot;điện tử&quot; vẫn cần &quot;giấy tờ&quot;\n \nhoặc sự cụ thể hóa vật lý.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Để biến ý tưởng thành hành động, cần &quot;iconic&quot; hóa chúng – tức là chuyển các ý tưởng</span></div>\n<p class=\"body-txt\">\nthành biểu tượng (hình ảnh, icon).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Iconic&quot; giúp tư duy về hình ảnh (visualize), làm cho ý tưởng trở nên rõ ràng và dễ hình</span></div>\n<p class=\"body-txt\">\ndung hơn trong đầu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Diễn giả kể chuyện về việc tặng bút chì trong lớp học: nhiều người không chủ động lên</span></div>\n<p class=\"body-txt\">\nlấy bút chì vì họ &quot;không hình dung được cái bút chì là cái gì trong đầu&quot;, cho thấy sự thiếu\n \ntư duy hình ảnh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phương pháp &quot;iconic&quot; (biểu tượng hóa) là dùng biểu tượng để vẽ và ghi chép mọi thứ</span></div>\n<p class=\"body-txt\">\nxuống. Nếu biểu tượng chưa rõ ràng, có thể viết chữ giải thích bên cạnh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cuốn sách &quot;Business Model&quot; của diễn giả được thiết kế hoàn toàn bằng các biểu tượng</span></div>\n<p class=\"body-txt\">\nvà vẽ bằng bút chì, minh họa cho phương pháp này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nếu không tìm được biểu tượng phù hợp, có thể tìm kiếm &quot;[từ khóa] + icon&quot; trên mạng</span></div>\n<p class=\"body-txt\">\nđể tham khảo và vẽ lại.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Một mẩu bút chì cùn thì có tác dụng hơn cả một bộ não siêu phàm.&quot;: Câu nói này cực kỳ</span></div>\n<p class=\"body-txt\">\nquan trọng vì nó nhấn mạnh rằng hành động ghi chép (dù bằng công cụ đơn giản nhất)\n \ncó giá trị hơn rất nhiều so với việc chỉ lưu giữ ý tưởng trong đầu. Bộ não có thể quên\n \nhoặc biến dạng ý tưởng, nhưng khi được viết ra, ý tưởng trở nên cụ thể, rõ ràng và sẵn\n \nsàng để phát triển hoặc hành động, cho phép bất kỳ ai cũng có thể biến ý tưởng thành\n \nhiện thực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ghi chép ý tưởng thành &quot;biểu tượng&quot; (Iconic/Tư duy về hình ảnh): Điểm này quan trọng</span></div>\n<p class=\"body-txt\">\nvì nó vượt ra khỏi việc chỉ viết chữ. Việc chuyển ý tưởng sang dạng hình ảnh, biểu tượng\n \ngiúp kích thích tư duy trực quan, cải thiện khả năng ghi nhớ, dễ dàng truyền đạt và sắp\n \nxếp thông tin. Nó giải quyết vấn đề &quot;không hình dung được&quot; ý tưởng, biến những khái\n \nniệm trừu tượng thành thứ hữu hình, dễ hiểu và dễ hành động hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Thích nghi với bối cảnh và thói quen địa phương: Thông qua ví dụ về thương mại điện</span></div>\n<p class=\"body-txt\">\ntử ở Việt Nam, diễn giả nhấn mạnh tầm quan trọng của việc hiểu và thích nghi với các\n \nđặc điểm văn hóa, thói quen địa phương (ví dụ: cần có &quot;giấy&quot; ngay cả trong giao dịch số).\n \nĐiều này rất quan trọng trong kinh doanh vì nó cho thấy thành công không chỉ dựa vào\n \ncông nghệ hay mô hình chuẩn mà còn phụ thuộc vào khả năng linh hoạt và đáp ứng nhu\n \ncầu thực tế, đôi khi là phi truyền thống, của thị trường mục tiêu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Một mẩu bút chì cùn thì có tác dụng hơn cả một bộ não siêu phàm.”\n \n“Hãy mua lấy một cây bút chì giá 5 cent, một quyển sổ giá 10 cent. Và sau đó ghi xuống những\n \ný tưởng triệu đô.”\n \n“Hãy biến mọi cái ý tưởng này ghi chép ra bằng cái ai cần.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#00838f\">Chương 2</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 3: Nghệ thuật chinh phục mục tiêu và ăn mừng</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi giảng tập trung vào hai nghệ thuật làm chủ cuộc đời: chinh phục mục tiêu và</h3>\n<p class=\"body-txt\">\năn mừng. Diễn giả nhấn mạnh rằng cách chúng ta nhìn nhận giá trị của một trải nghiệm (ví\n \ndụ: khoá học) sẽ quyết định mức độ chúng ta tham gia và nhận được giá trị từ nó. Đặc biệt,\n \nviệc ăn mừng &quot;điên cuồng&quot; được khuyến khích như một cách thay đổi trạng thái sinh lý và\n \ncảm xúc, từ đó thúc đẩy thành công.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Có hai nghệ thuật cần làm chủ trong đời để trở nên tuyệt vời hơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ví dụ về những người thành công nhưng chọn cái chết (Lê Công Tuấn Anh, ông chủ kênh</span></div>\n<p class=\"body-txt\">\ntruyền hình nổi tiếng ở Mỹ) cho thấy sự thiếu sót trong nghệ thuật thứ hai.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nghệ thuật đầu tiên là chinh phục mục tiêu.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nghệ thuật thứ hai là ăn mừng, đặc biệt là ăn mừng theo phong cách kinh doanh đột phá.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Diễn giả hướng dẫn bài tập ăn mừng gồm các bước: la thật to, high-five, high-five bằng</span></div>\n<p class=\"body-txt\">\nmông (trái rồi phải), high-five bằng bụng, ôm nhau và nhảy lên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Quan sát cho thấy có hai nhóm phản ứng với việc ăn mừng: &quot;hay quá&quot; và &quot;ngu quá&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sự khác biệt trong phản ứng là do cảm xúc khác nhau.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Để có cảm xúc như những người &quot;điên&quot;, cần cư xử như những người &quot;điên&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Trong thế giới những người &quot;điên&quot;, người tỉnh mới là người &quot;điên&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Diễn giả chia sẻ trải nghiệm cá nhân từng coi thường việc ăn mừng, cho rằng nó &quot;ngu</span></div>\n<p class=\"body-txt\">\nngốc&quot; và chỉ muốn học kinh doanh kiếm tiền.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sau đó, diễn giả nhận ra rằng việc nhảy (ăn mừng) làm thay đổi trạng thái sinh lý</span></div>\n<p class=\"body-txt\">\n(physiology) và cảm xúc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cách bạn coi giá trị của khóa học (ví dụ: 1 triệu hay 100 triệu) sẽ quyết định mức độ bạn</span></div>\n<p class=\"body-txt\">\ntham gia và nhận được giá trị từ nó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nếu coi khóa học là 100 triệu (hoặc 110 triệu như Eagle Camp), người học sẽ &quot;điên&quot; và</span></div>\n<p class=\"body-txt\">\năn mừng nhiệt tình hơn, nhận được giá trị tương xứng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nếu coi là 1 triệu, sẽ nhận được giá trị 1 triệu.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cách chúng ta định giá một trải nghiệm quyết định giá trị nhận được: Diễn giả nhấn</span></div>\n<p class=\"body-txt\">\nmạnh rằng việc coi một khóa học là 1 triệu hay 100 triệu sẽ trực tiếp ảnh hưởng đến\n \nmức độ tham gia, năng lượng bỏ ra và kết quả nhận lại. Điều này quan trọng vì nó thay\n \nđổi tư duy từ thụ động sang chủ động, từ việc &quot;nhận&quot; thành &quot;tạo ra&quot; giá trị thông qua sự\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">cam kết của bản thân.</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sức mạnh của việc thay đổi trạng thái sinh lý và cảm xúc thông qua ăn mừng: Nhiều</span></div>\n<p class=\"body-txt\">\nngười thành công nhưng vẫn chọn cái chết cho thấy họ thiếu khả năng quản lý trạng thái\n \ncảm xúc. Việc ăn mừng &quot;điên cuồng&quot; (thậm chí là nhảy nhót, la hét) là một công cụ mạnh\n \nmẽ để thay đổi sinh lý cơ thể, từ đó tạo ra cảm xúc tích cực, tăng năng lượng và động lực,\n \ngiúp duy trì sự bền bỉ trên con đường chinh phục mục tiêu.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Nghệ thuật có hai cái nghệ thuật bạn cần làm chủ trong cuộc đời của mình để cho cuộc đời\n \ncủa mình được trở nên tuyệt vời hơn.”\n \n“Bởi vì cảm xúc khác nhau. Bởi vậy cho nên khi bạn muốn có cảm xúc giống như những bọn\n \nđiên, thì mình hãy cư xử như gì ạ? Như bọn điên. Trong thế giới những thằng điên, thằng tỉnh\n \nmới đúng là thằng điên.”\n \n“Nếu mà các anh chị coi rằng đây là một khóa học 1 triệu, anh chị sẽ nhận được đúng giá trị 1\n \ntriệu. Nếu các anh chị coi rằng đây là một khóa học 100 triệu, các anh chị sẽ nhận được giá trị\n \n100 triệu.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 4: Phân biệt triệu chứng và nguyên nhân trong kinh doanh</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi học này nhấn mạnh tầm quan trọng của việc phân biệt triệu chứng và nguyên</h3>\n<p class=\"body-txt\">\nnhân trong cả cuộc sống và kinh doanh. Diễn giả chỉ ra rằng hầu hết mọi người thường mắc\n \nsai lầm khi chỉ chữa trị triệu chứng mà bỏ qua nguyên nhân gốc rễ, dẫn đến vấn đề không\n \nđược giải quyết triệt để. Mục tiêu của khóa học là biến học viên thành những &quot;bác sĩ&quot; có khả\n \nnăng chẩn đoán và chữa trị đúng nguyên nhân cho doanh nghiệp của mình. Ví dụ cụ thể\n \nđược đưa ra là &quot;không quảng cáo&quot; thường là triệu chứng của việc không biết cách quảng cáo\n \nđể kiếm tiền hiệu quả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cần phải phân biệt được triệu chứng và nguyên nhân.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Hầu hết mọi người sẽ đi chữa triệu chứng, nhưng cách này không hiệu quả và thường</span></div>\n<p class=\"body-txt\">\nlàm vấn đề trở nên tồi tệ hơn hoặc không giải quyết được gốc rễ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Trong kinh doanh, chúng ta cũng cần phải phân biệt được triệu chứng và nguyên nhân.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ví dụ &quot;không quảng cáo&quot; là triệu chứng, không phải nguyên nhân. Nếu chỉ bỏ tiền ra</span></div>\n<p class=\"body-txt\">\nquảng cáo mà không biết nguyên nhân thì sẽ mất tiền ngay lập tức.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nguyên tắc quan trọng: không chữa triệu chứng mà sẽ chữa nguyên nhân.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mục tiêu của khóa học là giúp học viên học cách &quot;khám bệnh&quot; cho công việc kinh doanh</span></div>\n<p class=\"body-txt\">\ncủa mình, trở thành &quot;bác sĩ của doanh nghiệp&quot; để chữa những căn bệnh đơn giản.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ví dụ minh họa: đi ỉa chảy thì không thể uống thuốc ho; gãy chân thì không thể bó bột</span></div>\n<p class=\"body-txt\">\ntay mà mong chân tự khỏi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Có những bệnh nhẹ tự khỏi, nhưng có những bệnh nặng bắt buộc phải đi bác sĩ (áp dụng</span></div>\n<p class=\"body-txt\">\ncho cả kinh doanh).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ví dụ: đua xe gãy chân. Gãy chân là triệu chứng, đua xe là nguyên nhân. Chữa lành chân</span></div>\n<p class=\"body-txt\">\nnhưng nếu không giải quyết được nguyên nhân đua xe thì mai sẽ lại gãy chân khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Không quảng cáo&quot; là triệu chứng của việc không biết quảng cáo để làm gì, hoặc không</span></div>\n<p class=\"body-txt\">\nbiết quảng cáo giúp kiếm tiền bằng cách nào.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phân biệt rõ triệu chứng và nguyên nhân là điều cốt lõi để giải quyết vấn đề hiệu quả:</span></div>\n<p class=\"body-txt\">\nDiễn giả liên tục nhấn mạnh đây là &quot;điều vô cùng quan trọng&quot;. Nếu không phân biệt\n \nđược, chúng ta sẽ lãng phí thời gian, công sức và tiền bạc vào việc chữa trị những biểu\n \nhiện bên ngoài mà bỏ qua gốc rễ của vấn đề. Điều này đặc biệt đúng trong kinh doanh,\n \nnơi các quyết định sai lầm có thể gây thiệt hại lớn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Không quảng cáo&quot; thường là triệu chứng, không phải nguyên nhân chính của việc kinh</span></div>\n<p class=\"body-txt\">\ndoanh kém hiệu quả: Insight này cực kỳ đắt giá trong bối cảnh marketing hiện đại. Nhiều\n \ndoanh nghiệp nghĩ rằng cứ bỏ tiền chạy quảng cáo là sẽ có doanh thu. Tuy nhiên, diễn\n \ngiả chỉ ra nguyên nhân sâu xa hơn là &quot;không biết quảng cáo để làm gì&quot; hoặc &quot;không biết\n \nquảng cáo giúp mình kiếm tiền bằng cách nào&quot;. Điều này đòi hỏi các doanh nghiệp phải\n \ncó chiến lược, mục tiêu và hiểu biết rõ ràng về marketing trước khi đổ tiền vào quảng\n \ncáo.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mục tiêu của khóa học là biến học viên thành &quot;bác sĩ của doanh nghiệp&quot;: Đây là một định</span></div>\n<p class=\"body-txt\">\nvị rất mạnh mẽ, truyền tải thông điệp về sự tự chủ và khả năng tự giải quyết vấn đề.\n \nThay vì phụ thuộc vào các chuyên gia hay giải pháp bên ngoài, học viên được trang bị tư\n \nduy và công cụ để tự chẩn đoán, phân tích và đưa ra giải pháp cho chính doanh nghiệp\n \ncủa mình, từ đó phát triển bền vững hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Bạn cần phải phân biệt được triệu chứng và nguyên nhân. Đây là điều vô cùng quan trọng.”\n \n“Không chữa triệu chứng mà sẽ chữa nguyên nhân.”\n \n“Tôi sẽ biến các anh chị trở thành bác sĩ của doanh nghiệp của chính mình.”\n \n“Nguyên nhân chính là mình không biết quảng cáo giúp cho mình kiếm tiền bằng cách nào.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 5: Chế ngự hay để nỗi sợ điều khiển</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi giảng tập trung phân tích những nỗi sợ hãi chính ngăn cản doanh nhân hành</h3>\n<p class=\"body-txt\">\nđộng và phát triển, đặc biệt là trong marketing và kinh doanh. Diễn giả nhấn mạnh rằng cảm\n \nxúc, đặc biệt là nỗi sợ hãi, là nguyên nhân gốc rễ của sự trì hoãn, và hầu hết nỗi sợ này đều\n \nkhông có thực. Bài học phân biệt rõ cách doanh nhân giàu và nghèo phản ứng với ba nỗi sợ\n \nphổ biến: sợ không đủ tiền, không đủ thời gian và không đủ năng lực, từ đó đưa ra cách vượt\n \nqua chúng để đạt được thành công.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nhiều người không quảng cáo vì sợ mất tiền khi làm marketing, nhưng đây là suy nghĩ</span></div>\n<p class=\"body-txt\">\nsai lầm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cảm xúc là yếu tố chính đã thúc đẩy hoặc ngăn cản chúng ta hành động.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nỗi sợ hãi là một cảm xúc đặc biệt ngăn cản hành động, và hầu hết các nỗi sợ đều không</span></div>\n<p class=\"body-txt\">\ncó thực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Có ba loại nỗi sợ phổ biến ngăn cản doanh nhân hành động mạnh mẽ:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nỗi sợ không có đủ tiền:</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Doanh nhân nghèo sợ không đủ tiền, cho nên họ không làm gì cả.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Doanh nhân giàu hiểu rằng tiền có rất nhiều và nỗ lực để có thêm nhiều tiền hơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nỗi sợ không có đủ thời gian:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Doanh nhân nghèo luôn nói rằng &quot;tôi rất bận&quot; và không làm gì được.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Doanh nhân giàu hiểu rằng họ có thể mua thời gian của người khác, hợp tác, hoặc thuê</span></div>\n<p class=\"body-txt\">\nnguồn lực bên ngoài để có thêm thời gian.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nỗi sợ không có đủ năng lực (trí thức/khả năng):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Doanh nhân nghèo sợ không đủ kiến thức/năng lực nên không làm gì.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Doanh nhân giàu không ngừng học hỏi, tìm những người diễn giả, cố vấn (coach,</span></div>\n<p class=\"body-txt\">\nmentor) để mở rộng kiến thức và khả năng của mình. Họ có một thư viện, một giá sách\n \ntrong nhà.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mọi người đều có nỗi sợ giống nhau, nhưng cách phản ứng với nỗi sợ đó tạo ra sự khác</span></div>\n<p class=\"body-txt\">\nbiệt: một người sẽ làm cho mình được nhiều hơn để chế ngự nỗi sợ, còn một người thì\n \nđể nỗi sợ ngăn cản mình.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Cảm xúc là thứ đã làm chúng ta làm điều này.&quot; (02:14)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là điểm mấu chốt, chỉ ra rằng hành vi (ví dụ: không quảng cáo)</span></div>\n<p class=\"body-txt\">\nkhông phải do thiếu nguồn lực bề mặt mà do nguyên nhân sâu xa hơn là cảm xúc. Nhận\n \nthức này giúp thay đổi tư duy từ việc tìm kiếm giải pháp kỹ thuật sang giải quyết gốc rễ\n \ntâm lý, từ đó có thể thay đổi hành vi một cách bền vững.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Hầu hết nỗi sợ đều không có thực.&quot; (02:34)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Khẳng định mạnh mẽ này có khả năng phá vỡ rào cản tâm lý lớn nhất.</span></div>\n<p class=\"body-txt\">\nKhi nhận ra rằng những điều mình lo sợ thường chỉ là sản phẩm của trí tưởng tượng\n \nhoặc không quá nghiêm trọng, người nghe sẽ có thêm dũng khí để vượt qua sự trì hoãn\n \nvà hành động. Nó là lời kêu gọi để đối diện và vượt qua các nỗi sợ cụ thể.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cách doanh nhân giàu và nghèo phản ứng với nỗi sợ thiếu thốn (tiền, thời gian, năng</span></div>\n<p class=\"body-txt\">\nlực) là hoàn toàn khác biệt.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là luận điểm cốt lõi nhất của buổi giảng, cung cấp một khung tư</span></div>\n<p class=\"body-txt\">\nduy rõ ràng về thành công. Diễn giả không chỉ nêu các nỗi sợ mà còn chỉ ra *cách thức\n \nphản ứng khác biệt* của hai nhóm người thành công và không thành công. Doanh nhân\n \ngiàu không né tránh nỗi sợ mà chủ động tìm cách khắc phục (kiếm tiền, mua thời gian,\n \nhọc hỏi), biến nỗi sợ thành động lực. Insight này trực tiếp chỉ ra con đường hành động\n \nđể vượt qua trì trệ và đạt được kết quả mong muốn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Cảm xúc là thứ đã làm chúng ta làm điều này.”\n \n“Hầu hết nỗi sợ đều không có thực.”\n \n“Trong căn nhà của một doanh nhân triệu phú đều có một giá sách.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 6: Bài học sau thất bại</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi học nhấn mạnh tầm quan trọng của việc rút ra bài học từ mọi sự kiện tiêu cực</h3>\n<p class=\"body-txt\">\ntrong cuộc sống và kinh doanh. Thay vì tập trung vào những gì đã mất hay trách móc, chúng\n \nta cần hỏi &quot;Bài học là gì?&quot; để tránh neo móc mình vào những niềm tin sai lầm. Diễn giả giải\n \nthích rằng cảm xúc và sự tập trung của chúng ta vào khoảnh khắc thất bại sẽ &quot;neo móc&quot;\n \nchúng ta, quyết định hành vi trong tương lai. Việc nhận diện và học hỏi từ bài học giúp\n \nchúng ta phát triển, thử nghiệm phương án mới và vượt qua sự trì trệ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Khi đối mặt với sự kiện tiêu cực (bị chửi, bị đánh, ly hôn, thất bại kinh doanh), không</span></div>\n<p class=\"body-txt\">\nnên hỏi &quot;Tại sao điều đó lại xảy ra với mình?&quot; mà phải luôn hỏi &quot;Bài học là gì?&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nhiều vấn đề trong cuộc sống (ví dụ: ly hôn và kinh doanh không ổn định) có thể bắt</span></div>\n<p class=\"body-txt\">\nnguồn từ cảm xúc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Khi ra một quyết định, cần quan sát cảm xúc của chúng ta lúc đó.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Điều chúng ta tập trung vào chính khoảnh khắc một sự kiện xảy ra sẽ &quot;neo móc&quot; chúng</span></div>\n<p class=\"body-txt\">\nta lại vào một niềm tin hoặc hành động trong tương lai.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nếu thất bại trong kinh doanh hoặc quảng cáo và tập trung vào những gì &quot;bị mất&quot;, chúng</span></div>\n<p class=\"body-txt\">\nta sẽ bị neo móc vào niềm tin &quot;kinh doanh là bị mất&quot; hoặc &quot;quảng cáo là mất tiền&quot;, từ đó\n \nsợ hãi và không dám thực hiện nữa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chính vì thế, chúng ta cần &quot;neo móc bằng một cái bài học&quot;. Khi quảng cáo không hiệu</span></div>\n<p class=\"body-txt\">\nquả, bài học không phải là mất tiền, mà có thể là kênh quảng cáo đó không hiệu quả,\n \nhoặc phương án quảng cáo đó không hiệu quả, từ đó ta có thể thử kênh khác, phương án\n \nkhác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Trong kinh doanh, khi nhân viên phản bội, lấy cắp thông tin khách hàng, bí mật kinh</span></div>\n<p class=\"body-txt\">\ndoanh, nếu ta neo móc vào suy nghĩ &quot;con người là xấu&quot;, ta sẽ không bao giờ tổ chức đội\n \nnhóm kinh doanh và sẽ làm việc một mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Diễn giả chia sẻ kinh nghiệm cá nhân: từng bị nhân viên giỏi bỏ đi và cạnh tranh, nghĩ</span></div>\n<p class=\"body-txt\">\n&quot;bọn kia nó đểu&quot; nên không dạy họ nữa, làm việc một mình, dẫn đến giai đoạn tắc nghẽn\n \nnhất trong sự nghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sau khi được một người diễn giả khai sáng, diễn giả nhận ra bài học là: họ ra đi không</span></div>\n<p class=\"body-txt\">\nphải vì họ &quot;đểu&quot; mà vì họ phải làm việc với &quot;một ông sếp đểu&quot; (tức là chính mình).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Diễn giả đã thay đổi, tự hoàn thiện mình để trở thành một lãnh đạo tốt hơn, bắt đầu xây</span></div>\n<p class=\"body-txt\">\ndựng đội nhóm và chia sẻ lại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Việc mỗi khi hỏi &quot;Bài học là gì?&quot; giúp diễn giả tiến lên nhanh hơn.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cơ chế &quot;Neo móc&quot; cảm xúc và niềm tin: Đây là insight cốt lõi giải thích cách tư duy của</span></div>\n<p class=\"body-txt\">\nchúng ta bị định hình. Diễn giả nhấn mạnh rằng việc chúng ta tập trung vào điều gì trong\n \nkhoảnh khắc thất bại (ví dụ: nỗi đau mất mát, sự tiêu cực) sẽ &quot;neo móc&quot; chúng ta vào\n \nmột niềm tin cố định và dẫn đến hành động trì hoãn hoặc sợ hãi trong tương lai. Điều\n \nnày cực kỳ quan trọng vì nó chỉ ra cách nỗi sợ hãi và niềm tin giới hạn hình thành, và\n \nlàm thế nào chúng ta có thể phá vỡ vòng lặp đó bằng cách thay đổi trọng tâm.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sự chuyển đổi tư duy từ &quot;Tại sao tôi?&quot; sang &quot;Bài học là gì?&quot;: Thay vì rơi vào tâm lý nạn</span></div>\n<p class=\"body-txt\">\nnhân, tìm kiếm nguyên nhân bên ngoài hoặc than trách số phận, việc chủ động đặt câu\n \nhỏi &quot;Bài học là gì?&quot; chuyển trọng tâm sang việc học hỏi và phát triển. Insight này giúp\n \nbiến thất bại thành cơ hội để cải thiện chiến lược, phương pháp, hoặc bản thân, từ đó\n \nthoát khỏi sự trì trệ và tiến lên phía trước.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Trách nhiệm cá nhân của lãnh đạo trong thất bại đội nhóm: Câu chuyện cá nhân của diễn</span></div>\n<p class=\"body-txt\">\ngiả về việc nhân viên bỏ đi và nhận ra bài học nằm ở việc &quot;mình là một ông sếp đểu&quot; là\n \nmột insight đắt giá. Nó dạy về tầm quan trọng của sự tự phản tỉnh và chịu trách nhiệm\n \ncủa người lãnh đạo. Thay vì đổ lỗi cho nhân viên hay thị trường, việc nhìn nhận và hoàn\n \nthiện bản thân lãnh đạo là chìa khóa để xây dựng một đội ngũ vững mạnh và phát triển\n \nbền vững.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Cái điều mà chúng ta tập trung vào chính khoảnh khắc đó, nó sẽ neo móc chúng ta lại.”\n \n“Bài học của tôi không phải là họ ra đi bởi vì họ đểu, mà vì họ phải làm việc với một ông sếp\n \nđểu.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 7: Thà đứng bét nhóm đầu còn hơn dẫn đầu nhóm sau</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi giảng tập trung vào việc áp dụng quy tắc 80/20 (Pareto principle) để đạt</h3>\n<p class=\"body-txt\">\nđược thành công vượt trội. Cốt lõi là nhận diện nhóm 20% xuất sắc nhất trong bất kỳ lĩnh\n \nvực nào, sau đó chủ động &quot;modeling&quot; (mô phỏng) hành vi, tư duy và thói quen của họ để di\n \nchuyển từ nhóm 80% (số đông) sang nhóm 20% (dẫn đầu), và tiếp tục lặp lại quá trình này\n \nđể liên tục vươn lên các nhóm nhỏ hơn, tinh hoa hơn (4%, 0.8%). &quot;Năng lực thay đổi&quot; nhanh\n \nchóng để bắt chước và thích nghi với nhóm dẫn đầu là yếu tố then chốt.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Trong bất kỳ một nhóm nào, luôn có một nhóm xuất sắc hơn cả, chiếm 20% tổng số</span></div>\n<p class=\"body-txt\">\n(nhóm dẫn đầu) và 80% còn lại là nhóm bình thường.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nhóm 20% này có cuộc sống, suy nghĩ tích cực, mối quan hệ và gia đình tốt hơn hẳn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Việc đầu tiên cần làm là di chuyển từ nhóm 80% lên nhóm 20% bằng mọi cách. Không</span></div>\n<p class=\"body-txt\">\ncần biết mình ở đâu trong nhóm 80%, chỉ cần biết mình đang ở dưới và di chuyển lên\n \nnhóm trên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bí quyết để di chuyển là &quot;modeling&quot; (mô phỏng): không làm giống nhóm 80%, mà làm</span></div>\n<p class=\"body-txt\">\ngiống nhóm 20% dẫn đầu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Đây được gọi là &quot;năng lực thay đổi&quot; – khả năng thay đổi nhanh chóng bản thân để hòa</span></div>\n<p class=\"body-txt\">\nnhập và bắt chước những người trong nhóm dẫn đầu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phải chấp nhận &quot;thà làm bét nhóm đầu còn hơn làm đầu nhóm sau&quot;, tức là thà ở vị trí</span></div>\n<p class=\"body-txt\">\ncuối cùng trong một nhóm xuất sắc còn hơn là dẫn đầu một nhóm kém hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Không thể ngay lập tức nhảy vọt lên vị trí dẫn đầu; cần bắt đầu bằng cách tham gia vào</span></div>\n<p class=\"body-txt\">\nnhóm 20% trước.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Áp dụng liên tục quy tắc 20% của 20% (tức 4%), 20% của 4% (tức 0.8%), v.v., để liên</span></div>\n<p class=\"body-txt\">\ntục vươn lên các nhóm nhỏ hơn và tinh hoa hơn trong cùng lĩnh vực.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Để biết nhóm dẫn đầu đang làm gì, hãy đặt câu hỏi: Họ có quảng cáo không? Họ có đang</span></div>\n<p class=\"body-txt\">\nở trên Facebook không? Họ đang làm gì khác biệt?\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Việc chuyển từ nhóm 80% lên 20% có thể đòi hỏi phải làm những việc mà nhóm 80%</span></div>\n<p class=\"body-txt\">\ncho là &quot;điên và ngu&quot;, nhưng thực tế đó là những hành vi của nhóm dẫn đầu. Cần thay đổi\n \nsự tập trung và thói quen hành vi của mình.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chủ động di chuyển từ nhóm 80% lên nhóm 20%: Đây là định hướng tư duy cốt lõi.</span></div>\n<p class=\"body-txt\">\nQuan trọng vì nó giúp mỗi người thoát khỏi vùng an toàn, không chấp nhận sự tầm\n \nthường và luôn hướng tới môi trường, tiêu chuẩn cao hơn. Câu nói &quot;thà làm bét nhóm\n \nđầu còn hơn làm đầu nhóm sau&quot; nhấn mạnh giá trị của việc ở trong một môi trường xuất\n \nchúng, nơi bạn có cơ hội học hỏi và phát triển tốt hơn, dù vị trí ban đầu có thể khiêm tốn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Modeling&quot; (Mô phỏng) và &quot;Năng lực thay đổi&quot; làm phương pháp: Thay vì tự mò mẫm</span></div>\n<p class=\"body-txt\">\nhay cố gắng sáng tạo lại từ đầu, hãy quan sát, học hỏi và bắt chước chính xác những gì\n \nnhóm dẫn đầu đang làm. &quot;Năng lực thay đổi&quot; nhanh chóng để phù hợp với những người\n \nxuất chúng là chìa khóa. Quan trọng vì nó cung cấp một lộ trình thực tế, hiệu quả và tối\n \nưu thời gian để đạt được thành công, tránh lãng phí nguồn lực vào những thử nghiệm\n \nkhông cần thiết.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Áp dụng liên tục luật 20% để không ngừng vươn lên: Không chỉ dừng lại ở nhóm 20%,</span></div>\n<p class=\"body-txt\">\nmà phải tiếp tục tìm kiếm 20% của nhóm đó, rồi 20% của 20% đó, tạo thành các nhóm\n \n4%, 0.8%... Điều này thúc đẩy tư duy phát triển không ngừng, luôn đặt ra mục tiêu cao\n \nhơn và liên tục hoàn thiện bản thân để trở thành người xuất chúng nhất trong lĩnh vực\n \ncủa mình.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Thà làm bét nhóm đầu còn hơn làm đầu nhóm sau.”\n \n“Làm mọi cách để có thể chui vào cái nhóm đầu tiên này.”\n \n“Cái này tôi gọi là năng lực thay đổi.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 8: Nghi thức</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi giảng tập trung vào tầm quan trọng của việc thiết lập và duy trì kỷ luật/quy</h3>\n<p class=\"body-txt\">\ntắc trong một tổ chức hay đội nhóm, kể cả khi điều đó đòi hỏi sự nghiêm khắc và loại bỏ\n \nnhững người không tuân thủ. Diễn giả nhấn mạnh rằng việc định vị rõ ràng bản thân\n \n(identity) và giá trị cốt lõi – tập trung vào khả năng tạo ra sự thay đổi lâu dài cho người\n \nkhác, chứ không chỉ là nội dung hay sản phẩm tức thời – là yếu tố then chốt. Cuối cùng, việc\n \nđặt ra các tiêu chuẩn và &quot;luật chơi&quot; cao sẽ giúp lọc ra và giữ lại những cá nhân thực sự xuất\n \nsắc, dù có thể khiến một số người rời bỏ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Khi bắt đầu xây dựng đội nhóm, cần phải thiết lập các &quot;kỷ luật&quot; (quy tắc).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Kiểu gì cũng sẽ có những người chống lại kỷ luật đã đặt ra.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Công thức để xử lý là &quot;Dạy, Dỗ, Dọa, Giết&quot; (Teach, Cajole/Discipline, Threaten,</span></div>\n<p class=\"body-txt\">\nEliminate).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ví dụ về &quot;Dạy&quot;: biết cách chào hỏi nhau.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Dỗ&quot;: cố gắng thuyết phục, hướng dẫn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nếu &quot;Dỗ&quot; không được thì phải &quot;Dọa&quot; và cuối cùng là &quot;Giết&quot; (loại bỏ) để răn đe, như &quot;giết</span></div>\n<p class=\"body-txt\">\ngà dọa khỉ&quot;. Việc loại bỏ này là để đảm bảo sự tuyệt vời của nhóm, lớp học.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cần xác định rõ &quot;Identity&quot; (bản thân là ai, vai trò gì).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ví dụ về &quot;Identity&quot; của diễn giả: là người diễn giả có khả năng làm thay đổi cuộc sống của</span></div>\n<p class=\"body-txt\">\ncon người nhiều nhất ở đất nước này, không phải chỉ là người giỏi về nội dung.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Giá trị cốt lõi không nằm ở nội dung hay sản phẩm tức thời, mà ở sự thay đổi tuyệt vời</span></div>\n<p class=\"body-txt\">\nvà bền vững của người nhận sau hành trình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Việc học 3 ngày không làm giàu ngay, nhưng kiến thức đó có thể thay đổi cuộc đời trong</span></div>\n<p class=\"body-txt\">\n3 năm tới.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nếu không tự đặt ra &quot;luật chơi&quot; (quy tắc), người khác sẽ đặt ra luật chơi cho bạn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Khi bạn đặt ra &quot;luật chơi&quot; cao, bạn phải chấp nhận rằng một vài người sẽ rời bỏ đội</span></div>\n<p class=\"body-txt\">\nnhóm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Càng đặt luật chơi cao, càng nhiều người rời đi, nhưng những người ở lại sẽ là những</span></div>\n<p class=\"body-txt\">\ncon người tuyệt vời.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nếu đặt tiêu chuẩn thấp, bất kỳ ai cũng vào được, thì sẽ không bao giờ có một nhóm/lớp</span></div>\n<p class=\"body-txt\">\nhọc tuyệt vời.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mô hình &quot;Dạy - Dỗ - Dọa - Giết&quot; để thiết lập và duy trì kỷ luật: Đây là một phương pháp</span></div>\n<p class=\"body-txt\">\nquản lý đội nhóm và duy trì tiêu chuẩn cực kỳ thẳng thắn và đôi khi khắc nghiệt. Nó cho\n \nthấy một nhà lãnh đạo phải sẵn sàng đưa ra những quyết định khó khăn để bảo vệ giá trị\n \nvà mục tiêu chung của tổ chức, chấp nhận loại bỏ những yếu tố cản trở sự phát triển.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Trong bất kỳ tổ chức nào, việc duy trì kỷ luật và hiệu suất là tối quan</span></div>\n<p class=\"body-txt\">\ntrọng. Phương pháp này chỉ ra rằng đôi khi, việc loại bỏ một thành viên không phù hợp\n \n(theo nghĩa bóng hoặc đen) là cần thiết để nhóm đạt được hiệu quả cao hơn và củng cố\n \ncác quy tắc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Định vị &quot;Identity&quot; và &quot;Giá trị&quot; dựa trên sự thay đổi lâu dài, không phải nội dung tức thời:</span></div>\n<p class=\"body-txt\">\nGiá trị thực sự của một người/tổ chức không nằm ở những gì họ cung cấp (sản phẩm,\n \ndịch vụ, kiến thức) mà ở tác động sâu sắc và bền vững mà nó mang lại cho khách\n \nhàng/học viên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là chìa khóa để xây dựng thương hiệu mạnh mẽ và tạo ra lòng</span></div>\n<p class=\"body-txt\">\ntrung thành lâu dài. Khi khách hàng cảm nhận được sự chuyển đổi thực sự trong cuộc\n \nsống hoặc công việc của họ nhờ vào bạn, họ sẽ trở thành người ủng hộ trung thành và\n \nsẵn sàng trả giá cao hơn cho giá trị thực sự đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Đặt ra &quot;Luật chơi&quot; và tiêu chuẩn cao để lọc và giữ chân những người xuất sắc: Việc thiết</span></div>\n<p class=\"body-txt\">\nlập tiêu chuẩn cao ngay từ đầu sẽ đẩy một số người không phù hợp rời đi, nhưng đồng\n \nthời sẽ thu hút và giữ lại những cá nhân có cùng tầm nhìn, cam kết và khả năng thực sự,\n \ntừ đó xây dựng một đội ngũ hoặc cộng đồng chất lượng.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Trong kinh doanh, điều này giúp thu hút phân khúc khách hàng cao</span></div>\n<p class=\"body-txt\">\ncấp, những người sẵn sàng trả tiền cho chất lượng và hiệu quả. Trong quản lý đội nhóm,\n \nnó tạo ra một môi trường làm việc hiệu suất cao, nơi mọi người đều cam kết và có năng\n \nlực. Tránh được việc &quot;ôm đồm&quot; những người không phù hợp làm suy giảm chất lượng\n \nchung.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Cứ đánh bật cái kỷ luật thì kiểu gì nó cũng phải chạy ra.”\n \n“Cái giá trị của tôi không phải là content tôi mang đến cho các anh chị, mà tôi muốn các anh\n \nchị sau cái hành trình này các anh chị trở nên tuyệt vời hơn. Và nó mãi mãi trở nên tuyệt vời\n \nchứ không phải ở đây.”\n \n“Nếu bạn không đặt ra luật chơi thì người ta tự đặt ra luật chơi. [...] Bạn càng đặt luật chơi\n \ncao bao nhiêu thì càng nhiều người rời bỏ bạn bấy nhiêu. Nhưng khi bạn đặt chơi luật chơi\n \ncao lên thì bạn sẽ tìm được những con người tuyệt vời ở lại với bạn.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 9: Phân tích case study và logical levers</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi giảng tập trung vào việc định vị sâu sắc bản thân và doanh nghiệp thông qua</h3>\n<p class=\"body-txt\">\ncác tầng nhận thức cao hơn. Diễn giả nhấn mạnh rằng để đạt được thành công đột phá trong\n \nkinh doanh (trên 2 tỷ, 4 tỷ), không thể chỉ tập trung vào &quot;What&quot; (cái gì) hay &quot;How&quot; (làm thế\n \nnào), mà phải trả lời được các câu hỏi cốt lõi về &quot;Identity&quot; (Tôi là ai?) và &quot;Mission&quot; (Tôi phục\n \nvụ ai? Sức mạnh của tôi là gì?). Việc xác định rõ nhân dạng và sứ mệnh chính là nền tảng để\n \nmột lãnh đạo và doanh nghiệp phát triển bền vững và đột phá.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cảm xúc tiêu cực có thể ngăn cản hành động.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nhiều người và doanh nghiệp thường tập trung vào tầng &quot;What&quot; (cái gì/hành động)</span></div>\n<p class=\"body-txt\">\ntrong kinh doanh, nhưng điều này không đủ để tạo đột phá.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Để kinh doanh đột phá, ít nhất phải quan tâm đến tầng &quot;Why&quot; (tại sao).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Để tạo ra sự giàu có thực sự (ví dụ: trên 2 tỷ), cần tập trung vào tầng &quot;Identity&quot; (nhân</span></div>\n<p class=\"body-txt\">\ndạng), trả lời câu hỏi &quot;Tôi là ai?&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Để đạt trên 4 tỷ, cần trả lời rõ &quot;Sức mạnh của tôi là gì?&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Có sáu tầng nhận thức/tư duy khác nhau; hai tầng cao nhất là Mission (Sứ mệnh) và</span></div>\n<p class=\"body-txt\">\nIdentity (Nhân dạng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Người làm giám đốc/lãnh đạo phải xác định rõ và trả lời hai câu hỏi cốt lõi: &quot;Tôi là ai?&quot;</span></div>\n<p class=\"body-txt\">\nvà &quot;Tôi phục vụ ai?&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cảm xúc của một người chính là con người/Identity của họ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Diễn giả không dạy &quot;How&quot; (làm thế nào) mà dạy ở các tầng cao như Identity và Mission.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ví dụ về thương hiệu Jodii: người sáng lập Jodii (lúc đầu có khoảng 20 cửa hàng) đã mở</span></div>\n<p class=\"body-txt\">\nthêm 10 cửa hàng trong vòng vài tuần sau khi học và xác định rõ sứ mệnh của mình\n \n(&quot;Jodii sẽ thành nhãn hiệu thời trang số 1 Việt Nam&quot;, đưa thời trang Việt ra toàn cầu).\n \nÔng này đã cho cả mười mấy người (quân/cửa hàng trưởng) đi học sau đó.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Những người chỉ muốn &quot;xem tôi làm gì&quot; (tức là chỉ quan tâm đến hành động ở tầng</span></div>\n<p class=\"body-txt\">\n&quot;What&quot;) sẽ không học được gì, vì nội dung giảng dạy tập trung vào tầng nhân dạng và sứ\n \nmệnh.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Chuyển dịch tư duy từ &quot;What&quot; sang &quot;Identity&quot; và &quot;Mission&quot; để đạt đột phá: Diễn giả nhấn</span></div>\n<p class=\"body-txt\">\nmạnh rằng thành công vượt trội không đến từ việc chỉ tập trung vào các hành động cụ\n \nthể (&quot;What&quot;) mà phải từ việc định nghĩa sâu sắc bản thân (&quot;Identity&quot; - Tôi là ai?) và mục\n \nđích tồn tại (&quot;Mission&quot; - Tôi phục vụ ai? Sức mạnh của tôi là gì?). Điều này quan trọng vì\n \nnó định hướng chiến lược từ gốc rễ, thay vì chỉ giải quyết vấn đề bề mặt, giúp doanh\n \nnghiệp tạo ra giá trị bền vững và khác biệt.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Hai câu hỏi cốt lõi cho mọi lãnh đạo: &quot;Tôi là ai?&quot; và &quot;Tôi phục vụ ai?&quot;: Đây là kim chỉ nam</span></div>\n<p class=\"body-txt\">\nđể xây dựng một doanh nghiệp vững mạnh và có tầm nhìn. Việc trả lời rõ ràng những\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">câu hỏi này giúp lãnh đạo hiểu rõ giá trị cốt lõi, định vị thương hiệu và xây dựng chiến</h3>\n<p class=\"body-txt\">\nlược phát triển đúng đắn, thu hút đúng khách hàng và nhân tài. Nếu không có câu trả lời\n \nrõ ràng, doanh nghiệp dễ bị lạc lối và thiếu định hướng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Không dạy &quot;How&quot; mà dạy tầng &quot;Identity&quot; và &quot;Mission&quot;: Đây là một triết lý giảng dạy</span></div>\n<p class=\"body-txt\">\nquan trọng, cho thấy diễn giả muốn học viên thay đổi tư duy tận gốc, chứ không chỉ cung\n \ncấp công cụ hay mẹo vặt. Việc hiểu rõ mình là ai và mình muốn đạt được điều gì (sứ\n \nmệnh) sẽ tự khắc dẫn lối đến những hành động (how) và chiến lược phù hợp, thay vì chỉ\n \nsao chép một cách máy móc mà không hiểu bản chất.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Nếu mà tôi chỉ là thằng nhạt nhòa không bao giờ có 2 tỷ hết.”\n \n“Jodii sẽ thành nhãn hiệu thời trang số 1 Việt Nam.”\n \n“Tôi không dạy How mà tôi dạy ở tầng rất là cao, tầng nhân dạng, tầng Identity hoặc tầng\n \nMission.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 10: Life long learning</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi giảng này nhấn mạnh tầm quan trọng tối thượng của phát triển bản thân</h3>\n<p class=\"body-txt\">\ntrước khi phát triển kinh doanh. Diễn giả khẳng định để lãnh đạo và tạo ra giá trị lớn, mỗi\n \nngười cần không ngừng học tập trọn đời. Sự phát triển cá nhân là nền tảng để có giá trị cho\n \nđi, đủ lớn để giữ được thành quả và là yếu tố then chốt giúp nhận diện và nắm bắt cơ hội,\n \nthay vì thấy khó khăn.\n</p>\n<p class=\"body-txt\">\n---\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Teacher is a leader (Dẫn dắt là lãnh đạo): Muốn làm lãnh đạo người khác, phải là người</span></div>\n<p class=\"body-txt\">\ndẫn dắt người khác. Muốn dẫn dắt người khác, phải là người dạy dỗ người khác.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Lifelong Learning (Học tập trọn đời): Là bí quyết để đi xa trong bất kỳ lĩnh vực nào. Học</span></div>\n<p class=\"body-txt\">\ntập không ngừng, &quot;học, học nữa, học mãi&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phát triển bản thân quan trọng hơn phát triển kinh doanh: Để tạo ra sự đột phá trong</span></div>\n<p class=\"body-txt\">\nkinh doanh, cần tạo ra sự đột phá trong phát triển con người mình trước.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bản chất của kinh doanh: Mang giá trị để phục vụ nhiều người.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Để trở nên giàu có: Phải tạo ra giá trị lớn và phục vụ nhiều người.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Giá trị lớn&quot; chính là phát triển con người mình.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Phục vụ nhiều người&quot; chính là học cách phát triển kinh doanh.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phát triển con người mình về mặt chuyên môn: Nếu không biết chuyên môn thì phải kết</span></div>\n<p class=\"body-txt\">\nhợp các nguồn lực bên ngoài. Không ai có thể thành công một mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phát triển bản thân (phát triển cá nhân) bao gồm:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Học cách điều khiển cảm xúc thông qua: trạng thái cơ thể, sự tập trung và câu chuyện</span></div>\n<p class=\"body-txt\">\nmình đang kể.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Thích nghi với hoàn cảnh.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cải thiện cảm xúc.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Dễ dàng giao tiếp với mọi người.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Biết đặt câu hỏi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tìm ra sứ mệnh, nhân dạng (nhận diện bản thân), lý do hành động của mình.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phát triển kỹ năng lãnh đạo và giúp đỡ người khác.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Có tinh thần cho đi nhiều hơn nhận lại.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Mối liên hệ giữa tiền bạc và phát triển con người: Tiền bạc của anh chị tương ứng với sự</span></div>\n<p class=\"body-txt\">\nphát triển con người anh chị.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phát triển để có giá trị mà cho đi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phát triển đủ lớn để có thể giữ được mọi thứ trên cuộc đời này (nếu không, nó sẽ đến rồi</span></div>\n<p class=\"body-txt\">\nlại trôi mất).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sự khác biệt trong nhìn nhận cơ hội/khó khăn: Là do mỗi con người có sự phát triển cá</span></div>\n<p class=\"body-txt\">\nnhân khác nhau.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phát triển cá nhân TRƯỚC khi phát triển kinh doanh.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ritual (Nghi thức cá nhân):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vào mỗi buổi sáng, đặt những câu hỏi buổi sáng cho mình.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vào mỗi buổi tối, đặt những câu hỏi buổi tối cho mình.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Các phương pháp để thực hiện &quot;Lifelong Learning&quot; và &quot;Ritual&quot;:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Đặt kế hoạch đọc sách: Ít nhất 1 cuốn/tháng (để thuộc top 20% những người biết đọc</span></div>\n<p class=\"body-txt\">\nsách ở Việt Nam).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Xem video: Học từ các nguồn video có sẵn (như các video của diễn giả).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tham gia các khóa học.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sử dụng Internet: Tìm kiếm &quot;how to&quot; cho bất kỳ vấn đề gì (ví dụ trên YouTube).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Lời nhắc cuối: Phát triển cá nhân rồi mới đến phát triển kinh doanh.</span></div>\n<p class=\"body-txt\">\n---\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Phát triển bản thân quan trọng hơn phát triển kinh doanh.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là kim chỉ nam cho mọi hành động, định hình lại thứ tự ưu tiên</span></div>\n<p class=\"body-txt\">\ntrong cuộc sống và công việc. Thay vì lao vào các chiến lược kinh doanh mà bỏ qua gốc\n \nrễ là con người, diễn giả nhấn mạnh việc đầu tư vào năng lực, tư duy, và cảm xúc cá nhân\n \nsẽ mang lại thành công bền vững và lớn mạnh hơn. Khi bản thân phát triển, mọi cơ hội\n \nvà thành quả kinh doanh sẽ dễ dàng đến và được giữ lại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Phát triển cá nhân TRƯỚC khi phát triển kinh doanh.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là một mệnh đề hành động trực tiếp và vô cùng mạnh mẽ, được</span></div>\n<p class=\"body-txt\">\ndiễn giả lặp đi lặp lại nhiều lần để khắc sâu vào tâm trí người học. Nó không chỉ là một\n \nlời khuyên mà là một quy tắc vàng, chỉ ra rằng việc phát triển bản thân không chỉ quan\n \ntrọng hơn mà còn phải được thực hiện *trước* khi tập trung vào phát triển kinh doanh.\n \nSai thứ tự này có thể dẫn đến thất bại hoặc thành công không bền vững.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Tiền bạc của anh chị tương ứng với sự phát triển con người anh chị.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Câu nói này tạo ra một mối liên hệ rõ ràng và cụ thể giữa sự phát</span></div>\n<p class
