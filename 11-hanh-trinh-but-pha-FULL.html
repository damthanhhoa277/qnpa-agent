"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><p class=\"body-txt\">\npháp và lợi ích họ nhận được, chứ không chỉ là bản thân sản phẩm/dịch vụ. Việc hiểu rõ\n \nvà truyền tải được giá trị này là chìa khóa để thu hút và giữ chân khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Trải nghiệm khách hàng là yếu tố quyết định thắng thua: &quot;Hai người cùng bán một sản</span></div>\n<p class=\"body-txt\">\nphẩm, người nào có trải nghiệm khách hàng thú vị hơn, người đó chiến thắng.&quot; Trong\n \nthế giới phẳng hiện nay, sản phẩm có thể dễ dàng bị sao chép, nhưng trải nghiệm khách\n \nhàng là điều khó sao chép nhất. Tạo ra &quot;Wow Experience&quot; thông qua dịch vụ đặc biệt và\n \nsự tận tâm của chuyên gia giúp doanh nghiệp tạo sự khác biệt rõ rệt và xây dựng lòng\n \ntrung thành.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">LVC và Raving Fan là nguồn tăng trưởng vô tận: &quot;LVC khiến cho đối thủ của bạn không</span></div>\n<p class=\"body-txt\">\nbao giờ đuổi kịp bạn&quot; và &quot;Raving Fan sẽ là nguồn khách hàng vô tận&quot;. Đây là hai khái\n \nniệm bổ trợ nhau, nhấn mạnh tầm quan trọng của việc không chỉ bán hàng một lần mà\n \nphải liên tục gia tăng giá trị để khách hàng mua lại, mua nhiều hơn, và giới thiệu khách\n \nhàng mới. Điều này không chỉ giảm chi phí marketing mà còn tạo ra một dòng doanh thu\n \nổn định và bền vững, là &quot;sự đột phá&quot; trong kinh doanh.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Doanh nhân yêu thích sản phẩm thì thất bại. Doanh nhân yêu thích khách hàng thì thành\n \ncông.”\n \n“Hai người cùng bán một sản phẩm, người nào có trải nghiệm khách hàng thú vị hơn, người\n \nđó chiến thắng.”\n \n“Hệ thống phễu là hệ thống tạo ra sự đột phá cho chính các anh chị.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 43: Công thức của sự thay đổi</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi giảng tập trung vào Công thức Thay đổi (Formula of Change): D * V * F &gt; R.</h3>\n<p class=\"body-txt\">\nCông thức này khẳng định rằng sự thay đổi (hay đổi mới) chỉ có thể xảy ra khi mức độ bất\n \nmãn với hiện tại (D), tầm nhìn về tương lai lý tưởng (V) và hành động đầu tiên cụ thể (F) đủ\n \nlớn để vượt qua mọi sự kháng cự (R). Diễn giả nhấn mạnh sự cần thiết của việc liên tục đổi\n \nmới, không &quot;ngủ quên trên chiến thắng&quot;, và chỉ ra rằng việc giảm kháng cự thường là bước\n \nđầu tiên quan trọng nhất, bằng cách thay đổi niềm tin sâu sắc (vô thức) thông qua những\n \ncâu chuyện chúng ta kể cho chính mình.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Giới thiệu Công thức Thay đổi (Formula of Change): D * V * F &gt; R.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Nguồn gốc: Công thức gốc của ông Glenncher (năm 1960), được ông Danae Miller phát</span></div>\n<p class=\"body-txt\">\ntriển vào năm 1980.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Giải thích các thành tố:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">D (Dissatisfaction): Nỗi đau, sự thất vọng, chán chường nếu không thay đổi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">V (Vision): Tầm nhìn, sự sung sướng, hạnh phúc nếu thay đổi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">F (First Step): Hành động đầu tiên cần làm để tạo ra sự thay đổi, hướng tới tầm nhìn và</span></div>\n<p class=\"body-txt\">\ntránh xa nỗi đau.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">R (Resistance): Sự kháng cự đối với sự thay đổi.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Điều kiện để thay đổi: Bên trái (D * V * F) phải lớn hơn bên phải (R).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tính nhân của công thức: Nếu bất kỳ thành tố nào trong D, V hoặc F bằng 0 (hoặc quá</span></div>\n<p class=\"body-txt\">\nnhỏ), bên trái sẽ bằng 0, dẫn đến không có sự thay đổi nào xảy ra.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Áp dụng trong kinh doanh: Công thức này là nền tảng cho sự đổi mới trong tổ chức, giúp</span></div>\n<p class=\"body-txt\">\ndoanh nghiệp tạo ra đột phá.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Khái niệm &quot;xứng đáng&quot; (deserve): Con người thường duy trì tình trạng hiện tại vì vô</span></div>\n<p class=\"body-txt\">\nthức tin rằng mình &quot;xứng đáng&quot; với điều đó. Để thay đổi, cần phá vỡ niềm tin này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Liên tục tiến lên&quot; (LT TL): Cần liên tục đổi mới, không &quot;ngủ quên trên chiến thắng&quot;. Nếu</span></div>\n<p class=\"body-txt\">\nkhông tiến lên, thế giới sẽ tiến lên và bạn sẽ tụt lùi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Đổi mới là liên tục: Phải coi đổi mới là một hoạt động thường xuyên, không phải một lần.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Quá trình thay đổi tạo ra nỗi đau: Thay đổi đòi hỏi năng lượng lớn, và năng lượng này</span></div>\n<p class=\"body-txt\">\nsinh ra từ chính nỗi đau (D) của sự bất mãn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Quá trình bán hàng và giảm kháng cự (R): Để khách hàng mua hàng (tức là thay đổi), cần</span></div>\n<p class=\"body-txt\">\nbắt đầu bằng việc giảm sự kháng cự của họ, thay vì yêu cầu hành động ngay.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Các cách giảm kháng cự (R):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Thay đổi cảm xúc của người nghe (ví dụ: sử dụng &quot;tam giác Triad&quot;).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tìm kiếm điểm tương đồng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Hiểu thế giới quan của họ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Thay đổi niềm tin và giá trị của họ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Thay đổi ở cấp độ tiềm thức (vô thức): Để tạo ra thay đổi sâu sắc và bền vững, cần tác</span></div>\n<p class=\"body-txt\">\nđộng vào phần tiềm thức/vô thức (chiếm 90% bộ não), không chỉ ý thức (10%).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cách thay đổi tiềm thức: Kể cho bản thân những câu chuyện mới, tuyên bố hàng ngày, và</span></div>\n<p class=\"body-txt\">\nnhìn vào tầm nhìn của mình mỗi ngày.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vai trò của người lãnh đạo: Người lãnh đạo là người tạo ra tầm nhìn, tập trung vào tầm</span></div>\n<p class=\"body-txt\">\nnhìn đủ lớn thay vì chỉ xoáy sâu vào nỗi đau.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Hành động đầu tiên (F) là quan trọng nhất: &quot;Con đường chỉ hiện ra sau khi chúng ta</span></div>\n<p class=\"body-txt\">\nbước đi.&quot; Không có hành động đầu tiên, sẽ không có sự thay đổi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tập trung vào lợi ích khách hàng: Thay vì chỉ nói về sản phẩm, hãy tập trung vào những</span></div>\n<p class=\"body-txt\">\nlợi ích mà sản phẩm/dịch vụ mang lại cho khách hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Công thức D * V * F &gt; R là chìa khóa cho mọi sự thay đổi: Đây là một khuôn khổ mạnh mẽ</span></div>\n<p class=\"body-txt\">\ncho thấy sự thay đổi chỉ khả thi khi có đủ Nỗi đau (bất mãn với hiện tại), Tầm nhìn\n \n(mong muốn về tương lai) và Hành động đầu tiên cụ thể, cùng nhau vượt qua Sự kháng\n \ncự. Tính chất nhân của các yếu tố D, V, F cho thấy nếu bất kỳ yếu tố nào bằng 0 thì sự\n \nthay đổi sẽ không thể xảy ra.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Nó cung cấp một cái nhìn tổng thể và có hệ thống về các yếu tố cần</span></div>\n<p class=\"body-txt\">\nthiết để thúc đẩy hoặc cản trở sự thay đổi, giúp cá nhân và tổ chức xác định điểm yếu và\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">hành động phù hợp.</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sự kháng cự (R) đến từ niềm tin vô thức và cần được giảm thiểu đầu tiên: Diễn giả chỉ rõ</span></div>\n<p class=\"body-txt\">\nrằng phần lớn sự kháng cự nằm ở tầng tiềm thức (90% bộ não), được hình thành từ\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><p class=\"body-txt\">\nnhững câu chuyện và niềm tin &quot;mình xứng đáng&quot; với hiện tại. Để thay đổi, cần &quot;kể lại câu\n \nchuyện&quot; cho chính mình và cho người khác để thay đổi niềm tin và giá trị cốt lõi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Điểm này đào sâu vào khía cạnh tâm lý của sự thay đổi, giải thích lý</span></div>\n<p class=\"body-txt\">\ndo tại sao con người thường khó thay đổi dù nhận thức được vấn đề. Nó định hướng\n \nchiến lược giao tiếp và marketing phải tập trung vào xây dựng niềm tin và đồng cảm\n \ntrước khi đề xuất hành động cụ thể.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Tư duy &quot;Liên tục tiến lên&quot; (LT TL) và không &quot;ngủ quên trên chiến thắng&quot;: Thành công</span></div>\n<p class=\"body-txt\">\nkhông phải là điểm đến cuối cùng. Doanh nghiệp và cá nhân cần phải liên tục đổi mới, cải\n \ntiến, và chinh phục những &quot;ngọn núi&quot; mới. Nếu không tiến lên, bạn sẽ tụt hậu so với thế\n \ngiới đang vận động.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Nó thúc đẩy tư duy phát triển không ngừng và sự chủ động thích nghi</span></div>\n<p class=\"body-txt\">\ntrong một thế giới thay đổi nhanh chóng, là nền tảng cho sự tồn tại và phát triển bền\n \nvững của bất kỳ doanh nghiệp nào.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Những gì mang bạn đến đây thì không thể mang bạn đến kia.”\n \n“Con đường chỉ hiện ra sau khi chúng ta bước đi.”\n \n“Nếu bạn cảm thấy chưa xứng đáng thuộc về thì lời khuyên của tôi là không nên thuộc về.”\n \n“Năng lượng được tạo ra từ chính cái nỗi đau của bạn.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Bài 44: Phương pháp RPM</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Tóm tắt. Buổi giảng giới thiệu phương pháp RPM (Result, Purpose, Massive Action Plan) –</h3>\n<p class=\"body-txt\">\nmột công cụ mạnh mẽ để đạt được đột phá trong kinh doanh. Diễn giả nhấn mạnh tầm quan\n \ntrọng của việc xác định rõ *kết quả* mong muốn (R), hiểu rõ *mục đích* sâu xa (P) và sau đó\n \nmới xây dựng *kế hoạch hành động mạnh mẽ* (M). Cốt lõi của phương pháp này là bắt đầu\n \nvới câu hỏi &quot;Tại sao?&quot; để định hình mục tiêu và tạo động lực, biến lời nói thành hành động cụ\n \nthể và đo lường được để vượt qua mọi rào cản.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Giới thiệu một &quot;phương pháp vô cùng lợi hại&quot; tên là RPM.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">&quot;Lời nói không có tác dụng gì hết cho đến khi bạn có hành động.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sử dụng ví dụ về &quot;RPM Cycling Indoor&quot; (đạp xe trong phòng tập) như một phương pháp</span></div>\n<p class=\"body-txt\">\nhuấn luyện giả lập nhưng vẫn đạt được thành tích như thi đấu thực sự.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Giải thích các thành phần của RPM:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">R (Result): Kết quả mong muốn (tức là điểm B bạn muốn là gì).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">P (Purpose): Mục đích (tại sao bạn muốn điều đó). (Diễn giả đã tự sửa từ &quot;Plan&quot; sang</span></div>\n<p class=\"body-txt\">\n&quot;Purpose&quot; cho chữ P).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">M (MAP - Massive Action Plan): Bản kế hoạch hành động mạnh mẽ (hành động cụ thể</span></div>\n<p class=\"body-txt\">\ncần làm để đạt được kết quả).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Phân biệt &quot;sứ mệnh cá nhân&quot; và &quot;sứ mệnh doanh nghiệp&quot; để tránh nhầm lẫn, nhấn mạnh</span></div>\n<p class=\"body-txt\">\nđây là hai thứ khác nhau.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Khuyến khích &quot;Start with WHY&quot; (bắt đầu bằng Tại sao) trong mọi việc.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Trích dẫn Jim Rohn: &quot;The bigger the WHY, the easier the HOW&quot; (Tại sao càng lớn, Làm</span></div>\n<p class=\"body-txt\">\nthế nào càng dễ).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Người làm chủ doanh nghiệp, nhà lãnh đạo luôn bắt đầu với câu hỏi &quot;Tại sao?&quot;, trong khi</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">câu hỏi &quot;Làm thế nào?&quot; dành cho cấp lao động trung.</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Câu hỏi &quot;Tại sao?&quot; giúp xác định niềm tin và giá trị mà bạn muốn hướng tới.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Để đi từ điểm A (hiện tại) đến điểm B (kết quả mong muốn), chúng ta sẽ gặp phải những</span></div>\n<p class=\"body-txt\">\nrào cản và nghịch cảnh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cần một bản kế hoạch hành động cụ thể, chi tiết, bao gồm:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Hành động cụ thể cần làm là gì?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ai sẽ làm nó?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Giá trị nếu hoàn thành nó là bao nhiêu?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ngày cần hoàn thành là khi nào?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Ví dụ về hành động &quot;tăng cường quảng cáo trên Facebook&quot; với các yếu tố trên (hành</span></div>\n<p class=\"body-txt\">\nđộng, người thực hiện, giá trị, ngày hoàn thành).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sự đột phá trong kinh doanh đến từ *hành động*, không phải chỉ từ việc học hay biết.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Để làm được, phải tư duy được; để tư duy được, phải đặt câu hỏi đúng; để đặt câu hỏi</span></div>\n<p class=\"body-txt\">\nđúng, phải tập trung vào mục tiêu (biết mình muốn gì).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Cần biết rõ &quot;bạn muốn gì&quot; trước khi đặt câu hỏi và hành động để có thể tìm ra con đường</span></div>\n<p class=\"body-txt\">\nnhanh hơn đến mục tiêu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Bắt đầu với câu hỏi &quot;Tại sao?&quot; (Start with WHY): Đây là yếu tố cốt lõi và định hướng cho</span></div>\n<p class=\"body-txt\">\nmọi hành động của một nhà lãnh đạo hay doanh nghiệp. Việc hiểu rõ mục đích và giá trị\n \nđằng sau mỗi quyết định giúp xác định hướng đi đúng đắn, tạo động lực mạnh mẽ để\n \nvượt qua mọi khó khăn. Nếu không có WHY rõ ràng, các hành động dễ trở nên vô nghĩa\n \nvà mất phương hướng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Sự đột phá chỉ đến từ &quot;Hành động&quot;: Diễn giả khẳng định rằng việc học hỏi và tư duy là</span></div>\n<p class=\"body-txt\">\nquan trọng, nhưng chỉ khi bạn thực sự *làm* thì mới tạo ra sự thay đổi và đột phá. Kế\n \nhoạch dù hoàn hảo đến đâu cũng không có giá trị nếu không được triển khai một cách\n \nquyết liệt và kiên trì, bất chấp mọi rào cản.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00838f\">•</span><span class=\"bul-txt\">Kế hoạch hành động mạnh mẽ (Massive Action Plan) có trách nhiệm rõ ràng: Việc xây</span></div>\n<p class=\"body-txt\">\ndựng một bản đồ hành động chi tiết bao gồm &quot;Ai làm?&quot;, &quot;Giá trị là gì?&quot;, và &quot;Khi nào hoàn\n \nthành?&quot; biến mục tiêu lớn thành những bước đi cụ thể, đo lường được và có tính trách\n \nnhiệm. Điều này giúp tránh sự trì hoãn, phân tán nguồn lực và đảm bảo mỗi hành động\n \nđều hướng tới kết quả cuối cùng một cách hiệu quả nhất.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00838f\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Lời nói không có tác dụng gì hết, cho đến khi bạn có hành động.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“The bigger the WHY, the easier the HOW.”\n \n“Sự đột phá kinh doanh của bạn không phải đi học thì tạo ra sự đột phá. Chỉ có khi nào bạn\n \nlàm, bạn mới tạo ra sự đột phá.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00838f\"><div class=\"pg-inner\"><p class=\"body-txt\">\nLời kết\n \nHết khoá Hành Trình Bứt Phá Kinh Doanh. Đọc để LÀM, không phải để biết — biến mỗi bài\n \nhọc thành hành động cụ thể.\n</p></div></div>",
"<div class=\"pg pg-cover\" style=\"border-top:5px solid #00838f\">\n  <div class=\"cover-wrap\">\n    <div class=\"cover-title\">Hành Trình Bứt Phá</div>\n    <div class=\"cover-sub\" style=\"color:#00838f\">Học để ứng dụng · Áp dụng để thành công</div>\n    <div class=\"cover-tag\" style=\"color:#00838f;margin-top:24px\">QNPA Pickleball Academy</div>\n  </div>\n</div>"];
const N=pages.length;
let cur=0;
const book=document.getElementById('book');
const fill=document.getElementById('progress-fill');
const info=document.getElementById('page-info');
const jump=document.getElementById('page-jump');
const btnP=document.getElementById('btn-prev');
const btnN=document.getElementById('btn-next');
function render(){
  book.innerHTML=pages[cur];
  fill.style.width=((cur+1)/N*100)+'%';
  info.textContent=(cur+1)+' / '+N;
  jump.value=cur+1;
  btnP.disabled=cur===0;
  btnN.disabled=cur===N-1;
  window.scrollTo(0,0);
}
function next(){if(cur<N-1){cur++;render();}}
function prev(){if(cur>0){cur--;render();}}
function goTo(n){cur=Math.max(0,Math.min(N-1,n));render();}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown')next();
  else if(e.key==='ArrowLeft'||e.key==='PageUp')prev();
});
render();
</script>
