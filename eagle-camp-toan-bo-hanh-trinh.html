<script>
const pages=["<div class=\"pg pg-cover\" style=\"border-top:6px solid #e65100\">\n  <div class=\"cv\">\n    <div class=\"cv-tag\" style=\"color:#e65100\">🦅 Hệ thống Học Tập Trọn Đời</div>\n    <div class=\"cv-title\">Eagle Camp — Toàn Bộ Hành Trình Tri Thức</div>\n    <div class=\"cv-line\" style=\"background:#e65100\"></div>\n    <div class=\"cv-sub\">Tổng hợp xuyên suốt các khoá Eagle Camp<br>Từ giáo trình giấy bút (~2015) → kỷ nguyên AI (2026)</div>\n    <div class=\"cv-meta\">3 phần · Bản đồ khoá học · Hệ thống cốt lõi · EC25 AI</div>\n    <div class=\"cv-credit\">Kiến thức gốc: Thầy Phạm Thành Long<br>Biên soạn: Lê Tấn Đào · Lưu trữ: QNPA Pickleball Academy</div>\n  </div>\n</div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"part-badge\" style=\"background:#e65100\">TỔNG QUAN</div><div class=\"sec-hdr\" style=\"color:#e65100\">Tổng hợp tri thức · hoc.letandao.com</div><h2 class=\"pg-title\">Eagle Camp — Toàn Bộ Hành Trình Tri Thức</h2><p class=\"body-txt\">Tổng hợp kiến thức xuyên suốt các khoá Eagle Camp của Thầy Phạm Thành Long mà Lê Tấn Đào đã học và tham khảo — từ giáo trình giấy bút (~2015) đến kỷ nguyên AI (2026). Từ &quot;Sổ Triệu Đô&quot; đến &quot;bộ não thứ 2&quot;.</p><div class=\"sec-hdr\" style=\"color:#e65100\">Thông tin chung</div><div class=\"bullet\"><span class=\"bd\" style=\"color:#e65100\">•</span><span class=\"bt\">8 khoá có tư liệu trong kho</span></div><div class=\"bullet\"><span class=\"bd\" style=\"color:#e65100\">•</span><span class=\"bt\">Hành trình 2021 → 2026 của Lê Tấn Đào</span></div><div class=\"bullet\"><span class=\"bd\" style=\"color:#e65100\">•</span><span class=\"bt\">Nguồn kiến thức gốc: Thầy Phạm Thành Long</span></div><div class=\"bullet\"><span class=\"bd\" style=\"color:#e65100\">•</span><span class=\"bt\">Biên soạn &amp; tổng hợp: Lê Tấn Đào</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"part-badge\" style=\"background:#e65100\">EAGLE CAMP</div><div class=\"sec-hdr\" style=\"color:#e65100\">Bản đồ khoá học</div><h2 class=\"pg-title\">Các khoá Eagle Camp trong kho tư liệu</h2><p class=\"subtitle\">Độ sâu nội dung tuỳ tư liệu Lê Tấn Đào thực có (học trực tiếp hay tham khảo lại).</p><div class=\"card\"><div class=\"card-top\"><span class=\"card-code\" style=\"color:#e65100\">EC16 · 2021</span><span class=\"card-name\">Online</span></div><div class=\"card-desc\">Khoá đầu tiên Lê Tấn Đào tham dự, học online mùa dịch. Tiếp cận tư duy kinh doanh triệu đô.</div><div class=\"card-tl\">📂 Học trực tiếp · tài liệu mẫu</div></div><div class=\"card\"><div class=\"card-top\"><span class=\"card-code\" style=\"color:#e65100\">EC17 · 2022</span><span class=\"card-name\">Sapa</span></div><div class=\"card-desc\">Khoá offline đầu tiên tại Sapa. Trải nghiệm immersive, hơn 90 ảnh &amp; ghi chép thực địa.</div><div class=\"card-tl\">📂 Học trực tiếp · ghi chép ảnh</div></div><div class=\"card\"><div class=\"card-top\"><span class=\"card-code\" style=\"color:#e65100\">EC19 · 2023</span><span class=\"card-name\">Giáo trình gốc</span></div><div class=\"card-desc\">Bản scan vở bài tập giáo trình — truy về lineage chuỗi biểu mẫu sản phẩm &amp; USP.</div><div class=\"card-tl\">📂 Tham khảo · scan giáo trình</div></div><div class=\"card\"><div class=\"card-top\"><span class=\"card-code\" style=\"color:#e65100\">EC20 · 2023</span><span class=\"card-name\">Nha Trang</span></div><div class=\"card-desc\">Khoá tại Nha Trang. Tư liệu hiện có dạng hình ảnh.</div><div class=\"card-tl\">📂 Tham khảo · hình ảnh</div></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"sec-hdr\" style=\"color:#e65100\">Bản đồ khoá học (tiếp)</div><div class=\"card\"><div class=\"card-top\"><span class=\"card-code\" style=\"color:#e65100\">EC2024 · 2024</span><span class=\"card-name\">Bài tập tốt nghiệp</span></div><div class=\"card-desc\">Bài tập marketing tổng thể 11 phần/14 bước, áp thẳng vào Tấn Đào Mobile.</div><div class=\"card-tl\">📂 Tham khảo · bài tập đầy đủ</div></div><div class=\"card\"><div class=\"card-top\"><span class=\"card-code\" style=\"color:#e65100\">EC22 · 2024</span><span class=\"card-name\">Massive Action Plan (MAP)</span></div><div class=\"card-desc\">Bản kế hoạch hành động chi tiết — 39 bài qua 5 tầng A→E. Đầu ra bắt buộc: mọi kết quả bắt đầu từ đây.</div><div class=\"card-tl\">📂 ★ Tài liệu trọng điểm</div></div><div class=\"card\"><div class=\"card-top\"><span class=\"card-code\" style=\"color:#e65100\">EC23 · 2025</span><span class=\"card-name\">Hà Tĩnh</span></div><div class=\"card-desc\">Chủ đề Kỷ luật – Bứt phá – Để dẫn đầu. Trọng tâm: 10 thiên kiến (bias).</div><div class=\"card-tl\">📂 Tham khảo · 10 thiên kiến</div></div><div class=\"card\"><div class=\"card-top\"><span class=\"card-code\" style=\"color:#e65100\">EC25 · 2026</span><span class=\"card-name\">Nha Trang (AI)</span></div><div class=\"card-desc\">Bước ngoặt: dạy &amp; thực hành trực tiếp trên Claude AI. Bộ não thứ 2, skill, agent.</div><div class=\"card-tl\">📂 Báo cáo đầy đủ · AI</div></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"sec-hdr\" style=\"color:#e65100\">Công cụ &amp; Đầu ra</div><h2 class=\"pg-title\">2 tài sản bắt buộc mang về từ Eagle Camp</h2><p class=\"body-txt\">Học Eagle Camp không phải để biết — mà để cầm về 2 thứ cụ thể: một con số bán mỗi ngày, và một bản kế hoạch hành động chi tiết.</p><div class=\"sec-hdr\" style=\"color:#e65100\">📖 Sách lật — Bài Tập Triệu Đô</div><p class=\"body-txt\">Biến mục tiêu 1 triệu USD/năm thành con số bán mỗi ngày (÷ 200 ngày làm việc). Công thức, quy ước tỷ giá, ví dụ &amp; bảng lãi/sp — trình bày dạng sách lật.</p><div class=\"sec-hdr\" style=\"color:#e65100\">📋 Bản kế hoạch — Massive Action Plan (MAP)</div><p class=\"body-txt\">Mọi kết quả phải bắt đầu từ đây. 39 bài hành động qua 5 tầng A→E, mỗi bài có mục tiêu · hành động · vai trò phụ trách · trị giá. Học xong phải tự lập được một MAP.</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"sec-hdr\" style=\"color:#e65100\">Dòng thời gian</div><h2 class=\"pg-title\">Một thập kỷ Eagle Camp</h2><p class=\"subtitle\">Lineage chương trình và hành trình cá nhân của Lê Tấn Đào.</p><div class=\"tl\"><div class=\"tl-yr\" style=\"background:#e65100\">~2015</div><div class=\"tl-body\"><div class=\"tl-h\"><span class=\"tl-ck\">Lineage</span><b>Giáo trình giấy bút</b></div><div class=\"tl-d\">Bản scan vở bài tập (đề ngày 2015) cho thấy bộ khung Eagle Camp đã định hình từ sớm: chuỗi biểu mẫu Ý tưởng triệu đô → Thị trường mục tiêu → Hồ sơ khách hàng → Tính năng/Lợi ích → Vũ khí bí mật → USP. <span class=\"tag\" style=\"background:#c62828\">CẦN KIỂM CHỨNG</span></div></div></div><div class=\"tl\"><div class=\"tl-yr\" style=\"background:#e65100\">2021</div><div class=\"tl-body\"><div class=\"tl-h\"><span class=\"tl-ck\">EC16</span><b>Lê Tấn Đào nhập môn — Online</b></div><div class=\"tl-d\">Khoá đầu tiên Lê Tấn Đào học, hình thức online mùa dịch. Bắt đầu tiếp cận tư duy &amp; bộ công cụ kinh doanh triệu đô.</div></div></div><div class=\"tl\"><div class=\"tl-yr\" style=\"background:#e65100\">2022</div><div class=\"tl-body\"><div class=\"tl-h\"><span class=\"tl-ck\">EC17</span><b>Offline đầu tiên — Sapa</b></div><div class=\"tl-d\">Trải nghiệm trại huấn luyện trực tiếp. Học sâu giữa thực địa; lưu hơn 90 ảnh &amp; ghi chép.</div></div></div><div class=\"tl\"><div class=\"tl-yr\" style=\"background:#e65100\">2023</div><div class=\"tl-body\"><div class=\"tl-h\"><span class=\"tl-ck\">EC19·EC20</span><b>Hệ thống hoá &amp; ôn lại qua tài liệu</b></div><div class=\"tl-d\">Tham khảo giáo trình các khoá (scan biểu mẫu sản phẩm/USP) và tư liệu Nha Trang.</div></div></div><div class=\"tl\"><div class=\"tl-yr\" style=\"background:#e65100\">2024</div><div class=\"tl-body\"><div class=\"tl-h\"><span class=\"tl-ck\">EC2024·EC22</span><b>Học để LÀM</b></div><div class=\"tl-d\">Hoàn thành bài tập marketing tổng thể cho doanh nghiệp thật (Tấn Đào Mobile) và lập Massive Action Plan thiết lập doanh nghiệp bài bản.</div></div></div><div class=\"tl\"><div class=\"tl-yr\" style=\"background:#e65100\">2025</div><div class=\"tl-body\"><div class=\"tl-h\"><span class=\"tl-ck\">EC23</span><b>Kỷ luật &amp; tư duy phản biện</b></div><div class=\"tl-d\">Hà Tĩnh — chủ đề &quot;Kỷ luật – Bứt phá – Để dẫn đầu&quot;; bóc tách 10 thiên kiến cản trở người làm kinh doanh.</div></div></div><div class=\"tl\"><div class=\"tl-yr\" style=\"background:#e65100\">2026</div><div class=\"tl-body\"><div class=\"tl-h\"><span class=\"tl-ck\">EC25</span><b>Kỷ nguyên AI</b></div><div class=\"tl-d\">Nha Trang — toàn bộ giáo trình được dạy &amp; thực hành trực tiếp trên Claude AI: bộ não thứ 2, skill, agent. Một người = một quân đoàn.</div></div></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"sec-hdr\" style=\"color:#e65100\">Hệ thống cốt lõi</div><h2 class=\"pg-title\">Bộ mô hình &amp; công cụ xuyên suốt mọi khoá</h2><p class=\"subtitle\">Đây là phần kiến thức bền vững — lặp lại và nâng cấp qua từng khoá.</p><div class=\"tool\"><div class=\"tool-lbl\" style=\"color:#e65100\">Công cụ #1</div><div class=\"tool-name\">Sổ Triệu Đô</div><div class=\"tool-desc\"><span class=\"tag\" style=\"background:#2e7d32\">NGUYÊN BẢN</span> Biểu mẫu ép mọi ý tưởng &quot;ra số&quot;: Nhóm người · Vấn đề · Giải pháp · ĐVT · Lợi nhuận/ĐVT · Số SP mục tiêu.</div><div class=\"bullet sm\"><span class=\"bd\" style=\"color:#e65100\">›</span><span class=\"bt\">Mục tiêu lõi: lợi nhuận 1 triệu USD/năm (≈25 tỷ năm 2021 · ≈26 tỷ năm 2026)</span></div><div class=\"bullet sm\"><span class=\"bd\" style=\"color:#e65100\">›</span><span class=\"bt\">Công thức: Số SP cần bán = mục tiêu ÷ lợi nhuận/sp</span></div><div class=\"bullet sm\"><span class=\"bd\" style=\"color:#e65100\">›</span><span class=\"bt\">Chia ra 200 ngày làm việc/năm → con số bán mỗi ngày</span></div><div class=\"bullet sm\"><span class=\"bd\" style=\"color:#e65100\">›</span><span class=\"bt\">In 2 mặt: tròn = khách hàng, vuông = sản phẩm</span></div><div class=\"bullet sm\"><span class=\"bd\" style=\"color:#e65100\">›</span><span class=\"bt\">Làm mỗi ngày — &quot;Nhìn thấy vấn đề là thấy tiền&quot;</span></div></div><div class=\"tool\"><div class=\"tool-lbl\" style=\"color:#e65100\">Tư duy nền</div><div class=\"tool-name\">15 Tư duy &amp; 10 Thiên kiến</div><div class=\"tool-desc\"><span class=\"tag\" style=\"background:#2e7d32\">NGUYÊN BẢN</span> Bộ &quot;luật nền&quot; cho quyết định + 10 bẫy tâm lý khiến quyết sai. EC23 đào sâu phần thiên kiến.</div><div class=\"bullet sm\"><span class=\"bd\" style=\"color:#e65100\">›</span><span class=\"bt\">Xác nhận · Vùng an toàn · Sợ mất mát</span></div><div class=\"bullet sm\"><span class=\"bd\" style=\"color:#e65100\">›</span><span class=\"bt\">Hào quang · Chi phí chìm · Đám đông</span></div><div class=\"bullet sm\"><span class=\"bd\" style=\"color:#e65100\">›</span><span class=\"bt\">Tự tin thái quá · Hiện tại · Tiêu cực</span></div><div class=\"bullet sm\"><span class=\"bd\" style=\"color:#e65100\">›</span><span class=\"bt\">Mỏ neo · Quen thuộc · Thẩm quyền</span></div></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"sec-hdr\" style=\"color:#e65100\">Hệ thống cốt lõi (tiếp)</div><div class=\"tool\"><div class=\"tool-lbl\" style=\"color:#e65100\">Chiến lược</div><div class=\"tool-name\">10 Chiến lược Triệu Đô</div><div class=\"tool-desc\"><span class=\"tag\" style=\"background:#2e7d32\">NGUYÊN BẢN</span> 10 chiến lược đưa doanh nghiệp lên quy mô triệu đô + Bản đồ kinh doanh 2 giai đoạn.</div><div class=\"tool-desc\"><span class=\"tag\" style=\"background:#c62828\">CẦN KIỂM CHỨNG</span> Nội dung chi tiết từng chiến lược cần đối chiếu giáo trình gốc.</div></div><div class=\"tool\"><div class=\"tool-lbl\" style=\"color:#e65100\">Sáng tạo SP</div><div class=\"tool-name\">5 Phương pháp + 40 TRIZ</div><div class=\"tool-desc\"><span class=\"tag\" style=\"background:#2e7d32\">NGUYÊN BẢN</span> Khung sáng tạo sản phẩm (ST1–ST5) + 40 nguyên tắc TRIZ. Quy tắc: 3 sản phẩm × ≥3 phương pháp × tính con số bán/ngày.</div><div class=\"tool-desc\"><span class=\"tag\" style=\"background:#2e7d32\">NGUYÊN BẢN</span> &quot;Săn sản phẩm Internet&quot; (mô hình Nài Ngựa): tìm nhu cầu sẵn có rồi &quot;cưỡi&quot; lên thay vì tạo nhu cầu từ 0.</div></div><div class=\"tool\"><div class=\"tool-lbl\" style=\"color:#e65100\">Khách hàng</div><div class=\"tool-name\">Hồ sơ KH &amp; USP</div><div class=\"tool-desc\"><span class=\"tag\" style=\"background:#2e7d32\">NGUYÊN BẢN</span> Value Proposition Canvas: Việc cần làm (chức năng/xã hội/cảm xúc/hỗ trợ) ↔ Đau đớn ↔ Lợi ích, gắn với Bản đồ giá trị (giảm đau/tạo lợi ích).</div><div class=\"tool-desc\"><span class=\"tag\" style=\"background:#2e7d32\">NGUYÊN BẢN</span> USP = &quot;Lợi ích quan trọng bạn mang lại cho khách hàng mà đối thủ không đáp ứng được và không thể (hoặc rất khó) copy.&quot;</div></div><div class=\"tool\"><div class=\"tool-lbl\" style=\"color:#e65100\">Marketing</div><div class=\"tool-name\">3M · Phễu · 16 bước bán hàng</div><div class=\"tool-desc\"><span class=\"tag\" style=\"background:#2e7d32\">NGUYÊN BẢN</span> 3M = Market – Message – Media. Phễu TOFU → MOFU → BOFU. 16 bước bán hàng = khung viết thư/sale page. Kế hoạch marketing tổng thể 11 phần.</div><div class=\"tool-desc\"><span class=\"tag\" style=\"background:#1565c0\">DIỄN GIẢI</span> TOFU: giải quyết vấn đề khách đang tìm · MOFU: duy trì quan hệ · BOFU: thắt chặt để chốt.</div></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"sec-hdr\" style=\"color:#e65100\">Công thức Triệu Đô &amp; quy ước &quot;200 ngày làm việc/năm&quot;</div><p class=\"body-txt\"><span class=\"tag\" style=\"background:#2e7d32\">NGUYÊN BẢN</span> Trọng tâm của Bài Tập Triệu Đô: đạt 1 triệu USD lợi nhuận trong 1 năm. Để chia mục tiêu ra con số bán mỗi ngày, dùng quy ước cho dễ nhân chia:</p><div class=\"bullet\"><span class=\"bd\" style=\"color:#e65100\">•</span><span class=\"bt\">Tỷ giá quy ước: $1 = 26.000đ (năm 2026) — năm 2021 là 25.000đ ⇒ vì sao mục tiêu VND khi thì ~25 tỷ, khi thì ~26 tỷ</span></div><div class=\"bullet\"><span class=\"bd\" style=\"color:#e65100\">•</span><span class=\"bt\">1 năm ≈ 10 tháng làm việc (2 tháng còn lại để lập kế hoạch, báo cáo, ăn mừng, xê xích)</span></div><div class=\"bullet\"><span class=\"bd\" style=\"color:#e65100\">•</span><span class=\"bt\">1 tháng = 4 tuần · 1 tuần = 5 ngày làm việc</span></div><div class=\"bullet\"><span class=\"bd\" style=\"color:#e65100\">•</span><span class=\"bt\">⇒ 5 × 4 × 10 = 200 ngày làm việc/năm</span></div><p class=\"body-txt\">Ví dụ: lợi nhuận $100/sản phẩm → cần bán 1.000.000 ÷ 100 = 10.000 sp/năm → 1.000 sp/tháng → 250 sp/tuần → 50 sp/ngày làm việc. Biết con số 50/ngày thì mục tiêu triệu đô trở nên cụ thể, đo đếm được.</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"sec-hdr\" style=\"color:#e65100\">Bộ câu lệnh &quot;Thiết kế Giải Pháp Triệu Đô&quot; — 12 bước (bản AI hoá)</div><p class=\"subtitle\">Thiết kế giải pháp triệu đô từ sản phẩm đang có:</p><div class=\"bullet\"><span class=\"bd\" style=\"color:#e65100\">•</span><span class=\"bt\">Lựa chọn phân khúc khách hàng triệu đô (chấm 15 tiêu chí)</span></div><div class=\"bullet\"><span class=\"bd\" style=\"color:#e65100\">•</span><span class=\"bt\">Xây Hồ sơ khách hàng (việc cần làm / đau đớn / lợi ích, mỗi nhóm ≥10 mục, cụ thể hoá &amp; chấm điểm)</span></div><div class=\"bullet\"><span class=\"bd\" style=\"color:#e65100\">•</span><span class=\"bt\">Bản đồ giá trị (sản phẩm × giảm đau × tạo lợi ích)</span></div><div class=\"bullet\"><span class=\"bd\" style=\"color:#e65100\">•</span><span class=\"bt\">Đánh giá giải pháp (10 đặc tính + 5 tiêu chí thương mại)</span></div><div class=\"bullet\"><span class=\"bd\" style=\"color:#e65100\">•</span><span class=\"bt\">Thiết kế Sản phẩm triệu đô (15 thành phần — bán kết quả, không bán thời gian)</span></div><div class=\"bullet\"><span class=\"bd\" style=\"color:#e65100\">•</span><span class=\"bt\">Mô hình lợi nhuận (≥26 tỷ; kiểm tra Số SP × lợi nhuận/sp ≥ 26 tỷ)</span></div><div class=\"bullet\"><span class=\"bd\" style=\"color:#e65100\">•</span><span class=\"bt\">Nghiên cứu đối thủ (5 trực tiếp + 5 gián tiếp + 3 thay thế)</span></div><div class=\"bullet\"><span class=\"bd\" style=\"color:#e65100\">•</span><span class=\"bt\">Xây USP theo 5 lớp + 5 công thức</span></div><div class=\"bullet\"><span class=\"bd\" style=\"color:#e65100\">•</span><span class=\"bt\">Hào lũy cạnh tranh (17 lớp bảo vệ)</span></div><div class=\"bullet\"><span class=\"bd\" style=\"color:#e65100\">•</span><span class=\"bt\">Kiểm chứng trước khi làm lớn (phỏng vấn + bán trước)</span></div><div class=\"bullet\"><span class=\"bd\" style=\"color:#e65100\">•</span><span class=\"bt\">Hệ sinh thái sản phẩm (thang 10 tầng)</span></div><div class=\"bullet\"><span class=\"bd\" style=\"color:#e65100\">•</span><span class=\"bt\">Bản thiết kế cuối + kế hoạch 90 ngày</span></div><p class=\"body-txt\"><span class=\"tag\" style=\"background:#2e7d32\">NGUYÊN BẢN</span> 15 nguyên tắc AI phải tuân thủ — đáng chú ý: &quot;Không dùng doanh thu thay cho lợi nhuận&quot;, &quot;Không tự bịa dữ liệu&quot;, &quot;Phải kiểm chứng bằng hành vi mua, không chỉ bằng lời khen&quot;.</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"sec-hdr\" style=\"color:#e65100\">Sự tiến hoá</div><h2 class=\"pg-title\">Từ giấy bút đến AI nhân bản</h2><p class=\"subtitle\">Cùng một bộ tư duy, ba thế hệ công cụ.</p><div class=\"gen\"><div class=\"gen-era\" style=\"color:#e65100\">~2015–2020</div><div class=\"gen-tool\"><b>Giấy bút — Vở biểu mẫu in sẵn</b></div><div class=\"gen-how\"><span class=\"tag\" style=\"background:#1565c0\">DIỄN GIẢI</span> Điền tay từng bảng: ý tưởng → thị trường → hồ sơ KH → USP. Chậm, thủ công, nhưng ép tư duy đi đúng trình tự.</div></div><div class=\"gen\"><div class=\"gen-era\" style=\"color:#e65100\">2021–2024</div><div class=\"gen-tool\"><b>Khung mẫu số hoá — Google Sheets/Docs, GPT chuyên dụng</b></div><div class=\"gen-how\"><span class=\"tag\" style=\"background:#2e7d32\">NGUYÊN BẢN</span> Sổ Triệu Đô bản tính tự động, &quot;LongPT - Sản phẩm triệu đô&quot;, bài tập marketing 14 bước. Nhanh hơn, có công thức.</div></div><div class=\"gen\"><div class=\"gen-era\" style=\"color:#e65100\">2025–2026</div><div class=\"gen-tool\"><b>AI nhân bản — Claude / Claude Code: skill + agent</b></div><div class=\"gen-how\"><span class=\"tag\" style=\"background:#2e7d32\">NGUYÊN BẢN</span> Đóng gói mỗi công thức thành skill; chạy nhiều agent song song. Một học viên xử lý 446 triệu token, 100 sản phẩm triệu đô, 7 agent — &quot;bằng tay cần một quý&quot;.</div></div><blockquote class=\"quote\">AI không thay thế người ra quyết định — nó phơi bày &amp; nhân bản người đó nhanh hơn. Có hệ ra quyết định rõ ràng thì AI biến bạn thành một quân đoàn; không có, AI chỉ giúp bạn đẻ ra rác đẹp với tốc độ kinh hoàng.<div class=\"q-au\">— Thông điệp xuyên suốt</div></blockquote></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"sec-hdr\" style=\"color:#e65100\">Bài học</div><h2 class=\"pg-title\">6 bài học cốt lõi cho người kinh doanh</h2><div class=\"tool\"><div class=\"tool-lbl\" style=\"color:#e65100\">1</div><div class=\"tool-name\">Ra số trước, mơ sau</div><div class=\"tool-desc\">Mọi ý tưởng phải đi qua Sổ Triệu Đô — biết con số bán mỗi ngày; phân biệt lợi nhuận ≠ doanh thu.</div></div><div class=\"tool\"><div class=\"tool-lbl\" style=\"color:#e65100\">2</div><div class=\"tool-name\">Sáng tạo có công thức</div><div class=\"tool-desc\">3 sản phẩm × ≥3 phương pháp × con số/ngày. Không chờ cảm hứng.</div></div><div class=\"tool\"><div class=\"tool-lbl\" style=\"color:#e65100\">3</div><div class=\"tool-name\">Hiểu khách trước khi viết</div><div class=\"tool-desc\">Thấu cảm → Hồ sơ KH → USP → Sản phẩm → Phễu → Marketing.</div></div><div class=\"tool\"><div class=\"tool-lbl\" style=\"color:#e65100\">4</div><div class=\"tool-name\">Marketing là hệ thống</div><div class=\"tool-desc\">3M + phễu TOFU/MOFU/BOFU + 16 bước bán hàng + kế hoạch tổng thể 11 phần.</div></div><div class=\"tool\"><div class=\"tool-lbl\" style=\"color:#e65100\">5</div><div class=\"tool-name\">AI là đòn bẩy</div><div class=\"tool-desc\">Xây hạ tầng trước; có hệ ra quyết định rõ thì AI nhân bản bạn thành quân đoàn.</div></div><div class=\"tool\"><div class=\"tool-lbl\" style=\"color:#e65100\">6</div><div class=\"tool-name\">Học để LÀM</div><div class=\"tool-desc\"><span class=\"tag\" style=\"background:#2e7d32\">NGUYÊN BẢN</span> &quot;Kiến thức tích lũy không tự biến thành tiền — chỉ HÀNH ĐỘNG mới làm được.&quot; Mỗi tuần ép ra 1 con số từ khách thật.</div></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"sec-hdr\" style=\"color:#e65100\">Ứng dụng</div><h2 class=\"pg-title\">Lê Tấn Đào đưa Eagle Camp vào việc thật</h2><div class=\"sec-hdr\" style=\"color:#e65100\">Tấn Đào Mobile — Bài tập → kế hoạch thật</div><p class=\"body-txt\"><span class=\"tag\" style=\"background:#e65100\">ỨNG DỤNG</span> Áp khung marketing 11 phần cho chuỗi bán lẻ điện thoại: tầm nhìn 1.000 tỷ, sản phẩm &quot;Tấn Đào Care+&quot;, tính ngược 25.000 máy để đạt 50 tỷ lợi nhuận.</p><div class=\"sec-hdr\" style=\"color:#e65100\">CAS Automation — Đóng gói thành dịch vụ</div><p class=\"body-txt\"><span class=\"tag\" style=\"background:#e65100\">ỨNG DỤNG</span> Bê mô hình &quot;bộ não thứ 2 + skill + agent&quot; từ EC25 thành sản phẩm/dịch vụ cho khách hàng &amp; học viên.</p><div class=\"sec-hdr\" style=\"color:#e65100\">Đào tạo — Truyền lại có ghi nguồn</div><p class=\"body-txt\"><span class=\"tag\" style=\"background:#e65100\">ỨNG DỤNG</span> Chuyển hoá thành giáo trình đào tạo lại (ghi nhận nguồn Thầy Long); mỗi mô hình → 1 video hook–công thức–CTA.</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"part-badge\" style=\"background:#e65100\">EC25 · AI</div><div class=\"sec-hdr\" style=\"color:#e65100\">Học tập trọn đời · hoc.letandao.com</div><h2 class=\"pg-title\">Eagle Camp 25 — Tổng hợp kiến thức khoá học</h2><p class=\"body-txt\">5 ngày tại Nha Trang, một hệ thống tư duy kinh doanh kết hợp AI. Bản tổng hợp chắt lọc từ báo cáo thu hoạch của học viên khoá 25 — chương trình huấn luyện của Thầy Phạm Thành Long.</p><div class=\"bullet\"><span class=\"bd\" style=\"color:#e65100\">•</span><span class=\"bt\">Thời gian: 21–26/06/2026</span></div><div class=\"bullet\"><span class=\"bd\" style=\"color:#e65100\">•</span><span class=\"bt\">Địa điểm: Nha Trang</span></div><div class=\"bullet\"><span class=\"bd\" style=\"color:#e65100\">•</span><span class=\"bt\">Nguồn: 18 báo cáo học viên + chia sẻ cộng đồng</span></div><div class=\"bullet\"><span class=\"bd\" style=\"color:#e65100\">•</span><span class=\"bt\">Biên soạn: Lê Tấn Đào</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"sec-hdr\" style=\"color:#e65100\">Bối cảnh</div><h2 class=\"pg-title\">Khoá học khác biệt: kinh doanh + AI trong cùng một hành trình</h2><p class=\"body-txt\">Điểm đặc biệt của Eagle Camp 25 so với các khoá trước: toàn bộ chương trình được dạy và thực hành trực tiếp trên công cụ AI. Học viên không chỉ nghe lý thuyết — ngay trong khoá đã dùng AI để biến từng bài học thành công cụ, sản phẩm và kế hoạch thật.</p><div class=\"sec-hdr\" style=\"color:#e65100\">Thông điệp cốt lõi xuyên suốt</div><blockquote class=\"quote\">AI không thay thế người ra quyết định — nó phơi bày và nhân bản người đó nhanh hơn. Có hệ thống ra quyết định rõ ràng, AI biến bạn thành một quân đoàn; không có, AI chỉ giúp bạn đẻ ra rác đẹp với tốc độ kinh hoàng.</blockquote></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"sec-hdr\" style=\"color:#e65100\">Giáo trình</div><h2 class=\"pg-title\">Bản đồ 5 ngày</h2><p class=\"subtitle\">Hai trục chạy song song: trục KIẾN THỨC (tư duy → chiến lược → sản phẩm → khách hàng → marketing) và trục CÔNG CỤ (mỗi bài học được đóng gói thành skill/agent AI).</p><div class=\"day\"><div class=\"day-n\" style=\"background:#e65100\">Ngày 1</div><div class=\"day-b\"><b>Tư duy &amp; nền tảng</b><div class=\"day-d\">Kỷ luật xuất phát · 15 tư duy kinh doanh · 10 thiên kiến · 3 cột kinh doanh</div></div></div><div class=\"day\"><div class=\"day-n\" style=\"background:#e65100\">Ngày 2</div><div class=\"day-b\"><b>Chiến lược</b><div class=\"day-d\">10 chiến lược triệu đô · Bản đồ kinh doanh 2 giai đoạn · Con số triệu đô (Sổ Triệu Đô)</div></div></div><div class=\"day\"><div class=\"day-n\" style=\"background:#e65100\">Ngày 3</div><div class=\"day-b\"><b>Sáng tạo sản phẩm</b><div class=\"day-d\">5 phương pháp sáng tạo (ST1–ST5) · 40 nguyên tắc sáng tạo TRIZ · Săn sản phẩm Internet</div></div></div><div class=\"day\"><div class=\"day-n\" style=\"background:#e65100\">Ngày 4</div><div class=\"day-b\"><b>Khách hàng &amp; thị trường</b><div class=\"day-d\">Bản đồ thấu cảm · Hồ sơ khách hàng (Value Proposition Canvas) · Nghiên cứu đối thủ · USP</div></div></div><div class=\"day\"><div class=\"day-n\" style=\"background:#e65100\">Ngày 5</div><div class=\"day-b\"><b>Marketing &amp; bán hàng</b><div class=\"day-d\">Marketing tổng thể 3M · 16 bước bán hàng · Phễu / Sơ đồ 18 mắt xích · Kế hoạch marketing tổng thể</div></div></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"sec-hdr\" style=\"color:#e65100\">Mô hình cốt lõi</div><h2 class=\"pg-title\">7 công cụ đáng giá nhất của khoá</h2><p class=\"subtitle\">Giải thích theo khung: là gì → tại sao cần → dùng thế nào.</p><div class=\"tool\"><div class=\"tool-lbl\" style=\"color:#e65100\">Công cụ số 1</div><div class=\"tool-name\">Sổ Triệu Đô</div><div class=\"tool-desc\">Biểu mẫu 1 trang ép mọi ý tưởng phải &quot;ra số&quot;:</div><div class=\"bullet sm\"><span class=\"bd\" style=\"color:#e65100\">›</span><span class=\"bt\">Nhóm người</span></div><div class=\"bullet sm\"><span class=\"bd\" style=\"color:#e65100\">›</span><span class=\"bt\">Vấn đề &amp; khát khao</span></div><div class=\"bullet sm\"><span class=\"bd\" style=\"color:#e65100\">›</span><span class=\"bt\">Giải pháp (sản phẩm/dịch vụ)</span></div><div class=\"bullet sm\"><span class=\"bd\" style=\"color:#e65100\">›</span><span class=\"bt\">Tài chính: lợi nhuận/sp · mục tiêu · số lượng cần bán</span></div><div class=\"bullet sm\"><span class=\"bd\" style=\"color:#e65100\">›</span><span class=\"bt\">Nguyên tắc: tính được con số bán mỗi ngày; phân biệt lợi nhuận ≠ doanh thu. Quy ước 200 ngày bán/năm.</span></div></div><div class=\"tool\"><div class=\"tool-lbl\" style=\"color:#e65100\">Tư duy nền</div><div class=\"tool-name\">15 Tư duy &amp; 10 Thiên kiến</div><div class=\"tool-desc\">Bộ &quot;luật nền&quot; cho mọi quyết định và danh sách 10 bẫy tâm lý khiến ta quyết sai. Học viên nhúng thẳng vào file cấu hình AI để máy tự áp dụng vào mọi quyết định — biến tư duy thành bộ lọc tự động.</div></div><div class=\"tool\"><div class=\"tool-lbl\" style=\"color:#e65100\">Chiến lược</div><div class=\"tool-name\">10 Chiến lược Triệu Đô</div><div class=\"tool-desc\">10 chiến lược đưa doanh nghiệp lên quy mô triệu đô, đặt trong bản đồ kinh doanh 2 giai đoạn. Bài học kèm theo: luôn kiểm chứng nguồn (một học viên đã đính chính &quot;15 → đúng là 10 chiến lược&quot;).</div></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"sec-hdr\" style=\"color:#e65100\">Mô hình cốt lõi (tiếp)</div><div class=\"tool\"><div class=\"tool-lbl\" style=\"color:#e65100\">Sáng tạo</div><div class=\"tool-name\">5 Phương pháp + 40 TRIZ</div><div class=\"tool-desc\">Khung sáng tạo sản phẩm mới. Công thức thực hành trong khoá: 3 sản phẩm × mỗi sp ≥ 3 phương pháp → chấm điểm → chọn 1.</div></div><div class=\"tool\"><div class=\"tool-lbl\" style=\"color:#e65100\">Khách hàng</div><div class=\"tool-name\">Hồ sơ khách hàng (VPC)</div><div class=\"tool-desc\">Vẽ chân dung khách đủ sâu: việc cần làm, nỗi đau, mong muốn ↔ sản phẩm. Trình tự phễu khởi nghiệp: Thấu cảm → Hồ sơ KH → USP → Sản phẩm → Phễu → Marketing.</div></div><div class=\"tool\"><div class=\"tool-lbl\" style=\"color:#e65100\">Marketing &amp; bán hàng</div><div class=\"tool-name\">3M · 16 bước bán hàng · Phễu 18 mắt xích</div><div class=\"tool-desc\">3M = Market – Message – Media: đúng tệp → đúng thông điệp → đúng kênh. 16 bước bán hàng: khung viết sale page. 18 mắt xích: bản đồ phễu marketing tổng thể từ thu hút (TOFU) → nuôi dưỡng (MOFU) → chốt đơn (BOFU).</div><div class=\"bullet sm\"><span class=\"bd\" style=\"color:#e65100\">›</span><span class=\"bt\">Sản phẩm đầu ra: Kế hoạch Marketing tổng thể 18 mục (có học viên làm 28 trang).</span></div><div class=\"bullet sm\"><span class=\"bd\" style=\"color:#e65100\">›</span><span class=\"bt\">Một bài tập được Thầy chấm 85,2 điểm rồi học viên làm lại theo phản hồi — minh hoạ vòng lặp học → làm → chấm → sửa.</span></div></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"sec-hdr\" style=\"color:#e65100\">Điểm đột phá</div><h2 class=\"pg-title\">Biến kiến thức thành một hệ thống AI</h2><p class=\"subtitle\">Đây là phần khiến Eagle Camp 25 khác hẳn các khoá trước.</p><div class=\"tool\"><div class=\"tool-lbl\" style=\"color:#e65100\">🧠</div><div class=\"tool-name\">Bộ não thứ 2</div><div class=\"tool-desc\">Kho tri thức cá nhân 3 lớp: raw/ (nguyên liệu thô) · wiki/ (thẻ rời có liên kết) · CLAUDE.md (luật chơi cho AI). Mỗi thẻ ghi rõ nguồn.</div></div><div class=\"tool\"><div class=\"tool-lbl\" style=\"color:#e65100\">⚙️</div><div class=\"tool-name\">Skill</div><div class=\"tool-desc\">Đóng gói mỗi công thức của Thầy thành một skill tái dùng. Gọi một lần là chạy đúng công thức — prompt ngắn hơn, kết quả ổn định hơn.</div></div><div class=\"tool\"><div class=\"tool-lbl\" style=\"color:#e65100\">🤖</div><div class=\"tool-name\">Agent &amp; đa-agent</div><div class=\"tool-desc\">Tạo agent (&quot;Giám đốc R&amp;D&quot;), chạy nhiều agent song song để sản xuất hàng loạt, thậm chí để các agent tranh luận rồi chọn phương án thắng.</div></div><div class=\"tool\"><div class=\"tool-lbl\" style=\"color:#e65100\">📊</div><div class=\"tool-name\">Tự chấm bài</div><div class=\"tool-desc\">Xây sẵn rubric (ví dụ 100 điểm) để AI chấm thẳng bài của chính mình, rồi gửi Thầy góp ý để ra bản tốt hơn.</div></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"sec-hdr\" style=\"color:#e65100\">4 bài học vận hành AI — áp dụng được ngay</div><div class=\"tool\"><div class=\"tool-lbl\" style=\"color:#e65100\">1</div><div class=\"tool-name\">Hạ tầng trước, sản phẩm sau</div><div class=\"tool-desc\">2 ngày đầu xây skill/agent; ngày 3 cùng hạ tầng đó đẻ 100 ý tưởng trong 6 giờ.</div></div><div class=\"tool\"><div class=\"tool-lbl\" style=\"color:#e65100\">2</div><div class=\"tool-name\">1 việc = 1 phiên</div><div class=\"tool-desc\">Đừng để một phiên kéo nhiều ngày ôm nhiều việc — tốn token, AI dễ lạc.</div></div><div class=\"tool\"><div class=\"tool-lbl\" style=\"color:#e65100\">3</div><div class=\"tool-name\">Brief 5 dòng trước việc lớn</div><div class=\"tool-desc\">Mục tiêu · Đầu vào · Định dạng · Ràng buộc · Nơi lưu → cắt ~50% vòng sửa.</div></div><div class=\"tool\"><div class=\"tool-lbl\" style=\"color:#e65100\">4</div><div class=\"tool-name\">Tự chấm mình + để người ngoài chấm</div><div class=\"tool-desc\">Xây rubric và mời Thầy soi trước khi thị trường soi.</div></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"sec-hdr\" style=\"color:#e65100\">Cảm nhận học viên</div><h2 class=\"pg-title\">Học để làm — không chỉ học để biết</h2><blockquote class=\"quote\">Kiến thức tích lũy không tự biến thành tiền — chỉ có HÀNH ĐỘNG cụ thể mới làm được điều đó. Não nhiều dữ liệu mà không ra quyết định thì chỉ là thư viện đẹp.<div class=\"q-au\">— Vưu Xuân Hào</div></blockquote><blockquote class=\"quote\">Tốc độ tôi làm việc đang nhanh hơn tốc độ tôi quyết định mục đích cuối. Tháng tới tôi đổi luật chơi: mỗi tuần phải có 1 con số đến từ khách hàng thật — đặt cọc, đăng ký pre-sell, hoặc từ chối thật.<div class=\"q-au\">— Thuỷ Anh</div></blockquote><blockquote class=\"quote\">Không chỉ học để biết. Mà học để làm. Làm để tạo ra kết quả. Và tạo ra giá trị cho thật nhiều người.<div class=\"q-au\">— Nguyễn Văn Kiên</div></blockquote><p class=\"body-txt\">Điểm chung của mọi báo cáo: học viên đều giỏi tạo ra (kiến thức, ý tưởng, công cụ), nhưng điểm yếu chung là chưa &quot;khép vòng&quot; thành doanh thu thật — đây chính là cảnh báo lớn nhất của khoá.</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"sec-hdr\" style=\"color:#e65100\">Ứng dụng</div><h2 class=\"pg-title\">Đưa khoá học vào công việc thật</h2><div class=\"sec-hdr\" style=\"color:#e65100\">Kinh doanh công nghệ</div><div class=\"bullet\"><span class=\"bd\" style=\"color:#e65100\">•</span><span class=\"bt\">Sổ Triệu Đô cho từng dòng sản phẩm &amp; combo → biết số máy cần bán/ngày</span></div><div class=\"bullet\"><span class=\"bd\" style=\"color:#e65100\">•</span><span class=\"bt\">&quot;Săn sản phẩm Internet&quot; để chọn ngách phụ kiện đang lên trước khi nhập hàng</span></div><div class=\"sec-hdr\" style=\"color:#e65100\">AI &amp; tự động hoá</div><div class=\"bullet\"><span class=\"bd\" style=\"color:#e65100\">•</span><span class=\"bt\">Bê mô hình &quot;bộ não thứ 2 + skill + agent&quot; thành dịch vụ cho khách hàng</span></div><div class=\"bullet\"><span class=\"bd\" style=\"color:#e65100\">•</span><span class=\"bt\">Đóng gói công thức Eagle Camp thành bộ skill nội bộ cho đội ngũ</span></div><div class=\"sec-hdr\" style=\"color:#e65100\">Đào tạo &amp; thương hiệu</div><div class=\"bullet\"><span class=\"bd\" style=\"color:#e65100\">•</span><span class=\"bt\">Chuyển hoá thành giáo trình đào tạo lại (ghi nhận nguồn Thầy Long)</span></div><div class=\"bullet\"><span class=\"bd\" style=\"color:#e65100\">•</span><span class=\"bt\">Mỗi mô hình → 1 video: hook → công thức → CTA</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"part-badge\" style=\"background:#e65100\">GHI CHÚ</div><div class=\"sec-hdr\" style=\"color:#e65100\">Chú giải nhãn nguồn</div><h2 class=\"pg-title\">Bốn nhãn minh bạch hoá nguồn gốc</h2><p class=\"subtitle\">Mỗi nội dung trong tài liệu gốc được gắn nhãn để minh bạch nguồn.</p><div class=\"leg\"><span class=\"tag\" style=\"background:#2e7d32\">NGUYÊN BẢN</span><span class=\"leg-d\">có trong tài liệu</span></div><div class=\"leg\"><span class=\"tag\" style=\"background:#1565c0\">DIỄN GIẢI</span><span class=\"leg-d\">trình bày lại</span></div><div class=\"leg\"><span class=\"tag\" style=\"background:#e65100\">ỨNG DỤNG</span><span class=\"leg-d\">cách Lê Tấn Đào áp dụng</span></div><div class=\"leg\"><span class=\"tag\" style=\"background:#c62828\">CẦN KIỂM CHỨNG</span><span class=\"leg-d\">chưa đủ căn cứ, chờ đối chiếu</span></div><div class=\"hr\"></div><div class=\"sec-hdr\" style=\"color:#e65100\">Ghi nhận nguồn &amp; bản quyền</div><p class=\"body-txt\">Toàn bộ kiến thức gốc thuộc chương trình Eagle Camp của Thầy Phạm Thành Long. Tài liệu do Lê Tấn Đào tổng hợp từ kho &quot;HỌC TẬP TRỌN ĐỜI&quot; (giáo trình, bài tập, ghi chép, báo cáo học viên) cho mục đích học tập, ôn tập và ứng dụng — không sao chép nguyên văn giáo trình độc quyền.</p><p class=\"body-txt\">Bản sao lưu cá nhân này do Đàm Thị Thanh Hoa (QNPA Pickleball Academy) lưu trữ từ hoc.letandao.com ngày 28/06/2026, giữ nguyên nội dung gốc.</p></div></div>",
"<div class=\"pg pg-cover\" style=\"border-top:6px solid #e65100\">\n  <div class=\"cv\">\n    <div class=\"cv-tag\" style=\"color:#e65100\">🦅 Eagle Camp</div>\n    <div class=\"cv-title\" style=\"font-size:22px\">Một người = một quân đoàn</div>\n    <div class=\"cv-sub\" style=\"margin-top:18px\">\"AI không thay thế người ra quyết định —<br>nó phơi bày & nhân bản người đó nhanh hơn.\"</div>\n    <div class=\"cv-credit\" style=\"margin-top:26px;color:#e65100\">Nguồn: hoc.letandao.com · Thầy Phạm Thành Long<br>Bản sao lưu cá nhân — QNPA · 2026</div>\n  </div>\n</div>"];
const N=pages.length;let cur=0;
const book=document.getElementById('book'),fill=document.getElementById('pfill'),
  pi=document.getElementById('pi'),pin=document.getElementById('pin'),
  bp=document.getElementById('bp'),bn=document.getElementById('bn');
function render(){book.innerHTML=pages[cur];fill.style.width=((cur+1)/N*100)+'%';
  pi.textContent=(cur+1)+' / '+N;pin.textContent=(cur+1)+' / '+N;
  bp.disabled=cur===0;bn.disabled=cur===N-1;
  const inner=book.querySelector('.pg-inner');if(inner)inner.scrollTop=0;window.scrollTo(0,0);}
function next(){if(cur<N-1){cur++;render();}}
function prev(){if(cur>0){cur--;render();}}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='PageDown')next();
  else if(e.key==='ArrowLeft'||e.key==='PageUp')prev();});
render();
</script>
