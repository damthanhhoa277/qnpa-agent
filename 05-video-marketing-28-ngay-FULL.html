"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Sức mạnh của nỗi đau: Con người hành động mạnh mẽ hơn để tránh nỗi đau hơn là để</span></div>\n<p class=\"body-txt\">\nđạt được sự sung sướng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ứng dụng nỗi đau vào kể chuyện: Kể câu chuyện về nỗi đau, trải nghiệm thất bại của bạn</span></div>\n<p class=\"body-txt\">\nđể khán giả cũng mong muốn phải thay đổi, không muốn rơi vào nỗi đau đó giống như\n \nbạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cấu trúc câu chuyện: Kể một câu chuyện có những nỗi đau đi xuống, sau đó gặp vấn đề</span></div>\n<p class=\"body-txt\">\nvà đi lên, đó chính là câu chuyện của bạn. Lồng ghép câu chuyện của bạn với câu chuyện\n \nmà khán giả cũng đang phải trải qua.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Công thức tiêu đề hiệu quả (N + lời khuyên/bài học/mẹo + dành cho [đối tượng thị</span></div>\n<p class=\"body-txt\">\ntrường tiềm năng] + nếu không muốn [nỗi đau/vất vả/khốn cùng mà họ phải trải qua]):\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ví dụ: &quot;Ba lời khuyên dành cho doanh nhân nếu không muốn bị phá sản.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ví dụ: &quot;Năm bài học dành cho những người chuẩn bị khởi nghiệp nếu không muốn thất</span></div>\n<p class=\"body-txt\">\nbại.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ví dụ: &quot;Chín mẹo dành cho các bà mẹ sau sinh nếu không muốn bị trầm cảm.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ví dụ: &quot;Bảy bài học dành cho cha mẹ nếu không muốn con em mình nghiện game.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ví dụ: &quot;Ba mẹo dành cho những cô gái nếu không muốn bị FA cả đời.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Kêu gọi hành động (Call to Action) ở cuối video: Mời người xem đăng ký kênh &quot;ngay</span></div>\n<p class=\"body-txt\">\nhôm nay&quot; để không &quot;bị bỏ lỡ video của tôi vào ngày mai,&quot; tạo sự khẩn cấp và giá trị cho\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">nội dung tiếp theo.</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Sử dụng câu chuyện về thất bại và khó khăn để xây dựng niềm tin: Đây là cốt lõi vì nó</span></div>\n<p class=\"body-txt\">\ngiải quyết trực tiếp vấn đề thiếu tin tưởng, một trong những rào cản lớn nhất khiến\n \nkhách hàng không mua hàng. Khi bạn dám chia sẻ sự yếu đuối và quá trình vượt qua khó\n \nkhăn, bạn trở nên chân thực và đáng tin cậy hơn, giúp khán giả đồng cảm và cảm thấy\n \nbạn là người có trải nghiệm thực tế.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nguyên lý nỗi đau là động lực mạnh mẽ hơn sự sung sướng: Insight này rất quan trọng</span></div>\n<p class=\"body-txt\">\ntrong marketing và thuyết phục. Thay vì chỉ tập trung vào lợi ích (sự sung sướng), việc\n \nnhấn mạnh vào nỗi đau mà sản phẩm/dịch vụ của bạn giúp khách hàng tránh được sẽ\n \ntạo ra động lực hành động mạnh mẽ và nhanh chóng hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Lồng ghép câu chuyện của bạn với nỗi đau của khán giả: Không chỉ kể câu chuyện của</span></div>\n<p class=\"body-txt\">\nriêng mình, mà còn phải làm cho khán giả nhận ra rằng câu chuyện đó cũng là câu\n \nchuyện của họ, hoặc họ cũng đang đứng trước những nỗi đau tương tự. Sự đồng cảm này\n \ntạo ra một kết nối sâu sắc, khiến khán giả cảm thấy được thấu hiểu và tin rằng bạn có\n \ngiải pháp cho vấn đề của họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cấu trúc tiêu đề tập trung vào nỗi đau mà khách hàng muốn tránh: Đây là một công cụ</span></div>\n<p class=\"body-txt\">\ncực kỳ thực tế và hiệu quả để thu hút sự chú ý. Bằng cách nhắm thẳng vào nỗi sợ hãi và\n \nmong muốn tránh đau khổ của đối tượng mục tiêu, tiêu đề này không chỉ tạo ra sự tò mò\n \nmà còn định vị nội dung của bạn như một giải pháp cho vấn đề cấp bách của họ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Hãy nhớ rằng những sai lầm của bạn, nếu bạn kể ra để giúp cho những người khác không rơi\n \nvào những cái sai lầm đó, không rơi vào những cái thất bại đó, thì nó sẽ làm cho người ta tin\n \ntưởng bạn hơn rất là nhiều.”\n \n“Một trong những lý do để người ta thúc đẩy là bởi vì người ta sợ nỗi đau, và cái nỗi đau thì\n \nnó lớn hơn cả cái sự sung sướng khiến cho người ta còn hành động.”\n \n“Hãy đăng ký kênh của tôi ngày hôm nay nếu bạn không muốn bị bỏ lỡ video vào ngày mai.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ngày 10: Điều này sẽ thay đổi [khía cạnh cuộc sống] mãi mãi</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Tóm tắt. Buổi học này là ngày thứ 10 trong khóa video marketing, tập trung vào việc biến</h3>\n<p class=\"body-txt\">\nngười làm marketing thành người kể chuyện. Cốt lõi là sử dụng bối cảnh thực tế và phỏng\n \nvấn người khác để tạo ra những câu chuyện có tiêu đề mạnh mẽ, thu hút sự chú ý và hứa hẹn\n \nsự thay đổi. Diễn giả cũng hướng dẫn cách quay video đơn giản mà hiệu quả chỉ với điện\n \nthoại, kết hợp nhắc bài và chỉnh sửa để có sản phẩm chuyên nghiệp.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Buổi học là ngày thứ 10 của chương trình huấn luyện video marketing.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Thách thức đặt ra cho học viên: Đến một nơi nào đó có sẵn khách hàng tiềm năng hoặc</span></div>\n<p class=\"body-txt\">\ncâu chuyện điển hình, dùng điện thoại quay phim và nói chuyện/phỏng vấn mọi người.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tầm quan trọng của &quot;bối cảnh tuyệt vời&quot; trong việc tạo nên câu chuyện video hấp dẫn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cấu trúc đội ngũ quay phim lý tưởng theo diễn giả (người quay, thư ký ghi chép, người</span></div>\n<p class=\"body-txt\">\ncổ vũ) nhưng nhấn mạnh có thể làm đơn giản hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Mục tiêu của video marketing: trở thành một người kể chuyện (storyteller).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Video marketing cần sử dụng cấu trúc 7 thành phần để kể chuyện tuyệt vời.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Thách thức cụ thể trong ngày: Dùng điện thoại đến một nơi nào đó, gặp và phỏng vấn</span></div>\n<p class=\"body-txt\">\nmột người nào đó, chia sẻ câu chuyện của bạn với họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Công thức tiêu đề/khung nội dung cho video: &quot;Điều này sẽ làm thay đổi [khía cạnh nào</span></div>\n<p class=\"body-txt\">\nđó] trong cuộc sống của [thị trường tiềm năng/người được phỏng vấn] của chúng ta một\n \ncách mãi mãi.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Các ví dụ về tiêu đề theo công thức:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">&quot;Điều này sẽ làm thay đổi cách bạn làm video marketing mãi mãi.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">&quot;5 phút này sẽ làm thay đổi khía cạnh kinh doanh mãi mãi.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">&quot;Ba điều này sẽ làm bạn thay đổi thói quen khỏe mạnh của mình mãi mãi.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">&quot;Ba bài học này sẽ làm bạn thay đổi tình trạng hôn nhân của gia đình mình mãi mãi.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">&quot;Video này sẽ làm bạn thay đổi cách làm video marketing của mình mãi mãi.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Kỹ thuật quay phim hiệu quả (dành cho người nói/diễn): Có người &quot;nhắc bài&quot; (đọc kịch</span></div>\n<p class=\"body-txt\">\nbản/ý chính) và sau đó cắt bỏ các đoạn dừng/thừa trong quá trình chỉnh sửa video (có\n \nthể dùng phần mềm trên điện thoại).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Sức mạnh của &quot;bối cảnh&quot; (context) trong kể chuyện: Diễn giả nhấn mạnh việc phải ra</span></div>\n<p class=\"body-txt\">\nngoài, đến một nơi nào đó có sẵn khách hàng tiềm năng hoặc câu chuyện. Điều này giúp\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><p class=\"body-txt\">\nvideo trở nên chân thực, sống động và dễ gây đồng cảm hơn nhiều so với việc chỉ nói\n \nchuyện trong phòng. Bối cảnh tạo ra sự kết nối cảm xúc và minh chứng cho những gì bạn\n \nđang truyền tải, làm tăng độ tin cậy và sự hấp dẫn của câu chuyện.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khung tiêu đề &quot;Điều này sẽ làm thay đổi... mãi mãi&quot;: Đây là một công thức mạnh mẽ để</span></div>\n<p class=\"body-txt\">\nthu hút sự chú ý và truyền tải giá trị cốt lõi ngay lập tức. Tiêu đề này tạo ra một lời hứa\n \nvề sự chuyển đổi lớn, đánh trúng vào mong muốn cải thiện bản thân hoặc công việc của\n \nngười xem, khiến họ muốn xem tiếp để khám phá &quot;điều này&quot; là gì và làm thế nào nó có\n \nthể thay đổi cuộc đời họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Đơn giản hóa quá trình sản xuất video: Diễn giả cho thấy việc tạo video marketing không</span></div>\n<p class=\"body-txt\">\ncần quá phức tạp (chỉ cần một chiếc điện thoại). Quan trọng hơn, kỹ thuật dùng người\n \n&quot;nhắc bài&quot; và cắt ghép sau đó giúp người nói tự tin, mạch lạc hơn mà không cần thuộc\n \nlòng kịch bản dài dòng. Điều này khuyến khích mọi người bắt đầu làm video mà không bị\n \nrào cản về kỹ năng ghi nhớ hay thiết bị phức tạp, tập trung vào nội dung và thông điệp.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Hãy để ý đến bối cảnh.”\n \n“chúng ta đơn giản làm video marketing chỉ đơn giản là một người kể câu chuyện.”\n \n“Điều này sẽ làm thay đổi [khía cạnh nào đó] trong cuộc sống của [thị trường tiềm năng] của\n \nchúng ta một cách mãi mãi.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ngày 11: Dạy cho ai đó điều gì đó</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Tóm tắt. Buổi giảng tập trung vào chiến lược video marketing hiệu quả bằng cách áp dụng</h3>\n<p class=\"body-txt\">\nphương pháp &quot;cá lớn trong ao nhỏ&quot;. Cốt lõi là thu hẹp thị trường mục tiêu thành một\n \n&quot;ngách&quot; rất nhỏ, sau đó tạo nội dung video để &quot;dạy&quot; khán giả cách thoát khỏi nỗi đau và đạt\n \nđược sự sung sướng. Kỹ thuật này bao gồm việc xây dựng một cấu trúc video thuyết phục từ\n \n&quot;tại sao&quot;, trình bày nỗi đau, giải pháp, đến &quot;cách làm&quot; cụ thể từng bước, kết hợp với tiêu đề\n \nsiêu ngách để thu hút đúng đối tượng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Buổi học thứ 11 tập trung vào việc đi sâu vào &quot;thị trường ngách nhỏ hơn&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chiến lược &quot;cá lớn trong ao nhỏ&quot; khuyên bạn không nên cố gắng bán cho tất cả mọi</span></div>\n<p class=\"body-txt\">\nngười, mà hãy thu hẹp thị trường và cố gắng trở thành người tốt nhất trong thị trường\n \nnhỏ đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Video marketing không phải là quảng cáo hay PR, mà là nỗ lực &quot;dạy cho họ một điều gì</span></div>\n<p class=\"body-txt\">\nđó&quot; để thoát khỏi nỗi đau hoặc đạt được sự sung sướng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Kỹ thuật dạy cho ai đó một điều gì đó (trích từ khóa học Ultimate Trainer) gồm ba bước:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Xác định *họ* mong muốn điều gì và *bạn* có kiến thức, kinh nghiệm, trải nghiệm gì để</span></div>\n<p class=\"body-txt\">\nkết nối với mong muốn đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Kỹ thuật dạy đơn giản: Bắt đầu với câu hỏi &quot;Tại sao họ lại cần điều này?&quot;. Kể câu chuyện</span></div>\n<p class=\"body-txt\">\nvề nỗi đau bạn từng trải qua và cách bạn tìm ra giải pháp để đạt được điều sung sướng.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chia sẻ &quot;cách làm&quot; theo từng bước cụ thể (ví dụ: bước 1, bước 2,...), kèm theo các yêu cầu</span></div>\n<p class=\"body-txt\">\nđể hoàn thành mỗi bước.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ví dụ về câu chuyện cá nhân trong hôn nhân, với 3 bí quyết để sống hạnh phúc: thấu</span></div>\n<p class=\"body-txt\">\nhiểu nhu cầu, đáp ứng nhu cầu và vượt quá mong đợi, và nỗ lực đáp ứng tốt hơn cả\n \nmong đợi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Phần cuối của video cần có &quot;Call To Action&quot; (lời kêu gọi hành động), ví dụ: chia sẻ kết</span></div>\n<p class=\"body-txt\">\nquả và đăng ký kênh để theo dõi phần tiếp theo.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nhắc lại cấu trúc 7 phần của câu chuyện: lồng câu chuyện của mình vào bài học và</span></div>\n<p class=\"body-txt\">\nhướng dẫn (tôi làm được điều này, bạn cũng nên làm để đạt được điều kia).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cấu trúc tiêu đề video quan trọng (cho ngày hôm nay) là: [Bài học/Chiến lược/Bí mật] +</span></div>\n<p class=\"body-txt\">\n[tính từ nhấn mạnh] + &quot;dành cho&quot; + [một thị trường ngách thật là ngách, thật là nhỏ hơn\n \nthị trường chính của bạn].\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ví dụ về tiêu đề siêu ngách: &quot;Lời khuyên quan trọng dành cho doanh nhân dưới 30 tuổi&quot;,</span></div>\n<p class=\"body-txt\">\n&quot;Bài học đặc biệt dành cho các bà mẹ có con 3 tuổi&quot;, &quot;Chiến lược cốt lõi dành cho những\n \nphụ nữ kinh doanh online&quot;, &quot;Chiến lược siêu đẳng dành cho những người phụ nữ 25\n \ntuổi&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Marketing là dạy cho mọi người, bán hàng là đào tạo.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chiến lược &quot;cá lớn trong ao nhỏ&quot;: Thay vì cố gắng bán cho tất cả mọi người, hãy tập</span></div>\n<p class=\"body-txt\">\ntrung vào một thị trường ngách thật nhỏ và cố gắng trở thành người tốt nhất trong đó.\n \nĐiều này cực kỳ quan trọng vì nó giúp doanh nghiệp tối ưu hóa nguồn lực, xây dựng sự\n \nchuyên biệt, dễ dàng tạo dựng uy tín và kết nối sâu sắc với một nhóm khách hàng cụ thể,\n \ntừ đó gia tăng hiệu quả marketing và doanh số.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Video marketing là &quot;dạy&quot; để giải quyết nỗi đau hoặc đạt sung sướng: Thay đổi tư duy về</span></div>\n<p class=\"body-txt\">\nvideo marketing từ việc quảng cáo trực tiếp sang việc cung cấp giá trị, giáo dục khách\n \nhàng. Điều này quan trọng vì khi bạn giải quyết vấn đề thực sự hoặc giúp khách hàng đạt\n \nđược điều họ mong muốn, họ sẽ cảm thấy tin tưởng, biết ơn và sẵn sàng trở thành khách\n \nhàng trung thành, thay vì chỉ bị thu hút bởi một quảng cáo thoáng qua.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cấu trúc tiêu đề video tập trung vào thị trường siêu ngách: Tiêu đề nên được xây dựng</span></div>\n<p class=\"body-txt\">\ncực kỳ cụ thể để nhắm đúng một nhóm đối tượng nhỏ, ví dụ: &quot;Bài học đặc biệt dành cho\n \ncác bà mẹ có con 3 tuổi&quot;. Điều này quan trọng vì nó giúp video nổi bật giữa vô vàn nội\n \ndung khác, khiến người xem cảm thấy nội dung &quot;dành riêng cho họ&quot; và tăng đáng kể tỷ lệ\n \nclick và sự tương tác, dù thị trường nhỏ hơn nhưng có tính chuyển đổi cao hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cấu trúc kể chuyện &quot;Nỗi đau -&gt; Sung sướng -&gt; Cách làm&quot;: Trình bày video theo trình tự:</span></div>\n<p class=\"body-txt\">\nbắt đầu bằng &quot;tại sao&quot; họ cần, đồng cảm với nỗi đau của họ, chỉ ra con đường đạt được\n \nsung sướng, và cuối cùng là &quot;cách làm&quot; từng bước chi tiết. Điều này quan trọng vì nó\n \nkhông chỉ thu hút cảm xúc mà còn cung cấp giá trị thực tế, biến người xem từ đồng cảm\n \nthành người hành động, xây dựng niềm tin vững chắc vào người chia sẻ và giải pháp\n \nđược đưa ra.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Làm video marketing không phải là quảng cáo, làm video marketing không phải là để PR để\n \nlàm cái điều gì đó cho sản phẩm của bạn. Hãy nỗ lực dạy cho họ một điều gì đó để thoát khỏi\n \nnỗi đau, hãy nỗ lực dạy cho họ một điều gì đó để đạt được sự sung sướng trong thị trường của\n \nhọ.”\n \n“Hãy trở thành người tốt nhất trong thị trường nhỏ của bạn.”\n \n“Marketing đó là dạy cho mọi người, bán hàng là đào tạo.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ngày 12: Kêu gọi lời phản đối hoặc góp ý</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Tóm tắt. Buổi học này tập trung vào các chiến lược tạo nội dung video marketing liên tục</h3>\n<p class=\"body-txt\">\nbằng cách khai thác sự tương tác của khán giả. Cốt lõi là khuyến khích người xem đặt câu hỏi\n \nhoặc tranh luận về các chủ đề, sau đó người làm video sẽ tạo các nội dung phản hồi, vừa trả\n \nlời thắc mắc vừa xử lý các ý kiến phản đối. Diễn giả cũng giới thiệu một cấu trúc tiêu đề\n \nvideo hiệu quả là &quot;Những điều cần làm [sau khi/khi] [một sự kiện quan trọng trong đời]&quot; để\n \nthu hút đúng đối tượng khách hàng bằng cách chạm vào những &quot;nỗi đau&quot; hoặc sự kiện lớn\n \ntrong cuộc sống/công việc của họ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nhiều người gặp khó khăn trong việc tìm kiếm đề tài mới cho video sau một thời gian.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Một mẹo nhỏ để có đề tài liên tục là làm cho khán giả của bạn hỏi bạn, hoặc tranh luận</span></div>\n<p class=\"body-txt\">\nvới bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khi khán giả hỏi, bạn sẽ hứa trả lời họ trong video tiếp theo.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khi khán giả tranh luận, đưa ra ý kiến trái chiều, bạn sẽ làm những video để trả lời họ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bạn có thể kêu gọi hành động bằng cách yêu cầu khán giả làm video hỏi bạn và chia sẻ</span></div>\n<p class=\"body-txt\">\nđường link, sau đó bạn sẽ lấy video của họ, trích dẫn, biên tập lại và làm video trả lời.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bạn cũng có thể kêu gọi họ đặt câu hỏi trực tiếp về một đề tài cụ thể.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khi khán giả liên tục hỏi và chờ đợi bạn trả lời, họ sẽ được giữ chân trong kênh</span></div>\n<p class=\"body-txt\">\nmarketing của bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Việc khán giả hỏi giúp tăng uy tín của bạn và khiến họ bắt đầu tin tưởng bạn (giải quyết</span></div>\n<p class=\"body-txt\">\nlý do &quot;họ không tin bạn&quot; trong 4 lý do khách hàng không mua hàng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khi khán giả tranh luận, đưa ra ý kiến trái chiều, đó là cơ hội để bạn lắng nghe, giãi bày,</span></div>\n<p class=\"body-txt\">\nchia sẻ và xử lý sự từ chối.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Việc này giúp xử lý sự từ chối trong marketing và bán hàng ngay cả khi sản phẩm chưa</span></div>\n<p class=\"body-txt\">\nra mắt.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bạn có thể khuyến khích khán giả đưa ra quan điểm, đặt câu hỏi hoặc tự làm video hỏi</span></div>\n<p class=\"body-txt\">\nvà chia sẻ để bạn trả lời.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cách này sẽ mang lại vô vàn ý kiến mới, quan điểm mới, bình luận mới và đặc biệt là</span></div>\n<p class=\"body-txt\">\nnhững sự tương tác cho kênh của bạn, thu hút nhiều sự quan tâm của khán giả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nội dung video quan trọng ngày hôm nay là cấu trúc tiêu đề: &quot;Những điều cần làm [sau</span></div>\n<p class=\"body-txt\">\nkhi/khi] [một sự kiện quan trọng trong đời]&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Các ví dụ áp dụng cấu trúc tiêu đề này bao gồm: &quot;Những điều cần làm khi chuẩn bị ra</span></div>\n<p class=\"body-txt\">\ntrường&quot; (cho sinh viên), &quot;Những điều cần làm sau khi sinh em bé&quot; (cho bà mẹ), &quot;Những\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><p class=\"body-txt\">\nđiều cần làm sau khi ly hôn&quot; (cho phụ nữ đơn thân), &quot;Những điều cần làm sau khi đăng\n \nký kinh doanh&quot; (cho doanh nghiệp), &quot;Những điều cần làm sau khi hoàn thành cự ly\n \nmarathon&quot; (cho người bán đồ thể thao).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Lưu ý rằng &quot;nỗi đau thì thúc đẩy con người hành động nhiều hơn&quot;, vì vậy &quot;những điều</span></div>\n<p class=\"body-txt\">\ncần làm sau khi một nỗi đau nào đó xảy ra&quot; sẽ thu hút khán giả nhiều hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tiếp tục để khán giả tranh luận, cãi vã, bình luận, hỏi và hứa trả lời sẽ làm cho video của</span></div>\n<p class=\"body-txt\">\nbạn trở nên &quot;hot&quot; hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cấu trúc tiêu đề này là vô cùng quan trọng, không được phép thay đổi nó trừ những</span></div>\n<p class=\"body-txt\">\nthành phần trong ngoặc vuông.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Từ khóa và cách viết mô tả video cũng vô cùng quan trọng để video dễ dàng được tìm</span></div>\n<p class=\"body-txt\">\nkiếm.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Biến khán giả thành nguồn sản xuất nội dung và công cụ xử lý từ chối hiệu quả: Thay vì</span></div>\n<p class=\"body-txt\">\ntự mình liên tục nghĩ ra ý tưởng, chiến lược này khuyến khích chủ động kêu gọi khán giả\n \nđặt câu hỏi, tranh luận, hoặc thậm chí tự làm video hỏi. Điều này không chỉ cung cấp một\n \ndòng ý tưởng bất tận cho các video phản hồi mà còn giúp xây dựng lòng tin, tăng uy tín\n \nvà đặc biệt là tạo cơ hội trực tiếp lắng nghe và giải quyết các băn khoăn, ý kiến trái chiều\n \n(tức là xử lý sự từ chối) của khách hàng ngay cả trước khi sản phẩm được tung ra. Đây là\n \nđiểm đắt giá vì nó chuyển đổi gánh nặng sáng tạo nội dung và công việc xử lý các vấn đề\n \ntiềm ẩn từ người bán sang khán giả một cách khéo léo, biến phản hồi thành tài nguyên\n \nquý giá để cải thiện sản phẩm/dịch vụ và củng cố mối quan hệ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Sử dụng cấu trúc tiêu đề &quot;Những điều cần làm [sau khi/khi] [một sự kiện quan trọng</span></div>\n<p class=\"body-txt\">\ntrong đời]&quot; và tập trung vào &quot;nỗi đau&quot;: Cấu trúc này vô cùng mạnh mẽ vì nó cho phép\n \nngười tạo nội dung nhắm thẳng vào những khoảnh khắc mang tính bước ngoặt hoặc\n \nnhững vấn đề (nỗi đau) cụ thể mà đối tượng khán giả mục tiêu đang đối mặt. Việc tập\n \ntrung vào &quot;nỗi đau&quot; đặc biệt quan trọng vì diễn giả nhấn mạnh đây là động lực mạnh mẽ\n \nnhất thúc đẩy con người tìm kiếm giải pháp và hành động. Bằng cách cung cấp giải pháp\n \ncho những &quot;nỗi đau&quot; này, video sẽ thu hút sự chú ý mạnh mẽ, tạo ra sự đồng cảm và xây\n \ndựng kết nối sâu sắc với khán giả, từ đó tăng đáng kể hiệu quả tiếp thị.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Đây là một mẹo nhỏ để giúp cho bạn có liên tục những đề tài.”\n \n“Bạn nhớ có bốn điều khiến khách hàng không mua hàng của chúng ta phải không nhỉ? Điều\n \nsố một là vì họ không quan tâm đến sản phẩm, điều số hai là vì họ không có tiền, điều số ba là\n \nvì họ không tin bạn, điều số tư là vì họ không tin là sản phẩm của bạn có kết quả với họ.”\n \n“Nỗi đau thì thúc đẩy con người hành động nhiều hơn.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ngày 13: Tạo ra sự phân cực</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Tóm tắt. Buổi học tập trung vào chiến lược tạo video marketing thu hút và lan tỏa mạnh mẽ</h3>\n<p class=\"body-txt\">\nbằng cách tạo ra sự &quot;phân cực&quot; và &quot;tranh luận&quot; trong quan điểm. Cốt lõi là công thức 15 giây\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><p class=\"body-txt\">\nđầu tiên của video, sử dụng cấu trúc &quot;Lợi ích phi thường - Bằng chứng - Lợi ích&quot; để gây ấn\n \ntượng mạnh. Đồng thời, diễn giả nhấn mạnh cách đặt tiêu đề hiệu quả theo công thức &quot;đạt\n \nđược điều phi thường ngay cả khi làm những điều bình thường&quot;, đánh vào tâm lý khao khát\n \nkết quả lớn với nỗ lực nhỏ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Mục tiêu của buổi học là tiếp tục tạo ra sự phân cực, tranh luận và đối lập trong quan</span></div>\n<p class=\"body-txt\">\nđiểm để thu hút đám đông về phía mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Càng tạo ra nhiều sự đối lập/vô lý, càng tạo ra nhiều tranh luận và sự hấp dẫn đối với thị</span></div>\n<p class=\"body-txt\">\ntrường.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Mọi người không quan tâm bạn là ai cho đến khi họ biết bạn mang đến cho họ điều gì. Vì</span></div>\n<p class=\"body-txt\">\nthế, hãy tập trung vào giá trị mang lại cho người xem.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">15 giây đầu tiên của video là quan trọng nhất, quyết định sự thành công, khả năng lan</span></div>\n<p class=\"body-txt\">\ntỏa (viral) và việc video có được xem tiếp hay không. Mỗi video được đo lường bằng số\n \nphút xem trung bình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Công thức 3 bước để tạo 15 giây đầu tiên vô cùng hấp dẫn:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">5 giây đầu tiên: Nêu bật những *lợi ích phi thường*, lớn lao, mà người xem chưa từng</span></div>\n<p class=\"body-txt\">\ntưởng tượng được, họ sẽ đạt được khi xem video này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">5 giây tiếp theo: Đưa ra các *bằng chứng* cụ thể mà bạn hoặc ai đó đã đạt được những</span></div>\n<p class=\"body-txt\">\nlợi ích đó (ví dụ: chụp màn hình, chia sẻ trải nghiệm, lời nói của người khác).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">5 giây cuối (từ giây thứ 11 đến 15): Nhắc lại những *giá trị* mà khán giả sẽ nhận được</span></div>\n<p class=\"body-txt\">\nvà hứa hẹn phần hay nhất luôn xuất hiện ở đâu đó trong video để khuyến khích họ xem\n \ntiếp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cấu trúc tiêu đề video hiệu quả nên theo dạng: &quot;Bạn có thể đạt được [điều gì đó phi</span></div>\n<p class=\"body-txt\">\nthường] ngay cả khi bạn làm [một điều gì đó bình thường]&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">&quot;Điều phi thường&quot; là những giá trị, kết quả lớn lao mà người xem khao khát nhưng chưa</span></div>\n<p class=\"body-txt\">\ntừng đạt được.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">&quot;Điều bình thường&quot; là những việc đơn giản mà mọi người vẫn làm hàng ngày, nhìn thấy</span></div>\n<p class=\"body-txt\">\nlà bình thường.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cấu trúc tiêu đề này tạo ra sự phân lập, cô lập và tranh luận, khiến video dễ dàng lan tỏa</span></div>\n<p class=\"body-txt\">\nhơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tập trung vào 15 giây đầu tiên của video là yếu tố then chốt quyết định thành bại: Diễn</span></div>\n<p class=\"body-txt\">\ngiả nhấn mạnh nhiều lần tầm quan trọng của 15 giây mở đầu, đây là &quot;cửa ngõ&quot; để giữ\n \nchân người xem, xác định video có được lan tỏa hay không. Việc đưa ra một công thức cụ\n \nthể cho 15 giây này (lợi ích - bằng chứng - lợi ích) mang lại một lộ trình rõ ràng để tối ưu\n \nhóa sự thu hút ngay từ ban đầu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chiến lược tạo &quot;phân cực&quot; và &quot;tranh luận&quot; thông qua cấu trúc tiêu đề &quot;phi thường ngay</span></div>\n<p class=\"body-txt\">\ncả khi bình thường&quot;: Đây là một insight tâm lý sâu sắc. Nó khai thác mong muốn bẩm\n \nsinh của con người là đạt được kết quả lớn lao mà không cần nỗ lực quá nhiều, đồng thời\n \ntạo ra sự bất ngờ và mâu thuẫn nhận thức (nghịch lý) kích thích sự tò mò và thảo luận.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><p class=\"body-txt\">\nĐiều này không chỉ thu hút người xem mà còn khuyến khích họ chia sẻ và bình luận,\n \ngiúp video lan tỏa mạnh mẽ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khán giả quan tâm điều họ nhận được, không phải bạn là ai: Thay vì giới thiệu bản thân</span></div>\n<p class=\"body-txt\">\nhay chủ đề một cách thông thường, video cần đi thẳng vào vấn đề cốt lõi: lợi ích mà\n \nngười xem sẽ nhận được. Điều này định hướng lại toàn bộ chiến lược nội dung, từ tiêu\n \nđề đến các giây đầu tiên, biến video thành một giải pháp hoặc một nguồn giá trị hữu ích\n \ncho khán giả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Mọi người không quan tâm tới bạn là ai, cho đến khi họ biết bạn mang đến cho họ điều gì.”\n \n“15 giây này hãy nhớ rằng 15 giây sẽ quyết định sự thành bại trong video của bạn.”\n \n“Kết quả phi thường nhưng mà làm những cái điều rất là bình thường.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ngày 14: Nỗi đau khiến người ta hành động mạnh mẽ hơn</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Tóm tắt. Buổi giảng này tập trung vào hai chiến lược cốt lõi trong video marketing: khai</h3>\n<p class=\"body-txt\">\nthác &quot;nỗi đau&quot; của khách hàng và duy trì lịch trình xuất bản video nhất quán. Diễn giả nhấn\n \nmạnh việc thấu hiểu và giải quyết các vấn đề cấp bách của đối tượng mục tiêu, đồng thời đề\n \nxuất một công thức tiêu đề cụ thể. Bên cạnh đó, việc xuất bản video đúng giờ và thể hiện tính\n \ntiếp nối trong chuỗi nội dung sẽ giúp tối ưu hóa khả năng tiếp cận, xây dựng sự mong đợi và\n \nchuyển đổi khán giả thành khách hàng trung thành.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Diễn giả chúc mừng học viên đã hoàn thành 14/28 video của khóa học, đánh dấu nửa</span></div>\n<p class=\"body-txt\">\nchặng đường và đạt trình độ marketer video chuyên nghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Hai yếu tố chính thúc đẩy con người hành động là &quot;nỗi đau&quot; và &quot;sự sung sướng&quot;, trong</span></div>\n<p class=\"body-txt\">\nđó &quot;nỗi đau&quot; có sức mạnh thay đổi mạnh mẽ hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Trọng tâm buổi học là tiếp tục khai thác &quot;nỗi đau&quot; của độc giả/khán giả.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khái niệm &quot;sự tiếp diễn trong các video&quot; (continuity) cũng rất quan trọng, tạo sự kết nối</span></div>\n<p class=\"body-txt\">\nvà mong đợi cho khán giả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tất cả video từ nay trở đi cần được &quot;xuất bản đúng giờ&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Mỗi kênh, thị trường, hoặc nhóm độc giả sẽ có &quot;một và chỉ một cái giờ tuyệt vời nhất để</span></div>\n<p class=\"body-txt\">\nxuất bản&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Để tìm giờ tốt nhất, cần quan sát trong YouTube Studio (hoặc các công cụ phân tích</span></div>\n<p class=\"body-txt\">\nkhác) trong 48 giờ để xác định giờ đỉnh cao lượt xem, sau đó xuất bản video vào một giờ\n \ntrước giờ đỉnh cao đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ví dụ: nếu giờ đông người xem nhất là 9-10 giờ tối, nên đăng video vào 8 giờ tối. Lý do là</span></div>\n<p class=\"body-txt\">\nvideo mới lên càng có nhiều lượt xem ban đầu, YouTube sẽ càng gợi ý nó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cách thực hiện: Đặt video ở &quot;chế độ riêng tư&quot; và sử dụng tính năng &quot;hẹn giờ xuất bản</span></div>\n<p class=\"body-txt\">\nvideo&quot; để đảm bảo video ra mắt đúng thời điểm đã chọn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ở cuối mỗi video, hãy cho khán giả biết video của bạn đang &quot;tiếp tục được xuất bản&quot; (ví</span></div>\n<p class=\"body-txt\">\ndụ: ghi 14/28, 15/28,...). Các video cũ cũng nên được sửa thành 01/28, 02/28,...\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Lợi ích của việc xuất bản đúng giờ và tạo tính tiếp diễn: khán giả sẽ tự động đăng ký</span></div>\n<p class=\"body-txt\">\nkênh, vào xem đúng giờ và số lượng khán giả sẽ ngày càng đông hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tiếp tục khai thác &quot;nỗi đau của độc giả&quot;: việc giúp họ giải quyết nỗi đau sẽ khiến họ biết</span></div>\n<p class=\"body-txt\">\nơn, tôn trọng và trở thành &quot;fan cuồng&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Công thức tiêu đề video được giới thiệu: &quot;Hầu hết mọi người [thị trường tiềm năng]</span></div>\n<p class=\"body-txt\">\nkhông biết điều này nên họ gặp nỗi đau này.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Diễn giả đưa ra nhiều ví dụ minh họa cho công thức tiêu đề này trong các lĩnh vực khác</span></div>\n<p class=\"body-txt\">\nnhau như chạy bộ, thi cử, hôn nhân, sức mạnh đàn ông và kinh doanh.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khai thác &quot;nỗi đau&quot; của khách hàng để tạo động lực mạnh mẽ: Nỗi đau là yếu tố thúc đẩy</span></div>\n<p class=\"body-txt\">\nthay đổi và hành động mạnh mẽ hơn cả sự sung sướng. Bằng cách thấu hiểu sâu sắc và\n \ntrực tiếp giải quyết &quot;nỗi đau&quot; của thị trường mục tiêu thông qua nội dung video, doanh\n \nnghiệp không chỉ cung cấp giải pháp mà còn xây dựng được mối quan hệ sâu sắc, lòng\n \ntin và biến khách hàng thành những &quot;fan cuồng&quot; trung thành. Điều này quan trọng vì nó\n \nchuyển trọng tâm từ việc bán sản phẩm/dịch vụ sang việc giải quyết vấn đề thực sự cho\n \nkhách hàng, tạo ra giá trị bền vững.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tối ưu hóa thời gian và tạo tính tiếp nối cho chuỗi video: Việc xác định và tuân thủ &quot;giờ</span></div>\n<p class=\"body-txt\">\nvàng&quot; để xuất bản video (thường là một giờ trước thời điểm có lượt xem cao nhất) giúp\n \nvideo của bạn nhận được nhiều tương tác ban đầu, từ đó được YouTube ưu tiên gợi ý.\n \nĐồng thời, việc đánh số thứ tự rõ ràng (ví dụ: 14/28) ở cuối mỗi video tạo ra sự mong\n \nđợi và khuyến khích khán giả theo dõi toàn bộ chuỗi nội dung. Chiến lược này không chỉ\n \ntăng hiệu quả tiếp cận mà còn xây dựng thói quen và sự gắn kết của khán giả với kênh\n \ncủa bạn, đảm bảo lượng người xem ổn định và phát triển bền vững.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Nỗi đau giúp cho người ta thay đổi và sự sung sướng khiến cho người ta tiến lên. Và nỗi đau\n \nthì khiến người ta thay đổi mạnh mẽ hơn sự sung sướng.”\n \n“Mỗi một kênh video, mỗi một thị trường, mỗi một nhóm độc giả của bạn sẽ có một và chỉ một\n \ncái giờ tuyệt vời nhất để xuất bản.”\n \n“Hầu hết mọi người [thị trường tiềm năng của bạn] không biết điều này nên họ gặp nỗi đau\n \nnày.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ngày 15: Cuối cùng bạn đã có thể [làm điều gì đó]</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Tóm tắt. Buổi học này đánh dấu giai đoạn chuyển tiếp quan trọng trong chuỗi video</h3>\n<p class=\"body-txt\">\nmarketing, từ việc xây dựng niềm tin sang giới thiệu sản phẩm/dịch vụ. Cốt lõi là thay đổi\n \ncách kể chuyện: thay vì nói về bản thân, hãy tập trung vào hành trình chuyển đổi của khách\n \nhàng, đưa họ từ &quot;đau khổ&quot; sang &quot;sung sướng&quot;. Mục tiêu là dần định hướng khán giả về sự\n \nxuất hiện của sản phẩm thông qua công thức &quot;Cuối cùng, bạn đã có thể [làm được một điều\n \ngì đó]&quot; để gợi mở giải pháp mà công cụ của bạn mang lại.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chúc mừng những người đã hoàn thành 14 video liên tục trong chương trình 28 ngày, vì</span></div>\n<p class=\"body-txt\">\nđây là một thành tựu hiếm có.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Video thứ 15 đánh dấu một giai đoạn mới: khán giả đã quá quen thuộc và tin tưởng</span></div>\n<p class=\"body-txt\">\nngười làm video, giờ đây họ mong muốn nhận được nhiều hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nhiệm vụ của người làm video là đưa khán giả từ điểm &quot;đau khổ&quot; tới &quot;sung sướng&quot;, từ</span></div>\n<p class=\"body-txt\">\n&quot;địa ngục&quot; lên &quot;thiên đường&quot;, từ &quot;nỗi buồn&quot; đến &quot;hạnh phúc&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Để làm được điều đó, hãy tạo ra &quot;con thuyền&quot; (công cụ/kỹ năng) và dạy họ cách sử dụng</span></div>\n<p class=\"body-txt\">\nnó để tự mình biến đổi, đi từ A đến B.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Trong tuần này, thay vì kể chuyện về bản thân (như tuần trước), hãy kể những câu</span></div>\n<p class=\"body-txt\">\nchuyện ngắn *về khách hàng* (câu chuyện của họ).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Giai đoạn này sẽ dần định hướng về sự xuất hiện của sản phẩm/công cụ của bạn trong</span></div>\n<p class=\"body-txt\">\nvòng hai tuần tới.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bắt đầu video của ngày hôm nay với tiêu đề theo cấu trúc: &quot;Cuối cùng, bạn đã có thể [làm</span></div>\n<p class=\"body-txt\">\nđược một điều gì đó]&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Sau đó, chỉ cho họ ba bước để thực hiện điều đó (làm thế nào, tại sao phải làm, và khi</span></div>\n<p class=\"body-txt\">\nlàm thì đạt được gì).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Đừng quên kêu gọi hành động (xem video tiếp theo, đăng ký kênh YouTube, chờ đợi...).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Mục đích của việc sử dụng cấu trúc &quot;Cuối cùng, bạn đã có thể...&quot; là để giới thiệu một công</span></div>\n<p class=\"body-txt\">\ncụ mà bạn sẽ bán sau này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Các ví dụ minh họa: &quot;Cuối cùng, bạn đã có thể dễ dàng leo núi&quot; (khi bán gậy leo núi);</span></div>\n<p class=\"body-txt\">\n&quot;Cuối cùng, bạn đã có thể dễ dàng quay khán khoái&quot; (khi bán camera); &quot;Cuối cùng, bạn\n \nđã có thể chạy bộ với balo ở trên vai&quot; (khi bán balo).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chuyển đổi từ xây dựng niềm tin sang giới thiệu giải pháp: Sau khi đã kiên trì xây dựng</span></div>\n<p class=\"body-txt\">\nsự quen thuộc và niềm tin với khán giả (qua 14 video đầu), đây là thời điểm vàng để bắt\n \nđầu giới thiệu sản phẩm/dịch vụ của mình. Khán giả đã tin tưởng và đang chờ đợi một\n \ngiải pháp, giúp quá trình chuyển đổi từ người xem sang khách hàng trở nên tự nhiên và\n \nhiệu quả hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tập trung vào hành trình chuyển đổi của khách hàng: Thay vì khoe về bản thân hay sản</span></div>\n<p class=\"body-txt\">\nphẩm, việc kể chuyện về cách khách hàng có thể đi từ &quot;đau khổ&quot; đến &quot;sung sướng&quot; nhờ\n \nsự hỗ trợ của bạn sẽ tạo ra sự đồng cảm và khao khát hành động mạnh mẽ. Sản\n \nphẩm/dịch vụ của bạn được định vị như một &quot;con thuyền&quot; dẫn lối, chứ không phải một\n \nmón hàng đơn thuần.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Công thức &quot;Cuối cùng, bạn đã có thể...&quot;: Đây là một chiến lược giới thiệu sản phẩm cực kỳ</span></div>\n<p class=\"body-txt\">\nhiệu quả. Nó không chỉ đơn thuần quảng cáo tính năng mà tập trung vào *kết quả cuối\n \ncùng* mà khách hàng đạt được, đánh vào mong muốn tiềm ẩn của họ. Cấu trúc này khơi\n \ngợi sự tò mò về &quot;công cụ&quot; hoặc &quot;phương pháp&quot; nào đã giúp họ đạt được điều đó, từ đó\n \ndẫn dắt đến sản phẩm một cách tinh tế.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Họ đã nhận được sự tin tưởng từ bạn, có rất nhiều bài học cho họ.”\n \n“Hãy nhớ rằng, đưa họ từ điểm đau khổ tới điểm sung sướng, đưa họ từ địa ngục lên tới thiên\n \nđường, đưa họ từ đau khổ sang đến hạnh phúc.”\n \n“Cuối cùng, bạn đã có thể làm được một cái gì đó [cho sản phẩm của bạn được xuất hiện].”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ngày 16: Cách dùng [công cụ] để đạt [kết quả thị trường muốn]</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Tóm tắt. Buổi học này tập trung vào các kỹ thuật video marketing, đặc biệt là cách gây chú ý</h3>\n<p class=\"body-txt\">\ntrong 15 giây và kể chuyện 7 bước, lần này xoay quanh nỗi đau và giải pháp của khách hàng.\n \nDiễn giả nhấn mạnh việc tối ưu video bằng từ khóa, playlist và thẻ để giữ chân người xem,\n \nđồng thời hướng dẫn cách tạo nội dung giáo dục thị trường, tập trung mô tả lợi ích của loại\n \nsản phẩm (chứ không phải thương hiệu cụ thể) để tạo sự mong chờ trước khi bán hàng ở\n \ntuần sau.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chào mừng tuần thứ 3, ngày thứ 16, ôn lại các kỹ thuật video đã học.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Kỹ thuật 3 bước gây chú ý trong 15 giây:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bước 1: Nêu rõ lợi ích khách hàng nhận được trong video.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bước 2: Đưa ra bằng chứng bạn đã làm được những điều đó.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bước 3: Nhắc lại hoặc bổ sung những điều khách hàng sẽ nhận được.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Kỹ thuật kể chuyện 7 bước (kể về khách hàng):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bước 1: Nỗi đau, điểm hiện tại của khách hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bước 2: Sự sung sướng nếu họ ứng dụng những điều hướng dẫn trong video.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bước 3: Những rào cản, khó khăn, trở ngại, thách thức, những người phản đối đã làm</span></div>\n<p class=\"body-txt\">\ncho họ không thể di chuyển từ điểm đau khổ tới điểm sung sướng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bước 4: Chỉ cho họ một con đường (cách thức) để giải quyết vấn đề.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bước 5: Ứng dụng những điều này (minh họa quá trình vượt qua khó khăn, thách thức</span></div>\n<p class=\"body-txt\">\nđể vươn lên).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bước 6: Kết quả đạt được (kết quả mà *họ* đạt được).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bước 7: Bài học rút ra hoặc những trải nghiệm lớn hơn, hoặc những điều sẽ diễn ra</span></div>\n<p class=\"body-txt\">\ntrong tương lai.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ví dụ minh họa: Kể chuyện 7 bước bằng trải nghiệm cá nhân dùng nước xịt mũi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Kể chuyện phải là câu chuyện của khán giả: Dù kể về bản thân nhưng phải làm cho khán</span></div>\n<p class=\"body-txt\">\ngiả thấy liên quan, đó chính là marketing bằng câu chuyện.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Kỹ thuật tối ưu video trên YouTube:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Từ khóa (Keywords): Phải được đưa vào phần mô tả, phần tag và phần tiêu đề của video.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Playlist: Đưa video vào playlist để các video trong cùng playlist gợi ý lẫn nhau, giúp</span></div>\n<p class=\"body-txt\">\nngười xem ở lại kênh lâu hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Thẻ (Cards/Chữ &#x27;i&#x27;): Gắn các thẻ trong video để đề nghị người xem video khác, giúp</span></div>\n<p class=\"body-txt\">\nvideo được đề nghị nhiều hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Đường link trong mô tả: Đưa link các video cùng loại vào phần mô tả để khán giả ở lại</span></div>\n<p class=\"body-txt\">\nkênh lâu hơn.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Mục tiêu chung: Áp dụng mọi cách để người xem một video xong sẽ tiếp tục xem video</span></div>\n<p class=\"body-txt\">\nkhác của bạn, giữ chân khán giả và làm kênh nổi tiếng hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chiến lược nội dung tuần này (Tuần 3: Thị trường đã nóng, khán giả quen với bạn):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Mô tả về loại sản phẩm: Chỉ nói về *loại* sản phẩm, không nói về thương hiệu, nhãn hiệu,</span></div>\n<p class=\"body-txt\">\ngiá cả, nơi bán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tập trung vào lợi ích: Tập trung nói về lợi ích của sản phẩm đó giúp cho họ đạt được</span></div>\n<p class=\"body-txt\">\nđiều gì.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Mục tiêu: Khiến khán giả *mong chờ* sản phẩm của bạn. (Việc bán hàng sẽ diễn ra vào</span></div>\n<p class=\"body-txt\">\ntuần sau).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Công thức tiêu đề video tuần này: &quot;Cách sử dụng [công cụ/sản phẩm (tên chung)] để đạt</span></div>\n<p class=\"body-txt\">\n[hiệu quả mong muốn]&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Phần trong ngoặc là phần có thể thay đổi, phần ngoài ngoặc phải giữ nguyên.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Diễn giả đưa nhiều ví dụ minh họa cho công thức này (bổ sung protein, buộc dây giày, tô</span></div>\n<p class=\"body-txt\">\nson, dùng Google, dùng đèn LED, dùng Excel, dùng Shopee, dùng mầm đậu nành, dùng\n \nbàn ủi).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cấu trúc 3 bước để hướng dẫn một ai đó làm điều gì đó (áp dụng cho công thức tiêu đề):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bước 1: Nói cho họ biết *tại sao* họ cần phải đạt được điều đó.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bước 2: Làm điều đó *như thế nào* (có thể chia nhỏ thành nhiều bước phụ).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bước 3: Nói sản phẩm nào (tên chung, không tên riêng) có thể giúp đạt được điều đó.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nhắc nhở cuối cùng: Chưa cần bán vội, sẽ bán nó ở tuần sau. Tiếp tục làm video liên tục,</span></div>\n<p class=\"body-txt\">\nđúng, đủ, đều.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Thay đổi trọng tâm kể chuyện từ bản thân sang khách hàng: Diễn giả nhấn mạnh việc áp</span></div>\n<p class=\"body-txt\">\ndụng kỹ thuật kể chuyện 7 bước để giải quyết nỗi đau và mang lại niềm sung sướng cho\n \nkhách hàng. Điều này quan trọng vì nó chuyển hướng nội dung từ việc tự quảng bá sang\n \nviệc đồng cảm và cung cấp giá trị cho khán giả, xây dựng kết nối mạnh mẽ và tăng tính\n \nthuyết phục.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Làm nóng thị trường và tạo sự mong chờ, không bán hàng ngay lập tức: Thay vì vội vàng</span></div>\n<p class=\"body-txt\">\ngiới thiệu thương hiệu và giá cả, tuần này tập trung vào việc mô tả *loại sản phẩm* và\n \n*lợi ích* mà nó mang lại. Đây là chiến lược marketing thông minh giúp giáo dục thị\n \ntrường, xây dựng nhu cầu và sự tò mò, khiến khách hàng chủ động tìm hiểu và mong\n \nmuốn sản phẩm, tạo nền tảng vững chắc cho việc bán hàng thành công vào tuần sau.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Công thức tiêu đề video hiệu quả: Công thức &quot;Cách sử dụng [công cụ/sản phẩm (tên</span></div>\n<p class=\"body-txt\">\nchung)] để đạt [hiệu quả mong muốn]&quot; là một insight đắt giá. Nó giúp người tạo nội\n \ndung dễ dàng xây dựng tiêu đề thu hút, tập trung vào giải pháp và lợi ích cho người xem,\n \nđồng thời cho phép giữ bí mật về sản phẩm cụ thể (thương hiệu) cho đến khi thị trường\n \nđã &quot;nóng&quot; và sẵn sàng mua.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Hãy nhớ rằng là tuần này là tuần để khiến cho khán giả mong chờ sản phẩm của bạn. Họ sẽ\n \nhỏi bạn về nhãn hiệu, cái này mua ở đâu, thì bạn có thể bán trước, bạn có thể nhắn tin cho họ,\n \nnhưng mà bạn sẽ không đồng loạt đưa nó ra, mà cái việc này sẽ đưa nó ra ở tuần sau.”\n \n“Bạn định bán cái gì, định bán ở tuần sau nhá. Bạn định bán cái gì thì hãy hướng dẫn họ sử\n \ndụng cái đó và để đạt được cái lợi ích nào đó.”\n \n“Tương tự như vậy, bạn cũng cần phải thường xuyên kể những câu chuyện về bản thân mình,\n \nnhưng nó thực ra là câu chuyện của khán giả của bạn thì lúc đó người ta mới muốn nghe. Thì\n \nđó cũng chính là marketing, marketing bằng câu chuyện.”\n \n“Tóm lại, áp dụng mọi cách để cho người ta xem video một xong thì người ta tiếp tục xem\n \nvideo khác của bạn. Đó là bí quyết của việc mà giữ cho kênh YouTube của bạn được trở nên\n \nnổi tiếng hơn.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ngày 17: [Nhân vật điển hình] đã tạo ra [kết quả] thế nào</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Tóm tắt. Buổi học này tập trung vào việc tạo các video marketing hiệu quả bằng cách sử</h3>\n<p class=\"body-txt\">\ndụng lời chứng thực (testimonial) hoặc nghiên cứu điển hình (case study) từ khách hàng.\n \nCốt lõi là tìm những người đã sử dụng sản phẩm và đạt được kết quả mong muốn, sau đó để\n \nhọ kể câu chuyện chuyển đổi của mình một cách chân thực. Mục tiêu là tạo sự tò mò bằng\n \ncách giữ kín tên sản phẩm/thương hiệu ban đầu, chỉ tập trung vào hành trình và kết quả đạt\n \nđược, bởi lời kể của bên thứ ba là công cụ marketing mạnh mẽ nhất.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Buổi thứ 17 trong chuỗi 28 ngày video marketing, tập trung vào thị trường nóng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Mục tiêu là làm cho mọi người (trong thị trường tiềm năng) phấn khích và mong muốn</span></div>\n<p class=\"body-txt\">\ncó sản phẩm của chúng ta.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Video hôm trước đã hướng dẫn cách sử dụng sản phẩm (khi sản phẩm chưa xuất hiện).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Video hôm nay: Tìm những người đã sử dụng sản phẩm sớm và đã có kết quả.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tập hợp lại một vài trường hợp (2-5 trường hợp) khách hàng này.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cùng khách hàng làm những video mà họ hướng dẫn cách sử dụng sản phẩm để đạt</span></div>\n<p class=\"body-txt\">\nđược &quot;kết quả mong muốn&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Trong các video này, sản phẩm và thương hiệu vẫn được che giấu; chỉ nói về &quot;loại sản</span></div>\n<p class=\"body-txt\">\nphẩm&quot; (ví dụ: trà xanh, bột đậu nành, gậy, máy ảnh) chứ không nói tên thương hiệu cụ\n \nthể, nhằm tạo sự tò mò cho khán giả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Để khách hàng điển hình kể câu chuyện của họ về sản phẩm (case study), bao gồm trải</span></div>\n<p class=\"body-txt\">\nnghiệm trước và sau khi sử dụng sản phẩm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Câu chuyện nên kể về cách họ đi từ &quot;đau khổ đến sung sướng&quot;, từ &quot;điểm A đến điểm B&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Câu chuyện của họ nên gồm 7 bước: từ điểm hiện tại đến điểm mong muốn, vượt qua</span></div>\n<p class=\"body-txt\">\nnhững nỗi khổ, nỗi đau, rào cản, cách họ tìm thấy sản phẩm, và sản phẩm đã làm thay\n \nđổi cuộc đời họ ra sao.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Điều tuyệt vời nhất là để &quot;người thứ ba nói về sản phẩm&quot; thay vì tự quảng cáo.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Hướng dẫn thực hành: Đến thăm khách hàng, ghi một vài clip, biên tập lại, và đăng tải.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Sử dụng bộ câu hỏi được cung cấp để phỏng vấn khách hàng (có thể phỏng vấn trực tiếp</span></div>\n<p class=\"body-txt\">\nhoặc tự phỏng vấn).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Kịch bản phỏng vấn này có thể sử dụng thường xuyên, nhiều lần.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tiêu đề gợi ý cho video: &quot;Nhân vật điển hình đã tạo ra kết quả [kết quả mong muốn] như</span></div>\n<p class=\"body-txt\">\nthế nào?&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Các ví dụ minh họa: diễn giả giảm 3kg, mẹ bầu lấy lại vóc dáng sau sinh, vận động viên</span></div>\n<p class=\"body-txt\">\ngiành thắng lợi, bà mẹ bỉm sữa kiếm 10 triệu/tháng, phụ nữ văn phòng chạy Facebook\n \nkiếm 10 triệu/tháng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nhấn mạnh: Testimonial hay case study là những video cực kỳ mạnh mẽ cho marketing.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cần dành nhiều thời gian và tâm huyết cho loại video này vì chúng vô cùng quan trọng.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Sức mạnh của lời chứng thực từ bên thứ ba: (Nghe từ 2:07-2:11 và 4:13-4:16)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Khách hàng tiềm năng có xu hướng tin tưởng vào trải nghiệm thực tế</span></div>\n<p class=\"body-txt\">\ncủa người dùng khác hơn là những lời quảng cáo trực tiếp từ doanh nghiệp. Lời chứng\n \nthực từ người đã có kết quả tạo ra bằng chứng xã hội (social proof) mạnh mẽ, xây dựng\n \nlòng tin và uy tín một cách tự nhiên, chân thực, từ đó thúc đẩy quyết định mua hàng hiệu\n \nquả hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tạo sự tò mò bằng cách tập trung vào kết quả và hành trình chuyển đổi, giữ kín sản</span></div>\n<p class=\"body-txt\">\nphẩm/thương hiệu ban đầu: (Nghe từ 0:58-1:07 và 1:18-1:20)\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Thay vì giới thiệu sản phẩm ngay lập tức, cách tiếp cận này kích thích</span></div>\n<p class=\"body-txt\">\nsự tò mò của khán giả, khiến họ muốn tìm hiểu &quot;cách thức&quot; để đạt được kết quả mong\n \nmuốn. Việc tập trung vào câu chuyện từ &quot;đau khổ đến sung sướng&quot; của khách hàng tạo\n \nsự đồng cảm sâu sắc, giúp khán giả hình dung bản thân họ trong câu chuyện đó và khao\n \nkhát có được sự thay đổi tương tự, tăng giá trị nhận thức về sản phẩm khi nó được tiết\n \nlộ sau.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Áp dụng cấu trúc kể chuyện 7 bước cho case study: (Nghe từ 1:50-2:02)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Một câu chuyện có cấu trúc rõ ràng, đặc biệt là câu chuyện về hành</span></div>\n<p class=\"body-txt\">\ntrình vượt qua khó khăn để đạt được thành công, có sức lay động và truyền cảm hứng\n \nrất lớn. Nó không chỉ cung cấp thông tin mà còn tạo kết nối cảm xúc với khán giả, giúp\n \nhọ dễ dàng ghi nhớ và liên hệ với tình huống của bản thân, từ đó củng cố niềm tin vào\n \nkhả năng giải quyết vấn đề của sản phẩm.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Ai đó trong thị trường tiềm năng mà xem video của chúng ta phải mong muốn có cái sản\n \nphẩm của chúng ta.”\n \n“Để cho người thứ ba nói về sản phẩm thì đó mới là điều tuyệt vời.”\n \n“Testimonial hay là case study là những video cực mạnh cho marketing.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ngày 18: Xử lý sự từ chối</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Tóm tắt. Buổi học này tập trung vào kỹ thuật &quot;xử lý sự từ chối trong tâm trí&quot; của khách</h3>\n<p class=\"body-txt\">\nhàng, đặc biệt là liên quan đến vấn đề giá cả. Diễn giả hướng dẫn cách tạo nội dung (ví dụ:\n \nvideo) để chủ động giải quyết định kiến rằng sản phẩm &quot;đắt&quot; bằng cách so sánh với một loại\n \nsản phẩm khác có giá cao hơn, khiến sản phẩm của mình trở nên hợp lý hơn trong mắt\n \nkhách hàng. Mục tiêu là &quot;cài đặt&quot; tư duy tích cực về giá vào tâm trí khách hàng trước khi tiến\n \nhành bán hàng thật sự, đồng thời tuân thủ luật cạnh tranh bằng cách không nêu tên\n \nriêng/thương hiệu cụ thể.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nguyên nhân từ chối mua hàng: Khách hàng thường không mua hàng ngay cả khi có nhu</span></div>\n<p class=\"body-txt\">\ncầu và tiền bạc, vì họ nghĩ sản phẩm &quot;không đáng tiền&quot; hoặc quá đắt.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Kỹ thuật xử lý sự từ chối trong tâm trí: Chủ động giải quyết những định kiến về giá trong</span></div>\n<p class=\"body-txt\">\ntâm trí khách hàng *trước khi* thực sự chào bán sản phẩm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cách thức thực hiện kỹ thuật so sánh giá:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Đưa ra một sản phẩm/loại sản phẩm có giá cao hơn (hoặc được nhận định là đắt tiền).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Sau đó, giới thiệu loại sản phẩm của bạn (không nêu tên riêng hay thương hiệu cụ thể)</span></div>\n<p class=\"body-txt\">\nvà so sánh, làm cho sản phẩm của bạn trở nên rẻ hơn hoặc hợp lý hơn so với cái đã đưa\n \nra trước đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Mục tiêu là khiến khách hàng thấy rằng sản phẩm của bạn không hề đắt, mà thậm chí là</span></div>\n<p class=\"body-txt\">\nrẻ hoặc mang lại giá trị tốt hơn trong dài hạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cấu trúc tiêu đề video đề xuất: &quot;[Tên loại sản phẩm] có đắt không?&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ví dụ: &quot;Mầm đậu nành có đắt không?&quot;, &quot;Gậy leo núi có đắt không?&quot;, &quot;TV màn hình phẳng</span></div>\n<p class=\"body-txt\">\ncó đắt không?&quot;, &quot;Đi Grab có đắt không?&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Quy tắc quan trọng khi đặt tên và so sánh:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Từ khóa &quot;có đắt không&quot; phải được giữ nguyên.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chỉ nói về *loại sản phẩm*, không được đưa tên riêng (thương hiệu) của sản phẩm khác</span></div>\n<p class=\"body-txt\">\nhay sản phẩm của mình. Điều này nhằm tuân thủ luật cạnh tranh và để dành việc giới\n \nthiệu sản phẩm/thương hiệu cụ thể vào buổi sau.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Kết luận video: Phải khẳng định rằng sản phẩm của bạn không đắt (có giá trung bình, giá</span></div>\n<p class=\"body-txt\">\nrẻ, hoặc hòa vốn/tiết kiệm chi phí trong dài hạn).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ví dụ minh họa: So sánh pin mặt trời (đắt khi mua riêng lẻ nhưng rẻ hơn điện về lâu dài)</span></div>\n<p class=\"body-txt\">\nhoặc áo thun (đắt hơn loại khác nhưng bền hơn nên rẻ hơn).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chủ động xử lý định kiến về giá trước khi bán hàng: Đây là một chiến lược tâm lý mạnh</span></div>\n<p class=\"body-txt\">\nmẽ. Thay vì chờ đợi khách hàng hỏi &quot;cái này đắt không?&quot; khi bạn chào bán, bạn chủ động\n \n&quot;cài đặt&quot; vào tâm trí họ rằng sản phẩm không đắt từ trước. Điều này giúp giảm thiểu rào\n \ncản từ chối ngay từ đầu, tạo tâm lý tiếp nhận tích cực hơn cho khách hàng khi họ tiếp\n \ncận sản phẩm thực sự.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Kỹ thuật so sánh giá mang tính chiến lược, không phải trực tiếp: Bài giảng nhấn mạnh</span></div>\n<p class=\"body-txt\">\nviệc không chỉ so sánh mà là so sánh với một sản phẩm *đắt tiền hơn* (hoặc được *nhận\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><p class=\"body-txt\">\nđịnh* là đắt) để làm nổi bật sự hợp lý của sản phẩm mình. Đây là cách đánh lừa nhận\n \nthức hiệu quả, khiến giá sản phẩm của bạn trở nên hấp dẫn hơn trong mắt khách hàng,\n \nngay cả khi nó không thực sự là &quot;giá rẻ nhất&quot; trên thị trường, mà là &quot;giá hợp lý nhất&quot; khi\n \nso với một lựa chọn cao cấp khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tuân thủ luật cạnh tranh và tạo sự tò mò thông qua việc không nêu tên riêng/thương</span></div>\n<p class=\"body-txt\">\nhiệu: Việc diễn giả khuyên chỉ nói về &quot;loại sản phẩm&quot; và không đề cập tên riêng của cả\n \nđối thủ lẫn sản phẩm của mình là cực kỳ khôn ngoan. Nó không chỉ đảm bảo tính hợp\n \npháp mà còn xây dựng lòng tin (không &quot;chơi xấu&quot; đối thủ) và tạo ra sự tò mò. Khách\n \nhàng sẽ phải chờ đợi video tiếp theo để biết chính xác sản phẩm nào đang được nói đến,\n \ntừ đó tăng tỷ lệ họ quay lại và lắng nghe đề xuất của bạn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Chúng ta sẽ xử lý cái sự từ chối ở trong tâm trí của khách hàng trước khi chúng ta thực sự\n \nbán hàng vào tuần sau.”\n \n“Đừng đưa tên cái sản phẩm vì luật cạnh tranh không cho phép bạn so sánh trực tiếp hai sản\n \nphẩm kinh doanh với nhau.”\n \n“Bạn bán cái gì thì bạn nói cái đấy có đắt không?”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ngày 19: Nên làm gì nếu dùng [sản phẩm] mà không hiệu quả</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Tóm tắt. Buổi học này tập trung vào kỹ thuật xử lý sự từ chối của khách hàng khi họ không</h3>\n<p class=\"body-txt\">\ntin tưởng vào hiệu quả của sản phẩm/dịch vụ. Phương pháp cốt lõi là chủ động giả định rằng\n \nkhách hàng đã mua và sử dụng sản phẩm nhưng không có kết quả, sau đó tạo video hoặc nội\n \ndung hướng dẫn họ cách sử dụng đúng để đạt được hiệu quả mong muốn *trước khi họ thực\n \nsự mua hàng*. Mục tiêu là loại bỏ mọi nghi ngờ trong tâm trí khách hàng, vì họ mua hiệu quả\n \nchứ không phải bản thân sản phẩm.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Buổi học ngày 19 trong chương trình Video Marketing 28 ngày tập trung vào xử lý sự từ</span></div>\n<p class=\"body-txt\">\nchối trong tâm trí khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nguyên nhân chính khiến khách hàng không mua hàng hôm nay là do họ không tin</span></div>\n<p class=\"body-txt\">\ntưởng sản phẩm/dịch vụ có hiệu quả (khác với lý do &quot;giá cả&quot; của buổi hôm trước).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Kỹ thuật được sử dụng là &quot;giả định&quot;: Giả định khách hàng đã mua sản phẩm và sử dụng</span></div>\n<p class=\"body-txt\">\nnhưng không có kết quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Mục tiêu là hướng dẫn khách hàng cách sử dụng sản phẩm để đạt được kết quả mong</span></div>\n<p class=\"body-txt\">\nmuốn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Các nguyên nhân khiến khách hàng không đạt hiệu quả với sản phẩm (đặc biệt là các</span></div>\n<p class=\"body-txt\">\nkhóa học/sản phẩm hướng dẫn):\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Họ không follow đúng quy trình.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Họ lười biếng, cẩu thả, hoặc thậm chí là ngu ngốc (theo cách diễn giả nói).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Họ không đọc hướng dẫn sử dụng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Họ đọc nhưng không làm theo.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Họ làm theo nhưng không làm đủ/hết (ví dụ: chỉ xem 3-4 video trong chuỗi 28 video rồi</span></div>\n<p class=\"body-txt\">\ndừng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Giải pháp: Tạo một video hướng dẫn *trước khi khách hàng mua hàng* để xử lý những</span></div>\n<p class=\"body-txt\">\nvấn đề này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tiêu đề mẫu cho video hướng dẫn: &quot;Bạn nên làm gì nếu [tên sản phẩm/dịch vụ] không</span></div>\n<p class=\"body-txt\">\ncó hiệu quả?&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ví dụ: &quot;Bạn nên làm gì nếu kem làm trắng da không giúp bạn trắng da?&quot;, &quot;Bạn nên làm gì</span></div>\n<p class=\"body-txt\">\nnếu đôi giày không giúp bạn chạy bộ nhanh hơn?&quot;, &quot;Bạn nên làm gì nếu uống sữa tăng\n \nchiều cao mà nó không tăng chiều cao?&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nội dung video này sẽ hướng dẫn chi tiết cách sử dụng sản phẩm một cách có hiệu quả.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Lợi ích của việc làm này:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Loại bỏ tất cả những nghi ngờ của khách hàng về việc sản phẩm có hiệu quả hay không.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Lần tới khi họ mua sản phẩm, họ sẽ biết cách dùng sản phẩm trước khi mua.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Giúp sản phẩm thực sự có hiệu quả với khách hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khách hàng không mua sản phẩm, họ chỉ mua cái hiệu quả mà sản phẩm mang lại.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Việc hướng dẫn khách hàng sử dụng sản phẩm *trước khi có sản phẩm* là một chiêu</span></div>\n<p class=\"body-txt\">\nmarketing quan trọng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khuyến khích tiếp tục tạo các video tương tự để xử lý các vấn đề từ chối khác trong tâm</span></div>\n<p class=\"body-txt\">\ntrí khách hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">&quot;Khách hàng không mua sản phẩm, khách hàng chỉ mua cái hiệu quả mà sản phẩm mang</span></div>\n<p class=\"body-txt\">\nlại thôi.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là insight nền tảng cho mọi chiến lược marketing. Nó chuyển</span></div>\n<p class=\"body-txt\">\ntrọng tâm từ việc quảng bá tính năng sản phẩm sang việc truyền tải giá trị và kết quả\n \nthực sự mà sản phẩm mang lại cho khách hàng. Khi hiểu điều này, doanh nghiệp sẽ tập\n \ntrung vào việc giúp khách hàng đạt được mục tiêu của họ, thay vì chỉ đơn thuần bán một\n \nmón hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chủ động xử lý sự từ chối bằng cách hướng dẫn sử dụng *trước khi bán*.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Thay vì phản ứng khi khách hàng đã gặp vấn đề,
