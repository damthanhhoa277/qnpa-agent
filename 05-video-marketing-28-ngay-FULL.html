"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#0097a7\">Bài 10: Bố cục ánh sáng khi quay video</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Giới thiệu hệ thống ánh sáng hiện tại (camera đắt tiền, đèn Kino chuyên nghiệp) nhưng</span></div>\n<p class=\"body-txt\">\nkhông khuyến khích đầu tư lớn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khẳng định có thể tạo hiệu ứng ánh sáng tốt với camera giá rẻ (khoảng 1.5 triệu VND) và</span></div>\n<p class=\"body-txt\">\nthiết bị đơn giản.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Trình bày chi tiết về các loại đèn sử dụng: đèn ruột gà (bên trái), đèn Kino (bên phải),</span></div>\n<p class=\"body-txt\">\nđèn LED tròn (trước mặt).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Đèn LED tròn có thể gắn nhiều điện thoại để livestream đồng thời trên nhiều nền tảng</span></div>\n<p class=\"body-txt\">\nmà không cần phần mềm như StreamYard.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nguyên lý ánh sáng cơ bản: Ánh sáng luôn phải nằm ở phía trước mặt, cùng hướng hoặc</span></div>\n<p class=\"body-txt\">\nchếch hướng với camera.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Minh họa hiệu ứng ánh sáng trên khuôn mặt khi điều chỉnh từng nguồn sáng (tắt/bật,</span></div>\n<p class=\"body-txt\">\ngiảm cường độ, chỉnh màu sắc của đèn LED).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ánh sáng cường độ thấp sẽ không gây hại mắt (yếu hơn ánh sáng trời mây).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cách tạo ánh sáng chuyên nghiệp với 3 nguồn đèn: Đèn mặt, đèn bên và đèn sau lưng</span></div>\n<p class=\"body-txt\">\n(đèn viền – rim light) chiếu từ trên xuống vai để tạo độ nổi, tách chủ thể khỏi nền.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Mẹo cho điện thoại: Khi livestream bằng điện thoại, chạm vào màn hình ở khuôn mặt để</span></div>\n<p class=\"body-txt\">\nđiện thoại tự động đo sáng, giúp ánh sáng trên mặt đều và đẹp, tránh bị cháy sáng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nguyên tắc góc quay camera: Luôn nâng camera lên ngang tầm mắt để có góc quay đẹp</span></div>\n<p class=\"body-txt\">\nnhất, tránh góc thấp làm lộ cằm hoặc tạo hình ảnh không chuyên nghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cách nâng camera ngang tầm mắt: dùng tripod, đặt trên màn hình, hoặc kê laptop/ghế</span></div>\n<p class=\"body-txt\">\nbằng sách vở.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Phân tích ví dụ từ video phỏng vấn để minh họa &quot;ánh sáng một bên&quot; và cách tận dụng</span></div>\n<p class=\"body-txt\">\nnguồn sáng có sẵn trong phòng (ví dụ: đèn hắt tường) để tạo bối cảnh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Học cách quan sát bóng đổ để xác định hướng nguồn sáng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khác biệt giữa ánh sáng chính và ánh sáng phụ (fill light): Đèn chính mạnh, đặt gần. Đèn</span></div>\n<p class=\"body-txt\">\nphụ yếu, đặt xa để làm đều ánh sáng trên mặt.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nguyên tắc chiếu sáng chủ thể, không chiếu sáng nền: Để chủ thể nổi bật, chỉ chiếu sáng</span></div>\n<p class=\"body-txt\">\nvào chủ thể chính, đặc biệt khi phông nền lộn xộn. Tránh dùng đèn tuýp chiếu sáng toàn\n \nbộ phòng. Nên dùng ánh sáng downlight (từ trên xuống) để tập trung vào khuôn mặt.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nguyên lý &quot;Ánh sáng luôn nằm trước mặt, cùng hướng hoặc chếch hướng với camera&quot;:</span></div>\n<p class=\"body-txt\">\nĐây là yếu tố nền tảng quyết định chất lượng hình ảnh. Bằng cách tuân thủ nguyên tắc\n \nnày, ngay cả với thiết bị đơn giản, bạn vẫn có thể đảm bảo khuôn mặt sáng rõ, có chiều\n \nsâu, tạo ấn tượng chuyên nghiệp và giúp người xem tập trung vào thông điệp. Nó giải\n \nquyết lỗi cơ bản nhất là bị ngược sáng hay tối mặt.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Sử dụng đèn viền (rim light) để làm nổi bật chủ thể: Một đèn nhỏ chiếu từ phía sau vai</span></div>\n<p class=\"body-txt\">\n(có thể là đèn nhà bình thường) có khả năng kỳ diệu trong việc tạo ra đường viền sáng,\n \ngiúp chủ thể &quot;nổi hẳn lên&quot; khỏi phông nền. Điều này tạo chiều sâu cho hình ảnh, mang lại\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><p class=\"body-txt\">\ncảm giác chuyên nghiệp và sống động hơn rất nhiều so với việc chỉ dùng đèn chiếu từ\n \nphía trước.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Góc quay camera ngang tầm mắt: Đây là chi tiết nhỏ nhưng ảnh hưởng lớn đến thẩm mỹ</span></div>\n<p class=\"body-txt\">\nvà sự tự tin của người xuất hiện trong khung hình. Việc đặt camera thấp dưới tầm mắt\n \nsẽ tạo ra góc nhìn không đẹp (ví dụ: lộ cằm, mặt to), trong khi camera ngang tầm mắt\n \ngiúp khuôn mặt trông cân đối, tự nhiên và chuyên nghiệp hơn, tạo cảm giác giao tiếp\n \ntrực diện.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tập trung chiếu sáng chủ thể, bỏ qua phông nền lộn xộn: Khi phông nền không đẹp hoặc</span></div>\n<p class=\"body-txt\">\ngây phân tâm, việc chỉ chiếu sáng vào người nói sẽ giúp làm nổi bật chủ thể chính. Điều\n \nnày không chỉ giúp hình ảnh trông chuyên nghiệp hơn mà còn hướng sự chú ý của khán\n \ngiả hoàn toàn vào bạn và nội dung bạn chia sẻ, giống như các kênh truyền hình chuyên\n \nnghiệp.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Ánh sáng luôn nằm ở trước mặt. Cái nguyên lý của nó là ánh sáng luôn nằm trước mặt, và\n \nánh sáng phải cùng hướng hoặc là chếch hướng với camera.”\n \n“Khi làm livestream ấy, mình muốn nó ánh sáng nó đều nó đẹp, lấy tay mình chạm vào mặt.”\n \n“Cái camera nó phải ngang tầm mắt của mình.”\n \n“Nên là nó sẽ không dùng cái ánh sáng thông thường các anh chị là đèn tuýp ạ. Các anh chị\n \nđang dùng đèn tuýp thì khi mà chiếu sáng ấy thì nó sáng cả cái tường, cho nên là cái nhân vật\n \ncủa anh chị nó không nổi lên.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Bài 11: Bố cục hình ảnh khi quay video</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Tóm tắt. Buổi học tập trung vào nguyên lý bố cục 1/3 (Rule of Thirds) trong nhiếp ảnh và</h3>\n<p class=\"body-txt\">\nquay video, livestream để tạo ra những hình ảnh có tính thẩm mỹ và hiệu quả thị giác cao.\n \nDiễn giả nhấn mạnh việc đặt mắt hoặc chủ thể chính vào các đường hoặc giao điểm 1/3 để\n \nthu hút sự chú ý và cân bằng khung hình. Ngoài ra, nguyên lý còn được mở rộng với việc tạo\n \nkhoảng không gian hợp lý dựa trên hướng nhìn của chủ thể và cách sử dụng ánh sáng để\n \ntăng tính nổi bật.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Giới thiệu về Bố cục 1/3: Đây là bài học thứ hai, tập trung vào nguyên lý bố cục.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Kích hoạt Đường 1/3: Hướng dẫn cách bật chế độ hiển thị đường kẻ 1/3 trên điện thoại,</span></div>\n<p class=\"body-txt\">\nmáy ảnh hoặc màn hình. Nếu không có, có thể dùng băng dính trong để kẻ thủ công.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nguyên tắc cơ bản: Mắt của chủ thể (hoặc điểm nhấn chính của chủ thể) phải nằm trên</span></div>\n<p class=\"body-txt\">\ncác đường hoặc giao điểm 1/3 của khung hình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khoảng không gian phía trước hướng nhìn: Phần không gian phía trước mặt (hướng</span></div>\n<p class=\"body-txt\">\nnhìn) của chủ thể phải rộng hơn phần không gian phía sau đầu. Điều này tạo cảm giác tự\n \nnhiên và có hướng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ứng dụng cho nhiều chủ thể:</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Với một người hoặc vật thể chính (ví dụ: cái cây, cô gái), đặt chủ thể vào đường 1/3.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Với hai người đang đối thoại, mỗi người sẽ được đặt ở một bên đường 1/3, và phần</span></div>\n<p class=\"body-txt\">\nkhông gian phía trước mặt của họ sẽ rộng hơn, tạo cảm giác họ đang hướng về nhau.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Hiệu ứng thị giác theo vị trí chủ thể:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">&quot;Tàu về&quot; / &quot;Tiến về phía chúng ta&quot;: Khi chủ thể (ví dụ: con tàu, một người) được đặt ở</span></div>\n<p class=\"body-txt\">\nđường 1/3 phía gần, tạo cảm giác chủ thể đang tiến lại gần người xem hoặc hướng về\n \nphía trước, phần không gian phía trước chủ thể là 2/3.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">&quot;Xa khơi&quot; / &quot;Đi ra xa&quot;: Khi chủ thể được đặt ở đường 1/3 phía xa, tạo cảm giác chủ thể</span></div>\n<p class=\"body-txt\">\nđang di chuyển ra xa hoặc chờ đợi, phần không gian phía sau chủ thể là 2/3.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bố trí thiết bị (nhiều chủ thể): Khi quay nhiều người (ví dụ: phỏng vấn hai người), cần ít</span></div>\n<p class=\"body-txt\">\nnhất 3 máy quay (một cho người bên trái, một cho người bên phải, một cho cả hai) và ít\n \nnhất 3 đèn (một chiếu sáng chung, một cho người trái, một cho người phải).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ánh sáng: Sử dụng ánh sáng để tạo hiệu ứng &quot;tối một bên, sáng một bên&quot; hoặc &quot;ánh sáng</span></div>\n<p class=\"body-txt\">\nven&quot; (venlight) để làm nổi bật chủ thể và tạo chiều sâu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bài tập thực hành: Chụp một bức ảnh (mặt bạn đang cười) đảm bảo ánh sáng một bên</span></div>\n<p class=\"body-txt\">\ntối, một bên sáng; mắt nằm ở đường 1/3; và phía sau là hình mờ hoặc tối.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nguyên lý và Phá vỡ: Trước khi muốn phá vỡ các nguyên lý (để sáng tạo), cần phải nắm</span></div>\n<p class=\"body-txt\">\nvững các nguyên lý đó.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nguyên lý bố cục 1/3 là nền tảng vàng trong thị giác: Việc đặt mắt hoặc chủ thể chính</span></div>\n<p class=\"body-txt\">\nvào các đường/giao điểm 1/3 không chỉ làm bức ảnh/video cân bằng, dễ nhìn mà còn\n \ntạo điểm nhấn tự nhiên, thu hút sự chú ý của người xem một cách vô thức. Đây là một\n \nquy tắc phổ quát, dễ áp dụng và mang lại hiệu quả rõ rệt ngay lập tức.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Sử dụng &quot;khoảng không&quot; để kể chuyện: Việc điều chỉnh khoảng trống phía trước hướng</span></div>\n<p class=\"body-txt\">\nnhìn của chủ thể theo tỷ lệ 2/3 (phía trước) và 1/3 (phía sau) là một cách tinh tế để\n \ntruyền tải cảm xúc, định hướng sự chú ý hoặc gợi ý về hành động, chuyển động. Điều này\n \nbiến một hình ảnh tĩnh thành một hình ảnh có câu chuyện và mục đích rõ ràng hơn, thay\n \nvì chỉ là một vật thể đơn thuần.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Học nguyên lý để phá vỡ nguyên lý: Đây là một triết lý quan trọng cho mọi người làm</span></div>\n<p class=\"body-txt\">\nsáng tạo. Khi bạn hiểu sâu sắc các quy tắc cơ bản (như bố cục 1/3), bạn mới có thể đưa\n \nra những quyết định phá cách một cách có chủ đích và hiệu quả, tạo ra những tác phẩm\n \nđộc đáo mà vẫn giữ được tính thẩm mỹ, thay vì chỉ là phá vỡ một cách ngẫu nhiên.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Cứ nhớ giùm tôi cái điều này là được. Thì mọi thứ nếu các anh chị muốn thì các anh chị đưa\n \nnó vào đường 1/3.”\n \n“Nguyên lý của trò chơi là đưa cái chủ thể chính vào đây.”\n \n“Có nhiều nguyên lý. Nếu bạn muốn phá vỡ các nguyên lý thì phải nắm vững các nguyên lý để\n \nrồi bạn sẽ phá vỡ các nguyên lý.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><p class=\"body-txt\">\n28 Ngày — Công thức tiêu đề video\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ngày 1: Đứng trên vai người khổng lồ</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Tóm tắt. Buổi học giới thiệu chương trình huấn luyện 28 ngày chuyên sâu về video</h3>\n<p class=\"body-txt\">\nmarketing, với mục tiêu giúp học viên tạo ra 28 video và xây dựng thói quen làm nội dung\n \nmỗi ngày. Diễn giả nhấn mạnh nguyên tắc &quot;hoàn thành quan trọng hơn hoàn hảo&quot; và giới\n \nthiệu cấu trúc 4 giai đoạn của chương trình. Đặc biệt, chiến lược cốt lõi cho video ngày đầu\n \ntiên là &quot;đứng trên vai người khổng lồ&quot; – tận dụng tên tuổi người nổi tiếng để xây dựng uy tín\n \nvà thu hút sự chú ý khi bản thân hoặc sản phẩm chưa được biết đến, đồng thời cung cấp cấu\n \ntrúc tiêu đề và các ví dụ cụ thể để thực hành.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Giới thiệu &quot;chương trình huấn luyện 28 ngày&quot; để tạo ra 28 video marketing.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Thử thách yêu cầu quay và đăng tải 1 video mỗi ngày, không bỏ qua bất kỳ ngày nào, dù</span></div>\n<p class=\"body-txt\">\nlà cuối tuần hay điều kiện thời tiết.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Video sau khi quay cần được cập nhật lên mạng xã hội (Facebook, YouTube, hoặc bất kỳ</span></div>\n<p class=\"body-txt\">\nmạng nào) và chia sẻ link vào nhóm học tập để nhận phản hồi và góp ý.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nguyên tắc &quot;Vạn sự khởi đầu nan&quot; – ngày đầu tiên là khó khăn nhất, nhưng hành trình</span></div>\n<p class=\"body-txt\">\nvạn dặm bắt đầu từ bước đi đầu tiên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Triết lý cốt lõi: &quot;Hoàn hảo chính là kẻ thù của thành công&quot;, do đó cần tập trung vào &quot;hoàn</span></div>\n<p class=\"body-txt\">\nthành quan trọng hơn hoàn hảo&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chương trình 28 ngày được chia thành 4 giai đoạn (mỗi giai đoạn khoảng 7 ngày):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Giai đoạn 1: Giúp thị trường nhận biết bạn là ai và sản phẩm của bạn là gì.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Giai đoạn 2: Hướng dẫn cách dùng, cách ứng dụng sản phẩm để khách hàng đạt kết quả.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Giai đoạn 3: Phân tích, hướng dẫn sử dụng chi tiết, hoặc bắt đầu bán những sản phẩm</span></div>\n<p class=\"body-txt\">\nđầu tiên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Giai đoạn 4: Lấy ý kiến và phản hồi từ khách hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Mục đích của 28 ngày là thiết lập được một thói quen làm video mỗi ngày.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Về việc sản xuất video: không cần cầu kỳ, chỉ cần đơn giản (ví dụ: quay trong văn phòng,</span></div>\n<p class=\"body-txt\">\ndùng máy quay hoặc điện thoại).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Yêu cầu kỹ thuật quan trọng nhất: âm thanh phải rõ ràng và nền đằng sau không được</span></div>\n<p class=\"body-txt\">\nrối.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khuyến khích sử dụng điện thoại di động để quay video vì dễ dùng và dễ biên tập.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">28 video trong chương trình là 28 chiến lược cụ thể, không phải là video ngẫu nhiên.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Yêu cầu cho video ngày đầu tiên: dài từ 5 đến 10 phút, không cần hoàn hảo, chỉ cần hoàn</span></div>\n<p class=\"body-txt\">\nthành.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nhắc lại kịch bản 6 bước từ video chuẩn bị, trong đó 15 giây đầu tiên là quan trọng nhất.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cấu trúc của 15 giây đầu video:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">1. Tiêu đề (nêu lợi ích khách hàng nhận được).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">2. Bằng chứng chứng minh hoặc giới thiệu bạn là ai (cho thấy họ có thể đạt được điều</span></div>\n<p class=\"body-txt\">\nbạn đang nói).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">3. Nói lại tiêu đề một lần nữa.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Sau 15 giây đầu là phần nội dung chính của video, kết thúc bằng kêu gọi hành động (call</span></div>\n<p class=\"body-txt\">\nto action).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Sử dụng mẫu kịch bản 6 ô (có thể tải về) để chuẩn bị cho các video.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chiến lược quan trọng cho video ngày đầu tiên là &quot;đứng trên vai người khổng lồ&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Lý do sử dụng chiến lược này: khi cá nhân/thương hiệu chưa nổi tiếng, khách hàng dễ</span></div>\n<p class=\"body-txt\">\ntin người nổi tiếng hơn, giúp video được chấp nhận và dần xây dựng hình ảnh bản thân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cấu trúc tiêu đề cụ thể cho ngày hôm nay: &quot;Tôi đã có được [thành tựu nào đó] bằng việc</span></div>\n<p class=\"body-txt\">\náp dụng [số N nào đó] bí quyết của [người nổi tiếng nào đó].&quot; (Kèm theo các ví dụ minh\n \nhọa như &quot;kiếm thêm 10 triệu đồng từ internet bằng 3 chiến lược marketing&quot;, &quot;gia đình\n \nhạnh phúc trở lại bằng 3 điều răn của Phật&quot;, v.v.).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ứng dụng chiến lược tiêu đề này cho chuỗi ngành kinh doanh của bạn, sử dụng người</span></div>\n<p class=\"body-txt\">\nnổi tiếng (từ sách, báo, hoặc bất kỳ nguồn nào) để thu thập ý tưởng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cần hoàn thành video của ngày hôm nay để có thể xem tiếp video của ngày mai.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">&quot;Hoàn thành quan trọng hơn hoàn hảo&quot;: Đây là một triết lý cực kỳ giải phóng, đặc biệt</span></div>\n<p class=\"body-txt\">\ncho những người mới bắt đầu làm nội dung. Nỗi sợ không hoàn hảo thường là rào cản\n \nlớn nhất khiến nhiều người không dám bắt đầu hoặc bỏ cuộc giữa chừng. Tập trung vào\n \nviệc hoàn thành giúp xây dựng thói quen, tạo ra sản phẩm ban đầu và từ đó có thể cải\n \nthiện dần. Nó khuyến khích hành động hơn là trì hoãn vì sự cầu toàn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chiến lược &quot;Đứng trên vai người khổng lồ&quot;: Đây là một chiến lược marketing thông minh</span></div>\n<p class=\"body-txt\">\nvà thực tế để nhanh chóng xây dựng uy tín và thu hút sự chú ý khi cá nhân hoặc thương\n \nhiệu còn mới mẻ. Bằng cách liên kết nội dung của mình với một nhân vật, thương hiệu,\n \nhoặc phương pháp đã được công chúng biết đến và tin tưởng, bạn có thể &quot;mượn&quot; sự nổi\n \ntiếng đó để tạo dựng niềm tin ban đầu, giúp video của mình dễ dàng tiếp cận và được\n \nchấp nhận hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Thiết lập thói quen làm video hàng ngày trong 28 ngày: Chương trình không chỉ là lý</span></div>\n<p class=\"body-txt\">\nthuyết mà còn là một thử thách hành động. Việc cam kết làm video mỗi ngày trong 28\n \nngày giúp người học vượt qua nỗi sợ hãi, phát triển kỹ năng nói trước ống kính, biên tập\n \nvà tư duy nội dung một cách bền vững. Sau 28 ngày, việc làm video sẽ trở thành một thói\n \nquen tự nhiên, cung cấp nguồn nội dung đều đặn cho chiến lược marketing.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Hoàn thành quan trọng hơn hoàn hảo.”\n \n“Hoàn hảo chính là kẻ thù của thành công.”\n \n“Mỗi ngày một video và tôi thách thức bạn làm cái điều này.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ngày 2: Đứng trên vai người khổng lồ (2)</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Tóm tắt. Buổi giảng ngày thứ hai của khoá học tập trung vào việc nâng cao chất lượng video</h3>\n<p class=\"body-txt\">\nmarketing thông qua tối ưu hóa kỹ thuật ghi hình và nội dung. Diễn giả nhấn mạnh tầm quan\n \ntrọng của việc đầu tư vào micro, đảm bảo phông nền gọn gàng và luyện tập nói nhanh, rõ\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><p class=\"body-txt\">\nràng để thu hút khán giả. Đặc biệt, chiến lược &quot;đứng trên vai người khổng lồ&quot; từ ngày đầu\n \nđược phát triển thêm bằng cách lồng ghép thành quả cá nhân, tạo nên 15 giây đầu video\n \nmang tính thuyết phục cao và quyết định thành công.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nhắc lại bài tập ngày 1: Sử dụng tên của một người nổi tiếng trong ngành ở tiêu đề video</span></div>\n<p class=\"body-txt\">\nđể thu hút &quot;thị trường lạnh&quot; (những người chưa biết bạn hoặc sản phẩm của bạn). Chiến\n \nlược này giúp tạo uy tín và kéo khán giả của người nổi tiếng về kênh của bạn, gọi là\n \n&quot;đứng trên vai người khổng lồ&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cải thiện chất lượng âm thanh:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Âm thanh là một phần rất quan trọng trong video marketing.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nên đầu tư một chiếc micro cài áo (Lavadier Micro) để gắn lên cổ áo, kéo dài dây trực</span></div>\n<p class=\"body-txt\">\ntiếp vào điện thoại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Giá micro có thể từ 300.000, 500.000, 1 triệu, 2 triệu đồng hoặc hơn tùy loại.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Micro này giúp âm thanh thu được rõ ràng và tốt hơn rất nhiều.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cải thiện chất lượng hình ảnh (phông nền):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Kỹ thuật &quot;dìm sáng&quot; giúp khuôn mặt sáng lên và nền tối đi (không cần biết chi tiết kỹ</span></div>\n<p class=\"body-txt\">\nthuật).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nguyên tắc quan trọng: Phông nền phía sau người nói KHÔNG được rối.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Có thể sử dụng phông xanh, trắng, đen chuyên dụng hoặc đơn giản là dựa lưng vào</span></div>\n<p class=\"body-txt\">\ntường, đứng trong nhà quay ra ngoài sân nếu sân tối.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tốc độ nói:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khán giả xem video marketing thường không có nhiều thời gian.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Vì vậy, cần nói nhanh hơn so với tốc độ nói chuyện bình thường để truyền tải được</span></div>\n<p class=\"body-txt\">\nnhiều thông tin hơn trong thời gian ngắn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cấu trúc kịch bản video (6 ô):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">15 giây đầu tiên là quan trọng nhất và quyết định thành công của video.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">5 giây đầu: Giới thiệu nội dung chính/tiêu đề video và những lợi ích mà khách hàng sẽ</span></div>\n<p class=\"body-txt\">\nnhận được.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">5 giây tiếp theo: Giới thiệu bạn là ai và những thành tựu/kết quả bạn đã đạt được nhờ</span></div>\n<p class=\"body-txt\">\nứng dụng điều này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">5 giây cuối: Nhắc lại những lợi ích đã đề cập trong video (có thể trùng với 5 giây đầu).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Hai phần tiếp theo (có thể kéo dài 15-30 giây):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nêu bật &quot;những nỗi khổ, nỗi đau nào&quot; mà người xem sẽ gặp phải nếu không biết/áp</span></div>\n<p class=\"body-txt\">\ndụng điều trong video.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nêu bật &quot;những điều sung sướng nào&quot; mà người xem sẽ đạt được nếu biết/áp dụng điều</span></div>\n<p class=\"body-txt\">\ntrong video.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Phần thứ năm: Nội dung chính của video.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Phần cuối cùng: Kêu gọi hành động.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chiến lược &quot;Đứng trên vai người khổng lồ&quot; (phát triển):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tiếp tục sử dụng tên người nổi tiếng, nhưng lần này lồng ghép thêm bản thân và thành</span></div>\n<p class=\"body-txt\">\nquả cá nhân.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Công thức: &quot;Tôi đã đạt được [kết quả cụ thể] nhờ [số lượng/phương pháp] của [người</span></div>\n<p class=\"body-txt\">\nnổi tiếng].&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ví dụ: &quot;Tôi đã có bụng 6 múi nhờ 3 bài tập của Arno Saner.&quot; hoặc &quot;Tôi đã kiếm thêm</span></div>\n<p class=\"body-txt\">\nđược 10 triệu đồng mỗi tháng bằng việc áp dụng 3 chiến lược marketing online.&quot;\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">&quot;15 giây đầu tiên trong bất kỳ cái video nào là quan trọng nhất.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là khoảng thời gian vàng để thu hút và giữ chân khán giả. Trong</span></div>\n<p class=\"body-txt\">\nmôi trường nội dung số bão hòa, người xem có xu hướng lướt rất nhanh. Việc cô đọng\n \nthông điệp, nêu bật lợi ích và giá trị của người nói trong 15 giây đầu tiên sẽ quyết định\n \nliệu họ có xem tiếp hay rời đi. Diễn giả nhấn mạnh việc dành nhiều thời gian nhất để\n \nchăm chút cho phần này là chìa khóa để video đạt được mục tiêu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chiến lược &quot;Đứng trên vai người khổng lồ&quot; có thêm &quot;tôi&quot; (kết quả cá nhân).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Nếu ngày 1 chỉ là mượn danh tiếng để thu hút, thì ngày 2 là bước tiến</span></div>\n<p class=\"body-txt\">\nquan trọng hơn: thể hiện bản thân bạn cũng đã áp dụng thành công. Điều này không chỉ\n \ntận dụng uy tín của người nổi tiếng mà còn cung cấp bằng chứng thực tế, tăng tính xác\n \nthực và thuyết phục cho thông điệp của bạn. Nó chuyển từ việc chỉ &quot;giới thiệu&quot; sang\n \n&quot;chứng minh qua trải nghiệm&quot;, giúp khán giả tin tưởng hơn vào giá trị mà bạn mang lại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chất lượng âm thanh và phông nền gọn gàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Dù là yếu tố kỹ thuật, chúng lại là nền tảng cơ bản của một video</span></div>\n<p class=\"body-txt\">\nchuyên nghiệp. Âm thanh kém chất lượng làm người xem khó chịu, mất tập trung và khó\n \nhiểu nội dung. Phông nền lộn xộn sẽ làm phân tán sự chú ý, khiến người xem cảm thấy\n \nthiếu chuyên nghiệp. Việc đầu tư vào micro và đảm bảo phông nền đơn giản, sạch sẽ cho\n \nthấy sự chỉn chu, tôn trọng khán giả và giúp họ tập trung hoàn toàn vào thông điệp\n \nchính.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“15 giây đầu tiên trong bất kỳ cái video nào là quan trọng nhất.”\n \n“Trong video marketing thì âm thanh là một phần rất là quan trọng.”\n \n“Phía đằng sau là không được rối.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ngày 3: [Người nổi tiếng] tiết lộ [n] cách đạt thành tựu</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Tóm tắt. Buổi học này tập trung vào các kỹ thuật quay và sản xuất video marketing hiệu</h3>\n<p class=\"body-txt\">\nquả. Cốt lõi là áp dụng nguyên tắc 1/3 trong bố cục khung hình để tạo ra video đẹp và cân\n \nđối, đồng thời sử dụng chân máy để ổn định hình ảnh. Ngoài ra, buổi giảng còn nhấn mạnh\n \ntầm quan trọng của việc xây dựng các tiêu đề hấp dẫn theo công thức &quot;người nổi tiếng tiết lộ\n \nbí quyết&quot; nhằm thu hút người xem. Mục tiêu chung là nâng cao chất lượng và hiệu quả của\n \ncác video marketing.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khởi động: Thực hiện các động tác khởi động (hát, reo hò) trước khi quay video để làm</span></div>\n<p class=\"body-txt\">\nnóng cơ thể, tạo sự hưng phấn và giúp nói nhanh, sung hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tiêu đề mang tính chiến lược: Các tiêu đề được cung cấp trong khóa học đều là những</span></div>\n<p class=\"body-txt\">\nkịch bản chiến lược để phát triển kênh hoặc chuỗi video.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Quay khung hình ngang (Landscape): Luôn quay video theo khung hình ngang (điện</span></div>\n<p class=\"body-txt\">\nthoại đặt ngang), không quay dọc, để đảm bảo tính thẩm mỹ và chuyên nghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Sử dụng đường 1/3 (Gridline/Rule of Thirds): Bật đường kẻ 1/3 (gridline) trên điện</span></div>\n<p class=\"body-txt\">\nthoại hoặc thiết bị quay để định hình bố cục.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Điểm mạnh (Strong Points): Các đường 1/3 và các điểm giao nhau của chúng (điểm 1/3)</span></div>\n<p class=\"body-txt\">\nđược gọi là &quot;điểm mạnh&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bố cục 1/3 cho chủ thể: Đặt chủ thể của video (ví dụ: đôi mắt, phần đầu, hoặc toàn thân)</span></div>\n<p class=\"body-txt\">\nnằm ở các điểm 1/3 hoặc dọc theo các đường 1/3 để khung hình cân đối, hài hòa và đẹp\n \nmắt.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khoảng không gian: Khi chủ thể nói, nên để khoảng không gian phía trước mặt rộng hơn</span></div>\n<p class=\"body-txt\">\nvà phía sau lưng hẹp hơn để tạo tầm nhìn và chiều sâu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Sử dụng chân máy (Tripod): Trang bị chân máy để cố định thiết bị quay, tránh rung lắc,</span></div>\n<p class=\"body-txt\">\ntừ đó nâng cao chất lượng hình ảnh của video. Chân máy nên linh hoạt, có thể kéo dài,\n \nthu gọn dễ dàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chiến lược Tiêu đề &quot;Người nổi tiếng tiết lộ&quot;: Sử dụng công thức tiêu đề dạng &quot;Người nổi</span></div>\n<p class=\"body-txt\">\ntiếng [Tên] đã tiết lộ [N] cách/bí quyết [để đạt được thành tựu X] một cách dễ dàng&quot; để\n \ntạo sự tò mò và thu hút người xem.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tóm tắt 3 điều quan trọng trong ngày:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tự tin trước ống kính.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Đặt chủ thể vào điểm 1/3.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Có chân máy cố định.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Dùng đúng tiêu đề theo cấu trúc đã hướng dẫn.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bố cục Rule of Thirds (1/3) là yếu tố then chốt để có video đẹp và chuyên nghiệp: Diễn</span></div>\n<p class=\"body-txt\">\ngiả nhấn mạnh việc đặt mắt, đầu hoặc cơ thể vào các &quot;điểm mạnh&quot; (điểm giao nhau của\n \ncác đường 1/3) giúp video cân đối, hài hòa và thu hút hơn. Điều này quan trọng vì nó\n \ncung cấp một công cụ thực hành đơn giản nhưng cực kỳ hiệu quả để người mới bắt đầu\n \ncũng có thể tạo ra video có tính thẩm mỹ cao, không cần kiến thức chuyên sâu về quay\n \nphim, giúp video trở nên hấp dẫn hơn với người xem.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ổn định hình ảnh bằng chân máy là bắt buộc để nâng cao chất lượng video: Video bị</span></div>\n<p class=\"body-txt\">\nrung lắc dù chỉ một chút cũng làm giảm đáng kể tính chuyên nghiệp và trải nghiệm xem\n \ncủa khán giả. Việc đầu tư một chiếc chân máy đơn giản là một bước đi nhỏ nhưng mang\n \nlại hiệu quả lớn trong việc cải thiện chất lượng kỹ thuật của video, giúp người xem tập\n \ntrung vào nội dung thay vì bị phân tâm bởi hình ảnh kém, từ đó tăng độ tin cậy của\n \nthông điệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chiến lược tiêu đề &quot;Người nổi tiếng tiết lộ&quot; có khả năng thu hút mạnh mẽ sự chú ý: Đây</span></div>\n<p class=\"body-txt\">\nlà một công thức cụ thể và đã được chứng minh để tạo ra những tiêu đề hấp dẫn, kích\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><p class=\"body-txt\">\nthích sự tò mò. Việc sử dụng uy tín của &quot;người nổi tiếng&quot; (dù là chuyên gia hay người có\n \nthẩm quyền trong lĩnh vực) kết hợp với &quot;bí quyết&quot; hoặc &quot;cách dễ dàng&quot; đánh trúng tâm\n \nlý tìm kiếm giải pháp nhanh chóng và đáng tin cậy của khán giả, từ đó tăng tỷ lệ nhấp\n \nchuột và lượt xem cho video.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Tất cả những cái tiêu đề mà tôi đưa cho anh chị em đều là những tiêu đề mang tính chiến\n \nlược và chúng ta làm đúng những cái tiêu đề đấy bởi vì đấy là một kịch bản để chúng ta có thể\n \nphát triển được cái kênh của chúng ta lên hoặc phát triển được cái chuỗi video để bán sản\n \nphẩm của chúng ta.”\n \n“Nếu bạn đưa mình vào 1/3 thì ảnh của bạn sẽ đẹp hơn rất là nhiều.”\n \n“Hãy nhớ, tất cả những tiêu đề này phải làm đúng cấu trúc thì mới đem lại hiệu quả cho bạn.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ngày 4: Bạn có muốn [điều gì đó] mà thị trường tìm kiếm</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Tóm tắt. Buổi thứ tư của thử thách 28 ngày video marketing tập trung vào việc tạo video</h3>\n<p class=\"body-txt\">\nmang lại &quot;sự thay đổi&quot; (transformation) cho người xem, thay vì chỉ cung cấp &quot;thông tin&quot; đơn\n \nthuần. Diễn giả hướng dẫn các kỹ thuật quay phim cơ bản như chọn góc máy ngang hàng\n \nmắt để tạo sự gần gũi và các cách di chuyển máy linh hoạt để tăng tính năng động. Nội dung\n \nvideo cần tập trung vào giải quyết vấn đề và nhu cầu của khách hàng tiềm năng, sử dụng cấu\n \ntrúc tiêu đề &quot;Liệu bạn có muốn...&quot; để thu hút đúng đối tượng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Video marketing không chỉ là cung cấp thông tin (information) mà phải mang lại sự thay</span></div>\n<p class=\"body-txt\">\nđổi (transformation) có ý nghĩa cho khán giả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">3 video trước đã giúp người xem nhận biết nhu cầu của họ và giúp kênh có thêm nhiều</span></div>\n<p class=\"body-txt\">\ngóc nhìn mới.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Kỹ thuật quay phim:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Góc máy:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Góc máy thấp (đặt máy trên bàn, người quay đứng cao nhìn xuống) làm người quay có</span></div>\n<p class=\"body-txt\">\nvẻ khổng lồ, nhưng tạo cảm giác xa cách với khán giả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Góc máy cao (đặt máy cao hơn người quay, người quay nhìn lên) làm người quay cảm</span></div>\n<p class=\"body-txt\">\nthấy nhỏ bé, tự ti, mất năng lượng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Góc máy ngang hàng với khuôn mặt/mắt (như truyền hình) là quan trọng nhất, tạo sự</span></div>\n<p class=\"body-txt\">\ngần gũi, thân tình. Nên giữ góc máy này trừ khi có chủ đích.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Di chuyển máy:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bạn đứng yên, máy di chuyển xung quanh: Bối cảnh thay đổi, tạo góc nhìn liên tục thay</span></div>\n<p class=\"body-txt\">\nđổi, nhưng khuôn mặt vẫn tươi vui và mỉm cười trước ống kính.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tịnh tiến (di chuyển tiến/lùi): Di chuyển về phía trước hoặc phía sau đồng thời với máy,</span></div>\n<p class=\"body-txt\">\nlàm khung cảnh đằng sau thay đổi, tạo sự năng động cho khung hình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Di chuyển ngang: Di chuyển sang ngang đồng thời với máy để giới thiệu bối cảnh.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Các kỹ thuật di chuyển máy có thể thực hiện bằng điện thoại (do hầu hết điện thoại hiện</span></div>\n<p class=\"body-txt\">\nđại đều có chống rung), hoặc sử dụng thiết bị chuyên dụng như gimbal.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nội dung video:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Mục tiêu của video là kinh doanh và thu hút *khách hàng tiềm năng*, không phải giải trí</span></div>\n<p class=\"body-txt\">\nhay thu hút tất cả mọi người (không thu hút rác).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Video phải nói về *vấn đề* mà khách hàng tiềm năng đang gặp phải và *nhu cầu* họ</span></div>\n<p class=\"body-txt\">\nmong muốn được giải quyết (liên hệ với ô số 3 và ô số 4 trong kịch bản video).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Công thức tiêu đề: &quot;Liệu bạn có muốn [điều gì đó mà thị trường tiềm năng của bạn đang</span></div>\n<p class=\"body-txt\">\ntìm kiếm]?&quot; (Ví dụ: &quot;Liệu bạn có muốn giảm 10kg sau 30 ngày?&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Lời khuyên: &quot;Hoàn thành hơn hoàn hảo.&quot; Cần làm đúng kịch bản, tiêu đề, post đúng giờ</span></div>\n<p class=\"body-txt\">\ncác video trước để những video sau này mới có kết quả tốt.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Hãy trở thành người đi trước trên thị trường, post video sớm nhất và comment link</span></div>\n<p class=\"body-txt\">\nvideo đầu tiên.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tạo sự thay đổi (transformation) chứ không chỉ cung cấp thông tin (information): Trong</span></div>\n<p class=\"body-txt\">\nbối cảnh xã hội ngày nay tràn ngập thông tin, việc chỉ đơn thuần cung cấp dữ liệu là\n \nkhông đủ để tạo ra giá trị. Một video thực sự có sức ảnh hưởng phải khiến người xem\n \ntrải qua một sự thay đổi (về tư duy, hành động, kết quả) sau khi xem. Điều này không chỉ\n \nxây dựng lòng tin và sự yêu thích mà còn thúc đẩy hành vi mua hàng, vì khán giả cảm\n \nnhận được giá trị thực sự mà bạn mang lại cho cuộc đời họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Giữ góc máy ngang hàng với khuôn mặt/mắt: Đây là một kỹ thuật quay phim tưởng</span></div>\n<p class=\"body-txt\">\nchừng đơn giản nhưng lại cực kỳ hiệu quả trong việc tạo sự kết nối cảm xúc và sự tin cậy\n \nvới khán giả. Khi góc máy ngang tầm mắt, người xem cảm thấy như đang được đối thoại\n \ntrực tiếp, được tôn trọng và gần gũi hơn với người nói, tương tự như cách các chương\n \ntrình truyền hình chuyên nghiệp thường làm. Sự gần gũi này giúp thông điệp được tiếp\n \nnhận tốt hơn và tăng cường mối quan hệ với khán giả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Video phải phục vụ khách hàng tiềm năng và giải quyết vấn đề của họ (không phải giải</span></div>\n<p class=\"body-txt\">\ntrí chung chung): Mục tiêu cốt lõi của video marketing là kinh doanh, không phải câu\n \nview hay thu hút đám đông không chọn lọc. Bằng cách tập trung vào những vấn đề và\n \nnhu cầu cụ thể mà đối tượng khách hàng mục tiêu đang gặp phải, bạn sẽ lọc được đúng\n \nngười quan tâm, tối ưu hóa nguồn lực và tăng tỷ lệ chuyển đổi. Điều này đảm bảo mỗi\n \nvideo bạn tạo ra đều có mục đích rõ ràng và mang lại giá trị kinh doanh thực sự.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Đó không phải là thông tin (information) mà đó là sự thay đổi (transformation).”\n \n“Hoàn thành hơn hoàn hảo.”\n \n“Chúng ta không làm video để chơi. Chúng ta là những nhà kinh doanh, chúng ta làm video để\n \nkinh doanh.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ngày 5: Tại sao tôi không làm [cái gì đó] thông thường nữa</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Tóm tắt. Buổi học này tập trung vào kỹ thuật nội dung để tạo ra các video marketing hấp</h3>\n<p class=\"body-txt\">\ndẫn trên internet. Cốt lõi là việc đưa ra những quan điểm &quot;trái ngược&quot; hoặc &quot;ngược đời&quot; so\n \nvới thông thường để tạo tranh cãi và thu hút sự chú ý của khán giả. Đồng thời, diễn giả cũng\n \nnhấn mạnh sự cần thiết phải truyền tải thông điệp nhanh chóng, cô đọng bằng cách loại bỏ\n \ncác khoảng lặng, nói nhanh hơn hoặc tăng tốc độ video, vì khán giả trên internet rất ít thời\n \ngian và sự kiên nhẫn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chào mừng đến Ngày 5 của chuỗi video, nhắc lại bài học Ngày 4 về bố cục và góc máy.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Kỹ thuật nội dung để video hấp dẫn: Đưa ra những quan điểm trái ngược với quan điểm</span></div>\n<p class=\"body-txt\">\nthông thường.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Quan điểm trái ngược sẽ tạo ra nhiều tranh cãi trong video, làm cho nội dung hấp dẫn</span></div>\n<p class=\"body-txt\">\nhơn và thu hút khán giả tìm đến nhiều hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Mẹo để video hấp dẫn hơn (liên quan đến thời gian và cách nói):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Thực tế là hầu hết khán giả trên internet không có thời gian để chờ đợi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Hãy nói nhanh hơn, ngắn gọn hơn, tập trung hơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Sử dụng phần mềm biên tập video để cắt bỏ những đoạn &quot;ừm&quot;, &quot;à&quot; (làm cho video ngắn</span></div>\n<p class=\"body-txt\">\ngọn hơn).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nếu không thể nói nhanh, hãy tua (tăng tốc độ phát) video lên.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nhắc lại nguyên tắc bố cục 1/3 (khuôn hình mặt luôn nằm ở đường 1/3) và để khoảng</span></div>\n<p class=\"body-txt\">\ntrống 1/3 khi giới thiệu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Đi sâu vào việc tạo ra các điều trái ngược/ngược đời:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ví dụ từ sách &quot;Cơ thể 4 giờ&quot; của Tim Ferriss:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cách giảm 9kg trong 30 ngày mà không cần luyện tập.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cách chè chén say sưa trong các dịp lễ Tết mà không bị béo.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cách giảm mỡ đến 300% chỉ với vài kilogram đá.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cách tăng được 15kg trong 28 ngày mà chỉ cần 4 giờ luyện tập gym.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cách ngủ 2 giờ mà vẫn tỉnh táo.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cách chạy 5km lên 50km chỉ trong vòng 12 tuần.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cách vừa chữa bệnh lại vừa nghỉ ngơi trên bãi biển.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cách tìm ra những quan điểm trái ngược: Tìm ra điều gì đó mà bạn đã trải nghiệm trong</span></div>\n<p class=\"body-txt\">\nquá khứ, đã làm được, mà lại ngược với quan điểm thông thường. &quot;Điều mà thiên hạ\n \nđang cho là đúng thì không nhất thiết nó là phải đúng.&quot; Tìm điều mà đám đông sai lầm\n \nnhưng bạn biết là đúng (hoặc ngược lại).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khi bạn đưa ra những điều trái ngược, video sẽ trở nên rất tuyệt vời và tạo tranh luận.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Gợi ý cấu trúc tiêu đề cho video &quot;trái ngược&quot;: &quot;Tại sao tôi không...&quot; hoặc &quot;Tại sao tôi...&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ví dụ: Tại sao tôi không trang điểm khi đi ra ngoài (nếu là phụ nữ đã xăm môi, lông mày,</span></div>\n<p class=\"body-txt\">\nnâng mũi); Tại sao tôi không mặc vest khi làm diễn giả (để vận động nhiều hơn); Tại sao\n \ntôi không dùng điện thoại di động nữa / không bao giờ trả lời điện thoại di động; Tại sao\n \ndoanh nhân như tôi không trả lời điện thoại di động; Tại sao tôi chỉ chạy bộ ban đêm\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><p class=\"body-txt\">\n(thay vì buổi sáng/chiều); Tại sao tôi không còn ăn cơm nữa (vì cơm trắng nhiều\n \ncarbohydrate, gây thừa cân, béo phì, có thể dẫn chứng khoa học).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Việc đưa ra quan điểm trái chiều sẽ thu hút rất nhiều tranh luận, giúp video hấp dẫn</span></div>\n<p class=\"body-txt\">\nhơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tổng kết bài học Ngày 5:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Hoàn thành hơn hoàn hảo (post video sớm nhất).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cắt bỏ toàn bộ những đoạn &quot;ừm, à&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nói nhanh hơn (hoặc tua video nhanh hơn).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Đưa ra những quan điểm trái ngược, càng trái ngược bao nhiêu thì càng có nhiều tranh</span></div>\n<p class=\"body-txt\">\nluận và càng hấp dẫn khán giả bấy nhiêu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bài tập về nhà: Hoàn thành bài tập ngày hôm nay thật sớm, comment đường link và tiêu</span></div>\n<p class=\"body-txt\">\nđề của video.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tạo nội dung &quot;trái ngược&quot; hoặc &quot;ngược đời&quot; để thu hút sự chú ý và tạo tranh cãi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">*Giải thích vì sao quan trọng:* Trong môi trường internet bão hòa thông tin, việc trình</span></div>\n<p class=\"body-txt\">\nbày những quan điểm đi ngược lại số đông, thách thức các niềm tin phổ biến hoặc đưa ra\n \ngiải pháp &quot;không tưởng&quot; là cách hiệu quả nhất để nổi bật. Điều này kích thích sự tò mò,\n \ngây tranh luận, từ đó tăng tương tác, mức độ lan truyền và thu hút một lượng lớn khán\n \ngiả quan tâm đến nội dung của bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tối ưu hóa thời lượng video và tốc độ truyền tải thông điệp để giữ chân khán giả.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">*Giải thích vì sao quan trọng:* Khán giả trên internet có rất ít thời gian và sự kiên nhẫn.</span></div>\n<p class=\"body-txt\">\nBằng cách nói nhanh hơn, loại bỏ các khoảng lặng không cần thiết (&quot;ừm, à&quot;) và nén thời\n \ngian video (cả trong lúc quay và chỉnh sửa), bạn giúp truyền tải thông tin một cách cô\n \nđọng, hiệu quả. Điều này giữ chân người xem lâu hơn, tăng khả năng họ theo dõi hết\n \nvideo và tiếp nhận được thông điệp cốt lõi, trước khi họ bị phân tâm bởi các nội dung\n \nkhác.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Một trong những cái lý do khiến cho video của bạn trở nên hấp dẫn là bạn đưa ra những\n \nquan điểm trái ngược với những cái quan điểm thông thường.”\n \n“Hãy nhớ rằng cái điều mà thiên hạ đang cho là đúng thì không nhất thiết nó là phải đúng.”\n \n“Khán giả chúng ta không có thời gian, không có chờ đợi chúng ta ở trên internet để xem\n \nchúng ta đâu.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ngày 6: [Số] mẹo nhanh để [kết quả muốn đạt]</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Tóm tắt. Buổi học thứ sáu của khóa &quot;28 ngày Video Marketing&quot; tập trung vào kỹ thuật tối</h3>\n<p class=\"body-txt\">\nưu hóa video YouTube để tăng khả năng tìm kiếm và tiếp cận khách hàng mục tiêu. Cốt lõi là\n \nsử dụng từ khóa chiến lược một cách tự nhiên trong tiêu đề, phần mô tả (nên dài khoảng\n \n1000 chữ) và thẻ (tag) của video. Mục tiêu là giúp video dễ dàng được tìm thấy khi khách\n \nhàng tìm kiếm các giải pháp hoặc thông tin mà họ mong muốn.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Buổi học này là ngày thứ 6, tập trung vào kỹ thuật biên tập video, cụ thể là tối ưu phần</span></div>\n<p class=\"body-txt\">\n&quot;chữ&quot; (nội dung text) trên video khi đăng lên YouTube.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Yêu cầu viết phần mô tả (description) cho video khoảng 1000 chữ, chứa các từ khóa mà</span></div>\n<p class=\"body-txt\">\nbạn muốn video của mình được tìm kiếm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Phần tag trên video cần chứa toàn bộ các từ khóa, và nên đặt câu với toàn bộ những từ</span></div>\n<p class=\"body-txt\">\nkhóa này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Đối với từ khóa chính: phải đưa nó vào trong tiêu đề và đưa lên phần đầu tiên của phần</span></div>\n<p class=\"body-txt\">\nmô tả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tiêu đề phải đúng cấu trúc nhưng có chứa từ khóa để khi khán giả tìm kiếm, video của</span></div>\n<p class=\"body-txt\">\nbạn hiển thị hàng đầu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Đây là một trong những kỹ thuật đơn giản để giúp video được dễ dàng tìm kiếm hơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Để biết rõ hơn về cách tìm và đưa từ khóa vào video, có thể tham khảo kênh YouTube</span></div>\n<p class=\"body-txt\">\nOfficial và sử dụng các ứng dụng như TubeBuddy hoặc VidIQ (đã được hướng dẫn ở\n \ntuần chuẩn bị - tuần số 0).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Lưu ý quan trọng: Đừng chỉ copy từ khóa mà hãy đặt câu với từ khóa trong phần mô tả</span></div>\n<p class=\"body-txt\">\nđể nội dung thật tự nhiên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Công việc tối ưu hóa này được gọi là SEO (Search Engine Optimization) cho video, giúp</span></div>\n<p class=\"body-txt\">\nvideo trở nên nổi tiếng hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cấu trúc tiêu đề được khuyến nghị cho video: &quot;SỐ&quot; + Cách/Mẹo/Kỹ thuật + &quot;để tạo ra</span></div>\n<p class=\"body-txt\">\nKẾT QUẢ MONG MUỐN nào đó&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ví dụ: &quot;3 bước để có thể giảm cân một cách an toàn&quot;, &quot;5 cách để có thể ghi chép dễ nhớ&quot;,</span></div>\n<p class=\"body-txt\">\n&quot;3 kỹ thuật cơ bản cần biết dành cho người chạy bộ&quot;, &quot;20 cách tẩy rửa nhà bếp mà các bà\n \nnội trợ cần biết&quot;, &quot;7 cách sử dụng kim khâu để tạo nên những tác phẩm trên quần áo của\n \nbạn&quot;, &quot;7 cách để tán đổ cô nàng bạn thích&quot;, &quot;5 bước để có thể chinh phục khách hàng&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Video Marketing là hướng đến khách hàng mục tiêu, không phải làm để chơi. Hãy hình</span></div>\n<p class=\"body-txt\">\ndung khách hàng mục tiêu là ai, họ muốn điều gì, và chỉ cho họ những cách, bước, kỹ\n \nthuật, tip, mẹo đơn giản để họ đạt được điều họ muốn. Điều họ muốn chính là điều họ\n \ntìm kiếm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Đưa &quot;điều họ muốn&quot; này (tức từ khóa/mong muốn của khách hàng) vào trong tag, tiêu</span></div>\n<p class=\"body-txt\">\nđề và phần mô tả video.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bài tập thực hành: Sau khi tạo video, hãy comment trên video của diễn giả tiêu đề video</span></div>\n<p class=\"body-txt\">\ncủa bạn, link của video và gắn hashtag #video28ngay #videongay6 trong phần mô tả\n \nvideo của bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nhắc nhở xem lại các video đã bỏ lỡ vì chỉ mất 5 phút để hoàn thành.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tối ưu hóa từ khóa ở 3 vị trí then chốt: Tiêu đề, phần mô tả dài (khoảng 1000 chữ) và</span></div>\n<p class=\"body-txt\">\nthẻ (tag) đều phải chứa từ khóa chính, với từ khóa chính nằm ở đầu tiêu đề và đầu mô\n \ntả.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là nền tảng của SEO cho video, giúp thuật toán của YouTube hiểu</span></div>\n<p class=\"body-txt\">\nrõ nội dung video, từ đó đề xuất video đến đúng đối tượng người tìm kiếm. Nếu thiếu\n \nmột trong ba yếu tố này hoặc không đặt đúng vị trí, khả năng video được phát hiện sẽ\n \ngiảm đáng kể.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Sử dụng từ khóa một cách tự nhiên trong mô tả: Thay vì chỉ liệt kê từ khóa, người học</span></div>\n<p class=\"body-txt\">\nđược khuyên đặt câu với từ khóa để nội dung thật tự nhiên và có ý nghĩa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Điều này không chỉ giúp video thân thiện với thuật toán tìm kiếm</span></div>\n<p class=\"body-txt\">\n(tránh bị coi là spam) mà còn mang lại giá trị thực sự cho người xem khi đọc mô tả. Nội\n \ndung tự nhiên sẽ thu hút người xem hơn và tăng tỷ lệ tương tác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Công thức tiêu đề tập trung vào giải pháp cho khách hàng: Cấu trúc tiêu đề được đưa ra</span></div>\n<p class=\"body-txt\">\nlà &quot;SỐ + Cách/Mẹo/Kỹ thuật + để tạo ra KẾT QUẢ MONG MUỐN nào đó&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Công thức này trực tiếp giải quyết &quot;điểm đau&quot; hoặc mong muốn của</span></div>\n<p class=\"body-txt\">\nkhách hàng. Nó tạo ra sự tò mò, hứa hẹn một giải pháp cụ thể và dễ hiểu, thu hút khách\n \nhàng mục tiêu click vào video vì họ tin rằng video sẽ cung cấp câu trả lời cho vấn đề của\n \nhọ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Luôn hướng đến khách hàng mục tiêu: &quot;Video marketing là hướng đến khách hàng mục</span></div>\n<p class=\"body-txt\">\ntiêu, chứ không phải làm để chơi.&quot; và &quot;Cái điều họ muốn chính là cái điều mà họ tìm\n \nkiếm.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là kim chỉ nam cho mọi hoạt động marketing. Việc hiểu rõ khách</span></div>\n<p class=\"body-txt\">\nhàng muốn gì giúp định hướng nội dung, từ khóa, và cách thức trình bày để video không\n \nchỉ được tìm thấy mà còn thực sự hữu ích và thu hút, chuyển đổi người xem thành khách\n \nhàng tiềm năng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Đừng chỉ copy từ khóa mà hãy đặt câu với từ khóa để cho nó thật là tự nhiên.”\n \n“Video marketing là hướng đến khách hàng mục tiêu, chứ không phải làm để chơi.”\n \n“Cái điều họ muốn chính là cái điều mà họ tìm kiếm.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ngày 7: Ngừng thói quen cũ, bắt đầu hành động mới</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Tóm tắt. Buổi học thứ 7 này tập trung vào kỹ thuật sử dụng hashtag hiệu quả trên mạng xã</h3>\n<p class=\"body-txt\">\nhội nói chung và YouTube nói riêng để tạo ra các &quot;trào lưu&quot; (trend) và kết nối cộng đồng.\n \nDiễn giả hướng dẫn cách thêm hashtag vào mô tả video để tăng khả năng hiển thị và tương\n \ntác. Đồng thời, đây cũng là buổi &quot;cầu nối&quot; để chuyển từ giai đoạn tiếp cận &quot;thị trường lạnh&quot;\n \nsang &quot;thị trường ấm&quot; bằng thông điệp &quot;ngừng thói quen cũ, bắt đầu hành động mới&quot; liên\n \nquan đến sản phẩm/dịch vụ muốn cung cấp.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Buổi thứ 7 là ngày cuối cùng làm việc với &quot;thị trường lạnh&quot; trong chuỗi video marketing</span></div>\n<p class=\"body-txt\">\n28 ngày.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Giới thiệu kỹ thuật sử dụng hashtag trên mạng xã hội và YouTube.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Hashtag là một dấu thăng (#) viết liền với các chữ, dùng để đánh dấu video, trạng thái</span></div>\n<p class=\"body-txt\">\nhoặc bình luận.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khi bấm vào hashtag, tất cả nội dung liên quan sẽ hiện lên màn hình (bình luận, video,</span></div>\n<p class=\"body-txt\">\nbài viết...).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Hashtag có thể tạo ra các trào lưu xã hội, bao gồm trào lưu marketing.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Có thể dùng hashtag cho thương hiệu, tên công ty, tính từ, danh từ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Quy tắc viết hashtag: viết liền, bắt đầu bằng dấu thăng, tốt nhất không dấu tiếng Việt để</span></div>\n<p class=\"body-txt\">\ndễ sử dụng và phổ biến hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ví dụ hashtag: #videomarketing28ngay, #videongay7.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Hướng dẫn thêm ít nhất 3 hashtag vào cuối phần mô tả video. Hashtag bắt buộc bao</span></div>\n<p class=\"body-txt\">\ngồm: #videomarketing28ngay và #videongay[số_thứ_tự_ngày].\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Yêu cầu cập nhật hashtag cho tất cả các video từ ngày 1 đến ngày 6 nếu chưa có.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khi bấm vào #videomarketing28ngay, sẽ thấy tất cả 7 video của mình và video của các</span></div>\n<p class=\"body-txt\">\nhọc viên khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khuyến khích đăng ký kênh, bình luận và góp ý cho các video của bạn bè/học viên khác</span></div>\n<p class=\"body-txt\">\nđể tạo hiệu ứng viral (lan truyền).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Video ngày hôm nay là video &quot;cầu nối&quot; chuyển tiếp từ &quot;thị trường lạnh&quot; sang &quot;thị trường</span></div>\n<p class=\"body-txt\">\nấm&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nội dung chính của video cầu nối là thông điệp &quot;ngừng cái này để bắt đầu cái kia&quot; hoặc</span></div>\n<p class=\"body-txt\">\n&quot;ngừng thói quen cũ, bắt đầu thói quen mới&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Các ví dụ về &quot;ngừng X, bắt đầu Y&quot;:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngừng phàn nàn, hãy chịu trách nhiệm cuộc đời.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngừng mơ mộng viển vông, hãy bắt đầu hành động vì mục tiêu tài chính.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngừng cảm giác tội lỗi, bắt đầu yêu thương bản thân.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngừng đưa ra lý do, bắt đầu hành động ngay bây giờ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngừng ngại ngùng trước ống kính, hãy làm video ngay hôm nay.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngừng đổ lỗi cho người khác, hãy bắt đầu chịu trách nhiệm cuộc sống của mình.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngừng cãi nhau với vợ, hãy ôm hôn cô ấy một lần.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngừng la mắng đứa trẻ, hãy chơi cùng chúng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">&quot;Thói quen&quot; và &quot;hành động mới&quot; cần liên quan đến thị trường tiềm năng, sản phẩm/dịch</span></div>\n<p class=\"body-txt\">\nvụ sẽ cung cấp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Các ví dụ sản phẩm cụ thể cho &quot;ngừng X, bắt đầu Y&quot;:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngừng dùng băng vệ sinh, bắt đầu dùng cốc nguyệt san (nếu bán cốc nguyệt san).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngừng đổ xăng xe máy, dùng xe máy điện (nếu bán xe máy điện).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngừng mặc comple lên sân khấu, bắt đầu mặc áo thun.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngừng ngủ nướng, đeo giày và chạy bộ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chúc mừng hoàn thành 7 ngày đầu tiên và hẹn gặp lại ở &quot;thị trường ấm&quot;.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Sức mạnh của Hashtag để xây dựng cộng đồng và tạo hiệu ứng lan truyền: Hashtag</span></div>\n<p class=\"body-txt\">\nkhông chỉ giúp phân loại nội dung mà còn là công cụ mạnh mẽ để tập hợp những người\n \ncùng quan tâm (khách hàng tiềm năng, đồng nghiệp, cộng đồng) dưới một chủ đề chung.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><p class=\"body-txt\">\nViệc kêu gọi bấm vào hashtag và tương tác với nội dung của nhau tạo ra một mạng lưới\n \nkết nối, giúp nội dung của mỗi cá nhân lan tỏa rộng hơn, đặc biệt hữu ích khi tiếp cận\n \n&quot;thị trường lạnh&quot; và biến họ thành &quot;thị trường ấm&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Thông điệp &quot;Ngừng X, Bắt đầu Y&quot; để thúc đẩy thay đổi và chuyển đổi hành vi: Đây là một</span></div>\n<p class=\"body-txt\">\ncông thức giao tiếp cực kỳ hiệu quả, tập trung vào việc nhận diện vấn đề hoặc thói quen\n \ncũ đang cản trở khách hàng, sau đó trực tiếp đưa ra giải pháp mới mang tính tích cực và\n \ncụ thể. Nó không chỉ bán sản phẩm/dịch vụ mà còn bán một sự thay đổi, một lối sống\n \nhoặc một giải pháp vượt trội, tạo động lực mạnh mẽ cho hành động. Điều quan trọng là\n \nsự liên kết giữa thói quen cũ và hành động mới phải gắn liền với sản phẩm/dịch vụ mà\n \nbạn muốn cung cấp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chiến lược &quot;cầu nối&quot; chuyển dịch thị trường từ lạnh sang ấm: Buổi học này đánh dấu sự</span></div>\n<p class=\"body-txt\">\nkết thúc của giai đoạn &quot;thị trường lạnh&quot; (tiếp cận người chưa biết về bạn) và mở ra giai\n \nđoạn &quot;thị trường ấm&quot; (chuyển đổi người đã biết sang quan tâm và hành động). Việc sử\n \ndụng hashtag để gia tăng hiển thị và thông điệp &quot;ngừng X, bắt đầu Y&quot; để định hướng tư\n \nduy khách hàng là những bước đệm quan trọng để xây dựng mối quan hệ và sự tin\n \ntưởng, chuẩn bị cho các chiến lược bán hàng hiệu quả hơn sau này.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Ngừng cái này để bắt đầu cái kia. Chúng ta sẽ nói họ ngừng cái thói quen cũ mà mọi người\n \nđang làm để bắt đầu cho một chuỗi những "<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><p class=\"body-txt\">\nnào đó trong cuộc đời họ. Điều này quan trọng vì nó định hướng toàn bộ chiến lược nội\n \ndung, tập trung vào giá trị thực mà khách hàng nhận được, từ đó tạo ra sự gắn kết sâu\n \nsắc và niềm tin.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Công thức kể chuyện 7 thành phần là chìa khóa xây dựng niềm tin: Đây là &quot;công thức</span></div>\n<p class=\"body-txt\">\nvàng&quot; giúp bạn cấu trúc câu chuyện một cách hấp dẫn, chạm đến cảm xúc và động lực\n \ncủa khán giả. Bằng cách trình bày rõ ràng khát khao, nỗi đau, rào cản, kế hoạch, thử\n \nthách, thành tựu và bài học, bạn không chỉ thu hút sự chú ý mà còn tạo dựng uy tín và\n \ngiải quyết 2 lý do lớn nhất khiến khách hàng không mua: không tin bạn và không tin sản\n \nphẩm có kết quả cho họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Luôn bắt đầu từ &quot;Tại sao?&quot; (Why): Diễn giả nhắc nhở về cuốn sách &quot;Start with Why&quot; và</span></div>\n<p class=\"body-txt\">\ntầm quan trọng của việc đặt câu hỏi &quot;tại sao&quot; ở mọi khía cạnh. Điều này quan trọng vì khi\n \nkhách hàng hiểu rõ *lý do* sâu xa mà họ cần một sản phẩm/dịch vụ (tức là giải quyết\n \nđược khát khao và nỗi đau của họ), họ sẽ dễ dàng hành động và gắn bó hơn rất nhiều so\n \nvới việc chỉ biết &quot;cái gì&quot; (what) mà sản phẩm đó mang lại.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Không phải information mà là transformation. Sự biến đổi mới là quan trọng.”\n \n“Bạn là hàng hiếm trên trái đất này có thể biết được những bí mật của ba tuần tiếp theo.”\n \n“Đây là công thức vàng, đáng ra tôi không dạy cho các bạn đâu. Nó phải nằm ở một khóa học\n \nđắt tiền khác của tôi.”\n \n“Tại sao [nhóm người mà bạn đang hướng đến] lại [hành động] để đạt được [lợi ích mong\n \nmuốn].”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ngày 9: [n] lời khuyên nếu không muốn [nỗi đau]</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Tóm tắt. Buổi học tập trung vào sức mạnh của việc kể chuyện cá nhân, đặc biệt là chia sẻ về</h3>\n<p class=\"body-txt\">\nnhững thất bại và khó khăn trong quá khứ, để xây dựng niềm tin với khán giả. Diễn giả nhấn\n \nmạnh rằng nỗi đau là động lực mạnh mẽ hơn sự sung sướng, và việc kể câu chuyện về nỗi\n \nđau của bản thân sẽ thúc đẩy khán giả mong muốn thay đổi để tránh những điều tương tự.\n \nBuổi học cũng hướng dẫn cách lồng ghép câu chuyện của người nói với trải nghiệm của khán\n \ngiả và giới thiệu một công thức tiêu đề hiệu quả để thu hút đúng đối tượng mục tiêu bằng\n \ncách chạm vào nỗi sợ hãi và mong muốn tránh nỗi đau của họ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Video trước (ngày 8) về &quot;7 thành phần để kể một câu chuyện&quot; là nền tảng quan trọng,</span></div>\n<p class=\"body-txt\">\ncần xem lại nếu chưa hoàn thành.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chủ đề ngày 9: Kể một câu chuyện về những thất bại, khó khăn mà bạn đã từng trải qua</span></div>\n<p class=\"body-txt\">\ntrong quá khứ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Mục đích: Khi bạn kể ra những sai lầm, thất bại đã trải qua để giúp người khác tránh, họ</span></div>\n<p class=\"body-txt\">\nsẽ tin tưởng bạn hơn rất nhiều. Điều này giải quyết lý do thứ ba khiến khách hàng không\n \nmua hàng (vì họ không tin tưởng).\n</p></div></div>",
