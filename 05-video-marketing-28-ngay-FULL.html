chiến lược này cho</span></div>\n<p class=\"body-txt\">\nphép doanh nghiệp đón đầu và hóa giải các nghi ngờ tiềm ẩn về hiệu quả sản phẩm. Việc\n \ncung cấp kiến thức và hướng dẫn trước không chỉ xây dựng lòng tin mà còn trang bị cho\n \nkhách hàng khả năng sử dụng sản phẩm thành công ngay từ đầu, giảm tỷ lệ thất vọng và\n \ntăng tỷ lệ chuyển đổi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Thấu hiểu rằng khách hàng có thể &quot;lười biếng, cẩu thả, ngu ngốc&quot; trong việc làm theo</span></div>\n<p class=\"body-txt\">\nhướng dẫn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Dù là một nhận định có phần thẳng thắn, nhưng nó phản ánh thực tế</span></div>\n<p class=\"body-txt\">\nvề hành vi người dùng. Insight này nhắc nhở người bán hàng rằng các hướng dẫn cần\n \nphải cực kỳ rõ ràng, đơn giản, dễ tiếp cận và có thể cần lặp lại nhiều lần dưới các hình\n \nthức khác nhau để đảm bảo khách hàng thực sự tiếp thu và làm theo. Không thể mặc\n \nđịnh rằng khách hàng sẽ tự động đọc và tuân thủ mọi chỉ dẫn một cách đầy đủ.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Khách hàng không mua sản phẩm, khách hàng chỉ mua cái hiệu quả mà sản phẩm mang lại\n \nthôi.”\n \n“Bạn nên làm gì nếu [tên sản phẩm] không có hiệu quả?”\n \n“Khách hàng của chúng ta không giống như chúng ta, họ lười biếng, họ vô cùng lười biếng, họ\n \ntrong một chừng mực nào đó chúng ta có thể nói rằng là họ cẩu thả, trong một cái trường hợp\n \nlà gọi là nặng nề hơn thì họ là ngu ngốc.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ngày 20: Cách nhân đôi kết quả bằng [công cụ]</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Tóm tắt. Buổi học này là video số 20, tập trung vào việc làm cho thị trường nóng trở nên</h3>\n<p class=\"body-txt\">\n&quot;nóng hơn&quot; bằng cách giúp người bán nhận diện và truyền tải những lợi ích độc đáo, tạo ra\n \nhiệu quả thực sự cho khách hàng khi sử dụng sản phẩm. Diễn giả nhấn mạnh việc kích thích\n \ntrí tưởng tượng của khách hàng về các kết quả tích cực, sự thuận tiện và nhanh chóng mà\n \nsản phẩm mang lại. Buổi này giới thiệu công thức tiêu đề hiệu quả: &quot;Cách nhân đôi kết quả\n \n[mong muốn] bằng cách sử dụng [sản phẩm/phương pháp cụ thể]&quot;, tập trung vào giải pháp\n \nmà chưa đề cập đến thương hiệu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Video này là video số 20, tiếp nối nội dung xử lý sự từ chối và tập trung vào việc làm thị</span></div>\n<p class=\"body-txt\">\ntrường nóng trở nên nóng hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Thách thức người học tìm ra những *lợi thế độc đáo* trong sản phẩm của mình mà đối</span></div>\n<p class=\"body-txt\">\nthủ hoặc các sản phẩm khác không có.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Các lợi thế này phải được hiểu là *lợi ích* mà sản phẩm mang lại, tạo ra *hiệu quả* cho</span></div>\n<p class=\"body-txt\">\nkhách hàng khi sử dụng sản phẩm đúng cách, so với các sản phẩm hay cách làm thông\n \nthường khác. Không phải chỉ là những tính năng *nằm trong* sản phẩm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Mục tiêu là thúc đẩy khách hàng hành động mạnh mẽ hơn bằng cách khiến họ cảm thấy</span></div>\n<p class=\"body-txt\">\nsung sướng, &quot;mở não ra&quot; và tưởng tượng về những kết quả mà sản phẩm có thể mang\n \nlại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Con người luôn mong muốn sự thuận tiện và nhanh chóng, vì vậy cần chỉ rõ cho khách</span></div>\n<p class=\"body-txt\">\nhàng biết sản phẩm của bạn mang lại sự thuận tiện hơn, nhanh chóng hơn và hiệu quả\n \nhơn như thế nào.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Hãy chỉ rõ cho khách hàng *làm điều đó như thế nào* và *sản phẩm nào* có thể làm</span></div>\n<p class=\"body-txt\">\nđược điều này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Lưu ý: Trong video này và trong tuần này, chúng ta vẫn chưa nói về *tên thương hiệu*</span></div>\n<p class=\"body-txt\">\ncủa sản phẩm. Chúng ta chỉ nói về *loại sản phẩm* hoặc *tên sản phẩm* (mà không kèm\n \ntheo thương hiệu) có thể giúp họ đạt được hiệu quả đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Video 21 (ngày mai) sẽ là video nói về toàn bộ cục diện này (có thể bao gồm cả thương</span></div>\n<p class=\"body-txt\">\nhiệu).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tiêu đề mẫu cho video/nội dung dạng này là: &quot;Cách nhân đôi kết quả [mong muốn kết</span></div>\n<p class=\"body-txt\">\nquả gì đó] bằng cách sử dụng [cái sản phẩm gì đó]&quot;.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chuyển từ &quot;tính năng&quot; sang &quot;lợi ích&quot; và &quot;hiệu quả&quot;: Đây là điểm cốt lõi để tạo ra giá trị</span></div>\n<p class=\"body-txt\">\nthực sự cho khách hàng. Thay vì liệt kê các đặc điểm của sản phẩm, cần tập trung vào\n \nviệc sản phẩm đó *giúp khách hàng đạt được điều gì*, *cải thiện cuộc sống của họ ra\n \nsao* và *mang lại hiệu quả cụ thể gì*. Điều này quan trọng vì khách hàng mua giải pháp\n \ncho vấn đề của họ, không phải chỉ là một món hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Kích thích trí tưởng tượng và cảm xúc tích cực: Việc tập trung vào việc khiến khách hàng</span></div>\n<p class=\"body-txt\">\n&quot;cảm thấy sung sướng&quot; và &quot;mở não ra&quot; để tưởng tượng về &quot;kết quả&quot; là một chiến lược\n \ntâm lý mạnh mẽ. Thay vì chỉ giải quyết nỗi đau hoặc nỗi sợ hãi, việc vẽ ra một viễn cảnh\n \ntương lai tốt đẹp, nơi mọi thứ thuận tiện, nhanh chóng và hiệu quả hơn sẽ tạo động lực\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">hành động tích cực và mạnh mẽ hơn nhiều.</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Công thức tiêu đề hướng tới kết quả và giải pháp cụ thể: Công thức &quot;Cách nhân đôi kết</span></div>\n<p class=\"body-txt\">\nquả [mong muốn] bằng cách sử dụng [sản phẩm/phương pháp cụ thể]&quot; là một khuôn\n \nmẫu cực kỳ thực tế và dễ áp dụng. Nó trực tiếp chạm vào mong muốn của khách hàng\n \n(kết quả họ muốn) và ngay lập tức gợi ý một giải pháp rõ ràng, tạo sự hấp dẫn và định\n \nhướng cho người xem/đọc. Việc sử dụng từ &quot;nhân đôi&quot; cũng rất mạnh mẽ, gợi ý một sự\n \ncải thiện vượt trội.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Những lợi thế này chỉ nói về những lợi ích mà sản phẩm của bạn mang lại chứ không phải\n \nnhững điều mà nằm trong sản phẩm.”\n \n“Con người bao giờ cũng muốn cái sự thuận tiện, sự nhanh chóng.”\n \n“Cách nhân đôi kết quả [mong muốn kết quả gì đó] bằng cách sử dụng cái sản phẩm gì đó.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ngày 21: Trên tay [sản phẩm]</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Tóm tắt. Buổi học này là ngày cuối cùng của tuần thứ ba trong khóa học video marketing,</h3>\n<p class=\"body-txt\">\ntập trung vào việc tạo video giới thiệu sản phẩm cho thị trường ấm. Diễn giả hướng dẫn cách\n \nlàm video &quot;trên tay&quot; sản phẩm, không nhằm mục đích giải trí hay bán hàng ngay lập tức, mà\n \nđể tạo sự &quot;cuồng nhiệt&quot; và thu hút đúng đối tượng khách hàng mục tiêu. Cốt lõi của video là\n \ntrình bày các lợi ích mà tính năng sản phẩm mang lại, đồng thời khéo léo đề cập đến một vài\n \nnhược điểm nhỏ để tăng tính chân thực và lòng tin cho khán giả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Buổi học là ngày thứ 21/28 của khóa video marketing, kết thúc tuần thứ 3 (thị trường</span></div>\n<p class=\"body-txt\">\nấm).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Mục tiêu của ngày hôm nay là giới thiệu sản phẩm, phân tích lợi ích và một vài nhược</span></div>\n<p class=\"body-txt\">\nđiểm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tiêu đề của video là &quot;Trên tay [sản phẩm của bạn]&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khái niệm &quot;trên tay&quot; (on-hand) ngụ ý rằng sản phẩm đang mới xuất hiện, và người làm</span></div>\n<p class=\"body-txt\">\nvideo là những người đầu tiên sở hữu.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Video có thể do bất kỳ ai nói, không quan trọng người nói là ai.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Đây là marketing, không phải video giải trí; mục tiêu là thu hút thị trường mục tiêu,</span></div>\n<p class=\"body-txt\">\nnhững người quan tâm đến sản phẩm, không phải đám đông.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Trong video &quot;trên tay&quot;, cần nói về hai điều quan trọng:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Lợi ích mà tính năng của sản phẩm mang lại (ví dụ: điện thoại 5 camera cho ảnh chi tiết</span></div>\n<p class=\"body-txt\">\nở góc rộng, trung bình, xa; hệ thống AI tự động xác định bối cảnh để tạo ảnh sắc nét, màu\n \nsắc sống động). Cần phân biệt rõ tính năng và lợi ích (khách hàng mua lợi ích).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Một vài nhược điểm nhỏ của sản phẩm (ví dụ: độ phân giải màn hình chỉ Full HD, không</span></div>\n<p class=\"body-txt\">\ncó jack cắm tai nghe 3.5mm).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Lý do phải nói về nhược điểm là để tăng thêm lòng tin của khán giả, vì &quot;không có gì là</span></div>\n<p class=\"body-txt\">\nhoàn hảo&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Có thể biến nhược điểm thành lợi thế hoặc lý do cho một lợi ích khác (ví dụ: không có</span></div>\n<p class=\"body-txt\">\njack 3.5mm giúp máy mỏng hơn và chống thấm nước tốt hơn).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Trong giai đoạn này, TUYỆT ĐỐI không bán hàng. Mục tiêu chỉ là làm cho khán giả</span></div>\n<p class=\"body-txt\">\n&quot;cuồng nhiệt&quot; với sản phẩm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nếu có câu hỏi về việc mua hàng, chỉ cần trả lời bằng icon mặt cười.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Việc bán hàng sẽ được thực hiện vào &quot;tuần sát thủ bán hàng&quot; (tuần sau).</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chiến lược &quot;Trên tay&quot; để tạo sự mới mẻ và độc đáo: Việc sử dụng định dạng &quot;trên tay&quot;</span></div>\n<p class=\"body-txt\">\nđịnh vị người giới thiệu là người tiên phong, có trải nghiệm đầu tiên với sản phẩm mới.\n \nĐiều này quan trọng vì nó thu hút sự chú ý, tạo tò mò và niềm tin về tính cập nhật của\n \nthông tin, đặc biệt hiệu quả khi ra mắt dịch vụ hoặc tính năng mới.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tập trung vào Lợi ích thay vì chỉ Tính năng: Đây là trọng tâm của marketing hiệu quả.</span></div>\n<p class=\"body-txt\">\nKhách hàng không mua một tính năng (ví dụ: 5 camera), mà mua lợi ích mà tính năng đó\n \nmang lại (ví dụ: những bức ảnh vô cùng chi tiết, sắc nét, sống động). Việc trình bày lợi\n \ních giúp kết nối trực tiếp với nhu cầu và mong muốn của khách hàng, làm cho sản\n \nphẩm/dịch vụ trở nên hấp dẫn hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Công khai một vài nhược điểm nhỏ để xây dựng lòng tin: Nguyên tắc &quot;không có gì là</span></div>\n<p class=\"body-txt\">\nhoàn hảo&quot; rất quan trọng trong việc tạo sự minh bạch. Khi người bán thừa nhận một vài\n \nđiểm chưa tối ưu (và có thể giải thích lý do hoặc biến nó thành lợi thế), khán giả sẽ cảm\n \nthấy thông tin khách quan, chân thực hơn. Điều này giúp tăng cường đáng kể độ tin cậy\n \ncủa người giới thiệu và sản phẩm/dịch vụ, tạo nền tảng vững chắc cho quá trình bán\n \nhàng sau này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tách biệt rõ ràng giai đoạn &quot;tạo sự cuồng nhiệt&quot; và &quot;bán hàng&quot;: Đây là một chiến lược</span></div>\n<p class=\"body-txt\">\nmarketing theo từng bước. Video &quot;trên tay&quot; không phải là công cụ bán hàng trực tiếp mà\n \nlà công cụ để tạo hứng thú, nuôi dưỡng khao khát và xây dựng mối quan hệ với khách\n \nhàng mục tiêu. Việc không vội vàng bán hàng giúp khách hàng không cảm thấy bị áp lực,\n \ncho họ thời gian tìm hiểu và mong muốn sản phẩm, từ đó tăng tỷ lệ chuyển đổi khi đến\n \ngiai đoạn &quot;sát thủ bán hàng&quot;.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Bạn nhớ chúng ta đang làm marketing, chúng ta không làm video giải trí.”\n \n“Hãy nhớ mọi thứ không có gì là hoàn hảo.”\n \n“Không bán hàng ngày hôm nay! Tuần sau mới là tuần bán hàng, nên cứ trên tay của sản\n \nphẩm thôi và làm cho khán giả của bạn cuồng nhiệt với sản phẩm của bạn.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ngày 22: Thông điệp gửi tới [nhóm thị trường tiềm năng]</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Tóm tắt. Buổi giảng này tập trung vào chiến lược ra mắt sản phẩm trong &quot;tuần bán hàng&quot;</h3>\n<p class=\"body-txt\">\ncủa khoá học video marketing. Diễn giả nhấn mạnh việc không nên bán sản phẩm ngay lập\n \ntức khi ra mắt, mà cần áp dụng chiến lược tạo sự tò mò và khuyến khích &quot;đặt hàng sớm&quot;\n \n(pre-order). Bằng cách chia sẻ thông tin một cách mơ hồ và dẫn dắt khách hàng qua chuỗi\n \nvideo, mục tiêu là biến họ từ thị trường lạnh thành những người nóng lòng chờ đợi và sẵn\n \nsàng hành động sớm để tìm kiếm sản phẩm.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tuần thứ tư là &quot;tuần bán hàng&quot;: Buổi học này dành cho những người đã kiên trì vượt</span></div>\n<p class=\"body-txt\">\nqua 3 tuần khó khăn của khóa học video marketing, vì phần lớn mọi người thường bỏ\n \ncuộc ở tuần thứ hai hoặc thứ ba.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chiến lược &quot;Ra mắt nhưng không bán&quot;: Diễn giả khuyên học viên giới thiệu sản phẩm</span></div>\n<p class=\"body-txt\">\nnhưng không bán ngay lập tức. Thay vào đó, hãy khuyến khích khách hàng &quot;đặt hàng\n \nsớm&quot; (pre-order) như một chiến lược quan trọng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Xây dựng sự tò mò và dẫn dắt thông tin: Chỉ cung cấp một vài thông tin &quot;ngu mơ&quot; (mơ</span></div>\n<p class=\"body-txt\">\nhồ) về sản phẩm, cách đặt hàng sớm và thời gian hàng hóa xuất hiện. Thông tin chi tiết\n \nhơn sẽ được hé lộ trong các video tiếp theo để giữ chân và thu hút người xem.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cấu trúc tiêu đề video &quot;Thông điệp gửi tới...&quot;: Đề xuất sử dụng tiêu đề dạng &quot;Thông điệp</span></div>\n<p class=\"body-txt\">\ngửi tới [nhóm đối tượng cụ thể]&quot; (ví dụ: &quot;Thông điệp gửi tới các doanh nhân&quot;, &quot;Thông\n \nđiệp gửi tới những người bán hàng online&quot;) để nhắm đúng khách hàng mục tiêu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nội dung video ra mắt: Giới thiệu về sản phẩm, các tính năng và lợi ích (như video ngày</span></div>\n<p class=\"body-txt\">\n21), đồng thời gợi ý về &quot;kế hoạch đặt hàng&quot; mà chưa phải là &quot;đặt hàng&quot; ngay.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tạo động lực hành động sớm: Kêu gọi khách hàng &quot;chuẩn bị cho kế hoạch đặt hàng&quot; và</span></div>\n<p class=\"body-txt\">\nhứa hẹn rằng những người đặt hàng sớm sẽ nhận được quyền lợi và quà tặng đặc biệt\n \n(sẽ tiết lộ trong video ngày mai).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khóa học bổ trợ: Diễn giả giới thiệu hai khóa học khác của mình là &quot;Internet Power</span></div>\n<p class=\"body-txt\">\nSystem&quot; (về chiến lược kinh doanh online, thu hút khách hàng) và &quot;Sales Success\n \nSystem&quot; (về xây dựng hệ thống bán hàng, phễu chuyển đổi) cho những ai muốn ra mắt\n \nsản phẩm thành công.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chiến lược &quot;Ra mắt nhưng không bán&quot; để tạo khan hiếm và thúc đẩy hành động sớm:</span></div>\n<p class=\"body-txt\">\nĐây là điểm cốt lõi, thay vì bán hàng trực diện, diễn giả hướng dẫn tạo ra sự kiện &quot;ra\n \nmắt&quot; nhưng tập trung vào việc khuyến khích &quot;đặt hàng sớm&quot; hoặc chuẩn bị cho việc đặt\n \nhàng. Điều này quan trọng vì nó tạo ra cảm giác đặc quyền, kích thích sự tò mò và tính\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><p class=\"body-txt\">\ncấp bách, khiến khách hàng muốn là một trong những người đầu tiên sở hữu sản phẩm\n \nthay vì chờ đợi, đồng thời giúp doanh nghiệp thăm dò nhu cầu thị trường hiệu quả hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Sử dụng kỹ thuật &quot;càng ngu mơ càng tốt&quot; để xây dựng sự tò mò liên tục: Việc chỉ cung</span></div>\n<p class=\"body-txt\">\ncấp thông tin chung chung, mơ hồ và hứa hẹn tiết lộ chi tiết trong các video tiếp theo là\n \nmột chiến lược giữ chân khách hàng mạnh mẽ. Nó buộc người xem phải tiếp tục theo dõi\n \nchuỗi nội dung để có được bức tranh hoàn chỉnh, từ đó tạo ra một lượng khán giả gắn\n \nkết và khao khát sản phẩm trước khi nó thực sự được mở bán, biến họ thành những\n \nngười &quot;theo đuổi&quot; thông tin về sản phẩm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tập trung vào lợi ích của hành động sớm thay vì chỉ lợi ích sản phẩm: Thay vì chỉ nói về</span></div>\n<p class=\"body-txt\">\ntính năng và lợi ích của sản phẩm, diễn giả hướng dẫn tập trung vào việc những người\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">hành động sớm (đặt hàng/đăng ký sớm) sẽ nhận được những gì (quà tặng, ưu đãi, quyền</h3>\n<p class=\"body-txt\">\nlợi độc quyền). Điều này chuyển đổi động lực mua hàng từ &quot;tôi có cần sản phẩm này\n \nkhông?&quot; sang &quot;tôi sẽ bỏ lỡ những gì nếu không hành động ngay bây giờ?&quot;, tạo ra một\n \nđộng lực mạnh mẽ hơn để chuyển đổi.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Rất ít, rất ít những con người trên thế giới này có thể liên tục, liên tục, liên tục trong 21 ngày\n \nđể làm những cái video marketing.”\n \n“Ra mắt nhưng không bán.”\n \n“Càng ngu mơ càng tốt.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ngày 23: Siêu phẩm sắp xuất hiện [đặt hàng sớm]</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Tóm tắt. Buổi học tập trung vào chiến lược ra mắt và bán sản phẩm thông qua video, đặc</h3>\n<p class=\"body-txt\">\nbiệt là video giới thiệu &quot;sản phẩm sắp xuất hiện&quot; kèm ưu đãi đặt hàng sớm. Diễn giả nhấn\n \nmạnh tầm quan trọng của việc bắt đầu bán hàng mà không sợ thất bại lần đầu, cùng với việc\n \ntạo ra những gói quà tặng hấp dẫn để khuyến khích khách hàng hành động nhanh chóng.\n \nĐồng thời, cần hướng dẫn khách hàng cách đặt hàng và thanh toán một cách chi tiết, không\n \nbỏ qua bất kỳ bước nào, vì &quot;hoàn thành quan trọng hơn hoàn hảo&quot;.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Video thứ 23 là video bán hàng quan trọng nhất trong toàn bộ chương trình, quyết định</span></div>\n<p class=\"body-txt\">\nsự thành bại. Nếu sản phẩm chưa sẵn sàng, chưa cần làm video này mà hãy làm lại các\n \nvideo trước.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Đừng sợ thất bại lần đầu: Không ai thành công ngay từ những lần đầu tiên cả. Mọi thất</span></div>\n<p class=\"body-txt\">\nbại đều đến một cách bình thường, mang lại trải nghiệm và bài học quý giá.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tiêu đề video ra mắt sản phẩm: Sử dụng công thức &quot;Siêu phẩm [Tên sản phẩm] sắp xuất</span></div>\n<p class=\"body-txt\">\nhiện và bạn có thể đặt hàng sớm.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Hai hình thức đặt hàng sớm:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Thanh toán ngay (full payment): Tỷ lệ chuyển đổi thường không cao vì khách hàng cảm</span></div>\n<p class=\"body-txt\">\nthấy rủi ro khi chuyển tiền ngay, đặc biệt với sản phẩm đắt tiền. Phù hợp cho hàng nhỏ,\n \nít tiền.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Thanh toán một phần/Đặt cọc (deposit): Giúp giảm rủi ro cho khách hàng, đồng thời</span></div>\n<p class=\"body-txt\">\ngiúp người bán hiểu và đo lường dung lượng thị trường.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nội dung video ra mắt sản phẩm:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nêu bật một lợi ích quan trọng của sản phẩm sắp ra mắt.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Thông báo về vô vàn quà tặng sẽ được tặng cho những người đặt hàng sớm (Quà tặng số</span></div>\n<p class=\"body-txt\">\n1, số 2, số 3, số 4...).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chiến lược giảm quà tặng theo thời gian: Số lượng quà tặng sẽ giảm bớt vào ngày mai,</span></div>\n<p class=\"body-txt\">\nngày mốt, v.v., để tạo cảm giác cấp bách và khuyến khích đặt hàng sớm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ví dụ về quà tặng: tai nghe, thẻ nhớ, SIM điện thoại 1 năm, sạc dự phòng, dây sạc siêu</span></div>\n<p class=\"body-txt\">\nbền, bao da, chính sách bảo hành 1 năm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Hướng dẫn chi tiết cách đặt hàng và thanh toán: Cần chỉ dẫn từng bước (điền form, gửi</span></div>\n<p class=\"body-txt\">\nemail, gọi hotline, chuyển khoản, thanh toán thẻ, thanh toán tiền mặt) một cách tỉ mỉ.\n \nKhông được mặc định khách hàng biết cách thanh toán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tham khảo cách ra mắt sản phẩm: Học hỏi từ các bộ phim bom tấn, điện thoại xịn, xe</span></div>\n<p class=\"body-txt\">\nmáy, ô tô về cách họ triển khai chính sách ra mắt sản phẩm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nguyên tắc &quot;Hoàn thành quan trọng hơn hoàn hảo&quot;: Không cần một sản phẩm hay video</span></div>\n<p class=\"body-txt\">\nhoàn hảo, chỉ cần hoàn thành để có bài học và bắt đầu hành động.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chấp nhận thất bại và liên tục hành động: &quot;Không ai thành công ở những lần đầu tiên cả,</span></div>\n<p class=\"body-txt\">\nbởi vì mọi cái thất bại đều đến với chúng ta một cách bình thường.&quot; Điều này cực kỳ\n \nquan trọng vì nó loại bỏ nỗi sợ hãi ban đầu, yếu tố lớn nhất cản trở việc bắt đầu kinh\n \ndoanh hoặc thử nghiệm marketing. Việc cứ làm và học hỏi từ mỗi lần thất bại sẽ dẫn đến\n \nsự tự tin và thành công dần dần.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chiến lược &quot;Đặt hàng sớm&quot; kèm quà tặng có giới hạn thời gian: Cung cấp nhiều quà tặng</span></div>\n<p class=\"body-txt\">\ncho người đặt hàng sớm nhất và giảm dần số quà theo từng ngày là một kỹ thuật tâm lý\n \nmạnh mẽ. Nó tạo ra sự khan hiếm và cấp bách, thúc đẩy khách hàng hành động ngay lập\n \ntức thay vì trì hoãn, giúp tạo ra doanh số ban đầu và đo lường sự quan tâm của thị\n \ntrường một cách hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Hướng dẫn đặt hàng và thanh toán cực kỳ chi tiết: &quot;Đừng mặc định trong đầu là mọi</span></div>\n<p class=\"body-txt\">\nngười biết cách thanh toán&quot; và phải hướng dẫn &quot;thật là chi tiết&quot; mọi bước. Nhiều doanh\n \nnghiệp mất khách hàng tiềm năng vì quá trình thanh toán phức tạp hoặc không rõ ràng.\n \nHướng dẫn rõ ràng giúp giảm ma sát, tăng tỷ lệ chuyển đổi và mang lại trải nghiệm\n \nkhách hàng tốt hơn, đặc biệt quan trọng với các giao dịch online.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Không ai thành công ở những lần đầu tiên cả, bởi vì mọi cái thất bại đều đến với chúng ta\n \nmột cách bình thường.”\n \n“No sale, no money.”\n \n“Hoàn thành quan trọng hơn hoàn hảo. Bạn không cần bất kỳ điều gì hoàn hảo cả, chỉ cần\n \nhoàn thành thôi, bạn đã có nhiều bài học hơn những người chờ đợi và không làm gì cả rồi.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ngày 24: Những điều chưa biết về [siêu phẩm]</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Tóm tắt. Buổi học này tập trung vào việc tận dụng sự tò mò của khách hàng để gia tăng giá</h3>\n<p class=\"body-txt\">\ntrị sản phẩm và thúc đẩy hành vi mua hàng. Cốt lõi là tạo ra nội dung video với tiêu đề\n \n&quot;Những điều chưa biết về siêu phẩm [Tên sản phẩm của bạn]&quot;, tiết lộ những bí mật, bí ẩn\n \nhay bí quyết đặc biệt về sản phẩm, quá trình tạo ra nó, hoặc thậm chí là người tạo ra nó. Mục\n \ntiêu là củng cố niềm tin, tăng giá trị nhận thức và khuyến khích khách hàng đặt hàng sớm,\n \nđồng thời không ngừng nhắc nhở về các ưu đãi quà tặng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tiếp tục củng cố niềm tin của khách hàng về việc sản phẩm sẽ được gửi tới họ và nhắc</span></div>\n<p class=\"body-txt\">\nnhở họ về việc đặt hàng sớm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tiếp cận khách hàng bằng cách khơi gợi sự tò mò, vì đây là một yếu tố quan trọng thúc</span></div>\n<p class=\"body-txt\">\nđẩy hành vi mua hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tiêu đề video nên là &quot;Những điều chưa biết về siêu phẩm [tên sản phẩm của chúng ta]&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nội dung &quot;những điều chưa biết&quot; có thể xoay quanh các khía cạnh như:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bản thân sản phẩm (ví dụ: P30 Pro, son Skybot, sách, giày, mặt nạ, đồng hồ, điện thoại,</span></div>\n<p class=\"body-txt\">\nvải may quần áo).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cách đóng gói sản phẩm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cách sản xuất sản phẩm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Vật liệu tạo nên sản phẩm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Thời gian nghiên cứu sản phẩm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Phần hậu kỳ của quá trình tạo ra sản phẩm (ví dụ: hậu kỳ của video đang phát).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Thậm chí là những điều chưa biết về cuộc đời của người tạo ra sản phẩm (diễn giả).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Các thông tin được tiết lộ phải là những điều *đặc biệt* mà từ trước đến giờ chưa ai từng</span></div>\n<p class=\"body-txt\">\nnói.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Những &quot;điều chưa biết&quot; này phải là những bí mật, bí ẩn, hoặc bí quyết giúp tạo nên giá</span></div>\n<p class=\"body-txt\">\ntrị cho sản phẩm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khi nói, cần đảm bảo nội dung mang lại giá trị gia tăng cho sản phẩm, không nói linh</span></div>\n<p class=\"body-txt\">\ntinh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ở cuối video, cần nhắc lại cách đặt hàng sớm, cách khách hàng sử dụng sản phẩm và đặc</span></div>\n<p class=\"body-txt\">\nbiệt là nhắc lại về các món quà tặng đi kèm (1, 2, 3, hoặc 4 món) nếu đặt hàng sớm trong\n \nngày.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khi giới thiệu lại các sản phẩm và lợi ích của chúng, hãy giới thiệu lại từ đầu, không mặc</span></div>\n<p class=\"body-txt\">\nđịnh rằng khách hàng đã xem video trước đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Đừng quá quan trọng việc khách hàng có đặt hàng ngay trong ngày hay không, vì vẫn</span></div>\n<p class=\"body-txt\">\ncòn nhiều video tiếp theo; quan trọng là cứ làm để có thêm kinh nghiệm, bài học và trải\n \nnghiệm mới.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khai thác sự tò mò để tăng giá trị sản phẩm và kích thích mua hàng: Diễn giả khẳng định</span></div>\n<p class=\"body-txt\">\ntò mò là yếu tố then chốt thúc đẩy hành vi mua. Việc tiết lộ &quot;những điều chưa biết&quot; về\n \nsản phẩm (từ quy trình sản xuất, vật liệu, đến những câu chuyện hậu trường hay bí\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><p class=\"body-txt\">\nquyết độc đáo) không chỉ thu hút sự chú ý mà còn làm tăng giá trị nhận thức. Điều này\n \nquan trọng vì nó chuyển hướng khỏi việc chỉ mô tả tính năng đơn thuần, tạo ra một câu\n \nchuyện sâu sắc hơn, từ đó xây dựng kết nối cảm xúc và sự độc đáo cho sản phẩm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Thông tin &quot;chưa biết&quot; phải là bí mật, bí ẩn, bí quyết thực sự để tăng uy tín: Các chi tiết</span></div>\n<p class=\"body-txt\">\nđược chia sẻ không nên là những thông tin chung chung mà phải là những điều đặc biệt,\n \ncó chiều sâu, thậm chí là &quot;hậu kỳ&quot; hay &quot;thời gian nghiên cứu&quot; mà khách hàng chưa từng\n \nbiết. Việc này rất quan trọng vì nó định vị sản phẩm không chỉ là một mặt hàng mà là kết\n \nquả của một quá trình tinh xảo, có sự đầu tư lớn, từ đó nâng cao đáng kể uy tín và sự tin\n \ncậy của cả sản phẩm và thương hiệu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tập trung vào hành động &quot;làm&quot; và học hỏi liên tục: Lời khuyên &quot;Cứ làm đi và bạn sẽ trở</span></div>\n<p class=\"body-txt\">\nnên tuyệt vời&quot; ngay cả khi chưa bán được hàng, nhấn mạnh giá trị của việc tích lũy kinh\n \nnghiệm, bài học và trải nghiệm mới. Tư duy này quan trọng vì nó khuyến khích sự kiên\n \ntrì và học hỏi không ngừng trong marketing và bán hàng, giúp người học phát triển dài\n \nhạn thay vì chỉ theo đuổi kết quả tức thời.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Những điều chưa biết về siêu phẩm [tên sản phẩm của chúng ta].”\n \n“Những điều chưa biết này phải là những bí mật này, những bí ẩn này, những bí quyết này để\n \ntạo nên cái sản phẩm này. Đấy mới là những cái điều tuyệt vời.”\n \n“Cứ làm đi và bạn sẽ trở nên tuyệt vời.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ngày 25: Được tặng [quà] cùng siêu phẩm</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Tóm tắt. Buổi giảng này, ngày thứ 25 trong chuỗi 28 video, tập trung vào chiến lược củng cố</h3>\n<p class=\"body-txt\">\nlòng tin khách hàng và thúc đẩy họ đặt hàng sớm. Nội dung chính không phải là sản phẩm\n \ncốt lõi, mà là giới thiệu một món quà giá trị đi kèm, chỉ dành cho những ai đặt mua sản phẩm\n \nchính ngay hôm nay. Diễn giả hướng dẫn cách đặt tên, làm nổi bật tính năng và lợi ích của\n \nquà tặng, cùng với các kêu gọi hành động rõ ràng, nhằm tăng tỷ lệ chuyển đổi thông qua sự\n \nlặp lại có chủ đích.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Buổi học là ngày thứ 25 trong chương trình &quot;Video 28 ngày cùng với diễn giả&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Mục tiêu của ngày hôm nay là củng cố lòng tin với khách hàng và nhắc nhở họ đặt hàng</span></div>\n<p class=\"body-txt\">\nsớm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chiến lược là không nói về sản phẩm chính mà tập trung giới thiệu về &quot;món quà&quot; mà</span></div>\n<p class=\"body-txt\">\nkhách hàng sẽ nhận được.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Món quà cần được đặt tên và trình bày về &quot;tính năng&quot; và &quot;lợi ích&quot; của nó.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khách hàng sẽ nhận được món quà này nếu họ đặt hàng sớm &quot;siêu phẩm&quot; chính &quot;ngay</span></div>\n<p class=\"body-txt\">\nngày hôm nay&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tiêu đề "<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tặng sạc pin dung lượng lớn cùng với siêu phẩm P30 Pro.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tặng đôi dây giày siêu nhanh nếu mua đôi giày Ultraboost hôm nay.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tặng kèm đôi tai nghe siêu boot nếu đặt mua máy ghi âm ABC hôm nay.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tặng kèm siêu thẻ nhớ khi đặt hàng máy quay hình hôm nay.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Trong video, cần giới thiệu quà tặng bằng cách chuyển đổi &quot;tính năng&quot; thành &quot;lợi ích&quot;</span></div>\n<p class=\"body-txt\">\n(nhấn mạnh và lặp lại 3 lần).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Kêu gọi hành động (Call To Action): Hướng dẫn khách hàng bấm vào nút, điền form,</span></div>\n<p class=\"body-txt\">\nchuyển khoản hoặc đặt cọc giữ chỗ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nhắc nhở khách hàng rằng họ sẽ nhận được cả sản phẩm chính và quà tặng vào ngày đã</span></div>\n<p class=\"body-txt\">\nấn định.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Có thể có &quot;quà tặng thêm&quot; (quà tặng 1, 2, 3) cho những người đặt hàng đầu tiên, giống</span></div>\n<p class=\"body-txt\">\nnhư các video trước.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Sự lặp đi lặp lại cấu trúc video (chỉ khác t ></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Video thứ nhất:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chủ đề: &quot;24 giờ đầu tiên với [tên sản phẩm của bạn]&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Mục đích: Xử lý sự từ chối của khách hàng bằng cách giả định họ đã mua và đang có sản</span></div>\n<p class=\"body-txt\">\nphẩm trên tay.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nội dung: Cho họ thấy sản phẩm tuyệt vời như thế nào trong 24 giờ đầu tiên sử dụng.</span></div>\n<p class=\"body-txt\">\nHãy để &quot;mọi người&quot; (không phải người làm video) nói về cách họ bóc sản phẩm, lắp đặt,\n \nsử dụng đúng/sai và kết quả nhận được.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Loại video này là testimonial (lời chứng thực) hoặc ý kiến đánh giá của khách hàng, sử</span></div>\n<p class=\"body-txt\">\ndụng tâm lý đám đông để thuyết phục.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Phương pháp: Phỏng vấn một người hoặc vài người đã dùng sản phẩm trong 24 giờ và</span></div>\n<p class=\"body-txt\">\nlấy ý kiến của họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Video thứ hai:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Độc lập khỏi chương trình video marketing chính.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nội dung: Chia sẻ cảm nghĩ của học viên về chương trình &quot;Video Marketing 28 ngày cùng</span></div>\n<p class=\"body-txt\">\ndiễn giả&quot; trong suốt 25 ngày qua.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Kể về những điều đã học được, những thay đổi trong cuộc sống, con người, thói quen và</span></div>\n<p class=\"body-txt\">\nhành vi của bản thân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nêu bật chương trình đã ảnh hưởng thế nào và sẽ ảnh hưởng lâu dài ra sao tới cuộc đời</span></div>\n<p class=\"body-txt\">\nbạn, ý nghĩa của nó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Video này có thể được diễn giả sử dụng cho mục đích marketing của chương trình.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Diễn giả sẽ xem các video cảm nhận của học viên và có thể góp ý/chia sẻ trong các video</span></div>\n<p class=\"body-txt\">\ntiếp theo.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chiến lược testimonial &quot;24 giờ đầu tiên&quot; để xử lý sự từ chối: Đây là một phương pháp</span></div>\n<p class=\"body-txt\">\ntâm lý marketing rất hiệu quả. Thay vì trực tiếp quảng cáo sản phẩm, video này giả định\n \nkhách hàng tiềm năng đã sở hữu và đang trải nghiệm sản phẩm. Bằng cách ghi lại những\n \ntrải nghiệm thực tế và tích cực của người dùng khác trong 24 giờ đầu tiên, nó tạo ra\n \nbằng chứng xã hội mạnh mẽ và kích thích tâm lý đám đông, giúp khách hàng tiềm năng\n \nhình dung và mong muốn có được sản phẩm đó, từ đó gián tiếp vượt qua rào cản từ chối\n \nban đầu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Sức mạnh của tiêu đề và việc tuân thủ kịch bản: Diễn giả đặc biệt nhấn mạnh việc không</span></div>\n<p class=\"body-txt\">\nđược sửa tiêu đề mẫu (&quot;24 giờ đầu tiên với [sản phẩm]&quot;). Điều này quan trọng vì tiêu đề\n \nkhông chỉ là một dòng chữ mà là một phần của &quot;kịch bản chi tiết&quot; được thiết kế để &quot;thay\n \nđổi nhận thức của khách hàng&quot;. Việc tự ý thay đổi có thể làm mất đi hiệu quả đã được\n \ntính toán kỹ lưỡng của chiến lược marketing.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tầm quan trọng của việc tự đánh giá và chia sẻ hành trình cá nhân: Video thứ hai yêu</span></div>\n<p class=\"body-txt\">\ncầu học viên nhìn lại quá trình học, chia sẻ cảm nghĩ, sự thay đổi và thành công của bản\n \nthân. Điều này không chỉ giúp người học củng cố kiến thức và nội hóa những giá trị đã\n \nnhận được, mà còn tạo ra những lời chứng thực chân thực và mạnh mẽ nhất cho chương\n \ntrình. Những câu chuyện cá nhân về sự thay đổi có thể truyền cảm hứng và thuyết phục\n \nnhững người khác tham gia, đồng thời là một tài liệu marketing quý giá.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Đừng sửa bất kỳ chữ nào trong tiêu đề này.”\n \n“Trong video ngày hôm nay chúng ta tiếp tục xử lý cái sự từ chối của những khách hàng đã\n \nkhông đặt hàng, đã không mua hàng.”\n \n“Tên tuổi của bạn sẽ nổi như cồn.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ngày 27: [Số] mẹo để được [kết quả] nhiều hơn với sản phẩm</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Tóm tắt. Buổi này là ngày thứ 27 của chương trình Video Marketing 28 ngày, diễn giả chúc</h3>\n<p class=\"body-txt\">\nmừng học viên đã vượt qua giai đoạn khó khăn ban đầu và đạt được sự tự tin tuyệt vời trong\n \nviệc làm video. Cốt lõi của bài giảng tập trung vào việc tạo ra các video &quot;hậu mãi&quot; – hướng\n \ndẫn khách hàng sử dụng sản phẩm/dịch vụ hiệu quả hơn sau khi mua. Diễn giả nhấn mạnh\n \nvai trò quan trọng của tiêu đề video trong việc thu hút và tạo nội dung, đồng thời khuyến\n \nkhích học viên tiếp tục thực hành làm video một cách thường xuyên.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chương trình Video Marketing 28 ngày đã gần kết thúc (ngày thứ 27).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Diễn giả chúc mừng học viên về sự dũng cảm, nhiệt huyết và những tiến bộ vượt bậc (tự</span></div>\n<p class=\"body-txt\">\ntin đứng trước ống kính, livestream, nói chuyện trước đám đông, trả lời phỏng vấn).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nhấn mạnh quá trình &quot;vạn sự khởi đầu nan&quot; và những khó khăn ban đầu đã được vượt</span></div>\n<p class=\"body-txt\">\nqua.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Kêu gọi học viên gửi video đánh giá, review, testimonial về chương trình 28 ngày.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chương trình không chỉ thay đổi kinh doanh mà còn nhiều khía cạnh cuộc sống của học</span></div>\n<p class=\"body-txt\">\nviên (tự tin, tự do).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Diễn giả và ekip cũng tự thấy mình đã trở nên &quot;tuyệt vời&quot; hơn sau khi đồng hành cùng</span></div>\n<p class=\"body-txt\">\nchương trình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khuyến khích học viên tiếp tục làm video, đừng dừng lại sau khi chương trình kết thúc.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Diễn giả sẽ tiếp tục gửi các &quot;tiêu đề&quot; cho học viên để họ làm video đến hết năm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">&quot;Tiêu đề là bí quyết của video marketing&quot; – từ một tiêu đề có thể tạo ra nhiều nội dung</span></div>\n<p class=\"body-txt\">\nvà có thể tái sử dụng tiêu đề cũ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nhắc lại nguyên tắc: giả định khách hàng đã mua sản phẩm/dịch vụ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chủ đề của video hôm nay là chăm sóc sau bán hàng (hậu mãi): hướng dẫn khách hàng</span></div>\n<p class=\"body-txt\">\ncách chăm sóc, sử dụng sản phẩm hiệu quả hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Các ví dụ về tiêu đề video hậu mãi:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">&quot;Số mẹo để bạn có thể đạt được kết quả nhiều hơn với [sản phẩm]&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">&quot;5 bước để có bức ảnh đẹp hơn với Oppo&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">&quot;6 cách để có video mượt mà hơn với Gimbal DJI&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">&quot;5 mẹo để trang điểm nhanh hơn với chổi cọ&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">&quot;6 mẹo để giảm cân hiệu quả hơn với mầm đậu nành&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">&quot;7 mẹo để chạy nhanh hơn với đôi giày Ultra Boost&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khuyến khích tiếp tục làm những video này như một thói quen.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Sẽ có video đặc biệt vào ngày mai (ngày thứ 28).</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chiến lược Video Hậu mãi (After-sales video marketing): Diễn giả gợi ý rằng video</span></div>\n<p class=\"body-txt\">\nmarketing không chỉ dừng lại ở việc thu hút và bán hàng, mà còn cực kỳ hiệu quả trong\n \nviệc chăm sóc khách hàng sau khi họ đã mua sản phẩm/dịch vụ. Điều này quan trọng vì\n \nnó giúp tăng cường giá trị của sản phẩm/dịch vụ, cải thiện trải nghiệm khách hàng, xây\n \ndựng lòng trung thành, và khuyến khích họ mua lại hoặc giới thiệu cho người khác. Đây\n \nlà yếu tố then chốt để biến khách hàng thành những người ủng hộ thương hiệu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">&quot;Tiêu đề là bí quyết của video marketing&quot;: Câu nói này nhấn mạnh tầm quan trọng tối</span></div>\n<p class=\"body-txt\">\nthượng của tiêu đề video. Tiêu đề không chỉ là &quot;mồi câu&quot; để thu hút sự chú ý mà còn là\n \nkim chỉ nam để phát triển nội dung sáng tạo và đa dạng. Điều này quan trọng vì một tiêu\n \nđề mạnh mẽ, hấp dẫn và rõ ràng giúp video của bạn nổi bật giữa hàng ngàn nội dung\n \nkhác, đồng thời cung cấp một cấu trúc vững chắc cho người tạo nội dung để duy trì sự\n \nnhất quán và năng suất trong quá trình sản xuất video.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Vạn sự khởi đầu nan.”\n \n“Bây giờ bạn đã có thể tự tin đứng trước ống kính nói chuyện ở bất kỳ đâu. Livestream bây giờ\n \nđối với bạn đâu còn là vấn đề nữa, nó quá đơn giản.”\n \n“Tiêu đề là bí quyết của video marketing của chúng ta.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ngày 28: Đây là cách bạn tạo ra [kết quả mong muốn]</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Tóm tắt. Buổi giảng này đánh dấu kết thúc khóa học 28 ngày về video marketing, nhưng</h3>\n<p class=\"body-txt\">\nthực chất là khởi đầu cho hành trình thực hành. Diễn giả nhấn mạnh việc tiếp tục tạo video\n \nmarketing, tập trung vào việc mang lại lợi ích và hướng dẫn cụ thể cho khách hàng. Sự nhất\n \nquán và kiên trì trong hành trình này là yếu tố cốt lõi để đạt được kết quả, đồng thời biến\n \nngười học thành một video marketer chuyên nghiệp.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Buổi học ngày cuối cùng của chương trình 28 ngày là ngày kết thúc những lo lắng, sợ hãi,</span></div>\n<p class=\"body-txt\">\nnhưng cũng là ngày thực sự bắt đầu hành trình tạo video marketing.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">28 ngày qua chưa trực tiếp tạo ra tiền mà chủ yếu giúp người học tự tin hơn, thoải mái</span></div>\n<p class=\"body-txt\">\nhơn khi đứng trước ống kính.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Để nâng cao chất lượng video, có thể đầu tư máy quay, micro, ánh sáng, hoặc người quay</span></div>\n<p class=\"body-txt\">\nphim tốt hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tuy nhiên, ngay cả với chiếc điện thoại trên tay, bất kỳ ai cũng có thể trở thành nhà quay</span></div>\n<p class=\"body-txt\">\nphim video marketing.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bí quyết marketing cốt lõi là tập trung vào lợi ích của khách hàng, luôn mang lại mọi lợi</span></div>\n<p class=\"body-txt\">\ních cho khách hàng trong các video.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cấu trúc tiêu đề video hiệu quả nên là &quot;Đây là cách bạn [kết quả mong muốn/hành động</span></div>\n<p class=\"body-txt\">\ncụ thể]&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Về kỹ thuật video, cần chú ý đến bố cục 1/3, ánh sáng rõ mặt, nền không rối/mờ/tối.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Âm thanh phải rõ ràng, nói nhanh, cắt bỏ những phần ề à.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nội dung video cần đi thẳng vào lợi ích khách hàng, hướng dẫn họ một kỹ năng cụ thể,</span></div>\n<p class=\"body-txt\">\nvà thông qua đó giới thiệu về sản phẩm (cách dùng, tại sao dùng, làm thế nào).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chương trình video marketing là một hành trình liên tục, không nên dừng lại sau 28</span></div>\n<p class=\"body-txt\">\nngày.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">28 ngày qua là &quot;bệ phóng&quot; để khởi động &quot;cỗ máy khó khăn&quot; này; từ nay người học phải</span></div>\n<p class=\"body-txt\">\ntự mình tiếp tục.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Hãy tiếp tục làm video, biến mình thành một video marketer chuyên nghiệp và đừng bao</span></div>\n<p class=\"body-txt\">\ngiờ từ bỏ, dừng lại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Sự nhất quán và liên tục trong việc làm video sẽ mang lại kết quả.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Diễn giả sẽ gửi thêm kịch bản cho 200 ngày tới và khuyến khích tìm ra sản phẩm mới để</span></div>\n<p class=\"body-txt\">\ntiếp tục.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Người giàu học tập trọn đời, người nghèo theo nửa đoạn. Hãy tiếp tục làm video cho đến</span></div>\n<p class=\"body-txt\">\nkhi còn sống.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Đừng quên gửi video đánh giá chương trình video marketing này cho diễn giả như một</span></div>\n<p class=\"body-txt\">\nmón quà.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">&quot;Hôm nay mới thực sự bắt đầu.&quot; (0:36-0:44)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là một thay đổi tư duy mạnh mẽ. Nó nhấn mạnh rằng việc hoàn</span></div>\n<p class=\"body-txt\">\nthành một khóa học chỉ là bước chuẩn bị, còn kết quả thực sự đến từ việc áp dụng và\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#0097a7\">hành động liên tục sau đó. Nó chuyển trọng tâm từ việc học sang việc làm, từ lý thuyết</h3>\n<p class=\"body-txt\">\nsang thực tiễn, khuyến khích sự chủ động và không ngừng nghỉ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tập trung vào lợi ích của khách hàng. (1:47-1:58, 2:09-2:33, 2:58-3:01)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là kim chỉ nam cho mọi hoạt động marketing thành công. Thay vì</span></div>\n<p class=\"body-txt\">\nnói về sản phẩm/dịch vụ của mình, người làm video marketing cần đặt khách hàng làm\n \ntrung tâm, giải quyết vấn đề hoặc mang lại giá trị cụ thể cho họ. Cách đặt tiêu đề &quot;Đây là\n \ncách bạn [kết quả mong muốn]&quot; là một ví dụ minh họa rõ ràng, giúp video thu hút đúng\n \nđối tượng và tạo ra sự cộng hưởng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Sự nhất quán, sự liên tục sẽ đạt được kết quả. / Người giàu học tập trọn đời, người</span></div>\n<p class=\"body-txt\">\nnghèo theo nửa đoạn. (3:59-4:03, 4:20-4:23)\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Video marketing là một hành trình dài hạn, đòi hỏi sự kiên trì và bền</span></div>\n<p class=\"body-txt\">\nbỉ. Kết quả không đến ngay lập tức mà là thành quả của việc duy trì đều đặn. Thông điệp\n \nnày khuyến khích tư duy phát triển liên tục, không bỏ cuộc, và coi việc học hỏi, thực\n \nhành là một phần của cuộc sống, một đặc điểm của người thành công.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Tin buồn: Hôm nay mới thực sự bắt đầu.”\n \n“Sự nhất quán, sự liên tục sẽ đạt được kết quả.”\n \n“Người giàu học tập trọn đời, người nghèo theo nửa đoạn.”\n \n“Còn sống thì còn làm video nhé!”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ngày 29: Làm đi làm lại nhiều lần</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Tóm tắt. Buổi giảng này tổng kết chương trình Video Marketing 28 Ngày, khẳng định học</h3>\n<p class=\"body-txt\">\nviên đã nắm vững quy trình tạo video và khuyến khích họ áp dụng kiến thức này để tạo ra\n \nsản phẩm kinh doanh thực tế trên nhiều nền tảng khác nhau. Diễn giả nhấn mạnh tầm quan\n \ntrọng của việc chuyển hóa thông tin thành tiền bạc ngay lập tức. Đồng thời, ông giới thiệu\n \nhai khóa học chuyên sâu tiếp theo là Internet Power System và Sale Success System để xây\n \ndựng chiến lược marketing tổng thể và chuyển đổi khách hàng hiệu quả, kèm theo các ưu\n \nđãi đặc biệt cho học viên.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chương trình &quot;Video Marketing 28 Ngày&quot; đã giúp học viên từ &quot;không biết làm&quot; thành</span></div>\n<p class=\"body-txt\">\n&quot;biết làm&quot; video marketing.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Học viên đã có một kịch bản video hoàn chỉnh, bao gồm các bước từ tạo lập thị trường,</span></div>\n<p class=\"body-txt\">\ntung sản phẩm, đến chăm sóc khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Quy trình 28 ngày bao gồm 4 chuỗi chương trình: tìm kiếm thị trường, xác lập nhu cầu,</span></div>\n<p class=\"body-txt\">\nbiến thị trường lạnh thành thị trường ấm, chuyển thành chương trình đặt hàng sớm, bán\n \nhàng và chăm sóc sau bán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Kêu gọi học viên bắt đầu làm lại toàn bộ quy trình này từ đầu với các sản phẩm kinh</span></div>\n<p class=\"body-txt\">\ndoanh thực tế, không cần chờ 28 ngày nữa.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nội dung từ 28 video có thể được chuyển hóa và sử dụng trên nhiều nền tảng khác nhau</span></div>\n<p class=\"body-txt\">\nnhư YouTube, Facebook, Instagram, blog, email marketing, hoặc thành các chương trình\n \nđào tạo, giới thiệu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Giới thiệu &quot;Eagle Club&quot; cho chủ doanh nghiệp có nhiều tiền.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Giới thiệu hai chương trình dành cho người mới kinh doanh/khởi nghiệp:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Internet Power System (5 ngày): Giúp xây dựng chiến lược tổng thể về Internet</span></div>\n<p class=\"body-txt\">\nMarketing và doanh nghiệp trên internet, bao gồm cách tìm kiếm và đưa sản phẩm vào\n \nhệ thống kinh doanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Sale Success System: Giúp chuyển hóa khách hàng tiềm năng (từ video marketing) thành</span></div>\n<p class=\"body-txt\">\nkhách hàng thật và tiền thật.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chính sách ưu đãi: Giảm giá chương trình Internet Power System đúng bằng số tiền đã</span></div>\n<p class=\"body-txt\">\nbỏ ra cho Video Marketing 28 Ngày (tức là được miễn phí VM28N). Sale Success System\n \ncũng sẽ có giảm giá.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khuyến khích học viên đăng ký ngay để được hỗ trợ biến tất cả thông tin, tài năng, kiến</span></div>\n<p class=\"body-txt\">\nthức, kinh nghiệm, trải nghiệm thành tiền bạc.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chuyển từ lý thuyết sang hành động thực tế ngay lập tức: Diễn giả thúc giục học viên</span></div>\n<p class=\"body-txt\">\n&quot;bắt đầu làm lại toàn bộ quy trình này từ đầu&quot; với sản phẩm kinh doanh thực sự và &quot;biến\n \ntất cả những gì mình có thể... thành tiền bạc ngay ngày hôm nay&quot;. Điều này cực kỳ quan\n \ntrọng vì nhiều người học thường mắc kẹt ở giai đoạn lý thuyết, không dám hoặc trì hoãn\n \nviệc áp dụng. Việc thực hành ngay lập tức giúp củng cố kiến thức, nhận diện vấn đề thực\n \ntế và tạo ra giá trị kinh tế.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Khả năng tái sử dụng và đa dạng hóa nội dung marketing: 28 kịch bản video không chỉ</span></div>\n<p class=\"body-txt\">\ngiới hạn ở video mà có thể chuyển đổi linh hoạt thành blog, email marketing, bài đăng\n \ntrên mạng xã hội, hay thậm chí là chương trình đào tạo. Đây là một insight đắt giá giúp\n \ntối ưu hóa nguồn lực tạo nội dung. Thay vì tạo mới cho từng kênh, doanh nghiệp có thể\n \n&quot;xoay vòng&quot; nội dung gốc, tiếp cận được nhiều đối tượng khách hàng trên các nền tảng\n \nkhác nhau với cùng một thông điệp cốt lõi, tăng hiệu quả và giảm chi phí.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Hệ thống Marketing và Bán hàng toàn diện: Diễn giả giới thiệu &quot;Internet Power System&quot;</span></div>\n<p class=\"body-txt\">\ncho chiến lược tổng thể và &quot;Sale Success System&quot; để chuyển đổi khách hàng. Đây là một\n \ncái nhìn chiến lược quan trọng, bởi lẽ việc tạo ra khách hàng tiềm năng qua video\n \nmarketing chỉ là bước đầu. Để kinh doanh thành công, cần có một hệ thống hoàn chỉnh\n \ntừ thu hút, nuôi dưỡng đến chuyển đổi khách hàng thành doanh thu thực và duy trì mối\n \nquan hệ lâu dài.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Hãy bắt đầu làm lại toàn bộ quy trình này từ đầu.”\n \n“Tôi chỉ muốn bạn hãy biến tất cả những gì mình có thể thông tin, tài năng, kiến thức, kinh\n \nnghiệm, trải nghiệm của bạn thành tiền bạc ngay ngày hôm nay.”\n \n“Người giàu học trọn đời, người nghèo theo nửa đoạn.”\n</p></div></div>",

  fill.style.width=((cur+1)/N*100)+'%';
  info.textContent=(cur+1)+' / '+N;
  jump.value=cur+1;
  btnP.disabled=cur===0;
  btnN.disabled=cur===N-1;
  window.scrollTo(0,0);
}
function next(){if(cur<N-1){cur++;render();}}
function prev(){if(cur>0){cur--;render();}}
function goTo(n){cur=Math.max(0,Math.min(N-1,n));render();}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown')next();
  else if(e.key==='ArrowLeft'||e.key==='PageUp')prev();
});
render();
</script>
</body>
</html>
