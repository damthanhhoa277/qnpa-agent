<!DOCTYPE html>

<head>

<title>Video Marketing 28 Ngày</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#e8eaf0;font-family:'Segoe UI',Arial,sans-serif}
body{display:flex;flex-direction:column;align-items:center;padding:18px 10px 24px}

/* Book wrapper */
#book-wrap{width:720px;max-width:98vw;display:flex;flex-direction:column}

/* Top bar: title + page info */
#top-bar{display:flex;justify-content:space-between;align-items:center;
          margin-bottom:6px;padding:0 2px}
#book-title{font-size:13px;font-weight:600;color:#444;white-space:nowrap;
             overflow:hidden;text-overflow:ellipsis;max-width:60%}
#page-info{font-size:13px;color:#666;white-space:nowrap}

/* Progress bar */
#progress-bar{width:100%;height:3px;background:#d0d0d0;border-radius:2px;margin-bottom:10px}
#progress-fill{height:100%;border-radius:2px;transition:width .3s;background:#0097a7}

/* Page */
.pg{width:100%;min-height:540px;background:#ffffff;border-radius:6px;
     box-shadow:0 2px 16px rgba(0,0,0,.12);overflow:hidden}

/* Cover */
.pg-cover{display:flex;justify-content:center;align-items:center;min-height:540px}
.cover-wrap{text-align:center;padding:60px 40px}
.cover-tag{font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;font-weight:600}
.cover-title{font-size:28px;font-weight:700;color:#1a1a1a;line-height:1.4;margin-bottom:16px}
.cover-sub{font-size:14px;font-weight:500}

/* Content page */
.pg-content{}
.pg-inner{padding:28px 36px 32px;overflow-y:auto;max-height:540px}
.pg-inner::-webkit-scrollbar{width:5px}
.pg-inner::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

/* Typography */
.sec-hdr{font-size:12px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
          margin:18px 0 8px;padding-bottom:5px;border-bottom:1px solid #eee}
.sec-hdr:first-child{margin-top:0}
.body-txt{font-size:14px;color:#2d2d2d;line-height:1.8;margin-bottom:10px;text-align:justify}
.bullet{display:flex;gap:10px;margin:5px 0}
.bul-dot{font-size:18px;line-height:1.4;flex-shrink:0;margin-top:-1px}
.bul-txt{font-size:13.5px;color:#2d2d2d;line-height:1.7}

/* Navigation */
#nav{display:flex;align-items:center;gap:14px;margin-top:12px}
.nav-btn{background:#fff;border:2px solid #0097a7;color:#0097a7;padding:8px 24px;
          border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;
          transition:all .15s;letter-spacing:.5px}
.nav-btn:hover{background:#0097a7;color:#fff}
.nav-btn:disabled{opacity:.35;cursor:default}
#page-jump{width:52px;text-align:center;border:1px solid #ccc;border-radius:5px;
            padding:6px;font-size:13px;color:#444}
</style>
</head>

</div>
<script>
const pages=["<div class=\"pg pg-cover\" style=\"border-top:5px solid #0097a7\">\n  <div class=\"cover-wrap\">\n    <div class=\"cover-tag\" style=\"color:#0097a7\">Sổ Tay Tinh Hoa · QNPA</div>\n    <div class=\"cover-title\">Video Marketing 28 Ngày</div>\n    <div class=\"cover-sub\" style=\"color:#0097a7\">64 trang nội dung đầy đủ</div>\n  </div>\n</div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><p class=\"body-txt\">\nVideo Marketing 28 Ngày\n \nSổ tay tinh hoa\n</p>\n<p class=\"body-txt\">\nTổng hợp 36 bài\n \nNguồn: khoá học Video Marketing 28 Ngày\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><p class=\"body-txt\">\nLời mở\n \nQuyển sách này tổng hợp tinh hoa khoá Video Marketing 28 Ngày, do AI nghe lại từng bài\n \ngiảng và chắt lọc thành: tóm tắt, ý chính, điểm quan trọng nhất, và trích dẫn đáng nhớ.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><p class=\"body-txt\">\nMục lục\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Chương 0 — Chuẩn bị &amp; kỹ thuật (kịch bản · từ khoá · SEO · ánh sáng)</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bài 1: Kịch bản video 6 bước</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bài 5: Tìm từ khóa khách hàng đang tìm</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bài 6: Cách tạo thumbnail cho YouTube video</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bài 8: Tối ưu video lên top YouTube</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bài 9: SEO video đã lên không thứ hạng thành thứ hạng cao</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bài 10: Bố cục ánh sáng khi quay video</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bài 11: Bố cục hình ảnh khi quay video</span></div>\n<p class=\"body-txt\">\n28 Ngày — Công thức tiêu đề video\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngày 1: Đứng trên vai người khổng lồ</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngày 2: Đứng trên vai người khổng lồ (2)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngày 3: [Người nổi tiếng] tiết lộ [n] cách đạt thành tựu</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngày 4: Bạn có muốn [điều gì đó] mà thị trường tìm kiếm</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngày 5: Tại sao tôi không làm [cái gì đó] thông thường nữa</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngày 6: [Số] mẹo nhanh để [kết quả muốn đạt]</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngày 7: Ngừng thói quen cũ, bắt đầu hành động mới</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngày 8: Tại sao [nhóm người] hành động để đạt lợi ích mong muốn</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngày 9: [n] lời khuyên nếu không muốn [nỗi đau]</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngày 10: Điều này sẽ thay đổi [khía cạnh cuộc sống] mãi mãi</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngày 11: Dạy cho ai đó điều gì đó</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngày 12: Kêu gọi lời phản đối hoặc góp ý</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngày 13: Tạo ra sự phân cực</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngày 14: Nỗi đau khiến người ta hành động mạnh mẽ hơn</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngày 15: Cuối cùng bạn đã có thể [làm điều gì đó]</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngày 16: Cách dùng [công cụ] để đạt [kết quả thị trường muốn]</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngày 17: [Nhân vật điển hình] đã tạo ra [kết quả] thế nào</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngày 18: Xử lý sự từ chối</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngày 19: Nên làm gì nếu dùng [sản phẩm] mà không hiệu quả</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngày 20: Cách nhân đôi kết quả bằng [công cụ]</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngày 21: Trên tay [sản phẩm]</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngày 22: Thông điệp gửi tới [nhóm thị trường tiềm năng]</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngày 23: Siêu phẩm sắp xuất hiện [đặt hàng sớm]</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngày 24: Những điều chưa biết về [siêu phẩm]</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngày 25: Được tặng [quà] cùng siêu phẩm</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngày 26: 24h đầu tiên với [sản phẩm]</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngày 27: [Số] mẹo để được [kết quả] nhiều hơn với sản phẩm</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngày 28: Đây là cách bạn tạo ra [kết quả mong muốn]</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngày 29: Làm đi làm lại nhiều lần</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#0097a7\">Chương 0 — Chuẩn bị &amp; kỹ thuật (kịch bản · từ khoá · SEO · ánh sáng)</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Bài 1: Kịch bản video 6 bước</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Tóm tắt. Buổi học này giới thiệu khóa &quot;28 ngày biên tập video marketing&quot;, tập trung vào</h3>\n<p class=\"body-txt\">\nviệc tạo ra kịch bản video tuyệt vời để thu hút và tạo sự thay đổi cho khán giả. Cốt lõi là việc\n \nthấu hiểu sâu sắc nỗi đau và khát khao của khách hàng, sau đó lồng ghép vào cấu trúc kịch\n \nbản 6 phần cùng một câu chuyện hấp dẫn theo 7 bước. Diễn giả cũng nhấn mạnh công thức\n \nthay đổi D*V*FS &gt; R để đảm bảo video không chỉ cung cấp thông tin mà còn tạo ra hiệu quả\n \nthực sự. Mục tiêu cuối cùng là giúp học viên trở thành bậc diễn giả viết kịch bản video\n \nmarketing.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Buổi học giới thiệu chương trình huấn luyện &quot;28 ngày biên tập video marketing&quot; với</span></div>\n<p class=\"body-txt\">\nmục tiêu giúp học viên tạo ra những kịch bản video tuyệt vời.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Giải quyết vấn đề thường gặp: không biết nói gì, bối rối trước ống kính, không có chủ đề</span></div>\n<p class=\"body-txt\">\nđể nói.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Để tạo kịch bản video, điều đầu tiên là phải biết &quot;chúng ta nói cho ai nghe&quot;, tức là phải</span></div>\n<p class=\"body-txt\">\nhình dung ra &quot;chân dung khách hàng&quot; (độ tuổi, giới tính, sở thích, nhu cầu, sự quan tâm,\n \nnơi cư trú, tình trạng gia đình).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bước tiếp theo và quan trọng hơn là xác định &quot;đâu là những cái vấn đề, cái nỗi đau của</span></div>\n<p class=\"body-txt\">\nhọ&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Phương pháp thu thập và sắp xếp: Nghe khách hàng nói, đọc bình luận, theo dõi trên</span></div>\n<p class=\"body-txt\">\nmạng xã hội. Ghi lại các vấn đề/nỗi đau vào một bảng và sắp xếp từ &quot;ít đau&quot; lên &quot;đau đớn\n \nhơn&quot; (nghiêm trọng hơn).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tương tự, tìm hiểu và sắp xếp &quot;sự sung sướng&quot; (điều họ muốn, điều khiến họ phấn</span></div>\n<p class=\"body-txt\">\nkhích) vào một bảng khác, từ &quot;ít sung sướng&quot; lên &quot;sung sướng hơn&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ví dụ minh họa cụ thể cho &quot;bà mẹ bỉm sữa&quot; về nỗi đau (không có thời gian, không biết</span></div>\n<p class=\"body-txt\">\nchăm con, con khóc, chồng vắng nhà) và sự sung sướng (có thêm thu nhập, làm việc tại\n \nnhà, kinh doanh online).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cấu trúc của một &quot;video tuyệt vời&quot; gồm 6 ô (6 bước) theo thứ tự:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">1. Tiêu đề:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Phải gồm 2 thành phần: Lợi ích (giải quyết vấn đề hoặc đem đến sự sung sướng) VÀ Cảm</span></div>\n<p class=\"body-txt\">\nxúc (tự hào, sung sướng, hài lòng, sợ hãi, hối hận, đau khổ).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Thời lượng tối đa 15 giây, đây là phần quan trọng nhất của toàn bộ video.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">2. Bạn là ai: Giới thiệu ngắn gọn bản thân (tên, kinh nghiệm, số người đã giúp) trong 2</span></div>\n<p class=\"body-txt\">\ncâu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">3. Nỗi đau: Trình bày 1-2 nỗi đau chính của khán giả nếu họ không xem hoặc không hành</span></div>\n<p class=\"body-txt\">\nđộng theo video.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">4. Sự sung sướng: Trình bày những điều tốt đẹp khán giả sẽ đạt được nếu họ làm theo</span></div>\n<p class=\"body-txt\">\nnhững điều trong video.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">5. Chiến lược/Mục tiêu/Hành động: &quot;Làm gì&quot; để đưa khán giả từ nỗi đau sang sự sung</span></div>\n<p class=\"body-txt\">\nsướng. Đây là các bước cụ thể (cách 1, cách 2, cách 3...). Phần này thường dài nhất.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">6. Kêu gọi hành động: Kêu gọi khán giả làm một hành động cụ thể, rõ ràng và đơn giản</span></div>\n<p class=\"body-txt\">\n(đăng ký kênh, mua ngay, chia sẻ video).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Để video hấp dẫn, cần lồng ghép câu chuyện cá nhân vào các phần Nỗi đau và Sự sung</span></div>\n<p class=\"body-txt\">\nsướng, kể về hành trình của chính mình để tạo sự đồng cảm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Giới thiệu &quot;cấu trúc kể chuyện hấp dẫn&quot; theo hình chữ V hoặc chữ J (7 bước) để lồng</span></div>\n<p class=\"body-txt\">\nghép vào kịch bản video:\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">1. Điểm A (Hiện tại): Cuộc sống bình yên -&gt; gặp sự cố -&gt; nỗi đau.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">2. Kẻ thù: Gặp phải những người cản trở (người ngoài, gia đình, chính bản thân).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">3. Rào cản: Những khó khăn, sự kiện bên ngoài kéo xuống.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">4. Thần tiên/Bí kíp: Tìm thấy giải pháp, người hướng dẫn, khóa học... nhưng áp dụng ban</span></div>\n<p class=\"body-txt\">\nđầu chưa có kết quả ngay.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">5. Chính bạn: Tự thân hành động kiên trì, bền bỉ để tạo ra đột phá, cuộc đời đi lên.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">6. Điểm B (Mong muốn): Đạt được điều mình muốn (sự sung sướng).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">7. Bài học rút ra: Kinh nghiệm và sự chia sẻ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ví dụ về cấu trúc kể chuyện qua câu chuyện Cô bé Lọ Lem, các câu chuyện cổ tích khác.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Video phải &quot;tạo ra sự thay đổi&quot; cho khán giả, không chỉ cung cấp thông tin.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Giới thiệu &quot;công thức của sự thay đổi&quot;: D * V * FS &gt; R</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">D (Dissatisfy): Sự không hài lòng, nỗi đau hiện tại. Cần &quot;tăng&quot; nỗi đau của họ lên, cho họ</span></div>\n<p class=\"body-txt\">\nthấy điều &quot;ổn&quot; hiện tại không thực sự ổn (&quot;chưa thấy quan tài chưa nhỏ lệ&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">V (Vision): Tầm nhìn về sự sung sướng, điều họ muốn đạt được. Cần &quot;tăng&quot; tầm nhìn lên,</span></div>\n<p class=\"body-txt\">\ncho họ thấy cuộc sống tuyệt vời nếu thay đổi (mượn tầm nhìn của người làm video).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">FS (First Steps): Hành động đầu tiên cụ thể cần làm. &quot;Hành trình vạn dặm đều bắt đầu từ</span></div>\n<p class=\"body-txt\">\nnhững bước đi đầu tiên.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">R (Resistance): Sự kháng cự của bản thân (nỗi sợ, niềm tin tiêu cực, sự trì hoãn, &quot;sống</span></div>\n<p class=\"body-txt\">\ndưới dòng kẻ&quot;). Nhiệm vụ của người làm video là giúp họ &quot;giảm&quot; sự kháng cự này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Kết luận: Với kịch bản 6 ô, cấu trúc kể chuyện 7 bước và công thức thay đổi D*V*FS &gt; R,</span></div>\n<p class=\"body-txt\">\nhọc viên sẽ trở thành bậc diễn giả viết kịch bản video.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Video phải tạo ra sự thay đổi, không chỉ cung cấp thông tin, được thể hiện qua công thức</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">D*V*FS &gt; R.</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là kim chỉ nam cho mọi video marketing hiệu quả. Nó chuyển đổi</span></div>\n<p class=\"body-txt\">\ntư duy từ &quot;chỉ thông báo&quot; sang &quot;truyền cảm hứng hành động và chuyển hóa&quot;, giúp video\n \ntạo ra giá trị thực sự cho người xem và đạt được mục tiêu kinh doanh. Điều này phân\n \nbiệt một video đơn thuần với một video có sức ảnh hưởng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Thấu hiểu sâu sắc &quot;nỗi đau&quot; và &quot;sự sung sướng&quot; của khách hàng là nền tảng của mọi kịch</span></div>\n<p class=\"body-txt\">\nbản thành công.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Mọi nội dung video, từ tiêu đề đến kêu gọi hành động, đều phải xoay</span></div>\n<p class=\"body-txt\">\nquanh khách hàng. Nếu không biết khách hàng đang gặp vấn đề gì và khao khát điều gì,\n \nvideo sẽ không có tính liên quan, không chạm được đến cảm xúc và khó thuyết phục họ\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">hành động. Đây là bước đầu tiên để đảm bảo video có &quot;chất lượng&quot; thực sự.</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Lồng ghép câu chuyện cá nhân (theo cấu trúc V/J) vào kịch bản để tạo sự đồng cảm và</span></div>\n<p class=\"body-txt\">\ntin tưởng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Con người kết nối với nhau qua câu chuyện, không phải qua thông tin</span></div>\n<p class=\"body-txt\">\nkhô khan. Kể câu chuyện về hành trình của chính mình (về nỗi đau, khó khăn, cách vượt\n \nqua, thành công) giúp khán giả thấy mình trong đó, xây dựng sự tin cậy, truyền cảm\n \nhứng và cho thấy giải pháp của bạn là có thật, đã được kiểm chứng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">15 giây đầu tiên của tiêu đề video mang tính quyết định cho toàn bộ video.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Trong môi trường thông tin bão hòa ngày nay, khả năng thu hút sự</span></div>\n<p class=\"body-txt\">\nchú ý ngay lập tức là yếu tố sống còn. Nếu 15 giây đầu không đủ ấn tượng để giữ chân\n \nngười xem, video sẽ bị bỏ qua, bất kể nội dung sau đó có giá trị đến đâu. Nó quyết định\n \ntỷ lệ giữ chân và mức độ hiệu quả tổng thể của video.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Chưa thấy quan tài chưa nhỏ lệ.”\n \n“Hành trình vạn dặm đều bắt đầu từ những bước đi đầu tiên.”\n \n“Thành công của cái video này có thể là một tiếng, hai tiếng, ba tiếng nhưng mà 15 giây đầu\n \ntiên là mang tính quyết định đầu tiên.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Bài 5: Tìm từ khóa khách hàng đang tìm</h3>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Tóm tắt. Buổi giảng này hướng dẫn cách tìm kiếm từ khóa mà khách hàng đang tìm kiếm,</h3>\n<p class=\"body-txt\">\nđặc biệt ứng dụng vào việc tối ưu hóa công cụ tìm kiếm (SEO) cho video trên YouTube và\n \nGoogle. diễn giả trình bày ba phương pháp chính: sử dụng tính năng gợi ý của Google Search\n \nvà YouTube Search (kết hợp các dấu gạch dưới và dấu cách), sử dụng tiện ích mở rộng\n \nKeyword Everywhere của Chrome, và các công cụ trả phí như VidIQ và Tubebuddy. Cốt lõi là\n \nsau khi tìm được từ khóa, cần tích hợp chúng một cách chiến lược vào tiêu đề, mô tả và thẻ\n \n(tags/hashtags) của nội dung để tăng khả năng hiển thị và gợi ý.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Giới thiệu vấn đề: Việc tìm hiểu &quot;điều khách hàng muốn tìm&quot; là rất quan trọng nhưng</span></div>\n<p class=\"body-txt\">\nkhông hề dễ dàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cách 1: Dùng Google Search và Google Search Box (công cụ miễn phí)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Sử dụng gợi ý cuối trang Google Search:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Gõ từ khóa gốc (ví dụ: &quot;làm đẹp&quot;) vào ô tìm kiếm Google.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Kéo xuống cuối trang kết quả tìm kiếm để thấy các từ khóa liên quan được gợi ý.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Copy toàn bộ các gợi ý này vào một file Notepad/text.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Có thể lặp lại với các từ khóa gốc khác thuộc lĩnh vực kinh doanh của bạn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Sử dụng tính năng gợi ý của Google Search Box:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Gõ từ khóa vào ô tìm kiếm Google, các gợi ý sẽ xuất hiện ngay dưới ô nhập liệu.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ghi lại các gợi ý này vào Notepad.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Thủ thuật mở rộng tìm kiếm với dấu gạch dưới và dấu cách:</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Dấu gạch dưới (\\_): Đặt dấu gạch dưới sau từ khóa gốc (ví dụ: &quot;làm đẹp_&quot;) rồi nhấn phím</span></div>\n<p class=\"body-txt\">\ncách sẽ hiển thị các gợi ý liên quan sâu hơn (ví dụ: &quot;cách làm đẹp&quot;, &quot;bí quyết làm đẹp&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Dấu cách: Đặt dấu cách sau từ khóa gốc (ví dụ: &quot;làm đẹp &quot;) sẽ hiển thị các gợi ý từ khóa</span></div>\n<p class=\"body-txt\">\nphức tạp hơn, thường bắt đầu bằng từ khóa gốc (ví dụ: &quot;làm đẹp da mặt&quot;, &quot;làm đẹp từ\n \nthiên nhiên&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Có thể kết hợp cả dấu gạch dưới và dấu cách (ví dụ: &quot;làm đẹp _&quot;) và thử các từ khóa khác</span></div>\n<p class=\"body-txt\">\nnhau để tìm ra vô vàn từ khóa mà người dùng đang tìm kiếm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cách 2: Dùng YouTube Search (công cụ miễn phí)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Phương pháp tương tự như Google Search:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Gõ từ khóa vào ô tìm kiếm YouTube, các gợi ý sẽ xuất hiện.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Sử dụng dấu gạch dưới (\\_) và dấu cách để mở rộng các gợi ý từ khóa.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ngoài ra, có thể vào trực tiếp các video liên quan để xem cách họ sử dụng từ khóa (tiêu</span>< txt\">Chia sẻ lên Twitter: Chia sẻ video lên Twitter để tăng liên kết và khả năng hiển thị. Cần</span></div>\n<p class=\"body-txt\">\ncó tài khoản Twitter.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tăng tương tác bình luận: Trả lời các bình luận trên video của mình, kể cả bình luận của</span></div>\n<p class=\"body-txt\">\nbình luận, để tăng tương tác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Ghim bình luận: Ghim bình luận quan trọng hoặc bình luận đã trả lời lên đầu để tăng</span></div>\n<p class=\"body-txt\">\nlượt đăng ký.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Kiểm tra và tối ưu thẻ (tags): Rà soát các thẻ hiện có, thêm các thẻ liên quan đến nội</span></div>\n<p class=\"body-txt\">\ndung video (ví dụ: &quot;6 nhu cầu con người&quot;, &quot;cai nghiện thuốc lá&quot;, &quot;sức khỏe&quot;) và liên kết\n \nchúng đến nội dung khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Cài đặt màn hình kết thúc (end screen): Thêm màn hình kết thúc với các tùy chọn như</span></div>\n<p class=\"body-txt\">\nvideo gần nhất, video tốt nhất cho người xem, và một video liên quan khác (ví dụ: video\n \nvề &quot;cai nghiện&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Lời kêu gọi hành động (Call to Action): Đặt lời kêu gọi hành động rõ ràng trong video và</span></div>\n<p class=\"body-txt\">\nmô tả để khuyến khích người xem đăng ký, thích, và bật chuông thông báo.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Nghiên cứu từ khóa bổ sung: Tìm kiếm các từ khóa có điểm cao (ví dụ: &quot;thuốc cai thuốc&quot;)</span></div>\n<p class=\"body-txt\">\nvà ưu tiên đưa chúng lên đầu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tối ưu mô tả video: Sao chép tất cả các từ khóa đã chọn và đưa vào mô tả video để tăng</span></div>\n<p class=\"body-txt\">\nmật độ từ khóa.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #0097a7\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Xây dựng câu bằng từ khóa: Đặt các từ khóa vào các câu văn hoàn chỉnh và tự nhiên</span></div>\n<p class=\"body-txt\">\ntrong mô tả video. Điều này giúp bài viết chứa đầy đủ từ khóa và dễ SEO hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Sử dụng Pingomatic: Dùng Pingomatic để gửi liên kết video đến các công cụ tìm kiếm,</span></div>\n<p class=\"body-txt\">\ngiúp Google index video.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Bình luận trên video của chính mình: Bình luận vào các video khác của kênh mình (đặc</span></div>\n<p class=\"body-txt\">\nbiệt là video đang nổi) có chủ đề liên quan để kéo lượt xem và tương tác, tránh bình luận\n \nvào video của người khác để không bị coi là spam.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Tạo và sử dụng Playlist: Tạo các playlist mới với tên từ khóa cụ thể (ví dụ: &quot;cai nghiện</span></div>\n<p class=\"body-txt\">\nthuốc lá&quot;) và thêm video đang tối ưu cùng các video liên quan vào playlist đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Giám sát và điều chỉnh: Liên tục theo dõi kết quả SEO và thực hiện các điều chỉnh cần</span></div>\n<p class=\"body-txt\">\nthiết.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#0097a7\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#0097a7\">•</span><span class=\"bul-txt\">Chiến lược tích hợp SEO toàn diện trên nền tảng: Không chỉ tập trung vào một yếu tố</span></div>\n<p class=\"body-txt\">\nnhư thẻ hay mô tả, mà cần kết hợp nhiều hành động nhỏ như chia sẻ mạng xã hội, tương\n \ntác bình luận, s
