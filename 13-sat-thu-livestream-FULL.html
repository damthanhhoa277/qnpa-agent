<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#e8eaf0;font-family:'Segoe UI',Arial,sans-serif}
body{display:flex;flex-direction:column;align-items:center;padding:18px 10px 24px}

/* Book wrapper */
#book-wrap{width:720px;max-width:98vw;display:flex;flex-direction:column}

/* Top bar: title + page info */
#top-bar{display:flex;justify-content:space-between;align-items:center;
          margin-bottom:6px;padding:0 2px}
#book-title{font-size:13px;font-weight:600;color:#444;white-space:nowrap;
             overflow:hidden;text-overflow:ellipsis;max-width:60%}
#page-info{font-size:13px;color:#666;white-space:nowrap}

/* Progress bar */
#progress-bar{width:100%;height:3px;background:#d0d0d0;border-radius:2px;margin-bottom:10px}
#progress-fill{height:100%;border-radius:2px;transition:width .3s;background:#c62828}

/* Page */
.pg{width:100%;min-height:540px;background:#ffffff;border-radius:6px;
     box-shadow:0 2px 16px rgba(0,0,0,.12);overflow:hidden}

/* Cover */
.pg-cover{display:flex;justify-content:center;align-items:center;min-height:540px}
.cover-wrap{text-align:center;padding:60px 40px}
.cover-tag{font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;font-weight:600}
.cover-title{font-size:28px;font-weight:700;color:#1a1a1a;line-height:1.4;margin-bottom:16px}
.cover-sub{font-size:14px;font-weight:500}

/* Content page */
.pg-content{}
.pg-inner{padding:28px 36px 32px;overflow-y:auto;max-height:540px}
.pg-inner::-webkit-scrollbar{width:5px}
.pg-inner::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

/* Typography */
.sec-hdr{font-size:12px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
          margin:18px 0 8px;padding-bottom:5px;border-bottom:1px solid #eee}
.sec-hdr:first-child{margin-top:0}
.body-txt{font-size:14px;color:#2d2d2d;line-height:1.8;margin-bottom:10px;text-align:justify}
.bullet{display:flex;gap:10px;margin:5px 0}
.bul-dot{font-size:18px;line-height:1.4;flex-shrink:0;margin-top:-1px}
.bul-txt{font-size:13.5px;color:#2d2d2d;line-height:1.7}

/* Navigation */
#nav{display:flex;align-items:center;gap:14px;margin-top:12px}
.nav-btn{background:#fff;border:2px solid #c62828;color:#c62828;padding:8px 24px;
          border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;
          transition:all .15s;letter-spacing:.5px}
.nav-btn:hover{background:#c62828;color:#fff}
.nav-btn:disabled{opacity:.35;cursor:default}
#page-jump{width:52px;text-align:center;border:1px solid #ccc;border-radius:5px;
            padding:6px;font-size:13px;color:#444}
</style>
</head>

"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Bài 9: Một số lưu ý cần thiết</h3></div></div>",

"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Bài 14: Những chuẩn bị quan trọng trước khi làm livestream</h3></div></div>",

"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Bài 18: Tổng kết sơ lược</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Chương 4</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Bài 19: Làm thế nào tìm ra TREND để có một Livestream thu hút?</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Bài 20: Để có Livestream hiệu quả bạn cần yếu tố kỹ thuật gì?</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Bài 21: Yếu tố nội dung trong khi Livestream</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Bài 22: Những câu hỏi bạn cần quan tâm</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Bài 23: Những mẹo để Module nội dung thu hút</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Bài 24: Bạn cần làm gì để tổng hợp được một livestream hoàn chỉnh?</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Bài 24: Bạn cần làm gì để tổng hợp được một livestream hoàn chỉnh?</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Bài 26: Một số mẹo để có Module hoàn chỉnh</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Bài 27: Kịch bản bán hàng - Một số lưu ý</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Bài 28: Tổng kết khóa học</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Chương 1</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Bài 1: Tại sao lại cần CHIA SẺ trên facebook?</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Tóm tắt. Buổi giảng này tập trung vào chiến lược tối ưu hóa hiệu quả trên Facebook. Diễn giả nhấn mạnh rằng thay vì chỉ chú trọng vào tương tác để bán hàng trực tiếp, các doanh nghiệp cần chuyển hướng tập trung vào chỉ số &quot;chia sẻ&quot; (share). Lượt chia sẻ là tham số quan trọng nhất vì nó giúp lan tỏa nội dung đến một lượng lớn người dùng một cách hiệu quả, do Facebook được thiết kế để thúc đẩy chia sẻ. Bằng cách tạo ra nội dung khuyến khích chia sẻ, doanh nghiệp có thể đạt được kết quả tốt nhất trên nền tảng này.</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Ý chính</h3>\n<p class=\"body-txt\">\nThực trạng và sai lầm phổ biến: Hầu hết mọi người đang tập trung vào đo lường tương tác để bán hàng hoặc chốt đơn trên Facebook.\n \nHệ quả của việc chỉ tập trung bán hàng: Khi chỉ dùng Facebook để bán hàng, tương tác của trang/nội dung sẽ dần mất đi.\n \nTham số quan trọng nhất trên Facebook: Thay vì tập trung vào bán hàng, cần tập trung vào tham số &quot;chia sẻ&quot;.\n \nSức mạnh của lượt chia sẻ:\n \nMột người dùng Facebook trung bình có khoảng 360 người bạn (diễn giả dùng số 340-350 để tính toán).\n \nNếu một nội dung nhận được khoảng 340 lượt chia sẻ, nó có thể tiếp cận được khoảng 100.000 người.\n \nTrung bình, một lượt chia sẻ tương đương với khoảng 350 lượt xem/tiếp cận.\n \nPhân biệt các chỉ số: Lượt chia sẻ là quan trọng nhất, không phải lượt xem (view) hay bình luận (comment).\n \nCách tính lượt chia sẻ: Lượt chia sẻ được tính dựa trên *số người* chia sẻ, không phải tổng số lần chia sẻ của cùng một người.\n \nChiến lược tối ưu: Tác động vào hành vi để người xem chia sẻ nội dung nhiều hơn sẽ mang lại hiệu quả tốt nhất.\n \nSo sánh Facebook và YouTube: Yếu tố quan trọng nhất của Facebook là lượt chia sẻ, trong khi của YouTube là lượt xem.\n \nLý do cốt lõi: Facebook được thiết kế để chia sẻ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Kết luận: Mọi hoạt động trên Facebook nên hướng tới mục tiêu làm sao để nội dung được chia sẻ nhiều nhất.</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">★ Điểm quan trọng nhất</h3>\n<p class=\"body-txt\">\nChuyển trọng tâm từ &quot;bán hàng/tương tác&quot; sang &quot;chia sẻ&quot;: Đây là sự thay đổi tư duy cốt lõi mà diễn giả đề xuất. Thay vì trực tiếp cố gắng bán hàng hay chỉ quan tâm lượt tương tác (like, comment), cần tập trung vào việc tạo ra nội dung khiến người khác muốn chia sẻ. Điều này quan trọng vì nó tận dụng đúng bản chất và thuật toán của Facebook để lan tỏa nội dung hiệu quả hơn, thay vì đi ngược lại nó.\n \nSức mạnh lan tỏa cấp số nhân của lượt chia sẻ: Con số 1 lượt chia sẻ = ~350 lượt tiếp cận, và 340 lượt chia sẻ = ~100.000 lượt tiếp cận đã định lượng rõ ràng giá trị của việc chia sẻ. Đây là insight đắt giá vì nó cho thấy tiềm năng tiếp cận khổng lồ mà các chỉ số khác không thể sánh bằng, giúp người học hình dung được tầm quan trọng thực sự của hành động chia sẻ.\n \nBản chất thiết kế của Facebook: Diễn giả nhấn mạnh &quot;Facebook được thiết kế để chia sẻ.&quot; Đây là một insight nền tảng, giải thích lý do tại sao lượt chia sẻ lại quan trọng đến vậy. Khi hiểu được mục đích cốt lõi của nền tảng, người làm marketing có thể xây dựng chiến lược phù hợp và hiệu quả hơn, thay vì chỉ áp dụng các thủ thuật bề nổi.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Thay vì tập trung vào bán hàng thì các anh chị sẽ tập trung vào một cái tham số mới. Đó là tham số chia sẻ.”\n \n“Lượt chia sẻ là quan trọng nhất trong các lượt. Không phải quan trọng lượt view, không phải lượt comment mà lượt chia sẻ.”\n \n“Bởi vì Facebook được thiết kế để chia sẻ.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Bài 2: Cách thực hiện một bức ảnh để có lượng tương tác lớn nhất - được Share nhiều nhất</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Tóm tắt. Buổi học này hướng dẫn kỹ thuật đơn giản để tăng lượt chia sẻ trên mạng xã hội bằng cách sử dụng &quot;câu trích dẫn truyền cảm hứng&quot; kết hợp với hình ảnh phù hợp. Diễn giả trình bày cách tìm kiếm câu trích dẫn, chỉnh sửa cho ngắn gọn và sử dụng phần mềm Canva để thiết kế hình ảnh, đồng thời nhấn mạnh tầm quan trọng của việc chọn ảnh có liên quan và tối ưu kích thước cho Facebook để đạt hiệu quả cao nhất. Mục tiêu là tạo ra nội dung dễ lan truyền chỉ trong khoảng 5-10 phút.</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Ý chính</h3>\n<p class=\"body-txt\">\nSử dụng câu trích dẫn: Đây là kỹ thuật đơn giản giúp tăng lượt chia sẻ.\n \nThời gian và hiệu quả: Chỉ mất khoảng 5-10 phút để tạo nhưng có thể đạt hàng trăm lượt chia sẻ.\n \nCông cụ: Sử dụng phần mềm Canva (trên web hoặc app điện thoại) để thiết kế ảnh.\n \nTìm kiếm câu trích dẫn:\n \nTìm kiếm từ khóa &quot;câu trích dẫn truyền cảm hứng&quot; bằng tiếng Việt hoặc &quot;inspiration quote&quot; bằng tiếng Anh trên Google, Facebook, YouTube.\n \nNên ưu tiên tìm bằng tiếng Anh rồi dịch sang tiếng Việt để có nhiều lựa chọn hơn.\n \nChọn ảnh phù hợp:\n \nẢnh phải phù hợp (liên quan) với nội dung của câu trích dẫn để tăng lượt chia sẻ.\n \nNên sử dụng ảnh của chính mình (tự chụp) từ thư viện ảnh hoặc điện thoại.\n \nẢnh có thể là ảnh phong cảnh, con người, hoặc thậm chí ảnh selfie nhưng phải *liên quan* đến câu trích dẫn.\n \nChỉnh sửa câu trích dẫn:\n \nNếu câu trích dẫn gốc dài, hãy viết lại cho ngắn gọn, súc tích hơn nhưng vẫn giữ ý nghĩa.\n \nTối ưu hình ảnh trên Canva:\n \nChọn kích thước ảnh phù hợp với nền tảng mạng xã hội (ví dụ: Facebook Post trên Canva).\n \nThêm câu trích dẫn vào ảnh.\n \nChỉnh sửa ảnh: điều chỉnh màu sắc, độ tương phản, bộ lọc (ví dụ: Epic/Anh hùng cho phong cách cổ điển, hùng tráng).\n \nThêm lớp nền (background) cho chữ nếu cần để chữ nổi bật hơn (ví dụ: hình vuông/hình trái tim màu đen, giảm độ trong suốt và đưa về phía sau).\n \nĐảm bảo font chữ không bị lỗi và kích thước chữ phù hợp.\n \nLật ảnh (Flip) để ánh mắt của chủ thể trong ảnh hướng về phía chữ, tăng hiệu quả nhìn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">★ Điểm quan trọng nhất</h3>\n<p class=\"body-txt\">\nSự liên quan giữa hình ảnh và câu trích dẫn: Đây là yếu tố then chốt quyết định mức độ lan truyền. Một hình ảnh đơn giản nhưng có ý nghĩa kết hợp với câu trích dẫn phù hợp sẽ tạo ra cảm xúc và khuyến khích chia sẻ. (Ví dụ: câu nói về sự kiên trì đi kèm ảnh người đang vượt qua khó khăn).\n \nSử dụng ảnh tự chụp/cá nhân: Diễn giả nhấn mạnh việc dùng ảnh &quot;của bạn&quot;, &quot;do bạn chụp&quot; thay vì ảnh copy. Điều này giúp nội dung trở nên chân thực, độc đáo và dễ tạo sự đồng cảm, kết nối hơn với người xem.\n \nTối ưu cho nền tảng (Facebook Post): Việc chọn đúng kích thước và định dạng ảnh trên Canva (ví dụ: Facebook Post) đảm bảo bài đăng hiển thị tốt nhất, không bị cắt xén, giúp tăng tương tác và trải nghiệm người dùng.\n \nChỉnh sửa để tăng hiệu quả hình ảnh: Các bước chỉnh màu, độ tương phản, thêm lớp nền cho chữ, và đặc biệt là lật ảnh để hướng ánh nhìn về chữ, đều là những thủ thuật nhỏ nhưng có tác động lớn đến sự thu hút và khả năng truyền tải thông điệp.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Ảnh phù hợp với câu trích dẫn thì sẽ có lượt chia sẻ tốt hơn.”\n \n“Bạn không cần phải sản phẩm của mình, cũng không cần phải bạn, chỉ cần bây giờ có một cái ảnh mà bạn có thể chia sẻ được thật tốt.”\n \n“Nếu bạn đi xuống địa ngục, hãy cứ tiếp tục bước đi.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Bài 3: Một số lưu ý cần ghi nhớ</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Tóm tắt. Buổi học này tập trung vào chiến lược sử dụng hình ảnh và câu trích dẫn để xây dựng cộng đồng, đo lường sự quan tâm của khán giả, từ đó xác định nội dung hiệu quả cho livestream. Thay vì trực tiếp bán hàng qua livestream ngay lập tức, người học được khuyến khích sử dụng ảnh cá nhân, có chủ đích và tương ứng với các câu trích dẫn, để nhanh chóng và tiết kiệm chi phí thử nghiệm các chủ đề, tạo sự đồng cảm và kích thích người xem chia sẻ. Mục tiêu cuối cùng là xây dựng được &quot;thính&quot; (khán giả quan tâm) trước, sau đó mới tiến hành livestream bán hàng với nội dung đã được kiểm chứng.</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Ý chính</h3>\n<p class=\"body-txt\">\nKhông sử dụng ảnh thương mại hoặc ảnh tìm kiếm trên mạng cho nội dung.\n \nSử dụng ảnh cá nhân có chủ đích: Ảnh chụp bằng điện thoại của bản thân, có mục đích rõ ràng.\n \nSưu tầm câu trích dẫn: Dùng ứng dụng như &quot;Keep&quot; để lưu trữ các câu nói ý nghĩa.\n \nGhép ảnh cá nhân với câu trích dẫn: Nội dung của ảnh phải tương ứng với nội dung của câu trích dẫn.\n \nBố cục câu trích dẫn trên ảnh: Câu trích dẫn nên chiếm khoảng một nửa diện tích ảnh để làm nổi bật.\n \nMục tiêu là lan tỏa hình ảnh, nội dung chính là câu trích dẫn: Sử dụng hình ảnh của mình để thay thế các hình ảnh truyền cảm hứng chung chung.\n \nLoại hình ảnh nên sử dụng:\n \nHình ảnh thể hiện tình cảm nhưng không rõ mặt (ví dụ: ảnh yêu nhau nhưng không rõ mặt).\n \nCó thể đặt logo hoặc vật phẩm nhỏ mang dấu ấn cá nhân (trên áo, vật cầm tay) để người xem cảm thấy gần gũi hơn.\n \nMục tiêu chính của việc này là tạo ra &quot;share&quot; và sự đồng cảm: Khi người đọc cảm thấy họ &quot;giống như ở trong cái ảnh đấy&quot;, họ sẽ chia sẻ.\n \nCần phải thí nghiệm và đo lường: Không có công thức đúng ngay từ đầu, mỗi đối tượng khán giả có thể phản ứng khác nhau.\n \nSử dụng ảnh để đo lường thị trường: Ảnh nào được chia sẻ nhiều nhất sẽ là chủ đề tiềm năng để làm livestream.\n \nƯu điểm của ảnh so với livestream: Ảnh làm nhanh hơn, thí nghiệm dễ hơn, mất ít thời gian hơn, mang lại nhiều cơ hội thử nghiệm hơn.\n \nChiến lược xây dựng khán giả (&quot;build audience&quot;) trước khi bán hàng:\n \nHầu hết các kênh livestream bán hàng trực tiếp không thành công nếu không phải &quot;boss lớn&quot; vì không có ai xem.\n \nChiến lược là tìm ra những nội dung (tạm gọi là &quot;thính&quot;) để xây dựng cộng đồng những người quan tâm.\n \nCác &quot;hot girl/boy&quot; thành công livestream vì họ đã có thời gian xây dựng khán giả trước đó.\n \nMục tiêu của tạo ảnh là để đo lường đề tài hấp dẫn, sau đó chọn đề tài để làm livestream.\n \nSự chuyển hóa cá nhân: Khi liên tục gắn những bức ảnh của mình với các câu trích dẫn, bản thân người làm nội dung cũng sẽ thay đổi, phát triển một &quot;con người&quot; mới.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">★ Điểm quan trọng nhất</h3>\n<p class=\"body-txt\">\nChiến lược &quot;Thí nghiệm&quot; nội dung bằng ảnh trước khi Livestream: &quot;Cái ảnh nào mà share nhiều thì cái ảnh đó chính là nội dung để làm livestream.&quot; Điểm này cực kỳ quan trọng vì nó cung cấp một phương pháp tiết kiệm thời gian và nguồn lực để xác định những chủ đề thực sự thu hút khán giả. Thay vì đầu tư lớn vào một buổi livestream có thể thất bại, bạn có thể nhanh chóng thử nghiệm nhiều ý tưởng bằng hình ảnh, sau đó chỉ tập trung nguồn lực vào những gì đã được chứng minh là hiệu quả.\n \nXây dựng cộng đồng (&quot;Build Audience&quot;) trước khi bán hàng: &quot;Cần phải làm đó là build audience, tức là xây dựng người nghe ta trước.&quot; Đây là cốt lõi của marketing bền vững. Nhiều người mắc sai lầm khi cố gắng bán hàng ngay lập tức mà không có khán giả. Diễn giả nhấn mạnh rằng việc xây dựng một nhóm người quan tâm, tương tác với nội dung của bạn là bước đi chiến lược, đảm bảo rằng khi bạn có sản phẩm/dịch vụ để bán, đã có sẵn một tệp khách hàng tiềm năng sẵn sàng lắng nghe.\n \nTạo sự đồng cảm và cảm giác &quot;họ giống như ở trong ảnh đấy&quot;: &quot;Điều gì mà khiến cho họ cảm thấy họ giống như ở trong cái ảnh đấy thì họ sẽ share.&quot; Insight này đi sâu vào tâm lý người dùng. Khi nội dung chạm đến cảm xúc hoặc kinh nghiệm cá nhân của họ, họ sẽ cảm thấy kết nối và có động lực chia sẻ. Điều này không chỉ giúp nội dung lan tỏa mà còn xây dựng một mối quan hệ sâu sắc hơn giữa người tạo nội dung và khán giả.\n \nSử dụng hình ảnh cá nhân, có chủ đích để tạo sự chân thực và dấu ấn riêng: &quot;Dùng hình ảnh của mình để thay cho những cái hình ảnh truyền cảm hứng như vậy.&quot; Điều này quan trọng vì nó giúp xây dựng thương hiệu cá nhân mạnh mẽ và độc đáo, phân biệt bạn với hàng ngàn nội dung sao chép khác trên mạng. Sự chân thực từ ảnh cá nhân dễ tạo niềm tin và kết nối cảm xúc hơn so với ảnh stock hay ảnh thương mại.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Nội dung của ảnh tương ứng với nội dung của câu trích dẫn.”\n \n“Cái ảnh nào mà share nhiều thì cái ảnh đó chính là nội dung để làm livestream.”\n \n“Khi mà chúng ta bắt đầu gắn những cái bức ảnh với những câu trích dẫn ấy thì mình đã chuyển thành con người khác rồi.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Bài 4: Bí mật để có bức ảnh đẹp</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Tóm tắt. Buổi giảng tập trung vào các nguyên tắc và kỹ thuật bố cục hình ảnh hiệu quả trên mạng xã hội, đặc biệt là để tăng tương tác và chia sẻ. Diễn giả chỉ ra sai lầm phổ biến là cố gắng nhồi nhét hình ảnh cá nhân hoặc thương hiệu vào bức ảnh khi chưa đủ nổi tiếng, điều này thực tế làm giảm lượt chia sẻ. Thay vào đó, buổi học nhấn mạnh việc áp dụng &quot;tỷ lệ vàng&quot; (quy tắc 1/3) để đặt các yếu tố quan trọng và định hướng chủ thể &quot;hướng vào bên trong&quot; bức hình, tạo ra khoảng trống phía trước mặt chủ thể, tất cả nhằm mục đích tạo ra một bố cục hài hòa, chuyên nghiệp và thu hút.</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Ý chính</h3>\n<p class=\"body-txt\">\nSai lầm phổ biến 1: Cố gắng đưa khuôn mặt hoặc thương hiệu cá nhân vào hình ảnh khi chưa có tên tuổi rõ ràng, điều này làm giảm lượt chia sẻ.\n \nGiải pháp 1: Nếu chưa nổi tiếng, hãy đưa những chi tiết thuộc về mình (nửa thân, tay, vật dụng, v.v.) nhưng không phải khuôn mặt chính diện, để tránh bị ăn cắp mà không làm giảm tương tác.\n \nNgoại lệ: Nếu khuôn mặt đã là &quot;nhân hiệu&quot; (thương hiệu, logo cá nhân) như Tony Robbins, thì có thể đưa vào.\n \nNguyên tắc 1: Sự liên quan: Hình ảnh phải liên quan chặt chẽ đến câu trích dẫn đi kèm.\n \nSai lầm phổ biến 2: Đặt câu trích dẫn ở vị trí không trang trọng (ví dụ: dưới chân, dưới váy), điều này làm giảm tính tương tác.\n \nGiải pháp 2: Chọn góc tốt nhất trong bức ảnh để đặt câu trích dẫn một cách trang trọng.\n \nKích thước ảnh cho Facebook: Thường là cỡ khoảng 4:5, không phải cỡ dài 16:9 (như phim) hay vuông hẳn (như Instagram).\n \nKỹ thuật 1: Quy tắc 1/3 (Tỷ lệ vàng, Đường vàng, Điểm vàng):\n \nTất cả các bức ảnh đẹp đều có bố cục theo quy tắc này.\n \nChia bức ảnh thành 9 ô vuông bằng 2 đường dọc và 2 đường ngang (đường 1/3).\n \nĐặt các yếu tố quan trọng, đẹp của bức ảnh lên các đường 1/3 hoặc tại các giao điểm của chúng (các &quot;điểm vàng&quot;).\n \nĐây là nguyên tắc đã được nghiên cứu về tâm lý, liên quan đến chuỗi số Fibonacci và được sử dụng từ thời phục hưng.\n \nKỹ thuật 2: Hướng của chủ thể (hướng vào bên trong):\n \nChủ thể (nhân vật, vật thể chính) trong ảnh phải hướng vào bên trong bức hình.\n \nĐiều này có nghĩa là khoảng trống *trước mặt* hoặc *trước hướng đi* của chủ thể phải rộng hơn khoảng trống phía sau.\n \nNếu khoảng trống phía sau rộng hơn, bức ảnh sẽ bị &quot;nghịch mắt&quot; và kém thu hút.\n \nÁp dụng thực tế: Mở chức năng &quot;đường lưới&quot; (gridline) trên camera điện thoại để dễ dàng áp dụng quy tắc 1/3. Khi chụp chân dung, đặt mắt, mặt hoặc mũi chủ thể vào một trong các vị trí 1/3 và hướng mặt vào bên trong khung hình.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">★ Điểm quan trọng nhất</h3>\n<p class=\"body-txt\">\nChống lại xu hướng &quot;nhồi nhét thương hiệu cá nhân&quot; (đối với người mới): Đây là một lời khuyên phản trực giác. Nhiều người tin rằng càng xuất hiện nhiều thì càng tốt, nhưng diễn giả đã thí nghiệm và chỉ ra rằng việc cố gắng đưa khuôn mặt/thương hiệu vào ảnh khi chưa đủ nổi tiếng sẽ làm giảm tương tác và lượt chia sẻ. Điều này giúp các cá nhân/thương hiệu mới tiết kiệm công sức và định hướng lại chiến lược nội dung, tập trung vào giá trị hơn là quảng bá bản thân một cách vội vã.\n \nSử dụng &quot;tỷ lệ vàng&quot; (quy tắc 1/3) và nguyên tắc &quot;hướng vào bên trong&quot; là nền tảng của bố cục ảnh thu hút: Đây không chỉ là các &quot;mẹo vặt&quot; mà là những nguyên tắc nghệ thuật đã được chứng minh qua lịch sử (nghệ thuật Phục Hưng) và khoa học (tâm lý học, chuỗi Fibonacci). Việc hiểu và áp dụng chúng giúp tạo ra những hình ảnh có bố cục hài hòa, chuyên nghiệp và có sức hút tự nhiên, nâng cao chất lượng nội dung thị giác mà không cần phải có năng khiếu nghệ thuật bẩm sinh.\n \nKhả năng ứng dụng thực tế với &quot;đường lưới&quot; trên điện thoại: Diễn giả đã đưa ra một bước hành động cụ thể và dễ dàng thực hiện ngay lập tức: bật đường lưới trên camera điện thoại. Điều này làm cho các nguyên tắc bố cục phức tạp trở nên dễ tiếp cận với mọi người, chuyển từ lý thuyết trừu tượng sang thực hành cụ thể, giúp người học cải thiện kỹ năng chụp ảnh và livestream ngay lập tức.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Khi chúng ta nhồi ảnh mặt mình và thương hiệu của mình ấy thì nó sẽ bị giảm cái lượt share đi.”\n \n“Cái gì quan trọng, đưa nó vào đường 1/3. Cái gì quan trọng, đưa nó vào điểm 1/3.”\n \n“Cái khoảng trống trước mặt bao giờ cũng rộng hơn khoảng trống sau lưng.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Bài 5: Những chú ý và vật dụng cần thiết để có một buổi livestream thành công</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Tóm tắt. Buổi giảng tập trung vào các kỹ thuật livestream chuyên nghiệp nhằm nâng cao chất lượng hình ảnh, âm thanh và sự tương tác với khán giả. Diễn giả hướng dẫn cách sử dụng nhiều góc camera, lựa chọn micro rời và bộ điều chỉnh âm thanh để có chất lượng tốt nhất. Điểm đặc biệt là mẹo đặt camera trực tiếp vào vị trí hiển thị văn bản đang đọc để tạo cảm giác giao tiếp bằng mắt với người xem, giúp buổi livestream trở nên sống động và thu hút hơn.</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Ý chính</h3>\n<p class=\"body-txt\">\nSử dụng nhiều camera: Khi livestream, có thể gắn 2 camera cùng lúc để tạo nhiều góc quay (gần, xa, cận cảnh, toàn cảnh).\n \nThiết lập đa góc máy chuyên nghiệp: Để livestream chuyên nghiệp, cần dùng phần mềm và nhiều camera khác nhau để chuyển đổi góc quay. Tối thiểu nên có 2 camera.\n \nThiết bị camera đề xuất:\n \nDiễn giả từng dùng một camera Microsoft đã 6 năm, âm thanh và hình ảnh cực tốt (hiện không mua được nữa).\n \nCamera Logitech 930E (hoặc 940), được diễn giả đánh giá là tốt nhất thế giới trong tầm hiểu biết, là Full HD.\n \nCải thiện chất lượng âm thanh:\n \nCamera thường có micro tích hợp, nhưng tốt nhất vẫn là mua micro rời.\n \nĐể âm thanh hoàn hảo hơn nữa, nên mua micro rời kết hợp với bộ điều chỉnh âm thanh (sound card hoặc mixer/sao cạc).\n \nCó những bộ mixer nhỏ gọn, giá khoảng 1 triệu mấy đến 3 triệu đồng, dễ sử dụng hơn các loại chuyên nghiệp đắt tiền.\n \nNên dùng micro lớn để thu âm tốt hơn và chọn loại &quot;micro định hướng&quot; để chỉ thu đúng hướng người nói, tránh tạp âm.\n \nMẹo tạo tương tác mắt (eye contact) với khán giả:\n \nThay vì đặt webcam ở góc chéo, hãy đặt camera chính giữa màn hình.\n \nTốt nhất là đặt camera vào *đúng vị trí của văn bản/chữ* mà bạn đang đọc trên màn hình (như kiểu teleprompter). Khi đó, bạn nhìn thẳng vào chữ thì khán giả sẽ cảm thấy bạn đang nhìn thẳng vào họ, tạo cảm giác giao tiếp trực tiếp.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">★ Điểm quan trọng nhất</h3>\n<p class=\"body-txt\">\nSử dụng đa góc máy quay để tăng tính chuyên nghiệp và thu hút: Việc dùng một chiếc điện thoại duy nhất chỉ cho một góc quay, dễ gây nhàm chán. Sử dụng 2 hoặc nhiều camera và phần mềm chuyển đổi góc quay giúp buổi livestream trở nên năng động, chuyên nghiệp hơn, giữ chân người xem tốt hơn qua việc thay đổi điểm nhìn và nội dung hiển thị.\n \nĐầu tư vào hệ thống âm thanh chất lượng cao (micro rời và sound card): Hình ảnh có thể ổn, nhưng âm thanh kém chất lượng sẽ phá hỏng toàn bộ trải nghiệm của người xem. Micro rời, đặc biệt là micro định hướng, cùng với bộ điều chỉnh âm thanh, đảm bảo giọng nói rõ ràng, loại bỏ tạp âm và truyền tải thông điệp hiệu quả nhất, đây là yếu tố then chốt cho mọi buổi thuyết trình hoặc giao tiếp trực tuyến quan trọng.\n \nMẹo đặt camera vào vị trí văn bản đang đọc để tạo cảm giác giao tiếp bằng mắt trực tiếp: Đây là một &quot;bí quyết&quot; tâm lý quan trọng. Khi người livestream đọc văn bản nhưng mắt vẫn nhìn thẳng vào camera (do camera được đặt ngay trên/dưới văn bản), khán giả sẽ cảm thấy được nói chuyện trực tiếp. Điều này tạo sự kết nối, xây dựng lòng tin và khiến người xem cảm thấy được quan tâm, cực kỳ hiệu quả trong các buổi giới thiệu sản phẩm, thuyết trình hay giao tiếp cá nhân.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“ít nhất bao giờ cũng vậy ít nhất là hai camera.”\n \n“Ngon nhất thì vẫn mua micro rời.”\n \n“nó giống như thể là mình đang nhìn thẳng vào khán giả vậy.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Chương 2</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Bài 6: Bộ câu hỏi để điều tra thị trường khách hàng</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Tóm tắt. Buổi giảng này tập trung vào một bảng câu hỏi quan trọng để kiểm tra thị trường, đặc biệt dành cho những người mới bắt đầu làm marketing. Cốt lõi là xác định chính xác đối tượng khách hàng mục tiêu thông qua việc đặt ra các câu hỏi cụ thể về người dùng/người mua, giới tính, độ tuổi và đặc biệt là mong muốn của người làm marketing về hành động của khách hàng. Mục tiêu là thu thập thông tin cụ thể, không giả định để hiểu rõ thị trường và khách hàng.</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Ý chính</h3>\n<p class=\"body-txt\">\nBuổi giảng tập trung vào một bộ câu hỏi quan trọng dùng để kiểm tra và xác lập thị trường cho những người chưa biết nhiều về marketing.\n \nYêu cầu chung khi điền bảng câu hỏi: càng cụ thể càng tốt và không có bất kỳ giả định nào được đưa ra (vì mọi giả định đều có thể sai).\n \nBước 1: Viết ra sản phẩm của mình và suy nghĩ về &quot;ai cần dùng nó&quot;.\n \nBước 2: Phân biệt &quot;người dùng&quot; và &quot;người mua&quot; (ví dụ: học sinh là người dùng, cha mẹ là người mua khóa học cho con). Người mua có thể khác người dùng.\n \nBước 3: Sau khi có mô tả sản phẩm, đặt câu hỏi về đối tượng mục tiêu:\n \nGiới tính: Đàn ông, đàn bà hay cả hai?\n \nTuổi: Người trẻ, người trưởng thành, người ở tuổi 30, hay người cao tuổi? (Cần rõ ràng về độ tuổi).\n \nBước 4 (rất quan trọng, thường bị bỏ qua):\n \n&quot;Mong muốn của bạn đối với thị trường mục tiêu là gì?&quot;\n \n&quot;Hành động mà bạn muốn họ làm là gì?&quot;\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">★ Điểm quan trọng nhất</h3>\n<p class=\"body-txt\">\n&quot;Không có bất kỳ giả định nào được đưa ra. Tức là gì ạ? Tức là chúng ta phải kiểm tra tất cả, không thể giả định được. Bởi vì tất cả những giả định đều có thể sai.&quot;\n \nVì sao quan trọng: Đây là nguyên tắc nền tảng trong nghiên cứu thị trường. Giả định có thể dẫn đến hiểu sai về khách hàng và thị trường, từ đó đưa ra các chiến lược marketing không hiệu quả, tốn kém thời gian và nguồn lực. Việc kiểm tra và xác minh thông tin là bắt buộc để có cơ sở dữ liệu vững chắc.\n \nPhân biệt rõ ràng &quot;người dùng&quot; và &quot;người mua&quot; (ví dụ về son và khóa học).\n \nVì sao quan trọng: Hai đối tượng này có thể khác nhau và có động cơ, nhu cầu, hành vi khác nhau. Việc xác định chính xác ai là người dùng và ai là người mua giúp định hình thông điệp marketing phù hợp cho từng đối tượng, tối ưu hóa hiệu quả tiếp cận và chuyển đổi.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Câu hỏi &quot;Mong muốn của bạn đối với thị trường mục tiêu là gì?&quot; và &quot;Hành động mà bạn muốn họ làm là gì?&quot;</h3>\n<p class=\"body-txt\">\nVì sao quan trọng: Đây là yếu tố quyết định sự thành công của chiến dịch marketing. Không chỉ hiểu khách hàng, người làm marketing còn cần xác định rõ ràng mục tiêu của mình: muốn khách hàng làm gì sau khi tiếp cận thông điệp? Nó giúp định hướng toàn bộ chiến lược, từ nội dung, kênh truyền thông đến lời kêu gọi hành động (CTA), đảm bảo mọi nỗ lực đều hướng tới một mục tiêu cụ thể và đo lường được.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Đây là cái câu hỏi quan trọng mà ai làm marketing cũng phải trả lời.”\n \n“Càng cụ thể càng tốt.”\n \n“Không có bất kỳ giả định nào được đưa ra. Tức là gì ạ? Tức là chúng ta phải kiểm tra tất cả, không thể giả định được. Bởi vì tất cả những giả định đều có thể sai.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Bài 7: 7 mục tiêu Marketing để có thể bán hàng tốt</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Tóm tắt. Buổi giảng tập trung vào việc xác định và phân tích sâu sắc khách hàng mục tiêu để tối ưu hóa chiến lược marketing. Diễn giả nhấn mạnh tầm quan trọng của việc đặt mục tiêu rõ ràng cho các chiến dịch, từ nâng cao nhận thức thương hiệu đến bán sản phẩm hay tăng tương tác. Cốt lõi của bài học là phân tích chi tiết chân dung khách hàng thông qua sở thích, thói quen, phong cách sống, và đặc biệt là cách sản phẩm/thương hiệu có thể cải thiện cuộc sống của họ. Ngoài ra, việc học hỏi từ đối thủ cũng được coi là chiến lược then chốt để phát triển.</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Ý chính</h3>\n<p class=\"body-txt\">\nSáu mục tiêu marketing cơ bản:\n \nNâng cao nhận thức về thương hiệu (hoặc bản thân/sản phẩm cụ thể).\n \nBán một sản phẩm cụ thể.\n \nGiúp mọi người đăng ký vào hệ thống email (khóa học IPS).\n \nTăng tương tác trên bài viết/livestream, đặc biệt nhấn mạnh &quot;share&quot;.\n \nCó lượng người truy cập vào website hoặc blog (IPS).\n \nCác mục tiêu marketing khác.\n \nXác định rõ ràng mục tiêu marketing là điều tối quan trọng để dẫn hướng mọi người.\n \nXác định khán giả mục tiêu ở đâu (vị trí địa lý cụ thể hoặc toàn cầu) dựa trên mục đích marketing và mục tiêu muốn đạt được.\n \nPhân tích sở thích của người mua sản phẩm qua nhiều khía cạnh: loại nhạc, thể thao, thương hiệu thời trang/sản phẩm họ dùng, cửa hàng họ ghé thăm (check-in), thói quen hàng ngày, sự kiện tham dự, giá trị sống, môn chơi/sở thích (hobby), loại xe, chương trình TV/phim, màu sắc yêu thích, tuổi (liên quan đến sở thích, tử vi/phong thủy theo tuổi).\n \nPhân tích phong cách sống của khán giả: tình trạng hôn nhân (độc thân, kết hôn, ly hôn), trình độ học vấn, nghề nghiệp, thu nhập, và các nhu cầu cơ bản (sống, tiền bạc, yêu thương, danh vọng, phát triển, cống hiến).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Câu hỏi quan trọng nhất về phong cách sống: Sản phẩm/thương hiệu/bạn có thể làm cho cuộc sống của người tiêu dùng trở nên tốt đẹp hơn hoặc dễ dàng hơn như thế nào? (Đây là sự chuyển dịch từ vị kỷ sang vị chủng – tức là từ lợi ích cá nhân sang lợi ích cộng đồng/tác động lớn hơn).</h3>\n<p class=\"body-txt\">\n&quot;Thần chú&quot; để học hỏi từ đối thủ: Xác định đối thủ hàng đầu và fan của họ trông như thế nào (dựa trên các câu hỏi phân tích ở trên). Đây là cách để học hỏi từ họ.\n \nNguyên tắc ứng xử với đối thủ: Tuyệt đối không chê bai đối thủ mà hãy học hỏi điều hay và khắc phục điều dở của mình. Khen đối thủ để họ chủ quan, mình có thể tiến lên. Nếu đối thủ quá tệ thì nên buồn vì không học hỏi được gì.\n \nKiểm tra và không giả định: Sau khi phân tích, tập hợp các nhóm khách hàng tiềm năng thành các tổ hợp khác nhau và thực hiện TEST để tìm ra nhóm có nhiều mục tiêu marketing nhất (ví dụ: nhóm có hành vi &quot;share&quot; mạnh nhất nếu mục tiêu là xây dựng thương hiệu). Không giả định bất cứ điều gì, phải test tất cả các thị trường để tìm ra nhóm tốt nhất.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">★ Điểm quan trọng nhất</h3>\n<p class=\"body-txt\">\nTập trung vào giá trị sản phẩm mang lại cho cuộc sống khách hàng: Câu hỏi &quot;Sản phẩm của bạn hoặc là bạn hoặc là thương hiệu của bạn có thể làm cho cuộc sống của người tiêu dùng trở nên tốt đẹp hơn hoặc dễ dàng hơn như thế nào?&quot; là trọng tâm. Điều này quan trọng vì nó chuyển hướng marketing từ việc quảng bá tính năng sản phẩm sang việc truyền tải giá trị thực sự. Khi khách hàng nhận thấy sản phẩm/dịch vụ có thể cải thiện cuộc sống của họ một cách đáng kể, họ sẽ dễ dàng chia sẻ (&quot;share&quot;) và gắn bó hơn.\n \nHọc hỏi đối thủ một cách tích cực và chiến lược: Thay vì cạnh tranh tiêu cực, diễn giả khuyến khích việc theo dõi và phân tích đối thủ để &quot;học hỏi họ&quot;. Điều này quan trọng vì nó giúp doanh nghiệp không ngừng cải thiện, nắm bắt xu hướng và tránh được những sai lầm mà đối thủ đã mắc phải. Việc khen ngợi đối thủ (dù chỉ trong tư tưởng) cũng giúp duy trì tâm thế chủ động, tích cực và không mắc bệnh chủ quan.\n \nTầm quan trọng của hành vi &quot;share&quot; trong xây dựng thương hiệu: Trong số các mục tiêu tương tác, &quot;share&quot; được nhấn mạnh là quan trọng nhất, đặc biệt khi mục tiêu là xây dựng thương hiệu. Việc sản phẩm/nội dung được chia sẻ rộng rãi là minh chứng cho giá trị mà nó mang lại cho người dùng, giúp lan tỏa thông điệp một cách tự nhiên và đáng tin cậy hơn bất kỳ hình thức quảng cáo trả phí nào.\n \nKhông giả định, luôn kiểm tra và tối ưu hóa: Diễn giả nhấn mạnh nguyên tắc &quot;Không giả định&quot; và phải &quot;test tất cả các thị trường&quot;. Điều này quan trọng vì trong marketing, những giả định ban đầu có thể sai lệch. Việc liên tục thử nghiệm với các nhóm đối tượng và thông điệp khác nhau, sau đó phân tích dữ liệu thực tế, giúp doanh nghiệp tìm ra chiến lược hiệu quả nhất, tránh lãng phí nguồn lực và tối đa hóa ROI.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Tương tác quan trọng nhất là tương tác share.”\n \n“Sản phẩm của bạn hoặc là bạn hoặc là thương hiệu của bạn có thể làm cho cuộc sống của người tiêu dùng trở nên tốt đẹp hơn hoặc dễ dàng hơn như thế nào?”\n \n“Thay vì chúng ta cạnh tranh, chúng ta buộc phải sang chơi với đối thủ của mình để học hỏi họ.”\n \n“Tuyệt đối không chê bai đối thủ.”\n \n“Khen nó, thế là nó chủ quan, mình tiến lên.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Bài 8: Nên Livestream trên Page hay trên trang cá nhân?</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Tóm tắt. Buổi giảng tập trung vào việc tối ưu hóa chiến lược marketing trên Facebook thông qua việc sử dụng Facebook Page và công cụ &quot;Lookalike Audience&quot;. Diễn giả nhấn mạnh các lợi ích vượt trội của Page so với Profile cá nhân trong livestream, phân tích khán giả và đặc biệt là khả năng chạy quảng cáo. Một chiến lược quan trọng được giới thiệu là &quot;quảng cáo mồi&quot; nhằm định hướng và thu hút đối tượng mục tiêu hiệu quả hơn cho các hoạt động marketing.</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Ý chính</h3>\n<p class=\"body-txt\">\nGiới thiệu công cụ &quot;Lookalike&quot; (trông giống như là) trên Facebook.\n \n&quot;Lookalike&quot; được sử dụng để target đối tượng sau khi đã có một lượng audience (khán giả) nhất định.\n \nCác công cụ và lợi ích được nhắc đến đều nằm trên Facebook Page.\n \nTrả lời câu hỏi nên livestream trên Page hay Profile: Cả hai, nhưng Page được khuyến khích (và có công cụ BiSuLive hỗ trợ chạy đồng thời).\n \nBí mật 1: Facebook Page có độ tương tác livestream tốt hơn Profile cá nhân.\n \nBí mật 2: Chỉ có trên Facebook Page mới có thể phân tích được khán giả.\n \nBí mật 3: Chỉ có trên Facebook Page mới có thể chạy quảng cáo.\n \nPhải chạy &quot;quảng cáo mồi&quot; cho đối tượng mục tiêu.\n \nQuảng cáo mồi là bơm một lượng tiền nhỏ cho một đoạn nội dung (ví dụ: post, video, thông báo chuẩn bị livestream) để thu hút.\n \nMồi quảng cáo nên chạy *trước* khi livestream hoặc sự kiện chính để thông báo và định hướng đối tượng.\n \nChạy mồi giúp định hướng đối tượng mục tiêu tốt hơn, khiến họ tham gia các hoạt động chính (như livestream) hiệu quả hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Ví dụ: Mồi một cái ảnh đã chia sẻ để target đúng đối tượng (vd: 28-22 tuổi, văn phòng) để họ vào xem livestream đúng giờ.</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">★ Điểm quan trọng nhất</h3>\n<p class=\"body-txt\">\nSức mạnh vượt trội của Facebook Page so với Profile cá nhân: Diễn giả khẳng định Page có độ tương tác tốt hơn khi livestream, cho phép phân tích khán giả chi tiết và là nền tảng duy nhất để chạy quảng cáo.\n \nVì sao quan trọng: Điều này định hướng chiến lược marketing trên Facebook. Nếu doanh nghiệp muốn xây dựng thương hiệu, tương tác chuyên nghiệp và đặc biệt là mở rộng tệp khách hàng thông qua quảng cáo, việc tập trung vào Facebook Page là điều bắt buộc. Profile cá nhân chỉ nên được dùng cho mục đích cá nhân hoặc tương tác sơ bộ.\n \nChiến lược &quot;Quảng cáo Mồi&quot; (Teaser/Pre-ads): Chạy quảng cáo với một ngân sách nhỏ cho các nội dung &quot;nhá hàng&quot; (ví dụ: một bài viết, video ngắn, thông báo về livestream sắp tới) để thu hút và định hướng đúng đối tượng mục tiêu trước khi sự kiện chính diễn ra.\n \nVì sao quan trọng: Chiến lược này giúp tạo ra sự mong đợi, &quot;làm nóng&quot; đối tượng tiềm năng, đảm bảo lượng người tham gia hoặc tương tác cao hơn đáng kể khi nội dung chính (như livestream, ra mắt sản phẩm) bắt đầu. Thay vì chỉ đăng bài mà không có sự chuẩn bị, quảng cáo mồi tối ưu hóa hiệu quả của mọi hoạt động marketing.\n \nCông cụ Lookalike Audience: Cho phép tìm kiếm và mở rộng đối tượng khách hàng tiềm năng dựa trên những người đã tương tác với nội dung của bạn hoặc đã là khách hàng.\n \nVì sao quan trọng: Khi đã có một lượng khán giả nhất định, Lookalike giúp doanh nghiệp tìm kiếm những người mới có đặc điểm, sở thích tương tự, tối ưu hóa chi phí quảng cáo và mở rộng thị trường mục tiêu một cách thông minh, thay vì phải target lại từ đầu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Bí mật này, bí mật nhá, tức là đừng nói cho ai ngoài kia biết.”\n \n“Chỉ có trên page bạn mới phân tích được khán giả của bạn thôi.”\n \n“Phải chạy quảng cáo mồi cho đối tượng.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Bài 9: Một số lưu ý cần thiết</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Tóm tắt. Buổi học này tập trung vào việc thấu hiểu khán giả và cách xây dựng hình ảnh trên mạng xã hội để thu hút và giữ chân họ. Cốt lõi là &quot;sống như điều khán giả mong muốn&quot;, đôi khi đòi hỏi phải sống hai cuộc đời khác nhau. Để làm được điều này, cần tránh chia sẻ những điều dễ gây ghen tức và tập trung vào những nội dung truyền cảm hứng, thể hiện sự ngưỡng mộ hoặc mang lại giá trị cho người khác.</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Ý chính</h3>\n<p class=\"body-txt\">\nModule đầu tiên: Tạo ra và sống như một người truyền cảm hứng.\n \nModule thứ hai (chủ đề buổi giảng): Thấu hiểu khán giả để sống như điều họ mong muốn, đòi hỏi phải sống hai cuộc đời khác nhau (cuộc đời ở nhà khác với cuộc đời trên mạng xã hội).\n \nNếu có tài năng thiên bẩm (hát, đàn, vẽ), hãy sử dụng nó: Đây là cách hiệu quả để thu hút lưu lượng truy cập (traffic).\n \nNếu không có tài năng đặc biệt, hãy cẩn trọng: Đừng cố gắng thể hiện những điều bạn không giỏi (ví dụ: hát dở, ngoại hình không đẹp).\n \nTránh &quot;chửi&quot; (nói tục, chỉ trích) trên mạng xã hội công khai:\n \nChửi bới sẽ thu hút những người cũng thích chửi bới, tạo ra nhiều kẻ thù.\n \nChỉ nên &quot;chửi&quot; trong phạm vi riêng tư, nếu có chiến lược và thủ pháp cụ thể.\n \nKhông bao giờ thu hút kẻ thù về phía mình.\n \nKhán giả chỉ thích nghe chửi khi họ chưa trả tiền; khi đã trả tiền, họ không thích.\n \nLuôn sống như thể khán giả của mình muốn.\n \nMột vài thứ không nên chia sẻ (gây ghen tức):\n \nNhững điều khiến khán giả ghen tức (ghen tức và ngưỡng mộ là ranh giới rất mong manh).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Ví dụ: Đồng hồ đắt tiền, thời trang đắt tiền, những chuyến du lịch sang chảnh, quán bar/hộp đêm sang trọng, món ăn quá sang chảnh, khoe tiền bạc, xe sang.</h3>\n<p class=\"body-txt\">\nTuyệt đối không khoe khoang những điều này về bản thân.\n \nNhững điều nên chia sẻ (gây ngưỡng mộ):\n \nVề gia đình: Vợ/chồng hoặc con cái làm điều gì đó tốt đẹp (không phải con cái sang chảnh mà là làm điều tốt).\n \nKhi làm marketing về sự sang chảnh/thành công:\n \nHãy nói về người khác hoặc về sự thay đổi tích cực của những người đi theo mình/hệ thống của mình, chứ đừng nói về bản thân mình.\n \nNếu muốn khoe siêu xe, hãy chụp ảnh người khác đứng cạnh siêu xe đó (người không phải là chồng/vợ, không có mối quan hệ thân thiết với mình).\n \nTự nhận mình chỉ là tài xế của những thứ sang chảnh đó (ví dụ: &quot;ước gì mình chỉ làm tài xế nhỉ?&quot; khi chụp ảnh bên cạnh siêu xe) để tránh gây ghen tức nhưng vẫn tạo sự ngưỡng mộ gián tiếp.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">★ Điểm quan trọng nhất</h3>\n<p class=\"body-txt\">\n&quot;Sống như điều mà khán giả mong muốn&quot; và &quot;phải sống hai cuộc đời khác nhau&quot;: Đây là nền tảng để xây dựng hình ảnh cá nhân và thương hiệu trên mạng xã hội. Việc hiểu rõ kỳ vọng của khán giả và điều chỉnh hành vi, nội dung chia sẻ để phù hợp là chìa khóa để thu hút và duy trì sự quan tâm. Nó giúp người học nhận ra rằng không phải lúc nào &quot;là chính mình&quot; cũng hiệu quả trên môi trường công khai, mà cần có chiến lược xây dựng hình ảnh.\n \nNguyên tắc &quot;Tránh gây ghen tức, tập trung gây ngưỡng mộ&quot;: Đây là chiến lược nội dung cốt lõi. Ghen tức có thể dẫn đến sự phản cảm và mất tương tác, trong khi ngưỡng mộ sẽ tạo động lực, sự kết nối và niềm tin. Điểm này rất quan trọng vì nó định hướng rõ ràng cho việc lựa chọn loại nội dung nào nên và không nên xuất hiện trên các kênh truyền thông, đặc biệt là với đối tượng khách hàng B2B cần sự chuyên nghiệp và tin cậy.\n \nKhoe về sự thay đổi/thành công của người khác hoặc hệ thống, không phải của bản thân: Đây là một thủ thuật marketing tinh tế và hiệu quả. Bằng cách tập trung vào thành công của khách hàng, đối tác hoặc những người được mình giúp đỡ, người học không chỉ tránh được sự khoe khoang cá nhân mà còn xây dựng được uy tín, thể hiện khả năng tạo ra giá trị cho người khác. Điều này đặc biệt quan trọng trong việc xây dựng hình ảnh một người lãnh đạo, người cố vấn hay một doanh nghiệp có tầm nhìn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“chúng ta phải thấu hiểu về khán giả của chúng ta để sống như điều mà khán giả mong muốn.”\n \n“Tức là bạn có thể phải sống hai cuộc đời khác nhau đấy. Cuộc đời ở nhà khác với cuộc đời trên mạng xã hội.”\n \n“Nếu mà mình muốn nói về đồ sang chảnh thì mình nói về người khác, đừng nói về mình.”\n \n“ước gì mình chỉ làm tài xế nhỉ?”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Bài 10: Những mẹo cần ghi nhớ để thu hút lượt Share</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Tóm tắt. Buổi học này tập trung vào nghệ thuật xây dựng khán giả hiệu quả trên internet, đặc biệt nhấn mạnh tầm quan trọng của việc khuyến khích &quot;share&quot; (chia sẻ) nội dung. Diễn giả chỉ ra rằng mấu chốt không phải là livestream bán hàng, mà là tạo ra nội dung khiến khán giả muốn chia sẻ, qua đó tăng độ phủ và tương tác. Bí quyết nằm ở việc tạo ra các loại nội dung dễ tạo, dễ lan truyền như hình ảnh, trích dẫn truyền cảm hứng, các bài viết dạng &quot;X điều...&quot;, &quot;X bí quyết...&quot;, hoặc các &quot;life hack&quot; có giá trị.</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Ý chính</h3>\n<p class=\"body-txt\">\nKhông phải livestream mà là xây dựng khán giả: Mục tiêu cuối cùng không phải là livestream trực tiếp, mà là xây dựng một lượng khán giả trung thành và tương tác.\n \nYếu tố quan trọng nhất là &quot;share&quot;: Tác động vào hành vi chia sẻ (share) là yếu tố quan trọng nhất trong việc xây dựng khán giả.\n \nĐo lường và lặp lại nội dung được share nhiều: Cần đo lường xem bài viết/nội dung nào có tỉ lệ share cao nhất để tiếp tục sản xuất những nội dung tương tự.\n \nƯu tiên hình ảnh hơn video ban đầu: Lý do là chi phí sản xuất hình ảnh thấp hơn, nhanh hơn và không tốn tiền. Hình ảnh hay có thể chuyển thành video sau này.\n \nCấu trúc nội dung hiệu quả để tăng share:\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Trích dẫn truyền cảm hứng + Hình ảnh tương ứng: Kết hợp một câu trích dẫn truyền cảm hứng với hình ảnh có liên quan (không nhất thiết phải là hình ảnh truyền cảm hứng) sẽ đem lại lượng share cao. Hình ảnh cần liên quan tới câu nói truyền cảm hứng.</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Nội dung dạng danh sách/bí quyết (X điều..., X bí quyết...): Các bài viết kiểu &quot;5 cái này hoặc 7 cái kia&quot;, &quot;X câu hỏi sẽ thay đổi cuộc đời&quot;, &quot;X điều khiến bạn lãng phí cuộc đời&quot;, &quot;X bài tập khiến bạn thư giãn&quot;, &quot;X thói quen dành cho phụ nữ thành đạt/hạnh phúc&quot;, &quot;X bí quyết để giữ mãi tuổi thanh xuân&quot;, &quot;X cách trang điểm dành cho người mặt tròn/dài&quot;, &quot;X cách trang điểm khiến bạn quyến rũ hơn&quot;.</h3>\n<p class=\"body-txt\">\nLife hack: Những mẹo vặt trong cuộc sống mà đối tượng thị trường mục tiêu của bạn muốn. Ví dụ: &quot;X điều cần làm để thoát khỏi tình trạng tiêu cực&quot;, &quot;X cách để không còn chán nản&quot;, &quot;X cách để thoát khỏi giận dữ&quot;.\n \nSơ đồ cuộc sống/quy trình cuộc sống: Các sơ đồ giúp giải thích, trình bày một quy trình hay khía cạnh của cuộc sống.\n \nChecklist (Danh sách việc cần làm): Ví dụ: &quot;7 điều cần chuẩn bị trước khi đi xa&quot;, &quot;8 điều phụ nữ sau khi làm việc cần nhớ&quot;, &quot;7 bí quyết để có một món ăn ngon&quot;.\n \nReview/Sự thật về: Ví dụ: &quot;6 cuốn sách cần đọc&quot;, &quot;12 cuốn sách cần phải có trong tủ nhà&quot;, &quot;Sự thật về collagen/vitamin A/vitamin C&quot;, &quot;Sự thật về bột trà xanh matcha&quot;.\n \nTạo nội dung cho khán giả, không phải cho bản thân: Trên trang cá nhân thể hiện quan điểm cá nhân, nhưng trên page (trang kinh doanh), phải thể hiện quan điểm của khán giả, nói điều họ muốn nghe, điều họ cảm thấy đúng.\n \nMẹo để khuyến khích share: &quot;Khích bác&quot; người xem share bằng cách đặt câu hỏi chung mà ai cũng từng trải qua. Ví dụ: &quot;Nếu bạn đã từng vấp ngã trên cuộc đời và đứng lên thì share cái ảnh này.&quot;\n \nVị trí của từ &quot;chia sẻ&quot;: Đặt từ &quot;chia sẻ&quot; hoặc &quot;share đi&quot; lên đầu tiên của đoạn mô tả sẽ đem lại hiệu quả cao nhất.\n \nChỉ số quan trọng khác là lượt Follower: Theo dõi biểu đồ tăng trưởng follower (tăng nhanh hay chậm) để hiểu lý do và điều chỉnh chiến lược.\n \nCách tăng Follower nhanh nhất: Bỏ tiền ra mua follower (nhưng cách này đắt và không được khuyến khích trong bối cảnh nội dung này).\n \nBí quyết của tất cả trò chơi này: &quot;Share&quot; - tạo ra những mẩu thông tin khiến người đọc mong muốn chia sẻ nó.\n \nTỷ lệ thành công: Lượt share lớn hơn lượt comment là một dấu hiệu tốt.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">★ Điểm quan trọng nhất</h3>\n<p class=\"body-txt\">\nTập trung vào &quot;Share&quot; thay vì &quot;Livestream&quot; hay bán hàng trực tiếp: Đây là cốt lõi vì thay vì chỉ truyền tải thông tin một chiều, việc tạo ra nội dung thúc đẩy chia sẻ sẽ giúp lan tỏa thông điệp, xây dựng thương hiệu và tiếp cận lượng khán giả lớn hơn một cách tự nhiên và bền vững. Điều này thể hiện sự thay đổi tư duy từ &quot;phát sóng&quot; sang &quot;kích hoạt cộng đồng&quot;.\n \nSản xuất nội dung dựa trên nhu cầu của khán giả, không phải bản thân: Việc diễn giả nhấn mạnh &quot;trên page phải thể hiện quan điểm của người khán giả chúng ta&quot; là cực kỳ quan trọng. Nhiều người làm marketing cá nhân hoặc doanh nghiệp thường mắc sai lầm nói về điều họ muốn nói, thay vì điều khán giả muốn nghe. Khi nội dung đúng với mong muốn, cảm xúc của khán giả, họ sẽ tự nguyện chia sẻ, tạo ra hiệu ứng lan truyền mạnh mẽ.\n \nƯu tiên hình ảnh và các định dạng nội dung dễ tạo, dễ lan truyền: Trong bối cảnh tốc độ thông tin hiện nay, việc sản xuất nhanh, thử nghiệm nhiều là cần thiết. Diễn giả khuyên ưu tiên hình ảnh và các dạng &quot;listicle&quot;, &quot;life hack&quot;, &quot;checklist&quot; vì chúng dễ tạo, dễ tiêu thụ và dễ lan truyền hơn video ban đầu. Điều này giúp tối ưu hóa nguồn lực và tăng cơ hội tìm ra nội dung &quot;viral&quot; mà không cần đầu tư quá lớn từ đầu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Học cách xây dựng khán giả là quan trọng nhất.”\n \n“Tác động vào share là yếu tố quan trọng nhất trong cái việc xây dựng khán giả.”\n \n“Bí quyết của tất cả trò chơi này chỉ còn một chữ thôi, đó là share.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Bài 11: Một vài bí quyết và dụng cụ cần thiết để có một buổi livestream thành công</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Tóm tắt. Buổi giảng này tập trung vào kỹ thuật, thiết bị và phương pháp thực hành để tạo ra một buổi livestream hiệu quả và chuyên nghiệp. Nội dung bao gồm lựa chọn và bố trí giá đỡ điện thoại, hệ thống ánh sáng (đèn vàng, bố cục 3 điểm), cách sử dụng camera (quay ngang, vị trí 1/3, xử lý chữ ngược), và mẹo thực hành để vượt qua nỗi sợ lên sóng. Ngoài ra, buổi học còn đề cập đến tầm quan trọng của bối cảnh nền gọn gàng và hệ thống âm thanh chất lượng, với lời khuyên nên có thiết bị dự phòng cho mọi thứ.</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Ý chính</h3>\n<p class=\"body-txt\">\nThiết bị cơ bản (làm livestream hấp dẫn):\n \nGiá đỡ điện thoại (&quot;cái chân&quot;): Loại nhỏ, gật gù, có thể xoay dọc/ngang/chéo. Tuy dễ gãy nhưng rất cần thiết để thay đổi góc quay, ghi hình bản thân và vật thể. Giá khoảng 150.000 VNĐ.\n \nĐầu bi (&quot;con bi&quot;): Dễ dàng xoay 360 độ theo mọi hướng.\n \nGá điện thoại đa năng (có đèn): Dùng cho người chạy nhiều fanpage, có thể gắn 4 điện thoại và đèn, nhưng diễn giả không khuyến khích vì vướng víu.\n \nGá điện thoại/máy ảnh: Loại có thể tháo đầu kẹp điện thoại để gắn máy ảnh hoặc thiết bị khác (có thể gắn điện thoại, máy ảnh, v.v.).\n \nNguyên tắc &quot;tất cả thiết bị phải có ít nhất hai cái&quot;: Để dự phòng khi có sự cố (hai điện thoại, hai camera, hai đèn, hai đường truyền internet).\n \nÁnh sáng (&quot;đèn&quot;):\n \nMàu sắc: Phải có ánh sáng màu vàng (hoặc kết hợp vàng và trắng).\n \nĐèn học Dạng Đông: Lựa chọn tốt nhất và rẻ nhất cho người mới bắt đầu vì đã được thiết kế có ánh sáng vàng.\n \nTránh đèn tuýp trên trần: Làm mặt bị &quot;dại&quot;.\n \nĐèn chuyên nghiệp: Có thể chỉnh được độ sáng (dim) và màu sắc (vàng/trắng). Đèn tốt sẽ làm nổi bật chủ thể, làm tối hậu cảnh.\n \nBố trí đèn (2-3 đèn):\n \nMột đèn bên: Chiếu từ một bên để tạo khối, làm nổi bật các đường nét khuôn mặt (mũi). Một bên sáng hơn, một bên tối hơn.\n \nMột đèn trước mặt: Cao hơn màn hình máy tính/camera để tránh đổ bóng lên mặt. Hơi chếch cao hơn một chút, cùng góc chiếu với máy quay.\n \nMột đèn trên đầu (nếu có): Chiếu từ trên xuống hoặc hơi từ phía sau để tạo viền tóc, vai, làm nổi bật đường nét.\n \nLoại đèn theo vị trí:\n \nĐèn chiếu mặt: Sáng phủ đều.\n \nĐèn từ trên xuống: Dùng đèn downlight (ánh sáng trụm).\n \nTránh ánh sáng hắt từ dưới lên: Tạo hiệu ứng &quot;ma quỷ&quot;.\n \nCác ánh sáng còn lại phải &quot;trụm&quot;: Trừ ánh sáng chính chiếu mặt.\n \nBối cảnh nền (background):\n \nNên là đơn sắc, đồng nhất, không rối rắm (ví dụ: không phải tủ sách lộn xộn, tranh ảnh phức tạp).\n \nNên tối màu: Dìm sáng hậu cảnh bằng cách đặt đèn chiếu mặt cao hơn để ánh sáng không chiếu vào nền.\n \nGọn gàng: Phần nền nhìn thấy trong camera phải cực kỳ gọn gàng, dù xung quanh có thể bừa bộn.\n \nCamera:\n \nThiết bị: Đơn giản nhất là điện thoại.\n \nHướng quay: Dùng điện thoại *ngang* (horizontal) vì giống mắt người hơn và phù hợp với việc hiển thị trên máy tính (đa nền tảng).\n \nTầm xa: Đặt camera đủ xa để có thể biểu diễn bằng tay, ngôn ngữ cơ thể.\n \nVị trí chủ thể: Đặt mình ở vị trí 1/3 màn hình, mặt hơi quay vào khoảng trống bên trong.\n \nKhông gian trống (2/3 màn hình): Để hiển thị banner, tài khoản, hình ảnh, sản phẩm.\n \nGiơ sản phẩm: Luôn giơ sản phẩm, chữ viết sang bên tay phải của người nói (tức là bên trái của màn hình đối với người xem).\n \nXử lý chữ ngược: Bấm nút xoay 180 độ trên màn hình điện thoại/phần mềm. Hoặc dùng camera sau dí sát vào sản phẩm, rồi lại chuyển về camera trước.\n \nBảng vẽ: Dùng bảng hoặc đặt điện thoại xuống dưới quay vào giấy để vẽ, viết tay trực tiếp.\n \nThực hành livestream (&quot;luyện&quot;):\n \nVấn đề: Không làm được livestream vì *không làm*. Nguyên nhân lớn nhất là &quot;rụt rè&quot; (&quot;Zét&quot;, &quot;Zun&quot;).\n \nPhương pháp:\n \nTạo một nhóm Facebook riêng tư chỉ có bạn và nick ảo của bạn. Livestream 10 lần trong đó.\n \nMời thêm một người bạn vào nhóm, tiếp tục livestream 10 lần.\n \nTiếp tục thêm 5-7 người, rồi 50 người. Dần dần tăng số lượng người xem.\n \nSau khoảng 50 người, bạn sẽ hết mặc cảm và có thể tự tin livestream công khai.\n \nTheo dõi toàn bộ bối cảnh: Khi live trong nhóm, nhờ người khác (hoặc dùng camera thứ hai) quay lại toàn bộ bối cảnh xung quanh bạn để bạn có thể rút kinh nghiệm về ngôn ngữ cơ thể, bối cảnh.\n \nÂm thanh (&quot;micro&quot;):\n \nMicro định hướng: Chỉ thu âm thanh từ hướng mong muốn (ví dụ: chỉ thu tiếng từ miệng người nói, không thu tiếng ồn xung quanh). Có loại có thể chọn nhiều chế độ thu (trước, trước-sau, toàn bộ).\n \nMicro tốt nhất thế giới: Shure SM58 (và SM82).\n \nÂm thanh chuyên nghiệp: Micro -&gt; Bộ trộn âm thanh (mixer/sound card) -&gt; Máy tính/Điện thoại.\n \nSound card giá rẻ: Loại có nhiều cổng vào (micro, nhạc) và cổng ra (máy tính/điện thoại).\n \nTính năng Echo: Cần tắt khi nói, bật khi hát.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">★ Điểm quan trọng nhất</h3>\n<p class=\"body-txt\">\nChủ động kiểm soát ánh sáng: Việc sử dụng đèn vàng và bố cục 3 điểm sáng (bên, trước, trên đầu) không chỉ làm gương mặt sáng đẹp mà còn tạo chiều sâu, làm nổi bật chủ thể và tạo sự chuyên nghiệp cho video. Tránh đèn tuýp và ánh sáng hắt từ dưới lên là điều tối quan trọng để tránh làm hỏng hình ảnh. *Quan trọng vì ánh sáng là yếu tố nhìn thấy đầu tiên, quyết định sự thu hút và độ chuyên nghiệp của hình ảnh, ảnh hưởng trực tiếp đến cảm nhận của người xem về bạn và nội dung.*\n \nĐặt mình vào vị trí người xem (quay ngang, vị trí 1/3, bên tay phải để sản phẩm): Quy tắc quay ngang điện thoại, đặt chủ thể ở 1/3 màn hình và sử dụng 2/3 không gian còn lại cho nội dung/sản phẩm, cùng với việc giơ sản phẩm bên tay phải, cho thấy sự thấu hiểu cách người xem tiếp nhận thông tin và sự tiện lợi khi xem trên đa nền tảng. *Quan trọng vì nó tối ưu trải nghiệm người dùng, giúp nội dung dễ tiếp cận và chuyên nghiệp hơn, đồng thời tạo không gian hiệu quả cho việc trình bày sản phẩm/thông tin phụ trợ.*\n \nThực hành có lộ trình để vượt qua nỗi sợ: Phương pháp livestream trong nhóm kín, tăng dần số lượng người xem từ 2 lên 50, là một chiến lược tâm lý hiệu quả để xây dựng sự tự tin. *Quan trọng vì nỗi sợ xuất hiện trước công chúng là rào cản lớn nhất. Kỹ thuật có thể học, nhưng sự tự tin chỉ đến từ thực hành có kiểm soát, giúp người học có thể áp dụng kiến thức vào thực tế một cách bền vững.*\n \nNguyên tắc dự phòng &quot;ít nhất hai cái&quot;: Mọi thiết bị (điện thoại, camera, đèn, internet) đều cần có ít nhất hai đơn vị. Điều này thể hiện tư duy chuyên nghiệp, đảm bảo tính liên tục và giảm thiểu rủi ro gián đoạn trong một buổi livestream trực tiếp. *Quan trọng vì livestream là trực tiếp, không có chỗ cho sai sót. Việc chuẩn bị dự phòng cho mọi thiết bị là nền tảng để đảm bảo sự ổn định và chuyên nghiệp, tránh những tình huống bất ngờ có thể làm mất uy tín và lượng khán giả.*\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Ai cũng cần phải có một cái chân này hoặc cái chân nhỏ kia, nhưng mà cái chân này là tốt nhất.”\n \n“Nếu mình muốn xấu như ma thì mình để đèn ở dưới hắt lên.”\n \n“Hầu hết chúng ta không làm được livestream là bởi vì chúng ta không làm livestream. Không phải là không làm được mà là không làm chứ không phải là không làm được.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Bài 12: Kỹ năng mềm để có livestream hấp dẫn</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Tóm tắt. Buổi giảng này tập trung vào việc sử dụng livestream hiệu quả để xây dựng thương hiệu cá nhân (nhân hiệu), đặc biệt là qua tương tác với khán giả. Diễn giả nhấn mạnh tầm quan trọng của nội dung có ý nghĩa, mang lại giá trị thiết thực cho người xem, cùng với các chiến lược tăng cường tương tác như hỏi đáp, mini-game và đấu giá. Đồng thời, buổi học cũng chỉ ra những điều cần tránh như sử dụng mắt ảo hay comment giả để đảm bảo tính chân thực và hiệu quả lâu dài.</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Ý chính</h3>\n<p class=\"body-txt\">\nMục tiêu của livestream: Xây dựng thương hiệu cá nhân (nhân hiệu) thông qua tương tác trực tiếp.\n \nXây dựng nhân hiệu:\n \nBắt buộc phải trưng mặt của mình ra trên livestream.\n \nPhụ nữ cần trang điểm khi lên sóng (không cần quá cầu kỳ, chỉ cần đẹp và chỉn chu).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Nội dung cần thể hiện &quot;đức tính tốt&quot; (sống có đức tính) để hướng người nghe tới điều chân-thiện-mỹ.</h3>\n<p class=\"body-txt\">\nTránh các nội dung &quot;sex&quot; (gợi cảm) không liên quan đến sản phẩm chính, vì nó thu hút sai đối tượng khách hàng mục tiêu. Nếu cần, có thể thuê người khác biểu diễn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Nội dung livestream:</h3>\n<p class=\"body-txt\">\nPhải có *ý nghĩa*, tức là làm thay đổi cuộc đời người nghe, giúp cuộc sống của họ dễ dàng và thuận tiện hơn.\n \nPhải *dễ dàng để chia sẻ*. Có thể test các chủ đề bằng hình ảnh trước khi livestream để chọn chủ đề dễ chia sẻ.\n \nPhải *liên quan đến đối tượng* và đạt được mục tiêu marketing.\n \nCác loại nội dung phổ biến:\n \n&quot;How-to&quot; (làm thế nào để...): Hướng dẫn cách đạt được một điều gì đó (ví dụ: &quot;Làm thế nào để cải thiện giường chiếu của bạn chỉ bằng việc ăn trứng&quot; để bán sách công thức trứng).\n \nCác mẹo (tips).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Case Study (phân tích một tình huống cụ thể): Phân tích chi tiết một vấn đề và cách giải quyết.</h3>\n<p class=\"body-txt\">\nChỉ số quan trọng của livestream:\n \nLượt share là quan trọng nhất (vì từ share sẽ dẫn đến xem).\n \nThời gian họ ở lại livestream (thời gian xem trung bình).\n \nCác mẹo tăng tương tác để giữ chân người xem:\n \nTương tác trực tiếp với comment: Trả lời câu hỏi của người xem, gọi tên họ, ghim (pin) comment của họ lên màn hình.\n \nMini-game, đố vui có thưởng: Sử dụng sản phẩm vật lý của mình làm quà tặng.\n \nXổ số: Chọn con số ngẫu nhiên.\n \nGame chia bè phái: Tạo ra sự tranh luận vui vẻ giữa các nhóm (ví dụ: Hà Nội vs Sài Gòn, nam vs nữ, trẻ vs già, dùng sản phẩm vs không dùng sản phẩm). Mục tiêu là kích thích họ tranh đấu và bình luận, nhưng không để biến thành chiến tranh. Người livestream nên giữ vai trò trung lập (&quot;bán vũ khí&quot;).\n \nKêu gọi share: Thường xuyên kêu gọi người xem chia sẻ livestream.\n \nTrao thưởng nếu có mặt: Tặng quà cho những người đang xem livestream trực tiếp.\n \nGame đấu giá: Bán các vật phẩm độc đáo. Nguyên tắc là chốt đơn nhanh khi giá đạt mức mong muốn, không để quá đắt để khuyến khích lần chơi sau. Sử dụng đồng hồ để tạo sự gấp rút.\n \n(Xem bói: cũng có thể tăng tương tác nhưng không được khuyến khích nhiều vì có vẻ &quot;fake&quot;).\n \nNhững điều nên tránh khi livestream:\n \nKéo mắt ảo: Không sử dụng các phần mềm tăng lượt xem ảo vì nó không phản ánh kết quả thực tế.\n \n&quot;Sidding&quot; bằng comment: Không nhờ người của mình vào thả những comment giả tạo. Luôn dùng tương tác thật.\n \nMẹo tuyệt vời nhất: Follow những người đang livestream tốt, học hỏi cái hay của họ. Không nên so sánh mình với nghệ sĩ (vì họ có tài năng thiên bẩm) hoặc những người có ảnh hưởng xã hội (chính trị gia, lãnh đạo tôn giáo) vì họ thuộc các lĩnh vực khác.\n \nThực hành: Ngay lập tức rút điện thoại ra và livestream, bất cứ chủ đề gì.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">★ Điểm quan trọng nhất</h3>\n<p class=\"body-txt\">\nMục tiêu của livestream là xây dựng nhân hiệu, và bắt buộc phải trưng cái mặt của mình ra.\n \nVì sao quan trọng: Trong thời đại số, thương hiệu cá nhân (personal brand) trở nên cực kỳ quan trọng, đặc biệt trong kinh doanh. Việc xuất hiện trực tiếp, thể hiện con người thật của mình giúp xây dựng sự tin tưởng, kết nối và khác biệt hóa với các đối thủ. Khán giả và khách hàng muốn kết nối với con người, không chỉ với một biểu tượng hay logo.\n \nCái content, cái nội dung này nó phải có ý nghĩa, làm thay đổi cuộc đời của những người nghe ra làm sao, làm cho cuộc sống của họ dễ dàng hơn, thuận tiện hơn ra làm sao.\n \nVì sao quan trọng: Đây là bí quyết để tạo ra nội dung giữ chân và thu hút người xem lâu dài. Thay vì chỉ quảng cáo hay nói về bản thân, nội dung cần tập trung vào việc cung cấp giá trị, giải quyết vấn đề hoặc cải thiện cuộc sống cho khán giả. Khi nội dung có ý nghĩa, nó sẽ tự nhiên được đón nhận và lan tỏa.\n \nLượt share là kết quả cuối cùng nhưng lượt share là quan trọng nhất. Bởi vì từ share nó sẽ dẫn đến xem.\n \nVì sao quan trọng: Điểm này đảo ngược quan niệm thông thường về các chỉ số. Lượt xem có thể là chỉ số bề nổi, nhưng lượt chia sẻ thể hiện mức độ tương tác sâu sắc và sự tán thành của người xem. Một lượt chia sẻ không chỉ mang lại một lượt xem mới mà còn là một lời giới thiệu từ người đã tin tưởng, có giá trị hơn rất nhiều so với lượt xem thụ động. Điều này định hướng người làm nội dung phải tạo ra những thứ đáng để chia sẻ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Mục tiêu của livestream là xây dựng nhân hiệu.”\n \n“Lượt share là kết quả cuối cùng nhưng lượt share là quan trọng nhất. Bởi vì từ share nó sẽ diễn đến xem.”\n \n“Mình bày cho chúng nó chơi với nhau nhưng mà mình bán vũ khí.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Bài 13: Những chú ý cần ghi nhớ</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Tóm tắt. Buổi học tập trung vào các chiến lược truyền thông hiệu quả trong marketing online, nhấn mạnh tầm quan trọng của việc xây dựng &quot;thông điệp neo nhất quán&quot; để tạo dấu ấn và sự ghi nhớ. Diễn giả hướng dẫn cách viết &quot;headline&quot; (dòng tiêu đề) thu hút, đồng thời giới thiệu phương pháp A/B testing để tối ưu hiệu quả. Buổi giảng cũng chỉ ra cách mô tả sản phẩm/dịch vụ từ nhiều góc độ và áp dụng các kiểu nói chuyện khác nhau (logic, giá trị, bóng bẩy, cảm xúc, hài hước) nhằm phù hợp với từng đối tượng khách hàng, tối đa hóa sự kết nối và tương tác.</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Ý chính</h3>\n<p class=\"body-txt\">\nThông điệp neo nhất quán: Cần chọn một thông điệp neo nhất quán để khi người khác nhìn thấy sẽ nhớ đến bạn (ví dụ: &quot;Liên tục tiến lên&quot;, &quot;The 4-Hour&quot; của Tim Ferriss, &quot;Fast and Furious&quot; của series phim).\n \nThông điệp neo phải là thứ mới, chưa từng ai sử dụng trước đây, nếu không sẽ bị người khác &quot;neo&quot; mất.\n \nHeadline (dòng tiêu đề): Đây là một phần vô cùng quan trọng trong marketing; 80% quyết định người ta có xem livestream, share ảnh, hay đọc quảng cáo hay không phụ thuộc vào headline.\n \nDành nhiều thời gian nghiên cứu và viết headline; có thể dùng Google AdWords để hỗ trợ tìm ý tưởng.\n \nA/B testing (AB testing) cho headline: Bắt buộc phải có A/B testing bằng cách tạo ra ít nhất hai dòng tiêu đề khác nhau cho cùng một nội dung để thử nghiệm và tìm ra cái nào thực sự hiệu quả.\n \nMô tả sản phẩm/dịch vụ từ nhiều góc độ: Đừng chỉ nhìn sản phẩm theo công dụng truyền thống mà hãy tìm cách mô tả nó dưới nhiều góc độ khác nhau, tìm kiếm các công dụng/giá trị mới lạ.\n \nCác kiểu nói chuyện/trình bày nội dung phù hợp với đối tượng:\n \nLogic (hợp lý): Đi kèm với những bằng chứng, số liệu cụ thể (ví dụ: xe tiêu thụ 4 lít/100km).\n \nMô tả giá trị: Nhấn mạnh giá trị sản phẩm trong tầm tiền (ví dụ: &quot;Đây là chiếc xe tốt nhất trong tầm tiền này&quot;).\n \nBóng bẩy: Sử dụng các từ &quot;nhất&quot; (tốt nhất, đẹp nhất, danh giá nhất) mà người nghe dễ cảm nhận được.\n \nCảm xúc, đam mê: Mô tả nhiều đặc tính tốt của sản phẩm một cách ôn hòa, hài hòa mà không cần phải là &quot;nhất&quot;.\n \nHài hước: Sử dụng cách nói vui vẻ, gây tò mò, tạo ấn tượng độc đáo.\n \nKhông có cách nào tốt nhất cho đến khi bạn thực sự làm và thử nghiệm nó.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">★ Điểm quan trọng nhất</h3>\n<p class=\"body-txt\">\nXây dựng &quot;thông điệp neo nhất quán&quot;: Điều này cực kỳ quan trọng vì trong thị trường thông tin bão hòa, một thông điệp neo độc đáo và được duy trì xuyên suốt giúp khách hàng dễ dàng nhận diện, ghi nhớ và liên tưởng đến thương hiệu hoặc cá nhân bạn. Đây là nền tảng để tạo ra một dấu ấn bền vững.\n \nTối ưu hóa &quot;headline&quot; bằng A/B testing: Headline là yếu tố quyết định đến 80% khả năng thu hút sự chú ý và khuyến khích hành động của người xem. Việc dành thời gian nghiên cứu và đặc biệt là áp dụng A/B testing cho phép bạn liên tục cải thiện và tìm ra những tiêu đề hiệu quả nhất, đảm bảo nội dung của bạn được tiếp cận tối đa và không lãng phí công sức.\n \nMô tả đa chiều và đa dạng phong cách giao tiếp: Mỗi khách hàng có cách tiếp nhận thông tin và động lực mua hàng khác nhau. Khả năng nhìn nhận sản phẩm/dịch vụ dưới nhiều góc độ và linh hoạt thay đổi phong cách giao tiếp (logic, giá trị, bóng bẩy, cảm xúc, hài hước) giúp bạn tiếp cận và kết nối với nhiều phân khúc khách hàng hơn, tăng khả năng thuyết phục và tạo ra sự tương tác sâu sắc.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Mọi thứ đều phải tốt hơn đến tay bạn nó phải tốt hơn, sáng hơn, bừng hơn, dễ hơn, làm đơn giản hơn.”\n \n“80% để cho người ta quyết định có xem livestream hay không thì lại phụ thuộc vào cái headline.”\n \n“Không biết cách nào tốt nhất cho đến khi bạn thực sự làm nó.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Bài 14: Những chuẩn bị quan trọng trước khi làm livestream</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Bài 15: Chiến lược và bí kíp sử dụng clip khi làm việc với người có ảnh hưởng</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Tóm tắt. Buổi giảng này trình bày chiến lược xây dựng và tận dụng mối quan hệ với những người có ảnh hưởng (influencers) trên mạng xã hội, đặc biệt là Instagram, để mở rộng network và thu hút traffic/đơn hàng hiệu quả. Diễn giả nhấn mạnh việc không nên tiếp cận nhờ vả ngay mà cần trải qua quá trình làm quen, tương tác chân thực và duy trì mối quan hệ như một &quot;tài sản&quot;. Nội dung cũng hướng dẫn cách chuẩn bị kịch bản để tối ưu chi phí và sử dụng hashtag, cũng như chiến lược tiếp cận &quot;người ảnh hưởng của người ảnh hưởng&quot;.</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Ý chính</h3>\n<p class=\"body-txt\">\nMục tiêu: Cộng tác với những người có &quot;network lớn&quot; để mang lại traffic và đơn hàng tốt, thông qua chiến lược làm quen với người có ảnh hưởng.\n \nSai lầm phổ biến: Chỉ bấm &quot;kết bạn&quot; và chờ đợi không hiệu quả vì thuật toán mạng xã hội sẽ chặn tương tác từ người mới đến tài khoản lớn.\n \nBước 1: Tương tác đủ lớn. Thường xuyên like, share, và comment có nội dung, ý nghĩa (không chỉ thả icon hay post ảnh đơn thuần) trên các bài đăng của influencer.\n \nCấm kỵ: Tuyệt đối không sử dụng phần mềm tự động comment vì nó không giống người thật và dễ bị phát hiện, dẫn đến mất mối quan hệ.\n \nBước 2: Viết cho họ. Bao gồm comment trên ảnh, nhắn tin (inbox), gọi điện thoại, hoặc gửi thư tay (nếu có địa chỉ) trên mọi nền tảng mạng xã hội.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Nội dung khi viết:</h3>\n<p class=\"body-txt\">\nCảm ơn họ vì những giá trị họ đã mang lại cho bạn hoặc cộng đồng/network trong quá khứ.\n \nCảm ơn họ vì điều họ đã mang lại cho cuộc sống cá nhân của bạn.\n \nThể hiện mong muốn tiếp tục theo dõi họ ở cấp độ chặt chẽ hơn hoặc kết bạn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Lưu ý: Để viết được nội dung chất lượng, cần theo dõi sát sao người có ảnh hưởng. Lần đầu tiên làm quen thường không có kết quả ngay.</h3>\n<p class=\"body-txt\">\nGặp gỡ trực tiếp: Chuẩn bị một món quà có giá trị, thể hiện sự ngưỡng mộ, để phá vỡ rào cản tâm lý và có cơ hội gặp trực tiếp. Sau đó, nói chuyện thân mật và xin chấp nhận kết bạn/add.\n \nBước 3: Giữ mối quan hệ. Sau khi kết nối, tiếp tục tương tác (like, share, comment) và nhắn tin cá nhân thường xuyên để duy trì mối quan hệ.\n \nCố gắng trở thành người đầu tiên bình luận trên các bài post/livestream của họ, với nội dung chân thực và thể hiện quan điểm cá nhân (điều này giới hạn bạn chỉ có thể theo dõi 3-5 người ảnh hưởng cùng lúc).\n \nXem người có ảnh hưởng như một &quot;tài sản&quot; và không đòi hỏi họ làm gì ngay lập tức.\n \nHai tác dụng chính của mối quan hệ với người có ảnh hưởng:\n \nHiểu được điều gì khiến khán giả ham muốn theo dõi, từ đó biết cách làm nội dung.\n \nNhờ họ (sau này, bằng tiền, vật chất, tình cảm...) để họ viết bài, share, hoặc làm livestream cùng bạn, từ đó mạng lưới của họ sẽ nhìn thấy bạn.\n \nChiến lược này rẻ hơn rất nhiều so với quảng cáo truyền thống và mang lại hiệu quả cao.\n \nInsight quan trọng: Với một số người nổi tiếng, con số nhỏ, đều đặn hàng tuần/tháng quan trọng hơn con số lớn, một lần (ví dụ: 1 livestream đều đặn/tuần hấp dẫn hơn hợp đồng tiền tỷ).\n \nChiến lược mở rộng: Nếu đủ điều kiện, nên &quot;mua độc quyền&quot; người có ảnh hưởng để đối thủ không tiếp cận được.\n \nChiến lược &quot;Người ảnh hưởng của người ảnh hưởng&quot;: Tìm và kết nối với những người xung quanh influencer chính (quản lý, trợ lý, vợ/chồng) để tiếp cận và tạo ảnh hưởng chặt chẽ hơn, hoặc nhờ họ giới thiệu.\n \nChuẩn bị chu đáo là vô cùng cần thiết khi làm việc với người có ảnh hưởng vì họ tính tiền theo giờ làm việc hoặc theo post (ví dụ: 1 post 15 triệu, 1 giờ livestream 15-20 triệu VND).\n \nTối ưu nội dung để tái sử dụng: Tránh dùng các từ chỉ thời gian cụ thể (ví dụ: &quot;buổi sáng&quot;, &quot;bây giờ là 8 giờ&quot;, &quot;một tuần nữa là Tết&quot;) trong kịch bản. Điều này giúp video/post có thể được sử dụng lại nhiều lần, tối đa hóa giá trị.\n \nSử dụng video &quot;behind the scenes&quot; (phối cảnh, hậu trường) để tạo thêm traffic và nội dung tái sử dụng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Lưu ý kỹ thuật cho Instagram:</h3>\n<p class=\"body-txt\">\nPhát triển chậm hơn Facebook, cần kiên nhẫn hơn.\n \nSử dụng hashtag hiệu quả: Dùng các hashtag đã có sẵn, theo trend, không tự tạo hashtag mới (trừ khi đủ lớn). Đưa hashtag thành phần tất yếu trong bài post.\n \nTiêu đề (caption) là vô cùng quan trọng trên Instagram vì nó quyết định sự lan tỏa và tương tác.\n \nThực hành: Bắt đầu với những người có ảnh hưởng nhỏ trước, sau đó lớn dần lên.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">★ Điểm quan trọng nhất</h3>\n<p class=\"body-txt\">\nChiến lược &quot;Tài sản mối quan hệ&quot; với Influencer và quy trình 3 bước: Đây là chiến lược cốt lõi, chuyển đổi influencer từ kênh quảng cáo tốn kém thành một &quot;tài sản&quot; giá trị. Thay vì chi tiền mua quảng cáo một lần, việc đầu tư thời gian xây dựng mối quan hệ qua các bước làm quen, kết nối trực tiếp (có thể bằng quà tặng), và giữ mối quan hệ bền vững tạo ra sự tin cậy và khả năng lan tỏa tự nhiên, bền vững hơn rất nhiều so với phương pháp truyền thống.\n \nGiá trị của con số nhỏ, đều đặn so với con số lớn, một lần: Insight từ câu chuyện nghệ sĩ từ chối hợp đồng tỷ đồng nhưng chấp nhận livestream đều đặn hàng tuần. Điều này chứng tỏ không phải lúc nào tiền bạc cũng là động lực chính. Hiểu được nhu cầu thực sự của influencer (như sự ổn định, duy trì hoạt động, độ phủ sóng đều đặn) giúp bạn tiếp cận hiệu quả hơn, tiết kiệm chi phí và đạt được sự hợp tác lâu dài.\n \nTối ưu hóa nội dung để tái sử dụng: Mẹo bỏ đi các từ chỉ thời gian cụ thể trong kịch bản làm việc với influencer là cực kỳ quan trọng. Với chi phí cao (15-20 triệu/giờ livestream), việc tạo ra nội dung có thể tái sử dụng nhiều lần trên các nền tảng hoặc trong các chiến dịch khác nhau sẽ tối đa hóa giá trị đầu tư, giúp nội dung không bị lỗi thời và kéo dài hiệu quả truyền thông.\n \nChiến lược &quot;Người ảnh hưởng của người ảnh hưởng&quot;: Tiếp cận và xây dựng mối quan hệ với những người xung quanh influencer chính (quản lý, trợ lý, người thân) là một con đường gián tiếp nhưng hiệu quả. Nó giúp vượt qua rào cản ban đầu khi tiếp cận trực tiếp các influencer lớn, tạo ra một &quot;vòng ảnh hưởng&quot; chặt chẽ và khó bị đối thủ cạnh tranh phá vỡ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Thay vì kết bạn được với người có ảnh hưởng chúng ta lại mất luôn đi người ảnh hưởng.”\n \n“Đây là một loại tài sản trên mạng xã hội của ta.”\n \n“Đối với một số người con số lớn quá họ cũng không có khả năng xử lý. Nên bạn đưa con số nhỏ thôi. Con số mà trong tầm người ta có thể nhận thức được.”\n \n“Làm gì cũng được nhưng cái nội dung đấy phải được sử dụng lại.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Chương 3</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #c62828\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#c62828\">Bài 16: Các mạng xã hội mà bạn không nên bỏ lỡ</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Tóm tắt. Buổi giảng tập trung vào chiến lược marketing trên các nền tảng mạng xã hội khác nhau, đặc biệt là YouTube, Snapchat, Zalo và Instagram. Diễn giả nhấn mạnh rằng mỗi nền tảng có các chỉ số đánh giá hiệu quả (KPI) riêng và cần được tiếp cận phù hợp, khuyến khích không bỏ qua bất kỳ nền tảng nào. Cốt lõi của chiến lược là duy trì sự hiện diện liên tục, kỷ luật trong việc sản xuất nội dung, và đặc biệt là biết cách tái sử dụng, chuyển đổi nội dung giữa các kênh để tối đa hóa hiệu quả và đảm bảo bản quyền.</h3>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Ý chính</h3>\n<p class=\"body-txt\">\nMỗi nền tảng mạng xã hội có chỉ số đo lường quan trọng khác nhau:\n \nYouTube: Thời gian xem là yếu tố quan trọng nhất.\n \nFacebook: Số lượng chia sẻ (share).\n \nInstagram: Số người theo dõi (follower).\n \nĐối với YouTube, tần số phát sóng (tần suất đăng tải video/livestream) cũng rất quan trọng.\n \nKhông nên bỏ qua YouTube, nhiều người bán hàng đang bỏ qua nó.\n \nCó thể sử dụng công cụ như Bisulive để phát trực tiếp đồng thời trên Facebook và YouTube.\n \nTrước đây, có thể kiếm tiền bằng cách &quot;re-up&quot; (post lại video của người khác), nhưng YouTube hiện không cho phép hành vi này.\n \nChiến lược thay thế cho re-up: &quot;Làm lại&quot; nội dung video bằng công cụ và cách thể hiện của riêng mình (ví dụ: nghe ai đó nói hay thì mình nói lại, thấy họ làm phim thì mình làm lại bằng ảnh và lồng tiếng của mình). Việc này giúp sở hữu bản quyền nội dung hoàn toàn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#c62828\">Ví dụ thành công của chiến lược &quot;làm lại&quot; nội dung trên YouTube là anh Trần Hinh với nhiều triệu sub.</h3>\n<p class=\"body-txt\">\nSnapchat: Là một mạng xã hội khá hay nếu bạn là người có ảnh hưởng. Lợi thế của
