yển hóa thành hành động và tạo ra kết quả.\n \nĐiều này quan trọng vì nó nhắc nhở rằng thành công không đến từ việc biết nhiều, mà từ\n \nviệc áp dụng những gì đã biết một cách nhất quán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tối ưu hóa trang bán hàng để xử lý mọi câu hỏi: Một trang bán hàng (landing page) hiệu</span></div>\n<p class=\"body-txt\">\nquả cần cung cấp đầy đủ thông tin, trả lời mọi thắc mắc tiềm ẩn của khách hàng để họ\n \nkhông cần phải hỏi thêm. Bao gồm lý do &quot;tại sao&quot;, so sánh giá, tạo FOMO, testimonial,\n \nquy trình, và các điều khoản liên quan (ví dụ: đổi trả hàng). Điều này quan trọng vì nó\n \ngiúp tối ưu hóa trải nghiệm khách hàng, giảm gánh nặng tư vấn thủ công và tăng hiệu\n \nquả chuyển đổi, đặc biệt trong kinh doanh online.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Người ta không mua cái sản phẩm. Người ta mua cái lý do.”\n \n“Làm việc cho thứ chúng ta không quan tâm được gọi là căng thẳng. Làm việc cho những thứ\n \nchúng ta yêu thích thì được gọi là đam mê.”\n \n“Học trả làm thì chán lắm, chán đời lắm.”\n \n9.4 Tổng kết chiến lược\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi học này tập trung vào việc chuyển đổi từ tư duy bị động sang hành động chủ</h3>\n<p class=\"body-txt\">\nđộng trong kinh doanh online. Diễn giả nhấn mạnh tầm quan trọng của việc sở hữu một\n \n&quot;trang bán hàng&quot; cá nhân làm trung tâm cho mọi hoạt động tiếp thị, tránh phụ thuộc vào các\n \nnền tảng cạnh tranh. Đồng thời, buổi giảng cũng hướng dẫn cách tận dụng AI để tạo nội\n \ndung hiệu quả và xây dựng chiến lược chăm sóc khách hàng nhằm gia tăng giá trị trọn đời\n \ncủa khách hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cuộc sống sẽ thay đổi khi chúng ta quyết định &quot;làm&quot; thay vì chỉ &quot;nghe&quot;.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phải dám đương đầu với thử thách, chinh phục những đỉnh cao hơn thay vì an nhàn ở</span></div>\n<p class=\"body-txt\">\nhiện tại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cần đặt ra những mục tiêu lớn hơn cho ngày mai.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Với sự hỗ trợ của AI, việc tạo nội dung (ví dụ: viết &quot;OK&quot;) đã trở nên rất dễ dàng; nếu</span></div>\n<p class=\"body-txt\">\nkhông làm được thì không biết kinh doanh làm gì.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Viết bài bán hàng cần được &quot;đăng&quot; lên nơi bán hàng (Facebook, video, landing page, thư</span></div>\n<p class=\"body-txt\">\nbán hàng, email, tờ rơi, quảng cáo). Nội dung có thể được biến đổi thành nhiều định\n \ndạng và kênh khác nhau.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quan trọng nhất là có nội dung chuẩn (16 bước của thư bán hàng) rồi muốn đưa đi đâu</span></div>\n<p class=\"body-txt\">\nthì đưa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Kỹ năng cần bổ sung bao gồm quản trị cảm xúc, tuyệt chiêu đàm phán, gia tăng doanh số</span></div>\n<p class=\"body-txt\">\nthông qua các khóa học online trong bộ combo.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mục tiêu của các khóa học online giá thấp là để học viên thực hành và kiếm tiền.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Đừng trì hoãn việc tạo trang bán hàng; nó không có gì khó khăn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Có những sản phẩm dễ bán hơn (ví dụ: vòng bạc) do nhẹ, giá trị cao, dễ vận chuyển và</span></div>\n<p class=\"body-txt\">\nlưu kho, đồng thời có thể định giá cao hơn so với các nền tảng thương mại điện tử.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Không nên bán trên các sàn thương mại điện tử (ví dụ: Shopee) vì dễ bị sao chép và cạnh</span></div>\n<p class=\"body-txt\">\ntranh về giá. Nên bán trên &quot;trang bán hàng của mình&quot; để không có đối thủ so sánh giá.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sản phẩm cần phải tốt, đặc thù, độc đáo và mang lại lợi ích thật sự, có thể có yếu tố</span></div>\n<p class=\"body-txt\">\n&quot;FOMO&quot; (Fear Of Missing Out) hoặc giá trị tinh thần.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khi sản phẩm chính có chu kỳ mua lại dài (ví dụ: nước giặt 5 lít), cần có thêm các sản</span></div>\n<p class=\"body-txt\">\nphẩm quà tặng dùng rất tốt và hết nhanh để giữ chân khách hàng và tạo đơn hàng &quot;gối\n \nđầu&quot;. Đây là chiến lược thiết kế bao bì sản phẩm của Eagle Camp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nếu không có &quot;hệ thống chăm sóc khách hàng&quot; (IPS), khách hàng mua xong sẽ trôi đi và</span></div>\n<p class=\"body-txt\">\nchi phí tìm khách mới rất đắt đỏ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chiến lược IPS: sẵn sàng bán giá thấp hoặc lỗ ban đầu để có khách hàng, sau đó bán các</span></div>\n<p class=\"body-txt\">\nsản phẩm khác có lời (ví dụ: mua bỉm của đối tác về bán rẻ hơn chính hãng để có khách,\n \nsau đó giới thiệu bỉm của mình).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mọi hoạt động kinh doanh, dù là chạy quảng cáo, viết content, livestream hay nói</span></div>\n<p class=\"body-txt\">\nchuyện, đều cần có &quot;trang bán hàng&quot; để hướng luồng khách và thu thập thông tin (điền\n \nform).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Màu sắc đỏ và vàng tuyệt đối không được dùng cho quảng cáo.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lời kêu gọi hành động (Call-to-Action) phải nhất quán (ví dụ: trên là &quot;nhận tư vấn&quot; thì</span></div>\n<p class=\"body-txt\">\ndưới cũng là &quot;nhận tư vấn&quot; chứ không phải &quot;mua ngay&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tiêu đề quảng cáo phải đúng mẫu, không được vi phạm thương hiệu của người khác.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Con người đến với khóa học không phải vấn đề, vấn đề là mình có dấn thân và hành</span></div>\n<p class=\"body-txt\">\nđộng hay không.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Với hướng dẫn 16 bước bán hàng chi tiết, có AI hỗ trợ, nếu vẫn không viết được thì nên</span></div>\n<p class=\"body-txt\">\nbỏ cuộc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Một câu lệnh AI rất quan trọng: &quot;Tìm kiếm các thông tin liên quan rồi tổng hợp cho tôi&quot;</span></div>\n<p class=\"body-txt\">\ngiúp tự động hóa bước nghiên cứu và tổng hợp thông tin ban đầu.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nếu không viết giỏi, hãy dùng AI để viết; thậm chí copy-paste cũng tốt hơn là không làm</span></div>\n<p class=\"body-txt\">\ngì.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hành động quyết định kết quả: Diễn giả liên tục nhấn mạnh rằng chỉ có hành động (làm)</span></div>\n<p class=\"body-txt\">\nmới tạo ra sự khác biệt và mang lại kết quả, thay vì chỉ nghe hay trì hoãn. Đây là kim chỉ\n \nnam xuyên suốt toàn bộ buổi giảng, thúc đẩy học viên áp dụng ngay những kiến thức đã\n \nhọc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Trang bán hàng&quot; là cốt lõi của mọi hoạt động kinh doanh: Bất kể bán sản phẩm hay dịch</span></div>\n<p class=\"body-txt\">\nvụ gì, việc có một trang bán hàng cá nhân (sales page) là điều bắt buộc. Trang này không\n \nchỉ là nơi định hướng khách hàng, thu thập thông tin mà còn giúp doanh nghiệp tự chủ\n \nvề thương hiệu và giá cả, tránh sự cạnh tranh trực tiếp trên các nền tảng chung.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tối ưu hóa quy trình với AI và chiến lược chăm sóc khách hàng: Diễn giả chỉ ra cách sử</span></div>\n<p class=\"body-txt\">\ndụng AI để tự động hóa nghiên cứu và tạo nội dung marketing hiệu quả (&quot;Tìm kiếm các\n \nthông tin liên quan rồi tổng hợp cho tôi&quot;). Đồng thời, giới thiệu chiến lược IPS (Internet\n \nProduct Sales) tập trung vào việc xây dựng hệ thống chăm sóc khách hàng, sử dụng các\n \nsản phẩm &quot;gối đầu&quot; hoặc bán giá thấp ban đầu để thu hút và giữ chân khách hàng, từ đó\n \ngia tăng giá trị trọn đời của khách hàng thông qua bán chéo và bán thêm.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Cuộc sống của chúng ta sẽ trở nên khác biệt kể từ ngày chúng ta quyết định làm, chứ không\n \nphải từ ngày chúng ta quyết định nghe.”\n \n“Làm thì mới có ăn, không làm thì làm gì có.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Chương 11</h3>\n<p class=\"body-txt\">\n10.1 Liệt kê sắp xếp lựa chọn\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi giảng này tập trung vào nghệ thuật kể chuyện (storytelling) và cách sử dụng</h3>\n<p class=\"body-txt\">\ncông nghệ (như ChatGPT) để biến thông tin phức tạp thành những câu chuyện dễ hiểu, hấp\n \ndẫn người nghe. Diễn giả nhấn mạnh rằng bản chất mọi thứ đều có câu chuyện, và để thu hút\n \nsự chú ý, ta cần phải kể câu chuyện mà người khác muốn nghe, thay vì chỉ trình bày về bản\n \nthân. Kỹ năng này bao gồm việc liệt kê, sắp xếp và lựa chọn thông tin một cách thông minh\n \nđể đáp ứng nhu cầu của đối tượng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bài tập buổi tối hôm qua là viết về một bức ảnh ngẫu nhiên từ điện thoại.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bản chất của bức ảnh (và mọi thứ) đều có câu chuyện, nhưng cần tinh ý để khai thác.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lý do diễn giả được mọi người vây quanh và lắng nghe là vì diễn giả kể những câu</span></div>\n<p class=\"body-txt\">\nchuyện mà họ muốn nghe.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bí quyết là phải lựa chọn câu chuyện mình muốn kể sao cho đó là câu chuyện họ muốn</span></div>\n<p class=\"body-txt\">\nnghe.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ví dụ về slide giới thiệu bản thân: slide cần phù hợp với đối tượng và giải quyết vấn đề</span></div>\n<p class=\"body-txt\">\ncủa đối tượng, không chỉ nói về bản thân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ví dụ về gọi món ăn ở Hawaii: thực đơn phức tạp, khó hiểu ngay cả khi dịch sang tiếng</span></div>\n<p class=\"body-txt\">\nAnh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Giải pháp: sử dụng Chat GPT để dịch, liệt kê, sắp xếp và gợi ý món ăn theo tiêu chí mong</span></div>\n<p class=\"body-txt\">\nmuốn (ví dụ: món đắt nhất, món số 1, món số 2 cho các bữa ăn khác nhau).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quy trình: Liệt kê -&gt; Sắp xếp -&gt; Lựa chọn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phân biệt &quot;burger&quot; và &quot;sandwich&quot; để minh họa việc tìm hiểu sâu hơn về khái niệm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">ChatGPT có thể giúp định nghĩa và phân loại, ví dụ: &quot;tất cả các burger đều là sandwich,</span></div>\n<p class=\"body-txt\">\nnhưng không phải tất cả các sandwich là burger&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thực tế, diễn giả không dùng Chat GPT mà tự đọc và tìm hiểu menu, nhưng phương</span></div>\n<p class=\"body-txt\">\npháp dùng Chat GPT là dành cho những người &quot;không biết gì&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quy trình liệt kê, sắp xếp, lựa chọn này là để dạy những người không biết cách xử lý</span></div>\n<p class=\"body-txt\">\nthông tin phức tạp.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nghệ thuật kể chuyện là chìa khóa thu hút sự chú ý và ảnh hưởng: Diễn giả nhấn mạnh</span></div>\n<p class=\"body-txt\">\nrằng mọi người đến với diễn giả, vây lấy diễn giả là vì diễn giả kể những câu chuyện mà\n \nhọ muốn nghe. Đây là insight đắt giá vì nó chuyển trọng tâm từ việc &quot;nói những gì mình\n \ncó&quot; sang &quot;nói những gì người khác muốn nghe&quot;, đặt khán giả/đối tác/khách hàng vào\n \ntrung tâm của mọi giao tiếp, từ đó tạo ra sự kết nối và giá trị thực sự.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sử dụng công nghệ (AI) để biến thông tin phức tạp thành dễ hiểu: Việc dùng ChatGPT để</span></div>\n<p class=\"body-txt\">\nxử lý thực đơn rối rắm, liệt kê, sắp xếp và lựa chọn món ăn là một ví dụ tuyệt vời. Điểm\n \nquan trọng là công nghệ không chỉ dịch mà còn cấu trúc lại thông tin theo tiêu chí cụ thể,\n \ngiúp người dùng &quot;không biết gì&quot; cũng có thể đưa ra quyết định thông minh. Điều này chỉ\n \nra tiềm năng của AI trong việc đơn giản hóa quá trình ra quyết định và tăng cường khả\n \nnăng tiếp cận thông tin.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Bí quyết nó chỉ có vậy thôi, nó không có cái gì đặc biệt ở đây hết ấy. Họ đến với tôi, họ muốn\n \nlắng nghe câu chuyện của tôi.”\n \n“Mày để xuất cho tao món gì? Mày gợi ý cho tao top 1, top 2, top 3, top 4, top 5, top 10. Lại là\n \nliệt kê, lại là sắp xếp, lại lựa chọn!”\n \n“Trên thực tế là tôi đang dạy các ông là những thằng không biết gì, các ông mới phải làm như\n \nthế này.”\n \n10.2 Kể chuyện bằng hình ảnh\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi giảng nhấn mạnh tầm quan trọng của sự chăm chỉ và hành động liên tục, cho</h3>\n<p class=\"body-txt\">\nrằng thành công và sự giúp đỡ từ &quot;trời&quot; chỉ đến với những người nỗ lực. Để đạt được điều\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><p class=\"body-txt\">\nđó, diễn giả giới thiệu phương pháp &quot;Liệt kê – Sắp xếp – Lựa chọn&quot; như một công cụ tư duy\n \nnền tảng, áp dụng từ việc phân tích chi tiết một bức ảnh đến việc hoạch định cuộc sống. Đặc\n \nbiệt, buổi học còn chỉ ra cách tận dụng AI (như Chat GPT) để nâng cao khả năng quan sát và\n \nphân tích chi tiết, giúp con người không bỏ sót thông tin, từ đó ra quyết định hiệu quả hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Buổi học kết thúc khóa học 9 ngày, nhấn mạnh giá trị của sự &quot;câu lệnh&quot; (hành động).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Triết lý thành công: Chúa, Phật, ông trời chỉ giúp những người chăm chỉ, hành động,</span></div>\n<p class=\"body-txt\">\nkhông giúp người ngồi yên không làm gì. Số phận có, nhưng gắn liền với hành động.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thực hành viết: Buổi học này là về &quot;dạy viết&quot;, cụ thể là viết về một bức ảnh.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phân tích hình ảnh: Một bức ảnh không chỉ là hình ảnh mà ẩn chứa rất nhiều câu chuyện</span></div>\n<p class=\"body-txt\">\nvà chi tiết (ví dụ: chiếc xe Ranger, ánh sáng lóe lên từ gương, cột điện, dây thép gai, biển\n \nRoute 66).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vai trò của AI (Chat GPT): Con người dễ bỏ sót chi tiết, trong khi AI có thể phân tích và</span></div>\n<p class=\"body-txt\">\nnhận diện tức thì. Sử dụng AI giúp &quot;rút ngắn thời gian xem xét các sự vật hiện tượng&quot; và\n \n&quot;không bị bỏ qua một cái gì đó&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phương pháp &quot;Liệt kê – Sắp xếp – Lựa chọn&quot;: Đây là phương pháp cốt lõi cho mọi việc:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Liệt kê: Liệt kê *tất cả* các khả năng, từ khóa, ý tưởng, tu từ, tiêu đề, vấn đề, giải pháp,</span></div>\n<p class=\"body-txt\">\ntình tiết câu chuyện, yếu tố uy tín, tạo giá trị, so sánh, quà tặng, xử lý từ chối, lý do\n \nbán/mua hàng, kêu gọi hành động. Liệt kê hết, gọi hết ra, dán lên tường.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sắp xếp: Sắp xếp các mục đã liệt kê theo tiêu chí mong muốn (cái nào muốn nhất, khả</span></div>\n<p class=\"body-txt\">\nnăng nhất) hoặc các tiêu chí khác (nguồn lực, mức độ cần thiết).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lựa chọn: Từ danh sách đã sắp xếp, lựa chọn những gì phù hợp nhất để thực hiện.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Áp dụng cho việc học và phát triển bản thân: Liệt kê tất cả khóa học, sắp xếp theo mong</span></div>\n<p class=\"body-txt\">\nmuốn và khả năng, rồi chọn. Đừng chọn theo tiêu chí sai lầm hoặc dựa vào người khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khuyến khích hành động: Nếu 9 ngày qua không làm bài tập viết lách, thì không nên</span></div>\n<p class=\"body-txt\">\ntham gia các khóa học nâng cao (như IPS), vì không có năng lực hành động. &quot;Trình độ&quot; ở\n \nđây không phải kiến thức mà là có *bấm nút làm* hay không. Tiếp tục không làm thì\n \n&quot;kiếp này coi như mình ấn định như thế rồi&quot; và phải chờ &quot;kiếp sau&quot; hoặc lâu hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chủ động hành động và sự chăm chỉ là yếu tố tiên quyết để thành công: Diễn giả khẳng</span></div>\n<p class=\"body-txt\">\nđịnh mạnh mẽ rằng sự giúp đỡ từ các thế lực siêu nhiên (Chúa, Phật, ông trời) hay cơ hội\n \nchỉ dành cho những người &quot;chăm chỉ&quot; và chủ động làm việc. Điều này quan trọng vì nó\n \nchuyển trách nhiệm từ yếu tố bên ngoài (may mắn, số phận) sang nội lực và hành động\n \ncủa bản thân, khuyến khích sự tự lực cánh sinh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phương pháp &quot;Liệt kê – Sắp xếp – Lựa chọn&quot; là một công cụ tư duy toàn diện và hệ</span></div>\n<p class=\"body-txt\">\nthống: Đây là một khuôn khổ thực tế để phân tích, lập kế hoạch và ra quyết định hiệu\n \nquả trong mọi lĩnh vực. Việc &quot;liệt kê hết ra&quot; giúp đảm bảo không bỏ sót thông tin, &quot;sắp\n \nxếp&quot; giúp nhìn rõ ưu tiên và mối liên hệ, còn &quot;lựa chọn&quot; giúp đưa ra quyết định sáng\n \nsuốt. Đây là một kỹ năng nền tảng để biến suy nghĩ thành hành động cụ thể.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tận dụng AI để nâng cao khả năng quan sát và phân tích chi tiết: Việc sử dụng Chat GPT</span></div>\n<p class=\"body-txt\">\nđể &quot;rút ngắn thời gian xem xét các sự vật hiện tượng một cách đầy đủ để không bị bỏ\n \nqua một cái gì đó&quot; là một insight đắt giá. Nó cho thấy AI không chỉ là công cụ tạo nội\n \ndung mà còn là &quot;trợ lý&quot; mạnh mẽ giúp con người vượt qua giới hạn về khả năng quan sát\n \nvà xử lý thông tin, từ đó đưa ra quyết định dựa trên cái nhìn toàn diện hơn về thực tế.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Chúa, Phật, ông trời còn đang bận giúp những thằng chăm chỉ cái đã, chưa đến lượt mình.”\n \n“Liệt kê hết nó ra, gọi hết nó ra, dán nó lên tường, bổ sung nó lên tường cái đã. Liệt kê hết nó\n \nra rồi sắp xếp rồi lựa chọn, chúng ta sẽ thấy quyền năng của mình lớn lên rất là nhiều.”\n \n“Nếu không làm thì thôi, không học IPS. Vì sao? Kiếp này coi như mình ấn định như thế rồi.”\n \n10.3 Tổng kết, bài tốt nghiệp\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi giảng này là phần kết thúc một khóa học internet marketing, tập trung vào</h3>\n<p class=\"body-txt\">\ntầm quan trọng của việc hành động thay vì chỉ học lý thuyết. Diễn giả giao bài tập cuối khóa\n \nlà viết một bài quảng cáo bán hàng theo cấu trúc 16 bước chi tiết cho khóa học &quot;Trại Kinh\n \ndoanh Đột phá&quot;, đồng thời hướng dẫn cách xử lý các lý do từ chối thường gặp. Cốt lõi của bài\n \nhọc là nguyên tắc &quot;Eat Your Own Food&quot; (tức là &quot;Tự ăn thức ăn của mình&quot;): nếu tự viết bài\n \nquảng cáo mà không cảm thấy động lực muốn mua/tham gia khóa học, thì bài quảng cáo đó\n \nkhông đạt yêu cầu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Buổi giảng này là ngày cuối cùng của khóa học 10 ngày, nhấn mạnh việc thực hành chứ</span></div>\n<p class=\"body-txt\">\nkhông phải chỉ tiếp tục học.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Điều quan trọng nhất là &quot;bạn có làm hay không&quot;, nếu không làm thì mọi thứ vô nghĩa.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bài tập cuối khóa là viết một bài quảng cáo (sale ad) cho khóa học &quot;Trại Kinh doanh Đột</span></div>\n<p class=\"body-txt\">\nphá&quot; theo cấu trúc 16 nội dung. Bài quảng cáo có thể đăng lên trang bán hàng hoặc trang\n \ncá nhân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thông tin cơ bản về sản phẩm (khóa học):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tên chương trình: &quot;Trại Kinh doanh Đột phá&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thời gian học: 3 ngày (30, 31 tháng 11, mùng 1 tháng 12).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nơi học: Queen Plaza Kỳ Hòa, 16 Lê Hồng Phong, TP.HCM.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Đối tượng khách hàng mục tiêu (Who):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Người đang làm kinh doanh.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chủ doanh nghiệp.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Những người làm n  class=\"bul-txt\">Phản biện: Nếu TP.HCM mà xa thì liệu có nên kinh doanh nữa không? &quot;Gà què ăn quẩn</span></div>\n<p class=\"body-txt\">\ncối xay&quot;. Đến đó để có cơ hội cọ xát, gặp gỡ, lắng nghe những doanh nhân khắp cả nước.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Giá cả và ưu đãi:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Giá các khóa học kinh doanh khác: từ 200 triệu đồng trở lên.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Giá niêm yết của khóa này: 19.868.000 VNĐ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ưu đãi đặc biệt khi đăng ký sớm (trước khi diễn giả về nước): 10.000.000 VNĐ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quà tặng đặc biệt (nếu đăng ký đủ sớm): 3 bữa trưa cùng diễn giả để tâm sự, giãi bày,</span></div>\n<p class=\"body-txt\">\ntháo gỡ vấn đề trong doanh nghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Kêu gọi hành động (Call to Action - CTA):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nhiều lựa chọn CTA: &quot;bấm vào đây để mua luôn&quot;, &quot;bấm vào đây để tìm hiểu&quot;, &quot;bấm vào</span></div>\n<p class=\"body-txt\">\nđây để giữ chỗ&quot;, &quot;bấm vào đây để gia tăng doanh số&quot;, &quot;bấm vào đây để tham gia Trại\n \nKinh doanh Đột phá&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Địa chỉ trang web: www.kinhdoanhdotpha.com.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Câu chuyện (Story) và Lời chứng thực (Testimonial):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sử dụng nhiều câu chuyện thực tiễn của những người đã thành công.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lời chứng thực là ý kiến của khách hàng, câu chuyện thật, sống động. Có thể dùng câu</span></div>\n<p class=\"body-txt\">\nchuyện của người đã học để đưa vào bài viết.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mục đích của việc viết bài quảng cáo (quan trọng):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Đây là bài tốt nghiệp.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nếu viết xong mà bản thân mình vẫn chưa muốn đi học, thì bài viết đó coi như vứt.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bạn phải tự mình cảm thấy có động lực để đi học (nguyên tắc &quot;Eat Your Own Food&quot; /</span></div>\n<p class=\"body-txt\">\n&quot;Tự ăn thức ăn của mình&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Những lỗi thường gặp khi viết và cách sửa (Phân tích bài của học viên tên Hoàn):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lỗi 1: Tiêu đề chính. Không nên đặt tên khóa học (ví dụ: &quot;Trại Kinh doanh Đột phá&quot;).</span></div>\n<p class=\"body-txt\">\nTiêu đề phải nêu bật được &quot;giá trị độc đáo duy nhất của sản phẩm&quot;, chiếm 80% thành\n \ncông của bài quảng cáo.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lỗi 2: Tiêu đề phụ. Phải có mục đích kết nối tiêu đề chính với nội dung, khuyến khích</span></div>\n<p class=\"body-txt\">\nngười đọc &quot;hãy đọc quảng cáo này đi&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lỗi 3: Hiển thị trên màn hình. Đảm bảo bài viết hiển thị thuận tiện trên một màn hình</span></div>\n<p class=\"body-txt\">\nđiện thoại, nút bấm dễ sử dụng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quy trình viết và chỉnh sửa:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Liệt kê 16 nội dung.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Viết tay trước, đừng dùng ChatGPT ngay.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Đọc lại (bằng lời nói): Nghe lại xem có thuận tai không, có muốn sửa không. Sửa đi sửa</span></div>\n<p class=\"body-txt\">\nlại cho đến khi ưng ý.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thêm vào những câu nói, tục ngữ, ca dao.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sử dụng các biện pháp tu từ: lặp lại, điệp từ, ẩn dụ, so sánh (đặc biệt là phép lặp để nhấn</span></div>\n<p class=\"body-txt\">\nmạnh).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lời kết: Nhấn mạnh lại các quy trình và hi vọng sẽ gặp lại những người đã hành động tại</span></div>\n<p class=\"body-txt\">\ncác khóa học. &quot;Vĩnh biệt những người không làm.&quot;\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cấu trúc 16 bước để viết bài quảng cáo bán hàng hiệu quả: Đây là một công cụ thực tế và</span></div>\n<p class=\"body-txt\">\ntoàn diện để xây dựng thông điệp marketing thuyết phục. Nó bao gồm từ việc xác định\n \nđối tượng, nêu bật vấn đề, đưa ra giải pháp, xây dựng uy tín, xử lý từ chối, đến kêu gọi\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">hành động. Quan trọng vì nó cung cấp một lộ trình rõ ràng, giúp tránh bỏ sót các yếu tố</h3>\n<p class=\"body-txt\">\nthen chốt để chuyển đổi khách hàng, áp dụng được cho mọi sản phẩm/dịch vụ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nguyên tắc &quot;Eat Your Own Food&quot; (Tự ăn thức ăn của mình): Đây là một triết lý về tính</span></div>\n<p class=\"body-txt\">\nxác thực và niềm tin. Nếu bạn không thể tự mình bị thuyết phục bởi bài quảng cáo của\n \nchính mình (đến mức muốn mua/tham gia), thì không thể mong đợi người khác bị\n \nthuyết phục. Quan trọng vì nó là thước đo nội tại cho chất lượng thông điệp và sản\n \nphẩm/dịch vụ, đảm bảo người làm marketing có niềm tin thật sự vào điều mình đang\n \nbán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tầm quan trọng của tiêu đề chính (headline) và việc nêu bật giá trị độc đáo duy nhất:</span></div>\n<p class=\"body-txt\">\nTiêu đề được nhấn mạnh là yếu tố quyết định 80% thành công của bài quảng cáo và phải\n \ntập trung vào giá trị độc đáo của sản phẩm, không phải chỉ là tên sản phẩm. Quan trọng\n \nvì trong môi trường cạnh tranh cao, tiêu đề là cơ hội đầu tiên và thường là duy nhất để\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><p class=\"body-txt\">\nthu hút sự chú ý, và nếu nó không rõ ràng về giá trị độc đáo, bài quảng cáo sẽ thất bại\n \nngay từ bước đầu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cách xử lý các lý do từ chối, đặc biệt là &quot;bận&quot;: Diễn giả không chỉ liệt kê các lý do từ chối</span></div>\n<p class=\"body-txt\">\nmà còn đưa ra cách phản biện thuyết phục, ví dụ như biến &quot;bận&quot; thành dấu hiệu của sự\n \nkém hiệu quả và cơ hội để thay đổi. Quan trọng vì xử lý từ chối là kỹ năng bán hàng thiết\n \nyếu. Bằng cách tái định hình những trở ngại thành động lực, người bán có thể phá vỡ rào\n \ncản tâm lý của khách hàng và thúc đẩy hành động.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Điều quan trọng là bạn có làm hay không, còn nếu mà bạn không làm thì thôi, mọi thứ không\n \nbao giờ còn gặp lại tôi nữa.”\n \n“Cái tiêu đề chính là nó phải nêu bật được cái giá trị độc đáo duy nhất của sản phẩm chứ\n \nkhông phải nêu tên cái sản phẩm ra.”\n \n“Bạn phải có động lực để xông thẳng đến cái khóa học đó. Bạn viết xong bạn phải có động lực\n \nđể đi.”\n \n“Đừng lý do. Lý do không giúp mình tiến lên đâu. Viết quảng cáo.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><p class=\"body-txt\">\nLời kết\n \nHết khoá Viết Hay - Hay Viết. Đọc để LÀM, không phải để biết — biến mỗi bài học thành\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">hành động cụ thể.</h3></div></div>",
"<div class=\"pg pg-cover\" style=\"border-top:5px solid #388e3c\">\n  <div class=\"cover-wrap\">\n    <div class=\"cover-title\">Viết Hay – Hay Viết</div>\n    <div class=\"cover-sub\" style=\"color:#388e3c\">Học để ứng dụng · Áp dụng để thành công</div>\n    <div class=\"cover-tag\" style=\"color:#388e3c;margin-top:24px\">QNPA Pickleball Academy</div>\n  </div>\n</div>"];
const N=pages.length;
let cur=0;
const book=document.getElementById('book');
const fill=document.getElementById('progress-fill');
const info=document.getElementById('page-info');
const jump=document.getElementById('page-jump');
const btnP=document.getElementById('btn-prev');
const btnN=document.getElementById('btn-next');
function render(){
  book.innerHTML=pages[cur];
  fill.style.width=((cur+1)/N*100)+'%';
  info.textContent=(cur+1)+' / '+N;
  jump.value=cur+1;
  btnP.disabled=cur===0;
  btnN.disabled=cur===N-1;
  window.scrollTo(0,0);
}
function next(){if(cur<N-1){cur++;render();}}
function prev(){if(cur>0){cur--;render();}}
function goTo(n){cur=Math.max(0,Math.min(N-1,n));render();}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown')next();
  else if(e.key==='ArrowLeft'||e.key==='PageUp')prev();
});
render();
</script>
</body>
