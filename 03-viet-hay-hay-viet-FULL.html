"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#388e3c\">nội dung tốt, từ đó có thể đưa ra các câu lệnh (prompt) chính xác và chi tiết cho AI, thay</h3>\n<p class=\"body-txt\">\nvì chỉ nhận được các câu trả lời chung chung. Đây là nền tảng để tạo ra nội dung\n \nmarketing không chỉ &quot;có&quot; mà còn &quot;hay.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sử dụng AI như một công cụ sáng tạo để mở rộng khả năng, không phải chỉ sao chép:</span></div>\n<p class=\"body-txt\">\nDiễn giả liên tục hướng dẫn cách đưa ra các yêu cầu phức tạp cho AI như &quot;liệt kê 20 cách\n \ncảm ơn diễn giả... sử dụng nhiều biện pháp tu từ, tượng thanh và tượng hình.&quot; Điều này\n \nđịnh vị AI là một trợ lý mạnh mẽ giúp con người khám phá và phát triển ý tưởng sáng\n \ntạo, vượt ra ngoài những khuôn mẫu thông thường. Nó khuyến khích tư duy đổi mới và\n \nđộc đáo trong cách tạo nội dung.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sự kết hợp nhiều yếu tố tâm lý và kỹ thuật tạo nên tiêu đề hấp dẫn: Diễn giả chỉ ra rằng</span></div>\n<p class=\"body-txt\">\nmột tiêu đề &quot;hay&quot; là tổng hòa của nhiều yếu tố như lời hứa giá trị, FOMO, thu hẹp đối\n \ntượng, và giá trị độc đáo. &quot;Nó hay ở đây là vì nó có cái một, cái hai, cái ba, cái bốn, cái\n \nnăm, cái sáu.&quot; Điều này quan trọng vì nó cung cấp một khung sườn toàn diện cho việc\n \nxây dựng tiêu đề. Nó giúp người làm marketing hiểu rằng không có &quot;viên đạn bạc&quot; nào,\n \nmà hiệu quả đến từ sự pha trộn khéo léo và có chủ đích của nhiều kỹ thuật, đánh vào\n \nnhiều khía cạnh tâm lý của khách hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Đẹp trai thì là thiên phú, nhưng mà kiến thức là do luyện tập mà có đấy thì luyện tập hay là\n \nnhư thế nào?”\n \n“Khen cũng phải biết cách mà khen.”\n \n“Phân tích tại sao bài này hay, phân tích tại sao cái câu này hay.”\n \n3.3 Áp dụng Dữ liệu có cấu trúc trong viết bài\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi học này tập trung vào phương pháp &quot;dữ liệu có cấu trúc&quot; để tìm kiếm và tổ</h3>\n<p class=\"body-txt\">\nchức từ khóa một cách hiệu quả, giúp nâng cao kỹ năng viết lách. Diễn giả hướng dẫn cách\n \nliệt kê các từ khóa mô tả cảm xúc, tính năng, và lợi ích, sau đó sử dụng công cụ AI như Chat\n \nGPT để mở rộng và tinh chỉnh danh sách từ vựng. Mục tiêu là giúp người học có thể lựa chọn\n \nnhững từ ngữ đắt giá nhất, áp dụng vào việc mô tả sản phẩm/dịch vụ một cách rõ ràng và\n \nthuyết phục.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ngày 1: Liệt kê tất cả những gì thấy hay, thấy tốt, rồi lưu lại.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ngày 2: Liệt kê các biện pháp tu từ (như từ tượng thanh, tượng hình, láy, so sánh, ẩn dụ,</span></div>\n<p class=\"body-txt\">\nphương pháp đối, ngắt câu) và các phương án của từng biện pháp, sau đó lựa chọn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hôm nay (Bài học chính):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Liệt kê tất cả các từ khóa, phương án, khả năng, và câu có liên quan đến khía cạnh cần</span></div>\n<p class=\"body-txt\">\nviết.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ví dụ cụ thể: Liệt kê các từ cảm thán (đặc biệt là mô tả sự ngạc nhiên).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sử dụng Chat GPT khi bế tắc: Khi không biết tên gọi hoặc không nghĩ ra từ khóa, đưa các</span></div>\n<p class=\"body-txt\">\ntừ mình có cho Chat GPT và yêu cầu nó tìm các từ khóa cùng loại hoặc tương tự.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nguyên tắc cốt lõi: Để hiểu rõ, nhớ và sử dụng được từ ngữ trong văn viết một cách</span></div>\n<p class=\"body-txt\">\nnhanh chóng, cần phải phân loại chúng thành cấu trúc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Trọng tâm hôm nay: Liệt kê từ khóa mô tả cảm xúc, từ khóa mô tả tính năng, và từ khóa</span></div>\n<p class=\"body-txt\">\nmô tả lợi ích của sản phẩm/dịch vụ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quy trình thực hành với Chat GPT:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mở Chat GPT và đưa ra các từ khóa mô tả ban đầu (ví dụ: về một chiếc áo khoác: ấm,</span></div>\n<p class=\"body-txt\">\nnhẹ, chịu nước, hợp thời trang, chống nhăn, bền).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hỏi Chat GPT: &quot;Những từ khóa này gọi là gì?&quot; (AI sẽ trả lời: đặc tính sản phẩm).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Yêu cầu Chat GPT: &quot;Liệt kê cho tôi 10 từ khóa mô tả tính năng của sản phẩm này.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Yêu cầu Chat GPT: &quot;Mô tả lợi ích của sản phẩm này.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chọn lọc những từ khóa phù hợp từ danh sách Chat GPT gợi ý (bỏ qua những từ không</span></div>\n<p class=\"body-txt\">\nliên quan hoặc &quot;bịa ra&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sử dụng các từ khóa đã chọn để viết mô tả hoàn chỉnh cho sản phẩm/dịch vụ (ví dụ: mô</span></div>\n<p class=\"body-txt\">\ntả một chiếc lều dã ngoại).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tên phương pháp: Phương pháp này được gọi là &quot;dữ liệu có cấu trúc&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quy trình tổng quát của phương pháp &quot;dữ liệu có cấu trúc&quot;: Liệt kê tất cả khả năng →</span></div>\n<p class=\"body-txt\">\nLựa chọn khả năng → Viết → Loại bỏ → Bổ sung thêm → Loại bỏ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mở rộng: Phương pháp này mở rộng cách viết từ việc chỉ sử dụng các biện pháp tu từ</span></div>\n<p class=\"body-txt\">\nsang việc sử dụng và tổ chức các &quot;bộ từ&quot; (tập hợp từ vựng theo chủ đề).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phương pháp &quot;Dữ liệu có cấu trúc&quot; trong tìm kiếm từ khóa: Đây là một cách tiếp cận có</span></div>\n<p class=\"body-txt\">\nhệ thống để thu thập và sắp xếp từ vựng. Thay vì viết ngẫu hứng, việc liệt kê và phân loại\n \ncác từ khóa theo các khía cạnh cụ thể (cảm xúc, tính năng, lợi ích) giúp người viết xây\n \ndựng một kho từ vựng phong phú và có tổ chức. Điều này quan trọng vì nó tạo nền tảng\n \nvững chắc cho việc viết lách, đảm bảo nội dung đầy đủ, chính xác, và dễ dàng lựa chọn từ\n \nngữ phù hợp nhất cho từng mục đích.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tận dụng AI (Chat GPT) để mở rộng kho từ vựng và khắc phục bế tắc ý tưởng: Chat GPT</span></div>\n<p class=\"body-txt\">\nđược giới thiệu như một công cụ mạnh mẽ giúp gợi ý các từ khóa tương tự hoặc liên\n \nquan, tiết kiệm thời gian và phá vỡ bế tắc khi bí từ. Khả năng nhanh chóng tìm kiếm các\n \ntừ mô tả tính năng, lợi ích hay cảm xúc giúp làm giàu nội dung một cách hiệu quả, cho\n \nphép người viết tập trung vào việc chọn lọc và biên tập thay vì tự mình suy nghĩ mọi thứ\n \ntừ đầu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phân loại từ vựng theo cấu trúc cụ thể (cảm xúc, tính năng, lợi ích): Việc tách biệt và tìm</span></div>\n<p class=\"body-txt\">\nkiếm từ vựng dựa trên các danh mục rõ ràng này cực kỳ quan trọng trong marketing và\n \ncopywriting. Khi mô tả một sản phẩm hay dịch vụ, người viết cần phải truyền tải đầy đủ\n \ncả các tính năng khách quan, lợi ích thiết thực mà khách hàng sẽ nhận được, và những\n \ncảm xúc mà sản phẩm/dịch vụ đó mang lại. Phân loại rõ ràng giúp đảm bảo mỗi khía\n \ncạnh đều được đề cập đầy đủ và có sức thuyết phục cao.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“cái này ngày xưa trong ngữ pháp ta học hết đấy nhá. Tôi nói thật với các ông tất cả cái này là\n \nta học rồi, không có gì mới cả.”\n \n“để mà chúng ta có thể hiểu rõ được và nhớ được những cái từ này để khi mình viết văn thì\n \nmình sử dụng được nó ngay thì mình phải phân loại nó thành cấu trúc.”\n \n“tức là hôm nay chúng ta chỉ cần viết ra, xong mình yêu cầu [Chat GPT]...”\n \n3.4 Cách sử dụng AI hiệu quả trong viết bài\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi học này tập trung vào việc xây dựng và sắp xếp &quot;dữ liệu có cấu trúc&quot; cùng &quot;bộ</h3>\n<p class=\"body-txt\">\nngôn từ&quot; phong phú để nâng cao khả năng sáng tạo và diễn đạt. Diễn giả hướng dẫn cách tổ\n \nchức thông tin theo cấp độ từ cơ bản đến phức tạp (như từ, ngữ, câu, đoạn), đồng thời\n \nkhuyến khích sử dụng các biện pháp tu từ để làm phong phú ngôn ngữ. ChatGPT được giới\n \nthiệu như một công cụ hỗ trợ tìm kiếm và liệt kê ý tưởng, nhưng việc chủ động viết lại và sử\n \ndụng ngôn từ cá nhân là yếu tố then chốt để tạo ra nội dung độc đáo, hấp dẫn, tránh sự\n \nnhàm chán và mất tương tác.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">ChatGPT không phải là khóa học mà là một công cụ hỗ trợ tư duy, không phải công cụ tối</span></div>\n<p class=\"body-txt\">\nưu. Diễn giả không dùng nó vì diễn giả có khả năng nhớ và sắp xếp ngôn từ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">ChatGPT có thể nhớ được dữ liệu vì nó được nối và liên kết thành các &quot;ngăn dữ liệu&quot; có</span></div>\n<p class=\"body-txt\">\ncấu trúc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Việc lựa chọn và kết hợp từ ngữ theo cấu trúc ngữ pháp giúp tăng khả năng sáng tạo.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">ChatGPT là &quot;một tập hợp các dữ kiện đã có&quot;, dùng làm &quot;nguồn tham khảo ban đầu&quot; vì nó</span></div>\n<p class=\"body-txt\">\nnhanh, tiện, nhưng vì ai cũng dùng nên nó không phải công cụ tối ưu cho sự độc đáo.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Để viết hay, cần có &quot;bộ ngôn từ&quot; mà sử dụng và sắp xếp chúng theo một &quot;cấu trúc dữ</span></div>\n<p class=\"body-txt\">\nliệu&quot; để truy xuất nhanh chóng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cấu trúc dữ liệu được ví như một cái cây, từ gốc (từ) đến thân (ngữ), cành (câu), nhánh</span></div>\n<p class=\"body-txt\">\n(đoạn), lá (bài), gân lá (sách) và tế bào (thư viện). Đây được gọi là &quot;dữ liệu có cấu trúc&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Giới thiệu các &quot;biện pháp tu từ&quot; như ẩn dụ, so sánh, nhân hóa, tượng thanh, tượng hình</span></div>\n<p class=\"body-txt\">\nđể mô tả từng khía cạnh, làm đa dạng ngôn ngữ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hai loại cấu trúc dữ liệu quan trọng cần học là:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mô tả cảm giác của người dùng (ví dụ: 7 cảm xúc quyết định việc mua hàng, trong đó có</span></div>\n<p class=\"body-txt\">\n&quot;ngạc nhiên&quot; với các cấp độ như &quot;sững sờ&quot;, &quot;thổn thức&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mô tả tính năng và lợi ích của sản phẩm (ví dụ: nhanh, nhẹ, tốt, rẻ, bền, tiện; hoặc thời</span></div>\n<p class=\"body-txt\">\ntrang, hiện đại, đẹp, công nghệ).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khi ngôn từ hạn hẹp, có thể dùng ChatGPT để liệt kê các tính năng/lợi ích *tương tự*</span></div>\n<p class=\"body-txt\">\nnhưng mục đích là để tìm ra những ý tưởng mới, sáng tạo, không phải sao chép.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Viết là sử dụng những ngôn từ mới, sự kết hợp độc đáo sẽ tạo ra sự sáng tạo.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vấn đề lớn của người viết là &quot;thiếu ngôn từ&quot;, dẫn đến lặp lại, nhạt nhẽo, nhàm chán. Sử</span></div>\n<p class=\"body-txt\">\ndụng biện pháp tu từ giúp diễn đạt hay hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quan trọng nhất là phải &quot;xếp kiến thức thành một tập hợp có cấu trúc&quot; để truy xuất</span></div>\n<p class=\"body-txt\">\nnhanh hơn.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bài tập: viết một bài ngắn, không được dùng AI để viết bài trực tiếp vì sẽ &quot;mất hết tương</span></div>\n<p class=\"body-txt\">\ntác&quot;. Nếu dùng ChatGPT để tham khảo, phải &quot;tập hợp lại&quot;, &quot;viết lại&quot;, &quot;chép lại&quot; từng câu\n \ncho đúng văn của mình và dùng &quot;ngôn từ của mình&quot; thì bài mới hay được.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cấu trúc hóa ngôn từ và dữ liệu để tăng khả năng sáng tạo và truy xuất: Diễn giả nhấn</span></div>\n<p class=\"body-txt\">\nmạnh việc không chỉ nhớ mà còn phải sắp xếp kiến thức (từ, ngữ, câu, ý tưởng) theo một\n \ncấu trúc logic như cây phân cấp. Điều này cực kỳ quan trọng vì nó giúp chúng ta không\n \nbị &quot;loạn&quot; khi có nhiều thông tin, mà ngược lại, có thể &quot;lôi từ khóa ra nhanh&quot; và kết hợp\n \nchúng một cách sáng tạo để tạo ra nội dung mới mẻ. Đây là nền tảng cho mọi hoạt động\n \ndiễn đạt hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">ChatGPT là công cụ trợ lý ngôn ngữ, không phải công cụ thay thế sự sáng tạo của con</span></div>\n<p class=\"body-txt\">\nngười: Diễn giả liên tục nhắc nhở rằng ChatGPT chỉ là một tập hợp dữ kiện đã có, một\n \nnguồn tham khảo giúp liệt kê ý tưởng hoặc từ khóa *tương tự*. Tuy nhiên, mục đích của\n \nchúng ta là &quot;viết là sử dụng những ngôn từ mới&quot; và &quot;chưa có sự kết hợp này thì chúng ta\n \nmới gọi là sáng tạo&quot;. Việc chỉ sao chép văn của AI sẽ làm &quot;mất hết tương tác&quot; và tạo ra\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">nội dung &quot;nhạt, nhàm&quot;. Insight này định vị rõ ràng vai trò của AI và tầm quan trọng</h3>\n<p class=\"body-txt\">\nkhông thể thay thế của trí tuệ và văn phong cá nhân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khắc phục &quot;thiếu ngôn từ&quot; bằng cách đa dạng hóa cấu trúc dữ liệu và sử dụng biện pháp</span></div>\n<p class=\"body-txt\">\ntu từ: Diễn giả chỉ ra vấn đề cốt lõi khiến bài viết kém hấp dẫn là sự lặp lại do thiếu vốn\n \ntừ. Bằng cách chủ động xây dựng các cấu trúc dữ liệu mô tả cảm xúc và lợi ích, cùng với\n \nviệc áp dụng các &quot;biện pháp tu từ&quot; (ẩn dụ, so sánh...), chúng ta có thể làm phong phú\n \ncách diễn đạt, khiến thông điệp trở nên sâu sắc, gợi cảm và thuyết phục hơn, thay vì chỉ\n \ntruyền tải thông tin một cách khô khan.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Đây không phải là khóa học dạy bạn bằng ChatGPT các bạn nhé. Tôi chỉ nói rằng là đây là cái\n \nphương pháp chúng ta tư duy. Còn ChatGPT chỉ là công cụ thôi.”\n \n“Mục đích của chúng ta là viết là sử dụng những ngôn từ mới. Chưa có sự kết hợp này thì\n \nchúng ta mới gọi là sáng tạo.”\n \n“Nên là viết bằng ChatGPT nhưng mình phải tập hợp lại, mình phải viết lại, mình phải chép lại\n \nvà viết lại từng câu cho đúng cái văn của mình thì nó mới ra được.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Chương 4</h3>\n<p class=\"body-txt\">\n4.1 Chữa bài tập\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi học tập trung vào nghệ thuật viết tiêu đề và nội dung thu hút khách hàng mục</h3>\n<p class=\"body-txt\">\ntiêu, đặc biệt là trong marketing trực tuyến. Diễn giả nhấn mạnh rằng mục tiêu không phải là\n \nthu hút nhiều lượt xem (traffic) mà là thu hút đúng khách hàng có khả năng chuyển đổi\n \nthành giao dịch. Để làm được điều đó, nội dung cần đưa ra lợi ích rõ ràng, giải quyết vấn đề\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><p class=\"body-txt\">\ncủa khách hàng, và sử dụng cảm xúc như sự sợ hãi (FOMO) hoặc ngạc nhiên. Buổi này cũng\n \nđặc biệt đề cao việc thực hành và áp dụng ngay lập tức những kiến thức đã học vào công việc\n \nkinh doanh thực tế.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tiêu đề &quot;giật gân&quot; (sensational headlines): Phân tích tiêu đề &quot;Bỏ cả đống tiền để mua</span></div>\n<p class=\"body-txt\">\nkhóa học và nhận lại những kiến thức tiếng Việt vỡ lòng&quot; của học viên. Đây là loại tiêu đề\n \ngiật gân, thu hút rất nhiều lượt xem (traffic) nhưng không tạo ra lượt chuyển đổi sau\n \nnày, được diễn giả gọi là &quot;hút rác&quot; (garbage traffic).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mục đích của việc viết: Cần xác định rõ viết cho ai đọc và thu hút ai. Không phải tiêu đề</span></div>\n<p class=\"body-txt\">\ngiật gân nào cũng xấu, nhưng cần phù hợp với mục đích và đối tượng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tiêu đề hiệu quả: Cần có cấu trúc liên quan đến vấn đề mà chúng ta hứa giải quyết được</span></div>\n<p class=\"body-txt\">\ncho khách hàng, hoặc một lời hứa về lợi ích cụ thể.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Critique bài viết của học viên:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sử dụng từ &quot;bàng hoàng&quot; để nói về kiến thức là không phù hợp (chơi chữ nhưng không</span></div>\n<p class=\"body-txt\">\nđúng ngữ cảnh).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cần chỉnh sửa ngữ pháp và chính tả để đảm bảo chất lượng bài viết. Ví dụ: &quot;rõ rệt&quot; thay</span></div>\n<p class=\"body-txt\">\nvì &quot;rõ rẹt&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phép lặp &quot;Tôi sợ, tôi sợ, tôi sợ&quot; là tốt nhưng cũng cần chú ý chính tả.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quan trọng của thực hành: Phê bình học viên không đưa ngay những bài viết đã học lên</span></div>\n<p class=\"body-txt\">\ntrang cá nhân hoặc không dám nói/thực hành. Học phải đi đôi với hành động.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cấu trúc bài viết hiệu quả (kiểu Alain Phan): Bắt đầu bằng việc nói rõ thời gian, công sức</span></div>\n<p class=\"body-txt\">\nđã bỏ ra để tạo ra nội dung, sau đó là lợi ích/giá trị mà người đọc sẽ nhận được nếu dành\n \nthời gian đọc. Ví dụ: &quot;Tôi mất hơn 5 tiếng để nghĩ và viết cái nốt này, vì thế bạn đừng tiếc\n \n5 phút ngồi đọc vì biết đâu một ngày nào đó bạn cũng sẽ mở công ty.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Áp dụng cảm xúc vào nội dung:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">FOMO (Fear Of Missing Out - Nỗi sợ bỏ lỡ): Tạo cảm giác khẩn cấp, khan hiếm. Ví dụ:</span></div>\n<p class=\"body-txt\">\n&quot;Giá rẻ thế này không nhanh tay thì không đến lượt.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ngạc nhiên: Tạo sự bất ngờ về giá trị. Ví dụ: &quot;Quá kinh ngạc, cái bàn như thế này mà chỉ</span></div>\n<p class=\"body-txt\">\ngiá có 1 triệu đồng.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chiến lược cho sản phẩm cũ/tồn kho: Đối với các sản phẩm đã bán, hãy ghi chú &quot;đã bán&quot;</span></div>\n<p class=\"body-txt\">\nngay trên tiêu đề hoặc đầu bài viết để tạo hiệu ứng FOMO cho các sản phẩm tương tự.\n \nĐối với sản phẩm cũ còn hàng, sửa lại nội dung bài viết theo các nguyên tắc trên (lợi ích,\n \nFOMO, ngạc nhiên) thay vì viết bài mới, tiết kiệm công sức và tăng hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tầm quan trọng của tiền bạc và sự tự tin: Diễn giả khẳng định rằng có tiền sẽ giúp con</span></div>\n<p class=\"body-txt\">\nngười tự tin hơn và làm được nhiều việc khác. Việc viết bài hiệu quả để bán hàng sẽ giúp\n \ntăng thu nhập và sự tự tin.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Đối tượng khoá học: Dành cho những người làm kinh doanh, không phải những người</span></div>\n<p class=\"body-txt\">\n&quot;lều tều&quot; không có ý định hành động.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chuyển đổi từ &quot;traffic rác&quot; sang &quot;khách hàng chất lượng&quot;: Diễn giả phân biệt rõ ràng giữa</span></div>\n<p class=\"body-txt\">\nviệc thu hút nhiều lượt xem (traffic) và thu hút đúng đối tượng khách hàng có khả năng\n \nchuyển đổi. Quan trọng nhất là phải tạo ra nội dung mang lại giá trị và giải quyết vấn đề\n \ncho khách hàng mục tiêu ngay từ tiêu đề, tránh các tiêu đề giật gân chỉ câu view nhưng\n \nkhông mang lại doanh số. Điều này giúp doanh nghiệp tối ưu hóa nguồn lực và tập trung\n \nvào kết quả kinh doanh thực chất.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cấu trúc nội dung dựa trên lợi ích và cảm xúc: Diễn giả chỉ ra một cấu trúc mạnh mẽ</span></div>\n<p class=\"body-txt\">\n(kiểu Alain Phan) là bắt đầu bài viết bằng việc nêu bật giá trị/lợi ích mà người đọc sẽ\n \nnhận được và lí do họ nên dành thời gian đọc. Đồng thời, việc tích hợp các yếu tố cảm\n \nxúc như FOMO (sợ bỏ lỡ) và sự ngạc nhiên vào nội dung sẽ tạo ra động lực mạnh mẽ cho\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">hành động mua hàng hoặc tương tác. Đây là những kỹ thuật marketing trực tiếp và hiệu</h3>\n<p class=\"body-txt\">\nquả để gắn kết với khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hành động tức thì và liên tục cải thiện: Điểm cốt lõi xuyên suốt buổi học là &quot;học và</span></div>\n<p class=\"body-txt\">\nhành&quot;. Diễn giả liên tục thúc giục học viên áp dụng ngay các kiến thức đã học vào bài\n \nviết, sản phẩm của mình, thay vì chỉ ghi chép lý thuyết. Việc sửa đổi bài viết cũ, áp dụng\n \ncác kỹ thuật mới (như FOMO cho hàng đã bán) cho thấy tư duy linh hoạt, tối ưu hóa\n \nnguồn lực hiện có và không ngừng nâng cao hiệu quả marketing.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Bỏ cả đống tiền để mua khóa học và nhận lại những kiến thức tiếng Việt vỡ lòng.”\n \n“giật gân”\n \n“Hút rác thì nó đúng theo khái niệm trong IPS ta gọi là hút rác đấy.”\n \n“Thằng nào bây giờ nói ChatGPT là đuổi cho khỏi lớp. Thằng nào nói chữ ChatGPT đều đuổi ra\n \nkhỏi lớp nhá. Các ông thì mẹ cứ khóa mồm vào luôn, nói cái gì cũng được trừ chữ ChatGPT.”\n \n“Có tiền thì mới làm được những cái việc khác. Con người nó có tiền tự nhiên nó tự tin hẳn\n \nlên.”\n \n4.2 Nhận biết và loại bỏ tư duy tiêu cực\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi giảng này tập trung vào tầm quan trọng của việc cảnh giác với những người</h3>\n<p class=\"body-txt\">\nvà thông tin tiêu cực, đặc biệt là trong môi trường kinh doanh và mạng xã hội. Diễn giả nhấn\n \nmạnh rằng những kẻ lười biếng thường tìm cách kéo người khác xuống hoặc biện minh cho\n \nsự không làm của mình vì sợ bị vượt qua, và chúng ta cần ngay lập tức loại bỏ những tư duy\n \ntiêu cực này để tránh bị ảnh hưởng và kìm hãm sự phát triển của bản thân.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Người làm ăn phải tạo ra thông tin có ích: Thông tin mình đưa ra trên mạng xã hội phải</span></div>\n<p class=\"body-txt\">\ncó giá trị cho người khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Người làm mới tiến lên được: Con người phải hành động để phát triển.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thế lực kìm hãm: &quot;Những con cua&quot;: Trong xã hội có nhiều kẻ lười biếng, họ luôn tìm</span></div>\n<p class=\"body-txt\">\ncách kéo người khác xuống.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hành vi của &quot;những con cua&quot;: Họ không những không làm mà còn biện minh cho việc</span></div>\n<p class=\"body-txt\">\nkhông làm của mình, và thậm chí kể chuyện để ngăn cản người khác hành động.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nguyên nhân của hành vi tiêu cực: Những người này rất sợ người khác làm và thành</span></div>\n<p class=\"body-txt\">\ncông hơn mình, vì họ biết rằng nếu người khác làm thì sẽ hơn họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cần cảnh giác với thông tin và con người tiêu cực: Bên cạnh việc truyền cảm hứng, phải</span></div>\n<p class=\"body-txt\">\ncảnh giác với những nội dung/người làm mình đi xuống.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hành động khi gặp tư duy tiêu cực: Ngay lập tức loại bỏ những thông tin, những người</span></div>\n<p class=\"body-txt\">\nnhư vậy ra khỏi hệ thống của mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hậu quả của việc không loại bỏ: Những thông tin tiêu cực sẽ nhập vào mình, lan tỏa và</span></div>\n<p class=\"body-txt\">\nhình thành tư duy cản trở, làm mất động lực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Học xong phải thực hành: Nếu không loại bỏ tư duy tiêu cực, việc học sẽ vô nghĩa, &quot;quay</span></div>\n<p class=\"body-txt\">\ntrở về lại chui lại rúc đầu vào cái máng lợn.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phân biệt biện pháp tu từ: Diễn giả nhấn mạnh việc nhận biết &quot;ngu như lợn&quot; là ẩn</span></div>\n<p class=\"body-txt\">\ndụ/nhân hóa/so sánh khi học viên phản hồi.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cảnh giác với &quot;những con cua&quot; và tư duy tiêu cực: Đây là điểm cốt lõi vì diễn giả giải</span></div>\n<p class=\"body-txt\">\nthích rất rõ ràng nguồn gốc hành vi của những người này (sợ bị vượt qua) và cách họ\n \ntìm cách kéo người khác xuống. Việc nhận diện và loại bỏ kịp thời giúp bảo vệ năng\n \nlượng và động lực phát triển của bản thân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Loại bỏ thông tin và con người tiêu cực NGAY LẬP TỨC: Diễn giả nhấn mạnh sự cần thiết</span></div>\n<p class=\"body-txt\">\ncủa hành động dứt khoát &quot;tiêu diệt ngay lập tức&quot;, &quot;loại bỏ nó ngay lập tức ra khỏi cái hệ\n \nthống&quot;. Điều này quan trọng vì tư duy tiêu cực có tính lây lan như virus, có thể hủy hoại\n \nđộng lực và chặn đứng mọi nỗ lực học tập, phát triển.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tầm quan trọng của hành động: Việc &quot;người ta làm thì người ta mới tiến lên được&quot; và</span></div>\n<p class=\"body-txt\">\n&quot;Nếu không thì mình học xong ở đây, mình quay trở về, mình lại chui lại rúc đầu vào cái\n \nmáng lợn mà thôi&quot; cho thấy việc thực hành và hành động là chìa khóa để chuyển hóa\n \nkiến thức thành kết quả, không chỉ là tiếp thu thụ động.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Nó luôn luôn tìm cách kéo những người khác xuống, ta gọi nó là những con cua.”\n \n“Vì khi mà nó biết là người ta hơn nó, nó sợ người ta hơn cho nên nó sẽ kể những cái câu\n \nchuyện để người khác cũng không làm giống như nó.”\n \n“Nếu không thì mình học xong ở đây, mình quay trở về, mình lại chui lại rúc đầu vào cái máng\n \nlợn mà thôi.”\n \n4.3 Các phương pháp tu từ\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi giảng nhấn mạnh tầm quan trọng của sự trung thực và trách nhiệm trong học</h3>\n<p class=\"body-txt\">\ntập, phê phán hành vi gian lận và trốn tránh. Diễn giả khẳng định chỉ sử dụng các &quot;ẩn dụ&quot; để\n \nrăn dạy, chứ không &quot;chửi&quot;, nhưng những ẩn dụ đó đủ mạnh mẽ để chỉ ra lỗi của học viên. Cốt\n \nlõi của bài học là việc &quot;lừa diễn giả phản bạn&quot; (qua việc bỏ học, nói dối, hay sử dụng AI để\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><p class=\"body-txt\">\nlàm bài tập) thực chất là &quot;lừa chính bản thân mình&quot;, và sự tự dối trá này là &quot;kẻ thù lớn nhất&quot;\n \ncản trở sự phát triển cá nhân.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả tuyên bố chỉ sử dụng các &quot;hình ảnh ẩn dụ&quot; thay vì lời chửi để truyền đạt ý, và</span></div>\n<p class=\"body-txt\">\nngười nghe tự suy diễn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Việc &quot;không học bài&quot; dẫn đến quên hết kiến thức và &quot;rúc đầu vào máng lợn&quot; (ám chỉ sự</span></div>\n<p class=\"body-txt\">\nlười biếng, chỉ muốn hưởng thụ mà không học hỏi).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Trong khóa học, diễn giả thiết lập các &quot;điểm kiểm tra&quot; và &quot;cái bẫy&quot; để dễ dàng phát hiện</span></div>\n<p class=\"body-txt\">\nhọc viên bỏ học hoặc không thực sự hiểu bài.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hành vi bỏ học nhưng vẫn khẳng định đã học đầy đủ là &quot;lừa diễn giả&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả phân tích và mở rộng ý nghĩa của thành ngữ &quot;lừa diễn giả phản bạn&quot;, coi việc</span></div>\n<p class=\"body-txt\">\ndùng ChatGPT để làm bài tập được giao là &quot;lừa bạn&quot; vì nó phá hoại công sức và sự nỗ lực\n \ncủa những người khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Kết cục của việc &quot;lừa diễn giả phản bạn&quot; là &quot;lừa chính bản thân mình&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Kẻ thù lớn nhất của đời người chính là mình&quot; (khi tự lừa dối bản thân).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cảnh báo về &quot;hiệu ứng bầy cừu&quot; và &quot;hiệu ứng con cua&quot; sẽ xuất hiện ngay lập tức nếu</span></div>\n<p class=\"body-txt\">\nkhông học hành nghiêm túc, và cả hai đều là các phép &quot;ẩn dụ&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả cũng nhắc lại các phép tu từ như &quot;phép đối&quot;, &quot;phép lặp&quot;, &quot;phép nhấn mạnh&quot; và</span></div>\n<p class=\"body-txt\">\nphê phán việc nhầm lẫn với &quot;phép tiểu nhân&quot; hay &quot;phép khỉ&quot;.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sự chuyển hóa từ &quot;lừa diễn giả phản bạn&quot; thành &quot;lừa chính bản thân mình&quot;: Diễn giả đã</span></div>\n<p class=\"body-txt\">\nnâng tầm một khái niệm đạo đức xã hội thành một vấn đề cá nhân sâu sắc. Việc giải thích\n \nrằng mọi hành vi gian lận, trốn tránh trách nhiệm, dù là với diễn giả cô hay bạn bè, cuối\n \ncùng đều quay trở lại làm hại chính bản thân người thực hiện. Điều này quan trọng vì nó\n \nthay đổi động lực từ việc tránh bị phát hiện bởi người khác sang việc giữ gìn sự chính\n \ntrực và phát triển của bản thân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mở rộng ý nghĩa của việc sử dụng ChatGPT: Trong bối cảnh công nghệ AI phát triển, diễn</span></div>\n<p class=\"body-txt\">\ngiả đã đưa ra một góc nhìn mới về việc sử dụng ChatGPT. Nó không chỉ là công cụ hỗ trợ\n \nmà có thể trở thành phương tiện &quot;lừa bạn&quot; khi dùng để làm bài tập thay thế cho sự nỗ\n \nlực cá nhân. Điều này quan trọng vì nó đặt ra câu hỏi về đạo đức và sự công bằng trong\n \nmôi trường học tập và làm việc khi đối mặt với các công nghệ mới, khuyến khích tư duy\n \nphản biện về việc sử dụng AI một cách có trách nhiệm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Kẻ thù lớn nhất của đời người chính là mình&quot;: Đây là một triết lý cốt lõi, nhấn mạnh</span></div>\n<p class=\"body-txt\">\nrằng rào cản lớn nhất đối với sự thành công và phát triển của mỗi người không phải từ\n \nbên ngoài mà là từ sự thiếu trung thực, lười biếng và tự dối trá của chính mình. Điều này\n \nquan trọng vì nó thúc đẩy sự tự nhận thức và trách nhiệm cá nhân, khuyến khích mỗi\n \nngười tự đánh giá và vượt qua những giới hạn nội tại để đạt được tiềm năng cao nhất.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Tôi chỉ dùng hình ảnh ẩn dụ thôi. Có ông nghĩ lại mà xem từ nãy giờ tôi có chửi gì đâu?”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Lừa diễn giả phản bạn thì là cái gì? Là lừa chính bản thân mình.”\n \n“Kẻ thù lớn nhất của đời người chính là mình.”\n \n4.4 7 bước kể chuyện\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi giảng tập trung vào việc trình bày một cấu trúc 7 bước để kể một câu chuyện</h3>\n<p class=\"body-txt\">\nhiệu quả, có khả năng tạo ra cảm xúc mạnh mẽ và thúc đẩy người nghe hành động. Diễn giả\n \nnhấn mạnh rằng mục tiêu của việc kể chuyện không chỉ là truyền tải thông tin mà còn là\n \nkhơi gợi hành động để người nghe đạt được mong muốn của chính họ. Điểm cốt lõi là sự\n \nkhác biệt giữa &quot;con người&quot; thường xuyên viện cớ, trì hoãn và &quot;con máy&quot; (AI) thực hiện ngay\n \nlập tức, từ đó khuyến khích tư duy hành động và tránh biện minh để đạt được thành công.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cấu trúc 7 thành phần của một câu chuyện hiệu quả:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mong muốn của nhân vật (cũng là mong muốn của người nghe).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Giới thiệu nhân vật, bối cảnh, những điểm hiện tại đang có (cũng là hiện tại của người</span></div>\n<p class=\"body-txt\">\nnghe).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khó khăn, rào cản, nhân vật phản diện (ác quỷ), những điều khiến nhân vật không đạt</span></div>\n<p class=\"body-txt\">\nđược mong muốn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Người giúp đỡ (thần tiên, anh hùng áo trắng), bí kíp, chiến lược để đạt được điều mong</span></div>\n<p class=\"body-txt\">\nmuốn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn biến của câu chuyện, trận đánh, cao trào, thất bại, và khó khăn mà nhân vật vượt</span></div>\n<p class=\"body-txt\">\nqua để trưởng thành.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thành tựu, kết quả đạt được (có thể cao hơn hoặc bằng mong muốn, hoặc nhân vật thay</span></div>\n<p class=\"body-txt\">\nđổi mong muốn ban đầu).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bài học rút ra của nhân vật.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mục tiêu của việc kể chuyện: Làm bật các cảm xúc mạnh, có sự tương đồng với người</span></div>\n<p class=\"body-txt\">\nnghe, thúc đẩy người nghe hành động để họ đạt được mong muốn của chính họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nguyên tắc không được vi phạm khi kể chuyện: Tuyệt đối không được kể chuyện cản trở</span></div>\n<p class=\"body-txt\">\nngười nghe không hành động, làm mất đi năng lượng của họ, hoặc biện minh cho những\n \nviệc mình không làm hay người khác không làm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sự khác biệt giữa con người và con máy (AI): Con máy (ví dụ: ChatGPT) làm ngay, không</span></div>\n<p class=\"body-txt\">\ncãi và không biện minh; còn con người thường có nhiều rào cản, viện cớ, biện minh và\n \ntrì hoãn hành động.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tầm quan trọng của hành động: Nếu con người tiếp tục biện minh và không hành động,</span></div>\n<p class=\"body-txt\">\nhọ sẽ không bằng con máy và có thể bị thay thế.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ứng dụng thực tế của cấu trúc: Có thể sử dụng cấu trúc 7 bước để phân tích các câu</span></div>\n<p class=\"body-txt\">\nchuyện cổ tích (như Cô bé Lọ Lem, Cây Khế) hoặc để tạo ra những câu chuyện mới, hấp\n \ndẫn theo yêu cầu cụ thể.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cấu trúc 7 bước kể chuyện: Đây là một công cụ có hệ thống và phổ quát để xây dựng bất</span></div>\n<p class=\"body-txt\">\nkỳ câu chuyện nào, từ marketing đến truyền cảm hứng. Nó quan trọng vì cung cấp một\n \nkhuôn mẫu rõ ràng, giúp người kể chuyện dễ dàng tạo ra nội dung hấp dẫn, có ý nghĩa và\n \nđạt được mục tiêu truyền thông cụ thể. Việc diễn giả chứng minh tính hiệu quả của nó\n \nbằng cách áp dụng cho cả AI và các câu chuyện cổ tích cho thấy sự linh hoạt và tính ứng\n \ndụng rộng rãi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mục tiêu cuối cùng của kể chuyện là thúc đẩy hành động: Diễn giả nhấn mạnh rằng câu</span></div>\n<p class=\"body-txt\">\nchuyện không chỉ dùng để giải trí hay cung cấp thông tin, mà phải tạo ra sự thay đổi ở\n \nngười nghe, khiến họ muốn hành động để đạt được mong muốn của chính họ. Điều này\n \nquan trọng vì nó định hướng cho mọi nỗ lực kể chuyện, biến câu chuyện thành một công\n \ncụ mạnh mẽ để tạo ra tác động thực sự, thay vì chỉ là kể lể suông.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hành động tức thì và tránh biện minh: Sự đối lập giữa &quot;con người&quot; và &quot;con máy&quot; làm nổi</span></div>\n<p class=\"body-txt\">\nbật vấn đề cốt lõi của việc trì hoãn và tìm lý do. Insight này quan trọng vì nó cảnh báo về\n \nnguy cơ bị thụt lùi nếu không hành động dựa trên kiến thức và cơ hội. Nó khuyến khích\n \ntư duy &quot;làm ngay&quot;, học hỏi từ AI để vượt qua rào cản tâm lý của chính mình và đạt được\n \nmục tiêu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Tuyệt đối không được khuyên những người khác dừng lại cái động lực là mất đi năng lượng\n \ncủa họ. Lúc đó chúng ta mới trở thành những người con người có giá trị.”\n \n“Đây là bài giảng của tôi dành cho các bạn con người. Ai ở đây là con người nghe tôi nói đây.\n \nCác bạn là con người và đây là cấu trúc tôi dạy các bạn kể chuyện.”\n \n“Mình kinh hơn con máy rất là nhiều nhưng mình thiếu cái không làm vì con máy nó không có\n \nbiện minh. Nó không biện minh cho những việc nó không làm. Còn con người thì luôn biện\n \nminh cho những cái điều anh ta không làm.”\n \n4.5 Tổng kết\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi giảng tập trung vào nghệ thuật kể chuyện và viết bài, nhấn mạnh rằng mọi</h3>\n<p class=\"body-txt\">\ncâu chuyện đều phải thúc đẩy người nghe hành động vì lợi ích của chính họ. Diễn giả giới\n \nthiệu cấu trúc 7 thành phần của một câu chuyện và khái niệm “tạo phước” hay “tổn phước”\n \nthông qua nội dung truyền tải. Cốt lõi của bài học là “hay viết” (viết thường xuyên, thực hành\n \nliên tục) quan trọng hơn “viết hay” (viết hoàn hảo về mặt ngôn từ), nhằm tạo ra giá trị và\n \nđộng lực tích cực cho bản thân và người khác.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mọi câu chuyện đều có 7 thành phần: Có thể sử dụng nhiều cấu trúc khác nhau để kể</span></div>\n<p class=\"body-txt\">\nchuyện, nhưng cốt lõi vẫn gồm 7 thành phần.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">3 điều cần nhớ khi kể chuyện:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hiểu rõ 7 thành phần của một câu chuyện.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khi đọc/nghe một câu chuyện, biết phân loại các thành phần của nó.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khi muốn kể chuyện, hãy chuẩn bị dàn ý gồm 7 thành phần.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mục đích cốt lõi của mọi câu chuyện: Trong bất kỳ tình huống nào, mọi câu chuyện đều</span></div>\n<p class=\"body-txt\">\nphải thúc đẩy người ta hành động vì lợi ích của chính họ. Kể cả chuyện vớ vẩn hay tình\n \ncờ giữa hai người bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bán hàng và Giá trị: Để bán hàng, trước hết phải trở thành người có giá trị. Những câu</span></div>\n<p class=\"body-txt\">\nchuyện làm mất năng lượng người khác, phá hoại cuộc đời người khác là &quot;mất phước&quot;\n \nhoặc &quot;tổn phước&quot; (gấp 10 lần).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cảnh giác ngôn từ và hành động: Luôn phải cảnh giác với những gì mình nói/viết. Làm gì</span></div>\n<p class=\"body-txt\">\nthì làm, phải giúp người ta tiến lên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tạo phước qua kể chuyện: Kể chuyện giúp người khác tiến lên là đang tạo phước cho</span></div>\n<p class=\"body-txt\">\nmình. Họ có thể chưa mua hàng ngay nhưng sẽ yêu quý và giúp đỡ mình sau này (ví dụ\n \nvề học viên Việt).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sức mạnh của việc tự kể chuyện cho mình: Kể chuyện theo cấu trúc cho chính bản thân</span></div>\n<p class=\"body-txt\">\nmình nghe có thể giúp mình thay đổi và hành động mạnh mẽ hơn. Ngược lại, kể chuyện\n \nđể biện minh cho việc không làm sẽ làm mình &quot;tổn phước.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quy luật cho đi - nhận lại: Cuộc đời của chúng ta là những gì chúng ta cho đi. Cho đi câu</span></div>\n<p class=\"body-txt\">\nchuyện truyền cảm hứng, sẽ nhận lại những người truyền cảm hứng và giúp mình tiến\n \nvề phía trước. (Ví dụ đàn ngỗng di cư kêu quạc quạc cổ vũ nhau).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Hay&quot; hay &quot;không hay&quot; (trong viết lách): Một bài viết &quot;hay&quot; phải là bài viết giúp người ta</span></div>\n<p class=\"body-txt\">\nthay đổi, tiến về phía trước. Viết hay bằng ngôn từ hoa mỹ mà khiến người đọc ngồi yên\n \nmột chỗ, không hành động thì là &quot;tổn phước.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">7 bước cấu trúc câu chuyện (ví dụ của học viên muốn viết hay để bán hàng):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mong muốn: Điều mình muốn đạt được (Ví dụ: thu hút khách hàng tiềm năng, tăng tỉ lệ</span></div>\n<p class=\"body-txt\">\nchuyển đổi).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hiện tại: Tình trạng hiện tại, vấn đề đang gặp phải (Ví dụ: không biết viết, viết lủng củng,</span></div>\n<p class=\"body-txt\">\nthiếu tự tin).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Rào cản: Những thứ đang cản trở mình (Ví dụ: bản thân không biết viết, bạn bè không ai</span></div>\n<p class=\"body-txt\">\nviết, không nghĩ viết là quan trọng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nhân vật thần tiên xuất hiện: Yếu tố bất ngờ, người diễn giả, tài liệu, lớp học giúp mình</span></div>\n<p class=\"body-txt\">\ntìm thấy giải pháp (Ví dụ: thấy quảng cáo của diễn giả, đăng ký lớp học).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bí kíp/Điều học được: Những kiến thức, kỹ thuật đã học được (Ví dụ: sử dụng ChatGPT</span></div>\n<p class=\"body-txt\">\nđể lên ý tưởng/thu thập từ khóa, các biện pháp tu từ, bổ sung vốn từ, kỹ thuật kể chuyện\n \n7 bước).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thực hành/Kết quả: Quá trình áp dụng, khó khăn, và thành quả ban đầu (Ví dụ: bắt đầu</span></div>\n<p class=\"body-txt\">\nviết quảng cáo, chưa hoàn thiện, nhưng cố gắng, viết rồi xóa rồi lại viết, cảm thấy tự tin\n \nhơn).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tương lai/Sự tiếp tục: Mong muốn và cam kết tiếp tục học hỏi, thực hành (Ví dụ: còn</span></div>\n<p class=\"body-txt\">\nnhiều bài học hay, sẽ tiếp tục nỗ lực).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Giá trị của lớp học &quot;Viết hay&quot;: Không phải thần thánh, chỉ là những điều cơ bản, nhưng</span></div>\n<p class=\"body-txt\">\nnếu tổng hợp và sử dụng nhuần nhuyễn sẽ trở thành bậc diễn giả bán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lời khuyên cuối cùng: Hãy áp dụng ngay và áp dụng thật nhiều lần. &quot;Muốn chặt một</span></div>\n<p class=\"body-txt\">\nrừng cây, hãy dành thời gian chủ yếu cho việc mài rìu.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Viết hay không bằng hay viết&quot;: Đừng chờ đến khi viết hay mới viết, hãy viết đi, dù chưa</span></div>\n<p class=\"body-txt\">\nhay, ngày mai sẽ hay hơn. Cứ viết và thực hành liên tục.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mọi câu chuyện phải thúc đẩy người nghe hành động vì lợi ích của chính họ: Đây là kim</span></div>\n<p class=\"body-txt\">\nchỉ nam cho mọi hoạt động truyền thông, marketing, và giao tiếp. Nó định hướng rõ ràng\n \nmục tiêu của việc kể chuyện: không phải để giải trí hay khoe khoang, mà để tạo ra thay\n \nđổi tích cực và giá trị cho người khác. Điều này đặc biệt quan trọng trong kinh doanh,\n \nnơi mỗi tương tác đều nên hướng tới việc giải quyết vấn đề hoặc mang lại lợi ích cho\n \nkhách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Kể chuyện là tạo phước hoặc tổn phước: Diễn giả đưa ra một góc nhìn độc đáo về đạo</span></div>\n<p class=\"body-txt\">\nđức trong truyền thông. Những câu chuyện truyền cảm hứng, giúp người khác tiến lên\n \nsẽ tạo ra phước báu (giá trị tích cực) cho người kể, dẫn đến những mối quan hệ và cơ hội\n \ntốt đẹp trong tương lai. Ngược lại, những câu chuyện gây mất năng lượng, bào mòn tinh\n \nthần người khác sẽ &quot;tổn phước&quot;, ảnh hưởng tiêu cực đến bản thân người kể. Điều này\n \nkhuyến khích sự tử tế, chân thành và hướng thiện trong mọi nội dung truyền tải.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Viết hay không bằng hay viết&quot;: Đây là lời kêu gọi hành động mạnh mẽ nhất. Thay vì</span></div>\n<p class=\"body-txt\">\ndành thời gian lo lắng về sự hoàn hảo trong ngôn từ hay cấu trúc, hãy tập trung vào việc\n \nthực hành liên tục. Sự kiên trì, lặp lại và áp dụng kiến thức vào thực tế mới là yếu tố\n \nquyết định sự tiến bộ và thành công, chứ không phải tài năng bẩm sinh hay sự cầu toàn\n \nchờ đợi. Điều này khuyến khích tư duy phát triển và không ngại thử nghiệm.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Mọi câu chuyện đều phải thúc đẩy người ta hành động vì lợi ích của người ta.”\n \n“Viết hay không phải là bằng việc chúng ta giỏi ngôn từ mà viết hay chính là hay viết.”\n \n“Nếu chúng ta chờ hay mới viết thì chẳng bao giờ chúng ta viết được cả.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Chương 5</h3>\n<p class=\"body-txt\">\n5.1 ChatGPT chỉ là công cụ\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi học này không dạy về cách sử dụng ChatGPT, mà coi nó như một học viên để</h3>\n<p class=\"body-txt\">\ngiảng về cách truyền cảm hứng, lãnh đạo và bán hàng. Cốt lõi của việc thúc đẩy người khác\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">hành động là kể những câu chuyện có cấu trúc rõ ràng, sử dụng hồ sơ mẫu hiệu quả và biết</h3>\n<p class=\"body-txt\">\nmục tiêu của người nghe. Việc kết hợp ba yếu tố này sẽ giúp một người trở thành nhà truyền\n \ncảm hứng, nhà lãnh đạo và người bán hàng xuất sắc.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả không dạy ChatGPT mà coi nó là một học viên tên JPT để giảng bài.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bài giảng dạy những điều sau đây để thúc đẩy người khác hành động.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Điều 1: Có nguyên liệu là cấu trúc của một bài viết / câu chuyện.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nội dung bài viết/câu chuyện phải liên quan đến một mục tiêu cụ thể (ví dụ: sức khỏe,</span></div>\n<p class=\"body-txt\">\nsống khỏe).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Câu chuyện nên là câu chuyện bản thân, đi từ điểm A (tưởng mình khỏe) đến điểm B</span></div>\n<p class=\"body-txt\">\n(sống khỏe).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Điều 2: Có một hồ sơ mẫu.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Người học phải biết tại sao hồ sơ mẫu đó hay và đã phải biết trước điều này.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Điều 3: Sử dụng nguyên liệu của câu chuyện và hồ sơ mẫu để viết lại câu chuyện của</span></div>\n<p class=\"body-txt\">\nmình nhằm thúc đẩy người khác hành động.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mục đích cuối cùng là thúc đẩy người khác hành động để họ tiến lên và truyền cảm hứng</span></div>\n<p class=\"body-txt\">\ncho họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phân biệt các vai trò:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Người truyền cảm hứng: Thúc đẩy họ hành động vì mục tiêu CỦA HỌ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Người lãnh đạo: Thúc đẩy mọi người trong đội hành động vì MỤC TIÊU CHUNG.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Người bán hàng: Thúc đẩy họ mua hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khi kết hợp cả ba yếu tố này (truyền cảm hứng, bán hàng, lãnh đạo), chúng ta sẽ trở</span></div>\n<p class=\"body-txt\">\nthành người bán hàng tuyệt vời (teacher is the leader - lãnh đạo chính là nhà diễn giả, và\n \ndiễn giả cũng chính là nhà lãnh đạo tuyệt vời).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Để làm được điều này, cần kể những câu chuyện để thúc đẩy mọi người hành động tiến</span></div>\n<p class=\"body-txt\">\nlên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả nhấn mạnh tầm quan trọng của việc &quot;mua sách&quot; (bộ tài liệu mẫu) để học hỏi.</span></div>\n<p class=\"body-txt\">\nViệc không mua mà tìm cách &quot;tải về&quot; bị coi là vi phạm bản quyền và thiếu nghiêm túc.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mô hình 3 yếu tố để thúc đẩy hành động (Câu chuyện + Hồ sơ mẫu + Viết lại/Áp dụng):</span></div>\n<p class=\"body-txt\">\nĐây là khung sườn cốt lõi để tạo ra nội dung có sức thuyết phục và truyền cảm hứng. Nó\n \nquan trọng vì cung cấp một quy trình rõ ràng, từ việc xây dựng nội dung gốc, phân tích\n \nnhững ví dụ thành công, đến việc cá nhân hóa và tái cấu trúc thông điệp để đạt được\n \nmục tiêu cụ thể (truyền cảm hứng, lãnh đạo, bán hàng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sự khác biệt rõ ràng giữa Truyền cảm hứng, Lãnh đạo và Bán hàng: Diễn giả định nghĩa</span></div>\n<p class=\"body-txt\">\nba vai trò này dựa trên *mục tiêu hành động* mà họ muốn thúc đẩy ở người khác. Điều\n \nnày quan trọng vì giúp người nghe hiểu rõ vai trò và định hướng thông điệp của mình,\n \ntránh nhầm lẫn giữa việc giúp đỡ người khác vì lợi ích của họ (truyền cảm hứng), vì lợi\n \ních chung của tập thể (lãnh đạo) hay vì lợi ích kinh doanh (bán hàng). Việc kết hợp cả ba\n \nsẽ tạo ra sức mạnh tổng hợp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tầm quan trọng của việc &quot;mua sách&quot; (tài liệu mẫu): Dù có vẻ là một đoạn đối đáp hài</span></div>\n<p class=\"body-txt\">\nhước, nhưng nó ngụ ý về sự nghiêm túc trong việc đầu tư vào kiến thức và công cụ. Việc\n \ncó tài liệu mẫu (nguyên bản, hợp pháp) giúp người học có nền tảng vững chắc để phân\n \ntích, học hỏi và áp dụng, thay vì tìm kiếm các giải pháp &quot;ăn sẵn&quot; hoặc vi phạm bản quyền,\n \nthể hiện tinh thần &quot;học thật, làm thật&quot;.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Ở đây tôi không dạy bạn ChatGPT. Các bạn nhắc lại cho tôi biết một lần nữa là tôi không dạy\n \nbạn ChatGPT. Tôi đang dạy các bạn và trong lớp học này có một thằng học viên tên là JPT.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Teacher is the leader. Lãnh đạo chính là nhà diễn giả và ông diễn giả cũng chính là nhà lãnh\n \nđạo tuyệt vời.”\n \n“Chúng ta có thể là người truyền cảm hứng, người lãnh đạo hoặc là người bán hàng tùy thuộc\n \nvào cái bối cảnh là chúng ta muốn nói chuyện với ai và thúc đẩy họ hành động việc gì.”\n \n5.2 Cách kể chuyện về những mong muốn của người khác\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi học này tập trung vào việc biến đổi một câu chuyện cá nhân về sức khỏe (cụ</h3>\n<p class=\"body-txt\">\nthể là mức cholesterol cao và hành trình chạy bộ) thành một bài viết bán hàng hấp dẫn và\n \nthuyết phục. Diễn giả hướng dẫn cách xây dựng bài viết dựa trên trải nghiệm thực tế, từ việc\n \nphát hiện vấn đề, tìm kiếm giải pháp, cho đến việc áp dụng và đạt được kết quả, đồng thời\n \nlồng ghép một sản phẩm liên quan (đôi giày chạy bộ) như một yếu tố khởi đầu quan trọng\n \ncho hành trình thay đổi. Cốt lõi là dùng câu chuyện cá nhân có độ tin cậy và cảm xúc để thôi\n \nthúc hành động.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mở đầu bằng câu chuyện cá nhân: Phân tích một bài viết của học viên về việc chạy bộ và</span></div>\n<p class=\"body-txt\">\nsức khỏe, bắt đầu bằng việc được sống khỏe mạnh, nhậu nhẹt, gan (0:21 - 0:27).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phát triển câu chuyện: Nói về việc chạy bộ 2km và đạt được huy chương (0:34 - 0:42).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mục đích của bài viết: Bài viết khuyến khích người khác chạy bộ (0:50 - 0:53).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class= 3:59 - 4:05).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tìm kiếm giải pháp thực tế từ người thật: Cuối cùng, tìm thấy một người bạn đã giảm</span></div>\n<p class=\"body-txt\">\ncân từ 83kg xuống 68kg, khỏe mạnh và tràn đầy năng lượng (4:12 - 4:34).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Giải pháp đơn giản và hiệu quả: Người bạn đó chia sẻ bí quyết: &quot;mỗi ngày đều chạy bộ,</span></div>\n<p class=\"body-txt\">\ntất cả chỉ có thế&quot; (4:35 - 4:46).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tính linh hoạt của giải pháp: Có thể chạy bộ bất kể lúc nào (sáng, trưa, tối) và cam đoan</span></div>\n<p class=\"body-txt\">\nlượng cholesterol sẽ thay đổi sau 30 ngày (4:53 - 5:08).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mong muốn thực hiện: Người viết cũng muốn phương pháp ấy và người bạn khẳng định</span></div>\n<p class=\"body-txt\">\nphương pháp này hoàn toàn miễn phí, có thể làm bất cứ lúc nào (5:11 - 5:25, 5:40 -\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">5:45).</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vật dụng cần thiết: Tất cả những gì cần làm là mua một đôi giày chạy bộ (5:46 - 5:50).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hành trình khởi đầu khó khăn: Việc chạy bộ 1km đầu tiên thật khó, không phải vì chạy</span></div>\n<p class=\"body-txt\">\nmà vì không đeo được giày vào (6:01 - 6:07).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ý nghĩa của bước chạy đầu tiên: Hành trình vạn dặm đều bắt đầu từ bước chạy đầu tiên,</span></div>\n<p class=\"body-txt\">\nvà để có bước chạy đầu tiên thì phải đeo được giày vào (6:08 - 6:17).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sai lầm khi chọn giày: Nhiều người mua đôi giày rẻ tiền, có thể bị đau chân và bỏ cuộc</span></div>\n<p class=\"body-txt\">\nsớm (6:19 - 6:36).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lợi ích của giày đắt tiền: Nếu mua giày đắt tiền, đôi khi vì sợ mất tiền mà phải chạy cho</span></div>\n<p class=\"body-txt\">\nhết đôi giày (6:38 - 6:45).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ví dụ cụ thể về sản phẩm: Diễn giả giới thiệu đôi giày chạy bộ của mình với giá 5 triệu</span></div>\n<p class=\"body-txt\">\nđồng và nhìn thấy trang bán hàng của bạn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Điều này giúp giảm áp lực marketing (giảm chi phí) và tăng tỷ lệ chuyển đổi của đơn</span></div>\n<p class=\"body-txt\">\nhàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chiến lược marketing của diễn giả theo 4 giai đoạn, tương ứng với &quot;lạnh, ấm, nóng, mua</span></div>\n<p class=\"body-txt\">\nhàng&quot;:\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Giai đoạn 1 (Lạnh): Viết về các vấn đề mà khách hàng mục tiêu đang gặp phải (liên quan</span></div>\n<p class=\"body-txt\">\nđến sản phẩm/giá trị bạn đại diện). Ví dụ: cholesterol, thừa cân, béo phì, lối sống không\n \nlành mạnh. Mục tiêu là nhận biết những người có vấn đề, không cần nhận biết antifan.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Giai đoạn 2 (Ấm): Viết về những giải pháp thông thường/phổ biến mà mọi người thường</span></div>\n<p class=\"body-txt\">\náp dụng để giải quyết các vấn đề đó. Ví dụ: uống thực phẩm chức năng để giảm\n \ncholesterol.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Giai đoạn 3 (Nóng): Trình bày giải pháp *của bạn* (độc đáo, khác biệt) để giải quyết vấn</span></div>\n<p class=\"body-txt\">\nđề. Ví dụ: Thay vì uống thực phẩm chức năng, tôi chạy bộ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Giai đoạn 4 (Mua hàng): Giới thiệu sản phẩm/dịch vụ cụ thể mà bạn kinh doanh. Ví dụ:</span></div>\n<p class=\"body-txt\">\nđôi giày chạy bộ của tôi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quy trình 4 giai đoạn này được học chi tiết trong các khóa Email Marketing và Video</span></div>\n<p class=\"body-txt\">\nMarketing (khóa 28 ngày) của diễn giả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quan trọng là phải học để hiểu và áp dụng, không chỉ mua khóa học mà không học.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phải luôn đặt những câu hỏi giúp bản thân mình tiến lên, thay vì những câu hỏi thể hiện</span></div>\n<p class=\"body-txt\">\nsự nghi ngờ hay cản trở.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chỉ bán/tiếp cận cho những người &quot;yêu quý tôi và yêu thích điều tôi làm/đại diện&quot;: Diễn</span></div>\n<p class=\"body-txt\">\ngiả nói, &quot;Tôi bán cho những người yêu quý tôi và những người yêu thích cuộc sống khỏe\n \nmạnh của họ.&quot; Điểm này quan trọng vì nó định hình đúng đối tượng khách hàng tiềm\n \nnăng. Thay vì cố gắng bán cho tất cả mọi người, việc tập trung vào những người đã có sự\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><p class=\"body-txt\">\nkết nối cảm xúc hoặc có cùng giá trị với bạn/thương hiệu của bạn sẽ giúp tối ưu hóa chi\n \nphí marketing và tăng hiệu quả chuyển đổi một cách đáng kể.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tránh &quot;antifan&quot; và không bao giờ tiếp cận họ bằng trang bán hàng: Diễn giả khẳng định,</span></div>\n<p class=\"body-txt\">\n&quot;Nếu chúng ta làm cho trang bán hàng của chúng ta xuất hiện trước mặt antifan thì ta bị\n \nmất tiền.&quot; Đây là một insight cực kỳ đắt giá giúp loại bỏ lãng phí ngân sách marketing.\n \nBằng cách không tốn tiền tiếp cận những người không có nhu cầu hoặc có thái độ tiêu\n \ncực, doanh nghiệp có thể tập trung nguồn lực vào những khách hàng tiềm năng thực sự,\n \ntừ đó giảm chi phí quảng cáo và tăng lợi nhuận.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Áp dụng Quy trình Marketing 4 giai đoạn (Lạnh, Ấm, Nóng, Mua hàng): Diễn giả chia sẻ,</span></div>\n<p class=\"body-txt\">\n&quot;Đây là thuật toán marketing của tôi. Tôi luôn làm marketing theo bốn giai đoạn.&quot; Việc\n \ncó một khuôn khổ chiến lược rõ ràng, từng bước sẽ giúp doanh nghiệp dẫn dắt khách\n \nhàng một cách có hệ thống, từ nhận thức ban đầu về vấn đề đến quyết định mua hàng.\n \nĐây là lộ trình xây dựng mối quan hệ, tạo niềm tin và thuyết phục khách hàng hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tư duy đặt câu hỏi đúng đắn: Diễn giả nhấn mạnh, &quot;Phải hỏi câu hỏi là làm thế nào để tôi</span></div>\n<p class=\"body-txt\">\ncó trang bán hàng tự động này? Làm thế nào để tôi kiếm được tiền tự động này? Chứ\n \nđừng có hỏi là học được không?&quot; Insight này rất quan trọng vì nó liên quan đến gốc rễ\n \ncủa sự phát triển cá nhân và kinh doanh. Cách chúng ta đặt câu hỏi sẽ định hình tư duy,\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">hành động và cuối cùng là kết quả mà chúng ta đạt được. Luôn hướng tới giải pháp và sự</h3>\n<p class=\"body-txt\">\ntiến bộ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Tôi bán cho những người yêu thích tôi và yêu thích cuộc sống khỏe mạnh của họ.”\n \n“Nếu chúng ta làm cho trang bán hàng của chúng ta xuất hiện trước mặt antifan thì ta bị mất\n \ntiền.”\n \n“Phải hỏi câu hỏi là làm thế nào để tôi có trang bán hàng tự động này? Làm thế nào để tôi\n \nkiếm được tiền tự động này? Chứ đừng có hỏi là học được không?”\n \n5.5 Tư duy dẫn dắt người nghe\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi học của diễn giả nhấn mạnh tầm quan trọng cốt lõi của &quot;tư duy&quot;</h3>\n<p class=\"body-txt\">\n(mindset/thinking system) trong kinh doanh và học tập. Tư duy đúng đắn là chìa khóa để\n \nviết hay, thu hút khách hàng, vượt qua mọi trở ngại và đạt được thành công. Diễn giả kêu gọi\n \nhọc viên phải học liên tục, bất kể hoàn cảnh, tập trung vào hành động và tìm kiếm giải pháp\n \nthay vì lý do để phát triển công việc kinh doanh và đạt được kết quả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tư duy là yếu tố quan trọng nhất: Việc không kiếm được tiền không phải do không được</span></div>\n<p class=\"body-txt\">\ndạy hay dốt, mà nằm ở phần tư duy. Tư duy là cái dẫn dắt kể chuyện và khiến người\n \nkhác phải nghe, nó sẽ thay đổi mọi thứ ở phía sau.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Không quan trọng bạn là ai hay học ở đâu: Người mới hay cũ, học một ngày hay trăm</span></div>\n<p class=\"body-txt\">\nnăm đều không quan trọng; lớp học tổ chức ở đâu (online, offline, Hà Nội, Sài Gòn) cũng\n \nkhông quan trọng.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quan trọng là thái độ học và hành động: &quot;Tư duy nó quyết định hết.&quot; Những người bay</span></div>\n<p class=\"body-txt\">\ntừ các tỉnh khác đến học lớp ở Sài Gòn hay Hà Nội chính là &quot;nhóm chiến thắng&quot; vì họ sẵn\n \nsàng vượt qua địa lý.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Học là bắt buộc, không phân biệt ngành nghề: Kinh doanh cái gì cũng phải học, bởi vì tất</span></div>\n<p class=\"body-txt\">\ncả chúng ta đều là doanh nhân (người làm kinh doanh), và thị trường thay đổi liên tục.\n \nPhải học ngày hôm nay, ngày mai, ngày mốt, năm sau, liên tục.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mọi trở ngại đều là cơ hội: Bất kỳ cản trở nào cũng là điều tuyệt vời vì nó ngăn những</span></div>\n<p class=\"body-txt\">\nngười khác ở lại. Càng khó khăn, chúng ta càng có cơ hội để dễ thành công hơn, trở nên\n \nkhác biệt và có cơ hội chiến thắng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Viết hay là công cụ vượt khó khăn: Lớp học viết hay là công cụ để vượt qua những khó</span></div>\n<p class=\"body-txt\">\nkhăn của thị trường. Không phải vì người ta không biết viết, mà là không biết viết hay để\n \nthúc đẩy người khác tiến lên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mục đích của viết hay: Thu hút người khác về phía mình, khiến họ yêu quý, từ đó bán</span></div>\n<p class=\"body-txt\">\nđược những sản phẩm/dịch vụ có lợi nhuận.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mô hình kinh doanh không rủi ro: Khuyến khích mô hình bán được hàng rồi mới nhập</span></div>\n<p class=\"body-txt\">\nhàng (affiliate marketing) để không có hàng tồn kho và sợ lỗ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Tứ khóa học quan trọng&quot; để biết khách hàng muốn gì: Sales Success System, Email</span></div>\n<p class=\"body-txt\">\nMarketing, Video Marketing và IPS (Internet Power System).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Học và hành động liên tục: Các khóa học này phải học đi học lại nhiều lần, năm nào cũng</span></div>\n<p class=\"body-txt\">\nphải học liên tục vì luôn được update.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Luôn thúc đẩy bản thân hành động: Không bao giờ được kể câu chuyện, nói, hay hỏi</span></div>\n<p class=\"body-txt\">\nnhững cái khiến mình dừng lại. Thất bại nằm ở phần tư duy đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Luôn hỏi &quot;làm thế nào&quot;: Phải luôn hỏi, nghĩ là làm, chứ đừng bao giờ hỏi là nghĩ &quot;tôi</span></div>\n<p class=\"body-txt\">\nkhông làm được.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Viết hay gắn liền với sự phát triển bản thân: Nếu hôm nay mình còn chưa làm cho mình</span></div>\n<p class=\"body-txt\">\ntiến lên thì làm sao mình viết được hay.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quy trình 5 bước của tư duy theo hình cây: (áp dụng cho mọi việc, bao gồm cả việc học)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Liệt kê tất cả các khả năng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sắp xếp chúng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lựa chọn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Viết và làm (triển khai).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sửa lại (cho nó ngắn gọn hơn, tốt hơn).</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tư duy là yếu tố quyết định thành công: Diễn giả nhấn mạnh rằng việc không kiếm được</span></div>\n<p class=\"body-txt\">\ntiền không phải do thiếu kiến thức hay năng lực mà là do tư duy sai lệch (0:15-0:22).\n \nĐiều này quan trọng vì nó chuyển trọng tâm từ việc đổ lỗi cho yếu tố bên ngoài (thiếu\n \nthông tin, kém thông minh) sang yếu tố nội tại có thể kiểm soát được (cách suy nghĩ).\n \nThay đổi tư duy sẽ mở ra con đường hành động và khả năng giải quyết vấn đề hiệu quả\n \nhơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mọi trở ngại đều là cơ hội để vượt trội: Thay vì né tránh khó khăn, diễn giả dạy rằng</span></div>\n<p class=\"body-txt\">\n&quot;càng khó khăn thì chúng ta càng có cơ hội để dễ thành công hơn&quot; (4:23-4:25). Insight\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><p class=\"body-txt\">\nnày định hình lại cách chúng ta nhìn nhận thách thức. Khi người khác bỏ cuộc vì khó, đó\n \nlà lúc ta nỗ lực để trở nên khác biệt và độc đáo, tạo lợi thế cạnh tranh và vị thế độc\n \nquyền trong thị trường.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Học liên tục và tập trung vào &quot;làm thế nào&quot;: Diễn giả khẳng định &quot;việc học là việc bắt</span></div>\n<p class=\"body-txt\">\nbuộc&quot; (3:36-3:37), &quot;học lúc nào cũng phải học&quot; (3:49) và quan trọng nhất là &quot;luôn luôn\n \nphải hỏi, phải nghĩ là làm, chứ đừng bao giờ hỏi là nghĩ là tôi không làm được&quot; (7:48-\n \n7:54). Insight này khắc sâu tinh thần hành động và phát triển liên tục, từ chối mọi lý do\n \ntrì hoãn. Trong một thị trường luôn biến đổi, chỉ có việc học và hành động không ngừng\n \nmới giúp doanh nghiệp tồn tại và tiến lên, thay vì chìm đắm trong sự nghi ngờ và không\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">hành động.</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Viết hay là viết để người khác tiến lên: &quot;Viết hay là phải viết để người ta tiến lên&quot; (8:19-</span></div>\n<p class=\"body-txt\">\n8:20). Điều này quan trọng vì nó định nghĩa lại mục đích của việc truyền thông và tiếp\n \nthị. Không chỉ là cung cấp thông tin mà phải truyền cảm hứng, động lực, hướng dẫn\n \nngười đọc hành động và nhìn thấy giá trị cho bản thân họ. Khi làm được điều đó, sự kết\n \nnối và lòng tin sẽ tự khắc đến, dẫn đến sự ủng hộ và mua hàng một cách tự nhiên.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Các bạn không kiếm được tiền không phải là vì tôi không dạy các bạn hay các bạn không phải\n \nlà các bạn dốt hay ngu. Mà nó nằm rất quan trọng ở cái phần tư duy ấy.”\n \n“Bất kỳ cản trở nào đ
