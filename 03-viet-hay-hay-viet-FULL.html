 class=\"body-txt\">\nhoặc thay thế (4:36-4:48, 4:57).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quan niệm về &quot;văn hay&quot;: &quot;Văn hay&quot; không phải là do cô giáo chấm mà là phần thu hút sự</span></div>\n<p class=\"body-txt\">\nchú ý của độc giả, nơi họ đọc lại, ở lại lâu (6:02-6:23).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nguyên tắc đo lường: &quot;Không đo lường được thì không quản lý được&quot; (6:39-6:47).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tập hợp hành vi (Big Data/Số lớn): Xem xét tổng thể hành vi của nhóm khách hàng tiềm</span></div>\n<p class=\"body-txt\">\nnăng, không quá tập trung vào số ít cá biệt. Đối xử với tất cả khách hàng như một con\n \nngười và sử dụng công cụ có sẵn để sửa đổi cho phù hợp (6:54-7:37).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Giá trị của công cụ và bài học: Công cụ và kiến thức được cung cấp có giá trị rất lớn</span></div>\n<p class=\"body-txt\">\n(triệu đô, chục triệu đô) (10:07-10:16), giúp hệ thống tự kiếm tiền.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hành động là chìa khóa: Diễn giả chỉ trích sự lười biếng của học viên không làm theo</span></div>\n<p class=\"body-txt\">\nhướng dẫn chi tiết, chỉ cần thực hành (bấm vào chỗ này, kéo chữ, kéo ảnh, kéo video, kéo\n \nngười vào) sẽ thấy kết quả (7:46-7:52, 8:17-8:22, 11:08-11:22). Diễn giả sẽ không &quot;cho&quot;\n \nnhững ai lười biếng, chỉ giúp đỡ những người thực sự làm (11:25-11:43).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thứ tự thực hiện: Kéo form vào, test form, kéo tiêu đề chính, kéo tiêu đề phụ, kéo lợi ích</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">(13:34-13:51).</h3>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Đo lường bằng hành vi người dùng, không phải cảm tính cá nhân: Diễn giả nhấn mạnh</span></div>\n<p class=\"body-txt\">\nrằng &quot;bài viết hay hay không hay là do chính bạn [tức là hiệu quả đo được] chứ không\n \nphải là tôi có thể trả lời cho bạn&quot; (0:24-0:29) và &quot;không ai có thể trả lời ngoài con số liệu\n \nvề khả năng chuyển đổi của bài viết&quot; (0:30-0:34). Điều này cực kỳ quan trọng vì nó\n \nchuyển trọng tâm từ việc tạo ra nội dung &quot;có vẻ hay&quot; sang nội dung &quot;thực sự hiệu quả&quot;\n \ndựa trên dữ liệu khách quan.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sử dụng Heatmap để &quot;đọc&quot; ý muốn của khách hàng: Công cụ Heatmap là chìa khóa để</span></div>\n<p class=\"body-txt\">\nbiết &quot;cái gì họ quan tâm nhiều hơn&quot; (1:25-1:26). Điều này giúp doanh nghiệp hiểu rõ\n \nkhách hàng đang muốn gì, không muốn gì, từ đó tinh chỉnh nội dung một cách khoa học,\n \nloại bỏ những phần không hiệu quả và nhân rộng những phần thành công. Nguyên tắc\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><p class=\"body-txt\">\n&quot;không đo lường được thì không quản lý được&quot; (6:39-6:47) được áp dụng trực tiếp tại\n \nđây.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tập trung vào hành động và thực hành: Diễn giả liên tục nhấn mạnh việc học viên cần</span></div>\n<p class=\"body-txt\">\nphải tự tay làm theo các bước hướng dẫn, không được lười biếng. &quot;Bạn không làm bạn\n \nkhông thấy&quot; (11:41-11:42). Việc này quan trọng vì lý thuyết dù tốt đến mấy cũng vô\n \nnghĩa nếu không được áp dụng vào thực tế để tạo ra kết quả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Cái bài viết hay hay không hay là do chính bạn, chứ không phải là tôi có thể trả lời cho bạn.\n \nKhông có ai có thể trả lời ngoài con số liệu về khả năng chuyển đổi của bài viết.”\n \n“Không đo lường được thì không quản lý được.”\n \n“Bạn không làm, bạn không thấy.”\n \n7.6 Hướng dẫn làm trang bán hàng P1\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi học này tập trung vào quy trình xây dựng một trang bán hàng hiệu quả trên</h3>\n<p class=\"body-txt\">\ninternet, với trọng tâm là cách viết tiêu đề chính và tiêu đề phụ thu hút dựa trên lợi ích\n \nkhách hàng, chứ không phải mô tả sản phẩm. Diễn giả hướng dẫn cách tổ chức nội dung\n \nthành các phần (session) riêng biệt, từ việc nêu vấn đề của khách hàng, xây dựng uy tín cá\n \nnhân, đến trình bày các lợi ích độc đáo. Đồng thời, diễn giả cũng khuyến khích sử dụng AI\n \n(ChatGPT) để tìm kiếm ý tưởng và tập hợp từ khóa, giúp vượt qua tình trạng bí ý tưởng\n \ntrong quá trình sáng tạo nội dung.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tạo và chỉnh sửa trang bán hàng: Bắt đầu bằng việc nhân bản một trang mẫu (ví dụ:</span></div>\n<p class=\"body-txt\">\nlong.bía) và chỉnh sửa các phần nội dung.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Viết tiêu đề chính (heading):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tập trung vào lợi ích khách hàng nhận được, không mô tả sản phẩm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ví dụ: thay vì &quot;một khóa học&quot;, hãy viết &quot;Bạn có thể nhanh chóng thiết lập hệ thống kinh</span></div>\n<p class=\"body-txt\">\ndoanh trên internet và bắt đầu kinh doanh ngay bây giờ, ngay cả khi bạn chưa từng kinh\n \ndoanh.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chỉnh sửa màu sắc, kích thước, độ đậm của chữ để làm nổi bật tiêu đề.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tổ chức nội dung bằng &quot;session&quot;:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Không sửa trực tiếp lên các phần (session) đã hoàn chỉnh. Thay vào đó, thêm một</span></div>\n<p class=\"body-txt\">\nsession mới và đưa nội dung cần sửa lên đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Giữ nguyên các session đã &quot;ổn&quot; (ví dụ: session thanh toán, session chân trang).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mỗi session có một mục đích cụ thể (tiêu đề, vấn đề, uy tín, kể chuyện, lợi ích).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sử dụng AI (ChatGPT) để tìm ý tưởng và từ khóa:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khi bí ý tưởng, quay lại ChatGPT để tìm ý tưởng cho tiêu đề phụ hoặc lợi ích.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nhập thông tin về sản phẩm/dịch vụ, đối tượng khách hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Yêu cầu ChatGPT liệt kê 5 lợi ích độc đáo mà khách hàng rất muốn nhưng đối thủ không</span></div>\n<p class=\"body-txt\">\nthể cung cấp được (chỉ liệt kê, không giải thích).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Đây là bước &quot;tập hợp từ khóa&quot; để sau đó biến thành tiêu đề thu hút.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Viết tiêu đề phụ (sub-heading):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Dựa trên các lợi ích độc đáo đã tìm được.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ví dụ: &quot;Những chiến lược đỉnh cao về kinh doanh trên internet sẽ thúc đẩy / biến đổi</span></div>\n<p class=\"body-txt\">\ncông việc kinh doanh của bạn.&quot; hoặc &quot;Khám phá những bí mật về kinh doanh trên\n \ninternet sẽ làm biến đổi công việc kinh doanh của bạn vượt xa hiện tại, hoàn toàn tự\n \nđộng, khiến đối thủ không bao giờ bắt kịp.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nêu vấn đề của khách hàng (Phần 3):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Đặt các câu hỏi để khơi gợi vấn đề và nỗi đau của khách hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ví dụ: &quot;Có phải bạn từng nghĩ kinh doanh trên internet thật khó khăn?&quot;, &quot;Bạn sẽ choáng</span></div>\n<p class=\"body-txt\">\nngợp bởi các công cụ và chiến lược phức tạp?&quot;, &quot;Mất quá nhiều thời gian trên internet\n \nmà không hiệu quả bằng phương pháp truyền thống?&quot;, &quot;Thử nhiều cách khác nhau, tốn\n \ntiền nhưng không hiệu quả?&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Kết thúc bằng lời kêu gọi hành động dựa trên vấn đề: &quot;Nếu bạn đã từng như trên thì bạn</span></div>\n<p class=\"body-txt\">\nphải đọc hết bức thư này.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Xây dựng uy tín (Phần 4):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Trình bày thông tin về bản thân/thương hiệu một cách ngắn gọn, súc tích.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lọc bớt các câu chữ dài dòng, không cần thiết (ví dụ: &quot;gặp gỡ người huấn luyện, luật sư,</span></div>\n<p class=\"body-txt\">\nnhà đào tạo&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chọn lọc hình ảnh (ví dụ: 2-3 ảnh thay vì nhiều).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Kể chuyện / Trình bày lợi ích (Phần 5):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Đặt phần kể chuyện/lợi ích lên trên phần uy tín.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ví dụ về lợi ích: &quot;Bạn có thể nhanh chóng bắt đầu công việc kinh doanh của mình trên</span></div>\n<p class=\"body-txt\">\ninternet với một lộ trình rõ ràng ngay cả khi bạn chưa có kinh nghiệm.&quot;\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tư duy viết tiêu đề dựa trên &quot;lợi ích&quot; khách hàng, không phải &quot;tính năng/sản phẩm&quot;:</span></div>\n<p class=\"body-txt\">\nDiễn giả nhấn mạnh việc phải đưa lợi ích mà khách hàng nhận được lên trước, thay vì\n \nchỉ mô tả sản phẩm hay dịch vụ. Đây là điểm mấu chốt để thu hút sự chú ý và thuyết\n \nphục khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Khách hàng quan tâm đến cách sản phẩm/dịch vụ giải quyết vấn đề</span></div>\n<p class=\"body-txt\">\ncủa họ hoặc mang lại giá trị gì cho họ, chứ không phải bản thân sản phẩm đó là gì. Một\n \ntiêu đề tập trung vào lợi ích sẽ tạo ra sự kết nối cảm xúc và động lực hành động mạnh\n \nmẽ hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sử dụng AI (ChatGPT) để brainstorm ý tưởng và tập hợp từ khóa độc đáo: Diễn giả</span></div>\n<p class=\"body-txt\">\nhướng dẫn cách dùng ChatGPT để tìm kiếm những lợi ích riêng biệt mà đối thủ khó có\n \nthể cung cấp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Trong môi trường cạnh tranh, việc tạo ra nội dung độc đáo và khác</span></div>\n<p class=\"body-txt\">\nbiệt là cực kỳ cần thiết. AI là một công cụ mạnh mẽ để vượt qua tình trạng &quot;bí ý tưởng&quot;,\n \nnhanh chóng tạo ra nhiều gợi ý chất lượng, giúp định hình thông điệp bán hàng sáng tạo\n \nvà có tính cạnh tranh cao.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cấu trúc trang bán hàng theo từng &quot;session&quot; riêng biệt: Việc chia trang thành các phần</span></div>\n<p class=\"body-txt\">\nrõ ràng (tiêu đề, vấn đề, uy tín, lợi ích, kể chuyện) và quy tắc chỉ thêm session mới để\n \nsửa, không đụng chạm vào session đã hoàn chỉnh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Giúp nội dung được tổ chức một cách logic, dễ đọc và dễ tiếp thu cho</span></div>\n<p class=\"body-txt\">\nkhách hàng. Đồng thời, nó giúp người xây dựng trang dễ dàng quản lý, chỉnh sửa, tái sử\n \ndụng các phần nội dung hiệu quả hơn, tránh việc vô tình làm hỏng các phần đã được tối\n \nưu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Không, không phải. Nếu mà mình ghi một khóa học là mình đang mô tả về sản phẩm. Mình\n \nphải mô tả về cái lợi ích mà họ nhận được, mình phải đưa cái lợi ích lên trước.”\n \n“Phần nào hay rồi thì tôi kéo nó sang là xong.”\n \n“Các bạn có đang nhìn thấy tôi đang tư duy, tôi đang làm một cái sản phẩm hoàn thiện trước\n \nmặt các bạn không?”\n \n7.7 Hướng dẫn làm trang bán hàng P2\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi học này tập trung vào việc xây dựng một trang bán hàng (sales page) hiệu</h3>\n<p class=\"body-txt\">\nquả trên internet để tăng trưởng kinh doanh đột phá mà không cần đầu tư nhiều tiền vào\n \ncác chiến lược marketing tốn kém. Diễn giả hướng dẫn cấu trúc một trang bán hàng cơ bản,\n \nnhấn mạnh việc làm chủ các công cụ, kỹ năng và tư duy đúng đắn, cùng với việc tận dụng các\n \nchiến lược đã được kiểm chứng để tiết kiệm thời gian và tự tin bước vào thị trường online.\n \nCốt lõi là việc có một tập hợp khách hàng và một trang bán hàng được tối ưu hóa, giúp bạn\n \ncó thể bán bất cứ sản phẩm hay dịch vụ nào.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mục tiêu: Tăng trưởng đột phá công việc kinh doanh trên internet mà không cần đầu tư</span></div>\n<p class=\"body-txt\">\nnhiều tiền vào các chiến lược marketing tốn kém.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bạn sẽ làm chủ được các công cụ và kỹ năng quan trọng trong lĩnh vực kinh doanh và</span></div>\n<p class=\"body-txt\">\nmarketing online.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bạn sẽ tiết kiệm được thời gian khỏi mất công mày mò nhờ những chiến lược kinh</span></div>\n<p class=\"body-txt\">\ndoanh trên internet đã được kiểm chứng thành công.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bạn sẽ có tư duy đúng đắn và những chiến lược đúng để tự tin bước vào thị trường</span></div>\n<p class=\"body-txt\">\nonline.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Giới thiệu cấu trúc một trang bán hàng cơ bản trên mạng xã hội gồm 16 phần (buổi này</span></div>\n<p class=\"body-txt\">\nchỉ trình bày chi tiết 7 phần và kêu gọi hành động):\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tiêu đề chính: Phải thật to, gây chú ý (cỡ 4-5 dòng).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tiêu đề phụ: Bổ trợ cho tiêu đề chính (cỡ 3-4 dòng).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vấn đề khách hàng thường gặp: Nhấn mạnh các nỗi đau hoặc khó khăn của khách hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Uy tín / Thẩm quyền: Chứng minh năng lực, kinh nghiệm, hoặc vị thế của người</span></div>\n<p class=\"body-txt\">\nbán/doanh nghiệp.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Câu chuyện: Kể câu chuyện (trước và sau, thành công của khách hàng, hay câu chuyện</span></div>\n<p class=\"body-txt\">\nhối tiếc) để tạo sự kết nối.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lợi ích: Trình bày những gì khách hàng nhận được.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tạo giá trị lớn: Giải thích tại sao sản phẩm/dịch vụ &quot;đắt&quot;, &quot;quý&quot;, &quot;cần&quot;, &quot;hiếm&quot; – xây dựng</span></div>\n<p class=\"body-txt\">\ngiá trị nhận thức.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">(Các phần từ 8-15 sẽ được trình bày ở buổi sau)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Kêu gọi hành động (Call to Action - CTA): Lời kêu gọi khách hàng thực hiện hành động cụ</span></div>\n<p class=\"body-txt\">\nthể.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Việc xây dựng trang bán hàng theo từng &quot;session&quot; (phần) giúp dễ dàng chỉnh sửa, nâng</span></div>\n<p class=\"body-txt\">\ncấp, và đo lường hiệu quả (phần nào hiệu quả, phần nào không) để tối ưu sau này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khi có tập hợp khách hàng (ví dụ qua email) và trang bán hàng được tối ưu, có thể gửi</span></div>\n<p class=\"body-txt\">\nemail marketing (sử dụng kỹ thuật kể chuyện) để điều hướng khách hàng đến trang bán\n \nhàng, từ đó bán được bất kỳ sản phẩm/dịch vụ nào.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cấu trúc trang bán hàng theo từng &quot;session&quot; (phần): Điều này quan trọng vì nó cung cấp</span></div>\n<p class=\"body-txt\">\nmột phương pháp luận có hệ thống để xây dựng trang bán hàng hiệu quả. Việc chia nhỏ\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">nội dung giúp dễ dàng quản lý, chỉnh sửa, nâng cấp và đặc biệt là đo lường hiệu suất của</h3>\n<p class=\"body-txt\">\ntừng phần. Điều này cho phép tối ưu hóa liên tục để đạt được tỷ lệ chuyển đổi cao nhất.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sức mạnh của việc sở hữu &quot;tập hợp khách hàng&quot; kết hợp với &quot;trang bán hàng&quot; đã được</span></div>\n<p class=\"body-txt\">\nkiểm chứng: Đây là insight đắt giá nhất. Khi bạn đã có danh sách khách hàng tiềm năng\n \nhoặc hiện tại (ví dụ: email list) và một trang bán hàng được xây dựng theo các chiến\n \nlược hiệu quả, bạn có thể bán hầu hết mọi thứ. Điều này thay đổi tư duy từ việc tìm kiếm\n \nsản phẩm để bán sang việc xây dựng khách hàng và nền tảng bán hàng, giảm sự phụ\n \nthuộc vào các kênh marketing đắt đỏ và tăng khả năng mở rộng kinh doanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nhấn mạnh vào &quot;tạo giá trị lớn&quot; (giá cả) và &quot;tư duy đúng đắn&quot;: Diễn giả không chỉ nói về</span></div>\n<p class=\"body-txt\">\nviệc xây dựng trang web mà còn về việc xây dựng giá trị sản phẩm/dịch vụ trong tâm trí\n \nkhách hàng (&quot;tại sao nó đắt, tại sao nó quý, tại sao nó cần, tại sao nó hiếm&quot;) và tư duy\n \nđúng đắn của người làm kinh doanh. Điều này rất quan trọng vì một trang bán hàng tốt\n \nkhông thể bán được một sản phẩm không có giá trị hoặc nếu người bán không có tư duy\n \nchiến lược.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Tăng trưởng đột phá công việc kinh doanh của bạn trên internet mà không cần đầu tư nhiều\n \ntiền.”\n \n“Nếu bạn đã sẵn sàng dũng cảm bước vào thế giới của những người kinh doanh trên internet.”\n \n“Nếu mà tôi làm như vậy thì cái gì mà vào tay tôi tôi chả bán được.”\n \n7.8 Bạn có thể bán mọi thứ khi bạn viết hay\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi học này bắt đầu bằng việc diễn giả giới thiệu các tài sản đẹp (nhà, xe, cảnh</h3>\n<p class=\"body-txt\">\nquan) tại Mỹ, sau đó chuyển sang phần chia sẻ của một học viên là Joseph Bình Dương. Anh\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><p class=\"body-txt\">\nBình đã kể về hành trình học tập cùng diễn giả và kinh nghiệm kinh doanh bất động sản, đặc\n \nbiệt là Airbnb tại Mỹ. Buổi học nhấn mạnh việc tận dụng cơ hội kinh doanh bằng cách nắm\n \nbắt nhu cầu của thị trường ngách (cộng đồng người Việt ở nước ngoài), đồng thời khẳng\n \nđịnh giá trị của việc học hỏi sâu sắc và chú ý đến từng chi tiết trong lời dạy của người diễn\n \ngiả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả giới thiệu và hỏi về độ &quot;đẹp&quot; của các tài sản: cây thông, ngôi nhà, xe ô tô.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả dẫn học viên đi tham quan ngôi nhà (có hồ bơi, sân vườn).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả giới thiệu ngôi nhà đang được review thuộc sở hữu của một học viên.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Học viên Joseph Bình Dương (Anh Bình), người chuyên mua bán bất động sản tại Mỹ,</span></div>\n<p class=\"body-txt\">\ngiới thiệu bản thân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Anh Bình chia sẻ quá trình học các khóa của diễn giả: SSS 10 (năm 2019), IBS, Eagle</span></div>\n<p class=\"body-txt\">\nCamp, Ultimate Channel, SSS 19, và Lập trình vận mệnh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Anh Bình kể về chuyến trải nghiệm cùng diễn giả và các anh em Eagle Camp trên &quot;con</span></div>\n<p class=\"body-txt\">\nđường 66&quot; từ Chicago tới Los Angeles (Quận Cam).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Anh Bình mô tả Quận Cam là nơi có cộng đồng người Việt lớn nhất ở hải ngoại, với khí</span></div>\n<p class=\"body-txt\">\nhậu nắng ấm đẹp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Anh Bình cho biết căn nhà được review là của anh, đang cho thuê Airbnb với giá 500</span></div>\n<p class=\"body-txt\">\nUSD/ngày, có 5 phòng ngủ, 4 phòng tắm, sân vườn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Anh Bình chia sẻ cơ hội kinh doanh tại Mỹ: cung cấp các món ăn, gia vị, rau củ quả Việt</span></div>\n<p class=\"body-txt\">\nNam cho cộng đồng người Việt, vì họ rất &quot;nhạy cảm&quot; với những gì quê hương thiếu vắng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Anh Bình nhắc đến việc diễn giả diễn giả mang những cái hay của Việt Nam sang Mỹ và</span></div>\n<p class=\"body-txt\">\nngược lại, mang tư duy hay từ Mỹ về Việt Nam.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mục tiêu của anh là kết nối các anh em Eagle Camp muốn mang hàng hóa từ Việt Nam</span></div>\n<p class=\"body-txt\">\nsang Mỹ, và mang tư duy hay về từ Mỹ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Anh Bình nhấn mạnh rằng mọi lời nói, từ khóa (keyword), cử chỉ, hành động của diễn</span></div>\n<p class=\"body-txt\">\ngiả diễn giả đều có ý nghĩa và bỏ qua sẽ mất &quot;cả triệu đô&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Anh Bình kể về việc diễn giả diễn giả đã xóa một video vì học viên thờ ơ, không đọc kỹ, và ai</span></div>\n<p class=\"body-txt\">\nmuốn xem lại video đó thì phải đăng ký học lại IBS.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tìm kiếm và đáp ứng nhu cầu thị trường ngách, đặc biệt trong cộng đồng di dân: Anh</span></div>\n<p class=\"body-txt\">\nBình đã thành công trong bất động sản ở Mỹ và khai thác thị trường Airbnb. Quan trọng\n \nhơn, anh chỉ ra cơ hội kinh doanh lớn từ việc cung cấp các sản phẩm (ẩm thực, rau củ)\n \ntừ Việt Nam cho cộng đồng người Việt tại Mỹ, vì họ rất &quot;nhạy cảm&quot; với những gì quê\n \nhương thiếu vắng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Nó minh họa nguyên tắc &quot;customer-centric&quot; và &quot;niche marketing&quot;</span></div>\n<p class=\"body-txt\">\nmột cách rất cụ thể và dễ hiểu. Cơ hội kinh doanh không chỉ đến từ những sản phẩm lớn\n \nmà còn từ việc hiểu sâu sắc những nhu cầu tưởng chừng nhỏ bé nhưng sâu sắc của một\n \ncộng đồng cụ thể, và chủ động lấp đầy những khoảng trống đó.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Giá trị của sự quan sát tinh tế và học hỏi chuyên sâu từ người diễn giả: Anh Bình nhấn</span></div>\n<p class=\"body-txt\">\nmạnh rằng mọi lời nói, từ khóa, cử chỉ của diễn giả đều có ý nghĩa và việc bỏ qua chúng\n \ncó thể dẫn đến mất &quot;cả triệu đô&quot;. Việc diễn giả xóa video vì học viên thờ ơ là một bài học\n \nđắt giá về tầm quan trọng của sự chú tâm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây không chỉ là lời khuyên về cách học từ diễn giả mà còn là một triết lý</span></div>\n<p class=\"body-txt\">\nvề cách tiếp cận kiến thức và cơ hội kinh doanh nói chung. Nó khuyến khích sự chủ\n \nđộng, tỉ mỉ, tư duy sâu sắc và khả năng nhìn ra ý nghĩa ẩn sâu, thay vì chỉ tiếp thu thông\n \ntin một cách hời hợt.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Muốn ngầu thì phải giàu chứ.”\n \n“Nếu như mà những cái bạn nào mà hiểu và để ý tí xíu thì tất cả những cái lời nói hay là\n \nnhững cái keyword của diễn giả thì các bạn chỉ cần note lại những cái keyword đó và đánh ra\n \nlà What Why How là tự động là nó nó nó nó sẽ ra hết ha.”\n \n“Những bạn nào mà thờ ơ hay là bỏ qua đi những cái đó thì là là coi như các bạn mất cả triệu\n \nđô đó.”\n \n7.9 Tổng kết\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi học này tập trung vào phương pháp tạo ra nội dung bán hàng hiệu quả và thu</h3>\n<p class=\"body-txt\">\nhút trên internet thông qua việc &quot;chuyển ngữ&quot; các tính năng thành lợi ích cảm xúc và kể\n \nchuyện. Diễn giả nhấn mạnh tầm quan trọng của việc thu thập, phân loại, lựa chọn thông tin\n \nmột cách có hệ thống, cùng với sự kiên trì luyện tập và làm đi làm lại để tối ưu hóa. Cốt lõi là\n \nphải biến những điều tưởng chừng bình thường thành giá trị độc đáo, lồng ghép cảm xúc và\n \ngiải quyết vấn đề của khách hàng để thúc đẩy họ hành động. Thành công đến từ việc không\n \nngừng cải thiện nội dung và đo lường kết quả liên tục.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phương pháp cốt lõi để tăng khả năng viết lách là &quot;tập hợp, phân loại, lựa chọn&quot; thông</span></div>\n<p class=\"body-txt\">\ntin.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nội dung bài viết cần được bổ sung từ nhiều nguồn: vốn từ, câu chuyện, ngữ pháp, cấu</span></div>\n<p class=\"body-txt\">\ntrúc, tục ngữ, ca dao, và kiến thức từ các trải nghiệm ở nước ngoài.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cần học cách &quot;gọi tên&quot; các sự vật, hiện tượng quen thuộc nhưng ít được chú ý để tái sử</span></div>\n<p class=\"body-txt\">\ndụng chúng trong nội dung, vì người bản địa có thể không nhận ra giá trị của những điều\n \nhọ nhìn thấy hàng ngày.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ca dao và tục ngữ là &quot;phép tu từ cực mạnh&quot; giúp bài viết mang &quot;hồn người Việt&quot; và tạo</span></div>\n<p class=\"body-txt\">\nchiều sâu cảm xúc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Trong các bài viết bán hàng hoặc bài dịch, cần &quot;chuyển ngữ&quot; (thêm các yếu tố tiếng</span></div>\n<p class=\"body-txt\">\nViệt/cảm xúc) để biến tính năng khô khan thành lợi ích và câu chuyện hấp dẫn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phần &quot;tạo trang bán hàng&quot; (thực hiện kỹ thuật) là ít quan trọng hơn phần chuẩn bị nội</span></div>\n<p class=\"body-txt\">\ndung, nhưng cần &quot;trăm hay không bằng tay quen&quot; – làm đi làm lại hàng ngàn trang để\n \nthành thạo và nhanh chóng.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sự kiên trì và bền bỉ trong công việc (ví dụ: &quot;có công mài sắt có ngày nên kim,&quot; &quot;nước</span></div>\n<p class=\"body-txt\">\nchảy đá mòn&quot;) là yếu tố quyết định để đạt được kết quả mong muốn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mỗi người là một &quot;viên ngọc quý,&quot; cần được &quot;mài giũa, chui rèn&quot; (học tập, thực hành) để</span></div>\n<p class=\"body-txt\">\nphát huy giá trị, nếu không sẽ chỉ là &quot;viên đá cuội.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Điều quan trọng là phải *làm* những gì được học để định vị con người và năng lực của</span></div>\n<p class=\"body-txt\">\nbản thân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chuyển đổi các tính năng của sản phẩm/dịch vụ thành lợi ích cảm xúc và lồng ghép trải</span></div>\n<p class=\"body-txt\">\nnghiệm cá nhân vào bài viết (ví dụ: căn nhà Airbnb được mô tả qua cảm xúc và giải pháp\n \ncho các vấn đề tiềm ẩn của khách hàng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Không chỉ liệt kê đặc điểm mà biến chúng thành &quot;câu chuyện&quot; hấp dẫn, xoay quanh đối</span></div>\n<p class=\"body-txt\">\ntượng khách hàng và giải quyết các vấn đề thực tế của họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Việc tạo nội dung compelling không phụ thuộc vào công cụ hay phần mềm cụ thể mà vào</span></div>\n<p class=\"body-txt\">\ncách viết và luyện tập tư duy viết lách.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Trong quá trình bán hàng trực tuyến, cần tập trung vào việc viết &quot;tiêu đề chính&quot; thu hút,</span></div>\n<p class=\"body-txt\">\nsau đó nhanh chóng đưa vào &quot;ô thanh toán&quot; và chạy quảng cáo để &quot;bơm khách&quot; và đo\n \nlường hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sau khi có khách và chuyển đổi, cần liên tục tối ưu bằng cách thêm lợi ích, tính năng, và</span></div>\n<p class=\"body-txt\">\ngiải quyết các vấn đề mới của khách hàng theo từng bước.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Biến những trải nghiệm cá nhân (ví dụ: chiếc đồng hồ, thức ăn tiện lợi khi đi xa) thành</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">nội dung bán hàng hiệu quả bằng cách đặt câu hỏi và gợi mở nhu cầu.</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sử dụng &quot;form&quot; (biểu mẫu đăng ký/liên hệ) là công cụ quan trọng để thu thập thông tin</span></div>\n<p class=\"body-txt\">\nkhách hàng tiềm năng và thúc đẩy họ hành động.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mọi câu chuyện và nội dung đều nhằm mục đích cuối cùng là thúc đẩy hành động từ phía</span></div>\n<p class=\"body-txt\">\nkhách hàng: quan tâm (marketing) hoặc mua hàng (bán hàng).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chuyển đổi tính năng thành lợi ích cảm xúc và kể chuyện: Diễn giả liên tục nhấn mạnh</span></div>\n<p class=\"body-txt\">\nviệc không chỉ liệt kê các đặc điểm của sản phẩm/dịch vụ mà phải biến chúng thành lợi\n \ních rõ ràng và lồng ghép cảm xúc, kể chuyện cá nhân hoặc câu chuyện về người dùng.\n \nĐiều này quan trọng vì khách hàng mua giải pháp cho vấn đề của họ và cảm xúc mà sản\n \nphẩm/dịch vụ mang lại, chứ không phải các thông số kỹ thuật khô khan. Một bài viết\n \nchạm đến cảm xúc sẽ tạo sự kết nối mạnh mẽ hơn, tăng tỷ lệ chuyển đổi hiệu quả hơn\n \nhẳn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phương pháp &quot;Tập hợp, phân loại, lựa chọn&quot; kết hợp với &quot;Làm đi làm lại&quot;: Bài giảng cung</span></div>\n<p class=\"body-txt\">\ncấp một quy trình rõ ràng: từ tư duy thu thập thông tin một cách có hệ thống, đến việc\n \nđánh giá và lựa chọn, và sau đó là sự kiên trì thực hành. Điều này quan trọng vì nó không\n \nchỉ trang bị kỹ năng nghiên cứu và chọn lọc nội dung chất lượng mà còn nhấn mạnh rằng\n \nthành công trong viết lách và bán hàng đến từ sự bền bỉ, lặp lại và tối ưu liên tục, giống\n \nnhư việc &quot;mài giũa viên ngọc&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khả năng &quot;gọi tên&quot; và &quot;chuyển ngữ&quot; những điều bình thường: Diễn giả chỉ ra rằng những</span></div>\n<p class=\"body-txt\">\nngười bản địa thường bỏ qua giá trị của những điều họ nhìn thấy hoặc trải nghiệm hàng\n \nngày vì chúng quá đỗi bình thường. Khả năng &quot;gọi tên&quot; và &quot;chuyển ngữ&quot; những điều\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><p class=\"body-txt\">\nquen thuộc đó thành nội dung có giá trị (từ tính năng thành lợi ích, từ dữ kiện thành câu\n \nchuyện) là rất quan trọng. Nó giúp khám phá những góc nhìn mới, tạo ra sự khác biệt và\n \nđộc đáo trong nội dung, tránh sự nhàm chán và lặp lại với đối thủ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Tập hợp, phân loại, lựa chọn sẽ làm cho chúng ta tăng cái khả năng viết lách của mình lên rất\n \nlà nhiều.”\n \n“Ngọc đem vào giũa bao đau đớn, ngọc giũa xong rồi sáng tựa sao.”\n \n“Bạn không cần lo lắng về trạm sạc nữa, nhà tôi cung cấp điện sẵn cho bạn để sạc xe.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Chương 8</h3>\n<p class=\"body-txt\">\nHướng dẫn tạo trang bán hàng có QR thanh toán\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi giảng tập trung vào việc xây dựng một hệ thống marketing internet hiệu quả</h3>\n<p class=\"body-txt\">\ndựa trên thực hành, xoay quanh &quot;hệ thống IPS&quot; mà cốt lõi là trang bán hàng (sales page).\n \nDiễn giả nhấn mạnh việc ưu tiên xây dựng kênh chuyển đổi rõ ràng trước khi đẩy mạnh\n \nmarketing, đồng thời tối ưu hóa quy trình thu thập và quản lý dữ liệu khách hàng. Mục tiêu\n \nlà tận dụng các công cụ tự động hóa (Postketch, Google Sheet, Zapier) để biến &quot;luồng traffic\n \nkhông kiểm soát&quot; thành &quot;luồng có thể kiểm soát&quot;, từ đó tối đa hóa hiệu suất bán hàng thông\n \nqua remarketing, upselling và downselling.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thực hành là yếu tố then chốt, quan trọng hơn lý thuyết suông trong marketing.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cần hiểu rõ hệ thống tư duy trước khi thực hiện các hoạt động marketing.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hệ thống IPS là trọng tâm của quy trình marketing, bắt đầu bằng việc bán hàng trước,</span></div>\n<p class=\"body-txt\">\nsau đó mới đến marketing để chuyển đổi thành tiền.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Trang bán hàng (Sales Page) là thành phần cốt lõi, là nơi mọi hoạt động marketing</span></div>\n<p class=\"body-txt\">\nhướng về để tạo ra kết quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Doanh nghiệp thường có nhiều trang bán hàng cho nhiều sản phẩm/chiến lược (phễu,</span></div>\n<p class=\"body-txt\">\nupsell, downsell, combo, affiliate), cần quy trình tạo trang bán hàng đơn giản, nhanh\n \nchóng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Luồng traffic được phân loại thành &quot;không thể kiểm soát&quot; (nguồn khách hàng mới, chưa</span></div>\n<p class=\"body-txt\">\nbiết trước) và &quot;có thể kiểm soát&quot; (khách hàng đã tương tác, có thể remarketing). Mục\n \ntiêu là chuyển đổi luồng không kiểm soát thành có kiểm soát.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khi khách hàng tương tác trên trang bán hàng, dữ liệu cần được chuyển tự động về hệ</span></div>\n<p class=\"body-txt\">\nthống quản lý đơn hàng (Postketch) và hệ thống quản lý khách hàng (Google\n \nSheet/CRM).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Marketing vào dữ liệu đã có bao gồm các hoạt động như quảng cáo, email marketing,</span></div>\n<p class=\"body-txt\">\nZalo marketing, và gọi điện (telemarketing).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chiến lược &quot;thu tiền trước&quot; (chẳng hạn ưu đãi khi thanh toán ngay) và &quot;bán trước&quot; (bán</span></div>\n<p class=\"body-txt\">\nkhi chưa có sản phẩm) là các chiến lược quan trọng để đảm bảo dòng tiền.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Trang cảm ơn có thể được sử dụng để dẫn khách hàng đến các ưu đãi upsell/one-time</span></div>\n<p class=\"body-txt\">\noffer, nhằm tăng giá trị đơn hàng trung bình hoặc số lần mua hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thêm trang thanh toán chuyên biệt giữa trang bán hàng và trang cảm ơn giúp tự động</span></div>\n<p class=\"body-txt\">\nhóa và giảm chi phí nhân công.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Các công cụ hỗ trợ: Webketch (tạo Sales Page), Postketch (quản lý đơn hàng, tạo đơn tự</span></div>\n<p class=\"body-txt\">\nđộng từ chat), Google Sheet (CRM, quản lý dữ liệu khách hàng), Zapier (kết nối và tự\n \nđộng hóa các ứng dụng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quy trình làm việc tổng thể: Mạng xã hội -&gt; (Webketch/Fchat/Postketch) -&gt; Trang bán</span></div>\n<p class=\"body-txt\">\nhàng -&gt; Trang thanh toán -&gt; Trang cảm ơn -&gt; (Postketch &amp; Google Sheet/CRM).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quy trình làm việc nên được thực hiện từ trái sang phải, từ trên xuống dưới.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Các bước cụ thể: Tạo Fanpage, cấu hình Postketch (kết nối fanpage, gộp trang, phân</span></div>\n<p class=\"body-txt\">\nquyền nhân viên), thêm sản phẩm, cấu hình cổng thanh toán, cấu hình Webketch (tên\n \nmiền, tích hợp Postketch, tạo trang bán hàng, thêm form, cài đặt sự kiện), tối ưu hóa\n \nmobile.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ưu tiên hành động và xây dựng hệ thống bán hàng trước Marketing:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả nhấn mạnh: &quot;Bán hàng thì phải có hệ thống bán hàng thì sau đó hệ thống</span></div>\n<p class=\"body-txt\">\nmarketing mới đưa vào đấy thì mới chuyển thành tiền chứ.&quot; (1:16-1:20).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Điều này định hướng chiến lược rất rõ ràng. Thay vì chỉ chạy quảng</span></div>\n<p class=\"body-txt\">\ncáo rộng rãi mà không có kênh chuyển đổi hiệu quả, doanh nghiệp cần tập trung xây\n \ndựng một quy trình bán hàng/chuyển đổi rõ ràng và tối ưu trước. Marketing sau đó sẽ\n \ndẫn traffic vào kênh đã được chuẩn bị sẵn để tối đa hóa khả năng ra tiền.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sales Page (Trang Bán hàng) là trung tâm của mọi hoạt động chuyển đổi:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Cho nên bây giờ nếu mình không có trang bán hàng thì nó không có cái điều gì diễn ra</span></div>\n<p class=\"body-txt\">\nvới cái cuộc đời của mình hết.&quot; (2:04-2:08).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Sales Page không chỉ là một trang thông tin mà là điểm chạm cốt lõi,</span></div>\n<p class=\"body-txt\">\nnơi khách hàng thực hiện hành động quan trọng nhất (như đăng ký, mua hàng, yêu cầu\n \ntư vấn). Mọi nỗ lực marketing từ các kênh khác đều nên hướng về Sales Page để tập\n \ntrung chuyển đổi, giúp đo lường hiệu quả và tối ưu dễ dàng hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quản lý dữ liệu khách hàng là chìa khóa để &quot;Marketing vào dữ liệu đã có&quot;:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Cái thuật ngữ ở đây ta gọi là marketing vào dữ liệu đã có.&quot; (1:234-1:237).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Dữ liệu khách hàng (từ Google Sheet, CRM) là tài sản vô giá. Việc quản</span></div>\n<p class=\"body-txt\">\nlý tốt dữ liệu này cho phép thực hiện các chiến dịch marketing mục tiêu, cá nhân hóa\n \n(remarketing, upselling, cross-selling) với chi phí thấp hơn và hiệu quả cao hơn so với\n \nviệc liên tục tìm kiếm khách hàng mới. Nó giúp chuyển đổi những người đã biết đến bạn\n \nthành khách hàng thực sự.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tự động hóa quy trình giúp tăng hiệu suất và giảm chi phí:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Việc tích hợp các công cụ như Postketch (quản lý đơn hàng), Google Sheet (CRM), Zapier</span></div>\n<p class=\"body-txt\">\n(kết nối các ứng dụng) để tự động hóa các bước từ tạo đơn, quản lý tương tác khách\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><p class=\"body-txt\">\nhàng, đến gửi thông báo. Ví dụ, thêm trang thanh toán để giảm công việc thúc giục khách\n \nthanh toán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Tự động hóa giúp tiết kiệm thời gian, giảm lỗi do con người, và cắt</span></div>\n<p class=\"body-txt\">\ngiảm chi phí nhân sự, đặc biệt khi doanh nghiệp mở rộng. Nó đảm bảo các quy trình\n \nđược thực hiện nhất quán và nhanh chóng, nâng cao trải nghiệm khách hàng và hiệu quả\n \nvận hành.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Bán hàng thì phải có hệ thống bán hàng thì sau đó hệ thống marketing mới đưa vào đấy thì\n \nmới chuyển thành tiền chứ.”\n \n“Cho nên bây giờ nếu mình không có trang bán hàng thì nó không có cái điều gì diễn ra với cái\n \ncuộc đời của mình hết.”\n \n“Cái thuật ngữ ở đây ta gọi là marketing vào dữ liệu đã có.”\n \n“Những người cả đời không sai lầm là những người chẳng làm gì cả.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Chương 9</h3>\n<p class=\"body-txt\">\n8.1 Kể về hành trình Route 66\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. diễn giả chia sẻ về hành trình xuyên nước Mỹ bằng con đường 66, một con đường</h3>\n<p class=\"body-txt\">\nlịch sử nhưng đầy thách thức. Ông dùng ví dụ về kích thước khổng lồ của nước Mỹ so với\n \nViệt Nam để nhấn mạnh tầm quan trọng của việc thay đổi góc nhìn và mở rộng trải nghiệm.\n \nCốt lõi, buổi nói chuyện khuyến khích học viên bắt đầu khám phá và trải nghiệm ngay trong\n \nđất nước, thậm chí thành phố của mình trước khi nghĩ đến những điều xa xỉ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mở đầu buổi học thứ 8, diễn giả chúc mừng những người đã không bỏ cuộc qua 7 buổi</span></div>\n<p class=\"body-txt\">\nhọc trước đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả chia sẻ về việc đã hoàn thành hành trình xuyên nước Mỹ bằng con đường 66.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Con đường 66 được mô tả là con đường lịch sử nhưng phần lớn đã bị bỏ quên khi các</span></div>\n<p class=\"body-txt\">\ncon đường mới được hình thành, khiến hành trình khó khăn hơn (điều kiện ăn uống,\n \nngủ nghỉ).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả tự hào vì có học viên của Ego Camp (iKem) ở khắp nước Mỹ, nhiều người cũng</span></div>\n<p class=\"body-txt\">\nđang trên những hành trình khám phá riêng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả nhấn mạnh quy mô khổng lồ của nước Mỹ, lớn hơn &quot;khoảng 50 cái nước của</span></div>\n<p class=\"body-txt\">\nchúng ta&quot; (Việt Nam).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả chỉ ra rằng hòn đảo Honolulu (Hawaii) tuy là một địa danh lớn nhưng trên bản</span></div>\n<p class=\"body-txt\">\nđồ nước Mỹ, nó chỉ là &quot;một hòn đảo rất nhỏ&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả kể lại việc từng đặt chân tới Honolulu đúng ngày 9 tháng 11 năm 2020, và đúng</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">ngày 9 tháng 11 năm 2024, 14 năm sau, diễn giả lại đặt chân đến đây.</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả so sánh kích thước của Việt Nam với một tiểu bang của Mỹ để minh họa sự nhỏ</span></div>\n<p class=\"body-txt\">\nbé của Việt Nam trong bối cảnh đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả đặt câu hỏi cho học viên về mức độ khám phá đất nước của chính họ: &quot;Các bạn</span></div>\n<p class=\"body-txt\">\nđã đi được bao nhiêu trên cái đất nước này thôi? Đã đi được bao nhiêu trên đất Hà Nội\n \nnày thôi? Đã đi được bao nhiêu trên miền Trung Việt Nam này? Đã đi được bao nhiêu\n \ntrên đất Huế/Đà Nẵng/các đảo (ví dụ Phú Quốc)?&quot;\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thay đổi góc nhìn về sự &quot;lớn&quot; và &quot;xa&quot;: Diễn giả dùng hình ảnh nước Mỹ khổng lồ so với</span></div>\n<p class=\"body-txt\">\nViệt Nam, và thậm chí một hòn đảo lớn như Honolulu chỉ là &quot;nhỏ xíu&quot; trên bản đồ Mỹ.\n \nĐiều này quan trọng vì nó thách thức nhận thức thông thường của chúng ta về quy mô\n \nvà khoảng cách, khuyến khích mở rộng tư duy và không bị giới hạn bởi những khái niệm\n \nquen thuộc. Chúng ta thường nghĩ điều gì đó là lớn hoặc xa xỉ, nhưng khi đặt trong bối\n \ncảnh rộng lớn hơn, nó có thể rất nhỏ bé.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khám phá ngay tại nơi mình sống: Diễn giả liên tục hỏi học viên đã đi được bao nhiêu</span></div>\n<p class=\"body-txt\">\ntrên đất nước, thành phố của mình. Điều này quan trọng vì nó truyền tải thông điệp rằng\n \ngiá trị và trải nghiệm không nhất thiết phải tìm kiếm ở những nơi xa xôi, tốn kém. Rất\n \nnhiều điều thú vị và đáng học hỏi có thể nằm ngay xung quanh chúng ta, nhưng chúng ta\n \nthường bỏ qua. Nó thúc đẩy sự tò mò, khám phá và trân trọng những gì mình đang có.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vượt qua giới hạn và sự bỏ cuộc: Ngay từ đầu, diễn giả đã chúc mừng những người</span></div>\n<p class=\"body-txt\">\nkhông bỏ cuộc sau 7 buổi học khó khăn. Liên hệ với hành trình Route 66 đầy thử thách,\n \ninsight này nhấn mạnh tầm quan trọng của sự kiên trì và chấp nhận khó khăn để đạt\n \nđược mục tiêu, dù là trong học tập, công việc hay khám phá bản thân.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Đừng có nói là đảo xa, đây một hòn đảo rất nhỏ.”\n \n“Các bạn đã đi được bao nhiêu trên cái đất nước này thôi?”\n \n“Nó đã bị bỏ quên theo lịch sử khi mà cái con đường mới được hình thành.”\n \n8.2 Chọn ngôn ngữ diễn đạt rất quan trọng\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi này diễn giả chia sẻ về tầm quan trọng của việc cảm nhận và tạo ra &quot;chất</h3>\n<p class=\"body-txt\">\nlượng sống&quot; từ những khoảnh khắc hiện tại. Ông nhấn mạnh rằng các yếu tố vật chất bên\n \nngoài chỉ là phương tiện để tạo ra cảm xúc, và quan trọng nhất là chúng ta lựa chọn cách\n \ndiễn đạt cuộc sống của mình qua những trải nghiệm và kỷ niệm độc đáo. Diễn giả kêu gọi\n \nmọi người sống trọn vẹn từng khoảnh khắc vì nó sẽ không bao giờ lặp lại.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phần chia sẻ đầu giờ là vô cùng quan trọng và sẽ không lặp lại trong cuộc đời.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chất lượng sống của chúng ta được quyết định bởi cảm xúc, không phải bởi vật chất (xe</span></div>\n<p class=\"body-txt\">\ncộ, nhà cửa, vàng bạc).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Các yếu tố bên ngoài (nhà, xe, quần áo, bạn bè, vợ chồng, công việc) chỉ là phương tiện</span></div>\n<p class=\"body-txt\">\nđể tạo ra cảm xúc. Ngay cả khi không có chúng, vẫn có thể tạo ra cảm xúc tích cực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nếu có những điều kiện vật chất tốt hơn, chúng ta sẽ có cảm xúc tích cực và tuyệt vời</span></div>\n<p class=\"body-txt\">\nhơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả minh họa bằng ví dụ về cuộc sống của mình: bể cá ở đảo, những khoảnh khắc</span></div>\n<p class=\"body-txt\">\nvui vẻ bên con cái.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Con cái cũng là một loại phương tiện để tạo ra cảm xúc.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Câu hỏi đặt ra: Liệu bạn có dành thời gian lớn lên cùng con cái không, có những bức ảnh</span></div>\n<p class=\"body-txt\">\nkỷ niệm tuyệt vời không?\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Những kỷ niệm, khoảnh khắc đã qua sẽ mãi mãi không bao giờ nhận được thêm một lần</span></div>\n<p class=\"body-txt\">\nnữa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Việc học trong lớp học này cũng vậy, dù có video xem lại, nhưng liệu có ai thực sự xem</span></div>\n<p class=\"body-txt\">\nlại không, và khoảnh khắc trực tiếp này sẽ không lặp lại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả nhấn mạnh các khoảnh khắc là vô cùng quý giá, và dù là các yếu tố bên ngoài,</span></div>\n<p class=\"body-txt\">\ncách chúng ta phản ứng với chúng quyết định chất lượng sống.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mỗi người lựa chọn cách sống của mình, cách phản ứng với các yếu tố bên ngoài.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả tiếp tục minh họa bằng chuyến đi Route 66 ở Mỹ, với những biểu tượng, xe cũ,</span></div>\n<p class=\"body-txt\">\nbảo tàng lưu giữ kỷ niệm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mọi người ở đó không chỉ lái xe mà còn muốn cảm nhận sự tự do trên con đường, qua</span></div>\n<p class=\"body-txt\">\nnhững biểu tượng được gắn khắp nơi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ngôn ngữ để diễn đạt cuộc sống là rất quan trọng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Những bức ảnh đơn giản của diễn giả không chỉ là ngẫu nhiên mà là cách diễn giả thể</span></div>\n<p class=\"body-txt\">\nhiện góc nhìn về cuộc sống, con người, hành trình và những ngày được sống.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Không ai có thể tắm hai lần trên một dòng sông hay sống lại hai lần trên cùng một</span></div>\n<p class=\"body-txt\">\nkhoảnh khắc.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chất lượng sống được quyết định bởi cảm xúc, không phải vật chất: Diễn giả nhấn mạnh</span></div>\n<p class=\"body-txt\">\nrằng hạnh phúc và sự hài lòng không đến từ việc sở hữu nhiều tài sản mà từ cách chúng\n \nta cảm nhận và phản ứng với cuộc sống. Điều này quan trọng vì nó định hướng lại tư duy\n \ntừ việc chạy theo vật chất sang việc tập trung vào phát triển nội tâm và cảm xúc, vốn là\n \nyếu tố bền vững hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mỗi khoảnh khắc là độc nhất và không thể lặp lại: Diễn giả liên tục nhắc đi nhắc lại rằng</span></div>\n<p class=\"body-txt\">\nnhững khoảnh khắc hiện tại sẽ không bao giờ trở lại, dù có thể ghi lại bằng video hay\n \nhình ảnh. Điều này quan trọng vì nó tạo ra sự trân trọng tuyệt đối với hiện tại, thúc đẩy\n \nmỗi người sống và trải nghiệm trọn vẹn, không trì hoãn hay bỏ lỡ những cơ hội tạo kỷ\n \nniệm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lựa chọn ngôn ngữ để diễn đạt cuộc sống là việc quan trọng: &quot;Ngôn ngữ để diễn đạt&quot; ở</span></div>\n<p class=\"body-txt\">\nđây không chỉ là lời nói mà còn là cách chúng ta lựa chọn kể câu chuyện cuộc đời mình\n \nthông qua hành động, trải nghiệm và cách ghi lại chúng (như những bức ảnh của diễn\n \ngiả). Điều này quan trọng vì nó giúp mỗi người ý thức hơn về việc chủ động định hình\n \nnhận thức và giá trị bản thân, thay vì để cuộc sống trôi qua một cách thụ động.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Chất lượng sống của chúng ta quyết định bởi cảm xúc.”\n \n“Cái khoảnh khắc đấy nó sẽ không bao giờ lặp lại. Nó vĩnh viễn trong suốt cuộc đời của bạn, nó\n \nkhông bao giờ lặp lại.”\n \n“Không ai có thể tắm lại hai lần trên một dòng sông. Không ai có thể sống lại hai lần trên cùng\n \nmột khoảnh khắc.”\n \n8.3 Công thức Liệt kê- Sắp xếp - Lựa chọn\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi học này tập trung vào khái niệm &quot;lựa chọn&quot; và tầm quan trọng của nó trong</h3>\n<p class=\"body-txt\">\nviệc kiến tạo cuộc đời và sự nghiệp. Diễn giả nhấn mạnh rằng mỗi người đều có quyền lựa\n \nchọn, dù là lựa chọn có mặt ở các sự kiện quan trọng, lựa chọn đọc sách, lựa chọn từ ngữ hay\n \nlựa chọn kinh doanh. Khóa học giới thiệu phương pháp &quot;LIỆT KÊ, SẮP XẾP, LỰA CHỌN, LÀM\n \nTHẬT&quot; để đưa ra những quyết định hiệu quả, từ đó thay đổi cuộc sống theo hướng mong\n \nmuốn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tầm quan trọng của lựa chọn:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả chia sẻ về việc ông là một trong số rất ít người kiên trì tham gia đầy đủ các lớp</span></div>\n<p class=\"body-txt\">\nhọc/chương trình trong hơn 10 năm, trong khi những người khác đã thay đổi. Đây là\n \nmột sự lựa chọn cá nhân của diễn giả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Việc &quot;bận&quot; hay &quot;không bận&quot; thực chất là một lựa chọn. Chúng ta thường đưa ra lý do &quot;vì</span></div>\n<p class=\"body-txt\">\nbận nên tôi không làm được&quot; nhưng đó là do chúng ta không lựa chọn làm việc đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cuộc sống là chuỗi các lựa chọn, không phải do kiến thức, môi trường hay công việc</span></div>\n<p class=\"body-txt\">\nquyết định. Những lựa chọn của chúng ta sẽ dẫn chúng ta đến những địa điểm khác nhau\n \ntrong cuộc đời.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lựa chọn từ ngữ:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ngôn từ có khả năng kiến tạo và phá hủy.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chúng ta có thể lựa chọn những từ ngữ tích cực để thúc đẩy bản thân và kiến tạo cuộc</span></div>\n<p class=\"body-txt\">\nđời, thay vì chọn những từ tiêu cực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quy trình ra quyết định hiệu quả (LIỆT KÊ, SẮP XẾP, LỰA CHỌN, LÀM THẬT):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Liệt kê: Liệt kê tất cả các khả năng, ý tưởng, lựa chọn có thể có.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sắp xếp: Sắp xếp các lựa chọn theo thứ tự ưu tiên hoặc tiêu chí nhất định (ví dụ: cái gì tốt</span></div>\n<p class=\"body-txt\">\nhơn, cái gì chưa từng làm, cái gì muốn đạt được nhất, cái gì muốn tránh nhất).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lựa chọn: Chọn ra những phương án tốt nhất dựa trên thứ tự đã sắp xếp.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Làm thật (Thử nghiệm): Thực hiện các lựa chọn đã đưa ra, sau đó đánh giá hiệu quả. Cái</span></div>\n<p class=\"body-txt\">\ngì hiệu quả thì tiếp tục, cái gì không thì để làm sau hoặc loại bỏ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ứng dụng quy trình vào các lĩnh vực khác nhau:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thời gian biểu: Liệt kê các khung giờ có thể, sắp xếp theo tính hợp lý (ví dụ: múi giờ phù</span></div>\n<p class=\"body-txt\">\nhợp với đối tác), lựa chọn và thử nghiệm. Diễn giả đã thay đổi múi giờ làm việc liên tục\n \nđể phù hợp với các đối tượng khác nhau.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ăn sáng buffet: Liệt kê các món ăn có trên bàn, sắp xếp theo tiêu chí &quot;khác, lạ&quot; (chưa</span></div>\n<p class=\"body-txt\">\ntừng ăn), lựa chọn món để thử và ăn thật.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Uống bia IPA: Liệt kê tất cả các loại bia, thử từng loại, lựa chọn loại thích và uống tiếp.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lập trình vận mệnh:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cảm xúc tích cực: Liệt kê cảm xúc muốn có, sắp xếp theo ưu tiên, lập quy tắc để dễ đạt</span></div>\n<p class=\"body-txt\">\nđược.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cảm xúc tiêu cực: Liệt kê cảm xúc không muốn, sắp xếp theo mức độ muốn tránh, lựa</span></div>\n<p class=\"body-txt\">\nchọn cách để làm nó biến mất.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Con người muốn trở thành: Liệt kê phẩm chất mong muốn, sắp xếp theo ưu tiên, sống để</span></div>\n<p class=\"body-txt\">\ncó những phẩm chất đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sứ mệnh (hành động): Liệt kê hành động muốn làm/trải qua, sắp xếp theo ưu tiên, thực</span></div>\n<p class=\"body-txt\">\nhiện và đánh giá.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Đối tượng tác động: Liệt kê đối tượng có thể tác động, lựa chọn đối tượng và động từ để</span></div>\n<p class=\"body-txt\">\nkiến tạo cảm xúc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Học tập: Liệt kê các cách thức diễn giả chỉ, sắp xếp cái hiệu quả nhất, làm theo, cái gì hiệu</span></div>\n<p class=\"body-txt\">\nquả thì làm tiếp, không thì làm sau.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Kinh doanh sản phẩm/dịch vụ: Liệt kê các sản phẩm có thể kinh doanh, viết quảng cáo,</span></div>\n<p class=\"body-txt\">\nđưa lên landing page, bán thử. Cái nào bán chạy thì bán tiếp, không thì bỏ qua.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mua ô tô: Liệt kê các xe thích, sắp xếp theo điều kiện hiện tại, triển khai (mua), rồi tiếp</span></div>\n<p class=\"body-txt\">\ntục xe thứ hai, thứ ba...\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Cuộc sống là lựa chọn và lựa chọn là một quyền đặc biệt để kiến tạo nên cuộc sống của</span></div>\n<p class=\"body-txt\">\nmỗi người.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Câu nói này gói gọn thông điệp cốt lõi của buổi học, trao quyền kiểm</span></div>\n<p class=\"body-txt\">\nsoát cuộc đời vào tay mỗi cá nhân. Nó phá vỡ tư duy nạn nhân (&quot;vì hoàn cảnh nên tôi\n \nkhông làm được&quot;) và khẳng định rằng mọi thứ ta có hay không có đều là kết quả của các\n \nlựa chọn (có ý thức hoặc vô thức) của chính mình. Nhận thức này là bước đầu tiên để\n \nthay đổi và chủ động kiến tạo tương lai.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quy trình &quot;LIỆT KÊ, SẮP XẾP, LỰA CHỌN, LÀM THẬT&quot; (L-S-L-T).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là một phương pháp hành động cụ thể, đơn giản nhưng vô cùng</span></div>\n<p class=\"body-txt\">\nmạnh mẽ, có thể áp dụng vào mọi khía cạnh của cuộc sống (từ việc nhỏ nhất như ăn\n \nuống đến việc lớn như kinh doanh hay xây dựng cuộc đời). Nó giúp biến những ý tưởng\n \nmơ hồ thành các bước đi rõ ràng, có tính thử nghiệm và cải tiến liên tục, đảm bảo chúng\n \nta không chỉ đưa ra quyết định mà còn thực sự hành động và tối ưu hóa kết quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Ngôn từ có khả năng kiến tạo và ngôn từ cũng có khả năng phá hủy.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Điểm này nhấn mạnh sức mạnh của ngôn ngữ trong việc định hình</span></div>\n<p class=\"body-txt\">\nthực tại và tâm lý của chúng ta. Lựa chọn ngôn từ tích cực không chỉ là thay đổi cách nói\n \nmà còn thay đổi cách chúng ta tư duy, cảm nhận và hành động, từ đó ảnh hưởng trực\n \ntiếp đến kết quả cuộc sống. Ngôn từ là công cụ dễ dàng tiếp cận nhất để bắt đầu quá\n \ntrình kiến tạo cuộc đời.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Cuộc sống là lựa chọn và lựa chọn là một quyền đặc biệt để kiến tạo nên cuộc sống của mỗi\n \nngười.”\n \n“Những gì không lựa chọn là những thứ bận. Những gì lựa chọn thì không bận.”\n \n“Ngôn từ có khả năng kiến tạo và ngôn từ cũng có khả năng phá hủy.”\n \n8.4 Ứng dụng Liệt kê - Sắp xếp- Lựa chọn\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi giảng này tập trung vào một phương pháp tư duy và ra quyết định có hệ</h3>\n<p class=\"body-txt\">\nthống, xoay quanh ba bước cốt lõi: liệt kê, sắp xếp và lựa chọn. Diễn giả hướng dẫn cách áp\n \ndụng phương pháp này vào nhiều khía cạnh của tiếp thị internet và cuộc sống, từ việc tạo\n \ntiêu đề thu hút, chọn cảm xúc bán hàng, xây dựng câu chuyện đến việc giải quyết vấn đề của\n \nkhách hàng. Mục tiêu là biến sự hỗn loạn thành một quy trình rõ ràng, có thể đo lường và tối\n \nưu hóa để đạt được hiệu quả cao nhất.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<p class=\"body-txt\">\nCác luận điểm/khái niệm chính theo đúng thứ tự diễn giả trình bày:\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bài 1: Tạo tiêu đề thu hút</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Liệt kê tất cả các tiêu đề thu hút tiềm năng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sắp xếp chúng theo những tiêu chí nhất định.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lựa chọn những mẫu tiêu đề có khả năng thu hút.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Áp dụng và viết ra những tiêu đề theo ý mình.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thử nghiệm để tìm tiêu đề tạo ra khả năng thu hút cao nhất, đo lường bằng tỷ lệ click.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bài 2: Sử dụng biện pháp tu từ</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Liệt kê tất cả các biện pháp tu từ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sắp xếp các biện pháp tu từ muốn sử dụng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lựa chọn biện pháp tu từ sẽ sử dụng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Áp dụng và thử nghiệm các biện pháp tu từ khác nhau để xem cái nào tạo ra chuyển đổi</span></div>\n<p class=\"body-txt\">\ntốt hơn, sau đó lặp lại quy trình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bài 3: Lựa chọn các cảm xúc bán hàng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Liệt kê tất cả các loại cảm xúc (sợ hãi, FOMO, truyền cảm hứng, yêu quý, chán nản, sung</span></div>\n<p class=\"body-txt\">\nsướng, hạnh phúc) mà mình muốn bài viết hoặc sản phẩm gợi lên cho người đọc/khách\n \nhàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lựa chọn các từ khóa có thể tạo nên các cảm xúc này.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bài 4 &amp; 5: Lựa chọn các hình thức câu chuyện và điểm đến mong muốn</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lựa chọn các hình thức câu chuyện để kể.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Trong câu chuyện, lựa chọn các điểm đến, các kết quả mong muốn của khách hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bài 2 (trong cấu trúc câu chuyện): Liệt kê và lựa chọn các điểm hiện tại</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Liệt kê tất cả các mốc thời gian, sự kiện trong quá khứ (khi còn bé, khi học lớp 1, khi bắt</span></div>\n<p class=\"body-txt\">\nđầu đi làm, khi thất bại, khi mua ô tô đầu tiên, v.v.) của mình.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lựa chọn điểm hiện tại/các mốc thời gian giống nhất với khách hàng mục tiêu hoặc hợp</span></div>\n<p class=\"body-txt\">\nlý với câu chuyện muốn kể.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bài 3 (trong cấu trúc câu chuyện): Liệt kê và lựa chọn các khó khăn</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Liệt kê tất cả những khó khăn đã từng đối mặt trong cuộc sống.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Liệt kê những khó khăn đã giải quyết được.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Liệt kê những khó khăn đã giải quyết được mà có thể giúp người khác giải quyết.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quá trình này dựa trên cấu trúc logic để đặt câu hỏi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bài 4 (trong cấu trúc câu chuyện): Liệt kê và lựa chọn các thiên thần/anh hùng/nhân</span></div>\n<p class=\"body-txt\">\nvật/chiến lược\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Liệt kê tất cả những cá nhân, câu chuyện, hoặc chiến lược đã giúp đỡ, giải quyết các khó</span></div>\n<p class=\"body-txt\">\nkhăn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lựa chọn những yếu tố mang tính quyết định để làm kinh doanh, thúc đẩy hành động.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lưu ý: liệt kê không quá nhiều (dễ sao nhãng) và không quá ít (câu chuyện cụt). Câu</span></div>\n<p class=\"body-txt\">\nchuyện phải là sự thật.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bài 5 (trong cấu trúc câu chuyện): Diễn biến của câu chuyện/trận đánh</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Liệt kê tất cả các tình huống, tình tiết, sự kiện có trong &quot;trận đánh&quot; (quá trình giải quyết</span></div>\n<p class=\"body-txt\">\nvấn đề), bao gồm cả thành công và thất bại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lựa chọn những tình tiết có thể xây dựng nên câu chuyện thúc đẩy hành động của khách</span></div>\n<p class=\"body-txt\">\nhàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bài 5 (phần viết quảng cáo): Liệt kê vấn đề, mong muốn, khát khao của khách hàng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Trong một &quot;bảng tròn&quot;, liệt kê tất cả vấn đề, mong muốn, khát khao hàng ngày của khách</span></div>\n<p class=\"body-txt\">\nhàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sắp xếp chúng theo mức độ mong muốn (cái gì mong muốn nhất đưa lên trên, ít nhất</span></div>\n<p class=\"body-txt\">\nđưa xuống dưới).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lựa chọn những vấn đề mà ta có thể giải quyết VÀ ít người trên thị trường có thể giải</span></div>\n<p class=\"body-txt\">\nquyết được.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Từ đó, tạo ra nội dung (viết bài, câu chuyện) hoặc tìm kiếm sản phẩm/dịch vụ để giải</span></div>\n<p class=\"body-txt\">\nquyết vấn đề cho họ (thu hút hoặc kinh doanh).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bài 6: Liệt kê hai khả năng (làm và không làm)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Liệt kê những gì mình có được khi &quot;làm&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Liệt kê những gì mình giữ được khi &quot;không làm&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Áp dụng &quot;liệt kê, sắp xếp, lựa chọn&quot; cho việc &quot;làm và không làm&quot;, &quot;có và không có&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bài 7: 16 nội dung bán hàng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Liệt kê 16 nội dung bán hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tạo ra nhiều nội dung cho từng ô.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sắp xếp và lựa chọn những nội dung phù hợp để tạo thành một bài bán hàng hoàn chỉnh.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vòng lặp tổng thể: Lặp lại quy trình &quot;lựa chọn tiêu đề -&gt; thủ pháp -&gt; cảm xúc -&gt; câu</span></div>\n<p class=\"body-txt\">\nchuyện -&gt; vấn đề giải quyết -&gt; làm/không làm -&gt; đưa vào trang bán hàng&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quy trình sống: &quot;Liệt kê, sắp xếp, lựa chọn&quot; áp dụng cho mọi khía cạnh trong cuộc sống,</span></div>\n<p class=\"body-txt\">\ngiúp mọi thứ không còn hỗn loạn.\n</p></div></div>",
