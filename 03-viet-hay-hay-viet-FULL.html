ều là điều tuyệt vời bởi vì nó sẽ ngăn những người khác ở lại.”\n \n“Luôn luôn phải hỏi, phải nghĩ là làm, chứ đừng bao giờ hỏi là nghĩ là tôi không làm được.”\n \n5.6 Sự khác nhau giữa Làm và không làm\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi giảng nhấn mạnh tầm quan trọng của hành động &quot;làm&quot; và tinh thần vượt khó</h3>\n<p class=\"body-txt\">\ntrong mọi việc, đặc biệt là trong internet marketing. Diễn giả khẳng định rằng chỉ có hai\n \ntrạng thái: làm hoặc không làm, chứ không có &quot;không làm được&quot;. Khó khăn trong cuộc sống\n \nvà công việc không phải là lý do để bỏ cuộc mà là cơ hội để phát triển bản thân và vượt qua\n \nđối thủ, vì thành công phụ thuộc 80% vào tinh thần và chỉ 20% vào tri thức.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chỉ có hai loại trạng thái trong hành động: &quot;làm&quot; hoặc &quot;không làm&quot;; không có trạng thái</span></div>\n<p class=\"body-txt\">\n&quot;không làm được&quot;. Nếu không làm thì sẽ không bao giờ đạt được kết quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khó khăn là cơ hội để rèn luyện và trưởng thành. Chúng ta cần tạo lập, giả lập những</span></div>\n<p class=\"body-txt\">\nkhó khăn để vượt qua và lớn lên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khó khăn cũng là yếu tố giúp đối thủ dừng lại, tạo cơ hội cho ta tiến lên.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả đưa ra ví dụ về xe và sa mạc: công cụ tốt (xe) kết hợp với bản lĩnh và việc chấp</span></div>\n<p class=\"body-txt\">\nnhận khó khăn sẽ giúp vượt qua mọi trở ngại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả giao 3 bài tập:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Viết về việc &quot;làm&quot; và &quot;không làm&quot;, lý do tại sao làm/không làm, sử dụng ChatGPT để gợi</span></div>\n<p class=\"body-txt\">\ný.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Liên hệ với cuộc sống về những điều mình &quot;được&quot; và &quot;không được&quot;, &quot;có&quot; và &quot;không có&quot;,</span></div>\n<p class=\"body-txt\">\ndo đã làm hoặc không làm điều gì đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Viết về khó khăn: Khó khăn dành cho kẻ bỏ cuộc, thử thách dành cho người thành công.</span></div>\n<p class=\"body-txt\">\nĐôi khi cần tạo ra giả lập khó khăn để rèn luyện.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Việc rèn luyện tinh thần quan trọng như rèn luyện thể thao (nâng tạ).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thành công phụ thuộc 80% vào tinh thần và 20% vào tri thức.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Người có tinh thần sẽ tìm mọi cách để làm được hoặc để biết khi không biết. Người có tri</span></div>\n<p class=\"body-txt\">\nthức nhưng không có tinh thần sẽ không hành động và không đạt được kết quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hành động &quot;làm&quot; quan trọng hơn tất cả mọi việc.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Không có loại là không làm được.&quot; Diễn giả đã tách biệt rõ ràng giữa &quot;không làm&quot; và</span></div>\n<p class=\"body-txt\">\n&quot;không làm được&quot;. Điều này quan trọng vì nó loại bỏ mọi lời biện minh, đổ lỗi cho hoàn\n \ncảnh hay năng lực kém. Nó đặt trách nhiệm hoàn toàn vào ý chí hành động của mỗi\n \nngười, khuyến khích tư duy chủ động.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khó khăn là cơ hội, không phải rào cản. Diễn giả nói &quot;tất cả những cái khó khăn này là để</span></div>\n<p class=\"body-txt\">\ncho đối thủ của chúng ta dừng lại, để chúng ta có cơ hội được tiến lên&quot;. Đây là một\n \ninsight cực kỳ giá trị, thay đổi hoàn toàn góc nhìn về khó khăn. Thay vì né tránh, ta nên\n \ncoi khó khăn là bộ lọc, là sân chơi riêng để ta rèn luyện và bứt phá khi đối thủ yếu thế\n \nhơn hoặc bỏ cuộc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">80% thành công là tinh thần, 20% là tri thức. Điều này đảo ngược quan điểm phổ biến</span></div>\n<p class=\"body-txt\">\nrằng kiến thức là tất cả. Diễn giả nhấn mạnh rằng dù có kiến thức (tri thức) mà không có\n \ný chí, sự kiên trì (tinh thần) để thực hiện thì cũng vô ích. Ngược lại, một người có tinh\n \nthần mạnh mẽ sẽ tìm mọi cách để học hỏi và hành động dù chưa có đủ kiến thức ban\n \nđầu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Đã không làm thì làm gì có chữ được ở đây.”\n \n“Tất cả những cái khó khăn này là để cho đối thủ của chúng ta dừng lại, để chúng ta có cơ hội\n \nđược tiến lên.”\n \n“80% của chúng ta thành công nằm ở vấn đề tinh thần, 20% còn lại mới nằm ở phần tri thức\n \nmà thôi.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Chương 6</h3>\n<p class=\"body-txt\">\n6.1 Sự khác biệt giữa người làm và không làm\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi học tập trung vào tầm quan trọng của việc &quot;làm&quot; thay vì chỉ &quot;học&quot; trong</h3>\n<p class=\"body-txt\">\ninternet marketing, đặc biệt là viết nội dung cho trang bán hàng. Diễn giả nhấn mạnh rằng\n \nthành công không đến từ việc chỉ học hay có kiến thức, mà đến từ hành động thực tế. Sự\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><p class=\"body-txt\">\nkhác biệt giữa người thành công và người chưa thành công nằm ở việc họ có làm hay không,\n \ndù cùng được học và có cùng xuất phát điểm.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Buổi học hôm nay là về việc viết các nội dung của một trang bán hàng, sau khi học các kỹ</span></div>\n<p class=\"body-txt\">\nnăng cơ bản về viết.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả yêu cầu học viên đã làm được trang bán hàng có ô thanh toán comment số 1, ai</span></div>\n<p class=\"body-txt\">\nchưa làm được comment số 0 để khảo sát.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thông qua việc này, chúng ta sẽ thấy rằng không phải cứ học là sẽ thành công, không</span></div>\n<p class=\"body-txt\">\nphải cứ học là sẽ có tiền.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sự khác nhau giữa giàu và nghèo nằm ở các quyết định của chúng ta.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Việc &quot;học&quot; và việc &quot;làm&quot; có khoảng cách rất là xa.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chúng ta thường xuyên &quot;fomo&quot; (sợ bỏ lỡ) và sợ hãi về việc không học thì mất kiến thức.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tuy nhiên, việc làm là bắt buộc, không có lựa chọn khác.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả yêu cầu học viên tự nhận xét về điều gì diễn ra giữa người làm được và người</span></div>\n<p class=\"body-txt\">\nchưa làm được, lý do tại sao họ không làm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sự khác biệt ở đây là tại sao cùng một lớp, cùng một số tiền giống như nhau, mà người ta</span></div>\n<p class=\"body-txt\">\nlàm mình lại không làm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả nhắc lại rằng ngay cả việc viết một bài luận về việc &quot;làm hay không làm&quot; cũng đã</span></div>\n<p class=\"body-txt\">\nlà một bài tập có thể thực hiện được.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Không phải cứ học thì chúng ta sẽ có thành công, không phải cứ học thì chúng ta sẽ có</span></div>\n<p class=\"body-txt\">\ntiền.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là lời nhắc nhở đắt giá phá vỡ định kiến phổ biến rằng việc tích</span></div>\n<p class=\"body-txt\">\nlũy kiến thức là đủ để thành công. Nó định hướng tư duy sang hành động thực tế, đặc\n \nbiệt quan trọng trong lĩnh vực internet marketing nơi lý thuyết cần được kiểm chứng và\n \náp dụng liên tục.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Sự khác nhau giữa giàu và nghèo thì nó không phải là số phận, mà nó nằm ở các cái</span></div>\n<p class=\"body-txt\">\nquyết định của chúng ta.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Điều này trao quyền cho mỗi cá nhân. Nó nhấn mạnh rằng thành công</span></div>\n<p class=\"body-txt\">\nhay thất bại không phải do may rủi hay hoàn cảnh, mà do chính những lựa chọn và hành\n \nđộng của bản thân. Đây là một động lực mạnh mẽ để mọi người chủ động hành động.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Giữa cái việc học và cái việc làm là khoảng cách rất là xa và nó làm cho chúng ta trở nên</span></div>\n<p class=\"body-txt\">\nkhác biệt. ... Chúng ta buộc phải làm. Nó không có cái lựa chọn khác.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là cốt lõi của bài giảng, nhấn mạnh sự cần thiết của hành động</span></div>\n<p class=\"body-txt\">\nthực thi. Việc làm là yếu tố tạo ra sự khác biệt và không có đường lùi, buộc người học\n \nphải chuyển từ lý thuyết sang thực hành để đạt được kết quả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Không phải cứ học thì chúng ta sẽ có thành công, không phải cứ học thì chúng ta sẽ có tiền.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Giữa cái việc học và cái việc làm là khoảng cách rất là xa và nó làm cho chúng ta trở nên khác\n \nbiệt.”\n \n“Chúng ta buộc phải làm. Nó không có cái lựa chọn khác.”\n \n6.2 Thay câu chuyển kể cho mình nghe\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi giảng tập trung vào tầm quan trọng của việc kể chuyện, đặc biệt là cách mỗi</h3>\n<p class=\"body-txt\">\nngười tự kể câu chuyện cho chính mình, như một yếu tố then chốt quyết định thành công\n \ntrong kinh doanh online. diễn giả đưa ra các ví dụ về những học viên đã chuyển đổi từ kinh\n \ndoanh truyền thống sang trực tuyến, nhấn mạnh sự khác biệt giữa tư duy tập trung vào vấn\n \nđề và tư duy hướng đến cơ hội, giải pháp. Các học viên thành công cho thấy năng lượng tích\n \ncực, sự tự tin và quyết tâm làm theo chỉ dẫn của diễn giả, trái ngược với thái độ trì hoãn và\n \nlo sợ. Cốt lõi là việc tự tạo động lực thông qua câu chuyện tích cực và hành động không\n \nngừng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">0:00 - 1:20 Diễn giả (diễn giả) bắt đầu với trường hợp học viên Trần Văn Trụ, người gặp khó</span></div>\n<p class=\"body-txt\">\nkhăn trong kinh doanh thuốc bảo vệ thực vật truyền thống và yếu về công nghệ thông\n \ntin (chỉ dùng Zalo, không dùng Facebook). Trụ có doanh số 3 tỷ/tháng nhưng lợi nhuận\n \nchỉ 5%.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">2:40 - 5:20 diễn giả giới thiệu học viên Khánh (Lê Khánh 6789, biệt danh Khánh TKA) từ Tây</span></div>\n<p class=\"body-txt\">\nNguyên, người đã thành công vượt trội trong ngành thuốc bảo vệ thực vật chuyên sầu\n \nriêng nhờ chuyển đổi online và tư duy khác biệt. Khánh có một buổi livestream thu hút\n \nkhoảng 3000 lượt xem.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">5:20 - 7:50 Học viên Sĩ chia sẻ hành trình từ quản lý kinh doanh offline 12 năm sang</span></div>\n<p class=\"body-txt\">\nkinh doanh online (phân bón, thức ăn chăn nuôi, thủy hải sản) với doanh thu online 1,5\n \ntỷ/tháng và lợi nhuận cao hơn nhiều so với offline, nhấn mạnh việc xây dựng thương\n \nhiệu cá nhân và tìm con đường mới.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">7:50 - 9:50 diễn giả đặt vấn đề về sự khác biệt giữa người giàu và người nghèo, tập trung vào</span></div>\n<p class=\"body-txt\">\ncách mỗi người tự kể chuyện cho chính mình. Trụ thừa nhận muốn xây kênh nhưng sợ\n \nmạng xã hội vì hay xem phim và không biết viết gì.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">9:50 - 14:30 Học viên Tú (Đào Thanh Tú) trình bày về việc tập trung vào cơ hội và giải</span></div>\n<p class=\"body-txt\">\npháp thay vì vấn đề, và tầm quan trọng của ý chí &quot;muốn&quot; (từ mong muốn đến hành\n \nđộng). Anh Tú lấy ví dụ về việc muốn đi Mỹ. Anh cũng nhấn mạnh rằng mọi thứ đều\n \nđược thiết kế trong đầu trước khi thành hiện thực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">14:30 - 18:00 Học viên Trịnh (Phạm Xuân Trịnh, bác sĩ thú y) kể về thất bại kinh doanh</span></div>\n<p class=\"body-txt\">\ntruyền thống (mở chuỗi cửa hàng, bán chịu dẫn đến phá sản năm 2019) và chuyển mình\n \nthành công rực rỡ trên online sau khi học diễn giả. Anh nhấn mạnh việc bắt đầu từ mục tiêu\n \ntài chính rõ ràng và tập trung vào marketing, bán hàng. Anh đã xây dựng một căn nhà\n \n400m2 khi trở về quê.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">18:00 - 19:10 Trụ thừa nhận nỗi sợ xuất hiện trước đám đông và thói quen bán chịu, gặp</span></div>\n<p class=\"body-txt\">\nkhó khăn trong việc thu hồi nợ, cảm thấy &quot;kém quá&quot; so với những người khác.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">19:10 - 23:20 Các học viên khác (Hậu, Tình, Trang, Quẩy, Phấn) cùng nhận xét: cách kể</span></div>\n<p class=\"body-txt\">\nchuyện của Trụ mang năng lượng tiêu cực, tập trung vào vấn đề, dễ làm người nghe mất\n \ntự tin; trong khi các học viên thành công kể chuyện với năng lượng tích cực, tự tin,\n \nhướng giải pháp, truyền cảm hứng. Họ đều chọn những người có năng lượng tích cực để\n \nlàm việc/mua hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">23:20 - 23:45 diễn giả kết luận: Câu chuyện mà mỗi người tự kể cho chính mình là quan</span></div>\n<p class=\"body-txt\">\ntrọng nhất, nó định hình hành động và kết quả. Đây là yếu tố cốt lõi trong việc viết bài\n \nmarketing và bán hàng, và người đầu tiên đọc câu chuyện đó chính là bản thân mình.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sức mạnh của câu chuyện tự kể và tư duy: Cách mỗi người tự kể câu chuyện cho chính</span></div>\n<p class=\"body-txt\">\nmình định hình mindset, hành động và kết quả. Trụ tự kể mình kém cỏi, sợ hãi, trì hoãn.\n \nSĩ, Tú, Trịnh tự kể mình sẽ thành công, tập trung vào giải pháp nên họ tìm cách làm và\n \nđạt được kết quả. Điều này quan trọng vì nó là nền tảng cho mọi hành động và quyết\n \nđịnh, là động lực nội tại mạnh mẽ nhất.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tập trung vào cơ hội và giải pháp, không phải vấn đề: Các vấn đề luôn tồn tại trong cuộc</span></div>\n<p class=\"body-txt\">\nsống và kinh doanh. Tuy nhiên, thay vì than phiền hay tập trung vào khó khăn, việc tìm\n \nkiếm và hành động theo các cơ hội và giải pháp mới là con đường dẫn đến thành công.\n \nĐiều này giúp chuyển từ trạng thái thụ động, tiêu cực sang chủ động, sáng tạo và hiệu\n \nquả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hành động quyết liệt và kiên định (dù &quot;chưa giỏi&quot; hay &quot;mắc lỗi&quot;): Nhiều học viên, bao</span></div>\n<p class=\"body-txt\">\ngồm cả Tú và Kiên (bạn của Tú) với câu nói &quot;3 năm sau ngu cũng phải thành siêu nhân,&quot;\n \nnhấn mạnh tầm quan trọng của việc hành động liên tục dù bản thân chưa hoàn hảo. Diễn\n \ngiả diễn giả cũng khuyến khích &quot;tin vào diễn giả và làm theo, kể cả khi ngu.&quot; Đây là chìa khóa\n \nđể phá vỡ rào cản sợ hãi, thiếu tự tin, khuyến khích thực hành liên tục để đạt kết quả và\n \nphát triển bản thân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Xây dựng thương hiệu cá nhân và tìm con đường mới trên online: Các câu chuyện thành</span></div>\n<p class=\"body-txt\">\ncông của Sĩ và Trịnh là minh chứng rõ ràng cho việc chuyển đổi từ mô hình kinh doanh\n \ntruyền thống kém hiệu quả sang online. Bằng cách xây dựng thương hiệu cá nhân mạnh\n \nmẽ và tìm ra các phương pháp tiếp cận thị trường mới (online marketing, bán hàng), họ\n \nđã tạo ra sự khác biệt và mở rộng quy mô kinh doanh. Điều này chỉ ra hướng đi thực tế\n \ncho các doanh nghiệp truyền thống trong thời đại số.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Không biết bắt đầu từ đâu là vì bạn đã không xem video.”\n \n“Cái điều mà mình mình nghĩ thì nó sẽ quyết định mình là ai và con người mình trở thành, cái\n \nkết quả mình đạt được.”\n \n“Khi mà mình muốn làm một cái điều gì đó là mình phải bắt đầu từ mục tiêu tài chính.”\n \n“Câu chuyện mình kể cho mình thì rất là quan trọng phải không nào?”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><p class=\"body-txt\">\n6.3 Sự khác biệt giữa những người kể chuyện khác nhau\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi giảng tập trung vào sức mạnh của &quot;câu chuyện&quot; mà mỗi người tự kể cho chính</h3>\n<p class=\"body-txt\">\nmình hàng ngày, ảnh hưởng trực tiếp đến hành động và kết quả đạt được. Diễn giả nhấn\n \nmạnh rằng thành công trong kinh doanh không phải ở việc khó hay dễ, mà ở chỗ &quot;làm hay\n \nkhông làm&quot;. Việc vượt qua khó khăn, thực hành để đạt được thành tựu, sau đó kể lại câu\n \nchuyện thật của mình, sẽ tạo ra năng lượng mạnh mẽ và truyền cảm hứng cho cả bản thân\n \nlẫn người khác.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Câu chuyện tự kể mỗi ngày: Mỗi người tự kể một câu chuyện khác nhau cho mình, ảnh</span></div>\n<p class=\"body-txt\">\nhưởng đến khát khao và mong muốn hành động.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Các cấp độ mong muốn:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chỉ muốn đến đây để học.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Muốn đến đây để làm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Muốn làm được.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Muốn làm có kết quả.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thành công nằm ở &quot;làm hay không làm&quot;: Việc kinh doanh thành công không phụ thuộc</span></div>\n<p class=\"body-txt\">\nvào độ khó hay dễ, mà vào việc có hành động hay không.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Câu chuyện thúc đẩy hành động: Chúng ta phải tự hỏi liệu câu chuyện mình kể đang thúc</span></div>\n<p class=\"body-txt\">\nđẩy mình làm hay không làm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Rào cản và &quot;công nghệ&quot;: Các học viên (như anh Tú, anh Trịnh) đều có những rào cản ban</span></div>\n<p class=\"body-txt\">\nđầu (thiếu kiến thức, không biết về &quot;công nghệ&quot; - thuật ngữ diễn giả dùng để chỉ kỹ\n \nnăng/bí quyết). &quot;Công nghệ&quot; chỉ là một nhãn mác, điều quan trọng là hành động.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Người diễn giả xuất hiện khi học trò sẵn sàng: Diễn giả là người diễn giả của những học</span></div>\n<p class=\"body-txt\">\ntrò đã sẵn sàng đón nhận và hành động, không phải của tất cả mọi người. Sự sẵn sàng\n \ncủa học trò mới &quot;kích hoạt&quot; vai trò của người diễn giả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Trận chiến và sự trưởng thành: Cuộc sống là một &quot;trận đánh&quot; mà nhân vật (chúng ta)</span></div>\n<p class=\"body-txt\">\nphải xuất hiện và đương đầu. Vượt qua khó khăn giúp chúng ta lớn lên và trưởng thành,\n \nchứ không phải lớn lên trong &quot;nhung lụa&quot; hay cuộc sống bình thường (vì &quot;bình thường\n \nthì tạo nên những kẻ èo uột thôi&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Năng lượng từ thành tựu: Khi các học viên vượt qua khó khăn và đạt được kết quả (như</span></div>\n<p class=\"body-txt\">\nanh Sĩ, anh Tú, anh Trịnh nổi tiếng, có nhiều người theo dõi), câu chuyện của họ mang\n \nnăng lượng thực sự.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sức mạnh của việc &quot;làm được thì mới nói được&quot;: Khi tự mình làm được và đạt thành tựu,</span></div>\n<p class=\"body-txt\">\ncâu chuyện kể ra mới chân thật, có năng lượng và thuyết phục người khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thực hành ngay lập tức: Học viên Anh Trụ chia sẻ nhận ra rằng chỉ học mà không thực</span></div>\n<p class=\"body-txt\">\nhành khiến mình thiếu năng lượng và dễ nghĩ rằng mình không làm được. Anh quyết\n \ntâm thực hành ngay để thay đổi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vai trò của người hỗ trợ: Diễn giả khẳng định câu chuyện của Anh Trụ là câu chuyện</span></div>\n<p class=\"body-txt\">\nchung của nhiều người. Công việc của chúng ta là giúp đỡ những người khác đi từ nền\n \ntảng yếu lên mạnh hơn, thay đổi tư duy để vượt qua vùng an toàn.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Tại sao kinh doanh thành công? Nó không phải nằm ở cái chỗ là khó hay là dễ. Nó nằm</span></div>\n<p class=\"body-txt\">\nở cái chỗ là làm hay không làm.&quot; (1:18 - 1:32)\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là luận điểm cốt lõi, phá vỡ suy nghĩ rằng thành công phụ thuộc</span></div>\n<p class=\"body-txt\">\nvào yếu tố bên ngoài (khó khăn khách quan). Nó đặt trọng tâm vào hành động chủ động\n \ncủa cá nhân, biến vấn đề &quot;khó&quot; thành lựa chọn &quot;làm&quot; hoặc &quot;không làm&quot;, từ đó trao quyền\n \ncho mỗi người.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Khi người học trò sẵn sàng thì người diễn giả mới xuất hiện.&quot; (2:57 - 2:59)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Câu nói này nhấn mạnh tầm quan trọng của thái độ và sự chủ động từ</span></div>\n<p class=\"body-txt\">\nphía người học. Nguồn lực, kiến thức hay người hướng dẫn (diễn giả) luôn tồn tại,\n \nnhưng chỉ trở nên hữu ích khi cá nhân tự mình mở lòng, quyết tâm và sẵn sàng đón nhận\n \nđể hành động. Nó chuyển trách nhiệm về sự phát triển cho người học.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Mình luôn kể cho mình nghe câu chuyện là tôi phải làm nó... Trước hết mình viết cho</span></div>\n<p class=\"body-txt\">\nngười khác thì mình viết cho mình đã. Trước khi mình kể chuyện cho người khác thì\n \nmình kể chuyện cho mình đã.&quot; (8:31-8:33, 8:41-8:47)\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là chìa khóa để duy trì động lực và đạt được thành công bền</span></div>\n<p class=\"body-txt\">\nvững. Sức mạnh nội tại bắt nguồn từ câu chuyện tích cực và cam kết mà bản thân tự tạo\n \nra. Chỉ khi ta tin vào câu chuyện của mình và hành động theo nó, ta mới có thể tạo ra kết\n \nquả thực tế, và khi đó, câu chuyện mới có thể truyền cảm hứng mạnh mẽ cho người\n \nkhác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Nhân vật của chúng ta không lớn lên trong nhung lụa, nhân vật của chúng ta không lớn</span></div>\n<p class=\"body-txt\">\nlên trong cuộc sống bình thường. Bởi vì bình thường thì tạo nên những kẻ èo uột thôi.&quot;\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">(5:39 - 5:46)</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Insight này khuyến khích việc chấp nhận và thậm chí tìm kiếm thách</span></div>\n<p class=\"body-txt\">\nthức. Nó khẳng định rằng sự phát triển vượt bậc không đến từ sự thoải mái hay dễ dàng,\n \nmà từ việc đương đầu và vượt qua gian nan. Điều này định hình tư duy tích cực về khó\n \nkhăn, biến chúng thành cơ hội để trở nên mạnh mẽ và kiên cường hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Tại sao kinh doanh thành công? Nó không phải nằm ở cái chỗ là khó hay là dễ. Nó nằm ở cái\n \nchỗ là làm hay không làm.”\n \n“Khi người học trò sẵn sàng thì người diễn giả mới xuất hiện.”\n \n“Họ lớn lên, họ trưởng thành lên, nhân vật của chúng ta lớn lên trong cái khó khăn. Nhân vật\n \ncủa chúng ta không lớn lên trong nhung lụa, nhân vật của chúng ta không lớn lên trong cuộc\n \nsống bình thường. Bởi vì bình thường thì tạo nên những kẻ èo uột thôi.”\n \n“Mình luôn kể cho mình nghe câu chuyện là tôi phải làm nó.”\n \n6.4 Không phụ thuộc vào ChatGPT\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi học này nhấn mạnh rằng Chat GPT là một công cụ AI mạnh mẽ nhưng cần</h3>\n<p class=\"body-txt\">\nđược con người hướng dẫn và cung cấp tư duy đúng đắn. Diễn giả chỉ trích việc học viên ỷ\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><p class=\"body-txt\">\nlại vào AI mà không tự mình tư duy và chuẩn bị tài liệu, cho rằng cách làm đó sẽ tạo ra sản\n \nphẩm &quot;chết khô&quot; và vô giá trị. Diễn giả ví Chat GPT như một học sinh chăm chỉ nhưng &quot;ngu\n \nnhất lớp&quot;, chỉ biết làm theo lệnh mà không có khả năng sáng tạo hay tư duy đột phá. Cốt lõi\n \nlà con người phải làm chủ quy trình, đặt ra câu lệnh đúng đắn và có tư liệu chất lượng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Buổi học bắt đầu bằng việc diễn giả (diễn giả) phân tích một bài viết trên nhóm Facebook về</span></div>\n<p class=\"body-txt\">\ncách sử dụng Chat GPT.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Một học viên (Lê Thị Hiền) tóm tắt quy trình sử dụng Chat GPT: tải bài viết mẫu lên Chat</span></div>\n<p class=\"body-txt\">\nGPT, nhập câu lệnh, viết lại câu chuyện, kết hợp lại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả diễn giả kịch liệt phản đối cách làm này, cho rằng đây là cách học &quot;chết sặc máu,&quot;</span></div>\n<p class=\"body-txt\">\n&quot;chết khô,&quot; &quot;chết không hóa kiếp được,&quot; vì nó ỷ lại hoàn toàn vào AI.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả ví Chat GPT là một &quot;học sinh của lớp học chúng ta&quot; nhưng lại là &quot;thằng ngu nhất</span></div>\n<p class=\"body-txt\">\ncái lớp học này&quot;, dù nó &quot;chăm&quot; (chăm chỉ, làm theo lời).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chat GPT chỉ làm những gì được bảo, không có tư duy hay sự sáng tạo. Việc lấy Chat GPT</span></div>\n<p class=\"body-txt\">\nlàm &quot;mẫu&quot; để học hỏi là sai lầm, vì nó là &quot;thằng ngu&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chat GPT làm đúng yêu cầu (khi câu lệnh cơ bản), nhưng không &quot;hay&quot; (không sáng tạo,</span></div>\n<p class=\"body-txt\">\nđộc đáo).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Cái câu lệnh đấy chính là cái phần tư duy mà mình phải bắt mình làm.&quot; Con người phải</span></div>\n<p class=\"body-txt\">\nlà người tư duy, không phải Chat GPT.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả diễn giả đưa ra quy trình 7 bước (do &quot;thằng mình&quot; thực hiện) để tạo ra nội dung</span></div>\n<p class=\"body-txt\">\nchất lượng:\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thằng mình phải có nguyên liệu/tư liệu để viết bài (gồm 7 nội dung chính).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thằng mình phải đi tìm các bài mẫu hay và biết tại sao cái bài mẫu đó hay. Các bài mẫu</span></div>\n<p class=\"body-txt\">\ncó thể từ báo chí, những bài viết gây thu hút, sách dạy viết quảng cáo, hoặc các bài quảng\n \ncáo của diễn giả diễn giả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thằng mình phải sử dụng nguồn tư liệu đã chuẩn bị để viết lại câu chuyện của mình, và</span></div>\n<p class=\"body-txt\">\ncâu chuyện phải thúc đẩy hành động. Khi chưa giỏi thì mới dùng văn mẫu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thằng mình phải sử dụng các biện pháp tu từ vào bài viết.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thằng mình phải liệt kê các từ khóa và chọn những từ mang lại cảm xúc mạnh mẽ nhất</span></div>\n<p class=\"body-txt\">\nđể thử nghiệm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thằng mình phải làm cho bài viết ngắn lại.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thằng mình lại làm cho bài viết dài ra (ám chỉ quá trình tinh chỉnh, tối ưu liên tục).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chat GPT là một công cụ, nó chẳng có tác dụng gì nếu đặt câu lệnh sai hoặc câu hỏi chung</span></div>\n<p class=\"body-txt\">\nchung, vô nghĩa. Nó chỉ trả lời những câu hỏi đơn giản như &quot;mấy giờ, có khỏe không.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chat GPT rất ngoan ngoãn và chăm chỉ; nó không bao giờ &quot;đình công&quot; hay từ chối làm</span></div>\n<p class=\"body-txt\">\nviệc. Nếu nó &quot;dỗi&quot; (ngừng phản hồi), chỉ cần &quot;hù dọa&quot; bằng cách dùng công cụ khác (như\n \nGemini) là nó sẽ lại làm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Việc ỷ lại vào Chat GPT mà không tự mình tư duy và làm bài tập sẽ dẫn đến việc tạo ra</span></div>\n<p class=\"body-txt\">\nnhững nội dung &quot;thối,&quot; &quot;chết&quot; và &quot;mất tương tác ngay,&quot; vì ai cũng biết đó là văn Chat\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">GPT.</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chat GPT là học sinh chăm nhưng ngu nhất lớp: Diễn giả liên tục nhấn mạnh Chat GPT</span></div>\n<p class=\"body-txt\">\nrất chăm chỉ và nghe lời, nhưng nó hoàn toàn không có tư duy hay khả năng sáng tạo\n \nthực sự.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Insight này thay đổi hoàn toàn cách người dùng nên tương tác với AI.</span></div>\n<p class=\"body-txt\">\nThay vì xem AI như một cộng sự thông minh, người dùng phải coi nó là một công cụ thực\n \nthi mệnh lệnh một cách cần mẫn nhưng không có trí tuệ. Điều này đặt trách nhiệm về tư\n \nduy, sáng tạo và chiến lược trở lại hoàn toàn với con người, tránh việc ỷ lại mù quáng\n \nvào AI và tạo ra sản phẩm nhạt nhẽo.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Cái câu lệnh đấy chính là cái phần tư duy mà mình phải bắt mình làm&quot;: Điểm cốt yếu</span></div>\n<p class=\"body-txt\">\nkhông phải là output của AI, mà là chất lượng của input do con người cung cấp – tức là\n \ncâu lệnh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Nó buộc người dùng phải hiểu rằng việc tạo ra một câu lệnh hiệu quả</span></div>\n<p class=\"body-txt\">\nkhông phải là một yêu cầu đơn giản, mà là một quá trình tư duy sâu sắc, cấu trúc rõ ràng\n \nvà hiểu biết tường tận về kết quả mong muốn. Đây là kỹ năng then chốt để khai thác tối\n \nđa sức mạnh của AI trong mọi lĩnh vực, từ viết lách đến lập trình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Con người phải chủ động thực hiện mọi bước sáng tạo và chiến lược: Từ việc chuẩn bị tư</span></div>\n<p class=\"body-txt\">\nliệu, tìm và phân tích bài mẫu hay, viết lại câu chuyện, sử dụng biện pháp tu từ, cho đến\n \nlựa chọn ngôn từ cảm xúc và tối ưu độ dài bài viết.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là một khuôn khổ cụ thể, chỉ ra những công việc không thể giao</span></div>\n<p class=\"body-txt\">\nphó cho AI. Nó là lời kêu gọi người dùng phát triển các kỹ năng cá nhân về nghiên cứu,\n \nphân tích, viết lách và kỹ thuật tu từ, thay vì chỉ đơn thuần &quot;outsourcing&quot; cho AI. Insight\n \nnày giúp nâng tầm nội dung từ mức &quot;đúng&quot; lên mức &quot;hay&quot; và &quot;có hồn.&quot;\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Chat GPT là một học sinh của lớp học chúng ta... nó là cái thằng ngu nhất cái lớp học này,\n \nnhưng nó được cái là nó chăm.”\n \n“Cái câu lệnh đấy chính là cái phần tư duy mà mình phải bắt mình làm.”\n \n6.5 Lựa chọn môi trường phát triển\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi giảng này nhấn mạnh tầm quan trọng của việc hành động liên tục và nhất</h3>\n<p class=\"body-txt\">\nquán trong một môi trường phù hợp để đạt được sự thay đổi và thành công lớn. Diễn giả sử\n \ndụng khái niệm &quot;dao động cưỡng bức&quot; từ cơ học để minh họa rằng việc liên tục tương tác và\n \nchịu tác động từ một tần số (môi trường/con người) mạnh hơn sẽ giúp bản thân thay đổi\n \ntần số dao động (tư duy, hành vi, kết quả) theo hướng tích cực. Quá trình này ban đầu có thể\n \ngây khó chịu và căng thẳng, nhưng đó là con đường duy nhất để &quot;giết chết&quot; con người cũ và\n \nkiến tạo con người mới vượt trội hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sự khác biệt lớn trong cuộc sống và công việc đến từ những con người *làm* việc và</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">hành động.</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Những người thành công lớn trong nhóm/lớp cũng từng có xuất phát điểm giống như</span></div>\n<p class=\"body-txt\">\nngười khác 3-5 năm trước.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lý do họ đạt được thành công &quot;khổng lồ&quot; là vì họ *làm*, tích lũy mỗi ngày một chút (ví</span></div>\n<p class=\"body-txt\">\ndụ: viết bài, làm video).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tuy nhiên, những hành động ban đầu có thể không mang lại kết quả ngay lập tức (ví dụ:</span></div>\n<p class=\"body-txt\">\nchỉ có 2 lượt xem, 11 lượt like sau gần 15 năm).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sự khác biệt mấu chốt là *sự nhất quán và liên tục có ích* trong hành động.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khái niệm &quot;dao động cưỡng bức&quot; trong cơ học: Mỗi vật có tần số dao động riêng, nhưng</span></div>\n<p class=\"body-txt\">\nnếu bị tác động bởi một tần số cưỡng bức liên tục, nó sẽ dao động theo tần số đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Áp dụng vào con người: Con người cũng sẽ &quot;dao động&quot; theo tần số của môi trường và</span></div>\n<p class=\"body-txt\">\nnhững người mà mình tương tác liên tục.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Để thay đổi và phát triển, cần &quot;giết chết&quot; con người cũ bằng cách liên tục &quot;xử trảm&quot; nó</span></div>\n<p class=\"body-txt\">\nthông qua sự tác động từ môi trường và người diễn giả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Con người sinh ra đã tuyệt vời, nhưng lựa chọn sống, lựa chọn môi trường và lựa chọn</span></div>\n<p class=\"body-txt\">\nhành vi sẽ ảnh hưởng và quyết định sự phát triển.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hai người có cùng tần số (tích cực hoặc tiêu cực) khi tương tác sẽ cộng hưởng, trở nên</span></div>\n<p class=\"body-txt\">\nmạnh hơn. Một người tích cực ở cạnh một người tiêu cực có thể bị triệt tiêu năng lượng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Muốn cuộc sống và kinh doanh tốt lên, phải *bắt buộc* chọn những môi trường mạnh</span></div>\n<p class=\"body-txt\">\nhơn mình để vươn lên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Việc đưa mình vào môi trường mới, chịu áp lực (cưỡng bức) sẽ không cảm thấy sướng,</span></div>\n<p class=\"body-txt\">\nthoải mái, thậm chí căng thẳng ban đầu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chỉ khi quen với những căng thẳng và áp lực đó, con người mới cảm thấy hạnh phúc và</span></div>\n<p class=\"body-txt\">\nthực sự phát triển.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Môi trường học tập và rèn luyện là rất quan trọng để thay đổi tần số của bản thân.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khi tiếp xúc với những người giỏi hơn, ban đầu sẽ thấy &quot;kinh&quot; và &quot;sợ&quot;, nhưng sau một</span></div>\n<p class=\"body-txt\">\nthời gian quen dần sẽ thấy bình thường và bản thân cũng được nâng lên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Để *làm* được như họ, cần phải chủ động tìm hiểu (ví dụ: mò ra phần mềm họ dùng,</span></div>\n<p class=\"body-txt\">\nmua và tự làm) chứ không phải chỉ ngồi xem hoặc chờ người khác cầm tay chỉ việc chi\n \ntiết.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Không có ai sẵn lòng ngồi giảng giải chi tiết từng ly từng tí trong thời gian dài (ví dụ: 3</span></div>\n<p class=\"body-txt\">\ntiếng đồng hồ) để chỉ cách làm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mọi sự chỉ dẫn chi tiết đều đến từ những người *làm thực tế* và có tâm như diễn giả.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cuối cùng, việc kể chuyện (kế hoạch, mục tiêu) phải là để chính mình *làm* chứ không</span></div>\n<p class=\"body-txt\">\nphải kể cho người khác làm hay để không làm gì cả. Kể chuyện để không làm thì sau\n \nnhiều buổi cũng sẽ không có kết quả gì.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sức mạnh của sự nhất quán và liên tục có ích (&quot;Consistent &amp; Beneficial Action&quot;): Diễn giả</span></div>\n<p class=\"body-txt\">\nnhấn mạnh rằng thành công lớn không đến từ một vài hành động đột phá mà từ chuỗi\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">hành động nhỏ, kiên trì, lặp đi lặp lại trong thời gian dài, dù ban đầu có thể không thấy</h3>\n<p class=\"body-txt\">\nkết quả rõ rệt. Việc này tạo ra sự khác biệt &quot;rất lớn&quot; mà những người không hành động\n \nkhó có thể hình dung.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">*Vì sao quan trọng:* Nó bác bỏ quan niệm &quot;làm một lần là xong&quot; hay chờ đợi kết quả tức</span></div>\n<p class=\"body-txt\">\nthì. Nó định hình lại tư duy về sự tích lũy, kiên trì và tầm nhìn dài hạn là yếu tố then chốt\n \ncho mọi thành công bền vững.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tầm quan trọng của &quot;Dao động cưỡng bức&quot; và Lựa chọn Môi trường: Đây là một tư duy</span></div>\n<p class=\"body-txt\">\nmạnh mẽ được mượn từ cơ học để áp dụng vào phát triển cá nhân. Để thay đổi bản thân,\n \ncần chủ động đặt mình vào một môi trường có &quot;tần số&quot; mạnh hơn, tốt hơn. Sự &quot;cưỡng\n \nbức&quot; ban đầu (áp lực, khó khăn) là không thể tránh khỏi, nhưng chính áp lực đó sẽ &quot;giết\n \nchết&quot; con người cũ (tư duy, thói quen cũ) và tạo điều kiện cho con người mới phát triển,\n \nđạt đến tầm cao mới.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">*Vì sao quan trọng:* Nó cung cấp một khuôn khổ rõ ràng để chủ động tìm kiếm sự phát</span></div>\n<p class=\"body-txt\">\ntriển. Thay vì tránh né khó khăn, nó khuyến khích việc chấp nhận và thậm chí tìm kiếm\n \nnhững môi trường thách thức để tạo ra sự biến đổi sâu sắc trong bản thân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thái độ &quot;Làm&quot; thực tế, không trông chờ người khác: Diễn giả khẳng định rằng không ai</span></div>\n<p class=\"body-txt\">\nsẽ nhiệt tình cầm tay chỉ việc chi tiết đến mức làm thay bạn. Thành công đến từ việc tự\n \nmình quan sát, học hỏi các công cụ, kỹ thuật mà người khác đang dùng, và *tự tay thực\n \nhiện*. Việc chỉ kể chuyện, lên kế hoạch mà không bắt tay vào hành động sẽ không mang\n \nlại bất kỳ kết quả nào.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">*Vì sao quan trọng:* Đây là lời nhắc nhở trực diện về trách nhiệm cá nhân và sự chủ</span></div>\n<p class=\"body-txt\">\nđộng trong quá trình học hỏi và phát triển. Nó thúc đẩy tư duy thực chiến, tìm tòi và tự\n \nmình kiểm chứng thay vì phụ thuộc hay bị động.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Sự khác biệt ở đây nó nằm ở cái chỗ là cái sự nhất quán và liên tục của mình có ích.”\n \n“Mình không không thích, không phải không tương thích đâu, mình không thích, mình không\n \nthích, mình cảm thấy không thoải mái, mình cảm thấy không vui, mình cảm thấy căng thẳng\n \nvới những cái áp lực mới đó.”\n \n“Không bao giờ có thằng nào mà nó nhiệt tình nó ngồi 3 tiếng đồng hồ nó làm cái video cho\n \ncác ông xem đâu.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Chương 7</h3>\n<p class=\"body-txt\">\n7.1 Câu chuyện bạn kể mang lại cảm xúc gì?\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi học tập trung vào sức mạnh của ngôn từ và cách kể chuyện, sử dụng ví dụ về</h3>\n<p class=\"body-txt\">\nchatbot AI (ChatGPT) để minh họa. Diễn giả nhấn mạnh rằng việc lựa chọn và sử dụng ngôn\n \ntừ giàu cảm xúc, có màu sắc sẽ biến một ý tưởng đơn giản thành nội dung hấp dẫn. Bài học\n \ncũng chỉ ra tầm quan trọng của việc truyền tải cảm xúc từ câu chuyện của người viết sang\n \nngười đọc để nội dung thực sự có giá trị, đồng thời khẳng định mạnh mẽ rằng &quot;nếu không\n \nviết thì chắc chắn không đọc&quot;.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thực hành dùng ChatGPT để viết một bài luận về con số 7, ban đầu với hướng tích cực.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">ChatGPT thực hiện yêu cầu ngay lập tức, không phản đối hay biện minh. Diễn giả so sánh</span></div>\n<p class=\"body-txt\">\nvới việc người ta thường đưa ra lý do không làm bài tập.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả nhấn mạnh ChatGPT không &quot;chăm&quot; (tức là không tự động làm trước), mà cần</span></div>\n<p class=\"body-txt\">\nđược chỉ định rõ ràng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">ChatGPT miêu tả số 7 với các từ khóa tích cực: hoàn hảo, huyền bí, lịch sử, tôn giáo, khoa</span></div>\n<p class=\"body-txt\">\nhọc, tâm linh, sức hút, linh thiêng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Việc sử dụng các &quot;ngôn từ&quot; giàu biểu cảm và đa dạng này giúp &quot;làm giàu thêm ngôn ngữ&quot;</span></div>\n<p class=\"body-txt\">\nvà &quot;vốn từ&quot; của người viết.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Để viết hay, cần đọc hay và biết cách sử dụng ngôn từ có &quot;màu sắc&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Trong tôn giáo, số 7 là biểu tượng của ý nghĩa sâu sắc, may mắn, sự hoàn thiện (7 ngày),</span></div>\n<p class=\"body-txt\">\ngiác ngộ và trí tuệ (Phật giáo), các vị thần may mắn (Nhật Bản).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phương pháp tu từ mà ChatGPT thường dùng khi không được chỉ định là &quot;liệt kê&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Trong khoa học, số 7 gắn với 7 màu sắc cầu vồng (đỏ cam vàng lục lam chàm tím), 7</span></div>\n<p class=\"body-txt\">\nnguyên tố hóa học (nitơ được nêu ví dụ), 7 hành tinh trong hệ mặt trời.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Trong tâm linh, số 7 đại diện cho thiên đường, sự cân bằng và năng lượng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Số 7 còn liên hệ với những điều huyền bí (7 kỳ quan thế giới, 7 chú lùn) và được chọn vì</span></div>\n<p class=\"body-txt\">\nmay mắn trong đời sống hàng ngày (chơi xổ số, số nhà, số điện thoại, số xe), tượng trưng\n \ncho sự thịnh vượng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nếu có góc nhìn tiêu cực, số 7 (bảy) có thể được liên hệ với &quot;thất&quot; (mất mát, thất bại).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thực hành dùng ChatGPT để viết về số 7 với ngôn ngữ thật sự tiêu cực: mất mát và đổ</span></div>\n<p class=\"body-txt\">\nvỡ, thất bại trong cuộc sống, thất vọng và u sầu, thất thần và mất phương hướng, ché lỳ\n \nvà tan vỡ, từ đỉnh cao đến vực sâu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Một câu chuyện truyền tải cả cảm xúc tích cực và tiêu cực.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Câu chuyện, giống như sách trên giá, chỉ thực sự &quot;hay&quot; khi nó nằm &quot;trong đầu&quot; người</span></div>\n<p class=\"body-txt\">\nđọc, khi được đọc và cảm nhận.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nếu người viết chưa &quot;truyền được con chữ của mình sang đầu người khác&quot;, câu chuyện</span></div>\n<p class=\"body-txt\">\nsẽ không đem lại cảm xúc cho người đọc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Việc viết ra rất quan trọng, nhưng viết ra không đảm bảo sẽ có người đọc.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Nếu không viết thì chắc chắn không đọc.&quot;</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sức mạnh của ngôn từ trong việc tạo cảm xúc và ý nghĩa: Diễn giả chứng minh rằng chỉ</span></div>\n<p class=\"body-txt\">\ncần thay đổi từ ngữ từ trung tính sang tích cực hoặc tiêu cực, một khái niệm (như số 7)\n \ncó thể gợi lên những cảm xúc và ý nghĩa hoàn toàn khác biệt. Điều này cực kỳ quan trọng\n \ntrong marketing và truyền thông, nơi việc lựa chọn từ ngữ đúng có thể định hình nhận\n \nthức và phản ứng của khán giả, giúp họ cảm nhận được giá trị và thông điệp mà bạn\n \nmuốn truyền tải.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tầm quan trọng của việc truyền tải cảm xúc từ người viết đến người đọc: Diễn giả nhấn</span></div>\n<p class=\"body-txt\">\nmạnh rằng một câu chuyện chỉ thực sự &quot;hay&quot; khi nó được đọc và khơi gợi cảm xúc trong\n \ntâm trí người đọc, chứ không chỉ tồn tại trên giấy hay trong đầu người viết. Insight này\n \ngợi mở về việc nội dung cần được thiết kế, trình bày và phân phối sao cho dễ tiếp cận, dễ\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><p class=\"body-txt\">\nhiểu và dễ đồng cảm để tạo ra tác động thực sự, khiến khán giả không chỉ tiếp nhận\n \nthông tin mà còn cảm nhận được nó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Nếu không viết thì chắc chắn không đọc&quot;: Đây là một lời khẳng định mạnh mẽ về giá trị</span></div>\n<p class=\"body-txt\">\ncủa việc tạo ra nội dung. Dù việc viết ra không đảm bảo được đọc, nhưng nếu không viết\n \nthì cơ hội được đọc là con số 0. Insight này khuyến khích hành động, vượt qua nỗi sợ hãi\n \nvề sự không hoàn hảo hay lo lắng về kết quả để bắt đầu sản xuất nội dung, là bước đầu\n \ntiên và thiết yếu trong mọi chiến lược marketing nội dung.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Tôi đang làm giàu thêm ngôn ngữ của mình, phải không nào? Rồi, tôi đang làm giàu thêm cái\n \nvốn từ của mình.”\n \n“Nếu mà chúng ta chỉ cần sử dụng những cái từ như vậy thôi thì tự nhiên là bài văn của chúng\n \nta nó đã hay lên và nó có màu sắc lên rồi.”\n \n“Nếu không viết thì chắc chắn không đọc.”\n \n7.2 Viết ngắn\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi giảng này tập trung vào việc tận dụng công cụ Chat GPT để viết nội dung ngắn</h3>\n<p class=\"body-txt\">\ngọn, sáng tạo và thu hút. Diễn giả sử dụng ví dụ về việc viết một câu chuyện hoặc bài thơ ẩn\n \ndụ về &quot;ngọc&quot; để minh họa cách tạo ra những đoạn văn có giá trị cao từ những ý tưởng ban\n \nđầu thô sơ. Cốt lõi là việc rèn luyện khả năng viết, vốn từ và biết cách dùng công cụ AI như\n \nmột người bạn để nâng cao chất lượng bài viết, khiến nó sinh động và hay hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Yêu cầu học viên mở cửa sổ chat và viết thật ngắn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ví dụ: viết về hai vợ chồng giận nhau nhưng không nói chuyện mà viết giấy nhắn cho</span></div>\n<p class=\"body-txt\">\nnhau, yêu cầu viết thật ngắn, thật hài hước.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hướng dẫn chỉ bao gồm những chữ, những từ, không viết thành câu.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Yêu cầu viết một câu chuyện thật ngắn, cực ngắn mô tả cuộc hội thoại qua giấy của hai</span></div>\n<p class=\"body-txt\">\nvợ chồng, thật hài hước.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Đề xuất tiếp tục câu chuyện khác hoặc viết tiếp theo cùng phong cách.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Giảng viên đặt câu hỏi: &quot;Tại sao lại viết ngắn?&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ví dụ ẩn dụ về &quot;viên ngọc&quot; và &quot;viên kim cương&quot;: Từ một viên quặng thô, phải gọt giũa</span></div>\n<p class=\"body-txt\">\nđau đớn mới trở thành viên ngọc/kim cương có giá trị cao.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Câu thơ ẩn dụ: &quot;Ngọc đem vào giũa bao đau đớn, Ngọc giũa xong rồi giá thật cao&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sử dụng Chat GPT để kiểm tra xem nó có nhớ bài thơ đó không hoặc viết tiếp theo ý</span></div>\n<p class=\"body-txt\">\ntưởng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thực hành yêu cầu Chat GPT viết đoạn thơ ngắn về ngọc, viên đá, giũa.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nhận xét rằng AI (Chat GPT) cũng có thể viết thơ lủng củng nhưng vẫn chấp nhận được.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Đề xuất sửa đổi câu thơ ban đầu thành: &quot;Ngọc đem vào giũa bao đau đớn, Ngọc giũa</span></div>\n<p class=\"body-txt\">\nxong rồi, (lấp lánh soi đây), (rất quý, rất đáng giá), (giá trị cao lên rất nhiều lần)&quot;. (Sau\n \nđó bỏ &quot;lấp lánh soi đây&quot; đi).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sửa tiếp: &quot;Ngọc đem vào giũa bao đau đớn, Ngọc giũa xong rồi, sáng tựa sao&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mở rộng ý tưởng sang &quot;Người đời cũng thế, qua gian khó rực rỡ muôn mình&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mục tiêu: viết nhiều, viết mãi, viết hay hơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Kết luận: Chat GPT không phải là bạn, cũng không phải là người cùng lớp, mà bản thân</span></div>\n<p class=\"body-txt\">\nmỗi người phải làm được bài đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Điểm quan trọng nhất: Vốn từ phải được bổ sung hàng ngày.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sức mạnh của sự ngắn gọn và giá trị cốt lõi (ví dụ viên ngọc): Diễn giả nhấn mạnh việc</span></div>\n<p class=\"body-txt\">\nviết ngắn gọn và cô đọng như quá trình gọt giũa viên ngọc thô thành kim cương. Điều\n \nnày quan trọng vì trong marketing hiện đại, khả năng truyền tải thông điệp nhanh, trực\n \ntiếp và giá trị cao là yếu tố then chốt để thu hút sự chú ý của khách hàng B2B bận rộn.\n \nMột bài viết ngắn gọn, súc tích nhưng chứa đựng giá trị sẽ hiệu quả hơn nhiều so với nội\n \ndung dài dòng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tư duy biến nội dung thô thành giá trị cao: Ví dụ về &quot;ngọc&quot; từ quặng thô cho thấy một</span></div>\n<p class=\"body-txt\">\nquy trình biến đổi từ nguyên liệu ban đầu ít giá trị thành sản phẩm có giá trị cao qua quá\n \ntrình &quot;giũa&quot; (chỉnh sửa, tinh gọn). Đây là insight quan trọng cho việc tạo nội dung: bất kỳ\n \ný tưởng ban đầu nào cũng cần được mài giũa, tối ưu hóa để trở nên hấp dẫn và giá trị\n \nhơn đối với đối tượng mục tiêu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chat GPT là công cụ hỗ trợ, không phải thay thế: Diễn giả nhấn mạnh Chat GPT không</span></div>\n<p class=\"body-txt\">\nphải là người bạn hay người cùng lớp mà chỉ là công cụ hỗ trợ. Điều này quan trọng vì\n \nnó định hướng người học tập trung vào việc phát triển kỹ năng và vốn từ cá nhân (vốn\n \ntừ phải được bổ sung hàng ngày) để sử dụng AI hiệu quả, chứ không phải phụ thuộc\n \nhoàn toàn vào nó. AI giúp biến ý tưởng thô thành bản nháp nhanh hơn, nhưng sự tinh\n \nchỉnh, sáng tạo và chiều sâu vẫn cần từ con người.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Tại sao lại viết ngắn? Bạn có thấy quá trình làm một viên ngọc hoặc viên kim cương, người ta\n \nđào lên được một viên quặng thô và muốn cho cái viên quặng đó nó thực sự có giá trị thì\n \nngười ta phải gọt giũa thì nó mới thành viên ngọc, thành viên kim cương có phải không các\n \nbạn?”\n \n“Ngọc đem vào giũa bao đau đớn, Ngọc giũa xong rồi giá thật cao.”\n \n“Chat GPT ở đây không phải là người bạn cũng không phải là người cùng lớp, mà bản thân\n \nmỗi người chúng ta phải làm được cái bài đó.”\n \n“Cái vốn từ mình phải được bổ sung hàng ngày.”\n \n7.3 Ứng dụng ca dao tục ngữ vào viết quảng cáo\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi giảng tập trung vào việc làm giàu vốn từ và cấu trúc ngôn ngữ để nâng cao kỹ</h3>\n<p class=\"body-txt\">\nnăng viết, đặc biệt trong tiếng Việt. Giảng viên nhấn mạnh tầm quan trọng của việc đọc, sưu\n \ntầm ý tưởng, và sử dụng hiệu quả kho tàng tục ngữ, ca dao – những di sản văn hóa chứa\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><p class=\"body-txt\">\nđựng nhiều giá trị và biện pháp tu từ. Quy trình được đề xuất gồm tập hợp, sắp xếp, lựa\n \nchọn, viết, và tinh chỉnh nội dung liên tục để bài viết trở nên sắc sảo, giàu cảm xúc và có sức\n \nmạnh thuyết phục, tận dụng sự sâu sắc của ngôn ngữ truyền thống.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cần bổ sung vốn từ hàng ngày, chủ yếu từ nguồn đọc sách và các tài liệu khác.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khi bí ý tưởng viết, có thể tìm kiếm trên Google (ví dụ tìm kiếm về &quot;con số 7&quot; hoặc bất kỳ</span></div>\n<p class=\"body-txt\">\nđiều gì được quan tâm) để có nội dung liên quan.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khi bắt đầu viết, hãy bắt đầu bằng việc sưu tầm ý tưởng của người khác.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sau khi bổ sung vốn từ, cần bổ sung cấu trúc (cấu trúc câu, cấu trúc bài văn/bài viết) liên</span></div>\n<p class=\"body-txt\">\ntục hàng ngày. Không bổ sung sẽ dẫn đến nghèo về ngôn ngữ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thơ, văn học Việt Nam, đặc biệt là tục ngữ và ca dao, là nguồn tài liệu dồi dào để bổ sung</span></div>\n<p class=\"body-txt\">\nvốn từ và ý tưởng. Chỉ cần gõ &quot;thơ hay&quot; hoặc &quot;tục ngữ&quot; lên Google là có.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quy trình làm giàu ngôn ngữ bao gồm: tập hợp (từ khóa, câu văn, tục ngữ, ca dao), sắp</span></div>\n<p class=\"body-txt\">\nxếp, lựa chọn những nội dung phù hợp, sau đó viết và liên tục loại bỏ/tinh chỉnh để bài\n \nviết hay hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tục ngữ và ca dao là vốn văn học quý giá của người Việt, chứa đựng nét văn hóa, biện</span></div>\n<p class=\"body-txt\">\npháp tu từ sâu sắc, và có sức mạnh lớn khi được trích dẫn đúng chỗ trong bài viết, giúp\n \nbài viết có sức mạnh lớn hơn rất nhiều lần.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Người Việt chỉ còn lại biện pháp dân gian là tục ngữ và ca dao sau 1000 năm đô hộ, do</span></div>\n<p class=\"body-txt\">\nhầu hết tài liệu viết bị đốt hoặc phá hủy. Tục ngữ và ca dao được truyền miệng qua nhiều\n \nthế hệ, chỉ còn lại những câu hay, gắn liền với đời sống xã hội và dễ đi vào lòng người.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ngữ khác với từ: Tiếng -&gt; Từ -&gt; Ngữ -&gt; Câu. &quot;Tục&quot; trong tục ngữ không phải nghĩa xấu</span></div>\n<p class=\"body-txt\">\nmà là &quot;cổ&quot; (cổ xưa, truyền từ người này sang người khác), chỉ những cụm từ mang sẵn\n \ngiá trị ngôn ngữ và ý nghĩa ẩn dụ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tục ngữ là những câu ngắn gọn, trong khi ca dao là thể loại có vần, có điệu, thường theo</span></div>\n<p class=\"body-txt\">\nthể lục bát hoặc tứ tuyệt, có thể hát được (ví dụ như hát ru).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ví dụ ứng dụng việc làm giàu vốn từ/ngữ từ tục ngữ/ca dao vào việc viết và rèn luyện</span></div>\n<p class=\"body-txt\">\nbản thân: &quot;Có công mài sắt có ngày nên kim&quot; (kiên trì luyện viết), &quot;Kiến tha lâu cũng đầy\n \ntổ&quot; (đọc và đánh dấu từ khóa để làm giàu vốn từ), &quot;Lửa thử vàng gian nan thử sức&quot; (đối\n \nmặt với thử thách), &quot;Cần cù bù thông minh&quot;, &quot;Muốn sang thì bắc cầu kiều, muốn con hay\n \nchữ phải yêu lấy diễn giả&quot;, &quot;Thua keo này bày keo khác&quot;, &quot;Ngã ở đâu đứng dậy ở đó&quot;,\n \n&quot;Không có việc gì khó, chỉ sợ lòng không bền&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Để có thể trích dẫn tục ngữ nhanh chóng và viết hay, điều quan trọng nhất là phải *đọc</span></div>\n<p class=\"body-txt\">\nnhiều*. &quot;Muốn viết thì phải đọc.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Công thức học và viết được ví như &quot;hình cây&quot; với các bước tập hợp và lựa chọn theo chủ</span></div>\n<p class=\"body-txt\">\nđề: các cấu trúc hay, các biện pháp tu từ, các ngôn ngữ giàu cảm xúc, các câu chuyện,\n \nnhững điều họ muốn, các hành động và bản nháp. Tất cả các bài giảng đều có cấu trúc và\n \ngiáo án.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sức mạnh của Tục ngữ và Ca dao trong việc làm giàu ngôn ngữ và bài viết: Tục ngữ và ca</span></div>\n<p class=\"body-txt\">\ndao không chỉ là nguồn từ vựng hay ý tưởng, mà còn là di sản văn hóa sâu sắc của người\n \nViệt. Chúng mang sẵn giá trị ngôn ngữ, biện pháp tu từ độc đáo và khả năng kết nối cảm\n \nxúc mạnh mẽ với người đọc/nghe, giúp bài viết trở nên thuyết phục, sâu sắc và &quot;có sức\n \nmạnh lớn hơn rất nhiều lần&quot;. Việc sử dụng chúng một cách khéo léo là tận dụng trí tuệ\n \ndân gian để nâng tầm bài viết.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quy trình lặp lại &quot;Tập hợp - Sắp xếp - Lựa chọn - Viết - Loại bỏ&quot;: Đây là một phương pháp</span></div>\n<p class=\"body-txt\">\nthực tế và hiệu quả để rèn luyện kỹ năng viết và tư duy. Việc không ngại loại bỏ những gì\n \nđã viết (tinh chỉnh, gọt giũa) cho thấy tư duy liên tục cải thiện và hướng tới sự xuất sắc,\n \nthay vì chấp nhận những bản nháp ban đầu. Quy trình này áp dụng cho mọi loại nội dung\n \nvà mọi giai đoạn phát triển kỹ năng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Muốn viết thì phải đọc&quot; và tầm quan trọng của việc đọc nhiều: Đây là lời khuyên đơn</span></div>\n<p class=\"body-txt\">\ngiản nhưng cực kỳ nền tảng. Việc đọc không chỉ làm giàu vốn từ (từ, ngữ, cấu trúc) mà\n \ncòn cung cấp ý tưởng, cách hành văn, và sự thấu hiểu về ngôn ngữ. Nó là yếu tố then\n \nchốt giúp việc viết trở nên tự nhiên, phong phú và hiệu quả hơn, là nền tảng cho mọi sự\n \nsáng tạo ngôn ngữ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Ngọc muốn sáng thì phải đem vào mài giũa, văn muốn hay, bài viết muốn xuất sắc, sắc sảo thì\n \nphải gọt giũa.”\n \n“Tục ngữ và ca dao gần như là vốn văn học mà chúng ta còn đến ngày hôm nay.”\n \n“Muốn viết thì phải đọc.”\n \n7.4 Liên tục trau dồi từ ngữ, tục ngữ, ca dao cho bài viết\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi giảng này tập trung vào phương pháp luyện tập để viết hay, đặc biệt nhấn</h3>\n<p class=\"body-txt\">\nmạnh tầm quan trọng của việc xây dựng một cấu trúc dữ liệu khoa học cho các nội dung cần\n \nviết. Diễn giả hướng dẫn cách tập hợp và tổ chức các ý tưởng, từ ngữ, câu chuyện một cách\n \ncó hệ thống, đồng thời ứng dụng phương pháp thử nghiệm (liệt kê, sắp xếp, lựa chọn, viết,\n \nloại bỏ) để liên tục cải thiện chất lượng bài viết. Mục tiêu cuối cùng là viết ra những nội dung\n \nthuyết phục, hiệu quả, đáp ứng được mong muốn của khách hàng hoặc độc giả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vẽ một sơ đồ tư duy về việc luyện tập để viết hay.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tập hợp những tiêu đề hay: Ghi chép và sưu tầm các tiêu đề ấn tượng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tập hợp những biện pháp tu từ: Sưu tầm các biện pháp nghệ thuật để làm giàu ngôn</span></div>\n<p class=\"body-txt\">\nngữ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tập hợp những ngôn từ giàu cảm xúc: Thu thập các từ ngữ có sức biểu cảm mạnh.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tập hợp những câu chuyện: Sưu tầm các câu chuyện có thể dùng để minh họa hoặc</span></div>\n<p class=\"body-txt\">\ntruyền tải thông điệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tập hợp những điều khách hàng/độc giả muốn: Nắm bắt nhu cầu, mong muốn của đối</span></div>\n<p class=\"body-txt\">\ntượng mục tiêu.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tập hợp ca dao và tục ngữ: Sử dụng kho tàng văn học dân gian để làm bài viết thêm sâu</span></div>\n<p class=\"body-txt\">\nsắc và có hồn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tạo cấu trúc để nhớ và sử dụng hiệu quả:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chia sơ đồ tư duy thành ít nhất bốn cấp độ chi tiết hơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cấu trúc giúp dễ dàng nhớ và truy xuất thông tin.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mục đích của việc sử dụng tục ngữ/ca dao/biện pháp tu từ:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nói giảm, nói tránh: Dùng để truyền tải thông điệp một cách khéo léo, tế nhị (ví dụ: &quot;thôi</span></div>\n<p class=\"body-txt\">\nrồi lượm ơi&quot; thay cho &quot;chết&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nhấn mạnh, mô tả mạnh mẽ hơn: Làm cho ý nghĩa trở nên sâu sắc, bi thương hoặc ấn</span></div>\n<p class=\"body-txt\">\ntượng hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phương pháp thử nghiệm viết văn (mang từ giải toán):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Liệt kê: Liệt kê tất cả các khả năng/ý tưởng có thể.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sắp xếp: Tổ chức các ý tưởng theo một cấu trúc hợp lý.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lựa chọn: Chọn ra những ý tưởng, từ ngữ, câu chuyện phù hợp nhất.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Viết: Thực hiện viết bài.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Loại bỏ: Gạch bỏ những phần không cần thiết hoặc không hiệu quả.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quá trình này lặp đi lặp lại để liên tục cải thiện bài viết.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bài viết luôn luôn biến đổi: Một bài viết không bao giờ là bản cuối cùng, cần liên tục cập</span></div>\n<p class=\"body-txt\">\nnhật và cải thiện dựa trên phản hồi và thử nghiệm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ý kiến khách hàng là quan trọng nhất:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Người viết không phải là khách hàng, không thể tự đánh giá được bài viết có &quot;được&quot; hay</span></div>\n<p class=\"body-txt\">\nkhông.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nếu bản thân người viết còn chưa &quot;thấy được&quot; (chưa tự tin), thì người khác cũng khó có</span></div>\n<p class=\"body-txt\">\nthể thấy được.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bài viết có &quot;được&quot; hay không phụ thuộc vào &quot;bạn muốn gì&quot; (mong muốn của khách</span></div>\n<p class=\"body-txt\">\nhàng/độc giả).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bài tập về nhà:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Làm ngắn bài viết khoảng 20-30% bằng cách in ra, dùng bút màu đánh dấu (xanh: giữ</span></div>\n<p class=\"body-txt\">\nlại; đỏ: loại bỏ; vàng: xem xét).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lựa chọn, sắp xếp, loại bỏ để có được những câu, những ý hay nhất.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Áp dụng các biện pháp tu từ, ca dao, tục ngữ để làm bài viết phong phú hơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sử dụng testimonial (ý kiến khách hàng):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tập hợp tất cả ý kiến khách hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sắp xếp theo các đặc điểm chung.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lựa chọn những bài viết hay nhất.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lựa chọn những câu hay nhất từ các bài viết đó.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Đưa vào bài bán hàng và thử nghiệm để tìm ra câu mang lại chuyển đổi tốt nhất.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vũ khí: Cuốn sách &quot;Thôi miên bằng ngôn từ&quot;: (Được nhắc đến như một nguồn tài liệu tập</span></div>\n<p class=\"body-txt\">\nhợp các bài văn hay).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan à có chiều sâu văn\n \nhóa, tránh được lối viết sáo rỗng hoặc thiếu ý tưởng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Từ khóa rất nhiều và từ khóa chết không liên quan đến nhau, có đồng ý với tôi không?”\n \n“Ý kiến của khách hàng là quan trọng nhất.”\n \n“Luôn luôn trả lời là không được.”\n \n“Muốn con hay chữ thì yêu lấy diễn giả.”\n \n7.5 Đo lường bài viết hiệu quả\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi giảng này tập trung vào cách tối ưu hóa nội dung website, đặc biệt là trang</h3>\n<p class=\"body-txt\">\nbán hàng, để tăng tỷ lệ chuyển đổi. Diễn giả nhấn mạnh tầm quan trọng của việc đo lường\n \nhành vi người dùng bằng công cụ Heatmap để xác định những phần nội dung hấp dẫn và\n \nkém hiệu quả, từ đó chỉnh sửa, thêm hoặc bớt để đạt được mục tiêu kinh doanh. Diễn giả\n \ncũng chỉ trích sự lười biếng và thiếu hành động của học viên, nhắc nhở rằng mọi thứ đã\n \nđược hướng dẫn chi tiết và chỉ cần thực hành theo.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mục đích của bài viết: Bài viết hay phải có mục đích là &quot;có chuyển đổi&quot; (0:22), không</span></div>\n<p class=\"body-txt\">\nphải là hay theo đánh giá cá nhân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Công cụ đo lường Heatmap: Dùng Heatmap (0:41, 1:15, 6:24) để xem người dùng bấm</span></div>\n<p class=\"body-txt\">\nchuột/tay vào đâu, phần nào họ quan tâm nhiều hơn. Đây là cách khách hàng trả lời về\n \nchất lượng nội dung.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tối ưu hóa nội dung dựa trên Heatmap:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Văn bản: Những đoạn văn người dùng ít quan tâm (ít cl
