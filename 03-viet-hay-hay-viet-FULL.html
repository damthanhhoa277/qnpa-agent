const pages=["<div class=\"pg pg-cover\" style=\"border-top:5px solid #388e3c\">\n  <div class=\"cover-wrap\">\n    <div class=\"cover-tag\" style=\"color:#388e3c\">Sổ Tay Tinh Hoa · QNPA</div>\n    <div class=\"cover-title\">Viết Hay – Hay Viết</div>\n    <div class=\"cover-sub\" style=\"color:#388e3c\">101 trang nội dung đầy đủ</div>\n  </div>\n</div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><p class=\"body-txt\">\nViết Hay - Hay Viết\n \nSổ tay tinh hoa\n</p>\n<p class=\"body-txt\">\nTổng hợp 56 bài\n \nNguồn: khoá học Viết Hay - Hay Viết\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><p class=\"body-txt\">\nLời mở\n \nQuyển sách này tổng hợp tinh hoa khoá Viết Hay - Hay Viết, do AI nghe lại từng bài giảng và\n \nchắt lọc thành: tóm tắt, ý chính, điểm quan trọng nhất, và trích dẫn đáng nhớ.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><p class=\"body-txt\">\nMục lục\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Chương 1</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">1.1 Thực trạng viết bài hiện nay</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">1.2 Cách tạo nội dung từ những bài báo hàng ngày</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">1.3 Viết quảng cáo tác động như thế nào</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">1.4 Cách viết tiêu đề dựa trên tiêu đề có sẵn</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Chương 2</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">2.1 Có nên sử dụng AI để viết bài không?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">2.2 Biện pháp tu từ trong tiếng Việt</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">2.3 Phép nhân hoá và hoán dụ</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">2.4 Phương pháp liệt kê</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Chương 3</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">3.1 Cấu trúc ngôn từ</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">3.2 Phân tích tiêu đề vì sao nó hay</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">3.3 Áp dụng Dữ liệu có cấu trúc trong viết bài</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">3.4 Cách sử dụng AI hiệu quả trong viết bài</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Chương 4</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">4.1 Chữa bài tập</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">4.2 Nhận biết và loại bỏ tư duy tiêu cực</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">4.3 Các phương pháp tu từ</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">4.4 7 bước kể chuyện</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">4.5 Tổng kết</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Chương 5</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">5.1 ChatGPT chỉ là công cụ</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">5.2 Cách kể chuyện về những mong muốn của người khác</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">5.3 Demo xây dựng trang bán hàng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">5.4 Tại sao bạn cần trang bán hàng ngay lúc này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">5.5 Tư duy dẫn dắt người nghe</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">5.6 Sự khác nhau giữa Làm và không làm</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Chương 6</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">6.1 Sự khác biệt giữa người làm và không làm</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">6.2 Thay câu chuyển kể cho mình nghe</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">6.3 Sự khác biệt giữa những người kể chuyện khác nhau</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">6.4 Không phụ thuộc vào ChatGPT</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">6.5 Lựa chọn môi trường phát triển</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Chương 7</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">7.1 Câu chuyện bạn kể mang lại cảm xúc gì?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">7.2 Viết ngắn</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">7.3 Ứng dụng ca dao tục ngữ vào viết quảng cáo</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">7.4 Liên tục trau dồi từ ngữ, tục ngữ, ca dao cho bài viết</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">7.5 Đo lường bài viết hiệu quả</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">7.6 Hướng dẫn làm trang bán hàng P1</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">7.7 Hướng dẫn làm trang bán hàng P2</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">7.8 Bạn có thể bán mọi thứ khi bạn viết hay</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">7.9 Tổng kết</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Chương 8</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hướng dẫn tạo trang bán hàng có QR thanh toán</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Chương 9</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">8.1 Kể về hành trình Route 66</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">8.2 Chọn ngôn ngữ diễn đạt rất quan trọng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">8.3 Công thức Liệt kê- Sắp xếp - Lựa chọn</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">8.4 Ứng dụng Liệt kê - Sắp xếp- Lựa chọn</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">8.5 Lựa chọn câu chuyện kể</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">8.6 Kể chuyện cho bản thân nghe</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">8.7 Hãy là người nắm bắt cơ hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">8.8 Bạn cần phải học Sale Success System</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">8.9 Hãy viết điều tích cực</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">8.10: 16 bước bán hàng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">8.11 Tổng kết buổi học</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Chương 10</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">9.1 Viết Hay cho Bác sĩ</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">9.2 Viết hay cho doanh nghiệp bán Bạc</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">9.3 Viết Hay cho hệ thống bán nước giặt</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">9.4 Tổng kết chiến lược</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Chương 11</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">10.1 Liệt kê sắp xếp lựa chọn</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">10.2 Kể chuyện bằng hình ảnh</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">10.3 Tổng kết, bài tốt nghiệp</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#388e3c\">Chương 1</h3>\n<p class=\"body-txt\">\n1.1 Thực trạng viết bài hiện nay\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi giảng tập trung vào việc sử dụng ChatGPT để tạo nội dung, đặc biệt là cách</h3>\n<p class=\"body-txt\">\nđặt câu hỏi và yêu cầu để nhận được những thông tin sáng tạo và không giới hạn. Diễn giả\n \nnhấn mạnh rằng không nên tin tưởng hoàn toàn vào thông tin do ChatGPT cung cấp vì nó có\n \nthể bịa đặt, và người dùng phải chịu trách nhiệm hoàn toàn về nội dung mình đăng tải. Mục\n \ntiêu chính là khuyến khích người học tạo ra nội dung độc đáo và có quan điểm riêng, tránh\n \nsao chép từ AI để duy trì uy tín và khả năng lan tỏa trên các nền tảng số.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mở đầu khóa học về viết lách, đặc biệt là viết blog.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bài tập đầu tiên: Dùng ChatGPT để viết những điều đơn giản, khám phá khả năng viết</span></div>\n<p class=\"body-txt\">\nnhanh của AI.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bài tập thứ hai: Yêu cầu ChatGPT thêm văn phong và nội dung độc đáo, thậm chí là</span></div>\n<p class=\"body-txt\">\nnhững điều người dùng chưa bao giờ biết (ví dụ: &quot;3 điều nói dối về ông Harvard&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cảnh báo về độ tin cậy của ChatGPT: AI rất hay bịa chuyện và không phải là nguồn thông</span></div>\n<p class=\"body-txt\">\ntin đáng tin cậy.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Người dùng phải chịu trách nhiệm kiểm chứng thông tin do ChatGPT cung cấp trước khi</span></div>\n<p class=\"body-txt\">\nđăng tải.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bài tập thứ ba: Viết về một vấn đề có thể gây tranh cãi (ví dụ: &quot;có nên chơi game hay</span></div>\n<p class=\"body-txt\">\nkhông nên chơi game?&quot;), để rèn luyện kỹ năng tranh biện và thể hiện quan điểm cá\n \nnhân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Để thu hút trên mạng xã hội, cần học cách tranh biện, không chỉ trích con người.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Học cách tạo comment trên các bài viết tranh biện của người khác thay vì tự ý đăng tải</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">nội dung không liên quan.</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">ChatGPT không có lỗi; lỗi là do người dùng không kiểm chứng và sử dụng đúng cách.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Các nền tảng số (website, mạng xã hội) hạn chế hiển thị nội dung được tạo ra bởi AI.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Không sao chép nội dung của AI để đăng lên mạng xã hội vì nó sẽ bị hạn chế hiển thị</span></div>\n<p class=\"body-txt\">\nhoặc vĩnh viễn không lên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nội dung trên mạng xã hội phải thể hiện quan điểm, ý tưởng và ngôn từ riêng của cá</span></div>\n<p class=\"body-txt\">\nnhân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nếu muốn sử dụng nội dung từ AI, phải ghi rõ &quot;Đây là bài của AI&quot; và mô tả cách bạn sử</span></div>\n<p class=\"body-txt\">\ndụng AI.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cách sử dụng AI hiệu quả: dùng AI như một công cụ hỗ trợ để tạo ra ý tưởng, sau đó tự</span></div>\n<p class=\"body-txt\">\nviết lại hoặc diễn giải theo ngôn ngữ và quan điểm của mình.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">ChatGPT rất hay bịa chuyện và không phải là nguồn thông tin đáng tin cậy: Điều này cực</span></div>\n<p class=\"body-txt\">\nkỳ quan trọng vì nó thay đổi hoàn toàn cách chúng ta tương tác với AI. Thay vì coi AI là\n \nmột &quot;bách khoa toàn thư&quot; đáng tin, chúng ta phải coi nó là một công cụ tạo ý tưởng và\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#388e3c\">nội dung thô, đòi hỏi sự kiểm chứng gắt gao. Nếu không, chúng ta có thể vô tình lan</h3>\n<p class=\"body-txt\">\ntruyền thông tin sai lệch và mất uy tín.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Người dùng phải chịu trách nhiệm hoàn toàn về thông tin mình đăng tải, không đổ lỗi</span></div>\n<p class=\"body-txt\">\ncho AI: Insight này nhấn mạnh vai trò và trách nhiệm đạo đức của người sáng tạo nội\n \ndung. Dù AI có thể giúp tạo ra nội dung nhanh chóng, trách nhiệm cuối cùng về tính\n \nchính xác và trung thực vẫn thuộc về người đăng. Điều này giúp người dùng phát triển\n \ntư duy phản biện và cẩn trọng hơn trong việc sản xuất nội dung số.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Các nền tảng số hạn chế lan tỏa nội dung do AI tạo ra; nội dung phải thể hiện quan điểm</span></div>\n<p class=\"body-txt\">\nvà ngôn từ cá nhân: Đây là một chiến lược quan trọng để thành công trên các nền tảng\n \nmarketing số. Việc sao chép nội dung từ AI sẽ làm giảm khả năng hiển thị và tiếp cận\n \nkhán giả, trong khi việc tạo ra nội dung độc đáo, mang dấu ấn cá nhân mới là yếu tố thu\n \nhút và tạo sự khác biệt. Điều này khuyến khích sự sáng tạo và tính chân thực.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Thế thì cái việc mà mình tạo ra các cái comment ấy là để mình đi tranh luận ấy, lấy ý tưởng,\n \nđể mình đi tranh luận ở trên mạng.”\n \n“Ta không được tin nó vì nó hay bịa lắm.”\n \n“Tất cả mọi thông tin chúng ta sử dụng là chúng ta là người chịu trách nhiệm, không phải nó.”\n \n“Nó không cổ súy cho cái thông tin được tạo ra bởi các phần mềm.”\n \n1.2 Cách tạo nội dung từ những bài báo hàng ngày\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi học tập trung vào việc hướng dẫn cách tạo ra các tiêu đề (headlines) hiệu quả,</h3>\n<p class=\"body-txt\">\ncó khả năng thu hút người đọc và kích thích họ thực hiện hành động cụ thể. Diễn giả nhấn\n \nmạnh rằng mục đích của một tiêu đề không chỉ là gây tò mò mà phải dẫn đến một hành động\n \ncó mục đích. Ông trình bày một phương pháp đơn giản để &quot;viết lại nội dung người khác&quot;\n \nbằng cách phân tích cấu trúc của các tiêu đề thành công, xác định các yếu tố lợi ích, giá trị và\n \nso sánh, sau đó áp dụng mẫu này để tạo ra tiêu đề mới cho các sản phẩm/dịch vụ khác nhau\n \nmột cách nhanh chóng và hiệu quả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phân tích cấu trúc tiêu đề báo chí: Bắt đầu bằng việc phân tích một bài báo có tiêu đề</span></div>\n<p class=\"body-txt\">\nnhư &quot;Loại hạt màu vàng giàu protein gấp đôi hạt chia&quot; và tiêu đề phụ &quot;Giá không quá\n \n30.000 đồng, lại tốt cho xương và tim&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mục đích thực sự của tiêu đề: Tiêu đề không chỉ gây &quot;tò mò&quot; mà phải &quot;khiến cho người ta</span></div>\n<p class=\"body-txt\">\nphải click vào cái đường link&quot;, &quot;kích thích người ta hành động có mục đích&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phân biệt tiêu đề chính (Heading) và tiêu đề phụ (Sub-heading): Tiêu đề chính là phần</span></div>\n<p class=\"body-txt\">\nnổi bật nhất, thu hút sự chú ý ban đầu; tiêu đề phụ cung cấp thêm thông tin để củng cố\n \nsự quan tâm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Các yếu tố cốt lõi trong tiêu đề hiệu quả: Diễn giả chỉ ra 3 yếu tố chính:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Giàu protein&quot; (tính năng/lợi ích vượt trội).</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Giá không quá&quot; (giá cả hấp dẫn, có giá trị).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Tốt cho&quot; (lợi ích cụ thể cho người dùng).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phương pháp &quot;viết lại nội dung người khác&quot;: Lấy các tiêu đề thành công làm mẫu và thay</span></div>\n<p class=\"body-txt\">\nthế từ ngữ để áp dụng cho sản phẩm/dịch vụ của mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Các ví dụ thực hành: Diễn giả đưa ra nhiều ví dụ về việc &quot;viết lại&quot; tiêu đề cho các sản</span></div>\n<p class=\"body-txt\">\nphẩm khác nhau (ô tô, thịt, đồ uống, quần áo) dựa trên cấu trúc đã phân tích.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quy trình 5 bước tạo nội dung hiệu quả:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Đọc bài báo: Tìm kiếm và đọc một nội dung có tiêu đề thu hút.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bấm vào đường link: Trải nghiệm việc được thu hút và nhấp vào.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thức tỉnh (phân tích): Tự hỏi &quot;Tại sao tôi bấm? Điều gì khiến tôi bấm vào?&quot; để hiểu yếu</span></div>\n<p class=\"body-txt\">\ntố hấp dẫn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sao chép (tạo hồ sơ mẫu): Sao chép cấu trúc tiêu đề/nội dung thành một &quot;hồ sơ mẫu&quot;</span></div>\n<p class=\"body-txt\">\n(template).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sử dụng hồ sơ mẫu: Dùng mẫu đã tạo để nhanh chóng viết tiêu đề/nội dung mới cho sản</span></div>\n<p class=\"body-txt\">\nphẩm/dịch vụ của mình.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mục đích của tiêu đề là kích thích hành động có mục đích, không chỉ là tò mò: Đây là</span></div>\n<p class=\"body-txt\">\ninsight quan trọng nhất vì nó làm rõ bản chất của marketing trực tuyến. &quot;Tò mò&quot; chỉ là\n \ncảm xúc dẫn dắt, mục tiêu cuối cùng là khiến người đọc thực hiện một hành động cụ thể\n \n(nhấp chuột, mua hàng, đăng ký...). Việc hiểu rõ điều này giúp tạo ra tiêu đề có tính\n \nchuyển đổi cao thay vì chỉ gây chú ý thoáng qua.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phương pháp &quot;viết lại nội dung người khác&quot; bằng cách thay thế từ ngữ: Đây là một công</span></div>\n<p class=\"body-txt\">\ncụ thực tế và dễ áp dụng. Thay vì phải sáng tạo từ con số 0, người học có thể phân tích\n \ncác cấu trúc tiêu đề đã được chứng minh là hiệu quả, sau đó chỉ cần thay đổi từ khóa, con\n \nsố, và lợi ích phù hợp với sản phẩm của mình. Điều này giúp tiết kiệm thời gian, công sức\n \nvà tăng khả năng thành công cho các chiến dịch marketing.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Công thức tạo tiêu đề hiệu quả với các yếu tố then chốt: (Loại sản phẩm/dịch vụ) + (Tính</span></div>\n<p class=\"body-txt\">\nnăng/Lợi ích nổi bật) + (So sánh vượt trội) + (Giá trị/Giá cả hợp lý) + (Lợi ích cụ thể cho\n \nngười dùng). Công thức này cung cấp một khuôn mẫu rõ ràng, giúp bất kỳ ai cũng có thể\n \ntạo ra tiêu đề hấp dẫn. Nó bao hàm đầy đủ các yếu tố mà khách hàng tiềm năng quan\n \ntâm: sản phẩm là gì, nó có gì đặc biệt, nó tốt hơn đối thủ ra sao, giá cả thế nào, và cuối\n \ncùng là lợi ích mà họ nhận được.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Ai nói chữ tò mò là sai, là dốt.”\n \n“Tôi không cần biết cái phương pháp là gì. Tôi chỉ cần biết thay chữ vào đây là tôi đã có một\n \ncái tiêu đề mới xuất sắc rồi.”\n \n“Thực sự rất dễ làm để mà khi chúng ta có một cái tiêu đề hay, chúng ta hoàn toàn... hoàn toàn\n \ncó thể thay thế vào để viết được ra những cái nội dung hay của bản thân mình.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><p class=\"body-txt\">\n1.3 Viết quảng cáo tác động như thế nào\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi học tập trung vào việc hiểu tại sao khách hàng mua hàng và cách viết quảng</h3>\n<p class=\"body-txt\">\ncáo hiệu quả. Cốt lõi là phải xác định và truyền tải được &quot;giá trị lớn&quot; (value proposition) của\n \nsản phẩm, thay vì chỉ tạo sự tò mò. Mục tiêu cao nhất của quảng cáo, đặc biệt là tiêu đề, là\n \nkhiến khách hàng hành động, tức là &quot;bấm vào&quot; (click).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khi làm bất cứ điều gì, cần phải giải thích được tại sao mình làm điều đó (0:04-0:09).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả chia sẻ ví dụ về việc mua cà phê: không phải vì ánh sáng đẹp, mà vì quảng cáo</span></div>\n<p class=\"body-txt\">\n&quot;hơn 210 cốc cà phê&quot; với giá chưa tới 10 đô (2:57-3:04).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ví dụ khác về mua chảo: không phải vì chảo mà vì nó có &quot;7 chức năng&quot;, &quot;all-in-one&quot;,</span></div>\n<p class=\"body-txt\">\n&quot;không có chất độc, ceramic&quot; (3:36-3:46).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Việc mua hàng của chúng ta đều bị ảnh hưởng bởi quảng cáo; do đó, cần quan sát hành</span></div>\n<p class=\"body-txt\">\nvi của người dùng và hiểu lý do họ mua (4:25-4:30).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hai hành vi mua hàng được phân tích (cà phê và chảo) đều liên quan đến việc xây dựng</span></div>\n<p class=\"body-txt\">\n&quot;giá trị cao&quot; hay &quot;giá lớn&quot; của sản phẩm (5:48-5:56).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả giới thiệu khóa học viết quảng cáo gồm 16 bước, trong đó bài đầu tiên là cách</span></div>\n<p class=\"body-txt\">\nviết tiêu đề (6:18-6:25).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Để viết tiêu đề, ban đầu không cần sáng tạo ngay, mà hãy sưu tầm những mẫu tiêu đề</span></div>\n<p class=\"body-txt\">\nhay từ người khác (6:29-6:36).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tiêu chí của một tiêu đề &quot;hay&quot; là nó khiến người đọc bấm vào (6:38-6:40). Sự tò mò</span></div>\n<p class=\"body-txt\">\nkhông quan trọng bằng hành động nhấp chuột (7:20-7:25).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hiểu &quot;Why&quot; để định hướng hành động và quảng cáo: Từ việc tự hỏi &quot;Tại sao tôi làm điều</span></div>\n<p class=\"body-txt\">\nnày?&quot; đến việc thấu hiểu &quot;Tại sao khách hàng mua?&quot;, điểm cốt lõi là đào sâu động cơ và\n \nlý do thực sự đằng sau mọi hành vi. Điều này quan trọng vì nó chuyển trọng tâm từ việc\n \nchỉ nói về sản phẩm/tính năng sang việc thấu hiểu nhu cầu và mong muốn sâu sắc của\n \nkhách hàng, từ đó tạo ra thông điệp marketing có sức thuyết phục cao hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Giá trị lớn cụ thể &gt; Sự tò mò chung chung: Khách hàng hành động (mua hàng, bấm vào</span></div>\n<p class=\"body-txt\">\nliên kết) không chỉ vì tò mò mà vì họ nhận thấy một &quot;giá trị lớn&quot; cụ thể và rõ ràng được\n \ntruyền tải. Các ví dụ &quot;hơn 210 cốc cà phê&quot; hay &quot;7 chức năng trong một chảo&quot; cho thấy\n \nviệc định lượng hoặc mô tả cụ thể lợi ích sẽ hiệu quả hơn nhiều so với việc chỉ gợi sự tò\n \nmò mơ hồ. Điều này giúp các nhà quảng cáo tập trung vào việc truyền tải lợi ích thực sự\n \nthay vì tạo ra những nội dung &quot;câu view&quot; nhưng không chuyển đổi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tiêu đề &quot;hay&quot; là tiêu đề khiến khách hàng &quot;bấm vào&quot;: Tiêu chí duy nhất và tối thượng để</span></div>\n<p class=\"body-txt\">\nđánh giá một tiêu đề (hay bất kỳ nội dung quảng cáo nào) là khả năng thúc đẩy hành\n \nđộng mong muốn từ phía khách hàng (ví dụ: nhấp chuột). Điều này quan trọng vì nó\n \ncung cấp một thước đo hiệu quả rõ ràng, thực tế cho hoạt động marketing. Nó cũng\n \nkhuyến khích việc học hỏi và thử nghiệm dựa trên kết quả thực tế, thay vì chỉ dựa vào sự\n \nsáng tạo mang tính chủ quan.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Khi tôi hành động một cái điều gì đó thì tôi phải giải thích được là tại sao tôi làm cái điều đó.”\n \n“Bởi vì tất cả cái việc mình mua ngày hôm nay ấy, nó đều đang ảnh hưởng bởi các cái quảng\n \ncáo.”\n \n“Cái quan trọng nhất vẫn là người ta đã bấm vào đường link.”\n \n1.4 Cách viết tiêu đề dựa trên tiêu đề có sẵn\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi học này tập trung vào kỹ thuật tạo ra các tiêu đề và nội dung quảng cáo hấp</h3>\n<p class=\"body-txt\">\ndẫn, có tính kích thích cao mà không cần tiết lộ sản phẩm, nhằm tối ưu hóa tỷ lệ nhấp (click-\n \nthrough rate). Diễn giả hướng dẫn cách phân tích các tiêu đề gây tò mò trên internet và sử\n \ndụng trí tuệ nhân tạo (AI) như ChatGPT để tạo ra hàng loạt biến thể hoặc toàn bộ bài viết\n \ntheo dạng kể chuyện, có yếu tố kịch tính và cảm xúc. Mục tiêu là thu hút sự chú ý mạnh mẽ\n \ncủa người đọc thông qua việc khơi gợi các cảm xúc như tò mò, bất ngờ, sợ hãi hoặc tức giận,\n \nđồng thời tăng tốc độ học hỏi và sản xuất nội dung.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả bắt đầu bằng việc trình bày các ví dụ về tiêu đề bài báo, quảng cáo trên internet</span></div>\n<p class=\"body-txt\">\n(ví dụ: &quot;Nha khoa chuyên trồng răng implant tại TP.HCM&quot;, &quot;Lọ Lem có bằng lái ô tô sau\n \n18 năm được quyền Linh đưa đón&quot;, &quot;Thuê giúp việc chăm chồng bị liệt một lần quên đồ\n \nvề nhà lấy vừa mở cửa ra thấy cảnh tượng tôi đứng không vững&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ông nhấn mạnh rằng những tiêu đề này có khả năng kích thích sự tò mò, khiến người</span></div>\n<p class=\"body-txt\">\nđọc muốn bấm vào dù chưa biết nội dung bên trong.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả chỉ ra rằng điều quan trọng là tạo ra tiêu đề đánh vào cảm xúc như tò mò, vui,</span></div>\n<p class=\"body-txt\">\nbuồn, sợ hãi, hoặc tức giận.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ông giới thiệu cách sử dụng ChatGPT để hỗ trợ việc này:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phân tích tiêu đề: Copy một tiêu đề hay vào ChatGPT và yêu cầu nó phân tích &quot;tại sao</span></div>\n<p class=\"body-txt\">\ntiêu đề này lại kích thích người ta bấm vào&quot;. (Dù trong audio diễn giả thực hiện bước\n \nnày sau, nhưng ý chính là dùng AI để hiểu cấu trúc tiêu đề).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tạo tiêu đề mới: Dựa trên một mẫu tiêu đề có sẵn, yêu cầu ChatGPT soạn thảo 10 (hoặc</span></div>\n<p class=\"body-txt\">\nnhiều hơn) mẫu tiêu đề khác, với các từ khóa và yếu tố kịch tính mong muốn (ví dụ: &quot;thư\n \nký&quot;, &quot;trợ lý&quot;, &quot;nữ trẻ đẹp&quot;, &quot;bất ngờ&quot;, &quot;ngã quỵ&quot;, &quot;đột quỵ&quot;, &quot;chết đứng&quot;). Đặc biệt, nhấn\n \nmạnh việc không được tiết lộ sản phẩm trong tiêu đề.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Viết bài quảng cáo tự nhiên: Yêu cầu ChatGPT viết một bài quảng cáo tự nhiên theo dạng</span></div>\n<p class=\"body-txt\">\nkể chuyện (storytelling), mô tả một sản phẩm (ví dụ: kem dưỡng da), và chỉ định &quot;yếu tố\n \nkịch tính&quot; (ví dụ: &quot;bôi lên mặt đen như ma&quot;, &quot;làm người khác khiếp sợ nhưng sau đó thì\n \ntrở nên xinh đẹp&quot;), đồng thời không được tiết lộ sản phẩm trong bài viết.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả chia sẻ quy trình cá nhân của mình: Thường xuyên đọc các tiêu đề (không đọc</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">nội dung) trên các trang tin tức/quảng cáo. Khi thấy tiêu đề nào khiến mình muốn bấm</h3>\n<p class=\"body-txt\">\nvào, diễn giả sẽ chụp màn hình lại (kể cả khi đang di chuyển bằng cách bấm nút âm\n \nlượng và nút nguồn trên điện thoại) để sưu tầm. Sau đó, dùng AI để phân tích và tạo ra\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">nội dung tương tự.</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Kết luận: Việc sử dụng AI giúp tăng tốc độ học tập và sản xuất nội dung marketing một</span></div>\n<p class=\"body-txt\">\ncách hiệu quả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sức mạnh của tiêu đề không tiết lộ nội dung nhưng gây kích thích cảm xúc: Diễn giả</span></div>\n<p class=\"body-txt\">\nnhấn mạnh rằng một tiêu đề &quot;hay&quot; không nhất thiết phải mô tả rõ ràng nội dung hay sản\n \nphẩm, mà phải khơi gợi mạnh mẽ cảm xúc (tò mò, bất ngờ, sợ hãi, tức giận...). Điều này\n \ncực kỳ quan trọng vì nó là chìa khóa để tạo ra tỷ lệ nhấp cao, khiến người đọc không thể\n \ncưỡng lại việc bấm vào để thỏa mãn sự hiếu kỳ, từ đó tăng hiệu quả của chiến dịch\n \nmarketing.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">AI (ChatGPT) là công cụ tăng tốc độ học hỏi và sản xuất nội dung đáng kinh ngạc: Buổi</span></div>\n<p class=\"body-txt\">\ngiảng đã minh họa cụ thể cách dùng ChatGPT để phân tích cấu trúc của các tiêu đề hấp\n \ndẫn, sau đó yêu cầu nó tạo ra hàng chục biến thể khác nhau hoặc thậm chí viết toàn bộ\n \nbài quảng cáo theo dạng kể chuyện với yếu tố kịch tính. Insight này quan trọng vì nó mở\n \nra khả năng cho bất kỳ ai, kể cả người không có kỹ năng viết lách chuyên nghiệp, có thể\n \nnhanh chóng tạo ra nội dung marketing chất lượng cao, đột phá và tiết kiệm thời gian\n \nđáng kể.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Kỹ năng &quot;đọc tiêu đề&quot; và quy trình sưu tầm ý tưởng thực tế: Diễn giả chia sẻ bí quyết cá</span></div>\n<p class=\"body-txt\">\nnhân: thay vì đọc nội dung bài viết, chỉ tập trung &quot;đọc tiêu đề&quot; trên các trang báo, quảng\n \ncáo. Bất cứ tiêu đề nào kích thích mình bấm vào, hãy chụp màn hình lại ngay lập tức\n \n(thậm chí khi đang di chuyển) để tạo kho dữ liệu. Phương pháp này cung cấp một nguồn\n \ný tưởng marketing vô tận, là nền tảng vững chắc để sau này sử dụng AI phân tích và biến\n \ntấu, đảm bảo luôn có những ý tưởng mới mẻ và hiệu quả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Thế thì bây giờ mình chỉ cần hiểu là cứ có một cái mẫu gì đó khiến mình tò mò, hoặc là khiến\n \nmình vui, hoặc là khiến mình buồn, hoặc là khiến mình sợ hãi, hoặc khiến mình tức giận thì\n \nmình lưu lại.”\n \n“Cho nên ở đây là các bạn cứ bảo sao tôi viết tiêu đề hay là bởi vì tôi đọc tiêu đề và tôi thấy cái\n \nnào mà tôi muốn bấm vào thì tôi sưu tầm nó lại.”\n \n“tốc độ học tập của chúng ta nó phải tăng lên rất là nhanh.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Chương 2</h3>\n<p class=\"body-txt\">\n2.1 Có nên sử dụng AI để viết bài không?\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi này diễn giả tập trung vào việc phân tích cách sử dụng trí tuệ nhân tạo (AI)</h3>\n<p class=\"body-txt\">\ntrong sáng tạo nội dung, cụ thể là ChatGPT. Diễn giả nhấn mạnh rằng nội dung được tạo bởi\n \nAI thuần túy sẽ bị các nền tảng hạn chế phân bổ và khán giả cũng không muốn đọc. Thay vào\n \nđó, người học cần sử dụng AI một cách thông minh, không sao chép nguyên văn để tránh\n \nviệc kênh bị giảm tương tác và mất giá trị nội dung.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tầm quan trọng của việc tổng kết bài học: Giúp giảng viên nắm bắt được mức độ hiểu</span></div>\n<p class=\"body-txt\">\nbài của học viên, từ đó điều chỉnh phương pháp dạy.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hạn chế của việc sử dụng ChatGPT:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nội dung không an toàn: Không xác thực được nguồn gốc, dễ sai sót.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bản quyền: Gây ra vấn đề về sở hữu trí tuệ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thiếu giá trị sử dụng: Nội dung nhạt nhẽo, ai cũng có thể có, không tạo được sự khác</span></div>\n<p class=\"body-txt\">\nbiệt.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phân tích ví dụ thực tế về nội dung do AI tạo ra:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bài viết trên kênh &quot;Bác sĩ Hạnh&quot; về sự kiện y khoa sử dụng cấu trúc &quot;không chỉ là... mà</span></div>\n<p class=\"body-txt\">\ncòn...&quot;, &quot;với chúng tôi mỗi khóa học đều là... và cũng không ngoại lệ&quot; – đây là cấu trúc AI\n \nChatGPT thường xuyên sử dụng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bài viết này dù dài nhưng chỉ có 1 tương tác/bình luận, chứng tỏ nội dung không thu</span></div>\n<p class=\"body-txt\">\nhút.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">So sánh với nội dung khác: Những bài viết ngắn hơn nhưng có nhiều tương tác (63, 54</span></div>\n<p class=\"body-txt\">\nbình luận), cho thấy độ dài không quyết định chất lượng bằng sự tương tác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Kết luận về nội dung AI: Nội dung do AI viết mà không được biên tập lại sẽ không được</span></div>\n<p class=\"body-txt\">\nphân bổ (hạn chế hiển thị) bởi nền tảng và không được khán giả đón nhận.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lý do nền tảng không phân bổ nội dung AI: Nền tảng không muốn và khán giả cũng</span></div>\n<p class=\"body-txt\">\nkhông muốn đọc nội dung viết bởi AI.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bài học về sự quan sát: Cần quan sát cả những nội dung không tốt để rút ra bài học. Nội</span></div>\n<p class=\"body-txt\">\ndung viết dài chưa chắc đã tốt, mà quan trọng là tạo được tương tác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nguyên tắc sử dụng AI: Không copy-paste nguyên văn nội dung từ AI lên kênh vì điều đó</span></div>\n<p class=\"body-txt\">\nsẽ phá hủy kênh, dù nội dung có vẻ giống người thật viết.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nền tảng và khán giả đều không muốn nội dung do AI viết thuần túy: &quot;Nền tảng không</span></div>\n<p class=\"body-txt\">\nmuốn phân bổ cái nội dung của AI. Nhưng điều quan trọng hơn ấy là khán giả không\n \nmuốn đọc nội dung viết bởi AI.&quot; Điều này cực kỳ quan trọng vì nó định hướng cách\n \nchúng ta tiếp cận việc sáng tạo nội dung. Nếu mục tiêu là tiếp cận người dùng và được\n \nnền tảng ưu tiên, việc tạo ra nội dung AI nguyên bản là một sai lầm chết người.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sự tương tác là yếu tố cốt lõi, không phải độ dài: Diễn giả chứng minh bằng ví dụ cụ thể:</span></div>\n<p class=\"body-txt\">\nmột bài viết AI dài chỉ có 1 tương tác, trong khi bài viết ngắn hơn lại có hàng chục tương\n \ntác. Điều này cho thấy chất lượng nội dung không nằm ở độ dài hay sự phức tạp của từ\n \nngữ, mà ở khả năng chạm đến người đọc, gợi mở sự chia sẻ và thảo luận. Đây là insight\n \nquan trọng để tập trung vào giá trị thực sự của nội dung.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Copy-paste nội dung từ AI sẽ phá hủy kênh: &quot;Nếu mà mình cứ lặp đi lặp lại điều này thì</span></div>\n<p class=\"body-txt\">\nkênh của mình sẽ mất tương tác... dù rằng mình đọc rất giống người thì mình vẫn không\n \nđược quyền copy lên, đấy là cách mình phá hủy kênh của mình rất là mạnh mẽ.&quot; Đây là\n \nmột lời cảnh báo nghiêm túc về hậu quả của việc lạm dụng AI mà không có sự biên tập,\n \ncá nhân hóa. Nó nhấn mạnh sự cần thiết của yếu tố con người, sự độc đáo và giá trị riêng\n \ntrong mọi nội dung được xuất bản.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“ChatGPT nó đã rất là tốt cho mình, nhưng mà mình không được phép copy đâu chép vì nhiều\n \nlý do. Ở trong đó có lý do về cái nội dung của nó không an toàn.”\n \n“Nền tảng không muốn phân bổ cái nội dung của AI. Nhưng điều quan trọng hơn ấy là khán\n \ngiả không muốn đọc nội dung viết bởi AI.”\n \n“Viết dài chưa chắc đã là tốt.”\n \n2.2 Biện pháp tu từ trong tiếng Việt\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi học tập trung vào nghệ thuật &quot;tu từ&quot; trong tiếng Việt, định nghĩa đây là các</h3>\n<p class=\"body-txt\">\nbiện pháp ngôn ngữ nhằm làm cho câu văn, lời nói trở nên sinh động, giàu hình ảnh và cảm\n \nxúc, từ đó truyền tải thông điệp sâu sắc và gây ấn tượng. Diễn giả nhấn mạnh rằng việc sử\n \ndụng tu từ một cách có nghệ thuật là chìa khóa để viết &quot;hay&quot; và tạo cảm xúc – yếu tố quan\n \ntrọng dẫn dắt hành động. Đặc biệt, buổi học đi sâu vào biện pháp ẩn dụ, hướng dẫn cách sử\n \ndụng nó để so sánh gián tiếp một cách tinh tế, đặc biệt hữu ích trong các tình huống không\n \nđược phép so sánh trực tiếp như trong kinh doanh để tránh vi phạm luật cạnh tranh.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Định nghĩa Tu từ: Là một biện pháp ngôn ngữ được sử dụng để làm cho câu văn, lời nói</span></div>\n<p class=\"body-txt\">\ntrở nên sinh động, giàu hình ảnh và cảm xúc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mục đích của Tu từ:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Giúp tác giả truyền tải ý nghĩa sâu sắc.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tăng sức biểu đạt và gây ấn tượng với người nghe/đọc.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nổi bật thông điệp muốn truyền tải.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Làm cho bài viết trở nên &quot;hay&quot; và có nghệ thuật.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Giá trị của Tu từ: Là một &quot;nghệ thuật riêng có của tiếng Việt&quot; và là &quot;nét đẹp&quot; của tiếng</span></div>\n<p class=\"body-txt\">\nViệt mà các ngôn ngữ khác không thể có được. Người sử dụng thành thạo tu từ được coi\n \nlà &quot;người giỏi tiếng Việt&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cốt lõi của Tu từ: Tạo cảm xúc, vì &quot;cảm xúc dẫn dắt hành động&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Các biện pháp Tu từ phổ biến: So sánh, ẩn dụ, nhân hóa, điệp ngữ, phóng đại, quán dụ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">So sánh: Đối chiếu hai đối tượng khác nhau về một điểm chung (ví dụ: cái này tốt hơn/rẻ</span></div>\n<p class=\"body-txt\">\nhơn/bền hơn/nhanh hơn/thuận tiện hơn cái kia). Đây là phép tu từ thường được diễn\n \ngiả sử dụng trong các bài bán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ẩn dụ: Sử dụng hình ảnh này để nói về một hình ảnh khác có tính tương đồng (là một</span></div>\n<p class=\"body-txt\">\ndạng so sánh ngầm).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Để ẩn dụ hiệu quả, hai đối tượng được so sánh ngầm *phải có tính tương đồng* rõ ràng</span></div>\n<p class=\"body-txt\">\n(ví dụ: &quot;chó khôn&quot; và &quot;Sơn khôn&quot; đều có tính tương đồng là &quot;khôn&quot;). Nếu không có tính\n \ntương đồng (ví dụ: &quot;voi mạnh&quot; và &quot;Sơn mạnh&quot;), ẩn dụ sẽ không tạo ra cảm xúc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ứng dụng quan trọng của ẩn dụ trong marketing/bán hàng: Dùng để so sánh giá hoặc</span></div>\n<p class=\"body-txt\">\nđặc điểm sản phẩm/dịch vụ một cách gián tiếp khi luật cạnh tranh không cho phép so\n \nsánh trực tiếp (ví dụ: so sánh gián tiếp giá khóa học hoặc giá điện thoại của mình với\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><p class=\"body-txt\">\nmột sản phẩm nổi tiếng khác bằng cách chỉ nêu thông tin về sản phẩm kia và để khách\n \nhàng tự suy luận).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nhân hóa: Biến một vật hay hiện tượng thành con người (ví dụ: &quot;chiếc xe này chạy&quot; để</span></div>\n<p class=\"body-txt\">\nám chỉ chiếc xe chạy nhanh/tốt).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Thâm nho&quot;: Là cách người miền Bắc dùng để chỉ những người sử dụng ẩn dụ khéo léo,</span></div>\n<p class=\"body-txt\">\nchơi chữ một cách tinh tế, không nói thẳng ra. (Trong từ Hán Việt, &quot;nho&quot; thường liên\n \nquan đến mực, màu đen, và những người có học thức).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tu từ là công cụ tạo cảm xúc, và cảm xúc dẫn dắt hành động: Diễn giả nhấn mạnh rằng</span></div>\n<p class=\"body-txt\">\nmục tiêu cuối cùng của mọi thông điệp, đặc biệt trong kinh doanh, là khiến người\n \nnghe/đọc hành động. Tu từ là nghệ thuật giúp thông điệp chạm đến trái tim, tạo ra cảm\n \nxúc mạnh mẽ, từ đó thúc đẩy quyết định và hành vi. Đây là nền tảng cho marketing và\n \nbán hàng hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ẩn dụ là giải pháp chiến lược cho so sánh giá gián tiếp khi bị hạn chế: Trong môi trường</span></div>\n<p class=\"body-txt\">\nkinh doanh cạnh tranh, việc so sánh trực tiếp sản phẩm hoặc dịch vụ với đối thủ thường\n \nbị cấm hoặc không khéo léo. Ẩn dụ cung cấp một phương pháp tinh tế để gợi ý sự khác\n \nbiệt (ví dụ về giá trị hay chi phí) mà không vi phạm quy định, giúp doanh nghiệp truyền\n \ntải lợi thế cạnh tranh một cách thông minh và chuyên nghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tầm quan trọng của &quot;tính tương đồng&quot; trong ẩn dụ: Để một phép ẩn dụ phát huy tác</span></div>\n<p class=\"body-txt\">\ndụng và gây cảm xúc, hai đối tượng được so sánh ngầm *bắt buộc* phải có một điểm\n \nchung rõ ràng. Không có tính tương đồng sẽ khiến thông điệp trở nên vô nghĩa, không\n \ntạo được ấn tượng, và thậm chí gây khó hiểu, làm mất đi sức mạnh của tu từ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Tu từ là những biện pháp ngôn ngữ được sử dụng để diễn đạt nghệ thuật.”\n \n“Mỗi khi bạn cần cái bài của mình nó hay... thì ta phải sử dụng các biện pháp tu từ.”\n \n“Cảm xúc dẫn dắt hành động.”\n \n“Ẩn dụ là sử dụng hình ảnh này để nói về một hình ảnh khác có tính tương đồng.”\n \n2.3 Phép nhân hoá và hoán dụ\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi giảng tập trung vào các biện pháp tu từ trong tiếng Việt và cách ứng dụng</h3>\n<p class=\"body-txt\">\nchúng trong marketing để tạo ra thông điệp mạnh mẽ, khác biệt và gây ấn tượng. Diễn giả\n \ntrình bày chi tiết về nhân hóa, hoán dụ, so sánh, ẩn dụ, nói quá (thậm xưng), nói giảm nói\n \ntránh, điệp ngữ, chơi chữ, tượng thanh, tượng hình, liệt kê, đối, câu hỏi tu từ, và ngắt câu,\n \nđồng thời khuyến khích học viên sử dụng các biện pháp này để tạo ra văn phong độc đáo và\n \nthu hút. Việc sử dụng chatbot GPT để liệt kê các biện pháp tu từ cũng được đề cập, nhưng\n \ndiễn giả lưu ý rằng GPT vẫn còn hạn chế trong việc xử lý vần điệu tiếng Việt.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nhân hóa: Làm cho sự vật, hiện tượng không phải con người nhưng mang những hoạt</span></div>\n<p class=\"body-txt\">\nđộng, suy nghĩ giống như con người (ví dụ: con mắt biết nói, cái miệng biết cười).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hoán dụ: Gọi tên sự vật hiện tượng này bằng tên sự vật hiện tượng khác có mối quan hệ</span></div>\n<p class=\"body-txt\">\ngần gũi (ví dụ: &quot;Sơn ơi mày đừng sủa nữa&quot; - dùng tên &quot;Sơn&quot; để chỉ người cụ thể, hoặc\n \nthay đổi hình ảnh sự vật vào).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">So sánh: Đối chiếu sự vật hiện tượng này với sự vật hiện tượng khác để làm nổi bật đặc</span></div>\n<p class=\"body-txt\">\nđiểm (ví dụ: làn da trắng như tuyết).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ẩn dụ: Một phép so sánh ngầm, không dùng từ &quot;như&quot; hay &quot;là&quot; (ví dụ: anh ấy là một ngôi</span></div>\n<p class=\"body-txt\">\nsao sáng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nói quá (thậm xưng): Phóng đại sự thật để gây ấn tượng mạnh (ví dụ: nước mắt chảy</span></div>\n<p class=\"body-txt\">\nthành sông, máu chảy thành sông).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nói giảm nói tránh: Dùng những từ ngữ nhẹ nhàng hơn để tránh gây sốc hoặc giảm nhẹ</span></div>\n<p class=\"body-txt\">\ntính nghiêm trọng (ví dụ: về với thiên đường, ra đi mãi mãi, đã qua hai cái 50 thay vì nói\n \n&quot;chết&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Điệp ngữ: Lặp lại một thuật ngữ, từ, hoặc cụm từ để nhấn mạnh hoặc làm nổi bật ý (ví</span></div>\n<p class=\"body-txt\">\ndụ: mưa, mưa, trời tiếp tục mưa; ngon, ngon, ngon tuyệt; đau, đau, đau quá). Diễn giả\n \nnhấn mạnh đây là biện pháp mạnh, ít được sử dụng nhưng tạo sự khác biệt.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chơi chữ: Sử dụng các từ ngữ có âm, vần, điệu tương tự hoặc đối lập để tạo hiệu ứng hài</span></div>\n<p class=\"body-txt\">\nhước, châm biếm hoặc sâu sắc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tượng thanh: Từ mô tả âm thanh (ví dụ: rì rào, ào ào, ầm ầm, róc rách, leng keng). Biện</span></div>\n<p class=\"body-txt\">\npháp này thường kết hợp với phép láy.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tượng hình: Từ miêu tả hình ảnh (ví dụ: lơ thơ, phất phơ, phờ phạt, hốc hác, hùng hục,</span></div>\n<p class=\"body-txt\">\nhưng hức, lờ đờ, thon thả, lúng la lúng lính). Thường kết hợp với từ láy.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Liệt kê: Liệt kê các đối tượng, sự vật, hành động một cách đầy đủ không thiếu (ví dụ: hoa</span></div>\n<p class=\"body-txt\">\nhồng, hoa cúc, hoa lan đều tỏa sắc trong vườn).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Đối: Sắp xếp các câu, đoạn văn tương ứng, hài hòa để tạo sự cân bằng hoặc tương phản</span></div>\n<p class=\"body-txt\">\n(ví dụ: trăng soi đáy nước, nước soi bóng trăng; nước có thể ngăn bạn lại nhưng nước\n \ncũng có thể nâng bạn lên).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Câu hỏi tu từ: Câu hỏi mà không cần phải trả lời, dùng để gợi suy nghĩ, nhấn mạnh ý (ví</span></div>\n<p class=\"body-txt\">\ndụ: Sơn, em có phải là con người không? Liệu bạn có thể tìm thấy loại nào tốt hơn\n \nkhông?).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Kể chuyện: Kỹ thuật sẽ được học riêng trong một chuyên đề khác.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chuyển nghĩa: Chuyển nghĩa của từ để tạo ra một nghĩa mới, thường kết hợp với các</span></div>\n<p class=\"body-txt\">\nbiện pháp tu từ khác để tạo hình ảnh trực quan, nhiều màu sắc (ví dụ: mặt trời của mẹ,\n \ncủa để dành).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ngắt câu: Phá vỡ cấu trúc ngữ pháp thông thường, không tuân thủ quy tắc (bất quy tắc)</span></div>\n<p class=\"body-txt\">\nđể tạo nhịp điệu, mô tả sự gấp gáp, nhanh, mạnh, &quot;quá&quot; (ví dụ: hồi hộp. [xuống dòng] lo\n \nlắng. [xuống dòng]; lạnh. [xuống dòng] ướt. [xuống dòng] gió mạnh quá. [xuống dòng]).\n \nBiện pháp này tạo cảm xúc rất mạnh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">So sánh tương phản: So sánh hai cái khác nhau để làm nổi bật sự khác biệt, đưa đến sự</span></div>\n<p class=\"body-txt\">\nphân biệt rõ ràng (ví dụ: con chó này ngu quá, thằng Sơn kia thì rất khôn; trước đây tôi\n \nthường thế này, còn bây giờ tôi thường thế kia; tại sao tôi không còn làm cái này nữa mà\n \nbắt đầu làm cái kia).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lặp: Lặp lại cấu trúc câu, từ ngữ để tạo ra cảm xúc mạnh, mạnh hơn, mạnh nhất (ví dụ:</span></div>\n<p class=\"body-txt\">\nlạnh, lạnh tê tái, lạnh đến sun cả... mô tả 3 cấp độ lạnh).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sức mạnh của ngôn từ khác biệt: Diễn giả nhấn mạnh rằng các biện pháp tu từ như điệp</span></div>\n<p class=\"body-txt\">\nngữ, nói quá (thậm xưng), tượng thanh/tượng hình kết hợp với từ láy, ngắt câu... là\n \nnhững &quot;sức mạnh ngôn từ ít được sử dụng&quot;, do đó khi dùng sẽ giúp người viết/nói trở\n \nnên khác biệt và tạo hiệu ứng rất mạnh. Điều này quan trọng vì trong marketing, sự khác\n \nbiệt là chìa khóa để thu hút sự chú ý và ghi nhớ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ứng dụng để tạo cảm xúc và sự chú ý: Các biện pháp tu từ không chỉ làm đẹp câu chữ mà</span></div>\n<p class=\"body-txt\">\ncòn là công cụ đắc lực để tạo ra cảm xúc mạnh mẽ, mô tả sự gấp gáp, nhanh, mạnh, hoặc\n \nsự nhấn mạnh cao độ. Ví dụ, điệp ngữ làm nổi bật ý, nói quá gây ấn tượng, ngắt câu tạo\n \nnhịp điệu kịch tính. Điều này quan trọng vì cảm xúc là yếu tố then chốt trong việc thúc\n \nđẩy hành vi khách hàng và duy trì sự quan tâm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chatbot GPT chỉ là công cụ hỗ trợ, không thay thế sự sáng tạo: Diễn giả sử dụng GPT để</span></div>\n<p class=\"body-txt\">\nliệt kê các biện pháp tu từ nhưng cũng cảnh báo về hạn chế của nó trong việc xử lý tiếng\n \nViệt về vần và điệu. Điều này quan trọng vì nó nhắc nhở rằng AI có thể hỗ trợ về mặt kỹ\n \nthuật, nhưng khả năng sáng tạo, thấu hiểu ngữ cảnh và tạo ra các biện pháp tu từ tinh tế,\n \nphù hợp với mục tiêu cảm xúc vẫn đòi hỏi sự can thiệp và tinh chỉnh của con người.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Điệp ngữ chính là một cái sức mạnh ngôn từ ít được sử dụng nên khi bạn sử dụng thì bạn sẽ\n \ncó khả năng trở nên khác biệt.”\n \n“Nếu dạy tiếng Việt thì người ta gọi là giáo viên phổ thông. Còn nếu dạy tiếng Việt để làm\n \nmarketing thì người ta gọi là người truyền cảm hứng.”\n \n“Tức là chúng ta phá không còn cấu trúc ngữ pháp thông thường nữa. Tôi gọi là bất quy tắc.”\n \n2.4 Phương pháp liệt kê\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi học tập trung vào việc sử dụng các biện pháp tu từ trong tiếng Việt và ứng</h3>\n<p class=\"body-txt\">\ndụng ChatGPT như một trợ lý để nâng cao kỹ năng viết. Diễn giả đã trình bày một quy trình\n \ntư duy cấu trúc gồm 5 bước (Liệt kê, Sắp xếp, Lựa chọn, Sử dụng, Loại bỏ) giúp học viên viết\n \nvăn hay và hiệu quả, đặc biệt trong việc mô tả sản phẩm, dịch vụ hoặc truyền tải thông điệp\n \nmột cách ấn tượng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sức mạnh của ChatGPT trong việc &quot;liệt kê&quot;: ChatGPT rất hiệu quả trong việc liệt kê từ</span></div>\n<p class=\"body-txt\">\nkhóa trong tiếng Việt, đặc biệt là các từ tượng thanh và tượng hình, giúp người dùng\n \nkhông bị bí từ khi muốn mô tả một sự vật hay hiện tượng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quy trình cơ bản để viết mô tả:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Liệt kê: Yêu cầu ChatGPT liệt kê các từ liên quan đến đối tượng mô tả (ví dụ: 10 từ tượng</span></div>\n<p class=\"body-txt\">\nthanh mô tả cơn gió).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sắp xếp: Sắp xếp danh sách từ khóa theo một tiêu chí cụ thể (ví dụ: độ mạnh của cơn gió</span></div>\n<p class=\"body-txt\">\ntừ nhẹ đến mạnh).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lựa chọn: Chọn ra những từ phù hợp nhất với mục đích mô tả.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Viết thành câu: Sử dụng các từ đã chọn để viết thành câu, kết hợp với các biện pháp tu từ</span></div>\n<p class=\"body-txt\">\nkhác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ứng dụng các biện pháp tu từ:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phép lặp (lặp lại): Dùng để mô tả sự êm ái, nhẹ nhàng (ví dụ: cơn gió êm ái cho bối cảnh</span></div>\n<p class=\"body-txt\">\nlãng mạn).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phép thậm xưng (hyperbole): Dùng để mô tả sự dữ dội, hùng vĩ (ví dụ: cơn bão dữ dội</span></div>\n<p class=\"body-txt\">\ngiữa biển khơi).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Điệp ngữ (repetition for emphasis): Dùng để nhấn mạnh, tạo ấn tượng mạnh mẽ (ví dụ:</span></div>\n<p class=\"body-txt\">\nmô tả một bất động sản &quot;rộng, đẹp, sang trọng, đẳng cấp&quot; và &quot;gần hồ&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Tư duy cấu trúc&quot; (Hierarchical thinking): Đây là kỹ thuật tư duy mà diễn giả giới thiệu,</span></div>\n<p class=\"body-txt\">\ngiống như cấu trúc một cây với các nhánh lớn và nhỏ. Bắt đầu từ một từ gốc (ví dụ: &quot;các\n \nbiện pháp tu từ trong tiếng Việt&quot;), rẽ ra thành 20 nhánh nhỏ là 20 biện pháp tu từ khác\n \nnhau, và tiếp tục rẽ nhánh nhỏ hơn với các ví dụ và cách sử dụng cụ thể cho mỗi biện\n \npháp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Học và ứng dụng các biện pháp tu từ:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hiểu rõ từng biện pháp: nó là gì, tại sao cần, dùng như thế nào và ví dụ minh họa.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Kết hợp nhiều biện pháp tu từ cùng lúc để tạo ra hiệu quả cao hơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nguồn bổ sung từ khóa và kỹ thuật viết:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Đọc sách: Đọc nhiều sách, đặc biệt là các tác phẩm văn học kinh điển (như của</span></div>\n<p class=\"body-txt\">\nHemingway, Vũ Trọng Phụng, Nam Cao) và ca dao, tục ngữ, để tăng vốn từ vựng và học\n \nhỏi các kỹ thuật sử dụng ngôn từ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Văn học hiện đại (bài báo, quảng cáo): Giúp học viên nắm bắt văn phong (writing style).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Kết hợp: Kết hợp &quot;văn phong&quot; và &quot;biện pháp tu từ&quot; để tạo ra những tác phẩm tuyệt vời.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vai trò của ChatGPT: Là một trợ lý đắc lực giúp liệt kê, sắp xếp và gợi ý ý tưởng, nhưng</span></div>\n<p class=\"body-txt\">\nngười dùng phải &quot;viết lại&quot;, &quot;sắp xếp lại&quot;, &quot;chọn lọc&quot; và &quot;trau chuốt&quot; nội dung.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quy trình 5 bước viết bài hiệu quả:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Liệt kê: Đưa ra tất cả các phương án có thể.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sắp xếp: Tổ chức các phương án theo một trật tự hợp lý (ví dụ: từ mạnh đến yếu).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lựa chọn: Chọn những ý tưởng, từ ngữ tốt nhất.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sử dụng: Áp dụng các từ ngữ đã chọn vào việc viết câu, đoạn văn, kết hợp tu từ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Loại bỏ / Trau chuốt: Đọc lại, lược bỏ những phần không hay, không cần thiết để bài viết</span></div>\n<p class=\"body-txt\">\ncô đọng và sắc sảo hơn. Đây là quá trình &quot;viết ngắn, viết dài ra, rồi lại gạch đi cho ngắn\n \nlại&quot;.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tư duy cấu trúc (Hierarchical Thinking) là nền tảng để viết hay: Việc áp dụng một quy</span></div>\n<p class=\"body-txt\">\ntrình tư duy có cấu trúc (liệt kê, sắp xếp, lựa chọn, sử dụng, loại bỏ) giúp người viết vượt\n \nqua sự &quot;bí từ&quot; hay &quot;văn dốt&quot;. Nó không chỉ là công cụ cho việc viết mà còn là một phương\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><p class=\"body-txt\">\npháp giải quyết vấn đề tổng quát, cho phép tiếp cận bất kỳ nhiệm vụ sáng tạo nào một\n \ncách có hệ thống, thay vì chờ đợi cảm hứng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">ChatGPT là trợ lý đắc lực, không phải công cụ sao chép: Diễn giả nhấn mạnh ChatGPT</span></div>\n<p class=\"body-txt\">\ngiúp gợi ý từ khóa, sắp xếp ý tưởng và thậm chí tạo ra bản nháp, nhưng vai trò của con\n \nngười trong việc &quot;viết lại&quot;, &quot;chọn lọc&quot; và &quot;trau chuốt&quot; là không thể thay thế. Điều này\n \nđịnh vị AI như một công cụ mở rộng khả năng sáng tạo của con người, giúp tăng tốc quá\n \ntrình và nâng cao chất lượng, nhưng vẫn yêu cầu sự tham gia và thẩm định của người\n \nviết để đảm bảo tính độc đáo và cảm xúc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sức mạnh của biện pháp tu từ và vốn từ vựng phong phú: Nắm vững các biện pháp tu từ</span></div>\n<p class=\"body-txt\">\n(như tượng hình, tượng thanh, điệp ngữ, thậm xưng) và có vốn từ vựng dồi dào (có được\n \ntừ việc đọc văn học kinh điển, ca dao tục ngữ) là yếu tố then chốt để tạo ra những thông\n \nđiệp có chiều sâu, hình ảnh sống động và sức truyền cảm mạnh mẽ. Nó biến câu chữ\n \nthành công cụ giao tiếp hiệu quả, giúp bài viết không chỉ truyền đạt thông tin mà còn\n \nchạm đến cảm xúc của người đọc.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Các bạn luôn nhớ là mình phải viết lại.”\n \n“Liệt kê hết ra, sau đó chọn những thứ tốt nhất.”\n \n“Giỏi văn thì không ế được.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Chương 3</h3>\n<p class=\"body-txt\">\n3.1 Cấu trúc ngôn từ\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi học tập trung vào việc sử dụng AI (ChatGPT) để tạo ra ngôn từ mạnh mẽ và</h3>\n<p class=\"body-txt\">\ngiàu cảm xúc cho các bài viết marketing và bán hàng. Diễn giả hướng dẫn quy trình 4 bước:\n \nliệt kê, lựa chọn, đặt câu và làm gọn lại, áp dụng cho cả từ khóa mô tả cảm xúc và tính năng\n \nsản phẩm. Mục tiêu là giúp người học vượt qua hạn chế về vốn từ và tốc độ tư duy, biến họ\n \nthành &quot;chúa tể ngôn từ&quot; để sản xuất nội dung sinh động và hấp dẫn một cách nhanh chóng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ôn tập buổi 1: Học về cách sử dụng AI.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ôn tập buổi 2: Học về các biện pháp tu từ, sử dụng AI để xác định hàm lượng kiến thức</span></div>\n<p class=\"body-txt\">\nmới, và một cấu trúc phân cấp (hierarchy) để sắp xếp thông tin/nội dung.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Giới thiệu buổi 3: Tập trung vào &quot;những ngôn từ có khả năng tạo nên sức mạnh&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hướng dẫn sử dụng AI (ChatGPT):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mở một cửa sổ chat mới.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Yêu cầu AI liệt kê các từ khóa mô tả một cảm xúc cụ thể (ví dụ: &quot;liệt kê cho tôi những từ</span></div>\n<p class=\"body-txt\">\nkhóa mô tả cảm xúc ngạc nhiên&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả nhấn mạnh chiến lược &quot;bắt những con voi thì hãy liệt kê tất cả ra&quot; – liệt kê càng</span></div>\n<p class=\"body-txt\">\nnhiều từ khóa càng tốt.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quy trình 4 bước để tạo nội dung: Bước 1 (liệt kê danh sách từ khóa), Bước 2 (lựa chọn</span></div>\n<p class=\"body-txt\">\ntừ khóa mong muốn), Bước 3 (đặt câu với từ khóa đó), Bước 4 (làm gọn lại). Có thể sắp\n \nxếp các từ khóa theo độ mạnh yếu của cảm xúc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Áp dụng vào mô tả sản phẩm: Chọn các từ khóa đã liệt kê để mô tả một sản phẩm mới (ví</span></div>\n<p class=\"body-txt\">\ndụ: kính đeo mắt Meta View Rayban).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chỉnh sửa câu lệnh để viết đoạn văn bán hàng: Yêu cầu AI viết các mô tả đã chọn thành</span></div>\n<p class=\"body-txt\">\nmột đoạn văn để sử dụng cho bài bán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mô tả tính năng và lợi ích: Yêu cầu AI mô tả những tính năng và lợi ích mới của sản</span></div>\n<p class=\"body-txt\">\nphẩm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Minh họa thực tế: Diễn giả trình diễn chiếc kính Meta View Rayban ông đang đeo, sử</span></div>\n<p class=\"body-txt\">\ndụng các lệnh thoại để chụp ảnh và chia sẻ ảnh lên Facebook Story, chứng minh các tính\n \nnăng AI tích hợp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khẳng định giá trị của việc liệt kê: Việc liệt kê giúp ta vượt qua việc &quot;không làm được&quot;</span></div>\n<p class=\"body-txt\">\ntrước đây vì &quot;không liệt kê.&quot; Đây là phương pháp dễ làm nhất.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Kỹ thuật &quot;gọi tên chung&quot; từ khóa: Khi có một danh sách từ khóa (ví dụ: &quot;đáng kinh ngạc&quot;,</span></div>\n<p class=\"body-txt\">\n&quot;thật tuyệt vời&quot;), có thể hỏi AI &quot;Những từ khóa này gọi chung là gì?&quot; (AI trả lời: &quot;từ cảm\n \nthán&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Yêu cầu AI liệt kê thêm các từ khóa tương tự: Dựa trên nhóm từ khóa đã được gọi tên</span></div>\n<p class=\"body-txt\">\nchung (ví dụ: &quot;liệt kê thêm cho tôi 10 từ khóa tương tự&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phân loại từ khóa tính năng: Tương tự, một danh sách từ khóa như &quot;tốt, bền, đẹp, nhanh,</span></div>\n<p class=\"body-txt\">\ndễ&quot; được AI gọi chung là &quot;tính năng&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Kết luận về lợi ích của AI: Người dùng không còn sợ &quot;nghèo từ&quot; nữa. AI giúp bù đắp cho</span></div>\n<p class=\"body-txt\">\nviệc &quot;bộ xử lý não của mình nó xử lý ngôn từ không được&quot; hiệu quả, giúp ta thành &quot;chúa\n \ntể ngôn từ.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Gợi ý áp dụng với sách: Nếu có cuốn sách &quot;Thôi miên bằng ngôn từ,&quot; có thể chụp ảnh</span></div>\n<p class=\"body-txt\">\nmột trang có từ khóa và yêu cầu AI liệt kê thêm các từ khóa tương tự.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">AI là công cụ mở rộng tư duy ngôn ngữ, không chỉ là trợ lý viết: Diễn giả nhấn mạnh việc</span></div>\n<p class=\"body-txt\">\nAI giúp ta vượt qua &quot;nghèo từ,&quot; &quot;bộ xử lý não của mình nó xử lý ngôn từ không được\n \nnhanh.&quot; Điều này quan trọng vì nó định vị AI không chỉ là một công cụ tạo ra câu chữ sẵn\n \ncó, mà là một đối tác trong quá trình tư duy, giúp người dùng khám phá, phân loại và mở\n \nrộng vốn từ vựng, từ đó làm phong phú khả năng diễn đạt của chính họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phương pháp &quot;Liệt kê – Lựa chọn – Viết – Gọn&quot; là nền tảng để tạo nội dung hiệu quả: Quy</span></div>\n<p class=\"body-txt\">\ntrình 4 bước này được diễn giả giới thiệu và áp dụng xuyên suốt, cung cấp một cấu trúc\n \nrõ ràng, dễ lặp lại cho việc sáng tạo nội dung. Nó giúp người dùng phá vỡ rào cản &quot;không\n \nbiết bắt đầu từ đâu,&quot; chuyển từ việc tự sáng tạo từ con số 0 sang việc chọn lọc và điều\n \nhướng thông tin có sẵn từ AI để đạt được mục tiêu cụ thể.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khả năng phân loại và mở rộng từ khóa của AI giúp làm giàu nội dung một cách hệ</span></div>\n<p class=\"body-txt\">\nthống: Việc có thể hỏi AI &quot;Những từ khóa này gọi chung là gì?&quot; và &quot;Hãy liệt kê thêm từ\n \nkhóa tương tự&quot; là một bước tiến giá trị. Nó không chỉ cung cấp thêm từ mà còn giúp\n \nngười dùng hiểu sâu hơn về bản chất và ngữ cảnh sử dụng của các nhóm từ, từ đó xây\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><p class=\"body-txt\">\ndựng các bộ từ khóa chủ đề (cảm xúc, tính năng) có chiều sâu và đa dạng, rất hữu ích cho\n \nviệc phát triển các chiến dịch marketing có định hướng và nhất quán.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Bắt những con voi thì hãy liệt kê tất cả ra.”\n \n“Mới gọi là ChatGPT chứ này!”\n \n“Quan trọng nhất là mình sử dụng cái từ khóa gì. Nó làm cho cái bài viết của mình nó sinh\n \nđộng lên, nó hào hứng lên.”\n \n3.2 Phân tích tiêu đề vì sao nó hay\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi giảng tập trung vào việc sử dụng Trí tuệ nhân tạo (AI), đặc biệt là các công cụ</h3>\n<p class=\"body-txt\">\nchatbot như ChatGPT, để phân tích và tạo ra các tiêu đề, nội dung marketing hấp dẫn. Diễn\n \ngiả hướng dẫn học viên cách đặt câu lệnh hiệu quả cho AI để khai thác các yếu tố tâm lý như\n \nFOMO (Fear Of Missing Out), lời hứa giá trị, thu hẹp đối tượng mục tiêu và sử dụng các biện\n \npháp tu từ, nhằm tạo ra những thông điệp marketing mạnh mẽ và độc đáo. Cốt lõi là rèn\n \nluyện kỹ năng phân tích và ra lệnh để AI trở thành công cụ hỗ trợ sáng tạo đắc lực.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phân tích tiêu đề hiện có: Bắt đầu bằng việc tìm một tiêu đề gây tò mò trên báo chí (ví</span></div>\n<p class=\"body-txt\">\ndụ: Tin 24h), sau đó yêu cầu AI phân tích lý do tiêu đề đó hấp dẫn (ví dụ: &quot;Chú ý những\n \nđiều này, người dùng sẽ không thất vọng với smartphone giá rẻ&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tạo tiêu đề mới dựa trên tâm lý FOMO: Yêu cầu AI liệt kê các cách viết tiêu đề đánh vào</span></div>\n<p class=\"body-txt\">\ntâm lý sợ bỏ lỡ cơ hội (FOMO - Fear Of Missing Out).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sử dụng kỹ thuật tu từ trong nội dung: Hướng dẫn yêu cầu AI liệt kê các cách khen (hoặc</span></div>\n<p class=\"body-txt\">\ncảm ơn) một cách sáng tạo, sử dụng nhiều biện pháp tu từ như tượng thanh, tượng hình\n \nđể làm cho nội dung phong phú và ấn tượng hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Xây dựng lời hứa về giá trị (Value Proposition): Yêu cầu AI liệt kê các ví dụ về lời hứa giá</span></div>\n<p class=\"body-txt\">\ntrị trong tiêu đề (ví dụ: &quot;tăng doanh thu gấp đôi trong vòng 3 tháng,&quot; &quot;cải thiện năng suất\n \nlên đến 200% chỉ sau một tuần&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thu hẹp đối tượng (Targeting): Nhấn mạnh tầm quan trọng của việc thu hẹp đối tượng</span></div>\n<p class=\"body-txt\">\nmục tiêu để làm cho tiêu đề hấp dẫn hơn với nhóm cụ thể.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Kết hợp các yếu tố để tạo tiêu đề mạnh mẽ: Yêu cầu AI tạo nhiều mẫu tiêu đề gây chú ý</span></div>\n<p class=\"body-txt\">\nmạnh, sử dụng kết hợp các yếu tố như FOMO, lời hứa về giá trị, thu hẹp đối tượng và nêu\n \nbật giá trị độc đáo (ví dụ về sản phẩm chức năng sinh lý).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quy trình lặp lại (Iterative process): Nhấn mạnh việc liên tục thử nghiệm, viết lại, và</span></div>\n<p class=\"body-txt\">\nđánh giá các tiêu đề do AI tạo ra để tìm ra cái hiệu quả nhất.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Kỹ năng &quot;phân tích&quot; là cốt lõi để ra lệnh cho AI hiệu quả: Diễn giả nhấn mạnh việc &quot;phân</span></div>\n<p class=\"body-txt\">\ntích tại sao bài này hay, phân tích tại sao cái câu này hay&quot; giống như kỹ năng phân tích\n \nvăn học. Điều này quan trọng vì nó giúp người học hiểu sâu sắc các yếu tố làm nên một\n</p></div></div>",
