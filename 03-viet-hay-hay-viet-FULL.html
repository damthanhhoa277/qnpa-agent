"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Năng lực lựa chọn và Quyền chọn: Việc &quot;lựa chọn&quot; đòi hỏi năng lực và đôi khi cả &quot;quyền</span></div>\n<p class=\"body-txt\">\nđược chọn&quot;. Quyền này có thể đến từ việc là thành viên của một cộng đồng, có địa vị ảnh\n \nhưởng, hoặc có khả năng tài chính.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ví dụ thực tế: Mua sản phẩm, mua điện thoại iPhone (so sánh, giá, bảo hành, kích thước,</span></div>\n<p class=\"body-txt\">\nchức năng), sắp xếp vật dụng cá nhân.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Framework &quot;Liệt kê, sắp xếp, lựa chọn&quot; là chìa khóa để đạt được sự rõ ràng và hiệu quả:</span></div>\n<p class=\"body-txt\">\nĐây là nguyên tắc xuyên suốt cả buổi giảng, được áp dụng cho mọi khía cạnh từ tiếp thị,\n \nkinh doanh đến đời sống cá nhân. Nó giúp biến những ý tưởng, vấn đề phức tạp thành\n \nmột quy trình có cấu trúc, dễ quản lý và tối ưu hóa. Sự lặp lại liên tục của cụm từ này cho\n \nthấy tầm quan trọng của nó trong việc định hình tư duy logic.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thử nghiệm và Đo lường là không thể thiếu để tối ưu hóa: Việc liệt kê, sắp xếp, lựa chọn</span></div>\n<p class=\"body-txt\">\nkhông phải là điểm dừng. Diễn giả nhấn mạnh việc thử nghiệm (tiêu đề, biện pháp tu từ)\n \nvà đo lường kết quả (tỷ lệ click, chuyển đổi) để tìm ra phương án hiệu quả nhất. Điều\n \nnày giúp tránh việc đưa ra quyết định dựa trên cảm tính và đảm bảo rằng các chiến lược\n \nđược áp dụng mang lại hiệu quả thực sự.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hiểu sâu sắc vấn đề, mong muốn, và cảm xúc của khách hàng là nền tảng của thành công:</span></div>\n<p class=\"body-txt\">\nToàn bộ quá trình tạo nội dung và kinh doanh đều xoay quanh việc nắm bắt được những\n \ngì khách hàng thực sự muốn, những nỗi đau họ đang gặp phải, và những cảm xúc mình\n \nmuốn gợi lên. Việc lựa chọn giải pháp cần ưu tiên những vấn đề mà khách hàng mong\n \nmuốn nhất và bản thân ta có thể giải quyết tốt hơn đối thủ. Điều này đặt khách hàng vào\n \ntrung tâm của mọi chiến lược.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Quyền chọn&quot; là một yếu tố quyết định hành động và kết quả: Khái niệm này mang lại</span></div>\n<p class=\"body-txt\">\nmột góc nhìn sâu sắc về việc ra quyết định. Không phải ai cũng có &quot;quyền&quot; để lựa chọn,\n \nquyền này thường đi kèm với những điều kiện tiên quyết (tư cách thành viên, năng lực,\n \ntài chính). Điều này quan trọng vì nó cho thấy để thực sự có thể &quot;lựa chọn&quot; và thực hiện\n \nchiến lược, một người cần phải xây dựng nền tảng và vị thế nhất định.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Nếu mọi thứ đều làm theo cách này, nó không còn hỗn loạn nữa.”\n \n“Bạn không có quyền chọn.”\n \n“Cái việc viết và việc kinh doanh có thể chả liên quan gì đến nhau... Cả hai người đều đúng hết\n \nđấy.”\n \n8.5 Lựa chọn câu chuyện kể\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi giảng tập trung vào sức mạnh của sự lựa chọn cá nhân và vai trò của những</h3>\n<p class=\"body-txt\">\ncâu chuyện chúng ta tự kể cho mình. Diễn giả nhấn mạnh rằng thành công hay thất bại phụ\n \nthuộc vào việc chúng ta chọn lắng nghe, tin tưởng và hành động theo điều gì. Buổi học\n \nkhuyến khích học viên chủ động chọn lọc ngôn từ, môi trường xung quanh để xây dựng một\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#388e3c\">nội dung tích cực, từ đó biến những thách thức thành lợi thế và không bị ảnh hưởng bởi</h3>\n<p class=\"body-txt\">\nnhững yếu tố tiêu cực bên ngoài.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả bắt đầu bằng việc đề cập đến một học viên nữ và khẳng định rằng học viên đó</span></div>\n<p class=\"body-txt\">\nđã &quot;lựa chọn&quot; không học được gì, và đây có thể là lần cuối cùng họ gặp nhau.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nguyên tắc kinh doanh của diễn giả là người mua phải nhận được giá trị cao hơn số tiền</span></div>\n<p class=\"body-txt\">\nhọ bỏ ra. Diễn giả dẫn chứng bằng câu chuyện của một học viên tên Ngô Thị Mai đã áp\n \ndụng kiến thức và kiếm được 20 triệu đồng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả khẳng định sự khác biệt giữa các học viên là &quot;lựa chọn của mỗi người&quot; trong lớp</span></div>\n<p class=\"body-txt\">\nhọc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Việc tự kể những câu chuyện tiêu cực cho bản thân (&quot;gia đình bạn, mẹ bạn không thích</span></div>\n<p class=\"body-txt\">\nđiều này...&quot;) sẽ cản trở khả năng tiến lên và thành công.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả chia sẻ rằng bản thân cũng đối mặt với nhiều cản trở từ gió, bão, những lời</span></div>\n<p class=\"body-txt\">\nkhuyên không giống ý diễn giả, nhưng ông chọn không lắng nghe những điều đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Việc của chúng ta là lựa chọn những ngôn từ phù hợp đi vào tai và mắt mình, chọn sách</span></div>\n<p class=\"body-txt\">\nđể đọc, chọn người bạn để chơi, chọn người diễn giả để học, bởi vì chúng bổ sung &quot;vốn\n \ntừ khóa&quot; phù hợp và mang lại sức mạnh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả liệt kê các từ khóa tích cực như: &quot;tuyệt vời, may mắn, hạnh phúc, làm, đạt được,</span></div>\n<p class=\"body-txt\">\ncố gắng, nỗ lực, thêm một lần nữa, không nản lòng, có chí thì nên, gần mực thì đen gần\n \nđèn thì sáng&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả kể câu chuyện bản thân bị nói xấu, chửi bới trên mạng xã hội nhưng ông không</span></div>\n<p class=\"body-txt\">\nđể điều đó ảnh hưởng, thậm chí biến nó thành một bài viết có 1,4 nghìn lượt tương tác\n \nvà 232 comment.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả ví mình như một &quot;thùng rác&quot; – mọi người mang &quot;rác rưởi&quot; (vấn đề, khó khăn, sự</span></div>\n<p class=\"body-txt\">\nđau khổ) đến cho diễn giả khi họ gặp chuyện không vui, nhưng khi họ giàu có, hạnh phúc\n \nthì lại không nhớ đến diễn giả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả không có nhu cầu nhớ những câu chuyện tiêu cực hay những người chỉ mang</span></div>\n<p class=\"body-txt\">\nvấn đề đến. Sau khi giúp giải quyết, diễn giả &quot;xóa nó đi&quot; khỏi tâm trí mình.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sức mạnh tuyệt đối của sự lựa chọn cá nhân: Diễn giả liên tục nhấn mạnh &quot;lựa chọn của</span></div>\n<p class=\"body-txt\">\nmỗi người&quot; là yếu tố cốt lõi quyết định kết quả. Điều này quan trọng vì nó đặt trách\n \nnhiệm và quyền năng vào tay mỗi cá nhân, khuyến khích họ chủ động kiểm soát cuộc đời\n \nmình thay vì đổ lỗi cho hoàn cảnh hay người khác. Việc bạn chọn tiếp thu gì, tin tưởng\n \nđiều gì, và hành động như thế nào sẽ định hình tương lai của bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Kiểm soát và chọn lọc ngôn từ, câu chuyện nội tâm: Diễn giả chỉ ra rằng những câu</span></div>\n<p class=\"body-txt\">\nchuyện (tiêu cực) chúng ta tự kể cho mình sẽ cản trở sự phát triển. Ngược lại, việc lựa\n \nchọn những ngôn từ tích cực và môi trường tích cực (sách, bạn bè, diễn giả) sẽ bổ sung\n \n&quot;vốn từ khóa&quot; mạnh mẽ, giúp chúng ta có tư duy đúng đắn để hành động. Insight này\n \nquan trọng vì nó định hình tư duy, niềm tin và hành vi của mỗi người, là nền tảng cho\n \nmọi thành công hay thất bại.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Biến khó khăn thành lợi thế và thực hành &quot;xóa sổ rác rưởi&quot;: Diễn giả không tránh né</span></div>\n<p class=\"body-txt\">\nnhững lời tiêu cực mà chủ động xử lý chúng (ví dụ: biến lời chửi bới thành bài viết có\n \ntương tác) và không để chúng ảnh hưởng đến mình. Thậm chí, khi mọi người tìm đến\n \ndiễn giả với vấn đề, diễn giả giúp họ giải quyết nhưng không &quot;nhớ&quot; những câu chuyện\n \ntiêu cực đó sau khi xong việc. Điểm này quan trọng vì nó cung cấp một phương pháp\n \nthực tiễn để đối phó với tiêu cực từ bên ngoài và bảo vệ năng lượng, tinh thần của bản\n \nthân để tập trung vào mục tiêu tích cực.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Người khác phải nhận được giá trị, người mua hàng phải nhận được giá trị cao hơn số tiền\n \nanh ta bỏ ra.”\n \n“Gió thổi to như thế mà tôi còn điếc, nữa là lời nói của những người tôi không muốn nghe.”\n \n“Gần mực thì đen, gần đèn thì sáng.”\n \n8.6 Kể chuyện cho bản thân nghe\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi học này nhấn mạnh rằng cuộc đời chúng ta là tổng hòa những câu chuyện mà</h3>\n<p class=\"body-txt\">\nchúng ta tự kể cho mình nghe. Để thay đổi cuộc sống, chúng ta phải thay đổi những câu\n \nchuyện nội tại đó, từ bỏ những câu chuyện kìm hãm và lựa chọn những câu chuyện giúp\n \nmình tiến lên. Diễn giả cũng chỉ ra rằng việc tự nhận thức về &quot;cái sai&quot; hoặc &quot;cái chưa tốt&quot; là\n \nrất khó, thường cần góc nhìn khách quan và thước đo cụ thể, đồng thời kêu gọi học viên tận\n \ndụng cơ hội và hành động ngay lập tức để không bị tụt hậu, nếu không sẽ bị cuộc sống &quot;chôn\n \nvùi&quot;.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cuộc sống và hoàn cảnh hiện tại (kinh doanh, bán chịu, di chuyển) đều là những câu</span></div>\n<p class=\"body-txt\">\nchuyện chúng ta tự lựa chọn và kể cho mình nghe.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nếu tiếp tục tin vào những câu chuyện tiêu cực, cuộc đời sẽ không thay đổi; cần lựa chọn</span></div>\n<p class=\"body-txt\">\nkể những câu chuyện giúp mình tiến lên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Câu chuyện phá hủy&quot; là khi chúng ta trao quyền quyết định cuộc đời mình cho người</span></div>\n<p class=\"body-txt\">\nkhác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Những người đang &quot;sai&quot; (ví dụ: say rượu, bị bệnh thần kinh) thường không tự nhận thức</span></div>\n<p class=\"body-txt\">\nđược cái sai của mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Để nhận ra cái sai hoặc vấn đề của bản thân, cần có góc nhìn khách quan từ bên ngoài</span></div>\n<p class=\"body-txt\">\n(người không uống, bác sĩ chuyên ngành).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cần nhìn vào các tiêu chí cuộc sống tốt/không tốt để đánh giá khách quan, thay vì tự</span></div>\n<p class=\"body-txt\">\nnhận định chủ quan (ví dụ: có tiền thật sự là bao nhiêu, người giàu không nói mình\n \ngiàu).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sức mạnh thực sự không nằm ở tiền bạc mà ở tâm lý/thái độ của chúng ta với tiền.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Những người trẻ phải tận dụng cơ hội để vươn lên ngay lập tức, vì khi có tuổi, sức mạnh</span></div>\n<p class=\"body-txt\">\nvà cơ hội sẽ không còn đủ.\n</p></div></div>",

an class=\"bul-txt\">Vì sao quan trọng: Đây là nền tảng của toàn bộ bài giảng, đặt trách nhiệm cá nhân lên</span></div>\n<p class=\"body-txt\">\nhàng đầu. Nó giải phóng chúng ta khỏi việc đổ lỗi cho hoàn cảnh và trao quyền năng thay\n \nđổi cuộc đời bằng cách thay đổi góc nhìn và niềm tin cốt lõi. Nó định hình lại &quot;sự thật&quot;\n \nthành &quot;lựa chọn&quot;, một sự chuyển dịch tư duy mạnh mẽ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Người say sẽ không bao giờ biết mình say. Để nhận ra sai lầm của bản thân, cần có góc</span></div>\n<p class=\"body-txt\">\nnhìn khách quan từ bên ngoài hoặc tiêu chí cụ thể.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Giải quyết vấn đề tự lừa dối và thiếu nhận thức khách quan, một cản</span></div>\n<p class=\"body-txt\">\ntrở lớn trong phát triển cá nhân và kinh doanh. Nó khuyến khích sự khiêm tốn, tìm kiếm\n \nphản hồi và sử dụng các chỉ số đo lường cụ thể thay vì chỉ dựa vào cảm tính. Điều này\n \nđặc biệt quan trọng trong kinh doanh, nơi hiệu quả có thể được đo lường rõ ràng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Người trẻ phải tận dụng cơ hội để vươn lên ngay lập tức, vì khi có tuổi, sức mạnh và cơ</span></div>\n<p class=\"body-txt\">\nhội sẽ không còn đủ; những người đã làm họ đã đi xa lắm rồi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Tạo ra cảm giác cấp bách và trách nhiệm cá nhân trong việc hành</span></div>\n<p class=\"body-txt\">\nđộng. Nó nhấn mạnh lợi thế về thời gian và năng lượng của tuổi trẻ, khuyến khích học\n \nviên không trì hoãn. Việc so sánh với những người đã &quot;đi xa&quot; càng làm nổi bật rủi ro của\n \nviệc không hành động, phù hợp với bối cảnh kinh doanh cạnh tranh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cần liên tục mở rộng khả năng bằng cách trải nghiệm những điều mới lạ, học hỏi những</span></div>\n<p class=\"body-txt\">\nđiều cơ bản nhất, nếu không cuộc sống sẽ &quot;chôn vùi&quot; chúng ta và ta sẽ &quot;băng hà trong khi\n \nmình còn đang sống&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Vượt ra khỏi những thước đo vật chất thông thường của thành công</span></div>\n<p class=\"body-txt\">\nđể tập trung vào nội lực và sự phát triển liên tục. Nó khuyến khích tư duy học hỏi suốt\n \nđời, thích nghi và không ngừng thử thách bản thân, điều tối quan trọng trong một lĩnh\n \nvực thay đổi nhanh như internet marketing.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Nếu mình tiếp tục tin vào những câu chuyện đó thì cuộc đời mình nó như vậy.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Những người say sẽ không bao giờ biết mình sai.”\n \n“Cái mạnh nó không nằm ở tiền. Cái mạnh nó nằm ở tâm lý của chúng ta với tiền.”\n \n“Chúng ta băng hà trong khi mình còn đang sống.”\n \n8.7 Hãy là người nắm bắt cơ hội\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi giảng này nhấn mạnh sự cần thiết phải thay đổi tư duy và cách thức kinh</h3>\n<p class=\"body-txt\">\ndoanh trong bối cảnh thị trường đang biến đổi nhanh chóng với sự xuất hiện của các đối thủ\n \nmới. Diễn giả kêu gọi học viên không chỉ học rời rạc từng công cụ marketing mà phải học\n \ncách xây dựng một hệ thống kinh doanh tổng thể, tự động hóa để đối phó với những &quot;cơn\n \nbão&quot; mới. Đồng thời, buổi học cũng nhắc nhở về tầm quan trọng của tâm lý và sự xứng đáng\n \nđể đạt được thành công bền vững.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Buổi giảng triệu tập những người đã và đang là thành viên của Eagle Club để tham gia</span></div>\n<p class=\"body-txt\">\nkhóa học IPS 13, coi đây là cơ hội để biến nỗ lực thành tiền bạc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Học viên được khuyến khích xem xét giá trị thực sự của khóa học IPS 13 không chỉ là</span></div>\n<p class=\"body-txt\">\nviệc bán được 50 chiếc điện thoại trong đời mà là khả năng tăng thêm 50 chiếc điện\n \nthoại trong một tháng với kiến thức IPS.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nội dung quan trọng của IPS đã bị bỏ qua hoặc chỉ được tiếp cận theo cách truyền thống</span></div>\n<p class=\"body-txt\">\ntrong công việc kinh doanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Học viên cần &quot;có mặt&quot; và đến với khóa học như một &quot;tờ giấy trắng&quot;, xóa bỏ những kiến</span></div>\n<p class=\"body-txt\">\nthức đã biết trước đây để tiếp thu toàn bộ hệ thống.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Không nên học theo kiểu &quot;nhặt từng viên gạch&quot; (từng công cụ như YouTube, Facebook,</span></div>\n<p class=\"body-txt\">\nemail marketing) mà phải học cách &quot;xây một lâu đài&quot; (một hệ thống kinh doanh tự động\n \nhoàn toàn trên internet).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Một hệ thống kinh doanh thành công cần không phụ thuộc vào khách hàng, sản phẩm,</span></div>\n<p class=\"body-txt\">\nthời gian hay địa lý.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Thị trường đang đối mặt với những &quot;cơn bão&quot; như Temu, Shein, có thể sẽ làm mưa làm</span></div>\n<p class=\"body-txt\">\ngió và lật đổ cấu trúc thị trường online.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Những người đang kinh doanh quần áo, mỹ phẩm, thực phẩm chức năng, thời trang theo</span></div>\n<p class=\"body-txt\">\ncách cũ sẽ &quot;biến mất&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Đây là thời điểm cần phải cập nhật những cách kinh doanh mới, những cách thức kinh</span></div>\n<p class=\"body-txt\">\ndoanh mới để không bị ảnh hưởng bởi sự thay đổi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khóa học &quot;Lập trình vận mệnh&quot; và IPS là hai khóa học không thể bỏ qua, giúp duy trì</span></div>\n<p class=\"body-txt\">\ncuộc hội thoại và sự kết nối với diễn giả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Đối với người lần đầu đi học, diễn giả yêu cầu giơ tay để nhận diện.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Việc vào Eagle Club là một con đường và thách thức, đòi hỏi sự xứng đáng và là lựa chọn</span></div>\n<p class=\"body-txt\">\nhàng đầu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cần làm những việc cần phải làm để có những điều mình chưa từng có.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tâm lý chiếm 80% thành công trong cuộc đời.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Buổi học thứ 8 (của khóa học IPS hoặc Eagle Club) nhấn mạnh lý do nếu chúng ta không</span></div>\n<p class=\"body-txt\">\nlàm thì sẽ &quot;biến mất khỏi lớp học này rồi&quot;.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chuyển đổi tư duy từ &quot;nhặt từng viên gạch&quot; sang &quot;xây một lâu đài&quot;: Điểm này cực kỳ</span></div>\n<p class=\"body-txt\">\nquan trọng vì nó thay đổi toàn bộ cách tiếp cận việc học và kinh doanh. Thay vì học các\n \nkỹ năng riêng lẻ (marketing trên YouTube, Facebook, email), học viên được khuyến\n \nkhích học cách tích hợp chúng thành một hệ thống vận hành tổng thể, tự động và bền\n \nvững trên internet. Điều này giúp doanh nghiệp có khả năng chống chịu tốt hơn trước\n \ncác biến động thị trường và mở rộng quy mô hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sự xuất hiện của các đối thủ mới và tác động của nó: Việc diễn giả cảnh báo về Temu và</span></div>\n<p class=\"body-txt\">\nShein là một insight đắt giá về bối cảnh thị trường thực tế. Nó nhấn mạnh rằng những\n \nphương pháp kinh doanh truyền thống hoặc &quot;cũ&quot; sẽ bị đào thải. Điều này buộc các doanh\n \nnghiệp phải liên tục đổi mới, cập nhật cách thức hoạt động, nếu không sẽ &quot;biến mất&quot;.\n \nĐây là lời cảnh tỉnh mạnh mẽ về sự cạnh tranh khốc liệt và tầm quan trọng của sự thích\n \nnghi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tâm lý chiếm 80% thành công: Đây là một tuyên bố mạnh mẽ về tầm quan trọng của yếu</span></div>\n<p class=\"body-txt\">\ntố nội tại con người. Diễn giả không chỉ nói về kỹ năng hay công cụ mà còn nhấn mạnh\n \nvai trò quyết định của thái độ, niềm tin và sự tự tin. Điều này ngụ ý rằng, dù có học được\n \nkỹ thuật giỏi đến đâu, nếu không có tâm lý vững vàng, tích cực và sự tin tưởng vào bản\n \nthân thì thành công cũng khó đạt được.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Chúng ta không phải là học để xây một bức tường, không phải là nhặt viên gạch YouTube\n \nđóng vào với viên gạch Facebook để rồi ghép với viên gạch email marketing. Mà các bạn đi học\n \nlại lần này phải nhìn lại nó như một hệ thống tổng thể, chúng ta đang tìm cách xây dựng một\n \nlâu đài.”\n \n“Những người đang bán quần áo, mỹ phẩm, thực phẩm chức năng, thời trang theo cách cũ sẽ\n \nbiến mất. Nên bây giờ là thời điểm bạn cần phải cập nhật những cách kinh doanh mới, những\n \ncách thức kinh doanh mới để khi cơn bão Temu và Shein xuất hiện, bạn không bị ảnh hưởng.”\n \n“Tâm lý chiếm 80% thành công trong cuộc đời.”\n \n8.8 Bạn cần phải học Sale Success System\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi giảng này tập trung vào việc nhấn mạnh tầm quan trọng của việc học và áp</h3>\n<p class=\"body-txt\">\ndụng ngay lập tức khóa học &quot;Sales Success System&quot; (SSS). Diễn giả khuyến khích học viên\n \nhọc đi học lại nhiều lần, không trì hoãn và biến kiến thức thành hành động cụ thể. Cốt lõi là\n \n&quot;việc học chỉ cho mình biết, nhưng việc làm mới cho mình hiểu&quot;, đồng thời kêu gọi đừng bó\n \nhẹp tư duy kinh doanh vào một sản phẩm cụ thể mà hãy mở rộng cơ hội qua hành động liên\n \ntục.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quy tắc 80/20 (số lượng học viên giảm) thể hiện sự phân hóa về mức độ cam kết.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khóa học &quot;Sales Success System&quot; (SSS) dành cho những người tự nhận là &quot;không biết</span></div>\n<p class=\"body-txt\">\nkinh doanh&quot;, &quot;không biết công nghệ&quot;, &quot;không biết internet&quot; hoặc những ai tự kìm hãm\n \nbản thân bằng những câu chuyện đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Học viên cần học lại SSS, comment &quot;SSS.&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">SSS không phải là một số tiền lớn, chỉ &quot;hơi lớn hơn mức trung bình&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Đừng chờ đợi đến &quot;tháng 5&quot; để học; hãy học *ngay lập tức* và lặp lại nhiều lần. &quot;Học</span></div>\n<p class=\"body-txt\">\nluôn từ bây giờ đến thứ năm là lấy được tiền rồi chứ không phải tháng năm&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Học viên có thể học đi học lại 100 lần khóa học SSS bằng video.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khi đăng ký SSS, hãy &quot;ngay lập tức học hết nó&quot; và &quot;bắt tay vào làm theo nó&quot; để dễ dàng</span></div>\n<p class=\"body-txt\">\nlấy lại số tiền đã bỏ ra.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Đừng trì hoãn việc học SSS vì nó là khóa online; hãy đặt mục tiêu &quot;hoàn tất nó&quot; từ bây</span></div>\n<p class=\"body-txt\">\ngiờ đến thứ năm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cần học tập trung, liên tục (ví dụ: 3 ngày liên tiếp từ sáng đến đêm) để hoàn thành một</span></div>\n<p class=\"body-txt\">\nvòng khóa học.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ví dụ về một học viên/người quen học SSS: Anh ấy học SSS mỗi ngày, cài mặc định trong</span></div>\n<p class=\"body-txt\">\nxe hơi, máy tính, thậm chí bình luận các bài giảng. Ngay cả các thành viên Eagle Club lâu\n \nđời vẫn &quot;cày&quot; SSS.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Học đi học lại khóa SSS &quot;thật nhiều lần để biến mọi câu chuyện, mọi kiến thức, mọi cái</span></div>\n<p class=\"body-txt\">\nngôn từ đó thành của bạn&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả tự học khóa SSS và còn thấy hay, nên học viên *chắc chắn* phải thấy hay.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Đăng ký và áp dụng SSS sớm để học được nhiều và áp dụng được sớm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Những người đã học rồi vẫn cần học lại, kể cả diễn giả cũng cần học lại.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả yêu cầu toàn bộ đội ngũ của mình (nhân viên học việc, thử việc, lễ tân, quản lý)</span></div>\n<p class=\"body-txt\">\nphải học SSS, ghi chép vở 3 cột trong 3-5 ngày và nộp lại để quyết định có đủ trình độ để\n \nở lại công ty hay không.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quan điểm thứ hai quan trọng: &quot;Tại sao tôi nói những người không làm, đừng đi học tôi</span></div>\n<p class=\"body-txt\">\nnữa&quot; – để tránh rơi vào &quot;bẫy FOMO của việc học&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Việc học chỉ cho mình biết. Nhưng việc làm mới cho mình hiểu.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ví dụ về anh Nguyễn Thanh Đênh (người bán sơn): Ban đầu chỉ bán sơn, nhưng khi làm</span></div>\n<p class=\"body-txt\">\n(trong khóa IPS), anh ấy làm video về một sản phẩm khác (vật liệu xây dựng) và thu hút\n \ntriệu lượt xem. Khách hàng bắt đầu hỏi về sản phẩm mới này, giúp anh ấy tìm nguồn và\n \nkinh doanh thêm mà không tăng chi phí vận hành, mở ra cơ hội mới.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bài học từ ví dụ trên: &quot;Đừng bao giờ bị dính vào một cái sản phẩm&quot; – kinh doanh cà phê,</span></div>\n<p class=\"body-txt\">\nphở, bánh mì, sơn, ô tô, bất động sản về bản chất đều giống nhau.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khuyến khích thực hành các bài tập đã học (ví dụ: &quot;3 điều nói dối&quot;, &quot;con ngựa truyền</span></div>\n<p class=\"body-txt\">\ncảm hứng&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Không có thành công nào mà không đi kèm với khó khăn (thời gian, trình độ, tiền bạc).</span></div>\n<p class=\"body-txt\">\nNhững khó khăn đó không quan trọng bằng việc không bỏ cuộc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Chừng nào bạn không bỏ cuộc, chừng đó tôi còn ở bên cạnh bạn giúp bạn.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Những gì các bạn làm liên tục trong 28 ngày sẽ trở thành thói quen.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Những gì các bạn làm liên tục trong 90 ngày sẽ trở thành cuộc đời của các bạn.&quot;</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Học và làm ngay lập tức, học đi học lại nhiều lần: Diễn giả nhấn mạnh việc không trì</span></div>\n<p class=\"body-txt\">\nhoãn và áp dụng kiến thức SSS ngay sau khi học, thậm chí là học lại 100 lần. Điều này\n \nquan trọng vì nó chống lại tâm lý trì hoãn khi học online và giúp kiến thức thẩm thấu sâu\n \nsắc, biến thành kỹ năng thực tế thay vì chỉ là thông tin đã biết.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Việc học chỉ cho mình biết. Nhưng việc làm mới cho mình hiểu.&quot;: Đây là một insight cốt</span></div>\n<p class=\"body-txt\">\nlõi. Nhiều người mắc &quot;bẫy FOMO của việc học&quot; (luôn cảm thấy cần học thêm, nhưng\n \nkhông thực hành). Chỉ khi thực sự bắt tay vào làm, người học mới thấu hiểu vấn đề, phát\n \nhiện ra những điều bất ngờ và tìm thấy cơ hội mới mẻ, như câu chuyện của anh Nguyễn\n \nThanh Đênh bán sơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Đừng bao giờ bị dính vào một cái sản phẩm.&quot;: Bài học từ câu chuyện của anh Nguyễn</span></div>\n<p class=\"body-txt\">\nThanh Đênh cho thấy sự linh hoạt và khả năng nhìn nhận cơ hội mới là tối quan trọng\n \ntrong kinh doanh. Đừng chỉ tập trung vào một sản phẩm hay dịch vụ ban đầu, mà hãy\n \nlắng nghe thị trường và sẵn sàng mở rộng, đa dạng hóa dựa trên nhu cầu phát sinh từ\n \nquá trình thực hành và tương tác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sức mạnh của sự kiên trì: &quot;Làm liên tục trong 90 ngày sẽ trở thành cuộc đời của bạn.&quot;:</span></div>\n<p class=\"body-txt\">\nViệc cam kết hành động liên tục trong một khoảng thời gian nhất định (28 ngày cho thói\n \nquen, 90 ngày cho sự thay đổi cuộc đời) là chìa khóa để đạt được thành công bền vững.\n \nĐiều này củng cố thông điệp về việc không bỏ cuộc và biến những nỗ lực nhỏ lẻ thành\n \nkết quả lớn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Bạn có thể học đi học lại 100 lần cái khóa học đó.”\n \n“Việc học chỉ cho mình biết. Nhưng việc làm mới cho mình hiểu.”\n \n“Đừng bao giờ thấy rằng vì nó là khóa học online mà mình cứ chờ từ ngày này qua ngày\n \nkhác.”\n \n“Chừng nào bạn không bỏ cuộc, chừng đó tôi còn ở bên cạnh bạn giúp bạn.”\n \n“Những gì các bạn làm liên tục trong 90 ngày sẽ trở thành cuộc đời của các bạn.”\n \n8.9 Hãy viết điều tích cực\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi giảng này giới thiệu về việc sử dụng một công cụ chatbot AI (diễn giả bói) do</h3>\n<p class=\"body-txt\">\nchính diễn giả xây dựng trên nền tảng ChatGPT, chuyên đưa ra những lời khuyên tích cực và\n \ncá nhân hóa cho người dùng. Thông qua việc xem bói cho một học viên, diễn giả nhấn mạnh\n \nrằng &quot;diễn giả bói là kể chuyện,&quot; và tầm quan trọng của việc sử dụng ngôn từ tích cực cùng\n \nkhả năng viết lách để tạo ảnh hưởng, động viên người khác và định hướng tương lai theo\n \nhướng xây dựng. Bài học cốt lõi là bất kỳ ai cũng có thể &quot;làm diễn giả bói&quot; theo cách riêng\n \ncủa mình bằng cách truyền tải thông điệp mang lại sự tự tin và hy vọng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">diễn giả giới thiệu một công cụ AI chatbot mà ông tự xây dựng trên ChatGPT (thông qua</span></div>\n<p class=\"body-txt\">\ntính năng Explorer), được đặt tên là &quot;diễn giả bói&quot; với mục đích đoán vận tương lai.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ông đã sử dụng công cụ này để xem bói cho một học viên tên Hạnh, phân tích về tình</span></div>\n<p class=\"body-txt\">\ntrạng hôn nhân, công việc kinh doanh, tài lộc, gia đạo, sức khỏe và tâm linh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Diễn giả bói&quot; đưa ra những lời khuyên cá nhân hóa, gợi ý các khóa học (như &quot;Xây dựng</span></div>\n<p class=\"body-txt\">\nhệ thống kinh doanh cho Boss,&quot; &quot;Sale Success System,&quot; &quot;Kinh doanh đột phá,&quot; &quot;Quản trị\n \ncảm xúc,&quot; &quot;Video 28 ngày,&quot; &quot;Lập trình vận mệnh,&quot; &quot;Internet Power System&quot;) như những\n \ncon đường để phát triển tiềm năng cá nhân và sự nghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">diễn giả chia sẻ trải nghiệm của ông với các diễn giả bói truyền thống thường đưa ra</span></div>\n<p class=\"body-txt\">\nnhững lời tiên đoán tiêu cực, gây sợ hãi hoặc không mang tính xây dựng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ông nhận ra rằng bản thân có thể &quot;làm diễn giả bói&quot; theo hướng tích cực bằng cách viết</span></div>\n<p class=\"body-txt\">\nlại các &quot;lá xăm&quot; (kết quả bói toán) với ngôn từ động viên, giúp người khác cảm thấy may\n \nmắn, tự tin và có động lực để tiến lên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khẳng định &quot;diễn giả bói là kể chuyện&quot; và việc &quot;nạp câu chuyện của mình vào&quot; (phần</span></div>\n<p class=\"body-txt\">\ntâm sự, câu hỏi số 5 trong chatbot) là yếu tố quan trọng nhất để nhận được lời khuyên\n \nphù hợp và ý nghĩa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bài giảng tập trung vào sức mạnh của ngôn từ, tư duy tích cực và khả năng viết lách như</span></div>\n<p class=\"body-txt\">\nnhững công cụ quan trọng để tạo ảnh hưởng cá nhân, xây dựng thương hiệu và phát\n \ntriển trong nhiều lĩnh vực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hướng dẫn cách tìm và sử dụng công cụ &quot;Đoán vận tương lai khởi tạo cuộc đời&quot; trên</span></div>\n<p class=\"body-txt\">\nChatGPT Explorer.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sức mạnh của ngôn từ và tư duy tích cực trong việc định hình thực tại: Diễn giả nhấn</span></div>\n<p class=\"body-txt\">\nmạnh rằng cách chúng ta sử dụng ngôn từ và cách tư duy sẽ định hình cuộc sống của\n \nchúng ta và người xung quanh. Thay vì những lời tiên đoán tiêu cực gây sợ hãi từ diễn\n \ngiả bói truyền thống, ông đã tạo ra một &quot;diễn giả bói&quot; với ngôn ngữ tích cực để động\n \nviên, giúp người nghe tin vào tiềm năng và may mắn của mình. Điều này cực kỳ quan\n \ntrọng vì trong kinh doanh và cuộc sống, việc truyền tải thông điệp tích cực không chỉ\n \ngiúp xây dựng niềm tin mà còn thúc đẩy hành động, biến thách thức thành cơ hội.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Kỹ năng viết lách là công cụ cốt lõi để tạo ảnh hưởng và xây dựng thương hiệu cá</span></div>\n<p class=\"body-txt\">\nnhân/doanh nghiệp: Diễn giả khẳng định rằng viết không chỉ là viết bài bán hàng mà là\n \nmột kỹ năng đa năng để kể chuyện, truyền đạt thông điệp, và tạo sự kết nối. Việc ông tự\n \ntay viết &quot;diễn giả bói&quot; để cá nhân hóa lời khuyên và lan tỏa thông điệp tích cực cho thấy\n \nkhả năng viết lách có thể được áp dụng sáng tạo để xây dựng ảnh hưởng cá nhân và\n \nphục vụ mục tiêu kinh doanh. Trong thời đại thông tin, khả năng diễn đạt ý tưởng một\n \ncách cuốn hút và có giá trị qua văn bản là yếu tố then chốt để nổi bật và thu hút khách\n \nhàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tận dụng công nghệ AI để mở rộng khả năng cá nhân hóa và tạo ra giá trị mới: Việc diễn</span></div>\n<p class=\"body-txt\">\ngiả tạo ra một chatbot &quot;diễn giả bói&quot; trên ChatGPT cho thấy tiềm năng của AI trong việc\n \ntự động hóa và cá nhân hóa quá trình cung cấp lời khuyên hoặc dịch vụ. AI giúp nhân\n \nbản khả năng &quot;kể chuyện&quot; và định hướng tích cực của một cá nhân, cho phép tiếp cận và\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><p class=\"body-txt\">\nhỗ trợ nhiều người hơn trên quy mô lớn mà vẫn giữ được yếu tố tương tác cá nhân. Đây\n \nlà một insight quý giá về cách các doanh nghiệp và cá nhân có thể ứng dụng AI để tối ưu\n \nhóa việc cung cấp giá trị và xây dựng mối quan hệ với khách hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Rõ ràng trong cuộc sống này mình có thể làm diễn giả bói được mà tại sao mình không làm?”\n \n“Có đúng diễn giả bói là kể chuyện không các ông?”\n \n“Viết cái điều gì mà sống cho người ta sống người ta tích cực, người ta tiến lên là được.”\n \n8.10: 16 bước bán hàng\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi học này tập trung hướng dẫn cách sử dụng chatbot AI (GPT) để tạo ra các bài</h3>\n<p class=\"body-txt\">\nquảng cáo bán hàng hiệu quả một cách nhanh chóng. Diễn giả cung cấp một công cụ chat\n \nGPT đã được tùy biến để viết bài quảng cáo, giúp học viên dễ dàng tạo nội dung từ tiêu đề,\n \nvấn đề, giải pháp, đến câu chuyện và lời kêu gọi hành động dựa trên 16 bước bán hàng cơ\n \nbản. Phương pháp này giúp tiết kiệm thời gian và đảm bảo nội dung đầy đủ, hấp dẫn, sau đó\n \ncó thể tùy chỉnh thêm văn hóa và từ ngữ riêng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Giới thiệu Chat GPT tùy biến: Diễn giả giới thiệu một con chatbot AI (GPT) đã được tùy</span></div>\n<p class=\"body-txt\">\nbiến đặc biệt để viết bài quảng cáo, gọi là &quot;Minh&quot; và chia sẻ đường link cho học viên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">16 nội dung bài quảng cáo: Nội dung quảng cáo được xây dựng dựa trên 16 bước bán</span></div>\n<p class=\"body-txt\">\nhàng cơ bản. Diễn giả hướng dẫn liệt kê các thông tin cần thiết về sản phẩm và đối tượng\n \nkhách hàng (ví dụ: ví da, nam giới 25-40 tuổi, ví da nhỏ có khe thẻ tín dụng, căn cước,\n \nbằng lái, kích thước nhỏ, da thật, sang trọng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tạo tiêu đề: Sau khi nhập thông tin, chat GPT sẽ gợi ý các tiêu đề. Học viên chọn tiêu đề</span></div>\n<p class=\"body-txt\">\nphù hợp (ví dụ: số 3).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tạo tiêu đề phụ: Tiếp tục chọn tiêu đề phụ từ các gợi ý của AI.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Liệt kê và lựa chọn vấn đề: Chat GPT sẽ viết tiếp các mục về &quot;vấn đề&quot; dựa trên thông tin</span></div>\n<p class=\"body-txt\">\nđã nhập. Học viên lựa chọn các vấn đề phù hợp (ví dụ: số 1, 2, 4, 5). Việc lựa chọn này sẽ\n \nảnh hưởng đến các bước tiếp theo.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bổ sung uy tín: Học viên được yêu cầu bổ sung thông tin về uy tín (ví dụ: 10 năm kinh</span></div>\n<p class=\"body-txt\">\nnghiệm trong lĩnh vực da, hiểu rõ về da thật, sản phẩm sản xuất thủ công, đã bán\n \n200.000 sản phẩm ở 15 quốc gia).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Kể chuyện: Chat GPT sẽ tạo ra một câu chuyện (nếu không có sẵn câu chuyện từ người</span></div>\n<p class=\"body-txt\">\ndùng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Giải pháp và lợi ích: AI tiếp tục tạo nội dung về giải pháp cho vấn đề và bổ sung các lợi</span></div>\n<p class=\"body-txt\">\ních.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Xử lý từ chối: AI sẽ đưa ra các kịch bản xử lý sự từ chối của khách hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Kêu gọi hành động (Call to Action): Cuối cùng, AI gợi ý các câu kêu gọi hành động.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chỉnh sửa và hoàn thiện: Sau khi có nội dung từ AI, học viên cần chỉnh sửa, thêm tu từ,</span></div>\n<p class=\"body-txt\">\nẩn dụ, so sánh, từ khóa, văn hóa và cấu trúc để bài viết tự nhiên hơn, giống tiếng người\n \nvà phù hợp với thương hiệu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Giá trị của công cụ: Công cụ này giúp tiết kiệm rất nhiều thời gian viết bài quảng cáo và</span></div>\n<p class=\"body-txt\">\nđảm bảo nội dung đầy đủ các luận điểm quan trọng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sử dụng AI để xây dựng cấu trúc bài quảng cáo: Việc tận dụng chat GPT để &quot;liệt kê&quot; và</span></div>\n<p class=\"body-txt\">\n&quot;lựa chọn&quot; các yếu tố quan trọng (tiêu đề, vấn đề, giải pháp, xử lý từ chối, kêu gọi hành\n \nđộng) theo trình tự 16 bước bán hàng là vô cùng hiệu quả. Nó giúp người viết không bỏ\n \nsót ý, đảm bảo tính logic và đầy đủ của bài viết, đặc biệt khi họ không có nhiều kinh\n \nnghiệm viết content hoặc không có ý tưởng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tối ưu hóa thời gian và chất lượng nội dung: Diễn giả nhấn mạnh rằng công cụ này giúp</span></div>\n<p class=\"body-txt\">\n&quot;giảm được thời gian mình viết đi rất là nhiều&quot; nhưng vẫn tạo ra &quot;đầy đủ, nhiều ý còn\n \nmình còn chưa nghĩ ra&quot;. Điều này quan trọng vì trong marketing, tốc độ triển khai và\n \nchất lượng nội dung đều là yếu tố then chốt.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cần cá nhân hóa và làm &quot;tiếng người&quot; cho AI: Mặc dù AI tạo ra khung sườn và ý tưởng,</span></div>\n<p class=\"body-txt\">\ndiễn giả chỉ rõ cần &quot;sửa lại theo cấu trúc AI để viết cho giống tiếng người, thêm văn hóa\n \ncủa mình vào&quot;. Điều này cho thấy AI là một công cụ hỗ trợ mạnh mẽ, nhưng sự can thiệp\n \ncủa con người để thêm cảm xúc, sự độc đáo và văn hóa là không thể thiếu để bài viết\n \nchạm đến khách hàng mục tiêu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Bây giờ mình cần phải viết một cái trang bán hàng phải không các ông này?”\n \n“Thế bây giờ nó gây ra các bây giờ nó tiếp theo thì nó viết tiếp cái phần mục tiếp theo ở đây\n \ncác bạn nhìn thấy không? Là nó viết tiếp cho mình các cái mục là các cái vấn đề.”\n \n“Bây giờ tôi có biết gì về cái ví không? Nhưng mà nhờ trợ giúp này, chẳng qua là như này này,\n \nvì tôi đang có cái ví ở trước mặt đây này. Vì tôi đang có một cái ví bằng da thật này.”\n \n“Sau đó mình viết lại, mình thêm tu từ vào đây, mình thêm ẩn dụ, thêm so sánh, thêm từ khóa,\n \nthêm lựa chọn của chúng ta. Về cơ bản, sửa lại cái cấu trúc AI để viết cho giống tiếng người,\n \nthêm văn hóa của mình vào.”\n \n8.11 Tổng kết buổi học\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi giảng này nhấn mạnh tầm quan trọng của việc duy trì tư duy tích cực, chủ</h3>\n<p class=\"body-txt\">\nđộng kể câu chuyện của bản thân và liên tục đưa ra những lựa chọn đúng đắn để vượt qua\n \nkhó khăn. Diễn giả thúc giục học viên không ngừng học hỏi, đặc biệt là các khóa học như Sale\n \nSuccess System, IPS và Lập trình Vận mệnh, đồng thời hành động ngay lập tức để đạt được\n \nthành công. Một điểm cốt lõi là việc sử dụng hiệu quả công cụ AI (ChatGPT) để tạo nội dung\n \nbán hàng nhưng vẫn phải thấu hiểu sản phẩm của mình và không ngừng hành động để biến\n \ný tưởng thành kết quả thực tế.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Luôn sống tích cực và kể câu chuyện của mình: Khuyến khích học viên kể câu chuyện</span></div>\n<p class=\"body-txt\">\ncủa bản thân để thúc đẩy mình tiến lên, thay vì chỉ lắng nghe câu chuyện của người khác.\n \nChia sẻ kinh nghiệm giúp người hướng dẫn hiểu tâm lý học viên để hỗ trợ tốt hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cuộc đời là những lựa chọn: Thất bại là động lực để tiến về phía trước. Con người phải</span></div>\n<p class=\"body-txt\">\ntự trưởng thành để có quyền lựa chọn vượt qua khó khăn, không phải dừng lại trước\n \nchúng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tham gia và học hỏi liên tục: Kêu gọi học viên phải có mặt tại khóa học Sale Success</span></div>\n<p class=\"body-txt\">\nSystem (SSS), học ngay lập tức trong 3 ngày cả online và offline để thấy sự khác biệt lớn\n \ntrong cuộc sống.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Học lại SSS và các khóa liên quan: Đề nghị cả đội ngũ cũ và mới của Minh PT học lại khóa</span></div>\n<p class=\"body-txt\">\nSSS vì nhiều người cũ đã quên. Diễn giả cũng tự học lại khóa này khi lái xe xuyên nước\n \nMỹ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nâng cấp kiến thức để đối mặt với thách thức thị trường: Đối với Ego Club, cần tham gia</span></div>\n<p class=\"body-txt\">\nIPS để update kiến thức mới, chuẩn bị đối mặt với những thách thức lớn từ các nền tảng\n \nkinh doanh như Temu và Shein.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lập trình Vận mệnh (IPS): Đây là khóa học quan trọng giúp thay đổi lớn trong các khía</span></div>\n<p class=\"body-txt\">\ncạnh của cuộc sống như kinh doanh, gia đình, hôn nhân. Khóa SSS, IPS và Lập trình Vận\n \nmệnh là ba khóa học then chốt, miễn phí cho thành viên Ego Club.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cách &quot;viết&quot; câu chuyện cuộc đời mình: Diễn giả kể câu chuyện về việc gặp diễn giả bói, từ</span></div>\n<p class=\"body-txt\">\nđó tạo ra một &quot;bài xăm&quot; (lời khuyên) mới, tích cực, dựa trên câu chuyện cá nhân của mỗi\n \nngười để đưa ra lời khuyên phù hợp (bao gồm gợi ý các khóa học).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hoàn tất 16 bước bán hàng và sử dụng ChatGPT: Đây là phần quan trọng nhất cần hoàn</span></div>\n<p class=\"body-txt\">\ntất. Diễn giả cung cấp sẵn ChatGPT để học viên viết quảng cáo theo 16 bước bán hàng.\n \nCảnh báo gay gắt về việc không biết sản phẩm của mình là gì hoặc không chịu hành động,\n \nchỉ biết copy.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bài tập về nhà: Viết về sự may mắn khi tham dự lớp học này, đăng lên trang cá nhân với</span></div>\n<p class=\"body-txt\">\nhashtag #viethay để diễn giả biết học viên đã làm bài.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chủ động &quot;viết&quot; câu chuyện cuộc đời mình và liên tục lựa chọn để tiến lên: Thay vì chấp</span></div>\n<p class=\"body-txt\">\nnhận số phận hay dừng lại trước khó khăn, diễn giả thúc giục mỗi người phải là tác giả\n \ncủa cuộc đời mình. Việc kể những câu chuyện tích cực và đưa ra những lựa chọn để vượt\n \nqua thử thách là chìa khóa để tự thân vận động và phát triển. Điều này đặc biệt quan\n \ntrọng vì nó đặt trách nhiệm và quyền năng vào tay mỗi cá nhân, biến thất bại thành bài\n \nhọc và động lực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Học hỏi liên tục và hành động ngay lập tức: Diễn giả không chỉ khuyến khích học mà còn</span></div>\n<p class=\"body-txt\">\nnhấn mạnh việc *học ngay lập tức* (trong 3 ngày), học đi học lại (kể cả những người cũ)\n \nvà *có mặt* tại các khóa học quan trọng. Điều này rất quan trọng trong một thế giới thay\n \nđổi nhanh chóng, khi trì hoãn đồng nghĩa với việc bỏ lỡ cơ hội. Học và hành động kịp\n \nthời giúp mỗi người không chỉ cập nhật kiến thức mà còn tạo ra sự khác biệt rõ rệt trong\n \ncuộc sống và kinh doanh.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sử dụng AI như một công cụ hỗ trợ hành động, không phải thay thế tư duy: Việc cung</span></div>\n<p class=\"body-txt\">\ncấp ChatGPT để tạo nội dung bán hàng là một giải pháp thiết thực cho những người gặp\n \nkhó khăn trong việc viết lách. Tuy nhiên, cảnh báo mạnh mẽ &quot;ngu đến mức không biết\n \nsản phẩm của mình là gì&quot; và &quot;đến dựng sẵn như thế rồi mà không làm được nữa thì thôi&quot;\n \ncho thấy công nghệ chỉ là phương tiện. Giá trị cốt lõi vẫn nằm ở việc thấu hiểu sản phẩm,\n \ncó tư duy hành động và ý chí thực hiện, nếu không AI cũng trở nên vô nghĩa.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Cuộc đời của chúng ta có thể có những thất bại, nhưng cách chúng ta vượt qua thất bại đó sẽ\n \nlà những động lực để giúp chúng ta tiến về phía trước.”\n \n“Các bạn đừng bao giờ nói rằng là viết không phải kinh doanh thì viết mà hay là kinh doanh\n \nthì không viết. Đều đó không đúng, tất cả những điều chỉ là câu chuyện thôi. Chúng ta đang\n \nviết lên câu chuyện cuộc đời của mình.”\n \n“Thôi thì ngu đến cỡ ChatGPT còn hơn không làm được gì.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Chương 10</h3>\n<p class=\"body-txt\">\n9.1 Viết Hay cho Bác sĩ\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi giảng này xoay quanh việc phân tích và giải quyết sự chần chừ, lo sợ của một</h3>\n<p class=\"body-txt\">\nhọc viên khi đứng trước cơ hội đầu tư vào khóa học &quot;Eagle&quot; của diễn giả nhằm đạt được tự\n \ndo tài chính. Diễn giả, dưới hình thức &quot;diễn giả bói&quot; và thông qua lời khuyên từ AI\n \n(ChatGPT), đã chỉ ra rằng mục tiêu tự do tài chính đòi hỏi việc học hỏi, xây dựng hệ thống\n \nkinh doanh bền vững, và quan trọng nhất là hành động dứt khoát, không trì hoãn để lột xác\n \nkhỏi những giới hạn hiện tại.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mở đầu &amp; Nêu vấn đề: Diễn giả mời những học viên còn đang &quot;lăn tăn&quot; về việc tham gia</span></div>\n<p class=\"body-txt\">\nkhóa học &quot;Eagle&quot; giơ tay. Học viên Nguyễn Xuân Trúc, một bác sĩ chuyên khoa phẫu\n \nthuật thẩm mỹ làm thuê tại một thẩm mỹ viện ở TP.HCM, xung phong.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mục tiêu của học viên Trúc: Trúc mong muốn &quot;tự do thời gian, tự tạo ra thu nhập cho</span></div>\n<p class=\"body-txt\">\nmình, tự do tài chính&quot; để không bị người khác quản lý.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lời khuyên từ &quot;diễn giả bói&quot; (ChatGPT):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khóa học &quot;Eagle&quot; phù hợp cho những ai muốn xây dựng sự nghiệp tự thân vững chắc,</span></div>\n<p class=\"body-txt\">\nhọc hỏi phương pháp kinh doanh bền vững, tích lũy tài lộc không phụ thuộc hệ thống cũ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Đạt tự do tài chính giúp thoát ràng buộc thời gian, nhưng đòi hỏi chiến lược kinh doanh</span></div>\n<p class=\"body-txt\">\nsắc bén và kỹ năng quản lý.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khóa học cung cấp bí quyết tăng trưởng tài chính, giúp học viên tập trung học hỏi để vận</span></div>\n<p class=\"body-txt\">\nhành hệ thống kinh doanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Dấn thân vào con đường mới đi kèm thử thách và trách nhiệm lớn. Khóa &quot;Lập trình vận</span></div>\n<p class=\"body-txt\">\nmệnh và quản trị cảm xúc&quot; giúp phát triển tự tin, tinh thần vững vàng.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lời khuyên là hãy mạnh dạn tiến bước, vì đây là cơ hội để lột xác khỏi giới hạn hiện tại.</span></div>\n<p class=\"body-txt\">\nTự do chỉ đến với người dám hành động.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phân tích sự chần chừ của học viên:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sợ về tài chính: Trúc cảm thấy &quot;kinh phí tham gia cao&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả phản biện: Cao so với cái gì? So với giá trị mang lại thì &quot;quá thấp&quot;. So sánh với</span></div>\n<p class=\"body-txt\">\nthu nhập của Trúc khi tự làm chủ (1 ca phẫu thuật cắt mí 10 triệu, nâng mũi 30-45 triệu\n \nso với 1-2 triệu khi làm thuê). Số tiền học tương đương hàng trăm giờ làm việc của diễn\n \ngiả hoặc chỉ vài ca làm chủ của Trúc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nếu vào Eagle có thể có thêm hàng chục, hàng trăm, hàng nghìn khách hàng, thì chi phí</span></div>\n<p class=\"body-txt\">\nkhông còn là vấn đề.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sợ về thời gian: Trúc &quot;chưa nắm rõ lộ trình tham gia, lộ trình học tập, lộ trình coaching&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả phản biện: &quot;Phải làm mới hiểu rõ&quot;, &quot;phải vô mới hiểu rõ&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Sợ không làm được: &quot;Tiếng nói nhỏ trong đầu&quot; là không biết mình có làm được không.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả phản biện: Đôi khi phải &quot;buông bỏ những thứ nhỏ để đạt được những thứ lớn</span></div>\n<p class=\"body-txt\">\nhơn&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Nếu nắm vững những gì khóa học truyền đạt, bạn có thể phát triển một hệ thống mang</span></div>\n<p class=\"body-txt\">\nlại khách hàng liên tục, thay vì phụ thuộc vào từng thời gian làm việc cụ thể.&quot; (Điểm khác\n \nbiệt giữa người đầu tư dài hạn và người làm công ăn lương).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tham gia cùng những người thành công trong cùng lĩnh vực, thấy kết quả của họ để</span></div>\n<p class=\"body-txt\">\ncủng cố tự tin và giảm sợ hãi (ví dụ các bác sĩ khác đã thành công dù ngày xưa học không\n \ngiỏi).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Lời kêu gọi hành động:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Liệu tôi có đủ dũng cảm đầu tư vào tương lai của mình ngay lúc này không?&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hành động ngay lập tức: &quot;Học luôn đêm nay&quot;, &quot;làm nó bây giờ&quot;, thậm chí là &quot;viết một cái</span></div>\n<p class=\"body-txt\">\nchữ xuống giấy&quot; ngay. Nếu trì hoãn, cuộc đời sẽ mãi đi làm thuê.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Chuyển đổi từ &quot;làm thuê&quot; sang &quot;làm chủ&quot; thông qua xây dựng hệ thống: Đây là cốt lõi của</span></div>\n<p class=\"body-txt\">\nviệc đạt được tự do tài chính và thời gian. Diễn giả nhấn mạnh rằng việc học hỏi để &quot;vận\n \nhành hệ thống kinh doanh&quot; và có khả năng &quot;tạo ra những khách hàng liên tục&quot; sẽ thay\n \nđổi hoàn toàn cách một người kiếm tiền, không còn phụ thuộc vào việc đánh đổi thời\n \ngian lấy tiền công cụ thể. Điều này quan trọng vì nó định vị khóa học không chỉ là cung\n \ncấp kiến thức mà là một hành trình chuyển đổi tư duy và phương pháp kinh doanh bền\n \nvững.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hành động tức thì và không trì hoãn: Diễn giả liên tục thúc đẩy học viên phải &quot;học luôn</span></div>\n<p class=\"body-txt\">\nđêm nay&quot;, &quot;làm nó bây giờ&quot;, và thậm chí &quot;viết một cái chữ xuống giấy&quot; ngay lập tức. Sự\n \nchần chừ, đặc biệt là với các vấn đề tài chính và thời gian, thường là rào cản lớn nhất.\n \nViệc nhấn mạnh &quot;người làm chủ không có từ mai, chỉ có từ bây giờ&quot; là một tư duy mạnh\n \nmẽ, giúp học viên nhận ra giá trị của việc nắm bắt cơ hội và vượt qua nỗi sợ hãi ban đầu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Đánh giá giá trị thực sự so với chi phí: Học viên cảm thấy &quot;kinh phí cao&quot;, nhưng diễn giả</span></div>\n<p class=\"body-txt\">\nđã khéo léo so sánh chi phí khóa học với tiềm năng thu nhập khi tự làm chủ (từ vài ca\n \nphẫu thuật) và &quot;hàng trăm giờ làm việc&quot; của chính diễn giả. Điều này giúp học viên thay\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><p class=\"body-txt\">\nđổi góc nhìn từ &quot;chi phí&quot; sang &quot;đầu tư&quot;, và nhận ra rằng cái &quot;cao&quot; chỉ là tương đối khi\n \nchưa nhìn thấy giá trị và lợi ích lâu dài mà khóa học có thể mang lại.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Tự do chỉ đến với những người dám hành động vì giấc mơ của mình.”\n \n“Nếu bạn nắm vững những gì khóa học truyền đạt, bạn có thể phát triển một hệ thống mang\n \nlại khách hàng liên tục, thay vì phải phụ thuộc vào từng thời gian làm việc cụ thể.”\n \n“Liệu tôi có đủ dũng cảm đầu tư vào tương lai của mình ngay lúc này không?”\n \n“chứ đến viết một cái chữ xuống giấy mà không viết nổi thì thôi”\n \n9.2 Viết hay cho doanh nghiệp bán Bạc\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi giảng tập trung phân tích những lỗ hổng kiến thức kinh doanh cơ bản của</h3>\n<p class=\"body-txt\">\nmột học viên chuyên sản xuất đồ trang sức bạc thủ công cho trẻ em. Diễn giả đã chất vấn sâu\n \nvề giá thành, chi phí sản xuất, lợi nhuận, và hiểu biết thị trường, đồng thời chỉ ra sự thiếu sót\n \ntrong tư duy kinh doanh và khả năng nắm bắt cơ hội. Qua đó, buổi học nhấn mạnh tầm quan\n \ntrọng của việc hiểu rõ mọi khía cạnh kinh doanh, từ sản phẩm đến giá bán lẻ, và sự cần thiết\n \ncủa hành động thực tế để biến kiến thức thành kết quả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả chất vấn một học viên tên Trúc về công việc sản xuất dây chuyền bạc cho trẻ</span></div>\n<p class=\"body-txt\">\nem.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Trúc mô tả sản phẩm của mình là dây chuyền bạc chưa qua hoàn thiện (hàng thô).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả hỏi về giá bán sỉ của một sợi dây (300.000 VNĐ cho 3 chỉ bạc), chi phí gia công</span></div>\n<p class=\"body-txt\">\n(6.000 VNĐ/sợi) và năng suất lao động (50 sợi/ngày/người).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả tính toán ra mức lương công nhân thấp (150.000 VNĐ/ngày/người) và chỉ ra</span></div>\n<p class=\"body-txt\">\nrằng học viên chưa hiểu về giá bán lẻ ngoài thị trường (ước tính người bán phải nhân\n \nđôi giá).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Học viên thừa nhận chưa nắm rõ giá bán lẻ và mong muốn học để tự bán.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả phê bình học viên thiếu kiến thức cơ bản về thị trường, lợi nhuận, và sự thụ</span></div>\n<p class=\"body-txt\">\nđộng trong việc nắm bắt cơ hội học tập (chưa đăng ký khóa &quot;Sales Success System&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả nhấn mạnh tầm quan trọng của việc học phải đi đôi với hành động và sự chủ</span></div>\n<p class=\"body-txt\">\nđộng tìm hiểu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả hỏi về kinh nghiệm và chứng nhận nghề của chồng học viên (Lê Văn Trúc, có</span></div>\n<p class=\"body-txt\">\n27-30 năm kinh nghiệm, chứng nhận của làng nghề Thúc Kháng, Hải Dương).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Học viên đưa ra các câu trả lời mâu thuẫn và cho thấy sự thiếu tập trung, không nắm rõ</span></div>\n<p class=\"body-txt\">\nthông tin của chính mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả kết thúc bằng việc nhắc nhở học viên quay ngang điện thoại để đọc rõ hơn nội</span></div>\n<p class=\"body-txt\">\ndung hiển thị trên màn hình.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hiểu rõ giá trị sản phẩm và lợi nhuận: Học viên không nắm rõ giá bán lẻ sản phẩm của</span></div>\n<p class=\"body-txt\">\nmình trên thị trường, chỉ biết giá sỉ và chi phí nhân công rất thấp. Điều này cho thấy\n \nthiếu tư duy kinh doanh cơ bản để tối ưu hóa lợi nhuận và định vị sản phẩm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Không hiểu giá trị thực của sản phẩm trên thị trường bán lẻ khiến</span></div>\n<p class=\"body-txt\">\nngười sản xuất bỏ lỡ cơ hội định giá cao hơn hoặc phân phối hiệu quả hơn, dẫn đến mắc\n \nkẹt ở khâu sản xuất với lợi nhuận thấp và thiếu tầm nhìn phát triển.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tư duy hành động và nắm bắt cơ hội: Học viên nói muốn học để tự bán hàng nhưng lại</span></div>\n<p class=\"body-txt\">\nchưa có kiến thức nền tảng vững chắc và không chủ động nắm bắt các khóa học quan\n \ntrọng được giới thiệu (như &quot;Sales Success System&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Kiến thức chỉ có giá trị khi được áp dụng vào thực tế. Sự chần chừ và</span></div>\n<p class=\"body-txt\">\nkhông chủ động tìm hiểu, hành động sẽ khiến mọi cơ hội trôi qua, dù có tham gia khóa\n \nhọc. Câu &quot;Không biết gì thì học cũng chả biết được&quot; thể hiện rõ điều này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Kiến thức thị trường là tối quan trọng: Học viên không biết người bán buôn/bán lẻ của</span></div>\n<p class=\"body-txt\">\nmình bán sản phẩm với giá bao nhiêu, và giá trị sản phẩm được thị trường chấp nhận là\n \nbao nhiêu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Bất kỳ doanh nghiệp nào cũng cần hiểu rõ thị trường, đối thủ và</span></div>\n<p class=\"body-txt\">\nkhách hàng cuối cùng để định vị sản phẩm, chiến lược giá và phát triển sản phẩm phù\n \nhợp. Việc thiếu thông tin này là rào cản lớn nhất để mở rộng kinh doanh và tăng trưởng\n \nbền vững.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Không biết gì thì học cũng chả biết được.”\n \n“Học cũng phải làm chứ!”\n \n“Đời cứ nằm ngang ra là nó sẽ tốt hơn đời nằm dọc.”\n \n9.3 Viết Hay cho hệ thống bán nước giặt\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Tóm tắt. Buổi giảng tập trung vào tầm quan trọng của việc xây dựng nội dung bán hàng</h3>\n<p class=\"body-txt\">\nonline hiệu quả, đặc biệt là sử dụng phương pháp &quot;Start with Why&quot; (Bắt đầu với câu hỏi Tại\n \nsao). Diễn giả nhấn mạnh rằng khách hàng không mua sản phẩm mà mua lý do đằng sau sản\n \nphẩm, và việc kể câu chuyện về &quot;tại sao tôi bán&quot; phải chạm đến lý do &quot;tại sao bạn mua&quot;.\n \nNgoài ra, diễn giả cũng chỉ ra sự cần thiết của việc liệt kê, sắp xếp, lựa chọn và hành động\n \ntheo một quy trình rõ ràng, thay vì chỉ học và không làm.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vượt qua nỗi sợ hãi: Học viên chia sẻ nỗi sợ lớn nhất là về tài chính, không có quyền lựa</span></div>\n<p class=\"body-txt\">\nchọn ngay lập tức.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bán hàng truyền thống kết hợp online: Học viên đang bán hàng tạp hóa truyền thống và</span></div>\n<p class=\"body-txt\">\nbán một số mặt hàng online qua Facebook cá nhân, TikTok (livestream, video, content).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quy trình bán hàng online hiện tại: Đặt hàng qua tin nhắn/comment, ship hàng trực tiếp</span></div>\n<p class=\"body-txt\">\nhoặc COD. Đối với khách xa, vẫn thu COD sau khi đã xác nhận địa chỉ qua điện thoại.\n \nHàng giao đi rồi nhưng chưa có tiền về ngay.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Doanh số hiện tại: Trung bình bán 10 thùng/ngày (nước giặt), mỗi thùng lãi 130.000</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">VNĐ.</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Vấn đề với content: Các bài đăng về sản phẩm nước giặt của học viên không có tương tác</span></div>\n<p class=\"body-txt\">\ntốt. Bài có viết theo cấu trúc (chắc là cấu trúc diễn giả dạy) thì tương tác tốt hơn hẳn.\n \nDiễn giả chất vấn vì sao không làm tiếp cái tương tác tốt mà lại bỏ dở.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quy trình 16 bước bán hàng: Diễn giả nhắc nhở học viên về quy trình 16 bước bán hàng</span></div>\n<p class=\"body-txt\">\nđã học, và tầm quan trọng của việc liệt kê, sắp xếp, lựa chọn và hành động theo các bước\n \nđó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Start with Why (Bắt đầu với câu hỏi Tại sao): Đây là trọng tâm của buổi giảng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khách hàng không mua sản phẩm, họ mua LÝ DO đằng sau sản phẩm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Khi bán hàng, cần trả lời câu hỏi &quot;Tại sao tôi bán hàng này?&quot; một cách thuyết phục. Lý do</span></div>\n<p class=\"body-txt\">\n&quot;tôi bán&quot; phải chạm đến lý do &quot;bạn mua&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Diễn giả trích dẫn cuốn sách &quot;Start with Why&quot; và khẳng định nó là nền tảng cho việc bán</span></div>\n<p class=\"body-txt\">\nhàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Người bình thường tập trung vào &quot;Cái gì?&quot; và &quot;Làm thế nào?&quot;, còn người hạnh phúc và</span></div>\n<p class=\"body-txt\">\nthành công hơn tập trung vào &quot;Tại sao?&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Nếu không có lý do &quot;tại sao&quot;, thì &quot;nước giặt&quot; cũng không có ý nghĩa gì.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Làm việc cho thứ không quan tâm là căng thẳng, làm việc cho thứ yêu thích là đam mê.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Phải thể hiện được sự nhiệt huyết (đam mê) của mình khi bán hàng thì khách hàng sẽ</span></div>\n<p class=\"body-txt\">\nyêu quý hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Mục tiêu của bước &quot;Tại sao&quot;: Tăng sự yêu quý, độ tin cậy và tỷ lệ chốt đơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ví dụ thực tế của diễn giả: Diễn giả chia sẻ lý do &quot;tại sao&quot; diễn giả dạy học viên vào lúc 5</span></div>\n<p class=\"body-txt\">\ngiờ sáng (giờ Mỹ), và &quot;tại sao&quot; diễn giả vẫn dạy dù cuộc sống không bắt buộc. Đó là đam\n \nmê.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Cách áp dụng &quot;Tại sao&quot; vào landing page/bài bán hàng:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Đưa ra lý do tại sao khách hàng nên tham gia/mua sản phẩm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Ví dụ cho sản phẩm nước giặt: &quot;Là một mẹ bỉm sữa từng loay hoay và cải thiện tài</span></div>\n<p class=\"body-txt\">\nchính... Tôi hiểu rằng việc kiếm thêm thu nhập không chỉ là trang trải mà còn đầu tư vào\n \ntương lai của con mình. Bạn có thấy chạm không?&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Kết nối với các bà mẹ bỉm sữa, hứa hẹn một nguồn thu nhập bền vững ngay tại nhà mà</span></div>\n<p class=\"body-txt\">\nkhông cần cô đơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Xử lý từ chối và tạo FOMO (Fear Of Missing Out):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Bắt đầu bằng cách so sánh giá trên thị trường (cao) và giá của mình (thấp hơn nhiều).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tạo ra sự giới hạn về thời gian hoặc số lượng: &quot;Giá này không áp dụng rộng rãi, chỉ đặc</span></div>\n<p class=\"body-txt\">\nquyền cho những bà mẹ sớm nhất thôi.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quy trình bán hàng trên trang web (sau khi đã có &quot;tại sao&quot;):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tài liệu hướng dẫn bán hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Buổi đào tạo trực tiếp cùng chuyên gia.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Voucher giảm giá.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Testimonial (chứng thực từ khách hàng thật, có bằng chứng).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Giá bán và so sánh giá để nhấn mạnh sự rẻ hơn (rẻ cấp độ 1).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tạo sự khan hiếm (FOMO).</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #388e3c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Tổng kết (khách hàng quan tâm nhất phần này).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Hoàn thiện và cập nhật bài viết: Bài viết bán hàng không phải viết một lần là xong mà</span></div>\n<p class=\"body-txt\">\ncần được hoàn thiện và cập nhật liên tục (thêm ngữ pháp, thủ pháp, hình ảnh, video...).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Quan trọng nhất: Hành động. Diễn giả liên tục chất vấn học viên về việc làm bài tập, viết</span></div>\n<p class=\"body-txt\">\nbài, áp dụng kiến thức.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#388e3c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">&quot;Start with Why&quot; – Bắt đầu với câu hỏi &quot;Tại sao?&quot;: Đây là cốt lõi xuyên suốt buổi giảng.</span></div>\n<p class=\"body-txt\">\nKhách hàng không chỉ mua sản phẩm/dịch vụ, họ mua lý do, giá trị, niềm tin đằng sau\n \nđó. Khi người bán trình bày được &quot;tại sao tôi làm điều này&quot;, chạm đến &quot;tại sao bạn nên\n \nchọn tôi&quot;, họ sẽ tạo được sự kết nối cảm xúc, tăng độ tin cậy và tỷ lệ chốt đơn. Việc này\n \nquan trọng vì nó chuyển đổi cuộc trò chuyện từ giao dịch thuần túy sang mối quan hệ,\n \nkhiến khách hàng không chỉ mua một lần mà còn trở thành người ủng hộ trung thành.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#388e3c\">•</span><span class=\"bul-txt\">Học và Hành đồng thời: Diễn giả nhấn mạnh rằng việc học kiến thức mà không áp dụng,</span></div>\n<p class=\"body-txt\">\nkhông làm bài tập, không thực hành là vô ích. &quot;Học mà không làm thì chán lắm, chán đời\n \nlắm.&quot; Kiến thức chỉ có giá trị khi được chu
