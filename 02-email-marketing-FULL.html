g xóa hoặc hủy đăng ký.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tạo sự quan tâm: Tập trung vào lợi ích khách hàng nhận được hoặc giải quyết vấn đề họ</span></div>\n<p class=\"body-txt\">\nđang gặp phải (ví dụ: muốn khỏe mạnh, muốn có huy chương, không bị đau đớn).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sử dụng &quot;quà tặng miễn phí&quot; (Lead Magnet): Sau khi lập kế hoạch, cung cấp các tài</span></div>\n<p class=\"body-txt\">\nliệu/sản phẩm miễn phí có giá trị để thu hút khách hàng tiềm năng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nội dung PLR (Private Label Rights):</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">PLR là nội dung mà bạn được phép biên tập lại, thay đổi, thêm tên của mình làm tác giả</span></div>\n<p class=\"body-txt\">\nvà bán lại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">PLR cho phép xây dựng uy tín nhanh chóng trong một lĩnh vực.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Có thể biên tập lại nội dung, cắt ghép, dịch sang ngôn ngữ khác, đổi tên sách, xóa/thêm</span></div>\n<p class=\"body-txt\">\nảnh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">PLR giúp tạo ra hàng ngàn cuốn sách/tài liệu nhanh chóng mà không vi phạm bản</span></div>\n<p class=\"body-txt\">\nquyền.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cảnh báo: Không nên mua PLR vội vàng mà chưa hiểu rõ về nó, cần phải hiểu cấu trúc và</span></div>\n<p class=\"body-txt\">\ncách sử dụng trước.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hệ thống Affiliate Marketing:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cung cấp &quot;bộ công cụ marketing&quot; đầy đủ (chuỗi email đã soạn sẵn, ảnh bìa, banner,</span></div>\n<p class=\"body-txt\">\nlanding page) cho các affiliate.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Affiliate sẽ sử dụng công cụ đó, có thể chế lại theo cách của họ để bán sản phẩm của bạn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chia lợi nhuận (ví dụ: 50/50).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khả năng tuyển mộ hàng trăm affiliate để mở rộng quy mô bán hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tạo chuỗi email bán hàng (Ví dụ: sách dạy chó):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 1: Đặt vấn đề (chó đi vệ sinh bừa bãi).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 2: Chia sẻ giải pháp đã thử nhưng thất bại.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 3: Tìm được giải pháp hiệu quả (huấn luyện viên chuyên nghiệp).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 4: Đúc kết kinh nghiệm thành một cuốn sách và đưa ra lời chào bán với giá thấp</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">($1).</h3>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chủ động thực hiện: &quot;Các bạn phải là người làm trực tiếp.&quot; – Điều này cực kỳ quan trọng</span></div>\n<p class=\"body-txt\">\nvì nó đảm bảo bạn hiểu sâu sắc về sản phẩm, khách hàng và quy trình marketing. Khi đã\n \nlàm chủ được, việc nhân bản hoặc ủy quyền mới hiệu quả, tránh phụ thuộc và mất kiểm\n \nsoát khi thuê ngoài ngay từ đầu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nguyên tắc &quot;Quan tâm trước, bán sau&quot;: &quot;Làm cho họ quan tâm rồi chúng ta mới bán.&quot; –</span></div>\n<p class=\"body-txt\">\nĐây là kim chỉ nam cho mọi chiến lược marketing bền vững. Thay vì &quot;đâm đầu&quot; bán\n \nhàng, việc tạo giá trị, giải quyết vấn đề và xây dựng mối quan hệ tin cậy sẽ dẫn đến tỷ lệ\n \nchuyển đổi cao hơn và khách hàng trung thành hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sức mạnh của nội dung PLR: Khả năng biên tập, tái sử dụng và gắn thương hiệu cá nhân</span></div>\n<p class=\"body-txt\">\nvào nội dung PLR là một công cụ mạnh mẽ để nhanh chóng tạo ra tài liệu marketing và\n \nsản phẩm thông tin. Nó giúp tiết kiệm thời gian, chi phí đáng kể trong việc sản xuất nội\n \ndung, đặc biệt hữu ích cho những người không chuyên về viết lách.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Tôi hứa với các bạn là các bạn không thể tìm được ở Việt Nam nào đội nhóm làm email\n \nmarketing được vào thời điểm này nhá. Theo cách của tôi.”\n \n“Đôi bàn tay làm nên tất cả, sỏi đá cũng thành cơm.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Đừng mua vội nhá, đừng ai mua vội như cái này nhá. Đừng ai mua vội nhá, tôi nhắc là đừng\n \ncó mua nhá, đừng có mua nhá, đừng có mua nhá, đừng mua, đừng mua, đừng mua nghe chưa?\n \nTôi chỉ giới thiệu về từ khóa Private Label Right để các bạn hiểu thôi.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Các template email hoặc mẫu tin nhắn ngắn gọn giới thiệu về dịch vụ của FUTAGO.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Một landing page chuyên biệt, nhấn mạnh các lợi ích của render 3D chất lượng cao đối</span></div>\n<p class=\"body-txt\">\nvới khách hàng Nhật Bản.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chính sách hoa hồng rõ ràng cho mỗi hợp đồng render được giới thiệu thành công.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Điều này giúp FUTAGO mở rộng kênh tiếp cận khách hàng thông qua mạng lưới quan hệ</span></div>\n<p class=\"body-txt\">\ncủa các đối tác trong ngành, những người đã có sẵn sự tin tưởng từ khách hàng của họ.\n \n4.10 Kế hoạch viết Email\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi giảng này tập trung vào các bước lập kế hoạch cho chiến lược marketing nội</h3>\n<p class=\"body-txt\">\ndung, đặc biệt nhấn mạnh tầm quan trọng của việc xác định sản phẩm và khách hàng mục\n \ntiêu. Thầy  hướng dẫn học viên cách lập danh sách các chủ đề mà người\n \nđăng ký quan tâm, xoay quanh các vấn đề của thị trường, giải pháp thông thường và giải\n \npháp riêng của doanh nghiệp. Đồng thời, cần lập danh sách tất cả các sản phẩm cần bán, mỗi\n \nsản phẩm đi kèm với một chuỗi nội dung bao gồm &quot;vấn đề - giải pháp thông thường - giải\n \npháp của tôi&quot;.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đi vào chi tiết về việc lập kế hoạch (là nội dung đã học ở buổi trước).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Luôn luôn giữ sản phẩm định bán trong tương lai trong đầu, khác với quan điểm không</span></div>\n<p class=\"body-txt\">\nnói về sản phẩm trong một số chương trình khác (như Super Success).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Lập danh sách các chủ đề mà người đăng ký (subscriber) có thể quan tâm, bao gồm:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Các vấn đề mà thị trường đang gặp phải.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Các giải pháp thông thường trên thị trường.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giải pháp của bạn (là doanh nghiệp).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Lập danh sách tất cả các sản phẩm cần bán, không chỉ một mà là nhiều sản phẩm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mỗi một sản phẩm đều cần có một chuỗi nội dung là: Vấn đề -&gt; Giải pháp thông thường -</span></div>\n<p class=\"body-txt\">\n&gt; Giải pháp của tôi.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Luôn luôn giữ cái sản phẩm trong đầu&quot;: Điều này quan trọng vì nó định hướng mọi nỗ</span></div>\n<p class=\"body-txt\">\nlực marketing. Khi có một sản phẩm rõ ràng trong tâm trí, doanh nghiệp sẽ biết chính\n \nxác mình đang quảng bá điều gì, ai là khách hàng mục tiêu và giá trị cốt lõi cần truyền\n \ntải. Điều này giúp tránh việc tạo ra nội dung lan man, không hiệu quả và đảm bảo mọi\n \nhoạt động đều phục vụ mục tiêu kinh doanh cụ thể.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cấu trúc nội dung theo &quot;Vấn đề – Giải pháp thông thường – Giải pháp của bạn&quot;: Đây là</span></div>\n<p class=\"body-txt\">\nmột khung sườn mạnh mẽ để thu hút và thuyết phục khách hàng. Bằng cách bắt đầu từ\n \nvấn đề mà khách hàng đang gặp phải, sau đó chỉ ra những cách giải quyết phổ biến (có\n \nthể chưa tối ưu), và cuối cùng giới thiệu giải pháp độc đáo, vượt trội của mình, doanh\n \nnghiệp xây dựng được sự đồng cảm, thể hiện sự am hiểu thị trường và chứng minh giá\n \ntrị sản phẩm/dịch vụ của mình một cách rõ ràng và hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Lập danh sách tất cả các sản phẩm, không chỉ một: Insight này khuyến khích doanh</span></div>\n<p class=\"body-txt\">\nnghiệp tư duy mở rộng về danh mục sản phẩm/dịch vụ. Việc có một cái nhìn tổng thể về\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\ntất cả những gì mình có thể cung cấp giúp doanh nghiệp lên chiến lược marketing đa\n \ndạng hơn, tìm kiếm cơ hội cross-selling hoặc up-selling, và đảm bảo có thể đáp ứng\n \nnhiều nhu cầu khác nhau của thị trường, tối đa hóa tiềm năng doanh thu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Luôn luôn giữ cái sản phẩm trong đầu, ngược với cả chương trình siêu success đúng không ạ?\n \nLà tôi đừng nói gì về sản phẩm hết ấy. Ở đây là bạn phải giữ cái sản phẩm định bán trong\n \ntương lai.”\n \n“Không phải bán một sản phẩm mà bạn có thể bán nhiều sản phẩm. Cho nên phải lập tất cả\n \ncác sản phẩm đó.”\n \n“Vấn đề, giải pháp thông thường, giải pháp của tôi.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Render concept/ý tưởng ban đầu.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Render 360 độ/VR.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mỗi &quot;sản phẩm&quot; này có thể được quảng bá với chuỗi &quot;Vấn đề - Giải pháp thông thường -</span></div>\n<p class=\"body-txt\">\nGiải pháp của FUTAGO&quot; như đã nêu ở trên.\n \n4.11 Suy nghĩ thấu đáo\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học này hướng dẫn quy trình xác định thị trường mục tiêu và vấn đề của họ,</h3>\n<p class=\"body-txt\">\nsau đó phát triển sản phẩm để giải quyết những vấn đề đó. Thầy  chỉ ra\n \ncách sử dụng các công cụ tìm kiếm như Google và YouTube để khám phá các chủ đề mà\n \nkhách hàng thực sự quan tâm, từ đó xây dựng nội dung liên quan trực tiếp đến giải pháp của\n \nsản phẩm. Mục tiêu cuối cùng là tạo ra các chủ đề thu hút sự chú ý và thúc đẩy hành vi mua\n \nhàng một cách hiệu quả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xác định rõ thị trường mục tiêu (ví dụ: nữ giới từ 35-42 tuổi, cách nhà 5km).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tìm ra vấn đề của thị trường (thị trường lạnh).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tìm ra sản phẩm để giải quyết các vấn đề này (quy trình thuận: thị trường -&gt; vấn đề -&gt;</span></div>\n<p class=\"body-txt\">\nsản phẩm).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tập trung vào sản phẩm cần bán để viết các chủ đề liên quan, chỉ viết về những vấn đề</span></div>\n<p class=\"body-txt\">\nmà sản phẩm giải quyết để tránh lan man.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tạo danh sách các sản phẩm (bắt đầu với một sản phẩm, nhưng cần có nhiều sản phẩm</span></div>\n<p class=\"body-txt\">\nđể bán được nhiều lần).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tạo danh sách các chủ đề mà người dùng quan tâm:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sử dụng Google (ví dụ: gõ &quot;lão hóa da&quot;) để xem các từ khóa và chủ đề mà Google đề xuất.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tương tự với YouTube (máy tìm kiếm lớn thứ hai thế giới).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Các đề xuất này thường bao gồm các vấn đề và giải pháp thông thường (ví dụ: lão hóa da</span></div>\n<p class=\"body-txt\">\ntay, vùng mắt, cách chống lão hóa).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Có thể sử dụng từ khóa tiếng Anh (&quot;anti-aging&quot;) và các công cụ như Answer the Public</span></div>\n<p class=\"body-txt\">\nhoặc Answer Socrates để tìm thêm đề tài.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Áp dụng các câu hỏi &quot;what, which, when, who, will, where, why, how, can, are&quot; để biến</span></div>\n<p class=\"body-txt\">\ntừ khóa thành các đề tài cụ thể, có chiều sâu (ví dụ: &quot;Sản phẩm chống lão hóa nào thực\n \nsự hiệu quả?&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tạo các chủ đề liên quan đến sản phẩm của mình, đặc biệt là các chủ đề thúc đẩy mua</span></div>\n<p class=\"body-txt\">\nhàng (thuộc nhóm 3 &amp; 4):\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Làm thế nào để sử dụng [sản phẩm]?&quot; (Ví dụ: &quot;Làm thế nào để sử dụng Slimcare giảm</span></div>\n<p class=\"body-txt\">\ncân có hiệu quả?&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Tôi đã dùng [sản phẩm] thay bữa sáng như thế nào?&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Đánh giá sản phẩm [sản phẩm] sau 1 tháng sử dụng.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Viết về các tính năng và lợi ích của sản phẩm (ví dụ: &quot;Tại sao tôi lại lựa chọn Slimcare?&quot;,</span></div>\n<p class=\"body-txt\">\n&quot;21 vitamin và khoáng chất – Đó là lý do tại sao tôi sử dụng Slimcare&quot;, &quot;Không chứa chất\n \ncấm – Đó là lý do tại sao khuyên dùng Slimcare cho vận động viên hàng đầu&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Các chủ đề thúc đẩy mua hàng cần có đường link dẫn về trang bán hàng.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tập trung nội dung vào giải pháp mà sản phẩm cung cấp: Thầy nhấn mạnh chỉ viết các</span></div>\n<p class=\"body-txt\">\nchủ đề liên quan đến vấn đề mà sản phẩm của bạn giải quyết, bỏ qua những vấn đề\n \nkhông liên quan. Điều này quan trọng vì nó giúp tối ưu hóa thời gian, nguồn lực và đảm\n \nbảo mọi nội dung đều dẫn dắt khách hàng tiềm năng đến đúng sản phẩm của mình,\n \ntránh lãng phí công sức vào những thông tin lan man không có mục đích chuyển đổi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khai thác công cụ tìm kiếm để tạo chủ đề nội dung: Việc sử dụng Google và YouTube</span></div>\n<p class=\"body-txt\">\n(cùng với các công cụ gợi ý từ khóa khác) để khám phá những gì khách hàng đang thực\n \nsự tìm kiếm là một phương pháp hiệu quả. Nó đảm bảo nội dung bạn tạo ra có nhu cầu\n \ncao, đúng trọng tâm và thu hút được lượng truy cập tự nhiên, vì bạn đang cung cấp câu\n \ntrả lời cho những câu hỏi mà khách hàng đang chủ động đặt ra.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sử dụng framework câu hỏi (what, which, why, how...) để phát triển sâu chủ đề: Áp dụng</span></div>\n<p class=\"body-txt\">\ncác từ hỏi như &quot;cái gì, cái nào, khi nào, ai, sẽ, ở đâu, tại sao, làm như thế nào, có thể, là&quot;\n \ngiúp biến một từ khóa chung thành nhiều đề tài cụ thể, hữu ích và hấp dẫn hơn. Điều này\n \nkhông chỉ cung cấp thông tin toàn diện mà còn chạm đến những băn khoăn sâu sắc hơn\n \ncủa khách hàng, từ đó tạo ra giá trị nội dung cao và tăng khả năng chuyển đổi.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Chỉ viết cái chủ đề liên quan tới cái vấn đề mà cái sản phẩm nó giải quyết thôi. Còn những cái\n \nvấn đề mà sản phẩm nó không giải quyết thì mình không viết.”\n \n“Sản phẩm chống lão hóa nào thực sự hiệu quả?”\n \n“Làm thế nào để sử dụng cái sản phẩm?”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chủ đề giải quyết vấn đề khách hàng quan tâm (dùng 5W1H):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Làm thế nào để CG パース (diễn họa kiến trúc) của bạn gây ấn tượng mạnh với khách</span></div>\n<p class=\"body-txt\">\nhàng Nhật Bản và tăng tỷ lệ thắng thầu?&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Tại sao các công ty thiết kế hàng đầu Nhật Bản lại ưu tiên phối cảnh 3D chất lượng cao</span></div>\n<p class=\"body-txt\">\ntrong các buổi thuyết trình dự án?&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Sản phẩm diễn họa kiến trúc nào của FUTAGO BIM giúp các KTS Nhật Bản biến ý tưởng</span></div>\n<p class=\"body-txt\">\nphức tạp thành hình ảnh 3D sống động và dễ hiểu nhất?&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Bằng cách nào FUTAGO BIM giúp các công ty xây dựng tại Nhật Bản tiết kiệm thời gian</span></div>\n<p class=\"body-txt\">\nvà chi phí cho việc tạo hình ảnh dự án chất lượng cao?&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chủ đề thúc đẩy mua hàng (tập trung vào sản phẩm/dịch vụ FUTAGO):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Làm thế nào để quy trình đặt hàng dịch vụ diễn họa kiến trúc tại FUTAGO BIM giúp bạn</span></div>\n<p class=\"body-txt\">\nnhận được hình ảnh hoàn hảo trong thời gian kỷ lục?&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Đánh giá chi tiết dịch vụ CG パース của FUTAGO BIM: Góc nhìn từ các KTS và chủ đầu</span></div>\n<p class=\"body-txt\">\ntư hàng đầu Nhật Bản.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;5 lợi ích độc quyền khi hợp tác với FUTAGO BIM cho mọi nhu cầu diễn họa kiến trúc 3D</span></div>\n<p class=\"body-txt\">\ncủa bạn.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Tại sao các đối tác Nhật Bản tin tưởng lựa chọn FUTAGO BIM là đơn vị cung cấp giải</span></div>\n<p class=\"body-txt\">\npháp diễn họa kiến trúc 3D cho các dự án quan trọng nhất của họ.&quot;\n \n4.12 Các loại email\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi giảng này của  tập trung vào các loại email marketing cơ</h3>\n<p class=\"body-txt\">\nbản và cách sử dụng chúng hiệu quả. Thầy trình bày 5 loại email chính: Autoresponder, E-\n \ncourse, Promotion, Follow-up, và Review/Case Study. Mục tiêu là giúp người học hiểu rõ\n \ncông dụng từng loại để xây dựng các chuỗi email tương tác, từ giới thiệu sản phẩm đến\n \nchăm sóc khách hàng và khuyến khích hành động, nhằm tối ưu hóa chiến lược email\n \nmarketing.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Các loại email:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Autoresponder: Email được gửi tự động theo thời gian tuần tự hoặc theo hành vi của</span></div>\n<p class=\"body-txt\">\nngười đọc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">E-course (Khóa học qua email): Một chuỗi các email liên tục cùng một chủ đề, hướng</span></div>\n<p class=\"body-txt\">\ndẫn một điều gì đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;E&quot; là Internet/Email, &quot;course&quot; là khóa học.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ: &quot;21 ngày đánh tan mỡ bụng&quot;, &quot;28 ngày video marketing&quot;, &quot;15 ngày để học</span></div>\n<p class=\"body-txt\">\nPhotoshop&quot;, &quot;30 ngày để trở thành bậc thầy sáng tạo video&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Promotion (Quảng bá): Email được viết để quảng bá sản phẩm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ: Quảng bá sản phẩm &quot;Sale Success System&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Follow-up (Chăm sóc/Nhắc lại): Email được viết để chăm sóc cho email phía trước bạn</span></div>\n<p class=\"body-txt\">\nđã viết.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mục đích là nhắc lại, tạo tương tác với người nhận sau khi họ nhận được email đầu tiên.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ minh họa: Gửi một email &quot;chửi&quot; (nhắc nhở tiêu cực) vì không đọc thư, sau đó gửi</span></div>\n<p class=\"body-txt\">\nmột email xin lỗi để tạo phản hồi và dẫn dắt người đọc trở lại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kỹ thuật sử dụng: Thêm chữ &quot;Re:&quot; vào tiêu đề để email được &quot;dính vào nhau&quot;, tạo thành</span></div>\n<p class=\"body-txt\">\nmột chuỗi liên tục.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đánh giá (Review) / Case Study:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Review: Email đánh giá về một loại thiết bị hoặc sản phẩm. Video review là loại video</span></div>\n<p class=\"body-txt\">\nhot nhất trên YouTube.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Case Study: Email trình bày một trường hợp điển hình về việc sử dụng sản phẩm hoặc</span></div>\n<p class=\"body-txt\">\ndịch vụ của doanh nghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ: Đánh giá kính &quot;Oakley Sucho&quot;.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email marketing không chỉ là gửi tin tức, mà là một hành trình tương tác đa dạng: Buổi</span></div>\n<p class=\"body-txt\">\ngiảng đã phân loại rõ ràng các mục đích của email (hướng dẫn, quảng bá, chăm sóc, đánh\n \ngiá), vượt ra ngoài việc chỉ gửi email thông báo thông thường. Điều này quan trọng vì nó\n \ngiúp người học hình dung một chiến lược email marketing toàn diện, từ giáo dục khách\n \nhàng, kích thích hành động, đến xây dựng mối quan hệ lâu dài, thay vì chỉ tập trung vào\n \nbán hàng trực tiếp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kỹ thuật Follow-up email với yếu tố &quot;gây sốc&quot; và &quot;xin lỗi&quot; có thể tạo tương tác cực kỳ</span></div>\n<p class=\"body-txt\">\nhiệu quả: Ví dụ thực tế về việc gửi email &quot;chửi&quot; và sau đó &quot;xin lỗi&quot; là một chiến lược táo\n \nbạo nhưng chứng minh khả năng kích hoạt phản ứng mạnh mẽ từ người nhận. Điều này\n \nphá vỡ khuôn mẫu email truyền thống, thu hút sự chú ý, tạo ra cảm xúc và mở ra cơ hội\n \ntương tác hai chiều, từ đó tăng tỷ lệ mở và phản hồi. Việc thêm &quot;Re:&quot; vào tiêu đề cũng là\n \nmột kỹ thuật nhỏ nhưng hiệu quả để &quot;dán&quot; các email vào nhau, duy trì mạch hội thoại và\n \nnhắc nhở người đọc về nội dung trước đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">E-course qua email là công cụ mạnh mẽ để giáo dục thị trường và xây dựng uy tín: Thay</span></div>\n<p class=\"body-txt\">\nvì chỉ bán hàng, việc cung cấp một chuỗi email hướng dẫn (như &quot;21 ngày đánh tan mỡ\n \nbụng&quot;) giúp tạo giá trị trước, thu hút đối tượng quan tâm và dần xây dựng niềm tin. Điều\n \nnày quan trọng vì nó là một chiến lược content marketing qua email, giúp chuyển đổi\n \nngười theo dõi thành khách hàng tiềm năng bằng cách giải quyết vấn đề của họ trước,\n \nđịnh vị người gửi là chuyên gia trong lĩnh vực.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Một chuỗi các email liên tục cùng một chủ đề hướng dẫn một điều gì đó.”\n \n“Follow-up có nghĩa là chăm sóc là một email để viết để chăm sóc cho cái email mà phía trước\n \nbạn đã viết.”\n \n“Bạn là loại người gì vậy?”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">FUTAGO có thể tạo chuỗi email ngắn gọn (ví dụ: &quot;5 ngày làm chủ kỹ thuật trình bày ý</span></div>\n<p class=\"body-txt\">\ntưởng kiến trúc với hình ảnh 3D hiệu quả&quot; hoặc &quot;3 bí quyết để render 3D chân thực như\n \nảnh chụp&quot;) cung cấp các tip, hướng dẫn nhanh cho kiến trúc sư hoặc các công ty thiết\n \nkế/xây dựng về cách tận dụng tối đa hình ảnh diễn họa kiến trúc để thuyết phục khách\n \nhàng. Điều này giúp FUTAGO cung cấp giá trị miễn phí, thu hút khách hàng tiềm năng và\n \nxây dựng vị thế chuyên gia trong lĩnh vực diễn họa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Promotion (Quảng bá):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi email quảng bá các gói dịch vụ render 3D mới, giới thiệu các dự án diễn họa kiến</span></div>\n<p class=\"body-txt\">\ntrúc nổi bật đã hoàn thành trong portfolio, hoặc các ưu đãi đặc biệt cho khách hàng B2B\n \n(KTS/thiết kế). Nội dung cần tập trung vào lợi ích mà dịch vụ render của FUTAGO mang\n \nlại: giúp khách hàng tiết kiệm thời gian, nâng cao chất lượng trình bày, và tăng khả năng\n \ntrúng thầu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Follow-up (Chăm sóc/Nhắc lại):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sau khi gửi báo giá hoặc một bộ portfolio cho khách hàng tiềm năng, FUTAGO có thể gửi</span></div>\n<p class=\"body-txt\">\nemail follow-up để hỏi thăm, nhắc lại giá trị độc đáo của dịch vụ. Ví dụ: &quot;Bạn đã xem qua\n \ncác hình ảnh render dự án [Tên dự án] chúng tôi gửi hôm qua chưa? Liệu có phần nào\n \nFUTAGO cần làm rõ hơn để giúp bạn hình dung dự án của mình một cách hoàn hảo nhất\n \nkhông?&quot;. Sử dụng kỹ thuật thêm &quot;Re:&quot; vào tiêu đề để kết nối các email liên quan, tạo cảm\n \ngiác về một cuộc trò chuyện đang tiếp diễn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Review / Case Study:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">FUTAGO có thể tạo email chia sẻ case study về một dự án diễn họa kiến trúc cụ thể đã</span></div>\n<p class=\"body-txt\">\nthực hiện thành công: &quot;Cách FUTAGO BIM giúp công ty A đạt được hợp đồng dự án B\n \nnhờ hình ảnh render 3D ấn tượng và chuyên nghiệp.&quot; Email có thể bao gồm hình ảnh\n \ntrước/sau (nếu có), các thách thức mà khách hàng ban đầu gặp phải và cách giải pháp\n \ndiễn họa của FUTAGO đã giúp họ vượt qua, kèm theo phản hồi của khách hàng. Điều này\n \ngiúp khách hàng tiềm năng hình dung rõ ràng về năng lực và chất lượng dịch vụ của\n \nFUTAGO qua các ví dụ thực tế.\n \n4.13 Thư trả lời tự động\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học này tập trung vào chiến lược email marketing tự động (autoresponder)</h3>\n<p class=\"body-txt\">\nvà cách thức vận hành của nó trong bối cảnh phân định giữa giao tiếp &quot;thực&quot; và &quot;ảo&quot; trên\n \nkhông gian số. Thầy  nhấn mạnh sự cần thiết của việc nắm vững kiến thức\n \nnền tảng và thiết kế kịch bản thông minh để xây dựng các chuỗi email tự động. Các chuỗi\n \nemail này có thể được kích hoạt dựa trên thời gian hoặc hành vi của người dùng, nhằm mục\n \nđích nuôi dưỡng khách hàng tiềm năng, truyền tải thông tin và thúc đẩy hành động, với &quot;trí\n \ntuệ&quot; của người lập trình hệ thống là yếu tố then chốt.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy Long mở đầu bằng việc khiển trách học viên vì chưa học kỹ các bài giảng trước đó</span></div>\n<p class=\"body-txt\">\n(tuần 1, các video miễn phí trên YouTube, video hướng dẫn cài đặt hệ thống), nhấn\n \nmạnh tầm quan trọng của việc nắm vững kiến thức nền tảng.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Buổi học đề cập đến khái niệm &quot;thực&quot; và &quot;ảo&quot; trong giao tiếp kỹ thuật số, đặt câu hỏi về</span></div>\n<p class=\"body-txt\">\ntính thực của email so với thư tay hay sách điện tử so với sách giấy. Mặc dù email hiển\n \nthị trên màn hình, nhưng người dùng không thể chạm trực tiếp vào nó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chatbot được giới thiệu như một hình thức phản hồi tự động, tạo ra trải nghiệm người</span></div>\n<p class=\"body-txt\">\ndùng như đang tương tác trực tiếp với người thật (ví dụ: thầy  trên\n \nfanpage).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hệ thống Autoresponder (phản hồi tự động) được phân loại thành hai dạng chính:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phản hồi theo thời gian: Gửi email theo một lịch trình cố định (ví dụ: ngày 1, ngày 3,</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">ngày 7 sau khi đăng ký). Ví dụ như email &quot;i-course&quot; (newsletter) thông báo tiến độ học</h3>\n<p class=\"body-txt\">\ntập hoặc email &quot;Forever Green&quot; viết từ 10 năm trước nhưng vẫn được gửi tự động.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phản hồi theo hành vi: Gửi email dựa trên các tương tác cụ thể của người dùng. Ví dụ,</span></div>\n<p class=\"body-txt\">\nnếu người dùng không mở email số 20, hệ thống sẽ không gửi email số 21 mà thay vào\n \nđó gửi một email &quot;chăm sóc&quot; nhắc nhở mở email 20.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy Long trình bày các ví dụ thực tế về email được gửi trong các chiến dịch của mình,</span></div>\n<p class=\"body-txt\">\nbao gồm email tự động (viết một lần và gửi liên tục trong nhiều năm) và email quảng bá\n \nsản phẩm/khóa học (có thể tự động hoặc gửi bằng tay).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giới thiệu cấu trúc cơ bản của một chiến dịch email marketing, bao gồm việc xây dựng</span></div>\n<p class=\"body-txt\">\n&quot;list&quot; (danh bạ - diễn giả gọi là `LEAD`) và thiết kế các &quot;campaign&quot; (chiến dịch) nhỏ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hướng dẫn cụ thể cách cài đặt một chuỗi email tự động theo lịch trình đã định (ví dụ:</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">ngày 0, 1, 2, 4, 6, 8, 11, 14, 17, 20, 27, 34, 41, 48...).</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nhấn mạnh rằng phần nội dung của email tự động *không thể tự động được* mà phải do</span></div>\n<p class=\"body-txt\">\ncon người (có &quot;não người&quot;) viết và thiết kế.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy trình bày một Landing Page (trang đích) với nội dung &quot;Bí quyết tìm kiếm người</span></div>\n<p class=\"body-txt\">\nchồng nghiêm túc như mong muốn dành cho những người phụ nữ đơn thân&quot; đã thu hút\n \n16.000 lượt đăng ký, làm minh chứng cho hiệu quả của email marketing.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sự giao thoa giữa &quot;thực&quot; và &quot;ảo&quot; trong tự động hóa: Thầy Long nhấn mạnh rằng dù email</span></div>\n<p class=\"body-txt\">\nhay chatbot phản hồi tự động, đằng sau đó vẫn là &quot;não người&quot; – trí tuệ và chiến lược của\n \nngười tạo ra hệ thống. Điều này quan trọng vì nó chuyển trọng tâm từ công nghệ thuần\n \ntúy sang tư duy thiết kế, giúp người học nhận ra giá trị cốt lõi nằm ở việc xây dựng kịch\n \nbản, nội dung và chiến lược giao tiếp thông minh, chứ không phải chỉ là công cụ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khả năng cá nhân hóa cao với Autoresponder theo hành vi: Việc phân biệt hai loại</span></div>\n<p class=\"body-txt\">\nautoresponder (theo thời gian và theo hành vi) là nền tảng để tối ưu hóa chiến dịch\n \nemail. Đặc biệt, autoresponder dựa trên hành vi cho phép gửi email cực kỳ phù hợp và\n \ncá nhân hóa, giúp tăng cường sự gắn kết và tỷ lệ chuyển đổi hiệu quả hơn rất nhiều so\n \nvới các chiến dịch gửi email hàng loạt không có chiến lược.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kỷ luật học tập và kiến thức nền tảng là cốt lõi: Việc thầy Long dành phần đầu buổi để</span></div>\n<p class=\"body-txt\">\nnhấn mạnh việc học bài và xem các video hướng dẫn là cực kỳ quan trọng. Đây là lời\n \nnhắc nhở rằng dù công cụ tự động hóa có mạnh mẽ đến đâu, nó cũng vô dụng nếu người\n \nsử dụng không có nền tảng kiến thức vững chắc và sự kỷ luật trong học hỏi, nắm vững\n \nnguyên lý vận hành.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Minh chứng bằng kết quả thực tế và khả năng mở rộng: Các ví dụ thực tế về chiến dịch</span></div>\n<p class=\"body-txt\">\nemail thu về hàng ngàn, thậm chí hàng chục ngàn đăng ký (như 16.000 đăng ký cho\n \nLanding Page &quot;Bí quyết tìm chồng&quot;) chỉ trong thời gian ngắn là bằng chứng hùng hồn\n \ncho tiềm năng to lớn của email marketing. Điều này cung cấp động lực mạnh mẽ và chỉ\n \nra rằng với chiến lược đúng đắn, các hệ thống tự động có thể mang lại kết quả vượt trội,\n \nnhanh chóng và có khả năng mở rộng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Ngay cả cái chuyến bay của tôi cũng phải ngưng ở giữa lại để làm Zoom với anh em đúng\n \nkhông? Một cái vé máy bay là 5 triệu thì theo tôi theo anh chị em cái khóa học này có xứng\n \nđáng hơn một cái vé máy bay để phải hủy đi không?”\n \n“Bạn đang chat với  fanpage đúng không ạ? Và bạn luôn nói rằng là đấy là\n \nthầy  nói chuyện với các bạn. Đúng là  này nói chuyện với\n \ncác bạn này. Nhưng mà phần lớn ấy là bạn đang nói chuyện với một con bot.”\n \n“Cái phần này không tự động được. Phải có não người dùng thì mới viết được.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nếu khách hàng mở một email cụ thể (ví dụ: Email 2 về case study), hệ thống có thể tự</span></div>\n<p class=\"body-txt\">\nđộng gửi một email tiếp theo chứa portfolio chi tiết hơn về các dự án tương tự hoặc một\n \nlời mời đặt lịch tư vấn riêng (miễn phí) để tìm hiểu nhu cầu diễn họa của họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nếu khách hàng không mở bất kỳ email nào trong chuỗi sau một khoảng thời gian nhất</span></div>\n<p class=\"body-txt\">\nđịnh (ví dụ 10-14 ngày), hệ thống có thể gửi một email &quot;chăm sóc&quot; nhẹ nhàng, hỏi liệu có\n \nmuốn nhận các loại thông tin khác không, hoặc có đang gặp khó khăn gì trong việc thể\n \nhiện ý tưởng thiết kế của mình hay không, có thể FUTAGO có giải pháp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nội dung email chất lượng cao: Luôn đảm bảo nội dung email tập trung vào các vấn đề,</span></div>\n<p class=\"body-txt\">\nmối quan tâm và giá trị cốt lõi của các KTS Nhật Bản liên quan đến diễn họa kiến trúc. Sử\n \ndụng ngôn ngữ chuyên nghiệp và hình ảnh minh họa chất lượng cao để thể hiện đẳng\n \ncấp của FUTAGO. Tránh các từ ngữ marketing quá phô trương.\n \n*Lưu ý quan trọng: Tuyệt đối không gợi ý FUTAGO cung cấp dịch vụ/tư vấn/khoá học BIM,\n \nvì &quot;BIM&quot; chỉ là tên thương hiệu. Chỉ tập trung vào dịch vụ diễn họa kiến trúc (CG パース\n \n/render 3D) và các lợi ích liên quan đến hình ảnh kiến trúc.*\n \n4.14 Các loại email phần 2\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi giảng này tập trung vào các kiểu email khác nhau trong internet marketing và</h3>\n<p class=\"body-txt\">\ncách sử dụng chúng hiệu quả. Thầy  giới thiệu các loại email từ tuần tự (e-\n \ncourse), bán hàng (promotion), đánh giá/nghiên cứu điển hình (review/case study), thông\n \nbáo nội dung mới (content announcement) đến email xây dựng mối quan hệ (relationship\n \nbuilding), nhấn mạnh tầm quan trọng của việc mang lại lợi ích cho người nhận và duy trì kết\n \nnối cá nhân.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email E-course (khóa học điện tử): Là hệ thống email tuần tự, được gửi theo lịch trình</span></div>\n<p class=\"body-txt\">\nđịnh sẵn (ví dụ: gửi ngày 1, ngày 2, ngày 3,... cho đến ngày 28).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email Promotion (quảng cáo/bán hàng): Là các email bán hàng, có thể được gửi tự động.</span></div>\n<p class=\"body-txt\">\nCần tập trung vào việc chia sẻ trải nghiệm cá nhân về sản phẩm hoặc dịch vụ, bao gồm cả\n \nđiểm tốt và điểm chưa tốt (ví dụ: review mật ong chanh đào, phân tích ưu nhược điểm\n \ncủa bao bì sản phẩm thủ công). Khi viết email dạng này, cần nêu rõ sản phẩm &quot;được cái\n \ngì, chưa được cái gì, cải tiến ra làm sao.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email Review/Case Study (đánh giá/nghiên cứu điển hình): Chia sẻ trường hợp sử dụng</span></div>\n<p class=\"body-txt\">\nmột sản phẩm, dịch vụ hoặc phương pháp cụ thể, nêu bật cách người dùng đã áp dụng và\n \nkết quả đạt được.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ: Sử dụng mật ong chanh đào giúp cổ họng dịu lại, hết ngứa.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ: Cách sử dụng bàn trộn âm thanh, lý do sử dụng một loại micro cụ thể, cách lắp đặt</span></div>\n<p class=\"body-txt\">\nhệ thống micro.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ: Cách nuôi dưỡng và sử dụng lồng đẻ cho cá bảy màu tại nhà.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email Content Announcement (thông báo nội dung): Thông báo cho người đọc biết về</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">nội dung mới của bạn (ví dụ: video mới trên YouTube, bài viết mới trên blog, audio</h3>\n<p class=\"body-txt\">\nmới).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Lưu ý quan trọng: Tuyệt đối không thông báo một cách thúc giục, ép buộc người xem (ví</span></div>\n<p class=\"body-txt\">\ndụ: &quot;Này Ngọc Lan ơi, bạn có thấy tôi vừa lên một cái video mới không, bạn xem đi!&quot;).\n \nNgười nhận sẽ không bấm vào link.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khi thông báo, phải hứa hẹn về lợi ích mà nội dung đó mang lại cho người đọc (ví dụ:</span></div>\n<p class=\"body-txt\">\nvideo giúp &quot;lãnh đạo và làm việc hiệu quả hơn&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email Relationship Building (xây dựng mối quan hệ): Chia sẻ những câu chuyện cá nhân,</span></div>\n<p class=\"body-txt\">\ntin vui, tin buồn hoặc các sự kiện trong cuộc sống hàng ngày để tạo sự gắn kết và tin\n \ntưởng với độc giả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ: Kể về quá trình tán gái, cưới vợ, đi trăng mật, có bầu và sinh con.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ: Chia sẻ về những khó khăn gần đây (vợ chồng nhân viên qua đời, huấn luyện viên</span></div>\n<p class=\"body-txt\">\ntrưởng đi nghĩa vụ, ông vợ bất tỉnh) rồi kết thúc bằng một tin vui (hình ảnh siêu âm con\n \nnhỏ trong bụng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ: Chia sẻ về việc tham gia và hoàn thành một cuộc thi marathon.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy nhấn mạnh rằng hệ thống email tự động có thể hoạt động liên tục trong nhiều năm,</span></div>\n<p class=\"body-txt\">\nthậm chí 10 năm sau hay sau khi người tạo ra nó không còn, vẫn tự động hoạt động và\n \nmang lại giá trị.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Các kiểu email này sẽ được &quot;bày binh bố trận&quot; (sắp xếp và sử dụng) theo một tỷ lệ nhất</span></div>\n<p class=\"body-txt\">\nđịnh để đạt hiệu quả cao nhất.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tập trung vào lợi ích cho người nhận và hứa hẹn lợi ích rõ ràng: Đây là yếu tố then chốt</span></div>\n<p class=\"body-txt\">\nquyết định liệu email có được mở và nội dung có được tương tác hay không. Người đọc\n \nchỉ hành động khi họ thấy email mang lại giá trị thực sự cho bản thân. Việc thiếu đi lời\n \nhứa về lợi ích sẽ khiến email bị bỏ qua, không đạt được mục đích truyền thông.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sử dụng email để xây dựng mối quan hệ cá nhân sâu sắc, không chỉ để bán hàng: Các</span></div>\n<p class=\"body-txt\">\nemail chia sẻ những câu chuyện đời thường, thành tựu cá nhân hoặc thậm chí là khó\n \nkhăn giúp tạo dựng sự đồng cảm và tin tưởng. Mối quan hệ cá nhân này biến độc giả\n \nthành những người hâm mộ trung thành, tăng cường sự gắn kết lâu dài và bền vững với\n \nthương hiệu hoặc cá nhân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khả năng tự động hóa và duy trì giá trị lâu dài của email marketing: Hệ thống email tự</span></div>\n<p class=\"body-txt\">\nđộng (như e-course, chuỗi email thông báo) có thể hoạt động hiệu quả trong nhiều năm\n \nmà không cần can thiệp thủ công. Điều này đảm bảo việc truyền tải thông điệp và xây\n \ndựng mối quan hệ liên tục, mang lại giá trị bền vững cho doanh nghiệp ngay cả khi\n \nngười tạo ra nó không còn trực tiếp quản lý.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Luôn luôn phải đem lại lợi ích cho người ta.”\n \n“Phải hứa người ta biết là trong cái video này có lợi ích cho người ta đấy, thì người ta mới\n \nbấm vào đây.”\n \n“Bạn có nhớ là ngày hôm nay bạn viết cho họ, nhưng mà 10 năm sau nó vẫn hoạt động đúng\n \nkhông ạ? Và sau khi bạn chết đi nó còn hoạt động không ạ? Nó vẫn hoạt động tự động.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi giảng tập trung vào quy trình sử dụng email marketing để xây dựng mối quan</h3>\n<p class=\"body-txt\">\nhệ và bán hàng một cách hiệu quả, thông qua việc kể chuyện cá nhân và chia sẻ trải nghiệm\n \nthực tế. Thầy Long đã trình bày một chuỗi email gồm 4-5 bước, từ việc kể về vấn đề cá nhân,\n \nthử các giải pháp thông thường không hiệu quả, đến việc khám phá một giải pháp tuyệt vời\n \nvà sau cùng là kêu gọi hành động với ưu đãi. Cốt lõi là thay vì bán hàng trực tiếp, hãy xây\n \ndựng sự tin tưởng và kết nối bằng câu chuyện, sau đó giới thiệu giải pháp như một khám\n \nphá cá nhân.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Bài tập về nhà tuần này: Dựa trên bảng ma trận nội dung, biến đổi các ý tưởng thành nội</span></div>\n<p class=\"body-txt\">\ndung mà người dùng (khách hàng) có thể quan tâm, sử dụng các công cụ tìm kiếm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ sản phẩm: Mật ong chanh đào Sapa, giải quyết vấn đề viêm họng, ho, đờm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chiến lược email: Sử dụng email &quot;xây dựng mối quan hệ&quot; để kể về vấn đề và giải pháp,</span></div>\n<p class=\"body-txt\">\nkhông bán hàng trực tiếp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 1 (Xây dựng mối quan hệ): Kể chuyện cá nhân về chuyến đi Côn Đảo, sân bay bé,</span></div>\n<p class=\"body-txt\">\nđường băng chỉ hoạt động ban ngày, hàng trăm người bạn bị kẹt, nhưng anh ấy vẫn về\n \nkịp để tham gia chương trình email marketing định kỳ. Mục đích là để họ quan tâm qua\n \ncâu chuyện.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 2 (Nêu vấn đề cá nhân): Anh ấy bị viêm họng do chênh lệch nhiệt độ lớn (điều hòa</span></div>\n<p class=\"body-txt\">\nlạnh, nắng nóng 30-40 độ), khiến giọng nói bị ồm, mất tự tin khi nói trước khán giả. Tuy\n \nnhiên, chương trình vẫn diễn ra tốt đẹp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Triết lý: &quot;Nếu chúng ta là một doanh nhân, chúng ta không có quyền được ốm. Nhiệm vụ</span></div>\n<p class=\"body-txt\">\ncủa chúng ta là phục vụ khách hàng.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 3 (Giải pháp thông thường không hiệu quả): Anh ấy đã thử uống một loại thuốc</span></div>\n<p class=\"body-txt\">\nviên tròn tròn, màu vàng vàng nhưng không có tác dụng, vẫn viêm họng. Khuyên không\n \nliệt kê tên thương hiệu cụ thể, chỉ mô tả chung.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 4 (Giải pháp hiệu quả - Review cá nhân): Vui mừng thông báo đã lấy lại giọng,</span></div>\n<p class=\"body-txt\">\nkhông còn viêm họng. Giải pháp là một lọ &quot;chanh đào mật ong Sapa&quot; do một học viên gửi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Anh ấy đã ngậm thử, dù thấy ngọt và đắng nhưng vì muốn lấy lại giọng nên cố gắng, và</span></div>\n<p class=\"body-txt\">\nthấy giọng dần trở lại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 5 (Tiếp tục review &amp; Kêu gọi hành động): Cảm thấy &quot;thật sự tuyệt vời như chưa</span></div>\n<p class=\"body-txt\">\ntừng có trận ho nào cả,&quot; khẳng định &quot;chanh đào mật ong Sapa&quot; có vẻ hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tạo sự cấp bách &amp; kêu gọi hành động: &quot;Đừng đợi đến khi ho mới mua,&quot; vì sẽ mất một</span></div>\n<p class=\"body-txt\">\ntuần mới có hàng và bị mất giọng. Hãy mua sẵn trong nhà để &quot;ho là có thứ dùng ngay.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 6 (Follow-up &amp; Coupon): Gửi lại link mua hàng và kèm mã giảm giá 20%, lý do là</span></div>\n<p class=\"body-txt\">\nlần trước quên gửi mã.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tạo sự khan hiếm cho coupon: Mã chỉ có hiệu lực &quot;hôm nay hoặc ngày mai thôi&quot; (dù</span></div>\n<p class=\"body-txt\">\nthực tế có thể dùng được mãi mãi – đây là chiến thuật marketing).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Quy trình bán hàng (4 chuỗi email): Bắt đầu bằng vấn đề, giải pháp không hiệu quả, giải</span></div>\n<p class=\"body-txt\">\npháp hiệu quả (review), và cuối cùng là coupon/kêu gọi hành động.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phân biệt Review và Case Study: Review là trải nghiệm cá nhân của người bán/người</span></div>\n<p class=\"body-txt\">\nnói. Case Study là câu chuyện giúp đỡ một người khác thành công.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ Case Study: Giúp bạn Nguyễn (người bán hàng hay bị ho, mất tự tin) khỏi ho nhờ</span></div>\n<p class=\"body-txt\">\nchanh đào mật ong Sapa, sau đó Nguyễn mua 10 lọ cho cả gia đình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thực hành email marketing: Các email này thuộc nhóm &quot;promotion email&quot; nhưng trọng</span></div>\n<p class=\"body-txt\">\ntâm là &quot;xây dựng mối quan hệ&quot; ngay trong email bán hàng, tránh các email &quot;bấm vào đây\n \nmua ngay&quot; cộc lốc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kiểm tra và điều chỉnh: Tất cả email đều cần được test và chỉnh sửa, không thể viết một</span></div>\n<p class=\"body-txt\">\nlần là thành công ngay.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy  đã có gần 30 năm kinh nghiệm viết email marketing, từ trước cả</span></div>\n<p class=\"body-txt\">\nkhi có Gmail.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Anh ấy biết rõ tâm lý khách hàng khi đọc email và luôn chuẩn bị sẵn các chuỗi email tiếp</span></div>\n<p class=\"body-txt\">\ntheo.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kể chuyện và xây dựng mối quan hệ là yếu tố then chốt trong email marketing: Thay vì</span></div>\n<p class=\"body-txt\">\nbán hàng trực tiếp, thầy Long minh họa cách dùng câu chuyện cá nhân, chia sẻ vấn đề và\n \ntrải nghiệm để tạo sự đồng cảm, tin tưởng với người đọc. Điều này biến việc giới thiệu\n \nsản phẩm thành một hành trình khám phá giải pháp tự nhiên, khiến khách hàng chủ\n \nđộng quan tâm thay vì cảm thấy bị ép mua.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sức mạnh của chuỗi email có cấu trúc rõ ràng: Thầy trình bày một &quot;phễu&quot; email bài bản,</span></div>\n<p class=\"body-txt\">\ntừ việc gợi mở vấn đề, nêu ra các giải pháp không hiệu quả, đến việc khám phá giải pháp\n \n&quot;thần kỳ&quot; và cuối cùng là thúc đẩy hành động với ưu đãi. Quy trình này dẫn dắt khách\n \nhàng một cách logic và tâm lý, tăng khả năng chuyển đổi hơn hẳn việc gửi một email bán\n \nhàng đơn lẻ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tận dụng cả Review cá nhân và Case Study: Review dựa trên trải nghiệm cá nhân của</span></div>\n<p class=\"body-txt\">\nngười nói (thầy Long bị viêm họng) tạo sự chân thực và gần gũi. Case Study (ví dụ về\n \nbạn Nguyễn) cung cấp bằng chứng xã hội, cho thấy hiệu quả sản phẩm trên người khác,\n \ncủng cố niềm tin và khuyến khích hành động từ nhiều góc độ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Nếu chúng ta là một doanh nhân, chúng ta không có quyền được ốm. Nhiệm vụ của chúng ta\n \nlà phục vụ khách hàng.”\n \n“Trời ơi, tôi đã nói được rồi, không còn viêm họng nữa Nguyện ơi!”\n \n“Thật sự tuyệt vời như chưa từng có trận ho nào cả.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 2 (Giải pháp chưa tối ưu): Thảo luận về những phương pháp truyền thống/thử</span></div>\n<p class=\"body-txt\">\nnghiệm thất bại (ví dụ: render nội bộ mất quá nhiều thời gian, chất lượng không đồng\n \nđều) và những &quot;nỗi đau&quot; đi kèm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 3 (Giải pháp FUTAGO - Review/Case Study): Giới thiệu một dự án đã được</span></div>\n<p class=\"body-txt\">\nFUTAGO thực hiện (kèm hình ảnh minh họa), tập trung vào cách FUTAGO đã giải quyết\n \nvấn đề cụ thể của dự án đó, nhấn mạnh tính chân thực, cảm xúc, hoặc khả năng đáp ứng\n \nđúng tiến độ. Chia sẻ phản hồi tích cực từ khách hàng (nếu có).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 4 (Kêu gọi hành động): Mời khách hàng tiềm năng nhận một bản tư vấn miễn phí</span></div>\n<p class=\"body-txt\">\nvề cách FUTAGO có thể giúp họ nâng tầm hình ảnh cho dự án sắp tới, hoặc cung cấp một\n \n&quot;render thử&quot; nhỏ cho một phần dự án (ví dụ: một góc phòng, một mặt tiền). Tạo sự cấp\n \nbách bằng một ưu đãi thời gian giới hạn cho khách hàng mới.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tập trung vào lợi ích cảm xúc và kết quả: Nhấn mạnh rằng dịch vụ của FUTAGO không</span></div>\n<p class=\"body-txt\">\nchỉ là tạo ra hình ảnh, mà là giúp khách hàng &quot;thổi hồn&quot; vào thiết kế, &quot;kể câu chuyện&quot; của\n \ndự án, hoặc &quot;tạo ấn tượng khó quên&quot; cho khách hàng cuối. Kết nối với những lợi ích như\n \n&quot;tiết kiệm thời gian,&quot; &quot;tăng tỷ lệ thắng thầu,&quot; &quot;tăng doanh số bán hàng.&quot;\n \n4.16 Hỏi đáp\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi giảng tập trung vào chiến lược Email Marketing hiệu quả, đặc biệt nhấn mạnh</h3>\n<p class=\"body-txt\">\ntầm quan trọng của việc lập kế hoạch và tư duy trước khi thực hiện. Thầy\n \nchỉ ra rằng marketing cốt lõi là &quot;marketing bằng nội dung&quot; và email chỉ là một kênh phân\n \nphối. Cốt lõi của chiến lược là liên tục gia tăng giá trị cho khách hàng thông qua nội dung\n \nhữu ích, giải quyết vấn đề của họ, và duy trì tỷ lệ 4-5 email giá trị đổi lấy 1 email bán hàng để\n \nxây dựng mối quan hệ và sự tin tưởng lâu dài.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ Email Promotion: Thầy đưa ví dụ cụ thể về email chăm sóc lại bệnh nhân cũ cho</span></div>\n<p class=\"body-txt\">\nphòng khám nha khoa, nhấn mạnh nội dung nhắc nhở và kêu gọi hành động cụ thể.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">(0:24)</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chống Spam: Tất cả các hướng dẫn về email marketing của thầy đều &quot;hoàn toàn hợp</span></div>\n<p class=\"body-txt\">\npháp&quot;, &quot;bài bản và chuyên nghiệp&quot; giúp tránh bị coi là spam. (1:11)\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tập trung vào kênh đang học: Khi học về Email Marketing, cần tập trung vào kênh email,</span></div>\n<p class=\"body-txt\">\ntránh phân tán sang các kênh khác như SMS. (1:50)\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ưu tiên lập kế hoạch chiến lược: Không chỉ đơn thuần hỏi &quot;viết email thế nào&quot;, mà cần</span></div>\n<p class=\"body-txt\">\nbắt đầu bằng việc lập kế hoạch cho chiến lược email marketing, bao gồm việc vẽ ra các\n \nmô hình và bước đi cụ thể (ví dụ: từ khóa học Sales Success System). (2:36, 4:05)\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xác định sản phẩm trọng tâm: Tập trung vào một sản phẩm cụ thể để xây dựng chiến</span></div>\n<p class=\"body-txt\">\nlược email marketing, ngay cả khi có nhiều sản phẩm. Ví dụ: &quot;bộ bàn ghế phòng ăn\n \nphong cách tối giản màu trắng&quot;. (4:30, 5:13)\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xác định thị trường mục tiêu và vấn đề của họ: Đối với nội thất, thị trường mục tiêu là</span></div>\n<p class=\"body-txt\">\nngười trẻ tuổi, suy nghĩ hiện đại, lối sống tối giản. Vấn đề của họ là sự &quot;đắt đỏ của không\n \ngian&quot; và lãng phí khi mua đồ không dùng đến. (5:31, 8:48)\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giải pháp thông thường và giải pháp của bạn: Phân tích giải pháp thông thường (mua</span></div>\n<p class=\"body-txt\">\nbàn ghế lớn không sử dụng hết không gian) và đưa ra giải pháp của bạn (nội thất tối\n \ngiản, may đo, thông minh, phục vụ lối sống). (6:57, 7:44)\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gia tăng giá trị liên tục: Email cần cung cấp giá trị thông qua các bản vẽ, thiết kế, xu</span></div>\n<p class=\"body-txt\">\nhướng, phong cách nội thất, giúp khách hàng hiểu rõ và hình dung về lựa chọn của họ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">(3:31)</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng nội dung dựa trên tìm kiếm khách hàng: Sử dụng Google và YouTube để tìm</span></div>\n<p class=\"body-txt\">\nhiểu các vấn đề mà khách hàng đang quan tâm liên quan đến sản phẩm, giải pháp thông\n \nthường và giải pháp của bạn. (9:40)\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cấu trúc chuỗi email và tỷ lệ:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tỷ lệ email giá trị và email bán hàng là 4:1 hoặc 5:1 (cứ 5 email thì chỉ có 1 email bán</span></div>\n<p class=\"body-txt\">\nhàng/promotion). (1:08-1:24)\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng chuỗi email theo một lộ trình (ví dụ 20 ngày) từ phong cách sống tối giản, sự</span></div>\n<p class=\"body-txt\">\nđắt đỏ của không gian, nội thất thông minh đến giới thiệu sản phẩm. (1:32)\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kèm theo email là nội dung chăm sóc, review, case study từ khách hàng thực tế để tăng</span></div>\n<p class=\"body-txt\">\nuy tín. (1:54, 1:15)\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nội dung đa dạng, email là kênh phân phối: Nội dung không chỉ là văn bản trong email</span></div>\n<p class=\"body-txt\">\nmà có thể là bài viết blog, video, hình ảnh. Email là công cụ để đẩy những nội dung đó\n \nđến khán giả. (1:25)\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chiến lược ưu tiên hơn công cụ: Dù là Email Marketing, Video Marketing hay Blog</span></div>\n<p class=\"body-txt\">\nMarketing, tất cả đều theo nguyên lý chung là &quot;marketing bằng nội dung&quot;. &quot;Tư duy đến\n \nchiến lược đến công cụ&quot; là thứ tự đúng để đạt được thành công bền vững. (1:51, 1:43)\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Marketing bằng nội dung&quot; là nguyên lý chung: Thầy  nhấn mạnh rằng</span></div>\n<p class=\"body-txt\">\ntất cả các hình thức marketing (email, video, blog, Facebook) đều tuân theo nguyên lý cơ\n \nbản là truyền tải nội dung giá trị. Điều này quan trọng vì nó định hướng cho người học\n \ntập trung vào việc tạo ra thông tin hữu ích và giải quyết vấn đề cho khách hàng, thay vì\n \nchỉ nghĩ về cách sử dụng công cụ. Nó giúp doanh nghiệp xây dựng nền tảng vững chắc\n \ncho mọi hoạt động truyền thông. (1:51-1:59)\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tỷ lệ 4-5 email giá trị đổi lấy 1 email bán hàng (20%): &quot;Cứ 5 email thì mới chỉ có một</span></div>\n<p class=\"body-txt\">\nemail promotion thôi. Tức là có 5 email thì mới có một email bán hàng thôi. Anh em nhớ\n \ncái con số này nhé, là 20% nhé.&quot; (1:15-1:24) Đây là một con số vàng trong Email\n \nMarketing. Nó giúp doanh nghiệp tránh gửi quá nhiều nội dung bán hàng trực tiếp gây\n \nphiền nhiễu và làm mất khách hàng. Bằng cách tập trung vào việc trao giá trị, doanh\n \nnghiệp xây dựng được mối quan hệ tin cậy và sự gắn bó, khiến khách hàng sẵn lòng lắng\n \nnghe khi có lời chào bán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khám phá vấn đề sâu xa của khách hàng: Ví dụ về &quot;sự đắt đỏ của không gian&quot; và lãng phí</span></div>\n<p class=\"body-txt\">\nkhi kê nội thất không sử dụng là một insight đắt giá. Nó dạy chúng ta nhìn sâu hơn vào\n \nnhu cầu thực sự, những vấn đề tiềm ẩn mà khách hàng có thể chưa nhận ra, thay vì chỉ\n \ntập trung vào bề nổi của sản phẩm. Khi giải quyết được vấn đề sâu xa này, sản phẩm của\n \nbạn trở nên độc đáo và có giá trị vượt trội. (5:50-6:37)\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Tư duy đến chiến lược đến công cụ&quot;: Đây là kim chỉ nam cho mọi hoạt động kinh doanh.</span></div>\n<p class=\"body-txt\">\nNó chỉ ra rằng thành công không đến từ việc biết dùng công cụ, mà đến từ một tư duy\n \nđúng đắn, xây dựng một chiến lược rõ ràng, và sau đó mới chọn công cụ phù hợp để thực\n \nthi. Việc hiểu rõ thứ tự này giúp các doanh nghiệp không bị lạc lối trong &quot;biển công cụ&quot;\n \nvà tập trung vào những yếu tố mang tính quyết định. (1:47-1:50)\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Đang dạy về email thì đừng hỏi về SMS.”\n \n“Tất cả mọi thứ đều có nguyên lý của nó. Chúng ta tuân theo nguyên lý. Thế thì nguyên lý đầu\n \ntiên chung nhất là nguyên lý marketing bằng nội dung.”\n \n“Tư duy đến chiến lược đến công cụ.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Expert Insights: Phân tích các yếu tố làm nên một bản render thu hút đối tượng khách</span></div>\n<p class=\"body-txt\">\nhàng Nhật (ví dụ: tầm quan trọng của màu sắc, vật liệu, chi tiết cây xanh và bối cảnh địa\n \nphương).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chiến lược chuỗi email:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Bắt đầu với các email trao giá trị (e-book xu hướng, phân tích case study).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tiếp theo là các email giới thiệu các loại hình diễn họa kiến trúc của FUTAGO và lợi ích</span></div>\n<p class=\"body-txt\">\ncủa chúng (ví dụ: render nội thất, ngoại thất, toàn cảnh dự án).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xen kẽ các email review/testimonials từ khách hàng Nhật đã sử dụng dịch vụ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chỉ sau khi đã xây dựng đủ niềm tin, mới gửi email bán hàng (ví dụ: &quot;Ưu đãi đặc biệt cho</span></div>\n<p class=\"body-txt\">\ndự án render thử nghiệm đầu tiên&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tuân thủ tỷ lệ 4-5 email giá trị : 1 email bán hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đa dạng hóa nội dung: Email của FUTAGO có thể dẫn dắt khách hàng đến các video</span></div>\n<p class=\"body-txt\">\nYouTube showcasing portfolio, các bài blog phân tích chuyên sâu về render kiến trúc,\n \nhoặc các hình ảnh ấn tượng trên mạng xã hội.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Quan trọng: Tuyệt đối tập trung vào dịch vụ diễn họa kiến trúc (CG パース/render 3D),</span></div>\n<p class=\"body-txt\">\nKHÔNG nhắc đến BIM ở khía cạnh dịch vụ hay tư vấn. Luôn nhấn mạnh vào giá trị hình\n \nảnh mang lại cho công việc của KTS/thiết kế/developer Nhật Bản.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Chương 6</h3>\n<p class=\"body-txt\">\n5.1 Ôn tập\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học tập trung vào chiến lược email marketing, đặc biệt là cách xây dựng</h3>\n<p class=\"body-txt\">\n&quot;phễu thông tin&quot; (information funnel) để lọc và dẫn dắt khách hàng qua các giai đoạn khác\n \nnhau. Thầy Long nhấn mạnh việc tạo nội dung phù hợp cho từng giai đoạn (lạnh, ấm, nóng)\n \ndựa trên nghiên cứu từ khóa để đáp ứng đúng nhu cầu khách hàng. Đồng thời, thầy khuyến\n \nkhích học viên chủ động học hỏi, thực hành liên tục, không ngại mắc lỗi và áp dụng kiến thức\n \nmột cách quyết liệt để đạt được hiệu quả kinh doanh.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Buổi học nhắc nhở về những câu hỏi &quot;ngu ngơ&quot; và nhấn mạnh tầm quan trọng của kiến</span></div>\n<p class=\"body-txt\">\nthức nền tảng trong marketing.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giới thiệu &quot;phễu thông tin&quot; (information funnel) là công cụ để lọc và tiếp cận đúng đối</span></div>\n<p class=\"body-txt\">\ntượng khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phễu thông tin được chia thành ba giai đoạn với loại nội dung tương ứng:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81 hạn: Hệ thống email tự</span></div>\n<p class=\"body-txt\">\nđộng cho phép tiếp cận khách hàng nhiều lần với chi phí thấp hơn đáng kể so với quảng\n \ncáo trên các nền tảng khác (ví dụ: Facebook, nơi mỗi lần tiếp cận lại phải trả tiền). Quan\n \ntrọng là, mỗi lần tiếp cận này được dùng để cung cấp giá trị liên tục, khiến khách hàng\n \n&quot;ngồi chờ&quot; nội dung tiếp theo. Điều này xây dựng mối quan hệ tin cậy và sự trung thành,\n \nlà nền tảng vững chắc cho việc bán các sản phẩm có giá trị cao hơn về sau, thay vì chỉ là\n \ngiao dịch chộp giật.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sức mạnh của tính nhất quán trong nội dung: Toàn bộ chuỗi email và video trong e-</span></div>\n<p class=\"body-txt\">\ncourse đều xoay quanh một chủ đề nhất định (ví dụ: viết thư quảng cáo). Điều này giúp\n \nngười học tập trung, dễ hiểu và dễ áp dụng hơn. Sự nhất quán này tạo ra một hành trình\n \nhọc tập liền mạch, củng cố kiến thức và niềm tin vào giải pháp, khiến việc chuyển đổi\n \nsang sản phẩm cuối cùng trở nên tự nhiên và hiệu quả.\n</p></div></div>",
