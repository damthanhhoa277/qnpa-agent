 hóa bằng cách</span></div>\n<p class=\"body-txt\">\nchèn tên người nhận vào email (`[name]`).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Lưu và công bố (Save and Publish): Sau khi hoàn thành email, cần lưu lại và công bố để</span></div>\n<p class=\"body-txt\">\nhệ thống hoạt động.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thiết lập các email tiếp theo: Tương tự, tạo email thứ hai và các email tiếp theo cho các</span></div>\n<p class=\"body-txt\">\nngày khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cá nhân hóa email: Sử dụng cú pháp `[name]` để chèn tên người nhận vào nội dung</span></div>\n<p class=\"body-txt\">\nemail, giúp thư trở nên cá nhân hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hệ thống phản hồi tự động là cốt lõi để tương tác hiệu quả: Thầy Long nhấn mạnh việc</span></div>\n<p class=\"body-txt\">\ntạo autoresponder ngay sau khi có danh sách email. Điều này rất quan trọng vì nó giúp\n \ndoanh nghiệp tự động hóa quá trình chào đón và chăm sóc khách hàng tiềm năng, đảm\n \nbảo mỗi người đăng ký đều nhận được thông tin kịp thời và nhất quán, tạo ấn tượng ban\n \nđầu tốt đẹp và duy trì sự tương tác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cá nhân hóa email giúp tăng hiệu quả giao tiếp: Việc chèn tên người nhận vào email</span></div>\n<p class=\"body-txt\">\n(`[name]`) là một insight đắt giá. Điều này làm cho email trở nên thân thiện, chuyên\n \nnghiệp và giảm cảm giác spam. Khách hàng cảm thấy được quan tâm cá nhân, từ đó tăng\n \ntỷ lệ mở email, tỷ lệ click và xây dựng mối quan hệ tốt hơn, dẫn đến hiệu quả chuyển đổi\n \ncao hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tạo chuỗi email logic và có giá trị: Việc tạo ra email &quot;Ngày 0&quot; chào mừng và &quot;Ngày 1&quot; hỏi</span></div>\n<p class=\"body-txt\">\nvề tài liệu đã gửi cho thấy tầm quan trọng của việc xây dựng một chuỗi nội dung có ý\n \nnghĩa. Không chỉ là gửi email đơn lẻ, mà là một hành trình cung cấp giá trị, tương tác và\n \ndẫn dắt khách hàng qua từng bước, giúp họ tiếp nhận thông tin một cách có trình tự và\n \nkhuyến khích họ thực hiện các hành động mong muốn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Chú ý khi tạo cái autoresponder, ta phải chọn đúng cái list mà ta đã tạo.”\n \n“Bức thư nó yêu cầu cần phải được cá nhân hóa nên mỗi người sẽ có một cái tên riêng.”\n \n“Như vậy chúng ta xong cái bước là cài đặt thư tự động cho cái email list ta vừa tạo ra.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email theo dõi cá nhân hóa (Ngày 1/Ngày 2): Nếu sau 1-2 ngày khách hàng chưa phản</span></div>\n<p class=\"body-txt\">\nhồi hoặc chưa thực hiện hành động tiếp theo (ví dụ: chưa tải portfolio, chưa click vào\n \nlink báo giá), hãy gửi một email theo dõi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tiêu đề: &quot;【FUTAGO BIM】[Tên khách hàng], CG パースについてご不明な点はござい</span></div>\n<p class=\"body-txt\">\nませんか？&quot; ([Tên khách hàng], bạn có câu hỏi nào về CG render không?) hoặc &quot;前回の\n \n資料はいかがでしたか？- FUTAGO BIM より&quot; (Bạn thấy tài liệu lần trước thế nào? - Từ\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">FUTAGO BIM).</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nội dung: Hỏi xem khách hàng đã xem tài liệu/portfolio chưa và có bất kỳ câu hỏi nào</span></div>\n<p class=\"body-txt\">\nkhông. Nhắc lại các điểm nổi bật của dịch vụ diễn họa 3D của FUTAGO (chất lượng hình\n \nảnh cao cấp, thời gian bàn giao nhanh, hiểu rõ kiến trúc Nhật Bản). Gợi ý một buổi tư\n \nvấn nhanh hoặc đề xuất gửi thêm các mẫu render phù hợp với dự án cụ thể của họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cá nhân hóa: Sử dụng tên công ty hoặc tên người liên hệ của khách hàng Nhật Bản trong</span></div>\n<p class=\"body-txt\">\nemail để tăng tính chuyên nghiệp và cá nhân hóa.\n \n---\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Lưu ý: Tất cả gợi ý đều tập trung vào dịch vụ diễn họa kiến trúc/render 3D, không đề cập</h3>\n<p class=\"body-txt\">\nđến BIM dưới góc độ dịch vụ hay tư vấn. &quot;FUTAGO BIM&quot; được hiểu là tên thương hiệu.\n \n2.8 Tạo landing page\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học này hướng dẫn các bước thực hành tạo Landing Page trong một hệ thống</h3>\n<p class=\"body-txt\">\nemail marketing tự động. Thầy  nhấn mạnh tầm quan trọng của việc chọn\n \nmẫu Landing Page phù hợp hoặc tự thiết kế từ đầu, sau đó cấu hình trang cảm ơn và đặc biệt\n \nlà liên kết đúng Landing Page với chiến dịch (campaign) gửi email tự động để đảm bảo\n \nkhách hàng nhận được thông tin chính xác.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Bước 3: Tạo Landing Page.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chọn một Landing Page bất kỳ từ thư viện mẫu có sẵn, hoặc tạo mới từ đầu nếu mẫu</span></div>\n<p class=\"body-txt\">\nkhông phù hợp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đặt tên cho Landing Page (ví dụ: &quot;Phụ nữ để yêu thương&quot;).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sử dụng template có sẵn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cấu hình trang cảm ơn (Thank You Page) sau khi khách hàng điền form.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đổi tên Landing Page cho phù hợp và lưu lại.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Bước cuối cùng: Chọn đúng Campaign và đặt tên đúng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Lưu ý quan trọng: Không đánh dấu vào ô &quot;Đưa nó vào trong hệ thống phản hồi tự động&quot;</span></div>\n<p class=\"body-txt\">\nở một số bước ban đầu, mà phải bấm vào để ngày 0 hệ thống gửi thư đi. (Ở đây, thầy sau\n \nđó tự sửa lại lỗi này).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sửa lỗi khi Landing Page bị gửi nhầm sang campaign khác (ví dụ: gửi nhầm sang &quot;Luật</span></div>\n<p class=\"body-txt\">\nGia Phạm&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chọn đúng Campaign là &quot;Phụ nữ yêu thương&quot; (ví dụ) cho Landing Page đã tạo.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đường link Landing Page sẽ dẫn đến trang để người ta xem.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sự chính xác trong liên kết Landing Page và Campaign: Thầy nhấn mạnh nhiều lần về</span></div>\n<p class=\"body-txt\">\nviệc &quot;chọn đúng campaign&quot; và &quot;không đánh dấu vào ô &#x27;Đưa nó vào trong hệ thống phản\n \nhồi tự động&#x27;&quot; ở bước cụ thể, sau đó sửa lại khi có lỗi. Điều này cực kỳ quan trọng vì nếu\n \nLanding Page không được liên kết đúng với chiến dịch email tự động, khách hàng sẽ\n \nkhông nhận được thông tin mà họ mong đợi, dẫn đến mất khách hàng tiềm năng và lãng\n \nphí công sức marketing.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khả năng tùy chỉnh và kiểm soát: Mặc dù có thể sử dụng các template có sẵn, thầy vẫn</span></div>\n<p class=\"body-txt\">\nchỉ ra khả năng &quot;tạo ra từ số 0&quot; hoặc &quot;xây từ đầu&quot; nếu mẫu không phù hợp. Điều này cho\n \nthấy tầm quan trọng của việc có khả năng tùy biến Landing Page để phù hợp nhất với\n \nmục tiêu và đối tượng khách hàng của từng chiến dịch, không bị gò bó bởi các mẫu mặc\n \nđịnh.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Trong cái Landing Page này, phải chú ý...”\n \n“Đây có cái này là mình hay quên này. Đó là không đánh dấu vào cái ô &#x27;Đưa nó vào trong hệ\n \nthống phản hồi tự động&#x27;.”\n \n“Sai đúng không? Sửa lại.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Chương 4</h3>\n<p class=\"body-txt\">\n3.1 Hệ thống Email Marketing\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi giảng tập trung vào hệ thống Email Marketing, một công cụ trung gian quan</h3>\n<p class=\"body-txt\">\ntrọng để làm &quot;ấm&quot; khách hàng tiềm năng trước khi bán hàng, khác biệt với phương pháp\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\nquảng cáo trực tiếp. Cốt lõi của Email Marketing là xây dựng danh sách khách hàng tiềm\n \nnăng và nuôi dưỡng mối quan hệ với họ qua email để tăng khả năng chuyển đổi và giá trị\n \ntrọn đời của khách hàng. Thầy nhấn mạnh rằng chiến lược này giúp tối ưu chi phí quảng cáo\n \nvà tạo ra hiệu ứng &quot;bom nguyên tử&quot; nhờ sự giới thiệu từ khách hàng hài lòng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giới thiệu hệ thống Email Marketing: Hệ thống này gồm 3 phần chính.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phần 1: List Page: Là một trang web (ví dụ: landing page, trang thương mại điện tử) có</span></div>\n<p class=\"body-txt\">\nmục đích thu thập thông tin khách hàng tiềm năng (đặc biệt là email) bằng cách tặng\n \nquà.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phần 2: Nguồn Traffic: Các kênh để đưa traffic (lưu lượng truy cập) đến List Page bao</span></div>\n<p class=\"body-txt\">\ngồm:\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Blog (viết bài chia sẻ hàng ngày).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Quảng cáo (Facebook Ads, Google Ads).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mạng xã hội (Facebook, YouTube, Pinterest, TikTok và các mạng khác).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hệ thống giới thiệu khách hàng tiềm năng (ví dụ: BNI, chia sẻ giữa bạn bè).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phần 3: Trang Bán Hàng (Sale Page): Sau khi khách hàng đã được &quot;làm ấm&quot; qua email,</span></div>\n<p class=\"body-txt\">\nhọ sẽ được dẫn đến trang bán hàng. Trang bán hàng có thể là một landing page, email\n \nbán hàng, video bán hàng hoặc trang thương mại điện tử.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khẩu hiệu: &quot;Money in the list&quot; (tiền nằm trong danh sách khách hàng) hay còn gọi là &quot;list</span></div>\n<p class=\"body-txt\">\nbuilding&quot; (xây dựng danh sách khách hàng tiềm năng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khác biệt so với quảng cáo truyền thống:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Quảng cáo truyền thống (bình thường): Chạy quảng cáo thẳng vào trang bán hàng. Nếu</span></div>\n<p class=\"body-txt\">\nsản phẩm giá thấp (ví dụ: 40.000đ) mà chi phí quảng cáo để có một khách hàng cao (ví\n \ndụ: 70.000đ), sẽ không có lãi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email Marketing: Là một công cụ trung gian ở giữa trang bán hàng và khách hàng lạ.</span></div>\n<p class=\"body-txt\">\nMục tiêu là làm &quot;ấm&quot; dòng người (khách hàng tiềm năng) trước khi bán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ưu điểm của Email Marketing:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tối ưu chi phí: Chi phí ban đầu để thu thập một khách hàng tiềm năng qua email thấp (ví</span></div>\n<p class=\"body-txt\">\ndụ: 10.000đ).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giá trị trọn đời của khách hàng (LTV): Khi đã có được email, ta có thể bán hàng &quot;mãi,</span></div>\n<p class=\"body-txt\">\nmãi, mãi&quot; cho cùng một khách hàng mà không cần chi phí quảng cáo thêm cho mỗi lần\n \nbán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hiệu ứng &quot;bom nguyên tử&quot;: Khách hàng hài lòng sẽ giới thiệu bạn bè, người thân, dòng</span></div>\n<p class=\"body-txt\">\nhọ, cả đội nhóm của họ mua hàng, tạo ra tăng trưởng phi tuyến tính.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Lợi thế cạnh tranh: Nếu đối thủ không biết về Email Marketing, họ sẽ không thể cạnh</span></div>\n<p class=\"body-txt\">\ntranh về chi phí và hiệu quả bán hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email Marketing là cầu nối giữa khách hàng lạnh và trang bán hàng: Nó đóng vai trò</span></div>\n<p class=\"body-txt\">\n&quot;làm ấm&quot; khách hàng tiềm năng, biến những người lạ thành người quan tâm và tin\n \ntưởng trước khi giới thiệu sản phẩm. Điều này quan trọng vì nó giải quyết vấn đề chi phí\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\nquảng cáo cao cho những sản phẩm giá trị thấp hoặc thị trường cạnh tranh, nơi việc\n \nquảng cáo trực tiếp vào trang bán hàng thường không hiệu quả hoặc thua lỗ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tối ưu hóa giá trị trọn đời của khách hàng (Customer Lifetime Value - CLTV): Thay vì chỉ</span></div>\n<p class=\"body-txt\">\nbán một lần, email marketing cho phép doanh nghiệp duy trì mối quan hệ và tiếp tục\n \nbán hàng cho khách hàng đã có thông tin. Điều này cực kỳ quan trọng vì chi phí giữ chân\n \nkhách hàng thường thấp hơn nhiều so với chi phí thu hút khách hàng mới, giúp tăng lợi\n \nnhuận bền vững theo thời gian.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tạo ra hiệu ứng &quot;bom nguyên tử&quot; (Viral/Referral Marketing): Khách hàng hài lòng với</span></div>\n<p class=\"body-txt\">\nsản phẩm và dịch vụ được nuôi dưỡng tốt sẽ trở thành người quảng bá tự nguyện, giới\n \nthiệu sản phẩm cho bạn bè, người thân. Đây là một kênh marketing miễn phí và vô cùng\n \nhiệu quả, giúp mở rộng tệp khách hàng một cách tự nhiên và bền vững.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Công việc chính của chúng ta ở đây, có rất nhiều người sẽ gọi là **list building**, hay còn gọi\n \nlà công việc xây dựng cái danh sách khách hàng tiềm năng.”\n \n“Nhiệm vụ của email marketing là **làm ấm cái dòng người này lên trước khi chúng ta bán\n \nhàng cho họ**.”\n \n“Chỉ có 10.000 đồng thôi thì ta được một khách hàng, và sau đó **ta bán mãi, ta bán mãi, ta\n \nbán mãi**.”\n \n“Đây chính là cái hiệu ứng mà chúng ta gọi là **bom nguyên tử nổ**.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\ncho dự án tiếp theo&quot;. Điều này sẽ giúp FUTAGO xây dựng mạng lưới khách hàng bền\n \nvững và hiệu quả hơn.\n \n3.2 Cấu trúc Email bán hàng 1\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi giảng tập trung vào cách xây dựng kịch bản bán hàng hiệu quả thông qua</h3>\n<p class=\"body-txt\">\nemail marketing, đặc biệt là chuỗi email &quot;đi ngược&quot;. Cốt lõi là xác định vấn đề của khách\n \nhàng, phân biệt giải pháp thông thường và giải pháp của mình, sau đó sử dụng các email\n \nmang tính kể chuyện, tạo cảm xúc và xây dựng mối quan hệ để dần hé lộ và bán sản phẩm\n \nmột cách thuyết phục.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hiểu cấu trúc và mục đích: Không chỉ ghi chép mà phải hiểu được cấu trúc và mục đích</span></div>\n<p class=\"body-txt\">\ncủa việc xây dựng kịch bản bán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ sản phẩm: Sử dụng bộ sạc nhanh Xiaomi 6 cổng 60W (690.000 VND) làm ví dụ</span></div>\n<p class=\"body-txt\">\nminh họa để xây dựng kịch bản chi tiết.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chiến lược &quot;Đi ngược&quot;: Khi bán hàng, cần đi ngược từ khách hàng về sản phẩm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Bước 1: Xác định vấn đề &amp; đối tượng:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cái sạc pin này giải quyết vấn đề gì cho ai?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nó khác biệt, tối ưu, tốt hơn ở chỗ nào so với sản phẩm cùng loại trên thị trường?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nó có điểm gì mà thị trường không có? (Đây là &quot;bảng tính năng&quot;).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Bước 2: Xác định lợi ích: Từ các tính năng, nó mang lại lợi ích gì cho người dùng? (Đây là</span></div>\n<p class=\"body-txt\">\ntrang bán hàng, tương tự Sales Success System).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Bước 3: Xây dựng chuỗi Email (Email bán hàng, gọi là Bước 4):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hiểu sâu vấn đề khách hàng: Họ đang gặp *những* vấn đề gì (đa dạng các vấn đề)?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phân loại giải pháp:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Các giải pháp của tôi&quot;: Đâu là những vấn đề mà ta có thể giải quyết được.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Các giải pháp thông thường&quot;: Đâu là những vấn đề mà thị trường và mọi người (kể cả</span></div>\n<p class=\"body-txt\">\nta) có thể giải quyết được.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng nội dung Email theo cấu trúc:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email #1 (Than phiền - Vấn đề thường gặp): Tập hợp các vấn đề mà đối tượng đang gặp</span></div>\n<p class=\"body-txt\">\nphải (ví dụ: bàn làm việc lộn xộn, mất sạc, quên sạc).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Có thể tạo &quot;sản phẩm mồi câu&quot; (lead magnet) như ebook, video, khóa học giải quyết</span></div>\n<p class=\"body-txt\">\nchung cho nhóm người này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ sản phẩm (Bộ sạc): Mô tả tính năng (nhỏ, nhẹ, mang theo người, sạc 6 thiết bị cùng</span></div>\n<p class=\"body-txt\">\nlúc, 2 cổng sạc nhanh, công suất 60W, cổng USB-C 18W, QC3.0 sạc nhanh cho iPhone 8+,\n \nsạc được smartphone, tablet, iPad, iPhone, Samsung, Xiaomi, đồng hồ, đèn... thông minh,\n \ntự ngắt).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đối tượng khách hàng mục tiêu: Người yêu công nghệ, thích du lịch, người có nhiều thiết</span></div>\n<p class=\"body-txt\">\nbị muốn &quot;tất cả trong một&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giải pháp thông thường (vấn đề cũ): Quá nhiều cục sạc cắm vào một ổ, dây nhợ loằng</span></div>\n<p class=\"body-txt\">\nngoằng, phải mang nhiều sạc khi đi du lịch, dây dễ bị mất/mượn.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giải pháp của sản phẩm (giải pháp mới): Một dây cắm vào ổ sạc có thể sạc 6 thiết bị cùng</span></div>\n<p class=\"body-txt\">\nlúc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi Email chi tiết cho bộ sạc:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 1 (Tiêu đề &quot;Ngu ngốc&quot;, &quot;Thật là ngu ngốc&quot;): Than phiền về sự lộn xộn của bàn làm</span></div>\n<p class=\"body-txt\">\nviệc (ảnh minh họa bàn làm việc bừa bộn với 6 cục sạc), tự nhận mình ngu ngốc vì không\n \ncó giải pháp. Gợi hỏi người nhận có giải pháp không.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 2 (RE: tiêu đề cũ): Than phiền việc quên sạc, hết pin gây mất cảm hứng. Đề xuất</span></div>\n<p class=\"body-txt\">\n&quot;giải pháp thông thường&quot; là mua thêm 1 cục sạc nữa để mỗi nơi một cái, và bày tỏ sự\n \n&quot;yên tâm&quot; (nhưng thực chất chưa phải là giải pháp tối ưu của mình).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 3 (Tuyệt vời! Eureka! Tìm ra rồi!): Chia sẻ niềm vui khi tìm ra giải pháp, khoe bàn</span></div>\n<p class=\"body-txt\">\nlàm việc gọn gàng (ảnh minh họa 1 cục sạc duy nhất sạc 6 thiết bị gọn gàng), &quot;Cảm ơn ai\n \nđó đã giúp tôi giải pháp này&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 4 (Bán hàng): Giới thiệu chi tiết về sản phẩm (cục sạc Xiaomi 6 cổng 60W), nhấn</span></div>\n<p class=\"body-txt\">\nmạnh lợi ích (thông minh, sạc nhanh, gọn gàng, thanh lịch, đẹp rực rỡ), câu chuyện cá\n \nnhân mua 3 cái dùng cho mọi nơi/mọi thiết bị (điện thoại, iPad, đồng hồ, camera,\n \nflycam), tạo cảm giác tiện lợi, không còn đống dây loằng ngoằng. Kêu gọi hành động:\n \n&quot;Bấm vào đây mà xem chi tiết&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 4 (PS): Tạo khan hiếm/ưu đãi (giảm giá), và củng cố niềm tin (bảo hành chính</span></div>\n<p class=\"body-txt\">\nhãng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 5 (Follow-up 1 - RE: tiêu đề cũ): Tạo áp lực mua (FOMO): &quot;Vẫn chưa mua à? Tôi</span></div>\n<p class=\"body-txt\">\nmua ba cái dùng từ lâu rồi. Đằng nào chả phải mua. Mua sớm thì dùng sớm, mua muộn\n \nthì lúc chưa mua không được dùng. Tiền vẫn trả như thế. Dùng trước sướng trước,\n \nkhông dùng thiệt thân.&quot; Nhấn mạnh nguy cơ hết mã giảm giá.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 6 (Follow-up 2 - RE: RE: tiêu đề cũ): Nhắc nhở và củng cố giá trị: &quot;Tôi sợ Khánh</span></div>\n<p class=\"body-txt\">\nquên không làm điều này. Tôi nhắc để Khánh nhớ là bàn làm việc của bạn có thể gọn\n \ngàng ngay lập tức với một thiết bị chỉ 500 ngàn đồng này.&quot; Kêu gọi mua ngay.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kết thúc chuỗi email: &quot;Ba lần như thế, không mua thì cũng phải mua. Không mua thì</span></div>\n<p class=\"body-txt\">\nđừng có làm người nữa Khánh.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tổng kết chiến lược: Khoảng 20 phút để xây dựng cấu trúc bán hàng cho bất kỳ sản</span></div>\n<p class=\"body-txt\">\nphẩm nào. &quot;Đi ngược&quot; lại từ vấn đề của khách hàng, mở rộng ra các vấn đề họ gặp phải,\n \ncác giải pháp thông thường trên thị trường, sau đó đưa ra giải pháp của mình. Cứ thế\n \n&quot;bán, bán, bán&quot; cho đến khi khách hàng mua. Nếu không mua, đổi sang chuỗi email khác,\n \ncâu chuyện khác.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chiến lược &quot;Đi ngược&quot; từ vấn đề khách hàng: Thay vì giới thiệu sản phẩm, hãy bắt đầu</span></div>\n<p class=\"body-txt\">\nbằng việc xác định và thấu hiểu *vấn đề của khách hàng* (&quot;giải quyết vấn đề gì cho ai?&quot;)\n \nvà *những vấn đề* họ đang gặp phải. Điều này tạo sự đồng cảm và khiến khách hàng cảm\n \nthấy được lắng nghe, từ đó dễ dàng tiếp nhận giải pháp hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kể chuyện dựa trên cảm xúc và trải nghiệm cá nhân: diễn giả không chỉ liệt kê tính năng mà</span></div>\n<p class=\"body-txt\">\nsử dụng câu chuyện cá nhân hóa (ví dụ: sự &quot;ngu ngốc&quot; khi bàn làm việc bừa bộn, sự &quot;bức\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\nxúc&quot; khi hết pin) để tạo cảm xúc mạnh mẽ cho người đọc. Điều này xây dựng mối quan\n \nhệ và khiến thông điệp trở nên gần gũi, đáng nhớ hơn là quảng cáo khô khan.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phân biệt và vượt trội hóa giải pháp: Buổi giảng nhấn mạnh việc phân biệt rõ ràng giữa</span></div>\n<p class=\"body-txt\">\n&quot;giải pháp thông thường&quot; (của thị trường hoặc những gì khách hàng đang làm) và &quot;giải\n \npháp của tôi&quot; (sản phẩm đang bán). Bằng cách mô tả nhược điểm của giải pháp thông\n \nthường và lợi ích vượt trội của giải pháp của mình, người bán giúp khách hàng thấy rõ\n \ngiá trị và sự cần thiết của sản phẩm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email tuần tự, củng cố và thúc đẩy: Không bán ngay lập tức. diễn giả sử dụng một</span></div>\n<p class=\"body-txt\">\nchuỗi email được thiết kế để dần dần dẫn dắt khách hàng qua các giai đoạn: từ nhận\n \ndiện vấn đề, đồng cảm, giới thiệu giải pháp chung, đến hé lộ giải pháp của mình, củng cố\n \nbằng trải nghiệm cá nhân, tạo bằng chứng xã hội (nhiều người quan tâm), tạo cảm giác\n \nkhan hiếm/ưu đãi và nhắc nhở liên tục. Điều này tối ưu hóa tỷ lệ chuyển đổi và biến\n \nkhách hàng tiềm năng thành người mua.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Không mua thì đừng có làm người nữa Khánh.”\n \n“Hết pin là hết cả năng lượng.”\n \n“Đằng nào chả phải mua. Mua sớm thì dùng sớm. Mua muộn thì lúc chưa mua không được\n \ndùng. Tiền vẫn trả như thế. Dùng trước sướng trước, không dùng thiệt thân.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giải pháp thông thường: Tự render (tốn tài nguyên, chuyên môn, thời gian), thuê các</span></div>\n<p class=\"body-txt\">\ncông ty render giá rẻ/chất lượng thấp (rủi ro về chất lượng, giao tiếp), thuê các công ty\n \nrender không chuyên về thị trường Nhật (không hiểu gu thẩm mỹ, tiêu chuẩn).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giải pháp FUTAGO: Dịch vụ diễn họa kiến trúc chuyên nghiệp, chất lượng cao, tốc độ</span></div>\n<p class=\"body-txt\">\nnhanh, quy trình làm việc rõ ràng, giao tiếp hiệu quả (tiếng Nhật), am hiểu gu thẩm mỹ\n \nvà tiêu chuẩn Nhật Bản, giúp KTS/developer tiết kiệm thời gian, chi phí, và nâng cao\n \nhiệu quả thuyết phục khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng chuỗi Email marketing theo cấu trúc kể chuyện:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 1 (Tiêu đề tạo sự tò mò/đồng cảm - ví dụ: &quot;Bạn có đang &#x27;đau đầu&#x27; với deadline</span></div>\n<p class=\"body-txt\">\nrender không?&quot;): Kể câu chuyện về một KTS/developer đang vật lộn với việc chờ đợi\n \nhình ảnh render, bàn làm việc lộn xộn với các bản vẽ dang dở, hoặc nỗi lo về hình ảnh\n \nkhông đủ sức thuyết phục khách hàng. Gợi hỏi người nhận có gặp tình huống tương tự\n \nkhông.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 2 (RE: tiêu đề cũ - ví dụ: &quot;Tôi đã từng &#x27;ngu ngốc&#x27; như thế nào với render...&quot;): Chia</span></div>\n<p class=\"body-txt\">\nsẻ trải nghiệm cá nhân (hoặc của một nhân vật hư cấu đại diện) khi cố gắng tự render\n \nhoặc thuê các dịch vụ kém chất lượng, dẫn đến thất vọng, lãng phí. Đăng kèm hình ảnh ví\n \ndụ về những render chất lượng thấp hoặc quy trình làm việc rườm rà (tương tự hình\n \nảnh &quot;6 cục sạc&quot;). Nhấn mạnh &quot;giải pháp thông thường&quot; gây ra nhiều vấn đề.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 3 (Tuyệt vời! Eureka! Giải pháp đã đến!): Tạo sự phấn khích khi tìm ra một &quot;cách</span></div>\n<p class=\"body-txt\">\nmới&quot; để giải quyết vấn đề. Mô tả bàn làm việc/quy trình làm việc trở nên gọn gàng, hiệu\n \nquả hơn nhờ một &quot;ai đó&quot; đã giúp đỡ. Đăng kèm hình ảnh một render chất lượng cao, ấn\n \ntượng từ FUTAGO, hoặc một quy trình làm việc tinh gọn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 4 (Bán hàng trực tiếp): Giới thiệu FUTAGO là giải pháp đó. Nêu bật các lợi ích cốt</span></div>\n<p class=\"body-txt\">\nlõi:\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chất lượng: Render siêu thực, tinh tế, đúng gu Nhật.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tốc độ: Bàn giao nhanh, đảm bảo deadline.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hiệu quả: Tiết kiệm thời gian, chi phí.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Uy tín: Kinh nghiệm lâu năm, đội ngũ chuyên nghiệp, giao tiếp thông suốt.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kể câu chuyện về một dự án cụ thể mà FUTAGO đã giúp khách hàng thắng thầu/bán sản</span></div>\n<p class=\"body-txt\">\nphẩm nhanh hơn. Kêu gọi &quot;Bấm vào đây để xem portfolio và nhận báo giá.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 4 (PS): Thêm các yếu tố thúc đẩy: &quot;PS: Đặc biệt, chúng tôi đang có ưu đãi cho dự</span></div>\n<p class=\"body-txt\">\nán đầu tiên của bạn!&quot; hoặc &quot;PSS: Hàng trăm KTS Nhật đã tin tưởng FUTAGO. Đừng để dự\n \nán của bạn bị tụt lại!&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 5 &amp; 6 (Follow-up - RE: tiêu đề cũ): Áp dụng chiến thuật FOMO và củng cố giá trị:</span></div>\n<p class=\"body-txt\">\n&quot;Bạn vẫn chưa trải nghiệm sự khác biệt từ FUTAGO? Đối thủ của bạn có thể đang dùng\n \ndịch vụ của chúng tôi đấy!&quot; hoặc &quot;Hãy tưởng tượng dự án của bạn sẽ nổi bật như thế nào\n \nvới render từ FUTAGO, chỉ với X yên/ảnh. Đừng chần chừ, cơ hội tốt nhất là ngay bây\n \ngiờ!&quot;\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Lưu ý quan trọng: Toàn bộ nội dung email và các chiến dịch phải tập trung vào lợi ích của</h3>\n<p class=\"body-txt\">\n*diễn họa kiến trúc* (CG パース/render 3D) và cách nó giải quyết vấn đề của khách hàng,\n \ntuyệt đối không nhắc đến dịch vụ hay tư vấn BIM, bởi &quot;BIM&quot; chỉ là tên thương hiệu của\n \nFUTAGO trong ngữ cảnh này.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\n3.3 Cấu trúc Email bán hàng 2\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi giảng này tập trung vào chiến lược email marketing được chia thành 4 giai</h3>\n<p class=\"body-txt\">\nđoạn chính: Thị trường lạnh, Thị trường ấm, Thị trường nóng và Bán hàng. Cốt lõi là hướng\n \ndẫn cách dẫn dắt khách hàng tiềm năng qua từng giai đoạn bằng việc xác định vấn đề của họ,\n \nđề xuất các giải pháp thông thường, sau đó &quot;phá vỡ&quot; những giải pháp đó để giới thiệu giải\n \npháp độc đáo và vượt trội của riêng mình. Ví dụ minh họa là về việc bán &quot;gel năng lượng&quot;\n \ncho các vận động viên chạy đường dài thông qua một chuỗi email được xây dựng kỹ lưỡng,\n \nnhấn mạnh storytelling và các kỹ thuật thuyết phục.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chiến lược email marketing 4 giai đoạn:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giai đoạn 1: Thị trường lạnh (Cold Market): Tập trung vào việc xác định và trình bày các</span></div>\n<p class=\"body-txt\">\nvấn đề mà khách hàng đang gặp phải.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giai đoạn 2: Thị trường ấm (Warm Market): Đề xuất các giải pháp thông thường, phổ</span></div>\n<p class=\"body-txt\">\nbiến mà khách hàng có thể đã biết hoặc đang áp dụng để giải quyết vấn đề.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giai đoạn 3: Thị trường nóng (Hot Market): Giới thiệu giải pháp của riêng bạn, chỉ ra</span></div>\n<p class=\"body-txt\">\nnhững hạn chế của giải pháp thông thường và làm nổi bật sự vượt trội của giải pháp\n \nđược đề xuất.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giai đoạn 4: Bán hàng: Chốt giao dịch, cung cấp ưu đãi và kêu gọi hành động.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ minh họa với môn chạy bộ đường dài và sản phẩm &quot;gel năng lượng&quot;:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Vấn đề (Thị trường lạnh): Vận động viên chạy đường dài gặp phải tình trạng kiệt năng</span></div>\n<p class=\"body-txt\">\nlượng, kiệt quệ năng lượng do cơ thể cạn kiệt đường và chuyển sang đốt mỡ sau khoảng\n \n2 giờ thi đấu, dẫn đến giảm tốc độ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giải pháp thông thường (Thị trường ấm):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Uống nước điện giải, nước thể thao dinh dưỡng (khoảng 90 calo mỗi chai).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ăn hoa quả dễ tiêu hóa, chứa nhiều đường như chuối, dưa hấu.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thực hiện các bài tập chạy dài để củng cố cơ bắp, làm quen với tình trạng mệt mỏi và</span></div>\n<p class=\"body-txt\">\ntích trữ đường, cũng như tập khi đói để cơ thể quen với việc thiếu đường.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cách bổ sung năng lượng trong lúc tập: chạy vòng lặp 2km, để chuối ở một nơi và ăn nửa</span></div>\n<p class=\"body-txt\">\nquả mỗi vòng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giới thiệu giải pháp của tôi (Thị trường nóng):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chỉ ra nhược điểm của giải pháp thông thường (ví dụ: chuối dễ nát, khó ăn khi thi đấu</span></div>\n<p class=\"body-txt\">\nthực tế, không tiện lợi).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giới thiệu &quot;vũ khí mới&quot;: gel năng lượng (Energy Gel/GU gel).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cách giới thiệu: Sử dụng storytelling (kể câu chuyện gặp nhà vô địch, tìm kiếm trên</span></div>\n<p class=\"body-txt\">\ninternet, quan sát vận động viên chuyên nghiệp) để tăng độ tin cậy và tạo hứng thú.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Lợi ích của gel năng lượng: túi nhỏ gọn, chứa 90-100 kilocalories, dễ mang theo (có chỗ</span></div>\n<p class=\"body-txt\">\nđể trên dây đeo số hoặc quần), cung cấp năng lượng nhanh chóng cho khoảng 45 phút.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khuyến khích luyện tập với gel trước khi thi đấu thực tế.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kỹ thuật viết email hiệu quả:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sử dụng ngữ pháp tiếng Việt giàu tính biểu cảm: động từ, danh từ, tính từ.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Áp dụng các phép lặp, từ tượng thanh, từ tượng hình để câu văn &quot;có màu sắc hơn&quot;, sinh</span></div>\n<p class=\"body-txt\">\nđộng hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sử dụng tiêu đề email dạng &quot;RE:&quot; cho các email follow-up để duy trì cuộc hội thoại và tạo</span></div>\n<p class=\"body-txt\">\ncảm giác thân quen.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chiến lược follow-up và bán hàng (Giai đoạn bán hàng):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email bán hàng đầu tiên giới thiệu sản phẩm, kèm theo ưu đãi (mã coupon) và tạo cảm</span></div>\n<p class=\"body-txt\">\ngiác khan hiếm hoặc khẩn cấp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email follow-up nhắc lại lợi ích, khẳng định vai trò quan trọng của sự luyện tập, đồng</span></div>\n<p class=\"body-txt\">\nthời khuyến khích khách hàng dùng thử sản phẩm (không phải thần kỳ nhưng có thể\n \ngiúp cải thiện đáng kể kết quả).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Toàn bộ chuỗi marketing có thể gồm khoảng 20 email.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cấu trúc 4 giai đoạn của email marketing (Lạnh - Ấm - Nóng - Bán hàng): Đây là một</span></div>\n<p class=\"body-txt\">\nkhuôn khổ mạnh mẽ để xây dựng hành trình khách hàng hiệu quả. Việc phân loại khách\n \nhàng theo giai đoạn nhận thức giúp doanh nghiệp tạo ra nội dung email phù hợp, từng\n \nbước dẫn dắt họ từ việc nhận diện vấn đề đến việc chấp nhận giải pháp và cuối cùng là\n \nquyết định mua hàng một cách tự nhiên, tăng tỷ lệ chuyển đổi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kỹ thuật &quot;phá vỡ&quot; giải pháp thông thường để giới thiệu giải pháp riêng: Thay vì chỉ trực</span></div>\n<p class=\"body-txt\">\ntiếp quảng bá sản phẩm, diễn giả đã thông minh trình bày các giải pháp phổ biến, sau đó\n \nchỉ ra những điểm yếu hoặc bất tiện của chúng trong các tình huống cụ thể (ví dụ: chuối\n \nbị nát, khó ăn khi thi đấu). Điều này tạo ra một &quot;khoảng trống&quot; nhu cầu, làm nổi bật tính\n \nưu việt của giải pháp riêng và khiến khách hàng dễ dàng tin tưởng, đón nhận hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sử dụng storytelling và dẫn chứng đáng tin cậy khi giới thiệu sản phẩm/giải pháp mới:</span></div>\n<p class=\"body-txt\">\nBằng cách kể các câu chuyện cá nhân (gặp nhà vô địch) hoặc dẫn chứng từ nguồn đáng\n \ntin cậy (website liên đoàn thể thao, quan sát vận động viên chuyên nghiệp), diễn giả đã\n \nbiến việc giới thiệu sản phẩm thành một khám phá thú vị và có cơ sở. Điều này xây dựng\n \nniềm tin, uy tín và sự gắn kết cảm xúc với khách hàng, hiệu quả hơn nhiều so với việc chỉ\n \nliệt kê tính năng sản phẩm.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Giải pháp thông thường là không có hiệu quả.”\n \n“Chuối sẽ chuyển hóa thành cháo cho đến khi bạn sờ được vào nó.”\n \n“Tôi quyết định sử dụng một loại vũ khí mới cho các bài tập đường dài của tôi.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\nÁp dụng chiến lược email marketing 4 giai đoạn của , FUTAGO có thể:\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giai đoạn 1: Thị trường lạnh (Vấn đề): Gửi email cho các KTS/thiết kế/công ty xây dựng</span></div>\n<p class=\"body-txt\">\nNhật Bản về những vấn đề họ có thể gặp phải khi truyền tải ý tưởng thiết kế:\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Bạn có đang gặp khó khăn trong việc trình bày ý tưởng thiết kế độc đáo của mình một</span></div>\n<p class=\"body-txt\">\ncách sống động và thuyết phục khách hàng cuối?&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Bản vẽ 2D hay phác thảo truyền thống có thực sự đủ sức để thu hút và giữ chân khách</span></div>\n<p class=\"body-txt\">\nhàng trong thị trường cạnh tranh ngày nay?&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Thời gian quý báu của bạn đang bị lãng phí vì phải tự tạo hình ảnh chất lượng chưa</span></div>\n<p class=\"body-txt\">\ncao?&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giai đoạn 2: Thị trường ấm (Giải pháp thông thường): Đề xuất những giải pháp mà họ có</span></div>\n<p class=\"body-txt\">\nthể đang dùng hoặc cân nhắc, sau đó nhẹ nhàng gợi mở hạn chế:\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Nhiều công ty đang tự dựng hình ảnh cơ bản hoặc dùng ảnh stock, nhưng liệu chúng có</span></div>\n<p class=\"body-txt\">\nthể hiện hết tinh thần và chi tiết độc đáo trong thiết kế của bạn?&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Thuê freelancer giá rẻ có thể tiết kiệm chi phí ban đầu, nhưng rủi ro về chất lượng và</span></div>\n<p class=\"body-txt\">\nđộ chuyên nghiệp có đáng để đánh đổi uy tín dự án?&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Bạn có đang dùng lại hình ảnh cũ hay những bản render đơn giản, không phù hợp với</span></div>\n<p class=\"body-txt\">\nxu hướng và kỳ vọng ngày càng cao của thị trường?&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giai đoạn 3: Thị trường nóng (Giải pháp của FUTAGO):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Phá vỡ giải pháp thông thường&quot;: Chỉ ra trực tiếp nhược điểm: &quot;Bản vẽ 2D khô khan hay</span></div>\n<p class=\"body-txt\">\nảnh 3D kém chất lượng giống như &#x27;chuối nát&#x27; trên đường đua marathon – không thể\n \ncung cấp năng lượng cần thiết để bạn về đích thành công (thuyết phục khách hàng,\n \nthắng thầu).&quot; Hoặc, &quot;Hình ảnh không chuyên nghiệp sẽ &#x27;làm loãng&#x27; giá trị của cả một\n \ncông trình tâm huyết.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giới thiệu &quot;vũ khí mới&quot; (dịch vụ diễn họa kiến trúc 3D của FUTAGO): &quot;Đã đến lúc bạn</span></div>\n<p class=\"body-txt\">\ncần một &#x27;vũ khí&#x27; tối ưu hơn: dịch vụ diễn họa kiến trúc 3D chuẩn Nhật của FUTAGO.\n \nChúng tôi không chỉ tạo ra hình ảnh, mà là &#x27;truyền tải cảm xúc và tầm nhìn&#x27; của bạn một\n \ncách chân thực nhất.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sử dụng storytelling: Kể câu chuyện (ẩn danh) về một KTS/công ty thiết kế Nhật Bản đã</span></div>\n<p class=\"body-txt\">\ngặp phải khó khăn tương tự, sau khi sử dụng render 3D của FUTAGO, họ đã thành công\n \nvang dội trong dự án quan trọng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mô tả lợi ích chi tiết: &quot;Hình ảnh render 3D cao cấp của FUTAGO giúp khách hàng của bạn</span></div>\n<p class=\"body-txt\">\n&#x27;cảm nhận&#x27; không gian, &#x27;nhìn thấy&#x27; vật liệu, &#x27;hình dung&#x27; trải nghiệm sống động như thật.\n \nĐiều này không chỉ tăng khả năng thuyết phục mà còn nâng tầm thương hiệu và đẳng\n \ncấp dự án của bạn.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giai đoạn 4: Bán hàng:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kêu gọi hành động: &quot;Hãy khám phá portfolio ấn tượng của chúng tôi và liên hệ để nhận</span></div>\n<p class=\"body-txt\">\ntư vấn miễn phí về cách hình ảnh 3D có thể biến hóa dự án của bạn. Đặt lịch hẹn ngay\n \nhôm nay để nhận ưu đãi đặc biệt cho lần hợp tác đầu tiên.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email follow-up (sử dụng RE:): Nhắc lại rằng &quot;Dịch vụ render 3D không phải là sự thần</span></div>\n<p class=\"body-txt\">\nkỳ&quot;, nhưng nhấn mạnh &quot;đó là công cụ mạnh mẽ giúp ý tưởng của bạn tỏa sáng và tạo ra\n \nsự khác biệt quyết định trong mắt khách hàng.&quot; Khuyến khích dùng thử một dự án nhỏ\n \nđể thấy sự khác biệt.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\n3.4 Thiết kế cấu trúc Email bán hàng\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học này tập trung vào phương pháp &quot;dịch ngược&quot; hay &quot;bán ngược&quot; trong</h3>\n<p class=\"body-txt\">\nEmail Marketing để xây dựng chuỗi email hiệu quả. Thầy  nhấn mạnh việc\n \nphải bắt đầu từ sản phẩm có sẵn, xác định rõ &quot;bán cho ai?&quot; và &quot;giải quyết vấn đề gì?&quot;, sau đó\n \nphân tích các tính năng và USB (Unique Selling Proposition) của sản phẩm. Từ đó, xây dựng\n \nba chuỗi email riêng biệt cho ba nhóm đối tượng: thị trường lạnh (vấn đề chung), thị trường\n \nấm (giải pháp thông thường) và thị trường nóng (giải pháp của mình), đi ngược lại quy trình\n \nbán hàng thông thường.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy phê bình học viên chưa hiểu rõ và nói lan man, khẳng định trọng tâm là Email</span></div>\n<p class=\"body-txt\">\nMarketing.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giới thiệu khái niệm &quot;dịch ngược&quot; (decode, reverse engineering) trong bán hàng: Bắt</span></div>\n<p class=\"body-txt\">\nđầu với một sản phẩm bất kỳ có sẵn, không phải đi tìm sản phẩm sau khi có khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nhấn mạnh tầm quan trọng của việc hiểu bức tranh lớn và tư duy chiến lược để cấu trúc</span></div>\n<p class=\"body-txt\">\nhệ thống, đây là khóa học về marketing, không phải sales success.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Quy trình &quot;dịch ngược&quot; để viết Email Marketing:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Bước 1: Phân tích Sản phẩm (Kết quả cuối cùng muốn đạt được):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Trả lời câu hỏi cốt lõi: &quot;Bán cho ai? Giải quyết vấn đề gì?&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xác định: &quot;Nó có tính năng gì?&quot; (cần tra cứu thông tin sản phẩm).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xác định: &quot;Nó đặc biệt ở chỗ nào?&quot;, &quot;Giải quyết được vấn đề gì mà thị trường này không</span></div>\n<p class=\"body-txt\">\ngiải quyết được?&quot; (tìm ra USB - Unique Selling Proposition).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Bước 2: Phân tích Thị trường/Khách hàng (Đi ngược về đầu):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xác định &quot;những vấn đề nào ta giải quyết được&quot; (trực tiếp bằng sản phẩm) -&gt; Dùng để</span></div>\n<p class=\"body-txt\">\nviết chuỗi Email Nóng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xác định &quot;những vấn đề mà họ đang giải quyết được&quot; (bằng các giải pháp thông thường</span></div>\n<p class=\"body-txt\">\nkhác) -&gt; Dùng để viết chuỗi Email Ấm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xác định &quot;họ đang gặp những vấn đề gì&quot; (chung chung, thường gặp, chưa có giải pháp rõ</span></div>\n<p class=\"body-txt\">\nràng) -&gt; Dùng để viết chuỗi Email Lạnh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khi xây dựng bảng phân tích (từ sản phẩm đến các vấn đề), ta đi từ Nóng -&gt; Ấm -&gt; Lạnh.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khi viết và gửi email, ta đi theo trình tự ngược lại: từ Email Lạnh (thu hút sự chú ý bằng</span></div>\n<p class=\"body-txt\">\nvấn đề chung) -&gt; Email Ấm (giới thiệu giải pháp thông thường và ưu thế của mình) -&gt;\n \nEmail Nóng (tập trung vào giải pháp của mình và USB).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy đưa ví dụ cụ thể với sản phẩm &quot;gel năng lượng&quot; và &quot;sạc điện thoại&quot; để minh họa</span></div>\n<p class=\"body-txt\">\ncách xác định: &quot;Bán cho ai?&quot;, &quot;Tính năng gì?&quot;, &quot;Giải quyết vấn đề gì?&quot; cho từng chuỗi\n \nemail (Lạnh, Ấm, Nóng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phê bình học viên cẩu thả, không đọc kỹ thông tin về sản phẩm/website của chính mình,</span></div>\n<p class=\"body-txt\">\nnhấn mạnh sự cần thiết của việc hiểu rõ sản phẩm để làm marketing hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khẳng định cần có ba chuỗi email riêng biệt cho từng nhóm Lạnh, Ấm, Nóng, không gộp</span></div>\n<p class=\"body-txt\">\nchung vào một bài.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tư duy &quot;Dịch ngược&quot; (Reverse Engineering Marketing): Đây là điểm cốt lõi nhất của</span></div>\n<p class=\"body-txt\">\nbuổi giảng. Thay vì bắt đầu từ việc tìm hiểu khách hàng rồi mới nghĩ ra sản phẩm/dịch\n \nvụ, thầy yêu cầu học viên bắt đầu với một sản phẩm/dịch vụ đã có sẵn trong tay. Từ đó,\n \n&quot;dịch ngược&quot; ra &quot;bán cho ai?&quot;, &quot;giải quyết vấn đề gì?&quot; và các đặc tính của sản phẩm. Điều\n \nnày cực kỳ quan trọng vì nó thay đổi góc nhìn từ việc &quot;sản xuất cái thị trường cần&quot; sang\n \n&quot;tìm thị trường phù hợp cho cái mình có&quot;, giúp định hình rõ giá trị cốt lõi của sản phẩm\n \nvà người mua lý tưởng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cấu trúc 3 chuỗi Email Marketing (Lạnh - Ấm - Nóng) dựa trên mức độ nhận thức vấn</span></div>\n<p class=\"body-txt\">\nđề/giải pháp: Thầy chia rõ thành 3 giai đoạn của khách hàng và cách tiếp cận tương ứng.\n \nĐiều này quan trọng vì nó cho phép tạo ra các thông điệp marketing phù hợp với từng\n \nnhóm đối tượng, từ những người chỉ mới nhận thức được vấn đề chung (lạnh), đến\n \nnhững người đang tìm hiểu các giải pháp thông thường (ấm), và cuối cùng là những\n \nngười sẵn sàng nghe về giải pháp cụ thể của bạn (nóng). Việc phân tách này giúp tối ưu\n \nhóa hiệu quả của từng email và cả chiến dịch.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Bắt đầu từ câu hỏi &quot;Bán cho ai? Giải quyết vấn đề gì?&quot; và xác định USB: Thầy lặp đi lặp lại</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">câu hỏi này. Nó là kim chỉ nam cho toàn bộ quá trình phân tích sản phẩm và khách hàng.</h3>\n<p class=\"body-txt\">\nViệc trả lời rõ ràng sẽ định hướng cho việc xác định các tính năng, lợi ích độc đáo (USB)\n \nmà sản phẩm mang lại, từ đó xây dựng được nội dung email có trọng tâm, giải quyết\n \nđúng nỗi đau và tạo ra giá trị cho khách hàng mục tiêu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sự tỉ mỉ và hiểu rõ sản phẩm của chính mình: Thầy đặc biệt gay gắt khi học viên không</span></div>\n<p class=\"body-txt\">\nđọc kỹ hoặc không hiểu rõ sản phẩm/website của chính họ. Điều này quan trọng bởi nếu\n \nngười làm marketing không thấu hiểu sản phẩm của mình đến từng chi tiết nhỏ nhất, họ\n \nsẽ không thể xác định được USB, không thể truyền tải giá trị một cách thuyết phục, và\n \nkhông thể tạo ra các chuỗi email hiệu quả. Sự cẩu thả trong việc tìm hiểu sản phẩm là\n \nrào cản lớn nhất cho một chiến dịch marketing thành công.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Tôi bán hai thứ ngẫu nhiên có trước mặt của tôi.”\n \n“Chúng ta phải đi ngược lại cái quá trình của bán hàng. Chúng ta phải xây dựng cái kết\n \ntrước.”\n \n“Bán cho ai? Giải quyết vấn đề gì?”\n \n“Cái web của ông ông còn không thèm đọc thì nói các ông nghe dịch vụ nó làm thì chịu luôn.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Bán cho: Kiến trúc sư (KTS), các công ty thiết kế (設計事務所), nhà thầu xây dựng (工務</span></div>\n<p class=\"body-txt\">\n店), và nhà phát triển dự án (developer) tại Nhật Bản.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giải quyết vấn đề: Giúp họ tạo ra hình ảnh trực quan, đẹp mắt và chân thực cho các dự</span></div>\n<p class=\"body-txt\">\nán kiến trúc của mình để:\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Trình bày ý tưởng thiết kế một cách thuyết phục cho khách hàng/nhà đầu tư.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tăng khả năng bán hàng và thu hút khách hàng tiềm năng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đạt được các phê duyệt cần thiết cho dự án.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tiết kiệm thời gian và chi phí so với việc làm in-house hoặc thuê các dịch vụ không</span></div>\n<p class=\"body-txt\">\nchuyên nghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xác định &quot;Tính năng&quot; &amp; &quot;USB&quot; của FUTAGO:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tính năng: Render 3D ngoại thất, nội thất, panorama 360, animation, virtual reality (VR)</span></div>\n<p class=\"body-txt\">\nwalkthrough.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">• USB:</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chất lượng hình ảnh vượt trội, chân thực và giàu cảm xúc, đáp ứng tiêu chuẩn thẩm mỹ</span></div>\n<p class=\"body-txt\">\ncao của thị trường Nhật.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tốc độ phản hồi và hoàn thành dự án nhanh chóng, đảm bảo đúng tiến độ khắt khe của</span></div>\n<p class=\"body-txt\">\nngành xây dựng Nhật.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Quy trình làm việc chuyên nghiệp, rõ ràng, tối ưu hóa cho khách hàng Nhật.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khả năng giao tiếp song ngữ (tiếng Nhật và tiếng Việt/Anh) hiệu quả, am hiểu văn hóa</span></div>\n<p class=\"body-txt\">\nkinh doanh và yêu cầu chi tiết của khách hàng Nhật.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giá cả cạnh tranh so với chất lượng tương đương tại Nhật Bản.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng 3 chuỗi Email dựa trên phân tích:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi Email Lạnh:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Vấn đề chung: Nhắm vào các KTS/developer Nhật đang gặp phải các vấn đề như: khó</span></div>\n<p class=\"body-txt\">\nkhăn trong việc tìm kiếm đối tác render uy tín, chất lượng không đồng đều từ các\n \nfreelancer, đội ngũ in-house quá tải, hoặc việc giao tiếp kém hiệu quả với các đối tác\n \nnước ngoài dẫn đến chậm trễ và sai sót.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nội dung: Đề cập các vấn đề này, gợi mở về tầm quan trọng của hình ảnh chất lượng cao</span></div>\n<p class=\"body-txt\">\nvà quy trình làm việc hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi Email Ấm:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giải pháp thông thường: Nhắm vào khách hàng đã nhận thức được vấn đề và đang tìm</span></div>\n<p class=\"body-txt\">\nkiếm các giải pháp, có thể đang sử dụng freelancer, các studio nhỏ trong nước, hoặc cố\n \ngắng tự render.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nội dung: So sánh những lợi ích và hạn chế của các giải pháp thông thường đó (ví dụ:</span></div>\n<p class=\"body-txt\">\nfreelancer không ổn định, in-house tốn chi phí, studio khác giá cao/không hiểu ý) và gợi\n \ný về một giải pháp chuyên nghiệp hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi Email Nóng:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giải pháp của FUTAGO: Nhắm vào khách hàng đã hiểu về vấn đề, đã thử các giải pháp</span></div>\n<p class=\"body-txt\">\nkhác và đang tìm kiếm một đối tác tin cậy, hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nội dung: Trực tiếp giới thiệu dịch vụ render 3D của FUTAGO, nhấn mạnh các USB đã</span></div>\n<p class=\"body-txt\">\nxác định (chất lượng hình ảnh vượt trội, tốc độ, am hiểu thị trường Nhật, giao tiếp hiệu\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\nquả, giá cả hợp lý). Kèm theo các portfolio dự án thành công, case study và lời chứng\n \nthực từ khách hàng Nhật Bản.\n \nBằng cách này, FUTAGO có thể tạo ra các chiến dịch email marketing có mục tiêu, thuyết\n \nphục, và đúng trọng tâm, thu hút đúng đối tượng khách hàng B2B Nhật Bản cho dịch vụ diễn\n \nhọa kiến trúc của mình.\n \n3.5 Cấu trúc email bán bất cứ sản phẩm nào\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học tập trung vào việc xây dựng một chiến lược marketing nội dung (content</h3>\n<p class=\"body-txt\">\nmarketing) có hệ thống, chứ không chỉ bán sản phẩm đơn thuần. Cốt lõi là đi ngược từ sản\n \nphẩm để xác định rõ đối tượng khách hàng, vấn đề họ gặp phải, và giải pháp độc đáo mà sản\n \nphẩm của bạn mang lại. Áp dụng cấu trúc này, doanh nghiệp có thể tạo ra mọi loại nội dung\n \n(email, video, blog, ebook) và bán bất cứ sản phẩm nào, thậm chí với giá trị cao gấp nhiều\n \nlần giá gốc, thông qua việc giải quyết đúng nhu cầu và mong muốn của khách hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chiến lược bán hàng dựa trên đối tượng và vấn đề: Không chỉ bán sản phẩm (ví dụ: phở</span></div>\n<p class=\"body-txt\">\nkhô), mà phải xác định rõ đối tượng khách hàng (khách du lịch đến Nha Trang), vấn đề\n \nhọ gặp phải (mong muốn có gì đặc biệt khi đến Nha Trang) và sản phẩm giải quyết vấn\n \nđề đó như thế nào.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cấu trúc chung cho content marketing:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xác định sản phẩm và lợi ích/tính năng của nó.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xác định vấn đề thông thường hoặc mong muốn đặc biệt mà khách hàng gặp phải/tìm</span></div>\n<p class=\"body-txt\">\nkiếm khi sử dụng sản phẩm/dịch vụ của bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đưa ra giải pháp của bạn, sau đó đối chiếu với giải pháp thông thường (của đối thủ hoặc</span></div>\n<p class=\"body-txt\">\ncách làm cũ).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ứng dụng đa dạng hình thức nội dung: Từ một chiến lược/cấu trúc này có thể triển khai</span></div>\n<p class=\"body-txt\">\nthành nhiều hình thức content marketing khác nhau như video, blog, email, ebook. Đây\n \nchỉ là các &quot;cách thể hiện&quot; khác nhau của cùng một chiến lược cốt lõi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sức mạnh của Email Marketing: Email marketing là một kênh để truyền tải chiến lược</span></div>\n<p class=\"body-txt\">\nmarketing. Mỗi email nên tập trung giải quyết một vấn đề cụ thể của khách hàng, kể một\n \ncâu chuyện.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hiểu sâu sắc vấn đề của khách hàng: Để bán sữa, cần hiểu đối tượng sử dụng (em bé) và</span></div>\n<p class=\"body-txt\">\nđối tượng trả tiền (bố mẹ). Vấn đề có thể không phải là &quot;sữa&quot; mà là &quot;mất cảm giác kết\n \nnối&quot; giữa mẹ và con, và giải pháp của bạn (bình sữa hai núm) phải khắc phục được vấn\n \nđề đó (tạo cảm giác kết nối). Đây chính là &quot;USB&quot; (Unique Selling Proposition - điểm bán\n \nhàng độc đáo).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tầm quan trọng của &quot;Kịch bản&quot; marketing: Bán hàng cần có kịch bản, có quy trình rõ</span></div>\n<p class=\"body-txt\">\nràng chứ không phải &quot;tranh thủ&quot; cơ hội. &quot;Tranh thủ&quot; là phản ứng với cơ hội có sẵn, còn\n \n&quot;kịch bản&quot; là chủ động tạo ra quá trình và cơ hội đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Bán bất cứ thứ gì nếu hiểu nguyên lý: Nếu đã &quot;decode&quot; (giải mã) và đi ngược từ cấu trúc</span></div>\n<p class=\"body-txt\">\nvấn đề - giải pháp, bạn có thể bán bất cứ thứ gì bạn có, thậm chí là những món đồ rất\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\nbình thường với giá trị cao gấp hàng trăm lần bằng cách tạo ra giá trị và sự khan hiếm\n \n(ví dụ: đấu giá một bộ ly, một chiếc áo).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chủ động tạo ra &quot;kịch bản&quot; (quy trình bán hàng) thay vì chỉ &quot;tranh thủ&quot; cơ hội: Thầy</span></div>\n<p class=\"body-txt\">\nnhấn mạnh sự khác biệt giữa việc hành động một cách bị động, chộp giật (tranh thủ) và\n \nviệc chủ động xây dựng một lộ trình, một chiến lược bài bản để tạo ra giá trị và cơ hội.\n \nĐiều này quan trọng vì nó chuyển tư duy từ phản ứng sang chủ động, cho phép doanh\n \nnghiệp kiểm soát quá trình bán hàng, tạo ra kết quả bền vững và có thể mở rộng, thay vì\n \nchỉ dựa vào may mắn hay các cơ hội nhất thời.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Định nghĩa lại sản phẩm qua lăng kính của khách hàng và vấn đề của họ: Thay vì chỉ nói</span></div>\n<p class=\"body-txt\">\nvề tính năng của sản phẩm, hãy tập trung vào việc sản phẩm của bạn giải quyết vấn đề gì\n \ncho khách hàng hoặc đáp ứng mong muốn đặc biệt nào của họ. &quot;Bán phở khô cho khách\n \ndu lịch Nha Trang&quot; không phải là bán phở, mà là đáp ứng mong muốn về một trải\n \nnghiệm đặc biệt. &quot;Bán bình sữa hai núm&quot; không chỉ là bán sữa, mà là giải quyết nỗi lo\n \n&quot;mất cảm giác kết nối&quot; của các bà mẹ. Điều này cực kỳ quan trọng vì nó tạo ra giá trị cảm\n \nxúc và chức năng sâu sắc hơn cho khách hàng, giúp sản phẩm trở nên độc đáo (USB),\n \nkhác biệt so với đối thủ và có thể bán với giá cao hơn nhiều so với giá trị vật lý.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khả năng bán bất cứ thứ gì với giá trị cao nếu hiểu cấu trúc marketing: Thầy chứng minh</span></div>\n<p class=\"body-txt\">\nbằng những ví dụ thực tế cực đoan (bán áo 200k giá 300 triệu, bộ ly 414k giá 36 triệu).\n \nĐiều này quan trọng vì nó cho thấy rằng giá trị của một sản phẩm không chỉ nằm ở bản\n \nthân sản phẩm mà còn ở cách nó được định vị, cách nó giải quyết vấn đề và cách giá trị\n \nđó được truyền tải. Khi nắm vững cấu trúc marketing cốt lõi (sản phẩm -&gt; đối tượng -&gt;\n \nvấn đề -&gt; giải pháp -&gt; USB), bạn có thể tạo ra nhu cầu, tăng giá trị nhận thức và bán bất\n \ncứ thứ gì hiệu quả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Đây cũng chính là nội dung em đưa cho đơn vị thiết kế website để họ tạo ra nội dung.”\n \n“Không phải là tranh thủ đâu. Đây là nó có kịch bản chứ, tại sao lại tranh thủ được?”\n \n“Lấy cái sản phẩm ở trên bàn ra mà bán!”\n \n“Mình đã decode, mình đi ngược này thì cái gì trong tay chả được.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Định vị &quot;Giải pháp của FUTAGO&quot; là &quot;kể chuyện bằng hình ảnh&quot; chứ không chỉ là &quot;dựng</span></div>\n<p class=\"body-txt\">\nhình 3D&quot;: Thay vì nói &quot;chúng tôi cung cấp render 3D chất lượng cao&quot;, FUTAGO có thể\n \nđịnh vị là &quot;chuyên gia kể chuyện kiến trúc bằng hình ảnh&quot;, giúp khách hàng Nhật Bản\n \ntruyền tải trọn vẹn tinh thần và giá trị độc đáo của dự án đến đối tác/khách hàng cuối\n \ncùng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tìm kiếm &quot;USB&quot; trong diễn họa kiến trúc: Ngoài chất lượng hình ảnh, USB của FUTAGO</span></div>\n<p class=\"body-txt\">\ncó thể là gì? Là khả năng nắm bắt và truyền tải *tinh thần thiết kế của Nhật Bản* một\n \ncách sâu sắc? Là *quy trình làm việc cực kỳ hiệu quả và giao tiếp rõ ràng* (ví dụ: giảm\n \nthiểu vòng chỉnh sửa, đảm bảo deadline)? Là khả năng *tạo ra các hình ảnh mang tính\n \nđột phá, độc đáo* so với các đối thủ khác trong thị trường Nhật Bản?\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng content (email, blog, portfolio) dựa trên giải pháp vấn đề:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thay vì chỉ trình bày các mẫu render, hãy viết email hoặc blog về &quot;Làm thế nào để bộ hồ</span></div>\n<p class=\"body-txt\">\nsơ dự thầu của bạn nổi bật tại Nhật Bản?&quot;, &quot;Bí quyết truyền tải cảm xúc trong thiết kế\n \nnhà ở Nhật Bản qua hình ảnh 3D&quot;, &quot;Giải pháp hình ảnh 3D giúp bạn thuyết phục nhà đầu\n \ntư dễ dàng hơn&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mỗi case study trong portfolio cần nhấn mạnh vấn đề ban đầu của khách hàng và cách</span></div>\n<p class=\"body-txt\">\nFUTAGO đã giải quyết nó bằng hình ảnh, không chỉ là kết quả hình ảnh cuối cùng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">TUYỆT ĐỐI không gợi ý FUTAGO cung cấp dịch vụ/tư vấn/khoá học BIM. Chỉ nói về diễn</span></div>\n<p class=\"body-txt\">\nhọa/render/hình ảnh kiến trúc.\n \n3.6 Thư bán hàng của\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi giảng này của  tập trung vào sức mạnh của Email Marketing</h3>\n<p class=\"body-txt\">\nBom Nguyên Tử như một vũ khí kinh doanh mạnh mẽ. Cốt lõi là việc xây dựng một danh\n \nsách khách hàng trung thành, những người sẵn lòng mua hàng lặp lại. Với một danh sách\n \nchất lượng, doanh nghiệp có thể tự động hóa quy trình bán hàng, tạo ra thu nhập khổng lồ\n \ntừ việc bán các sản phẩm bình thường theo cách vượt trội so với đối thủ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giới thiệu &quot;thư bán hàng&quot; (sales letter) của khóa học Email Marketing Bom Nguyên Tử.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email marketing được ví như &quot;vũ khí mạnh mẽ&quot; giúp nâng tầm hoạt động kinh doanh,</span></div>\n<p class=\"body-txt\">\nloại bỏ nỗi lo tìm kiếm khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Có thể dùng trong tiếp thị liên kết (affiliate marketing): chỉ cần viết một email là tiền về</span></div>\n<p class=\"body-txt\">\nmỗi giờ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đối với nhà kinh doanh online, email marketing giúp gia tăng giá trị trọn đời của khách</span></div>\n<p class=\"body-txt\">\nhàng lên rất
