nhiều lần.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy Long chia sẻ nhiều học viên đã đạt thu nhập khổng lồ nhờ áp dụng &quot;vũ khí bí mật&quot;</span></div>\n<p class=\"body-txt\">\nnày.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Những người thành công này có thể được tìm thấy trên internet hoặc ngoài đời thực, họ</span></div>\n<p class=\"body-txt\">\nkhông nhất thiết tham gia cộng đồng marketing nào nhưng thu nhập của họ đến từ\n \ninternet.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Bí quyết thành công của họ là &quot;Money in the list&quot; (tiền nằm trong danh sách email).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Họ sở hữu những danh sách khách hàng trung thành, yêu mến và có khả năng mua hàng.</span></div></div></div>",

=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Bài tập về nhà: Làm khoảng 10 sản phẩm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mục đích của 10 sản phẩm: Trở thành 10 phễu bán hàng (qua email, video, blog).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Quan trọng nhất là có nội dung trước: Có nội dung thì mới có thể viết email được.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cách tạo sản phẩm/nội dung:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Lấy bất kỳ sản phẩm nào (ví dụ: cái áo, cái quần, cái sạc pin, gói dao cạo trên bàn).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Làm sản phẩm của mình, sản phẩm của người khác, hoặc bất kỳ thứ gì tìm thấy.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tư duy làm sản phẩm:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tìm ra vấn đề của sản phẩm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tìm ra đối tượng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tìm ra giải pháp thông thường.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tìm ra giải pháp của bản thân.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tìm ra giải pháp đặc biệt của bản thân.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Vai trò của tư duy: Tư duy này giúp làm được bất cứ điều gì. Khi có tư duy rồi thì mọi</span></div>\n<p class=\"body-txt\">\nviệc đều làm được.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Yêu cầu đối với học viên: Không hỏi có làm được không, mà phải làm hết tất cả các bài</span></div>\n<p class=\"body-txt\">\ntập.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Lợi ích của việc làm bài tập: Sau khi làm xong môn này sẽ hiểu rõ cả môn email</span></div>\n<p class=\"body-txt\">\nmarketing.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Quy mô bài tập: Làm 10, 20, 50, 100 sản phẩm.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Có nội dung đã, hôm sau tôi mới dạy viết email được.&quot;: Điểm này cực kỳ quan trọng vì</span></div>\n<p class=\"body-txt\">\nnó đảo ngược tư duy thông thường. Nhiều người nghĩ đến marketing là nghĩ ngay đến\n \nkênh (email, video) mà quên mất yếu tố cốt lõi là nội dung. Thầy nhấn mạnh phải có nội\n \ndung trước, nội dung là &quot;nền móng&quot; cho mọi chiến lược truyền thông sau này. Nếu\n \nkhông có nội dung, kênh marketing sẽ rỗng tuếch và không hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Quan trọng là cái lối tư duy của ta thôi.&quot;: Đây là một insight đắt giá. Thầy không chỉ dạy</span></div>\n<p class=\"body-txt\">\n&quot;công cụ&quot; hay &quot;kỹ thuật&quot; mà tập trung vào việc hình thành một &quot;tư duy&quot; để giải quyết\n \nvấn đề. Tư duy tìm ra vấn đề của sản phẩm/đối tượng/giải pháp là một kỹ năng nền\n \ntảng, cho phép học viên tự mình sáng tạo nội dung cho bất kỳ sản phẩm nào, thay vì chỉ\n \nlàm theo mẫu. Nó là chìa khóa để linh hoạt và thích ứng trong mọi tình huống kinh\n \ndoanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Biến bất kỳ vật phẩm nào thành &quot;sản phẩm&quot; để phân tích và tạo phễu bán hàng: Việc lấy</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">ví dụ từ &quot;cái áo&quot;, &quot;cái quần&quot;, &quot;cái sạc pin&quot; hay &quot;gói dao cạo&quot; cho thấy khả năng ứng dụng</h3>\n<p class=\"body-txt\">\ntư duy marketing vào mọi thứ xung quanh. Điều này quan trọng vì nó khuyến khích học\n \nviên thoát khỏi giới hạn của sản phẩm/dịch vụ hiện tại, rèn luyện kỹ năng phân tích thị\n \ntrường, vấn đề khách hàng, và tìm ra giải pháp độc đáo cho dù đó là một vật phẩm tưởng\n \nchừng đơn giản nhất.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Có nội dung đã, hôm sau tôi mới dạy viết email được.”\n \n“Quan trọng là cái lối tư duy của ta thôi.”\n \n“Cái gì cũng phải làm hết ấy, đừng có hỏi có làm được không.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nội dung: Với mỗi &quot;sản phẩm&quot; (ví dụ: một render căn hộ hiện đại), tạo ra nội dung giới</span></div>\n<p class=\"body-txt\">\nthiệu (có thể là bài viết trên blog, video ngắn quay màn hình quy trình làm việc, email\n \ngiới thiệu chi tiết) xoay quanh:\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Vấn đề mà KTS thường gặp khi muốn render căn hộ hiện đại.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cách render của FUTAGO giải quyết vấn đề đó (thể hiện ánh sáng tự nhiên, vật liệu cao</span></div>\n<p class=\"body-txt\">\ncấp, không gian sống động).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Điểm đặc biệt của FUTAGO so với các đối thủ (ví dụ: đội ngũ có kinh nghiệm làm việc với</span></div>\n<p class=\"body-txt\">\nKTS Nhật, hiểu được sắc thái thiết kế Nhật Bản).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đa dạng hóa nội dung:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email: Gửi các portfolio mẫu, case studies phân tích sâu về một dự án render cụ thể, giải</span></div>\n<p class=\"body-txt\">\nthích giá trị từng loại render mang lại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Video: Quay timelapse quá trình dựng render từ bản vẽ CAD/3D thô đến sản phẩm hoàn</span></div>\n<p class=\"body-txt\">\nchỉnh, phỏng vấn một kiến trúc sư Nhật đã sử dụng dịch vụ của FUTAGO, video giới\n \nthiệu đội ngũ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Blog/Website: Viết bài về các xu hướng render kiến trúc, lợi ích của render 3D trong giai</span></div>\n<p class=\"body-txt\">\nđoạn thiết kế, cách render chất lượng cao giúp tăng giá trị dự án, các phong cách render\n \nkhác nhau và khi nào nên sử dụng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tư duy &quot;làm được hết&quot;: Không giới hạn FUTAGO chỉ ở render tĩnh. Nếu có thể, thử</span></div>\n<p class=\"body-txt\">\nnghiệm các hình thức diễn họa khác như panorama 360, animation walkthrough ngắn,\n \nVR/AR cơ bản (nếu khả thi và phù hợp với thị trường Nhật B2B), luôn suy nghĩ về cách\n \nlàm cho hình ảnh kiến trúc trở nên sống động và thuyết phục hơn cho khách hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Chương 5</h3>\n<p class=\"body-txt\">\n4.1 Ôn tập buổi 1, 2\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học này tập trung vào việc xây dựng hệ thống Email Marketing và Content</h3>\n<p class=\"body-txt\">\nMarketing hiệu quả. Thầy  nhấn mạnh việc thiết lập một sơ đồ email tổng\n \nthể bao gồm nguồn traffic (trả phí hoặc miễn phí), Landing Page để thu thập email bằng cách\n \ntặng quà, và hệ thống email tự động để nuôi dưỡng khách hàng trước khi bán sản phẩm. Cốt\n \nlõi của quá trình này là phải bắt đầu từ việc thấu hiểu sâu sắc vấn đề của khách hàng để tạo\n \nra nội dung marketing phù hợp và giải pháp độc đáo, sau đó thiết kế toàn bộ hành trình\n \nngược lại để đạt được mục tiêu bán hàng. Thầy cũng đặc biệt đề cao thái độ nghiêm túc\n \ntrong học tập và làm bài tập thực hành.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Buổi này là buổi thứ ba, ôn lại về hệ thống Email Marketing tổng quan và sơ đồ email</span></div>\n<p class=\"body-txt\">\nmarketing quan trọng đã học ở buổi một.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cấu trúc của hệ thống email đã được học và có thể tham khảo trên kênh YouTube</span></div>\n<p class=\"body-txt\">\n`video.long.vn` ở mục Marketing Online.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">YouTube miễn phí không có nghĩa là dở, mà chứa tài liệu tốt nếu học viên có thái độ học</span></div>\n<p class=\"body-txt\">\ntập nghiêm túc, không coi thường.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hệ thống marketing bắt đầu từ nguồn traffic (lưu lượng truy cập), có thể là trả tiền (chạy</span></div>\n<p class=\"body-txt\">\nquảng cáo Google Ads, Facebook Ads, Affiliate, hợp tác) hoặc miễn phí (TikTok,\n \nYouTube, Fanpage, blog, bài viết).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Traffic sẽ dẫn khách hàng đến trang Landing Page, nơi họ sẽ đổi email của mình để nhận</span></div>\n<p class=\"body-txt\">\nmột món quà (thường là nguồn miễn phí).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hệ thống email tự động sẽ làm việc với khách hàng sau khi có email (nuôi dưỡng, hâm</span></div>\n<p class=\"body-txt\">\nnóng mối quan hệ).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sau khi hâm nóng, khách hàng sẽ được gửi đến trang bán hàng để mua sản phẩm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hệ thống sẽ tiếp tục bán hàng cho họ trọn đời chừng nào họ còn trong hệ thống email.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hệ thống email này hoạt động hiệu quả nhất với các sản phẩm số (khóa học online,</span></div>\n<p class=\"body-txt\">\nvideo, sách ebook) do dễ tự động hóa; với sản phẩm vật lý (cần giao hàng), cần kiểm soát\n \nkho hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy nhấn mạnh tầm quan trọng của việc làm bài tập (vẽ sơ đồ hệ thống email) và nếu</span></div>\n<p class=\"body-txt\">\nchưa làm thì nên dừng học vì thiếu thái độ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Học phải có thái độ học, muốn học, khát khao học và phải làm bài tập. Mỗi ngày trôi qua</span></div>\n<p class=\"body-txt\">\nkhông thể lấy lại được, cần hành động ngay.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Việc coi thường khóa học vì giá rẻ (từng 38 triệu, nay chỉ 2-4 triệu) là một sai lầm, dẫn</span></div>\n<p class=\"body-txt\">\nđến không học và không làm bài tập.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Lý do không vẽ được sơ đồ là do không xem chuỗi 50+ video hướng dẫn chi tiết mà thầy</span></div>\n<p class=\"body-txt\">\nđã cung cấp (thậm chí sơ đồ đó trị giá hàng triệu đô la).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hệ thống gồm 3 phần chính: (1) Nguồn Traffic (nguồn dữ liệu khách hàng), (2) Hệ thống</span></div>\n<p class=\"body-txt\">\nbắt giữ (Landing Page để thu thập thông tin), (3) Hệ thống nuôi dưỡng (chuỗi email tự\n \nđộng) – sau đó mới đến bán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Bài tập buổi thứ hai là thiết kế hệ thống nội dung, hay còn gọi là &quot;ma trận nội dung&quot; hoặc</span></div>\n<p class=\"body-txt\">\n&quot;Content Marketing&quot; (marketing bằng nội dung).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ma trận nội dung được dùng cho tất cả các công việc marketing, không chỉ email.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Quan trọng là phải tư duy ngược (&quot;chơi trò chơi giải đố&quot;), bắt đầu từ mục tiêu cuối cùng</span></div>\n<p class=\"body-txt\">\nthay vì đi xuôi từ điểm A đến B, nếu không sẽ bị loạn và kể quá nhiều thứ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khi marketing qua email, chỉ nên tập trung vào những đối tượng quan tâm (mở email,</span></div>\n<p class=\"body-txt\">\nđọc email); nếu không quan tâm thì dừng marketing cho đối tượng đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nội dung marketing phải nhất quán với sản phẩm (không thể hôm nay nói về thời trang,</span></div>\n<p class=\"body-txt\">\nmai bán thịt bò khô).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cấu trúc của ma trận nội dung luôn bắt đầu từ: Vấn đề đang gặp phải (1) -&gt; Thị trường</span></div>\n<p class=\"body-txt\">\nđang giải quyết như thế nào (2) -&gt; Tôi (người bán) giải quyết nó như thế nào (3) -&gt; Tôi\n \nbán cái gì để giải quyết cái đó (4).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phải làm rõ sản phẩm/dịch vụ của mình &quot;khác&quot; gì so với thị trường và cái &quot;khác&quot; đó</span></div>\n<p class=\"body-txt\">\nmang lại &quot;lợi ích&quot; gì cho khách hàng. Sự khác biệt vô nghĩa không có tác dụng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy đưa ví dụ về bán đồng hồ (vấn đề: đồng hồ giả, giải pháp thông thường: tem chống</span></div>\n<p class=\"body-txt\">\nhàng giả, giải pháp của tôi: chứng nhận chính hãng) và giảm cân (vấn đề: béo phì, mất tự\n \ntin; giải pháp thông thường: thực phẩm chức năng; giải pháp của tôi: tích hợp huấn\n \nluyện tinh thần, vận động, dinh dưỡng, và sản phẩm để giảm cân trọn đời).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Việc chuẩn bị nội dung theo ma trận này là để giải quyết &quot;tròn vuông khách hàng&quot; (hồ sơ</span></div>\n<p class=\"body-txt\">\nkhách hàng bao gồm nỗi đau, sự sung sướng và việc phải làm).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nếu đi theo chiều xuôi (Sales Success System), thì bắt đầu từ hồ sơ khách hàng; giải</span></div>\n<p class=\"body-txt\">\npháp của thị trường giúp họ làm được điều đó, còn giải pháp của tôi giúp họ làm được\n \n*cộng thêm* những điều thị trường không làm được.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đây là vấn đề cơ bản của marketing, các phần chuyên sâu hơn phải tự học ở các khóa</span></div>\n<p class=\"body-txt\">\nkhác (IPS, Video Marketing, Fanpage, Bán hàng Đa Cao).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thái độ học tập và kỷ luật thực hành là then chốt: Thầy liên tục nhấn mạnh việc phải có</span></div>\n<p class=\"body-txt\">\n&quot;thái độ học&quot;, &quot;muốn học&quot;, &quot;khát khao học&quot; và &quot;làm bài tập&quot;. Việc không vẽ sơ đồ hoặc\n \nkhông xem tài liệu miễn phí được coi là thiếu thái độ nghiêm túc và nên dừng học.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Trong bất kỳ quá trình học tập hay phát triển kỹ năng nào, đặc biệt là</span></div>\n<p class=\"body-txt\">\ncác khóa học trực tuyến yêu cầu sự tự giác cao, thái độ và kỷ luật tự thân là yếu tố quyết\n \nđịnh thành công. Không có nó, mọi kiến thức, dù giá trị đến mấy, cũng trở nên vô nghĩa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sơ đồ Email Marketing là tài sản &quot;triệu đô&quot;: Quy trình xây dựng hệ thống email</span></div>\n<p class=\"body-txt\">\nmarketing bài bản (từ nguồn traffic, thu thập email, nuôi dưỡng đến bán hàng) được\n \nthầy ví như một sơ đồ trị giá triệu đô la, là cơ sở để thầy kiếm những triệu đô đầu tiên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Điều này định vị giá trị thực sự của việc học và thực hành email</span></div>\n<p class=\"body-txt\">\nmarketing. Nó không chỉ là công cụ mà là một hệ thống chiến lược có khả năng tạo ra\n \ndoanh thu và lợi nhuận khổng lồ, nếu được áp dụng đúng cách và nghiêm túc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tư duy ngược - Bắt đầu từ vấn đề khách hàng: Thay vì bắt đầu từ sản phẩm hay những gì</span></div>\n<p class=\"body-txt\">\nmình muốn nói, hãy bắt đầu từ &quot;vấn đề đang gặp phải&quot; của khách hàng, cách thị trường\n \ngiải quyết, và giải pháp độc đáo, mang lại lợi ích của mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là kim chỉ nam của marketing hiện đại. Khi thực sự thấu hiểu nỗi</span></div>\n<p class=\"body-txt\">\nđau và nhu cầu của khách hàng, bạn mới có thể tạo ra sản phẩm/dịch vụ có giá trị thực\n \nsự và truyền thông một cách hiệu quả, đúng trọng tâm, tránh lan man.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sự khác biệt phải đi kèm lợi ích rõ ràng: Sản phẩm/dịch vụ của bạn không chỉ cần &quot;khác&quot;</span></div>\n<p class=\"body-txt\">\nmà cái &quot;khác&quot; đó phải mang lại &quot;lợi ích&quot; cụ thể, tốt hơn, bền vững hơn cho khách hàng.\n \nSự khác biệt chỉ để khác biệt mà không có giá trị gia tăng là vô nghĩa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Giúp doanh nghiệp định vị lợi thế cạnh tranh cốt lõi và truyền thông</span></div>\n<p class=\"body-txt\">\ngiá trị một cách thuyết phục. Khách hàng mua giải pháp cho vấn đề của họ, không phải\n \nmua sự khác biệt trừu tượng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“YouTube miễn phí thì không có nghĩa là nó dở.”\n \n“Học thì nó phải có thái độ học, nó phải có muốn học, nó phải có khát khao học. Và nó phải làm\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">bài tập.”</h3>\n<p class=\"body-txt\">\n“Cái khác đấy mang lại lợi ích gì cho các bạn?”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\nTập trung vào việc xác định và giải quyết *vấn đề cốt lõi* của khách hàng Nhật B2B\n \n(KTS/thiết kế/nhà thầu/developer) liên quan đến diễn họa kiến trúc (CG パース/render\n \n3D) thay vì chỉ nói về dịch vụ của FUTAGO.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xác định Vấn đề Khách hàng (Vấn đề số 1):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khách hàng Nhật đang gặp khó khăn gì với render 3D? (Ví dụ: chất lượng hình ảnh chưa</span></div>\n<p class=\"body-txt\">\nđủ thuyết phục cho dự án cao cấp, tiến độ render chậm ảnh hưởng deadline, khó tìm đối\n \ntác có thể hiểu rõ chi tiết thiết kế và tiêu chuẩn thẩm mỹ Nhật Bản, giao tiếp bất đồng\n \nngôn ngữ, thiếu sự nhất quán về phong cách/chất lượng giữa các dự án).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giải pháp của Thị trường (Vấn đề số 2):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Các đối thủ hay freelancer khác đang giải quyết những vấn đề trên như thế nào? (Ví dụ:</span></div>\n<p class=\"body-txt\">\ngiảm giá để cạnh tranh, hứa hẹn tiến độ nhanh nhưng chất lượng không đảm bảo, chỉ tập\n \ntrung vào kỹ thuật mà không hiểu sâu về thiết kế).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giải pháp Độc đáo của FUTAGO và Lợi ích mang lại (Vấn đề số 3):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Dịch vụ diễn họa của FUTAGO *khác* gì và cái *khác* đó mang lại *lợi ích* gì cho khách</span></div>\n<p class=\"body-txt\">\nhàng Nhật?\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khác biệt: Chất lượng hình ảnh vượt trội (chân thực, tinh tế, đúng tinh thần thiết kế</span></div>\n<p class=\"body-txt\">\nNhật Bản). Quy trình làm việc chuyên nghiệp, minh bạch, giao tiếp hiệu quả (có thể có\n \nnhân sự thành thạo tiếng Nhật để giảm hiểu lầm). Cam kết về tiến độ và độ tin cậy. Khả\n \nnăng thích ứng với các phong cách kiến trúc đa dạng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Lợi ích: Giúp KTS/developer thắng thầu dễ dàng hơn nhờ hình ảnh ấn tượng. Đảm bảo</span></div>\n<p class=\"body-txt\">\ntiến độ dự án. Giảm thiểu rủi ro khi thuê ngoài. Tiết kiệm thời gian và công sức trong\n \nviệc truyền đạt ý tưởng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sản phẩm/Nội dung để giải quyết (Vấn đề số 4):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng &quot;ma trận nội dung&quot; (content marketing) tập trung vào những điểm trên:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Bài blog/Case Study: &quot;Làm thế nào hình ảnh 3D chất lượng cao của FUTAGO giúp XYZ</span></div>\n<p class=\"body-txt\">\nArchitect giành dự án triệu đô?&quot;, &quot;Quy trình render 3D hiệu quả giúp tối ưu thời gian cho\n \nnhà thầu Nhật Bản.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Video/Hướng dẫn: Chia sẻ &quot;Tips để yêu cầu render 3D tối ưu hóa cho phong cách Nhật</span></div>\n<p class=\"body-txt\">\nBản&quot;, &quot;Đằng sau hậu trường một hình ảnh render kiến trúc sống động của FUTAGO.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email Marketing: Gửi chuỗi email tới khách hàng tiềm năng, giới thiệu các dự án đã hoàn</span></div>\n<p class=\"body-txt\">\nthành, testimonials từ khách hàng Nhật, hoặc cung cấp &quot;checklist&quot; về việc lựa chọn đối\n \ntác render đáng tin cậy.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Landing Page: Đề nghị một món quà giá trị (ví dụ: &quot;Hướng dẫn chi tiết để có render 3D</span></div>\n<p class=\"body-txt\">\nkiến trúc hoàn hảo cho dự án của bạn&quot;) để đổi lấy thông tin liên hệ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thống nhất nội dung: Tất cả nội dung cần nhất quán, tập trung vào việc FUTAGO cung</span></div>\n<p class=\"body-txt\">\ncấp các giải pháp diễn họa kiến trúc chất lượng cao, đáng tin cậy, thấu hiểu văn hóa và\n \nquy trình làm việc của khách hàng Nhật B2B.\n \nTUYỆT ĐỐI không nhắc đến BIM trong các gợi ý về dịch vụ hay sản phẩm của FUTAGO, chỉ\n \ntập trung vào diễn họa kiến trúc (CG パース/render 3D).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\n4.2 Cơ bản về Email Marketing\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học này tập trung vào phần cơ bản của email marketing, đặc biệt là việc cài</h3>\n<p class=\"body-txt\">\nđặt hệ thống. Thầy  nhấn mạnh rằng các công cụ cụ thể không phải là điều\n \nquan trọng nhất, mà là việc bắt đầu triển khai email marketing. Học viên được hướng dẫn\n \ncài đặt hệ thống và có thể tham khảo video buổi 2 hoặc công cụ mẫu mà thầy sử dụng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Buổi học này là phần tiếp theo, tập trung vào kiến thức cơ bản về email marketing, sau</span></div>\n<p class=\"body-txt\">\nkhi học viên đã nắm vững các kiến thức marketing nền tảng từ các khóa học khác (IPS,\n \nvideo marketing, xây dựng fanpage, bán hàng đã cao).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nội dung chính đầu tiên là việc cài đặt hệ thống email marketing.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chi tiết về cài đặt sẽ được hướng dẫn vào những ngày cuối của khóa học hoặc học viên</span></div>\n<p class=\"body-txt\">\ncó thể tham khảo video trong &quot;buổi 2&quot; (buổi thầy vắng mặt) đã được tải lên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy đặt ra câu hỏi mà học viên thường thắc mắc: nên dùng công cụ nào để cài đặt email</span></div>\n<p class=\"body-txt\">\nmarketing.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy trả lời rằng &quot;dùng công cụ nào cũng được&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy giới thiệu công cụ mà thầy sử dụng để làm ví dụ và hướng dẫn là `long.vn/email`.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nhấn mạnh rằng &quot;không quan trọng về công cụ đâu&quot;, mà quan trọng là việc bắt đầu triển</span></div>\n<p class=\"body-txt\">\nkhai.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Cài đặt email marketing&quot; là bước khởi đầu thiết yếu: Việc thầy bắt đầu ngay với việc cài</span></div>\n<p class=\"body-txt\">\nđặt cho thấy đây là nền tảng không thể thiếu để triển khai mọi hoạt động email\n \nmarketing sau này. Nhiều người có thể bỏ qua hoặc trì hoãn bước thiết lập ban đầu,\n \nnhưng nó là cơ sở để hoạt động hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Dùng công cụ nào cũng được&quot; và &quot;không quan trọng về công cụ đâu&quot;: Đây là insight đắt</span></div>\n<p class=\"body-txt\">\ngiá nhất. Nó giúp người học gạt bỏ rào cản tâm lý về việc lựa chọn công cụ, tránh mất\n \nthời gian và năng lượng vào việc tìm kiếm &quot;công cụ tốt nhất&quot; mà không hành động. Thay\n \nvào đó, nó khuyến khích tập trung vào việc bắt đầu triển khai, bất kể công cụ nào.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tầm quan trọng của việc chủ động học hỏi từ tài liệu bổ sung: Việc thầy hướng dẫn học</span></div>\n<p class=\"body-txt\">\nviên xem lại video buổi 2 cho thấy sự cần thiết của việc tự học và tìm hiểu các kiến thức\n \nnền tảng đã được cung cấp trước đó, thay vì chỉ thụ động chờ đợi hướng dẫn trực tiếp.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Hôm nay chúng ta sẽ bắt đầu với cái phần tiếp theo là về cơ bản về email marketing.”\n \n“Dùng công cụ nào cũng được.”\n \n“Nhưng mà không quan trọng về công cụ đâu.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\nFUTAGO có thể áp dụng email marketing để xây dựng và nuôi dưỡng mối quan hệ với các\n \nkhách hàng B2B tiềm năng tại Nhật (KTS, công ty thiết kế, nhà thầu, developer). Có thể gửi\n \nemail định kỳ để giới thiệu các dự án diễn họa 3D (render 3D) đã hoàn thành, các portfolio\n \nmới, hoặc các bài viết/video chia sẻ về cách hình ảnh chất lượng cao giúp tăng giá trị cho các\n \ndự án kiến trúc của họ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Điểm quan trọng nhất từ buổi giảng – &quot;dùng công cụ nào cũng được&quot; và &quot;không quan trọng</h3>\n<p class=\"body-txt\">\nvề công cụ đâu&quot; – rất phù hợp. FUTAGO không nên quá lo lắng về việc chọn nền tảng email\n \nmarketing hoàn hảo mà hãy tập trung vào việc bắt đầu thu thập danh sách email của các đối\n \ntác tiềm năng và gửi đi những nội dung giá trị liên quan đến dịch vụ diễn họa kiến trúc\n \n(render 3D) của mình. Mục tiêu là bắt đầu xây dựng kênh truyền thông này càng sớm càng\n \ntốt để tiếp cận và tạo dựng niềm tin với khách hàng Nhật Bản.\n \n4.3 Campaign Email Marketing là gì\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học giới thiệu về thuật ngữ &quot;Campaign&quot; (chiến dịch) trong marketing</h3>\n<p class=\"body-txt\">\ninternet. Một campaign được định nghĩa là một chiến dịch cụ thể nhằm bán một sản phẩm\n \nhoặc hoàn thành một nhiệm vụ nhất định. Thầy nhấn mạnh rằng campaign không phải là\n \nmột hành động đơn lẻ mà là một hệ thống tổng thể bao gồm tất cả các yếu tố liên quan như\n \nchuỗi email, landing page và các email phản hồi tự động. Mục tiêu là giúp người học hiểu và\n \náp dụng cách tiếp cận marketing có hệ thống để đạt được các mục tiêu kinh doanh cụ thể.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thuật ngữ đầu tiên được giới thiệu là &quot;Campaign&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Campaign&quot; có nghĩa là &quot;chiến dịch&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Một campaign là một chiến dịch bán một sản phẩm cụ thể.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hoặc một campaign là một chiến dịch để thực hiện một nhiệm vụ cụ thể.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ về campaign:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chiến dịch bán khóa học &quot;Sale Success System&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chiến dịch bán quần.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chiến dịch bán đồng hồ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chiến dịch bán thực phẩm chức năng giảm cân.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Một campaign bao gồm &quot;tất tần tật mọi thứ&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cụ thể, một campaign bao gồm:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hệ thống chuỗi các email.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hệ thống các landing page (trang đích) để người ta đến.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hệ thống các email phản hồi tự động.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chiến dịch (campaign) là một hệ thống tổng thể, không phải là một hành động đơn lẻ:</span></div>\n<p class=\"body-txt\">\nThầy  nhấn mạnh rằng một campaign bao gồm &quot;tất tần tật mọi thứ&quot;\n \nnhư chuỗi email, landing page và email phản hồi tự động. Điều này quan trọng vì nhiều\n \nngười thường nhầm lẫn campaign chỉ là một quảng cáo hoặc một bài đăng đơn lẻ. Việc\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\nnhìn nhận campaign như một hệ thống đồng bộ giúp đảm bảo tất cả các yếu tố\n \nmarketing phối hợp nhịp nhàng để đạt mục tiêu, tối ưu hóa trải nghiệm khách hàng và\n \ntăng tỷ lệ chuyển đổi một cách hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mỗi chiến dịch cần có mục tiêu cụ thể và sản phẩm rõ ràng: Thầy định nghĩa campaign là</span></div>\n<p class=\"body-txt\">\n&quot;một chiến dịch bán một sản phẩm cụ thể&quot; hoặc &quot;thực hiện một nhiệm vụ cụ thể.&quot; Sự rõ\n \nràng về mục tiêu (ví dụ: bán một loại render cụ thể) và sản phẩm/dịch vụ cần bán là nền\n \ntảng để xây dựng chiến lược, nội dung và các kênh tiếp cận phù hợp. Điều này giúp tránh\n \nlãng phí nguồn lực vào các hoạt động không có định hướng và dễ dàng đo lường hiệu\n \nquả, từ đó tối ưu hóa chiến lược marketing.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Một campaign là một chiến dịch bán một sản phẩm cụ thể.”\n \n“Một campaign thì nó bao gồm tất tần tật mọi thứ.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\n4.4 Thư phản hồi tự động (Autoresponder)\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi giảng này tập trung giới thiệu về Autoresponder, một hệ thống email phản</h3>\n<p class=\"body-txt\">\nhồi tự động. Có hai cơ chế chính để triển khai Autoresponder: thứ nhất là gửi email theo một\n \nchuỗi ngày cố định (T+N, tính từ ngày đăng ký hoặc một mốc thời gian cụ thể) và thứ hai là\n \ngửi email dựa trên hành vi tương tác của người nhận. Mục đích là để tự động hóa việc giao\n \ntiếp và chăm sóc khách hàng qua email một cách hiệu quả và cá nhân hóa.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Autoresponder là từ khóa thứ ba, có nghĩa là phản hồi tự động.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nó là một hệ thống các email phản hồi tự động.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Bao gồm hai cơ chế phản hồi tự động cơ bản:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cơ chế thứ nhất: Gửi email theo ngày (T+N)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email sẽ được gửi vào một ngày cụ thể nào đó (ngày thứ N) tính từ một mốc thời gian</span></div>\n<p class=\"body-txt\">\nnhất định (ví dụ: ngày hôm nay hoặc ngày đăng ký).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">`T+30`: Gửi email vào ngày thứ 30 kể từ ngày đăng ký.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">`T+0`: Email số 0, tức là gửi ngay khi người dùng đăng ký.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">`T+1`: Gửi vào ngày mai (nếu đăng ký hôm nay).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy nhắc lại một chuỗi ngày ví dụ: email ngày 0, ngày 1, ngày 2, sau đó đến ngày 4,</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">ngày 6, ngày 8, rồi đến ngày 11, ngày 14, ngày 17.</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đây là hệ thống email phản hồi tự động theo ngày, tính từ ngày họ đăng ký.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cơ chế thứ hai: Gửi email phản hồi tự động dựa trên hành vi</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ: Dựa trên việc người dùng mở email [audio kết thúc].</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tự động hóa và Hiệu quả trong Giao tiếp Khách hàng: Autoresponder cho phép doanh</span></div>\n<p class=\"body-txt\">\nnghiệp tự động hóa toàn bộ quy trình gửi email chăm sóc, giới thiệu sản phẩm/dịch vụ.\n \nĐiều này giúp tiết kiệm thời gian, nguồn lực và đảm bảo rằng thông tin được truyền tải\n \nnhất quán, kịp thời đến từng khách hàng tiềm năng hoặc hiện có, giúp xây dựng mối\n \nquan hệ và thúc đẩy hành động mà không cần can thiệp thủ công liên tục.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cá nhân hóa theo Thời gian và Hành vi: Việc phân chia hai cơ chế (theo ngày T+N và dựa</span></div>\n<p class=\"body-txt\">\ntrên hành vi) là rất quan trọng. Gửi email theo chuỗi ngày (T+N) giúp xây dựng một lộ\n \ntrình thông tin, dẫn dắt khách hàng qua các giai đoạn khác nhau của phễu bán hàng.\n \nTrong khi đó, phản hồi dựa trên hành vi (ví dụ: mở email, click link) cho phép doanh\n \nnghiệp phản ứng linh hoạt và cung cấp nội dung siêu cá nhân hóa, phù hợp với từng\n \ntương tác của người nhận, từ đó tăng đáng kể tỷ lệ tương tác và chuyển đổi.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Là một hệ thống các email phản hồi tự động.”\n \n“T+0 có nghĩa là email số 0, tức là gửi ngay khi mà người ta đăng ký.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“là email phản hồi tự động dựa trên hành vi.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi giảng này tập trung vào khái niệm và ứng dụng của Newsletter (bản tin)</h3>\n<p class=\"body-txt\">\ntrong email marketing. Thầy  chia sẻ cách ông đã xây dựng và duy trì\n \nnewsletter pháp luật hàng tuần trong hơn một thập kỷ, không chỉ để truyền tải thông tin mà\n \ncòn để xây dựng mối quan hệ, tạo ra các &quot;hot topic&quot; và thu hút khách hàng. Điểm cốt lõi là\n \nnewsletter cần cá nhân hóa, cung cấp giá trị đều đặn và có tính giải trí/truyền cảm hứng để\n \ngiữ chân độc giả và khuyến khích họ tương tác.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Newsletter là gì? Là email tin tức được gửi cố định cho hàng loạt người vào một</span></div>\n<p class=\"body-txt\">\nngày/thời điểm cố định.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cấu trúc một Newsletter điển hình: Thầy Long lấy ví dụ email newsletter của mình về</span></div>\n<p class=\"body-txt\">\ncâu chuyện giảm cân của &quot;Hằng Queen&quot;. Email này bắt đầu bằng câu chuyện cá nhân\n \n(chuyến đi Nha Trang, marathon), sau đó kết nối với vấn đề (thừa cân) và cuối cùng dẫn\n \ndắt đến giải pháp (giảm cân, thực phẩm chức năng, coaching chạy bộ...).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Câu hỏi tu từ: Là câu hỏi không dùng để hỏi mà để gợi suy nghĩ, tạo cảm xúc, thường kết</span></div>\n<p class=\"body-txt\">\nthúc bằng dấu chấm than. Đây là một kỹ thuật dùng trong newsletter để tạo sự kết nối\n \nvới người đọc. Ví dụ: &quot;Hằng Queen có muốn giảm cân bây giờ không?!&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ thực tế của thầy Long: Newsletter pháp luật hàng tuần (hơn 10 năm):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy bắt đầu từ 2001, tự cấu hình mail server và phải ra tiệm internet để gửi thủ công</span></div>\n<p class=\"body-txt\">\nhàng nghìn email vì luật spam thời đó chưa chặt chẽ và công cụ chưa phát triển.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mỗi newsletter dài 2-3 trang A4, tóm tắt các văn bản pháp luật quan trọng trong tuần.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Luôn có một đoạn mở đầu ngắn gọn, mang tính cá nhân, chia sẻ cảm xúc, câu chuyện đời</span></div>\n<p class=\"body-txt\">\nsống (ví dụ: về chuyến đi, bà ngoại ốm, mất điện luân phiên, Giáng sinh...). Đoạn này\n \nđược cá nhân hóa cho từng người nhận.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đoạn mở đầu này có vai trò tương tự như các bài đăng ngắn trên Twitter/Facebook</span></div>\n<p class=\"body-txt\">\nngày nay, tạo cảm hứng và sự kết nối.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giá trị của Newsletter:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cung cấp thông tin giá trị một cách cô đọng, giúp người đọc tiết kiệm thời gian (đặc biệt</span></div>\n<p class=\"body-txt\">\ntrong lĩnh vực pháp luật thời đó).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng lòng tin và mối quan hệ với độc giả.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Là &quot;mồi câu tuyệt vời&quot; để thu hút khách hàng tiềm năng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tạo ra &quot;hot topic&quot; bằng cách gửi các bài viết/video/nội dung mới nhất đến database có</span></div>\n<p class=\"body-txt\">\nsẵn, khuyến khích tương tác và tăng độ lan truyền.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tính cá nhân hóa: Phần thông điệp mở đầu của mỗi newsletter được tùy chỉnh cho từng</span></div>\n<p class=\"body-txt\">\nngười nhận, trong khi phần nội dung chính bên dưới thì giống nhau.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Newsletter là &quot;mồi câu tuyệt vời&quot; và công cụ xây dựng mối quan hệ: Thầy Long nhấn</span></div>\n<p class=\"body-txt\">\nmạnh rằng việc cung cấp giá trị đều đặn (như tổng hợp văn bản pháp luật) giúp người\n \nđọc tiết kiệm thời gian, xây dựng lòng tin, từ đó họ sẽ liên hệ khi có nhu cầu. Đây là cách\n \nhiệu quả để biến độc giả thành khách hàng mà không cần bán hàng trực tiếp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sử dụng yếu tố cá nhân hóa và truyền cảm hứng: Đoạn mở đầu ngắn gọn, mang tính cá</span></div>\n<p class=\"body-txt\">\nnhân, kể chuyện đời thường (như chuyện bà ngoại ốm, mất điện, chuyến đi) giúp tạo sự\n \nkết nối cảm xúc mạnh mẽ với người đọc. Điều này biến newsletter từ một bản tin khô\n \nkhan thành một kênh giao tiếp gần gũi, giữ chân độc giả và khiến họ mong chờ bản tin\n \ntiếp theo.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tạo &quot;hot topic&quot; từ database có sẵn: Email marketing là công cụ cực kỳ mạnh mẽ để lan</span></div>\n<p class=\"body-txt\">\ntỏa nội dung. Khi có một bài viết, video YouTube hay topic muốn đẩy lên hot, việc gửi nó\n \ntới danh sách email sẵn có sẽ tạo ra lượng tương tác ban đầu lớn, giúp nội dung nhanh\n \nchóng trở nên phổ biến.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Bất kỳ ai muốn chiến thắng trò chơi chạy bộ này đều phải có cân nặng tối ưu.”\n \n“Câu hỏi không dùng để hỏi thì được gọi là câu hỏi tu từ.”\n \n“Đây là cái mồi câu tuyệt vời dành cho những người đang làm kinh doanh.”\n \n“Một người đàn ông mà không dành thời gian cho gia đình của mình thì không bao giờ là một\n \nngười đàn ông đích thực.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học này tập trung giải thích về khái niệm &quot;Opt-in&quot; và &quot;Double Opt-in&quot; trong</h3>\n<p class=\"body-txt\">\nemail marketing. Thầy  nhấn mạnh tầm quan trọng của việc sử dụng\n \n&quot;Double Opt-in&quot; để xây dựng danh sách email chất lượng cao. Phương pháp này giúp đảm\n \nbảo người đăng ký thực sự quan tâm, loại bỏ email giả mạo và tránh bị hệ thống email khóa\n \ntài khoản, từ đó tăng hiệu quả marketing và bán hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Opt-in: Đăng ký và có xác thực, tức là người đăng ký tự xác nhận mình là người đăng ký.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Double Opt-in:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khách hàng đăng ký vào hệ thống.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Họ nhận được một email xác nhận.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Họ phải *click vào đường link* trong email đó thì email của họ mới được xác thực và</span></div>\n<p class=\"body-txt\">\nchính thức nhập vào hệ thống.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đây là phương pháp nên lựa chọn vì đảm bảo chất lượng danh sách.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Vấn đề người đăng ký không click xác nhận: Có những người đăng ký nhưng không đọc</span></div>\n<p class=\"body-txt\">\nhoặc không quan tâm đến việc click vào email xác nhận. Điều này thể hiện sự thiếu quan\n \ntâm và cần phải chấp nhận bỏ qua những đối tượng này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Lợi ích của Double Opt-in:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đảm bảo người đăng ký thực sự quan tâm (&quot;nó chất&quot;).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Database không có email giả (email bị chết), tránh trường hợp hệ thống tự động khóa tài</span></div>\n<p class=\"body-txt\">\nkhoản của bạn khi gửi email số lượng lớn có quá nhiều email giả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giúp xây dựng danh sách đúng phễu, đúng đối tượng mà bạn muốn thu hút (ví dụ: thu</span></div>\n<p class=\"body-txt\">\nhút phụ nữ bằng sản phẩm dành cho phụ nữ).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tăng tỷ lệ bán hàng vì danh sách chất lượng cao.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cảnh báo: Tuyệt đối không nên mua danh sách email vì sẽ bị các hệ thống nhà cung cấp</span></div>\n<p class=\"body-txt\">\nemail (ESP) khóa tài khoản ngay lập tức. Cần xây dựng danh sách từ đầu, mặc dù Double\n \nOpt-in có thể chậm hơn nhưng an toàn và hiệu quả hơn rất nhiều.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Double Opt-in là bắt buộc để có database chất lượng: Phương pháp này đảm bảo chỉ</span></div>\n<p class=\"body-txt\">\nnhững người thực sự quan tâm mới có trong danh sách, loại bỏ email giả mạo hoặc\n \nnhững người đăng ký qua loa. Điều này cực kỳ quan trọng để tránh bị các nhà cung cấp\n \ndịch vụ email (ESP) coi là spammer và khóa tài khoản, là nền tảng cho một chiến dịch\n \nemail marketing hiệu quả dài hạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chất lượng danh sách quan trọng hơn số lượng: Một danh sách nhỏ nhưng toàn những</span></div>\n<p class=\"body-txt\">\nngười thực sự quan tâm và tương tác (nhờ Double Opt-in) sẽ mang lại tỷ lệ chuyển đổi\n \nvà doanh số cao hơn nhiều so với một danh sách lớn chứa nhiều email &quot;chết&quot; hoặc người\n \ndùng không chú ý. Nó giúp bạn &quot;đúng cái phễu&quot; và tối ưu hóa nguồn lực marketing.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Người dùng thường có xu hướng không đọc kỹ hoặc không quan tâm đến bước xác</span></div>\n<p class=\"body-txt\">\nnhận: Thầy Long đã minh họa rõ ràng bằng ví dụ về học viên không click xác nhận dù đã\n \nđăng ký. Insight này cho thấy cần phải chấp nhận loại bỏ những người không hoàn thành\n \nbước Double Opt-in, vì họ có khả năng cao sẽ không tương tác với các thông tin sau này,\n \ngiúp tránh lãng phí công sức và tài nguyên.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Double opt-in là phần chúng ta nên lựa chọn.”\n \n“Những cái người này thực sự quan tâm. Nó chất.”\n \n“Ngày nay mua một cái danh sách thả lên là chết ngay lập tức.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Nếu đã không biết đọc thì mình gửi làm gì nữa đúng không?”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học này trình bày về quy trình 7 cấp độ trong marketing, bao gồm Suspect,</h3>\n<p class=\"body-txt\">\nList, Fan, Offer, Client, và Referral. Đây là một hệ thống email marketing tự động nhằm\n \nchuyển đổi người lạ thành khách hàng trung thành, sau đó là người giới thiệu. Quá trình này\n \ntập trung vào việc xây dựng mối quan hệ &quot;biết, thích, tin tưởng&quot; (Know, Like, Trust) với\n \nkhách hàng tiềm năng trước khi đưa ra lời chào hàng. Mục tiêu cuối cùng là tạo ra các lời\n \ngiới thiệu từ những khách hàng hài lòng và yêu quý thương hiệu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Quá trình 7 cấp độ xây dựng &quot;Raving Fan&quot;: Suspect, List, Fan, Offer, Client, Referral.</span></div>\n<p class=\"body-txt\">\n(Thầy có nhắc đến &quot;tám cấp&quot; nhưng sau đó tập trung vào 7 cấp độ này).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Suspect (Thị trường mục tiêu / Đối tượng nhắm đến): Là những người thuộc thị trường</span></div>\n<p class=\"body-txt\">\nmục tiêu mà doanh nghiệp muốn tiếp cận. Họ chưa biết về doanh nghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ: Phụ nữ trong độ tuổi 28-42 có nhu cầu chăm sóc sắc đẹp (spa); hoặc những người</span></div>\n<p class=\"body-txt\">\nđàn ông làm kinh doanh có tiền nhàn rỗi (mua đất).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">List (Khách hàng tiềm năng): Là những người đã điền vào form của doanh nghiệp (ví dụ:</span></div>\n<p class=\"body-txt\">\nđăng ký nhận email để nhận quà tặng, sách điện tử). Lúc này họ mới chỉ &quot;biết&quot; doanh\n \nnghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ: Người đã điền email để nhận cuốn sách &quot;Bí kíp đầu tư&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Fan (Người hâm mộ): Là những người sau khi nhận được chuỗi email/newsletter từ</span></div>\n<p class=\"body-txt\">\ndoanh nghiệp, bắt đầu &quot;thích&quot; và &quot;tin tưởng&quot; doanh nghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Quá trình này xây dựng sự &quot;Know, Like, Trust&quot; (Biết, Thích, Tin tưởng).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ: Sau khi nhận &quot;Bí kíp đầu tư&quot;, khách hàng nhận chuỗi email về vấn đề tiền mất</span></div>\n<p class=\"body-txt\">\ngiá/lạm phát và giải pháp thông thường (gửi tiết kiệm) nhưng có rủi ro (mất tiền mà\n \nkhông biết), từ đó thấy giải pháp của người bán là hữu ích.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Offer (Lời chào hàng): Là lời chào hàng được gửi đến Fan – những người đã &quot;thích&quot; và</span></div>\n<p class=\"body-txt\">\n&quot;tin tưởng&quot; doanh nghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ: Sau khi trở thành Fan, khách hàng sẽ nhận được lời mời đầu tư tiền vào quỹ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chỉ khi khách hàng tin tưởng thì mới nên chào hàng.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Client (Khách hàng): Là những người đã chấp nhận lời chào hàng và mua sản phẩm/dịch</span></div>\n<p class=\"body-txt\">\nvụ của doanh nghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ: Khách hàng đưa tiền cho cô Bạch Ngọc để đầu tư.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Referral (Người giới thiệu): Là những khách hàng hài lòng và yêu quý doanh nghiệp, sau</span></div>\n<p class=\"body-txt\">\nđó giới thiệu sản phẩm/dịch vụ cho những người khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hệ thống email marketing tiếp tục chăm sóc các Client để họ yêu quý doanh nghiệp và</span></div>\n<p class=\"body-txt\">\ntrở thành người giới thiệu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ: Khách hàng kể cho bạn bè về dịch vụ đầu tư của cô Bạch Ngọc.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mục đích của toàn bộ quá trình này là hệ thống Email Marketing làm việc, xây dựng mối</span></div>\n<p class=\"body-txt\">\nquan hệ &quot;Know, Like, Trust&quot; và tạo ra Referral.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nguyên tắc &quot;Know, Like, Trust&quot; (Biết, Thích, Tin tưởng) là nền tảng cốt lõi: Thầy Long</span></div>\n<p class=\"body-txt\">\nnhấn mạnh rằng trước khi chào hàng (Offer), việc xây dựng mối quan hệ để khách hàng\n \n&quot;biết&quot; về bạn (Suspect, List), sau đó &quot;thích&quot; và &quot;tin tưởng&quot; bạn (Fan) là cực kỳ quan\n \ntrọng. Không thể có một lời chào hàng hiệu quả nếu không có niềm tin. Điều này quan\n \ntrọng vì nó định hướng toàn bộ chiến lược marketing, khuyến khích doanh nghiệp tập\n \ntrung vào việc tạo giá trị và xây dựng mối quan hệ lâu dài thay vì chỉ săn tìm khách hàng\n \nchớp nhoáng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hệ thống 7 cấp độ khách hàng cung cấp lộ trình chuyển đổi rõ ràng: Quy trình từ Suspect</span></div>\n<p class=\"body-txt\">\nđến Referral không chỉ là một danh sách các giai đoạn mà là một chiến lược tuần tự, cho\n \nphép doanh nghiệp hiểu rõ trạng thái của khách hàng và hành động phù hợp ở mỗi\n \nbước. Điều này quan trọng vì nó giúp tối ưu hóa nỗ lực marketing, đảm bảo rằng mỗi\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">hành động đều hướng tới việc đưa khách hàng tiến gần hơn đến việc mua hàng và trở</h3>\n<p class=\"body-txt\">\nthành người giới thiệu trung thành.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email marketing là công cụ chủ đạo để xây dựng và duy trì mối quan hệ: Thầy Long đã</span></div>\n<p class=\"body-txt\">\nminh họa cách chuỗi email tự động (autoresponder) và newsletter được sử dụng để\n \nchuyển đổi người lạ thành List, List thành Fan, và sau đó tiếp tục chăm sóc Client để họ\n \ntrở thành Referral. Điều này quan trọng vì nó làm nổi bật vai trò của email marketing\n \nkhông chỉ là công cụ bán hàng mà còn là trung tâm của việc nuôi dưỡng mối quan hệ, tạo\n \ndựng lòng tin và sự yêu mến của khách hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Đây là cái quá trình suspect, list, fan, offer, client, referral.”\n \n“Khi họ tin rồi thì ta mới chào hàng.”\n \n“Bây giờ mà tôi làm sao tôi đưa tiền cho cô Bạch Ngọc được, chưa tin làm sao đưa tiền.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\nFUTAGO có thể áp dụng mô hình 7 cấp độ khách hàng (Suspect, List, Fan, Offer, Client,\n \nReferral) vào dịch vụ diễn họa kiến trúc B2B tại Nhật Bản để xây dựng mối quan hệ và tạo\n \nreferral:\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Suspect (Thị trường mục tiêu): Xác định các kiến trúc sư, công ty thiết kế, công ty xây</span></div>\n<p class=\"body-txt\">\ndựng, hoặc nhà phát triển bất động sản tại Nhật Bản đang có nhu cầu về diễn họa\n \n3D/render cho các dự án của họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">List (Khách hàng tiềm năng): Thu hút Suspect cung cấp thông tin liên hệ (email) bằng</span></div>\n<p class=\"body-txt\">\ncách tặng một tài liệu giá trị miễn phí. Ví dụ: &quot;Bí quyết để hình ảnh kiến trúc giúp dự án\n \ncủa bạn được duyệt nhanh hơn&quot; hoặc &quot;Checklist chuẩn bị dữ liệu dự án cho dịch vụ\n \nrender 3D tối ưu&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Fan (Người hâm mộ): Sử dụng chuỗi email marketing tự động (autoresponder) để nuôi</span></div>\n<p class=\"body-txt\">\ndưỡng mối quan hệ. Chia sẻ các bài viết chuyên sâu về xu hướng diễn họa kiến trúc tại\n \nNhật, cách kể chuyện bằng hình ảnh, tầm quan trọng của render chất lượng cao trong\n \ncác giai đoạn dự án, các case study thành công của FUTAGO, hoặc mẹo giúp khách hàng\n \nchuẩn bị dự án hiệu quả cho việc render. Điều này giúp xây dựng sự &quot;thích&quot; và &quot;tin\n \ntưởng&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Offer (Chào hàng): Chỉ sau khi khách hàng tiềm năng đã &quot;biết, thích và tin tưởng&quot;,</span></div>\n<p class=\"body-txt\">\nFUTAGO mới gửi lời chào hàng dịch vụ diễn họa 3D. Ví dụ: mời dùng thử dịch vụ render\n \nmột phần nhỏ của dự án, hoặc tặng một buổi tư vấn miễn phí về chiến lược hình ảnh cho\n \ndự án sắp tới của họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Client (Khách hàng): Cung cấp dịch vụ render 3D chất lượng cao, đúng thời hạn, vượt</span></div>\n<p class=\"body-txt\">\nmong đợi để chuyển đổi từ người mua sang khách hàng hài lòng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Referral (Người giới thiệu): Tiếp tục chăm sóc khách hàng đã sử dụng dịch vụ thông qua</span></div>\n<p class=\"body-txt\">\nemail định kỳ hoặc các chương trình đặc biệt. Khi khách hàng đã có trải nghiệm tốt và\n \nyêu quý FUTAGO, họ sẽ tự nhiên giới thiệu dịch vụ diễn họa 3D của FUTAGO cho các đối\n \ntác hoặc đồng nghiệp khác.\n \n4.8 Chuỗi email gia tăng giá trị\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học này tập trung vào chiến lược email marketing hiệu quả bằng cách liên tục</h3>\n<p class=\"body-txt\">\ngia tăng giá trị cho khách hàng, thay vì gửi email vô bổ. Thầy  nhấn mạnh\n \nviệc cung cấp giải pháp cho những vấn đề cụ thể mà khách hàng gặp phải, qua đó xây dựng\n \nlòng tin và vị thế chuyên gia. Giải pháp phải nhanh chóng, ngắn gọn và dễ tiếp cận hơn so với\n \ncác phương pháp truyền thống, giúp khách hàng tiết kiệm thời gian và cuối cùng sẽ tìm đến\n \nngười cung cấp giá trị đó.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nhiệm vụ của chuỗi email marketing là phải gia tăng giá trị cho người nhận, không phải</span></div>\n<p class=\"body-txt\">\nlà email vô bổ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hệ thống email marketing của thầy Long đã hoạt động 10 năm theo nguyên tắc gia tăng</span></div>\n<p class=\"body-txt\">\ngiá trị.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ cụ thể về việc gia tăng giá trị: Cung cấp &quot;bản tin pháp luật&quot; cập nhật cho khách</span></div>\n<p class=\"body-txt\">\nhàng.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Vấn đề của khách hàng trước đây là không hiểu pháp luật và giải pháp thông thường là</span></div>\n<p class=\"body-txt\">\nmua &quot;công báo&quot; để đọc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hạn chế của công báo truyền thống: không tra cứu, tìm kiếm được và luôn bị chậm trễ</span></div>\n<p class=\"body-txt\">\nmột tháng (30 ngày sau mới có).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giải pháp của thầy Long: &quot;Bản tin cập nhật hàng tuần&quot; tóm tắt toàn bộ văn bản pháp luật</span></div>\n<p class=\"body-txt\">\nquan trọng về kinh doanh trong tuần đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ưu điểm của giải pháp: &quot;Nhanh, ngắn gọn&quot;, giúp người nhận không phải đọc cả văn bản</span></div>\n<p class=\"body-txt\">\ndài.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mục tiêu cuối cùng: Sau khi nhận được thông tin ngắn gọn và giá trị, khách hàng sẽ tìm</span></div>\n<p class=\"body-txt\">\nđến người cung cấp thông tin.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đây chính là quá trình &quot;gia tăng giá trị&quot;.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuyển đổi tư duy Email Marketing từ &quot;quảng cáo&quot; sang &quot;gia tăng giá trị&quot;: Thay vì chỉ</span></div>\n<p class=\"body-txt\">\ndùng email để bán hàng hoặc thông báo vô bổ, mục tiêu cốt lõi phải là liên tục cung cấp\n \ngiá trị hữu ích cho khách hàng. Điều này quan trọng vì nó xây dựng lòng tin, vị thế\n \nchuyên gia và mối quan hệ bền vững, giúp khách hàng tự tìm đến bạn khi họ cần giải\n \npháp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xác định và giải quyết triệt để vấn đề của khách hàng một cách vượt trội: Thầy Long đã</span></div>\n<p class=\"body-txt\">\nchỉ ra vấn đề về việc khó tiếp cận và chậm trễ thông tin pháp luật, sau đó cung cấp một\n \ngiải pháp &quot;bản tin hàng tuần, nhanh, ngắn gọn&quot; vượt trội hơn hẳn so với &quot;công báo&quot;\n \ntruyền thống. Đây là chìa khóa để tạo ra sự khác biệt và thu hút khách hàng, vì bạn\n \nkhông chỉ cung cấp thông tin mà còn giải quyết được &quot;nỗi đau&quot; của họ hiệu quả hơn bất\n \nkỳ ai khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giá trị phải được trình bày &quot;nhanh, ngắn gọn&quot; và dễ tiêu hóa: Dù thông tin có giá trị đến</span></div>\n<p class=\"body-txt\">\nđâu, nếu nó khó tiếp cận hoặc tốn thời gian để đọc/hiểu, khách hàng sẽ bỏ qua. Việc tóm\n \ntắt các văn bản pháp luật dài thành bản tin ngắn gọn, dễ hiểu là yếu tố then chốt giúp\n \nkhách hàng tiếp nhận giá trị hiệu quả, tiết kiệm thời gian cho họ và tăng khả năng họ\n \nquay lại với bạn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Nhiệm vụ của cái chuỗi email này là gia tăng giá trị.”\n \n“Bạn không phải đi đọc cả cái văn bản dài nữa. Bạn chỉ cần đọc ngắn gọn thôi.”\n \n“Sau khi ngắn gọn thì bạn sẽ tìm được tôi.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#d81b60\">Nội dung bản tin sẽ tập trung vào việc cung cấp giá trị liên quan đến diễn họa kiến trúc (CG</h3>\n<p class=\"body-txt\">\nパース/render 3D), thay vì chỉ quảng cáo dịch vụ. Các chủ đề có thể bao gồm:\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mẹo giúp khách hàng chuẩn bị dữ liệu đầu vào (ví dụ: mô hình 3D, vật liệu, tham chiếu</span></div>\n<p class=\"body-txt\">\nánh sáng) một cách hiệu quả nhất để nhận được render chất lượng cao và đúng ý.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phân tích các xu hướng mới trong phong cách diễn họa kiến trúc (ví dụ: phong cách tối</span></div>\n<p class=\"body-txt\">\ngiản, phong cách kiến trúc xanh, render ban đêm ấn tượng) mà khách hàng có thể tham\n \nkhảo cho dự án của họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cách hình ảnh diễn họa chất lượng cao giúp truyền tải ý tưởng thiết kế phức tạp, chốt dự</span></div>\n<p class=\"body-txt\">\nán thành công hoặc thu hút khách hàng cuối.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Những sai lầm thường gặp khi đặt dịch vụ diễn họa và cách tránh để tiết kiệm thời gian,</span></div>\n<p class=\"body-txt\">\nchi phí.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Các ví dụ (case study) về cách render hiệu quả đã giúp một thiết kế cụ thể trở nên nổi</span></div>\n<p class=\"body-txt\">\nbật.\n \nMục tiêu là cung cấp thông tin &quot;nhanh, ngắn gọn,&quot; giúp khách hàng tiết kiệm thời gian, dễ\n \ndàng nắm bắt các insight hữu ích và từ đó củng cố vị thế của FUTAGO là một chuyên gia\n \nđáng tin cậy trong lĩnh vực diễn họa kiến trúc.\n \n4.9 Lập kế hoạch Email\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học này tập trung vào việc xây dựng một hệ thống email marketing hiệu quả.</h3>\n<p class=\"body-txt\">\nThầy  nhấn mạnh việc người học phải tự tay thực hiện các bước ban đầu,\n \ntừ lập kế hoạch nội dung đến việc tạo ra sự quan tâm cho khách hàng trước khi bán hàng.\n \nMột điểm cốt lõi được giới thiệu là sử dụng nội dung PLR (Private Label Rights) để nhanh\n \nchóng tạo ra tài liệu, xây dựng uy tín và mở rộng hệ thống bán hàng thông qua hình thức\n \naffiliate marketing.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Người thực hiện trực tiếp: Email marketing không nên phụ thuộc vào hệ thống tự động</span></div>\n<p class=\"body-txt\">\nhoặc thuê đội nhóm bên ngoài ngay từ đầu; người học phải là người làm trực tiếp để\n \nhiểu rõ quy trình và sản phẩm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Lập kế hoạch nội dung email:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Lập kế hoạch tổng thể để gửi email.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sử dụng công thức 3-3-3: 3 email trong 3 ngày đầu, 3 email trong 7 ngày tiếp theo, và 3</span></div>\n<p class=\"body-txt\">\nemail trong 10 ngày tiếp theo.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kế hoạch email phải xoay quanh một sản phẩm cụ thể cần bán.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nguyên tắc bán hàng: Luôn &quot;làm cho họ quan tâm&quot; trước khi &quot;bán&quot;. Gửi email bán hàng</span></div>\n<p class=\"body-txt\">\ntrực tiếp sẽ khiến khách hàn
