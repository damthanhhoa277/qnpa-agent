r&quot; (bản tin, thư tin tức) được gửi thủ công hoặc theo giờ cố định, đồng</span></div>\n<p class=\"body-txt\">\nloạt cho tất cả mọi người.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chỉ được gửi email cho những người đã *đăng ký nhận bản tin*. Gửi cho người không</span></div>\n<p class=\"body-txt\">\nđăng ký có thể bị phạt (thầy Long nhắc đến Nghị định 75).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Trong email đầu tiên, cần có câu thông báo về việc sẽ tiếp tục gửi email.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mỗi email phải có nút &quot;unsubscribe&quot; (tôi không muốn nhận bản tin nữa) để người nhận</span></div>\n<p class=\"body-txt\">\ncó thể thoát khỏi danh sách.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nhóm 2: Người đăng ký học E-Course</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Là những người đã đăng ký học các khóa học online.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Họ nhận email theo một trình tự cụ thể (autoresponder), phù hợp với từng ngày học</span></div>\n<p class=\"body-txt\">\nkhác nhau.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nhóm 3: Người nhận quà miễn phí</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đây là đối tượng dễ bị nhầm lẫn với người đăng ký nhận bản tin.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nếu họ chỉ đăng ký nhận quà miễn phí, không được tự ý gửi bản tin cho họ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nếu cố tình gửi bản tin mà không lý giải được hoặc không có sự cho phép, có thể &quot;ăn</span></div>\n<p class=\"body-txt\">\nđòn&quot; (bị phạt).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nên gửi cho họ hướng dẫn sử dụng quà, thông tin về lợi ích, cách dùng hiệu quả cho đến</span></div>\n<p class=\"body-txt\">\nkhi họ muốn trao đổi thêm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nhóm 4: Khách hàng đã mua sản phẩm</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đây là nhóm rất quan trọng, tập hợp những người đã trả tiền mua sản phẩm/dịch vụ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mỗi khách hàng mua sản phẩm có thể thuộc các tập hợp khác nhau tùy theo loại sản</span></div>\n<p class=\"body-txt\">\nphẩm đã mua.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Trường hợp 1: Sản phẩm không loại trừ nhau (A and B / A or B)</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Một khách hàng có thể mua nhiều sản phẩm khác nhau (ví dụ: biệt thự, điện thoại, ô tô,</span></div>\n<p class=\"body-txt\">\nlà khách hàng siêu thị).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Các sản phẩm này không loại trừ nhau, khách hàng vẫn thuộc về nhiều nhóm và nhận sự</span></div>\n<p class=\"body-txt\">\nchăm sóc riêng biệt cho từng loại sản phẩm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ: Mua khóa học Sales Success System và học tiếp Email Marketing, vẫn nhận sự</span></div>\n<p class=\"body-txt\">\nchăm sóc từ hai hệ thống độc lập.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ: Mua chai rượu Vinmart, sau đó mua cân thịt Vinmart, vẫn là khách hàng cũ và</span></div>\n<p class=\"body-txt\">\nnhận các chương trình ưu đãi của Vinmart.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Trường hợp 2: Sản phẩm loại trừ nhau (A XOR B)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Một sản phẩm có thể loại trừ sản phẩm kia, nghĩa là khi khách hàng chọn một loại, họ sẽ</span></div>\n<p class=\"body-txt\">\nkhông nhận được thông tin về loại đã bị loại trừ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ: Đăng ký chương trình &quot;Đánh thức sự giàu có miễn phí&quot; và sau đó đăng ký &quot;Đánh</span></div>\n<p class=\"body-txt\">\nthức sự giàu có hạng vé VIP&quot;. Vé VIP sẽ loại trừ vé miễn phí; khách hàng chỉ nhận email\n \ncho hạng vé VIP.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khi khách hàng đăng ký sản phẩm B sau sản phẩm A, hệ thống sẽ loại bỏ sản phẩm A để</span></div>\n<p class=\"body-txt\">\ntránh gửi thông tin mâu thuẫn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nhóm 5: Đối tác liên kết (Affiliate Partners)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Là những đối tác kinh doanh hoặc hệ thống đại lý.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cần được chăm sóc đặc biệt hơn và tách biệt khỏi nhóm khách hàng thông thường.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thường được chia sẻ bộ công cụ để họ có thể tiếp thị sản phẩm hiệu quả cho chúng ta.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khi thiết kế hệ thống email marketing, cần hiểu rõ từng sản phẩm và nhóm khách hàng</span></div>\n<p class=\"body-txt\">\nđể tránh gửi trùng lặp email, làm phiền khách hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phân khúc đối tượng chi tiết là xương sống của email marketing hiệu quả: Thầy Long</span></div>\n<p class=\"body-txt\">\nnhấn mạnh việc chia nhỏ các nhóm độc giả dựa trên hành vi (đăng ký, mua hàng, nhận\n \nquà) và loại sản phẩm/dịch vụ. Điều này quan trọng vì nó cho phép cá nhân hóa tối đa\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">nội dung email, gửi đúng thông điệp đến đúng người, đúng thời điểm, từ đó tăng tỷ lệ</h3>\n<p class=\"body-txt\">\nchuyển đổi và giảm khả năng bị đánh dấu là spam. Nếu không phân khúc, việc gửi email\n \nchung chung sẽ làm loãng thông tin và gây khó chịu cho người nhận.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tuân thủ pháp luật và đạo đức trong email marketing: Việc chỉ gửi email cho người đã</span></div>\n<p class=\"body-txt\">\nđăng ký và bắt buộc có nút &quot;unsubscribe&quot; không chỉ là quy tắc đạo đức mà còn là yêu cầu\n \npháp lý (như Nghị định 75 được nhắc đến). Điều này cực kỳ quan trọng để xây dựng\n \nniềm tin với khách hàng, duy trì uy tín thương hiệu và tránh những rắc rối pháp lý, phạt\n \ntiền. Email marketing dựa trên sự đồng thuận là bền vững nhất.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Quản lý mối quan hệ sản phẩm/dịch vụ với khách hàng là yếu tố quyết định sự tương</span></div>\n<p class=\"body-txt\">\ntác: Thầy Long phân tích sâu về mối quan hệ giữa các sản phẩm khách hàng mua (loại\n \ntrừ nhau hay không loại trừ nhau). Điều này quan trọng để xây dựng một hành trình\n \nkhách hàng liền mạch và thông minh. Nếu sản phẩm loại trừ nhau, hệ thống cần tự động\n \nđiều chỉnh để chỉ gửi thông tin phù hợp nhất, tránh mâu thuẫn (ví dụ: không thể nhận cả\n \nemail vé thường và vé VIP cho cùng một sự kiện). Nếu sản phẩm không loại trừ nhau, hệ\n \nthống cần đủ linh hoạt để chăm sóc khách hàng dựa trên tất cả các tương tác họ có.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Nếu mà chúng ta gửi bản tin cho họ mà họ không đăng ký là ta bị phạt đấy nhé.”\n \n“Có thể bạn sẽ ăn đòn.”\n \n“Bạn phát rồ lên vì cái bản tin này được gửi đến cho bạn ba lần có đúng không nào?”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Quan trọng: Điều này giúp FUTAGO cung cấp các gói dịch vụ hoặc ưu đãi cá nhân hóa,</span></div>\n<p class=\"body-txt\">\nnâng cao trải nghiệm khách hàng và khuyến khích họ quay lại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sản phẩm loại trừ nhau:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Có thể áp dụng với các gói dịch vụ render khác nhau trên cùng một dự án: ví dụ, gói</span></div>\n<p class=\"body-txt\">\n&quot;render tiêu chuẩn&quot; và gói &quot;render cao cấp&quot; với thời gian hoàn thành hoặc mức độ chi\n \ntiết khác nhau.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nếu một khách hàng ban đầu chọn gói &quot;render tiêu chuẩn&quot; nhưng sau đó nâng cấp lên</span></div>\n<p class=\"body-txt\">\n&quot;render cao cấp&quot; cho cùng một dự án, hệ thống email của FUTAGO phải loại bỏ các email\n \nliên quan đến gói tiêu chuẩn và chỉ gửi các cập nhật, thông tin liên quan đến gói cao cấp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Quan trọng: Tránh gửi thông tin mâu thuẫn, giúp khách hàng luôn nhận được thông tin</span></div>\n<p class=\"body-txt\">\nchính xác và phù hợp nhất với dịch vụ họ đang sử dụng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đối tác liên kết (Affiliate Partners):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nếu FUTAGO có các đối tác (ví dụ: các công ty thiết kế nội thất, các nhà phát triển BĐS</span></div>\n<p class=\"body-txt\">\nnhỏ không có bộ phận render riêng, hoặc các agency marketing chuyên về BĐS) giới\n \nthiệu khách hàng đến FUTAGO để sử dụng dịch vụ render.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">FUTAGO cần có một nhóm email riêng cho các đối tác này, cung cấp cho họ tài liệu giới</span></div>\n<p class=\"body-txt\">\nthiệu dịch vụ render, các chương trình hoa hồng hoặc điều khoản hợp tác đặc biệt, cập\n \nnhật về công suất hay ưu đãi cho khách hàng được giới thiệu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Quan trọng: Chăm sóc đặc biệt nhóm này để họ trở thành kênh giới thiệu khách hàng</span></div>\n<p class=\"body-txt\">\nbền vững cho FUTAGO.\n \n6.3 Cách đặt tiêu đề độc đáo\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi giảng này tập trung vào cách tạo ra các sản phẩm thông tin (Information</h3>\n<p class=\"body-txt\">\nProducts), đặc biệt là các &quot;quà tặng miễn phí&quot; có giá trị cao và độc đáo, để thu hút khách\n \nhàng. Thầy  nhấn mạnh tầm quan trọng của việc xác định rõ đối tượng\n \nkhách hàng, lợi ích mà sản phẩm mang lại (thoát khỏi nỗi đau, đạt được sự sung sướng), và\n \nsự độc đáo của sản phẩm. Cốt lõi là một công thức giúp định hình tiêu đề, lời giới thiệu và\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">nội dung, đảm bảo sản phẩm thật sự giá trị và thu hút đối với người nhận.</h3>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sản phẩm thông tin (Information Products): Đây là loại sản phẩm chính được thảo luận</span></div>\n<p class=\"body-txt\">\ntrong buổi học.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đặc trưng của quà tặng miễn phí (sản phẩm thông tin):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Miễn phí: Khách hàng không phải trả bất kỳ chi phí nào để nhận (có thể có chi phí giao</span></div>\n<p class=\"body-txt\">\nhàng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giá trị sử dụng cao: Giá trị này phải cao đối với người nhận, chứ không phải cao theo</span></div>\n<p class=\"body-txt\">\nđánh giá của người tạo ra. Ví dụ về hòn bi và kim cương cho đứa trẻ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Độc đáo: Sản phẩm phải là duy nhất, không dễ dàng tìm thấy ở nơi khác (YouTube, trang</span></div>\n<p class=\"body-txt\">\nweb khác). Nếu đã có sản phẩm tương tự, cần nâng cấp hoặc bổ sung để tạo sự khác biệt.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Công thức tạo ra sản phẩm/quà tặng giá trị:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tôi dạy cái gì / Tôi tạo ra cái gì? (What)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cho đối tượng nào? (Who)</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Trình độ gì? (Cụ thể đối tượng)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Để đạt được lợi ích gì? (Outcome) - Gồm 2 phần:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giúp họ thoát khỏi nỗi đau nào? (Pain)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giúp họ đạt được sự sung sướng nào? (Pleasure)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Áp dụng công thức vào tiêu đề/lời giới thiệu: Tiêu đề của sản phẩm (ví dụ: một khóa</span></div>\n<p class=\"body-txt\">\nhọc, một cuốn sách) phải thể hiện rõ công thức trên để thu hút khách hàng mục tiêu. Ví\n \ndụ: &quot;Phương pháp tạo ra công cụ học liệu cho giáo viên tiểu học để nâng cao chất lượng\n \ngiảng dạy.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Vị trí áp dụng lời giới thiệu: Intro của cuốn sách, bìa 4, lời giới thiệu, đề tặng, landing</span></div>\n<p class=\"body-txt\">\npage bán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kiểm tra tính độc đáo: Tìm kiếm trên internet xem đã có ai cung cấp giải pháp tương tự</span></div>\n<p class=\"body-txt\">\nchưa. Nếu có, cần tạo ra cái khác biệt, thêm vào hoặc sửa đổi để sản phẩm trở nên độc\n \nđáo.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giá trị phải được định nghĩa từ góc nhìn của khách hàng, không phải người cung cấp:</span></div>\n<p class=\"body-txt\">\n&quot;Quà tặng có giá trị cao ở đây phải hiểu là nó cao với cái người nhận ấy chứ không phải\n \ncao với ta.&quot; Điều này cực kỳ quan trọng vì nó quyết định sản phẩm có thu hút và hữu ích\n \nvới đối tượng mục tiêu hay không. Nếu khách hàng không thấy giá trị, sản phẩm dù &quot;tốt&quot;\n \nđến mấy cũng vô nghĩa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Công thức &quot;Cái gì - Cho ai - Lợi ích gì (Thoát nỗi đau - Đạt sung sướng)&quot; là nền tảng: Công</span></div>\n<p class=\"body-txt\">\nthức này cung cấp một khuôn mẫu rõ ràng để định hình bất kỳ sản phẩm/dịch vụ nào, từ\n \nđó tạo ra tiêu đề, nội dung hấp dẫn và có tính chuyển đổi cao. Nó giúp tập trung vào\n \nkhách hàng và vấn đề của họ, thay vì chỉ tập trung vào sản phẩm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tính độc đáo là yếu tố sống còn: Trong thị trường cạnh tranh, việc tạo ra một sản</span></div>\n<p class=\"body-txt\">\nphẩm/quà tặng mà khách hàng không thể dễ dàng tìm thấy ở nơi khác (hoặc tìm thấy\n \nnhưng không đầy đủ, không tốt bằng) là yếu tố then chốt để thu hút sự chú ý và tạo dựng\n \nthương hiệu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Quà tặng có giá trị cao ở đây phải hiểu là nó cao với cái người nhận ấy chứ không phải cao\n \nvới ta.”\n \n“Tôi dạy cái gì cho ai, trình độ gì để đạt được lợi ích gì?”\n \n“Tôi dạy cái họ muốn làm để giúp đỡ họ thoát khỏi cái nỗi đau và đạt được cái sự sung sướng.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cái gì: &quot;Báo cáo phân tích chuyên sâu các yếu tố thẩm mỹ và kỹ thuật trong diễn họa kiến</span></div>\n<p class=\"body-txt\">\ntrúc Nhật Bản cao cấp.&quot; hoặc &quot;Hướng dẫn 5 bí quyết tạo ra hình ảnh render kiến trúc\n \nbiệt thự Nhật Bản thu hút khách hàng cao cấp.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cho ai: Các KTS, Thiết kế, Công ty xây dựng Nhật Bản (B2B).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Trình độ gì: Những người đã quen thuộc với diễn họa 3D nhưng muốn nâng cao chất</span></div>\n<p class=\"body-txt\">\nlượng hình ảnh để cạnh tranh và thu hút khách hàng hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thoát khỏi nỗi đau: Khó khăn trong việc tạo ra hình ảnh diễn họa đủ tinh tế, chất lượng</span></div>\n<p class=\"body-txt\">\ncao, đúng gu thẩm mỹ Nhật Bản để thuyết phục khách hàng cuối. Mất thời gian/nguồn\n \nlực nội bộ để tự làm mà hiệu quả không cao.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đạt được sự sung sướng: Có được những hình ảnh render kiến trúc đẳng cấp, chuyên</span></div>\n<p class=\"body-txt\">\nnghiệp, thể hiện được ý tưởng thiết kế một cách hoàn hảo, giúp dự án nhanh chóng được\n \nduyệt, thu hút khách hàng cao cấp và tăng doanh số.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tạo nội dung độc đáo (không dễ tìm trên YouTube/trang web khác):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thay vì chỉ là &quot;render đẹp&quot;, tập trung vào những &quot;insight&quot; đặc thù của thị trường Nhật</span></div>\n<p class=\"body-txt\">\nBản, ví dụ: &quot;Cách diễn họa vật liệu gỗ tự nhiên đúng kiểu Nhật,&quot; &quot;Ánh sáng zen trong\n \nkiến trúc,&quot; &quot;Chi tiết cây cảnh và môi trường xung quanh mang đậm nét văn hóa Nhật.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sử dụng các dự án thực tế của FUTAGO BIM (với sự cho phép của khách hàng) làm case</span></div>\n<p class=\"body-txt\">\nstudy, phân tích các yếu tố độc đáo mà FUTAGO BIM đã thực hiện để đạt được sự hài\n \nlòng của khách Nhật.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Có thể tạo một eBook, một checklist, hoặc một webinar ngắn miễn phí về những chủ đề</span></div>\n<p class=\"body-txt\">\nchuyên biệt này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tiêu đề Landing Page/Ebook: &quot;Bí quyết diễn họa kiến trúc cao cấp Nhật Bản: Nâng tầm</span></div>\n<p class=\"body-txt\">\ndự án của bạn với hình ảnh 3D chuyên nghiệp và thu hút.&quot; Hoặc &quot;Giải pháp tối ưu hóa\n \nthiết kế biệt thự: Làm thế nào để KTS Nhật Bản chinh phục khách hàng bằng hình ảnh\n \nrender 3D ấn tượng.&quot;\n \n---\n \n*Self-correction/Self-reflection: I have ensured that the suggestions for FUTAGO BIM\n \nstrictly adhere to the rule of &quot;KHÔNG bán dịch vụ BIM, KHÔNG tư vấn BIM, KHÔNG\n \noutsourcing BIM, KHÔNG dựng mô hình BIM&quot; and only focus on architectural\n \nvisualization/render/3D images. I&#x27;ve framed the application around creating valuable,\n \nunique information products (like an ebook or report) that address the pain points and\n \ndesired pleasures of their B2B Japanese clients, directly related to their core service of\n \narchitectural rendering.*\n \n6.4 Cách đặt tiêu đề có giá trị cao\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi giảng tập trung vào cách tạo ra nội dung/sản phẩm có giá trị cao và độc đáo</h3>\n<p class=\"body-txt\">\nđể thu hút khách hàng tiềm năng. Cốt lõi là phải giải quyết một vấn đề quan trọng, cấp bách\n \ncho đối tượng mục tiêu một cách đơn giản, nhanh chóng, và tạo sự tự tin cho họ. Thầy  sử dụng ví dụ về &quot;phụ nữ vào bếp&quot; để minh họa cách xây dựng sản phẩm đầu\n \nphễu là một cuốn sách hướng dẫn miễn phí, độc đáo, mang lại giá trị thực tế, từ đó thu hút\n \nđúng nhóm khách hàng và bán các sản phẩm liên quan.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giá trị cao của sản phẩm/nội dung: Gồm 3 yếu tố.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Yếu tố 1: Giúp khách hàng làm được một việc quan trọng trong cuộc sống. Việc đó phải</span></div>\n<p class=\"body-txt\">\ncó mức độ ưu tiên cao đối với họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ: &quot;Phụ nữ vào bếp&quot; – một việc tưởng chừng đơn giản nhưng nhiều người không tự</span></div>\n<p class=\"body-txt\">\ntin.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Kẻ quân tử không học cũng biết, kẻ tiểu nhân có cố học cũng không biết được&quot; – người</span></div>\n<p class=\"body-txt\">\nquân tử có khả năng tự học và ứng dụng, còn người tiểu nhân thì không.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Việc vào bếp là quan trọng với đa phần mọi người.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Các yếu tố bổ sung để tăng giá trị (khi giải quyết vấn đề): Đơn giản, dễ làm, nhanh chóng,</span></div>\n<p class=\"body-txt\">\ntạo sự tự tin (ngon, ai ăn cũng khen, có thể làm bất kỳ đâu, có sẵn nguyên liệu).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khác biệt giữa &quot;khó&quot; và &quot;giá trị cao&quot;: Các món ăn cầu kỳ, &quot;chim công cánh phượng&quot; chỉ</span></div>\n<p class=\"body-txt\">\ndành cho tiệc tùng, không làm hàng ngày được. Sản phẩm giá trị cao là sản phẩm phổ\n \nbiến, giải quyết vấn đề hàng "<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\nviệc không thể thực hiện các bước marketing tiếp theo (như viết nội dung hấp dẫn để\n \nchuyển đổi).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nguyên tắc &quot;Làm được trước, tối ưu sau&quot;: Thay vì đi sâu vào lý thuyết viết nội dung</span></div>\n<p class=\"body-txt\">\nngay, thầy Long yêu cầu học viên phải *có sẵn* Landing Page và Mồi Câu. Điều này thúc\n \nđẩy học viên hành động thực tế, hoàn thành các bước cơ bản đầu tiên, sau đó mới học\n \ncách làm cho chúng hiệu quả hơn, đảm bảo mọi người đều có sản phẩm thực tế để áp\n \ndụng lý thuyết.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tính kỷ luật và cam kết cao trong học tập: Việc đặt ra những yêu cầu rất nghiêm khắc và</span></div>\n<p class=\"body-txt\">\nhậu quả rõ ràng (bị &quot;tốt nghiệp&quot; hoặc &quot;chửi nhục mặt&quot;) cho thấy sự nghiêm túc của khóa\n \nhọc và mong muốn học viên phải có sự cam kết cao, chủ động hành động chứ không chỉ\n \nthụ động tiếp thu lý thuyết. Đây là động lực mạnh mẽ để học viên thực sự hoàn thành bài\n \ntập.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“để con rời vào là con rời phải để lại email.”\n \n“Nếu không có Landing Page và mồi câu, tuần sau vào lớp tôi chửi cho nhục mặt luôn.”\n \n“Tốt nhất là không có Landing Page và không tạo được mồi câu thì thôi mình tốt nghiệp luôn\n \nngày hôm nay nhá. Chia tay vĩnh biệt bạn.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#d81b60\">Chương 8</h3>\n<p class=\"body-txt\">\n7.1 Chuỗi email bán chảo\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học tập trung vào chiến lược email marketing theo chuỗi (thu hút, nuôi</h3>\n<p class=\"body-txt\">\ndưỡng, bán) và tầm quan trọng của việc sở hữu danh sách khách hàng để duy trì sự chủ\n \nđộng. Thầy Long sử dụng ví dụ về &quot;tăng sức mạnh đàn ông&quot; để minh họa cách đi từ nhận\n \ndiện vấn đề, đề xuất giải pháp thông thường, rồi giới thiệu giải pháp đặc biệt cùng sản phẩm\n \ncụ thể. Cốt lõi của việc tạo nội dung chuỗi email là khai thác sâu &quot;chương vấn đề&quot; của khách\n \nhàng, dựa trên các từ khóa đuôi dài và câu hỏi của họ, nhằm xây dựng mối quan hệ và dẫn\n \ndắt người đọc đến hành động mua hàng một cách tự nhiên.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Buổi học này là phần tiếp theo, tập trung vào &quot;marketing theo chuỗi&quot; (có thể là chuỗi</span></div>\n<p class=\"body-txt\">\nvideo, blog, email, tin nhắn, bài giảng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nội dung quan trọng nhất là tư duy cốt lõi về marketing theo chuỗi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hệ thống email marketing gồm ba giai đoạn:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giai đoạn 1: Thu hút (tác nhân thu hút)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giai đoạn 2: Nuôi dưỡng (tác nhân nuôi dưỡng)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giai đoạn 3: Bán (bán và bán nhiều lần nữa)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ưu điểm của email marketing: Khách hàng đã nằm trong danh sách của bạn nên bạn</span></div>\n<p class=\"body-txt\">\nhoàn toàn chủ động; không cần trả tiền cho nhà quảng cáo mỗi lần gửi; dễ dàng chuyển\n \nđổi nhà cung cấp dịch vụ email.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ minh họa chuỗi marketing: Tăng cường sức mạnh đàn ông (dùng làm &quot;tăng hooc-</span></div>\n<p class=\"body-txt\">\nmôn tình dục của đàn ông&quot; để gây chú ý và tạo cảm xúc).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Vấn đề: Sức mạnh đàn ông giảm do căng thẳng công việc, cuộc sống, môi trường làm</span></div>\n<p class=\"body-txt\">\nviệc, thức ăn, đồ uống (giảm hormone testosterone).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giải pháp thông thường của thị trường: Tập thể dục, phơi nắng, đi ngủ đúng giờ, thay đổi</span></div>\n<p class=\"body-txt\">\nthức ăn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giải pháp đặc biệt (của thầy): Ăn trứng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sản phẩm liên quan: Nồi/chảo nấu trứng đặc biệt (không dùng mỡ), giúp chế biến nhiều</span></div>\n<p class=\"body-txt\">\nmón trứng dễ dàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cấu trúc chuỗi email ví dụ:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 1 (Thu hút): Tiêu đề gây tò mò (&quot;Bí mật này sẽ mang sức mạnh đàn ông quay trở</span></div>\n<p class=\"body-txt\">\nlại với bạn&quot;). Kêu gọi để lại email để nhận &quot;bí kíp&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 2 (Trao bí kíp &amp; Xác nhận): Chúc mừng đã đăng ký, yêu cầu bấm link để xác nhận</span></div>\n<p class=\"body-txt\">\nemail thật và nhận &quot;bí kíp&quot;. Gợi ý add email vào danh sách an toàn, có thể forward cho\n \nbạn bè.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 3 (Follow-up): Hỏi tại sao chưa tải &quot;bí kíp&quot;, nhắc nhở tải và in ra đọc.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 4 (Nuôi dưỡng): Thuyết phục việc ăn 4 quả trứng/ngày là khả thi, kể chuyện cá</span></div>\n<p class=\"body-txt\">\nnhân về lợi ích.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 5 (Nuôi dưỡng): Hướng dẫn các cách chế biến trứng, chia sẻ món trứng yêu thích</span></div>\n<p class=\"body-txt\">\n(trứng rán không dầu).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 6 (Bán): Giới thiệu sản phẩm (chảo chống dính Zumbo), kèm link mua.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 7 (Follow-up bán): Nhắc nhở mua chảo (&quot;tiếc tiền phải không?&quot;), khẳng định giá</span></div>\n<p class=\"body-txt\">\ntrị.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 8 (Khách hàng nói/Social Proof): Chia sẻ câu chuyện khách hàng dùng chảo để nấu</span></div>\n<p class=\"body-txt\">\ncháo trứng, hướng dẫn cách làm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nguồn nội dung cho chuỗi email: Nằm trong &quot;Chương 2&quot; (Chương vấn đề) của khách</span></div>\n<p class=\"body-txt\">\nhàng. Cần moi ra vấn đề, nỗi đau, câu hỏi của khách hàng (dựa trên từ khóa đuôi dài) để\n \ntạo nội dung giải quyết.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phong cách viết email: Ngắn gọn, cá nhân hóa, tâm sự, gần gũi (ví dụ: &quot;Dương ơi&quot;).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phát triển sản phẩm tiếp theo: Sau khi bán sản phẩm đầu tiên (chảo), có thể bán thêm</span></div>\n<p class=\"body-txt\">\ncác sản phẩm liên quan theo combo (bộ nồi, bếp từ, bếp than, bếp tổ ong...).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sở hữu danh sách email là chìa khóa của sự chủ động và bền vững: Thầy Long nhấn</span></div>\n<p class=\"body-txt\">\nmạnh email đã &quot;nằm trong danh sách của bạn rồi nên bạn hoàn toàn chủ động&quot;, không\n \nphải trả tiền quảng cáo liên tục và có thể dễ dàng chuyển đổi nhà cung cấp dịch vụ email.\n \nĐiều này quan trọng vì nó giúp doanh nghiệp xây dựng tài sản khách hàng riêng, không\n \nphụ thuộc vào các nền tảng quảng cáo bên ngoài (như Facebook, Google) vốn có thể thay\n \nđổi thuật toán, chính sách, hoặc khóa tài khoản bất cứ lúc nào, gây rủi ro và chi phí lớn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mỏ vàng nội dung nằm ở &quot;Chương vấn đề&quot; của khách hàng: &quot;Tất cả những cái email này</span></div>\n<p class=\"body-txt\">\nnó đều nằm ở đâu? Nó đều nằm ở cái chương 2 ấy, cái chương vấn đề đấy. Chúng ta phải\n \nmoi được cái vấn đề ra thì ta mới viết được.&quot; Đây là một insight cực kỳ đắt giá vì nó cung\n \ncấp phương pháp luận cốt lõi để tạo ra nội dung thu hút và có giá trị. Thay vì cố gắng tự\n \nnghĩ ra những gì để viết, hãy tập trung vào việc lắng nghe và giải quyết những nỗi đau,\n \nthắc mắc, mong muốn sâu xa nhất của khách hàng. Nội dung giải quyết vấn đề của họ sẽ\n \nluôn có tính liên quan và thu hút cao.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cấu trúc 4 giai đoạn logic dẫn dắt khách hàng: Vấn đề -&gt; Giải pháp thông thường -&gt; Giải</span></div>\n<p class=\"body-txt\">\npháp của tôi -&gt; Sản phẩm: &quot;Nó là vấn đề, nó là giải pháp thông thường, nó là giải pháp\n \ncủa tôi, nó là sản phẩm tôi bán.&quot; Đây là một lộ trình marketing hiệu quả, giúp dẫn dắt\n \nkhách hàng từ nhận thức vấn đề đến việc chấp nhận giải pháp và mua sản phẩm một\n \ncách tự nhiên, thuyết phục. Nó không chỉ bán sản phẩm mà còn bán cả giá trị, niềm tin và\n \nsự khác biệt của giải pháp bạn cung cấp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Viết email theo phong cách cá nhân hóa, ngắn gọn và tâm sự: Các ví dụ email thầy đưa ra</span></div>\n<p class=\"body-txt\">\n(vd: &quot;Dương ơi&quot;, &quot;Chào Dương&quot;, &quot;Sao bạn vẫn chưa mua? Tiếc tiền phải không?&quot;) cho\n \nthấy sự gần gũi, trò chuyện. Điều này quan trọng vì nó phá vỡ rào cản thông thường của\n \nemail marketing, tạo cảm giác thân thiện, chân thật. Sự kết nối cá nhân giúp xây dựng\n \nniềm tin, duy trì sự tương tác và khiến khách hàng dễ dàng tiếp nhận thông điệp bán\n \nhàng hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Cái nội dung quan trọng nhất là nằm ở trong buổi thứ hai. Trong những cái gì mà chúng ta\n \nđã học được thì nó nằm ở buổi thứ hai.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Nó là vấn đề, nó là giải pháp thông thường, nó là giải pháp của tôi, nó là sản phẩm tôi bán.”\n \n“Bí mật này sẽ mang sức mạnh đàn ông quay trở lại với bạn.”\n \n“Cái chương 2 chính là cái chương quan trọng nhất.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sau khi khách hàng sử dụng dịch vụ render, tiếp tục gợi ý các gói dịch vụ cao cấp hơn</span></div>\n<p class=\"body-txt\">\n(render nội thất/ngoại thất toàn diện, ảnh panorama 360, video walkthrough) hoặc các\n \ndịch vụ bổ sung cho dự án khác của họ.\n \n7.2 Chuỗi email bán pate cho chó mèo\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học tập trung vào phương pháp xây dựng hệ thống marketing, đặc biệt là</h3>\n<p class=\"body-txt\">\nemail marketing, thông qua việc đào sâu hiểu biết về sản phẩm. Cốt lõi là việc xác định các\n \nvấn đề mà khách hàng đang gặp phải, phân tích các giải pháp thông thường và hạn chế của\n \nchúng, sau đó đưa ra giải pháp sản phẩm của mình dưới dạng các tính năng và lợi ích cụ thể.\n \nQuy trình này được gọi là &quot;chuỗi email marketing ngược&quot;, bắt đầu từ vấn đề của khách hàng\n \nđể dẫn dắt đến giải pháp và sản phẩm.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy giới thiệu &quot;bảng số 2&quot; là bí kíp để làm marketing, áp dụng cho email marketing, bán</span></div>\n<p class=\"body-txt\">\nhàng trên sân khấu, và giao tiếp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Để minh họa, thầy lấy ví dụ sản phẩm &quot;pate tươi cho chó mèo&quot; của một học viên.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy liên tục đặt câu hỏi để làm rõ về sản phẩm: &quot;Pate là gì?&quot;, &quot;Tươi nghĩa là gì?&quot;, &quot;Tại</span></div>\n<p class=\"body-txt\">\nsao chó mèo cần ăn?&quot;, &quot;Đối tượng nào cần?&quot;, &quot;Đóng gói dạng gì?&quot;, &quot;Bảo quản bao lâu?&quot;,\n \n&quot;Ăn như thế nào?&quot;, &quot;Giá bao nhiêu?&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy khẳng định tất cả những câu hỏi đó chính là để làm rõ tính năng và lợi ích của sản</span></div>\n<p class=\"body-txt\">\nphẩm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy nhấn mạnh marketing cần bắt đầu từ việc hiểu rõ &quot;Pate là gì chính là một email,</span></div>\n<p class=\"body-txt\">\nTươi là gì chính là một email, cho chó mèo là một email...&quot;. Mỗi đặc điểm, chi tiết của sản\n \nphẩm là một cơ hội để truyền tải thông điệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phương pháp là đi ngược từ vấn đề của khách hàng để xây dựng chuỗi email marketing:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Vấn đề: Các vấn đề cơ bản của người nuôi thú cưng (không hiểu rõ thành phần thức ăn,</span></div>\n<p class=\"body-txt\">\nmùi hôi do chất thải, bệnh tiêu chảy, chó kén ăn hạt).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giải pháp thông thường: Cho ăn cơm thừa, thức ăn hạt (có nhược điểm là không đủ chất,</span></div>\n<p class=\"body-txt\">\nchó không thích, không hợp khẩu phần).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giải pháp của mình: Pate tươi tự làm với thành phần dinh dưỡng được kiểm soát.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Để thu hút khách hàng, cần tạo ra các tài liệu miễn phí (email, video, blog, sách điện tử)</span></div>\n<p class=\"body-txt\">\ngiải quyết các vấn đề liên quan đến việc nuôi thú cưng (ví dụ: cách huấn luyện chó đi vệ\n \nsinh đúng chỗ, cách chọn giống chó, cách nuôi chồn, cách nấu thức ăn cho chó).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Từ các tài liệu này, người bán sẽ xây dựng mối quan hệ và dần giới thiệu sản phẩm của</span></div>\n<p class=\"body-txt\">\nmình như một giải pháp cho vấn đề khách hàng đang gặp phải.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Không chỉ bán một sản phẩm, mà mở rộng sang &quot;hệ sinh thái&quot; các sản phẩm liên quan</span></div>\n<p class=\"body-txt\">\nbằng cách tiếp tục xác định và giải quyết các vấn đề khác (ví dụ: từ thức ăn pate, chuyển\n \nsang chậu đi vệ sinh, bình xịt khử mùi, bình đựng nước, bát ăn cho chó).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mục tiêu cuối cùng là từ việc giúp khách hàng giải quyết vấn đề, họ sẽ tin tưởng và mua</span></div>\n<p class=\"body-txt\">\ncác sản phẩm mà mình cung cấp.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy kết luận rằng phương pháp này áp dụng cho mọi loại sản phẩm/dịch vụ, từ bảo</span></div>\n<p class=\"body-txt\">\nhiểm, ô tô đến đá ốp lát, và điều quan trọng nhất là phải thực hành để vỡ ra được kiến\n \nthức.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Marketing cần bắt đầu từ vấn đề của khách hàng, không phải từ sản phẩm: Thay vì chỉ</span></div>\n<p class=\"body-txt\">\nliệt kê các tính năng của sản phẩm, người bán cần tìm hiểu sâu sắc về những khó khăn,\n \nthách thức mà khách hàng đang đối mặt. Từ đó, định vị sản phẩm của mình như một giải\n \npháp hữu hiệu. Điều này quan trọng vì khách hàng mua giải pháp cho vấn đề của họ,\n \nkhông chỉ là một món hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phân biệt rõ ràng giữa &quot;Tính năng&quot; và &quot;Lợi ích&quot;: Thầy Long liên tục đặt câu hỏi để làm rõ</span></div>\n<p class=\"body-txt\">\nsự khác biệt giữa &quot;Pate là gì?&quot; (tính năng: hỗn hợp cá ngừ và thịt gà xay hấp) và &quot;Tại sao\n \nchó cần ăn nó?&quot; (lợi ích: tốt cho tiêu hóa, giảm rụng lông). Hiểu và truyền tải được lợi ích\n \ngiúp thông điệp marketing trở nên thuyết phục và chạm đến mong muốn của khách\n \nhàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng chuỗi giá trị sản phẩm thông qua việc giải quyết vấn đề liên tục: Bài học không</span></div>\n<p class=\"body-txt\">\nchỉ dừng lại ở việc bán một sản phẩm mà còn chỉ ra cách mở rộng danh mục sản\n \nphẩm/dịch vụ. Bằng cách luôn đặt câu hỏi &quot;vấn đề tiếp theo của khách hàng là gì?&quot;,\n \nngười bán có thể tạo khi đề xuất cơ hội kinh doanh (Lọ 3). Điều này giúp xây dựng\n \nmột mạng lưới bền vững với những thành viên thực sự gắn bó và hiểu rõ giá trị sản\n \nphẩm, thay vì chỉ tập trung vào việc tuyển người một cách vội vã.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Cái nguyên lý của cái hệ thống kinh doanh của bạn nó chỉ thành công khi tất cả mọi người\n \nđều biết bán lẻ. Và nếu như bạn không tập trung vào việc bán lẻ mà tập trung vào việc tuyển\n \ndụng hệ thống thì đấy sẽ là một cái hệ thống rỗng.”\n \n“Tôi sẽ không mời bạn kinh doanh cho đến khi bạn đã yêu thích sản phẩm.”\n \n“Cuối cùng công việc bạn cần làm là bổ sung khách hàng chứ không phải tuyển nhà phân\n \nphối.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học tập trung vào tầm quan trọng của email marketing và cách triển khai một</h3>\n<p class=\"body-txt\">\nchiến dịch hiệu quả, mang tính chiến lược dài hạn. Thầy Long nhấn mạnh việc xây dựng hệ\n \nthống, tạo landing page và mồi câu, cùng với việc so sánh sản phẩm để chốt đơn theo một\n \nquy trình cụ thể. Quan trọng là phải kiên trì theo đuổi khách hàng tiềm năng qua chuỗi email\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\ndài hạn, thậm chí hàng chục năm, để xây dựng niềm tin và đạt được mục tiêu kinh doanh.\n \nEmail marketing không chỉ là công cụ mà còn là nghệ thuật &quot;tán tỉnh&quot; khách hàng một cách\n \nbài bản và bền bỉ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nếu đã học email marketing mà hiểu được nội dung, thầy Long khuyên nên học tiếp</span></div>\n<p class=\"body-txt\">\nkhóa IPS (Internet Profit System), được giới thiệu là có nội dung gấp 5 lần khóa hiện tại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Buổi học ôn tập các bài cũ, bao gồm việc cài đặt hệ thống email, cài đặt campaign, làm</span></div>\n<p class=\"body-txt\">\nlanding page và tạo mồi câu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mục tiêu của khóa học là để học viên thân tình, tin cậy nhau và hiểu được tầm quan</span></div>\n<p class=\"body-txt\">\ntrọng cốt lõi của email marketing.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email marketing là một cách để &quot;nâng cấp sản phẩm của mình lên&quot; và thiết kế sản phẩm</span></div>\n<p class=\"body-txt\">\ntốt hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Quá trình bán hàng hay &quot;tán gái&quot; (thầy dùng ví dụ tán gái để minh họa) phải theo một</span></div>\n<p class=\"body-txt\">\nquy trình bài bản và có thứ tự:\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Không được vội vàng &quot;chốt&quot; ngay từ đầu.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phải bắt đầu từ trên xuống dưới, chạy theo thứ tự.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tạo ra nhu cầu.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">So sánh các sản phẩm/dịch vụ của mình với đối thủ trên thị trường.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chứng minh được sự vượt trội của mình so với đối thủ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sau đó mới tiến hành chốt đơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Các chuỗi email marketing có thể kéo dài rất lâu (có thể là 28 ngày, 28 năm, thậm chí 38</span></div>\n<p class=\"body-txt\">\nnăm, 48 năm), đòi hỏi sự kiên trì và bền bỉ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy kể ví dụ hài hước về việc dùng email để &quot;phục thù&quot; trong chuyện tình cảm sau 38</span></div>\n<p class=\"body-txt\">\nnăm, nhấn mạnh tính kiên trì và hiệu quả của việc duy trì giao tiếp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email marketing có khả năng chạy hết từ hệ thống này sang hệ thống khác một cách liên</span></div>\n<p class=\"body-txt\">\ntục.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đưa tất cả các mối quan hệ (tiềm năng) vào danh sách email (playlist/list) để họ nhận</span></div>\n<p class=\"body-txt\">\nemail, từ đó có thể &quot;phục thù&quot; (tức là chuyển đổi hoặc tái tiếp cận thành công) về sau.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cuối buổi thầy chào tạm biệt và hẹn gặp lại tại Sale Success System (SSS).</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email marketing là một chiến lược dài hạn, có hệ thống và đòi hỏi sự kiên trì: Thầy Long</span></div>\n<p class=\"body-txt\">\nnhấn mạnh rằng các chiến dịch email có thể kéo dài từ 28 ngày đến 28 năm, thậm chí 38-\n \n48 năm. Điều này chỉ ra rằng email marketing không phải là một công cụ chốt sale nhanh\n \nchóng mà là một quá trình nuôi dưỡng mối quan hệ, xây dựng niềm tin và giá trị theo\n \nthời gian. Quan trọng vì nó định hình tư duy về sự bền bỉ trong kinh doanh và không bỏ\n \ncuộc với khách hàng tiềm năng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Quy trình bán hàng/marketing phải tuân thủ thứ tự và từng bước rõ ràng: Qua ví dụ</span></div>\n<p class=\"body-txt\">\n&quot;tán gái,&quot; thầy chỉ ra rằng không thể vội vàng chốt sale mà phải bắt đầu &quot;từ trên xuống\n \ndưới,&quot; &quot;tạo ra nhu cầu,&quot; &quot;so sánh sản phẩm,&quot; &quot;chứng tỏ sự vượt trội&quot; rồi mới &quot;chốt đơn.&quot;\n \nĐiều này quan trọng bởi nó cung cấp một khuôn khổ thực tế cho việc tiếp cận khách\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\nhàng, giúp xây dựng giá trị và thuyết phục khách hàng một cách hiệu quả hơn, tránh việc\n \nđẩy mạnh bán hàng quá sớm làm hỏng cơ hội.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email marketing không chỉ là công cụ truyền thông mà còn là động lực để nâng cấp sản</span></div>\n<p class=\"body-txt\">\nphẩm và khẳng định vị thế cạnh tranh: Thầy Long liên hệ việc hiểu email marketing với\n \nkhả năng &quot;nâng cấp sản phẩm của mình lên&quot; và &quot;mình hơn hẳn những thằng khác trên\n \nthị trường như thế nào.&quot; Điều này quan trọng vì nó cho thấy email marketing không chỉ\n \nlà hoạt động ngoại vi mà là yếu tố cốt lõi, giúp doanh nghiệp hiểu rõ hơn về khách hàng\n \nđể cải tiến sản phẩm/dịch vụ và truyền tải giá trị đó một cách hiệu quả, tạo lợi thế cạnh\n \ntranh bền vững.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Mọi thứ khi mình đã trải nghiệm mình thấy sướng rồi, thấy thích rồi, lại muốn trải nghiệm\n \nnhiều hơn đúng không?”\n \n“Đi tán gái cũng vậy... Không được, mình phải bắt đầu từ trên xuống dưới, phải chạy theo thứ\n \ntự, tạo ra nhu cầu, xong so sánh các sản phẩm khác trên thị trường... mình hơn hẳn những\n \nthằng khác trên thị trường như nào, sau đó thì bắt đầu mới chốt đơn.”\n \n“Có thể cái thời gian mình chạy cái chuỗi email này có thể là 28 ngày, có thể là 28 năm, chưa\n \nbiết chừng.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#d81b60\">Chương 9</h3>\n<p class=\"body-txt\">\n8.1 Ôn tập chuỗi email bán hàng\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học tập trung vào cách xây dựng một chuỗi email marketing hiệu quả theo</h3>\n<p class=\"body-txt\">\nmô hình 4 bước (4 email) để dẫn dắt khách hàng tiềm năng từ nhận thức vấn đề đến hành\n \nđộng mua hàng. Phương pháp này bao gồm việc xác định nỗi đau của thị trường lạnh, đề\n \nxuất các giải pháp thông thường (thị trường ấm), giới thiệu giải pháp độc đáo của riêng bạn,\n \nvà cuối cùng là đưa ra một cơ hội hoặc lời chào hàng hấp dẫn. Thầy  minh\n \nhọa chuỗi email này qua nhiều ví dụ cụ thể về các ngành nghề và sản phẩm khác nhau.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Buổi học tập trung vào việc xây dựng chuỗi email marketing, nối tiếp các kiến thức về hệ</span></div>\n<p class=\"body-txt\">\nthống email và lập kế hoạch.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chiến lược email marketing được trình bày theo mô hình 4 giai đoạn, tương ứng với 4</span></div>\n<p class=\"body-txt\">\nemail gửi cho khách hàng, dựa trên phân loại thị trường (lạnh, ấm, nóng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 1 (Thị trường lạnh): Nhận diện vấn đề hoặc mong muốn sâu sắc nhất của khách</span></div>\n<p class=\"body-txt\">\nhàng. Nội dung tập trung vào &quot;điều khách hàng mong muốn&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">*Ví dụ:* &quot;Chào Phi Hồng Huy, tôi biết bạn muốn giàu.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 2 (Thị trường ấm): Đề cập đến những giải pháp thông thường, phổ biến mà thị</span></div>\n<p class=\"body-txt\">\ntrường đang cung cấp để giải quyết vấn đề đó. Thường là các giải pháp có nhược điểm\n \nhoặc chưa tối ưu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">*Ví dụ:* &quot;Huy ơi, các cụ dạy rằng phi thương bất phú, muốn giàu thì có con đường đó là</span></div>\n<p class=\"body-txt\">\nchúng ta phải làm ăn kinh doanh.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 3 (Giải pháp của tôi): Trình bày giải pháp độc đáo của bạn, nhấn mạnh cách nó</span></div>\n<p class=\"body-txt\">\nkhắc phục những vấn đề của giải pháp thông thường. Giải pháp của bạn phải &quot;nhanh\n \nhơn, tốt hơn, rẻ hơn, bền hơn, đơn giản hơn, hiệu quả hơn, dễ hơn&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">*Ví dụ:* &quot;Không online thì lấy gì mà nhai Huy nhỉ?&quot; (ngụ ý kinh doanh truyền thống có</span></div>\n<p class=\"body-txt\">\ngiới hạn, cần online).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 4 (Cơ hội/Kêu gọi hành động): Đưa ra một lời đề nghị cụ thể (sản phẩm/dịch vụ</span></div>\n<p class=\"body-txt\">\ncủa bạn) và kêu gọi hành động (CTA), thường kèm theo các ưu đãi, đảm bảo hoặc lợi ích\n \ncụ thể để khách hàng ra quyết định.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">*Ví dụ:* &quot;Làm thế nào để làm đúng được con đường đi? Tôi đã tạo ra khóa học Internet</span></div>\n<p class=\"body-txt\">\nPower System. Bấm vào đường link này để biết thêm chi tiết.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mô hình chuỗi email này có tính linh hoạt cao, có thể áp dụng cho nhiều loại sản</span></div>\n<p class=\"body-txt\">\nphẩm/dịch vụ khác nhau (khóa học, bất động sản, thực phẩm chức năng, cơ hội kinh\n \ndoanh).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mọi nội dung trong chuỗi email đều phải được &quot;phân luồng&quot; theo từng giai đoạn để đạt</span></div>\n<p class=\"body-txt\">\nhiệu quả tối ưu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mô hình 4 email theo chu trình nhận thức của khách hàng (Lạnh -&gt; Ấm -&gt; Giải pháp của</span></div>\n<p class=\"body-txt\">\ntôi -&gt; Cơ hội): Đây là cấu trúc cốt lõi và lặp đi lặp lại trong bài giảng. Nó quan trọng vì nó\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\ncung cấp một lộ trình rõ ràng, có hệ thống để dẫn dắt khách hàng tiềm năng, từ việc họ\n \nnhận ra vấn đề và mong muốn chung, đến việc họ tin tưởng vào giải pháp của bạn và sẵn\n \nsàng hành động. Việc &quot;phân luồng&quot; nội dung theo từng giai đoạn giúp tránh áp đảo\n \nkhách hàng và xây dựng mối quan hệ dần dần.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tập trung vào &quot;vấn đề&quot; và &quot;mong muốn&quot; của khách hàng ở giai đoạn đầu: Thay vì bán</span></div>\n<p class=\"body-txt\">\nhàng ngay lập tức, email đầu tiên tập trung vào việc khơi gợi và xác nhận những gì khách\n \nhàng thực sự muốn (ví dụ: &quot;Tôi biết bạn muốn giàu&quot;). Điều này cực kỳ quan trọng vì nó\n \ntạo sự đồng cảm, thu hút sự chú ý và làm cho khách hàng cảm thấy được thấu hiểu, đặt\n \nnền tảng cho việc giới thiệu giải pháp sau này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khắc phục nhược điểm của giải pháp thông thường bằng giải pháp của bạn: Khi giới</span></div>\n<p class=\"body-txt\">\nthiệu giải pháp của mình, thầy Long nhấn mạnh việc phải chứng minh nó &quot;nhanh hơn,\n \ntốt hơn, rẻ hơn, bền hơn, đơn giản hơn, hiệu quả hơn&quot;. Đây là yếu tố then chốt để tạo ra\n \nlợi thế cạnh tranh và thuyết phục khách hàng chuyển đổi từ các giải pháp họ đã biết sang\n \ngiải pháp của bạn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Tôi biết bạn muốn giàu.”\n \n“Không online thì lấy gì mà nhai Huy nhỉ?”\n \n“Mọi khó khăn chúng tôi lo.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\ncho phần mềm/nhân sự, hoặc chất lượng không đồng đều, ảnh hưởng đến tiến độ và\n \nhiệu quả của dự án.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 3 (Giải pháp của FUTAGO BIM): Giới thiệu dịch vụ diễn họa kiến trúc 3D chuyên</span></div>\n<p class=\"body-txt\">\nnghiệp là giải pháp tối ưu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nội dung: &quot;Tại FUTAGO BIM, chúng tôi cung cấp dịch vụ diễn họa 3D kiến trúc (CG パー</span></div>\n<p class=\"body-txt\">\nス/render 3D) chuyên nghiệp, giúp quý vị giải quyết triệt để những vấn đề trên. Với đội\n \nngũ chuyên gia giàu kinh nghiệm và quy trình tối ưu, chúng tôi đảm bảo hình ảnh đầu ra\n \nnhanh hơn, chân thực hơn, chất lượng vượt trội theo tiêu chuẩn Nhật Bản, đồng thời\n \ngiúp quý vị tiết kiệm đáng kể nguồn lực, tập trung hoàn toàn vào sáng tạo kiến trúc.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 4 (Cơ hội/Kêu gọi hành động): Đưa ra đề nghị hợp tác cụ thể.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nội dung: &quot;Để trải nghiệm sự khác biệt và hiệu quả mà dịch vụ diễn họa 3D của FUTAGO</span></div>\n<p class=\"body-txt\">\nBIM mang lại, chúng tôi xin gửi tới quý vị cơ hội dùng thử dịch vụ với ưu đãi đặc biệt cho\n \ndự án đầu tiên, hoặc buổi tư vấn miễn phí về cách tối ưu hóa hình ảnh cho dự án sắp tới\n \ncủa quý vị. Hãy nhấp vào đường link dưới đây để tìm hiểu thêm và nâng tầm hình ảnh\n \nkiến trúc của bạn.&quot;\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\nLời kết\n \nHết khoá Email Marketing. Đọc để LÀM, không phải để biết — mỗi bài có phần “việc cần làm\n \ncho FUTAGO” để biến kiến thức thành hành động. — Bộ não thứ 2 của Oanh.\n</p></div></div>",
"<div class=\"pg pg-cover\" style=\"border-top:5px solid #d81b60\">\n  <div class=\"cover-wrap\">\n    <div class=\"cover-title\">Email Marketing Chuyên Nghiệp</div>\n    <div class=\"cover-sub\" style=\"color:#d81b60\">Học để ứng dụng · Áp dụng để thành công</div>\n    <div class=\"cover-tag\" style=\"color:#d81b60;margin-top:24px\">QNPA Pickleball Academy</div>\n  </div>\n</div>"];
const N=pages.length;
let cur=0;
const book=document.getElementById('book');
const fill=document.getElementById('progress-fill');
const info=document.getElementById('page-info');
const jump=document.getElementById('page-jump');
const btnP=document.getElementById('btn-prev');
const btnN=document.getElementById('btn-next');
function render(){
  book.innerHTML=pages[cur];
  fill.style.width=((cur+1)/N*100)+'%';
  info.textContent=(cur+1)+' / '+N;
  jump.value=cur+1;
  btnP.disabled=cur===0;
  btnN.disabled=cur===N-1;
  window.scrollTo(0,0);
}
function next(){if(cur<N-1){cur++;render();}}
function prev(){if(cur>0){cur--;render();}}
function goTo(n){cur=Math.max(0,Math.min(N-1,n));render();}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown')next();
  else if(e.key==='ArrowLeft'||e.key==='PageUp')prev();
});
render();
</script>
