"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\n5.3 Cách viết thư đơn giản mà hiệu quả của\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi giảng tập trung vào quy trình và tư duy cốt lõi để viết một bức thư quảng cáo</h3>\n<p class=\"body-txt\">\n(sales letter) hiệu quả trong internet marketing. Thầy Long nhấn mạnh rằng thành công\n \nkhông phụ thuộc vào hoàn cảnh mà là cách chúng ta nhìn nhận và phản ứng với chúng. Quy\n \ntrình viết thư bao gồm việc tìm kiếm mẫu, xác định tính năng/lợi ích sản phẩm, sử dụng &quot;từ\n \nkhóa ma thuật&quot; để khơi gợi cảm xúc, và liên tục đọc to, chỉnh sửa để đảm bảo sự rõ ràng, dễ\n \nhiểu và tác động.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giới thiệu về hòm thư điện tử và cách đọc thư hiệu quả: Thầy Long mở đầu bằng việc</span></div>\n<p class=\"body-txt\">\ntrình bày một bức thư mẫu và nhận định về sự thiếu hiệu quả của việc dịch tự động.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Quy tắc &quot;trên dòng kẻ và dưới dòng kẻ&quot;: Các sự kiện bên ngoài chiếm 10%, nhưng cách</span></div>\n<p class=\"body-txt\">\nchúng ta phản ứng với chúng chiếm 90% và quyết định kết quả cuộc sống.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mục đích khi viết thư: Người viết cần xác định rõ mục tiêu (ví dụ: bán hàng) và dẫn dắt</span></div>\n<p class=\"body-txt\">\nđộc giả đến trang đích phù hợp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Quy trình viết thư quảng cáo hiệu quả:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Bước 1: Tìm một bức thư của bậc thầy viết thư làm "<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sức mạnh của &quot;từ khóa ma thuật&quot; kết hợp tính năng và lợi ích: Để tạo ra một bức thư</span></div>\n<p class=\"body-txt\">\nbán hàng thuyết phục, không chỉ cần liệt kê tính năng mà còn phải lồng ghép các &quot;từ\n \nkhóa ma thuật&quot; (Magic Keywords) mang năng lượng và cảm xúc tích cực, hướng đến lợi\n \ních khách hàng. Đây là kỹ thuật then chốt để chuyển đổi từ thông tin khô khan sang một\n \nthông điệp gây ảnh hưởng cảm xúc, thúc đẩy hành động mua hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Quy trình viết lặp lại và đọc to để tinh chỉnh: Việc đọc to bản nháp là một phương pháp</span></div>\n<p class=\"body-txt\">\nkiểm tra hiệu quả sự trôi chảy, dễ hiểu của văn bản. Kết hợp với việc đơn giản hóa cấu\n \ntrúc câu, thay thế từ khó bằng từ dễ hiểu hơn, và lặp lại quá trình này nhiều lần, người\n \nviết có thể nâng cao đáng kể chất lượng bài viết của mình. Điều này nhấn mạnh sự tỉ mỉ,\n \nkiên nhẫn và thử nghiệm thực tế trong copywriting.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Bản thân các sự kiện không mang năng lượng tiêu cực, mà chính cách chúng ta nhìn nó,\n \nchính cách chúng ta phản ứng với nó mới tạo nên những sự tiêu cực.”\n \n“Nếu bạn muốn có tiền, con đường chắc chắn đó là phải bán hàng. Nếu bạn muốn bán hàng,\n \nchắc chắn bạn cần đến &#x27;thứ này&#x27;.”\n \n“Đừng chờ đợi phép màu. Hãy đứng lên và hành động.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\nđể đảm bảo sự trôi chảy, tự nhiên, dễ hiểu và chính xác về ngữ pháp, tránh lỗi chính tả.\n \nNgắt câu dài, thay thế từ khó bằng từ dễ hiểu, và lặp lại việc tinh chỉnh cho đến khi nội\n \ndung đạt được hiệu quả cao nhất trong việc truyền tải thông điệp về hình ảnh kiến trúc.\n \n5.4 Thư bán hàng Promotion\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi giảng sử dụng hình ảnh &quot;mật mã&quot; hoặc &quot;thần chú&quot; từ các trò chơi điện tử</h3>\n<p class=\"body-txt\">\n(như &quot;Show me the money&quot; trong Warcraft) để minh họa một phương pháp hiệu quả trong\n \nkinh doanh: viết thư quảng cáo. Thầy Long giới thiệu cách thức mà ông đã phát triển để\n \nnhanh chóng tạo ra hàng ngàn bức thư quảng cáo chất lượng, giúp doanh nghiệp &quot;chiến\n \nthắng&quot; dễ dàng hơn. Cốt lõi của phương pháp này là phân tích và áp dụng cấu trúc, ngôn từ\n \ntừ các bức thư quảng cáo thành công, giống như việc sử dụng &quot;mật mã&quot; để đạt được kết quả\n \nvượt trội.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Buổi giảng bắt đầu bằng việc gợi nhớ các mã gian lận (cheat code) trong trò chơi điện tử</span></div>\n<p class=\"body-txt\">\nnhư `IDDQD` của Doom (chế độ bất tử) và `Show me the money` của Warcraft (tiền\n \nkhông giới hạn).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy Long đặt câu hỏi về việc liệu có một &quot;mật mã&quot; tương tự để &quot;thắng cuộc chơi&quot; trong</span></div>\n<p class=\"body-txt\">\nkinh doanh, đặc biệt là trong việc viết thư quảng cáo.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ông liên hệ việc muốn &quot;bắt đầu lại từ đầu&quot; trong game với mong muốn tương tự của</span></div>\n<p class=\"body-txt\">\nnhiều người trong kinh doanh khi họ khởi nghiệp, tìm kiếm sản phẩm/khách hàng mới.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy Long giới thiệu phương pháp của mình – một &quot;vũ khí có sẵn trên internet&quot; giúp</span></div>\n<p class=\"body-txt\">\nnhanh chóng tạo ra hàng ngàn bức thư quảng cáo hiệu quả, giúp tiết kiệm thời gian, tiền\n \nbạc và công sức.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ông đã chia sẻ phương pháp này qua một email có giá 4.99 đô la, và nhiều người đã đăng</span></div>\n<p class=\"body-txt\">\nký, giúp họ thay đổi cách viết thư quảng cáo hàng ngày.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nhiều người đã bỏ lỡ cơ hội này vì thái độ thờ ơ, dù chi phí không đáng kể.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sau một bức thư bán hàng (thư promotion), cần có một bức thư `chăm sóc` (follow-up)</span></div>\n<p class=\"body-txt\">\nđể nhắc lại và củng cố thông điệp của thư bán hàng trước đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phương pháp viết thư quảng cáo hiệu quả là nghiên cứu các bức thư thành công (`swai</span></div>\n<p class=\"body-txt\">\nprofile` - có thể là &quot;swipe file&quot;) để học hỏi `ngôn từ` (cách dùng từ) và `cấu trúc câu`.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nên tìm kiếm tài liệu tham khảo từ nhiều ngôn ngữ khác nhau (tiếng Anh, tiếng Nga,</span></div>\n<p class=\"body-txt\">\ntiếng Thổ Nhĩ Kỳ,...) vì nguồn tiếng Việt còn `nghèo nàn`.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Việc này bao gồm việc chụp hình, lưu lại và đánh dấu những nội dung hay để áp dụng.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sức mạnh của sự tương đồng và &quot;mật mã&quot; tâm lý: Thầy Long sử dụng hình ảnh &quot;mật mã&quot;</span></div>\n<p class=\"body-txt\">\ntrong game để đơn giản hóa và làm hấp dẫn một khái niệm phức tạp như viết thư quảng\n \ncáo. Điều này tạo ra một ấn tượng mạnh mẽ, khơi gợi sự tò mò và niềm tin rằng có một\n \n&quot;công thức bí mật&quot; để đạt được thành công nhanh chóng, giúp người nghe dễ dàng tiếp\n \nthu và áp dụng hơn.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tầm quan trọng của thư `chăm sóc` (follow-up email): Trong khi nhiều người tập trung</span></div>\n<p class=\"body-txt\">\nvào bức thư bán hàng đầu tiên, thầy Long nhấn mạnh vai trò không thể thiếu của các bức\n \nthư chăm sóc tiếp theo. Đây là yếu tố then chốt để củng cố thông điệp, duy trì tương tác\n \nvà dẫn dắt khách hàng đến quyết định mua hàng, cho thấy một chiến lược marketing\n \nliên tục và toàn diện.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chiến lược &quot;Swipe File&quot; (`swai profile`): Khái niệm thu thập, phân tích và học hỏi từ các</span></div>\n<p class=\"body-txt\">\nmẫu thư quảng cáo thành công (&quot;vũ khí có sẵn trên internet&quot;) là một cách tiếp cận cực\n \nkỳ thực tế và hiệu quả. Nó cho phép người viết không cần phải sáng tạo lại từ đầu mà có\n \nthể nhanh chóng nắm bắt các cấu trúc, ngôn từ đã được chứng minh là hiệu quả, giúp\n \ntiết kiệm thời gian và nâng cao chất lượng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tận dụng đa ngôn ngữ: Việc khuyến khích tìm kiếm tài liệu tham khảo từ nhiều ngôn</span></div>\n<p class=\"body-txt\">\nngữ khác nhau, không chỉ tiếng Việt, là một điểm nhìn chiến lược quan trọng. Điều này\n \ngiúp mở rộng nguồn tài nguyên, tiếp cận những ý tưởng và phong cách đa dạng, đặc biệt\n \nhữu ích khi thị trường nội địa còn hạn chế về tài liệu chất lượng cao.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Giá như họ biết câu thần chú `Show me the money` có lẽ họ không vất vả như vậy nữa.”\n \n“Tôi đã tiết lộ cách thức mà tôi sử dụng một loại vũ khí có sẵn trên internet để nhanh chóng\n \ntạo ra hàng ngàn bức thư quảng cáo.”\n \n“Tiền bạc, thời gian và công sức của tôi trong nhiều năm đã được đền đáp.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\n5.5 Chia sẻ sau bài học\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học tập trung vào việc ứng dụng sức mạnh của ngôn từ (đặc biệt là &quot;từ khóa</h3>\n<p class=\"body-txt\">\nma thuật&quot;) và cấu trúc nội dung có sẵn để viết email marketing hiệu quả. Thầy  nhấn mạnh tầm quan trọng của việc học hỏi từ các bậc thầy, không sao chép mà biến\n \nđổi, và đặc biệt là thay đổi bộ ngôn từ hàng ngày của bản thân để tạo ra cảm xúc và năng\n \nlượng tích cực, từ đó thúc đẩy thành công không chỉ trong kinh doanh mà cả trong cuộc\n \nsống.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy chia sẻ một phương pháp viết nội dung (email, video, post) dựa trên cấu trúc có</span></div>\n<p class=\"body-txt\">\nsẵn, giúp người học dễ dàng viết, không bị &quot;đau đầu&quot; và có được &quot;kịch bản&quot; hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nguyên tắc của cấu trúc này tương tự &quot;7 bước&quot; trong các bức thư mẫu, người học chỉ cần</span></div>\n<p class=\"body-txt\">\nđiền tính năng/nội dung của mình vào chỗ trống.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Để viết nội dung marketing (như email marketing cho khách hàng mục tiêu), tài nguyên</span></div>\n<p class=\"body-txt\">\nlà không giới hạn nếu biết cách &quot;follow&quot; những người làm giỏi trong content marketing\n \nvà kết hợp các &quot;hình tròn và hình vuông&quot; trong tập khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Việc học hỏi từ các &quot;bậc thầy&quot; không phải là sao chép, mà là &quot;viết lại&quot; bức thư của họ,</span></div>\n<p class=\"body-txt\">\n&quot;nhặt&quot; những từ khóa hay, những mạch nội dung phù hợp để tạo ra nội dung mới.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy cảnh báo về việc sử dụng những &quot;thuật ngữ không hay&quot; hoặc ngôn từ mang năng</span></div>\n<p class=\"body-txt\">\nlượng tiêu cực (ví dụ: &quot;hết hồn&quot;, &quot;mệt nhỉ&quot;) có thể ảnh hưởng xấu đến cảm xúc và hành\n \nđộng của bản thân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Năng lượng trong cuộc sống, kinh doanh, và các mối quan hệ đến từ &quot;cảm xúc tích cực&quot;.</span></div>\n<p class=\"body-txt\">\nĐể có cảm xúc tích cực, phải thay đổi &quot;ngôn từ mình sử dụng&quot; và &quot;bộ từ khóa&quot; của bản\n \nthân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khuyến khích sưu tập và chép vào một quyển sổ những &quot;từ khóa ma thuật&quot; (Magic Word</span></div>\n<p class=\"body-txt\">\n/ Power Word) mang năng lượng, cảm xúc tích cực từ những bức thư, nội dung hay của\n \nngười khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Việc đọc và sử dụng những &quot;bộ ngôn từ&quot; mới, tích cực hàng ngày sẽ giúp thay đổi bản</span></div>\n<p class=\"body-txt\">\nthân, các mối quan hệ xung quanh và cả cách người khác nhìn nhận mình trên các nền\n \ntảng như Facebook.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sức mạnh của Ngôn từ (Magic Word/Power Word): Thầy  nhấn mạnh</span></div>\n<p class=\"body-txt\">\nrằng từ khóa và ngôn từ chúng ta sử dụng có khả năng định hình cảm xúc, năng lượng cá\n \nnhân và ảnh hưởng trực tiếp đến kết quả kinh doanh, cuộc sống. Thay vì dùng những từ\n \ntiêu cực hoặc &quot;làm giảm độ sướng&quot;, việc tập trung sưu tập và sử dụng &quot;bộ từ khóa ma\n \nthuật&quot; mang năng lượng tích cực, mạnh mẽ sẽ tạo ra thay đổi lớn. Điều này quan trọng vì\n \nnó cung cấp một công cụ cụ thể, dễ thực hành để cải thiện hiệu quả giao tiếp marketing\n \nvà thái độ sống tích cực từ gốc rễ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Học hỏi Cấu trúc, không Sao chép nội dung: Thay vì cố gắng sáng tạo nội dung từ đầu,</span></div>\n<p class=\"body-txt\">\nthầy khuyến khích việc học hỏi cấu trúc bài viết (ví dụ: cấu trúc 7 bước trong email) từ\n \nnhững người thành công và các bậc thầy marketing. Sau đó, &quot;điền vào chỗ trống&quot;, &quot;nhặt\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\nnhững từ hay&quot; từ họ để điều chỉnh và tạo ra nội dung của riêng mình. Insight này giúp\n \nngười học có một khuôn mẫu vững chắc để bắt đầu, rút ngắn thời gian thử nghiệm, tăng\n \nhiệu quả ngay lập tức, đồng thời vẫn giữ được sự độc đáo và cá nhân hóa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mối liên hệ giữa Cảm xúc tích cực và Thành công toàn diện: Buổi giảng chỉ ra rằng thành</span></div>\n<p class=\"body-txt\">\ncông trong kinh doanh, làm ăn, có tiền hay các mối quan hệ cá nhân đều đòi hỏi &quot;tràn\n \nđầy năng lượng&quot; và &quot;cảm xúc tích cực&quot;. Nguồn gốc của những cảm xúc này lại đến từ\n \n&quot;ngôn từ chúng ta sử dụng&quot;. Insight này quan trọng vì nó mở rộng khái niệm marketing\n \nra khỏi các kỹ thuật đơn thuần, thành một triết lý sống và làm việc tích cực, giúp người\n \nhọc không chỉ giỏi về kỹ năng mà còn có một tinh thần bền vững để đối mặt và thành\n \ncông trong mọi lĩnh vực.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Đừng có dùng những cái cái từ mà nó làm giảm cái độ sướng của ta đi.”\n \n“Cuộc sống của chúng ta muốn làm thư quảng cáo, muốn kinh doanh, muốn làm ăn, muốn có\n \ntiền, muốn có người yêu ấy là phải tràn đầy năng lượng.”\n \n“Chúng ta sẽ thấy cuộc sống của chúng ta đã được thay đổi chỉ bằng việc thay đổi bộ ngôn từ\n \nmà chúng ta sử dụng hàng ngày.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thu "<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\n5.6 Bức thư của\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học phân tích sâu sắc về mối liên hệ giữa nội dung chúng ta tiếp xúc hàng</h3>\n<p class=\"body-txt\">\nngày (ví dụ: trên Facebook), sức khỏe đường ruột và trạng thái tinh thần/hạnh phúc. Thầy\n \ngiới thiệu hormone hạnh phúc Serotonin và tầm quan trọng của nó trong\n \nviệc điều tiết tâm trạng, chống trầm cảm. Ông nhấn mạnh Probiotic và sức khỏe đường ruột\n \nđóng vai trò then chốt trong việc sản sinh Serotonin, qua đó tác động trực tiếp đến trí tuệ,\n \nkhả năng học hỏi và tổng thể hạnh phúc cá nhân.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Facebook cá nhân phản ánh cuộc sống: những gì bạn nhìn thấy trên Facebook hàng ngày</span></div>\n<p class=\"body-txt\">\nchính là cuộc sống của bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Câu chuyện về việc thầy Long tự động ẩn các thông tin tiêu cực trên Facebook của mình,</span></div>\n<p class=\"body-txt\">\nvà việc học viên không xem video mà thầy gửi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Video buổi trưa của thầy nói về &quot;hormone hạnh phúc&quot; và liên quan đến các vấn đề xã hội</span></div>\n<p class=\"body-txt\">\nhiện tại như trầm cảm và trạng thái lưỡng cực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Serotonin là một trong bốn loại hormone hạnh phúc, là chất dẫn truyền thần kinh dẫn</span></div>\n<p class=\"body-txt\">\ntruyền có tác động mạnh mẽ tới trạng thái vui buồn, điều tiết tâm trạng và chống trầm\n \ncảm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Trầm cảm biểu hiện qua việc dễ buồn, lo lắng, không thấy hay ho, không có mục tiêu</span></div>\n<p class=\"body-txt\">\nsống, dù học được điều hay.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Lời khuyên: Nên đi thăm khám bác sĩ tâm lý hoặc bác sĩ thần kinh khi có vấn đề về tâm</span></div>\n<p class=\"body-txt\">\nlý; đừng lo lắng hay ngại ngùng vì bệnh tâm thần là một bệnh lý bình thường và phổ\n \nbiến.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Serotonin còn đóng vai trò quan trọng trong điều tiết sự thèm ăn, ham muốn tình dục và</span></div>\n<p class=\"body-txt\">\ngiảm căng thẳng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Các cách để tăng cường Serotonin bao gồm: suy nghĩ tích cực (nhìn vào những mặt tốt),</span></div>\n<p class=\"body-txt\">\ntắm nắng mặt trời, tập thể dục.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Serotonin được lưu trữ và hình thành chủ yếu (80%) trong đường tiêu hóa, tức là &quot;nằm</span></div>\n<p class=\"body-txt\">\nở đống ruột&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Probiotic (men vi sinh) là yếu tố quan trọng liên kết giữa ruột và não; những thay đổi</span></div>\n<p class=\"body-txt\">\ntrong ruột có thể ảnh hưởng trực tiếp đến não.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thói quen ăn uống không chỉ ảnh hưởng đến sức khỏe mà còn ảnh hưởng đến trí tuệ và</span></div>\n<p class=\"body-txt\">\nhạnh phúc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Các vi khuẩn đường ruột có thể tác động đến não và hệ thần kinh trung ương.</span></div> "<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là một triết lý cốt lõi về sự ảnh hưởng của môi trường thông tin</span></div>\n<p class=\"body-txt\">\nđến nhận thức và cuộc sống của mỗi cá nhân. Nó không chỉ là về mạng xã hội mà còn mở\n \nrộng ra toàn bộ nội dung chúng ta tiếp xúc. Trong bối cảnh internet marketing, insight\n \nnày nhắc nhở rằng mọi nội dung chúng ta tạo ra (hình ảnh, bài viết, video) đều góp phần\n \nđịnh hình &quot;cuộc sống&quot; và trải nghiệm của khách hàng/khán giả. Việc kiểm soát và cung\n \ncấp nội dung tích cực, giá trị là cực kỳ quan trọng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mối liên hệ sâu sắc giữa sức khỏe đường ruột và sức khỏe tâm thần (trục não-ruột).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Nhiều người thường tách rời sức khỏe thể chất và tinh thần. Insight</span></div>\n<p class=\"body-txt\">\nnày, thông qua việc giải thích vai trò của Serotonin (hormone hạnh phúc) được sản sinh\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">phần lớn ở đường ruột và tác động của Probiotic, đã kết nối chúng một cách khoa học và</h3>\n<p class=\"body-txt\">\nthực tiễn. Nó cung cấp một góc nhìn mới về cách cải thiện tâm trạng, trí tuệ và chống\n \ntrầm cảm thông qua việc chăm sóc sức khỏe đường ruột, làm mất đi sự kỳ thị đối với các\n \nvấn đề tâm lý.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Bạn phải hạnh phúc khi học được điều mới, chứ không phải là bạn đau khổ khi học</span></div>\n<p class=\"body-txt\">\nđược điều mới.&quot; (06:22)\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là một lời nhắc nhở quan trọng về mục tiêu và trạng thái tinh</span></div>\n<p class=\"body-txt\">\nthần trong quá trình học tập và phát triển. Nếu việc tiếp thu kiến thức hay kỹ năng mới\n \nmang lại cảm giác đau khổ, lo lắng, hoặc không có mục tiêu, thì đó có thể là dấu hiệu của\n \nmột vấn đề sức khỏe tâm thần cần được giải quyết. Hạnh phúc là thước đo cho sự &quot;bình\n \nthường&quot; và hiệu quả, khuyến khích chúng ta tìm kiếm những phương pháp học tập và\n \nmôi trường làm việc tích cực, hỗ trợ sức khỏe tinh thần.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Facebook của mình ấy, hàng ngày mình nhìn thấy cái gì trên Facebook, đó chính là cuộc sống\n \ncủa mình.”\n \n“Bạn phải hạnh phúc khi học được điều mới, chứ không phải là bạn đau khổ khi học được điều\n \nmới.”\n \n“Chăm sóc thằng em ruột để thằng anh não nó thông minh lên không?”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\nphúc&quot; hơn với tầm nhìn của họ, từ đó làm việc hiệu quả hơn và đưa ra quyết định tốt hơn,\n \ntránh được trạng thái &quot;đau khổ khi học được điều mới&quot; (khó hình dung, không hài lòng với\n \nthiết kế).\n \n5.7 Kịch bản bán hàng\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học này tập trung vào việc tạo dựng các hormone hạnh phúc trong cơ thể để</h3>\n<p class=\"body-txt\">\ncải thiện sức khỏe tinh thần, từ đó nâng cao hiệu suất làm việc và khả năng vượt qua khó\n \nkhăn trong các hoạt động như internet marketing. Thầy  nhấn mạnh mối\n \nliên hệ giữa sức khỏe đường ruột, chế độ ăn uống, vận động thể chất, và tiếp xúc với ánh\n \nnắng mặt trời với việc sản sinh các hormone Dopamine, Oxytocin, Serotonin và Endorphin.\n \nBằng cách chăm sóc tốt cơ thể, chúng ta có thể duy trì sự hưng phấn, sáng tạo và tránh bỏ\n \ncuộc khi đối mặt với những thử thách trong công việc.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy  yêu cầu học viên trình bày một kịch bản bán hàng cho sản phẩm</span></div>\n<p class=\"body-txt\">\nmình đang dùng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phân tích vấn đề xã hội:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mọi người đang căng thẳng vì giãn cách xã hội, thiếu tương tác vật lý (không ôm, không</span></div>\n<p class=\"body-txt\">\nbắt tay) dẫn đến thiếu hụt hormone Oxytocin.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Trẻ em học ở nhà chịu áp lực từ bố, mẹ, cô giáo, dẫn đến căng thẳng tột độ, có thể gây ra</span></div>\n<p class=\"body-txt\">\ncác biểu hiện tiêu cực như tự tử.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giải pháp thông thường (học viên đưa ra): Đi khám bác sĩ, kiểm tra sức khỏe và điều trị.</span></div>\n<p class=\"body-txt\">\n(Thầy diễn giả chỉnh sửa là cần kiểm tra sức khỏe *tâm thần*, không phải sức khỏe chung\n \nchung).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giải pháp của thầy  (bí quyết để có &quot;hormone hạnh phúc&quot;):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chăm sóc hệ thống đường ruột: Đây là bí mật mà ít người biết về sự liên quan giữa</span></div>\n<p class=\"body-txt\">\nđường ruột và chỉ số hạnh phúc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tạo ra Dopamine: Bằng cách tập thể dục (chạy bộ), đo đồng hồ để theo dõi con số, chính</span></div>\n<p class=\"body-txt\">\nlà cách giải phóng Dopamine, giúp tạo sự hưng phấn và kiên trì.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tạo ra Oxytocin: Thông qua các tương tác xã hội, ôm ấp, bắt tay để tạo ra cảm xúc, giúp</span></div>\n<p class=\"body-txt\">\nviết email hay và tràn đầy cảm xúc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tạo ra Endorphin: Hormone này dễ tạo ra, cần xem lại video thầy đã gửi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chế độ ăn uống:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ăn cá hồi để &quot;hồi não&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Bổ sung khẩu phần protein (hải sản như hào, cá hồi, hạt ngũ cốc).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chọn ăn những con vật được chăm sóc đặc biệt, chăn nuôi, theo dõi sức khỏe (không ăn</span></div>\n<p class=\"body-txt\">\nthú rừng, hoang dã vì nguy cơ virus, vi khuẩn, làm &quot;đầu ngu đi&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ăn sô cô la, ăn ớt (nếu không ăn được thì học cách ăn).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tập thể dục: Tập theo đồng hồ để theo dõi và duy trì.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tiếp xúc ánh nắng: Chạy dưới nắng giúp não thông minh hơn (ngược lại, người &quot;cớm</span></div>\n<p class=\"body-txt\">\nnắng&quot; sẽ không viết email ra gì).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mối liên hệ với Email Marketing và Kinh doanh:</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khi thiếu các hormone hạnh phúc (Dopamine, Serotonin, Oxytocin), con người dễ thấy</span></div>\n<p class=\"body-txt\">\nemail marketing, internet, kinh doanh hay viết thư là &quot;khó&quot; và dễ dàng bỏ cuộc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Việc sản sinh đủ các hormone này sẽ giúp duy trì sự hưng phấn, không bỏ cuộc, và làm</span></div>\n<p class=\"body-txt\">\nviệc hiệu quả hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kết luận: Để có hormone hạnh phúc, cần xem kỹ video thầy đã gửi, làm theo hướng dẫn,</span></div>\n<p class=\"body-txt\">\năn sạch, uống sạch, ngủ sạch, tập thể dục và ra nắng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sức khỏe thể chất là nền tảng của thành công tinh thần và kinh doanh: Thầy Long không</span></div>\n<p class=\"body-txt\">\nchỉ dạy marketing mà đi sâu vào gốc rễ sinh học, chỉ ra rằng việc chăm sóc đường ruột,\n \ntập thể dục, ăn uống khoa học không chỉ để khỏe mạnh mà còn trực tiếp tạo ra các\n \nhormone hạnh phúc. Các hormone này quyết định sự hưng phấn, kiên trì, khả năng sáng\n \ntạo và thành công trong công việc. Điểm này rất quan trọng vì nó cung cấp một góc nhìn\n \ntoàn diện, rằng thành công không chỉ dựa vào kỹ năng mà còn là nền tảng sức khỏe tinh\n \nthần và thể chất.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tầm quan trọng của Dopamine và Oxytocin trong việc duy trì động lực và sự sáng tạo:</span></div>\n<p class=\"body-txt\">\nBuổi học làm rõ rằng sự nản chí và bỏ cuộc khi thấy việc khó khăn (như email\n \nmarketing) thường do thiếu hụt các hormone này. Dopamine từ vận động giúp tạo sự\n \nhưng phấn và kiên trì, trong khi Oxytocin từ tương tác xã hội giúp tạo cảm xúc và gắn\n \nkết. Điều này quan trọng vì nó đưa ra một &quot;lý do khoa học&quot; đằng sau sự nản chí và chỉ ra\n \ncách khắc phục cụ thể thông qua các hành động sinh lý đơn giản, trực tiếp ảnh hưởng\n \nđến chất lượng công việc và tinh thần.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Quy tắc &quot;ăn sạch, uống sạch, ngủ sạch&quot; và tiếp xúc với ánh nắng mặt trời để tối ưu hóa</span></div>\n<p class=\"body-txt\">\nnão bộ: Thầy diễn giả nhấn mạnh rằng việc lựa chọn thực phẩm (động vật chăn nuôi, cá hồi,\n \nprotein), các thói quen sinh hoạt cơ bản (tập thể dục theo đồng hồ, chạy dưới nắng) ảnh\n \nhưởng trực tiếp đến chức năng não bộ, khả năng tư duy và làm việc hiệu quả. Đây là\n \nnhững lời khuyên rất thực tế, dễ áp dụng hàng ngày mà nhiều người thường bỏ qua,\n \nnhưng lại có tác động lớn đến hiệu suất làm việc, sự minh mẫn và tinh thần chiến đấu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Giải pháp ở đây là chăm sóc hệ thống đường ruột. Bởi vì cái bí mật ở đây là không ai, rất ít\n \nngười biết cái sự liên quan giữa đường ruột và chỉ số hạnh phúc đúng không?”\n \n“Vậy thì muốn tạo ra được cái sự hưng phấn nhất thời thì mình phải tạo ra được Endorphin.\n \nVà mình muốn tạo ra những cái email hay, tràn đầy cảm xúc thì mình phải có Oxytocin.”\n \n“Mình thấy email khó, mình thấy internet khó, mình thấy kinh doanh khó, mình thấy viết thư\n \nkhó là vì mình không có được những cái hormone hạnh phúc này trong cuộc đời của mình.”\n \n“Cứ chọn sâu chọn bọ mà ăn tôi thấy các ông kinh thật.”\n \n“Cớm nắng viết email ra gì đâu.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\nĐể FUTAGO tối ưu hóa năng suất và sự sáng tạo của nhân viên trong việc diễn họa kiến trúc\n \n(render 3D) và hiệu quả trong các hoạt động marketing B2B tới khách Nhật (KTS/thiết\n \nkế/công ty xây dựng), có thể áp dụng các gợi ý sau:\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nâng cao năng lực sáng tạo và sự tỉ mỉ trong diễn họa: Khuyến khích chế độ ăn uống</span></div>\n<p class=\"body-txt\">\nlành mạnh, giàu protein, cá hồi, hạt ngũ cốc (như thầy diễn giả nói) để nuôi dưỡng não bộ và\n \nđường ruột. Một tinh thần minh mẫn, khả năng tập trung cao sẽ giúp các render artist\n \ncủa FUTAGO tạo ra những hình ảnh kiến trúc chất lượng cao hơn, chi tiết hơn và có\n \nchiều sâu cảm xúc, đáp ứng được yêu cầu khắt khe của khách hàng Nhật.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tăng cường sự kiên trì và hiệu quả trong công việc: Tổ chức các hoạt động thể dục (ví</span></div>\n<p class=\"body-txt\">\ndụ: chạy bộ, đi bộ dưới nắng) để giúp nhân viên giải phóng Dopamine và Endorphin.\n \nĐiều này sẽ giúp giảm căng thẳng, tăng cường sự hưng phấn và kiên trì, giúp nhân viên\n \nvượt qua những dự án render phức tạp, thời hạn gấp gáp, hoặc những yêu cầu chỉnh sửa\n \nliên tục từ khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cải thiện tương tác và tạo dựng mối quan hệ: Tạo môi trường làm việc cởi mở, khuyến</span></div>\n<p class=\"body-txt\">\nkhích giao tiếp và các hoạt động gắn kết nhóm để tăng Oxytocin. Điều này không chỉ giúp\n \nnhân viên phối hợp hiệu quả trong nội bộ để sản xuất các hình ảnh kiến trúc tốt nhất, mà\n \ncòn giúp đội ngũ sales/marketing của FUTAGO tạo ra những email hay, &quot;tràn đầy cảm\n \nxúc&quot; và những nội dung quảng bá dịch vụ diễn họa thu hút hơn khi tiếp cận khách hàng\n \nNhật, xây dựng mối quan hệ bền vững hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Vượt qua khó khăn trong marketing: Nếu đội ngũ marketing của FUTAGO cảm thấy</span></div>\n<p class=\"body-txt\">\n&quot;email khó&quot; hoặc &quot;kinh doanh khó&quot; khi tiếp thị dịch vụ diễn họa, việc áp dụng các\n \nnguyên tắc về dinh dưỡng, vận động, và gắn kết xã hội sẽ giúp họ duy trì năng lượng tích\n \ncực, tìm kiếm những giải pháp sáng tạo hơn thay vì bỏ cuộc. Một não bộ khỏe mạnh nhờ\n \năn uống và tiếp xúc ánh nắng cũng giúp họ phân tích thị trường Nhật và đưa ra các chiến\n \nlược hiệu quả hơn.\n \n5.8 Viết email theo phương pháp Swipe\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học này tập trung vào cách viết email marketing hiệu quả, nhấn mạnh việc sử</h3>\n<p class=\"body-txt\">\ndụng các từ khóa tích cực, ma thuật để thu hút cảm xúc của người đọc. Thầy hướng dẫn cách\n \ntạo và sử dụng &quot;hồ sơ swipe&quot; (swipe files) – bộ sưu tập các nội dung marketing hay – nhưng\n \nvới nguyên tắc vàng là phải biên tập lại chứ không được sao chép. Thông điệp cốt lõi là\n \nkhông nên giới hạn bản thân trong marketing internet, dù là về ngôn ngữ, sản phẩm hay địa\n \nlý, và có thể ứng dụng các chiến lược đa ngôn ngữ để mở rộng tầm với.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ôn tập buổi 1: Cấu trúc tổng thể.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ôn tập buổi 2: Cấu trúc nội dung, tra cứu từ khóa để tìm từ khóa người dùng, bắt đầu từ</span></div>\n<p class=\"body-txt\">\nsản phẩm và đi ngược lại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ôn tập buổi 3: Các loại email, cấu trúc cài đặt email, cài đặt hệ thống email marketing</span></div>\n<p class=\"body-txt\">\n(hướng dẫn tự tìm kiếm GetResponse nếu không làm được).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Buổi 4 (Hôm nay): Cụ thể là viết một email.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cấu trúc email: Sử dụng 3 loại từ – từ khóa phép màu, từ khóa ma thuật, từ khóa mạnh,</span></div>\n<p class=\"body-txt\">\ntừ khóa mang cảm xúc tích cực (gọi chung là từ khóa tích cực).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cách tìm từ khóa tích cực:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đọc hàng ngày, thấy từ nào hay thì viết vào cuốn sổ tay của mình (gọi là Power Word).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Follow (theo dõi)  và những người khác trên mạng internet, bất kỳ</span></div>\n<p class=\"body-txt\">\nngôn ngữ nào.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Lưu ý khi dịch: Không dịch từ theo từ. Quan trọng là lấy được những từ khóa mà nó</span></div>\n<p class=\"body-txt\">\nkhiến cho chúng ta rung động, chú ý, có những cảm xúc tích cực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hai tài liệu quan trọng để bán một món hàng: Bảng tính năng và bảng lợi ích.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Quy trình viết email bán hàng: Lồng những từ khóa của tính năng + tạo ra lợi ích + từ</span></div>\n<p class=\"body-txt\">\nkhóa ma thuật + cấu trúc của một bức thư bán hàng = &quot;hồ sơ swipe&quot; (swipe files).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hồ sơ swipe: Là tập hợp của những mẫu thư quảng cáo, tập hợp của những bài viết hay,</span></div>\n<p class=\"body-txt\">\ntập hợp của những content, những nội dung hấp dẫn đối với chúng ta.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cách sử dụng hồ sơ swipe: Sưu tầm nó lại, biên tập nó lại.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cảnh báo quan trọng: Tuyệt đối không bao giờ được copy và paste.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Lợi ích của phương pháp này: Chúng ta có thể trở thành bậc thầy viết văn ngay cả khi</span></div>\n<p class=\"body-txt\">\nchúng ta rất dốt.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ minh họa: Cách Đào Thanh Tú xây dựng kênh YouTube bằng tiếng Brazil (Bồ Đào</span></div>\n<p class=\"body-txt\">\nNha) ngay cả khi anh ấy không biết tiếng Bồ Đào Nha.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thuê người viết nội dung bằng tiếng Việt.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Dùng Google Dịch sang tiếng Bồ Đào Nha.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nhờ nhà viết văn Bồ Đào Nha (biên tập viên) biên tập lại.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nhờ người có giọng đọc Bồ Đào Nha hay đọc lại nội dung.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuyển nó thành video.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thông điệp mở rộng: Với các công cụ trên internet, đừng giới hạn mình trong một ngôn</span></div>\n<p class=\"body-txt\">\nngữ, loại sản phẩm đang kinh doanh, địa bàn đang ở, hay tiếng Việt/tiếng Anh. Không có\n \ngiới hạn nào cho internet hết.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Lưu ý về hỗ trợ kỹ thuật: Nếu có khó khăn về cài đặt (setup), thầy sẽ có buổi hướng dẫn</span></div>\n<p class=\"body-txt\">\nriêng, không tính vào 8 buổi học chính.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sức mạnh của Từ khóa Cảm xúc và Lợi ích: Buổi học nhấn mạnh rằng email marketing</span></div>\n<p class=\"body-txt\">\nhiệu quả không chỉ là liệt kê tính năng mà phải kết hợp các từ khóa &quot;ma thuật&quot; và tập\n \ntrung vào lợi ích mà sản phẩm mang lại. Điều này quan trọng vì nó chuyển đổi thông\n \nđiệp từ việc &quot;bán sản phẩm&quot; sang &quot;giải quyết vấn đề&quot; hoặc &quot;tạo giá trị cảm xúc&quot; cho\n \nkhách hàng, giúp thu hút sự chú ý và tạo kết nối mạnh mẽ hơn, khiến khách hàng &quot;rung\n \nđộng&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phương pháp &quot;Hồ sơ Swipe&quot; đi kèm với Biên tập chủ động: Khái niệm hồ sơ swipe – thu</span></div>\n<p class=\"body-txt\">\nthập các nội dung marketing hay – là một kho tài liệu quý giá. Tuy nhiên, điểm đắt giá\n \nnhất là lời cảnh báo &quot;Tuyệt đối không bao giờ được copy và paste&quot;, mà phải &quot;biên tập\n \nlại&quot;. Điều này dạy rằng học hỏi từ người giỏi không phải là sao chép mà là phân tích, hiểu\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\ncấu trúc và tinh thần, sau đó điều chỉnh để phù hợp với giọng điệu và mục tiêu của riêng\n \nmình, từ đó phát triển kỹ năng viết lách độc đáo.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tư duy &quot;Không giới hạn&quot; trên Internet: Ví dụ về việc xây dựng kênh YouTube đa ngôn</span></div>\n<p class=\"body-txt\">\nngữ mà không biết ngôn ngữ đó, cùng với lời khẳng định &quot;Không có giới hạn nào cho\n \ninternet hết&quot;, là một insight cực kỳ mạnh mẽ. Nó mở rộng tư duy về tiềm năng thị\n \ntrường và cách tiếp cận. Điều này quan trọng vì nó khuyến khích các marketer vượt qua\n \nnhững rào cản tưởng chừng như cố định (ngôn ngữ, địa lý, sản phẩm) để khai thác tối đa\n \nsức mạnh của internet, sử dụng các công cụ và chiến lược sáng tạo để tiếp cận bất kỳ đối\n \ntượng nào trên thế giới.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Chỉ cần cái từ khóa tìm kiếm người dùng đang tìm kiếm cái gì thì chúng ta hoàn toàn có thể\n \ntạo ra nội dung của cái đó.”\n \n“Tuyệt đối không bao giờ được copy và paste.”\n \n“Không có giới hạn nào cho internet hết.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\n5.9 Cấu trúc mẫu hệ thống Email Markeing 4 usd\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi giảng tập trung vào việc thiết kế và triển khai các chuỗi email marketing theo</h3>\n<p class=\"body-txt\">\ndõi (follow-up sequences) một cách hiệu quả. Nội dung buổi học nhấn mạnh tầm quan trọng\n \ncủa việc cá nhân hóa, hiểu rõ tâm lý khách hàng để tạo ra các &quot;chiêu thức&quot; tương tác, và tối\n \nưu hóa nội dung email để tránh bộ lọc spam. Thầy Long cũng hướng dẫn quy trình tạo nội\n \ndung đa ngôn ngữ và cách tận dụng các nguồn lực có sẵn trên internet để xây dựng hệ thống\n \nemail marketing giá trị.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cấu trúc chuỗi email theo dõi: Thiết kế các chuỗi email với cấu trúc cụ thể (ví dụ: 3 thư</span></div>\n<p class=\"body-txt\">\ntrong 3 ngày đầu, 3 thư trong 7 ngày tiếp theo), sử dụng các &quot;thư số 0&quot;, &quot;thư 1&quot;, &quot;thư 2&quot;\n \nđể dễ quản lý.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nguyên tắc tạo giá trị: Luôn tạo ra giá trị cao hơn trong mỗi email gửi đi, không ngừng</span></div>\n<p class=\"body-txt\">\nlàm mới nội dung và giao diện để thích ứng với sự thay đổi liên tục của nền tảng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kỹ thuật viết thư hiệu quả:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thay vì dịch từng từ, hãy đọc và gạch chân những từ khóa, cụm từ khiến chúng ta &quot;rung</span></div>\n<p class=\"body-txt\">\nđộng&quot;, &quot;chú ý&quot;, có &quot;cảm xúc tích cực&quot; từ nội dung gốc (kể cả khi đã dùng Google Dịch).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Có thể trở thành bậc thầy viết văn ngay cả khi không giỏi, bằng cách học hỏi và áp dụng</span></div>\n<p class=\"body-txt\">\ncác nguyên tắc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Quy trình tạo nội dung đa ngôn ngữ (ví dụ YouTube kênh tiếng Bồ Đào Nha): Thuê</span></div>\n<p class=\"body-txt\">\nngười viết nội dung bằng tiếng Việt, dùng Google Dịch sang ngôn ngữ đích, nhờ người\n \nbản xứ chuyên nghiệp biên tập lại, sau đó nhờ người có giọng đọc hay bản xứ đọc/thu\n \nâm video.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cá nhân hóa để tăng tương tác và quản lý:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sử dụng tên người nhận trong tiêu đề email (ví dụ: &quot;chữ name&quot;) để tạo sự khác biệt, giúp</span></div>\n<p class=\"body-txt\">\nphân loại thư phản hồi cá nhân và tăng khả năng người nhận sẽ phản hồi tích cực (&quot;cảm\n \nơn thầy&quot;, &quot;hay quá&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tránh việc tất cả thư phản hồi bị gộp chung vào một chỗ, gây khó khăn trong việc đọc và</span></div>\n<p class=\"body-txt\">\nxử lý.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tránh bộ lọc spam:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email cần viết đơn giản, không sử dụng màu sắc rực rỡ, không in đậm, không viết hoa</span></div>\n<p class=\"body-txt\">\nquá nhiều.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Quan trọng nhất là không chứa các từ khóa bị nghi ngờ là spam.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Không sao chép y nguyên thư của người khác vì dễ dính các từ khóa spam.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hiểu và vận dụng tâm lý khách hàng:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Dự đoán hành vi của người đọc (ví dụ: họ sẽ đóng lại thư tiếng Anh, họ sẽ nghĩ nội dung</span></div>\n<p class=\"body-txt\">\nkhông liên quan đến mình dù có giá trị).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thiết kế các thư follow-up để &quot;chọc ghẹo&quot; tâm lý người đọc, khuyến khích họ thực hiện</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">hành động mong muốn (ví dụ: đọc, dịch thư, xem lại nội dung).</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tận dụng nguồn lực có sẵn: Mọi thứ đều có sẵn trên internet, quan trọng là biết cách tìm</span></div>\n<p class=\"body-txt\">\nkiếm, sao chép và chỉnh sửa nội dung cho phù hợp.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mẹo kỹ thuật: Sử dụng tổ hợp phím Ctrl+Shift+V để dán văn bản mà không bị dính định</span></div>\n<p class=\"body-txt\">\ndạng gốc, giữ cho nội dung email &quot;sạch&quot; và chuyên nghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mục tiêu cuối cùng của khóa học: Học IPS dành cho người có thể xây dựng hệ thống, học</span></div>\n<p class=\"body-txt\">\nSales Success cho người không làm được hệ thống hoặc cần nền tảng cơ bản hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cá nhân hóa chiến lược dựa trên tâm lý khách hàng: Buổi giảng không chỉ dừng lại ở các</span></div>\n<p class=\"body-txt\">\nkỹ thuật gửi email mà còn đi sâu vào việc dự đoán và tác động tâm lý người nhận. Việc\n \nthêm tên vào email, thiết kế các thư &quot;chọc ghẹo&quot; dựa trên việc người dùng có thể đóng\n \nthư tiếng Anh, hay bỏ qua nội dung 2 tỷ đô vì nghĩ không liên quan, cho thấy sự hiểu biết\n \nsâu sắc về hành vi con người. Điều này quan trọng vì trong môi trường thông tin bão\n \nhòa, việc chạm đến tâm lý và khiến khách hàng cảm thấy nội dung &quot;dành cho mình&quot; là\n \nyếu tố then chốt để tạo ra sự khác biệt và thúc đẩy hành động.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tạo giá trị liên tục và khả năng thích ứng: Nguyên tắc &quot;luôn luôn phải tạo ra những giá</span></div>\n<p class=\"body-txt\">\ntrị cao hơn&quot; cùng với việc phải liên tục &quot;tạo mới&quot; vì giao diện và công cụ thay đổi liên tục\n \nlà một insight đắt giá. Trong internet marketing, sự đổi mới và giá trị liên tục là yếu tố\n \nsống còn để giữ chân khách hàng và vượt qua đối thủ. Đồng thời, việc &quot;mò ra&quot; giải pháp\n \nkhi chưa làm được cho thấy tinh thần chủ động và không ngừng học hỏi là cần thiết.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chiến lược chống spam và tối ưu hóa hiển thị: Các hướng dẫn chi tiết về việc viết email</span></div>\n<p class=\"body-txt\">\nkhông màu mè, không in đậm/viết hoa quá mức, và đặc biệt là tránh các từ khóa bị nghi\n \nngờ là spam, là cực kỳ quan trọng. Dù nội dung có hay đến mấy, nếu thư không đến được\n \nhộp thư đến của khách hàng mà chui vào thư rác, mọi nỗ lực đều vô nghĩa. Việc nhấn\n \nmạnh không &quot;chép y nguyên thư người khác&quot; cũng là lời khuyên giá trị để duy trì tính\n \nđộc đáo và tránh các rủi ro kỹ thuật.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Luôn luôn phải tạo ra những giá trị cao hơn.”\n \n“Mình phải biết được là cái con người nó sẽ là như thế.”\n \n“Không làm nữa thì làm kinh doanh làm cái gì? Nghỉ!”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thư 3 (sau 7-10 ngày): Chia sẻ một câu chuyện thành công (case study) về việc FUTAGO</span></div>\n<p class=\"body-txt\">\nđã giúp một đối tác Nhật Bản tương tự tối ưu hóa quy trình thiết kế hoặc marketing\n \nbằng hình ảnh 3D chất lượng cao. Áp dụng yếu tố tâm lý: &quot;Bạn có thể đã tìm hiểu nhiều\n \nđối tác diễn họa, nhưng liệu bạn đã thấy được sự khác biệt trong việc thấu hiểu tinh thần\n \nvà yêu cầu khắt khe của kiến trúc Nhật Bản?&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thư 4 (sau 15-20 ngày): Cung cấp tài nguyên giá trị (ví dụ: &quot;Hướng dẫn chọn đối tác</span></div>\n<p class=\"body-txt\">\ndiễn họa 3D hiệu quả,&quot; &quot;Các phong cách diễn họa được ưa chuộng tại Nhật Bản&quot;) dưới\n \ndạng PDF hoặc bài blog.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mỗi email đều được viết bằng tiếng Nhật chuyên nghiệp, sử dụng tên công ty/người liên</span></div>\n<p class=\"body-txt\">\nhệ của khách hàng để tăng tính cá nhân hóa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tối ưu hóa nội dung email để tránh spam và phù hợp văn hóa Nhật Bản:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tất cả email gửi đi cần được trình bày một cách đơn giản, chuyên nghiệp, không màu</span></div>\n<p class=\"body-txt\">\nmè, không quá nhiều chữ in đậm hoặc in hoa, đúng theo phong cách và chuẩn mực giao\n \ntiếp kinh doanh của người Nhật.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nội dung cần tập trung vào giá trị mà FUTAGO mang lại trong lĩnh vực diễn họa kiến</span></div>\n<p class=\"body-txt\">\ntrúc, không sử dụng các từ ngữ mang tính &quot;quảng cáo lố&quot; hoặc từ khóa bị nghi ngờ spam\n \ntrong tiếng Nhật.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Viết nội dung rõ ràng, ngắn gọn, trực tiếp, tập trung vào những gì khách hàng B2B Nhật</span></div>\n<p class=\"body-txt\">\nquan tâm: chất lượng, độ chính xác, thời gian giao hàng, khả năng thấu hiểu dự án.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đảm bảo ngữ pháp và văn phong tiếng Nhật hoàn hảo, tốt nhất là được kiểm tra bởi</span></div>\n<p class=\"body-txt\">\nngười bản xứ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tận dụng nội dung có sẵn và quy trình đa ngôn ngữ (nếu mở rộng thị trường):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sử dụng các tài nguyên hình ảnh (render 3D) và case study đã có của FUTAGO để làm</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">nội dung cho email. &quot;Mọi thứ đều có sẵn trên internet&quot; nghĩa là các hình ảnh, dự án cũ đã</h3>\n<p class=\"body-txt\">\nhoàn thành là nguồn tài nguyên quý giá để làm ví dụ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nếu FUTAGO có kế hoạch mở rộng ra ngoài thị trường Nhật Bản (ví dụ: thị trường nói</span></div>\n<p class=\"body-txt\">\ntiếng Anh), quy trình tạo nội dung đa ngôn ngữ của thầy Long sẽ rất hữu ích:\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Viết nội dung gốc (ví dụ: về một dự án diễn họa nổi bật) bằng tiếng Nhật.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Dịch sang tiếng Anh (hoặc ngôn ngữ khác).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nhờ biên tập viên bản xứ (người nói tiếng Anh) chỉnh sửa, tối ưu hóa từ ngữ chuyên</span></div>\n<p class=\"body-txt\">\nngành và tránh các yếu tố spam tiếng Anh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sau đó, có thể tạo các video case study với giọng đọc của người bản xứ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mục tiêu là đảm bảo thông điệp về dịch vụ diễn họa kiến trúc chất lượng cao của</span></div>\n<p class=\"body-txt\">\nFUTAGO được truyền tải rõ ràng, chuyên nghiệp và hiệu quả đến mọi thị trường tiềm\n \nnăng.\n \n5.10 Học viên chia sẻ bài học\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học này tập trung vào việc ứng dụng email marketing một cách hệ thống và</h3>\n<p class=\"body-txt\">\nbài bản để xây dựng, duy trì mối quan hệ với khách hàng và thúc đẩy kinh doanh. Thầy\n \nnhấn mạnh tầm quan trọng của việc chuẩn bị kỹ lưỡng (luyện súng)\n \ntrước khi thực hiện các chiến dịch (ra trận), và khuyến khích học viên hành động, áp dụng\n \nngay lập tức những kiến thức nền tảng thay vì trì hoãn. Các học viên chia sẻ cách họ sẽ ứng\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\ndụng email để chăm sóc khách hàng cũ, tìm kiếm khách hàng tiềm năng, nhắc nhở thanh\n \ntoán và hoàn thiện hệ thống marketing của mình.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cách thức chia sẻ hiệu quả: Thầy Long khuyến khích học viên giới thiệu bản thân, trình</span></div>\n<p class=\"body-txt\">\nbày rõ ràng về những gì đã học, cách sẽ áp dụng và những khó khăn còn gặp phải, thay vì\n \nchỉ nói vài câu. Việc này giúp xây dựng mối quan hệ và thể hiện sự chuyên nghiệp của\n \nmột marketer.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ứng dụng email marketing trong chăm sóc khách hàng:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chăm sóc khách hàng cũ và khách hàng tiềm năng một cách có hệ thống, thay vì thủ</span></div>\n<p class=\"body-txt\">\ncông.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tự động hóa việc nhắc nhở các sự kiện quan trọng như ngày kỷ niệm hợp đồng, hạn</span></div>\n<p class=\"body-txt\">\nthanh toán để duy trì mối quan hệ và giữ chân khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nâng cao hiệu quả của các quy trình marketing hiện có, biến email marketing thành một</span></div>\n<p class=\"body-txt\">\nkênh quan trọng để phát triển và hoàn thiện hệ thống marketing.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tận dụng email để tìm kiếm và chăm sóc khách hàng bất động sản: Sử dụng email để tìm</span></div>\n<p class=\"body-txt\">\nkiếm khách hàng tiềm năng, chăm sóc khách hàng đã có, và nhắc nhở các đợt thanh toán\n \ncho sản phẩm khách hàng đã mua, khắc phục những sai sót và quên sót khi làm thủ công.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sử dụng từ khóa tích cực và ngôn ngữ thuyết phục: Học cách lồng ghép các từ khóa tích</span></div>\n<p class=\"body-txt\">\ncực, &quot;phép màu&quot;, &quot;ma thuật&quot; vào email để truyền tải lợi ích và giải pháp, từ đó phục vụ\n \nkhách hàng tốt hơn và tăng tỷ lệ chuyển đổi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tầm quan trọng của hành động và học tập liên tục: Thầy Long nhấn mạnh việc mua và</span></div>\n<p class=\"body-txt\">\nhọc các khóa học nền tảng (ví dụ: combo 9 khóa) ngay lập tức là rất quan trọng để xây\n \ndựng năng lượng, cảm xúc mạnh (thông qua thân thể, tập trung, câu chuyện ngôn từ) và\n \ncác kỹ năng cơ bản. Trì hoãn việc học và áp dụng sẽ kéo dài thời gian đạt được thành\n \ncông.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuẩn bị hệ thống trước khi triển khai: Analogy &quot;luyện súng đã rồi mới ra trận&quot; (phải có</span></div>\n<p class=\"body-txt\">\nvũ khí, luyện vũ khí trước khi ra trận) để khuyên học viên chuẩn bị chiến lược, hệ thống\n \nvà kỹ năng một cách bài bản trước khi thực sự triển khai các chiến dịch marketing.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hệ thống hóa email marketing để xây dựng và duy trì mối quan hệ: Việc chuyển từ chăm</span></div>\n<p class=\"body-txt\">\nsóc khách hàng thủ công sang tự động hóa bằng email marketing là cực kỳ quan trọng.\n \nNó giúp đảm bảo sự nhất quán, chuyên nghiệp và hiệu quả trong việc tiếp cận khách\n \nhàng tiềm năng, chăm sóc khách hàng cũ, và nhắc nhở các thông tin quan trọng. Điều này\n \nkhông chỉ tiết kiệm thời gian, giảm thiểu sai sót mà còn tạo dựng niềm tin và sự gắn kết\n \nlâu dài, vốn là cốt lõi của marketing.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tư duy hành động và học tập không trì hoãn: Thầy Long kiên quyết thúc đẩy học viên</span></div>\n<p class=\"body-txt\">\nmua và học các khóa học nền tảng ngay lập tức, ví dụ như combo 9 khóa học, thay vì chờ\n \nđợi hay học từng chút một. Đây là insight quan trọng vì nó nhấn mạnh rằng việc trang bị\n \nkiến thức và kỹ năng cơ bản (như xây dựng năng lượng, cảm xúc mạnh) là nền tảng thiết\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\nyếu để thành công. Trì hoãn việc học và thực hành sẽ cản trở tốc độ phát triển và khả\n \nnăng &quot;ra trận&quot; hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Marketing là nghệ thuật truyền tải giá trị thông qua ngôn ngữ: Buổi học làm rõ rằng</span></div>\n<p class=\"body-txt\">\nemail marketing không chỉ là công cụ gửi thư mà là phương tiện để truyền tải lợi ích,\n \ngiải pháp và xây dựng mối quan hệ. Việc sử dụng các &quot;từ khóa phép màu&quot;, &quot;ma thuật&quot;\n \nhay việc yêu cầu học viên trình bày &quot;hẳn hoi&quot; đều xoay quanh việc nắm vững cách dùng\n \nngôn từ để kết nối cảm xúc, thuyết phục khách hàng và củng cố hình ảnh thương hiệu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Mình học marketing là mình học xây dựng mối quan hệ.”\n \n“Bạn ơi, đã qua 2 năm rồi, bây giờ bạn chết bạn tự tử là được hợp đồng ấy.”\n \n“Phải có vũ khí, rồi luyện vũ khí, sau đó mới ra trận chứ? Bây giờ tội gì mà ra trận sớm?”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Chương 7</h3>\n<p class=\"body-txt\">\n6.1 Landingpage đầu tiên của  đơn giản hiệu quả cao\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học này  chia sẻ về trải nghiệm tạo ra landing page đầu tiên</h3>\n<p class=\"body-txt\">\ncủa ông vào khoảng năm 2005-2007. Dù landing page này có thiết kế đơn giản, thậm chí\n \n&quot;xấu xí&quot; và &quot;ngô nghê&quot; nhưng lại là nền tảng cho sự thành công trong việc thu thập thông tin\n \nkhách hàng tiềm năng. Điểm cốt lõi là tầm quan trọng của việc *hành động* và *tạo ra* một\n \ncông cụ marketing cơ bản như landing page, thay vì chỉ suy nghĩ và đặt câu hỏi. Thầy Long\n \nnhấn mạnh sự khác biệt của landing page của ông là việc sử dụng hình ảnh ngón tay trỏ để\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\nhướng sự chú ý của người xem đến form đăng ký, một ý tưởng được lấy cảm hứng từ quan\n \nsát đời sống thường ngày.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">(diễn giả) giới thiệu về chủ đề email marketing và thành quả tạo landing</span></div>\n<p class=\"body-txt\">\npage của học viên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ông chia sẻ landing page đầu tiên của mình, được tạo ra từ khoảng năm 2005-2007 trên</span></div>\n<p class=\"body-txt\">\nmột chuyến bay từ Sài Gòn ra.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mô tả landing page:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tiêu đề: &quot;Bí mật của sự giàu có&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nội dung: Giải thích lý do tại sao một số người giàu có, số khác nghèo khó.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cấu trúc: Hộp điền email và tên, nút &quot;nhận sách ngay&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Các thành phần phụ: Mũi tên đỏ &quot;quà tặng đặc biệt&quot;, mũi tên vàng &quot;đăng ký nhận sách&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Social proof ban đầu: &quot;đã có 0 người đăng ký&quot;, sau đó tăng dần 1, 2, 3, 5 người.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cam kết bảo mật thông tin: &quot;Chúng tôi hứa không bao giờ chia sẻ thông tin của bạn đã</span></div>\n<p class=\"body-txt\">\ncung cấp cho chúng tôi.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Lưu ý về bối cảnh thời điểm đó: Facebook và Google chưa phổ biến, nên việc thu thập</span></div>\n<p class=\"body-txt\">\nemail qua landing page là phương pháp chính.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Landing page này được tạo bằng dịch vụ Blogger (nay đã đóng cửa), không phải</span></div>\n<p class=\"body-txt\">\nWordPress hay GetResponse.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tầm quan trọng của landing page này: dù &quot;xấu xí&quot; và &quot;ngô nghê&quot; nhưng nó là phiên bản</span></div>\n<p class=\"body-txt\">\nđầu tiên và đã tạo ra kết quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cách diễn giả quảng bá landing page: Sử dụng domain ngắn gọn &quot;zies.vn&quot; (3 chữ cái), in lên</span></div>\n<p class=\"body-txt\">\nnamecard để phát cho mọi người và hướng dẫn họ nhập email.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phân loại hai kiểu người trong kinh doanh: người làm marketing (biết tạo ra công cụ) và</span></div>\n<p class=\"body-txt\">\nngười &quot;ăn bám&quot; (chỉ hỏi mà không hành động).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nhấn mạnh việc hành động, *có một cái gì đó* dù đơn giản còn hơn là không làm gì. &quot;Nó</span></div>\n<p class=\"body-txt\">\ncó hơn một cái thằng là không làm.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Landing page là một trong 7 vũ khí quan trọng để tạo danh sách khách hàng tiềm năng</span></div>\n<p class=\"body-txt\">\n(trong bộ 30 tuyệt chiêu gia tăng doanh số).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Những người luôn hỏi &quot;em bán cái này được không, em bán cái kia được không&quot; mà</span></div>\n<p class=\"body-txt\">\nchưa có landing page thì sẽ thất bại, vì quan trọng là tìm được người để bán chứ không\n \nphải bán cái gì.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Bí quyết thành công của landing page &quot;ngu ngốc&quot;: Sử dụng hình ảnh ngón tay trỏ hướng</span></div>\n<p class=\"body-txt\">\nthẳng vào form điền thông tin, một ý tưởng lấy cảm hứng từ động tác hướng dẫn thoát\n \nhiểm của tiếp viên hàng không.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hành động quan trọng hơn sự hoàn hảo ban đầu: Landing page đầu tiên của thầy  dù &quot;ngu ngốc,&quot; &quot;xấu xí&quot; và &quot;không có gì cả&quot; theo chuẩn ngày nay, nhưng nó</span></div>\n<p class=\"body-txt\">\nđã *được tạo ra và hoạt động*. Điều này cực kỳ quan trọng vì nó phá vỡ rào cản tâm lý\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\nsợ hãi sự không hoàn hảo, khuyến khích mọi người bắt đầu ngay cả với những gì cơ bản\n \nnhất, thay vì chờ đợi sự &quot;hoàn hảo&quot; không bao giờ đến.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tập trung vào thu thập thông tin khách hàng (Lead Generation): Mục tiêu chính của</span></div>\n<p class=\"body-txt\">\nlanding page này là thu thập email của khách hàng tiềm năng, không phải bán hàng trực\n \ntiếp. Thầy Long coi đây là một trong &quot;7 vũ khí&quot; để tạo danh sách khách hàng tiềm năng.\n \nInsight này quan trọng vì nó định hướng đúng trọng tâm của marketing số: xây dựng tài\n \nsản khách hàng (danh sách email), tạo dựng mối quan hệ lâu dài, thay vì chỉ tập trung\n \nvào giao dịch bán hàng một lần.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sự sáng tạo đến từ quan sát và áp dụng linh hoạt: Ý tưởng về ngón tay trỏ hướng thẳng</span></div>\n<p class=\"body-txt\">\nđến form đăng ký, một chi tiết nhỏ nhưng có sức mạnh thu hút sự chú ý rất lớn, được\n \ndiễn giả lấy cảm hứng từ động tác hướng dẫn an toàn của tiếp viên hàng không. Điều này\n \nquan trọng vì nó chỉ ra rằng những giải pháp marketing hiệu quả và độc đáo không nhất\n \nthiết phải phức tạp hay đắt đỏ, mà có thể đến từ việc quan sát thế giới xung quanh một\n \ncách tinh tế và áp dụng những ý tưởng đó một cách sáng tạo vào mục tiêu của mình.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Nó có hơn một cái thằng là không làm.”\n \n“Quan trọng nhất là mày có biết làm marketing không?”\n \n“Tìm được người để bán thì bán cái gì người ta cần thì mình bán cái đấy.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Quảng bá Landing Page: Quảng bá landing page này thông qua các kênh tiếp thị B2B phù</span></div>\n<p class=\"body-txt\">\nhợp với khách hàng Nhật: thêm liên kết vào chữ ký email, namecard công ty, hồ sơ\n \nLinkedIn, hoặc các diễn đàn/group chuyên ngành kiến trúc, xây dựng tại Nhật (nếu có\n \nthể).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ưu tiên hành động hơn sự hoàn hảo: Bắt đầu với một landing page cơ bản và hiệu quả,</span></div>\n<p class=\"body-txt\">\nsau đó liên tục tối ưu hóa dựa trên phản hồi và dữ liệu, thay vì chờ đợi một thiết kế hoàn\n \nhảo từ ban đầu.\n \n6.2 Các nhóm độc giả\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học tập trung vào việc phân loại và quản lý các nhóm độc giả khác nhau trong</h3>\n<p class=\"body-txt\">\nchiến lược email marketing, nhấn mạnh tầm quan trọng của việc cá nhân hóa thông điệp và\n \ntuân thủ các quy định pháp luật. Thầy Long trình bày chi tiết về cách xác định từng nhóm đối\n \ntượng, từ người đăng ký nhận bản tin đến khách hàng đã mua sản phẩm và đối tác liên kết,\n \nđể xây dựng một hệ thống gửi email hiệu quả, tránh trùng lặp thông tin và làm phiền khách\n \nhàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Buổi học tiếp nối nội dung về các loại email, tập trung vào &quot;các nhóm độc giả khác nhau&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nhóm 1: Người đăng ký nhận bản tin (Newsletter Subscriber)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nhận &quot;newslette
