div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ: &quot;Hơn 10 năm trước, tôi cũng từng trăn trở về việc làm sao để tạo ra những hình</span></div>\n<p class=\"body-txt\">\nảnh kiến trúc chân thực và ấn tượng mà không tốn quá nhiều thời gian và chi phí. Chúng\n \ntôi đã tìm ra một con đường...&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giới thiệu dịch vụ của FUTAGO: Trực tiếp giới thiệu dịch vụ diễn họa kiến trúc (CG パー</span></div>\n<p class=\"body-txt\">\nス/render 3D) của FUTAGO như một giải pháp tối ưu. Nhấn mạnh lợi ích cụ thể: &quot;giúp\n \nbạn trình bày ý tưởng một cách sống động, gây ấn tượng mạnh với khách hàng, rút ngắn\n \nthời gian phê duyệt dự án, và nâng tầm giá trị thiết kế.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kêu gọi hành động: Đặt lịch tư vấn miễn phí, yêu cầu báo giá, xem portfolio, hoặc một ưu</span></div>\n<p class=\"body-txt\">\nđãi đặc biệt có thời hạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ: &quot;Hãy bấm vào đây để xem portfolio của chúng tôi và nhận báo giá trong vòng 24</span></div>\n<p class=\"body-txt\">\ngiờ. Ưu đãi đặc biệt cho 10 khách hàng đăng ký sớm nhất trong tuần này!&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sử dụng yếu tố khẩn cấp/khan hiếm (Urgency/Scarcity): &quot;Chỉ còn X suất tư vấn miễn phí</span></div>\n<p class=\"body-txt\">\ntrong tháng này.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cấu trúc Lặp lại (Vấn đề -&gt; Giải pháp thông thường -&gt; Giải pháp FUTAGO -&gt; Bán hàng):</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tiếp tục chuỗi email bằng cách nêu ra các vấn đề khác mà KTS/công ty thiết kế thường</span></div>\n<p class=\"body-txt\">\ngặp (ví dụ: khó khăn trong việc thể hiện vật liệu, ánh sáng, không gian phức tạp; cần\n \nhình ảnh nhanh chóng cho giai đoạn concept; v.v.).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mỗi vấn đề lại được giải quyết bằng giải pháp thông thường (bài viết, video khác) và sau</span></div>\n<p class=\"body-txt\">\nđó là giải pháp từ dịch vụ diễn họa của FUTAGO, cuối cùng là kêu gọi hành động.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tăng tỷ lệ mở email:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sử dụng tiêu đề email gây tò mò, cá nhân hóa.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ: &quot;Tùng ơi, liệu đây có phải vấn đề bạn đang gặp phải?&quot;, &quot;Long đây, tôi đã thấy một</span></div>\n<p class=\"body-txt\">\nđiều đáng lo ngại trong ngành của chúng ta...&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giai đoạn ấm: &quot;Tùng ơi, hôm nay tôi cảm thấy rất mệt mỏi...&quot; (sau đó dẫn vào câu chuyện</span></div>\n<p class=\"body-txt\">\nliên quan đến khó khăn trong ngành).\n \n1.8 Spa áp dụng Email Marketing như thế nào\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi giảng tập trung vào chiến lược email marketing hiệu quả cho các doanh</h3>\n<p class=\"body-txt\">\nnghiệp dịch vụ, đặc biệt là phòng khám nha khoa, nhằm duy trì và tái kích hoạt khách hàng\n \ncũ. Thầy  nhấn mạnh việc sử dụng email để nhắc nhở khách hàng về các\n \ndịch vụ định kỳ và kết nối sức khỏe răng miệng với sức khỏe tổng thể. Cốt lõi của việc thu\n \nthập email là tạo ra một &quot;quà tặng&quot; có giá trị lớn, khiến khách hàng sẵn lòng đổi lấy thông tin\n \nliên hệ của họ, đồng thời khẳng định rằng mọi người đều có email thông qua smartphone\n \nhoặc tài khoản mạng xã hội.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Vấn đề của học viên: Học viên Nhung (Nha khoa Thẩm mỹ) hỏi về cách làm email</span></div>\n<p class=\"body-txt\">\nmarketing khi bệnh nhân thường nói họ không dùng email.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ về email marketing cá nhân hóa (gây ấn tượng): Thầy Long đưa ra ví dụ một email</span></div>\n<p class=\"body-txt\">\ngiả định mà Nhung có thể gửi cho thầy Long, sử dụng ngôn ngữ mạnh mẽ để khơi gợi\n \ncảm xúc về việc chăm sóc răng miệng và làm đẹp để truyền cảm hứng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ về email nhắc nhở bảo dưỡng định kỳ (tự động):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email nhắc nhở khách hàng rằng &quot;bộ răng sứ bọc sứ đã đến kỳ bảo dưỡng&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email này nên được gửi tự động mỗi 6 tháng, với nội dung &quot;chúng tôi rất nhớ bạn như</span></div>\n<p class=\"body-txt\">\nrăng nhớ kem đánh răng vậy&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nhấn mạnh việc cần lấy vôi răng sạch sẽ để tránh phải làm lại răng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kết thúc bằng lời mong đợi gặp lại khách hàng tại phòng khám.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ về email theo dõi (nhắc nhở khách hàng đã nhận mail nhưng chưa đến): Email hỏi</span></div>\n<p class=\"body-txt\">\nthăm &quot;Hôm qua Nhung có gửi mail cho Hiền mà không thấy Hiền đến. Sao vậy? Khỏe\n \nchứ?&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kết nối sức khỏe răng miệng với sức khỏe tổng thể: Răng khỏe thì bạn mới khỏe.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tầm quan trọng của email marketing: &quot;Email marketing là vũ khí vô cùng tối thượng.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cách thu thập email khi khách hàng nói không dùng:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đề xuất &quot;Nếu bạn có email, tôi sẽ lấy cao răng cho bạn trọn đời miễn phí.&quot; (Đây là một</span></div>\n<p class=\"body-txt\">\n&quot;quà tặng&quot; có giá trị cao để đổi lấy email).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giải thích rằng ai cũng có email thông qua smartphone, Gmail hoặc tài khoản Facebook,</span></div>\n<p class=\"body-txt\">\nnên lý do không dùng email là không thuyết phục.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mấu chốt để lấy được email: &quot;cái quan trọng nhất là cái quà của mình có đủ giá trị để họ</span></div>\n<p class=\"body-txt\">\nđổi email của họ đấy hay không ấy.&quot;\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email marketing là vũ khí tối thượng cho việc tái kích hoạt khách hàng cũ: Thầy Long</span></div>\n<p class=\"body-txt\">\nnhấn mạnh email không chỉ dùng để tìm khách hàng mới mà còn là công cụ cực kỳ mạnh\n \nmẽ để giữ chân và đưa khách hàng cũ quay lại sử dụng dịch vụ định kỳ. Điều này quan\n \ntrọng vì chi phí giữ chân khách hàng thường thấp hơn nhiều so với chi phí thu hút khách\n \nhàng mới, đặc biệt trong các ngành dịch vụ có chu kỳ sử dụng lặp lại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giá trị của &quot;quà tặng&quot; là chìa khóa để thu thập email: Thay vì cố gắng thuyết phục khách</span></div>\n<p class=\"body-txt\">\nhàng cung cấp email một cách miễn cưỡng, doanh nghiệp cần đưa ra một ưu đãi hoặc lợi\n \ních đủ hấp dẫn (ví dụ: cạo vôi răng trọn đời miễn phí). Insight này quan trọng vì nó giúp\n \ndoanh nghiệp chuyển từ việc &quot;xin&quot; email sang &quot;trao đổi giá trị&quot;, tạo động lực mạnh mẽ\n \ncho khách hàng chia sẻ thông tin.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Vượt qua rào cản &quot;không có email&quot;: Mặc dù nhiều người nói không dùng email, nhưng</span></div>\n<p class=\"body-txt\">\nthầy Long chỉ ra rằng bất kỳ ai có smartphone, tài khoản Gmail hoặc Facebook đều có\n \nemail. Điều này quan trọng vì nó loại bỏ một trong những lý do từ chối phổ biến nhất từ\n \nkhách hàng, giúp doanh nghiệp tự tin hơn trong việc yêu cầu và thu thập email.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Email marketing là vũ khí vô cùng tối thượng.”\n \n“Nếu bạn có email, tôi sẽ lấy cao răng cho bạn trọn đời miễn phí.”\n \n“cái quan trọng nhất là cái quà của mình có đủ giá trị để họ đổi email của họ đấy hay không\n \nấy.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\nán mới ấn tượng, các xu hướng diễn họa kiến trúc, hoặc các cải tiến công nghệ render để\n \nduy trì sự quan tâm và tạo cơ hội cho các dự án mới.\n \n---\n \n1.9 Kinh doanh Ô tô dùng Email Marketing như thế nào\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi giảng này tập trung vào chiến lược Email Marketing sơ khai và hiệu quả, đặc</h3>\n<p class=\"body-txt\">\nbiệt là thông qua hình thức &quot;newsletter&quot; (bản tin điện tử) để cập nhật danh sách sản\n \nphẩm/dịch vụ cũ hàng tuần. Thầy nhấn mạnh rằng đây là một phương pháp đơn giản nhưng\n \ncực kỳ mạnh mẽ để thu hút và giữ chân khách hàng tiềm năng, đặc biệt trong các lĩnh vực có\n \nsản phẩm đa dạng và giá trị cao như ô tô cũ, máy ảnh cũ. Cốt lõi là cung cấp thông tin giá trị\n \nmột cách đều đ đặn, khiến khách hàng chủ động tìm đến và quan tâm.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Học viên Đoàn Thanh Khánh kinh doanh ô tô cũ/mới (chủ yếu cũ, nhiều hãng) và bán xe</span></div>\n<p class=\"body-txt\">\nmới Mitsubishi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy Long hỏi về việc kinh doanh đồ cũ nói chung (máy ảnh, nhà, xe, điện thoại cũ, v.v.)</span></div>\n<p class=\"body-txt\">\nvà nhận thấy nhiều người không làm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy kể về một website từ năm 1994-1995 (tên có thể là &quot;Cameras&quot; hoặc &quot;Cametas&quot;) mà</span></div>\n<p class=\"body-txt\">\nbây giờ không còn tồn tại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Website này chỉ có một ô đơn giản để người dùng nhập email nếu muốn nhận danh sách</span></div>\n<p class=\"body-txt\">\nthiết bị máy ảnh cũ hàng tuần.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Website gửi email hàng tuần chứa danh sách các thiết bị (máy ảnh, ống kính, chân</span></div>\n<p class=\"body-txt\">\nmáy...) cùng giá tiền của chúng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy rất thích đọc những email này, dù không có điều kiện mua (website ở Mexico).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy nhận ra rằng việc cung cấp danh sách sản phẩm cũ liên tục, cập nhật thường xuyên,</span></div>\n<p class=\"body-txt\">\nkhiến khách hàng quan tâm và theo dõi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phương pháp này giống như &quot;bố tổ của eBay&quot; – bán đồ cũ nhưng cực kỳ hẹp và chất</span></div>\n<p class=\"body-txt\">\nlượng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Người bán ô tô cũ có thể áp dụng tương tự: tạo một &quot;newsletter&quot; (email marketing dạng</span></div>\n<p class=\"body-txt\">\nsơ khai nhất) gửi danh sách ô tô cũ hàng tuần.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tất cả những người có nhu cầu mua ô tô cũ sẽ đều phải &quot;ngó vào&quot; danh sách đó.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Việc này giúp người bán nổi tiếng và thu hút khách hàng tiềm năng một cách chủ động,</span></div>\n<p class=\"body-txt\">\nkhông cần làm gì phức tạp ngoài việc cập nhật danh sách và gửi đi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Danh sách email xe cũ chính là &quot;quà tặng miễn phí&quot; cho khách hàng, giống như tờ báo</span></div>\n<p class=\"body-txt\">\nrao vặt mà ngày xưa người ta phải mua bằng tiền.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Một chiếc ô tô lãi 20 triệu, bán 25 chiếc ô tô theo cách này là đủ tiền vào khóa học Eagle</span></div>\n<p class=\"body-txt\">\nClub.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Làm một file Excel đơn giản, xuất ra dạng email cho người ta mở, vì file Excel trực tiếp sẽ</span></div>\n<p class=\"body-txt\">\nkhông được đọc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Không ai làm cách này, nếu bạn làm thì bạn sẽ là người số 1.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chiến lược quảng bá: đưa ra một vài sản phẩm cũ hấp dẫn, sau đó kêu gọi &quot;muốn nhận</span></div>\n<p class=\"body-txt\">\nnhiều hơn thì nhập email vào đây&quot;.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đây là hình thức quảng cáo rất hẹp (targeted) nhưng cực kỳ hiệu quả và chất lượng.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sức mạnh của Email Marketing sơ khai và liên tục: Việc duy trì một bản tin điện tử</span></div>\n<p class=\"body-txt\">\n(newsletter) đơn giản, chỉ liệt kê các sản phẩm cũ có sẵn cùng giá, được gửi định kỳ hàng\n \ntuần có thể tạo ra sự gắn kết cực kỳ mạnh mẽ với khách hàng tiềm năng. Nó biến việc\n \nbán hàng từ chủ động (người bán đi tìm khách) thành bị động (khách hàng chủ động tìm\n \nđến và chờ đợi thông tin).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giá trị của thông tin hữu ích và cập nhật: Khách hàng sẵn sàng cung cấp thông tin liên hệ</span></div>\n<p class=\"body-txt\">\nvà theo dõi bạn nếu họ nhận được giá trị thực sự. Một danh sách cập nhật các sản phẩm\n \ncũ với thông tin chi tiết và giá cả, đáp ứng đúng nhu cầu của họ, có giá trị không kém một\n \ntờ báo rao vặt mà họ sẵn sàng trả tiền để mua. Điều này xây dựng niềm tin và tạo ra một\n \nkênh phân phối thông tin trực tiếp, hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khác biệt hóa bằng sự đơn giản và kiên trì: Trong khi nhiều người tìm kiếm các chiến</span></div>\n<p class=\"body-txt\">\nlược marketing phức tạp, việc quay về với những phương pháp cơ bản, đơn giản nhưng\n \nkiên trì thực hiện lại tạo ra lợi thế cạnh tranh lớn. &quot;Không ai làm, bạn làm, bạn nhất.&quot; Sự\n \nđều đặn và đơn giản tạo nên sức mạnh và sự khác biệt.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Email marketing dạng sơ khai nhất là newsletter. Mình đặt luôn là ô tô cũ của nhà mình đấy.”\n \n“Không ai làm, bạn làm, bạn nhất.”\n \n“Chỉ quảng cáo thôi nhưng mà nó rất là hẹp, cái thị trường cực hẹp luôn nhưng mà chất luôn.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thậm chí là &quot;stock&quot; hình ảnh kiến trúc chất lượng cao (miễn phí): Cung cấp một vài hình</span></div>\n<p class=\"body-txt\">\nảnh render chất lượng cao nhưng không gắn với dự án cụ thể, có thể dùng làm tài\n \nnguyên tham khảo cho các kiến trúc sư.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mục tiêu: Thu hút các KTS/thiết kế Nhật đăng ký nhận bản tin để họ thường xuyên được</span></div>\n<p class=\"body-txt\">\ntiếp cận với chất lượng sản phẩm, phong cách làm việc của FUTAGO, đồng thời giữ\n \nFUTAGO luôn hiện diện trong tâm trí họ khi có nhu cầu về diễn họa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Quảng bá: Đặt một vài hình ảnh render đẹp nhất trên website/fanpage của FUTAGO, sau</span></div>\n<p class=\"body-txt\">\nđó kêu gọi &quot;Đăng ký nhận bản tin hàng tuần để khám phá thêm nhiều phong cách diễn\n \nhọa và dự án độc đáo!&quot; (「週刊建築ビジュアライゼーションニュースレターにご登録\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">ください！」).</h3>\n<p class=\"body-txt\">\nChiến lược này sẽ giúp FUTAGO xây dựng một danh sách khách hàng tiềm năng chất lượng\n \ncao, những người thực sự quan tâm đến hình ảnh kiến trúc, mà không cần phải đẩy các dịch\n \nvụ BIM không liên quan. Nó tập trung vào giá trị mà FUTAGO thực sự cung cấp: diễn họa\n \nkiến trúc chất lượng cao.\n \n1.10 Camping áp dụng Email Marketing như thế nào\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học tập trung vào chiến lược email marketing để bán sản phẩm quốc tế thông</h3>\n<p class=\"body-txt\">\nqua việc tận dụng các bộ sản phẩm marketing đã có sẵn. Thầy Long giới thiệu phương pháp\n \nmua và tùy chỉnh các gói nội dung toàn diện bao gồm website, blog, ebook và chuỗi email.\n \nNgười học chỉ cần chỉnh sửa theo ngôn ngữ và thông tin cá nhân, sau đó sử dụng để quảng\n \nbá và bán sản phẩm (ví dụ: qua affiliate Amazon) mà không cần tự tạo nội dung từ đầu hay\n \nbiết nhiều ngoại ngữ. Đây là một &quot;vũ khí&quot; đơn giản nhưng vô cùng mạnh mẽ để nhanh chóng\n \nthâm nhập thị trường ngách toàn cầu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Một học viên hỏi về cách marketing sản phẩm trên các nền tảng thương mại điện tử</span></div>\n<p class=\"body-txt\">\nquốc tế (Amazon, eBay) bằng video khi bản thân là người Việt, gặp rào cản ngôn ngữ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy Long đưa ra ví dụ về học viên &quot;Tú&quot; bán hàng ở thị trường Brazil (ngôn ngữ Bồ Đào</span></div>\n<p class=\"body-txt\">\nNha, Tây Ban Nha) mà không biết tiếng, chỉ qua video.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phương pháp là viết nội dung bằng tiếng Việt, dùng Google Translate dịch sang ngôn</span></div>\n<p class=\"body-txt\">\nngữ mục tiêu, sau đó nhờ người bản xứ *viết lại* (không phải chỉ dịch) để có nội dung tự\n \nnhiên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Viết email marketing bằng tiếng Anh là cách dễ nhất.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy Long minh họa bằng cách nhanh chóng tạo ra một nội dung email/marketing cho</span></div>\n<p class=\"body-txt\">\nsản phẩm &quot;camping&quot; (cắm trại).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy giới thiệu rằng ông có một &quot;kho dữ liệu&quot; (data warehouse) gồm các bộ sản phẩm</span></div>\n<p class=\"body-txt\">\nmarketing đã làm sẵn cho các niche cụ thể (ví dụ: camping).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Một bộ sản phẩm này bao gồm:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Một website được viết bằng PHP, hoạt động như một blog.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hệ thống cơ sở dữ liệu MySQL đi kèm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Các file thiết kế (PSD).</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nhiều bài viết blog về chủ đề (ví dụ: &quot;camping 1&quot;, &quot;camping 2&quot;, &quot;outdoor&quot;, hướng dẫn</span></div>\n<p class=\"body-txt\">\ncách dựng lều, câu cá, nướng thịt, làm lều, checklist packing).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Một cuốn ebook (sách điện tử) về chủ đề đó (ví dụ: các địa điểm cắm trại, hướng dẫn cho</span></div>\n<p class=\"body-txt\">\nngười mới bắt đầu, kỹ năng cơ bản, tips &amp; tricks). Ebook này có thể download và dùng\n \nđể thu hút khách hàng tiềm năng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">10 kịch bản email đã được viết sẵn, chứa &quot;từ ma thuật&quot; (magic words) để tăng tính</span></div>\n<p class=\"body-txt\">\nthuyết phục.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Người học có thể mua toàn bộ gói sản phẩm này với giá rất thấp (ví dụ: 9 đô la).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mục tiêu là sử dụng các nội dung này để bán sản phẩm liên kết (affiliate) trên các nền</span></div>\n<p class=\"body-txt\">\ntảng như Amazon (ví dụ: đồ dùng outdoor/camping), chỉ cần thay thế ID affiliate của\n \nmình vào các đường link có sẵn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy Long khẳng định Amazon là một thế giới của những người đã làm marketing theo</span></div>\n<p class=\"body-txt\">\ncách này, và những công cụ này là &quot;vũ khí nham hiểm&quot;, &quot;quá đơn giản nhưng quá mạnh&quot;.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chiến lược &quot;Mua và Chế lại&quot; nội dung để tiếp cận thị trường toàn cầu nhanh chóng: Thay</span></div>\n<p class=\"body-txt\">\nvì tự mình xây dựng website, blog, ebook và chuỗi email từ đầu, người học có thể mua\n \nnhững bộ sản phẩm marketing đã được tạo sẵn cho các niche với chi phí rất thấp (ví dụ:\n \n9 đô la). Điều này cực kỳ quan trọng vì nó phá vỡ rào cản về thời gian, kỹ năng tạo nội\n \ndung, và chi phí, cho phép bất kỳ ai cũng có thể nhanh chóng có một hệ thống marketing\n \nhoàn chỉnh để bán hàng (thường là affiliate) ở các thị trường quốc tế mà không cần biết\n \ntiếng bản xứ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khả năng vượt qua rào cản ngôn ngữ một cách hiệu quả: Bài học chỉ ra rằng việc kinh</span></div>\n<p class=\"body-txt\">\ndoanh quốc tế không yêu cầu bạn phải biết tiếng bản địa. Với việc sử dụng công cụ dịch\n \nthuật (như Google Translate) và sau đó nhờ người bản xứ *viết lại* (rewriting) thay vì\n \nchỉ dịch thô, bạn có thể tạo ra nội dung tự nhiên và thuyết phục. Đây là một insight quan\n \ntrọng giúp mở rộng đáng kể phạm vi tiếp cận khách hàng tiềm năng mà không bị giới\n \nhạn bởi khả năng ngoại ngữ của bản thân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hệ sinh thái nội dung có cấu trúc cho email marketing: Buổi học không chỉ nói về email</span></div>\n<p class=\"body-txt\">\nđơn lẻ mà là một chuỗi các công cụ và nội dung hỗ trợ lẫn nhau: website/blog cung cấp\n \ngiá trị, ebook thu hút khách hàng tiềm năng, và các email được thiết kế để dẫn dắt và\n \nchuyển đổi. Sự tích hợp này tạo ra một phễu bán hàng tự động và hiệu quả, giúp chăm\n \nsóc khách hàng và tối ưu hóa tỷ lệ chuyển đổi một cách tự động.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Không cần biết tiếng luôn. Tú là không có biết tí tiếng Tây Ban Nha nào hết ấy, tiếng Bồ Đào\n \nNha nào hết một toàn kênh gọi là tiếng hỏi. Tú ơi em có biết kênh của em nói gì không? Bảo\n \nkhông, bọn nó nói.”\n \n“Muốn có bao nhiêu, tôi có bấy nhiêu. Easy, simple.”\n \n“Cái vũ khí này nó quá là nham hiểm cho cho cái việc kinh doanh này. Nó quá đơn giản nhưng\n \nquá mạnh.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi giảng tập trung vào chiến lược marketing hiệu quả thông qua việc xây dựng</h3>\n<p class=\"body-txt\">\nvà tận dụng tối đa &quot;danh sách&quot; (list) khách hàng tiềm năng. Cốt lõi là tổng hợp và liên tục gửi\n \nthông tin về *tất cả* các sản phẩm, dịch vụ, hay tài sản đang có – dù lớn hay nhỏ, mới hay cũ\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">tới danh sách này. Mục tiêu là duy trì sự hiện diện, tạo giá trị thông tin, và xây dựng sự tin</span></div>\n<p class=\"body-txt\">\ntưởng lâu dài, khiến khách hàng cuối cùng chủ động tìm đến khi có nhu cầu, đồng thời khẳng\n \nđịnh rằng chính danh sách khách hàng là tài sản cạnh tranh lớn nhất, bất kể đối thủ có biết\n \nvề sản phẩm hay giá cả của bạn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy giới thiệu phương pháp marketing bằng cách tạo danh sách sản phẩm và gửi qua</span></div>\n<p class=\"body-txt\">\nemail, sử dụng ví dụ về &quot;gọng kính&quot; (gửi 3000 gọng kính vào khoảng 3000 dòng email).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mục tiêu là để khách hàng *cứ ngồi đọc* danh sách, dù họ có thể chưa mua ngay.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đây là một cách làm độc đáo, không nhiều người thực hiện, nhưng lại rất hiệu quả.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cần liệt kê *tất cả* mọi thứ đang có trong kho hoặc có thể bán, từ những vật nhỏ nhất, cũ</span></div>\n<p class=\"body-txt\">\nnhất (&quot;từ củ chùn chổi chủi cùn dè rách&quot;) cho đến những mặt hàng lớn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phương pháp này áp dụng được cho nhiều ngành nghề khác nhau như đồ điện tử (điện</span></div>\n<p class=\"body-txt\">\nthoại cũ, iPhone cũ), phụ kiện ô tô, và bất động sản.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đối với bất động sản, cần ghi chú chi tiết từng lô đất với các thông số cụ thể (mã, diện</span></div>\n<p class=\"body-txt\">\ntích, mặt tiền, loại đất, giá cả) và gửi một danh sách lớn (ví dụ: 1000 mảnh đất) qua\n \nemail.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giá trị của danh sách có thể cao đến mức khách hàng thậm chí còn phải trả tiền để đọc.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ngay cả những người trong ngành hoặc khách hàng tiềm năng cũng chủ động tìm kiếm</span></div>\n<p class=\"body-txt\">\ncác thông tin rao vặt tương tự.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Việc đối thủ biết giá hay cách làm không phải là vấn đề, vì họ không có được *danh sách</span></div>\n<p class=\"body-txt\">\nkhách hàng* của bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Danh sách email cung cấp sự kiểm soát và riêng tư tốt hơn so với các nền tảng công khai</span></div>\n<p class=\"body-txt\">\nnhư fanpage, nơi đối thủ dễ dàng &quot;bắt&quot; khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Tiền nằm trong danh sách&quot; – tài sản cốt lõi chính là danh sách, chứ không chỉ nội dung</span></div>\n<p class=\"body-txt\">\ncủa sản phẩm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Có thể hợp tác với đối tác, lấy sản phẩm của họ để bán trong danh sách của mình.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phương pháp này đặc biệt hiệu quả với những doanh nghiệp có nhiều loại hàng hóa, sản</span></div>\n<p class=\"body-txt\">\nphẩm đa dạng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Danh sách khách hàng là tài sản cốt lõi (Vũ khí Email Marketing): Thầy nhấn mạnh rằng</span></div>\n<p class=\"body-txt\">\ngiá trị thực sự nằm ở việc sở hữu và quản lý một danh sách khách hàng chất lượng, chứ\n \nkhông chỉ ở sản phẩm hay nội dung. Chính danh sách này là &quot;vũ khí&quot; giúp bạn tiếp cận,\n \nnuôi dưỡng và chuyển đổi khách hàng một cách bền vững, không bị phụ thuộc vào các\n \nnền tảng bên ngoài. Điều này quan trọng vì nó định hướng doanh nghiệp tập trung vào\n \nviệc xây dựng mối quan hệ trực tiếp và lâu dài với khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chiến lược &quot;Rao hết tất cả&quot; và Tính kiên trì: Việc liệt kê và gửi thông tin về *mọi thứ*</span></div>\n<p class=\"body-txt\">\nmình có, dù là &quot;củ chùn chổi chủi cùn dè rách&quot;, cho thấy một tư duy bán hàng toàn diện\n \nvà kiên trì. Khách hàng có thể không mua ngay nhưng sẽ &quot;cứ đọc&quot; và cuối cùng &quot;điên quá\n \nlà... mày có cái này mày bán cho tao.&quot; Đây là một insight quan trọng về hành vi mua\n \nhàng: việc tiếp xúc liên tục và đa dạng tạo ra sự nhận diện thương hiệu và kích thích nhu\n \ncầu theo thời gian, ngay cả với những sản phẩm nhỏ nhất.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Lợi thế cạnh tranh vượt trội từ việc sở hữu danh sách: Thầy giải quyết mối lo ngại về đối</span></div>\n<p class=\"body-txt\">\nthủ bằng cách khẳng định: &quot;người ta không có cái danh sách khách hàng của mình.&quot; Đây\n \nlà điểm mấu chốt. Dù sản phẩm, giá cả hay chiến lược có thể bị sao chép, danh sách\n \nkhách hàng được xây dựng và nuôi dưỡng riêng là một lợi thế độc quyền, khó bị đối thủ\n \nchiếm đoạt. Nó đặt ra tầm quan trọng của việc bảo vệ và khai thác tài sản dữ liệu khách\n \nhàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Không ai làm theo cách này đâu... Không ai làm theo cách này mình làm nó lại hiệu quả.”\n \n“Người ta chỉ đọc thôi chứ người ta không mua đâu. Nhưng mà người ta cứ đọc. Xong rồi điên\n \nquá là cuối cùng ngày đẹp trời là mày có cái này mày bán cho tao.”\n \n“Từ củ chùn chổi chủi cùn dè rách cho vào email bán hết.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Vấn đề là người ta biết cái giá của mình bán nhưng mà người ta không có cái danh sách\n \nkhách hàng của mình, ông hiểu không?”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học giới thiệu tổng quan về hệ thống Email Marketing, nhấn mạnh việc xây</h3>\n<p class=\"body-txt\">\ndựng &quot;phễu&quot; khách hàng từ các kênh truyền thông khác nhau đổ về Landing Page để thu\n \nthập email. Sau khi có được danh sách email, doanh nghiệp sẽ triển khai chuỗi email tự động\n \ngồm ba giai đoạn: hướng dẫn sử dụng quà tặng, tâm sự về vấn đề của khách hàng, và cuối\n \ncùng là giới thiệu giải pháp/sản phẩm, lặp lại quy trình này để nuôi dưỡng mối quan hệ và\n \nbán hàng liên tục. Thầy Long khẳng định email marketing là một &quot;vũ khí&quot; hiệu quả bổ trợ\n \ncho mọi ngành nghề, giúp doanh nghiệp phát triển vượt bậc nếu biết cách sử dụng đúng đắn,\n \nvới mục tiêu cuối cùng là đạt 50.000 khách hàng mục tiêu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy Long giới thiệu hệ thống email marketing và giao bài tập cho học viên: xem tất cả</span></div>\n<p class=\"body-txt\">\ncác video trong phần &quot;online&quot; trên `video.long.vn` (đặc biệt là playlist về kinh doanh\n \nonline).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Bài tập cụ thể là xem hết các video, ghi chép vào vở thành 3 cột và vẽ lại các sơ đồ về hệ</span></div>\n<p class=\"body-txt\">\nthống phễu.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hệ thống phễu bắt đầu từ các kênh thu hút traffic (mạng xã hội, YouTube, fanpage, blog,</span></div>\n<p class=\"body-txt\">\nquảng cáo, referral) dẫn về một trang đích (Landing Page).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Landing Page cần có 2 mục quan trọng: bìa sách/sản phẩm mồi và lợi ích của việc tải về</span></div>\n<p class=\"body-txt\">\nsản phẩm đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sản phẩm mồi (quà tặng) phải giải quyết vấn đề của thị trường mục tiêu mà doanh</span></div>\n<p class=\"body-txt\">\nnghiệp đang hướng tới (ví dụ: sách dạy nữ công gia chánh, nuôi dạy con, xây dựng đội\n \nnhóm nữ kinh doanh cho phụ nữ làm spa/kinh doanh online).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Theo dõi tỉ lệ chuyển đổi của Landing Page (bao nhiêu phần trăm khách hàng sẵn sàng</span></div>\n<p class=\"body-txt\">\nnạp email để đổi lấy quà tặng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sau khi có email của khách hàng, kích hoạt hệ thống email tuần tự: 3 email (ví dụ: ngày</span></div>\n<p class=\"body-txt\">\n3, ngày 7, ngày 10).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nội dung chuỗi email:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 1: Hướng dẫn khách hàng sử dụng quà tặng một cách hiệu quả.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 2: Tâm sự về cuộc sống hàng ngày, nói về các vấn đề mà khách hàng thường gặp.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 3: Nói về vấn đề của khách hàng, đưa ra cách giải quyết vấn đề đó theo cách của</span></div>\n<p class=\"body-txt\">\ndoanh nghiệp, sau đó bán sản phẩm và lặp lại quy trình này suốt cuộc đời của họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email marketing là một công cụ bổ sung cho các cách kinh doanh khác, phù hợp cho mọi</span></div>\n<p class=\"body-txt\">\nngành nghề (y tế, spa, bán hàng, v.v.).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email marketing không hiệu quả với những người không biết cách dùng, nhưng khi bổ</span></div>\n<p class=\"body-txt\">\nsung cùng các phương tiện khác thì &quot;nó giống như là hổ mọc thêm cánh&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy chia sẻ khóa học này ban đầu được bán rất rẻ do một lời nói vô tình, nhưng sau đó</span></div>\n<p class=\"body-txt\">\ntrở thành một &quot;vũ khí&quot; quan trọng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Công cụ email marketing không còn quá quan trọng nữa vì chúng đã tiệm cận về tính</span></div>\n<p class=\"body-txt\">\nnăng; quan trọng vẫn là &quot;tư duy&quot; (mindset).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khóa học này sẽ không bao giờ được dạy lại nữa, đây là &quot;vũ khí&quot; được trang bị lần cuối.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mục tiêu sau khi tốt nghiệp khóa học: có 50.000 subscriber (khách hàng mục tiêu). Với</span></div>\n<p class=\"body-txt\">\n50.000 khách hàng mục tiêu, học viên có thể đạt được mọi thứ mong muốn (mua nhà,\n \nmua xe).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">50.000 subscriber là 50.000 khách hàng mục tiêu, không phải danh sách mua trên mạng.</span></div>\n<p class=\"body-txt\">\nKhi đạt được con số này, học viên sẽ trở thành một con người khác, cuộc sống có ý nghĩa\n \nhơn rất nhiều.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hệ thống &quot;Phễu&quot; để thu hút khách hàng tiềm năng: Đây là nền tảng cốt lõi của email</span></div>\n<p class=\"body-txt\">\nmarketing. Bằng cách sử dụng các kênh truyền thông để dẫn dắt traffic đến Landing\n \nPage và đổi lại thông tin liên hệ (email) bằng một món quà giá trị, doanh nghiệp có thể\n \nbiến những người truy cập ẩn danh thành các lead (khách hàng tiềm năng) có thể chăm\n \nsóc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Nó tạo ra một tài sản vô giá cho doanh nghiệp – danh sách khách</span></div>\n<p class=\"body-txt\">\nhàng tiềm năng. Đây là bước đầu tiên để xây dựng mối quan hệ trực tiếp, chủ động tiếp\n \ncận thay vì chờ đợi khách hàng tìm đến.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email nuôi dưỡng giá trị dựa trên vấn đề - giải pháp: Chuỗi 3 email theo trình tự</span></div>\n<p class=\"body-txt\">\n&quot;hướng dẫn sử dụng quà tặng, tâm sự/nêu vấn đề, đưa ra giải pháp/bán hàng&quot; là một\n \nchiến lược hiệu quả. Nó không chỉ bán sản phẩm mà còn xây dựng lòng tin, vị thế chuyên\n \ngia và mối quan hệ bền vững với khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Cách tiếp cận này chuyển từ việc bán hàng trực tiếp sang việc cung</span></div>\n<p class=\"body-txt\">\ncấp giá trị và giải quyết vấn đề cho khách hàng, khiến việc mua hàng trở thành một hệ\n \nquả tự nhiên thay vì một giao dịch ép buộc. Điều này giúp tăng tỉ lệ chuyển đổi và giữ\n \nchân khách hàng lâu dài.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mục tiêu 50.000 khách hàng mục tiêu và sự biến đổi cá nhân: Thầy Long đặt ra một con</span></div>\n<p class=\"body-txt\">\nsố cụ thể và có tính thách thức (50.000 subscriber) cùng với lời hứa về sự thay đổi cuộc\n \nsống đáng kể.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Nó cung cấp một mục tiêu rõ ràng, có thể đo lường được và có sức</span></div>\n<p class=\"body-txt\">\ntruyền cảm hứng mạnh mẽ. Nó không chỉ là mục tiêu kinh doanh mà còn là mục tiêu cá\n \nnhân, tạo động lực mạnh mẽ để học viên kiên trì thực hiện, đồng thời nhấn mạnh giá trị\n \nto lớn của một danh sách khách hàng chất lượng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Email không có hiệu quả đối với những người không biết cách dùng nó. Còn khi các anh chị\n \ndùng và bổ sung cùng với các phương tiện khác thì nó giống như là hổ mọc thêm cánh.”\n \n“Tôi hứa với anh chị em là cái vũ khí này sẽ không được trang bị cho bất kỳ ai nữa.”\n \n“50,000 nhớ là 50,000 khách hàng mục tiêu nhé, không phải 50,000 là đi mua cái chân danh\n \nsách trên mạng thì import vào đâu.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thậm chí là offer một &quot;test render&quot; nhỏ cho một chi tiết cụ thể của dự án (nếu khả thi và</span></div>\n<p class=\"body-txt\">\nđủ hấp dẫn).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi Email Nuôi dưỡng Mối quan hệ (bằng tiếng Nhật):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 1 (sau khi tải quà tặng): Gửi quà tặng đã cam kết. Đồng thời, đưa ra các mẹo bổ</span></div>\n<p class=\"body-txt\">\nsung hoặc gợi ý về cách sử dụng thông tin trong tài liệu đó để tối ưu hóa việc diễn họa\n \nkiến trúc, và giới thiệu ngắn gọn về thế mạnh của FUTAGO.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 2 (tâm sự/nêu vấn đề): Chia sẻ những thách thức chung mà các kiến trúc sư hoặc</span></div>\n<p class=\"body-txt\">\nnhà phát triển tại Nhật thường gặp phải khi cần hình ảnh 3D chất lượng cao (ví dụ: khó\n \nkhăn trong việc tìm đối tác render đáng tin cậy, thời gian giao hàng chậm, chất lượng\n \nkhông đồng đều, khó khăn trong việc truyền đạt ý tưởng thiết kế phức tạp qua hình ảnh\n \ntĩnh).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 3 (giải pháp/bán hàng): Định vị FUTAGO là giải pháp cho những vấn đề trên. Nhấn</span></div>\n<p class=\"body-txt\">\nmạnh vào:\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chất lượng diễn họa đẳng cấp, độ chính xác cao.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tốc độ và sự chuyên nghiệp trong quy trình làm việc.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khả năng hiểu và đáp ứng yêu cầu thẩm mỹ đặc trưng của kiến trúc Nhật Bản.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đưa ra các ví dụ cụ thể (portfolio) hoặc một ưu đãi đặc biệt cho lần hợp tác đầu tiên.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tiếp tục chu trình: Định kỳ gửi các email cập nhật về các dự án mới, xu hướng diễn họa,</span></div>\n<p class=\"body-txt\">\nhoặc các tips liên quan đến truyền thông hình ảnh kiến trúc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mục tiêu &quot;50.000 khách hàng mục tiêu&quot;:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đối với thị trường B2B ngách như kiến trúc sư/công ty thiết kế tại Nhật, con số 50.000</span></div>\n<p class=\"body-txt\">\nlà rất lớn. FUTAGO có thể điều chỉnh mục tiêu này thành một con số hợp lý hơn nhưng\n \nvẫn đầy tham vọng (ví dụ: 5.000 hoặc 10.000 công ty kiến trúc/thiết kế tiềm năng trong\n \ndanh sách email chất lượng cao).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Quan trọng là tập trung vào chất lượng của danh sách email: những người thực sự có</span></div>\n<p class=\"body-txt\">\nnhu cầu về diễn họa kiến trúc và có khả năng ra quyết định thuê dịch vụ.\n \nBằng cách này, FUTAGO có thể sử dụng email marketing để xây dựng uy tín, tạo dựng mối\n \nquan hệ bền vững và chuyển đổi khách hàng tiềm năng thành đối tác lâu dài trong lĩnh vực\n \ndiễn họa kiến trúc tại thị trường Nhật Bản.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Chương 3</h3>\n<p class=\"body-txt\">\n2.1 Các bước làm Email Marketing\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học tập trung vào chiến lược email marketing hiệu quả, đặc biệt là quy tắc &quot;4-</h3>\n<p class=\"body-txt\">\n1&quot; và 80/20, trong đó việc trao giá trị cho khách hàng được ưu tiên hàng đầu trước khi bán\n \nhàng. Thầy Long nhấn mạnh việc hiểu tâm lý khách hàng Việt Nam và xây dựng một kịch bản\n \nemail có hệ thống, dẫn dắt khách hàng qua các cấp độ nhận thức (What, How, Why) để tạo\n \ndựng niềm tin và sự trải nghiệm sản phẩm. Cốt lõi là xác định đúng đối tượng khách hàng\n \nmục tiêu dựa trên giá trị và niềm tin, sau đó thiết kế sản phẩm và nội dung phù hợp để giải\n \nquyết vấn đề cốt lõi của họ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Campaign: Được định nghĩa là tập hợp các khách hàng có cùng mục tiêu, bao gồm các</span></div>\n<p class=\"body-txt\">\nemail, tên, và thông tin liên hệ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cấu trúc một Campaign:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thứ nhất là các contact (tên gọi của các contact).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thứ hai là các chuỗi email tự động (auto-response/autoresponder).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thứ ba là newsletter.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chiến lược Email &quot;4-1&quot;: Thầy Long sử dụng chiến lược 4-1, nghĩa là 4 email cho đi giá trị</span></div>\n<p class=\"body-txt\">\nmới có 1 email được sử dụng để bán hàng. Ngay cả trong email bán hàng đó, cũng có 4\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">phần là giá trị và 1 phần để bán mà thôi.</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nguồn gốc chiến lược 4-1: Dựa trên quy tắc 80/20 (80% xây dựng quan hệ, 20% bán</span></div>\n<p class=\"body-txt\">\nhàng), áp dụng ngay cả trong email bán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kịch bản chuỗi email theo cấp độ tư duy (ví dụ từ Email 0 đến Email 4):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email số 0 (đầu tiên): Dùng để tặng quà (thường là tài liệu tải về như ebook, PDF).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thực tế với người Việt Nam: Khách hàng thường không tải quà tặng về ngay cả khi có</span></div>\n<p class=\"body-txt\">\ntrang Thank You Page hoặc email.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email số 1 (email tiếp theo): Nhắc nhở tải quà tặng, gửi lại đường link. Thường đặt câu</span></div>\n<p class=\"body-txt\">\nhỏi &quot;What&quot; (cái gì?) để khuyến khích khách hàng đọc lại nội dung quà tặng (ví dụ: &quot;Hôm\n \nqua bạn cũng đã tải về cuốn sách này mà chưa đọc kịp phải không? Bấm vào đây để tải\n \nlại&quot;). Mục đích là giúp khách hàng trải nghiệm sản phẩm và xây dựng sự tin cậy.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email số 2 (email tiếp theo): Nâng cấp câu hỏi lên &quot;How&quot; (như thế nào?). Ví dụ: &quot;Bạn đã</span></div>\n<p class=\"body-txt\">\nsử dụng cái đó như thế nào trong doanh nghiệp của mình?&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email số 3 (email tiếp theo): Nâng cấp câu hỏi lên &quot;Why&quot; (tại sao?) hoặc &quot;Why not&quot; (tại</span></div>\n<p class=\"body-txt\">\nsao không?). Ví dụ: &quot;Sao ở chương 7 có một tuyệt chiêu giúp bạn nhanh chóng mở rộng\n \ncửa hàng sang cửa hàng thứ 20 mà bạn vẫn không dùng nó?&quot;. Cách hỏi này mặc định\n \nkhách hàng chưa làm để khuyến khích họ hành động.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email số 4 (email tiếp theo): Là email bán hàng, nhưng ngay cả trong email này, thầy</span></div>\n<p class=\"body-txt\">\nLong cũng không bán một cách trực tiếp mà vẫn theo nguyên tắc &quot;4 phần giá trị, 1 phần\n \nbán&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xác định Khách hàng Mục tiêu:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phải xác định rõ đối tượng mục tiêu chính (ví dụ: khóa học sale của thầy Long hướng</span></div>\n<p class=\"body-txt\">\nđến chủ doanh nghiệp chứ không phải nhân viên bán hàng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Lý do: Chủ doanh nghiệp có quyền thiết kế và thay đổi toàn bộ hệ thống kinh doanh.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Không phải *tất cả* đối tượng chính đều là khách hàng tiềm năng; cần lọc ra những</span></div>\n<p class=\"body-txt\">\nngười có *đặc tính* cụ thể và *mong muốn* cải thiện hệ thống kinh doanh của mình, có\n \nniềm tin và giá trị phù hợp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thiết kế sản phẩm: Tạo sản phẩm (ví dụ: tài liệu tặng quà) để giải quyết vấn đề cốt lõi</span></div>\n<p class=\"body-txt\">\ncủa khách hàng mục tiêu (ví dụ: &quot;3 tuyệt chiêu mà  sử dụng để gia tăng\n \n20% lợi nhuận ngay lập tức&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">A/B Testing Landing Page: Tạo nhiều landing page khác nhau để kiểm tra cái nào hiệu</span></div>\n<p class=\"body-txt\">\nquả nhất trong việc thu hút và chuyển đổi khách hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chiến lược email &quot;4-1&quot; (80/20 rule): Thầy Long nhấn mạnh việc cung cấp giá trị (4</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">phần) trước khi yêu cầu bán hàng (1 phần), ngay cả trong email bán hàng. Điều này</h3>\n<p class=\"body-txt\">\nquan trọng vì nó xây dựng lòng tin và mối quan hệ bền vững với khách hàng, đi ngược\n \nlại xu hướng bán hàng trực diện ngay lập tức và tăng hiệu quả chuyển đổi về lâu dài.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kịch bản email theo cấp độ tư duy (What, How, Why/Why not): Việc dẫn dắt khách hàng</span></div>\n<p class=\"body-txt\">\nqua các câu hỏi &quot;Cái gì?&quot; (hiểu vấn đề), &quot;Làm thế nào?&quot; (áp dụng giải pháp) và &quot;Tại\n \nsao/Tại sao không?&quot; (động lực hành động) là rất quan trọng. Nó giúp khách hàng trải\n \nnghiệm sâu sắc sản phẩm, suy nghĩ nghiêm túc về vấn đề của họ và cách giải pháp có thể\n \ngiúp, từ đó tạo ra nhu cầu thực sự và sự tin cậy đối với người bán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hiểu tâm lý khách hàng Việt Nam: Thầy Long chỉ ra rằng người Việt thường không chủ</span></div>\n<p class=\"body-txt\">\nđộng tải quà tặng về ngay. Vì vậy, cần có những email nhắc nhở và kích thích họ đọc/tải\n \nlại. Điều này quan trọng vì nó tối ưu hóa chiến lược tiếp thị dựa trên hành vi thực tế của\n \nđối tượng khách hàng, không chỉ dựa trên lý thuyết chung.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xác định khách hàng mục tiêu dựa trên niềm tin và giá trị: Không phải tất cả những</span></div>\n<p class=\"body-txt\">\nngười thuộc đối tượng mục tiêu chính đều là khách hàng tiềm năng. Cần tìm những\n \nngười có mong muốn thực sự để cải thiện và có hệ thống niềm tin phù hợp với giá trị sản\n \nphẩm. Điều này quan trọng để tránh lãng phí nguồn lực vào những đối tượng không có\n \nkhả năng chuyển đổi hoặc không cần sản phẩm.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“4-1 là 4 email cho đi mới có 1 email được sử dụng để bán. Ngay cả trong email được dùng để\n \nbán thì cũng 4 phần là giá trị, 1 phần để bán mà thôi.”\n \n“Tại sao chúng ta phải làm việc này? Bởi vì khi khách hàng chọn trải nghiệm cái sản phẩm của\n \nta thì họ mới mới mới mới mới tin cậy ta.”\n \n“Điều gì sẽ diễn ra với Vincom nếu mà họ xem 30 cái tuyệt chiêu đó của tôi? Trời ơi, mẹ giàu\n \nrồi là còn giàu hơn!”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 2 (How?): Hỏi về cách họ đã áp dụng hoặc dự định áp dụng thông tin trong tài</span></div>\n<p class=\"body-txt\">\nliệu: &quot;Làm thế nào bạn có thể áp dụng phong cách render [tên phong cách] để nâng tầm\n \ndự án [tên loại dự án] của mình?&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 3 (Why/Why not?): Khơi gợi nhu cầu và lợi ích: &quot;Tại sao bạn chưa cân nhắc sử</span></div>\n<p class=\"body-txt\">\ndụng render kiến trúc chất lượng cao để thể hiện rõ nét ý tưởng thiết kế và thu hút đầu\n \ntư, khi mà các đối thủ cạnh tranh đang ngày càng chú trọng hình ảnh?&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email bán hàng (Email tiếp theo): Giới thiệu dịch vụ diễn họa 3D của FUTAGO, kèm theo</span></div>\n<p class=\"body-txt\">\nportfolio, case study và lời mời tư vấn miễn phí về dự án cụ thể. Nhấn mạnh giá trị độc\n \nđáo của FUTAGO trong việc cung cấp hình ảnh chân thực, chất lượng cao, phù hợp với\n \nthị hiếu Nhật Bản.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xác định và Phân khúc Khách hàng Mục tiêu Sâu hơn: Thay vì chỉ chung chung KTS/thiết</span></div>\n<p class=\"body-txt\">\nkế/nhà thầu/developer, cần xác định rõ *đặc tính cụ thể* của những khách hàng có\n \n*niềm tin và giá trị* phù hợp với FUTAGO. Ví dụ: Các studio kiến trúc đang muốn mở\n \nrộng quy mô nhưng thiếu nguồn lực diễn họa nội bộ, các nhà phát triển dự án cần hình\n \nảnh cao cấp cho chiến dịch marketing, hay các công ty thiết kế muốn outsource để giảm\n \nchi phí và tối ưu hóa chất lượng hình ảnh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tạo Landing Page đa dạng cho từng phân khúc/nhu cầu: Ví dụ, một landing page chuyên</span></div>\n<p class=\"body-txt\">\nvề render nội thất căn hộ, một cho render kiến trúc cảnh quan, một cho dự án thương\n \nmại lớn, để A/B test và tối ưu hóa hiệu quả tiếp thị.\n \n2.2 Ví dụ về Email Marketing\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi giảng này tập trung vào chiến lược email marketing để tạo ra doanh số và</h3>\n<p class=\"body-txt\">\nreferral một cách tự động. Thầy Long nhấn mạnh tầm quan trọng của việc cá nhân hóa nội\n \ndung email, sử dụng các câu hỏi gợi mở để kích thích hành động, và áp dụng nhiều chiến\n \nlược khác nhau để tối ưu hóa tỷ lệ chuyển đổi. Mục tiêu cuối cùng là xây dựng một hệ thống\n \nlàm việc tự động (automation) để khách hàng tự đến và tạo ra doanh thu liên tục.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chiến lược quà tặng (tặng quà): Bắt đầu bằng việc tặng quà để thu hút khách hàng đăng</span></div>\n<p class=\"body-txt\">\nký hoặc để lại thông tin.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cá nhân hóa email (kiểu &quot;old school&quot;, &quot;nông dân&quot;): Viết email với giọng văn chân thành,</span></div>\n<p class=\"body-txt\">\ngần gũi và cá nhân hóa tên người nhận.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kích thích hành động bằng câu hỏi về &quot;Bước số 4&quot; (trong chiến lược referral): Đặt câu</span></div>\n<p class=\"body-txt\">\nhỏi về một bước cụ thể trong chiến lược (ví dụ: &quot;Bạn còn nhớ bước số 4 trong tạo ra\n \nreferral là gì không?&quot;) để khơi gợi sự tò mò và nhắc nhở họ về kiến thức đã học/tài liệu\n \nđã nhận.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tạo áp lực tâm lý bằng cách giả định khách hàng &quot;hành động&quot;: Gửi email khen ngợi</span></div>\n<p class=\"body-txt\">\nkhách hàng là người hành động liên tục, ngụ ý rằng thầy Long &quot;biết&quot; họ đã triển khai hệ\n \nthống (mặc dù thực tế họ có thể chưa làm).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đề cập phần Bonus quan trọng: Nhắc nhở về phần bonus trong tài liệu/khóa học (ví dụ:</span></div>\n<p class=\"body-txt\">\n&quot;Bạn đã có bonus cho doanh nghiệp của mình chưa?&quot;) để thúc đẩy khách hàng xem lại tài\n \nliệu.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kích hoạt nỗi sợ mất mát (FOMO) và cạnh tranh: Đặt câu hỏi trực tiếp về lý do khách</span></div>\n<p class=\"body-txt\">\nhàng chưa hành động và cảnh báo rằng đối thủ cũng đang nhận/sử dụng chiến lược\n \ntương tự.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kêu gọi hành động khẩn cấp và lựa chọn: Yêu cầu khách hàng chọn giữa &quot;dùng nó&quot; hoặc</span></div>\n<p class=\"body-txt\">\n&quot;mất nó&quot;, tạo ra một áp lực quyết định.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giới thiệu các chiến lược khác (Follow The Money, Bể cá): Cung cấp thêm các chiến lược</span></div>\n<p class=\"body-txt\">\nbán hàng đơn giản, dễ triển khai khác nếu referral marketing gặp khó khăn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xử lý sự từ chối về học trực tuyến: Nhấn mạnh lợi ích của khóa học trực tuyến (học bất</span></div>\n<p class=\"body-txt\">\nkỳ lúc nào, xem đi xem lại nhiều lần) so với khóa học offline.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ưu đãi giá đặc biệt và tính khẩn cấp: Giới thiệu giá khóa học rất rẻ và một mã coupon ưu</span></div>\n<p class=\"body-txt\">\nđãi, kèm theo lời nhắc nhở rằng ưu đãi có thể hết bất cứ lúc nào (&quot;trước khi mọi điều trở\n \nnên quá muộn&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sử dụng cú pháp &quot;PS&quot; để tăng hiệu quả email: Nhấn mạnh tầm quan trọng của phần PS</span></div>\n<p class=\"body-txt\">\ntrong email bán hàng để đưa ra ưu đãi cuối cùng (ví dụ: &quot;36 tuyệt chiêu trong gia tăng\n \ndo span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email tự động hóa và thành công liên tục:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Câu chuyện Uber: Nhờ hệ thống email marketing, diễn giả giới thiệu khách hàng cho Uber và</span></div>\n<p class=\"body-txt\">\nchưa bao giờ phải trả tiền cho Uber, thậm chí còn kiếm được 200 triệu đồng và trở\n \nthành người đứng đầu về giới thiệu khách hàng cho Uber trong năm đầu tiên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sự thành công được nhân rộng: Hệ thống email marketing giúp diễn giả đạt vị trí số 1 trong</span></div>\n<p class=\"body-txt\">\nnhiều lĩnh vực khác nhau (ClickBank, hosting, Uber).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tiền về, tiền về, tiền về: Hệ thống email tự động hoạt động liên tục, ngày qua ngày,</span></div>\n<p class=\"body-txt\">\ndatabase lớn dần, tiền kiếm được tăng lên một cách hoàn toàn tự động.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sức mạnh của Hệ thống tự động hóa (Automation) và Đòn bẩy (Leverage):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Buổi giảng lặp đi lặp lại rằng chìa khóa của sự giàu có không đến từ</span></div>\n<p class=\"body-txt\">\nviệc làm việc chăm chỉ thủ công mà từ việc xây dựng một hệ thống hoạt động tự động.\n \ndiễn giả nhấn mạnh việc tạo ra một trang web &quot;ngu ngốc&quot; hay chuỗi email được thiết kế một\n \nlần nhưng có thể tự động gửi đi hàng triệu lần, mang lại doanh thu hàng tỷ đồng. Điều\n \nnày minh họa nguyên tắc đòn bẩy: đầu tư công sức một lần để tạo ra giá trị lặp lại không\n \ngiới hạn. Đây là cách để mở rộng quy mô kinh doanh vượt xa khả năng của một cá nhân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tầm quan trọng của Tâm lý học và Thấu hiểu khách hàng:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Vì sao quan trọng: diễn giả không chỉ dạy về công nghệ mà còn đi sâu vào tâm lý con người.</span></div>\n<p class=\"body-txt\">\nTừ việc sử dụng tiêu đề làm &quot;bộ lọc&quot; cho đến việc phân tích mô hình DISC để thiết kế nội\n \ndung email &quot;tấn công&quot; từng nhóm đối tượng, hay sử dụng &quot;thách thức&quot; cốc bia để kích\n \nhoạt hành động. Việc hiểu rõ động cơ, nỗi sợ hãi và mong muốn của khách hàng giúp tạo\n \nra những thông điệp cực kỳ hiệu quả, vượt qua các rào cản tâm lý để thúc đẩy họ hành\n \nđộng. Đây là yếu tố biến một hệ thống tự động thành một cỗ máy tạo ra khách hàng tiềm\n \nnăng chất lượng cao.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tư duy &quot;Tôi tạo ra cuộc sống của tôi&quot; và thay đổi để phát triển:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Vì sao quan trọng: diễn giả liên tục đối lập giữa người &quot;tin vào số phận&quot; và người &quot;tin rằng</span></div>\n<p class=\"body-txt\">\nmình tạo ra cuộc sống của mình.&quot; Ông khuyến khích thay đổi tư duy để làm chủ cuộc đời\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\nvà tài chính. Việc diễn giả tự nhận thức và hành động để rời bỏ công việc thư ký tòa, hay\n \ncách ông thách thức người khác thay đổi (như việc có thẻ tín dụng và tài khoản PayPal),\n \nđều xuất phát từ niềm tin này. Đây là nền tảng tinh thần để bất kỳ chiến lược kinh doanh\n \nhay công nghệ nào có thể thành công, bởi vì nếu không có niềm tin và ý chí thay đổi, mọi\n \ncông cụ đều trở nên vô nghĩa.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Người giàu tin tưởng tôi tạo ra cuộc sống của tôi, người nghèo tin tưởng số tôi là như vậy.”\n \n“Bí mật của trò chơi chính là ở hệ thống email marketing này. Không ai nhìn thấy nó trừ chính\n \ntôi.”\n \n“Không phải vấn đề là tôi cần cốc bia, không phải 2 đô la. Đây là một bí mật nằm phía sau.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\nnăng của hình ảnh 3D đối với dự án của bạn.&quot; (Mục đích: thu hút họ gửi thông tin dự án,\n \nmở đầu cuộc trò chuyện, và chứng minh giá trị.)\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hoặc một lời mời tinh tế hơn (tương tự &quot;cốc bia&quot;): &quot;Để tri ân quý khách hàng đã theo dõi</span></div>\n<p class=\"body-txt\">\nFUTAGO BIM, chúng tôi xin mời quý công ty tham gia buổi workshop online miễn phí về\n \n&#x27;Xu hướng diễn họa kiến trúc 3D 2024&#x27; (đăng ký cần cung cấp thông tin chi tiết về công\n \nty và dự án mẫu).&quot; Mục đích là thu thập dữ liệu khách hàng chất lượng và tạo mối quan\n \nhệ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tập trung vào giá trị hình ảnh: Toàn bộ nội dung email và trang web phải xoay quanh lợi</span></div>\n<p class=\"body-txt\">\ních cụ thể của diễn họa 3D chất lượng cao đối với khách hàng Nhật: tăng khả năng thắng\n \nthầu, cải thiện giao tiếp với chủ đầu tư, xây dựng thương hiệu kiến trúc đẳng cấp, tiết\n \nkiệm thời gian chỉnh sửa mẫu vật lý, v.v.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tạo rào cản để lọc khách hàng chất lượng: Yêu cầu các thông tin cụ thể trong form đăng</span></div>\n<p class=\"body-txt\">\nký hoặc yêu cầu tham gia &quot;thách thức&quot; để lọc ra những khách hàng thực sự quan tâm và\n \ncó tiềm năng, tránh mất thời gian với khách hàng không phù hợp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tự động hóa toàn diện: Một khi hệ thống được thiết lập, nó sẽ tự động thu hút khách</span></div>\n<p class=\"body-txt\">\nhàng tiềm năng, nuôi dưỡng họ bằng nội dung giá trị và chuyển đổi thành cơ hội kinh\n \ndoanh một cách bền vững.\n \n---\n \n2.4 Tại sao cần sử dụng Email Marketing\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi giảng này tiết lộ một &quot;bí mật&quot; mà các ông lớn kinh doanh internet không</h3>\n<p class=\"body-txt\">\nmuốn bạn biết: phần lớn (98%) khách truy cập website không mua hàng ngay lập tức. Cốt\n \nlõi của bài giảng là việc xây dựng một hệ thống chăm sóc khách hàng hoàn toàn tự động phía\n \nsau trang web, chủ yếu thông qua email marketing. Hệ thống này giúp nuôi dưỡng khách\n \nhàng tiềm năng, biến họ thành người mua và khách hàng trung thành, từ đó giảm thiểu chi\n \nphí quảng cáo và tăng hiệu quả bán hàng bền vững.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Bí mật kinh doanh internet: Google, Facebook và các nhà kinh doanh khác không muốn</span></div>\n<p class=\"body-txt\">\nbạn biết về lý do họ sẵn sàng chi rất nhiều tiền cho quảng cáo nhưng vẫn bán được hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Vấn đề hiệu quả quảng cáo: 98% những người ghé thăm trang web sau đó rời đi mà</span></div>\n<p class=\"body-txt\">\nkhông bấm vào nút mua hàng hay thực hiện bất kỳ hành động mua sắm nào.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giải pháp - Hệ thống chăm sóc khách hàng tự động: Các nhà kinh doanh thành công đã</span></div>\n<p class=\"body-txt\">\nxây dựng một hệ thống chăm sóc khách hàng bí mật, hoàn toàn tự động ở &quot;back-end&quot;\n \n(phía sau trang web).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Lợi ích của hệ thống tự động: Giúp cắt giảm đáng kể chi phí quảng cáo, tiết kiệm tiền,</span></div>\n<p class=\"body-txt\">\nvượt qua đối thủ và giảm phụ thuộc vào nhân viên chăm sóc khách hàng.\n</p>\n<div class=\"bulle "<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Lưu ý về tên danh sách/chiến dịch: Đảm bảo tên danh sách hoặc bất kỳ phần nào của</span></div>\n<p class=\"body-txt\">\nchiến dịch hiển thị cho khách hàng đều chuyên nghiệp, rõ ràng và phản ánh đúng giá trị\n \ndịch vụ diễn họa kiến trúc của FUTAGO.\n \n2.7 Tạo chuỗi Email\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học này hướng dẫn chi tiết cách tạo và gửi email tự động (autoresponder)</h3>\n<p class=\"body-txt\">\ntrong một chiến dịch marketing online. Thầy  trình bày từng bước cụ thể,\n \ntừ việc tạo danh sách email, thiết lập email chào mừng đầu tiên gửi ngay lập tức sau khi\n \nđăng ký, đến việc tạo email thứ hai gửi vào ngày tiếp theo, có tích hợp cá nhân hóa tên người\n \nnhận. Nội dung cốt lõi là xây dựng hệ thống phản hồi tự động hiệu quả để tương tác với\n \nkhách hàng tiềm năng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Bắt đầu với việc tạo hệ thống phản hồi tự động: Sau khi có danh sách email, bước tiếp</span></div>\n<p class=\"body-txt\">\ntheo là tạo autoresponder.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chọn &quot;Create Autoresponder&quot;: Nút này nằm ở phía cuối cùng trên giao diện quản lý.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chọn đúng &quot;list&quot; đã tạo: Quan trọng là phải chọn danh sách email phù hợp (ví dụ: &quot;Phụ</span></div>\n<p class=\"body-txt\">\nnữ để yêu thương&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đặt tên email và thời gian gửi:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 0 (Ngày 0): Gửi ngay lập tức sau khi khách hàng đăng ký.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 1 (Ngày 1): Gửi sau ngày 0 một ngày.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đặt tiêu đề (Subject) cho email:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 0: &quot;Chào mừng bạn đến với chương trình Phụ nữ để yêu thương&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 1: &quot;Bạn đã đọc tài liệu tôi gửi chưa?&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Viết nội dung email:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chọn &quot;Start from scratch&quot; để viết nội dung từ đầu, không bao gồm bất kỳ điều gì cả (thư</span></div>\n<p class=\"body-txt\">\ntrắng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kéo thả các module như Text để soạn thảo.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nội dung email 0: Giới thiệu bản thân (&quot;Tôi là Long, người quản lý chương trình Phụ nữ</span></div>\n<p class=\"body-txt\">\nđể yêu thương&quot;), chúc mừng đăng ký thành công, kêu gọi hành động (ví dụ: &quot;Bấm vào\n \nđây để nhận ebook của bạn&quot;, &quot;để xem video&quot;), và thông báo sẽ gửi email trong những\n \nngày tới.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nội dung email 1: Hỏi về việc đọc tài liệu đã gửi, có thể tích hợp cá nhân
