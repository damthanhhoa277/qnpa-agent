le=\"color:#d81b60\">•</span><span class=\"bul-txt\">1.11 Hỏi đáp</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">1.12 Bài tập về nhà</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Chương 3</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">2.1 Các bước làm Email Marketing</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">2.2 Ví dụ về Email Marketing</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">2.3 Kinh doanh online nhất định phải có hệ thống Email Marketing</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">2.4 Tại sao cần sử dụng Email Marketing</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">2.6 Tạo danh sách</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">2.7 Tạo chuỗi Email</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">2.8 Tạo landing page</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Chương 4</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">3.1 Hệ thống Email Marketing</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">3.2 Cấu trúc Email bán hàng 1</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">3.3 Cấu trúc Email bán hàng 2</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">3.4 Thiết kế cấu trúc Email bán hàng</span></div>\n<div class=\"bullet\"><span class= "<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">4.4 Thư phản hồi tự động (Autoresponder)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">4.5 Thư tin tức (Newsleter)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">4.6 Khái niệm Opt-in, Double Opt-in</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">4.7 7 Cấp độ xây dựng Raving Fan</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">4.8 Chuỗi email gia tăng giá trị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">4.9 Lập kế hoạch Email</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">4.10 Kế hoạch viết Email</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">4.11 Suy nghĩ thấu đáo</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">4.12 Các loại email</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">4.13 Thư trả lời tự động</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">4.14 Các loại email phần 2</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">4.15 Bài tập về nhà</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">4.16 Hỏi đáp</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Chương s=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">6.4 Cách đặt tiêu đề có giá trị cao</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">6.5 Các loại quà tặng miễn phí giá trị cao</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">6.6 Tổng kết</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Chương 8</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">7.1 Chuỗi email bán chảo</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">7.2 Chuỗi email bán pate cho chó mèo</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">7.3 Chuỗi email về xây dựng hệ thống kinh doanh</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">7.4 Tổng kết</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Chương 9</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">8.1 Ôn tập chuỗi email bán hàng</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#d81b60\">Chương 1</h3>\n<p class=\"body-txt\">\nCách ghi chép bài hiệu quả - Hãy thực hành ngay\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học này tập trung hướng dẫn phương pháp ghi chép hiệu quả để tối ưu hóa</h3>\n<p class=\"body-txt\">\nviệc học và chuyển đổi kiến thức thành hành động. Hệ thống ghi chép bao gồm việc sử dụng\n \nsổ A4/A5 với bố cục ba cột (tiêu đề, nội dung, hành động), viết bằng bút chì cách dòng để dễ\n \nchỉnh sửa. Đặc biệt, phương pháp cắt dán các phần quan trọng vào một cuốn sổ riêng giúp\n \nchắt lọc thông tin và dễ dàng ôn tập nhanh chóng. Mục tiêu cuối cùng là biến mọi ý tưởng\n \nthành hành động cụ thể để đạt được kết quả, cũng như liên tục cải tiến và tối ưu hóa kiến\n \nthức cá nhân.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Loại sổ và kích thước: Sử dụng sổ A4 để ghi chép hàng ngày và sổ A5 để mang theo bên</span></div>\n<p class=\"body-txt\">\nmình (hoặc bất kỳ vở A5 nào).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Bố cục trang giấy:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chia trang giấy thành 3 cột.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cột trái (lề trái khoảng 3.5cm): Ghi các tiêu đề chính, ý lớn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cột giữa (khoảng 14cm): Ghi nội dung chi tiết.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cột phải (lề phải khoảng 3.5cm): Ghi các hành động cụ thể cần làm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Công cụ ghi chép: Sử dụng bút chì (đặc biệt là bút 2B) vì hiệu quả gấp &quot;nghìn lần&quot; bút bi</span></div>\n<p class=\"body-txt\">\ntẩy được.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cách ghi chép: Ghi cách dòng (không ghi liền dòng) để chừa khoảng trống cho việc chỉnh</span></div>\n<p class=\"body-txt\">\nsửa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nguyên tắc sửa lỗi: Khi có ý tưởng sai hoặc muốn thay đổi, gạch ngang phần đã ghi và</span></div>\n<p class=\"body-txt\">\nviết ý mới lên trên. Tránh xóa hoàn toàn (trừ trường hợp viết sai chính tả).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mục tiêu đọc lại: Ghi chép sao cho có thể đọc lại toàn bộ tài liệu (ví dụ: 100 trang) trong</span></div>\n<p class=\"body-txt\">\nvòng 100 phút (tương đương 1 phút/trang).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tầm quan trọng của hành động: Mọi ý tưởng phải đi kèm với hành động cụ thể. Nếu</span></div>\n<p class=\"body-txt\">\nkhông hành động, ý tưởng sẽ không tạo ra kết quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sử dụng giấy nháp: Dùng giấy nháp hoặc giấy tái chế để tiết kiệm và chỉ viết một mặt.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phương pháp &quot;cắt dán&quot;: Cắt những đoạn nội dung hay, quan trọng từ các trang giấy A4,</span></div>\n<p class=\"body-txt\">\ntài liệu khác hoặc giấy nháp và dán vào cuốn sổ A5 cá nhân. Điều này giúp chắt lọc và tạo\n \nra một cuốn sổ cá nhân hóa, tinh gọn kiến thức.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Bộ công cụ học tập: Bút chì, tẩy, giấy kẻ sẵn, kéo và hồ dán.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sách đề xuất: &quot;Khoa học về sự đơn giản&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">(Thầy cũng đề cập sơ qua về việc sử dụng bút dạ 4 màu: xanh, đỏ, tím, vàng để ghi chú</span></div>\n<p class=\"body-txt\">\nthêm).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuyển hóa Ý tưởng thành Hành động cụ thể: Đây là luận điểm xuyên suốt và được thầy</span></div>\n<p class=\"body-txt\">\nnhấn mạnh mạnh mẽ nhất: &quot;Nếu mà chúng ta đi học cái có kem về mà chúng ta không\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">hành động thì nó không có cái kết quả gì diễn ra cả. Cho nên là cái hành động là cái quan</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\ntrọng nhất ở đây.&quot; Điều này quan trọng vì nó định hướng việc học không chỉ dừng lại ở\n \nviệc tiếp thu kiến thức mà phải biến kiến thức đó thành các bước thực thi để tạo ra kết\n \nquả hữu hình, một tư duy cốt lõi trong kinh doanh và marketing.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hệ thống ghi chép &quot;cắt dán&quot; để chắt lọc và cá nhân hóa kiến thức: Phương pháp này độc</span></div>\n<p class=\"body-txt\">\nđáo ở chỗ nó khuyến khích người học chủ động &quot;phẫu thuật&quot; tài liệu. Bằng cách cắt\n \nnhững phần hay nhất, quan trọng nhất từ nhiều nguồn (giấy nháp, tài liệu, sổ A4...) và\n \ndán vào một cuốn sổ A5 riêng, người học tạo ra một &quot;tài liệu sống&quot; đã được tinh lọc, tối\n \nưu hóa cho việc ôn tập nhanh và ứng dụng thực tiễn, phản ánh chính quá trình tư duy và\n \nhọc tập của bản thân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phương pháp ghi chép linh hoạt, không sợ sai để khuyến khích tư duy phản biện và cải</span></div>\n<p class=\"body-txt\">\ntiến liên tục: Việc ghi cách dòng, dùng bút chì, và gạch ngang thay vì xóa khi có ý tưởng\n \nmới hoặc nhận ra sai sót, tạo ra một môi trường không áp lực cho việc ghi chú. Điều này\n \nkhuyến khích sự suy nghĩ liên tục, dễ dàng điều chỉnh và phát triển ý tưởng mà không sợ\n \nlàm hỏng tài liệu, giúp nội dung ghi chép trở nên năng động và phản ánh đúng quá trình\n \ntư duy và sự phát triển của kiến thức.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Bút chì hiệu quả gấp nghìn lần bút bút bi tẩy được.”\n \n“Nếu mà chúng ta đi học cái có kem về mà chúng ta không hành động thì nó không có cái kết\n \nquả gì diễn ra cả. Cho nên là cái hành động là cái quan trọng nhất ở đây.”\n \n“Cả một cái tập tài liệu này rất là hay. Nhưng mà nó chỉ có hay mỗi cái đoạn này thôi. Ta cắt\n \ncái đoạn này hay.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\nhoặc các khó khăn gặp phải và cách giải quyết. Cột &quot;tiêu đề&quot; là các giai đoạn trong quy\n \ntrình (ví dụ: &quot;Modeling&quot;, &quot;Lighting&quot;, &quot;Post-production&quot;). Cột &quot;nội dung&quot; là các ghi chú kỹ\n \nthuật, phần mềm, hoặc lưu ý. Cột &quot;hành động&quot; là các đề xuất cải tiến quy trình, thử\n \nnghiệm công cụ mới (ví dụ: &quot;Nghiên cứu plugin X để tăng tốc độ render&quot;, &quot;Chuẩn hóa thư\n \nviện vật liệu cho dự án biệt thự&quot;). Việc này giúp liên tục cải thiện hiệu suất, chất lượng\n \nđầu ra và rút ngắn thời gian hoàn thành dự án.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Chương 2</h3>\n<p class=\"body-txt\">\n1.1 Phân biệt Email và Gmail\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi giảng tập trung phân biệt rõ email (thư điện tử nói chung) và Gmail (một loại</h3>\n<p class=\"body-txt\">\nemail cụ thể của Google), nhấn mạnh việc một danh từ riêng có thể trở thành danh từ chung\n \ndo sự phổ biến quá mức, dẫn đến mất bảo hộ sở hữu trí tuệ. Thầy Long cũng giới thiệu lịch\n \nsử phát triển của các dịch vụ email (Hotmail, Yahoo Mail) và phân tích lý do Gmail bùng nổ\n \nnhờ dung lượng lưu trữ lớn, khả năng tìm kiếm mạnh mẽ và tích hợp đa dịch vụ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giới thiệu chủ đề Email Marketing, một chương trình &quot;thất truyền&quot; và &quot;quá hay&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phân biệt email và Gmail, nêu lên sự nhầm lẫn phổ biến giữa hai khái niệm này.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sử dụng các ví dụ về danh từ riêng trở thành danh từ chung do sự phổ biến (Honda</span></div>\n<p class=\"body-txt\">\nthành xe máy, Omo thành bột giặt, Maggi thành nước tương).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giới thiệu nguyên tắc trong Luật Sở hữu trí tuệ: Khi một danh từ riêng (nhãn hiệu) bị</span></div>\n<p class=\"body-txt\">\n&quot;trung hòa&quot; hoặc &quot;đồng hóa&quot; thành tên gọi chung của một loại sản phẩm, nó sẽ mất\n \nquyền bảo hộ độc quyền.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Lịch sử phát triển của các dịch vụ email trước Gmail: Hotmail (phổ biến những năm</span></div>\n<p class=\"body-txt\">\n199x, sau này được Microsoft mua lại) và Yahoo Mail (phổ biến hơn Hotmail sau đó).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sự ra đời và chiến lược marketing đột phá của Google Gmail năm 2004 (ngày 1 tháng 4):</span></div>\n<p class=\"body-txt\">\nCung cấp dung lượng lưu trữ email 1GB miễn phí, một con số khổng lồ so với các giải\n \npháp lưu trữ thời điểm đó (ví dụ: đĩa mềm 1.44MB).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gmail đã thay đổi thói quen người dùng: loại bỏ nhu cầu xóa email hàng ngày nhờ dung</span></div>\n<p class=\"body-txt\">\nlượng lớn (ban đầu 1GB, hiện tại 15GB miễn phí hoặc không giới hạn nếu trả phí).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Các tính năng nổi bật của Gmail: khả năng tìm kiếm mạnh mẽ giúp người dùng dễ dàng</span></div>\n<p class=\"body-txt\">\ntìm thấy bất kỳ thông tin nào, và tích hợp với nhiều ứng dụng khác của Google (Google\n \nDrive, Docs, Sheets, lưu trữ video).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kết luận: Gmail trở thành lựa chọn gần như duy nhất và phổ biến nhất, khiến nhiều</span></div>\n<p class=\"body-txt\">\nngười nhầm lẫn Gmail là email nói chung. Email là danh từ chung, Gmail là một loại\n \nemail cụ thể (của Google).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phân biệt SMS (tin nhắn của điện thoại, gửi qua mạng điện thoại) và Email (chương</span></div>\n<p class=\"body-txt\">\ntrình thư điện tử, gửi qua internet).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giải thích cấu trúc cơ bản của một địa chỉ email: `[tên riêng/tài khoản]@` `[tên miền]`. Ví</span></div>\n<p class=\"body-txt\">\ndụ: `LongPT@typhu.com` hoặc `luatpham@gmail.com`.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sự phổ biến quá mức có thể làm mất đi giá trị độc quyền của thương hiệu: Khái niệm</span></div>\n<p class=\"body-txt\">\n&quot;genericide&quot; (trung hòa danh từ riêng) trong luật sở hữu trí tuệ là một bài học đắt giá.\n \nKhi một nhãn hiệu trở nên quá phổ biến đến mức tên gọi của nó bị đồng hóa thành tên\n \nchung của một loại sản phẩm (ví dụ: Honda cho xe máy, Omo cho bột giặt), nó sẽ mất\n \nquyền bảo hộ độc quyền. Điều này cực kỳ quan trọng đối với các doanh nghiệp khi xây\n \ndựng và bảo vệ thương hiệu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gmail đã thay đổi hành vi người dùng bằng cách giải quyết vấn đề cốt lõi: Bằng cách</span></div>\n<p class=\"body-txt\">\ncung cấp dung lượng lưu trữ email khổng lồ (ban đầu 1GB miễn phí, sau đó tăng lên) và\n \nkhả năng tìm kiếm mạnh mẽ, Google đã loại bỏ &quot;nỗi đau&quot; phải xóa email hàng ngày của\n \nngười dùng. Đây là minh chứng cho việc một sản phẩm/dịch vụ đột phá có thể thay đổi\n \nhoàn toàn thói quen và tạo ra thị trường mới.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Email marketing là một chương trình đã thất truyền khá là lâu và tôi không nói đến rất là lâu\n \nbởi vì nó quá hay.”\n \n“Đừng có nổi tiếng quá, nổi tiếng quá là mất luôn tên của mình.”\n \n“Không có cái mail nào mạnh như là mail Google hết, tìm cái gì nó cũng ra hết ấy.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\n1.2 Spam là gì, tại sao ta cần tránh\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học tập trung định nghĩa và cảnh báo về spam trong internet marketing, đặc</h3>\n<p class=\"body-txt\">\nbiệt là email spam. Thầy  giải thích spam là những thông điệp không mong\n \nmuốn được gửi đi cho nhiều người, và nhấn mạnh sự khác biệt với email marketing là thông\n \nđiệp phải được người nhận mong muốn đọc. Việc bị đánh dấu spam với tỷ lệ chỉ 3/1000 sẽ\n \ndẫn đến hậu quả nghiêm trọng như bị khóa dịch vụ hoặc phạt nặng. Thầy cũng mở rộng khái\n \nniệm spam sang tin nhắn, điện thoại và cả bình luận trên Facebook, đồng thời khuyên học\n \nviên tuyệt đối không sử dụng các phương pháp spam vì nó hủy hoại môi trường internet.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Định nghĩa Spam: Spam là một email/tin nhắn/cuộc gọi không mong muốn, được gửi đi</span></div>\n<p class=\"body-txt\">\ncho nhiều người.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phân biệt Email Marketing và Spam:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email marketing là việc gửi đi một thông điệp mà người đọc *mong muốn đọc*.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Spam là gửi đi những email mà người đọc *không muốn nhận*.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ngưỡng bị đánh dấu Spam: Nếu tỷ lệ người đọc không muốn nhận email của bạn vượt</span></div>\n<p class=\"body-txt\">\nquá 3/1000 (0.3%), toàn bộ chuỗi email của bạn có thể bị coi là spam.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hậu quả của Spam:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Bị đánh dấu là thư rác.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Bị phạt rất nặng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hãng cung cấp dịch vụ có thể từ chối cung cấp dịch vụ cho bạn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nguyên tắc &quot;Được phép&quot;: Bạn phải có bằng chứng về việc người đó đã đồng ý nhận email</span></div>\n<p class=\"body-txt\">\ntừ bạn để xử lý khiếu nại sau này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Các hình thức Spam bị cấm/không nên làm:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mua danh sách email rồi gửi thư (nay ít người làm nhưng vẫn là hành vi spam nguy</span></div>\n<p class=\"body-txt\">\nhiểm).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gọi điện thoại đến các số điện thoại bị báo cáo (luật viễn thông Việt Nam cấm).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi tin nhắn hàng loạt (chỉ có thể gửi tin nhắn đã đăng ký mẫu).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Bình luận dạo trên Facebook (comment không mong muốn với số lượng lớn).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Rủi ro khi Import danh sách:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khi nhập danh sách email từ nhà cung cấp khác vào hệ thống của bạn, rất dễ bị dính</span></div>\n<p class=\"body-txt\">\nspam vì hệ thống sẽ quét lại để kiểm tra sự đồng ý.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nếu danh sách nhập vào có tỷ lệ email &quot;chết&quot; (email không có thật) quá cao, nhà mạng sẽ</span></div>\n<p class=\"body-txt\">\nđóng tài khoản dịch vụ của bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Quan điểm về Spam: Thầy không bao giờ dạy và không bao giờ khuyên học viên làm bất</span></div>\n<p class=\"body-txt\">\nkỳ điều gì liên quan đến spam, vì nó hủy hoại môi trường internet.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ngưỡng 3/1000 (0.3%) là cực kỳ nghiêm trọng: Đây là con số cụ thể, rất thấp nhưng</span></div>\n<p class=\"body-txt\">\nquyết định bạn có bị coi là spammer hay không. Chỉ cần 3 người trong số 1000 người\n \nnhận đánh dấu email của bạn là spam, toàn bộ chuỗi email của bạn sẽ bị hệ thống đánh\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\ndấu là spam. Điều này nhấn mạnh tầm quan trọng của việc chỉ gửi email cho những\n \nngười *thực sự mong muốn* nhận nó và chất lượng của danh sách email.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">&quot;Phải có bằng chứng về sự đồng ý&quot;: Đây là yếu tố cốt lõi để tránh rủi ro pháp lý và duy trì</span></div>\n<p class=\"body-txt\">\nuy tín. Việc chỉ &quot;nghĩ là họ đồng ý&quot; là chưa đủ; cần có bằng chứng rõ ràng và lưu trữ nó\n \nđể đối phó với các khiếu nại sau này. Insight này chuyển hoạt động email marketing từ\n \nmột hành động đơn thuần thành một giao dịch có trách nhiệm, bảo vệ người gửi và xây\n \ndựng niềm tin với khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khái niệm Spam rộng hơn email: Spam không chỉ giới hạn ở email mà còn bao gồm các</span></div>\n<p class=\"body-txt\">\nhình thức giao tiếp hàng loạt không mong muốn khác như tin nhắn, điện thoại, và bình\n \nluận trên mạng xã hội. Điều này giúp người học có cái nhìn toàn diện hơn về đạo đức\n \nmarketing trực tuyến và tránh các hành vi gây hại cho thương hiệu trên nhiều nền tảng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Rủi ro khi sử dụng danh sách có sẵn (mua/import): Việc mua hoặc nhập khẩu danh sách</span></div>\n<p class=\"body-txt\">\nemail từ nguồn khác là một rủi ro lớn, dễ dẫn đến tỷ lệ email &quot;chết&quot; cao hoặc không có\n \nbằng chứng đồng ý, khiến dịch vụ của bạn bị khóa. Insight này cảnh báo về con đường\n \ntắt nguy hiểm, khuyến khích xây dựng danh sách từ đầu một cách minh bạch và chất\n \nlượng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Tóm lại, spam là một cái email không mong muốn được gửi đi cho nhiều người.”\n \n“Email marketing và spam khác nhau ở cái chỗ đó là chúng ta gửi đi một thông điệp mà người\n \nđọc mong muốn đọc.”\n \n“Bạn phải có bằng chứng về việc người đó đã đồng ý nhận mail từ bạn.”\n \n“Tôi sẽ không bao giờ dạy các bạn và không bao giờ khuyên các bạn làm bất kỳ cái điều gì liên\n \nquan đến cái cách làm như vậy.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi học tập trung vào chiến lược email marketing trong bức tranh tiếp thị</h3>\n<p class=\"body-txt\">\ninternet tổng thể. Thầy  trình bày cách phân loại khách hàng thành ba\n \nnhóm chính: lạnh, ấm và nóng, tương ứng với các giai đoạn trong phễu bán hàng. Cốt lõi của\n \nbuổi giảng là vai trò của email marketing như một &quot;xương sống&quot; để kết nối và thúc đẩy các\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\nkênh khác như video, fanpage, và blog, không chỉ để bán hàng mà còn để xây dựng mối quan\n \nhệ và phát triển các nền tảng số. Email đóng vai trò trung tâm trong việc thu hút và làm ấm\n \nthị trường lạnh, dẫn dắt khách hàng tiềm năng đến thị trường nóng, nơi diễn ra việc bán\n \nhàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email marketing là một phần của chiến lược internet marketing, chia sẻ tư duy tương tự</span></div>\n<p class=\"body-txt\">\nvới video và blog.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mô hình marketing nói chung và email marketing nói riêng được chia thành 4 giai</span></div>\n<p class=\"body-txt\">\nđoạn/thị trường: lạnh, ấm, nóng, và sau đó là bán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Các giai đoạn này còn được gọi là TOFU (Top of the Funnel - thị trường lạnh), MOFU</span></div>\n<p class=\"body-txt\">\n(Middle of the Funnel - thị trường ấm), BOFU (Back of the Funnel - thị trường nóng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thị trường lạnh là những người lạ, cần chiến lược làm quen.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thị trường ấm là những người đã quen với email của bạn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thị trường nóng là những người thân thuộc, thân quý, sẵn sàng mua hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mục tiêu là thu hút thị trường lạnh và làm &quot;nóng&quot; họ lên.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email marketing ngày nay không còn là phương tiện phổ biến hàng ngày nhưng là &quot;cốt</span></div>\n<p class=\"body-txt\">\nlõi&quot; cho các hoạt động marketing khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email được sử dụng để &quot;kéo&quot; (thúc đẩy) các kênh khác như fanpage, YouTube, blog, giúp</span></div>\n<p class=\"body-txt\">\ntăng tương tác và đẩy mạnh các nội dung trên đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ngược lại, các kênh như video, blog, fanpage, và quảng cáo được sử dụng để thu hút</span></div>\n<p class=\"body-txt\">\nngười dùng đăng ký vào danh sách email.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Đây là một chu trình tuần hoàn: mạng xã hội/quảng cáo ở đầu phễu (thị trường lạnh),</span></div>\n<p class=\"body-txt\">\nemail ở giữa để giữ liên lạc và làm ấm khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Các học viên thành công (TikToker, YouTuber, Fanpage admin) chia sẻ về việc áp dụng</span></div>\n<p class=\"body-txt\">\nkhóa học Video Marketing 28 Ngày và tầm quan trọng của việc dám bắt đầu và hành\n \nđộng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kênh TikTok lúc mới ra rất dễ lên vì ít người làm. Cái gì mới thì bao giờ cũng dễ làm hơn.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email marketing là xương sống, không phải công cụ lẻ tẻ: Thầy  nhấn</span></div>\n<p class=\"body-txt\">\nmạnh rằng email marketing không chỉ là một công cụ riêng lẻ mà là &quot;backbone&quot; – xương\n \nsống kết nối và kích hoạt tất cả các hoạt động marketing khác (video, blog, fanpage).\n \nĐiều này quan trọng vì nó thay đổi tư duy về email marketing, từ việc coi nó là phương\n \ntiện lỗi thời sang một công cụ chiến lược trung tâm để đảm bảo các kênh khác hoạt động\n \nhiệu quả và có sự phối hợp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mô hình 4 giai đoạn (lạnh-ấm-nóng) áp dụng cho mọi kênh: Việc phân loại khách hàng</span></div>\n<p class=\"body-txt\">\nthành thị trường lạnh, ấm, nóng (hoặc TOFU, MOFU, BOFU) cung cấp một khung chiến\n \nlược rõ ràng cho bất kỳ hoạt động marketing nào, bao gồm cả email marketing. Điều này\n \nquan trọng vì nó giúp doanh nghiệp hiểu rõ đối tượng mục tiêu đang ở giai đoạn nào\n \ntrong hành trình mua hàng để đưa ra nội dung và chiến lược tiếp cận phù hợp, tránh\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\nviệc cố gắng bán hàng cho thị trường lạnh hoặc bỏ lỡ cơ hội bán hàng cho thị trường\n \nnóng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tính hai chiều của email và các kênh khác: Các nền tảng số (video, blog, fanpage, quảng</span></div>\n<p class=\"body-txt\">\ncáo) vừa được email kéo lên để tăng tương tác, vừa có nhiệm vụ thu hút người dùng\n \nđăng ký vào danh sách email. Insight này quan trọng vì nó mô tả một hệ sinh thái\n \nmarketing tích hợp và tự nuôi dưỡng, nơi không có kênh nào hoạt động độc lập. Mọi\n \nkênh đều hỗ trợ lẫn nhau, tạo ra một vòng lặp thu hút và chuyển đổi khách hàng hiệu\n \nquả, đảm bảo sự phát triển bền vững.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Email chính là back-bone, là xương sống cho hoạt động marketing là vì như thế.”\n \n“Thị trường lạnh tức là những cái người lạ với chúng ta.”\n \n“Cái gì cũng thế, mới thì bao giờ cũng dễ làm hơn.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\n1.4 Mô hình kinh doanh miễn phí\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi giảng tập trung vào chiến lược kinh doanh kết hợp mô hình &quot;miễn phí&quot; với</h3>\n<p class=\"body-txt\">\n&quot;Long Tail&quot; để thu hút và giữ chân khách hàng. Thầy nhấn mạnh rằng &quot;miễn phí&quot; phải đi kèm\n \nvới &quot;chất lượng cao&quot; để tạo giá trị thực sự. Hơn nữa, việc tạo ra nội dung &quot;giáo dục&quot;\n \n(EduTalk/Edutainment) mang tính &quot;Forever Green&quot; (mãi mãi xanh) sẽ xây dựng độ bền và\n \ngiá trị lâu dài cho doanh nghiệp, trái ngược với nội dung tin tức ngắn hạn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Từ khóa đầu tiên của chiến lược là &quot;miễn phí&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy đề cập đến cuốn sách &quot;Thiết kế mô hình kinh doanh&quot; và &quot;mô hình kinh doanh miễn</span></div>\n<p class=\"body-txt\">\nphí&quot; trong đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chiến lược cốt lõi là áp dụng kết hợp hai mô hình: &quot;Long Tail&quot; (cái đuôi dài) và &quot;miễn</span></div>\n<p class=\"body-txt\">\nphí&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mô hình &quot;Long Tail&quot; nghĩa là bán cho khách hàng một sản phẩm, rồi tiếp tục bán thêm,</span></div>\n<p class=\"body-txt\">\nbán tiếp nhiều lần.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mô hình &quot;miễn phí&quot; được dùng để khởi động và thu hút khách hàng đến với doanh</span></div>\n<p class=\"body-txt\">\nnghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ điển hình là Gmail đã cung cấp 1GB miễn phí khi mới ra mắt, gấp 500 lần đối thủ</span></div>\n<p class=\"body-txt\">\nHotmail (2MB), chứng tỏ &quot;miễn phí mà có chất lượng cao&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Điều kiện tiên quyết là &quot;miễn phí&quot; phải đi kèm với &quot;chất lượng cao&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khái niệm &quot;EduTalk&quot; (trên TikTok) hay &quot;Edutainment&quot; (trong chương trình Eagle Camp)</span></div>\n<p class=\"body-txt\">\nlà giáo dục kết hợp với giải trí.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nội dung giáo dục thường được cộng đồng đón nhận chậm hơn so với giải trí, nhưng có</span></div>\n<p class=\"body-txt\">\n&quot;độ bền&quot; cao hơn &quot;rất nhiều lần&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Loại nội dung giáo dục này được gọi là &quot;mãi mãi xanh&quot; (Forever Green), nghĩa là &quot;làm</span></div>\n<p class=\"body-txt\">\nmột lần, nó còn xanh mãi&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ngược lại, việc làm nội dung &quot;tin tức&quot; (như YouTube tin tức) rất vất vả vì phải liên tục</span></div>\n<p class=\"body-txt\">\nsăn tin mới và tin tức nhanh lỗi thời.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Vì vậy, nên tập trung vào xây dựng &quot;kênh giáo dục&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nếu làm tốt Email Marketing, các kỹ năng đó có thể áp dụng thành công cho cả YouTube</span></div>\n<p class=\"body-txt\">\nvà TikTok.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thầy chia sẻ kinh nghiệm cá nhân khi làm TikTok trong một tháng đã đạt 800.000 lượt</span></div>\n<p class=\"body-txt\">\ntheo dõi nhưng sau đó từ bỏ vì đối tượng mục tiêu không phù hợp, không đạt hiệu quả\n \nmong muốn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chiến lược kết hợp &quot;Miễn phí&quot; chất lượng cao để khởi động &quot;Long Tail&quot;: Đây là một công</span></div>\n<p class=\"body-txt\">\nthức mạnh mẽ để thu hút khách hàng ban đầu và xây dựng mối quan hệ lâu dài. &quot;Miễn\n \nphí&quot; là mồi câu, nhưng phải là mồi câu chất lượng để tạo niềm tin và giá trị. Một khi\n \nkhách hàng đã tin tưởng và trải nghiệm chất lượng, họ sẽ dễ dàng quay lại và sử dụng\n \ncác sản phẩm/dịch vụ khác của bạn theo mô hình &quot;Long Tail&quot;, giúp tăng doanh thu bền\n \nvững thay vì chỉ bán một lần.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tập trung vào nội dung &quot;Forever Green&quot; (mãi mãi xanh) thông qua</span></div>\n<p class=\"body-txt\">\n&quot;EduTalk/Edutainment&quot;: Thay vì chạy theo các nội dung &quot;thời sự&quot;, &quot;tin tức&quot; nhanh lỗi\n \nthời và tốn công sức duy trì, việc đầu tư vào nội dung giáo dục có giá trị bền vững sẽ\n \nmang lại hiệu quả lâu dài. Mặc dù tốc độ lan truyền ban đầu có thể chậm hơn giải trí,\n \nnhưng nội dung &quot;mãi mãi xanh&quot; sẽ liên tục mang lại giá trị, định vị doanh nghiệp như\n \nmột chuyên gia, và giúp xây dựng một tệp khách hàng trung thành theo thời gian mà\n \nkhông cần đầu tư lại liên tục.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sự chuyển đổi kỹ năng giữa các kênh marketing: Thầy nhấn mạnh rằng &quot;Nếu hôm nay</span></div>\n<p class=\"body-txt\">\ncác anh chị học hết 8 tuần này với tôi, anh chị em làm được email thì các anh chị em\n \ncũng làm được YouTube. Anh chị em làm được email thì các anh chị em cũng làm được\n \nTikTok.&quot; Điều này cho thấy rằng việc nắm vững nguyên lý marketing cơ bản và hiểu biết\n \nvề khách hàng quan trọng hơn việc thành thạo từng nền tảng riêng lẻ. Khi có nền tảng\n \nvững chắc, khả năng thích ứng và mở rộng sang các kênh khác là hoàn toàn khả thi.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Cái miễn phí của chúng ta ở đây các anh chị em cũng chú ý là phải miễn phí mà có chất lượng\n \ncao.”\n \n“Nó là Forever Green, mãi mãi xanh. Nên ta làm một lần, mãi mãi nó còn xanh mãi.”\n \n“Nếu hôm nay các anh chị học hết 8 tuần này với tôi, anh chị em làm được email thì các anh\n \nchị em cũng làm được YouTube. Anh chị em làm được email thì các anh chị em cũng làm được\n \nTikTok.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\nphong cách diễn họa mới, hoặc mời tham gia các buổi &quot;chia sẻ kinh nghiệm&quot; độc quyền\n \n(miễn phí) về cách tối ưu hóa hiệu quả truyền thông bằng hình ảnh kiến trúc. Điều này\n \ngiúp giữ chân khách hàng, xây dựng lòng tin và chuyển đổi họ thành khách hàng thường\n \nxuyên của dịch vụ diễn họa.\n \n1.5 Thị trường Lạnh - Ấm - Nóng\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi giảng tập trung vào cách tiếp cận thị trường lạnh (cold market) thông qua</h3>\n<p class=\"body-txt\">\nviệc xây dựng &quot;hồ sơ khách hàng&quot; chi tiết và áp dụng kỹ thuật kể chuyện 7 bước. Cốt lõi là\n \nthấu hiểu và nêu ra vấn đề của khách hàng, sau đó đồng cảm bằng cách chia sẻ trải nghiệm\n \ntương tự của bản thân, và cuối cùng giới thiệu giải pháp (sản phẩm/dịch vụ) trong một câu\n \nchuyện hấp dẫn. Phong cách viết email hay video marketing cần đơn giản, ngắn gọn và gần\n \ngũi như văn nói.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mục đích tiếp thị thị trường lạnh: Nêu ra, chỉ ra và giáo dục khách hàng về *vấn đề của</span></div>\n<p class=\"body-txt\">\nhọ*.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng hồ sơ khách hàng: Cần có &quot;hồ sơ khách hàng&quot; (customer profile) chi tiết cho</span></div>\n<p class=\"body-txt\">\nmọi công việc (marketing, bán hàng, thiết kế sản phẩm). Điều này giúp hiểu rõ khách\n \nhàng và dự đoán vấn đề họ đang gặp phải.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cách thức giao tiếp với thị trường lạnh: Nói về *vấn đề của họ* nhưng dưới hình thức là</span></div>\n<p class=\"body-txt\">\n*câu chuyện của ta* (người bán).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sử dụng &quot;phép lặp&quot;: Dùng các từ/cụm từ lặp lại để nhấn mạnh vấn đề hoặc các điểm</span></div>\n<p class=\"body-txt\">\nquan trọng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kỹ thuật &quot;đồng cảm hoán vai&quot;: Chia sẻ câu chuyện cá nhân về việc &quot;tôi đã từng như vậy&quot;</span></div>\n<p class=\"body-txt\">\n(điểm A quá khứ của người bán) để khách hàng thấy được mình trong đó (điểm A hiện\n \ntại của khách hàng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Áp dụng &quot;Bảy bước kể chuyện&quot;:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Khát khao mong muốn: Khách hàng muốn đạt được điều gì?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hiện tại khó khăn: Thực trạng khó khăn nào đang ngăn cản họ?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nhân vật phản diện: Ai/cái gì là nguyên nhân, trở ngại?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nhân vật hỗ trợ / Bí kíp: Ai/cái gì sẽ giúp họ vượt qua (chính là sản phẩm/dịch vụ của</span></div>\n<p class=\"body-txt\">\nbạn)?\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Diễn biến trận đánh / Câu chuyện: Quá trình áp dụng bí kíp, có thể có những thử thách</span></div>\n<p class=\"body-txt\">\nban đầu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kết quả đạt được: Thành công, những lợi ích rõ ràng mà khách hàng nhận được.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Bài học rút ra: Thông điệp cuối cùng, giá trị cốt lõi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phong cách viết email marketing:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sử dụng câu văn đơn, ngắn gọn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giống văn nói, văn chat (ít dùng dấu chấm, không viết hoa đầu dòng) để tạo sự gần gũi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sử dụng từ ngữ đời thường, ít trang trọng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kết thúc email/câu chuyện: Cần có lý do rõ ràng để ngắt mạch và hẹn cho lần sau (ví dụ:</span></div>\n<p class=\"body-txt\">\n&quot;tôi phải đi tắm đây&quot;).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tạo hồ sơ khách hàng chi tiết và thấu hiểu vấn đề của họ: Việc dành thời gian nghiên cứu</span></div>\n<p class=\"body-txt\">\nvà xây dựng &quot;hồ sơ khách hàng&quot; giúp xác định chính xác nỗi đau và mong muốn của\n \nkhách hàng tiềm năng. Điều này cực kỳ quan trọng vì nó cho phép bạn tạo ra thông điệp\n \nmarketing chạm đúng điểm cần thiết, biến một người lạ (thị trường lạnh) thành khách\n \nhàng quan tâm. Nếu không hiểu rõ vấn đề, mọi nỗ lực marketing đều vô nghĩa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nói về vấn đề của khách hàng thông qua câu chuyện cá nhân của bản thân (&quot;đồng cảm</span></div>\n<p class=\"body-txt\">\nhoán vai&quot;): Thay vì trực tiếp chỉ ra lỗi hoặc vấn đề của khách hàng, việc chia sẻ trải\n \nnghiệm &quot;tôi đã từng gặp phải vấn đề tương tự&quot; tạo ra sự đồng cảm và kết nối sâu sắc.\n \nĐiều này giúp khách hàng cảm thấy được thấu hiểu, giảm bớt phòng thủ và sẵn lòng lắng\n \nnghe giải pháp của bạn, thay vì cảm thấy bị tấn công hoặc phán xét.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cấu trúc kể chuyện 7 bước cho mọi thông điệp marketing: Đây là một công thức mạnh</span></div>\n<p class=\"body-txt\">\nmẽ giúp chuyển đổi một thông điệp bán hàng khô khan thành một câu chuyện hấp dẫn\n \nvà dễ nhớ. Bằng cách dẫn dắt khách hàng qua các giai đoạn từ khát vọng, khó khăn,\n \nkhám phá giải pháp đến kết quả thành công, câu chuyện sẽ khơi gợi cảm xúc, xây dựng\n \nlòng tin và thuyết phục khách hàng một cách tự nhiên hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phong cách gi "<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\nthành hình ảnh sống động, tốn nhiều thời gian và công sức mà kết quả chưa ưng ý.&quot; Hoặc\n \n&quot;FUTAGO hiểu rằng việc có những hình ảnh render chất lượng cao là yếu tố then chốt để\n \nKTS giành được dự án và làm hài lòng khách hàng.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sau đó, giới thiệu dịch vụ diễn họa kiến trúc 3D của FUTAGO như giải pháp giúp họ tiết</span></div>\n<p class=\"body-txt\">\nkiệm thời gian, chi phí và nâng cao chất lượng trình bày.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sử dụng cấu trúc 7 bước kể chuyện:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">1. Khát khao: KTS muốn trình bày thiết kế của mình một cách hoàn hảo, thu hút khách</span></div>\n<p class=\"body-txt\">\nhàng và chốt dự án nhanh chóng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">2. Khó khăn: Việc tạo ra những hình ảnh diễn họa chất lượng cao đang tốn quá nhiều</span></div>\n<p class=\"body-txt\">\nthời gian, chi phí, hoặc đòi hỏi kỹ năng chuyên môn không có sẵn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">3. Phản diện: Phương pháp làm việc cũ, công cụ render lỗi thời, thiếu đội ngũ chuyên</span></div>\n<p class=\"body-txt\">\nnghiệp, áp lực thời gian/ngân sách.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">4. Bí kíp: Dịch vụ diễn họa kiến trúc 3D (CG パース/render 3D) chuyên nghiệp và hiệu</span></div>\n<p class=\"body-txt\">\nquả từ FUTAGO BIM.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">5. Diễn biến: Mô tả cách FUTAGO hợp tác, quy trình làm việc tối ưu, công nghệ hiện đại,</span></div>\n<p class=\"body-txt\">\nvà sự khác biệt mà FUTAGO mang lại trong việc biến ý tưởng thành hình ảnh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">6. Kết quả: KTS đạt được hình ảnh chân thực, sống động, giúp tăng tỷ lệ chốt hợp đồng,</span></div>\n<p class=\"body-txt\">\ntiết kiệm thời gian, và nâng cao uy tín.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">7. Bài học: Để thành công trong ngành kiến trúc hiện đại, việc đầu tư vào hình ảnh diễn</span></div>\n<p class=\"body-txt\">\nhọa chuyên nghiệp là điều không thể thiếu, và FUTAGO BIM chính là đối tác lý tưởng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phong cách viết (tiếng Nhật):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sử dụng ngôn ngữ đơn giản, trực tiếp, tập trung vào lợi ích và giải pháp cho khách hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tránh các câu văn quá dài dòng, phức tạp. Tạo cảm giác chuyên nghiệp nhưng vẫn gần</span></div>\n<p class=\"body-txt\">\ngũi, dễ hiểu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Trong các email hoặc tài liệu giới thiệu đầu tiên, có thể sử dụng cấu trúc văn phong thân</span></div>\n<p class=\"body-txt\">\nmật (như văn chat) để tạo sự kết nối ban đầu, sau đó chuyển sang văn phong trang trọng\n \nhơn khi đã xây dựng được mối quan hệ.\n \n1.6 Email Marketing là gì\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi giảng tập trung vào việc áp dụng Email Marketing như một nghệ thuật kể</h3>\n<p class=\"body-txt\">\nchuyện liên tục để xây dựng mối quan hệ và thu hút khách hàng tiềm năng. Cốt lõi là thấu\n \nhiểu sâu sắc &quot;nỗi đau&quot;, &quot;khát khao&quot;, và &quot;công việc muốn được hoàn thành&quot; của khách hàng\n \nmục tiêu để tạo ra &quot;mồi câu&quot; (như ebook) giải quyết vấn đề của họ. Quy trình bao gồm việc\n \nthiết kế bìa mồi câu trước, sau đó sử dụng Landing Page để thu thập email thật từ khách\n \nhàng tiềm năng, tạo tiền đề cho các chiến dịch marketing và bán hàng hiệu quả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email Marketing thực tế là kể chuyện, giống như &quot;Nghìn lẻ một đêm&quot; – câu chuyện</span></div>\n<p class=\"body-txt\">\nkhông bao giờ kết thúc và luôn móc nối vào đằng sau.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Phải xác định chân dung khách hàng mục tiêu rõ ràng, ví dụ: phụ nữ làm kinh doanh,</span></div>\n<p class=\"body-txt\">\ntrong độ tuổi cụ thể.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng &quot;hồ sơ khách hàng&quot; bao gồm ba phần:</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nỗi đau: Các vấn đề, than phiền, khó khăn họ đang gặp phải (ví dụ: chồng ngoại tình,</span></div>\n<p class=\"body-txt\">\nkhông biết nấu ăn, sợ vào bếp).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sự sung sướng / Mong muốn / Khát khao: Những điều họ ước ao, muốn đạt được (ví dụ:</span></div>\n<p class=\"body-txt\">\ncó tài sản, con cái trưởng thành, muốn tự hào về kỹ năng nấu ăn).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Công việc muốn được hoàn thành: Các kỹ năng, hành động họ muốn thực hiện để thoát</span></div>\n<p class=\"body-txt\">\nkhỏi nỗi đau và đạt được sự sung sướng (ví dụ: biết nấu ăn nhanh, gọn, chính xác).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thu thập thông tin cho hồ sơ khách hàng bằng cách lắng nghe, hỏi, đọc comment, theo</span></div>\n<p class=\"body-txt\">\ndõi những gì họ viết và quan tâm trên mạng xã hội.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hồ sơ khách hàng này vô cùng quan trọng, dùng để thiết kế sản phẩm, làm marketing và</span></div>\n<p class=\"body-txt\">\nbán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sau khi có hồ sơ khách hàng, lựa chọn những vấn đề của họ mà mình có khả năng giải</span></div>\n<p class=\"body-txt\">\nquyết.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tạo ra một &quot;mồi câu&quot; (lead magnet), ví dụ: một cuốn ebook với tiêu đề giải quyết trực</span></div>\n<p class=\"body-txt\">\ntiếp nỗi đau hoặc mong muốn của khách hàng (ví dụ: &quot;101 món luộc dành cho phụ nữ\n \nbận rộn&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Bước đầu tiên để tạo mồi câu là vẽ bìa sách, không phải viết toàn bộ nội dung sách.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sử dụng các công cụ như Canva và Placeit để thiết kế và tạo mockup bìa sách.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thiết kế một Landing Page (trang web có form đăng ký) để &quot;đổi&quot; cuốn sách (ebook) lấy</span></div>\n<p class=\"body-txt\">\nemail của khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Hệ thống sẽ gửi đường link tải sách về email của khách hàng, đảm bảo email thu thập</span></div>\n<p class=\"body-txt\">\nđược là email thật.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email Marketing là nghệ thuật kể chuyện liên tục, không bao giờ kết thúc: Điểm này</span></div>\n<p class=\"body-txt\">\nquan trọng vì nó thay đổi tư duy về việc tiếp thị qua email. Thay vì chỉ gửi email bán\n \nhàng một lần, mục tiêu là xây dựng một chuỗi câu chuyện, tạo sự gắn kết và duy trì mối\n \nquan hệ lâu dài với khách hàng, giống như việc giữ chân người nghe trong &quot;Nghìn lẻ một\n \nđêm&quot;. Mỗi email là một mảnh ghép trong câu chuyện lớn, tạo ra sự mong đợi và tương\n \ntác liên tục.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thấu hiểu sâu sắc &quot;Nỗi đau&quot;, &quot;Khát khao&quot; và &quot;Công việc muốn hoàn thành&quot; của khách</span></div>\n<p class=\"body-txt\">\nhàng: Đây là nền tảng cốt lõi cho mọi chiến lược marketing và phát triển sản phẩm thành\n \ncông. Bằng cách đào sâu vào những điều khách hàng than phiền, ước ao và những gì họ\n \nmuốn đạt được, doanh nghiệp có thể tạo ra sản phẩm/dịch vụ thực sự giải quyết vấn đề\n \nvà mang lại giá trị, từ đó tạo ra thông điệp marketing chạm đến cảm xúc và nhu cầu thực\n \nsự của họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tạo &quot;mồi câu&quot; (Lead Magnet) hiệu quả và quy trình thu thập email chất lượng: Thay vì</span></div>\n<p class=\"body-txt\">\ncố gắng bán hàng ngay lập tức, việc cung cấp một &quot;mồi câu&quot; giá trị (như ebook) giải\n \nquyết một vấn đề cụ thể của khách hàng tiềm năng là cách hiệu quả để thu hút họ. Quy\n \ntrình này, bắt đầu từ việc thiết kế bìa sách và sử dụng Landing Page để đổi sách lấy email\n \nthật, giúp xây dựng một danh sách khách hàng tiềm năng chất lượng cao, những người\n \nđã thể hiện sự quan tâm thực sự. Điều này là tiền đề cho các chiến dịch nurturing và bán\n \nhàng sau này.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Email marketing là kể chuyện.”\n \n“Cái cấu trúc của câu chuyện nó không bao giờ kết thúc và nó luôn móc nối vào đằng sau.”\n \n“Hồ sơ khách hàng bao gồm ba phần: nỗi đau, sự sung sướng và những việc họ mong muốn\n \nphải làm để thoát khỏi nỗi đau và sự sung sướng.”\n \n“Tôi tạo ra một cái mồi câu để giải quyết những vấn đề cơ bản của thị trường tiềm năng.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Thiết kế bìa ebook chuyên nghiệp, ấn tượng, thể hiện được chất lượng hình ảnh mà</span></div>\n<p class=\"body-txt\">\nFUTAGO cung cấp, có logo FUTAGO BIM.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng một Landing Page bằng tiếng Nhật, có form đăng ký email, để đổi lấy ebook</span></div>\n<p class=\"body-txt\">\nnày. Landing Page cần nhấn mạnh các lợi ích mà ebook mang lại (ví dụ: giúp KTS trình\n \nbày ý tưởng tốt hơn, tiết kiệm thời gian, tăng tỷ lệ chốt dự án).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sau khi thu thập được email thật, FUTAGO có thể bắt đầu các chiến dịch email nurturing</span></div>\n<p class=\"body-txt\">\n(kể chuyện) bằng cách gửi các case study thành công, mẹo nhỏ để KTS trình bày dự án,\n \ncập nhật xu hướng render 3D, và giới thiệu các dịch vụ CG パース của mình.\n \n1.7 Cấu trúc Email Marketing\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Tóm tắt. Buổi giảng này tập trung vào cấu trúc và chiến lược email marketing tự động. Thầy</h3>\n<p class=\"body-txt\">\nLong giới thiệu cách xây dựng một chuỗi email từ &quot;lạnh&quot; đến &quot;ấm&quot; rồi &quot;nóng&quot; để dẫn dắt\n \nkhách hàng qua nhiều giai đoạn, từ nhận biết vấn đề, đến tìm hiểu giải pháp chung, rồi cuối\n \ncùng là giải pháp của sản phẩm/dịch vụ của người bán. Mục tiêu là chuyển đổi khách hàng\n \ntiềm năng thành người mua thông qua việc cung cấp giá trị liên tục và liên kết nội dung một\n \ncách thông minh.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email số 0 (Email đầu tiên): Mục đích là làm quen và gửi món quà miễn phí (sách điện</span></div>\n<p class=\"body-txt\">\ntử) mà khách hàng đã đăng ký nhận. Nội dung ngắn gọn, cảm ơn, giới thiệu sách và kêu\n \ngọi tải về.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cấu trúc chuỗi email ban đầu (3-7-10):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">3 ngày đầu: Mỗi ngày một email để nhắc nhở và kêu gọi tải tài liệu. Email thứ 2 và 3 sử</span></div>\n<p class=\"body-txt\">\ndụng ký tự &quot;RE:&quot; trong tiêu đề để gom các thư lại, nhắc nhở khách hàng về email trước\n \nđó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">7 ngày tiếp theo: Trung bình 2 ngày một email.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">10 ngày tiếp theo: Cứ 3 ngày một email.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sau đó: Duy trì mối quan hệ với tần suất khoảng một tuần một email (hoặc 10-15 ngày</span></div>\n<p class=\"body-txt\">\nmột email) để tránh làm phiền hoặc bị quên lãng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nguyên tắc gửi email: Mặc định rằng khách hàng *không đọc* thư, *không click* và</span></div>\n<p class=\"body-txt\">\n*không đọc ebook*. Do đó, cần có các email nhắc nhở liên tục và khơi gợi sự tò mò.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nội dung email trong giai đoạn &quot;lạnh&quot; (3 email đầu): Tập trung vào việc giới thiệu sản</span></div>\n<p class=\"body-txt\">\nphẩm mồi câu (ví dụ: sách nấu ăn) và khơi gợi các vấn đề liên quan mật thiết đến khách\n \nhàng (ví dụ: bếp núc). Mục tiêu là khiến khách hàng tải và đọc tài liệu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kịch bản email nhắc nhở: &quot;Hôm qua tôi đã gửi sách cho bạn rồi sao vẫn chưa tải về?&quot;</span></div>\n<p class=\"body-txt\">\nKèm link tải.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kịch bản email thứ 3 (sau khi mặc định đã tải về): &quot;Chúc mừng bạn đã tải cuốn sách này</span></div>\n<p class=\"body-txt\">\nvề hôm qua rồi đúng không?&quot; Sau đó dẫn dắt đến nội dung cụ thể trong sách (ví dụ: &quot;Ở\n \ntrong chương 4/trang 12... tôi nói về cách bạn vào bếp mỗi ngày chỉ mất 10 phút. Bạn đã\n \nsắp xếp bếp theo đúng như thế chưa?&quot;). Tiếp tục móc nối nội dung giữa các email và\n \ntrong sách để giữ chân khách hàng.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nội dung email trong giai đoạn &quot;ấm&quot; (3 email tiếp theo): Bắt đầu thân tình hơn, chia sẻ</span></div>\n<p class=\"body-txt\">\ncâu chuyện cá nhân, cảm xúc để tạo sự kết nối (ví dụ: &quot;Tiên ơi, Long đây. Hôm nay tôi\n \ncảm thấy rất mệt mỏi&quot;). Dùng những câu mở đầu gây tò mò để tăng tỷ lệ mở email, tránh\n \nbị Gmail đưa vào spam.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuyển đổi chủ đề: Từ chuyện bếp núc sang chuyện con cái, rồi sang các vấn đề khác liên</span></div>\n<p class=\"body-txt\">\nquan đến cuộc sống của đối tượng mục tiêu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kịch bản thân tình: &quot;Chuyện là thế này [tên riêng], đứa lớn nhà tôi hôm nay lại ép không</span></div>\n<p class=\"body-txt\">\nrồi...&quot; hoặc &quot;Thằng con tôi hôm nay nó hỏi tôi bài toán mà lâu ngày tôi không giải\n \nđược...&quot;. Kêu gọi phản hồi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuyển đổi sang giải pháp thông thường: Sau các email thân tình, bắt đầu nêu ra vấn đề</span></div>\n<p class=\"body-txt\">\ncủa thị trường mục tiêu (ví dụ: &quot;Bạn có kinh doanh không? Bạn có khách hàng không?\n \nBạn có thấy khách không đến với mình không?&quot;) rồi đưa ra các giải pháp thông thường\n \n(ví dụ: &quot;7 cách để thu hút khách hàng tiềm năng&quot; – dẫn đến YouTube channel để xem\n \ntiếp).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Nội dung email trong giai đoạn &quot;nóng&quot;: Giới thiệu giải pháp của chính người bán.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kịch bản cá nhân hóa: &quot;10 năm của tôi... Tôi đã từng như thế nào... Tôi đã tìm được con</span></div>\n<p class=\"body-txt\">\nđường... Ông ấy đã làm thay đổi hoàn toàn cách tôi làm kinh doanh...&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giới thiệu sản phẩm/dịch vụ cốt lõi: Dẫn dắt đến khóa học/sản phẩm chính (ví dụ: &quot;Đây</span></div>\n<p class=\"body-txt\">\nchính là email marketing... Bấm vào đường link này để tham dự chương trình&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Kêu gọi hành động khẩn cấp (urgent/scarcity): &quot;PS: Khóa học này sẽ diễn ra vào ngay tối</span></div>\n<p class=\"body-txt\">\nngày hôm nay. Thủy cần bấm vào đường link này để nhanh chóng có mặt tại chương\n \ntrình. Còn vài phút nữa là chương trình đã diễn ra. Nhắn tin Zalo của tôi...&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chu trình email marketing tổng thể (Vấn đề -&gt; Giải pháp thông thường -&gt; Giải pháp của</span></div>\n<p class=\"body-txt\">\ntôi -&gt; Bán hàng): Lặp đi lặp lại chu trình này với nhiều vấn đề và giải pháp khác nhau,\n \nluôn kết thúc bằng việc bán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Cấu trúc 4 bước của email marketing:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tạo ra hồ sơ khách hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tạo ra sản phẩm mồi câu (giải quyết vấn đề cơ bản, thông thường).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tạo ra chuỗi email theo kịch bản (khoảng 20 email).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tạo ra landing page đơn giản để đổi email lấy quà.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Quảng bá landing page tới khách hàng mục tiêu (mạng xã hội, referral, chạy quảng cáo).</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chiến lược &quot;móc nối&quot; nội dung: Việc liên tục trỏ đến các phần khác của ebook hoặc các</span></div>\n<p class=\"body-txt\">\nemail trước, và sau đó đến các kênh khác như YouTube, tạo ra một mạng lưới nội dung\n \nchặt chẽ. Điều này giữ chân khách hàng trong hệ sinh thái của bạn, tăng cường sự tương\n \ntác và đảm bảo họ không bỏ lỡ thông tin quan trọng. Quan trọng vì nó duy trì sự chú ý và\n \ngia tăng giá trị cảm nhận, giúp chuyển đổi khách hàng hiệu quả hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Sử dụng yếu tố tò mò và cảm xúc để tăng tỷ lệ mở email: Các email &quot;ấm&quot; bắt đầu bằng</span></div>\n<p class=\"body-txt\">\nnhững câu chuyện cá nhân, cảm xúc (ví dụ: &quot;Hôm nay tôi cảm thấy rất mệt mỏi&quot;) hoặc\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">câu hỏi gợi mở tạo sự gần gũi và muốn khám phá. Điều này cực kỳ quan trọng vì tỷ lệ mở</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><p class=\"body-txt\">\nemail cao giúp tránh bị đưa vào spam, duy trì kênh giao tiếp hiệu quả và xây dựng mối\n \nquan hệ bền vững với khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chiến lược 3 giai đoạn Lạnh - Ấm - Nóng: Chia khách hàng thành các giai đoạn nhận thức</span></div>\n<p class=\"body-txt\">\nkhác nhau và cung cấp nội dung phù hợp là cốt lõi. Giai đoạn &quot;lạnh&quot; là giới thiệu vấn đề\n \nchung, &quot;ấm&quot; là đưa ra giải pháp thông thường và xây dựng lòng tin, &quot;nóng&quot; là giới thiệu\n \ngiải pháp độc đáo của bạn và kêu gọi hành động. Quan trọng vì nó giúp nuôi dưỡng\n \nkhách hàng tiềm năng một cách tự nhiên, xây dựng niềm tin và cuối cùng là dẫn đến\n \nquyết định mua hàng một cách hiệu quả nhất, thay vì cố gắng bán hàng ngay lập tức.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tập trung quảng cáo để &quot;tặng quà&quot; thay vì &quot;bán hàng&quot;: Chạy quảng cáo để tặng sản phẩm</span></div>\n<p class=\"body-txt\">\nmồi câu miễn phí (như ebook) thay vì bán trực tiếp. Điều này giúp chi phí quảng cáo\n \nthấp hơn rất nhiều và tỷ lệ chuyển đổi (đăng ký email) cao hơn, vì người dùng luôn thích\n \nnhận quà. Một khi đã có email, bạn có thể áp dụng toàn bộ chuỗi email marketing để bán\n \ncác sản phẩm có giá trị cao hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Mặc định là họ không đọc, nếu đọc ta mặc định là họ không click, nếu họ click ta mặc định là\n \nhọ không đọc ebook của ta.”\n \n“Quá dồn dập thì họ sẽ không đọc thư của bạn nữa. Quá loãng thì họ sẽ quên mất bạn là ai.”\n \n“Đối với cái vấn đề không biết nấu thì ta đưa ra cái nấu... Đến cái giai đoạn 3 thì ta bắt đầu đi\n \nvào cái giai đoạn bán hàng đây.”\n \n“Chạy quảng cáo để tặng quà cho họ nên tỷ lệ chuyển đổi nó rất là cao, chi phí nó không đắt.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#d81b60\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Xây dựng danh sách email học viên và phụ huynh QNPA — kênh liên lạc riêng không phụ thuộc mạng xã hội</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Gửi newsletter hàng tuần: 1 tip kỹ thuật pickleball + lịch học + ưu đãi tháng này</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi email chào mừng học viên mới QNPA: 5 email trong 5 ngày đầu tiên để giữ chân và tăng gắn kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #d81b60\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi Email Lạnh (Giới thiệu vấn đề):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 0 (sau khi đăng ký): Cảm ơn và gửi link tải tài liệu mồi câu.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 1 (sau 1 ngày, RE:): Nhắc nhở khách hàng tải tài liệu nếu chưa tải. Dẫn dắt đến</span></div>\n<p class=\"body-txt\">\nmột phần cụ thể trong tài liệu (ví dụ: &quot;Trong checklist của chúng tôi, mục số 3 nói về việc\n \ntối ưu hóa vật liệu trong bản vẽ. Bạn đã xem qua chưa? Nó giúp tiết kiệm 20% thời gian\n \nrender đó!&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Email 2 (sau 2 ngày, RE:): Tiếp tục nhắc nhở, hoặc gợi mở một vấn đề mà tài liệu giải</span></div>\n<p class=\"body-txt\">\nquyết. Ví dụ: &quot;Bạn có đang gặp khó khăn trong việc truyền đạt ý tưởng thiết kế của mình\n \ncho khách hàng không? Tài liệu của chúng tôi có thể giúp bạn làm điều đó hiệu quả hơn.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mục đích: Khiến khách hàng thực sự đọc và hiểu giá trị của tài liệu miễn phí.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi Email Ấm (Giải pháp thông thường và xây dựng kết nối):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Tâm sự: Bắt đầu bằng những câu chuyện relatable về ngành kiến trúc, những khó khăn</span></div>\n<p class=\"body-txt\">\nchung mà KTS/công ty thiết kế Nhật Bản thường gặp phải.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ: &quot;Tôi hiểu rằng áp lực deadline trong các dự án kiến trúc là rất lớn. Hôm qua, một</span></div>\n<p class=\"body-txt\">\nđối tác của chúng tôi cũng chia sẻ về việc phải làm việc xuyên đêm để kịp tiến độ...&quot; (tạo\n \nsự đồng cảm).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Giải pháp chung: Đưa ra các giải pháp, mẹo vặt, hoặc case study từ các nguồn khác</span></div>\n<p class=\"body-txt\">\n(không phải FUTAGO) để giải quyết các vấn đề đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ: &quot;Nhiều studio ở Tokyo đang áp dụng phương pháp X để tối ưu hóa quy trình làm</span></div>\n<p class=\"body-txt\">\nviệc. Bạn có muốn tìm hiểu không?&quot; (dẫn link bài viết blog của FUTAGO hoặc video\n \nYouTube về chủ đề đó, không trực tiếp quảng cáo dịch vụ).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Ví dụ: &quot;5 xu hướng diễn họa kiến trúc nổi bật năm 2024 mà bạn cần biết để giữ vững lợi</span></div>\n<p class=\"body-txt\">\nthế cạnh tranh.&quot; (dẫn về bài viết blog/video YouTube của FUTAGO).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Mục đích: Xây dựng lòng tin, vị thế chuyên gia cho FUTAGO và khiến khách hàng cảm</span></div>\n<p class=\"body-txt\">\nthấy FUTAGO hiểu rõ vấn đề của họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Chuỗi Email Nóng (Giải pháp của FUTAGO và kêu gọi hành động):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#d81b60\">•</span><span class=\"bul-txt\">Câu chuyện về FUTAGO: Kể về hành trình, kinh nghiệm, và cách FUTAGO đã giúp các đối</span></div>\n<p class=\"body-txt\">\ntác giải quyết vấn đề hiệu quả như thế nào.\n</p>\n<
