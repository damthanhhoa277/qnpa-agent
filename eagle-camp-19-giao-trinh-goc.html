<script>
const pages=["<div class=\"pg pg-cover\" style=\"border-top:6px solid #e65100\">\n  <div class=\"cover-wrap\">\n    <div class=\"cover-tag\" style=\"color:#e65100\">🦅 Eagle Camp · Giáo Trình Gốc</div>\n    <div class=\"cover-title\">Eagle Camp 19 — Giáo Trình Gốc (Scan)</div>\n    <div class=\"cover-year\" style=\"color:#e65100\">Bản scan · Nguồn gốc 2015</div>\n    <div class=\"cover-meta\">9 Biểu Mẫu · Quy Trình Xây Offer & Marketing</div>\n    <div class=\"cover-credit\">Kiến thức: Thầy Phạm Thành Long<br>Lưu trữ: QNPA Pickleball Academy</div>\n  </div>\n</div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><h2 class=\"pg-title\" style=\"color:#e65100\">Eagle Camp — Giáo Trình Gốc (Bản Scan)</h2><p class=\"body-txt\">Bản scan vở bài tập giáo trình Eagle Camp — tư liệu quý cho thấy &quot;bộ xương&quot; chương trình đã định hình từ rất sớm. Đề bài ghi năm 2015.</p><p class=\"body-txt\">Đây là phần truy về NGUỒN GỐC của bộ biểu mẫu sản phẩm &amp; marketing — tiền thân của &quot;Bộ câu lệnh Giải Pháp Triệu Đô&quot; bản AI ngày nay.</p><div class=\"meta-label\" style=\"color:#e65100\">Dạng tài liệu</div><div class=\"meta-value\">Scan vở bài tập điền tay trên giáo trình in sẵn</div><div class=\"meta-label\" style=\"color:#e65100\">Đề bài ghi</div><div class=\"meta-value\">20/7/2015 và 20/1/2015 (cần kiểm chứng chữ số viết tay)</div><div class=\"meta-label\" style=\"color:#e65100\">Giá trị</div><div class=\"meta-value\">Lineage gốc — chứng minh chuỗi biểu mẫu cốt lõi đã ổn định từ nhiều năm trước</div><div class=\"meta-label\" style=\"color:#e65100\">Nguồn kiến thức</div><div class=\"meta-value\">Thầy Phạm Thành Long — Chương trình Eagle Camp</div><div class=\"meta-label\" style=\"color:#e65100\">Tổng hợp bởi</div><div class=\"meta-value\">Lê Tấn Đào — hoc.letandao.com (27/06/2026)</div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><h2 class=\"pg-title\" style=\"color:#e65100\">Chuỗi 9 Biểu Mẫu — Trình Tự Giáo Trình</h2><p class=\"body-txt subtitle\">Một quy trình xây offer/marketing đi tuần tự — tiền thân của Bộ Câu Lệnh AI ngày nay</p><table class=\"bm-table\"><tr class=\"th-row\"><th>#</th><th>Biểu mẫu</th><th>Nội dung</th></tr><tr>\n                  <td class=\"num-cell\" style=\"color:#e65100\">1</td>\n                  <td class=\"name-cell\">Ý tưởng sáng tạo triệu đô</td>\n                  <td class=\"desc-cell\">Danh sách ý tưởng kinh doanh/đầu tư triệu đô</td>\n                </tr><tr>\n                  <td class=\"num-cell\" style=\"color:#e65100\">2</td>\n                  <td class=\"name-cell\">Thị trường mục tiêu</td>\n                  <td class=\"desc-cell\">Xác định theo tiêu chuẩn xã hội học &amp; tâm lý; chia thị trường chính (sơ cấp) &amp; phụ (thứ cấp)</td>\n                </tr><tr>\n                  <td class=\"num-cell\" style=\"color:#e65100\">3</td>\n                  <td class=\"name-cell\">Hồ sơ khách hàng</td>\n                  <td class=\"desc-cell\">Nỗi đau · Việc cần làm · Lợi ích mong muốn</td>\n                </tr><tr>\n                  <td class=\"num-cell\" style=\"color:#e65100\">4</td>\n                  <td class=\"name-cell\">Sắp xếp nhu cầu</td>\n                  <td class=\"desc-cell\">Bảng đối chiếu Nỗi đau ↔ Sung sướng ↔ Việc cần làm</td>\n                </tr><tr>\n                  <td class=\"num-cell\" style=\"color:#e65100\">5</td>\n                  <td class=\"name-cell\">Phương tiện truyền thông</td>\n                  <td class=\"desc-cell\">3 câu hỏi về cách quảng bá (đang thấy / đang dùng / sẽ làm)</td>\n                </tr><tr>\n                  <td class=\"num-cell\" style=\"color:#e65100\">6</td>\n                  <td class=\"name-cell\">Bảng tính năng sản phẩm</td>\n                  <td class=\"desc-cell\">Đặc tính kỹ thuật — mỗi sản phẩm một tờ riêng</td>\n                </tr><tr>\n                  <td class=\"num-cell\" style=\"color:#e65100\">7</td>\n                  <td class=\"name-cell\">Bảng lợi ích sản phẩm</td>\n                  <td class=\"desc-cell\">&quot;Mỗi tính năng tạo ra lợi ích gì? Vấn đề gì của khách được giải quyết?&quot;</td>\n                </tr><tr>\n                  <td class=\"num-cell\" style=\"color:#e65100\">8</td>\n                  <td class=\"name-cell\">Vũ khí bí mật bạn có là gì?</td>\n                  <td class=\"desc-cell\">Liệt kê năng lực &amp; lợi thế cá nhân</td>\n                </tr><tr>\n                  <td class=\"num-cell\" style=\"color:#e65100\">9</td>\n                  <td class=\"name-cell\">USP — Lợi thế cạnh tranh độc đáo</td>\n                  <td class=\"desc-cell\">Khung 5 câu hỏi xác định USP</td>\n                </tr></table></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"bm-badge\" style=\"background:#e65100\">Biểu mẫu 1/9</div><h2 class=\"pg-title\" style=\"color:#e65100\">Biểu Mẫu 1 — Ý Tưởng Sáng Tạo Triệu Đô</h2><div class=\"sec-hdr\" style=\"color:#e65100\">Mục tiêu biểu mẫu</div><p class=\"body-txt\">Liệt kê danh sách các ý tưởng kinh doanh hoặc đầu tư có tiềm năng triệu đô — bước khởi đầu của toàn bộ quy trình.</p><div class=\"sec-hdr\" style=\"color:#e65100\">Cách thực hành</div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Viết không giới hạn — đừng lọc sớm, cứ ghi hết ý tưởng ra trước</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Mỗi ý tưởng ghi: tên ý tưởng · lĩnh vực · lý do tiềm năng</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Sau đó mới đánh giá, xếp hạng và chọn 1–3 ý tưởng để đi sâu</span></div><div class=\"sec-hdr\" style=\"color:#e65100\">Áp dụng cho QNPA Pickleball</div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Ý tưởng 1: Học viện pickleball chuẩn quốc tế đầu tiên tại Quảng Ninh</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Ý tưởng 2: Chuỗi giải đấu pickleball hàng tháng — cộng đồng + doanh thu sự kiện</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Ý tưởng 3: Khóa đào tạo HLV pickleball — nhân rộng mô hình ra tỉnh khác</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"bm-badge\" style=\"background:#e65100\">Biểu mẫu 2/9</div><h2 class=\"pg-title\" style=\"color:#e65100\">Biểu Mẫu 2 — Thị Trường Mục Tiêu</h2><div class=\"sec-hdr\" style=\"color:#e65100\">Mục tiêu biểu mẫu</div><p class=\"body-txt\">Xác định thị trường theo tiêu chuẩn xã hội học &amp; tâm lý. Chia thành: thị trường chính (sơ cấp) và thị trường phụ (thứ cấp).</p><div class=\"sec-hdr\" style=\"color:#e65100\">Hai loại thị trường</div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Thị trường SƠ CẤP: nhóm khách hàng chính, tiềm năng cao nhất, tập trung nguồn lực vào đây</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Thị trường THỨ CẤP: nhóm phụ, có thể phục vụ sau khi thị trường chính ổn định</span></div><div class=\"sec-hdr\" style=\"color:#e65100\">Tiêu chí xác định — xã hội học</div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Độ tuổi · Giới tính · Thu nhập · Nghề nghiệp · Khu vực địa lý</span></div><div class=\"sec-hdr\" style=\"color:#e65100\">Tiêu chí xác định — tâm lý</div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Lối sống · Giá trị cốt lõi · Sở thích · Nỗi sợ · Khát vọng</span></div><div class=\"sec-hdr\" style=\"color:#e65100\">Áp dụng cho QNPA</div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Sơ cấp: Người 35–60 tuổi, thu nhập trung bình–cao, thích thể thao xã giao, sống tại Quảng Ninh</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Thứ cấp: Phụ huynh có con 8–15 tuổi muốn cho con học thể thao đồng đội</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"bm-badge\" style=\"background:#e65100\">Biểu mẫu 3/9</div><h2 class=\"pg-title\" style=\"color:#e65100\">Biểu Mẫu 3 — Hồ Sơ Khách Hàng</h2><div class=\"sec-hdr\" style=\"color:#e65100\">Mục tiêu biểu mẫu</div><p class=\"body-txt\">Xây dựng chân dung khách hàng chi tiết theo 3 chiều: Nỗi đau · Việc cần làm · Lợi ích mong muốn.</p><div class=\"sec-hdr\" style=\"color:#e65100\">Ba chiều hồ sơ khách hàng</div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">NỖI ĐAU (Pain): Điều gì đang làm phiền, gây khó chịu, lo lắng cho khách hàng?</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">VIỆC CẦN LÀM (Jobs-to-be-done): Khách hàng đang cố gắng hoàn thành điều gì trong cuộc sống?</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">LỢI ÍCH MONG MUỐN (Gains): Khách hàng mong đạt được kết quả gì, cải thiện gì?</span></div><div class=\"sec-hdr\" style=\"color:#e65100\">Áp dụng cho QNPA</div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Nỗi đau: Ít vận động, cô đơn sau 40 tuổi, sức khỏe giảm, chưa tìm được môn thể thao phù hợp</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Việc cần làm: Giữ sức khỏe, kết nối bạn bè cùng sở thích, có hobby lành mạnh</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Lợi ích: Khỏe mạnh hơn, có cộng đồng, tự tin hơn, cuộc sống vui vẻ ý nghĩa</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"bm-badge\" style=\"background:#e65100\">Biểu mẫu 4/9</div><h2 class=\"pg-title\" style=\"color:#e65100\">Biểu Mẫu 4 — Sắp Xếp Nhu Cầu</h2><div class=\"sec-hdr\" style=\"color:#e65100\">Mục tiêu biểu mẫu</div><p class=\"body-txt\">Bảng đối chiếu 3 chiều: Nỗi đau ↔ Sung sướng ↔ Việc cần làm — giúp thấy rõ mối liên hệ và ưu tiên.</p><div class=\"sec-hdr\" style=\"color:#e65100\">Cấu trúc bảng đối chiếu</div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Cột 1 — NỖI ĐAU: Liệt kê từng nỗi đau cụ thể của khách hàng</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Cột 2 — SUNG SƯỚNG (Gain mong muốn): Đối ứng với từng nỗi đau — khách muốn gì thay thế?</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Cột 3 — VIỆC CẦN LÀM: Hành động khách đang thực hiện để giải quyết nỗi đau đó</span></div><div class=\"sec-hdr\" style=\"color:#e65100\">Giá trị của bảng này</div><p class=\"body-txt\">Giúp thấy rõ GAP giữa thực tế (nỗi đau) và kỳ vọng (sung sướng) → đây chính là cơ hội kinh doanh.</p><div class=\"sec-hdr\" style=\"color:#e65100\">Áp dụng cho QNPA</div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Nỗi đau: Không có nơi tập phù hợp → Sung sướng: Có sân + HLV chuyên nghiệp → Việc cần làm: Tìm lớp học uy tín</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Nỗi đau: Chơi sai kỹ thuật → Sung sướng: Đánh đẹp, thi đấu được → Việc cần làm: Tìm HLV dạy đúng bài bản</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"bm-badge\" style=\"background:#e65100\">Biểu mẫu 5/9</div><h2 class=\"pg-title\" style=\"color:#e65100\">Biểu Mẫu 5 — Phương Tiện Truyền Thông</h2><div class=\"sec-hdr\" style=\"color:#e65100\">Mục tiêu biểu mẫu</div><p class=\"body-txt\">3 câu hỏi chiến lược về cách quảng bá sản phẩm/dịch vụ đến thị trường mục tiêu.</p><div class=\"sec-hdr\" style=\"color:#e65100\">Ba câu hỏi cốt lõi</div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Câu 1 — ĐANG THẤY: Khách hàng mục tiêu đang thấy quảng cáo ở đâu? (kênh nào họ xem nhiều nhất)</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Câu 2 — ĐANG DÙNG: Họ đang dùng kênh truyền thông nào? (mạng xã hội, báo, youtube, podcast...)</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Câu 3 — SẼ LÀM: Bạn sẽ xuất hiện ở kênh nào để tiếp cận đúng người?</span></div><div class=\"sec-hdr\" style=\"color:#e65100\">Nguyên tắc chọn kênh</div><p class=\"body-txt\">Không phải kênh nào hot nhất — mà kênh nào khách hàng MỤC TIÊU của mình dùng nhiều nhất.</p><div class=\"sec-hdr\" style=\"color:#e65100\">Áp dụng cho QNPA</div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Đang thấy: Facebook (nhóm thể thao địa phương), Zalo nhóm, YouTube phim pickleball</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Đang dùng: Facebook cá nhân, Zalo, YouTube, TikTok (người trẻ hơn)</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Sẽ làm: Facebook page + Group Pickleball QN + TikTok kỹ thuật + Zalo OA chăm sóc</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"bm-badge\" style=\"background:#e65100\">Biểu mẫu 6/9</div><h2 class=\"pg-title\" style=\"color:#e65100\">Biểu Mẫu 6 — Bảng Tính Năng Sản Phẩm</h2><div class=\"sec-hdr\" style=\"color:#e65100\">Mục tiêu biểu mẫu</div><p class=\"body-txt\">Liệt kê đặc tính kỹ thuật của sản phẩm/dịch vụ — mỗi sản phẩm một tờ riêng. Đây là nền tảng để chuyển sang Bảng Lợi Ích (Biểu mẫu 7).</p><div class=\"sec-hdr\" style=\"color:#e65100\">Những gì cần liệt kê</div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Tên tính năng / đặc điểm cụ thể</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Mô tả kỹ thuật — nó là gì, hoạt động thế nào</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Phân biệt với đối thủ ở điểm nào</span></div><div class=\"sec-hdr\" style=\"color:#e65100\">Lưu ý quan trọng</div><p class=\"body-txt\">Tính năng là SỰ THẬT về sản phẩm. Lợi ích mới là điều khách hàng CẦN. Bước này chỉ liệt kê sự thật — bước sau mới chuyển hóa thành giá trị.</p><div class=\"sec-hdr\" style=\"color:#e65100\">Áp dụng cho QNPA — Gói học 8 buổi cơ bản</div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Tính năng: 8 buổi × 90 phút · 4–6 học viên/lớp · HLV được chứng nhận · Sân tiêu chuẩn + vợt cho mượn</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Tính năng: Video tổng kết kỹ thuật sau mỗi buổi · Group Zalo hỗ trợ 24/7 · Được đánh giá kỹ thuật cuối khóa</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"bm-badge\" style=\"background:#e65100\">Biểu mẫu 7/9</div><h2 class=\"pg-title\" style=\"color:#e65100\">Biểu Mẫu 7 — Bảng Lợi Ích Sản Phẩm</h2><div class=\"sec-hdr\" style=\"color:#e65100\">Mục tiêu biểu mẫu</div><p class=\"body-txt\">Chuyển hóa từng TÍNH NĂNG → LỢI ÍCH thực tế. Câu hỏi chủ đạo: &quot;Mỗi tính năng tạo ra lợi ích gì? Vấn đề gì của khách được giải quyết?&quot;</p><div class=\"sec-hdr\" style=\"color:#e65100\">Công thức chuyển hóa</div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Tính năng [X] → Điều này có nghĩa là khách hàng sẽ [lợi ích cụ thể]</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Ví dụ: &quot;Lớp 4–6 người&quot; → &quot;Bạn được HLV chú ý sửa kỹ thuật cá nhân, không bị lạc trong đám đông&quot;</span></div><div class=\"sec-hdr\" style=\"color:#e65100\">Sự khác biệt tính năng vs lợi ích</div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Tính năng: &quot;Sân tiêu chuẩn&quot; — Lợi ích: &quot;Bạn được tập đúng điều kiện thi đấu thật, không tập sai quen&quot;</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Tính năng: &quot;Video sau buổi học&quot; — Lợi ích: &quot;Bạn ôn lại kỹ thuật bất cứ lúc nào, không sợ quên&quot;</span></div><div class=\"sec-hdr\" style=\"color:#e65100\">Áp dụng cho QNPA</div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Khóa 8 buổi → Bạn đánh được rally 10+ nhịp, tự tin tham gia giao lưu cùng cộng đồng</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Group Zalo → Bạn không bao giờ bị mắc kẹt một mình — luôn có HLV và bạn học hỗ trợ</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"bm-badge\" style=\"background:#e65100\">Biểu mẫu 8/9</div><h2 class=\"pg-title\" style=\"color:#e65100\">Biểu Mẫu 8 — Vũ Khí Bí Mật Bạn Có Là Gì?</h2><div class=\"sec-hdr\" style=\"color:#e65100\">Mục tiêu biểu mẫu</div><p class=\"body-txt\">Liệt kê năng lực &amp; lợi thế cá nhân/doanh nghiệp — những thứ bạn có mà người khác không dễ copy.</p><div class=\"sec-hdr\" style=\"color:#e65100\">Những loại vũ khí bí mật</div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Kỹ năng độc đáo: Chuyên môn sâu, chứng chỉ, kinh nghiệm thực chiến</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Mối quan hệ: Mạng lưới, uy tín, cộng đồng đã xây dựng</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Tài nguyên: Cơ sở vật chất, công nghệ, quy trình độc quyền</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Câu chuyện cá nhân: Hành trình, biến đổi, trải nghiệm thật không ai copy được</span></div><div class=\"sec-hdr\" style=\"color:#e65100\">Áp dụng cho QNPA — Vũ khí bí mật của chị Hoa</div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Người tiên phong pickleball tại Quảng Ninh — lợi thế người đến sớm, đã xây cộng đồng</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Nền tảng kinh doanh &amp; marketing — hiểu cả kỹ thuật lẫn kinh doanh, không phải HLV đơn thuần</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Câu chuyện bứt phá cá nhân — hành trình từ đổ vỡ đến xây dựng lại từ đầu, truyền cảm hứng</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><div class=\"bm-badge\" style=\"background:#e65100\">Biểu mẫu 9/9</div><h2 class=\"pg-title\" style=\"color:#e65100\">Biểu Mẫu 9 — USP: Lợi Thế Cạnh Tranh Độc Đáo</h2><div class=\"sec-hdr\" style=\"color:#e65100\">Định nghĩa USP — nguyên văn từ giáo trình</div><blockquote class=\"quote\">USP: Lợi ích quan trọng bạn mang lại cho khách hàng mà đối thủ không đáp ứng được, và không thể hoặc rất khó copy từ bạn.</blockquote><div class=\"sec-hdr\" style=\"color:#e65100\">Khung 5 câu hỏi xác định USP gốc</div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">(1) Lợi ích / nỗi đau khách hàng mong muốn giải quyết là gì?</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">(2) Lợi ích mà đối thủ cạnh tranh đang mang lại là gì?</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">(3) Lợi ích mà bạn mang lại là gì?</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">(4) Lợi ích bạn có mà đối thủ KHÔNG có?</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">(5) Lợi ích lớn nhất có thể giải quyết vấn đề chính của khách hàng là gì?</span></div><div class=\"sec-hdr\" style=\"color:#e65100\">USP của QNPA Pickleball</div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Học viện pickleball đầu tiên có HLV chứng nhận + cộng đồng thi đấu thật tại Quảng Ninh</span></div><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#e65100\">•</span><span class=\"bul-txt\">Cam kết: Sau 8 buổi đánh được rally 10 nhịp — hoặc học bù miễn phí</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #e65100\"><div class=\"pg-inner\"><h2 class=\"pg-title\" style=\"color:#e65100\">Ghi Chú &amp; Nguồn Gốc</h2><div class=\"sec-hdr\" style=\"color:#e65100\">Giới hạn của bản scan</div><p class=\"body-txt\">Bản scan chỉ trích được tới ~trang 25 (dừng ở USP); phần sau và trang 17 không có. Phần học viên điền tay nhiều chỗ OCR lỗi nên đã lược. Nếu cần đầy đủ, nên tìm thêm bản scan các trang còn lại.</p><div class=\"sec-hdr\" style=\"color:#e65100\">Liên hệ với phiên bản AI hiện đại</div><p class=\"body-txt\">Khung 5 câu hỏi USP này chính là &quot;Bước 8: Xây USP theo 5 lớp&quot; trong Bộ Câu Lệnh Giải Pháp Triệu Đô phiên bản AI ngày nay — chứng minh chuỗi biểu mẫu đã ổn định từ 2015.</p><div class=\"sec-hdr\" style=\"color:#e65100\">Ghi nhận bản quyền</div><p class=\"body-txt\">Toàn bộ kiến thức gốc thuộc chương trình Eagle Camp của Thầy Phạm Thành Long. Tổng hợp bởi Lê Tấn Đào từ tài liệu cá nhân trong kho &quot;HỌC TẬP TRỌN ĐỜI&quot; cho mục đích học tập, ôn tập và ứng dụng.</p><div class=\"meta-label\" style=\"color:#e65100\">Nguồn</div><div class=\"meta-value\">hoc.letandao.com — Eagle Camp 19 (truy cập 17/06/2026)</div><div class=\"meta-label\" style=\"color:#e65100\">Lưu bởi</div><div class=\"meta-value\">Đàm Thị Thanh Hoa — QNPA Pickleball Academy</div></div></div>",
"<div class=\"pg pg-cover\" style=\"border-top:6px solid #e65100\">\n  <div class=\"cover-wrap\">\n    <div class=\"cover-tag\" style=\"color:#e65100\">🦅 Eagle Camp 19</div>\n    <div class=\"cover-title\">9 Biểu Mẫu Cốt Lõi</div>\n    <div class=\"cover-meta\" style=\"margin-top:20px\">Ý tưởng → Thị trường → Khách hàng → Nhu cầu<br>Truyền thông → Tính năng → Lợi ích → Vũ khí → USP</div>\n    <div class=\"cover-credit\" style=\"margin-top:24px;color:#e65100\">QNPA Pickleball Academy · 2026</div>\n  </div>\n</div>"];
const N=pages.length;
let cur=0;
const book=document.getElementById('book');
const fill=document.getElementById('progress-fill');
const info=document.getElementById('page-info');
const infoNav=document.getElementById('page-info-nav');
const btnP=document.getElementById('btn-prev');
const btnN=document.getElementById('btn-next');
function render(){
  book.innerHTML=pages[cur];
  fill.style.width=((cur+1)/N*100)+'%';
  info.textContent=(cur+1)+' / '+N;
  infoNav.textContent=(cur+1)+' / '+N;
  btnP.disabled=cur===0; btnN.disabled=cur===N-1;
  window.scrollTo(0,0);
}
function next(){if(cur<N-1){cur++;render();}}
function prev(){if(cur>0){cur--;render();}}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown')next();
  else if(e.key==='ArrowLeft'||e.key==='PageUp')prev();
});
render();
</script>
