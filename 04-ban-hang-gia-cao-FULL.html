<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bán Hàng Giá Cao</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#e8eaf0;font-family:'Segoe UI',Arial,sans-serif}
body{display:flex;flex-direction:column;align-items:center;padding:18px 10px 24px}

/* Book wrapper */
#book-wrap{width:720px;max-width:98vw;display:flex;flex-direction:column}

/* Top bar: title + page info */
#top-bar{display:flex;justify-content:space-between;align-items:center;
          margin-bottom:6px;padding:0 2px}
#book-title{font-size:13px;font-weight:600;color:#444;white-space:nowrap;
             overflow:hidden;text-overflow:ellipsis;max-width:60%}
#page-info{font-size:13px;color:#666;white-space:nowrap}

/* Progress bar */
#progress-bar{width:100%;height:3px;background:#d0d0d0;border-radius:2px;margin-bottom:10px}
#progress-fill{height:100%;border-radius:2px;transition:width .3s;background:#f57f17}

/* Page */
.pg{width:100%;min-height:540px;background:#ffffff;border-radius:6px;
     box-shadow:0 2px 16px rgba(0,0,0,.12);overflow:hidden}

/* Cover */
.pg-cover{display:flex;justify-content:center;align-items:center;min-height:540px}
.cover-wrap{text-align:center;padding:60px 40px}
.cover-tag{font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;font-weight:600}
.cover-title{font-size:28px;font-weight:700;color:#1a1a1a;line-height:1.4;margin-bottom:16px}
.cover-sub{font-size:14px;font-weight:500}

/* Content page */
.pg-content{}
.pg-inner{padding:28px 36px 32px;overflow-y:auto;max-height:540px}
.pg-inner::-webkit-scrollbar{width:5px}
.pg-inner::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

/* Typography */
.sec-hdr{font-size:12px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
          margin:18px 0 8px;padding-bottom:5px;border-bottom:1px solid #eee}
.sec-hdr:first-child{margin-top:0}
.body-txt{font-size:14px;color:#2d2d2d;line-height:1.8;margin-bottom:10px;text-align:justify}
.bullet{display:flex;gap:10px;margin:5px 0}
.bul-dot{font-size:18px;line-height:1.4;flex-shrink:0;margin-top:-1px}
.bul-txt{font-size:13.5px;color:#2d2d2d;line-height:1.7}

/* Navigation */
#nav{display:flex;align-items:center;gap:14px;margin-top:12px}
.nav-btn{background:#fff;border:2px solid #f57f17;color:#f57f17;padding:8px 24px;
          border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;
          transition:all .15s;letter-spacing:.5px}
.nav-btn:hover{background:#f57f17;color:#fff}
.nav-btn:disabled{opacity:.35;cursor:default}
#page-jump{width:52px;text-align:center;border:1px solid #ccc;border-radius:5px;
            padding:6px;font-size:13px;color:#444}
</style>
</head>
<body>
<div id="book-wrap">
  <div id="top-bar">
    <div id="book-title">Bán Hàng Giá Cao</div>

  </div>
  <div id="progress-bar"><div id="progress-fill" style="width:1.8%"></div></div>
  <div id="book"></div>
</div>
<div id="nav">
  <button class="nav-btn" id="btn-prev" onclick="prev()" disabled>◄ Trước</button>
  <input id="page-jump" type="number" min="1" max="56" value="1"
         onchange="goTo(+this.value-1)" title="Nhảy đến trang">
  <button class="nav-btn" id="btn-next" onclick="next()">Tiếp ►</button>
</div>
<script>
const pages=["<div class=\"pg pg-cover\" style=\"border-top:5px solid #f57f17\">\n  <div class=\"cover-wrap\">\n    <div class=\"cover-tag\" style=\"color:#f57f17\">Sổ Tay Tinh Hoa · QNPA</div>\n    <div class=\"cover-title\">Bán Hàng Giá Cao</div>\n    <div class=\"cover-sub\" style=\"color:#f57f17\">54 trang nội dung đầy đủ</div>\n  </div>\n</div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><p class=\"body-txt\">\nBán Hàng Giá Cao\n \nSổ tay tinh hoa\n</p>\n<p class=\"body-txt\">\nTổng hợp 28 bài\n \nNguồn: khoá học Bán Hàng Giá Cao\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><p class=\"body-txt\">\nLời mở\n \nQuyển sách này tổng hợp tinh hoa khoá Bán Hàng Giá Cao, do AI nghe lại từng bài giảng và\n \nchắt lọc thành: tóm tắt, ý chính, điểm quan trọng nhất, và trích dẫn đáng nhớ.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><p class=\"body-txt\">\nMục lục\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Chương 1</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bài 1: Kinh doanh là phong cách sống</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Chương 2</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bài 2: Khách hàng là ai?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bài 3: Khách hàng ở đâu?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bài 4: Hiểu rõ insight của khách hàng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bài 5: Vẽ chân dung khách hàng từ nhu cầu của khách hàng</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Chương 3</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bài 6: Quản trị cảm xúc để bán hàng tốt hơn</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bài 7: Lời hứa thương hiệu</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bài 8: Quy luật bán hàng, bản chất của kinh doanh</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bài 9: Con đường giúp kiếm tiền giá cao</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bài 10: Thị trường đỏ, thị trường xanh và chiến lược Hớt váng sữa</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bài 11: Chiến lược chủ động làm cũ sản phẩm - tiến vào thị trường xanh</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bài 12: Chiến lược bán chính mình</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bài 13: Hệ thống niềm tin</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bài 14: Phương pháp marketing bằng thẩm quyền</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bài 15: 7 yếu tố tạo nên nhân hiệu mạnh</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bài 16: Chủ động tiếp nhận thông tin, trở thành chuyên gia</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bài 17: Marketing truyền miệng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bài 18: PR và truyền thông</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bài 19: Bước lên sân khấu để trở thành chuyên gia</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bài 20: Sự kiện - công cụ để trở thành chuyên gia</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bài 21: Những công việc cần làm mỗi ngày để trở thành chuyên gia</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bài 22: Chiến lược JV</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bài 23: 8 bước Sale Success System</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bài 24: Quy trình bán hàng giá cao</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bài 25: Những sai lầm trong quy trình bán hàng giá cao</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bài 26: Xác thực và hẹn gặp khách hàng trong Sales Success System</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bài 27: Xây dựng hệ thống con người</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bài 28: Câu thần chú bán hàng giá nhiều</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#f57f17\">Chương 1</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Bài 1: Kinh doanh là phong cách sống</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Tóm tắt. Buổi giảng tập trung vào việc bán hàng giá cao là kết quả của giá trị được tạo ra,</h3>\n<p class=\"body-txt\">\nkhông phải nguyên nhân. Để đạt được điều này, người bán cần áp dụng nguyên tắc &quot;người\n \ncho đi là người chiến thắng&quot; thông qua việc cung cấp nhiều thông tin và giá trị. Diễn giả giới\n \nthiệu khái niệm &quot;sự chênh lệch thông tin&quot;, chỉ ra rằng việc thu hẹp khoảng cách này giữa các\n \nbên sẽ tạo ra giá trị mới và tăng khả năng bán hàng giá cao. Quan trọng hơn, việc thay đổi\n \nphong cách sống để gia tăng tần suất hành động và tạo ra nhiều giá trị hơn sẽ quyết định\n \nthành công trong kinh doanh.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tiền và giá cao là kết quả của một quá trình, không phải là nguyên nhân.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nguyên tắc cốt lõi là &quot;người cho đi là người chiến thắng&quot; (the giver wins), và cách tốt</span></div>\n<p class=\"body-txt\">\nnhất để cho đi là cho đi thông tin.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Trong trò chơi bán hàng giá cao, người nào cho đi được nhiều thông tin hơn thì người đó</span></div>\n<p class=\"body-txt\">\ncó khả năng chiến thắng dễ dàng hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Có một nghiên cứu được giải Nobel về kinh tế học (năm 2001 hoặc 2003) nói về &quot;sự</span></div>\n<p class=\"body-txt\">\nchênh lệch thông tin&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">&quot;Sự chênh lệch thông tin&quot; là nguyên nhân dẫn đến sự thụt lùi và cũng là nguyên nhân</span></div>\n<p class=\"body-txt\">\ndẫn đến sự tăng trưởng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nếu duy trì &quot;sự chênh lệch thông tin&quot; trong tổng thể, sẽ không có sự tăng trưởng mà chỉ</span></div>\n<p class=\"body-txt\">\ncó sự dịch chuyển (ví dụ: đánh bạc, tiền chỉ chạy từ túi thằng này qua túi thằng kia,\n \nkhông sản sinh giá trị mới).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Để bán được hàng giá cao, công việc phải tạo ra được giá trị lớn nhất.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Ví dụ về vườn nhãn và ong: khi có sự hợp tác (cho phép ong nuôi trong vườn nhãn), cả</span></div>\n<p class=\"body-txt\">\nong và nhãn đều tạo ra giá trị mới lớn hơn (mật ngon hơn, nhãn đậu quả sai hơn), và\n \nbán được giá cao hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nếu chúng ta tìm thấy hai &quot;thằng&quot; có &quot;sự chênh lệch thông tin&quot; và dịch chuyển chúng về</span></div>\n<p class=\"body-txt\">\nnhau, chúng ta sẽ bán được hàng giá cao.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Người nào trao được nhiều giá trị nhất thì người đó có cơ hội bán được hàng với giá cao</span></div>\n<p class=\"body-txt\">\nhơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bạn phát triển hơn nên bạn có nhiều giá trị để cho đi hơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Không quan trọng bạn làm bao lâu, mà quan trọng là bạn làm bao nhiêu lần.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Trong cùng một khoảng thời gian, số lần bạn hành động (đọc sách, học, làm campaign</span></div>\n<p class=\"body-txt\">\nmarketing, gặp khách hàng) sẽ quyết định giá trị và thành công của bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Làm nhanh, kết thúc nhanh gọn, sau đó làm tiếp việc khác hoặc lặp lại việc đó thêm một</span></div>\n<p class=\"body-txt\">\nlần nữa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Cuộc sống (phong cách sống) của chúng ta sẽ quyết định giá bán của chúng ta (kinh</span></div>\n<p class=\"body-txt\">\ndoanh là phong cách sống).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Cần thay đổi cách sống để thay đổi giá trị, và thay đổi giá trị thì mới có thể bước vào thế</span></div>\n<p class=\"body-txt\">\ngiới bán hàng giá cao.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#f57f17\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chuyển đổi tư duy về giá và giá trị: &quot;Tiền chưa bao giờ là nguyên nhân cả, tiền luôn luôn</span></div>\n<p class=\"body-txt\">\nlà kết quả. Vậy thì giá cao không phải là nguyên nhân mà giá cao là kết quả của một quá\n \ntrình.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là một thay đổi tư duy căn bản, dịch chuyển trọng tâm từ việc cố</span></div>\n<p class=\"body-txt\">\ngắng *đòi* giá cao sang việc *tạo ra* giá trị xứng đáng với mức giá đó. Nó buộc người\n \nkinh doanh phải tập trung vào việc nâng cao chất lượng sản phẩm, dịch vụ và trải\n \nnghiệm khách hàng để giá bán cao trở thành một hệ quả tự nhiên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Sử dụng &quot;Sự chênh lệch thông tin&quot; để tạo giá trị cộng hưởng: Nguyên tắc &quot;người cho đi là</span></div>\n<p class=\"body-txt\">\nngười chiến thắng&quot; được cụ thể hóa bằng cách cho đi thông tin để thu hẹp khoảng cách\n \nthông tin giữa các bên, từ đó tạo ra giá trị mới cho cả hai.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Điểm này cung cấp một chiến lược hành động rõ ràng. Trong một thị</span></div>\n<p class=\"body-txt\">\ntrường cạnh tranh, việc chủ động cung cấp thông tin hữu ích và giá trị giúp người bán\n \nxây dựng niềm tin, vị thế chuyên gia và tạo ra mối quan hệ hợp tác cùng có lợi (như ví dụ\n \nong và nhãn). Nó nhấn mạnh vai trò của giáo dục thị trường và giải quyết vấn đề của\n \nkhách hàng thông qua thông tin.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tối ưu hóa tần suất hành động: &quot;Không quan trọng bạn làm bao lâu, mà quan trọng là</span></div>\n<p class=\"body-txt\">\nbạn làm bao nhiêu lần.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là lời kêu gọi hành động mạnh mẽ và thực tế. Nó khuyến khích sự</span></div>\n<p class=\"body-txt\">\nlặp lại, thực hành và tối ưu hóa công việc trong một đơn vị thời gian. Trong kinh doanh,\n \nđặc biệt là marketing và phát triển sản phẩm, việc thử nghiệm, học hỏi và lặp lại liên tục\n \nlà chìa khóa để tìm ra công thức thành công, gia tăng hiệu quả và tạo ra nhiều giá trị hơn\n \nmột cách nhanh chóng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Tiền chưa bao giờ là nguyên nhân cả, tiền luôn luôn là kết quả. Vậy thì giá cao không phải là\n \nnguyên nhân mà giá cao là kết quả của một quá trình.”\n \n“Người cho đi là người chiến thắng đúng không ạ? The giver wins, người cho đi là người chiến\n \nthắng.”\n \n“Không quan trọng bạn làm bao lâu, mà quan trọng là bạn làm bao nhiêu lần.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Chương 2</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Bài 2: Khách hàng là ai?</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Tóm tắt. Buổi giảng tập trung vào tầm quan trọng của việc xác định đúng chân dung khách</h3>\n<p class=\"body-txt\">\nhàng tiềm năng (&quot;khách hàng ước mơ&quot;) và thị trường mục tiêu. Diễn giả nhấn mạnh rằng\n \nkinh doanh là một phương cách sống, và việc trở thành &quot;cá lớn trong ao nhỏ&quot; giúp bán được\n \ngiá cao và xây dựng mối quan hệ lâu dài. Cốt lõi là thay đổi tư duy về thị trường và giá trị\n \nđơn hàng, hướng tới các đơn hàng tổng thể lớn thay vì chỉ giá đơn vị.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#f57f17\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Trong kinh doanh, khách hàng là yếu tố quan trọng nhất, hơn cả giá trị hay uy tín.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bước 1: Kinh doanh là phương cách sống.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bước 2: Xác định rõ chân dung khách hàng tiềm năng (hay còn gọi là Avatar).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chiến lược quan trọng để bán giá cao là &quot;Cá lớn trong ao nhỏ&quot;: trở thành người tốt nhất</span></div>\n<p class=\"body-txt\">\ntrong thị trường nhỏ của bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Khách hàng phải là người mà ta muốn ở cùng, tôn trọng, thích và muốn họ ở xung quanh</span></div>\n<p class=\"body-txt\">\nmình (khách hàng lâu dài).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hãy liệt kê &quot;khách hàng ước mơ&quot; của bạn, tạm thời bỏ qua khách hàng hiện tại nếu họ</span></div>\n<p class=\"body-txt\">\nkhông phải là đối tượng mong muốn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Xác định hồ sơ khách hàng ước mơ dựa trên 2 yếu tố:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Demographic (nhân chủng học): Tuổi, giới tính, thu nhập, tình trạng hôn nhân, con cái,</span></div>\n<p class=\"body-txt\">\nv.v. (càng hẹp càng tốt).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Psychographic (tâm lý học): Niềm tin, giá trị sống, quan điểm, thái độ, sự quan tâm,</span></div>\n<p class=\"body-txt\">\nphong cách sống, sở thích (thích/ghét gì, ăn gì, chơi gì).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Ví dụ: Nếu bán kính bơi cho phụ nữ thích bơi, hãy tấn công các câu lạc bộ bơi lội (một thị</span></div>\n<p class=\"body-txt\">\ntrường ngách).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Thiết kế sản phẩm dành riêng cho thị trường ngách đã xác định (ví dụ: kính bơi chuyên</span></div>\n<p class=\"body-txt\">\nbiệt cho phụ nữ đi bơi).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Lưu ý: Đặc tính của khách hàng phải liên quan đến sản phẩm; nếu một yếu tố (như giới</span></div>\n<p class=\"body-txt\">\ntính) không phải là yếu tố quyết định, có thể bỏ qua nó để mở rộng tệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Ví dụ khác: Bán thời trang cho người có chỉ số BMI trên 26 (người béo) thay vì sản phẩm</span></div>\n<p class=\"body-txt\">\ngiảm cân, hướng đến sự tự hào của họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Cần phân biệt &quot;người dùng&quot; và &quot;người mua&quot; có thể khác nhau (ví dụ: nam giới mua sản</span></div>\n<p class=\"body-txt\">\nphẩm cho nữ giới).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Việc thay đổi thị trường mục tiêu có thể thay đổi đáng kể giá trị đơn hàng và doanh thu.</span></div>\n<p class=\"body-txt\">\n(Ví dụ: bán lẻ 800k/cái so với bán buôn 200k/cái nhưng số lượng lớn).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">&quot;Giá cao&quot; không chỉ được hiểu là giá đơn vị, mà là tổng giá trị thu về từ một giao dịch</span></div>\n<p class=\"body-txt\">\nhoặc một thị trường.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Luôn phản biện và sẵn sàng thay đổi thị trường mục tiêu để tìm kiếm và tối ưu hóa</span></div>\n<p class=\"body-txt\">\ndoanh thu, thậm chí nhắm đến các đơn vị lớn để bán số lượng lớn làm phần thưởng hoặc\n \nquà tặng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Khách hàng là yếu tố tối quan trọng, định hình mọi chiến lược kinh doanh. Diễn giả nhấn</span></div>\n<p class=\"body-txt\">\nmạnh điều này ngay từ đầu bằng cách đặt câu hỏi và lặp lại, tách khách hàng ra khỏi các\n \nyếu tố khác như giá trị hay uy tín. Điều này quan trọng vì nó chuyển trọng tâm từ sản\n \nphẩm hay dịch vụ sang việc hiểu và phục vụ một cách sâu sắc nhất đối tượng sẽ mua\n \nhàng, định hướng mọi quyết định sau này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Xác định chân dung &quot;khách hàng ước mơ&quot; càng cụ thể, càng hẹp càng tốt để trở thành</span></div>\n<p class=\"body-txt\">\n&quot;cá lớn trong ao nhỏ&quot;. Thay vì cố gắng bán cho tất cả mọi người, việc tập trung vào một\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><p class=\"body-txt\">\nngách nhỏ giúp doanh nghiệp trở thành người dẫn đầu, dễ dàng bán được giá cao hơn\n \ntrong thị trường đó và xây dựng lòng trung thành. Điều này tối ưu hóa nguồn lực\n \nmarketing và tăng hiệu quả chuyển đổi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Định nghĩa &quot;giá cao&quot; cần được hiểu là tổng giá trị đơn hàng hoặc doanh thu từ một thị</span></div>\n<p class=\"body-txt\">\ntrường, chứ không chỉ là giá đơn vị. Diễn giả chỉ ra rằng một sản phẩm bán với giá đơn vị\n \nthấp hơn cho một thị trường mục tiêu khác (ví dụ: bán số lượng lớn cho doanh nghiệp\n \nlàm quà tặng/phần thưởng) có thể mang lại doanh thu và lợi nhuận tổng thể cao hơn\n \ngấp nhiều lần. Điều này mở rộng tư duy về chiến lược giá, kênh phân phối và đối tác\n \nchiến lược.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Luôn sẵn sàng điều chỉnh và thay đổi thị trường mục tiêu để tối ưu hóa giá trị. Thị</span></div>\n<p class=\"body-txt\">\ntrường không phải là một thực thể cố định. Việc linh hoạt chuyển đổi giữa người dùng\n \ncuối, nhà bán buôn hoặc các tổ chức lớn (như nhà máy có nhiều công nhân) để tìm kiếm\n \ncác đơn hàng lớn hơn có thể biến một sản phẩm thành công cụ mang lại doanh thu đột\n \nphá. Đây là một tư duy phản biện mạnh mẽ, khuyến khích tìm kiếm các cơ hội mới ngoài\n \nlối mòn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Trong kinh doanh, cái gì quan trọng? Khách hàng, giá trị, uy tín. Trong ba cái thứ đấy, cái gì\n \nquan trọng nhất? Khách hàng là quan trọng nhất.”\n \n“Hãy trở thành người tốt nhất trong thị trường nhỏ của bạn.”\n \n“Nếu bây giờ được làm lại, được tìm kiếm những người mà ta yêu quý, được người ta thích, và\n \nhọ sẵn sàng trả tiền cho ta thì họ là ai?”\n \n“Càng hẹp càng tốt.”\n \n“Thay đổi thị trường một cái là chúng ta thấy là giá trị vẫn là cái hàng đấy, nhưng giá trị nó\n \nthay đổi ngay lập tức.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Bài 3: Khách hàng ở đâu?</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Tóm tắt. Buổi giảng này tập trung vào việc xác định địa điểm khách hàng tiềm năng, cả về</h3>\n<p class=\"body-txt\">\nmặt vật lý lẫn trực tuyến, sau khi đã biết họ là ai. Diễn giả nhấn mạnh việc tìm hiểu họ\n \nthường dành thời gian ở đâu, đọc gì và tìm kiếm gì trên internet. Công cụ chính được gợi ý\n \nđể thực hiện việc này là Google Keyword Planner và Google Trends, cùng với lời khuyên\n \nquan trọng là &quot;trở thành họ&quot; để thực sự hiểu khách hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Xác định địa điểm của khách hàng: Sau khi biết khách hàng là ai (cá gì), cần xác định họ ở</span></div>\n<p class=\"body-txt\">\nđâu (cá ở đâu).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Địa điểm vật lý và trực tuyến: Khách hàng ở đâu về mặt vật lý (ngoài xã hội) và ở đâu</span></div>\n<p class=\"body-txt\">\ntrên internet.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Ba câu hỏi quan trọng:</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Họ thường dành thời gian ở đâu nhất (câu lạc bộ, phòng tập, Facebook, Instagram,</span></div>\n<p class=\"body-txt\">\nGoogle, blog, YouTube, quán rượu, quán cà phê, nhà nghỉ...).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Họ thường đọc cái gì (cả online và offline).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Họ thường tìm kiếm cái điều gì (trên internet).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Công cụ hỗ trợ:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Google Keyword Planner: Công cụ đơn giản và dễ dùng nhất để tìm kiếm những gì khách</span></div>\n<p class=\"body-txt\">\nhàng đang search liên quan đến từ khóa của bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Keyword Tool.io: Một công cụ khác dễ dùng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Google Trends: Để tìm ra xu hướng, những gì đang hot nhất trên mạng, những điều</span></div>\n<p class=\"body-txt\">\nkhách hàng tìm kiếm nhiều nhất trong tháng/năm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Audience Insight: Một công cụ khác (diễn giả nói có cả trong group luôn).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Độ chi tiết trong xác định địa điểm: Không chỉ nói chung chung &quot;câu lạc bộ thể thao&quot; mà</span></div>\n<p class=\"body-txt\">\nphải là &quot;câu lạc bộ thể thao nào&quot;, &quot;gốc nào&quot;, &quot;cá nào nó tụ về đấy&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Khách hàng cao cấp: Để bán hàng cao cấp thì phải đến những nơi khách hàng cao cấp</span></div>\n<p class=\"body-txt\">\nthường đến (câu lạc bộ thể thao cao cấp, nhà hàng cao cấp, quán bar cao cấp).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Phải &quot;trở thành họ&quot;: Cách duy nhất để tìm thấy họ là tạm thời trở thành họ để hiểu được</span></div>\n<p class=\"body-txt\">\nhành vi và địa điểm của họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chiến lược hợp tác: Khách hàng của bạn ở cả kênh của bạn và kênh của đối thủ/người</span></div>\n<p class=\"body-txt\">\nbên cạnh. Cân nhắc hợp tác để bán chéo sản phẩm/dịch vụ (ví dụ: son kèm socola, socola\n \nkèm rượu vang).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Xác định địa điểm khách hàng ở cả hai chiều vật lý và online một cách cụ thể: Đây là nền</span></div>\n<p class=\"body-txt\">\ntảng để tiếp cận khách hàng hiệu quả. Việc phân tích rõ ràng nơi họ dành thời gian, đọc\n \ngì và tìm kiếm gì giúp doanh nghiệp không chỉ định vị kênh tiếp thị mà còn hiểu sâu sắc\n \ntâm lý và nhu cầu của khách hàng để tạo ra thông điệp phù hợp. Điều này quan trọng vì\n \nnếu không biết khách hàng ở đâu, mọi nỗ lực marketing sẽ trở nên vô nghĩa và lãng phí.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Sử dụng Google Keyword Planner và Google Trends để &quot;nhìn xuyên&quot; vào suy nghĩ khách</span></div>\n<p class=\"body-txt\">\nhàng: Diễn giả nhấn mạnh đây là các công cụ cơ bản nhưng cực kỳ mạnh mẽ. Chúng giúp\n \nbạn không chỉ đoán mà thực sự biết được khách hàng đang quan tâm đến điều gì, từ\n \nkhóa nào họ sử dụng, từ đó định hình nội dung và chiến lược SEO/SEM hiệu quả. Sự thật\n \nlà khách hàng tìm kiếm điều gì chứ không phải bạn nghĩ họ tìm kiếm điều gì.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Lời khuyên &quot;Trở thành họ&quot;: Đây là một insight đắt giá về thấu hiểu khách hàng. Để thực</span></div>\n<p class=\"body-txt\">\nsự biết khách hàng ở đâu, bạn cần đặt mình vào vị trí của họ, trải nghiệm những nơi họ\n \nđến, đọc những gì họ đọc, tham gia những cộng đồng họ tham gia. Điều này giúp có được\n \nnhững hiểu biết trực quan, sâu sắc và chân thực nhất, vượt xa các dữ liệu thống kê khô\n \nkhan.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chiến lược hợp tác bán chéo (Cross-selling): Khách hàng của bạn không chỉ ở kênh của</span></div>\n<p class=\"body-txt\">\nbạn mà còn ở kênh của các đối tác hoặc thậm chí đối thủ. Bằng cách hợp tác với các\n \ndoanh nghiệp có sản phẩm/dịch vụ bổ trợ (ví dụ: bán son kèm socola, nội thất kèm chăn\n \nđệm), bạn có thể mở rộng tệp khách hàng, tăng giá trị đơn hàng và giảm chi phí quảng\n \ncáo, tạo ra một hệ sinh thái cộng sinh có lợi cho tất cả các bên.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#f57f17\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Họ ở đâu về mặt vật lý và họ ở đâu trên internet.”\n \n“Phải rõ ràng cái ao nào, mà phải rõ luôn trong cái ao đấy góc nào, cá nào nó tụ về đấy.”\n \n“Cái cách duy nhất để tìm thấy họ... trở thành họ.”\n \n“Họ ở cả của mình và họ ở cả kênh của thằng bên cạnh mình nữa.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Bài 4: Hiểu rõ insight của khách hàng</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Tóm tắt. Buổi giảng tập trung vào việc hiểu rõ insight của khách hàng thông qua việc xác</h3>\n<p class=\"body-txt\">\nđịnh các nhu cầu cốt lõi thúc đẩy hành vi mua hàng. Diễn giả giới thiệu sáu loại nhu cầu cơ\n \nbản của con người, nhấn mạnh rằng khách hàng sẽ mua vô điều kiện nếu sản phẩm/dịch vụ\n \nthỏa mãn đồng thời ba trong số những nhu cầu quan trọng nhất của họ. Để đạt được điều\n \nnày, người bán cần rèn luyện khả năng lắng nghe, quan sát, và tìm kiếm thông tin khách\n \nhàng một cách tinh tế trên các nền tảng online.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hiểu rõ Insight của Khách hàng: Buổi giảng bắt đầu với câu hỏi trọng tâm &quot;đâu là nhu</span></div>\n<p class=\"body-txt\">\ncầu của họ?&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Sáu Nhu cầu Của Con người:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nhu cầu được sống (số 1): Thể hiện qua ví dụ vượt qua thanh ván ở độ cao khác nhau, từ</span></div>\n<p class=\"body-txt\">\nviệc sợ chết mà hành động.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nhu cầu tiền (số 2): Hành động vì tiền bạc.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nhu cầu yêu thương (số 3): Hành động vì người thân yêu (con cái, bố mẹ). Diễn giả nhấn</span></div>\n<p class=\"body-txt\">\nmạnh đây là một động cơ cực lớn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nhu cầu danh vọng (số 4): Hành động để được nổi tiếng, được mọi người biết đến.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nhu cầu được phát triển bản thân (số 5): Mong muốn học tập, thay đổi, cải thiện con</span></div>\n<p class=\"body-txt\">\nngười.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nhu cầu được cống hiến cho người khác (số 6): Đóng góp, giúp đỡ cộng đồng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Phản bác Tháp Nhu cầu Maslow: Diễn giả không đồng ý với việc phải đi từ tầng dưới lên</span></div>\n<p class=\"body-txt\">\ntầng trên trong tháp Maslow. Ví dụ về Nelson Mandela và Mẹ Teresa cho thấy con người\n \ncó thể ưu tiên các nhu cầu cao hơn mà không cần thỏa mãn các nhu cầu cơ bản trước.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Quy tắc Vàng trong Kinh doanh:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Xác định hai nhu cầu quan trọng nhất của khách hàng: Đây là điều cốt lõi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Thỏa mãn ba nhu cầu cùng một lúc: Nếu thỏa mãn cả ba nhu cầu cùng lúc, khách hàng sẽ</span></div>\n<p class=\"body-txt\">\nmua hàng vô điều kiện và người bán có thể bán được giá cao. Nếu chỉ thỏa mãn hai nhu\n \ncầu, khách hàng sẽ cân nhắc.\n</p>\n<di "<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Quan sát từ khóa đuôi dài (long-tail keyword) mà khách hàng gõ khi tìm kiếm trên</span></div>\n<p class=\"body-txt\">\nmạng. Ví dụ: không chỉ &quot;trắng răng&quot; mà là &quot;thuốc làm trắng răng&quot;, &quot;làm trắng răng ở\n \nđâu&quot;, &quot;nơi làm trắng răng uy tín Hà Nội&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Sử dụng các công cụ như Google Keyword Tool, Google Trend, Google Searchbox để tìm</span></div>\n<p class=\"body-txt\">\nhiểu từ khóa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Thiết bị tìm kiếm: Quan sát khách hàng sử dụng thiết bị gì để tìm kiếm (máy tính, điện</span></div>\n<p class=\"body-txt\">\nthoại, v.v.) qua Google Analytics và Facebook Pixel.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Cách họ hỏi bạn bè: Quan sát cách khách hàng hỏi bạn bè, người thân để hiểu ngôn ngữ</span></div>\n<p class=\"body-txt\">\nvà cách họ mô tả nhu cầu, sản phẩm. Ví dụ, hỏi về &quot;projector&quot; thay vì &quot;màn hình LCD&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Thấu hiểu Vấn đề và Sự sung sướng: Người bán cần thấu hiểu sâu sắc vấn đề khách hàng</span></div>\n<p class=\"body-txt\">\nđang gặp phải và sự sung sướng mà họ mong muốn đạt được.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">&quot;Nếu thỏa mãn cả ba nhu cầu cùng một lúc, người ta mua hàng vô điều kiện.&quot;: Đây là</span></div>\n<p class=\"body-txt\">\ncông thức vàng để chinh phục khách hàng. Nó "<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><p class=\"body-txt\">\ntiên các nhu cầu này để biết sản phẩm/dịch vụ nào sẽ mang lại giá trị cao nhất và được\n \nkhách hàng sẵn sàng chi trả nhiều tiền nhất, trước khi tiến hành tạo ra sản phẩm.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Đầu tiên là xác định những gì đem lại niềm vui và nỗi đau cho khách hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Con người hành động để tránh nỗi đau và tận hưởng niềm vui.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chân dung khách hàng cần vẽ được 3 điều: những gì khiến họ sung sướng (niềm vui),</span></div>\n<p class=\"body-txt\">\nnhững gì khiến họ khổ đau (nỗi đau), và những điều họ muốn được trải qua/thưởng\n \nthức/hành động.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Quy trình &quot;vẽ chân dung khách hàng&quot;:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Xác định khách hàng và họ ở đâu.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Đến với họ, &quot;ở trong họ&quot; và lắng nghe sâu sắc bằng mọi giác quan (sờ, ngửi, nhìn, nghe</span></div>\n<p class=\"body-txt\">\nhọ nói về điều gì).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Ghi lại chi tiết những nỗi đau và nhu cầu của họ (ví dụ: nỗi đau bị coi thường, nhu cầu</span></div>\n<p class=\"body-txt\">\ndanh vọng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Sử dụng kỹ thuật giao t "<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là nền tảng cốt lõi để xây dựng một sản phẩm hoặc dịch vụ thực</span></div>\n<p class=\"body-txt\">\nsự có giá trị. Nếu không hiểu rõ những điều này, mọi chiến lược tiếp thị, bán hàng và\n \nphát triển sản phẩm đều dễ đi chệch hướng, không tạo được sự kết nối và giải quyết\n \nđúng vấn đề mà khách hàng đang gặp phải, dẫn đến lãng phí nguồn lực và hiệu quả kém.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Phương pháp &quot;vẽ chân dung khách hàng&quot; thông qua lắng nghe sâu sắc, quan sát đa giác</span></div>\n<p class=\"body-txt\">\nquan và khai thác thông tin từ môi trường sống/sinh hoạt của họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Nó cung cấp một cách tiếp cận toàn diện và tinh tế để thấu hiểu khách</span></div>\n<p class=\"body-txt\">\nhàng, vượt ra ngoài những gì họ nói trực tiếp. Việc phát hiện ra các nỗi đau tiềm ẩn như\n \n&quot;sợ bị coi thường&quot; hay nhu cầu &quot;danh vọng&quot; (ví dụ trường hợp cô Vân) đòi hỏi sự nhạy\n \nbén và khả năng đọc vị tâm lý khách hàng. Đây là chìa khóa để tạo ra những sản\n \nphẩm/thông điệp chạm đến cảm xúc sâu sắc nhất của họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Sắp xếp thứ tự ưu tiên các nhu cầu/nỗi đau của khách hàng là chìa khóa để định giá và</span></div>\n<p class=\"body-txt\">\ntối ưu hóa sản phẩm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Nguyên lý &quot;cái nào giải quyết nỗi đau lớn nhất hoặc đem lại sung</span></div>\n<p class=\"body-txt\">\nsướng lớn nhất thì khách hàng trả nhiều tiền nhất&quot; là kim chỉ nam cho việc định vị giá trị\n \nsản phẩm. Bằng cách xác định được nhu cầu nào là cấp bách nhất hoặc mang lại lợi ích\n \nlớn nhất, doanh nghiệp có thể tập trung nguồn lực vào việc giải quyết những vấn đề đó\n \nmột cách tối ưu, từ đó biện minh cho mức giá cao hơn và tăng lợi nhuận.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Sản phẩm đắt tiền nhất phải được tạo ra *sau khi* đã có và thấu hiểu khách hàng, không</span></div>\n<p class=\"body-txt\">\nphải trước.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Quan điểm này đảo ngược mô hình phát triển sản phẩm truyền thống,</span></div>\n<p class=\"body-txt\">\nvốn thường tập trung vào sản phẩm trước rồi mới tìm thị trường. Việc bắt đầu từ việc\n \nthấu hiểu khách hàng sâu sắc, xác định rõ &quot;nỗi đau lớn nhất&quot; của họ, sau đó mới thiết kế\n \nsản phẩm giải quyết những nỗi đau đó, giúp giảm thiểu rủi ro sản phẩm không có thị\n \ntrường, đảm bảo sản phẩm được tạo ra thực sự đáp ứng nhu cầu cao cấp nhất của khách\n \nhàng và dễ dàng được chấp nhận với mức giá cao.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Mọi thứ đều diễn ra như vậy, mình làm là để tránh những cái nỗi đau và để tận hưởng những\n \nniềm vui.”\n \n“Đừng tưởng tôi không nói gì, đừng tưởng tôi chụp hình, đừng tưởng tôi chỉ cười, đừng tưởng\n \nlà tôi tạo dáng trong ống kính, mà tôi tai bên này tôi nghe, tai bên này tôi nghe hết và tôi vẽ ra\n \nba bức tranh mới.”\n \n“Cái nào giải quyết được nỗi đau lớn nhất thì người ta sẵn sàng trả nhiều tiền cho mình.”\n \n“Sản phẩm đắt tiền không được tạo ra trước khi có khách hàng.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#f57f17\">Chương 3</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Bài 6: Quản trị cảm xúc để bán hàng tốt hơn</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Tóm tắt. Buổi giảng tập trung vào vai trò cốt lõi của cảm xúc trong quyết định mua hàng,</h3>\n<p class=\"body-txt\">\nkhẳng định rằng quyết định mua hàng đến trước khi cân nhắc. Diễn giả nhấn mạnh người\n \nbán cần phải là bậc diễn giả quản trị cảm xúc, biết cách tạo ra câu chuyện cảm xúc theo 7\n \nbước, nhận biết và dẫn dắt cảm xúc của khách hàng. Để làm được điều này, ngôn ngữ cơ thể\n \nlà yếu tố quan trọng nhất, tiếp theo là âm giọng và ngôn từ, nhằm khơi gợi các nhu cầu và\n \ncảm xúc tích cực, hoặc giải tỏa cảm xúc tiêu cực của người mua.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Quyết định mua hàng có trước sự cân nhắc: Khách hàng đã đưa ra quyết định mua khi</span></div>\n<p class=\"body-txt\">\nhọ bước vào cửa hàng hoặc truy cập website, sự cân nhắc xảy ra sau đó hoặc là nhiệm vụ\n \ncủa người bán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tại sao quyết định mua hàng có trước cân nhắc:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Họ mua hàng bởi cảm xúc của chính họ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Cái họ thực sự mua là cảm xúc họ nhận được.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Họ mua bởi cảm xúc của người bán.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Họ mua vì có sự đồng điệu cảm xúc với người bán.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Yếu tố quan trọng nhất là cảm xúc: Mọi hành vi mua đều do cảm xúc quyết định. Người</span></div>\n<p class=\"body-txt\">\nbán cần học cách quản trị cảm xúc của mình và khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Các cách để tạo ra và quản trị cảm xúc người mua:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Học cách quản trị cảm xúc một cách nghiêm túc.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nhận biết được cảm xúc của người mua: Có thể tự thiết lập cảm xúc mong muốn cho</span></div>\n<p class=\"body-txt\">\nkhách hàng hoặc tiên đoán cảm xúc của họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tạo ra câu chuyện cảm xúc: Câu chuyện phải tuân theo cấu trúc 7 bước:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Khát khao, mong muốn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Những rào cản khiến mong muốn không thành hiện thực.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Những nhân vật phản diện.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Kế hoạch, chiến lược, công cụ (có thể có nhân vật thần tiên giúp đỡ).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Trận đánh diễn ra.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Kết quả.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tổng kết bài học hoặc mở ra một câu chuyện mới.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Giúp khách hàng cảm thấy có trách nhiệm: Đánh vào nhu cầu yêu thương, cống hiến,</span></div>\n<p class=\"body-txt\">\nphát triển.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Giúp khách hàng cảm thấy có khí chất anh hùng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Giúp khách hàng cảm thấy họ quan trọng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Các cảm xúc giúp bán hàng giá cao: Cảm thấy quan trọng, có trách nhiệm, là anh hùng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Các cảm xúc tiêu cực phổ biến (mà khách hàng muốn giải phóng): Sự sợ hãi (sợ bị coi</span></div>\n<p class=\"body-txt\">\nthường), cảm thấy tội lỗi, cảm thấy bị bế tắc, cảm thấy xấu hổ. Người bán cần cho khách\n \nhàng nhận biết những cảm xúc tiêu cực này nếu họ không mua hàng.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Các cảm xúc tích cực cần tạo ra (mà khách hàng muốn tiến tới): Thành công, an bình</span></div>\n<p class=\"body-txt\">\ntrong tâm trí, được chấp nhận, được ngưỡng mộ, lợi ích (tiền, tiết kiệm), được yêu\n \nthương, an toàn, tự hào, tôn trọng. Người bán cần cho khách hàng một bức tranh về\n \nnhững cảm xúc tích cực này nếu họ mua hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Liên kết nhu cầu và cảm xúc: Sau khi phát hiện nhu cầu của khách hàng, phải tìm ra cảm</span></div>\n<p class=\"body-txt\">\nxúc dẫn dắt phù hợp với nhu cầu đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Ba yếu tố quyết định giá trị thông điệp và cảm xúc:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Ngôn từ: Chiếm 7%.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Âm giọng (tông điệu): Chiếm 38%.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Ngôn ngữ cơ thể: Chiếm 55%.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Ngôn ngữ cơ thể (và ngoại hình) là yếu tố quan trọng nhất trong việc truyền tải cảm xúc.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Ba yếu tố quyết định cảm xúc (tổng kết):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Trạng thái thân thể (bao gồm âm giọng).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Ngôn từ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Điều mà chúng ta dẫn dắt họ tập trung vào.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Ví dụ minh họa: Cách dùng ngôn từ và sự tập trung để gợi lên cảm xúc tội lỗi (không</span></div>\n<p class=\"body-txt\">\nnhắn tin cho bố mẹ) hay tự hào (mua kim cương tặng mẹ).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Lưu ý khi bán hàng: Cần xác định đúng nhu cầu của khách hàng (ví dụ: yêu tiền hay yêu</span></div>\n<p class=\"body-txt\">\nthương) để tấn công vào cảm xúc phù hợp.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">&quot;Quyết định mua hàng có trước khi sự cân nhắc. Đừng quan tâm tới sự cân nhắc.&quot; và</span></div>\n<p class=\"body-txt\">\n&quot;Tất cả là do cảm xúc quyết định.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là nền tảng triết lý bán hàng của buổi học. Nó thay đổi hoàn toàn</span></div>\n<p class=\"body-txt\">\nquan điểm truyền thống về việc khách hàng cân nhắc lý trí trước. Thay vào đó, nó định\n \nvị cảm xúc là yếu tố tối thượng và ra quyết định là một hành động cảm xúc, sau đó mới\n \nđến các lý do hợp lý hóa. Điều này hướng người bán tập trung vào việc khơi gợi cảm xúc\n \nthay vì chỉ cung cấp thông tin.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">&quot;Bạn phải là bậc diễn giả về quản trị cảm xúc.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là yêu cầu trực tiếp và cao nhất đối với người bán hàng. Không</span></div>\n<p class=\"body-txt\">\nchỉ là hiểu về cảm xúc, mà phải thành thạo trong việc quản lý cảm xúc của bản thân và\n \nảnh hưởng đến cảm xúc của người khác. Nó là kỹ năng cốt lõi để thành công trong bán\n \nhàng theo phương pháp này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">&quot;Ngôn ngữ cơ thể là quan trọng nhất.&quot; (chiếm 55% giá trị thông điệp)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Điểm này chỉ ra *cách thức* hiệu quả nhất để truyền tải và ảnh hưởng</span></div>\n<p class=\"body-txt\">\ncảm xúc. Mặc dù ngôn từ và âm giọng cũng quan trọng, nhưng ngôn ngữ cơ thể (bao gồm\n \ncả ngoại hình) là yếu tố có sức ảnh hưởng lớn nhất. Điều này đòi hỏi người bán phải chú\n \ntrọng đến cả hình thức, cử chỉ, và trạng thái thể chất của mình khi tương tác với khách\n \nhàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Quy trình 7 bước để kể câu chuyện cảm xúc.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là một công cụ thực tế, có cấu trúc rõ ràng để người bán có thể áp</span></div>\n<p class=\"body-txt\">\ndụng ngay lập tức. Nó cung cấp một lộ trình cụ thể để tạo ra những câu chuyện có sức\n \nlay động, từ đó dễ dàng dẫn dắt cảm xúc của khách hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Quyết định mua hàng có trước khi sự cân nhắc. Vậy cho nên, đừng quan tâm tới sự cân nhắc.”\n \n“Mọi người mua hàng bởi cảm xúc.”\n \n“Đây mới thực sự là công nghệ giải phóng phụ nữ. Tiên sư bố cái thằng nào nghĩ ra cái này\n \nhay thế nhỉ?”\n \n“Ngôn ngữ cơ thể là quan trọng nhất.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Bài 7: Lời hứa thương hiệu</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Tóm tắt. Buổi giảng tập trung vào việc xây dựng &quot;lời hứa thương hiệu&quot; mạnh mẽ và thuyết</h3>\n<p class=\"body-txt\">\nphục khách hàng. Diễn giả nhấn mạnh rằng để kiếm được nhiều tiền và dẫn đầu thị trường,\n \ndoanh nghiệp cần hứa những lợi ích cụ thể cho khách hàng, xoay quanh các yếu tố như\n \nnhanh hơn, dễ hơn, và yêu cầu ít nỗ lực (hoặc không cần nỗ lực) từ phía họ. Việc đưa các &quot;bí\n \nmật&quot; này vào thông điệp truyền thông sẽ giúp sản phẩm/dịch vụ trở nên hấp dẫn hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">0:08 - 0:13: Đưa những &quot;bí mật&quot; vào thông điệp truyền thông.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">0:13 - 0:18: Phải đưa ra một lời hứa, lời hứa thương hiệu, thì mới có thể kiếm được</span></div>\n<p class=\"body-txt\">\nnhiều tiền.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">0:18 - 0:36: Lời hứa thứ nhất: &quot;Nhanh hơn&quot; (ví dụ: &quot;ba ngày là hết nám&quot;, &quot;đút vào phát 3</span></div>\n<p class=\"body-txt\">\ngiây là xong&quot; so với việc &quot;bóc tem, lằng nhằng&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">0:38 - 0:46: Lời hứa thứ hai: &quot;Dễ hơn&quot; (ví dụ: không phải &quot;dán ra dán vào, lệch, ướt</span></div>\n<p class=\"body-txt\">\nđệm&quot;, mà chỉ cần &quot;đút vào phát&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">0:55 - 1:16: Lời hứa thứ ba: &quot;Không cần làm gì cả&quot; (ví dụ: &quot;không cần làm gì cả cũng</span></div>\n<p class=\"body-txt\">\ngiàu&quot;, &quot;hệ thống tự động tưới&quot;, &quot;tối tự động tắt đèn&quot;). Đây là từ khóa rất mạnh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">1:17 - 1:29: Lời hứa thứ tư: &quot;Ít nỗ lực&quot; hoặc &quot;Dễ dàng&quot; (đây là một phiên bản thực tế hơn</span></div>\n<p class=\"body-txt\">\ncủa &quot;không cần làm gì cả&quot;, rất dễ để đạt được).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">1:29 - 1:38: Các từ khóa trên là những lời hứa cần đưa ra cho khách hàng; nếu làm được</span></div>\n<p class=\"body-txt\">\nnhững điều này, bạn sẽ dẫn đầu trong chiến lược giá của mình.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tập trung vào lợi ích cụ thể, dễ hình dung cho khách hàng: Diễn giả nhấn mạnh các yếu</span></div>\n<p class=\"body-txt\">\ntố &quot;nhanh hơn&quot;, &quot;dễ hơn&quot;, &quot;ít nỗ lực&quot; (hoặc &quot;không cần làm gì cả&quot;). Đây không chỉ là tính\n \nnăng sản phẩm mà là những *lợi ích trực tiếp* giải quyết vấn đề của khách hàng, giúp họ\n \ncảm nhận được giá trị ngay lập tức. Điều này quan trọng vì khách hàng mua giải pháp và\n \nsự tiện lợi, chứ không phải chỉ mua sản phẩm/dịch vụ.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Sử dụng ngôn ngữ mạnh mẽ và tuyệt đối hóa lợi ích: Các cụm từ như &quot;nhanh nhất&quot;, &quot;dễ</span></div>\n<p class=\"body-txt\">\nnhất&quot;, &quot;không cần làm gì cả&quot; tạo ra ấn tượng mạnh mẽ, giúp sản phẩm nổi bật và tạo ra\n \nsự khác biệt rõ rệt trong tâm trí khách hàng. Điều này rất quan trọng trong việc thu hút\n \nsự chú ý và thuyết phục khách hàng trong một thị trường cạnh tranh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hứa những điều giúp khách hàng tiết kiệm thời gian, công sức: Cốt lõi của các &quot;lời hứa&quot;</span></div>\n<p class=\"body-txt\">\nlà giảm gánh nặng cho khách hàng. Việc cung cấp một giải pháp giúp họ làm mọi thứ\n \nnhanh chóng, dễ dàng và ít tốn công sức nhất có thể là yếu tố then chốt để chiếm ưu thế.\n \nKhi khách hàng cảm thấy &quot;nhẹ nhõm&quot; hơn, họ sẵn lòng chi trả cao hơn và trung thành\n \nhơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Bạn phải đưa ra một lời hứa, lời hứa thương hiệu này. Bạn phải hứa được điều này thì bạn\n \nmới có thể kiếm được tiền nhiều này.”\n \n“Bạn cứ theo tôi không cần làm gì cả, cũng giàu.”\n \n“Nói đấy là những cái từ khóa mà bạn cần phải hứa với khách hàng của mình. Và nếu bạn hứa\n \nđược những điều này, bạn làm được những điều này thì bạn sẽ dẫn đầu trong cái chiến lược\n \ngiá của mình.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Bài 8: Quy luật bán hàng, bản chất của kinh doanh</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Tóm tắt. Buổi giảng này tập trung vào việc nhận diện và vượt qua hai tư duy cản trở thành</h3>\n<p class=\"body-txt\">\ncông trong kinh doanh: &quot;Tôi biết rồi&quot; và &quot;Công việc của tôi khác/đặc biệt&quot;. Ông nhấn mạnh\n \ntầm quan trọng của quy luật cung cầu để tối ưu hóa lợi nhuận, cho rằng việc giới hạn nguồn\n \ncung và tăng cường nhu cầu thị trường sẽ giúp bán sản phẩm với giá cao hơn. Cốt lõi là thay\n \nđổi cách đo lường thành công, từ số lượng hàng bán được sang tổng lợi nhuận kiếm về, đồng\n \nthời vượt qua nỗi sợ bán được ít hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hai &quot;từ khóa&quot; gây thất bại trong kinh doanh:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">&quot;Tôi biết rồi&quot;: Khi ta nói &quot;tôi biết rồi&quot;, não bộ sẽ đóng lại, không tiếp nhận thông tin mới.</span></div>\n<p class=\"body-txt\">\nĐiều này cũng khiến người khác không muốn chia sẻ bí mật hay kiến thức sâu sắc (như\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">ví dụ tảng băng trôi, chỉ 10% nổi trên mặt nước). Để thành công, cần tìm hiểu &quot;điều gì</h3>\n<p class=\"body-txt\">\ndẫn dắt anh ta làm như vậy&quot; chứ không phải &quot;cách anh ta làm&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">&quot;Công việc của tôi khác/đặc biệt&quot;: Tư duy này khiến chúng ta không muốn học hỏi từ</span></div>\n<p class=\"body-txt\">\nngười khác, dẫn đến sự bảo thủ và trì trệ. Trong kinh doanh và xã hội luôn có những quy\n \nluật chung mà chúng ta cần học hỏi và áp dụng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Quy luật cung cầu:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Cung (cung cấp hàng hóa ra thị trường): Càng cung cấp nhiều hàng hóa thì giá càng</span></div>\n<p class=\"body-txt\">\ngiảm. Lý giải hiện tượng &quot;phá giá&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Giải pháp cho phá giá: Hạn chế hàng hóa ra thị trường, ngừng bán, đi chơi, đóng cửa</span></div>\n<p class=\"body-txt\">\nhoặc bán trước, hủy bỏ.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Cầu (nhu cầu thị trường): Càng nhiều người cần thì giá càng tăng. Để tăng giá bán, cần</span></div>\n<p class=\"body-txt\">\nlàm cho nhu cầu được phát triển trên thị trường, tức là &quot;đào tạo thị trường&quot;, tạo cho\n \nkhách hàng nhận thức về nhu cầu mới.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Điểm cân bằng: Là giao điểm giữa đường cung và đường cầu, xác định &quot;giá thị trường&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Để bán được giá cao: Cần cung ít hơn cầu. Ví dụ sản phẩm &quot;limited edition&quot; (phiên bản</span></div>\n<p class=\"body-txt\">\ngiới hạn) chỉ có số lượng ít.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nỗi sợ bán được ít hàng: Nhiều người sợ bán được ít hàng, nhưng điều này lại cản trở</span></div>\n<p class=\"body-txt\">\nviệc tăng lợi nhuận.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bản chất của kinh doanh:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Phải có tiền (tạo ra tiền): Đây là điều đầu tiên và quan trọng nhất.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Phải có ý nghĩa: Giúp ích được khách hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Đem lại niềm vui: Niềm vui có thể đến sau, nhưng tiền phải là đầu tiên.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Thước đo thành công của kinh doanh: Được đo bằng &quot;lượng tiền chúng ta kiếm được&quot;,</span></div>\n<p class=\"body-txt\">\nchứ không phải &quot;số hàng chúng ta bán được&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Ví dụ minh họa: Bán 5 sản phẩm với giá cao (60 đô la/sản phẩm) mang lại lợi nhuận cao</span></div>\n<p class=\"body-txt\">\nhơn (150 đô la) so với bán 10 sản phẩm với giá thấp (20 đô la/sản phẩm) (lợi nhuận 50\n \nđô la), dù chi phí cố định và chi phí sản xuất từng sản phẩm là như nhau.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tư duy là rào cản lớn nhất: Việc chấp niệm vào &quot;tôi biết rồi&quot; hay &quot;công việc của tôi đặc</span></div>\n<p class=\"body-txt\">\nbiệt&quot; sẽ đóng kín cánh cửa học hỏi và đổi mới. Đây là những &quot;công thức của sự thất bại&quot;\n \nvì nó ngăn cản doanh nghiệp tiếp thu kiến thức mới, hiểu sâu sắc thị trường và cải thiện,\n \ntừ đó dẫn đến trì trệ và mất cơ hội.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Lợi nhuận đến từ giá trị, không phải số lượng: Thông qua ví dụ cụ thể, diễn giả chứng</span></div>\n<p class=\"body-txt\">\nminh rằng bán ít sản phẩm hơn với giá cao có thể mang lại lợi nhuận vượt trội so với\n \nbán nhiều sản phẩm với giá thấp. Điều này cực kỳ quan trọng vì nó thách thức suy nghĩ\n \nphổ biến rằng phải bán thật nhiều mới giàu, khuyến khích tập trung vào giá trị sản phẩm\n \nvà khả năng định giá chiến lược thay vì chỉ chạy theo doanh số.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nỗi sợ bán được ít hàng là kẻ thù của lợi nhuận cao: Việc lo sợ không bán được nhiều</span></div>\n<p class=\"body-txt\">\nsản phẩm thường dẫn đến các hành vi như phá giá, giảm chất lượng để cạnh tranh, từ đó\n \nlàm giảm lợi nhuận. Vượt qua nỗi sợ này để kiên định với chiến lược giới hạn cung và\n \ntăng cầu là chìa khóa để đạt được mức giá và lợi nhuận cao hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Tôi biết rồi là công thức của sự thất bại.”\n \n“Cái mà chúng ta nhìn thấy thông thường chỉ là 10% cái thứ nó nổi, và cái thứ mọi người\n \nbiết.”\n \n“Kinh doanh thành công là phải đo bằng cái lượng tiền chúng ta kiếm được, chứ không phải\n \nbằng số hàng chúng ta bán được.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#f57f17\">Bài 9: Con đường giúp kiếm tiền giá cao</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Tóm tắt. Buổi giảng nhấn mạnh tầm quan trọng của bảo hiểm nhân thọ như một công cụ</h3>\n<p class=\"body-txt\">\nbảo vệ tài chính chắc chắn, đặc biệt là đảm bảo di sản cho thế hệ sau trước những rủi ro bất\n \nngờ. Diễn giả chỉ ra rằng nghề bán bảo hiểm là một trong những nghề khó nhất vì bán một\n \nthứ người ta không muốn dùng, nhưng đây cũng là cơ hội lớn để rèn luyện kỹ năng bán hàng\n \nđỉnh cao. Cốt lõi của kinh doanh thành công và tạo ra giá trị bền vững là tập trung vào việc\n \nmang lại ý nghĩa và giá trị cao hơn cho khách hàng so với số tiền họ bỏ ra, thay vì chỉ tập\n \ntrung vào lợi nhuận.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chi phí giáo dục (du học, đại học) cho con cái là rất lớn, lên đến hàng chục tỷ đồng cho</span></div>\n<p class=\"body-txt\">\nhai đứa con.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bảo hiểm nhân thọ được giới thiệu là con đường chắc chắn nhất để bảo vệ &quot;mệnh giá&quot;</span></div>\n<p class=\"body-txt\">\nnày và đảm bảo tài chính cho gia đình khi xảy ra rủi ro.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Người dân thường không mua bảo hiểm vì họ không hiểu bảo hiểm là gì, tạo ra một cơ</span></div>\n<p class=\"body-txt\">\nhội rất lớn cho những người bán bảo hiểm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nghề bán bảo hiểm nhân thọ là một trong những nghề khó nhất vì nó đòi hỏi bán một</span></div>\n<p class=\"body-txt\">\nsản phẩm mà người ta không bao giờ muốn dùng (thậm chí khó hơn bán quan tài).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Thành công trong ngành bảo hiểm được đánh giá bằng các cấp bậc như &quot;bàn tròn triệu</span></div>\n<p class=\"body-txt\">\nđô&quot;, tức là đạt 800 triệu tiền phí bảo hiểm/năm, tương đương với giá trị bảo hiểm 1\n \ntriệu USD.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nhiều doanh nhân thành công trong các ngành khác nhau đã khởi nghiệp từ nghề bán</span></div>\n<p class=\"body-txt\">\nbảo hiểm, cho thấy đây là môi trường rèn luyện kỹ năng bán hàng và kinh doanh hiệu\n \nquả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Giá trị thực sự mà một người để lại khi chết đi không phải là của cải vật chất, mà là</span></div>\n<p class=\"body-txt\">\nnhững giá trị tinh thần, ý nghĩa được &quot;kết tinh&quot; trong con người khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Trong kinh doanh, điều quan trọng nhất là ý nghĩa và giá trị bạn mang lại cho khách</span></div>\n<p class=\"body-txt\">\nhàng của mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Cách để kiếm được tiền giá cao là giúp khách hàng nhận được giá trị cao hơn số tiền họ</span></div>\n<p class=\"body-txt\">\nbỏ ra.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bảo hiểm nhân thọ là công cụ bảo vệ &quot;di sản&quot; thật sự.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Diễn giả không chỉ nói bảo hiểm là để bù đắp tài chính mà còn nâng</span></div>\n<p class=\"body-txt\">\ntầm nó lên thành &quot;mệnh giá cần bảo vệ&quot; cho tương lai con cái. So sánh với việc của cải\n \nvật chất (lâu đài, tiền bạc) sẽ mất đi hoặc sụp đổ, bảo hiểm nhân thọ đảm bảo một phần\n \nquan trọng của &quot;di sản&quot; là sự giáo dục và tương lai cho những người ở lại. Điều này giúp\n \nngười nghe nhìn nhận bảo hiểm bằng một lăng kính ý nghĩa hơn, không chỉ là tài sản mà\n \nlà trách nhiệm và tình yêu thương.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Kỹ năng bán bảo hiểm là thước đo cho khả năng bán hàng toàn diện.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Diễn giả khẳng định bán bảo hiểm là &quot;khó nhất trong các nghề&quot; vì bán</span></div>\n<p class=\"body-txt\">\nmột thứ mà khách hàng &quot;không bao giờ muốn dùng&quot;. Nếu có thể thuyết phục thành công\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><p class=\"body-txt\">\nkhách hàng mua một thứ họ không mong muốn sử dụng nhưng lại vô cùng cần thiết\n \n(trong trường hợp rủi ro), người bán sẽ có kỹ năng thuyết phục và thấu hiểu tâm lý\n \nkhách hàng vượt trội, từ đó có thể bán được bất cứ sản phẩm hay dịch vụ nào khác. Đây\n \nlà một bài học đắt giá về việc rèn luyện năng lực kinh doanh cốt lõi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Giá trị thực sự trong kinh doanh đến từ việc mang lại ý nghĩa và giá trị vượt trội cho</span></div>\n<p class=\"body-txt\">\nkhách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Diễn giả chuyển hướng trọng tâm từ việc &quot;kiếm được bao nhiêu tiền&quot;</span></div>\n<p class=\"body-txt\">\nsang &quot;kiếm tiền bằng cách nào&quot; và khẳng định cách duy nhất để kiếm được tiền giá cao là\n \n&quot;giúp khách hàng nhận được giá trị cao hơn số tiền họ bỏ ra&quot;. Đây là triết lý kinh doanh\n \ncốt lõi, nhấn mạnh tầm quan trọng của việc tạo ra giá trị thực sự, sự khác biệt và ảnh\n \nhưởng tích cực lên khách hàng, thay vì chỉ chạy theo lợi nhuận ngắn hạn. Nó định hướng\n \nmột tư duy kinh doanh bền vững và có đạo đức.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Bảo hiểm nhân thọ là một nghề khó nhất trong các nghề. Và nếu các bạn bán được bảo hiểm\n \nnhân thọ, bán được mọi thứ.”\n \n“Tại sao mình không bằng cái xe? Xe hỏng mình mua được cái mới không? Có mua được cái\n \nmới không? Sao lại phải có bảo hiểm cho nó? Thế mình hỏng có mua được cái mới không?\n \nKhông. Thế sao mình không mua bảo hiểm cho mình?”\n \n“Không phải bạn kiếm được bao nhiêu tiền, mà bạn kiếm tiền bằng cách nào. Cách để kiếm\n \nđược tiền giá cao chỉ có một con đường duy nhất: giúp khách hàng nhận được giá trị cao hơn\n \nsố tiền họ bỏ ra.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Bài 10: Thị trường đỏ, thị trường xanh và chiến lược Hớt váng sữa</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Tóm tắt. Buổi học tập trung vào hai chiến lược kinh doanh cốt lõi để bán hàng giá cao và tạo</h3>\n<p class=\"body-txt\">\nlợi thế cạnh tranh: Đại dương xanh và Hớt váng sữa (Skimming). Chiến lược Đại dương xanh\n \nkhuyến khích tạo ra thị trường mới không cạnh tranh và biến đối thủ thành đối tác, thay vì\n \nchiến đấu trong thị trường đỏ khốc liệt. Chiến lược Hớt váng sữa là phương pháp định giá\n \nban đầu rất cao cho các sản phẩm công nghệ hoặc thời trang, sau đó giảm giá dần theo thời\n \ngian để tối ưu hóa doanh thu. Diễn giả cũng nhấn mạnh tầm quan trọng của việc hiểu sâu sắc\n \nlý do đằng sau việc định giá cao để thuyết phục được &quot;dân khôn&quot; mua hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Giới thiệu chiến lược Đại dương xanh (Blue Ocean): Đây là chiến lược số 2, rất căn bản</span></div>\n<p class=\"body-txt\">\nvề cung và cầu, dành cho những ai muốn bán hàng giá cao.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Phân biệt Đại dương xanh và Đại dương đỏ:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Đại dương xanh: Thị trường không có cạnh tranh, nơi chúng ta tạo ra những thị trường</span></div>\n<p class=\"body-txt\">\nmới hoặc khoảng không mới, biến đối thủ thành đối tác, tạo ra và nắm bắt những nhu\n \ncầu mới.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Đại dương đỏ: Thị trường cạnh tranh, nơi chúng ta chiến đấu để giành lại thị trường từ</span></div>\n<p class=\"body-txt\">\nngười khác, đánh nhau với đối thủ, tìm kiếm những nhu cầu đã có.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chiến lược biến đối thủ thành đối tác: Thay vì sản xuất cạnh tranh, có thể đàm phán</span></div>\n<p class=\"body-txt\">\nnhập hàng của đối thủ, sử dụng cơ sở hạ tầng của họ để sản xuất, hoặc gộp hàng thành\n \nmột gói sản phẩm để cùng bán và có lợi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Đối phó với thị trường đỏ: Khi nhu cầu đã tồn tại và có nhiều nhà cung cấp, cách đơn</span></div>\n<p class=\"body-txt\">\ngiản nhất là tìm ra những xu hướng mới.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chiến lược Z-Lag (thuộc Eagle Camp): Mang hàng hóa/dịch vụ phổ biến từ một nơi này</span></div>\n<p class=\"body-txt\">\n(ví dụ: Mỹ) qua nơi khác chưa phổ biến (ví dụ: Việt Nam) để tạo ra thị trường đại dương\n \nxanh một cách dễ dàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Khái niệm &quot;Thế giới phẳng&quot; (The World Is Flat): Thông tin lan truyền nhanh chóng nhờ</span></div>\n<p class=\"body-txt\">\ninternet và máy bay phản lực (không quá 26 giờ đến bất kỳ đâu), khiến thị trường xanh\n \nnhanh chóng biến thành đỏ. Điều này làm cho những món hàng đang có giá cao dễ bị đối\n \nthủ nhảy vào bán giá thấp hơn, buộc phải giảm giá.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chiến lược Hớt váng sữa (Skimming):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Để đối mặt với việc thị trường xanh nhanh chóng thành đỏ, có chiến lược &quot;hớt váng sữa&quot;</span></div>\n<p class=\"body-txt\">\n(Skimming).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" styl
