e=\"color:#f57f17\">•</span><span class=\"bul-txt\">Đây là chiến lược bán ban đầu với giá rất cao, bán hạn chế, sau đó tiếp tục hạ giá và bán</span></div>\n<p class=\"body-txt\">\nnốt phần còn lại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Lý do gọi là &quot;hớt váng sữa&quot;: Tương tự như việc hớt phần váng sữa ngon nhất, béo nhất</span></div>\n<p class=\"body-txt\">\nnổi trên bề mặt trước.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chiến lược này thường dùng cho các sản phẩm công nghệ (ví dụ: Apple iPhone, Samsung</span></div>\n<p class=\"body-txt\">\nNote/S) và thời trang.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Mô hình chiến lược: Hàng mới ra bán giá cao, sau đó giảm giá dần khi hết trend hoặc ra</span></div>\n<p class=\"body-txt\">\nsản phẩm mới, để bán nốt phần thị trường còn lại và thu hồi vốn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chu kỳ này thường khoảng 6 tháng đối với sản phẩm công nghệ (ví dụ Samsung ra mắt S</span></div>\n<p class=\"body-txt\">\nvà Note song song).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Câu hỏi quan trọng: Tại sao một sản phẩm như Note 8 ban đầu bán 28 triệu lại được</span></div>\n<p class=\"body-txt\">\nmua nhiều, nhưng sau một năm giảm còn 8 triệu lại ít người mua hơn, dù sản phẩm\n \nkhông khác gì nhau?\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tư duy bán hàng giá cao: Bán hàng giá cao là bán cho &quot;dân khôn&quot;, đòi hỏi người bán phải</span></div>\n<p class=\"body-txt\">\n&quot;khôn&quot;, tức là phải tìm ra &quot;hàng chục lý do&quot; để khách hàng thấy giá trị và chấp nhận mức\n \ngiá cao đó.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Phân biệt rõ tư duy Đại dương xanh và Đại dương đỏ: Điểm này quan trọng vì nó định</span></div>\n<p class=\"body-txt\">\nhình toàn bộ chiến lược kinh doanh. Thay vì lao vào cuộc chiến giá cả khốc liệt trong thị\n \ntrường đỏ, việc chủ động tạo ra &quot;khoảng không&quot; hoặc nhu cầu mới (Đại dương xanh)\n \ngiúp doanh nghiệp có lợi thế độc quyền, định giá cao và kiểm soát thị trường. Thậm chí\n \nbiến đối thủ thành đối tác là một cách tiếp cận mang tính hợp tác chiến lược, tối ưu hóa\n \nnguồn lực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chiến lược Hớt váng sữa (Skimming) trong bối cảnh &quot;Thế giới phẳng&quot;: Trong một thế</span></div>\n<p class=\"body-txt\">\ngiới nơi thông tin và sản phẩm nhanh chóng lan rộng, bất kỳ lợi thế giá cao nào cũng dễ\n \nbị sao chép và cạnh tranh. Chiến lược hớt váng sữa cung cấp một phương pháp thực tế\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><p class=\"body-txt\">\nđể tối đa hóa lợi nhuận từ những người tiên phong (early adopters) sẵn sàng chi trả cao\n \nnhất, sau đó điều chỉnh để chiếm lĩnh thị trường rộng hơn. Đây là chìa khóa để duy trì lợi\n \nnhuận trong chu kỳ sản phẩm ngắn và thị trường biến động.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bán hàng giá cao đòi hỏi tư duy &quot;khôn&quot; và nhiều lý do thuyết phục: Việc định giá sản</span></div>\n<p class=\"body-txt\">\nphẩm không chỉ là tính toán chi phí mà còn là việc tạo ra và truyền tải giá trị cảm nhận.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Câu hỏi về Samsung Note 8 cho thấy khách hàng sẵn sàng trả giá cao cho những yếu tố</h3>\n<p class=\"body-txt\">\nkhông phải về mặt vật lý của sản phẩm (ví dụ: sự mới mẻ, đẳng cấp, trải nghiệm tiên\n \nphong). Để bán giá cao thành công, doanh nghiệp phải hiểu sâu sắc tâm lý khách hàng và\n \ncó hàng chục lý do vững chắc, không phải chỉ một hoặc hai, để thuyết phục &quot;người giỏi&quot;\n \nchấp nhận mức giá đó.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Chiến lược Đại dương xanh là một trong những cuốn sách gọi là rất căn bản về cung và cầu\n \nvà mong các anh chị hãy đọc nó một cách nghiêm túc nếu các anh chị muốn bước vào thế giới\n \ncủa những người bán hàng giá cao.”\n \n“Bán hàng giá cao là bán cho dân khôn. Mình không khôn thì mình còn lâu mới bán được.”\n \n“Người giỏi nó không ngu như mình đâu. Người giỏi nó phải tìm ra được hàng chục lý do nó\n \nmới bán được giá cao. Một lý do làm sao mà bán được giá cao?”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Bài 11: Chiến lược chủ động làm cũ sản phẩm - tiến vào thị trường xanh</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Tóm tắt. Buổi giảng tập trung vào chiến lược &quot;Đại Dương Xanh&quot; – việc tạo ra thị trường mới,</h3>\n<p class=\"body-txt\">\nkhông cạnh tranh để đạt lợi nhuận cao. Để thực hiện điều này, doanh nghiệp cần chủ động\n \nthay đổi đối tượng khách hàng, địa điểm, và loại hình sản phẩm/dịch vụ, đồng thời không\n \nngừng sáng tạo để cung cấp trải nghiệm độc đáo và giữ chân khách hàng. Một chiến lược\n \nquan trọng là &quot;chủ động làm cũ sản phẩm&quot; để thúc đẩy khách hàng mua lại hoặc nâng cấp,\n \ntránh bán một lần rồi thôi.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Case study Cirque du Soleil (CDS): Gánh xiếc đang đứng trước nguy cơ phá sản vì trẻ em</span></div>\n<p class=\"body-txt\">\nkhông còn muốn xem xiếc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chuyển đổi của CDS để tạo ra &quot;Đại Dương Xanh&quot;:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Thay đổi Who (đối tượng phục vụ): Từ trẻ em sang người lớn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Thay đổi Where (địa điểm biểu diễn): Từ rạp xiếc thông thường sang Las Vegas và các</span></div>\n<p class=\"body-txt\">\ntrung tâm lớn của Mỹ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Thay đổi What (loại hình biểu diễn): Không còn xiếc truyền thống mà là xiếc kết hợp với</span></div>\n<p class=\"body-txt\">\nvũ kịch (dance drama), có kịch bản, âm thanh, ánh sáng, hình ảnh, mang lại &quot;sự thưởng\n \nthức thực sự&quot; thay vì chỉ là sự tò mò.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Kết quả của CDS: Doanh số 3 tỷ đô la trong năm đầu tiên, vé VIP giá trên 1.000 USD, và</span></div>\n<p class=\"body-txt\">\nkhách hàng sẵn sàng quay lại xem nhiều lần (không bao giờ xem lại vở kịch đã xem lần\n \ntrước).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nguyên lý khách hàng không mua sản phẩm cũ: Khách hàng không mua sản phẩm cũ (ví</span></div>\n<p class=\"body-txt\">\ndụ: Note 8 giá 8 triệu) khi đã có sản phẩm thay thế mới hơn (ví dụ: S9 hoặc Note 9 giá 28\n \ntriệu).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chiến lược &quot;chủ động làm cũ sản phẩm&quot;: Một chiến lược quan trọng để tăng tỷ lệ mua</span></div>\n<p class=\"body-txt\">\nhàng trở lại của khách hàng cũ (ví dụ: người dùng Note 8 sẽ chuyển sang Note 9 với giá\n \ncao hơn).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Thúc đẩy bán lại cho khách hàng đã mua: Nhiều doanh nghiệp không kiếm được nhiều</span></div>\n<p class=\"body-txt\">\ntiền vì chỉ bán cho khách hàng một lần rồi thôi; cần có chiến lược bán lại cho khách hàng\n \ncũ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chiến lược kết hợp sản phẩm: Để bán được giá cao, có thể kết hợp nhiều sản phẩm của</span></div>\n<p class=\"body-txt\">\nmình hoặc kết hợp sản phẩm của mình với sản phẩm của người khác trong cùng ngành.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Định nghĩa thị trường xanh và đỏ: Thị trường xanh (Blue Ocean) là thị trường mới, chưa</span></div>\n<p class=\"body-txt\">\nbị cạnh tranh, giúp kiếm nhiều tiền hơn; thị trường đỏ (Red Ocean) là thị trường có sự\n \ncạnh tranh cao.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Cách tạo ra thị trường xanh (qua ví dụ kem đánh răng than hoạt tính):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Sản phẩm mới đối với một người có thể không mới trên thị trường quốc tế (ví dụ: than</span></div>\n<p class=\"body-txt\">\nhoạt tính đã có ở nước ngoài từ lâu).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Cần &quot;sáng tạo lại sản phẩm&quot; để thực sự tạo ra thị trường xanh (ví dụ: thêm bạc hà, đổi</span></div>\n<p class=\"body-txt\">\ndạng bột sang dạng kem để tiện dụng hơn, kết hợp nhiều bước trong một).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Kết luận: Muốn kiếm được nhiều tiền, bán được giá cao thì phải chủ động rời bỏ thị</span></div>\n<p class=\"body-txt\">\ntrường đỏ (nơi cạnh tranh cao) và tiến vào thị trường xanh (thị trường mới).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chiến lược &quot;Chủ động làm cũ sản phẩm&quot;: Thay vì chỉ tập trung vào bán sản phẩm mới</span></div>\n<p class=\"body-txt\">\ncho khách hàng mới, việc chủ động giới thiệu phiên bản nâng cấp hoặc sản phẩm thay\n \nthế vượt trội sẽ khuyến khích khách hàng hiện tại mua lại hoặc nâng cấp. Điều này cực\n \nkỳ quan trọng vì nó chuyển đổi việc bán hàng một lần thành dòng doanh thu liên tục từ\n \ntệp khách hàng trung thành, bền vững hơn trong dài hạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Liên tục đổi mới và sáng tạo trải nghiệm: Bài học từ Cirque du Soleil cho thấy việc tạo ra</span></div>\n<p class=\"body-txt\">\n&quot;thị trường xanh&quot; không chỉ là tìm kiếm một ngách mới mà còn là không ngừng làm mới\n \ntrải nghiệm sản phẩm/dịch vụ (như CDS luôn có các vở diễn mới). Khi một ý tưởng mới\n \ntrở nên phổ biến, nó sẽ nhanh chóng chuyển thành thị trường &quot;đỏ&quot; nếu không có sự đổi\n \nmới tiếp theo. Điều này đòi hỏi doanh nghiệp phải có tư duy sáng tạo liên tục để duy trì\n \nsự độc đáo và lợi thế cạnh tranh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tạo ra giá trị cảm xúc và trải nghiệm tổng thể: Cirque du Soleil đã thành công rực rỡ</span></div>\n<p class=\"body-txt\">\nkhông chỉ vì các màn biểu diễn xiếc, mà vì họ kết hợp với vũ kịch, âm thanh, ánh sáng,\n \nhình ảnh, biến nó thành một trải nghiệm nghệ thuật tổng thể, &quot;thưởng thức thực sự.&quot;\n \nĐiều này quan trọng vì nó nâng tầm sản phẩm/dịch vụ từ giá trị chức năng lên giá trị\n \ncảm xúc, cho phép định giá cao hơn và tạo sự gắn kết sâu sắc hơn với khách hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Trích dẫn</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Người ta mua Cirque du Soleil không còn chỉ là sự tò mò như ngày xưa nữa, mà người ta mua\n \nCirque du Soleil bởi sự thưởng thức thực sự.”\n \n“Một trong những lý do mà các anh chị không kiếm được nhiều tiền là vì các anh chị bán cho\n \nngười ta một lần xong thôi.”\n \n“Muốn kiếm được nhiều tiền, muốn bán được giá cao thì phải chủ động rời bỏ thị trường đỏ và\n \ntiến vào thị trường xanh.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Bài 12: Chiến lược bán chính mình</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Tóm tắt. Buổi giảng nhấn mạnh rằng để bán được hàng giá cao, trọng tâm không phải là sản</h3>\n<p class=\"body-txt\">\nphẩm hay dịch vụ (what), mà là người bán hàng (who). Giá trị của người bán hàng quyết\n \nđịnh khả năng định giá cao. Do đó, việc phát triển bản thân và nâng cao phong cách sống là\n \nyếu tố cốt lõi để xây dựng uy tín, thương hiệu và sức ảnh hưởng, từ đó thu hút được khách\n \nhàng sẵn sàng trả giá cao. Để thành công, cần thay đổi cách chúng ta làm, nơi chúng ta bán\n \nhàng và quan trọng nhất là con người chúng ta.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Muốn bán được hàng giá cao thì đừng bán hàng mà bán chính bạn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Những người được trả tiền cao nhất không phải vì họ bán cái gì, mà vì họ là ai.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">80% doanh nhân có thu nhập cao nhất dành thời gian cho việc họ trở thành ai, chứ</span></div>\n<p class=\"body-txt\">\nkhông phải họ làm gì.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">diễn giả lấy ví dụ về việc chính ông bán bảo hiểm, cốc nguyệt san, nhà hay son sẽ bán</span></div>\n<p class=\"body-txt\">\nđược nhiều hơn người khác, bởi vì &quot;tôi là tôi&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Các yếu tố khiến ông bán được nhiều hơn theo học viên là: uy tín, nhiều người biết đến,</span></div>\n<p class=\"body-txt\">\nthương hiệu, sự tin tưởng, đám đông, sức ảnh hưởng, giá trị bản thân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Để tạo ra những điều đó, cần &quot;cho đi giá trị&quot; thông qua kiến thức, tình yêu, những thứ có</span></div>\n<p class=\"body-txt\">\ngiá trị, và tạo ra sự thay đổi cho người khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Để áp dụng, cần tự hỏi mình: &quot;Tôi sẽ áp dụng được cái điều này vào trong công việc kinh</span></div>\n<p class=\"body-txt\">\ndoanh của tôi ra sao?&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Phải tự vấn &quot;Anh ta có cái gì mà tôi không có?&quot;, &quot;Anh ta có đặc tính gì, niềm tin gì, giá trị</span></div>\n<p class=\"body-txt\">\ngì, muốn gì?&quot; để học hỏi và phát triển.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">&quot;Giá trị&quot; tức là những cảm xúc tích cực và tiêu cực thường ngự trị bên trong con người.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">&quot;Bùa&quot; là giá trị; cần biết giá trị đó được tạo ra từ đâu và mình có tạo ra được nó không.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Để bán được giá cao, cần thay đổi ba yếu tố:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">What: Thay đổi cái chúng ta làm (sản phẩm, dịch vụ).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Where: Thay đổi nơi bạn bán hàng (thị trường, kênh phân phối).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Who: Thay đổi chính con người bạn (bản thân, thương hiệu cá nhân).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Người được trả tiền cao nhất dành thời gian cho việc họ *trở thành ai* (who) hơn là</span></div>\n<p class=\"body-txt\">\n*làm gì* (what).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Diễn giả nhắc đến khái niệm &quot;to be, to do, to have&quot;: Làm (do) để trở thành (be) ai đó, để</span></div>\n<p class=\"body-txt\">\nrồi có (have) cái gì đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Muốn bán được giá cao, bạn phải trở thành những con người giá cao.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bán hàng là bán mình (người ta không chỉ mua sản phẩm mà mua cả người bán hàng).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Phát triển cá nhân quan trọng hơn phát triển kinh doanh.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bán hàng giá cao là bán chính bạn, không phải sản phẩm hay dịch vụ: Đây là luận điểm</span></div>\n<p class=\"body-txt\">\nxuyên suốt và cơ bản nhất của buổi học, định nghĩa lại hoàn toàn cách tiếp cận bán hàng.\n \nNó chuyển trọng tâm từ yếu tố bên ngoài (sản phẩm) sang yếu tố nội tại (người bán),\n \ngiải thích tại sao cùng một thứ có thể được bán với các mức giá rất khác nhau tùy thuộc\n \nvào người bán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tập trung vào &quot;Who you are&quot; (bạn là ai) hơn là &quot;What you do&quot; (bạn làm gì): Điểm này</span></div>\n<p class=\"body-txt\">\nnhấn mạnh rằng giá trị cốt lõi không nằm ở hành động hay sản phẩm mà ở bản chất con\n \nngười. Việc đầu tư vào phát triển bản thân (uy tín, thương hiệu, kiến thức, khả năng tạo\n \nảnh hưởng) sẽ tạo ra lợi thế cạnh tranh bền vững và khả năng định giá cao, thay vì chỉ\n \ntập trung vào việc làm ra sản phẩm/dịch vụ tốt nhất.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Phát triển cá nhân quan trọng hơn phát triển kinh doanh: Đây là một triết lý sống và làm</span></div>\n<p class=\"body-txt\">\nviệc. Khi con người mình có giá trị cao, có uy tín, có sức ảnh hưởng, thì hoạt động kinh\n \ndoanh sẽ tự động phát triển và đạt được mức giá mong muốn. Nó là gốc rễ cho sự bền\n \nvững và thành công lâu dài.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Muốn bán được hàng giá cao thì đừng bán hàng mà bán chính bạn.”\n \n“Những người được trả tiền cao nhất không phải vì họ bán cái gì mà vì họ là ai.”\n \n“Phát triển cá nhân thì quan trọng hơn phát triển kinh doanh.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Bài 13: Hệ thống niềm tin</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Tóm tắt. Buổi giảng tập trung vào việc phát triển bản thân để đạt được thành công trong</h3>\n<p class=\"body-txt\">\nkinh doanh, đặc biệt là bán hàng với giá cao. Để làm được điều này, cốt lõi là phải thay đổi hệ\n \nthống niềm tin từ những niềm tin cản trở sang những niềm tin hỗ trợ, đồng thời định hình\n \ncác giá trị sống như dũng cảm, tiên phong và dám tăng giá. Mục tiêu cuối cùng không chỉ là\n \nkiếm tiền mà là nâng cao khả năng phục vụ khách hàng tốt hơn, coi bán hàng và kinh doanh\n \nlà một phong cách sống.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Thay đổi hệ thống niềm tin: Đây là bước đầu tiên để phát triển bản thân và kinh doanh.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Niềm tin hỗ trợ (giúp bán giá cao) cần được giữ lại; niềm tin không hỗ trợ (không giúp</span></div>\n<p class=\"body-txt\">\nbán giá cao) cần loại bỏ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Không có &quot;niềm tin sai&quot;, chỉ có &quot;niềm tin đúng&quot; và &quot;niềm tin rất đúng&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Việc &quot;tại sao bạn làm&quot; quan trọng hơn &quot;bạn làm cái gì&quot;; &quot;cách bạn kiếm tiền&quot; quan trọng</span></div>\n<p class=\"body-txt\">\nhơn &quot;số tiền bạn kiếm được&quot;.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Để thay đổi niềm tin, cần nhận biết những niềm tin đang cản trở và những niềm tin đang</span></div>\n<p class=\"body-txt\">\ngiúp mình tiến lên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Học hỏi từ người bán được giá cao: xem họ tin điều gì.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Niềm tin có thể thay đổi bởi yếu tố môi trường và những gì ta chứng kiến (ví dụ: thấy giá</span></div>\n<p class=\"body-txt\">\nkhóa học nước ngoài cao sẽ thấy giá trong nước rẻ).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hệ thống giá trị: Là những điều bạn chọn để theo đuổi trong cuộc sống.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Người bán giá cao có những giá trị sống khác biệt.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Giá trị dũng cảm (dám cầm micro để bán hàng) và tiên phong (dám dẫn đầu) là rất quan</span></div>\n<p class=\"body-txt\">\ntrọng để bán hàng giá cao.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Một giá trị khác là &quot;tỏ ra ngu ngốc&quot; (học để ngu) vì người khôn thường khó làm điều này,</span></div>\n<p class=\"body-txt\">\nnhưng đây là một chiến lược quan trọng để học hỏi và tiến bộ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Các giá trị khác của người có giá trị cao bao gồm yêu thương, có giá trị, giúp đỡ, chia sẻ,</span></div>\n<p class=\"body-txt\">\nvà xuất hiện trước truyền thông.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Mục tiêu: Khác biệt giữa người bán giá thấp và người bán giá cao.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Người bán giá thấp giảm giá vì sợ không bán được hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Người bán giá cao tăng giá vì niềm tin rằng bán hàng là để phục vụ, và cần nhiều tiền</span></div>\n<p class=\"body-txt\">\nhơn để phục vụ tốt hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Mục tiêu là tăng giá để phục vụ khách hàng tốt hơn. Tăng giá sẽ thu hút nhóm khách</span></div>\n<p class=\"body-txt\">\nhàng yêu cầu khắt khe hơn, giúp mình có điều kiện phục vụ tốt hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Giảm giá chỉ nên thực hiện nếu có sản phẩm giá cao khác thay thế.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Đầu tư vào con người: Người được trả tiền cao nhất là người dành thời gian để làm việc</span></div>\n<p class=\"body-txt\">\ncho con người của mình (phát triển bản thân), không phải chỉ chăm chăm vào sản phẩm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hỏi bản thân: Đọc bao nhiêu sách, học bao nhiêu khóa, hay chỉ dành thời gian cho công</span></div>\n<p class=\"body-txt\">\nviệc và bán hàng?\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bán hàng/Kinh doanh là phong cách sống: Đây là chiến lược đầu tiên.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hãy xem xét phong cách sống hiện tại, các vật dụng, nhà cửa, xe cộ, hợp đồng bảo hiểm</span></div>\n<p class=\"body-txt\">\ncó phải là &quot;giá cao&quot; không.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Thay đổi hệ thống niềm tin là nền tảng cốt lõi: Diễn giả nhấn mạnh rằng &quot;Không có niềm</span></div>\n<p class=\"body-txt\">\ntin sai, chỉ có niềm tin đúng và niềm tin rất đúng.&quot; và việc bỏ đi những niềm tin cũ cản\n \ntrở để cài đặt niềm tin mới là bước đầu tiên để phát triển. Điều này quan trọng vì tư duy\n \nvà niềm tin sẽ định hình hành động và kết quả kinh doanh. Nếu tin mình chỉ bán được\n \ngiá thấp, ta sẽ mãi bán giá thấp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Mục tiêu tăng giá để phục vụ tốt hơn: Thay vì giảm giá vì sợ không bán được hàng, người</span></div>\n<p class=\"body-txt\">\nbán giá cao có mục tiêu tăng giá để có thêm nguồn lực phục vụ khách hàng tốt hơn. Đây\n \nlà một sự đảo ngược tư duy quan trọng, chuyển từ việc cạnh tranh bằng giá sang cạnh\n \ntranh bằng giá trị và chất lượng dịch vụ, từ đó thu hút được tệp khách hàng cao cấp hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">&quot;Tỏ ra ngu&quot; như một chiến lược: Diễn giả khuyến khích &quot;tỏ ra ngu ngốc&quot; hoặc &quot;học để</span></div>\n<p class=\"body-txt\">\nngu&quot; để dễ dàng học hỏi và tiếp thu cái mới. Điều này quan trọng vì nó thách thức cái tôi,\n \nphá vỡ rào cản tâm lý của sự thông thái giả định, giúp chúng ta khiêm tốn hơn để mở\n \nlòng tiếp nhận kiến thức và cải thiện liên tục.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bán hàng/kinh doanh là phong cách sống: Diễn giả kết luận rằng kinh doanh không chỉ</span></div>\n<p class=\"body-txt\">\nlà một hoạt động mà là một phần của phong cách sống, và người được trả tiền cao nhất\n \ndành thời gian để làm việc cho &quot;con người của mình&quot;. Điều này quan trọng vì nó đề cao\n \nsự phát triển cá nhân, đầu tư vào bản thân (học tập, giá trị sống) như là yếu tố tiên quyết\n \nđể nâng tầm giá trị và khả năng kinh doanh của mình.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Không có niềm tin sai, chỉ có niềm tin đúng và niềm tin rất đúng.”\n \n“Người được trả tiền cao nhất thì thời gian anh ta làm việc là làm việc cho con người của\n \nmình.”\n \n“Bán giá cao để phục vụ khách hàng tốt hơn.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Bài 14: Phương pháp marketing bằng thẩm quyền</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Tóm tắt. Buổi học tập trung vào chiến lược &quot;marketing bằng thẩm quyền&quot; (Authority</h3>\n<p class=\"body-txt\">\nMarketing) và tầm quan trọng của việc xây dựng &quot;nhân hiệu&quot; để bán hàng hiệu quả. Để\n \nthành công, một cá nhân hoặc tổ chức phải định vị mình là người dẫn đầu hoặc chuyên gia\n \ntrong lĩnh vực của mình, dựa trên các giá trị cốt lõi như trung thực, chính trực, mạnh mẽ và\n \nkhả năng truyền cảm hứng. Khi đã trở thành người có ảnh hưởng và thẩm quyền cao nhất,\n \nkhách hàng sẽ không còn nghi ngờ về chất lượng hay quan tâm đến giá cả sản phẩm/dịch vụ\n \nnữa. Diễn giả nhấn mạnh rằng thành công này đến từ chiến lược (80%) và tư duy được rèn\n \nluyện lâu dài, không chỉ đơn thuần là công cụ hay sao chép hời hợt.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tôi là thương hiệu (You are the brand): Bán hàng đòi hỏi người khác phải biết bạn tốt,</span></div>\n<p class=\"body-txt\">\nkhông chỉ bạn tự biết mình tốt.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hai loại thương hiệu: Thương hiệu công ty/sản phẩm (tốn kém) và Nhân hiệu (cá nhân).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nhân hiệu phải có: Xây dựng trên nền tảng đạo đức, pháp luật, trung thực, chính trực,</span></div>\n<p class=\"body-txt\">\nmạnh mẽ, truyền cảm hứng và có giá trị. Đây là những yếu tố tối thiểu khách hàng muốn\n \nmua từ bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tính nhất quán trong hành vi: Mọi hành động, dù nhỏ (ví dụ: đái bậy ngoài đường, vượt</span></div>\n<p class=\"body-txt\">\nđèn đỏ), đều góp phần xây dựng thương hiệu cá nhân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Phương pháp &quot;Marketing bằng thẩm quyền&quot; (Authority Marketing): Là một quy</span></div>\n<p class=\"body-txt\">\ntrình/chiến lược có hệ thống, chủ đích để định vị một người/tổ chức là dẫn đầu hoặc\n \nchuyên gia trong ngành, cộng đồng, thị trường của họ, và có ảnh hưởng tới đối thủ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Sức mạnh của sự ảnh hưởng: Người có ảnh hưởng lớn nhất trong thị trường sẽ không bị</span></div>\n<p class=\"body-txt\">\nkhách hàng nghi ngờ hay quan tâm đến giá cả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Ví dụ về tầm ảnh hưởng: Diễn giả tự khẳng định trước ông, không ai ở Việt Nam làm</span></div>\n<p class=\"body-txt\">\nđược lớp học hàng ngàn người, và bây giờ 100% những người làm được đều là học viên\n \nhoặc có liên quan đến học viên của ông.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Quan trọng của chiến lược và tư duy: 80% thành công đến từ chiến lược, 20% từ công</span></div>\n<p class=\"body-txt\">\ncụ. Chiến lược Eagle Camp của diễn giả là số 1 hiện tại.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tư duy được rèn luyện theo thời gian: Tư duy này không tự nhiên có mà cần quá trình ở</span></div>\n<p class=\"body-txt\">\ncạnh, nói chuyện, bị hướng dẫn/rèn giũa khắc nghiệt trong nhiều năm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Để trở thành chuyên gia, cần 3 yếu tố:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Am hiểu lĩnh vực đó hơn bất kỳ ai.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Được các chuyên gia khác công nhận.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Là biểu tượng của chuyên gia.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Để trở nên mạnh mẽ/có thẩm quyền, cần 3 yếu tố:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Biết nói CÓ hoặc KHÔNG một cách dứt khoát (Simply the best).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Không dễ tiếp cận (không dễ chạm vào).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Ngoại hình/trang phục chuyên nghiệp, nói và hành động một cách chắc chắn, khẳng</span></div>\n<p class=\"body-txt\">\nđịnh, không ậm ờ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Định vị số 1: Khi đã định vị mình là số 1, khách hàng có thể thử các sản phẩm khác trước,</span></div>\n<p class=\"body-txt\">\nnhưng cuối cùng sẽ quay về và &quot;bị nghiện&quot; sản phẩm của mình.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Sức mạnh của Nhân hiệu và Authority Marketing: Diễn giả nhấn mạnh rằng việc bán</span></div>\n<p class=\"body-txt\">\nhàng thành công, đặc biệt là với giá cao, không chỉ dựa vào sản phẩm mà phụ thuộc hoàn\n \ntoàn vào việc xây dựng &quot;nhân hiệu&quot; và &quot;marketing bằng thẩm quyền.&quot; Khi bạn trở thành\n \nngười dẫn đầu hoặc chuyên gia được công nhận trong lĩnh vực của mình, khách hàng sẽ\n \ntin tưởng tuyệt đối, không nghi ngờ về chất lượng hay bận tâm về giá. Điều này giải\n \nphóng bạn khỏi cuộc chiến về giá và tạo ra lòng trung thành lâu dài.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chiến lược vượt trội hơn công cụ và tầm quan trọng của tư duy rèn luyện: Bài giảng chỉ</span></div>\n<p class=\"body-txt\">\nra rằng 80% thành công nằm ở chiến lược, chỉ 20% là công cụ. Đặc biệt, tư duy đúng đắn\n \n(như tư duy của Eagle Camp) là yếu tố then chốt và không thể sao chép dễ dàng. Tư duy\n \nnày không tự nhiên có mà phải trải qua quá trình rèn luyện khắc nghiệt, lâu dài dưới sự\n \ndẫn dắt của một người diễn giả có thẩm quyền. Điều này khẳng định giá trị của việc đầu\n \ntư vào bản thân và sự huấn luyện chuyên sâu thay vì chỉ tập trung vào các giải pháp công\n \ncụ bề mặt.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hành động và sự nhất quán tạo nên thương hiệu: Thương hiệu cá nhân (nhân hiệu)</span></div>\n<p class=\"body-txt\">\nkhông chỉ là lời nói mà thể hiện qua mọi hành vi, từ việc tuân thủ pháp luật, đạo đức đến\n \ncách suy nghĩ, quan điểm và hành động mạnh mẽ, dứt khoát. Sự nhất quán trong các giá\n \ntrị cốt lõi như trung thực, chính trực, và khả năng truyền cảm hứng là nền tảng để xây\n \ndựng lòng tin và sự công nhận từ khách hàng cũng như cộng đồng, tạo nên một &quot;brand&quot;\n \ntổng thể không thể nghi ngờ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Tao tốt là được rồi nhưng người khác phải biết tao tốt thì mới là bán hàng.”\n \n“Nếu có ai đó đang nói rằng họ tạo ra hàng chục đơn hàng một ngày mà chỉ có một mình họ\n \nmột cách tự động, 100% họ là học viên của tôi.”\n \n“Khi mình đã định vị mình là số một, thì người ta sẽ đi loanh quanh, người ta sẽ thử các sản\n \nphẩm khác. Sau đấy người ta có thể sẽ thử mình. May mắn thì người ta thử mình đầu tiên. Còn\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><p class=\"body-txt\">\nnếu không may thử hết đi xong quay về thử mình. Thì khi mà thử thì sẽ bị nghiện và sẽ ở lại\n \nđấy.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Bài 15: 7 yếu tố tạo nên nhân hiệu mạnh</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Tóm tắt. Buổi học tập trung vào việc xây dựng một thương hiệu cá nhân (nhân hiệu) mạnh</h3>\n<p class=\"body-txt\">\nmẽ và có thẩm quyền thông qua hai yếu tố cốt lõi: sự phủ rộng (omnipresence) và chiến\n \nlược marketing IPS. Để đạt được điều này, thương hiệu cần hiện diện nhất quán trên mọi\n \nkênh và định vị bản thân như một chuyên gia bằng cách thường xuyên cung cấp thông tin\n \nmới, giá trị trên nhiều nền tảng số khác nhau như blog, YouTube, Facebook, Instagram và\n \nPinterest, khuyến khích hành động sớm để tạo lợi thế cạnh tranh.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bảy nhân tố tạo nên một thương hiệu/nhân hiệu mạnh.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Yếu tố 1: Phủ rộng (Omnipresence / Đa kênh).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Thương hiệu hoặc nhân hiệu của bạn phải vượt ra ngoài cuộc sống cá nhân, xuất hiện ở</span></div>\n<p class=\"body-txt\">\nkhắp mọi nơi (khắp mọi kênh, mọi mặt trận).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tất cả các yếu tố nhận diện thương hiệu phải thống nhất: logo, hình ảnh, cảm xúc, màu</span></div>\n<p class=\"body-txt\">\nsắc, website, name card, tài liệu tờ rơi, phong bì, tài liệu trang trí, bao bì.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Cần có người quản lý nhận dạng thương hiệu để đảm bảo sự nhất quán này trên tất cả</span></div>\n<p class=\"body-txt\">\ncác kênh và tài liệu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Thành phần thứ 2: Chiến lược marketing trong IPS (Internet Power System).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">IPS là một chiến lược marketing được giảng dạy trong khóa học.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Người có thẩm quyền được xem như một chuyên gia.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chuyên gia cần phải thường xuyên cung cấp thông tin mới cho thị trường mục tiêu của</span></div>\n<p class=\"body-txt\">\nhọ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Thông tin cần được cung cấp ở nhiều dạng và nhiều độ dài khác nhau.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Các kênh bắt buộc phải có để cung cấp thông tin và định vị chuyên gia:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Blog: Bắt buộc phải có (tham khảo khóa học miễn phí trên Triệuphú.com).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Kênh YouTube cá nhân: Là kênh dễ search nhất, nên bắt buộc phải có. Có thể bắt đầu</span></div>\n<p class=\"body-txt\">\nbằng chiếc điện thoại của bạn. Kênh chuyên gia không cần số lượt xem/đăng ký quá lớn\n \nnhư kênh giải trí, quan trọng là định vị bản thân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Facebook.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Instagram: Phải làm ngay bây giờ, đây là thời điểm tốt nhất vì đối thủ có thể chưa làm,</span></div>\n<p class=\"body-txt\">\ngiúp bạn trở thành chuyên gia dễ hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Pinterest.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Phải có KPI (Chỉ số hiệu suất chính) để đo lường hiệu quả của những điều này (ví dụ: KPI</span></div>\n<p class=\"body-txt\">\ncho YouTube là số phút được xem).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Sự phủ rộng (Omnipresence) và Nhất quán: Diễn giả nhấn mạnh rằng thương hiệu phải</span></div>\n<p class=\"body-txt\">\n&quot;xuất hiện ở khắp mọi nơi&quot; và &quot;vượt ra ngoài cuộc sống của bạn&quot;, đồng thời mọi yếu tố\n \nnhận diện (logo, màu sắc, website, tài liệu) phải &quot;thống nhất nhau hết.&quot; Điều này quan\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><p class=\"body-txt\">\ntrọng vì sự hiện diện đa kênh và đồng bộ giúp xây dựng nhận diện thương hiệu mạnh\n \nmẽ, đáng tin cậy và dễ dàng được khách hàng tìm thấy, ghi nhớ. Nó tạo ra một hình ảnh\n \nchuyên nghiệp và nhất quán trong tâm trí khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chuyên gia là người liên tục cung cấp thông tin mới: &quot;Chuyên gia cần phải thường xuyên</span></div>\n<p class=\"body-txt\">\ncung cấp thông tin mới cho thị trường mục tiêu của họ.&quot; Đây là điểm mấu chốt để xây\n \ndựng thẩm quyền và niềm tin. Bằng cách chia sẻ kiến thức mới mẻ và có giá trị, một\n \nngười hoặc một doanh nghiệp sẽ được định vị là người dẫn đầu, am hiểu sâu sắc về lĩnh\n \nvực của mình, từ đó thu hút được khách hàng chất lượng và tạo dựng lòng trung thành.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hành động sớm và đơn giản trên đa kênh: Diễn giả thúc giục &quot;Bây giờ bạn phải làm</span></div>\n<p class=\"body-txt\">\n[Instagram], không bao giờ kịp nữa nếu bây giờ bạn không làm. Đây là thời điểm tốt\n \nnhất để bạn làm.&quot; và hướng dẫn &quot;Hãy bắt đầu bằng chiếc điện thoại của bạn.&quot; Insight này\n \nquan trọng vì nó khuyến khích việc bắt đầu ngay lập tức, không chờ đợi sự hoàn hảo hay\n \nnguồn lực lớn. Việc tiên phong trên các nền tảng mới hoặc chưa được đối thủ khai thác\n \ntriệt để giúp chiếm lĩnh vị thế chuyên gia sớm, đồng thời sự đơn giản trong cách thức\n \nthực hiện giúp mọi người dễ dàng bắt đầu và duy trì sự hiện diện đa kênh.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Và nó phải xuất hiện ở khắp mọi nơi.”\n \n“Chuyên gia cần phải thường xuyên cung cấp thông tin mới cho thị trường mục tiêu của họ.”\n \n“Đây là thời điểm tốt nhất để bạn làm.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Bài 16: Chủ động tiếp nhận thông tin, trở thành chuyên gia</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Tóm tắt. Buổi học này tập trung vào việc xây dựng một hệ thống tạo khách hàng tự động và</h3>\n<p class=\"body-txt\">\nthu thập danh sách khách hàng tiềm năng mà không cần chi phí quảng cáo. Diễn giả nhấn\n \nmạnh tầm quan trọng của việc liên tục cập nhật thông tin, tạo ra nội dung giá trị (bài viết,\n \nvideo, ebook) và sử dụng các công cụ như WordPress với các plugin để thu hút và chuyển\n \nđổi người xem thành leads. Cốt lõi là phải xác định rõ tập khách hàng mục tiêu, thấu hiểu\n \nvấn đề và nhu cầu của họ, sau đó tạo ra sản phẩm hoặc giải pháp phù hợp để xây dựng mối\n \nquan hệ và bán hàng hiệu quả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Liên tục cập nhật và chủ động cập nhật thông tin: bao gồm các bài viết (article), bài báo,</span></div>\n<p class=\"body-txt\">\ncác blog, các video, sách, ebook. Phải xuất hiện ở mọi nơi có thể và cung cấp thông tin\n \n&quot;nuôi&quot; khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Xây dựng &quot;hệ thống tạo khách hàng tự động&quot;: Đây là yếu tố bắt buộc để bán hàng giá cao.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hệ thống này phải gắn liền với tên của bạn và sản phẩm có giá trị cao.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Phải có form đăng ký: để khách hàng nhận thông tin từ bạn. Đây là kỹ thuật quan trọng</span></div>\n<p class=\"body-txt\">\ntrong IPS (Internet Power System).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Sử dụng trang thông tin và pop-up: Cần có trang thông tin và các pop-up (hình thức form</span></div>\n<p class=\"body-txt\">\nhiển thị khi khách truy cập trang) trên blog hoặc landing page để thu thập thông tin\n \nkhách hàng.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Các công cụ đề xuất:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">WordPress: là nền tảng cơ bản.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Elegant Themes: một chủ đề (theme) cho WordPress, kèm theo 2 plugin (social plugin</span></div>\n<p class=\"body-txt\">\nvà lead/list form plugin) để thu thập thông tin.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Thrive Themes: một lựa chọn khác tương tự Elegant Themes, cũng có các plugin tương</span></div>\n<p class=\"body-txt\">\nứng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Đo lường hiệu quả: Cần đo lường số lượng đăng ký qua các form để đánh giá hiệu quả</span></div>\n<p class=\"body-txt\">\ncủa hệ thống &quot;list generation&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tạo nội dung có giá trị cao: Ví dụ trang &quot;tặng sách miễn phí&quot;, &quot;bí quyết tuyển chồng&quot;, các</span></div>\n<p class=\"body-txt\">\nkhóa học online. Mục tiêu là tạo ra nội dung mà khách hàng sẵn sàng đăng ký để nhận.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Làm form đơn giản, nhanh chóng: Một form chỉ mất khoảng 5-10 phút để tạo.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Sử dụng công cụ chuyên nghiệp: Các công cụ và hệ thống được đề cập là những thứ các</span></div>\n<p class=\"body-txt\">\nchuyên gia trên internet sử dụng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Quy trình tìm kiếm và chuyển đổi khách hàng:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tham gia vào mạng xã hội, những nơi có khách hàng mục tiêu (ví dụ: hội phụ nữ đơn</span></div>\n<p class=\"body-txt\">\nthân nếu sản phẩm là &quot;bí quyết tuyển chồng&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Quan sát và lắng nghe họ nói chuyện gì.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tìm ra vấn đề và nhu cầu của họ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tạo ra sản phẩm/nội dung giải quyết vấn đề đó để &quot;xóa bỏ khoảng cách&quot; và bán hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tạo danh sách khách hàng không cần quảng cáo: Minh chứng bằng việc tạo ra hàng</span></div>\n<p class=\"body-txt\">\ntrăm, hàng ngàn khách hàng tiềm năng chỉ từ việc tạo ra giá trị và được &quot;rỉ tai&quot; mà không\n \ntốn một đồng quảng cáo.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hệ thống &quot;OmniChannel&quot;: Sự hiện diện của bạn phải ở khắp mọi nơi trên internet.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nguyên tắc &quot;làm thật, ăn thật, chia sẻ thật&quot;: Diễn giả nhấn mạnh sự chân thực trong quá</span></div>\n<p class=\"body-txt\">\ntrình xây dựng hệ thống và chia sẻ kiến thức.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Xây dựng hệ thống tạo khách hàng tự động không cần quảng cáo: Đây là cốt lõi của buổi</span></div>\n<p class=\"body-txt\">\ngiảng. Diễn giả liên tục nhấn mạnh khả năng thu hút hàng trăm đến hàng ngàn khách\n \nhàng tiềm năng chỉ bằng cách tạo ra giá trị và được lan truyền &quot;rỉ tai&quot;, mà không tốn một\n \nđồng chi phí quảng cáo nào. Điều này quan trọng vì nó thách thức mô hình marketing\n \ntruyền thống phụ thuộc vào quảng cáo, khuyến khích doanh nghiệp tập trung vào giá trị\n \nthực và xây dựng mối quan hệ bền vững với khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Thấu hiểu sâu sắc khách hàng mục tiêu và giải quyết &quot;vấn đề nhức nhối&quot; của họ: Từ ví dụ</span></div>\n<p class=\"body-txt\">\n&quot;bí quyết tuyển chồng&quot; nhắm đến &quot;phụ nữ đơn thân&quot;, diễn giả chỉ ra rằng việc tham gia\n \nvào cộng đồng của khách hàng, lắng nghe và tìm ra vấn đề, nhu cầu của họ là cực kỳ quan\n \ntrọng. Sau đó, tạo ra sản phẩm/nội dung giải quyết trực tiếp những vấn đề đó. Đây là\n \nnền tảng để tạo ra nội dung có sức hút lớn và biến người xem thành khách hàng tiềm\n \nnăng chất lượng cao, bởi vì bạn đang cung cấp chính xác điều họ cần.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tận dụng hiệu quả các công cụ và nền tảng đơn giản để thu thập lead: Sử dụng</span></div>\n<p class=\"body-txt\">\nWordPress cùng các plugin như Elegant Themes/Thrive Themes để tạo form đăng ký,\n \npop-up, ebook miễn phí... là cách biến sự quan tâm của người dùng thành dữ liệu khách\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><p class=\"body-txt\">\nhàng. Điều này quan trọng vì nó cung cấp một quy trình cụ thể, dễ thực hiện để doanh\n \nnghiệp có thể chủ động thu thập thông tin khách hàng, xây dựng danh sách email và\n \nphục vụ cho các chiến lược marketing tiếp theo một cách có hệ thống.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Ai cũng phải có cái số ba, gọi là hệ thống tạo khách hàng tự động.”\n \n“Nếu bạn muốn bán hàng giá cao, bạn phải có hệ thống tạo khách hàng tự động.”\n \n“Không bất kỳ đồng quảng cáo nào hết.”\n \n“Tôi làm thật, ăn thật, chia sẻ thật.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Bài 17: Marketing truyền miệng</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Tóm tắt. Buổi giảng tập trung vào hệ thống marketing thứ tư: referral marketing</h3>\n<p class=\"body-txt\">\n(marketing bằng lời giới thiệu/truyền miệng), nhấn mạnh tầm quan trọng của việc để người\n \nkhác nói tốt về bạn thay vì tự quảng bá. Diễn giả giới thiệu Net Promoter Score (NPS) là công\n \ncụ đo lường mức độ sẵn sàng giới thiệu của khách hàng, giúp doanh nghiệp đánh giá lòng\n \ntrung thành và xác định điểm cần cải thiện. Buổi học cũng khuyến khích xây dựng &quot;Raving\n \nFan&quot; và chọn đối tác uy tín trong các mạng lưới để tạo ra dòng chảy giới thiệu bền vững, tạo\n \ný nghĩa cho cuộc sống và công việc.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hệ thống thứ tư là Referral Marketing, còn gọi là marketing bằng lời giới thiệu hoặc</span></div>\n<p class=\"body-txt\">\nmarketing truyền miệng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nguyên tắc quan trọng: Mọi người không tin những gì bạn nói về bạn, nhưng họ tin</span></div>\n<p class=\"body-txt\">\nnhững gì người khác nói về bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bậc cao nhất của referral marketing là Raving Fan (fan cuồng) – những người tự nguyện</span></div>\n<p class=\"body-txt\">\ngiới thiệu bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Diễn giả nhấn mạnh triết lý &quot;Đừng sợ chết, mà hãy sợ sống không có ý nghĩa&quot; để tạo ra</span></div>\n<p class=\"body-txt\">\ngiá trị và sự ảnh hưởng, khiến người khác muốn giới thiệu bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Có 5 bước để tạo ra một referral (cần học ở Eagle Camp).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Cách thứ hai để sử dụng hệ thống referral là thông qua các hệ thống referral offline như</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">BNI.</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Khi tham gia BNI, cần chọn những người có uy tín để chơi và được họ giới thiệu khách</span></div>\n<p class=\"body-txt\">\nhàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Để đo lường hiệu quả của referral, sử dụng chỉ số NPS (Net Promoter Score).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Cách đo NPS: Hỏi khách hàng một câu hỏi duy nhất trên thang điểm từ 0 đến 10: &quot;Bạn</span></div>\n<p class=\"body-txt\">\nsẵn sàng giới thiệu sản phẩm/chương trình/tôi/dịch vụ của tôi tới bạn bè của bạn ở cấp\n \nđộ mấy?&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Thang điểm: 10 là rất muốn giới thiệu, 0 là không muốn giới thiệu.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tính NPS bằng công thức: % người đánh giá 9-10 (Promoters) trừ đi % người đánh giá</span></div>\n<p class=\"body-txt\">\n0-6 (Detractors).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">NPS là viết tắt của Network Promoter Score, có nghĩa là &quot;chỉ số sẵn sàng giới thiệu&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">NPS khoảng 20% được coi là tốt, nhưng tùy thuộc vào từng ngành kinh doanh.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Trong doanh nghiệp, phải thường xuyên đo lường NPS ở nhiều nhóm, nhiều ngành,</span></div>\n<p class=\"body-txt\">\nnhiều ngày để có dữ liệu chính xác, từ đó biết cần cải thiện điều gì (dịch vụ khách hàng,\n \nsản phẩm, R&amp;D).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Diễn giả lấy ví dụ chương trình đặcbiet. là một dạng referral chủ động (một người giới</span></div>\n<p class=\"body-txt\">\nthiệu 3-5 người).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Raving Fan là một dạng referral bị động – khách hàng tự muốn người khác được trải</span></div>\n<p class=\"body-txt\">\nnghiệm những gì họ đã trải nghiệm.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Sức mạnh của lời giới thiệu từ bên thứ ba: &quot;Mọi người không tin những gì bạn nói về</span></div>\n<p class=\"body-txt\">\nbạn, nhưng họ tin những gì người khác nói về bạn.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">*Vì sao quan trọng:* Đây là nguyên lý cốt lõi của marketing truyền miệng. Thay vì tập</span></div>\n<p class=\"body-txt\">\ntrung vào quảng cáo, doanh nghiệp cần đầu tư vào việc tạo ra trải nghiệm khách hàng\n \nxuất sắc để chính khách hàng trở thành người quảng bá hiệu quả nhất. Điều này xây\n \ndựng niềm tin vững chắc và bền vững hơn nhiều so với tự ca ngợi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Net Promoter Score (NPS) là công cụ đo lường hiệu quả: NPS giúp định lượng mức độ</span></div>\n<p class=\"body-txt\">\nsẵn sàng giới thiệu của khách hàng thông qua một câu hỏi đơn giản và công thức tính cụ\n \nthể.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">*Vì sao quan trọng:* NPS chuyển hóa một khái niệm mềm như lòng trung thành thành</span></div>\n<p class=\"body-txt\">\nmột chỉ số có thể đo lường và quản lý được. Việc đo lường NPS thường xuyên cung cấp\n \ndữ liệu quan trọng để doanh nghiệp hiểu được vị thế của mình, xác định nhóm khách\n \nhàng hài lòng và không hài lòng, từ đó đưa ra các chiến lược cải thiện sản phẩm, dịch vụ\n \nvà trải nghiệm tổng thể để thúc đẩy giới thiệu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tư duy tạo ra giá trị và sống có ý nghĩa để xây dựng Raving Fan: Mặc dù được trình bày</span></div>\n<p class=\"body-txt\">\nqua một câu nói triết lý &quot;Đừng sợ chết, mà hãy sợ sống không có ý nghĩa&quot;, điểm mấu chốt\n \nlà phải tạo ra giá trị thực sự.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">*Vì sao quan trọng:* Khi một cá nhân hoặc doanh nghiệp thực sự tạo ra giá trị, có tầm</span></div>\n<p class=\"body-txt\">\nảnh hưởng và ý nghĩa, họ sẽ tự nhiên thu hút những &quot;fan cuồng&quot; (Raving Fan). Những\n \nngười này không chỉ trung thành mà còn chủ động và nhiệt tình giới thiệu bạn/sản\n \nphẩm/dịch vụ của bạn tới người khác, tạo ra nguồn referral tự nhiên và mạnh mẽ nhất\n \nmà không cần nỗ lực marketing trực tiếp.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Mọi người không tin những gì bạn nói về bạn, nhưng họ tin những gì người khác nói về bạn.”\n \n“Đừng sợ chết, mà hãy sợ sống không có ý nghĩa.”\n \n“Nên là mình có xu hướng đi với người lạ hay có xu hướng đi với người quen thì mới thể hiện\n \nđược đẳng cấp chuyên gia của mình.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#f57f17\">Bài 18: PR và truyền thông</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Tóm tắt. Buổi học tập trung vào thành tố thứ năm trong kinh doanh là PR và truyền thông</h3>\n<p class=\"body-txt\">\nđể tạo dựng thương hiệu cá nhân/doanh nghiệp. Diễn giả nhấn mạnh tầm quan trọng của\n \nviệc chủ động xuất hiện trên đa kênh truyền thông (báo chí, truyền hình, blog, YouTube) để\n \nxây dựng uy tín và định vị bản thân là chuyên gia. Cách hiệu quả là trả lời phỏng vấn một\n \ncách khéo léo, đúng trọng tâm và không bao giờ từ chối cơ hội truyền thông, đồng thời tránh\n \nPR trả tiền làm mất đi tính chân thực.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Thành tố thứ năm trong kinh doanh để tạo dựng thương hiệu là PR (Public Relations) và</span></div>\n<p class=\"body-txt\">\ntruyền thông.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Con đường nhanh nhất để có uy tín là được phỏng vấn trên các kênh truyền hình, thông</span></div>\n<p class=\"body-txt\">\ntấn, báo chí (bao gồm báo mạng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Cách để bắt đầu xuất hiện trên truyền hình:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tham dự vào những chương trình họp báo.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chủ động gặp báo chí và nói &quot;tôi muốn trả lời phỏng vấn&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chuẩn bị danh thiếp (card) chuyên nghiệp, đúng tiêu chuẩn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Yêu cầu khi trả lời phỏng vấn:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Trả lời thật &quot;nuột&quot; (trôi chảy, mượt mà).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Phải dũng cảm cầm micro.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Trong các chương trình của diễn giả, cố gắng trả lời hay để được trả lời tiếp.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Giới thiệu mình là chuyên gia trong lĩnh vực của mình bằng cách sử dụng các từ khóa (ví</span></div>\n<p class=\"body-txt\">\ndụ: &quot;chuyên gia trong lĩnh vực thủy sản&quot;, &quot;nhà sản xuất/gia công mỹ phẩm&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Lợi ích của việc trả lời phỏng vấn: được lên kênh, blog, kênh YouTube và được PR miễn</span></div>\n<p class=\"body-txt\">\nphí.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Không bao giờ ngại trả lời phỏng vấn và tuyệt đối không bao giờ từ chối bất kỳ lúc nào;</span></div>\n<p class=\"body-txt\">\nkhi trả lời được một lần thì lần sau nó sẽ tiếp tục diễn ra.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Cần có bạn bè báo chí nhưng cũng phải nhớ báo chí là &quot;kẻ thù&quot; (có những tờ báo khốn</span></div>\n<p class=\"body-txt\">\nnạn, tống tiền). Phải làm cả hai: hợp tác và sẵn sàng &quot;phạt&quot; nếu họ &quot;đụng vào mình&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Không nên trả tiền để làm báo nếu bài viết có mùi &quot;tanh tiền&quot;. Thay vào đó, hãy làm cho</span></div>\n<p class=\"body-txt\">\nmình &quot;thực sự hay&quot; để báo muốn viết bài về mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Với PR trả tiền (khi chủ động để người ta viết về mình), phải có kịch bản PR đàng hoàng</span></div>\n<p class=\"body-txt\">\nvà nên tìm các kênh chuyên nghiệp như kênh Dân trí để họ chủ động cho một chiến lược\n \ntruyền thông về media.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Kinh nghiệm cá nhân của diễn giả: xuất hiện liên tục trên nhiều kênh truyền hình (VTV2,</span></div>\n<p class=\"body-txt\">\nVít TV, Info TV) với vai trò luật sư doanh nghiệp; trả lời rất nhanh và không cần biên tập.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Mẹo để trả lời phỏng vấn đúng thời lượng: kiểm soát tốc độ nói (ví dụ: 1 giây 2 từ, 1</span></div>\n<p class=\"body-txt\">\nphút 120 từ, 2 phút 240 từ) và cấu trúc câu trả lời theo &quot;tam đoạn luận&quot; (mở bài, thân\n \nbài, kết luận).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Trả lời thẳng vào câu hỏi, đúng đối tượng, đúng ngôn từ và đúng nhu cầu của khán</span></div>\n<p class=\"body-txt\">\ngiả/kênh, không lòng vòng để được người ta hỏi tiếp những lần sau. &quot;Cơ hội đến không\n \nnắm là trôi qua.&quot;\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Phải xuất hiện &quot;đa kênh&quot; và &quot;càng xuất hiện trước ống kính nhiều càng tốt&quot;, đặc biệt là</span></div>\n<p class=\"body-txt\">\n&quot;ống kính của người khác&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hãy là chuyên gia trong lĩnh vực của mình (&quot;cá lớn trong ao nhỏ&quot;), ví dụ như diễn giả là</span></div>\n<p class=\"body-txt\">\nluật sư số ít có cả 3 thẻ hành nghề về sở hữu công nghiệp và bản quyền.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Phân biệt: &quot;không mất tiền&quot; gọi là báo chí (publicity), &quot;mất tiền&quot; gọi là PR</span></div>\n<p class=\"body-txt\">\n(advertising/paid content).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chủ động xuất hiện trên truyền thông đa kênh là con đường nhanh nhất để xây dựng uy</span></div>\n<p class=\"body-txt\">\ntín và thương hiệu cá nhân/doanh nghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">*Vì sao quan trọng:* Diễn giả nhấn mạnh rằng việc liên tục xuất hiện trên các kênh</span></div>\n<p class=\"body-txt\">\ntruyền hình, báo chí, mạng xã hội... giúp tạo dựng hình ảnh chuyên gia, tăng độ tin cậy và\n \nsự nhận diện thương hiệu một cách nhanh chóng và hiệu quả hơn so với các phương\n \npháp khác, được chứng minh qua kinh nghiệm thực tế của chính diễn giả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Không bao giờ ngại trả lời phỏng vấn và tuyệt đối không từ chối bất kỳ cơ hội truyền</span></div>\n<p class=\"body-txt\">\nthông nào.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">*Vì sao quan trọng:* Tâm lý e ngại hoặc việc từ chối cơ hội sẽ khiến bạn bỏ lỡ những &quot;cơ</span></div>\n<p class=\"body-txt\">\nhội vàng&quot; để quảng bá. Mỗi lần xuất hiện thành công không chỉ củng cố vị thế mà còn mở\n \nra thêm nhiều cơ hội mới trong tương lai. Diễn giả khẳng định &quot;Cơ hội đến không nắm là\n \ntrôi qua&quot;, cho thấy tầm quan trọng của sự sẵn sàng và chủ động.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hãy làm cho mình &quot;thực sự hay&quot; và là một chuyên gia trong lĩnh vực của mình để báo chí</span></div>\n<p class=\"body-txt\">\ntự muốn viết bài về bạn, thay vì trả tiền một cách kém hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">*Vì sao quan trọng:* Điều này xây dựng giá trị cốt lõi và uy tín bền vững. Khi bạn có kiến</span></div>\n<p class=\"body-txt\">\nthức, kinh nghiệm và giá trị thực sự để chia sẻ, truyền thông sẽ tìm đến bạn. Cách tiếp\n \ncận này tránh được những bài viết PR &quot;tanh mùi tiền&quot;, thiếu chân thực và giúp định vị\n \nbạn là một &quot;cá lớn trong ao nhỏ&quot; – một chuyên gia sâu sắc trong một lĩnh vực cụ thể.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Cần có &quot;mẹo&quot; để trả lời phỏng vấn hiệu quả: kiểm soát tốc độ nói, cấu trúc câu trả lời</span></div>\n<p class=\"body-txt\">\ntheo &quot;tam đoạn luận&quot; (mở bài, thân bài, kết luận), và nói thẳng vào vấn đề mà khán giả\n \nquan tâm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">*Vì sao quan trọng:* Việc chuẩn bị kỹ lưỡng về nội dung và cách trình bày giúp tối đa</span></div>\n<p class=\"body-txt\">\nhóa hiệu quả của mỗi lần xuất hiện. Trả lời súc tích, chuyên nghiệp, đúng trọng tâm và\n \nđúng thời lượng sẽ tạo ấn tượng tốt, đảm bảo thông điệp được truyền tải rõ ràng và tăng\n \nkhả năng được mời phỏng vấn tiếp.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Đó là con đường nhanh nhất để có uy tín.”\n \n“Mình phải thực sự hay để cho báo viết bài về mình.”\n \n“Cơ hội đến không nắm là trôi qua.”\n \n“Tôi là cá lớn trong ao nhỏ, trong lĩnh vực sở hữu trí tuệ.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#f57f17\">Bài 19: Bước lên sân khấu để trở thành chuyên gia</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Tóm tắt. Buổi học này tập trung vào việc làm thế nào để &quot;tự động&quot; trở thành chuyên gia</h3>\n<p class=\"body-txt\">\nthông qua việc &quot;bước lên sân khấu lớn&quot;. Cốt lõi của chuyên gia là tìm và giải quyết vấn đề\n \ncho người khác, đồng thời phải có một thông điệp nhất quán và giá trị thực sự để trao đi.\n \nViệc xuất hiện trên sân khấu không chỉ giúp bán được hàng giá cao sau đó mà còn tạo ra\n \ndanh sách khách hàng tiềm năng và tăng hiệu quả cho các kênh marketing khác.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Cách tự động để trở thành chuyên gia là bước lên sân khấu lớn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Khi lên sân khấu, hãy tạo giá trị cho khán giả bằng cách hỏi họ cần gì, muốn gì, đau khổ</span></div>\n<p class=\"body-txt\">\nvì điều gì và giúp họ giải phóng điều đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chuyên gia là người đi tìm vấn đề và giúp người khác giải quyết vấn đề.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Khi bạn bước lên sân khấu, bạn tự động được chuyển thành chuyên gia. Do đó, cần có</span></div>\n<p class=\"body-txt\">\nnhiều bức ảnh bạn đứng trên sân khấu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bạn cần có công thức &quot;deliver content&quot; (chuyển giao thông tin) để giúp khán giả thay đổi</span></div>\n<p class=\"body-txt\">\nđược một điều gì đó trong nhận thức hoặc làm được một điều gì đó trong cuộc sống.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Lợi ích của việc đứng trên sân khấu:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Lợi ích 1: Có thể kiếm được tiền ngay từ việc đứng trên sân khấu (dòng tiền).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Lợi ích lớn hơn (Lợi ích 2): Bán được hàng giá cao sau chương trình, không phải trực</span></div>\n<p class=\"body-txt\">\ntiếp tại chương trình. Khán giả sẽ tìm đến bạn sau đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Điều kiện 1 để bước lên sân khấu: Bạn phải có một thông điệp (message), một thông</span></div>\n<p class=\"body-txt\">\nđiệp cuộc đời nhất quán. (Ví dụ của diễn giả: &quot;Liên tục tiến lên&quot; – tốt hơn anh của ngày\n \nhôm qua). Thông điệp này phải giúp khán giả thay đổi từ A đến B.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Điều kiện 2: Phải có giá trị mà bạn trao cho khán giả.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Điều kiện 3: Phải đủ tốt, đủ năng lượng, đủ kỹ thuật để điều khiển sân khấu (không để</span></div>\n<p class=\"body-txt\">\nsân khấu điều khiển mình).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Trên sân khấu lớn, cần biết điều khiển ánh mắt bằng cách nhìn vào máy quay (máy toàn</span></div>\n<p class=\"body-txt\">\nđể thể hiện sự bao quát, máy cận khi muốn thể hiện sự nghiêm trọng/cảm xúc).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Người diễn giả phải là bậc diễn giả sân khấu, điều khiển tất cả mọi thứ: âm thanh, ánh</span></div>\n<p class=\"body-txt\">\nsáng, đèn, máy quay.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Lợi ích 3: Tạo ra danh sách khách hàng tiềm năng (ví dụ: cung cấp quà tặng đổi lấy thông</span></div>\n<p class=\"body-txt\">\ntin qua website/form).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Lợi ích 4: Biến khách hàng của bạn bè mình (hoặc người khác) thành khách hàng của</span></div>\n<p class=\"body-txt\">\nmình bằng cách đến sân khấu của họ và nói chuyện.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Lợi ích 5: Làm cho các kênh marketing khác hoạt động có hiệu quả hơn (ví dụ: YouTube,</span></div>\n<p class=\"body-txt\">\ntìm kiếm Google, website). Đứng trên sân khấu là kênh quan trọng nhất và các kênh\n \nkhác sẽ gắn vào kênh này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bạn phải đứng trên sân khấu, thời điểm nào tùy thuộc vào lịch trình bạn sắp xếp.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Lên sân khấu lớn là con đường nhanh nhất để tự động trở thành chuyên gia và xây dựng</span></div>\n<p class=\"body-txt\">\nuy tín: Diễn giả nhấn mạnh việc &quot;bước lên sân khấu lớn&quot; là hành động then chốt. Điều\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><p class=\"body-txt\">\nnày quan trọng vì nó chuyển từ lý thuyết sang hành động cụ thể, tạo ra sự công nhận từ\n \ncộng đồng và thị trường, giúp người nghe thoát khỏi suy nghĩ phải có thâm niên hay\n \nbằng cấp mới là chuyên gia. Hành động này giúp xây dựng thương hiệu cá nhân và niềm\n \ntin một cách hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chuyên gia thực sự là người giải quyết vấn đề và trao giá trị bằng một thông điệp nhất</span></div>\n<p class=\"body-txt\">\nquán: Buổi giảng định nghĩa rõ ràng vai trò của chuyên gia không phải là người biết\n \nnhiều, mà là người có khả năng tìm ra vấn đề của người khác và cung cấp giải pháp, kèm\n \ntheo một &quot;thông điệp cuộc đời&quot; xuyên suốt. Điều này quan trọng vì nó định hướng người\n \nhọc tập trung vào việc tạo ra giá trị thực cho khán giả, thay vì chỉ trình bày kiến thức\n \nchung chung, từ đó tạo ra tác động và lòng trung thành lâu dài.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Khả năng kiểm soát sân khấu (bao gồm cả máy quay) là kỹ năng thiết yếu: Diễn giả phân</span></div>\n<p class=\"body-txt\">\ntích chi tiết cách người diễn giả phải chủ động điều khiển ánh mắt, cử chỉ để hướng đạo\n \ndiễn máy quay theo ý mình, từ đó truyền tải thông điệp một cách hiệu quả nhất. Đây là\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">điểm quan trọng vì nó chỉ ra rằng để tối ưu hóa hiệu quả truyền thông, đặc biệt trong</h3>\n<p class=\"body-txt\">\nthời đại đa phương tiện, người nói không chỉ cần nội dung mà còn cần kỹ năng trình\n \ndiễn và kiểm soát kỹ thuật, biến sân khấu thành công cụ mạnh mẽ trong tay mình.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Tự động trở thành chuyên gia là bước lên sân khấu lớn.”\n \n“Chuyên gia là đi tìm vấn đề và giúp họ giải quyết vấn đề.”\n \n“Mình là bậc diễn giả sân khấu.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Bài 20: Sự kiện - công cụ để trở thành chuyên gia</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Tóm tắt. Buổi học này tập trung vào công cụ thứ bảy để trở thành chuyên gia: tổ chức các sự</h3>\n<p class=\"body-txt\">\nkiện online và offline, đặc biệt là thông qua việc xây dựng thẩm quyền và ảnh hưởng trên\n \nmạng xã hội. Diễn giả nhấn mạnh tầm quan trọng của các chỉ số hiệu suất quan trọng (KPIs)\n \ntrên YouTube, Facebook, Instagram và việc xuất bản sách như những phương tiện để gia\n \ntăng sự ảnh hưởng. Buổi học cũng liệt kê các hình thức sự kiện cụ thể như webinar, hội thảo\n \nhuấn luyện 1-1, bootcamp và workshop.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Công cụ thứ bảy để trở thành chuyên gia là các sự kiện. Các sự kiện này bao gồm cả</span></div>\n<p class=\"body-txt\">\nonline và offline.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Để có ảnh hưởng, phải có lượng follow lớn trên mạng xã hội. Người khác sẽ tìm kiếm fan</span></div>\n<p class=\"body-txt\">\ntrên club, fan trên nhóm, fan trên trang profile, fan trên trang page, và subscriber trên\n \nkênh YouTube.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Các chỉ số hiệu suất quan trọng (KPIs) cần theo dõi:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">YouTube: Số phút được xem.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Facebook: Số lượt share (quan trọng hơn like hay comment).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Instagram: Số lượt follower (đối tượng chính là phụ nữ/con gái).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Thẩm quyền giúp tổ chức các sự kiện online và offline lớn.</span></div></div></div>",
