"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Các hình thức chương trình có thể làm online và offline:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hội đàm đa kênh qua điện thoại (cần mua dịch vụ nhà mạng).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Webinar (công cụ diễn giả đặc biệt thích và không ai nhìn thấy).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hội thảo huấn luyện 1-1 (coaching 1-1).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chương trình trại huấn luyện (bootcamp) như Eagle Camp, Ultimate Trainer, Lập trình</span></div>\n<p class=\"body-txt\">\nvận mệnh (5 ngày ở trại).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Các workshop (hội thảo nhỏ).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Các chương trình huấn luyện phải làm bài tập.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Sách (Ebook) là một phần của Omni-channel (kênh số 2) và rất quan trọng. Diễn giả</span></div>\n<p class=\"body-txt\">\nkhẳng định có thể viết được một cuốn sách trong một tuần hoặc thậm chí trong một\n \nđêm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Là chuyên gia phải có sách và phải đứng làm hội thảo được.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tầm quan trọng của các sự kiện online/offline và thẩm quyền: Diễn giả chỉ ra rằng các</span></div>\n<p class=\"body-txt\">\nsự kiện là công cụ cốt lõi để xây dựng chuyên gia. Điều này quan trọng vì nó chuyển lý\n \nthuyết thành hành động thực tế, tạo ra tương tác trực tiếp hoặc gián tiếp, giúp xây dựng\n \nmối quan hệ và sự tin tưởng, từ đó củng cố vị thế chuyên gia. Thẩm quyền là nền tảng\n \ngiúp tổ chức thành công những sự kiện lớn này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">KPIs cụ thể cho từng nền tảng: Việc phân tích rõ ràng các KPI quan trọng (số phút xem</span></div>\n<p class=\"body-txt\">\ntrên YouTube, lượt share trên Facebook, follower trên Instagram) là rất đắt giá. Nó giúp\n \nngười học biết chính xác mình cần tập trung vào chỉ số nào để đo lường hiệu quả thực sự\n \ncủa sự ảnh hưởng, thay vì chỉ tập trung vào các chỉ số phù phiếm (như lượt thích trên\n \nFacebook). Điều này định hướng hành động hiệu quả hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Sách là công cụ không thể thiếu của chuyên gia: Quan điểm &quot;là chuyên gia mình phải có</span></div>\n<p class=\"body-txt\">\nsách&quot; và khả năng viết sách nhanh chóng (một tuần, một đêm) cực kỳ quan trọng. Sách\n \nkhông chỉ thể hiện kiến thức, kinh nghiệm mà còn là bằng chứng về thẩm quyền, giúp\n \nxây dựng thương hiệu cá nhân và thu hút khách hàng tiềm năng. Đây là một kênh Omni-\n \nchannel mạnh mẽ, thể hiện sự chuyên nghiệp và uy tín.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Cái công cụ thứ bảy để bạn trở thành chuyên gia... là các sự kiện.”\n \n“Facebook là số lượt share, không phải like, comment mà share mới quan trọng.”\n \n“Sách yên tâm một tuần là viết được một cuốn sách... hoặc là thậm chí trong đêm các anh chị\n \ncó thể viết xong một cuốn sách.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Bài 21: Những công việc cần làm mỗi ngày để trở thành chuyên gia</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Tóm tắt. Buổi giảng này vạch ra 7 hành động cốt lõi mà một người cần thực hiện liên tục</h3>\n<p class=\"body-txt\">\nhàng tuần/hàng năm để trở thành chuyên gia và bán được sản phẩm giá cao. Trọng tâm là\n \nduy trì sự hiện diện đa kênh một cách nhất quán, bao gồm phỏng vấn, livestream, sản xuất\n \nvideo, viết sách, tặng ebook và diễn thuyết. Điều quan trọng nhất là tất cả các hoạt động này\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><p class=\"body-txt\">\nđều phải &quot;có ý nghĩa&quot;, tức là mang lại giá trị thực sự, giúp khán giả thay đổi nhận thức hoặc\n \nhành vi theo hướng tích cực, từ đó xây dựng uy tín và tạo dựng niềm tin vững chắc trên thị\n \ntrường.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">1. Duy trì hiện diện đa kênh:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hàng tuần có ít nhất một cuộc phỏng vấn (tối thiểu 52 cuộc/năm) trên TV, đài, báo giấy</span></div>\n<p class=\"body-txt\">\nhoặc podcast cá nhân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hàng tuần phải có ít nhất một buổi livestream &quot;có ý nghĩa&quot; với khách hàng tiềm năng,</span></div>\n<p class=\"body-txt\">\nkhông chỉ đơn thuần bán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nên sử dụng công cụ đa kênh như Bisulai (bisulai.com) để phát sóng đồng thời lên nhiều</span></div>\n<p class=\"body-txt\">\nnền tảng (YouTube, Facebook, Fanpage), giúp tiết kiệm thời gian và tăng hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Việc trả tiền cho công cụ (như Bisulai) sẽ tạo động lực để thực hiện đều đặn hơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Khi livestream, cần tương tác với khán giả (ví dụ: tặng hoa, chơi xổ số).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Mọi hoạt động đa kênh nên được thực hiện trên cả profile cá nhân, fanpage và kênh</span></div>\n<p class=\"body-txt\">\nYouTube.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">2. &quot;Đứng trên vai người khổng lồ&quot;:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nếu chưa phải là người có tầm ảnh hưởng lớn, mỗi tuần phải có một buổi live hoặc</span></div>\n<p class=\"body-txt\">\nphỏng vấn cùng với một &quot;người khổng lồ&quot; trong lĩnh vực (tối thiểu 52 buổi/năm).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nên ưu tiên phỏng vấn offline để có thời gian biên tập lại nội dung, cắt bớt những phần</span></div>\n<p class=\"body-txt\">\ntrả lời lôm côm hoặc không đúng trọng tâm thị trường mục tiêu, đảm bảo chất lượng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Kỹ thuật phỏng vấn này còn được gọi là &quot;kỹ thuật phỏng vấn qua vai&quot;, giúp xây dựng</span></div>\n<p class=\"body-txt\">\nthương hiệu nhanh chóng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">3. Sản xuất nội dung số lượng lớn:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Upload ít nhất 200 video lên kênh YouTube mỗi năm (tương đương khoảng 1 video mỗi</span></div>\n<p class=\"body-txt\">\nngày làm việc).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Xuất bản ít nhất một cuốn sách mới, hoàn toàn mới mỗi năm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tặng ít nhất 3000 ebook (hoặc sách vật lý) mỗi năm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">4. Diễn thuyết công khai:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Thực hiện ít nhất 20 bài diễn thuyết (presentation/speech) mỗi năm, không có lý do</span></div>\n<p class=\"body-txt\">\nngoại lệ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">5. Nguyên tắc &quot;có ý nghĩa&quot;:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tất cả 7 hoạt động trên đều phải &quot;có ý nghĩa&quot; với thị trường tiềm năng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">&quot;Có ý nghĩa&quot; được định nghĩa là giúp người nghe/xem &quot;nhận thức được một thứ mới&quot;</span></div>\n<p class=\"body-txt\">\nhoặc &quot;thay đổi một hành vi mới&quot; theo hướng tốt đẹp lên, từ điểm A (tiêu cực, cũ) đến\n \nđiểm B (tích cực, mới).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tuyệt đối không làm các loại nội dung giật gân, vô nghĩa (như đâm chém, giết, hiếp, dọa</span></div>\n<p class=\"body-txt\">\nma) dù chúng có thể thu hút lượng xem cao, vì chúng không tạo ra giá trị thực sự.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">6. Cảnh báo: Nếu không thể thực hiện được tối thiểu những điều này, sẽ không bao giờ</span></div>\n<p class=\"body-txt\">\ncó thể &quot;bước vào thế giới những người bán hàng giá cao&quot;.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">★ Điểm quan trọng nhất</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tính kỷ luật và sự nhất quán trong triển khai nhiều kênh nội dung: Diễn giả không chỉ đề</span></div>\n<p class=\"body-txt\">\ncập đến việc sản xuất nội dung mà còn định lượng rõ ràng từng loại hình (52 phỏng vấn,\n \n52 livestream, 200 video, 1 sách, 3000 ebook, 20 diễn thuyết). Điều này quan trọng vì nó\n \ncung cấp một lộ trình thực tế và cụ thể để xây dựng quyền uy, sự hiện diện và niềm tin\n \ncủa khách hàng tiềm năng trên nhiều nền tảng. Sự nhất quán và khối lượng lớn là yếu tố\n \nthen chốt để xây dựng thương hiệu cá nhân mạnh mẽ và vị thế chuyên gia trong dài hạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nguyên tắc &quot;có ý nghĩa&quot; là kim chỉ nam cho mọi nội dung: Việc định nghĩa rõ ràng &quot;có ý</span></div>\n<p class=\"body-txt\">\nnghĩa&quot; là giúp người nghe/xem &quot;nhận thức được một thứ mới&quot; hoặc &quot;thay đổi một hành\n \nvi mới tốt đẹp lên&quot; là cực kỳ đắt giá. Nó chuyển dịch trọng tâm từ việc chỉ đơn thuần\n \n&quot;làm marketing&quot; sang &quot;tạo ra giá trị và giải pháp&quot; cho khách hàng. Đây là nền tảng để xây\n \ndựng lòng tin, sự tín nhiệm và vị thế chuyên gia, từ đó dễ dàng bán các sản phẩm/dịch\n \nvụ có giá trị cao và duy trì mối quan hệ lâu dài với khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chiến lược &quot;Đứng trên vai người khổng lồ&quot; và ưu thế của phỏng vấn offline: Hợp tác với</span></div>\n<p class=\"body-txt\">\nnhững người có tầm ảnh hưởng (người khổng lồ) giúp nhanh chóng mở rộng phạm vi\n \ntiếp cận và nâng cao uy tín cho bản thân. Việc ưu tiên phỏng vấn offline, dù mất công\n \nhơn, nhưng lại mang lại lợi thế lớn trong việc biên tập, kiểm soát chất lượng nội dung.\n \nĐiều này đặc biệt quan trọng để đảm bảo thông điệp sắc sảo, chuyên nghiệp và phù hợp\n \nvới chiến lược thương hiệu, tránh những sai sót không đáng có khi phát sóng trực tiếp,\n \nđặc biệt với những thị trường đòi hỏi sự kỹ tính cao.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Một tuần phải ít nhất một livestream **có ý nghĩa** với khách hàng tiềm năng.”\n \n“Nếu không làm được tối thiểu những điều này, không bao giờ bước vào thế giới những người\n \nbán hàng giá cao hết.”\n \n“Có ý nghĩa là giúp người ta nhận thức được một thứ mới hoặc thay đổi một hành vi mới. Tốt\n \nđẹp lên. Rơi bỏ những điểm A xấu cũ, tiến tới một điểm B tốt đẹp mới.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Bài 22: Chiến lược JV</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Tóm tắt. Buổi học này tập trung vào chiến lược hợp tác kinh doanh (Joint Venture – JV) để</h3>\n<p class=\"body-txt\">\nnhanh chóng tiếp cận tệp khách hàng giá cao. Diễn giả trình bày một quy trình 5 bước chi\n \ntiết để tìm kiếm, tiếp cận và hợp tác hiệu quả với những đối tác đã có sẵn danh sách khách\n \nhàng tiềm năng. Đồng thời, buổi giảng nhấn mạnh về tư duy &quot;giá cao&quot; thông qua việc từ bỏ\n \nnhững lý do ngụy biện &quot;rẻ rách&quot; và tập trung vào kết quả, cam kết giá trị cao, coi trọng mối\n \nquan hệ cá nhân hơn các hợp đồng phức tạp.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Giới thiệu chiến lược JV: Sử dụng chiến lược JV (Joint Venture - Hợp tác kinh doanh) để</span></div>\n<p class=\"body-txt\">\nnhanh chóng bước vào thế giới của những người bán hàng giá cao. JV là hợp tác kinh\n \ndoanh với người khác, đặc biệt là những người đã có sẵn danh sách khách hàng giá cao.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">5 Bước để hợp tác JV:</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bước 1: Biết rõ khách hàng tiềm năng của mình là ai (cái khách hàng tiềm năng của mình</span></div>\n<p class=\"body-txt\">\nlà gì).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bước 2: Biết rõ ai là người có sẵn danh sách khách hàng tiềm năng của mình.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bước 3: Biết rõ họ muốn gì và cho họ điều họ muốn. (Ví dụ: lon bia, nhà hàng yêu thích.</span></div>\n<p class=\"body-txt\">\n&quot;Xin gì cũng cho&quot;, &quot;cho hết không còn gì cho nữa&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bước 4: Hỏi họ hợp tác với mình bằng cách chia sẻ sản phẩm/dịch vụ của mình vào danh</span></div>\n<p class=\"body-txt\">\nsách của họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bước 5: Hỏi cho đến khi họ đồng ý chia sẻ sản phẩm/dịch vụ của mình vào danh sách thì</span></div>\n<p class=\"body-txt\">\nthôi. (Không, không phải là không. Thành công không bao giờ là dễ dàng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nguyên tắc hợp tác JV:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Không có luật sư, hợp đồng phức tạp (không có đàm phán dài hơi). Tất cả dựa trên uy</span></div>\n<p class=\"body-txt\">\ntín, vì đây là các &quot;high ticket item&quot; (người giá cao).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Không có đàm phán dài hơi, không có gặp gỡ ủy ban, hội đồng cố vấn lằng nhằng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Một phát chốt luôn, đồng ý là làm luôn, chia sẻ luôn, không nói nhiều.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Khi đã JV rồi, &quot;mày là tao và tao là mày&quot;, hai thằng là một, khách hàng của mày là khách</span></div>\n<p class=\"body-txt\">\nhàng của tao và ngược lại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hai bên đều phải có cam kết chuẩn như nhau (một thằng giao giá trị cao hơn giá, thằng</span></div>\n<p class=\"body-txt\">\nkia cũng phải theo tiêu chuẩn đó).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Người có danh sách khách hàng là người đưa ra điều kiện chuẩn hóa.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Lý do nên dùng JV (Tại sao phải hợp tác kinh doanh):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Con đường rút ngắn thời gian để làm giàu (nhanh hơn để làm giàu).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Đòn bẩy nhanh nhất (cưỡi trên lưng người khổng lồ).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Không có rủi ro gì cả (bán được thì có tiền, không bán được thì không sao, chẳng có rủi</span></div>\n<p class=\"body-txt\">\nro nào cho cả hai bên).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Thần chú trong JV: Hợp tác với con người, không phải hợp tác với một doanh nghiệp (ví</span></div>\n<p class=\"body-txt\">\ndụ: hợp tác với diễn giả, không phải công ty Đào Tạo Doanh Nhân).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Câu hỏi giúp bạn trở thành triệu phú: &quot;Ai là người đã có sẵn khách hàng của tôi?&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Cách tiếp cận đối tác:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tuyệt đối không dùng template, email dựng sẵn. Phải viết lại hoàn toàn một nội dung</span></div>\n<p class=\"body-txt\">\nmới, cá nhân hóa 100%.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Đừng tiếp cận bằng việc giới thiệu sản phẩm hay yêu cầu họ làm điều gì đó ngay những</span></div>\n<p class=\"body-txt\">\nlần hợp tác đầu tiên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hãy bắt đầu bằng việc kết bạn, làm điều gì đó có ý nghĩa cho họ trước và thông báo cho</span></div>\n<p class=\"body-txt\">\nhọ biết bạn đã làm gì cho họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Cấu trúc thư/lời mở đầu: Bày tỏ cảm xúc (&quot;Tôi cảm thấy hạnh phúc/sung sướng/tuyệt</span></div>\n<p class=\"body-txt\">\nvời/tự hào khi tôi đọc blog của bạn / xem livestream của bạn đêm qua / xem video của\n \nbạn hôm trước...&quot;). Đây chính là tài liệu để hợp tác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Kết thúc bức thư phải có câu chốt để hợp tác (&quot;Nếu như bạn có sẵn sàng giới thiệu tôi thì</span></div>\n<p class=\"body-txt\">\nbạn sẽ nói gì với những người khác?&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tiêu chí chọn đối tác:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Phải biết ai là người có danh sách lớn nhất ở Việt Nam (không chơi tán phét, phải show</span></div>\n<p class=\"body-txt\">\ncon số). Giỏi hay không giỏi nằm ở con số.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Ai là người trong cùng lĩnh vực của ông nói ông giỏi lĩnh vực đó. (&quot;Nó bảo giỏi mình bảo</span></div>\n<p class=\"body-txt\">\ngiỏi&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chọn kết quả hoặc chọn lý do, không bao giờ có cả hai.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tư duy của người giá cao:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nếu muốn bán giá cao thì chỉ bán giá cao, đừng bao giờ nói &quot;nhưng mà&quot; hay &quot;bởi vì&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Không bao giờ đổ lỗi, phàn nàn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Không có các từ như &quot;tôi không thể&quot;, &quot;tôi không có thời gian&quot;, &quot;tôi quá mệt rồi&quot;, &quot;tôi</span></div>\n<p class=\"body-txt\">\nkhông thể cố gắng thêm được nữa&quot;, &quot;giá mà tôi có thêm năng lượng&quot;, &quot;tôi hết động lực\n \nrồi&quot;, &quot;tôi quá già&quot;, &quot;tôi quá trẻ&quot;, &quot;tôi quá béo&quot;, &quot;tôi quá gầy&quot;, &quot;tôi quá bận&quot;, &quot;tôi không có\n \ntiền&quot;, &quot;tôi quá nhiều tiền rồi&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Đó là những lý do ngụy biện khiến bạn thuộc về bọn &quot;rẻ rách&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">&quot;Rẻ rách hay giá cao là sự lựa chọn.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hãy thôi lười biếng và trở nên bận rộn kể từ bây giờ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bọn rẻ rách luôn chọn việc dễ dàng, bọn giàu có luôn chọn những việc khó để làm.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chiến lược JV: Con đường làm giàu nhanh hơn (cưỡi trên lưng người khổng lồ): Diễn giả</span></div>\n<p class=\"body-txt\">\nnhấn mạnh JV không phải là làm giàu &quot;nhanh chóng&quot; theo kiểu phi thực tế, mà là con\n \nđường &quot;nhanh hơn&quot; để đạt được sự giàu có. Bằng cách hợp tác với những người đã có\n \nsẵn danh sách khách hàng chất lượng, bạn có thể tiếp cận thị trường mục tiêu lớn mà\n \nkhông cần tốn thời gian và nguồn lực khổng lồ để xây dựng từ đầu. Điều này đặc biệt\n \nquan trọng với các doanh nghiệp nhỏ hoặc mới khởi nghiệp muốn mở rộng nhanh chóng\n \ntrong thị trường cạnh tranh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hợp tác với con người, không phải doanh nghiệp: Đây là một triết lý cốt lõi. Trong thế</span></div>\n<p class=\"body-txt\">\ngiới JV, uy tín và mối quan hệ cá nhân là yếu tố then chốt, vượt xa các hợp đồng pháp lý\n \nphức tạp. Việc tập trung vào xây dựng niềm tin, sự thấu hiểu và giá trị chung với một cá\n \nnhân có sức ảnh hưởng sẽ giúp quá trình hợp tác diễn ra nhanh chóng, hiệu quả và bền\n \nvững hơn, bởi vì chính con người đó sẽ là người đưa ra quyết định cuối cùng và cam kết\n \nvới bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tư duy &quot;Kết quả hay lý do&quot; &amp; Từ bỏ các lý do &quot;rẻ rách&quot;: Diễn giả khẳng định rằng người</span></div>\n<p class=\"body-txt\">\ngiá cao luôn chọn kết quả, trong khi người &quot;rẻ rách&quot; chọn lý do. Việc từ bỏ những lời bao\n \nbiện như &quot;tôi không có thời gian,&quot; &quot;tôi quá bận,&quot; &quot;tôi không thể,&quot; v.v., là một bước chuyển\n \nmình tư duy mạnh mẽ. Nó buộc bạn phải chịu trách nhiệm hoàn toàn cho hành động và\n \nkết quả của mình, hướng tới sự chủ động và không ngừng tìm kiếm giải pháp, thay vì bị\n \nđộng và chấp nhận thất bại. Đây là yếu tố quyết định để duy trì và phát triển trong môi\n \ntrường giá cao.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">&quot;Hãy làm điều gì đó có ý nghĩa cho họ trước và thông báo cho họ biết bạn đã làm gì cho</span></div>\n<p class=\"body-txt\">\nhọ&quot;: Nguyên tắc &quot;cho đi trước khi nhận lại&quot; là nền tảng để xây dựng mối quan hệ vững\n \nchắc trong JV. Thay vì tiếp cận với mục đích bán hàng hay yêu cầu ngay lập tức, việc thể\n \nhiện sự quan tâm, thấu hiểu và cung cấp giá trị thực sự cho đối tác tiềm năng sẽ tạo\n \ndựng thiện cảm và lòng tin. Khi đối tác cảm thấy được trân trọng và nhận được lợi ích,\n \nhọ sẽ cởi mở hơn rất nhiều với đề xuất hợp tác của bạn.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#f57f17\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Khi đã JV rồi thì mày là tao và tao là mày.”\n \n“Không có luật sư nào ở đây hết. Tao là pháp luật luôn.”\n \n“Rẻ rách hay giá cao là sự lựa chọn.”\n \n“Bọn giàu có luôn chọn những việc khó để làm nên chúng trở nên giàu có.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Bài 23: 8 bước Sale Success System</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Tóm tắt. Buổi giảng tập trung vào &quot;Sales Success System&quot; 8+2 bước, một quy trình bán hàng</h3>\n<p class=\"body-txt\">\nhiệu quả được thiết kế kỹ lưỡng. Cốt lõi của buổi chia sẻ là cách tối ưu hóa các bước bán\n \nhàng từ tạo danh sách khách hàng tiềm năng đến chăm sóc, với điểm nhấn đặc biệt là việc\n \ntích hợp bước &quot;xin lời giới thiệu&quot; (referral) vào mọi giai đoạn của quy trình, kể cả khi xử lý\n \ntừ chối. Hệ thống này cũng nhấn mạnh vào việc xác định nhu cầu và chỉ trình bày lợi ích phù\n \nhợp, cùng kỹ thuật xử lý từ chối trước (pre-framing).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hệ thống Sales Success System (8+2 bước): Quy trình bán hàng được nghiên cứu và</span></div>\n<p class=\"body-txt\">\nthiết kế kỹ lưỡng trong nhiều năm, gồm 8 bước chính và 2 bước phụ (referral).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">1. Tạo danh sách khách hàng tiềm năng (tạo list):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Là bước quan trọng nhất.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Có thể thực hiện việc &quot;xin lời giới thiệu&quot; ngay từ bước này (ví dụ: yêu cầu giới thiệu</span></div>\n<p class=\"body-txt\">\nngười khác để tiếp tục đến bước tiếp theo).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">2. Hẹn gặp:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Là một bước độc lập trong quy trình, khác với các hệ thống khác.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Mục đích: Người làm bước hẹn gặp không nhất thiết phải là người bán hàng, dễ dàng đo</span></div>\n<p class=\"body-txt\">\nlường tỷ lệ hẹn gặp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hình thức: 1-1 (cho sản phẩm giá cao), 1-nhiều (cho sản phẩm giá nhiều), online</span></div>\n<p class=\"body-txt\">\n(seminar, webinar, livestream, xem video tiếp theo).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Có thể thực hiện việc &quot;xin lời giới thiệu&quot; ngay từ bước này (ví dụ: mời bạn bè/người</span></div>\n<p class=\"body-txt\">\nquen cùng tham gia).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">3. Xây dựng mối quan hệ thân tình và tin cậy:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Giai đoạn tạo kết nối sâu sắc với khách hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">&quot;Ở đây không có bước bán hàng nào được thực hiện.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Có thể thực hiện việc &quot;xin lời giới thiệu&quot; ngay từ bước này (ví dụ: mời bạn bè/người</span></div>\n<p class=\"body-txt\">\nquen đi cùng để tăng tương tác).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">4. Xác định nhu cầu:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bước quan trọng để hiểu rõ mong muốn của khách hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Cần có kịch bản chi tiết cho bước này.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">5. Trình bày lợi ích (chứ không phải tính năng):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chỉ trình bày những lợi ích *khớp* với nhu cầu đã xác định của khách hàng.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tuyệt đối không &quot;xả băng&quot; tất cả các tính năng tốt của sản phẩm nếu khách hàng không</span></div>\n<p class=\"body-txt\">\ncần.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">6. Xử lý sự từ chối (hoặc xử lý trước):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Có thể đảo vị trí với bước chốt (người bán hàng kinh nghiệm thường xử lý trước).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Kỹ thuật xử lý từ chối trước (Pre-framing): &quot;Tôi biết hầu hết mọi người nghĩ rằng [lý do</span></div>\n<p class=\"body-txt\">\ntừ chối], nhưng mà thực tiễn là [sự thật phủ nhận lý do].&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Ví dụ: &quot;Tôi biết mọi người sẽ nói rằng họ bận... nhưng thực tế là nếu họ đến đó chẳng bao</span></div>\n<p class=\"body-txt\">\ngiờ bận nữa.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Ví dụ: &quot;Tôi biết là mọi người đều nghĩ là không có tiền... nhưng vì không có tiền nên tất</span></div>\n<p class=\"body-txt\">\ncả mọi người đều phải đến đó.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Ví dụ: &quot;Tôi nghĩ là anh ta sẽ nói rằng không đủ tiền, nhưng hãy tưởng tượng xem nếu</span></div>\n<p class=\"body-txt\">\nđiều gì đó diễn ra với anh rất quan trọng thì anh ta có đủ tiền không?&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Có thể thực hiện việc &quot;xin lời giới thiệu&quot; ngay từ bước này (ví dụ: &quot;Nếu anh không mua</span></div>\n<p class=\"body-txt\">\nthì anh có biết ai giống như anh có thể mua sản phẩm này không?&quot; hoặc &quot;Nếu anh không\n \nmua thì hãy nghĩ xem đối thủ của anh mà có sản phẩm này thì sao?&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">7. Chốt: Bước cuối cùng trong quá trình bán hàng trực tiếp.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">8. Chăm sóc (Follow-up):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Để khách hàng mua tiếp hoặc tiếp tục tương tác.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bước phụ (+2) - Xin lời giới thiệu (Referral):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Là một bước riêng biệt, *có thể diễn ra ở bất kỳ đâu* trong toàn bộ quy trình, không chỉ</span></div>\n<p class=\"body-txt\">\ncuối cùng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Có thể nằm ngay trong bước tạo list, hẹn gặp, xây dựng mối quan hệ, hay xử lý từ chối.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Người được giới thiệu ban đầu có thể không mua, nhưng người được họ giới thiệu lại là</span></div>\n<p class=\"body-txt\">\nngười mua hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tối đa hóa hiệu quả bán hàng bằng cách liên tục tìm kiếm giới thiệu.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tích hợp &quot;xin lời giới thiệu&quot; (referral) vào MỌI giai đoạn của quy trình bán hàng: Thay vì</span></div>\n<p class=\"body-txt\">\nchỉ coi referral là bước cuối cùng sau khi giao dịch thành công, diễn giả nhấn mạnh việc\n \nchủ động hỏi xin giới thiệu ngay từ bước tạo list, hẹn gặp, xây dựng mối quan hệ, và\n \nthậm chí cả khi khách hàng từ chối. Điều này quan trọng vì nó mở rộng phễu khách hàng\n \nliên tục, tận dụng sức mạnh của mạng lưới cá nhân và giảm chi phí tìm kiếm khách hàng\n \nmới, biến referral thành một động cơ tăng trưởng thay vì một sự kiện một lần.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chú trọng Xác định nhu cầu và chỉ trình bày LỢI ÍCH phù hợp: Thay vì liệt kê tất cả tính</span></div>\n<p class=\"body-txt\">\nnăng sản phẩm, người bán hàng cần tập trung vào việc lắng nghe để hiểu rõ nhu cầu cụ\n \nthể của khách. Sau đó, chỉ đưa ra những lợi ích của sản phẩm/dịch vụ giải quyết trực\n \ntiếp những nhu cầu đó. Điều này quan trọng vì nó giúp cá nhân hóa trải nghiệm khách\n \nhàng, tránh lãng phí thời gian vào những thông tin không liên quan, và xây dựng sự tin\n \ntưởng bằng cách thể hiện sự thấu hiểu sâu sắc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Kỹ thuật xử lý từ chối trước (Pre-framing): Phương pháp &quot;Tôi biết mọi người nghĩ rằng...</span></div>\n<p class=\"body-txt\">\nnhưng thực tế là...&quot; giúp người bán hàng chủ động đối mặt và vô hiệu hóa những lý do từ\n \nchối phổ biến trước khi chúng được nêu ra. Điều này quan trọng vì nó giúp kiểm soát\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><p class=\"body-txt\">\ncuộc hội thoại, xây dựng sự uy tín và chuyên nghiệp, đồng thời chuẩn bị tâm lý cho\n \nkhách hàng, giúp họ vượt qua những rào cản tâm lý ban đầu một cách hiệu quả hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Cái ông đầu này có thể là không mua, nhưng mà sau cái ông ông bạn của ông ban đầu thì lại\n \nlà cái ông mua hàng.”\n \n“Ở đây không có bước bán hàng nào được thực hiện ở đây hết.”\n \n“Mình không trình bày cho ông dài không bao giờ là chưa gặp nhau đã xả luôn một băng\n \nnguyên về cái sản phẩm của mình... mình chỉ nói cái lợi ích mà khớp với cái nhu cầu của họ\n \nthôi.”\n \n“Tôi biết hầu hết mọi người nghĩ rằng cái này là [lý do từ chối], nhưng mà thực tiễn là [sự thật\n \nphủ nhận lý do].”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Bài 24: Quy trình bán hàng giá cao</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Tóm tắt. Buổi học này trình bày một quy trình bán hàng gồm 7 bước, tập trung vào việc</h3>\n<p class=\"body-txt\">\nthấu hiểu khách hàng, xác định nỗi đau và ước mơ của họ để vượt qua rào cản tâm lý. Cốt lõi\n \nlà áp dụng công thức thay đổi D\\*V\\*FS &gt; R, trong đó người bán cần tạo ra nỗi đau (D), xây\n \ndựng tầm nhìn (V), khuyến khích hành động đầu tiên (FS) và đặc biệt là giảm sự kháng cự\n \n(R) của khách hàng. Mục tiêu cuối cùng là chốt đơn ngay lập tức, tránh để khách hàng rơi\n \nvào trạng thái &quot;có thể&quot; hoặc &quot;xem xét&quot;.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Quy trình bán hàng giá cao:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bước 1: Tạo lập danh sách khách hàng tiềm năng:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Xác định đúng khách hàng tiềm năng thông qua tiêu chí cụ thể.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hạn chế xin số điện thoại ngẫu nhiên; tập trung vào đối tượng phù hợp.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Quan sát các chi tiết bên ngoài (đồng hồ, trang phục,...) để đánh giá sơ bộ sự tương xứng,</span></div>\n<p class=\"body-txt\">\nnhưng lưu ý các yếu tố này có thể sai lệch.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bước 2: Xây dựng mối quan hệ thân tình (Rapport Building):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nói chuyện chung nhất (2-3 phút): Trao đổi về các chủ đề trung lập, ai cũng biết (ví dụ:</span></div>\n<p class=\"body-txt\">\nthời tiết, sự kiện chung), tránh chính trị, tôn giáo, hay các đề tài nhạy cảm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Kỹ thuật pre-framing (định hướng trước câu chuyện): Nêu rõ mục đích cuộc trò chuyện</span></div>\n<p class=\"body-txt\">\nvà kết quả cuối cùng mà khách hàng sẽ nhận được (kết quả mà người bán muốn khách\n \nhàng đạt được).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bước 3: Thấu hiểu động lực hành động của khách hàng:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Động lực có thể được &quot;tìm ra&quot; hoặc &quot;tạo ra&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Sử dụng các câu hỏi để xác định điều khách hàng muốn nhất, điều họ muốn thay đổi</span></div>\n<p class=\"body-txt\">\nnhất, hoặc khó khăn lớn nhất họ đang gặp phải.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Áp dụng kỹ thuật &quot;đào&quot; (tức là hỏi sâu) bằng các câu hỏi như &quot;Nói cho tôi thêm&quot;, &quot;Còn gì</span></div>\n<p class=\"body-txt\">\nnữa không?&quot;, và đặc biệt là &quot;Ý anh là gì?&quot;, &quot;Điều ấy có nghĩa là gì?&quot; để khách hàng tự chia\n \nsẻ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bước 4: Công thức của sự thay đổi D\\*V\\*FS &gt; R:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Đây là công thức từ chương trình &quot;Đánh thức sự giàu có&quot; và Wikipedia, trong đó:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">D (Dissatisfaction): Sự không hài lòng, nỗi đau, cảm xúc tiêu cực hiện tại.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">V (Vision): Tầm nhìn, sự sung sướng nếu thay đổi, lợi ích đạt được.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">FS (First Step): Hành động đầu tiên cụ thể để bắt đầu thay đổi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">R (Resistance): Sự kháng cự, rào cản đối với sự thay đổi, luôn lớn hơn 0.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Để có sự thay đổi (khách hàng mua hàng), phép nhân của D, V, FS phải lớn hơn R. Nếu</span></div>\n<p class=\"body-txt\">\nbất kỳ yếu tố nào D, V, FS bằng 0 thì sẽ không có thay đổi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Trong bán hàng: Tạo ra nỗi đau nếu không mua hàng (D), sự sung sướng nếu mua hàng</span></div>\n<p class=\"body-txt\">\n(V), và yêu cầu hành động đầu tiên (FS).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Ưu tiên giảm sự kháng cự (R) trước bằng cách xây dựng mối quan hệ. Đừng bắt đầu</span></div>\n<p class=\"body-txt\">\nbằng việc yêu cầu mua hàng ngay.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bước 4 (tiếp theo): Xác định nỗi đau và vấn đề lớn nhất (D):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hỏi về cuộc sống/công việc hiện tại của khách hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Sử dụng &quot;Điều ấy có nghĩa là gì?&quot; để đào sâu nguyên nhân gốc rễ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Xác định &quot;vấn đề lớn nhất mà anh đang phải thực sự đối mặt&quot; (là R trong sơ đồ).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hỏi về thời gian tồn tại của vấn đề và nguyên nhân của nó (kỹ thuật &quot;5 lần why&quot;).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hỏi để khách hàng ưu tiên vấn đề cần giải quyết nếu có nhiều lựa chọn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bước 5: Xác định điểm mong muốn của khách hàng (V):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hỏi để khách hàng hình dung ước mơ, con người họ muốn trở thành (ví dụ: &quot;Nếu có một</span></div>\n<p class=\"body-txt\">\nchiếc đũa thần...&quot;, &quot;Anh muốn điều gì diễn ra sau 1 năm tới?&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tìm hiểu về giá trị sống của họ, ảnh hưởng đến gia đình và những người xung quanh.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hỏi trực tiếp về động lực: &quot;Động lực nào khiến anh muốn đạt điều đó?&quot; hoặc &quot;Tại sao</span></div>\n<p class=\"body-txt\">\nanh lại muốn đạt điều đó?&quot;. Luôn đào sâu bằng &quot;Điều ấy có nghĩa là gì?&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Người bán hàng cần giúp khách hàng có một tầm nhìn (V) mới, lớn hơn điểm hiện tại</span></div>\n<p class=\"body-txt\">\ncủa họ. Trở thành người truyền cảm hứng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bước 6: Xóa bỏ rào cản (R):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Xác định rõ các rào cản thực sự ngăn cách khách hàng với mục tiêu của họ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hỏi: &quot;Đâu là khó khăn lớn nhất giữa bây giờ và mục tiêu 12 tháng tới?&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hỏi sâu: &quot;Tại sao cái điều đó không phải là bây giờ?&quot; để tìm ra rào cản thực sự.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Đây là bước cực kỳ khó vì khách hàng chỉ nói ra khó khăn thật sự khi họ tin tưởng người</span></div>\n<p class=\"body-txt\">\nbán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Để tăng sự tin tưởng ban đầu, người bán cần chú trọng phong cách cá nhân (ví dụ: trang</span></div>\n<p class=\"body-txt\">\nphục com-lê, cà vạt) để thể hiện sự chuyên nghiệp và đáng tin cậy.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bước 7: Xác định tiền (Chốt đơn):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Người bán cần xác định đúng đây là đối tượng phù hợp và công việc mình có thể làm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Sử dụng kịch bản: &quot;Cảm ơn anh đã chia sẻ. Tôi hiểu tình trạng hiện tại của anh. Chúng tôi</span></div>\n<p class=\"body-txt\">\ncó thể sửa chữa/khắc phục/cải thiện nó.&quot;\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Xác nhận sự phù hợp: &quot;Anh đúng là đối tác tuyệt vời của tôi.&quot;, &quot;Việc ấy đúng là việc của</span></div>\n<p class=\"body-txt\">\nem mà em làm hàng ngày rồi, anh yên tâm!&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Ba yếu tố quan trọng để chốt đơn:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Đảm bảo D\\*V\\*FS &gt; R.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Đừng tốn quá nhiều năng lượng cho khách hàng đang &quot;xem xét&quot; so với khách hàng mới.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tạo lý do để khách hàng mua &quot;bây giờ hoặc không bao giờ&quot;. Phải chốt ngay khi cảm xúc</span></div>\n<p class=\"body-txt\">\nđược đẩy lên cao, nếu không sẽ rất khó chốt về sau.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Công thức thay đổi D\\*V\\*FS &gt; R: Đây là khung xương toàn bộ buổi giảng, cung cấp một</span></div>\n<p class=\"body-txt\">\ncách hệ thống để phân tích và tác động vào tâm lý khách hàng. Nó quan trọng vì nó chỉ ra\n \nrằng sự thay đổi (mua hàng) không chỉ đến từ một yếu tố mà là sự kết hợp của nỗi đau,\n \ntầm nhìn, và hành động, đồng thời phải đủ lớn để vượt qua sự kháng cự bẩm sinh. Hiểu\n \nrõ công thức giúp người bán biết mình cần tập trung vào đâu để thúc đẩy quyết định\n \nmua hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Động lực có thể được tìm ra hoặc nên được tạo ra: Insight này rất đắt giá vì nó thay đổi</span></div>\n<p class=\"body-txt\">\nvai trò của người bán hàng từ thụ động (chỉ đáp ứng nhu cầu có sẵn) sang chủ động\n \n(giúp khách hàng nhận diện hoặc thậm chí kiến tạo nhu cầu mới). Điều này mở rộng\n \ntiềm năng bán hàng và cho phép người bán định hình giá trị sản phẩm/dịch vụ theo\n \nhướng có lợi hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Giảm sự kháng cự (R) trước, sau đó mới đi sâu vào D, V, FS: Diễn giả nhấn mạnh rằng</span></div>\n<p class=\"body-txt\">\n&quot;ngay cả sự kháng cự mà có thì nó chả thèm nghe mình luôn chứ đừng nói là mua hàng.&quot;\n \nĐiểm này cực kỳ quan trọng vì nó đặt nền tảng cho mọi tương tác bán hàng hiệu quả.\n \nXây dựng lòng tin và mối quan hệ thân tình là ưu tiên hàng đầu, trước khi cố gắng thuyết\n \nphục hay giới thiệu sản phẩm. Nếu không có sự tin tưởng, mọi nỗ lực sau đó đều vô\n \nnghĩa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tạo ra lý do để khách hàng mua &quot;bây giờ hoặc không bao giờ&quot;: &quot;Không chốt lúc đấy là</span></div>\n<p class=\"body-txt\">\nkhông bao giờ chốt nữa.&quot; Đây là nguyên tắc vàng trong chốt sales, đặc biệt khi cảm xúc\n \nkhách hàng đang ở đỉnh điểm. Nếu để khách hàng có thời gian &quot;xem xét&quot; hay &quot;có thể&quot;,\n \nkhả năng cao họ sẽ không mua nữa vì sự kháng cự sẽ tăng trở lại. Insight này giúp người\n \nbán tận dụng thời điểm vàng và tránh lãng phí công sức cho những giao dịch không bao\n \ngiờ thành công.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Điều gì anh muốn nhất trong cái buổi nói chuyện ngày hôm nay?”\n \n“Ý anh là gì? Điều ấy có nghĩa là gì?”\n \n“Hầu hết mọi người không đạt được điều gì đó trong cuộc đời là vì họ không biết điều mình\n \ncần đạt là gì.”\n \n“Động lực nào khiến anh muốn đạt điều đó?”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Không chốt lúc đấy là không bao giờ chốt nữa.”\n \n“Việc ấy đúng là việc của em mà em làm hàng ngày rồi, anh yên tâm!”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Bài 25: Những sai lầm trong quy trình bán hàng giá cao</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Tóm tắt. Buổi học này dạy về triết lý bán hàng giá cao, nhấn mạnh rằng thành công không</h3>\n<p class=\"body-txt\">\nnằm ở việc thuyết trình hay quảng bá sản phẩm mà là ở kỹ năng hỏi và lắng nghe khách\n \nhàng. Người bán hàng phải đóng vai trò là &quot;Omni Learner&quot; (học hỏi đa kênh) và người\n \ntruyền cảm hứng, giúp khách hàng tự nhận diện vấn đề và cam kết đầu tư để vượt qua các\n \nrào cản. Mục tiêu cuối cùng là giúp khách hàng đi từ trạng thái hiện tại (A) đến trạng thái\n \nmong muốn (B), giải quyết các khó khăn (C), thông qua một kịch bản hỏi thay vì bán.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hai sai lầm phổ biến khi bán hàng:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Cãi nhau với khách hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Mê mẩn nói về sản phẩm của mình.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bán hàng giá cao KHÔNG NÓI VỀ SẢN PHẨM:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Khách hàng thường đã biết về sản phẩm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Khách hàng đủ thông minh để quyết định và lựa chọn sản phẩm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Không có bất kỳ thông tin nào liên quan đến sản phẩm trong kịch bản bán hàng giá cao.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Sai lầm ngu ngốc nhất là &quot;mê mẩn nói&quot;:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Trong bán hàng giá cao, 100% là hỏi và lắng nghe.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Người mua hàng giá cao là người thông minh, cần để họ nói.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Người bán hàng cần trở thành &quot;Omni learner&quot; (học đa kênh):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Học hỏi từ chính khách hàng bằng cách đặt câu hỏi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Vừa kiếm được tiền, vừa thu nạp kiến thức từ khách hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bán hàng không phải là bán hàng, mà là giúp đỡ người ta:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tìm ra vấn đề của khách hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Giúp khách hàng đi từ trạng thái hiện tại (A) sang trạng thái mong muốn (B) và vượt qua</span></div>\n<p class=\"body-txt\">\nrào cản (C).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Người bán hàng là người truyền cảm hứng để khách hàng vượt qua rào cản.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Kịch bản bán hàng giá cao chỉ có một từ khóa:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Đặt câu hỏi cốt lõi: &quot;Nếu tôi giúp ông rời khỏi A, tiến tới B, vượt qua C thì ông có sẵn sàng</span></div>\n<p class=\"body-txt\">\nchơi với tôi không?&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nếu khách hàng đồng ý, tiếp tục hỏi về mức độ đầu tư (&quot;Ông đầu tư bao nhiêu tiền?&quot;).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chiến lược Upsell và Downsell:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nếu khoản tiền đầu tư không đủ cho giải pháp lớn mong muốn (B1), đề xuất đầu tư</span></div>\n<p class=\"body-txt\">\nthêm để đạt được kết quả tốt hơn (Upsell).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nếu không bán được gói lớn, có thể bán gói nhỏ hơn (Downsell).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nếu downsell cũng không được và khách hàng vẫn không mua, thì cho họ đi về hoặc</span></div>\n<p class=\"body-txt\">\ngiúp họ cái nhỏ nhỏ mà không lấy tiền (nhưng có giới hạn).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tóm lại: Toàn bộ quá trình là hỏi, nghe và ghi chép, biến nó thành một cuộc nói chuyện,</span></div>\n<p class=\"body-txt\">\nkhông có quy trình bán hàng truyền thống.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bán hàng giá cao không phải là bán sản phẩm, mà là hỏi và giúp đỡ khách hàng giải</span></div>\n<p class=\"body-txt\">\nquyết vấn đề: Đây là một sự chuyển dịch tư duy cốt lõi. Thay vì tập trung vào việc thuyết\n \ntrình về tính năng sản phẩm, người bán hàng chuyển sang vai trò của một cố vấn, người\n \ngiải quyết vấn đề. Điều này quan trọng vì nó xây dựng lòng tin, sự kết nối sâu sắc với\n \nkhách hàng (đặc biệt là khách hàng thông minh mua sản phẩm/dịch vụ giá cao), và định\n \nvị người bán hàng như một đối tác chiến lược thay vì một người chào hàng đơn thuần.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Người bán hàng cần trở thành &quot;Omni Learner&quot; và người truyền cảm hứng: Việc liên tục</span></div>\n<p class=\"body-txt\">\nhỏi và học hỏi từ khách hàng giúp người bán hàng không chỉ thu thập thông tin giá trị để\n \ncá nhân hóa giải pháp mà còn thể hiện sự tôn trọng và khả năng thấu hiểu. Khi khách\n \nhàng cảm thấy được lắng nghe và hiểu rõ, họ sẽ cởi mở hơn. Vai trò &quot;truyền cảm hứng&quot;\n \ngiúp khách hàng vượt qua nỗi sợ hãi, sự trì hoãn và các rào cản tâm lý để cam kết với\n \ngiải pháp, thay vì chỉ đơn thuần chấp nhận một giao dịch.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Kịch bản cốt lõi: &quot;Nếu tôi giúp ông rời khỏi A, tiến tới B, vượt qua C thì ông có sẵn sàng</span></div>\n<p class=\"body-txt\">\nchơi với tôi không?&quot; Đây là một công thức hành động vô cùng mạnh mẽ và thực tế. Nó\n \ntrực tiếp đi vào nỗi đau (A), mong muốn (B) và thách thức (C) của khách hàng, đồng thời\n \nthăm dò mức độ sẵn sàng cam kết của họ. Câu hỏi này biến quá trình bán hàng phức tạp\n \nthành một lời đề nghị hợp tác rõ ràng, tạo nền tảng cho việc thảo luận về đầu tư (giá cả)\n \nmột cách tự nhiên và logic, thay vì phải &quot;đẩy&quot; sản phẩm.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Bán hàng giá cao 100% là chỉ có ngồi hỏi thôi.”\n \n“Ngu gì mà nói!”\n \n“Nếu tôi giúp ông rời khỏi A, tiến tới B, vượt qua C thì ông có sẵn sàng chơi với tôi không?”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Bài 26: Xác thực và hẹn gặp khách hàng trong Sales Success System</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Tóm tắt. Buổi học tập trung vào việc xây dựng một &quot;Sales Success System&quot; hiệu quả để tối</h3>\n<p class=\"body-txt\">\nưu hóa quy trình bán hàng và giữ chân nhân viên. Cốt lõi là áp dụng bước &quot;Qualifying&quot; khách\n \nhàng xuyên suốt để không lãng phí công sức, đồng thời xây dựng một hệ thống làm đòn bẩy.\n \nHệ thống tốt sẽ giúp nhân viên &quot;làm ít hưởng nhiều&quot;, cho phép họ chuyên môn hóa vào từng\n \nloại hình bán hàng (giá cao hoặc số lượng lớn), từ đó tăng năng suất và đảm bảo sự phát\n \ntriển bền vững cho doanh nghiệp.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Sales Success System (Hệ thống thành công trong bán hàng): Bao gồm 8 bước quy trình</span></div>\n<p class=\"body-txt\">\ncơ bản và thêm một bước &quot;ngôi sao&quot; rất quan trọng là &quot;Qualifying&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bước Qualifying (Xác thực khách hàng):</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Là quá trình xác thực xem khách hàng có phải là khách hàng thật, đủ tiêu chí và điều</span></div>\n<p class=\"body-txt\">\nkiện (ví dụ: có đủ tiền mua sản phẩm) hay không.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bước này phải được thực hiện xuyên suốt tất cả các giai đoạn của quy trình bán hàng (từ</span></div>\n<p class=\"body-txt\">\ntạo danh sách tiềm năng, hẹn gặp, xây dựng mối quan hệ, tìm hiểu nhu cầu cho đến trình\n \nbày sản phẩm).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Mục tiêu: Loại bỏ khách hàng không tiềm năng càng sớm càng tốt để không lãng phí thời</span></div>\n<p class=\"body-txt\">\ngian và công sức.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tầm quan trọng của System (Hệ thống):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hệ thống là yếu tố quyết định sự thành công của doanh nghiệp và việc giữ chân nhân</span></div>\n<p class=\"body-txt\">\nviên, không phải địa điểm hay mức hoa hồng cao.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Một hệ thống tốt là &quot;đòn bẩy&quot;: Nó giúp nhân viên nỗ lực 1 nhưng đạt được kết quả gấp</span></div>\n<p class=\"body-txt\">\nnhiều lần (ví dụ: 1 được 2, thậm chí 10).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nếu hệ thống không tốt, nỗ lực 1 chỉ mang lại 0.5 hoặc ít hơn, khiến nhân viên nản lòng</span></div>\n<p class=\"body-txt\">\nvà rời đi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">&quot;Ai cũng muốn làm ít hưởng nhiều&quot;, và một hệ thống mạnh mẽ sẽ giúp nhân viên đạt</span></div>\n<p class=\"body-txt\">\nđược điều này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hệ thống bán hàng là &quot;lõi lớn nhất&quot; trong doanh nghiệp, quyết định khả năng bán được</span></div>\n<p class=\"body-txt\">\nhàng và sự thành công chung.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hai chiến lược bán hàng chính:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bán hàng giá cao (High-ticket sales): Dành cho &quot;siêu nhân bán hàng&quot;, những người có</span></div>\n<p class=\"body-txt\">\nkhả năng vượt trội, đòi hỏi sự chuẩn bị kỹ lưỡng về trang phục, lời nói, cử chỉ, mối quan\n \nhệ và hình ảnh trên mạng xã hội.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bán hàng giá nhiều (High-volume sales): Bán số lượng lớn sản phẩm (hàng chục ngàn</span></div>\n<p class=\"body-txt\">\nsản phẩm) cho khách hàng. Có thể áp dụng cho cả &quot;tay mơ&quot; (nhân viên mới/ít kinh\n \nnghiệm).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tối ưu hóa quy trình bán hàng bằng cách phân chia công việc theo hệ thống:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Marketing: Chịu trách nhiệm tạo danh sách khách hàng tiềm năng (list).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nhân viên &quot;tay mơ&quot; (mới/ít kinh nghiệm): Phụ trách bước &quot;hẹn gặp&quot; vì bước này</span></div>\n<p class=\"body-txt\">\nthường tốn công sức mà hiệu quả ban đầu thấp, dễ gây nản cho nhân viên giỏi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nhân viên sales &quot;cao thủ&quot;: Xử lý bước chốt sales.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nhân viên sales &quot;siêu nhân&quot;: Thực hiện bán hàng giá cao.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Cách phân chia này giúp giảm 50% công suất cho mỗi nhân viên, tăng khả năng xử lý từ</span></div>\n<p class=\"body-txt\">\n10 khách lên 30-40 khách/ngày.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Lọc và phát triển nhân viên trong hệ thống:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hệ thống cho phép lọc nhân viên: Người giỏi sẽ được đẩy xuống các công việc khó hơn,</span></div>\n<p class=\"body-txt\">\nđòi hỏi kỹ năng cao hơn (chốt sale, bán giá cao).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Người không giỏi (hoặc không phù hợp) sẽ được thải ra ngoài hoặc chuyển sang các vị</span></div>\n<p class=\"body-txt\">\ntrí khác phù hợp với năng lực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Mục tiêu là có một hệ thống để huấn luyện &quot;tay mơ&quot; song song với việc phát triển &quot;siêu</span></div>\n<p class=\"body-txt\">\nnhân&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Công việc đầu tiên là xây dựng hệ thống (build system).</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">★ Điểm quan trọng nhất</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hệ thống (System) là yếu tố quyết định sự thành công và giữ chân nhân viên, không phải</span></div>\n<p class=\"body-txt\">\nmức lương hay địa điểm: Diễn giả nhấn mạnh rằng việc tăng hoa hồng hay thay đổi địa\n \nđiểm không giải quyết được gốc rễ vấn đề nếu hệ thống kinh doanh không giúp nhân\n \nviên làm việc hiệu quả. Một hệ thống tốt sẽ nhân đôi/nhân mười công sức của họ, khiến\n \nhọ &quot;làm ít hưởng nhiều&quot;, từ đó họ sẽ gắn bó lâu dài. Điều này thay đổi quan điểm quản\n \nlý, tập trung vào việc tạo ra môi trường làm việc hiệu quả thông qua quy trình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Việc &quot;qualify&quot; (xác thực) khách hàng phải được thực hiện xuyên suốt các bước bán hàng:</span></div>\n<p class=\"body-txt\">\nDiễn giả chỉ ra rằng lãng phí thời gian và công sức vào những khách hàng không tiềm\n \nnăng là một sai lầm lớn. Bằng cách sàng lọc và loại bỏ khách hàng không phù hợp ngay\n \ntừ đầu hoặc ở bất kỳ giai đoạn nào của quy trình, doanh nghiệp tối ưu hóa nguồn lực cho\n \nnhững khách hàng có khả năng chuyển đổi cao nhất, giúp tăng hiệu suất tổng thể của đội\n \nngũ bán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tối ưu hóa hệ thống bán hàng bằng cách phân chia công việc theo năng lực và hiệu quả</span></div>\n<p class=\"body-txt\">\ntừng bước: Thay vì để một nhân viên làm toàn bộ quy trình từ đầu đến cuối (dễ gây nản\n \nlòng ở các bước hiệu quả thấp), hệ thống phân chia rõ ràng: Marketing tạo lead, &quot;tay\n \nmơ&quot; xử lý hẹn gặp, &quot;cao thủ&quot; chốt sales, &quot;siêu nhân&quot; bán giá cao. Cách tiếp cận này giúp\n \ngiảm tải, tăng năng suất từng cá nhân và tổng thể, đồng thời tạo lộ trình phát triển và\n \nđào tạo nhân viên hiệu quả hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Cái điều quan trọng nhất ở đây là cái system.”\n \n“System mình ngon thì nó nỗ lực một nó được 10. System mình không ngon nó nỗ lực một nó\n \nđược có hai được 0,5 thì nó bỏ nó đi.”\n \n“Ai cũng muốn làm ít hưởng nhiều.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Bài 27: Xây dựng hệ thống con người</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Tóm tắt. Buổi học này tập trung vào việc xây dựng hệ thống con người tinh nhuệ trong bán</h3>\n<p class=\"body-txt\">\nhàng, nhấn mạnh rằng đào tạo chính là lãnh đạo. Để đạt được doanh số cao và bền vững,\n \ndoanh nghiệp cần có một hệ thống tuyển dụng và đào tạo mạnh mẽ, sàng lọc đội ngũ để giữ\n \nlại những &quot;sát thủ sale&quot; thực sự. Quan trọng nhất, bán hàng giá cao đòi hỏi khả năng dẫn dắt\n \nkhách hàng và phải xuất phát từ một tư duy đam mê, khát khao làm việc chứ không chỉ vì\n \ntiền bạc.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Công việc quan trọng không kém xây dựng system là xây dựng quy trình con người (hệ</span></div>\n<p class=\"body-txt\">\nthống con người).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Đầu tiên phải biết đào tạo cho hệ thống biết bán hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Đào tạo là lãnh đạo, bán hàng cũng là lãnh đạo; lãnh đạo ở đây có nghĩa là &quot;dẫn dắt&quot;</span></div>\n<p class=\"body-txt\">\n(lead).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bán hàng giá cao là &quot;dẫn dắt&quot;, bán hàng giá thấp là &quot;nghệ thuật theo đuổi&quot; (follow-up).</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nhóm khách hàng muốn bán hàng giá cao (nhóm 1) họ biết rõ họ muốn gì, còn nhóm</span></div>\n<p class=\"body-txt\">\nkhách hàng bán hàng giá thấp (nhóm 2) họ không biết họ muốn gì, nên cần giúp đỡ, vất\n \nvả hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Cần có hệ thống tuyển dụng nhân viên sale; tuyển dụng sale không khác gì bán hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Sau khi tuyển dụng hàng ngàn người, phải có hệ thống đào tạo.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Lúc khởi nghiệp hoặc bắt đầu kinh doanh, người chủ phải là người đào tạo.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Chương trình Sales Success System sẽ dạy 4 bước để tự tin đào tạo nhân viên sale.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Quá trình khởi nghiệp và đào tạo này vất vả.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Lãnh đạo là đào tạo; khi bạn bước lên vị trí đào tạo, những người khác sẽ dễ dàng theo</span></div>\n<p class=\"body-txt\">\nmình hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nếu chỉ quản lý bằng mệnh lệnh, nhân viên sẽ làm nhưng không vui; khi dẫn dắt, đào</span></div>\n<p class=\"body-txt\">\ntạo, huấn luyện, họ vừa có kết quả, vừa vui và yêu mến bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hệ thống tốt giúp nhân viên ở lại không chỉ vì hiệu quả mà còn vì mối quan hệ thân tình.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bán hàng phải có hệ thống để tạo đòn bẩy và đẩy mạnh kết quả (ví dụ như hệ thống bán</span></div>\n<p class=\"body-txt\">\nhàng của anh Hoài).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Để có hệ thống mạnh, cần con người tinh nhuệ; con người tinh nhuệ thì mới trả lương</span></div>\n<p class=\"body-txt\">\ncao được.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Quy tắc 50/50 trong tuyển dụng: tuyển 100 người, sa thải 50 người để giữ lại những</span></div>\n<p class=\"body-txt\">\nngười tinh nhuệ và tăng lương cho họ, khiến họ gắn bó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Áp dụng &quot;phễu&quot; tuyển dụng: bắt đầu với số lượng lớn, rồi dần dần sàng lọc theo quy tắc</span></div>\n<p class=\"body-txt\">\nchia đôi (100 -&gt; 50 -&gt; 25 -&gt; 12 -&gt; 6 -&gt; 3 -&gt; 1) để có được đội ngũ &quot;lính cực kỳ tinh nhuệ&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Hệ thống thu hút khách hàng cũng phải đi kèm với hệ thống thu hút nhân viên sale.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bên cạnh các yếu tố khác, Sales Success System còn huấn luyện về tư duy.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tư duy huấn luyện cho người bán hàng là rất quan trọng để họ trở thành &quot;sát thủ sale</span></div>\n<p class=\"body-txt\">\nthực sự&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">&quot;Sát thủ sale&quot; là những người đam mê, khát khao, bán hàng cả ngày đêm (ví dụ 1-2 giờ</span></div>\n<p class=\"body-txt\">\nsáng vẫn chốt đơn).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tiền bạc không đủ để thúc đẩy nhân viên làm việc 24/24; phải có một yếu tố mạnh mẽ</span></div>\n<p class=\"body-txt\">\nhơn từ bên trong (tư duy).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Để bán hàng giá cao, trước tiên phải học cách bán hàng giá nhiều (số lượng lớn).</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Lãnh đạo là đào tạo và dẫn dắt: Thay vì chỉ quản lý và ra lệnh, vai trò của người lãnh đạo</span></div>\n<p class=\"body-txt\">\ntrong bán hàng là dẫn dắt (lead) và huấn luyện nhân viên. Điều này quan trọng vì khi\n \nnhân viên được đào tạo và dẫn dắt, họ không chỉ đạt được kết quả mà còn cảm thấy vui\n \nvẻ, yêu mến công việc và gắn bó với công ty, tạo nên mối quan hệ thân tình thay vì chỉ\n \nlàm việc vì hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Xây dựng đội ngũ con người tinh nhuệ thông qua sàng lọc khắc nghiệt: Diễn giả nhấn</span></div>\n<p class=\"body-txt\">\nmạnh quy tắc 50/50 và mô hình &quot;phễu tuyển dụng&quot; (tuyển 100 người, sa thải 50, rồi tiếp\n \ntục sàng lọc) để tìm ra &quot;sát thủ sale&quot; thực sự. Điều này quan trọng vì việc tập trung vào\n \nchất lượng hơn số lượng, trả lương cao cho những người tinh nhuệ sẽ tạo ra hiệu suất\n \nvượt trội và một đội ngũ cốt lõi mạnh mẽ, bền vững hơn là có nhiều người kém hiệu quả.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Bán hàng giá cao đòi hỏi tư duy dẫn dắt, không phải theo đuổi: Đối với những khách</span></div>\n<p class=\"body-txt\">\nhàng có khả năng chi trả cao (biết rõ họ muốn gì), người bán hàng không nên chỉ &quot;theo\n \nđuổi&quot; (follow-up) mà phải &quot;dẫn dắt&quot; họ đến giải pháp tối ưu. Điều này quan trọng vì nó\n \nđịnh vị người bán hàng như một chuyên gia, người mang lại giá trị thực sự thay vì chỉ là\n \nngười cung cấp sản phẩm/dịch vụ, từ đó nâng cao giá trị và khả năng chốt sale giá cao.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Tư duy và khát khao là động lực cốt lõi vượt lên tiền bạc: Tiền bạc không thể khiến nhân</span></div>\n<p class=\"body-txt\">\nviên làm việc 24/24 giờ với sự đam mê. Thay vào đó, cần có một hệ thống huấn luyện tư\n \nduy để khơi dậy đam mê, khát khao và biến nhân viên thành những &quot;sát thủ sale&quot; thực\n \nsự. Điều này quan trọng vì nó đi sâu vào động lực nội tại, tạo ra sự cam kết và hiệu suất\n \nvượt trội mà các yếu tố vật chất đơn thuần không thể mang lại.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Đào tạo là lãnh đạo. Bán hàng cũng là lãnh đạo.”\n \n“Hôm nay tôi không bán cái gì cả, tôi chỉ dẫn dắt thôi thì đấy là bán hàng giá cao.”\n \n“Tiền bạc không thể giúp cho họ làm việc 24/24 giờ được. Vậy thì phải có cái điều gì đấy mạnh\n \nmẽ hơn ở bên trong.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Bài 28: Câu thần chú bán hàng giá nhiều</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Tóm tắt. Buổi giảng này tập trung vào hai nguyên tắc cốt lõi trong bán hàng: bán sản phẩm</h3>\n<p class=\"body-txt\">\ncó giá trị lớn và/hoặc số lượng lớn. Để đạt được mục tiêu này, đặc biệt là với số lượng lớn,\n \nviệc xây dựng một đội nhóm tuyệt vời là yếu tố then chốt. Diễn giả nhấn mạnh tầm quan\n \ntrọng của việc có hệ thống bán hàng và khẳng định &quot;cả hai&quot; (giá trị lớn và số lượng lớn) là\n \nmục tiêu tối thượng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nguyên tắc 1: Bán sản phẩm có giá trị lớn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nguyên tắc 2: Bán sản phẩm có số lượng lớn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Nguyên tắc 3: Bán cả sản phẩm có giá trị lớn và số lượng lớn (cả hai).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Để bán sản phẩm với số lượng lớn, cần có hệ thống bán hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Thần chú quan trọng: &quot;Tôi tạo ra một đội nhóm tuyệt vời xung quanh tôi.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Muốn bán được nhiều hàng, đặc biệt là bán hàng giá cao hoặc số lượng lớn, không thể</span></div>\n<p class=\"body-txt\">\nlàm một mình mà phải tổ chức đội nhóm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">&quot;Sales Success System&quot; (hệ thống bán hàng thành công) chính là đội nhóm.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">&quot;Tôi bán các sản phẩm có giá trị lớn và/hoặc số lượng lớn.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là kim chỉ nam định hướng chiến lược kinh doanh. Thay vì chỉ tập</span></div>\n<p class=\"body-txt\">\ntrung vào một yếu tố (giá trị cao hoặc số lượng lớn), việc kết hợp cả hai sẽ tối đa hóa\n \ntiềm năng doanh thu. Nó đặt ra hai hướng đi rõ ràng cho bất kỳ doanh nghiệp nào: tập\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><p class=\"body-txt\">\ntrung vào phân khúc cao cấp (giá trị lớn) hoặc mở rộng thị trường (số lượng lớn), hoặc\n \nlý tưởng nhất là làm cả hai.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">&quot;Tôi tạo ra một đội nhóm tuyệt vời xung quanh tôi.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f57f17\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là lời giải cho việc thực hiện các nguyên tắc trên. Dù bạn muốn</span></div>\n<p class=\"body-txt\">\nbán sản phẩm giá trị lớn hay số lượng lớn, hay cả hai, việc làm một mình là gần như bất\n \nkhả thi nếu muốn mở rộng. Đội nhóm không chỉ giúp tăng cường hiệu quả công việc mà\n \ncòn là yếu tố quyết định sự bền vững và khả năng mở rộng quy mô kinh doanh. Nó biến\n \nmột người bán hàng đơn lẻ thành một &quot;hệ thống&quot; kinh doanh.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f57f17\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Tôi bán các sản phẩm có giá trị lớn.”\n \n“Tôi bán các sản phẩm có số lượng lớn.”\n \n“Tôi tạo ra một đội nhóm tuyệt vời xung quanh tôi.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f57f17\"><div class=\"pg-inner\"><p class=\"body-txt\">\nLời kết\n \nHết khoá Bán Hàng Giá Cao. Đọc để LÀM, không phải để biết — biến mỗi bài học thành hành\n \nđộng cụ thể.\n</p></div></div>",
"<div class=\"pg pg-cover\" style=\"border-top:5px solid #f57f17\">\n  <div class=\"cover-wrap\">\n    <div class=\"cover-title\">Bán Hàng Giá Cao</div>\n    <div class=\"cover-sub\" style=\"color:#f57f17\">Học để ứng dụng · Áp dụng để thành công</div>\n    <div class=\"cover-tag\" style=\"color:#f57f17;margin-top:24px\">QNPA Pickleball Academy</div>\n  </div>\n</div>"];
const N=pages.length;
let cur=0;
const book=document.getElementById('book');
const fill=document.getElementById('progress-fill');
const info=document.getElementById('page-info');
const jump=document.getElementById('page-jump');
const btnP=document.getElementById('btn-prev');
const btnN=document.getElementById('btn-next');
function render(){
  book.innerHTML=pages[cur];
  fill.style.width=((cur+1)/N*100)+'%';
  info.textContent=(cur+1)+' / '+N;
  jump.value=cur+1;
  btnP.disabled=cur===0;
  btnN.disabled=cur===N-1;
  window.scrollTo(0,0);
}
function next(){if(cur<N-1){cur++;render();}}
function prev(){if(cur>0){cur--;render();}}
function goTo(n){cur=Math.max(0,Math.min(N-1,n));render();}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown')next();
  else if(e.key==='ArrowLeft'||e.key==='PageUp')prev();
});
render();
</script>
</body>
