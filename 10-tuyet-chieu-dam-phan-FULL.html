t là một &quot;tử huyệt&quot; và vũ khí đàm phán: Diễn giả chỉ ra rằng tiền mặt không chỉ</span></div>\n<p class=\"body-txt\">\nlà phương tiện trao đổi mà còn là một điểm yếu tâm lý (&quot;tử huyệt&quot;) đối với một số\n \nngười. Việc nhận diện được &quot;tử huyệt&quot; này ở đối tác và sử dụng tiền mặt một cách chiến\n \nlược có thể mang lại lợi thế quyết định trong đàm phán, biến một yếu tố tài chính thành\n \nmột công cụ tâm lý mạnh mẽ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Chứng tỏ sự sẵn sàng và khả năng thanh toán để chiếm ưu thế: Điểm mấu chốt không chỉ</span></div>\n<p class=\"body-txt\">\nlà *có* tiền, mà là *cho đối tác thấy* bạn có tiền và sẵn sàng chi trả. Điều này tạo ra sự\n \ntin cậy, an tâm và làm đối tác ưu tiên bạn hơn các đối thủ. Nó khẳng định bạn là một đối\n \ntác nghiêm túc, có tiềm lực và có khả năng thực hiện cam kết, giúp đẩy nhanh quá trình\n \nra quyết định và đi đến thỏa thuận.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">&quot;Cash is King&quot; - Tiền mặt là một loại quyền lực: Câu nói này gói gọn tinh thần của toàn bộ</span></div>\n<p class=\"body-txt\">\nbuổi giảng. Tiền mặt không chỉ là một tài sản mà còn là biểu tượng của quyền lực, sự ổn\n \nđịnh và khả năng hành động. Khi đối tác cảm nhận được quyền lực này từ phía bạn, họ\n \nsẽ dễ dàng hợp tác hơn, giảm bớt sự nghi ngờ và thúc đẩy quá trình đàm phán đi đến\n \nthỏa thuận một cách nhanh chóng và dễ dàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Tiền mặt là một trong những cái tử huyệt của một số người.”\n \n“Hãy cho họ thấy tiền và bạn cũng có thể dễ dàng chiến thắng.”\n \n“Cash is King, tiền mặt là vua.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Bài 26: Sự tử tế</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Tóm tắt. Buổi giảng này giới thiệu &quot;sự tử tế&quot; là một vũ khí quan trọng trong kinh doanh và</h3>\n<p class=\"body-txt\">\ncuộc sống. Diễn giả giải thích khái niệm &quot;tài khoản tình cảm&quot; cần được tích lũy bằng những\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">hành động tử tế không điều kiện đối với đối tác, khách hàng và cả những người xung quanh.</h3>\n<p class=\"body-txt\">\nMục tiêu là tạo dựng mối quan hệ thân tình, khiến người khác nợ mình về mặt tình cảm để\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><p class=\"body-txt\">\nthuận lợi hơn trong đàm phán và giao dịch. Buổi học cũng nhấn mạnh đây là một chiến lược\n \ndài hạn theo nguyên tắc &quot;cho đi là người chiến thắng&quot; và &quot;gieo gì gặt nấy&quot;.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Vũ khí tiếp theo trong kinh doanh là &quot;sự tử tế&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Khái niệm &quot;tài khoản tình cảm&quot;: nơi chúng ta gửi vào đó những tình cảm của mình và sẽ</span></div>\n<p class=\"body-txt\">\nsử dụng khi cần.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ở đối tác, chúng ta cũng cần tạo ra một &quot;tài khoản tình cảm&quot; và theo thời gian cứ bỏ dần</span></div>\n<p class=\"body-txt\">\nvào đó những khoản tình cảm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Khi đến thời điểm đàm phán diễn ra, ta sẽ sử dụng những &quot;khoản tình cảm&quot; đã tích lũy</span></div>\n<p class=\"body-txt\">\nđó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Hãy mời đối tác của bạn đến những bữa tiệc thân tình, những nơi thân tình, giúp họ</span></div>\n<p class=\"body-txt\">\nnhững việc tốt khác trong gia đình và không cần điều kiện nào cả, ngay cả khi không liên\n \nquan đến đàm phán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Đây là một chiến lược có tên gọi là &quot;Give &amp; Win&quot; – người cho đi là người chiến thắng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Mục tiêu là xây dựng mối quan hệ thật thân tình để tạo ra tình cảm đối với đối tác thông</span></div>\n<p class=\"body-txt\">\nqua sự tử tế.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Nên đọc cuốn sách &quot;Sức mạnh của sự tử tế&quot; vì tử tế sẽ đem đến công việc kinh doanh</span></div>\n<p class=\"body-txt\">\nthuận lợi hơn, đàm phán cũng sẽ dễ dàng hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tất cả những điều cần làm là cho người ta nợ bạn về mặt tình cảm (ví dụ: mời ăn một</span></div>\n<p class=\"body-txt\">\nbữa, một kỳ nghỉ, một khách sạn 5 sao, một chuyến bay hạng nhất).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Đây chỉ là sự đầu tư; nếu bạn cho càng nhiều thì bạn sẽ càng nhận được nhiều.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bạn gieo gì thì bạn sẽ gặt nấy: nếu bạn cho đi sự tử tế, bạn sẽ nhận lại được sự tử tế.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Đây là một chiến lược không phải ngắn hạn mà cần được thực hành lâu dài trong cuộc</span></div>\n<p class=\"body-txt\">\nđời.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Kết quả ngày hôm nay có thể chưa diễn ra, nhưng gieo mùa này bạn sẽ chắc chắn nhận</span></div>\n<p class=\"body-txt\">\nvào mùa sau; gieo ít chắc chắn sẽ gặt được nhiều.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tích lũy &quot;tài khoản tình cảm&quot; ở đối tác bằng sự tử tế vô điều kiện: Điều này cực kỳ quan</span></div>\n<p class=\"body-txt\">\ntrọng vì nó chuyển đổi mối quan hệ từ giao dịch thuần túy sang mối quan hệ cá nhân sâu\n \nsắc hơn. Khi đối tác cảm thấy &quot;nợ&quot; bạn về mặt tình cảm, họ sẽ có xu hướng hợp tác và\n \nthiện chí hơn trong các giao dịch kinh doanh, giúp việc đàm phán trở nên dễ dàng và\n \nthuận lợi hơn nhiều. Nó tạo ra một nền tảng vững chắc cho sự hợp tác lâu dài.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sự tử tế là một chiến lược &quot;Give &amp; Win&quot; dài hạn: Diễn giả nhấn mạnh rằng &quot;người cho đi</span></div>\n<p class=\"body-txt\">\nlà người chiến thắng&quot; và đây không phải là chiêu trò ngắn hạn mà là một triết lý sống và\n \nkinh doanh. Việc thực hành tử tế một cách kiên trì và bền bỉ sẽ mang lại những lợi ích to\n \nlớn, không chỉ trong kinh doanh mà còn trong cuộc sống cá nhân, theo nguyên tắc &quot;gieo\n \ngì gặt nấy&quot;. Điều này xây dựng uy tín và thương hiệu cá nhân bền vững, thu hút những\n \nmối quan hệ chất lượng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Trích dẫn</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Tất cả những điều cần làm là cho người ta nợ bạn về mặt tình cảm.”\n \n“Người cho đi là người chiến thắng.”\n \n“Bạn gieo gì thì bạn sẽ gặt nấy.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Bài 27: Bảo hành</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Tóm tắt. Buổi giảng tập trung vào tầm quan trọng của việc sử dụng &quot;bảo hành&quot; và &quot;bảo</h3>\n<p class=\"body-txt\">\nđảm&quot; như những vũ khí đàm phán hiệu quả, thay vì chỉ tập trung vào giá. Diễn giả nhấn\n \nmạnh rằng phần lớn khách hàng (82%) quan tâm đến các điều kiện khác chứ không chỉ giá.\n \nViệc đưa ra các cam kết về bảo hành và bảo đảm giúp khách hàng tin tưởng hơn, giảm sự tập\n \ntrung vào giá và làm cho quá trình đàm phán trở nên dễ dàng, chuyên nghiệp hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Hầu hết khách hàng không chỉ quan tâm đến giá; nhiều người quan tâm đến các điều</span></div>\n<p class=\"body-txt\">\nkiện khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Theo thống kê, chỉ có 18% khách hàng quan tâm *chỉ* đến giá.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Đưa thêm điều kiện bảo hành và bảo đảm vào đàm phán sẽ đem lại kết quả tốt hơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bảo hành: Sản phẩm/dịch vụ được chạy và thực hiện đúng chức năng của nó (ví dụ: bảo</span></div>\n<p class=\"body-txt\">\nhành sản phẩm 1 năm thay vì 3 năm).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bảo đảm: Cam kết chắc chắn sản phẩm/dịch vụ sẽ làm được điều đã hứa; nếu không làm</span></div>\n<p class=\"body-txt\">\nđược thì sẽ hoàn trả sản phẩm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Khi có sự đảm bảo chắc chắn như vậy, khách hàng sẽ ít quan tâm hơn đến giá thành sản</span></div>\n<p class=\"body-txt\">\nphẩm/dịch vụ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Nhu cầu của khách hàng chắc chắn được thực hiện trong tương lai sẽ giúp họ dễ dàng</span></div>\n<p class=\"body-txt\">\nđàm phán hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Nếu chỉ đàm phán về giá, đó là một nhà đàm phán không chuyên nghiệp.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bảo hành và bảo đảm giúp khách hàng tin tưởng hơn, từ đó công việc đàm phán trở nên</span></div>\n<p class=\"body-txt\">\ndễ dàng hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Thống kê &quot;18% khách hàng chỉ quan tâm đến giá&quot;: Đây là một insight đắt giá vì nó thách</span></div>\n<p class=\"body-txt\">\nthức suy nghĩ phổ biến rằng giá là yếu tố quyết định hàng đầu trong đàm phán. Nó mở ra\n \nmột góc nhìn mới, khuyến khích các nhà đàm phán chuyển trọng tâm từ cuộc chiến về\n \ngiá sang việc xây dựng giá trị và sự an tâm cho khách hàng, từ đó tạo ra lợi thế cạnh\n \ntranh bền vững.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Khái niệm rõ ràng về &quot;Bảo hành&quot; và &quot;Bảo đảm&quot; và tác động của chúng: Diễn giả phân biệt</span></div>\n<p class=\"body-txt\">\nrõ ràng hai khái niệm và chỉ ra cách chúng tạo ra sự chắc chắn cho khách hàng (sản\n \nphẩm/dịch vụ hoạt động đúng chức năng và chắc chắn đạt được kết quả cam kết, kèm\n \ntheo hoàn trả nếu không đạt). Điều này quan trọng vì nó cung cấp công cụ cụ thể để xây\n \ndựng niềm tin, giúp khách hàng cảm thấy an toàn hơn khi ra quyết định và do đó giảm\n \nbớt sự nhạy cảm về giá.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tuyên bố &quot;chỉ đàm phán về giá là một nhà đàm phán không chuyên nghiệp&quot;: Đây là một</span></div>\n<p class=\"body-txt\">\nlời nhắc nhở mạnh mẽ và quan trọng. Nó không chỉ là một lời phê bình mà còn là một\n \nđộng lực để các nhà đàm phán nâng cao kỹ năng và tư duy. Việc áp dụng các chiến lược\n \nnhư bảo hành/bảo đảm giúp định vị người bán là một chuyên gia thực sự, người không\n \nchỉ bán sản phẩm/dịch vụ mà còn bán sự yên tâm và giá trị lâu dài.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Theo thống kê, có 18% khách hàng quan tâm chỉ quan tâm đến giá.”\n \n“Hãy luôn nhớ rằng nếu chỉ đàm phán về giá thì đó là một nhà đàm phán không chuyên\n \nnghiệp.”\n \n“Bảo hành và bảo đảm giúp khách hàng tin tưởng bạn hơn và công việc đàm phán trở nên dễ\n \ndàng hơn.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Bài 28: Phong thủy</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Tóm tắt. Buổi học này giới thiệu một &quot;vũ khí&quot; đàm phán vô cùng đơn giản nhưng hiệu quả</h3>\n<p class=\"body-txt\">\ncao: sử dụng các yếu tố phong thủy và niềm tin tâm linh của đối tác. Bằng cách tìm hiểu và\n \nkhéo léo vận dụng thông tin về tuổi, mệnh, hướng, hoặc thời điểm hoàng đạo của đối tác,\n \nchúng ta có thể tạo ra sự đồng thuận, niềm tin và tình cảm tích cực. Mục đích là để quá trình\n \nđàm phán trở nên dễ dàng, hiệu quả và đạt được kết quả mong muốn, không nhất thiết phải\n \ntự mình tin vào những yếu tố đó mà là biết cách tận dụng niềm tin của người khác.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Giới thiệu &quot;phong thủy&quot; (hoặc những niềm tin tương tự) là một &quot;vũ khí&quot; đàm phán vô</span></div>\n<p class=\"body-txt\">\ncùng đơn giản nhưng hiệu quả cao, dựa trên niềm tin của mọi người.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ứng dụng qua &quot;tuổi&quot; để tạo sự đồng thuận:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Hỏi tuổi đối tác để tìm kiếm sự kết nối.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Nếu tuổi đối tác chênh lệch với mình 4, 8, 12 tuổi (là bội số của 4), họ thuộc nhóm &quot;tam</span></div>\n<p class=\"body-txt\">\nhợp&quot; với mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sử dụng câu nói &quot;Ồ, anh/chị đúng là người tam hợp với tôi!&quot; để tạo niềm tin và tình cảm</span></div>\n<p class=\"body-txt\">\ntích cực, giúp việc đàm phán dễ dàng hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ứng dụng qua &quot;mệnh&quot; (ngũ hành) để thúc đẩy hợp tác:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tìm hiểu mệnh của mình và đối tác (ví dụ: Thổ - Hỏa sinh Thổ, Thổ - Kim Thổ sinh Kim).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Nhấn mạnh mối quan hệ tương sinh/hợp để nói về sự hợp tác tuyệt vời và có lợi cho cả</span></div>\n<p class=\"body-txt\">\nhai bên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ứng dụng qua &quot;hướng&quot; trong bán hàng (ví dụ bán nhà):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Khi bán một món hàng lớn như nhà cửa, hỏi tuổi khách hàng để tra cứu hướng hợp.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Nếu hướng của sản phẩm (ví dụ: hướng Tây Bắc của căn nhà) hợp với tuổi/mệnh khách</span></div>\n<p class=\"body-txt\">\n(ví dụ: người Tây Tứ Trạch), nhấn mạnh yếu tố này để tạo sự phù hợp và tin tưởng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ứng dụng qua &quot;ngày/giờ hoàng đạo&quot; để đàm phán:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sử dụng niềm tin về &quot;ngày hoàng đạo, giờ hoàng đạo&quot; để tạo sự tự tin và thuyết phục</span></div>\n<p class=\"body-txt\">\nrằng đàm phán vào thời điểm đó sẽ mang lại nhiều lợi nhuận và kết quả tốt đẹp.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Khẳng định rằng có thể kết hợp rất nhiều yếu tố niềm tin và phong thủy khác nhau để hỗ</span></div>\n<p class=\"body-txt\">\ntrợ quá trình đàm phán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ví dụ cá nhân của diễn giả: Đối tác dẫn đến một vùng &quot;địa linh nhân kiệt&quot; và thắp hương</span></div>\n<p class=\"body-txt\">\ntrước khi đàm phán, tạo ra một hợp đồng rất tuyệt vời nhờ những yếu tố linh thiêng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Kết luận: &quot;Vũ khí&quot; này cực kỳ vui và hiệu quả, cần luyện tập và sử dụng hằng ngày.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">&quot;Luyện tập sẽ có kết quả tốt hơn là chỉ ngồi đó.&quot;</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tận dụng niềm tin của đối tác như một công cụ đàm phán, không nhất thiết phải tin</span></div>\n<p class=\"body-txt\">\ntưởng tuyệt đối vào nó: Diễn giả nhấn mạnh rằng phong thủy hay các yếu tố tâm linh là\n \n&quot;những cái niềm tin nào đó của mọi người&quot;. Điều quan trọng là nhận biết và khéo léo vận\n \ndụng những niềm tin này để tạo ra sự đồng điệu và thiện cảm, chứ không phải bản thân\n \nngười sử dụng phải tin một cách mù quáng. Điều này giúp biến một khía cạnh văn hóa\n \nthành một chiến lược tâm lý hiệu quả trong kinh doanh, mở rộng khả năng áp dụng cho\n \nnhiều đối tượng và tình huống khác nhau.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tạo sự đồng thuận và tình cảm tích cực ngay từ những bước đầu tiên của đàm phán:</span></div>\n<p class=\"body-txt\">\nViệc tìm ra điểm chung (như &quot;tam hợp&quot; về tuổi, &quot;tương sinh&quot; về mệnh, hay &quot;hợp hướng&quot;\n \nnhà) và thể hiện sự vui mừng về điều đó (&quot;Ồ, thật tuyệt vời!&quot;) giúp xây dựng mối quan\n \nhệ ban đầu vững chắc. Một khi đối tác cảm thấy được kết nối, tin tưởng và có thiện cảm,\n \nquá trình đàm phán sẽ diễn ra thuận lợi hơn rất nhiều, giảm bớt sự đề phòng và tăng\n \nkhả năng hợp tác. Đây là chìa khóa để vượt qua các rào cản ban đầu và thiết lập nền tảng\n \ncho một giao dịch thành công.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Cá nhân hóa và thể hiện sự quan tâm sâu sắc đến đối tác: Việc chủ động tìm hiểu các yếu</span></div>\n<p class=\"body-txt\">\ntố cá nhân như tuổi, mệnh, hoặc các niềm tin khác của đối tác cho thấy sự chuẩn bị kỹ\n \nlưỡng và quan tâm đến họ không chỉ ở khía cạnh công việc mà còn cả đời sống tinh thần.\n \nĐiều này tạo ra ấn tượng mạnh mẽ về một đối tác chu đáo và đáng tin cậy. Trong bối\n \ncảnh kinh doanh B2B, việc làm cho khách hàng cảm thấy được trân trọng và thấu hiểu là\n \nyếu tố cực kỳ quan trọng để xây dựng mối quan hệ bền vững và chốt các hợp đồng lớn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Vũ khí vô cùng đơn giản nhưng có tính hiệu quả cao.”\n \n“Phong thủy hoặc đại loại như vậy, nó tức là những cái niềm tin nào đó của mọi người vào một\n \nthứ nào đó.”\n \n“Luyện tập sẽ có kết quả tốt hơn là chỉ ngồi đó.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Bài 29: Phương tiện</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Tóm tắt. Buổi giảng này giới thiệu &quot;phương tiện sang trọng&quot; như một vũ khí đàm phán</h3>\n<p class=\"body-txt\">\nmạnh mẽ. Mục tiêu là sử dụng những dịch vụ hoặc vật chất cao cấp (như xe sang, vé máy bay\n \nhạng nhất, khách sạn sang trọng) để tạo sự thoải mái, thay đổi tích cực cảm xúc của đối tác,\n \ntừ đó giúp quá trình đàm phán trở nên dễ dàng và thuận lợi hơn. Diễn giả nhấn mạnh việc\n \nkết hợp chiến lược này với các chiến lược đàm phán khác để đạt hiệu quả tối đa.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#f9a825\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Giới thiệu &quot;phương tiện sang trọng&quot; là một vũ khí đàm phán tiếp theo, có thể nhiều</span></div>\n<p class=\"body-txt\">\nngười chưa từng dùng hoặc dùng mà không biết hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Nhấn mạnh việc kết hợp vũ khí này với những chiến lược đã học để tạo nên sức mạnh</span></div>\n<p class=\"body-txt\">\ntuyệt vời trong đàm phán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Các ví dụ về &quot;phương tiện sang trọng&quot;:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Mời đối tác đến nơi đàm phán bằng xe Limousine.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Đón đối tác ở sân bay bằng xe sang trọng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Mời đối tác bay đến bằng vé hạng nhất.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Diễn giả kể câu chuyện trải nghiệm cá nhân: Khi đi công tác Kenya, đối tác đã tự động</span></div>\n<p class=\"body-txt\">\nnâng hạng vé máy bay từ Economy lên Business ở chặng cuối. Sau đó đón diễn giả bằng\n \nxe sang và đưa về khách sạn sang trọng trước khi bước vào đàm phán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Kết quả của những hành động này là &quot;tình cảm của tôi dành cho họ đã bị thay đổi&quot;, làm</span></div>\n<p class=\"body-txt\">\ncho &quot;việc đàm phán đã trở nên dễ dàng hơn&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Lời khuyên: Đừng ngần ngại sử dụng những phương tiện sang trọng để làm cho khách</span></div>\n<p class=\"body-txt\">\nhàng/đối tác thoải mái hơn trước khi đàm phán.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tác động cảm xúc trước khi đàm phán: Việc sử dụng các phương tiện sang trọng không</span></div>\n<p class=\"body-txt\">\nchỉ là thể hiện sự giàu có mà còn là một chiến lược tâm lý mạnh mẽ. Nó trực tiếp thay đổi\n \ncảm xúc của đối tác (từ &quot;ngạc nhiên&quot; đến &quot;tình cảm bị thay đổi&quot;), tạo ra sự thoải mái,\n \nthiện cảm và cảm giác được tôn trọng. Điều này đặt nền móng thuận lợi cho cuộc đàm\n \nphán, làm cho đối tác cởi mở và dễ chấp nhận hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Đầu tư chiến lược vào trải nghiệm đối tác: Đây là một khoản đầu tư có chủ đích vào trải</span></div>\n<p class=\"body-txt\">\nnghiệm của đối tác trước khi bất kỳ cuộc thảo luận nào về hợp đồng diễn ra. Bằng cách\n \nnâng cao sự thoải mái và giá trị mà đối tác cảm nhận được, bạn tạo ra một lợi thế vô\n \nhình, giảm bớt sự cứng nhắc và đề kháng trong quá trình đàm phán chính thức, từ đó\n \ngiúp đạt được mục tiêu dễ dàng hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Những cái phương tiện sang trọng này là cái vũ khí được sử dụng trong đàm phán.”\n \n“Chính vì vậy, họ đã làm cho tôi phải tình cảm của tôi dành cho họ đã bị thay đổi. Cho nên cái\n \nviệc đàm phán đã trở nên dễ dàng hơn.”\n \n“Đừng ngần ngại sử dụng những phương tiện sang trọng để làm cho khách hàng của bạn\n \nthoải mái hơn trước khi chúng ta bước vào đàm phán.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Bài 30: Địa điểm</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Tóm tắt. Buổi học này tập trung vào việc sử dụng &quot;địa điểm trung gian&quot; như một vũ khí</h3>\n<p class=\"body-txt\">\nchiến lược trong đàm phán để tạo ra môi trường hợp tác và tối ưu hóa lợi thế. Diễn giả giới\n \nthiệu hai địa điểm cụ thể là sảnh khách sạn 5 sao và sân bay, phân tích cách chúng giúp san\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><p class=\"body-txt\">\nbằng lợi thế &quot;sân nhà&quot;, tạo áp lực thời gian tâm lý lên đối tác và thể hiện thiện chí của người\n \nđàm phán. Mục tiêu là biến địa điểm thành một công cụ chủ động để đạt được kết quả đàm\n \nphán mong muốn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Địa điểm trung gian là một &quot;vũ khí&quot; trong đàm phán: Giúp tạo ra một môi trường hợp</span></div>\n<p class=\"body-txt\">\ntác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sử dụng sảnh khách sạn 5 sao:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Là một nơi tuyệt vời để đàm phán, thể hiện sự chuyên nghiệp.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Chi phí nước, cà phê có thể đắt hơn, nhưng nếu tính cả tiền thuê sảnh họp thì tổng thể lại</span></div>\n<p class=\"body-txt\">\nrẻ hơn nhiều lần.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sử dụng sân bay:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Là nơi trung gian lý tưởng để tham gia đàm phán.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tránh mất lợi thế sân nhà: Khi đến sân bay của đối tác (gần địa điểm của họ), ta tránh</span></div>\n<p class=\"body-txt\">\nviệc phải vào văn phòng của họ, điều này có thể khiến ta cảm thấy mất lợi thế. Địa điểm\n \ntrung gian tạo cảm giác thân thiện cho cả hai bên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tạo áp lực thời gian: Đặt vé máy bay khứ hồi với thời gian giới hạn (ví dụ: chỉ có 2 giờ</span></div>\n<p class=\"body-txt\">\nlàm việc), thông báo rõ ràng về khung thời gian này cho đối tác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Quyền lực về thời gian: Thực tế, người đàm phán không có áp lực thời gian, nhưng việc</span></div>\n<p class=\"body-txt\">\ntạo ra *cảm giác* áp lực thời gian cho đối tác sẽ khiến họ muốn kết thúc đàm phán sớm,\n \ngiúp người đàm phán giành lợi thế.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sử dụng vé hạng nhất (First-class):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Mang lại sự thoải mái và linh hoạt về thời gian thay đổi chuyến bay.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Nếu đàm phán xong sớm (ví dụ 1 giờ), có thể check-in và bay về sớm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Nếu đàm phán kéo dài, có thể sẵn sàng hủy/đổi vé để dời chuyến bay, cho thấy sự nhiệt</span></div>\n<p class=\"body-txt\">\ntình và cam kết cao độ, tạo ra sự &quot;mắc nợ&quot; và thiện chí từ phía đối tác, giúp việc hợp tác\n \ndễ dàng hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Địa điểm là công cụ chiến lược, không chỉ là nơi gặp gỡ: Việc lựa chọn và sử dụng địa</span></div>\n<p class=\"body-txt\">\nđiểm (sảnh khách sạn 5 sao, sân bay) không chỉ để tiện lợi mà còn là một chiến thuật chủ\n \nđộng để tạo ra môi trường đàm phán có lợi. Nó giúp san bằng vị thế, tránh lợi thế &quot;sân\n \nnhà&quot; của một bên, từ đó thúc đẩy sự hợp tác công bằng và hiệu quả hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tạo áp lực thời gian giả định để kiểm soát đàm phán: Diễn giả nhấn mạnh rằng áp lực</span></div>\n<p class=\"body-txt\">\nthời gian có thể là một quyền lực lớn, không nhất thiết phải là áp lực thực sự của bản\n \nthân mà là áp lực được tạo ra và truyền đạt cho đối tác. Việc giới hạn thời gian (ví dụ 2\n \ngiờ) khiến đối tác phải tập trung và đưa ra quyết định nhanh hơn, tăng khả năng đạt\n \nđược thỏa thuận theo ý muốn của ta.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sự linh hoạt và thiện chí được thể hiện qua hành động: Việc sử dụng vé hạng nhất để có</span></div>\n<p class=\"body-txt\">\nthể thay đổi lịch trình không chỉ mang lại lợi ích cá nhân mà còn là một đòn bẩy tâm lý.\n \nSẵn sàng lùi chuyến bay để tiếp tục đàm phán không chỉ thể hiện sự nhiệt tình mà còn\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><p class=\"body-txt\">\ntạo ra một &quot;món nợ&quot; tinh thần cho đối tác, khiến họ cảm thấy có trách nhiệm và thiện chí\n \nhơn trong việc hợp tác, từ đó làm cho quá trình đàm phán diễn ra suôn sẻ hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Nếu mà tính cả cái tiền thuê cái sảnh đó để mà ngồi họp với nhau thì bạn sẽ thấy rằng là nó rẻ\n \nhơn rất là nhiều lần.”\n \n“Thực ra mà nói, tôi không có áp lực về 2 giờ, nhưng tôi cho bạn 2 giờ, chỉ 2 giờ để bạn đàm\n \nphán việc này với tôi thôi.”\n \n“Khi mà tôi lại lùi vé máy bay lại một lần nữa thì bạn cảm thấy rằng tôi rất nhiệt tình trong cái\n \nviệc đàm phán này vì thế mà cái việc hợp tác của chúng ta dễ hơn.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Bài 31: Tổng kết</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Tóm tắt. Buổi giảng này là lời chúc mừng học viên tốt nghiệp khóa học &quot;Tuyệt chiêu đàm</h3>\n<p class=\"body-txt\">\nphán&quot;. Diễn giả nhấn mạnh tầm quan trọng của việc ghi chép theo phương pháp 3 cột, học đi\n \nhọc lại nhiều lần để tiếp thu kiến thức mới, và đặc biệt là thực hành áp dụng các chiến lược\n \nvào mọi cuộc hội thoại, biến chúng thành thói quen. Mục tiêu cuối cùng là hướng đến đàm\n \nphán &quot;win-win-win&quot; để tất cả các bên đều có lợi, đồng thời khuyến khích chia sẻ những điều\n \nhọc được và kết quả đạt được để truyền động lực cho cộng đồng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Chúc mừng học viên đã tốt nghiệp khóa học &quot;Tuyệt chiêu đàm phán&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sự ghi chép là vô cùng quan trọng, cần ghi chép theo phương pháp 3 cột: tiêu đề, nội</span></div>\n<p class=\"body-txt\">\ndung và hành động.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Kiểm tra cột &quot;hành động&quot; và ngay lập tức thực hiện những điều đã ghi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Không quan trọng ghi được nhiều hay không, có thể ghi thêm vào những lần học sau.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Học đi học lại là phương pháp học trực tuyến hiệu quả: học nhiều lần để luôn khám phá</span></div>\n<p class=\"body-txt\">\nđiều mới mẻ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Quan trọng hơn cả là thực hành và đưa những bài học vào trong cuộc sống, biến chúng</span></div>\n<p class=\"body-txt\">\nthành thói quen.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Áp dụng từng chiến lược, từng &quot;vũ khí&quot; đàm phán một vào mọi cuộc hội thoại để thay</span></div>\n<p class=\"body-txt\">\nđổi cuộc sống từng bước.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Một cuộc đàm phán thành công là khi cả hai bên cùng chiến thắng (bạn có lợi, người</span></div>\n<p class=\"body-txt\">\nkhác có lợi), thậm chí là &quot;win-win-win&quot; (tất cả những người xung quanh cuộc đàm phán\n \nđó đều có lợi).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Học đi đôi với hành, học nhiều và làm nhiều mới có được kiến thức.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Không quan trọng bạn biết gì, quan trọng bạn làm gì.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Đừng ngần ngại chia sẻ những điều học được và kết quả đạt được trong thực tiễn với</span></div>\n<p class=\"body-txt\">\nmọi người (trong video hoặc group) để truyền động lực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Khuyến khích tham gia group để chia sẻ, cùng truyền động lực cho nhau thực hành các</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">bài học.</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Mời tìm kiếm các khóa học khác của diễn giả.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#f9a825\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Thực hành và biến kiến thức thành thói quen trong mọi cuộc hội thoại: Diễn giả nhấn</span></div>\n<p class=\"body-txt\">\nmạnh &quot;quan trọng hơn, hãy thực hành và đưa những bài học vào trong cuộc sống. Hãy\n \nbiến nó thành thói quen của bạn&quot; (1:04-1:09) và &quot;cuộc đàm phán của chúng ta hãy làm\n \ncho nó diễn ra trong mọi cuộc hội thoại&quot; (1:14-1:18). Điều này quan trọng vì nó chuyển\n \nhóa lý thuyết thành hành động thực tế, giúp học viên không chỉ &quot;biết&quot; mà còn &quot;làm&quot;, từ\n \nđó tạo ra sự thay đổi bền vững trong cuộc sống và công việc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Triết lý đàm phán &quot;Win-Win-Win&quot;: &quot;Một cuộc đàm phán thành công là cả hai bên cùng</span></div>\n<p class=\"body-txt\">\nchiến thắng... Win-win-win, đó mới thực sự là một cuộc đàm phán thành công&quot; (1:22-\n \n1:34). Đây là một tư duy đột phá, mở rộng phạm vi lợi ích từ hai bên trực tiếp sang cả\n \nnhững bên liên quan, tạo dựng mối quan hệ bền vững, uy tín và mang lại giá trị lâu dài\n \ncho cộng đồng, vượt xa lợi ích cá nhân hay đối tác trực tiếp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Hành động là yếu tố quyết định: &quot;Không quan trọng bạn biết gì, quan trọng bạn làm gì&quot;</span></div>\n<p class=\"body-txt\">\n(1:42-1:45). Đây là một lời nhắc nhở mạnh mẽ về giá trị cốt lõi của việc áp dụng kiến\n \nthức. Kiến thức chỉ thực sự có giá trị khi được chuyển hóa thành hành động và mang lại\n \nkết quả, khuyến khích học viên thoát khỏi vòng luẩn quẩn của việc chỉ thu thập thông tin\n \nmà không thực thi.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Hãy thực hành và đưa những bài học vào trong cuộc sống. Hãy biến nó thành thói quen của\n \nbạn.”\n \n“Win-win-win, đó mới thực sự là một cuộc đàm phán thành công.”\n \n“Không quan trọng bạn biết gì, quan trọng bạn làm gì.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><p class=\"body-txt\">\nLời kết\n \nHết khoá Tuyệt Chiêu Đàm Phán. Đọc để LÀM, không phải để biết — biến mỗi bài học thành\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">hành động cụ thể.</h3></div></div>",
"<div class=\"pg pg-cover\" style=\"border-top:5px solid #f9a825\">\n  <div class=\"cover-wrap\">\n    <div class=\"cover-title\">Tuyệt Chiêu Đàm Phán</div>\n    <div class=\"cover-sub\" style=\"color:#f9a825\">Học để ứng dụng · Áp dụng để thành công</div>\n    <div class=\"cover-tag\" style=\"color:#f9a825;margin-top:24px\">QNPA Pickleball Academy</div>\n  </div>\n</div>"];

function render(){
  book.innerHTML=pages[cur];
  fill.style.width=((cur+1)/N*100)+'%';
  info.textContent=(cur+1)+' / '+N;
  jump.value=cur+1;
  btnP.disabled=cur===0;
  btnN.disabled=cur===N-1;
  window.scrollTo(0,0);
}
function next(){if(cur<N-1){cur++;render();}}
function prev(){if(cur>0){cur--;render();}}
function goTo(n){cur=Math.max(0,Math.min(N-1,n));render();}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown')next();
  else if(e.key==='ArrowLeft'||e.key==='PageUp')prev();
});
render();
</script>
</body>
</html>
