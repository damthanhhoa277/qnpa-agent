"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#f9a825\">Bài 13: Tung hứng</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Tóm tắt. Buổi học này tập trung vào kỹ năng đàm phán chuyên nghiệp, nhấn mạnh rằng một</h3>\n<p class=\"body-txt\">\nnhà đàm phán giỏi không chỉ tập trung vào giá cả mà phải cùng lúc xử lý nhiều thông số và\n \nđiều khoản khác trong hợp đồng. Việc chỉ đàm phán về giá là biểu hiện của sự thiếu chuyên\n \nnghiệp. Diễn giả khuyến khích học viên tận dụng tối đa các khía cạnh khác như điều kiện\n \ngiao hàng, tín dụng, bảo hành, bảo hiểm, và bảo đảm để tạo ra giá trị và đạt được một thỏa\n \nthuận tối ưu hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Một nhà đàm phán chuyên nghiệp giống như diễn viên xiếc, cùng lúc tung hứng rất</span></div>\n<p class=\"body-txt\">\nnhiều quả bóng (đàm phán nhiều tham số).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Nếu chúng ta chỉ đàm phán về giá, đó là một nhà đàm phán thiếu chuyên nghiệp.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Cần đàm phán tất cả các khía cạnh khác mà chúng ta có thể phát hiện thấy trong quá</span></div>\n<p class=\"body-txt\">\ntrình đàm phán này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Diễn giả có chuẩn bị file PDF với các thông số/điều khoản để học viên in ra và mang theo</span></div>\n<p class=\"body-txt\">\nbên mình để tham gia vào quá trình đàm phán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Các điều khoản/tham số có thể đàm phán khác ngoài giá bao gồm:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Điều kiện giao hàng (giao tại kho bên bán hay kho bên mua).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tham gia lắp đặt.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Phí bảo hiểm, phí vận chuyển.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Điều kiện tín dụng (trả trước hay trả sau, trả sau bao nhiêu ngày, có lãi suất hay không).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Thời gian lưu kho, bến bãi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Màu sắc, chủng loại, số lượng, chất lượng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bảo hành (ví dụ: thời gian bảo hành thay vì 1 năm có thể là 3 năm hay 5 năm).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bảo hiểm (trong quá trình vận chuyển, trong quá trình lắp đặt).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bảo đảm (ví dụ: sản phẩm phải hoạt động được, nếu không hoạt động được thì sẽ phải</span></div>\n<p class=\"body-txt\">\nđền bù thiệt hại).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Đây là những điều khoản mà bạn có thể thêm vào trong quá trình đàm phán hợp đồng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Khi không thể đàm phán về giá (khi người mua quyết định giá), có thể nói: &quot;Nếu anh</span></div>\n<p class=\"body-txt\">\nquyết định về giá, tôi có thể quyết định được những điều khoản khác trong hợp đồng&quot; để\n \ntạo thế có đi có lại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Thông qua quá trình đàm phán, không chỉ có giá mà nhiều điều khoản hợp đồng khác</span></div>\n<p class=\"body-txt\">\ncũng có thể tham gia vào đàm phán được.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Đừng quên tải file PDF trong chuyên mục để tham khảo về nhiều điều khoản hơn.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Mở rộng phạm vi đàm phán ngoài giá cả: Điểm cốt lõi là một nhà đàm phán chuyên</span></div>\n<p class=\"body-txt\">\nnghiệp không bao giờ chỉ tập trung vào giá. Điều này quan trọng vì nó giúp doanh\n \nnghiệp linh hoạt hơn trong việc đạt được thỏa thuận, có thể chấp nhận giá cao hơn nếu\n \nđổi lại được các điều khoản tốt về thanh toán, bảo hành, giao hàng, v.v., tối ưu hóa lợi ích\n \ntổng thể thay vì chỉ lợi nhuận biên trên giá.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sử dụng chiến lược &quot;có đi có lại&quot; khi giá bị ép: Khi đối tác cố định giá, người đàm phán có</span></div>\n<p class=\"body-txt\">\nthể chủ động giành quyền kiểm soát các điều khoản khác bằng cách nói: &quot;Nếu anh quyết\n \nđịnh về giá, tôi có thể quyết định được những điều khoản khác trong hợp đồng.&quot; Điều\n \nnày tạo ra một thế cân bằng mới, biến điểm yếu (không kiểm soát được giá) thành điểm\n \nmạnh để thương lượng các lợi ích khác, đảm bảo lợi ích vẫn được đảm bảo theo một\n \ncách khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tận dụng tối đa các điều khoản phụ trong hợp đồng: Danh sách chi tiết các yếu tố có thể</span></div>\n<p class=\"body-txt\">\nđàm phán (giao hàng, tín dụng, bảo hành, bảo hiểm, bảo đảm, lưu kho, màu sắc, chất\n \nlượng...) cung cấp một bộ công cụ mạnh mẽ. Nó quan trọng vì giúp người đàm phán có\n \nnhiều lựa chọn để tạo ra giá trị, tìm kiếm sự thỏa hiệp và đạt được một thỏa thuận tối ưu\n \nhơn, ngay cả khi giá cả không như ý muốn ban đầu, đồng thời xây dựng một mối quan hệ\n \nkinh doanh bền vững hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Nếu chúng ta chỉ đàm phán về giá thì đó thực sự là một nhà đàm phán thiếu chuyên nghiệp.”\n \n“Hãy luôn liên tục nhớ rằng chúng ta cần phải đàm phán nhiều thông số khác nhau trong hợp\n \nđồng chứ không chỉ giá cả.”\n \n“Nếu anh quyết định về giá, tôi có thể quyết định được những điều khoản khác trong hợp\n \nđồng.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Bài 14: Môi trường hợp tác</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Tóm tắt. Buổi học này nhấn mạnh tầm quan trọng của môi trường và bối cảnh trong đàm</h3>\n<p class=\"body-txt\">\nphán, cho rằng &quot;bối cảnh luôn quyết định nội dung&quot; của cuộc trò chuyện và thái độ hợp tác.\n \nDiễn giả cung cấp các chiến lược cụ thể để tạo ra một môi trường tối ưu cho đàm phán thành\n \ncông, bao gồm cách sắp xếp chỗ ngồi, lựa chọn địa điểm trung gian, duy trì sự chuyên\n \nnghiệp, và thậm chí sử dụng yếu tố tâm lý như &quot;bữa trưa&quot; làm công cụ thúc đẩy hoặc xây\n \ndựng quan hệ. Mục tiêu là chủ động định hình không gian và thời gian để dẫn dắt cuộc đàm\n \nphán theo hướng mong muốn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bối cảnh luôn quyết định nội dung; không gian xung quanh ảnh hưởng rất lớn tới môi</span></div>\n<p class=\"body-txt\">\ntrường đàm phán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ví dụ minh họa: Đặt các loại tạp chí khác nhau (Playboy vs. Business/Forbes/Nhịp Cầu</span></div>\n<p class=\"body-txt\">\nĐầu Tư) lên bàn sẽ thay đổi chủ đề và chất lượng cuộc nói chuyện.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Môi trường hợp tác sẽ ảnh hưởng tới suy nghĩ của các bên, khiến buổi đàm phán xoay</span></div>\n<p class=\"body-txt\">\nquanh các vấn đề hợp tác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Điều này không chỉ là phong thủy, mà là tác động trực tiếp tới tâm lý.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Cách sắp xếp chỗ ngồi: Chọn góc ngồi 90 hoặc 180 độ (cạnh nhau) thay vì đối diện để tạo</span></div>\n<p class=\"body-txt\">\nsự thân thiện hơn.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Chọn địa điểm đàm phán: Ưu tiên một nơi trung gian, thân thuộc của cả hai bên (khách</span></div>\n<p class=\"body-txt\">\nsạn, nhà hàng, nơi thứ ba) thay vì văn phòng của một bên, để cả hai đều cảm thấy an\n \ntoàn và không ai bị động.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Duy trì môi trường chuyên nghiệp: Tránh đàm phán khi có người đang dọn đồ ăn ra, vì</span></div>\n<p class=\"body-txt\">\nđiều này sẽ làm ngắt quãng và phá vỡ dòng chảy đàm phán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sử dụng &quot;bữa trưa&quot; như một &quot;vũ khí&quot; trong đàm phán:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tận dụng sự đói để thúc đẩy đối tác kết thúc đàm phán nhanh: &quot;Chúng ta sẽ xong điều</span></div>\n<p class=\"body-txt\">\nkhoản này rồi thì sẽ ăn trưa.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tạo cảm giác &quot;nợ nần&quot;: Khi một người ăn trưa với người khác, họ thường có cảm giác nợ</span></div>\n<p class=\"body-txt\">\nnần một cái gì đó, khiến họ dễ nhường bước hơn trong các đàm phán sau.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Hãy luôn sáng tạo hơn trong việc tạo ra những bối cảnh tuyệt vời cho đàm phán.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">&quot;Bối cảnh luôn quyết định nội dung&quot;: Đây là nguyên lý cốt lõi, nhấn mạnh rằng môi</span></div>\n<p class=\"body-txt\">\ntrường vật lý và tâm lý xung quanh cuộc đàm phán không chỉ là yếu tố phụ mà là yếu tố\n \nđịnh hình toàn bộ diễn biến và kết quả. Việc chủ động tạo ra bối cảnh hợp tác sẽ dẫn đến\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">nội dung và thái độ hợp tác.</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sử dụng yếu tố vật lý và tâm lý để định hình đàm phán: Các chiến thuật như sắp xếp chỗ</span></div>\n<p class=\"body-txt\">\nngồi 90/180 độ, chọn địa điểm trung gian, hoặc quản lý thời điểm phục vụ bữa ăn cho\n \nthấy sự tinh tế trong việc điều khiển tâm lý và sự thoải mái của đối tác, từ đó tạo lợi thế\n \ncho bản thân trong quá trình đàm phán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Chiến thuật &quot;bữa trưa&quot; để tạo cảm giác &quot;nợ nần&quot;: Mời đối tác ăn trưa trước khi đàm</span></div>\n<p class=\"body-txt\">\nphán tạo ra một mối liên kết cá nhân và cảm giác mang ơn. Điều này là một kỹ thuật tâm\n \nlý mạnh mẽ, khiến đối tác có xu hướng nhượng bộ hơn trong các cuộc thảo luận sau,\n \nthúc đẩy một mối quan hệ lâu dài hơn là chỉ một giao dịch ngắn hạn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Bối cảnh luôn quyết định nội dung.”\n \n“Chúng ta sẽ đàm phán xong việc này rồi sẽ ăn trưa.”\n \n“Khi một người nào đó ăn trưa với một người thì tự nhiên người ta có cảm giác nợ nần một\n \ncái gì đó, lần tới trong đàm phán người ta cũng sẽ phải nhường bước hơn.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Bài 15: Đàm phán tổng thể</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Tóm tắt. Buổi học tập trung vào chiến lược &quot;đàm phán tổng thể&quot;, nhấn mạnh việc không nên</h3>\n<p class=\"body-txt\">\nchỉ tập trung vào giá hay các điều khoản chính. Thay vào đó, người học cần mở rộng khả\n \nnăng quan sát để tìm ra và đưa vào đàm phán nhiều yếu tố liên quan hoặc đi kèm, thậm chí\n \nlà những thứ tưởng chừng không liên quan. Việc này giúp khám phá thêm giá trị và tạo ra\n \ncảm giác &quot;win-win&quot; cho cả hai bên, mang lại lợi ích toàn diện hơn trong mọi giao dịch.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Ý chính</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Giới thiệu chiến lược đàm phán tổng thể.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Thực trạng: Đôi khi trong đàm phán, chúng ta gặp phải những người quá cứng rắn, quá</span></div>\n<p class=\"body-txt\">\nmạnh mẽ, khiến việc đàm phán về giá và các điều khoản khác trở nên khó khăn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Giải pháp: Hãy luôn nhớ rằng chúng ta có thể nhìn thấy những vấn đề liên quan tổng thể</span></div>\n<p class=\"body-txt\">\nhơn, quan sát rộng ra để tìm thấy những yếu tố mới có thể đưa vào trong đàm phán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ví dụ 1 (Mua sách): Có thể xin thêm một quyển vở hoặc những phụ kiện đi kèm với cuốn</span></div>\n<p class=\"body-txt\">\nsách.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ví dụ 2 (Mua nhà): Ngoài giá, hãy để ý và mặc cả với chủ nhà rằng những đồ gắn liền với</span></div>\n<p class=\"body-txt\">\nnhà (như tivi, tủ lạnh) thì không được di chuyển đi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ví dụ 3 (Mua điện thoại): Có thể mặc cả thêm các phụ kiện như tai nghe, sạc pin thêm,</span></div>\n<p class=\"body-txt\">\nsạc dự phòng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Những tài sản/sản phẩm gắn kèm đó cũng có thể tạo nên những điều khoản mà chúng ta</span></div>\n<p class=\"body-txt\">\ngiảm giá hoặc gia tăng giá trị nhận được.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài tập thực hành cho học viên: Khi đi ăn phở, thử mặc cả thêm trà đá hoặc quẩy (những</span></div>\n<p class=\"body-txt\">\nsản phẩm thường được bán thêm, tính thêm tiền). Việc này có thể mang lại những điều\n \nvui vẻ trong cuộc sống hàng ngày.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Nguyên tắc chung: Trong mọi cuộc mua bán, có rất nhiều yếu tố mà chúng ta có thể mặc</span></div>\n<p class=\"body-txt\">\ncả, không chỉ là về giá hay các điều khoản trong hợp đồng, mà còn cả những yếu tố bên\n \nngoài tưởng chừng như không liên quan.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Lời khuyên: Hãy luôn đàm phán nhiều yếu tố, chứ đừng chỉ đàm phán về giá.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Kết quả: Khi mở rộng khả năng quan sát, bạn sẽ nhìn thấy được nhiều yếu tố để đưa vào</span></div>\n<p class=\"body-txt\">\nđàm phán hơn, điều này sẽ tạo ra những cảm giác &quot;win-win&quot; nhiều hơn trong đàm phán.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Không chỉ đàm phán về giá: Đây là sai lầm phổ biến mà nhiều người mắc phải, khiến họ</span></div>\n<p class=\"body-txt\">\nbỏ lỡ vô số cơ hội gia tăng giá trị hoặc tạo ra sự linh hoạt trong đàm phán. Việc chỉ tập\n \ntrung vào giá có thể dẫn đến bế tắc khi đối tác không nhượng bộ, trong khi còn nhiều\n \nyếu tố khác có thể được trao đổi để cả hai bên đều có lợi (win-win).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Mở rộng khả năng quan sát để nhìn tổng thể: Đây là kỹ năng cốt lõi mà diễn giả muốn</span></div>\n<p class=\"body-txt\">\ntruyền đạt. Thay vì chỉ nhìn vào &quot;phần chính&quot; của giao dịch, việc &quot;quan sát rộng ra&quot; giúp\n \nta phát hiện ra những yếu tố phụ trợ, đi kèm, hoặc thậm chí tưởng chừng không liên\n \nquan nhưng có thể mang lại giá trị đáng kể. Kỹ năng này cho phép biến những điểm yếu\n \ntrong đàm phán giá thành cơ hội để bổ sung giá trị từ các khía cạnh khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tận dụng các yếu tố &quot;gắn kèm&quot; hoặc &quot;bên ngoài&quot;: Các ví dụ về phụ kiện sách, đồ dùng</span></div>\n<p class=\"body-txt\">\ntrong nhà, phụ kiện điện thoại hay trà đá/quẩy khi ăn phở đều minh họa rằng những thứ\n \nnhỏ nhặt, tưởng chừng không đáng kể, lại có thể là điểm đòn bẩy hiệu quả trong đàm\n \nphán. Chúng thường có chi phí biên thấp với bên bán nhưng lại mang lại giá trị cảm\n \nnhận cao cho bên mua, dễ dàng tạo ra sự hài lòng và cảm giác &quot;được lợi&quot; mà không làm\n \ntổn hại đáng kể đến lợi nhuận cốt lõi của đối tác.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Trích dẫn</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Hãy luôn nhớ rằng là chúng ta có thể chúng ta có thể nhìn thấy những cái vấn đề liên quan\n \ntổng thể hơn, quan sát rộng ra.”\n \n“Hãy luôn đàm phán nhiều yếu tố, chứ đừng chỉ đàm phán về giá.”\n \n“Việc mà chúng ta làm như vậy thì sẽ tạo ra những cái cảm giác win-win nhiều hơn trong đàm\n \nphán.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Bài 16: Người thứ 3</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Tóm tắt. Buổi học này tập trung vào &quot;chiến lược người thứ ba&quot; trong đàm phán, một kỹ</h3>\n<p class=\"body-txt\">\nthuật dùng để trì hoãn cuộc đàm phán nhằm có thêm thời gian, thu thập thông tin hoặc tạo\n \nra điều kiện tốt hơn cho lần đàm phán sau, bằng cách viện dẫn một người có vẻ như có\n \nquyền quyết định cuối cùng. Đồng thời, diễn giả cũng chia sẻ các chiến thuật để đối phó khi\n \nđối phương sử dụng chiến lược này, bao gồm việc hỏi thẳng về người có quyền quyết định\n \nhoặc dùng kỹ thuật gọi điện thoại để buộc đối phương phải lộ diện. Mấu chốt của chiến lược\n \nlà quản lý thời gian và xác định quyền lực ra quyết định.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Chiến lược người thứ ba: Dùng để trì hoãn việc đàm phán (không muốn phá hủy nhưng</span></div>\n<p class=\"body-txt\">\ncần hoãn) nhằm tạo ra các điều kiện tốt hơn cho những lần đàm phán sau.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Mục đích trì hoãn: Khi bạn cần thêm thông tin hoặc dữ kiện khác.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Cách sử dụng: Đóng vai trò là người phải tham khảo ý kiến của một người thứ ba</span></div>\n<p class=\"body-txt\">\n(vợ/chồng, sếp, kế toán, luật sư) có vẻ như là người có quyền quyết định.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Lợi ích: Giúp bạn có cơ hội quay trở lại đàm phán vào lần sau với sự chuẩn bị tốt hơn</span></div>\n<p class=\"body-txt\">\nhoặc thông tin đầy đủ hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Khi đối phương sử dụng người thứ ba và bạn muốn kết thúc nhanh:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Kỹ thuật 1: Hỏi trực tiếp về quyền quyết định.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Đặt câu hỏi: &quot;Ai là người có quyền quyết định ở đây?&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Nêu rõ quan điểm: &quot;Tôi chỉ làm việc với người có quyền quyết định.&quot; Mục đích là khiến</span></div>\n<p class=\"body-txt\">\nđối phương nhanh chóng loại bỏ người thứ ba để tiếp tục đàm phán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Kỹ thuật 2: Sử dụng điện thoại di động (của bạn).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Rút điện thoại của bạn ra.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Hỏi số điện thoại của &quot;người thứ ba&quot; của đối tác (vợ, sếp).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bấm số và giả vờ gọi, thông báo rằng cuộc đàm phán đang diễn ra. Thông thường, đối</span></div>\n<p class=\"body-txt\">\nphương sẽ không muốn bạn gọi nếu đó không phải là người thứ ba thật sự.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tầm quan trọng của luyện tập: Việc sử dụng và đối phó với chiến lược người thứ ba cần</span></div>\n<p class=\"body-txt\">\nđược luyện tập thường xuyên để trở nên nhuần nhuyễn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Chiến lược trì hoãn thông minh là vũ khí mạnh mẽ: Thay vì ép buộc kết thúc hoặc từ bỏ,</span></div>\n<p class=\"body-txt\">\nviệc trì hoãn đàm phán một cách có chiến lược (thông qua người thứ ba) giúp người\n \nđàm phán có thời gian thu thập thêm thông tin, củng cố vị thế, hoặc chờ đợi điều kiện tốt\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><p class=\"body-txt\">\nhơn. Điều này quan trọng vì nó chuyển từ tư duy &quot;được ăn cả ngã về không&quot; sang tư duy\n \nquản lý thời gian và thông tin để tối ưu hóa kết quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Xác định quyền lực ra quyết định: Cả khi sử dụng và khi đối phó với chiến lược người</span></div>\n<p class=\"body-txt\">\nthứ ba, việc xác định và nhắm đến người có quyền quyết định cuối cùng là chìa khóa.\n \nĐiều này quan trọng vì nó giúp người đàm phán tập trung vào đúng đối tượng, tránh\n \nlãng phí thời gian và công sức vào những người trung gian không có thẩm quyền, từ đó\n \nđẩy nhanh quá trình hoặc kiểm soát cuộc đàm phán hiệu quả hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sự chủ động và kỹ thuật đơn giản có thể phá vỡ chiến lược: Các kỹ thuật đối phó như hỏi</span></div>\n<p class=\"body-txt\">\nthẳng về người quyết định hay dùng điện thoại của mình để gọi &quot;người thứ ba&quot; của đối\n \ntác cho thấy rằng ngay cả những hành động đơn giản, bất ngờ và chủ động cũng có thể\n \ntạo áp lực và buộc đối phương phải bộc lộ sự thật hoặc từ bỏ chiến lược trì hoãn. Điều\n \nnày quan trọng vì nó trang bị cho người đàm phán những công cụ thực tế, dễ áp dụng để\n \ngiành lại quyền kiểm soát trong các tình huống khó khăn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Bạn không muốn phá hủy cuộc đàm phán đó, nhưng bạn muốn trì hoãn để tạo ra những điều\n \nkiện tốt hơn đàm phán cho những lần sau.”\n \n“Ai là người có quyền quyết định ở đây? Tôi chỉ làm việc với người có quyền quyết định.”\n \n“Thông thường, người kia sẽ không gọi nếu đó không phải là người thứ ba thật sự.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Bài 17: Sử dụng in ấn</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Tóm tắt. Buổi giảng này tập trung vào &quot;sức mạnh của in ấn&quot; trong việc định hình hành vi và</h3>\n<p class=\"body-txt\">\ntâm lý đàm phán trong kinh doanh và giao dịch hàng ngày. Diễn giả chỉ ra rằng những điều\n \nkhoản hợp đồng hay mức giá được in sẵn thường khiến người ta ngại mặc cả hoặc thay đổi.\n \nTuy nhiên, thông điệp cốt lõi và quan trọng nhất là bất kể điều gì đã được in ấn hay niêm yết,\n \nchúng ta *luôn luôn* có quyền và khả năng đàm phán để đạt được mục tiêu của mình,\n \nkhuyến khích mọi người &quot;hãy luôn mặc cả&quot;.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Giới thiệu &quot;sức mạnh của in ấn&quot; là một chiến lược quan trọng trong đàm phán.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Khi các điều khoản hợp đồng được in sẵn, ít người có xu hướng đàm phán để thay đổi</span></div>\n<p class=\"body-txt\">\nchúng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ví dụ về hợp đồng in sẵn: Ngân hàng, công ty chứng khoán, bưu điện, internet, bảo hiểm</span></div>\n<p class=\"body-txt\">\nđều có hợp đồng in sẵn và thường ít bị mặc cả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Lời khuyên: Để ngăn đối tác đàm phán, bạn cũng nên in sẵn các điều khoản hợp đồng</span></div>\n<p class=\"body-txt\">\ncủa riêng mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Lý do để khách hàng không đàm phán: Khi được hỏi, hãy trả lời &quot;đây là mẫu của công ty,</span></div>\n<p class=\"body-txt\">\ntất cả mọi người đều làm như vậy.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tuy nhiên, điểm quan trọng: Dù người khác đã in sẵn hợp đồng, bạn *luôn có thể thay</span></div>\n<p class=\"body-txt\">\nđổi* các điều khoản trong đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">&quot;Sức mạnh của in ấn&quot; cũng được sử dụng trong chiến lược giá.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ví dụ về giá in sẵn: Giá niêm yết trong siêu thị khiến người mua ít mặc cả.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ví dụ về kỹ thuật gạch giá: Khi thấy giá 5,000đ gạch ngang còn 3,000đ, người mua có xu</span></div>\n<p class=\"body-txt\">\nhướng không mặc cả thêm vì cho rằng giá đã rẻ và đã được giảm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Lời khuyên cho người bán: Sử dụng kỹ thuật in sẵn giá gốc, gạch ngang và đưa ra một</span></div>\n<p class=\"body-txt\">\nmức giá mới để giảm ý định mặc cả của khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tuy nhiên, điểm quan trọng: Dù giá đã được in sẵn và gạch ngang, bạn *vẫn có thể mặc</span></div>\n<p class=\"body-txt\">\ncả* được.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Hợp đồng mẫu, giá in sẵn là những công cụ có thể ngắt quãng quá trình đàm phán,</span></div>\n<p class=\"body-txt\">\nnhưng chúng ta *luôn có thể đàm phán*.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Việc luyện tập vượt qua những khó khăn này sẽ đem lại sức mạnh và niềm tin mới trong</span></div>\n<p class=\"body-txt\">\nđàm phán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Thông điệp kết thúc: &quot;Hãy luôn mặc cả.&quot;</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">&quot;Sức mạnh của in ấn&quot; trong việc tạo ra tâm lý chấp nhận mặc định: Khi các điều khoản</span></div>\n<p class=\"body-txt\">\nhay mức giá được in sẵn, nó tạo ra một rào cản tâm lý mạnh mẽ, khiến người đối diện\n \ncảm thấy khó khăn hoặc không có quyền để đàm phán. Điều này quan trọng vì nó cho\n \nthấy cách mà hình thức trình bày có thể ảnh hưởng lớn đến kết quả kinh doanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Quyền năng đàm phán luôn thuộc về bạn, bất kể điều gì đã được in: Đây là thông điệp</span></div>\n<p class=\"body-txt\">\ntrao quyền mạnh mẽ nhất của buổi giảng. Nó thách thức tư duy thụ động, khuyến khích\n \nsự chủ động và kiên trì trong đàm phán. Việc nhận thức được rằng mình *luôn có thể*\n \nđàm phán, dù mọi thứ có vẻ đã &quot;đóng gói&quot; hay &quot;cố định,&quot; là chìa khóa để đạt được lợi ích\n \ntốt nhất.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Kỹ thuật gạch giá để giảm ý định mặc cả của khách hàng: Đây là một mẹo tâm lý rất thực</span></div>\n<p class=\"body-txt\">\ntế và hiệu quả trong bán hàng. Bằng cách trình bày một mức giá gốc cao hơn rồi gạch đi\n \nđể đưa ra giá khuyến mãi, người bán tạo ra cảm giác &quot;đã được giảm giá&quot; cho khách hàng,\n \ntừ đó làm giảm động lực mặc cả thêm của họ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Bạn hãy luôn nhớ điều này, khi chúng ta in sẵn ra những điều khoản của hợp đồng thì ít\n \nngười sẽ đàm phán để thay đổi cái điều khoản của hợp đồng này nữa.”\n \n“Nhưng khi bạn nhìn thấy những người khác đã in sẵn hợp đồng thì hãy luôn nhớ trong đầu\n \nbạn, bạn có thể thay đổi được các điều khoản trong hợp đồng, mặc dù đã được in trước cho\n \nbạn.”\n \n“Hãy luôn mặc cả. Người không mặc cả là người...”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Bài 18: Kẻ xấu người tốt</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Tóm tắt. Buổi học này giới thiệu và minh họa chiến lược đàm phán &quot;kẻ xấu người tốt&quot; (good</h3>\n<p class=\"body-txt\">\ncop, bad cop). Chiến lược này sử dụng một người gây áp lực, căng thẳng (kẻ xấu) và một\n \nngười nhẹ nhàng, xoa dịu (người tốt) để thao túng đối tác. Mục tiêu là gây nhiễu loạn thông\n \ntin và tạo áp lực thời gian, từ đó giúp bên áp dụng dễ dàng chiếm quyền kiểm soát trong quá\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><p class=\"body-txt\">\ntrình đàm phán. Dù có hiệu quả trong một số trường hợp, diễn giả không khuyến khích sử\n \ndụng phương pháp này một cách bừa bãi.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Giới thiệu chiến lược &quot;kẻ xấu người tốt&quot;: Một bên gây áp lực, một bên xoa dịu.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Minh họa qua đoạn video: Vai &quot;người xấu&quot; thể hiện sự giận dữ, đòi đi về, từ chối mua,</span></div>\n<p class=\"body-txt\">\nchê sản phẩm; vai &quot;người tốt&quot; thì nhẹ nhàng, xin thêm thời gian, tìm cách thỏa hiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Giải thích vai trò của từng bên:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Người xấu: Luôn gây áp lực, căng thẳng, khó chịu cho đối tác.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Người tốt: Luôn nhẹ nhàng, êm dịu, hòa đồng với đối tác.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Liên hệ với các yếu tố quan trọng trong đàm phán:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Thông tin: Việc có cả người xấu và người tốt khiến thông tin bị nhiễu loạn, đối tác không</span></div>\n<p class=\"body-txt\">\nnắm bắt được thông tin thật sự.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Áp lực về thời gian: Người xấu tạo áp lực khiến đối tác muốn kết thúc đàm phán càng</span></div>\n<p class=\"body-txt\">\nsớm càng tốt, dễ bị ảnh hưởng bởi áp lực thời gian.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Mục tiêu của chiến lược: Giúp người đàm phán dễ dàng chiếm được quyền điều khiển</span></div>\n<p class=\"body-txt\">\ncục diện.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tính ứng dụng: Chiến lược này được dùng trong nhiều trường hợp thực tiễn, có thể áp</span></div>\n<p class=\"body-txt\">\ndụng trực tiếp (hai người cùng đàm phán) hoặc gián tiếp (ví dụ &quot;quân xanh quân đỏ&quot; khi\n \nmua nhà, cho người trả giá thấp trước khi mình vào).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Khuyến nghị và lưu ý: Chiến lược cần được luyện tập thường xuyên. Diễn giả không</span></div>\n<p class=\"body-txt\">\nkhuyến khích sử dụng bừa bãi vì không phải lúc nào cũng cần thiết, nhưng thừa nhận nó\n \ncó hiệu quả trong một số trường hợp cụ thể.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Thao túng tâm lý để giành quyền kiểm soát đàm phán: Chiến lược này vượt ra ngoài việc</span></div>\n<p class=\"body-txt\">\nchỉ trao đổi thông tin thuần túy mà tập trung vào việc gây nhiễu loạn nhận thức và tạo\n \náp lực tâm lý (thông tin và thời gian) lên đối tác. Điều này quan trọng vì nó cho thấy một\n \nkhía cạnh sâu sắc hơn của đàm phán, nơi việc quản lý cảm xúc và nhận thức của đối\n \nphương có thể quyết định kết quả, giúp bên áp dụng dễ dàng định hướng cuộc đàm phán\n \ntheo ý mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Khả năng áp dụng đa dạng (trực tiếp và gián tiếp): Chiến lược không chỉ giới hạn ở việc</span></div>\n<p class=\"body-txt\">\nhai người đóng vai rõ ràng mà còn có thể được biến tấu một cách tinh vi qua các yếu tố\n \ngián tiếp (ví dụ: tạo ra các tình huống &quot;quân xanh quân đỏ&quot; hoặc sử dụng các yếu tố\n \nkhách quan để tạo áp lực). Điều này quan trọng vì nó mở rộng phạm vi áp dụng, cho\n \nphép doanh nghiệp linh hoạt sử dụng kỹ thuật này trong nhiều tình huống khác nhau mà\n \nkhông cần phải lộ liễu, từ đó bảo vệ hình ảnh nhưng vẫn đạt được mục tiêu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Cân nhắc về đạo đức và tính phù hợp: Mặc dù được trình bày như một kỹ thuật hiệu quả,</span></div>\n<p class=\"body-txt\">\ndiễn giả lại nhấn mạnh rằng không phải lúc nào cũng cần thiết và không khuyến khích sử\n \ndụng bừa bãi. Điều này quan trọng vì nó nhắc nhở người học về tầm quan trọng của sự\n \nchính trực và uy tín trong kinh doanh. Việc hiểu rõ khi nào nên dùng và khi nào không,\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><p class=\"body-txt\">\ncũng như hậu quả tiềm ẩn, là chìa khóa để áp dụng chiến lược một cách có trách nhiệm\n \nvà bền vững.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Người xấu luôn luôn gây những cái áp lực căng thẳng và khó chịu, cho nên đối tác của chúng\n \nta muốn kết thúc trò chơi này càng sớm càng tốt.”\n \n“Tôi không khuyến khích bạn sử dụng phương pháp này, nhưng dù sao đi nữa, nó vẫn có hiệu\n \nquả trong một số trường hợp.”\n \n“Bạn mua một căn nhà... Bạn cho một vài người hỏi giá, trả giá xuống... Bạn đến trả giá cao\n \nhơn một chút, bạn dễ dàng chiến thắng trong trò chơi mua nhà này.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Bài 19: Sẵn sàng từ bỏ</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Tóm tắt. Buổi giảng này trình bày chiến lược &quot;sẵn sàng từ bỏ&quot; trong đàm phán. Cốt lõi là khi</h3>\n<p class=\"body-txt\">\nnhu cầu của bạn càng cao thì năng lượng đàm phán càng giảm, và ngược lại, người có năng\n \nlượng cao sẽ là người chiến thắng. Việc sẵn sàng từ bỏ giúp bạn đo lường được giới hạn của\n \nđối phương và mang lại sức mạnh đáng kể trong mọi cuộc thương lượng. Diễn giả khuyến\n \nkhích luyện tập thường xuyên chiến lược này để đạt được thành công.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Giới thiệu chiến lược &quot;sẵn sàng từ bỏ&quot; là một chiến lược quan trọng mà bạn phải luyện</span></div>\n<p class=\"body-txt\">\ntập và sử dụng thường xuyên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Nguyên lý: Nếu nhu cầu (của bạn) lên cao thì năng lượng (đàm phán) đi xuống. Bạn càng</span></div>\n<p class=\"body-txt\">\nmuốn món hàng này thì năng lực đàm phán của bạn càng giảm đi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ngược lại, nếu bạn không thực sự muốn nó, năng lượng của bạn rất cao. Người có năng</span></div>\n<p class=\"body-txt\">\nlượng cao là người chiến thắng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bí quyết của chiến lược này là bạn phải tạo ra cho bản thân mình rằng bạn không thực</span></div>\n<p class=\"body-txt\">\nsự muốn cái sản phẩm này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ngay cả khi bạn không có phương án B (lựa chọn thay thế), bạn vẫn sẵn sàng từ bỏ công</span></div>\n<p class=\"body-txt\">\nviệc đàm phán này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Đừng quá yêu thích công việc đàm phán, đừng quá yêu thích sản phẩm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Khi bạn luôn sẵn sàng từ bỏ, lúc này người ta có thể giảm giá cho bạn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ví dụ minh họa: Những người đi chợ (giống mẹ/vợ diễn giả) thường xuyên áp dụng – họ</span></div>\n<p class=\"body-txt\">\nmặc cả xong, nếu người kia không đồng ý, họ sẵn sàng dắt xe đi và thường người kia sẽ\n \ngọi lại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">&quot;Sẵn sàng từ bỏ&quot; là một trong những cái công cụ để chúng ta có thể đo lường xem giá</span></div>\n<p class=\"body-txt\">\nbên kia có thể chấp nhận là gì.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sẵn sàng từ bỏ sẽ cho bạn rất nhiều sức mạnh trong đàm phán.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Hãy luôn nghĩ rằng bạn có thể chiến thắng bằng từ bỏ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Hãy đưa chiến lược này vào trong kinh doanh và sử dụng thường xuyên trong công việc</span></div>\n<p class=\"body-txt\">\nmua bán của mình.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Khuyến khích luyện tập nhiều hơn và đừng ngần ngại phương pháp này vì đây là một</span></div>\n<p class=\"body-txt\">\nphương pháp khá phổ biến trong đàm phán.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Mối quan hệ nghịch đảo giữa mong muốn và năng lượng: &quot;Nếu nhu cầu lên cao thì năng</span></div>\n<p class=\"body-txt\">\nlượng đi xuống.&quot; Đây là điểm cốt lõi vì nó chỉ ra một sự thật tâm lý trái ngược với bản\n \nnăng. Chúng ta thường nghĩ rằng càng muốn điều gì đó thì càng phải cố gắng đạt được,\n \nnhưng trong đàm phán, sự khao khát quá mức lại làm giảm đi sức mạnh thương lượng\n \ncủa chúng ta, khiến chúng ta dễ dàng chấp nhận những điều khoản kém lợi hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sức mạnh của sự buông bỏ giả định: &quot;Bí quyết của chiến lược này là bạn phải tạo ra cho</span></div>\n<p class=\"body-txt\">\nbản thân mình rằng bạn không thực sự muốn cái sản phẩm này.&quot; Điều này quan trọng vì\n \nnó đặt trọng tâm vào tư duy và kiểm soát cảm xúc của bản thân. Bằng cách giả vờ không\n \nquá mặn mà, bạn giữ được sự bình tĩnh, khách quan và không bị chi phối bởi áp lực tâm\n \nlý, từ đó có thể đưa ra quyết định tốt hơn và ít bị lợi dụng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">&quot;Sẵn sàng từ bỏ&quot; như một công cụ đo lường giá trị: &quot;Sẵn sàng từ bỏ là một trong những</span></div>\n<p class=\"body-txt\">\ncái công cụ để chúng ta có thể đo lường xem giá bên kia có thể chấp nhận là gì.&quot; Điểm\n \nnày đắt giá vì nó biến việc đàm phán không chỉ thành cuộc chiến thắng thua mà còn là\n \nquá trình thu thập thông tin. Khi bạn sẵn sàng từ bỏ, bạn đang đẩy đối phương đến giới\n \nhạn thực sự của họ, giúp bạn hiểu rõ hơn về giá trị thị trường hoặc mức độ linh hoạt tối\n \nđa của đối tác, điều này rất hữu ích cho các giao dịch trong tương lai.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Nếu nhu cầu lên cao thì năng lượng đi xuống.”\n \n“Đừng quá yêu thích công việc đàm phán, đừng quá yêu thích sản phẩm.”\n \n“Bạn có thể chiến thắng bằng từ bỏ.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Bài 20: Tạo mới không chia</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Tóm tắt. Buổi giảng tập trung vào chiến lược &quot;Tạo mới không chia&quot; trong kinh doanh và</h3>\n<p class=\"body-txt\">\nđàm phán. Cốt lõi của chiến lược này là con người luôn mong muốn nhận được một sản\n \nphẩm trọn vẹn, dù nhỏ, thay vì một phần của một sản phẩm lớn. Do đó, doanh nghiệp nên\n \ntạo ra những sản phẩm hoàn chỉnh, có giá trị độc lập (dù kích thước hoặc giá thành có thể\n \nnhỏ hơn sản phẩm chính), thay vì chia cắt sản phẩm lớn thành nhiều phần không trọn vẹn.\n \nMục tiêu là để khách hàng cảm thấy hài lòng hơn và tăng khả năng bán hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Chiến lược được trình bày là &quot;Tạo mới không chia&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Con người luôn mong muốn nhận được một sản phẩm trọn vẹn (hoàn chỉnh), chứ không</span></div>\n<p class=\"body-txt\">\nphải một phần hay một góc của một sản phẩm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ví dụ minh họa: Nếu cắt một miếng bánh lớn thành nhiều phần nhỏ để chia cho mỗi</span></div>\n<p class=\"body-txt\">\nngười, họ sẽ không hài lòng bằng việc mỗi người nhận được một viên bánh nhỏ trọn vẹn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Trong đàm phán, hãy tạo ra những sản phẩm trọn vẹn cho mỗi người.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Hãy tạo ra những sản phẩm hoàn chỉnh dù &quot;nhỏ hơn cũng được&quot;, có &quot;giá thấp hơn&quot;, chứ</span></div>\n<p class=\"body-txt\">\nkhông phải là một phần của sản phẩm chính.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Mục đích là giúp khách hàng cảm thấy hài lòng hơn trong quá trình đàm phán.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Phương pháp này có thể áp dụng bằng cách chia nhỏ một dịch vụ/sản phẩm rất lớn</span></div>\n<p class=\"body-txt\">\nthành nhiều dịch vụ/sản phẩm mới, đóng gói chúng thành những sản phẩm hoàn chỉnh\n \nvà bán cho khách hàng để họ dễ mua hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ví dụ từ chính khóa học của diễn giả: Nếu khách hàng không thể mua cả một khóa học</span></div>\n<p class=\"body-txt\">\nlớn, diễn giả chia khóa học đó thành từng module nhỏ hoàn chỉnh để khách hàng có thể\n \nmua từng module.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Nếu khách hàng không đủ tiền để mua sản phẩm chính của bạn, bạn có thể bán cho họ</span></div>\n<p class=\"body-txt\">\nnhững sản phẩm nhỏ hơn, hoàn chỉnh với giá nhỏ hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Hiểu tâm lý khách hàng muốn sự &quot;trọn vẹn&quot;: &quot;Con người luôn mong muốn nhận được</span></div>\n<p class=\"body-txt\">\nmột cái sản phẩm gì đó là trọn vẹn chứ không mong muốn nhận một sản phẩm là một\n \ngóc của một sản phẩm.&quot; (0:16-0:23). Điểm này quan trọng vì nó định hướng lại cách\n \nchúng ta cấu trúc sản phẩm và dịch vụ. Thay vì chỉ tập trung vào việc chia nhỏ để giảm\n \ngiá, chúng ta cần đảm bảo mỗi phân khúc cung cấp một giá trị hoàn chỉnh, đáp ứng được\n \nnhu cầu tâm lý cơ bản của khách hàng về một trải nghiệm đầy đủ, từ đó nâng cao sự hài\n \nlòng và lòng trung thành.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Định nghĩa lại &quot;sản phẩm nhỏ&quot; thay vì &quot;phần sản phẩm&quot;: &quot;Hãy tạo ra sản phẩm nhỏ hơn,</span></div>\n<p class=\"body-txt\">\ncó giá thấp hơn, chứ không phải là sản phẩm một phần của sản phẩm chính.&quot; (1:01-\n \n1:06). Đây là insight hành động then chốt. Nó khuyến khích doanh nghiệp tư duy sáng\n \ntạo để phát triển các sản phẩm/dịch vụ mới, độc lập hoàn toàn, nhắm đến những phân\n \nkhúc khách hàng hoặc nhu cầu cụ thể hơn, thay vì chỉ đơn thuần cắt giảm tính năng hoặc\n \nquy mô của sản phẩm gốc. Điều này giúp mở rộng thị trường, tiếp cận khách hàng có\n \nngân sách hạn chế mà vẫn duy trì chất lượng và giá trị cảm nhận của thương hiệu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Chiến lược tiếp theo: Tạo mới không chia.”\n \n“Con người luôn mong muốn nhận được một cái sản phẩm gì đó là trọn vẹn chứ không mong\n \nmuốn nhận một sản phẩm là một góc của một sản phẩm.”\n \n“Hãy tạo ra sản phẩm nhỏ hơn, có giá thấp hơn, chứ không phải là sản phẩm một phần của\n \nsản phẩm chính.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Chương 4</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Bài 21: Tử huyệt cảm xúc</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Tóm tắt. Buổi giảng giới thiệu &quot;tử huyệt cảm xúc&quot; như một vũ khí quan trọng để làm chủ</h3>\n<p class=\"body-txt\">\nđàm phán và xây dựng mối quan hệ. Diễn giả trình bày 6 tử huyệt chính của con người (bản\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><p class=\"body-txt\">\nthân/sống còn, tiền bạc, tình yêu thương/kết nối, danh vọng, được phát triển, cống hiến).\n \nCốt lõi của bài học là việc một nhà đàm phán tài ba cần phát hiện hai tử huyệt quan trọng\n \nnhất của đối tác thông qua lắng nghe, quan sát và đặt câu hỏi, sau đó tìm cách thỏa mãn\n \nchúng để đạt được mục tiêu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Giới thiệu &quot;Tử huyệt cảm xúc&quot;: Đây là một vũ khí vô cùng quan trọng trong đàm phán,</span></div>\n<p class=\"body-txt\">\ngiúp xây dựng mối quan hệ tốt hơn và làm chủ nhiều lĩnh vực khác của đời sống, đặc biệt\n \nlà những vấn đề liên quan đến con người.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Có 6 tử huyệt khác nhau, chia thành hai cấp độ: 4 tử huyệt cơ bản và 2 tử huyệt ở cấp độ</span></div>\n<p class=\"body-txt\">\ncao hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tử huyệt 1: Bản thân (sống còn)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sử dụng ví dụ tấm ván trên mặt đất, cách mặt đất 50cm, 1m7 và 150m (giữa hai tòa nhà</span></div>\n<p class=\"body-txt\">\ncao 150m). Hầu hết mọi người sẽ không đi qua tấm ván cao 150m vì sợ chết.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tuy nhiên, nếu có một tên cướp chĩa súng đe dọa &quot;hoặc đi qua, hoặc bóp cò&quot;, hầu hết mọi</span></div>\n<p class=\"body-txt\">\nngười sẽ lựa chọn đi qua vì sự sống còn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Con người sẽ hành động những điều mà trước đó họ chưa sẵn sàng, nếu điều đó liên</span></div>\n<p class=\"body-txt\">\nquan đến sự sống còn của bản thân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tử huyệt 2: Tiền bạc</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ví dụ tương tự với tấm ván cao 150m, nhưng ở phía bên kia có 20, 50, 100 tỷ đồng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Rất nhiều người sẽ thử sức đi qua tấm ván để có tiền.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Nhiều người sẽ làm một việc gì đó bởi vì tiền bạc.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tử huyệt 3: Tình yêu thương và sự kết nối</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ví dụ tấm ván cao 150m, không có cướp, không có tiền, nhưng mẹ hoặc con của bạn</span></div>\n<p class=\"body-txt\">\nđang chới với kêu cứu ở phía bên kia.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Nhiều người sẵn sàng hy sinh bản thân mình vì sự sống còn của những người trong gia</span></div>\n<p class=\"body-txt\">\nđình mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Con người làm điều gì đó vì họ yêu thương những người xung quanh mình, vì sự kết nối,</span></div>\n<p class=\"body-txt\">\nmối quan hệ với những người xung quanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tử huyệt 4: Danh vọng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ví dụ về Nick Wallenda đi dây qua hẻm núi Grand Canyon (hơn 1000m dài, rất cao, chỉ</span></div>\n<p class=\"body-txt\">\nbằng một sợi cáp, không có lưới đỡ). Anh ta làm điều đó không vì tiền, không vì tình yêu\n \nthương, không vì sống còn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Người ta làm điều gì đó bởi vì muốn được khen ngợi, muốn được nổi tiếng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Xung đột giữa các tử huyệt: Một vài tử huyệt có thể xung đột với nhau (ví dụ: tình yêu</span></div>\n<p class=\"body-txt\">\nthương và danh vọng). Khi danh vọng đi lên, thường phải hy sinh những mối kết nối.\n \nMỗi người sẽ có sự quan tâm tới những tử huyệt khác nhau.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tử huyệt 5: Được phát triển (cấp cao hơn)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Xuất hiện khi 4 tử huyệt cơ bản phía dưới được thỏa mãn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ai trong chúng ta cũng muốn mình được tốt hơn ngày hôm qua, muốn phát triển hơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Rất nhiều người sẽ làm một điều gì đó để được phát triển đi lên.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tử huyệt 6: Cống hiến (cấp cao hơn)</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Xuất hiện khi 4 tử huyệt cơ bản phía dưới được thỏa mãn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Cái cuối cùng của mỗi một con người được tồn tại trên cuộc đời này là được giúp đỡ</span></div>\n<p class=\"body-txt\">\nnhững người khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Nhiều triệu phú khi đạt đến đỉnh cao trong cuộc đời thường quay trở lại giúp đỡ người</span></div>\n<p class=\"body-txt\">\nkhác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ứng dụng trong đàm phán:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Là một nhà đàm phán tài ba, cần phát hiện hai tử huyệt chính trong 6 tử huyệt này của</span></div>\n<p class=\"body-txt\">\nđối tác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Cách phát hiện: Thông qua câu chuyện, những câu hỏi, sự lắng nghe và quan sát.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sau khi tìm thấy, hãy tìm cách làm thỏa mãn họ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Hãy hỏi nhiều hơn, lắng nghe nhiều hơn và tập trung xác định tử huyệt của đối tác để</span></div>\n<p class=\"body-txt\">\nlàm chủ đàm phán.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tử huyệt cảm xúc là công cụ đòn bẩy vĩ đại, vượt xa logic thông thường: Khi đối diện với</span></div>\n<p class=\"body-txt\">\ncác tử huyệt (đặc biệt là bản thân/sống còn và tiền bạc), con người có thể hành động trái\n \nvới bản năng sợ hãi hay những quyết định thông thường. Điều này quan trọng vì nó cho\n \nthấy rằng để tác động đến người khác, cần phải chạm đến những động lực sâu xa, không\n \nchỉ dừng lại ở lý lẽ hay bề mặt.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Mỗi người có các tử huyệt ưu tiên khác nhau và chúng có thể xung đột: Hiểu rằng không</span></div>\n<p class=\"body-txt\">\ncó công thức chung cho mọi đối tác. Một người có thể coi trọng tiền bạc hơn danh vọng,\n \ntrong khi người khác lại ưu tiên tình yêu thương. Hơn nữa, việc theo đuổi một tử huyệt\n \n(ví dụ danh vọng) có thể yêu cầu hy sinh tử huyệt khác (như kết nối). Điều này đòi hỏi\n \nnhà đàm phán phải có khả năng phân tích, linh hoạt và cá nhân hóa chiến lược của mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Kỹ năng lắng nghe, quan sát và đặt câu hỏi là cốt lõi để xác định tử huyệt: Bài giảng nhấn</span></div>\n<p class=\"body-txt\">\nmạnh rằng việc tìm ra tử huyệt không phải là đoán mò mà là một quá trình thu thập\n \nthông tin chủ động. Điều này quan trọng vì nó biến khái niệm tâm lý thành các hành\n \nđộng cụ thể và thực tế trong giao tiếp, nhấn mạnh giá trị của các kỹ năng mềm trong bất\n \nkỳ tương tác nào.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Vũ khí vô cùng quan trọng trong đàm phán... giúp bạn xây dựng mối quan hệ trong cuộc đời\n \nnày trở nên tốt hơn, nó giúp cho bạn làm chủ rất nhiều lĩnh vực khác của đời sống...”\n \n“Ai đó làm điều gì đó bởi vì muốn được khen ngợi, ai đó làm một điều gì đó vì muốn được nổi\n \ntiếng.”\n \n“Việc của bạn là một nhà đàm phán tài ba, cần phát hiện đấy hai tử huyệt chính trong sáu tử\n \nhuyệt này thông qua câu chuyện, thông qua những câu hỏi, thông qua sự lắng nghe, thông qua\n \nsự quan sát của bạn.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#f9a825\">Bài 22: Phụ kiện</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Tóm tắt. Buổi giảng này tập trung vào việc sử dụng &quot;phụ kiện&quot; như một &quot;vũ khí&quot; chiến lược</h3>\n<p class=\"body-txt\">\nquan trọng trong đàm phán kinh doanh. Diễn giả chỉ ra rằng lợi nhuận từ các sản phẩm phụ\n \ntrợ đôi khi còn cao hơn sản phẩm chính, một thực tế thường bị bỏ qua. Doanh nghiệp có thể\n \nnhượng bộ về giá sản phẩm chính để thu hút khách hàng, đồng thời tối ưu hóa lợi nhuận\n \ntổng thể thông qua việc bán kèm các phụ kiện hoặc dịch vụ liên quan.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Buổi học này sẽ tập trung vào một &quot;vũ khí&quot; quan trọng để chiến thắng trong đàm phán,</span></div>\n<p class=\"body-txt\">\nsau khi đã học về chiến lược.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">&quot;Vũ khí&quot; đầu tiên được giới thiệu là &quot;phụ kiện&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Trong kinh doanh, sản phẩm chính đôi khi có lợi nhuận thấp hơn so với phụ kiện.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ví dụ: Bán điện thoại có khi lợi nhuận nằm ở vỏ điện thoại hoặc pin sạc dự phòng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Chiến lược đàm phán: Có thể cho khách hàng giá sản phẩm chính thấp hơn thị trường,</span></div>\n<p class=\"body-txt\">\nnhưng bán kèm với những sản phẩm phụ có khi lại có lợi nhuận cao hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ví dụ về ngành ô tô: Dịch vụ ô tô (sửa chữa, bảo hành, duy trì) mang lại lợi nhuận cao</span></div>\n<p class=\"body-txt\">\nhơn nhiều so với việc bán chính chiếc xe (bán xe chỉ lãi vài chục triệu). Phụ tùng ô tô\n \ncũng có thể bán rất đắt và lợi nhuận cao hơn bán xe.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ví dụ về ngành điện thoại/máy tính bảng: Các cửa hàng bán vỏ (case) cho điện thoại</span></div>\n<p class=\"body-txt\">\nhoặc iPad có khi đạt lợi nhuận cao hơn cả việc bán thiết bị chính.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Phụ kiện có thể có giá trị và lợi nhuận cao hơn sản phẩm chính.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Lời khuyên: Khi đàm phán, nếu bạn có thể nhường khách hàng ở sản phẩm chính, thì</span></div>\n<p class=\"body-txt\">\nđừng quên khai thác lợi nhuận từ phụ kiện.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Khẳng định: Phụ kiện là một vũ khí quan trọng trong đàm phán.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Lợi nhuận từ phụ kiện thường cao hơn sản phẩm chính: Đây là một tư duy phản trực</span></div>\n<p class=\"body-txt\">\ngiác với nhiều người kinh doanh thường chỉ tập trung vào sản phẩm cốt lõi. Việc nhận ra\n \ntiềm năng lợi nhuận lớn từ các sản phẩm hoặc dịch vụ phụ trợ giúp doanh nghiệp tối ưu\n \nhóa nguồn thu, đặc biệt khi sản phẩm chính có tính cạnh tranh cao hoặc biên lợi nhuận\n \nthấp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sử dụng phụ kiện như một đòn bẩy chiến lược trong đàm phán: Khả năng linh hoạt về</span></div>\n<p class=\"body-txt\">\ngiá sản phẩm chính (chấp nhận biên lợi nhuận thấp hơn hoặc thậm chí hòa vốn) để thu\n \nhút khách hàng, sau đó bù đắp và tối đa hóa lợi nhuận thông qua việc bán kèm phụ kiện\n \nhoặc dịch vụ liên quan, là một chiến lược đàm phán cực kỳ hiệu quả. Nó không chỉ giúp\n \nđạt được thỏa thuận mà còn tăng giá trị trọn đời của khách hàng và tạo dòng tiền ổn\n \nđịnh hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Bạn có thể cho khách hàng được cái giá của sản phẩm chính có thể thấp hơn giá thị trường,\n \nnhưng mà bạn bán kèm với những sản phẩm phụ có khi lại có được lợi nhuận cao hơn.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Phụ kiện đôi khi lợi nhuận lại cao hơn sản phẩm chính.”\n \n“Phụ kiện là một vũ khí trong đàm phán.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Bài 23: Trang phục</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Tóm tắt. Buổi học này tập trung vào chiến lược đàm phán thông qua việc tạo ra sự tương</h3>\n<p class=\"body-txt\">\nđồng, đặc biệt nhấn mạnh vai trò của trang phục. Bằng cách quan sát và ăn mặc giống như\n \nđối tác, ta có thể dễ dàng xây dựng cảm giác thân thiện và sự tin tưởng. Con người có xu\n \nhướng tìm kiếm điểm khác biệt ở lần gặp đầu tiên, nhưng sau đó sẽ tìm những điểm chung\n \nvà yêu quý những ai có sự tương đồng với mình. Trang phục vì vậy trở thành một &quot;vũ khí&quot;\n \nquan trọng, có thể điều chỉnh linh hoạt để đạt được hiệu quả cao trong đàm phán.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Chiến lược đàm phán được đề cập là &quot;tạo ra sự tương đồng&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">&quot;Vũ khí&quot; quan trọng để tạo ra sự tương đồng là trang phục (quần áo).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Hãy để ý và quan sát cách đối tác ăn mặc ở những lần gặp trước hoặc hiện tại.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Chúng ta nên ăn mặc tương đồng với phong cách của đối tác (ví dụ: thoải mái tự do hoặc</span></div>\n<p class=\"body-txt\">\nbusiness, vest, cà vạt).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Lý do:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ở những lần gặp đầu tiên, con người thường tìm những điểm *khác biệt*.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ở những lần gặp tiếp theo, con người có xu hướng tìm những điểm *chung* (tương</span></div>\n<p class=\"body-txt\">\nđồng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Chúng ta ghét ai đó vì nhìn thấy điểm khác biệt, yêu quý ai đó vì nhìn thấy điểm tương</span></div>\n<p class=\"body-txt\">\nđồng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Việc ăn mặc giống như đối tác sẽ nhanh chóng tạo ra cảm giác thân thiện giữa hai người.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Có thể linh hoạt điều chỉnh trang phục ngay tại buổi gặp (ví dụ: cởi áo com-lê, tháo lỏng</span></div>\n<p class=\"body-txt\">\ncà vạt) để phù hợp với đối tác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Trang phục cũng có thể tạo nên sức mạnh trong đàm phán, và việc sử dụng nó một cách</span></div>\n<p class=\"body-txt\">\nphù hợp sẽ giúp đàm phán dễ dàng hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Trang phục là một &quot;vũ khí&quot; chiến lược trong đàm phán, giúp tạo sự tương đồng: Nhiều</span></div>\n<p class=\"body-txt\">\nngười thường xem nhẹ vai trò của trang phục, chỉ coi nó là bề ngoài. Tuy nhiên, bài học\n \nnày chỉ ra rằng trang phục là một công cụ mạnh mẽ, dễ dàng sử dụng để xây dựng sự kết\n \nnối và thiện cảm ban đầu với đối tác. Điều này quan trọng vì nó ảnh hưởng trực tiếp đến\n \ntâm lý và sự tin tưởng trong quá trình giao tiếp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sự thay đổi trong tâm lý con người khi gặp gỡ: từ tìm kiếm khác biệt đến tìm kiếm tương</span></div>\n<p class=\"body-txt\">\nđồng: Đây là một insight tâm lý sâu sắc. Việc nhận biết rằng con người ban đầu có xu\n \nhướng tìm điểm khác biệt nhưng sau đó lại muốn tìm điểm chung (tương đồng) giúp\n \nchúng ta định hình chiến lược giao tiếp. Việc ăn mặc tương đồng là một cách hiệu quả để\n \n&quot;thúc đẩy&quot; giai đoạn tìm kiếm điểm chung, làm tăng khả năng đối tác cảm thấy thoải mái\n \nvà tin tưởng hơn.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Khả năng linh hoạt và điều chỉnh trang phục ngay trong cuộc họp: Điểm này nhấn mạnh</span></div>\n<p class=\"body-txt\">\nrằng việc tạo sự tương đồng không phải là một nguyên tắc cứng nhắc mà đòi hỏi sự nhạy\n \nbén và thích nghi. Khả năng &quot;ứng biến&quot; như cởi áo khoác hoặc tháo cà vạt cho thấy sự\n \ntinh tế trong việc đọc vị đối phương và chủ động tạo ra một môi trường giao tiếp thoải\n \nmái, phù hợp nhất.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Chúng ta có thể tạo ra sự tương đồng bằng cách ăn mặc giống như đối tác của chúng ta.”\n \n“Con người chúng ta ở những lần gặp đầu tiên họ thường tìm những cái điểm khác biệt.\n \nNhưng ở những lần tiếp theo, gặp gỡ tiếp theo thì con người có xu hướng tìm những điểm\n \nchung.”\n \n“Trang phục cũng có thể tạo nên sức mạnh trong đàm phán.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Bài 24: Điện thoại</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Tóm tắt. Buổi giảng này tập trung vào việc sử dụng điện thoại di động như một &quot;vũ khí&quot;</h3>\n<p class=\"body-txt\">\nchiến lược trong đàm phán. Diễn giả hướng dẫn cách dùng điện thoại để thoát khỏi các tình\n \nhuống bế tắc, tạo áp lực hoặc giành quyền kiểm soát bằng cách tạm dừng đàm phán. Ngoài\n \nra, nó cũng được dùng để đối phó với chiến lược &quot;người thứ ba&quot; của đối tác, giúp ta tiếp cận\n \nđược người ra quyết định thực sự và tăng lợi thế đàm phán.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Những &quot;vũ khí&quot; trong đàm phán cần được sử dụng kết hợp với các chiến lược để đạt</span></div>\n<p class=\"body-txt\">\nhiệu quả cao hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Chiến lược &quot;người thứ ba&quot; đã được đề cập trong các buổi trước.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Điện thoại di động được giới thiệu là một &quot;vũ khí vô cùng lợi hại&quot; trong đàm phán.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ứng dụng 1: Thoát khỏi những tình huống bế tắc.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bạn có thể nhờ người khác gọi điện thoại cho mình định kỳ (ví dụ: cứ mỗi 15 phút).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Nếu cuộc đàm phán đang đi theo hướng tích cực, có hiệu quả cao, bạn có thể giả vờ tắt</span></div>\n<p class=\"body-txt\">\ntiếng chuông điện thoại để đối tác nghĩ bạn bận và đàm phán đang rất tốt.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Nếu cuộc đàm phán đang bế tắc, hãy nghe điện thoại và viện cớ có việc bận để tạm dừng</span></div>\n<p class=\"body-txt\">\ncuộc đàm phán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Mục đích của việc tạm dừng: thoát ra khỏi bế tắc, có thêm thông tin, thêm quyền lực,</span></div>\n<p class=\"body-txt\">\nkhông bị áp lực về thời gian, và có thể quay trở lại đàm phán sau với vị thế tốt hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ứng dụng 2: Đối phó khi đối tác sử dụng chiến lược &quot;người thứ ba&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Dùng điện thoại của chính bạn để bấm số máy của &quot;người thứ ba&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Lý do cần dùng điện thoại của mình: để tránh việc đối tác đưa số máy giả hoặc nói dối</span></div>\n<p class=\"body-txt\">\nrằng không liên lạc được với người thứ ba.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Nếu &quot;người thứ ba&quot; là có thật, bạn sẽ có số điện thoại của người ra quyết định cuối cùng</span></div>\n<p class=\"body-txt\">\n(&quot;người quyết định trò chơi&quot;) và có thể đàm phán trực tiếp với họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Việc sử dụng điện thoại để &quot;thoát&quot; (thoát bế tắc) hay để &quot;tấn công&quot; (tiếp cận người thứ</span></div>\n<p class=\"body-txt\">\nba) phụ thuộc vào cách bạn thực hiện.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Điện thoại di động là một vũ khí tuyệt vời và cách bạn sử dụng nó sẽ quyết định cuộc</span></div>\n<p class=\"body-txt\">\nchơi của bạn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Điện thoại di động không chỉ là công cụ liên lạc mà là một vũ khí chiến lược: Đây là một</span></div>\n<p class=\"body-txt\">\ncách nhìn nhận mới mẻ về một vật dụng phổ biến. Thay vì chỉ dùng để gọi/nhắn tin, diễn\n \ngiả chỉ ra rằng điện thoại có thể được dùng để kiểm soát tình huống, tạo áp lực hoặc thay\n \nđổi cục diện đàm phán. Điều này quan trọng vì nó mở rộng tư duy về việc tận dụng mọi\n \nnguồn lực xung quanh để đạt được mục tiêu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Khả năng chủ động tạm dừng đàm phán để củng cố vị thế: Thay vì cố gắng giải quyết một</span></div>\n<p class=\"body-txt\">\ncuộc đàm phán đang bế tắc ngay lập tức, việc sử dụng điện thoại làm &quot;lý do&quot; để tạm\n \ndừng cho phép người đàm phán có thời gian suy nghĩ, thu thập thông tin, giảm áp lực và\n \nquay lại với một chiến lược hiệu quả hơn. Đây là một kỹ thuật mạnh mẽ để tránh mắc\n \nkẹt và mất kiểm soát.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sử dụng chính điện thoại của mình để kiểm chứng thông tin và tiếp cận quyền lực: Khi</span></div>\n<p class=\"body-txt\">\nđối phó với chiến lược &quot;người thứ ba&quot;, việc yêu cầu gọi từ điện thoại của chính mình là\n \nthen chốt. Nó giúp xác minh tính xác thực của người thứ ba và quan trọng hơn, có thể\n \ngiúp bạn trực tiếp có được thông tin liên hệ của người ra quyết định, từ đó đàm phán\n \ntrực tiếp và hiệu quả hơn mà không qua trung gian bị bóp méo thông tin.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Điện thoại di động sẽ được sử dụng như một vũ khí vô cùng lợi hại trong đàm phán.”\n \n“Chúng ta thoát ra khỏi cái việc đàm phán đang bế tắc bằng việc là chúng ta sử dụng điện\n \nthoại di động... để chúng ta có nhiều thông tin hơn, chúng ta có thêm được nhiều quyền lực\n \nhơn, chúng ta không bị áp lực về thời gian thì chúng ta sẽ có thể dễ dàng quay trở lại đàm\n \nphán sau.”\n \n“Cách mà bạn sử dụng vũ khí này sẽ quyết định trò chơi của bạn.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Bài 25: Tiền mặt và thẻ tín dụng</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Tóm tắt. Buổi giảng tập trung vào việc sử dụng &quot;tiền mặt&quot; như một vũ khí đàm phán hiệu</h3>\n<p class=\"body-txt\">\nquả. Diễn giả nhấn mạnh rằng tiền mặt là &quot;tử huyệt&quot; của một số đối tác, và việc cho họ thấy\n \nkhả năng thanh toán bằng tiền mặt thể hiện sự sẵn sàng và nghiêm túc của bạn trong giao\n \ndịch. Việc này giúp tạo ưu thế, đẩy nhanh quá trình đàm phán và dễ dàng đạt được chiến\n \nthắng, củng cố quan điểm &quot;Cash is King&quot; – tiền mặt là một loại quyền lực quan trọng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tiền mặt là một vũ khí tiếp theo trong đàm phán.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tiền mặt là một trong những &quot;tử huyệt&quot; của một số người.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Nếu &quot;tử huyệt&quot; của đối tác là tiền mặt, chúng ta có thể sử dụng tiền mặt làm vũ khí đàm</span></div>\n<p class=\"body-txt\">\nphán.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Cho đối tác thấy bạn có tiền mặt sẵn sàng chứng tỏ sự sẵn sàng của bạn trong việc mua</span></div>\n<p class=\"body-txt\">\nbán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Nhiều người khi nhìn thấy tiền thì cảm xúc thay đổi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Trong các chương trình đàm phán lớn, hãy luôn cho đối tác thấy bạn sẵn sàng, có khả</span></div>\n<p class=\"body-txt\">\nnăng thanh toán và muốn thực hiện hợp đồng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Khi đối tác nhìn thấy khả năng thanh toán của bạn, họ thường chọn bạn hơn những</span></div>\n<p class=\"body-txt\">\nngười chưa sẵn sàng thanh toán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tiền là một loại quyền lực, bên cạnh quyền lực về thông tin và thời gian.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">&quot;Cash is King&quot; (Tiền mặt là vua).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Khi cho người ta nhìn thấy tiền, việc đàm phán có khả năng trở nên nhanh chóng và dễ</span></div>\n<p class=\"body-txt\">\ndàng hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Hãy cho đối phương của bạn thấy bạn đã sẵn sàng bước vào cuộc kinh doanh.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tiền mặ
