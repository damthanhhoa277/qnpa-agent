<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tuyệt Chiêu Đàm Phán</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#e8eaf0;font-family:'Segoe UI',Arial,sans-serif}
body{display:flex;flex-direction:column;align-items:center;padding:18px 10px 24px}

/* Book wrapper */
#book-wrap{width:720px;max-width:98vw;display:flex;flex-direction:column}

/* Top bar: title + page info */
#top-bar{display:flex;justify-content:space-between;align-items:center;
          margin-bottom:6px;padding:0 2px}
#book-title{font-size:13px;font-weight:600;color:#444;white-space:nowrap;
             overflow:hidden;text-overflow:ellipsis;max-width:60%}
#page-info{font-size:13px;color:#666;white-space:nowrap}

/* Progress bar */
#progress-bar{width:100%;height:3px;background:#d0d0d0;border-radius:2px;margin-bottom:10px}
#progress-fill{height:100%;border-radius:2px;transition:width .3s;background:#f9a825}

/* Page */
.pg{width:100%;min-height:540px;background:#ffffff;border-radius:6px;
     box-shadow:0 2px 16px rgba(0,0,0,.12);overflow:hidden}

/* Cover */
.pg-cover{display:flex;justify-content:center;align-items:center;min-height:540px}
.cover-wrap{text-align:center;padding:60px 40px}
.cover-tag{font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;font-weight:600}
.cover-title{font-size:28px;font-weight:700;color:#1a1a1a;line-height:1.4;margin-bottom:16px}
.cover-sub{font-size:14px;font-weight:500}

/* Content page */
.pg-content{}
.pg-inner{padding:28px 36px 32px;overflow-y:auto;max-height:540px}
.pg-inner::-webkit-scrollbar{width:5px}
.pg-inner::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

/* Typography */
.sec-hdr{font-size:12px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
          margin:18px 0 8px;padding-bottom:5px;border-bottom:1px solid #eee}
.sec-hdr:first-child{margin-top:0}
.body-txt{font-size:14px;color:#2d2d2d;line-height:1.8;margin-bottom:10px;text-align:justify}
.bullet{display:flex;gap:10px;margin:5px 0}
.bul-dot{font-size:18px;line-height:1.4;flex-shrink:0;margin-top:-1px}
.bul-txt{font-size:13.5px;color:#2d2d2d;line-height:1.7}

/* Navigation */
#nav{display:flex;align-items:center;gap:14px;margin-top:12px}
.nav-btn{background:#fff;border:2px solid #f9a825;color:#f9a825;padding:8px 24px;
          border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;
          transition:all .15s;letter-spacing:.5px}
.nav-btn:hover{background:#f9a825;color:#fff}
.nav-btn:disabled{opacity:.35;cursor:default}
#page-jump{width:52px;text-align:center;border:1px solid #ccc;border-radius:5px;
            padding:6px;font-size:13px;color:#444}
</style>
</head>
<body>
<div id="book-wrap">
  <div id="top-bar">
    <div id="book-title">Tuyệt Chiêu Đàm Phán</div>
    <div id="page-info">1 / 50</div>
  </div>
  <div id="progress-bar"><div id="progress-fill" style="width:2.0%"></div></div>
  <div id="book"></div>
</div>
<div id="nav">
  <button class="nav-btn" id="btn-prev" onclick="prev()" disabled>◄ Trước</button>
  <input id="page-jump" type="number" min="1" max="50" value="1"
         onchange="goTo(+this.value-1)" title="Nhảy đến trang">
  <button class="nav-btn" id="btn-next" onclick="next()">Tiếp ►</button>
</div>
<script>
const pages=["<div class=\"pg pg-cover\" style=\"border-top:5px solid #f9a825\">\n  <div class=\"cover-wrap\">\n    <div class=\"cover-tag\" style=\"color:#f9a825\">Sổ Tay Tinh Hoa · QNPA</div>\n    <div class=\"cover-title\">Tuyệt Chiêu Đàm Phán</div>\n    <div class=\"cover-sub\" style=\"color:#f9a825\">48 trang nội dung đầy đủ</div>\n  </div>\n</div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><p class=\"body-txt\">\nTuyệt Chiêu Đàm Phán\n \nSổ tay tinh hoa\n</p>\n<p class=\"body-txt\">\nTổng hợp 32 bài\n \nNguồn: khoá học Tuyệt Chiêu Đàm Phán\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><p class=\"body-txt\">\nLời mở\n \nQuyển sách này tổng hợp tinh hoa khoá Tuyệt Chiêu Đàm Phán, do AI nghe lại từng bài giảng\n \nvà chắt lọc thành: tóm tắt, ý chính, điểm quan trọng nhất, và trích dẫn đáng nhớ.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><p class=\"body-txt\">\nMục lục\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Chương 1</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Cách ghi chép bài hiệu quả - Hãy thực hành ngay</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Chương 2</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 1: Giới thiệu chung</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 2: Tại sao bạn phải học đàm phán</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 3: Chiến thắng trong đàm phán</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 4: Những yếu tố ảnh hưởng khi đàm phán</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Chương 3</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 5: Chiến lược hỏi</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 6: Tìm kiếm sự tương đồng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 7: Chiến lược Tạo ra lý do</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 8: Quyết tâm không làm người đi đầu</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 9: Kết thúc trong tâm trí</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 10: Tạo cạnh tranh</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 11: Tỏ ra ngờ nghệch</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 12: Luôn có Phương Án B</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 13: Tung hứng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 14: Môi trường hợp tác</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 15: Đàm phán tổng thể</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 16: Người thứ 3</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 17: Sử dụng in ấn</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 18: Kẻ xấu người tốt</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 19: Sẵn sàng từ bỏ</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 20: Tạo mới không chia</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Chương 4</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 21: Tử huyệt cảm xúc</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 22: Phụ kiện</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 23: Trang phục</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 24: Điện thoại</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 25: Tiền mặt và thẻ tín dụng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 26: Sự tử tế</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 27: Bảo hành</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 28: Phong thủy</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 29: Phương tiện</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 30: Địa điểm</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài 31: Tổng kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#f9a825\">Chương 1</h3>\n<p class=\"body-txt\">\nCách ghi chép bài hiệu quả - Hãy thực hành ngay\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Tóm tắt. Buổi giảng giới thiệu một phương pháp ghi chú cá nhân hiệu quả, dựa trên nguyên</h3>\n<p class=\"body-txt\">\nlý của Cornell Note-taking, được diễn giả điều chỉnh. Cốt lõi của phương pháp là sử dụng sổ\n \nA4 cho ghi chép chính và sổ A5 để mang theo, với bố cục ba cột rõ ràng: tiêu đề, nội dung và\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">hành động. Đặc biệt, diễn giả nhấn mạnh tầm quan trọng của việc &quot;cắt dán&quot; những thông tin</h3>\n<p class=\"body-txt\">\nđắt giá, loại bỏ phần không cần thiết để tinh gọn kiến thức, đồng thời luôn liên kết mỗi ý\n \ntưởng với một hành động cụ thể để tạo ra kết quả thực tế.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Phân loại sổ ghi chép: Sử dụng sổ A4 để ghi chép chính, tổng hợp và sổ A5 để ghi nhanh,</span></div>\n<p class=\"body-txt\">\nmang theo bên mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Cấu trúc ghi chú (Phương pháp Cornell cá nhân hóa):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sổ A4 được chia thành 3 cột: Cột trái (lề 3.5cm) cho các tiêu đề chính; Cột giữa (khoảng</span></div>\n<p class=\"body-txt\">\n14cm) cho nội dung chi tiết; Cột phải (lề 3.5cm) cho các hành động cần thực hiện.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Khi có ý tưởng hoặc thông tin mới, ghi vào sổ A5, sau đó cắt dán những phần quan trọng</span></div>\n<p class=\"body-txt\">\nvào sổ A4.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Công cụ ghi chép: Sử dụng bút chì 2B để ghi chép (diễn giả khẳng định bút chì hiệu quả</span></div>\n<p class=\"body-txt\">\ngấp &quot;nghìn lần&quot; bút bi tẩy được).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Kỹ thuật ghi chú:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ghi cách dòng để dễ dàng chỉnh sửa hoặc bổ sung thông tin.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Khi mắc lỗi, không xóa mà gạch ngang phần sai và ghi phần đúng lên trên.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Mục tiêu đọc lại nhanh: Mỗi trang ghi chú phải được đọc lại trong vòng 1 phút; 100 trang</span></div>\n<p class=\"body-txt\">\ntrong 100 phút, khuyến khích sự cô đọng và dễ hiểu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ghi chú mọi lúc: Ghi lại mọi ý tưởng phát sinh, không chỉ giới hạn trong lớp học.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Đi kèm ý tưởng với hành động: Mọi ý tưởng phải được liên kết với một hành động cụ</span></div>\n<p class=\"body-txt\">\nthể, vì &quot;hành động là cái quan trọng nhất&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sử dụng giấy nháp và viết một mặt:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Dùng giấy nháp để tiết kiệm và không ngại &quot;phí phạm&quot;, khuyến khích thử nghiệm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Chỉ viết một mặt để dễ dàng cắt dán những nội dung hay.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">&quot;Cắt dán&quot; thông tin: Tương tự thao tác Ctrl+C, Ctrl+V trên máy tính, cắt những phần hay,</span></div>\n<p class=\"body-txt\">\nquan trọng từ các ghi chú và dán vào sổ chính để tạo ra một cuốn sổ tinh túy.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bộ công cụ học tập bổ sung: Kéo và hồ dán (hồ dán khô) là hai công cụ mới cần thiết cho</span></div>\n<p class=\"body-txt\">\nphương pháp cắt dán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tối ưu hóa cuốn sổ: Biến cuốn sổ thành một tập hợp các thông tin cốt lõi, loại bỏ những</span></div>\n<p class=\"body-txt\">\ngì không hay, không quan trọng để cuốn sổ &quot;hay lên&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Gợi ý đọc sách: Cuốn &quot;Khoa học về sự đơn giản&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Nâng cao: Diễn giả có nhắc đến việc dùng bút dạ bốn màu cho phương pháp ghi chú</span></div>\n<p class=\"body-txt\">\nchuyên sâu hơn (không trình bày chi tiết).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">★ Điểm quan trọng nhất</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">&quot;Hành động là cái quan trọng nhất ở đây&quot;: Diễn giả nhấn mạnh rằng việc thu nhận kiến</span></div>\n<p class=\"body-txt\">\nthức hay ý tưởng mà không chuyển hóa thành hành động cụ thể thì sẽ không mang lại\n \nbất kỳ kết quả nào. Đây là một insight cực kỳ quan trọng vì nó định hướng người học\n \nkhông chỉ dừng lại ở việc tiếp thu thông tin mà phải chủ động áp dụng để tạo ra giá trị,\n \ntừ đó biến kiến thức thành sức mạnh thực tế.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Phương pháp &quot;cắt dán&quot; để tinh lọc kiến thức (tương tự Ctrl+C, Ctrl+V): Thay vì giữ lại</span></div>\n<p class=\"body-txt\">\ntoàn bộ ghi chú, người học được hướng dẫn cắt những phần thông tin thực sự giá trị và\n \ndán vào cuốn sổ chính. Điều này quan trọng vì nó buộc người học phải tư duy chọn lọc,\n \nchắt chiu những tinh hoa, loại bỏ nhiễu và xây dựng một cuốn sổ cá nhân hóa, chỉ chứa\n \nđựng những tri thức cốt lõi và hữu ích nhất, giúp việc ôn tập và áp dụng hiệu quả hơn rất\n \nnhiều.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Mục tiêu đọc lại nhanh (1 phút/trang): Yêu cầu mọi ghi chú phải được viết sao cho có</span></div>\n<p class=\"body-txt\">\nthể đọc lại trong vòng 1 phút. Điều này quan trọng vì nó rèn luyện kỹ năng tóm tắt, trình\n \nbày thông tin một cách cô đọng và logic. Khi thông tin được ghi chép ngắn gọn, mạch lạc,\n \nquá trình ôn tập sẽ diễn ra nhanh chóng, giúp củng cố kiến thức và ghi nhớ lâu hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Hành động là cái quan trọng nhất ở đây.”\n \n“Bút chì hiệu quả gấp nghìn lần bút bi tẩy được.”\n \n“Cả một tập tài liệu này rất là hay. Nhưng nó chỉ p tất cả mọi người cùng chiến</span></div>\n<p class=\"body-txt\">\nthắng (Win-Win). Điều này quan trọng vì nó thay đổi tư duy đàm phán từ một cuộc đối\n \nđầu thành một quá trình hợp tác để tìm ra giải pháp tối ưu cho mọi bên. Trong kinh\n \ndoanh, tư duy này giúp xây dựng mối quan hệ bền vững, tạo dựng lòng tin và giá trị lâu\n \ndài, đặc biệt quan trọng trong các giao dịch B2B.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Hành động quan trọng hơn kiến thức. &quot;Điều quan trọng hơn không phải là bạn biết mà là</span></div>\n<p class=\"body-txt\">\nnhững điều bạn làm.&quot; Đây là một lời nhắc nhở mạnh mẽ rằng lý thuyết chỉ có giá trị khi\n \nđược áp dụng vào thực tế. Việc thực hành, trải nghiệm và rút kinh nghiệm từ những gì\n \nđã làm mới là yếu tố then chốt dẫn đến sự thành công và phát triển kỹ năng đàm phán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tập trung làm chủ một số ít chiến lược/vũ khí thay vì dàn trải. &quot;Chỉ cần ba chiến lược, ba</span></div>\n<p class=\"body-txt\">\nvũ khí mà sử dụng cho thật nhuần nhuyễn, bạn đã là bậc diễn giả trong đàm phán rồi.&quot;\n \nInsight này cung cấp một lộ trình thực tế để đạt được sự thành thạo. Thay vì cố gắng học\n \nvà áp dụng mọi thứ một cách hời hợt, việc tập trung làm sâu một vài phương pháp hiệu\n \nquả nhất sẽ giúp bạn nhanh chóng trở nên chuyên nghiệp và tự tin trong các tình huống\n \nđàm phán.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Đàm phán không chỉ là chiến thắng mà còn giúp tất cả mọi người trong quan hệ này được\n \nchiến thắng.”\n \n“Điều quan trọng hơn không phải là bạn biết mà là những điều bạn làm.”\n \n“Chỉ cần ba chiến lược, ba vũ khí mà sử dụng cho thật nhuần nhuyễn, bạn đã là bậc diễn giả\n \ntrong đàm phán rồi.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Bài 2: Tại sao bạn phải học đàm phán</h3>\n  luyện cách điều khiển tâm lý của bản thân, làm cho &quot;cái tôi của mình được nhỏ</span></div>\n<p class=\"body-txt\">\nhơn&quot;, từ đó &quot;con đường thành công của bạn sẽ trở nên dễ dàng hơn.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Chuẩn bị công cụ và phương pháp ghi chép cho khóa học:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Cần chuẩn bị 2 công cụ: bút chì và giấy trắng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Giấy trắng được chia làm 3 cột:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Cột bên trái (3.5cm): Ghi tiêu đề/tên bài học.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Cột ở giữa (khoảng 14cm): Ghi nội dung của bài học.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Cột bên phải (3.5cm): Ghi những hành động cụ thể mà bạn sẽ làm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Lời khuyên cuối cùng: Học thì chưa thể có được kết quả, nhưng bằng việc thực hành lặp</span></div>\n<p class=\"body-txt\">\nđi lặp lại sẽ thay đổi cuộc sống.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Đàm phán là yếu tố then chốt để đạt được mọi mong muốn trong cuộc sống: &quot;Mọi điều</span></div>\n<p class=\"body-txt\">\nbạn muốn, để có được nó, thì bạn đều phải có được thông qua đàm phán.&quot; Điểm này\n \nquan trọng vì nó thay đổi hoàn toàn cách chúng ta nhìn nhận các tương tác hàng ngày, từ\n \nviệc đơn thuần mong muốn một điều gì đó thành việc cần có chiến lược đàm phán để đạt\n \nđược nó. Nó nhấn mạnh tính phổ quát và sự cần thiết của kỹ năng này trong mọi khía\n \ncạnh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Đàm phán không chỉ trong kinh doanh mà còn trong gia đình và các mối quan hệ cá</span></div>\n<p class=\"body-txt\">\nnhân: Diễn giả đặc biệt nhắc đến việc đàm phán xuất hiện &quot;ngay cả trong gia đình của\n \nchúng ta&quot;. Điều này quan trọng bởi nó mở rộng tầm nhìn về đàm phán, không chỉ là công\n \ncụ trong công việc mà còn là kỹ năng sống thiết yếu để xây dựng mối quan hệ hài hòa,\n \nthấu hiểu lẫn nhau và đạt được hạnh phúc trong các tương tác cá nhân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Làm chủ đàm phán giúp thu nhỏ &quot;cái tôi&quot; và đơn giản hóa con đường thành công: Việc</span></div>\n<p class=\"body-txt\">\nđàm phán giúp &quot;cái tôi của mình được nhỏ hơn&quot; và &quot;con đường thành công của bạn sẽ\n \ntrở nên dễ dàng hơn&quot;. Đây là một insight sâu sắc, liên kết kỹ năng bên ngoài (đàm phán)\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><p class=\"body-txt\">\nvới sự phát triển nội tại (kiểm soát cái tôi). Một cái tôi nhỏ hơn giúp ta dễ lắng nghe, dễ\n \nchấp nhận sự khác biệt và linh hoạt hơn trong việc tìm kiếm giải pháp, từ đó thúc đẩy\n \nthành công bền vững.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Thực hành lặp đi lặp lại là điều kiện tiên quyết để có kết quả: &quot;Học thì chưa thể có được</span></div>\n<p class=\"body-txt\">\nkết quả, nhưng bằng việc thực hành lặp đi lặp lại, tôi tin chắc cuộc sống của bạn sẽ hoàn\n \ntoàn khác.&quot; Đây là lời nhắc nhở quan trọng về sự khác biệt giữa kiến thức và năng lực\n \nthực tế. Kỹ năng đàm phán, giống như mọi kỹ năng khác, chỉ phát triển và mang lại hiệu\n \nquả khi được áp dụng và mài giũa liên tục, không chỉ dừng lại ở việc tiếp thu lý thuyết.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Mọi điều bạn muốn, để có được nó, thì bạn đều phải có được thông qua đàm phán.”\n \n“Học thì chưa thể có được kết quả, nhưng bằng việc thực hành lặp đi lặp lại, tôi tin chắc cuộc\n \nsống của bạn sẽ hoàn toàn khác.”\n \n“...bạn làm cho cái tôi của mình nhỏ hơn, con đường thành công của bạn sẽ trở nên dễ dàng\n \nhơn.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Bài 3: Chiến thắng trong đàm phán</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Tóm tắt. Buổi học định nghĩa chiến thắng trong đàm phán không phải là một bên thắng, mà</h3>\n<p class=\"body-txt\">\nlà cả hai bên cùng thắng (win-win) khi đều đạt được điều mình muốn. Mức độ cao nhất của\n \nđàm phán thành công là khi tất cả các bên liên quan – bạn, đối tác, nhân viên, thị trường và\n \nxã hội – đều chiến thắng (win-win-win-win). Nguyên tắc cốt lõi là các bên trao đổi những giá\n \ntrị mình có mà đối tác cần, từ đó tạo ra giá trị gia tăng nhờ sự hợp tác. Diễn giả cũng lưu ý\n \nkhông nên sử dụng các kỹ thuật đàm phán này để chèn ép những người yếu thế hoặc đang\n \ngặp khó khăn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Chiến thắng trong đàm phán là khi cả hai bên đều cảm thấy chiến thắng (đàm phán win-</span></div>\n<p class=\"body-txt\">\nwin).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Thắng là khi bạn đạt được điều bạn muốn và đối tác của bạn cũng đạt được điều họ</span></div>\n<p class=\"body-txt\">\nmuốn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Trong đàm phán, mỗi bên đều có những quyền lợi, ham muốn và giá trị khác nhau có thể</span></div>\n<p class=\"body-txt\">\ntrao đổi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Quá trình đàm phán là việc chúng ta mang những giá trị mình có (mà đối tác cần) để đưa</span></div>\n<p class=\"body-txt\">\ncho họ, và ngược lại, cần những điều họ có để nhận từ họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Cuộc đàm phán chỉ một bên chiến thắng là một cuộc đàm phán thất bại, vì sẽ không ai</span></div>\n<p class=\"body-txt\">\nmuốn kinh doanh hay hợp tác cùng bạn trong tương lai.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Một cuộc đàm phán &quot;cực kỳ tuyệt vời&quot; là khi tất cả các bên liên quan (bạn, đối tác, nhân</span></div>\n<p class=\"body-txt\">\nviên của bạn, nhân viên của đối tác, thị trường, toàn bộ xã hội) đều chiến thắng (win-\n \nwin-win-win...).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Hợp tác trong đàm phán giúp tạo ra những giá trị gia tăng mới mà không thể có được khi</span></div>\n<p class=\"body-txt\">\ncác bên hoạt động riêng lẻ (ví dụ: vườn nhãn và đàn ong).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tuyệt đối không sử dụng các kỹ thuật đàm phán này để chèn ép những người đang gặp</span></div>\n<p class=\"body-txt\">\nkhó khăn (như nông dân bán sản phẩm trực tiếp, người nghèo khó).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Có thể đàm phán với người khó khăn nhằm mục đích học tập và rèn luyện, nhưng sau</span></div>\n<p class=\"body-txt\">\nkhi đàm phán xong, hãy trả đủ số tiền cho họ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Định nghĩa &quot;chiến thắng&quot; mở rộng thành &quot;win-win-win-win&quot; (tất cả các bên liên quan</span></div>\n<p class=\"body-txt\">\nđều thắng):\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">*Vì sao quan trọng:* Diễn giả nâng tầm khái niệm đàm phán lên một cấp độ mới, không</span></div>\n<p class=\"body-txt\">\nchỉ dừng lại ở lợi ích song phương mà bao hàm toàn bộ hệ sinh thái. Điều này khuyến\n \nkhích tư duy bền vững, xây dựng mối quan hệ lâu dài và tạo ra giá trị chung cho cộng\n \nđồng, thay vì chỉ tập trung vào lợi ích ngắn hạn của hai bên trực tiếp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Đàm phán thành công tạo ra giá trị gia tăng thông qua hợp tác:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">*Vì sao quan trọng:* Đây là bản chất của đàm phán hiệu quả. Nó không phải là chia một</span></div>\n<p class=\"body-txt\">\nchiếc bánh có sẵn mà là cùng nhau làm ra một chiếc bánh lớn hơn. Ví dụ về vườn nhãn\n \nvà đàn ong minh họa rõ ràng rằng sự kết hợp các nguồn lực và nhu cầu có thể mang lại\n \nlợi ích tổng thể vượt trội so với việc mỗi bên hoạt động độc lập, thúc đẩy tư duy sáng tạo\n \nvà tìm kiếm giải pháp cộng sinh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Cuộc đàm phán chỉ có một bên thắng là thất bại vì không ai muốn hợp tác trong tương</span></div>\n<p class=\"body-txt\">\nlai:\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">*Vì sao quan trọng:* Nhấn mạnh tầm quan trọng của việc xây dựng và duy trì mối quan</span></div>\n<p class=\"body-txt\">\nhệ. Nếu bạn chỉ tập trung vào lợi ích của riêng mình, bạn sẽ mất đi những cơ hội hợp tác\n \nquý giá trong tương lai. Điều này nhắc nhở rằng lòng tin và uy tín là tài sản vô giá trong\n \nkinh doanh, và việc đạt được lợi ích chung là chìa khóa cho sự phát triển bền vững.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Một cuộc đàm phán được thành công đó là cả hai bên đều cảm thấy chiến thắng.”\n \n“Nếu chỉ mình bạn chiến thắng thì cuộc đàm phán đó là một cuộc đàm phán thất bại. Không ai\n \nmuốn kinh doanh cùng bạn, không ai muốn cùng hợp tác với bạn trong tương lai.”\n \n“Một cuộc đàm phán tuyệt vời phải là win-win-win-win, tất cả các bên có liên quan đến cuộc\n \nđàm phán đều phải thành công.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Bài 4: Những yếu tố ảnh hưởng khi đàm phán</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Tóm tắt. Buổi học tập trung vào ba yếu tố cốt lõi quyết định chất lượng và thành công của</h3>\n<p class=\"body-txt\">\nmột cuộc đàm phán: thông tin, thời gian và các quyền lực khác. Diễn giả nhấn mạnh rằng\n \nbên có càng nhiều thông tin về đối phương và ít áp lực về thời gian sẽ càng có lợi thế. Mục\n \ntiêu là phải chủ động thu thập thông tin kỹ lưỡng về nhu cầu, động lực và giới hạn của đối\n \ntác trước và trong khi đàm phán để tăng cường quyền lực và đạt được kết quả mong muốn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Buổi giảng tập trung vào các yếu tố ảnh hưởng tới chất lượng của việc đàm phán.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Có 3 yếu tố chính ảnh hưởng đến đàm phán:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Thông tin: Bên nào càng có nhiều thông tin hơn thì càng dễ dàng chiến thắng trong đàm</span></div>\n<p class=\"body-txt\">\nphán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Thời gian: Bên nào càng có áp lực về thời gian thì bên đó càng thiếu quyền lực trong</span></div>\n<p class=\"body-txt\">\nđàm phán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Quyền lực khác: Bao gồm quyền lực về tiền, địa vị xã hội, giới tính, v.v.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ví dụ minh họa (mua tủ lạnh):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Người bán hàng không trực tiếp chào mời mà ẩn mình quan sát, lắng nghe câu chuyện</span></div>\n<p class=\"body-txt\">\ncủa khách hàng (diễn giả và vợ) để thu thập thông tin chi tiết.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Người bán tìm hiểu nhu cầu cụ thể (loại tủ lạnh nào, kích thước, vị trí kê), ai là người</span></div>\n<p class=\"body-txt\">\nquyết định chi tiêu và loại sản phẩm khách hàng quan tâm nhất (nơi khách hàng dừng lại\n \nlâu nhất).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Người bán hàng cũng tìm hiểu mức độ cần thiết của sản phẩm (&quot;rất cần&quot;, &quot;cần&quot; hay chỉ</span></div>\n<p class=\"body-txt\">\n&quot;tìm kiếm&quot;) và khả năng chi trả của khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Việc có nhiều thông tin giúp người bán đưa ra mức giá và chiến lược đàm phán phù hợp,</span></div>\n<p class=\"body-txt\">\nđặc biệt khi khách hàng có nhu cầu &quot;rất cần&quot; với áp lực thời gian cao.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Lời khuyên tổng kết:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Luôn quan sát, lắng nghe và đặt câu hỏi để thu thập càng nhiều thông tin càng tốt trước</span></div>\n<p class=\"body-txt\">\nkhi bạn bước vào cuộc đàm phán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Kiểm tra thông tin, áp lực về thời gian và các quyền lực khác của cả hai bên để củng cố vị</span></div>\n<p class=\"body-txt\">\nthế của mình.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Thông tin là nền tảng của mọi quyền lực trong đàm phán.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">*Vì sao quan trọng:* Diễn giả đã dùng toàn bộ ví dụ về người bán hàng để chứng minh</span></div>\n<p class=\"body-txt\">\nrằng người có thông tin càng sâu rộng về đối tác (nhu cầu, động lực, giới hạn, ngân sách,\n \nngười quyết định, mức độ khẩn cấp) thì càng có khả năng dự đoán, điều chỉnh chiến\n \nlược và đạt được mục tiêu mong muốn, thậm chí định đoạt mức giá có lợi. Nó giúp biến\n \nmột cuộc giao dịch thông thường thành một giao dịch có lợi hơn cho bên có thông tin.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Áp lực thời gian trực tiếp làm suy yếu quyền lực đàm phán.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">*Vì sao quan trọng:* Khi một bên có áp lực thời gian lớn (ví dụ: &quot;rất cần&quot; tủ lạnh ngay lập</span></div>\n<p class=\"body-txt\">\ntức), họ sẽ mất đi vị thế mặc cả và dễ dàng chấp nhận các điều khoản bất lợi hơn. Việc\n \nnhận biết và quản lý áp lực thời gian của cả mình và đối phương là chìa khóa để duy trì\n \nhoặc giành lấy quyền kiểm soát trong cuộc đàm phán, tránh bị &quot;ép&quot; giá.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Kỹ năng quan sát, lắng nghe và đặt câu hỏi là công cụ thu thập thông tin đắc lực.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">*Vì sao quan trọng:* Thay vì chỉ tập trung vào việc trình bày hay bán hàng một cách vội</span></div>\n<p class=\"body-txt\">\nvã, người bán hàng thông minh (như trong ví dụ) chủ động &quot;ẩn mình&quot; để theo dõi hành\n \nvi, lắng nghe cuộc trò chuyện và dùng câu hỏi dẫn dắt để khai thác những thông tin quý\n \ngiá mà khách hàng có thể không chủ động tiết lộ. Đây là những kỹ năng thiết yếu để xây\n \ndựng một &quot;kho thông tin&quot; vững chắc trước khi chính thức đặt vấn đề đàm phán và đưa\n \nra giải pháp phù hợp nhất.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#f9a825\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Bên nào càng có nhiều thông tin hơn thì bên đó càng dễ dàng chiến thắng trong đàm phán.”\n \n“Bên nào càng có áp lực hơn về thời gian thì bên đó càng thiếu quyền lực trong đàm phán.”\n \n“Hãy quan sát, lắng nghe để có thể có được nhiều thông tin hơn trước khi bạn bước vào cuộc\n \nđàm phán.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Chương 3</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Bài 5: Chiến lược hỏi</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Tóm tắt. Buổi giảng này tập trung vào các chiến lược đàm phán, nhấn mạnh rằng quá trình</h3>\n<p class=\"body-txt\">\nđàm phán, thông tin và phong cách thể hiện chính con người của người đàm phán. Để đạt\n \nkết quả, việc học cần đi đôi với thực hành liên tục các chiến lược. Trong số 16 chiến lược\n \nđược giới thiệu, điểm cốt lõi và quan trọng nhất là chiến lược &quot;Hỏi&quot;, coi đây là khởi đầu cho\n \nmọi cuộc đàm phán, giúp người hỏi nắm giữ sự chủ động và nâng cao khả năng chiến thắng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Quá trình đàm phán, thông tin và phong cách đàm phán đều là sự thể hiện con người của</span></div>\n<p class=\"body-txt\">\nbạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Cần luyện tập thường xuyên và liên tục các chiến lược đàm phán.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Học lý thuyết mà không thực hành thì sẽ không có kết quả.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Có 16 chiến lược đàm phán vô cùng tuyệt vời, nhưng chỉ cần sử dụng 3 trong số đó là có</span></div>\n<p class=\"body-txt\">\nthể chiến thắng bất kỳ cuộc đàm phán nào.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Hãy dùng những chiến lược có hiệu quả với bạn; cái nào không hiệu quả thì cứ quên nó</span></div>\n<p class=\"body-txt\">\nđi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Chiến lược đàm phán đầu tiên và quan trọng nhất là &quot;Hỏi&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Nếu không hỏi, cuộc đàm phán sẽ không bao giờ được bắt đầu.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Mọi thứ được kiến tạo trong tâm trí trước; việc quyết định &quot;phải hỏi&quot; sẽ tạo cơ hội để</span></div>\n<p class=\"body-txt\">\nchiến thắng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Việc hỏi giúp bạn là người chủ động kiểm soát nguồn năng lượng trong cuộc đàm phán.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Người có năng lượng cao hơn là người chiến thắng; người hỏi luôn có năng lượng cao</span></div>\n<p class=\"body-txt\">\nhơn, do đó khả năng chiến thắng sẽ cao hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Hãy hỏi về bất kỳ điều gì: giá, giảm giá, thời gian có giá tốt, sản phẩm, nhu cầu, điều</span></div>\n<p class=\"body-txt\">\nkhoản thanh toán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Đừng để người bán hàng hỏi bạn, hãy chủ động hỏi trước khi người bán kịp hỏi bạn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ngay cả khi bạn bế tắc nhất, hãy hỏi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bắt đầu mọi cuộc đàm phán bằng việc hỏi.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">★ Điểm quan trọng nhất</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Đàm phán là sự thể hiện con người và cần được thực hành: Diễn giả nhấn mạnh rằng</span></div>\n<p class=\"body-txt\">\nđàm phán không chỉ là một kỹ năng hay tập hợp các chiến thuật, mà nó còn phản ánh\n \ncon người và phong cách của bạn. Điểm này quan trọng vì nó chuyển tư duy người học\n \ntừ việc chỉ tìm kiếm &quot;chiêu trò&quot; sang việc phát triển bản thân và rèn luyện kỹ năng một\n \ncách bền vững. Việc nhấn mạnh &quot;thực hành nhiều hơn&quot; cũng là một lời nhắc nhở rằng lý\n \nthuyết không đủ để tạo ra kết quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sức mạnh của sự chủ động thông qua chiến lược &quot;Hỏi&quot;: Đây là chiến lược cốt lõi được</span></div>\n<p class=\"body-txt\">\ntrình bày. Việc &quot;hỏi&quot; không chỉ đơn thuần là thu thập thông tin mà còn là hành động tạo\n \nra khởi đầu cho cuộc đàm phán, và quan trọng hơn, là cách để người hỏi chủ động kiểm\n \nsoát &quot;nguồn năng lượng&quot;. Diễn giả khẳng định &quot;Ai có năng lượng cao hơn, người đó là\n \nngười chiến thắng. Người hỏi luôn luôn là người có năng lượng cao hơn&quot;. Insight này đắt\n \ngiá vì nó định vị việc hỏi là một công cụ trao quyền, giúp người đàm phán dẫn dắt, thay\n \nvì bị dẫn dắt, và từ đó tăng cơ hội thành công.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Áp dụng có chọn lọc và thực dụng các chiến lược: Thay vì yêu cầu người học phải nhớ và</span></div>\n<p class=\"body-txt\">\náp dụng tất cả 16 chiến lược, diễn giả đưa ra lời khuyên rất thực tế: &quot;Cái nào có hiệu quả\n \nđối với bạn, bạn dùng, cái nào không có hiệu quả, cứ quên nó đi.&quot; và &quot;chỉ cần 3 trong số\n \n16 chiến lược này thôi thì tôi tin chắc rằng bạn sẽ có thể chiến thắng bất kỳ cuộc đàm\n \nphán nào&quot;. Điều này giúp người học không bị quá tải, tập trung vào những gì phù hợp\n \nnhất với bản thân và tình huống cụ thể, khuyến khích sự linh hoạt và hiệu quả trong ứng\n \ndụng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Nếu bạn không hỏi thì không bao giờ cuộc đàm phán được bắt đầu.”\n \n“Cái nào có hiệu quả đối với bạn, bạn dùng, cái nào không có hiệu quả, cứ quên nó đi.”\n \n“Ai có năng lượng cao hơn, người đó là người chiến thắng. Người hỏi luôn luôn là người có\n \nnăng lượng cao hơn.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Bài 6: Tìm kiếm sự tương đồng</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Tóm tắt. Buổi học này tập trung vào &quot;Chiến lược số 2: Tạo ra sự tương đồng&quot; trong đàm</h3>\n<p class=\"body-txt\">\nphán, kế thừa từ &quot;chiến lược hỏi&quot; trước đó. Cốt lõi là con người tự nhiên yêu mến và tin\n \ntưởng những gì giống mình, vì vậy việc chủ động tạo ra các điểm chung sẽ giúp môi trường\n \nđàm phán trở nên dễ dàng và thuận lợi hơn. Các phương pháp bao gồm điều chỉnh vị trí ngồi\n \n(góc 90 độ hoặc cùng một phía), sử dụng tên của đối tác, và khai thác các sở thích, đam mê,\n \nhoặc thông tin cá nhân chung thông qua việc hỏi, lắng nghe và quan sát kỹ lưỡng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài học trước nói về &quot;chiến lược hỏi&quot;, nhấn mạnh: &quot;Nếu bạn không đàm phán thì bạn sẽ</span></div>\n<p class=\"body-txt\">\nkhông bao giờ có được điều bạn muốn.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bài học này giới thiệu &quot;chiến lược số 2: tạo ra sự tương đồng&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sự tương đồng giúp môi trường đàm phán dễ dàng hơn vì con người luôn muốn tìm</span></div>\n<p class=\"body-txt\">\nkiếm những thứ giống với bản thân và sẽ cảm thấy yêu mến điều đó.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Cách tạo ra sự tương đồng:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Về góc nhìn: Không bao giờ ngồi đối diện trong đàm phán vì đó là hành động đối đầu.</span></div>\n<p class=\"body-txt\">\nCách tốt nhất là chọn góc 90 độ hoặc cùng ngồi về một phía.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sử dụng tài liệu (bức tranh, bản vẽ): Dùng tài liệu làm &quot;vũ khí&quot;. Khi trình bày, hãy nhanh</span></div>\n<p class=\"body-txt\">\nchóng chuyển từ vị trí đối diện sang góc 90 độ hoặc cùng một phía.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sử dụng tên gọi: Âm thanh thân thuộc nhất với một con người là tên gọi của chính họ.</span></div>\n<p class=\"body-txt\">\nHãy sử dụng tên của đối tác trong cuộc đàm phán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Nói về những điều họ quan tâm, sở thích, nhu cầu, đam mê: Dùng kỹ thuật hỏi (từ chiến</span></div>\n<p class=\"body-txt\">\nlược 1) để tìm hiểu các sở thích như chơi golf, nhiếp ảnh, âm nhạc, sau đó đề cập đến\n \nchúng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tìm kiếm các điểm chung cá nhân: Hỏi về số con, quê quán và các thông tin cá nhân khác</span></div>\n<p class=\"body-txt\">\nđể tìm sự tương đồng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bạn có thể tạo ra mọi sự tương đồng trong cuộc sống bằng cách học cách hỏi nhiều hơn,</span></div>\n<p class=\"body-txt\">\nlắng nghe nhiều hơn, quan sát nhiều hơn và luyện tập nhiều hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sự tương đồng làm cho quá trình đàm phán trở nên tốt đẹp hơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Diễn giả chia sẻ các điểm tương đồng của mình để khuyến khích học viên tương tác (ví</span></div>\n<p class=\"body-txt\">\ndụ: 5 con chuẩn bị 6, là đàn ông, hơn 40 tuổi, chơi thể thao, thích màu đỏ).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">&quot;Sự tương đồng thì dễ dàng hơn cho cái môi trường đàm phán.&quot; và &quot;Con người của</span></div>\n<p class=\"body-txt\">\nchúng ta luôn luôn muốn tìm kiếm những thứ mà giống với bản thân anh ta... anh ta sẽ\n \nluôn cảm thấy yêu mến khi điều đó.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là nguyên lý tâm lý học cơ bản giải thích hiệu quả của chiến lược.</span></div>\n<p class=\"body-txt\">\nKhi hiểu rằng bản chất con người có xu hướng tin tưởng và yêu mến những gì quen\n \nthuộc, giống mình, người đàm phán có thể chủ động xây dựng thiện cảm, giảm sự đề\n \nphòng và tạo điều kiện cho một cuộc đối thoại mở, hợp tác, thay vì đối đầu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">&quot;Đừng bao giờ ngồi đối diện trong đàm phán... Cách làm tốt nhất là chọn góc 90 độ, còn</span></div>\n<p class=\"body-txt\">\nnếu không, hãy cùng ngồi về một phía.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là một lời khuyên chiến thuật cực kỳ cụ thể và dễ áp dụng ngay</span></div>\n<p class=\"body-txt\">\nlập tức, có tác động mạnh mẽ đến tâm lý giao tiếp. Vị trí ngồi đối diện tạo cảm giác đối\n \nkháng, còn góc 90 độ hoặc ngồi cùng một phía thể hiện sự hợp tác, cùng nhau nhìn về\n \nmột mục tiêu hoặc vấn đề chung. Sự thay đổi nhỏ này về không gian vật lý có thể chuyển\n \nđổi toàn bộ không khí của cuộc đàm phán từ căng thẳng sang cởi mở và xây dựng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">&quot;Tài liệu, bức tranh, bản vẽ, bất kỳ cái điều gì đều trở thành vũ khí trong đàm phán, giúp</span></div>\n<p class=\"body-txt\">\nbạn nhanh chóng tạo ra sự tương đồng.&quot; và kỹ thuật chuyển động góc ngồi khi trình bày\n \ntài liệu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Điểm này không chỉ nhấn mạnh tầm quan trọng của các công cụ trực</span></div>\n<p class=\"body-txt\">\nquan mà còn cách biến chúng thành công cụ chiến lược để tạo thiện cảm. Nó cho thấy\n \nkhông chỉ nội dung mà cả cách chúng ta tương tác vật lý với tài liệu và đối tác (chuyển\n \nđộng để cùng nhìn, cùng thảo luận ở góc 90 độ) đều góp phần xây dựng sự tương đồng\n \nvà một không khí hợp tác, giúp thông điệp truyền tải hiệu quả hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Trích dẫn</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Nếu bạn không đàm phán thì bạn sẽ không bao giờ có được điều bạn muốn.”\n \n“Sự tương đồng thì dễ dàng hơn cho cái môi trường đàm phán.”\n \n“Tài liệu, bức tranh, bản vẽ, bất kỳ cái điều gì đều trở thành vũ khí trong đàm phán, giúp bạn\n \nnhanh chóng tạo ra sự tương đồng.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Bài 7: Chiến lược Tạo ra lý do</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Tóm tắt. Buổi học này tập trung vào &quot;chiến lược tạo lý do&quot; trong đàm phán, một chiến lược</h3>\n<p class=\"body-txt\">\nđược diễn giả đánh giá là vô cùng hiệu quả và thường xuyên sử dụng. Cốt lõi của chiến lược\n \nlà tạo ra bất kỳ lý do nào để làm giảm quyền lực của đối phương, từ đó giúp người đàm phán\n \ngiành chiến thắng. Diễn giả trình bày bảy loại lý do cụ thể có thể áp dụng, đồng thời nhấn\n \nmạnh rằng sự sáng tạo và thực hành liên tục là chìa khóa để làm chủ kỹ năng này.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Chiến lược tạo lý do: Là chiến lược được sử dụng thường xuyên nhất, có hiệu quả cao và</span></div>\n<p class=\"body-txt\">\ngiúp đạt được kết quả mong muốn, thậm chí chỉ đơn thuần là niềm vui trong quá trình\n \nđàm phán. Bất kỳ lý do nào làm giảm quyền lực của bên kia sẽ giúp bạn chiến thắng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Lý do 1: Sản phẩm không hoàn hảo: Tạo lý do về việc sản phẩm có những khuyết điểm</span></div>\n<p class=\"body-txt\">\nnhỏ (ví dụ: sách sờn gáy, tượng sứt đuôi, bông hoa đã nở hết, bút đã cũ) để mặc cả giá.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Lý do 2: Không thực sự thích/cần sản phẩm: Thể hiện sự không thực sự thích hoặc</span></div>\n<p class=\"body-txt\">\nkhông cần sản phẩm để tăng quyền lực đàm phán của bản thân. Quy luật là &quot;càng không\n \nmuốn bao nhiêu thì quyền lực của bạn càng cao bấy nhiêu; càng có nhu cầu cao thì\n \nquyền lực càng giảm.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Lý do 3: Mua số lượng lớn / Giới thiệu khách hàng: Đề xuất mua một số lượng lớn sản</span></div>\n<p class=\"body-txt\">\nphẩm hoặc hứa hẹn giới thiệu nhiều khách hàng khác cho đối tác để nhận được ưu đãi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Lý do 4: Cơ hội kinh doanh trong tương lai (mua nhiều lần): Đưa ra lý do về tiềm năng</span></div>\n<p class=\"body-txt\">\nhợp tác dài hạn, cam kết sẽ tiếp tục mua sản phẩm nhiều lần trong tương lai nếu nhận\n \nđược ưu đãi ngay hôm nay.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Lý do 5: Giúp đối tác tiết kiệm chi phí: Mặc cả dựa trên việc giúp đối tác giảm thiểu chi</span></div>\n<p class=\"body-txt\">\nphí (ví dụ: thanh toán tiền mặt để đối tác không mất phí giao dịch thẻ tín dụng; hoặc mặc\n \ncả dựa trên phần trăm hoa hồng mà đối tác nhận được).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Lý do 6: Tiết kiệm chi phí khác / Tiện lợi cho đối tác: Tạo các lý do thuận lợi khác giúp</span></div>\n<p class=\"body-txt\">\nđối tác tiết kiệm chi phí hoặc công sức (ví dụ: tự đến lấy hàng, nhận hàng vào một thời\n \nđiểm linh hoạt).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Lý do 7: Yêu cầu giảm giá sớm hơn mùa khuyến mãi: Mặc cả để nhận được mức giảm giá</span></div>\n<p class=\"body-txt\">\ntheo mùa ngay lập tức, không cần chờ đến thời điểm khuyến mãi chính thức (ví dụ: Giảm\n \ngiá Noel, Tết, mùa hè).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Kết luận: Khuyến khích sự sáng tạo trong việc phát triển các lý do đàm phán và nhấn</span></div>\n<p class=\"body-txt\">\nmạnh rằng càng thực hành nhiều, kỹ năng đàm phán càng được cải thiện.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">★ Điểm quan trọng nhất</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Mục tiêu tối thượng của việc tạo lý do là giảm quyền lực đối phương: &quot;Bất kể cái lý do</span></div>\n<p class=\"body-txt\">\nnào bạn có thể tạo ra mà làm giảm đi cái quyền lực của bên kia thì bạn sẽ là người chiến\n \nthắng trong quá trình đàm phán này.&quot; Điều này quan trọng vì nó cung cấp một nguyên\n \ntắc chỉ đạo rõ ràng cho mọi lý do được tạo ra, không chỉ là đòi hỏi vu vơ mà là chiến lược\n \nthay đổi vị thế.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Mối quan hệ nghịch đảo giữa nhu cầu và quyền lực trong đàm phán: &quot;Càng không muốn</span></div>\n<p class=\"body-txt\">\nbao nhiêu thì quyền lực của bạn càng cao bấy nhiêu, càng có nhu cầu cao thì quyền lực\n \ncàng giảm.&quot; Đây là một insight tâm lý sâu sắc, dạy người học cách kiểm soát cảm xúc và\n \nthể hiện thái độ trong đàm phán để củng cố vị thế của mình, không để nhu cầu bản thân\n \nlàm suy yếu quyền lực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sáng tạo và thực hành liên tục để làm chủ kỹ năng: &quot;Với sự sáng tạo của bạn, bạn có thể</span></div>\n<p class=\"body-txt\">\ntạo ra nhiều lý do hơn nữa trong quá trình đàm phán của mình, nhưng hãy luôn nhớ\n \nđiều này: càng thực hành nhiều bao nhiêu thì bạn càng giỏi bấy nhiêu.&quot; Điểm này quan\n \ntrọng vì nó không chỉ cung cấp các &quot;mẫu&quot; lý do mà còn khuyến khích tư duy mở và phát\n \ntriển kỹ năng cá nhân, biến kiến thức thành năng lực thực tế và linh hoạt trong mọi tình\n \nhuống.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Bất kể cái lý do nào bạn có thể tạo ra mà làm giảm đi cái quyền lực của bên kia thì bạn sẽ là\n \nngười chiến thắng trong quá trình đàm phán này.”\n \n“Càng không muốn bao nhiêu thì quyền lực của bạn càng cao bấy nhiêu, càng có nhu cầu cao\n \nthì quyền lực càng giảm.”\n \n“Nếu anh bán được cho tôi ngày hôm nay thì gần như anh sẽ có tôi trọn đời.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Bài 8: Quyết tâm không làm người đi đầu</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Tóm tắt. Buổi học này tập trung vào chiến lược đàm phán cốt lõi: &quot;quyết tâm không bao giờ</h3>\n<p class=\"body-txt\">\nlà người ra giá trước&quot;, áp dụng cho cả người bán và người mua. Mục tiêu là thu thập thông\n \ntin từ đối phương vì người có nhiều thông tin hơn sẽ chiến thắng, do đó cần giấu thông tin\n \ntài chính của mình. Thay vì đưa ra giá, hãy chủ động đặt các câu hỏi thông minh về ngân sách\n \nhoặc mức giá mong muốn của đối tác, và kiên trì theo đuổi để đạt được giá tốt nhất.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Giới thiệu chiến lược đàm phán: &quot;Quyết tâm không làm người đi đầu&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Nguyên tắc cốt lõi: Không bao giờ là người ra giá trước, dù ở vai trò người mua hay</span></div>\n<p class=\"body-txt\">\nngười bán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Lý do: Người có nhiều thông tin hơn là người chiến thắng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Yêu cầu: Cần giấu đi thông tin về mặt tài chính/ngân sách của mình.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Khi bạn là người mua: Luôn để người bán ra giá trước.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sử dụng các câu hỏi như: &quot;Bao nhiêu tiền cho cái sản phẩm này?&quot; hoặc &quot;Bao nhiêu tiền</span></div>\n<p class=\"body-txt\">\ncho một cái sản phẩm không hoàn hảo này?&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Khi bạn là người bán: Không tiết lộ giá bán trước.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sử dụng các câu hỏi như: &quot;Bạn muốn mua cái sản phẩm trong khoảng giá bao nhiêu?&quot;</span></div>\n<p class=\"body-txt\">\nhoặc &quot;Bạn có ngân sách bao nhiêu cho việc làm này?&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Khi cả hai bên đều biết chiến lược này: Người kiên trì hơn và người đặt ra nhiều câu hỏi</span></div>\n<p class=\"body-txt\">\nhơn sẽ là người chiến thắng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tuyệt đối không được tiết lộ mức ngân sách/mức tài chính bạn có.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Để kiểm tra và đàm phán giá tốt nhất khi người bán đã ra giá:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Hỏi: &quot;Giá tốt nhất mà anh có thể để cho tôi được là bao nhiêu tiền?&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Tiếp tục hỏi để ép giá: &quot;Giá tốt nhất anh có thể để cho tôi bao nhiêu thì anh có một lãi?&quot;</span></div>\n<p class=\"body-txt\">\nhoặc &quot;Giá tốt nhất anh có thể để cho tôi một chút bao nhiêu thì anh vui?&quot;.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Quyết tâm không bao giờ ra giá trước (dù là người mua hay người bán): Đây là nguyên</span></div>\n<p class=\"body-txt\">\ntắc vàng của buổi học. Nó quan trọng vì việc ra giá trước thường đặt bạn vào thế bất lợi,\n \nbạn có thể đưa ra mức giá quá cao (khi mua) hoặc quá thấp (khi bán) so với mức mà đối\n \nphương sẵn sàng chấp nhận, làm mất đi cơ hội tối ưu hóa lợi nhuận.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Người có nhiều thông tin hơn là người chiến thắng: Đây là lý do cốt lõi đằng sau chiến</span></div>\n<p class=\"body-txt\">\nlược. Việc kiên trì đặt câu hỏi và không tiết lộ thông tin tài chính của mình giúp bạn thu\n \nthập được dữ liệu về giới hạn và mong muốn của đối phương, từ đó có thể đưa ra quyết\n \nđịnh đàm phán thông minh hơn và giành lợi thế.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sử dụng các câu hỏi thông minh để khai thác thông tin và ép giá: Diễn giả đưa ra các mẫu</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">câu hỏi cụ thể không chỉ để biết giá mà còn để dò tìm &quot;điểm đau&quot; hoặc &quot;điểm vui&quot; của đối</h3>\n<p class=\"body-txt\">\nphương (ví dụ: &quot;giá tốt nhất bao nhiêu thì anh có lãi/vui&quot;). Điều này giúp bạn không chỉ\n \nlấy được thông tin về giá sàn mà còn hiểu được yếu tố cảm xúc hoặc lợi ích tối thiểu mà\n \nđối phương cần, từ đó đưa ra mức giá có thể chấp nhận được nhưng vẫn có lợi nhất cho\n \nmình.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Quyết tâm không làm người đi đầu.”\n \n“Nếu ai là người có được nhiều thông tin hơn thì người đó là người chiến thắng.”\n \n“Ai kiên trì hơn thì người đó sẽ là người chiến thắng. Ai đặt ra nhiều câu hỏi hơn thì người đó\n \nsẽ là người chiến thắng.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Bài 9: Kết thúc trong tâm trí</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Tóm tắt. Buổi học tập trung vào chiến lược đàm phán mang tên &quot;Kết thúc trong tâm trí&quot;.</h3>\n<p class=\"body-txt\">\nNguyên lý cốt lõi là mọi thứ luôn được kiến tạo hai lần: một lần trong tâm trí và một lần trên\n \nthực tiễn. Để chiến thắng trong đàm phán, người tham gia cần hình dung rõ ràng kết quả\n \nmong muốn trong đầu trước khi bắt đầu. Diễn giả khuyến khích việc chủ động đưa ra mức\n \ngiá ban đầu thấp hơn mức mình muốn mua (hoặc cao hơn mức mình muốn bán), sau đó linh\n \nhoạt nâng/giảm dần để cả hai bên đều cảm thấy chiến thắng và hài lòng với thỏa thuận cuối\n \ncùng.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#f9a825\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Chiến lược đàm phán tiếp theo được giới thiệu là &quot;Kết thúc trong tâm trí&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Mọi thứ luôn được kiến tạo hai lần: một lần trong tâm trí và một lần trên thực tiễn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Để chiến thắng trong đàm phán, phải hình dung về kết quả mong muốn trong tâm trí</span></div>\n<p class=\"body-txt\">\ntrước.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ví dụ minh họa từ mẹ diễn giả khi đi chợ mặc cả.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Khi mua hàng:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Xác định mức giá mong muốn mua (ví dụ 1000 đồng).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Người bán đưa ra mức giá cao hơn (ví dụ 1200 đồng).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Bạn nên trả giá thấp hơn mức mong muốn của mình (ví dụ 800 đồng).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Người bán cũng muốn chiến thắng, nên sẽ nâng dần giá lên.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Quá trình đàm phán sẽ diễn ra, giá sẽ nâng dần từ 800 lên 900 rồi 1000 đồng và dừng</span></div>\n<p class=\"body-txt\">\nlại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Kết quả: Người mua cảm thấy mua được giá rẻ hơn (so với 1200), người bán cũng cảm</span></div>\n<p class=\"body-txt\">\nthấy hài lòng vì ở giữa mức 800 và 1200.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Cả hai bên cùng cảm thấy chiến thắng trong trò chơi này.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Khi bán hàng: Tương tự, bạn phải đưa giá cao hơn mức mong muốn để người mua cũng</span></div>\n<p class=\"body-txt\">\nđược đàm phán, và cả hai bên cùng có lợi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Lời khuyên: Luôn đưa ra cái giá bạn muốn mua/bán ở trong tâm trí trước, và sau đó</span></div>\n<p class=\"body-txt\">\ntrả/đề xuất giá thấp/cao hơn rồi nâng/giảm dần lên đến cái giá mà bạn chấp nhận được,\n \nđể người mua và người bán đều cảm thấy chiến thắng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Hãy luôn trả giá thấp hơn giá bạn muốn mua và làm cho người bán cũng vui với mức giá</span></div>\n<p class=\"body-txt\">\nphía sau.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Hãy luôn kết thúc mọi thứ trong tâm trí trước khi bạn bắt đầu nó.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Nguyên lý &quot;Mọi thứ luôn được kiến tạo hai lần: một lần trong tâm trí và một lần trên</span></div>\n<p class=\"body-txt\">\nthực tiễn.&quot; (từ 0:22)\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là nền tảng tư duy cho mọi hành động, đặc biệt là trong đàm</span></div>\n<p class=\"body-txt\">\nphán. Nó nhấn mạnh tầm quan trọng của việc lập kế hoạch, đặt mục tiêu và hình dung\n \nkết quả *trước khi* thực hiện. Nếu không có hình dung rõ ràng trong tâm trí, kết quả\n \nthực tế có thể không đạt được như mong muốn hoặc đi chệch hướng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Kỹ thuật &quot;Trả giá thấp hơn mức mình muốn mua (hoặc đưa giá cao hơn mức muốn bán),</span></div>\n<p class=\"body-txt\">\nsau đó nâng dần lên đến mức chấp nhận được để cả hai bên đều cảm thấy chiến thắng.&quot;\n \n(tổng hợp từ 0:50 đến 1:24 và 1:35 đến 1:47)\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là bí quyết thực tế để đạt được thỏa thuận &quot;cùng thắng&quot; (win-</span></div>\n<p class=\"body-txt\">\nwin) trong đàm phán. Nó tạo ra không gian cho sự mặc cả, khiến cả người mua và người\n \nbán đều cảm thấy đã nỗ lực và đạt được một kết quả có lợi, từ đó tăng cường sự hài lòng\n \nvà khả năng hợp tác lâu dài. Tránh việc đưa ra mức giá cố định hoặc quá sát với mong\n \nmuốn ban đầu, khiến đối tác không có cơ hội &quot;chiến thắng&quot; trong quá trình đàm phán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Lời khuyên &quot;Hãy luôn kết thúc mọi thứ trong tâm trí trước khi bạn bắt đầu nó.&quot; (từ 1:59)</span></div></div></div>",

r:#f9a825\">Bài 11: Tỏ ra ngờ nghệch</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Tóm tắt. Buổi giảng này trình bày một chiến lược đàm phán hiệu quả: &quot;tỏ ra ngơ ngạch hay</h3>\n<p class=\"body-txt\">\nngu ngốc&quot; kết hợp với câu thần chú &quot;Làm ơn giúp tôi&quot;. Mục đích là để tận dụng tâm lý của\n \nđối phương, khiến họ chủ quan, dễ tin tưởng và phát sinh lòng trắc ẩn, từ đó tạo lợi thế cho\n \nngười đàm phán. Việc áp dụng chiến lược này cũng giúp rèn luyện bản thân vượt qua cái tôi\n \ncá nhân.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Chiến lược tiếp theo: Tỏ ra ngơ ngạch hay ngu ngốc.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ai có nhiều thông tin hơn, người đó là người chiến thắng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Lý do 1: Khi chúng ta tỏ ra ngu ngốc và ngơ ngạch, người bên kia sẽ chủ quan hơn và ít</span></div>\n<p class=\"body-txt\">\nđào sâu thông tin từ phía chúng ta.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Lý do 2: Mọi người đều không thích đàm phán với những người thông minh. Họ thích</span></div>\n<p class=\"body-txt\">\nđàm phán với những người ngu ngốc và ngơ ngạch hơn vì bản thân họ cảm thấy dễ dàng\n \nchiến thắng hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Lý do 3: Khi bạn muốn đàm phán với một người ngu ngốc và ngơ ngạch, chúng ta</span></div>\n<p class=\"body-txt\">\nthường kích hoạt lòng thương của mình và mong muốn giúp đỡ người đó hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Câu thần chú vô cùng hiệu quả trong chiến lược này là: &quot;Làm ơn giúp tôi.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Hãy luôn nói &quot;Làm ơn giúp tôi&quot; trong quá trình đàm phán và bạn sẽ nhận được những</span></div>\n<p class=\"body-txt\">\nkết quả ngoài mong đợi.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Ví dụ: &quot;Làm ơn giúp tôi mua sản phẩm này, tôi chỉ còn từng này tiền thôi&quot;; &quot;Làm ơn giúp</span></div>\n<p class=\"body-txt\">\ntôi mang hàng này đến kia, tôi không thể mang nó được.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Khó khăn khi áp dụng chiến lược này: Cái tôi của chúng ta còn rất lớn, chúng ta khó có</span></div>\n<p class=\"body-txt\">\nthể hạ mình thấp xuống để nhờ đợi sự giúp đỡ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Thành công trong cuộc sống: Luôn luôn phải có ai đó giúp đỡ bạn, không ai thành công</span></div>\n<p class=\"body-txt\">\nmột mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Luyện tập cái tôi: Đàm phán nhờ chiến lược này mà bạn sẽ luyện tập dần cho cái tôi của</span></div>\n<p class=\"body-txt\">\nmình được dễ dàng chấp nhận hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Chiến lược &quot;tỏ ra ngu ngốc và ngơ ngạch&quot; trong đàm phán: Đây là một cách tiếp cận</span></div>\n<p class=\"body-txt\">\nphản trực giác nhưng cực kỳ hiệu quả. Thay vì cố gắng thể hiện sự uyên bác hay thông\n \nminh, chiến lược này khai thác tâm lý chủ quan, mong muốn chiến thắng và lòng trắc ẩn\n \ntự nhiên của đối phương. Khi đối phương cảm thấy vượt trội hoặc được &quot;ban ơn,&quot; họ có\n \nxu hướng buông lỏng cảnh giác, chia sẻ thông tin nhiều hơn hoặc sẵn lòng giúp đỡ, mang\n \nlại lợi thế bất ngờ cho người đàm phán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sử dụng câu thần chú &quot;Làm ơn giúp tôi&quot;: Đây là chìa khóa để cụ thể hóa chiến lược trên.</span></div>\n<p class=\"body-txt\">\nLời kêu gọi trực tiếp sự giúp đỡ không chỉ giúp người nói hạ thấp cái tôi mà còn kích\n \nhoạt bản năng muốn hỗ trợ người khác của đối phương. Trong nhiều tình huống, nó phá\n \nvỡ rào cản tâm lý, tạo ra một không khí hợp tác thay vì đối đầu, khiến đối phương tự\n \nnguyện nhượng bộ hoặc cung cấp thông tin quý giá mà nếu không sẽ rất khó khai thác.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Đừng bao giờ tỏ ra thông minh trong đàm phán, hãy luôn ngu ngốc và ngơ ngạch.”\n \n“Làm ơn giúp tôi.”\n \n“Thành công trong cuộc sống luôn luôn phải có ai đó giúp đỡ bạn. Không ai thành công một\n \nmình.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Bài 12: Luôn có Phương Án B</h3>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Tóm tắt. Buổi giảng này giới thiệu chiến lược &quot;Phương án B&quot; trong đàm phán, nhấn mạnh</h3>\n<p class=\"body-txt\">\ntầm quan trọng của việc luôn chuẩn bị một kế hoạch thay thế. Cốt lõi là tạo nền tảng tâm lý\n \nvững vàng, tăng sự tự tin và quyền lực trong đàm phán bằng cách không quá yêu thích món\n \nhàng hoặc người bán hiện tại. Khi cảm xúc lên cao, trí tuệ đi xuống, nên việc có phương án\n \ndự phòng giúp duy trì lý trí và thế chủ động, đảm bảo luôn sẵn sàng để chiến thắng mà\n \nkhông nhất thiết phải sử dụng phương án B.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Giới thiệu chiến lược &quot;Phương án B&quot; trong đàm phán.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Chiến lược này giúp tạo nền tảng tâm lý, tăng sự tự tin và sức mạnh cá nhân trong đàm</span></div>\n<p class=\"body-txt\">\nphán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Nguyên tắc quan trọng: &quot;Khi cảm xúc lên cao thì trí tuệ đi xuống.&quot;</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #f9a825\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Trong quá trình đàm phán, không được quá yêu thích món hàng đang muốn mua hoặc</span></div>\n<p class=\"body-txt\">\nngười bán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Luôn phải có một phương án dự phòng trong đầu: nếu cuộc đàm phán hiện tại thất bại,</span></div>\n<p class=\"body-txt\">\nbạn sẽ tiếp tục đàm phán ở đâu, với ai, với món hàng nào khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Nếu bạn không thích sản phẩm/cuộc đàm phán hiện tại, bạn sẽ có quyền lực hơn với nó.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Luôn chuẩn bị sẵn sàng người bán khác, sản phẩm khác, hoặc kế hoạch hành động khác</span></div>\n<p class=\"body-txt\">\n(gọi là Phương án B).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Việc có phương án dự phòng không có nghĩa là bạn bắt buộc phải sử dụng nó, mà là để</span></div>\n<p class=\"body-txt\">\ntăng cường quyền lực và sự tự tin của bạn trong đàm phán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Sự tự tin của bạn (có được nhờ phương án dự phòng) sẽ quyết định sức mạnh của bạn</span></div>\n<p class=\"body-txt\">\ntrong đàm phán. Đây là một kỹ thuật tâm lý cần chuẩn bị.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Hãy luôn chuẩn bị để chiến thắng.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">&quot;Khi cảm xúc lên cao thì trí tuệ đi xuống.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là nguyên tắc nền tảng giải thích lý do cần có &quot;Phương án B&quot;. Sự</span></div>\n<p class=\"body-txt\">\nphụ thuộc cảm xúc vào một món hàng hay một cuộc đàm phán duy nhất sẽ làm giảm khả\n \nnăng tư duy logic và đưa ra quyết định sáng suốt. Việc nhận thức được điều này giúp\n \nngười đàm phán chủ động kiểm soát cảm xúc, giữ được cái đầu lạnh để đưa ra lựa chọn\n \ncó lợi nhất.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Mục đích của Phương án B là tạo lợi thế tâm lý và tăng quyền lực đàm phán, không phải</span></div>\n<p class=\"body-txt\">\nđể bắt buộc phải chuyển hướng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Nhiều người coi phương án dự phòng như một lối thoát khi thất bại.</span></div>\n<p class=\"body-txt\">\nTuy nhiên, theo diễn giả, giá trị thực sự của nó nằm ở việc ngay từ đầu nó đã giúp bạn có\n \nvị thế đàm phán mạnh mẽ hơn. Khi biết mình có nhiều lựa chọn, bạn sẽ tự tin hơn, ít bị\n \náp lực hơn và có thể đưa ra những yêu cầu có lợi mà không sợ bị mất cơ hội, thường dẫn\n \nđến kết quả tốt hơn cho cả phương án chính.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Không được quá yêu thích món hàng hoặc người bán hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#f9a825\">•</span><span class=\"bul-txt\">Vì sao quan trọng: &quot;Yêu thích&quot; quá mức là một điểm yếu trong đàm phán. Nó tạo ra sự</span></div>\n<p class=\"body-txt\">\nphụ thuộc, khiến bạn dễ dàng chấp nhận những điều khoản bất lợi hoặc bỏ qua những\n \nlựa chọn tốt hơn chỉ vì muốn giữ lấy cơ hội hiện tại. Loại bỏ sự yêu thích này giúp bạn\n \nnhìn nhận mọi thứ khách quan, lý trí, và đưa ra quyết định dựa trên lợi ích cao nhất chứ\n \nkhông phải cảm xúc.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#f9a825\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Khi cảm xúc lên cao thì trí tuệ đi xuống.”\n \n“Đừng bao giờ yêu thích sản phẩm, đừng bao giờ quá yêu thích cái cuộc đàm phán này.”\n \n“Hãy luôn chuẩn bị để chiến thắng.”\n</p></div></div>",
