<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quản Trị Cảm Xúc</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#e8eaf0;font-family:'Segoe UI',Arial,sans-serif}
body{display:flex;flex-direction:column;align-items:center;padding:18px 10px 24px}

/* Book wrapper */
#book-wrap{width:720px;max-width:98vw;display:flex;flex-direction:column}

/* Top bar: title + page info */
#top-bar{display:flex;justify-content:space-between;align-items:center;
          margin-bottom:6px;padding:0 2px}
#book-title{font-size:13px;font-weight:600;color:#444;white-space:nowrap;
             overflow:hidden;text-overflow:ellipsis;max-width:60%}
#page-info{font-size:13px;color:#666;white-space:nowrap}

/* Progress bar */
#progress-bar{width:100%;height:3px;background:#d0d0d0;border-radius:2px;margin-bottom:10px}
#progress-fill{height:100%;border-radius:2px;transition:width .3s;background:#4527a0}

/* Page */
.pg{width:100%;min-height:540px;background:#ffffff;border-radius:6px;
     box-shadow:0 2px 16px rgba(0,0,0,.12);overflow:hidden}

/* Cover */
.pg-cover{display:flex;justify-content:center;align-items:center;min-height:540px}
.cover-wrap{text-align:center;padding:60px 40px}
.cover-tag{font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;font-weight:600}
.cover-title{font-size:28px;font-weight:700;color:#1a1a1a;line-height:1.4;margin-bottom:16px}
.cover-sub{font-size:14px;font-weight:500}

/* Content page */
.pg-content{}
.pg-inner{padding:28px 36px 32px;overflow-y:auto;max-height:540px}
.pg-inner::-webkit-scrollbar{width:5px}
.pg-inner::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

/* Typography */
.sec-hdr{font-size:12px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
          margin:18px 0 8px;padding-bottom:5px;border-bottom:1px solid #eee}
.sec-hdr:first-child{margin-top:0}
.body-txt{font-size:14px;color:#2d2d2d;line-height:1.8;margin-bottom:10px;text-align:justify}
.bullet{display:flex;gap:10px;margin:5px 0}
.bul-dot{font-size:18px;line-height:1.4;flex-shrink:0;margin-top:-1px}
.bul-txt{font-size:13.5px;color:#2d2d2d;line-height:1.7}

/* Navigation */
#nav{display:flex;align-items:center;gap:14px;margin-top:12px}
.nav-btn{background:#fff;border:2px solid #4527a0;color:#4527a0;padding:8px 24px;
          border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;
          transition:all .15s;letter-spacing:.5px}
.nav-btn:hover{background:#4527a0;color:#fff}
.nav-btn:disabled{opacity:.35;cursor:default}
#page-jump{width:52px;text-align:center;border:1px solid #ccc;border-radius:5px;
            padding:6px;font-size:13px;color:#444}
</style>
</head>
<body>
<div id="book-wrap">
  <div id="top-bar">
    <div id="book-title">Quản Trị Cảm Xúc</div>
    <div id="page-info">1 / 41</div>
  </div>
  <div id="progress-bar"><div id="progress-fill" style="width:2.4%"></div></div>
  <div id="book"></div>
</div>
<div id="nav">
  <button class="nav-btn" id="btn-prev" onclick="prev()" disabled>◄ Trước</button>
  <input id="page-jump" type="number" min="1" max="41" value="1"
         onchange="goTo(+this.value-1)" title="Nhảy đến trang">
  <button class="nav-btn" id="btn-next" onclick="next()">Tiếp ►</button>
</div>
<script>
const pages=["<div class=\"pg pg-cover\" style=\"border-top:5px solid #4527a0\">\n  <div class=\"cover-wrap\">\n    <div class=\"cover-tag\" style=\"color:#4527a0\">Sổ Tay Tinh Hoa · QNPA</div>\n    <div class=\"cover-title\">Quản Trị Cảm Xúc</div>\n    <div class=\"cover-sub\" style=\"color:#4527a0\">39 trang nội dung đầy đủ</div>\n  </div>\n</div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><p class=\"body-txt\">\nQuản Trị Cảm Xúc\n \nSổ tay tinh hoa\n</p>\n<p class=\"body-txt\">\nTổng hợp 23 bài\n \nNguồn: khoá học Quản Trị Cảm Xúc\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><p class=\"body-txt\">\nLời mở\n \nQuyển sách này tổng hợp tinh hoa khoá Quản Trị Cảm Xúc, do AI nghe lại từng bài giảng và\n \nchắt lọc thành: tóm tắt, ý chính, điểm quan trọng nhất, và trích dẫn đáng nhớ.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><p class=\"body-txt\">\nMục lục\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Chương 1</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bài 1: Hướng dẫn cách học hiệu quả</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bài 2: Lưu ý: Tôn trọng bản quyền</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Chương 2</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bài 3: Lý do cần điều khiển cảm xúc</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bài 4: Cảm xúc ảnh hưởng đến chất lượng cuộc sống thế nào?</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Chương 3</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bài 5: Những yếu tố tạo nên cảm xúc</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bài 6: Yếu tố bên ngoài ảnh hưởng đến cảm xúc</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bài 7: Trạng thái cơ thể ảnh hưởng đến cảm xúc</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bài 8: Bonus 5 Yếu tố ảnh hưởng đến thân thể</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bài 9: Sự tập trung của bạn tạo nên cảm xúc</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bài 10: Sử dụng ngôn từ ảnh hưởng đến cảm xúc</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Chương 4</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bài 11: Hạnh phúc, không hạnh phúc, đau khổ</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bài 12: Cảm giác tội lỗi - Yếu tố phá hủy cuộc sống</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bài 13: Giận dữ - Yếu tố phá hủy cuộc sống</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Chương 5</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bài 14: Điều khiển cảm xúc căng thẳng trong công việc</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bài 15: Xây dựng mối quan hệ</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bài 16: Phụ nữ phá hủy mối quan hệ</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bài 17: Đàn ông phá hủy mối quan hệ</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Chương 6</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bài 18: Phương pháp rèn luyện trạng thái cơ thể</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bài 19: Phương pháp xác lập mục tiêu</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bài 20: Phương pháp tuyên bố</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bài 21: Chiến thắng hay thua cuộc</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bài 22: Kỹ thuật lật ngược vấn đề</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bài 23: Tổng kết</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#4527a0\">Chương 1</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Bài 1: Hướng dẫn cách học hiệu quả</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Tóm tắt. Buổi giảng này hướng dẫn học viên một kỹ thuật ghi chép siêu tốc để tối ưu hóa</h3>\n<p class=\"body-txt\">\nviệc tiếp thu và ghi nhớ kiến thức từ khóa học. Phương pháp cốt lõi là chia giấy thành ba cột:\n \ntiêu đề, nội dung và hành động cam kết. Mục tiêu là giúp học viên học đi học lại, khám phá\n \nnhững điều thú vị mới và cam kết hành động ngay sau mỗi bài học.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Chào mừng học viên đã đăng ký thành công khóa học và khẳng định khóa học sẽ giúp</span></div>\n<p class=\"body-txt\">\nlàm chủ cảm xúc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Giới thiệu kỹ thuật ghi chép siêu tốc để giúp học viên nhận được toàn bộ kiến thức một</span></div>\n<p class=\"body-txt\">\ncách rõ ràng, mạch lạc, chi tiết.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Khuyến khích việc học đi học lại nhiều lần, vì mỗi lần học lại sẽ khám phá ra điều thú vị</span></div>\n<p class=\"body-txt\">\nmới.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Yêu cầu chuẩn bị: một cây bút chì và một tờ giấy (sẽ lặp lại với nhiều tờ giấy khác).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Hướng dẫn chia tờ giấy thành ba cột:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cột bên trái (3.5 cm): Ghi tiêu đề của bài học.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cột bên phải (3.5 cm): Ghi những hành động cam kết sẽ thực hiện ngay sau khi kết thúc</span></div>\n<p class=\"body-txt\">\nchương trình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cột ở giữa (phần còn lại): Ghi nội dung của bài học.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Nhấn mạnh việc ghi nhớ kỹ thuật này và việc ghi chép lại mỗi khi học lại để phát hiện</span></div>\n<p class=\"body-txt\">\nnhững điều thú vị.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cung cấp mẫu ghi chép sẵn trong file PDF để học viên tải xuống, in ra và sử dụng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Yêu cầu không tiếp tục nếu chưa sẵn sàng bút chì và giấy.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Học đi học lại, ghi chép lại nhiều lần: Diễn giả nhấn mạnh việc không chỉ nghe một lần</span></div>\n<p class=\"body-txt\">\nmà phải học lặp lại nhiều lần và ghi chép mỗi lần. Điều này quan trọng vì nó giúp học\n \nviên đào sâu kiến thức, phát hiện những chi tiết mới và củng cố hiểu biết, thay vì chỉ tiếp\n \nthu hời hợt.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Ghi chép cụ thể các hành động cam kết: Cột bên phải để ghi &quot;những hành động mà bạn sẽ</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">cam kết hành động ngay&quot;. Điểm này cực kỳ quan trọng vì nó biến kiến thức lý thuyết</h3>\n<p class=\"body-txt\">\nthành hành động thực tế, tạo ra kết quả và sự thay đổi cho học viên, tránh việc chỉ nghe\n \nmà không làm.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Mỗi lần bạn học lại, bạn lại ghi chép lại và tôi tin chắc rằng bạn sẽ phát hiện thấy những điều\n \nthú vị.”\n \n“Hãy luôn ghi nhớ điều này. Mỗi lần bạn học lại, bạn lại ghi chép lại và tôi tin chắc rằng bạn sẽ\n \nphát hiện thấy những điều thú vị.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#4527a0\">Bài 2: Lưu ý: Tôn trọng bản quyền</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Tóm tắt. Buổi học này tập trung vào tầm quan trọng của việc tuân thủ đạo đức và pháp luật</h3>\n<p class=\"body-txt\">\ntrong mọi hoạt động, đặc biệt là trong việc sử dụng và chia sẻ nội dung khóa học. Diễn giả\n \nnhấn mạnh rằng sự an lành, bình an, hạnh phúc và thành công chỉ đến khi chúng ta sống và\n \nlàm việc có đạo đức và tuân thủ pháp luật, bao gồm cả quyền sở hữu trí tuệ đối với các tài\n \nliệu giảng dạy. Việc chia sẻ nội dung cần tuân thủ quy định, chỉ được chia sẻ đường link khóa\n \nhọc mà không được sao chép hay phát tán video.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Để thành công trong cuộc đời, cần phải học cách tuân thủ đạo đức và pháp luật.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Tuân thủ đạo đức và pháp luật giúp cuộc sống an lành, bình an, hạnh phúc và thành công</span></div>\n<p class=\"body-txt\">\nhơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Học viên tham dự khóa học trực tuyến là những người tuyệt vời và luôn tuân thủ đạo</span></div>\n<p class=\"body-txt\">\nđức, pháp luật.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Video khóa học được cung cấp thông qua hệ thống khóa học, không có nghĩa là được</span></div>\n<p class=\"body-txt\">\nquyền copy và chia sẻ lại trên internet.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Video là quyền sở hữu trí tuệ của người đào tạo.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Học viên không có quyền sao chép hay phát tán video.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Học viên đã là học trò của diễn giả thì hãy tôn trọng diễn giả bằng cách giữ video ở nơi</span></div>\n<p class=\"body-txt\">\nnó có (trên hệ thống khóa học).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Có thể chia sẻ đường link của khóa học này cho người khác để họ có thể mua, qua đó</span></div>\n<p class=\"body-txt\">\ngiúp duy trì hệ thống máy chủ và tạo ra các video tiếp theo.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Tuyệt đối không được phép ghi hình lại chương trình hay copy chương trình để chia sẻ</span></div>\n<p class=\"body-txt\">\nlại trên internet.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Chỉ có thể chia sẻ đường link của khóa học trên trang web chính.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Tuân thủ đạo đức và pháp luật là nền tảng của thành công và hạnh phúc: Diễn giả nhấn</span></div>\n<p class=\"body-txt\">\nmạnh rằng an lành, bình an, hạnh phúc và thành công chỉ có thể đạt được khi con người\n \nsống và làm việc có đạo đức và tuân thủ pháp luật. Điều này đặt đạo đức và pháp luật lên\n \nhàng đầu, coi đó là điều kiện tiên quyết cho mọi sự phát triển bền vững.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Tôn trọng quyền sở hữu trí tuệ: Việc không sao chép, phát tán video khóa học mà chỉ</span></div>\n<p class=\"body-txt\">\nchia sẻ đường link là một biểu hiện cụ thể của việc tôn trọng quyền sở hữu trí tuệ. Điều\n \nnày quan trọng vì nó bảo vệ công sức của người sáng tạo và đảm bảo nguồn lực để họ\n \ntiếp tục sản xuất nội dung chất lượng, đồng thời giáo dục ý thức về bản quyền cho người\n \nhọc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Mô hình kinh doanh dựa trên giá trị và sự tôn trọng: Việc khuyến khích chia sẻ đường</span></div>\n<p class=\"body-txt\">\nlink để người khác mua khóa học không chỉ giúp duy trì hệ thống mà còn xây dựng một\n \nmô hình kinh doanh bền vững dựa trên việc trao đổi giá trị công bằng. Người học nhận\n \nđược kiến thức, người cung cấp có nguồn lực để tiếp tục phát triển, tất cả dựa trên sự\n \ntôn trọng lẫn nhau và pháp luật.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#4527a0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Một trong những yếu tố để thành công trong cuộc đời của chúng ta là cần phải học cách tuân\n \nthủ đạo đức và pháp luật.”\n \n“Chỉ có thể tuân thủ và đạo đức và pháp luật thì cuộc sống của chúng ta mới có thể an lành,\n \nbình an, hạnh phúc và trở nên thành công hơn.”\n \n“Bạn không có quyền được sao chép video, bạn không có quyền được phát tán video này.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Chương 2</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Bài 3: Lý do cần điều khiển cảm xúc</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Tóm tắt. Buổi học này tập trung vào tầm quan trọng của việc quản trị cảm xúc. Diễn giả</h3>\n<p class=\"body-txt\">\nnhấn mạnh rằng cảm xúc là yếu tố quyết định và chi phối toàn bộ cuộc sống của chúng ta, và\n \nchất lượng cuộc sống không phụ thuộc vào những gì xảy ra bên ngoài mà là cách chúng ta\n \nphản ứng với chúng. Khi con người kiểm soát được cảm xúc, họ sẽ điều khiển được các yếu\n \ntố khác trong cuộc đời và thu hút những điều tích cực. Buổi học cũng giao bài tập thực hành\n \nnhận diện và ghi lại các cảm xúc tiêu cực đã ảnh hưởng đến cuộc sống.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Giới thiệu: Diễn giả đặt câu hỏi &quot;Tại sao chúng ta cần quản trị cảm xúc?&quot; và nhấn mạnh</span></div>\n<p class=\"body-txt\">\nrằng cảm xúc là yếu tố quyết định, chi phối toàn bộ cuộc sống.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Tầm quan trọng của phản ứng: Diễn giả trích dẫn Tony Robbins: Không phải những gì</span></div>\n<p class=\"body-txt\">\nđang diễn ra trong cuộc đời bạn, mà là cách bạn phản ứng với những sự kiện diễn ra, sẽ\n \nquyết định kết quả cuộc đời bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Nguồn gốc của cảm xúc: Chất lượng cuộc sống được quyết định bởi những thứ bên trong</span></div>\n<p class=\"body-txt\">\ncon người bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Ví dụ minh họa: Diễn giả dùng ví dụ về việc học viên đang &quot;nhìn thấy&quot; diễn giả qua màn</span></div>\n<p class=\"body-txt\">\nhình thiết bị (hình ảnh được lưu trữ và phản chiếu), không phải trực tiếp. Tương tự, cảm\n \nxúc của chúng ta cũng là sự phản ứng nội tại, có thể khác biệt giữa những người cùng\n \nchứng kiến một sự việc (người này tức giận, người kia mỉm cười).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Quyết định cảm xúc: Việc bạn mỉm cười là do bạn đã quyết định mỉm cười, không phải</span></div>\n<p class=\"body-txt\">\ndo diễn giả. Những người khác không mỉm cười vì họ không quản trị cảm xúc giống bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Năm yếu tố trong cuộc sống: Có 5 yếu tố quan trọng trong cuộc sống: cảm xúc, trạng thái</span></div>\n<p class=\"body-txt\">\nthân thể, mối quan hệ, tiền bạc và thời gian. Tất cả đều quan trọng như nhau, nhưng\n \nchúng được quyết định bởi yếu tố cảm xúc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Quy luật chi phối: Khi bạn quản trị được cảm xúc, bạn sẽ quản trị được các yếu tố còn lại</span></div>\n<p class=\"body-txt\">\ntrong cuộc đời. Cảm xúc tích cực sẽ làm cho những yếu tố xung quanh bạn trở nên tích\n \ncực và thu hút điều tích cực; ngược lại, cảm xúc tiêu cực sẽ làm cho mọi thứ tiêu cực và\n \nthu hút điều tiêu cực.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bài tập về nhà: Viết xuống những lần cảm xúc tiêu cực đã diễn ra trong quá khứ mà bạn</span></div>\n<p class=\"body-txt\">\ncòn nhớ, và bạn đã phải trả giá gì cho những lần cảm xúc tiêu cực đó (ảnh hưởng tới tiền\n \nbạc, mối quan hệ, thân thể ra sao).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cảnh báo: Không được nghĩ rằng mình không có cảm xúc tiêu cực, vì việc phủ nhận đó</span></div>\n<p class=\"body-txt\">\nchính là một cảm xúc tiêu cực. Hãy đối diện với sự thật rằng con người có cả lúc tích cực\n \nvà tiêu cực.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Chất lượng cuộc sống nằm ở cách phản ứng, không phải sự kiện: Diễn giả nhấn mạnh lời</span></div>\n<p class=\"body-txt\">\ndạy của Tony Robbins rằng &quot;Không phải những gì đang diễn ra cho cuộc đời của bạn mà\n \nlà cách bạn phản ứng với những sự kiện diễn ra sẽ quyết định kết quả cuộc đời của bạn.&quot;\n \nĐiều này quan trọng vì nó chuyển trách nhiệm và quyền kiểm soát về phía cá nhân, giúp\n \nngười học nhận ra rằng họ có thể thay đổi kết quả cuộc đời bằng cách thay đổi cách nhìn\n \nnhận và phản ứng nội tại, thay vì đổ lỗi cho hoàn cảnh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cảm xúc chi phối mọi lĩnh vực đời sống: Buổi học liệt kê 5 yếu tố quan trọng (cảm xúc,</span></div>\n<p class=\"body-txt\">\ntrạng thái thân thể, mối quan hệ, tiền bạc, thời gian) và khẳng định rằng dù tất cả đều\n \nquan trọng, chúng đều bị chi phối bởi cảm xúc. Đây là một insight mạnh mẽ, cho thấy\n \nviệc quản trị cảm xúc không chỉ là một kỹ năng mềm mà là chìa khóa để cải thiện toàn\n \ndiện mọi mặt cuộc sống, từ tài chính đến sức khỏe và các mối quan hệ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Luật hấp dẫn của cảm xúc: Diễn giả khẳng định &quot;Nếu bạn chọn cách phản ứng tích cực,</span></div>\n<p class=\"body-txt\">\nbạn sẽ thu hút những điều tích cực về phía mình.&quot; và ngược lại. Điểm này rất quan trọng\n \nvì nó liên kết trạng thái cảm xúc nội tại với kết quả bên ngoài thông qua luật hấp dẫn. Nó\n \nkhuyến khích người học không chỉ quản lý cảm xúc để cảm thấy tốt hơn mà còn để chủ\n \nđộng tạo ra những cơ hội và kết quả mong muốn trong cuộc sống.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Không phải những gì đang diễn ra cho cuộc đời của bạn mà là cách bạn phản ứng với những\n \nsự kiện diễn ra sẽ quyết định kết quả cuộc đời của bạn.”\n \n“Khi bạn quản trị được cảm xúc, bạn sẽ quản trị được các yếu tố còn lại trong cuộc đời của\n \nmình.”\n \n“Đừng tiếp tục nếu bạn chưa ghi xuống những lần cảm xúc tiêu cực.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Bài 4: Cảm xúc ảnh hưởng đến chất lượng cuộc sống thế nào?</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Tóm tắt. Bài giảng này tập trung vào cách yếu tố cảm xúc chi phối và ảnh hưởng đến năm</h3>\n<p class=\"body-txt\">\nlĩnh vực chính trong cuộc đời chúng ta: thân thể, mối quan hệ, tiền bạc và thời gian. Diễn giả\n \nnhấn mạnh rằng cảm xúc là yếu tố quyết định các lĩnh vực này, nhưng đồng thời, trạng thái\n \ncủa các yếu tố đó cũng tác động ngược trở lại cảm xúc. Từ đó, tầm quan trọng của việc quản\n \ntrị cảm xúc để có một cuộc sống tích cực và thành công được làm rõ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Ý chính</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cuộc đời của chúng ta có 5 lĩnh vực chính mà chúng ta cần kiểm soát: cảm xúc, thân thể,</span></div>\n<p class=\"body-txt\">\nmối quan hệ, tiền bạc và thời gian.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cảm xúc là yếu tố quyết định và chi phối 4 yếu tố còn lại, nhưng 4 yếu tố còn lại cũng ảnh</span></div>\n<p class=\"body-txt\">\nhưởng ngược trở lại cảm xúc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cảm xúc ảnh hưởng tới thân thể: Khi có cảm xúc tích cực, cơ thể sẽ thẳng, mạnh mẽ, tự</span></div>\n<p class=\"body-txt\">\ntin. Khi buồn chán, vai sẽ rũ xuống, đầu cúi xuống.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Trạng thái cơ thể cũng ảnh hưởng tới cảm xúc: Qua bài tập thực hành, trạng thái cơ thể</span></div>\n<p class=\"body-txt\">\nthu nhỏ vai, chùng lưng, đầu cúi xuống khiến việc nói &quot;Tôi vui lắm&quot; trở nên khó khăn.\n \nNgược lại, trạng thái đứng thẳng, ưỡn ngực, chống tay vào sườn/ngực khiến việc nói\n \n&quot;Tôi rất buồn&quot; trở nên bất khả thi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cảm xúc ảnh hưởng tới mối quan hệ: Khi bạn có cảm xúc tích cực, bạn sẽ thấy xung</span></div>\n<p class=\"body-txt\">\nquanh mình là những người tích cực và vui vẻ. Khi bạn là người càm ràm, đau khổ, xung\n \nquanh bạn cũng toàn là những người càm ràm, đau khổ. Người ly hôn thường vây xung\n \nquanh mình bởi những người ly hôn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Mối quan hệ cũng ảnh hưởng ngược trở lại cảm xúc và cuộc đời bạn: Những người xung</span></div>\n<p class=\"body-txt\">\nquanh bạn sẽ ảnh hưởng tới cuộc đời bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cảm xúc ảnh hưởng tới tiền bạc: Cảm xúc tích cực về tiền bạc sẽ khiến bạn có ham muốn</span></div>\n<p class=\"body-txt\">\nkiếm nhiều tiền hơn và giữ tiền. Cảm xúc tiêu cực về tiền (như &quot;tiền là tội ác, tiền là xấu\n \nxa&quot;) sẽ khiến bạn muốn đẩy tiền ra khỏi cuộc đời mình, không thể trở nên giàu có được.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cảm xúc ảnh hưởng tới thời gian: Khi có cảm xúc tích cực về cuộc đời, bạn sẽ nhanh hơn,</span></div>\n<p class=\"body-txt\">\nmạnh mẽ hơn, sử dụng thời gian một cách có ích hơn. Khi có cảm xúc tiêu cực, bạn sẽ ủ\n \nrũ, thu mình lại, trốn khỏi đám đông, không làm gì cả và lãng phí thời gian của mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Năm yếu tố này (cảm xúc, thân thể, mối quan hệ, tiền bạc, thời gian) cũng ảnh hưởng lẫn</span></div>\n<p class=\"body-txt\">\nnhau. Ví dụ: có thời gian sẽ chăm sóc cơ thể tốt hơn, chăm sóc cơ thể tốt hơn lại ảnh\n \nhưởng tích cực tới cảm xúc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Chương trình này tập trung chia sẻ cách quản trị cảm xúc vì cảm xúc ảnh hưởng tới 4</span></div>\n<p class=\"body-txt\">\nyếu tố còn lại, và 4 yếu tố còn lại cũng ảnh hưởng tới cảm xúc.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Mối quan hệ hai chiều giữa cảm xúc và các lĩnh vực cuộc đời: Diễn giả không chỉ nói rằng</span></div>\n<p class=\"body-txt\">\ncảm xúc chi phối mọi thứ, mà còn nhấn mạnh rằng các yếu tố như thân thể, mối quan hệ,\n \ntiền bạc và thời gian cũng ảnh hưởng ngược trở lại cảm xúc. Insight này rất quan trọng\n \nvì nó mở ra nhiều cách thức để chúng ta chủ động thay đổi cảm xúc của mình (ví dụ:\n \nthay đổi tư thế cơ thể, thay đổi môi trường xung quanh, thay đổi cách nhìn về tiền bạc\n \nhoặc cách sử dụng thời gian) thay vì chỉ cố gắng kiểm soát cảm xúc một cách trực tiếp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Sức mạnh của trạng thái cơ thể trong việc thay đổi cảm xúc: Các bài tập thực hành trực</span></div>\n<p class=\"body-txt\">\ntiếp mà diễn giả đưa ra đã minh chứng rõ ràng rằng tư thế cơ thể có thể ngay lập tức tác\n \nđộng đến cảm xúc. Việc này cung cấp một công cụ đơn giản, dễ áp dụng và hiệu quả tức\n \nthì để chuyển đổi cảm xúc từ tiêu cực sang tích cực, giúp chúng ta không bị &quot;mắc kẹt&quot;\n \ntrong những cảm xúc không mong muốn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">&quot;Cảm xúc nào thì mối quan hệ đó&quot; – Luật hấp dẫn xã hội: Câu nói này gói gọn một sự thật</span></div>\n<p class=\"body-txt\">\nsâu sắc về cách chúng ta xây dựng mạng lưới quan hệ. Cảm xúc của bạn như một thỏi\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><p class=\"body-txt\">\nnam châm thu hút những người có tần số tương tự. Điều này quan trọng vì nó khuyến\n \nkhích chúng ta tập trung vào việc nuôi dưỡng cảm xúc tích cực cá nhân không chỉ vì bản\n \nthân mà còn vì chất lượng các mối quan hệ xã hội, từ đó tác động đến toàn bộ cuộc đời.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Cảm xúc là yếu tố quyết định và chi phối những yếu tố còn lại, nhưng những yếu tố còn lại\n \ncũng ảnh hưởng trở lại với cảm xúc.”\n \n“Trạng thái cơ thể của bạn lại cũng có thể ảnh hưởng tới cảm xúc.”\n \n“Cảm xúc nào thì mối quan hệ đó.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Chương 3</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Bài 5: Những yếu tố tạo nên cảm xúc</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Tóm tắt. Buổi học này tập trung vào việc nhận biết và quản trị cảm xúc thông qua ba nhóm</h3>\n<p class=\"body-txt\">\nyếu tố chính: các tác nhân kích thích từ bên ngoài, bộ lọc nhận thức (gồm cơ quan cảm giác,\n \nhệ thống niềm tin và giá trị), và cách chúng ta phản ứng. Diễn giả nhấn mạnh rằng việc hiểu\n \nrõ ba yếu tố này cho phép chúng ta thay đổi cách ứng xử và quản trị cuộc đời mình, trong đó\n \nyếu tố phản ứng nội tại là quan trọng nhất. Các ví dụ về tương tác xã hội và tiêu thụ thông tin\n \nđược dùng để minh họa tác động của những yếu tố này lên cảm xúc.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Buổi học này bắt đầu hành trình quản trị cảm xúc, tập trung vào nhận biết những yếu tố</span></div>\n<p class=\"body-txt\">\nảnh hưởng tới cảm xúc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Có ba nhóm yếu tố ảnh hưởng đến cảm xúc:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Tác nhân kích thích ở bên ngoài (yếu tố bên ngoài):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Những con người không phải là bạn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Sự vật, sự kiện, hiện tượng bất ngờ xảy ra mà bạn không biết trước (ví dụ: thiên tai, địch</span></div>\n<p class=\"body-txt\">\nhọa).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Môi trường xung quanh bạn: bạn bè, đồng nghiệp, công việc, môi trường học tập, hoạt</span></div>\n<p class=\"body-txt\">\nđộng, xã hội, các hội nhóm bạn tham gia.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Mạng xã hội: những ai bạn kết nối, nhóm bạn tham gia.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Những cuốn sách bạn đọc, người diễn giả bạn học, người bạn chơi cùng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bộ lọc (yếu tố bộ lọc):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Là một phần cơ quan cảm giác của bạn (mắt, tai, mũi, tay, v.v.).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Là bất kỳ điều gì bạn cho phép thông tin từ bên ngoài được đi vào bên trong bạn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Mỗi người có độ nhạy cảm khác nhau ở các cơ quan cảm giác này.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cũng bao gồm thế giới bên trong của bạn: hệ thống niềm tin, giá trị mà bạn theo đuổi.</span></div>\n<p class=\"body-txt\">\nNiềm tin và giá trị sống này cũng là một bộ lọc giúp bạn nhận biết điều gì giúp bạn tiến\n \nlên và điều gì kìm hãm bạn.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Ví dụ: các bài báo, câu chuyện, sách bạn đọc hàng ngày. Bộ lọc của con người thường</span></div>\n<p class=\"body-txt\">\nmong muốn đón nhận thông tin tiêu cực, cảm thấy sung sướng, an toàn khi điều xấu xảy\n \nra với người khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cách chúng ta phản ứng: Cách bạn phản ứng với những sự kiện đang diễn ra trong cuộc</span></div>\n<p class=\"body-txt\">\nđời bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bằng cách nhận biết ba yếu tố này, chúng ta sẽ có cách ứng xử khác nhau với chúng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Yếu tố quan trọng nhất và quyết định chính là cách chúng ta phản ứng.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cảm xúc của con người được điều khiển bởi ba nhóm yếu tố tương tác lẫn nhau: các tác</span></div>\n<p class=\"body-txt\">\nnhân bên ngoài, bộ lọc cá nhân và cách ta phản ứng. Điều này quan trọng vì nó cung cấp\n \nmột khung sườn có cấu trúc để phân tích nguồn gốc cảm xúc, giúp chúng ta không chỉ\n \ncảm nhận mà còn hiểu được tại sao mình cảm thấy như vậy, từ đó tìm cách quản lý hiệu\n \nquả hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">&quot;Bộ lọc&quot; không chỉ là cơ quan cảm giác mà còn là hệ thống niềm tin và giá trị cá nhân.</span></div>\n<p class=\"body-txt\">\nĐiều này quan trọng bởi nó nhấn mạnh rằng cách chúng ta tiếp nhận và diễn giải thông\n \ntin từ thế giới bên ngoài không phải là thụ động. Thế giới quan, niềm tin và giá trị sẵn có\n \ncủa chúng ta đóng vai trò chủ động trong việc định hình cảm xúc, giải thích tại sao cùng\n \nmột sự kiện lại gây ra phản ứng cảm xúc khác nhau ở mỗi người, và thậm chí lý giải xu\n \nhướng &quot;nghiện&quot; thông tin tiêu cực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cách chúng ta phản ứng mới là yếu tố quyết định cuối cùng trong việc quản trị cảm xúc.</span></div>\n<p class=\"body-txt\">\nĐiều này quan trọng vì nó trao lại quyền chủ động cho mỗi cá nhân. Dù các yếu tố bên\n \nngoài và bộ lọc có tác động mạnh mẽ, nhưng chính sự lựa chọn cách phản ứng của chúng\n \nta mới quyết định trạng thái cảm xúc, giúp chúng ta trở thành người điều khiển cảm xúc\n \ncủa mình thay vì là nạn nhân của hoàn cảnh.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Mua thì mua, không mua thì cút!”\n \n“Đó chính là vì bộ lọc của những con người bình thường luôn mong muốn được đón nhận\n \nnhững thông tin tiêu cực như vậy.”\n \n“...yếu tố cách mà chúng ta phản ứng ở bên trong mới là những yếu tố quyết định.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Bài 6: Yếu tố bên ngoài ảnh hưởng đến cảm xúc</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Tóm tắt. Buổi giảng tập trung vào việc quản trị cảm xúc thông qua các yếu tố bên ngoài.</h3>\n<p class=\"body-txt\">\nDiễn giả phân chia các yếu tố này thành hai nhóm: những thứ không thể kiểm soát và những\n \nthứ có thể kiểm soát. Đối với nhóm không kiểm soát được, chúng ta cần chấp nhận và tìm\n \nkiếm cơ hội phát triển trong khó khăn. Với nhóm có thể kiểm soát (môi trường, mối quan hệ,\n \ncông việc, tiền bạc), chúng ta cần chủ động thay đổi chúng để cuộc sống trở nên vui vẻ và\n \nhạnh phúc hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Ý chính</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Quản trị cảm xúc thông qua các yếu tố bên ngoài.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Nhóm yếu tố bên ngoài không thể kiểm soát:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bao gồm: bất khả kháng, thiên tai, dịch họa, sự thay đổi của môi trường kinh doanh/xã</span></div>\n<p class=\"body-txt\">\nhội, các yếu tố toàn cầu, khủng hoảng kinh tế.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Đối với các yếu tố này, cần &quot;cứ kệ nó tồn tại như nó muốn tồn tại&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Luôn nhớ rằng &quot;trong khó khăn thì luôn có mầm mống của sự phát triển&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Tập trung vào cách chúng ta đối xử với các sự kiện này, chứ không phải cách kiểm soát</span></div>\n<p class=\"body-txt\">\nchúng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Nhóm yếu tố bên ngoài có thể kiểm soát:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">1. Môi trường xung quanh bạn: Có thể thay đổi môi trường làm việc, không nhất thiết là</span></div>\n<p class=\"body-txt\">\nthay đổi công việc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">2. Mối quan hệ:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">&quot;Bạn là trung bình của năm người bạn thường gặp.&quot; (Jim Rohn).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">&quot;Hãy cho tôi biết những người bạn của bạn là ai, tôi sẽ nói cho bạn biết bạn là ai.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Những người xung quanh ảnh hưởng mạnh mẽ đến cuộc đời chúng ta.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cần &quot;chọn bạn mà chơi&quot;, chọn những người tích cực, vui vẻ, hạnh phúc để ở cùng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">&quot;Gần mực thì đen, gần đèn thì sáng.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Việc thay đổi mối quan hệ là khó nhưng &quot;hãy cứ làm&quot;, việc khó làm hôm nay sẽ có kết</span></div>\n<p class=\"body-txt\">\nquả vào ngày mai.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">3. Công việc/sự nghiệp của bạn:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Nếu công việc là một phần của sứ mệnh, đam mê thì bạn sẽ tràn đầy cảm xúc để hành</span></div>\n<p class=\"body-txt\">\nđộng không mệt mỏi, càng hành động càng có kết quả và càng vui vẻ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Nếu không phải đam mê, sứ mệnh thì công việc có thể tạo áp lực.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Môi trường làm việc là yếu tố bên ngoài bạn có thể kiểm soát.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">4. Tiền bạc:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">&quot;Nếu bạn hạnh phúc mà bạn có tiền thì chắc chắn bạn sẽ hạnh phúc hơn.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Có tiền giúp bạn có thể giúp đỡ bản thân, những người xung quanh và bên ngoài xã hội</span></div>\n<p class=\"body-txt\">\ncó cuộc sống tốt hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bí quyết không phải là bao nhiêu tiền, mà &quot;chính cái hành trình bạn đang kiếm được tiền</span></div>\n<p class=\"body-txt\">\nđó cũng đã tạo nên hạnh phúc cho rất nhiều người&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bài tập về nhà:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Hãy xem những yếu tố nào đang ảnh hưởng tiêu cực tới cuộc sống của bạn mà bạn CÓ</span></div>\n<p class=\"body-txt\">\nTHỂ thay đổi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Quyết định bao giờ bạn sẽ thay đổi và thay đổi nó như thế nào.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Hãy làm bài tập này một cách tập trung, nó sẽ ảnh hưởng rất lớn tới cuộc đời bạn.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Chấp nhận và tìm cơ hội trong khó khăn: Diễn giả nhấn mạnh rằng đối với những yếu tố</span></div>\n<p class=\"body-txt\">\nbên ngoài không thể kiểm soát (như thiên tai, khủng hoảng kinh tế), chúng ta không nên\n \ncố gắng kiểm soát mà hãy &quot;cứ kệ nó tồn tại như nó muốn tồn tại&quot; và tin rằng &quot;trong khó\n \nkhăn thì luôn có mầm mống của sự phát triển&quot;.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Quan điểm này giúp thay đổi tư duy từ việc chống cự vô ích sang việc</span></div>\n<p class=\"body-txt\">\ntìm kiếm sự thích nghi, học hỏi và phát triển, giải phóng năng lượng cho những việc có ý\n \nnghĩa hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Sức mạnh của các mối quan hệ: Câu nói &quot;Bạn là trung bình của năm người bạn thường</span></div>\n<p class=\"body-txt\">\ngặp&quot; và &quot;Gần mực thì đen, gần đèn thì sáng&quot; đúc kết vai trò cực kỳ quan trọng của những\n \nngười xung quanh đối với cảm xúc và cuộc sống của chúng ta.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Nhiều người ít để ý đến ảnh hưởng của môi trường xã hội. Insight này</span></div>\n<p class=\"body-txt\">\nkhuyến khích việc chủ động lựa chọn các mối quan hệ tích cực, lành mạnh để nâng cao\n \nchất lượng cuộc sống và cảm xúc cá nhân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Tiền bạc và hạnh phúc trong hành trình: Diễn giả đưa ra một cái nhìn cân bằng về tiền</span></div>\n<p class=\"body-txt\">\nbạc: &quot;Nếu bạn hạnh phúc mà bạn có tiền thì chắc chắn bạn sẽ hạnh phúc hơn&quot;, đồng thời\n \nnhấn mạnh &quot;chính cái hành trình bạn đang kiếm được tiền đó cũng đã tạo nên hạnh\n \nphúc cho rất nhiều người&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Điều này giải quyết mâu thuẫn giữa việc theo đuổi hạnh phúc và giá</span></div>\n<p class=\"body-txt\">\ntrị vật chất. Nó không chỉ khẳng định tiền bạc có thể là công cụ để tăng cường hạnh phúc\n \n(thông qua việc giúp đỡ bản thân và người khác) mà còn đề cao giá trị của quá trình lao\n \nđộng, tạo ra giá trị, chứ không chỉ là số tiền cuối cùng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Hãy luôn nhớ, trong khó khăn thì luôn có mầm mống của sự phát triển.”\n \n“Hãy cho tôi biết những người bạn của bạn là ai, tôi sẽ nói cho bạn biết bạn là ai.”\n \n“Gần mực thì đen, gần đèn thì sáng.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Bài 7: Trạng thái cơ thể ảnh hưởng đến cảm xúc</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Tóm tắt. Buổi giảng tập trung vào ba yếu tố bên trong ảnh hưởng đến cảm xúc của chúng ta:</h3>\n<p class=\"body-txt\">\nthân thể, điều ta tập trung vào và câu chuyện ta kể. Trong buổi này, diễn giả diễn giả nhấn\n \nmạnh tầm quan trọng của yếu tố &quot;thân thể&quot; và cách vận động thể chất có thể nhanh chóng\n \nthay đổi trạng thái cảm xúc, chuyển từ tiêu cực sang tích cực. Ông khuyến khích biến việc\n \nvận động thành thói quen hàng ngày để duy trì năng lượng và cảm xúc tốt.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Có ba yếu tố bên trong ảnh hưởng tới cuộc đời và cảm xúc của chúng ta, mà ta có thể dễ</span></div>\n<p class=\"body-txt\">\ndàng kiểm soát:\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Thân thể</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Điều bạn tập trung vào</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Câu chuyện bạn kể</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Video này tập trung vào yếu tố &quot;thân thể&quot;, vì thân thể ảnh hưởng đến cảm xúc một cách</span></div>\n<p class=\"body-txt\">\nvô cùng mạnh mẽ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Con người không thể sống ở nơi nào khác ngoài chính cơ thể của mình; &quot;nơi này&quot; (cơ</span></div>\n<p class=\"body-txt\">\nthể) là nơi tạo nên cảm xúc.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Thân thể mạnh khỏe tạo nên cảm xúc tích cực; thân thể yếu đuối tạo nên cảm xúc tiêu</span></div>\n<p class=\"body-txt\">\ncực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Để tạo nên cảm xúc tích cực bằng cách tác động vào thân thể, hãy luôn nhớ: chỉ cần có cơ</span></div>\n<p class=\"body-txt\">\nthể vận động thì cảm xúc thay đổi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Vận động nhanh và mạnh thì cảm xúc tích cực. (Motion leads to Emotion - Vận động dẫn</span></div>\n<p class=\"body-txt\">\ntới cảm xúc).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Ví dụ cá nhân: Ông Minh kể câu chuyện vợ ông cảm thấy buồn chán, stress vì công việc.</span></div>\n<p class=\"body-txt\">\nÔng khuyên cô ấy đi bộ lên xuống cầu thang thay vì đi thang máy, và sau vài phút vận\n \nđộng, cảm xúc tích cực nhanh chóng quay trở lại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Khi vận động nhanh chóng, mạnh mẽ, nhiều thay đổi vật lý và hóa học diễn ra trong cơ</span></div>\n<p class=\"body-txt\">\nthể (lưu thông máu, khí, oxy), giúp nhanh chóng có cảm giác tích cực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bất kỳ điều gì làm cho cơ thể vận động sẽ mang đến tích cực.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Khuyên hãy đi tập thể dục khi gặp áp lực trong cuộc sống.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Thách thức: dành 30 phút tập thể dục mỗi ngày trong 90 ngày liên tiếp, hoặc tham gia</span></div>\n<p class=\"body-txt\">\nthử thách 10.000 bước chân mỗi ngày trong 90 ngày liên tiếp (có thể dùng Smartwatch,\n \nApple Watch, Mi Fit...).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Việc duy trì thói quen vận động 90 ngày sẽ khiến nó trở thành thói quen hàng ngày, ảnh</span></div>\n<p class=\"body-txt\">\nhưởng tích cực đến cảm xúc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Ông Minh chia sẻ các động tác nhảy đơn giản như một cách nhanh chóng để thay đổi</span></div>\n<p class=\"body-txt\">\ntrạng thái cảm xúc, học từ Alex Mandossian, các bộ lạc dân tộc Kenya và thiền động của\n \nOsho. Những động tác này rất đơn giản nhưng ảnh hưởng đến nhiều bộ phận cơ thể,\n \nnhanh chóng tạo năng lượng tích cực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Lời khuyên: Khi cảm thấy buồn chán, hãy đứng lên và nhảy ngay tại văn phòng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Nhấn mạnh lại: Chỉ cần vận động là cảm xúc thay đổi. Vận động càng nhanh, càng mạnh</span></div>\n<p class=\"body-txt\">\nthì cảm xúc càng trở nên tích cực.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">&quot;Motion leads to Emotion&quot; (Vận động dẫn tới cảm xúc): Đây là luận điểm cốt lõi nhất. Nó</span></div>\n<p class=\"body-txt\">\nnhấn mạnh mối liên hệ trực tiếp và mạnh mẽ giữa hoạt động thể chất và trạng thái cảm\n \nxúc. Chỉ cần vận động cơ thể, cảm xúc sẽ thay đổi, và vận động càng nhanh, mạnh thì cảm\n \nxúc càng tích cực. Điều này quan trọng vì nó cung cấp một công cụ đơn giản, dễ tiếp cận\n \nvà hiệu quả ngay lập tức để quản lý và cải thiện cảm xúc mà không cần phụ thuộc vào\n \nyếu tố bên ngoài hay suy nghĩ phức tạp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Biến vận động thành thói quen hàng ngày trong 90 ngày: Diễn giả thách thức người nghe</span></div>\n<p class=\"body-txt\">\nduy trì việc vận động (30 phút tập thể dục hoặc 10.000 bước chân) liên tục trong 90\n \nngày. Điều này quan trọng vì nó không chỉ hướng đến việc thay đổi cảm xúc nhất thời\n \nmà còn xây dựng một thói quen bền vững, giúp cải thiện chất lượng cuộc sống lâu dài.\n \nViệc lặp lại một hành vi tích cực trong 90 ngày đủ để biến nó thành một phần không thể\n \nthiếu, duy trì trạng thái tích cực một cách tự động.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Chỉ cần có cơ thể vận động thì cảm xúc thay đổi.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Motion leads to Emotion (vận động dẫn tới cảm xúc).”\n \n“Nơi này [cơ thể] là nơi tạo nên cảm xúc của bạn.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Bài 8: Bonus 5 Yếu tố ảnh hưởng đến thân thể</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Tóm tắt. Buổi giảng này tập trung vào việc hướng dẫn 5 thói quen cốt lõi để xây dựng một</h3>\n<p class=\"body-txt\">\ncơ thể khỏe mạnh và tinh thần tích cực trong vòng 90 ngày. Các thói quen bao gồm uống đủ\n \nnước đúng cách, hít thở sâu, ăn uống lành mạnh với ưu tiên rau xanh, vận động đều đặn và\n \ngiữ tinh thần thoải mái. Diễn giả nhấn mạnh rằng việc thực hành kiên trì và thường xuyên\n \ncác yếu tố này sẽ mang lại những thay đổi tích cực rõ rệt cho cả thể chất và cảm xúc.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Giới thiệu 5 bước để có một cơ thể khỏe mạnh: Kéo dài trong 90 ngày để tạo lập thói</span></div>\n<p class=\"body-txt\">\nquen.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">1. Uống nước đủ:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">75% cơ thể là nước.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Lượng nước khuyến nghị: 0.4 lít nước trên 10 kg cơ thể (ví dụ: 50kg -&gt; 2 lít; 70kg -&gt; 2.8</span></div>\n<p class=\"body-txt\">\nlít).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Uống trước khi khát; dấu hiệu thiếu nước là khát, khô môi, nước tiểu có màu đậm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Uống từng ngụm nhỏ, mỗi 15 phút một lần.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cần uống nhiều nước hơn khi: điều kiện y tế đặc biệt, chơi thể thao, thời tiết nóng, hoặc</span></div>\n<p class=\"body-txt\">\nkhi uống các chất kích thích (cà phê, trà, rượu, bia) vì chúng làm mất nước.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Luôn mang theo bình nước bên mình để nhắc nhở việc uống nước.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">2. Oxy (Hít thở):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Oxy vô cùng cần thiết cho cơ thể và ảnh hưởng mạnh mẽ tới cảm xúc.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Hít thở sâu và thở dài là cách đơn giản để đưa oxy vào cơ thể.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Hít thở sâu giúp oxy đến khắp cơ thể và có thể làm thay đổi cảm xúc theo hướng tích</span></div>\n<p class=\"body-txt\">\ncực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Vận động là cách để đưa nhiều oxy đến cơ thể hơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">3. Thức ăn:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Thức ăn có ảnh hưởng tới cả cơ thể và cảm xúc.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Diễn giả chọn ăn rau vì sức khỏe, không vì yếu tố đạo đức hay tôn giáo.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">70% thức ăn hàng ngày nên đến từ rau xanh và sống (rau &quot;water rich food&quot; - thực phẩm</span></div>\n<p class=\"body-txt\">\ngiàu nước, chứa hơn 90% nước).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Ví dụ các loại rau giàu nước: cải, xà lách, cà chua, dưa chuột, dưa hấu, bí đỏ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">4. Vận động:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Vận động 30 phút mỗi ngày, ra mồ hôi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Nên duy trì nhịp tim ở mức 3 hoặc 4 (khoảng 110-140 nhịp/phút đối với người trung</span></div>\n<p class=\"body-txt\">\nbình).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Tập luyện ở trạng thái aerobic, tức là có thể vừa đi vừa nói chuyện được.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Vận động giúp trái tim khỏe mạnh hơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">5. Tinh thần thoải mái:</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Luôn giữ cho tinh thần được thoải mái và giảm bớt những stress.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Tinh thần thoải mái là nền tảng để cơ thể khỏe mạnh.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Kết luận: Thực hành 5 yếu tố này thường xuyên, hàng ngày, trong 90 ngày liên tục để có</span></div>\n<p class=\"body-txt\">\nmột cuộc sống mạnh khỏe và tích cực.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Chủ động xây dựng thói quen trong 90 ngày: Diễn giả nhấn mạnh con số 90 ngày là</span></div>\n<p class=\"body-txt\">\nkhoảng thời gian cần thiết để tạo lập một thói quen mới vững chắc, mang lại kết quả lâu\n \ndài. Điều này quan trọng vì nó định hướng người học tập trung vào sự kiên trì và bền bỉ,\n \nthay vì tìm kiếm các giải pháp tức thời, đồng thời đặt ra một mục tiêu rõ ràng và có thể\n \nđo lường được cho sự thay đổi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Mối liên hệ hai chiều giữa thể chất và cảm xúc: Buổi giảng liên tục nhấn mạnh rằng sức</span></div>\n<p class=\"body-txt\">\nkhỏe thể chất (uống nước, oxy, thức ăn, vận động) không chỉ cải thiện cơ thể mà còn ảnh\n \nhưởng trực tiếp đến trạng thái cảm xúc và tinh thần. Ví dụ, hít thở sâu có thể làm thay\n \nđổi cảm xúc sang hướng tích cực, và tinh thần thoải mái giúp cơ thể khỏe mạnh. Điều\n \nnày quan trọng vì nó cung cấp một cái nhìn toàn diện về sức khỏe, khuyến khích sự tự\n \nchăm sóc bản thân một cách cân bằng giữa thể chất và tinh thần.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Tập trung vào các yếu tố cơ bản, dễ thực hiện và tự nhiên: Thay vì các phương pháp</span></div>\n<p class=\"body-txt\">\nphức tạp, diễn giả đưa ra những nguyên tắc đơn giản và dễ áp dụng nhất như uống nước\n \nđúng cách, hít thở sâu, và ưu tiên rau xanh, sống trong chế độ ăn. Điều này quan trọng vì\n \nnó làm giảm rào cản cho việc bắt đầu cải thiện sức khỏe, khiến kiến thức trở nên thiết\n \nthực và dễ dàng tích hợp vào cuộc sống hàng ngày mà không đòi hỏi nhiều chi phí hay\n \nkiến thức chuyên sâu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Hãy luôn luôn giữ cho tinh thần của mình được thoải mái... tinh thần thoải mái thì cơ thể của\n \nbạn sẽ khỏe mạnh.”\n \n“Thách thức của tôi là 90 ngày luyện tập năm điều này.”\n \n“Chúc bạn có một cái lâu đài cơ thể mạnh khỏe.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Bài 9: Sự tập trung của bạn tạo nên cảm xúc</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Tóm tắt. Buổi giảng tập trung vào yếu tố &quot;sự tập trung vào điều gì&quot; ảnh hưởng đến cảm xúc</h3>\n<p class=\"body-txt\">\nvà cuộc sống của mỗi người. Diễn giả chỉ ra rằng con người có xu hướng tự nhiên tập trung\n \nvào những điều tiêu cực, nỗi đau, dẫn đến cảm xúc buồn bã. Để thay đổi cảm xúc và cuộc đời,\n \nchúng ta cần chủ động thay đổi sự tập trung bằng cách đặt những câu hỏi đúng đắn cho bản\n \nthân và người khác, hướng đến tìm kiếm những mặt tích cực, tốt đẹp trong mọi tình huống.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Yếu tố quan trọng thứ hai ảnh hưởng tới cảm xúc là &quot;sự tập trung vào điều gì&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Trong cuộc sống, mọi sự vật, hiện tượng đều có hai mặt đối lập (tốt/xấu, đen/trắng,</span></div>\n<p class=\"body-txt\">\nnóng/lạnh...).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Con người có xu hướng &quot;nghiện nỗi đau&quot;, chỉ nhìn thấy những điểm xấu, lỗi lầm của</span></div>\n<p class=\"body-txt\">\nngười khác và sự kiện, và thường bị thu hút bởi thông tin tiêu cực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Khi tập trung vào điều xấu, bạn sẽ có nỗi buồn; khi tập trung vào điều tốt, bạn sẽ có hạnh</span></div>\n<p class=\"body-txt\">\nphúc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Thực hành: Ngay cả với những thứ thân thuộc nhất như ngón tay trỏ, chúng ta vẫn có</span></div>\n<p class=\"body-txt\">\nthể tìm thấy những điều mới lạ mà trước đây chưa từng nhìn thấy, chứng tỏ khả năng\n \nnhận diện cái mới/tích cực luôn tồn tại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bạn chỉ nhìn thấy cái thứ mà &quot;bạn nhìn thấy&quot; (hình ảnh phản chiếu trong tâm trí), chứ</span></div>\n<p class=\"body-txt\">\nkhông phải bản thân sự vật đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Để nhìn nhận vấn đề toàn diện, hãy luôn tự hỏi: &quot;Có điều gì mà tôi không biết về điều này</span></div>\n<p class=\"body-txt\">\nkhông? Có điều gì tôi bị bỏ qua không? Có điều gì bị bỏ quên ở đây không?&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Kỹ thuật thay đổi trạng thái ngay lập tức là &quot;Thay câu hỏi, đổi cuộc đời.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Sử dụng những câu hỏi cụ thể, tích cực để thay đổi cảm xúc (ví dụ: &quot;Điều gì làm cho tôi</span></div>\n<p class=\"body-txt\">\ncảm thấy hạnh phúc/biết ơn/tự hào/mạnh mẽ/tự tin/sung sướng/phấn khích vào lúc\n \nnày?&quot;, &quot;Tôi yêu ai? Ai yêu tôi?&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Hãy hỏi những câu hỏi mà mình *muốn* có kết quả, không phải những câu hỏi mình</span></div>\n<p class=\"body-txt\">\nkhông muốn nó diễn ra.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Tâm trí hoàn toàn có thể được điều khiển một cách nhanh chóng nhờ những câu hỏi.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">&quot;Con người của chúng ta có xu hướng nghiện cái nỗi đau.&quot; (1:13)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là một nhận định sâu sắc về bản chất tâm lý con người, giúp</span></div>\n<p class=\"body-txt\">\nngười nghe nhận diện được một thói quen tiêu cực phổ biến. Chỉ khi ý thức được xu\n \nhướng này, chúng ta mới có thể chủ động thay đổi sự tập trung của mình từ cái xấu sang\n \ncái tốt, từ nỗi đau sang hạnh phúc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">&quot;Bạn chỉ nhìn thấy cái thứ mà bạn nhìn thấy. Đó là hình ảnh được phản chiếu vào bên</span></div>\n<p class=\"body-txt\">\ntrong tâm trí bạn chứ không phải cái sự vật đó.&quot; (3:36-3:44)\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Insight này giải thích cơ chế sâu xa của nhận thức. Nó nhấn mạnh</span></div>\n<p class=\"body-txt\">\nrằng &quot;thực tế&quot; chúng ta trải nghiệm là do tâm trí kiến tạo và phản chiếu, chứ không phải\n \nbản thân sự vật khách quan. Điều này mang lại sức mạnh to lớn: nếu chúng ta có thể\n \nđiều khiển được cách tâm trí phản chiếu, chúng ta có thể thay đổi trải nghiệm về cuộc\n \nsống.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">&quot;Thay câu hỏi, đổi cuộc đời.&quot; (7:04)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là một nguyên tắc hành động cốt lõi và cực kỳ thực tế. Nó cung</span></div>\n<p class=\"body-txt\">\ncấp một công cụ đơn giản nhưng mạnh mẽ để chuyển đổi cảm xúc và tư duy. Việc thay\n \nđổi câu hỏi sẽ thay đổi sự tập trung, từ đó thay đổi cách chúng ta cảm nhận và hành\n \nđộng, dẫn đến những thay đổi tích cực trong cuộc đời.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Con người của chúng ta có xu hướng nghiện cái nỗi đau.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Điều bạn tập trung vào lúc này là gì? Bạn tập trung vào điều xấu, bạn sẽ có những cái nỗi\n \nbuồn. Bạn tập trung vào những điều tốt, bạn sẽ có những hạnh phúc.”\n \n“Thay câu hỏi, đổi cuộc đời.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Bài 10: Sử dụng ngôn từ ảnh hưởng đến cảm xúc</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Tóm tắt. Buổi giảng nhấn mạnh rằng ngôn từ và những câu chuyện ta kể cho chính mình lẫn</h3>\n<p class=\"body-txt\">\nngười khác có sức ảnh hưởng sâu sắc đến cảm xúc và kết quả cuộc đời. Thay vì chìm đắm\n \ntrong những câu chuyện bi kịch hay ngôn từ tiêu cực, mỗi người cần học cách nhận diện và\n \ntái cấu trúc lại câu chuyện cuộc đời mình. Bằng việc áp dụng &quot;kịch bản kể chuyện 7 bước&quot; –\n \nbao gồm mục tiêu, khó khăn, nhân vật phản diện, chiến lược, trận chiến, kết quả và sự bền\n \nvững – chúng ta có thể biến những trải nghiệm đau khổ trong quá khứ thành nguồn động lực\n \nmạnh mẽ, từ đó &quot;thay câu chuyện, đổi cuộc đời&quot; để kiến tạo một tương lai tốt đẹp hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Yếu tố thứ ba ảnh hưởng tới cảm xúc là &quot;ngôn từ bạn dùng, những câu chuyện bạn kể&quot;</span></div>\n<p class=\"body-txt\">\ncho chính mình hoặc người khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Ngôn từ và câu chuyện hàng ngày tác động trở lại bộ não, tạo nên cảm xúc cho chúng ta</span></div>\n<p class=\"body-txt\">\n(vui thì vui, buồn thì buồn).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Một bi kịch phổ biến là nhiều người thường kể những câu chuyện buồn, chán chường,</span></div>\n<p class=\"body-txt\">\nthất vọng về cuộc đời để nhận sự thương hại thay vì tình yêu thương.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Mục tiêu của buổi học là nhận biết câu chuyện bi kịch của mình và chuyển đổi nó thành</span></div>\n<p class=\"body-txt\">\nmột câu chuyện mạnh mẽ, truyền cảm hứng hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Ngôn từ tích cực giúp cuộc sống mạnh mẽ hơn, ngôn từ tiêu cực kéo cuộc sống đi xuống</span></div>\n<p class=\"body-txt\">\n(ví dụ về thí nghiệm giọt nước và so sánh các động từ như &quot;không thể&quot;, &quot;có thể&quot;, &quot;sẽ&quot;,\n \n&quot;nên&quot;, &quot;phải&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Những câu chuyện bạn kể, dù là thật hay chưa, nếu bạn cứ kể đi kể lại cho mình thì bạn</span></div>\n<p class=\"body-txt\">\nsẽ tin và nó sẽ trở thành hiện thực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Những câu chuyện buồn, đau khổ, thất vọng chính là &quot;nguyên liệu quan trọng&quot; để tạo ra</span></div>\n<p class=\"body-txt\">\nmột cuộc sống mới nếu bạn biết cách kể chuyện.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Diễn giả chia sẻ câu chuyện cá nhân về quá khứ nghèo khó để minh họa cách biến khó</span></div>\n<p class=\"body-txt\">\nkhăn thành động lực phát triển.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Giới thiệu &quot;kịch bản kể chuyện 7 bước&quot; để biến nỗi đau thành nguồn cảm hứng và phát</span></div>\n<p class=\"body-txt\">\ntriển:\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Mục tiêu: Những điều bạn mong muốn đạt được trong cuộc đời.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Khó khăn, thách thức: Những ngăn cản bạn không đạt được mục tiêu đó.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Nhân vật phản diện: Những người hoặc yếu tố đã phá hủy, ngăn cản mục tiêu (diễn giả</span></div>\n<p class=\"body-txt\">\ngiáo, bạn bè, môi trường, người thân, hoặc chính mình). Kẻ phản diện càng lớn thì người\n \nanh hùng càng lớn. Kẻ thù lớn nhất của đời người là chính mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Chiến lược, kế hoạch hành động: Những giải pháp để vượt qua nhân vật phản diện và</span></div>\n<p class=\"body-txt\">\nkhó khăn, đạt được mục tiêu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Trận chiến: Mô tả chi tiết quá trình chiến đấu, vượt qua khó khăn và chiến thắng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Kết quả: Những thành tựu đạt được, những điều khiến bạn tự hào và hạnh phúc.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bền vững: Kết quả này bền vững thế nào, gắn chặt với cuộc đời ra sao, tiếp diễn và phát</span></div>\n<p class=\"body-txt\">\ntriển trong tương lai như thế nào.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Thường trong cuộc sống, mọi người chỉ kể đến bước 1, 2 hoặc 3 rồi dừng lại.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Hãy viết câu chuyện của mình đầy đủ cả 7 phần, ngay cả khi các phần 4, 5, 6, 7 chưa diễn</span></div>\n<p class=\"body-txt\">\nra. Việc này sẽ hình thành và mang lại sức mạnh cho cuộc đời bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Diễn giả minh họa thêm câu chuyện cá nhân về hôn nhân, từ xung đột đến hạnh phúc, áp</span></div>\n<p class=\"body-txt\">\ndụng đúng 7 bước.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Thông điệp cốt lõi: &quot;Thay câu chuyện, đổi cuộc đời.&quot;</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Sức mạnh kiến tạo thực tại từ ngôn từ và câu chuyện tự kể: Bài giảng làm rõ rằng ngôn</span></div>\n<p class=\"body-txt\">\ntừ và cách mỗi người tự kể câu chuyện cuộc đời mình có năng lực định hình cảm xúc và\n \ntương lai. Việc chuyển từ những câu chuyện bi kịch, ngôn từ thụ động sang ngôn từ\n \nmạnh mẽ, tích cực và câu chuyện về hành trình vượt khó là hành động chủ động kiến tạo\n \nthực tại, giúp mỗi người tự trao quyền cho bản thân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Khó khăn là nguyên liệu, không phải là kết thúc: Diễn giả khuyến khích xem những trải</span></div>\n<p class=\"body-txt\">\nnghiệm buồn bã, thất vọng trong quá khứ không phải là điểm dừng mà là &quot;nguyên liệu\n \nquan trọng&quot; để xây dựng một cuộc sống mới. Điều này mang lại một góc nhìn tích cực và\n \ný nghĩa cho mọi nghịch cảnh, biến chúng thành động lực và bệ phóng để phát triển.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">&quot;Kẻ thù lớn nhất là chính mình&quot; và tầm quan trọng của sự tự chịu trách nhiệm: Nhận</span></div>\n<p class=\"body-txt\">\nđịnh &quot;kẻ thù lớn nhất của đời người là chính mình&quot; là một insight sâu sắc, thúc đẩy việc\n \nhướng nội và giải quyết những rào cản từ bên trong. Khi vượt qua được bản thân, mọi\n \nthách thức bên ngoài sẽ trở nên dễ dàng hơn, và cá nhân sẽ trở thành &quot;người anh hùng&quot;\n \ntrong chính câu chuyện của mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Viết ra tương lai bằng câu chuyện 7 bước: Việc yêu cầu viết toàn bộ câu chuyện 7 bước,</span></div>\n<p class=\"body-txt\">\nkể cả những phần chưa diễn ra, không chỉ là một bài tập kể chuyện mà còn là một\n \nphương pháp mạnh mẽ để lập trình lại tiềm thức. Bằng cách hình dung và ghi lại hành\n \ntrình thành công, cá nhân đang gieo mầm cho tương lai, tạo ra một bản đồ dẫn lối và\n \nnguồn động lực nội tại để hiện thực hóa những điều mong muốn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Chúng ta không quyết định được cái nơi mình sinh ra, nhưng mình hoàn toàn có thể quyết\n \nđịnh được nơi mình sống.”\n \n“Kẻ thù lớn nhất của đời người là ai? Là ai? Bạn biết không? Là chính mình!”\n \n“Thay câu chuyện, đổi cuộc đời.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#4527a0\">Chương 4</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Bài 11: Hạnh phúc, không hạnh phúc, đau khổ</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Tóm tắt. Buổi giảng này tập trung vào cơ chế hình thành ba cảm xúc chính là hạnh phúc,</h3>\n<p class=\"body-txt\">\nkhông hạnh phúc và đau khổ, dựa trên sự đối chiếu giữa mong muốn của cá nhân và thực tế\n \nđạt được. Diễn giả trình bày hai chiến lược chính để đạt được hạnh phúc hoặc thoát khỏi\n \nđau khổ: điều chỉnh giảm bớt kỳ vọng hoặc thay đổi chiến lược và hành động mạnh mẽ,\n \nquyết liệt để biến mong muốn thành hiện thực. Điểm cốt lõi là biến cảm xúc không hạnh\n \nphúc hoặc đau khổ thành động lực để phát triển bản thân và cải thiện cuộc sống.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Có hơn 4000 loại cảm xúc khác nhau, buổi này tập trung vào ba cảm xúc chính: hạnh</span></div>\n<p class=\"body-txt\">\nphúc, không hạnh phúc và đau khổ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cơ chế hình thành cảm xúc được giải thích là sự so sánh giữa &quot;những mong muốn mà</span></div>\n<p class=\"body-txt\">\nbạn có được&quot; và &quot;những điều kiện thực tiễn trong cuộc sống của bạn&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Hạnh phúc xảy ra khi điều bạn mong muốn và điều bạn đạt được là giống như nhau.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Không hạnh phúc xảy ra khi điều bạn mong muốn và điều thực tiễn bạn có không giống</span></div>\n<p class=\"body-txt\">\nnhau.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a
