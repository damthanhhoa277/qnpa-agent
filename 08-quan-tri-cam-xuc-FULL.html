\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Lật ngược quan điểm để thấu hiểu và cải thiện mối quan hệ: Kỹ thuật &quot;turn around&quot; (ví</span></div>\n<p class=\"body-txt\">\ndụ: từ &quot;A ghét tôi&quot; thành &quot;tôi ghét A&quot; hoặc &quot;A không ghét tôi&quot;) giúp chúng ta đặt mình\n \nvào vị trí đối phương hoặc nhìn nhận vấn đề từ góc độ hoàn toàn khác. Việc này quan\n \ntrọng bởi nó phá vỡ vòng lặp suy nghĩ cũ, tạo ra sự linh hoạt trong tư duy và là chìa khóa\n \nđể hàn gắn, cải thiện các mối quan hệ, chuyển từ đối đầu sang thấu hiểu và hợp tác.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Chúng ta biết rằng mọi suy nghĩ đối với bản thân chúng ta thì nó luôn đúng, cho nên ta mới\n \ngiữ nó trong suy nghĩ của chúng ta. Nhưng trên thực tiễn, nó có thể không đúng khi chúng ta\n \nđưa nó vào những hoàn cảnh khác, vào những bối cảnh khác, đưa vào những con người khác.”\n \n“Đó chỉ là vì mỗi người chúng ta có khả năng cảm nhận thế giới theo cách riêng của mình mà\n \nthôi.”\n \n“Hãy luôn nói: &#x27;Tôi sai rồi, tôi xin lỗi.&#x27; Khi bạn nói được tôi sai rồi, tôi xin lỗi thì thế giới mới\n \nđược mở ra cho bạn.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Bài 23: Tổng kết</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Tóm tắt. Buổi giảng này tổng kết khóa học &quot;Hành trình quản trị cảm xúc&quot;, nhấn mạnh việc</h3>\n<p class=\"body-txt\">\ntiếp tục luyện tập các kỹ thuật trong 90 ngày để biến chúng thành thói quen sâu sắc. Cốt lõi\n \ncủa việc quản trị cảm xúc nằm ở cách phản ứng với sự kiện bên ngoài, thông qua kiểm soát\n \n&quot;tam giác Triad&quot; (thân thể, sự tập trung và ngôn từ kể chuyện) cùng nhiều kỹ thuật khác.\n \nMục tiêu là đạt được cuộc sống hạnh phúc, mạnh khỏe, và tự do, đồng thời chia sẻ những\n \nkiến thức này để giúp đỡ người khác. Diễn giả khẳng định cuộc sống thực sự bắt đầu sau khi\n \nhoàn thành khóa học, khi áp dụng những điều đã học.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#4527a0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Chúc mừng học viên đã hoàn thành khóa học &quot;Hành trình quản trị cảm xúc&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Khuyến khích tiếp tục luyện tập các kỹ thuật đã học trong 90 ngày liên tục để biến chúng</span></div>\n<p class=\"body-txt\">\nthành một phần trong tiềm thức, suy nghĩ và hành động.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Mục tiêu là mang những điều tuyệt vời từ chương trình để chia sẻ, huấn luyện và giúp</span></div>\n<p class=\"body-txt\">\nđỡ người khác cũng có cảm xúc tuyệt vời.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Nhấn mạnh rằng cuộc sống thực sự mới bắt đầu sau khóa học, từ ngày mai.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cảm xúc được quyết định bởi yếu tố bên ngoài, nhưng cách phản ứng với sự kiện mới là</span></div>\n<p class=\"body-txt\">\nyếu tố quan trọng nhất.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Giới thiệu &quot;tam giác Triad&quot; gồm ba yếu tố quyết định cảm xúc: cơ thể, sự tập trung và</span></div>\n<p class=\"body-txt\">\nngôn từ kể chuyện.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cơ thể: Luyện tập cơ thể luôn mạnh mẽ và tự tin (dáng đứng, tốc độ) để tạo cảm xúc tích</span></div>\n<p class=\"body-txt\">\ncực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Sự tập trung: Hướng định hướng vào những điều tốt đẹp trong cuộc sống, dù cuộc sống</span></div>\n<p class=\"body-txt\">\ncó cả tốt và xấu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Ngôn từ kể chuyện: Kể câu chuyện cuộc đời của mình theo 7 bước (thay vì 3 bước thông</span></div>\n<p class=\"body-txt\">\nthường).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">7 bước của câu chuyện hoàn hảo: điều bạn muốn, khó khăn đang gặp phải, nhân vật cản</span></div>\n<p class=\"body-txt\">\ntrở, chiến lược sử dụng, trận đánh đã diễn ra, kết quả đạt được, và cách duy trì kết quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Khuyến khích liên tục kể những câu chuyện mới cho cuộc đời mình.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Giới thiệu các kỹ thuật khác đã được hướng dẫn: phương pháp tuyên bố, phương pháp</span></div>\n<p class=\"body-txt\">\n&quot;turn around&quot;, và phương pháp đặt mục tiêu để thay đổi cảm xúc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cung cấp cách điều khiển và loại bỏ các cảm xúc tiêu cực như giận dữ, tội lỗi, bất hạnh,</span></div>\n<p class=\"body-txt\">\nđau khổ bằng cách hiểu rõ nguyên nhân hình thành.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Kết quả cuối cùng của việc áp dụng các kỹ thuật là trở nên vô cùng hạnh phúc, mạnh</span></div>\n<p class=\"body-txt\">\nkhỏe và tự do.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">&quot;Thứ quyết định quan trọng nhất là cách bạn phản ứng với những sự kiện đó.&quot; (0:50-</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">0:53)</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là một thay đổi tư duy mạnh mẽ, chuyển quyền kiểm soát cảm</span></div>\n<p class=\"body-txt\">\nxúc từ yếu tố bên ngoài sang nội tại. Nó trao quyền cho cá nhân, nhấn mạnh rằng dù\n \nhoàn cảnh có thể không thay đổi, cách chúng ta lựa chọn phản ứng là chìa khóa để quản\n \nlý cảm xúc và chất lượng cuộc sống.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">&quot;Tam giác Triad&quot; (cân thể, sự tập trung và ngôn từ bạn kể) sẽ quyết định cảm xúc của</span></div>\n<p class=\"body-txt\">\nbạn. (0:54-1:04)\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Điểm này cung cấp một khuôn khổ cụ thể và có thể thực hành được</span></div>\n<p class=\"body-txt\">\nđể quản lý cảm xúc. Thay vì chỉ nói &quot;hãy tích cực lên&quot;, nó chỉ ra ba đòn bẩy rõ ràng mà\n \nchúng ta có thể chủ động điều chỉnh (tư thế cơ thể, hướng sự chú ý, và cách chúng ta\n \ndiễn giải câu chuyện cuộc đời mình) để tác động trực tiếp đến trạng thái cảm xúc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">&quot;Cuộc sống của bạn thực sự mới bắt đầu từ ngày mai.&quot; (0:41-0:44)</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là một thông điệp thúc đẩy mạnh mẽ, khuyến khích sự chủ động</span></div>\n<p class=\"body-txt\">\nvà liên tục. Nó không coi việc hoàn thành khóa học là một đích đến, mà là một khởi đầu\n \nmới, một lời kêu gọi áp dụng kiến thức vào thực tiễn để tạo ra sự thay đổi ý nghĩa trong\n \ncuộc sống.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Tôi mong rằng bạn sẽ tiếp tục luyện tập những kỹ thuật này trong suốt 90 ngày liên tục để\n \nbiến nó thành một phần trong tiềm thức của bạn, trong cái suy nghĩ của bạn, trong hành động\n \ncủa bạn.”\n \n“Cuộc sống của bạn thực sự mới bắt đầu từ ngày mai.”\n \n“Bạn sẽ vô cùng hạnh phúc, bạn sẽ vô cùng mạnh khỏe, bạn sẽ vô cùng, vô cùng, vô cùng tự do\n \nkhỏi những thứ xung quanh mình.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><p class=\"body-txt\">\nLời kết\n \nHết khoá Quản Trị Cảm Xúc. Đọc để LÀM, không phải để biết — biến mỗi bài học thành hành\n \nđộng cụ thể.\n</p></div></div>",
"<div class=\"pg pg-cover\" style=\"border-top:5px solid #4527a0\">\n  <div class=\"cover-wrap\">\n    <div class=\"cover-title\">Quản Trị Cảm Xúc</div>\n    <div class=\"cover-sub\" style=\"color:#4527a0\">Học để ứng dụng · Áp dụng để thành công</div>\n    <div class=\"cover-tag\" style=\"color:#4527a0;margin-top:24px\">QNPA Pickleball Academy</div>\n  </div>\n</div>"];
const N=pages.length;
let cur=0;
const book=document.getElementById('book');
const fill=document.getElementById('progress-fill');
const info=document.getElementById('page-info');
const jump=document.getElementById('page-jump');
const btnP=document.getElementById('btn-prev');
const btnN=document.getElementById('btn-next');
function render(){
  book.innerHTML=pages[cur];
  fill.style.width=((cur+1)/N*100)+'%';
  info.textContent=(cur+1)+' / '+N;
  jump.value=cur+1;
  btnP.disabled=cur===0;
  btnN.disabled=cur===N-1;
  window.scrollTo(0,0);
}
function next(){if(cur<N-1){cur++;render();}}
function prev(){if(cur>0){cur--;render();}}
function goTo(n){cur=Math.max(0,Math.min(N-1,n));render();}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown')next();
  else if(e.key==='ArrowLeft'||e.key==='PageUp')prev();
});
render();
</script>
