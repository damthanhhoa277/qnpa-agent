0\">•</span><span class=\"bul-txt\">Đau khổ nhất là khi điều bạn mong muốn không giống với điều bạn có, và bạn đã nỗ lực</span></div>\n<p class=\"body-txt\">\nnhưng không thể làm được (cảm thấy bế tắc, thất vọng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cảm xúc của bạn được tạo nên bởi điều bạn muốn, điều bạn đạt được và những hành</span></div>\n<p class=\"body-txt\">\nđộng của bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Để có được hạnh phúc, có thể áp dụng hai cách tiếp cận:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Điều chỉnh kỳ vọng: Giảm nhỏ mong muốn/kỳ vọng của mình, chấp nhận và hài lòng với</span></div>\n<p class=\"body-txt\">\nnhững gì đang có (ví dụ: cái nhà, cái xe hiện tại là được rồi). Điều này cũng có thể đem\n \nđến hạnh phúc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Hành động mạnh mẽ: Mau chóng lập ra những chiến lược, đạt những hành động và hành</span></div>\n<p class=\"body-txt\">\nđộng một cách mạnh mẽ, quyết liệt để điều bạn mong muốn được xảy ra.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Ngay cả cảm giác không hạnh phúc cũng có thể tạo thành động lực để chúng ta tiến lên</span></div>\n<p class=\"body-txt\">\nvà chuyển thành hạnh phúc vào ngày mai.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Khi ở trạng thái đau khổ (đã nỗ lực nhưng bế tắc), có hai cách giải quyết: hoặc giảm</span></div>\n<p class=\"body-txt\">\nxuống kỳ vọng của mình, hoặc thay đổi những chiến lược để có thể đạt được điều đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Để thay đổi chiến lược, cần học cách để mình trở nên lớn hơn, mạnh mẽ hơn, có được</span></div>\n<p class=\"body-txt\">\nnhững kỹ năng chuyên môn, kiến thức để đạt được điều mình muốn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bạn không thể làm theo cách cũ để có được kết quả mới; hãy thay đổi cách mà mình</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">hành động, học hỏi để mình phát triển hơn.</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cơ chế hình thành cảm xúc từ Mong muốn và Thực tế: Đây là nền tảng để mỗi người tự</span></div>\n<p class=\"body-txt\">\nphân tích và hiểu rõ nguồn gốc của cảm xúc mình đang trải qua. Việc nhận diện được\n \nkhoảng cách giữa &quot;điều mình muốn&quot; và &quot;điều mình có&quot; là bước đầu tiên để chủ động\n \nquản lý cảm xúc, dù là điều chỉnh kỳ vọng hay hành động để thay đổi thực tế.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Chuyển hóa cảm xúc tiêu cực thành động lực: Thay vì coi không hạnh phúc hay đau khổ</span></div>\n<p class=\"body-txt\">\nlà điều tệ hại cần tránh, bài giảng nhấn mạnh chúng có thể là động lực mạnh mẽ để thay\n \nđổi và phát triển. Điều này khuyến khích tư duy tích cực, biến thách thức thành cơ hội để\n \nhọc hỏi, nâng cao năng lực và đạt được mục tiêu lớn hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Tầm quan trọng của sự thay đổi và phát triển bản thân: Để đạt được những điều mong</span></div>\n<p class=\"body-txt\">\nmuốn mà cách cũ không thực hiện được, cá nhân cần &quot;trở nên lớn hơn&quot;, &quot;mạnh mẽ hơn&quot;,\n \ntrang bị thêm kỹ năng và kiến thức, và không ngừng thay đổi cách hành động. Đây là lời\n \nnhắc nhở về sự cần thiết của việc học tập suốt đời và thích nghi.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Bạn không thể làm theo cách cũ để có được kết quả mới.”\n \n“hạnh phúc cũng tốt mà không hạnh phúc, nếu chúng ta sử dụng được nó thì nó lại chuyển\n \nthành hạnh phúc vào ngày mai.”\n \n“Hãy biết hài lòng với những gì bạn đang có.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Bài 12: Cảm giác tội lỗi - Yếu tố phá hủy cuộc sống</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Tóm tắt. Buổi giảng tập trung phân tích sâu sắc về cảm xúc tội lỗi, coi nó là một trạng thái</h3>\n<p class=\"body-txt\">\ntâm lý phá hủy thành công và chia đôi cuộc sống nội tâm và ngoại cảnh của con người.\n \nNguyên nhân cốt lõi của tội lỗi là sự mâu thuẫn giữa &quot;hình ảnh tự thân&quot; (con người mình\n \nmuốn trở thành) và &quot;hành động&quot; thực tế. Để hóa giải cảm xúc tiêu cực này, người học được\n \nhướng dẫn ba cách tiếp cận: thay đổi hình ảnh tự thân, thay đổi hành động, hoặc chấp nhận\n \nvà tha thứ cho bản thân, nhằm đạt được sự bình an và sống một cuộc đời trọn vẹn hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Giới thiệu về cảm xúc tội lỗi: Đây là cảm xúc phá hủy cuộc sống của nhiều người, gây chia</span></div>\n<p class=\"body-txt\">\nđôi thế giới bên trong và bên ngoài thành hai phần riêng rẽ, không có sự liên kết.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cơ chế hình thành tội lỗi:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cảm giác hạnh phúc là khi &quot;mong muốn&quot; và &quot;điều có&quot; thống nhất.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cảm giác tội lỗi liên quan đến những gì chúng ta nghĩ về bản thân mình.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Hình ảnh tự thân: Là những suy nghĩ, mong muốn về con người mình muốn trở thành.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Hành động: Là cách chúng ta cư xử hàng ngày.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Nếu hình ảnh tự thân và hành động trùng khớp, chúng ta cảm thấy cuộc sống tuyệt vời</span></div>\n<p class=\"body-txt\">\n(hạnh phúc).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Nếu hình ảnh tự thân và hành động không trùng khớp, chúng ta sẽ bị xung đột và cảm</span></div>\n<p class=\"body-txt\">\ngiác tội lỗi xuất hiện.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Biểu hiện của tội lỗi: Cáu giận chính bản thân mình, cảm thấy xấu hổ với người khác về</span></div>\n<p class=\"body-txt\">\ncon người của mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Ví dụ minh họa:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Người tự nhận là &quot;trung thực&quot; nhưng lại nói dối → cảm thấy tội lỗi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Người tự nhận là &quot;ăn cắp&quot; nhưng có cơ hội lại không cướp → cảm thấy tội lỗi (xấu hổ với</span></div>\n<p class=\"body-txt\">\nbản thân và &quot;băng đảng&quot;).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bản chất của hình ảnh tự thân: Không phải xấu hay tốt, mà là sự kỳ vọng về việc mình</span></div>\n<p class=\"body-txt\">\n*cần phải làm* hoặc *không nên làm*. Cảm giác tội lỗi xuất hiện khi ta không làm điều ta\n \ntin mình cần làm, hoặc làm điều ta tin mình không nên làm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Hậu quả của tội lỗi: Khiến cảm xúc đi xuống, chán trường, mất năng lượng, không muốn</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">hành động, chia đôi cuộc sống.</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Ba cách xóa bỏ cảm giác tội lỗi:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Thay đổi hình ảnh tự thân: Điều chỉnh hình ảnh bản thân cho phù hợp với hành động</span></div>\n<p class=\"body-txt\">\nthực tế (ví dụ: chấp nhận mình là &quot;chuyên gia nói dối&quot; nếu thường xuyên nói dối để\n \nkhông cảm thấy tội lỗi).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Thay đổi hành động: Điều chỉnh hành động của mình cho phù hợp với hình ảnh tự thân</span></div>\n<p class=\"body-txt\">\nmong muốn (ví dụ: nếu muốn là người trung thực thì đừng bao giờ nói dối nữa).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Chấp nhận và tha thứ: Chấp nhận tội lỗi như một phần của cuộc sống, tha thứ cho bản</span></div>\n<p class=\"body-txt\">\nthân để thấy đó là việc bình thường và không cảm thấy tội lỗi nữa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Kết luận: Cuộc sống là những lựa chọn. Khi không còn cảm giác tội lỗi, sẽ không có cảm</span></div>\n<p class=\"body-txt\">\nxúc tiêu cực nào xuất hiện. Mọi người đều mắc sai lầm, hãy tự tha thứ cho mình để có\n \nmột cuộc sống tốt đẹp hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cơ chế hình thành cảm xúc tội lỗi: diễn giả định nghĩa tội lỗi không phải là do hành động</span></div>\n<p class=\"body-txt\">\n&quot;sai trái&quot; theo chuẩn mực xã hội, mà là do sự không nhất quán giữa &quot;hình ảnh tự thân&quot;\n \n(con người bạn tin mình là hoặc muốn trở thành) và &quot;hành động&quot; thực tế.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là một insight mạnh mẽ, giúp người nghe thoát khỏi gánh nặng</span></div>\n<p class=\"body-txt\">\nđạo đức để tập trung vào sự hòa hợp nội tại. Nó cho phép chúng ta kiểm soát cảm xúc\n \ntiêu cực bằng cách phân tích và điều chỉnh mối quan hệ giữa suy nghĩ và hành vi, thay vì\n \nchỉ đơn thuần tự trách bản thân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Các phương pháp giải quyết tội lỗi một cách linh hoạt: Thay vì chỉ khuyên &quot;hãy làm điều</span></div>\n<p class=\"body-txt\">\ntốt hơn&quot;, diễn giả đưa ra ba giải pháp thực tế, trong đó có lựa chọn thay đổi *hình ảnh tự\n \nthân* để phù hợp với hành động hiện tại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Giải pháp này đặc biệt đáng giá vì nó cung cấp một góc nhìn mới mẻ</span></div>\n<p class=\"body-txt\">\nvà khả thi để xử lý tội lỗi ngay cả khi việc thay đổi hành vi là khó khăn. Nó trao quyền\n \ncho cá nhân kiểm soát trạng thái cảm xúc của mình bằng cách điều chỉnh nhận thức nội\n \ntại, giúp giảm bớt gánh nặng tâm lý một cách hiệu quả và tức thì.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Cảm xúc tội lỗi là một cái cảm xúc mà nó phá hủy thành công của chúng ta bởi vì nó chia đôi\n \ncái thế giới bên trong và thế giới bên ngoài của chúng ta thành hai phần riêng rẽ không có sự\n \nliên kết.”\n \n“Tội lỗi là lúc mà chúng ta cáu giận chính bản thân con người mình, con người mình. Chúng ta\n \ncảm thấy xấu hổ với những người khác về con người của mình.”\n \n“Khi bạn không còn cảm giác tội lỗi nữa thì sẽ không có cảm xúc tiêu cực nào được xuất hiện\n \ncho bạn.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#4527a0\">Bài 13: Giận dữ - Yếu tố phá hủy cuộc sống</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Tóm tắt. Buổi giảng này tập trung vào cách quản lý và vượt qua cảm xúc giận dữ. Diễn giả</h3>\n<p class=\"body-txt\">\ngiải thích rằng giận dữ phát sinh khi hành động của người khác không giống như hình ảnh\n \nhoặc kỳ vọng của chúng ta về họ. Điểm cốt lõi là chúng ta không thể thay đổi người khác mà\n \nchỉ có thể thay đổi chính kỳ vọng và hình ảnh của bản thân về họ, bởi vì mỗi người đều đang\n \nnỗ lực làm tốt nhất trong hoàn cảnh và khả năng của mình.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cảm xúc giận dữ là một cảm xúc tiêu cực mà bất kỳ ai cũng đã từng trải qua, nó gây ra</span></div>\n<p class=\"body-txt\">\nđau khổ cho bản thân và cả những người xung quanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Giận dữ giống như cảm xúc tội lỗi, nó chia đôi cuộc sống của chúng ta và tách chúng ta</span></div>\n<p class=\"body-txt\">\nkhỏi những người xung quanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cảm xúc giận dữ xuất hiện khi hình ảnh của chúng ta về một con người khác với những</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">hành động mà anh ta đang thực hiện/triển khai.</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Nếu đối với cảm giác tội lỗi, chúng ta có 3 cách để thay đổi (thay đổi hình ảnh tự thân,</span></div>\n<p class=\"body-txt\">\nthay đổi hành động, hoặc chấp nhận và làm tốt hơn vào ngày mai), thì đối với cảm giác\n \ngiận dữ, chúng ta chỉ có một lựa chọn duy nhất.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Chúng ta không thể bắt người khác thay đổi hành động của họ, vì khi hành động trái với</span></div>\n<p class=\"body-txt\">\nhình ảnh tự thân của họ, người ta sẽ có cảm giác tội lỗi và có xu hướng trở về con người\n \nban đầu của họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Chúng ta không có quyền để thay đổi cuộc đời của người khác trừ khi chính họ muốn</span></div>\n<p class=\"body-txt\">\nđiều đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cách duy nhất để chấm dứt hành động giận dữ là thay đổi kỳ vọng của chúng ta về</span></div>\n<p class=\"body-txt\">\nnhững con người xung quanh cuộc đời này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Chính bạn phải thay đổi, chứ không phải những người khác thay đổi; khi bạn thay đổi thì</span></div>\n<p class=\"body-txt\">\ncả thế giới sẽ thay đổi cho bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cảm giác giận dữ thường bắt đầu do bạn nghĩ là yếu tố bên ngoài, nhưng thực ra nó bắt</span></div>\n<p class=\"body-txt\">\nđầu ở bên trong bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Mọi người đều đang nỗ lực làm tốt nhất trong nguồn lực, trong khả năng và trong hoàn</span></div>\n<p class=\"body-txt\">\ncảnh của họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Hãy thay đổi kỳ vọng của mình, bạn sẽ không còn cảm giác giận dữ nữa.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Nguồn gốc của giận dữ nằm ở &quot;kỳ vọng&quot; của chúng ta, không phải hành động của người</span></div>\n<p class=\"body-txt\">\nkhác: Diễn giả nhấn mạnh rằng giận dữ phát sinh khi &quot;hình ảnh của chúng ta về một con\n \nngười&quot; không khớp với &quot;hành động của anh ta&quot;. Điều này rất quan trọng vì nó chuyển\n \ntrách nhiệm kiểm soát cảm xúc từ việc cố gắng thay đổi người khác (điều không thể)\n \nsang việc điều chỉnh kỳ vọng của chính mình (điều có thể).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Không thể thay đổi người khác, chỉ có thể thay đổi bản thân: Đây là một insight cốt lõi.</span></div>\n<p class=\"body-txt\">\nViệc cố gắng ép buộc người khác thay đổi hành động sẽ thất bại hoặc chỉ là tạm thời, vì\n \nnó đi ngược lại hình ảnh tự thân của họ. Nhận thức này giúp chúng ta dừng việc lãng phí\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><p class=\"body-txt\">\nnăng lượng vào những nỗ lực vô vọng và tập trung vào điều duy nhất chúng ta kiểm soát\n \nđược: thái độ và kỳ vọng của chính mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Mọi người đều đang nỗ lực hết sức trong khả năng của họ: Quan điểm này là một công cụ</span></div>\n<p class=\"body-txt\">\nmạnh mẽ để giảm bớt phán xét và tăng cường sự thấu cảm. Khi chúng ta hiểu rằng người\n \nkhác đang làm tốt nhất có thể với nguồn lực, khả năng và hoàn cảnh của họ, chúng ta có\n \nthể điều chỉnh kỳ vọng của mình một cách thực tế hơn và ít cảm thấy giận dữ hơn khi\n \nmọi thứ không như ý.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Khi hình ảnh của bạn về một con người như thế này, nhưng anh ta lại hành động không giống\n \nnhư bạn kỳ vọng thì đó là lúc mà cảm giác giận dữ bắt đầu xuất hiện.”\n \n“Chính bạn phải thay đổi, chứ không phải những người khác thay đổi.”\n \n“Mọi người đều đang nỗ lực làm tốt nhất trong nguồn lực của họ.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Chương 5</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Bài 14: Điều khiển cảm xúc căng thẳng trong công việc</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Tóm tắt. Buổi giảng này tập trung vào việc quản lý và giảm căng thẳng trong công việc, một</h3>\n<p class=\"body-txt\">\ntrạng thái gây giảm hiệu suất và tổn hại. Diễn giả nhấn mạnh rằng chúng ta không thể kiểm\n \nsoát hoàn toàn các yếu tố bên ngoài nhưng có thể thay đổi ba yếu tố bên trong là trạng thái\n \ncơ thể, sự tập trung và câu chuyện chúng ta tự kể. Bằng cách điều chỉnh những yếu tố này,\n \ncùng với việc tạo môi trường tích cực và biết nghỉ ngơi, chúng ta có thể vượt qua căng thẳng\n \nvà lấy lại năng lượng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Căng thẳng trong công việc là tình trạng phổ biến do yêu cầu công việc và năng suất</span></div>\n<p class=\"body-txt\">\nngày càng cao, gây giảm hiệu suất và tổn thương.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Để vượt qua căng thẳng, chúng ta cần thay đổi các yếu tố bên trong, vì yếu tố bên ngoài</span></div>\n<p class=\"body-txt\">\nkhó thay đổi trực tiếp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Thay đổi yếu tố bên ngoài (theo cách gián tiếp): Tạm gác công việc sang một bên và</span></div>\n<p class=\"body-txt\">\ntham gia các hoạt động giúp vui vẻ, thay đổi cảm xúc như xem phim, nghe nhạc, đi hòa\n \nnhạc, ăn uống bên ngoài.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Thay đổi yếu tố bên trong (bắt đầu từ 3 điều):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Thay đổi trạng thái cơ thể: Thực hiện bất kỳ vận động thể dục nào trong văn phòng</span></div>\n<p class=\"body-txt\">\n(đứng lên/ngồi xuống, chống đẩy) để thay đổi ngay lập tức cảm xúc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Thay đổi sự tập trung: Không tập trung vào mặt tiêu cực (áp lực, khó khăn) mà hãy tập</span></div>\n<p class=\"body-txt\">\ntrung vào mặt tích cực của công việc. Áp lực tạo động lực, giải quyết khó khăn giúp bản\n \nthân lớn mạnh hơn.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Thay đổi câu chuyện bạn kể: Ngừng than vãn, kể chuyện tiêu cực với những người xung</span></div>\n<p class=\"body-txt\">\nquanh. Học cách kể chuyện theo hướng tích cực, vượt qua khó khăn để đạt đến thành\n \ncông (theo 7 phân đoạn kể chuyện).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Tìm kiếm những người bạn tích cực: Chia sẻ khó khăn với đồng nghiệp, sếp hoặc những</span></div>\n<p class=\"body-txt\">\nngười luôn có thái độ tích cực và hỗ trợ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Biết cách thư giãn và tạm dừng công việc: Khi quá căng thẳng, hãy tạm dừng công việc</span></div>\n<p class=\"body-txt\">\nvài ngày, đi du lịch hoặc tìm một nơi khác để refresh trước khi quay trở lại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Căng thẳng không mang lại lợi ích gì; việc áp dụng các biện pháp đơn giản sẽ giúp căng</span></div>\n<p class=\"body-txt\">\nthẳng biến mất và tái tạo năng lượng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Sức mạnh của việc điều chỉnh yếu tố nội tại: &quot;Chúng ta chỉ có thể thể hiện được, thay đổi</span></div>\n<p class=\"body-txt\">\nđược đó là cái yếu tố bên trong.&quot; Đây là điểm quan trọng vì nó đặt quyền kiểm soát vào\n \ntay mỗi cá nhân, thay vì phụ thuộc vào các điều kiện bên ngoài. Nó trao quyền cho chúng\n \nta hành động để cải thiện tình hình của mình, bất kể hoàn cảnh bên ngoài khó khăn đến\n \nđâu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Áp lực và khó khăn là cơ hội: &quot;Chính áp lực sẽ tạo nên động lực cho bạn, những khó khăn</span></div>\n<p class=\"body-txt\">\nkhi bạn giải quyết được sẽ làm cho bạn lớn hơn.&quot; Quan điểm này cực kỳ đắt giá vì nó\n \nthay đổi hoàn toàn cách chúng ta nhìn nhận thách thức. Thay vì coi áp lực là gánh nặng,\n \nnó trở thành nguồn năng lượng thúc đẩy và là bàn đạp để phát triển bản thân, tăng\n \ncường năng lực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Thay đổi câu chuyện chúng ta kể: Việc &quot;thay đổi câu chuyện bạn kể về công việc&quot; không</span></div>\n<p class=\"body-txt\">\nchỉ là cách quản lý nhận thức mà còn ảnh hưởng đến hành vi và những người xung\n \nquanh. Đây là một insight quan trọng về tâm lý học hành vi, khi mà cách chúng ta diễn\n \ngiải và chia sẻ trải nghiệm sẽ định hình thực tế cảm xúc và thái độ của chúng ta, cũng\n \nnhư của những người tương tác với chúng ta.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Chính áp lực sẽ tạo nên động lực cho bạn, những khó khăn khi bạn giải quyết được sẽ làm cho\n \nbạn lớn hơn.”\n \n“Hãy làm bất kỳ cái vận động nào trong cơ thể... bạn cũng sẽ cảm thấy vui vẻ ngay trở lại.”\n \n“Căng thẳng thì không mang lại ích lợi gì.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Bài 15: Xây dựng mối quan hệ</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Tóm tắt. Buổi giảng này tập trung vào &quot;công thức 3 chiều&quot; để xây dựng các mối quan hệ</h3>\n<p class=\"body-txt\">\nhoàn hảo, từ đó tạo ra những cảm xúc tích cực và một cuộc sống tốt đẹp hơn. Cốt lõi là hiểu\n \nvà đáp ứng nhu cầu của đối phương, đồng thời chủ động chia sẻ mong muốn của bản thân,\n \nvà cuối cùng là cùng nhau hướng tới một mục đích chung. Diễn giả nhấn mạnh tầm quan\n \ntrọng của việc giao tiếp hai chiều, không ngừng học hỏi và chọn lựa những người đồng hành\n \ntích cực để phát triển bản thân.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#4527a0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Mối quan hệ và cảm xúc: Mối quan hệ ảnh hưởng trực tiếp đến cảm xúc, và cảm xúc tích</span></div>\n<p class=\"body-txt\">\ncực là yếu tố quan trọng cho một cuộc sống tốt đẹp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Công thức 3 chiều để xây dựng mối quan hệ hoàn hảo:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Chiều thứ nhất: Hiểu và đáp ứng nhu cầu của đối phương.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Xác định &quot;điều bạn muốn là gì và tôi làm thế nào để giải quyết nó&quot; từ góc độ của đối tác.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Tìm hiểu nhu cầu của đối tác (con cái, vợ chồng, bạn bè, khách hàng) bằng cách hội thoại,</span></div>\n<p class=\"body-txt\">\nchia sẻ, hỏi và lắng nghe nhiều hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Không giả định đối phương biết điều mình muốn hoặc mình biết điều đối phương muốn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Chiều thứ hai: Có đi có lại mới toại lòng nhau.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Sau khi đáp ứng nhu cầu của đối phương, cần chia sẻ điều mình thực sự muốn và cách</span></div>\n<p class=\"body-txt\">\nđối phương có thể giúp mình đạt được điều đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Mối quan hệ bị phá hủy vì không thấu hiểu nhau, do chúng ta không bày tỏ rõ ràng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cả hai bên đều phải đáp ứng nhu cầu của nhau.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Chiều thứ ba: Cùng chung một mục đích.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Để đưa mối quan hệ lên một tầm cao mới, cả hai người cần có cùng chung một mục đích,</span></div>\n<p class=\"body-txt\">\nmột sứ mệnh, một mong muốn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Giúp mong muốn của người khác trở thành hiện thực cũng chính là cách mình đạt được</span></div>\n<p class=\"body-txt\">\nmong muốn của mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Điều này cần thời gian và việc tìm kiếm những người có cùng mục tiêu.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Tầm quan trọng của việc chọn lựa mối quan hệ:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Quản trị cảm xúc bằng cách xây dựng những người xung quanh bạn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">&quot;Ngưu tầm ngưu, mã tầm mã&quot;: chơi với những người thông minh hơn, giàu có hơn, hạnh</span></div>\n<p class=\"body-txt\">\nphúc hơn bạn để nâng cao cuộc sống.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Giao tiếp hai chiều để thấu hiểu và bày tỏ nhu cầu: Diễn giả nhấn mạnh rằng &quot;họ chỉ biết</span></div>\n<p class=\"body-txt\">\ncho đến khi bạn bày tỏ cho họ biết&quot; và ngược lại. Điều này cực kỳ quan trọng vì nhiều\n \nmối quan hệ đổ vỡ do sự im lặng và giả định. Việc chủ động hỏi, lắng nghe để hiểu nhu\n \ncầu đối phương và thẳng thắn chia sẻ mong muốn của mình là nền tảng vững chắc cho\n \nmọi tương tác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Mục đích chung là chìa khóa để nâng tầm mối quan hệ: Từ cấp độ &quot;có đi có lại&quot; đến việc</span></div>\n<p class=\"body-txt\">\n&quot;cùng chung một mục đích&quot; là bước nhảy vọt quan trọng. Khi hai bên cùng hướng về một\n \nmong muốn chung và hỗ trợ nhau đạt được nó, mối quan hệ sẽ trở nên sâu sắc, bền\n \nvững và mang lại giá trị lớn hơn nhiều so với chỉ trao đổi lợi ích. Đây là nền tảng cho sự\n \nhợp tác và đồng hành lâu dài.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Sức mạnh của việc chọn bạn đồng hành: Câu &quot;Ngưu tầm ngưu, mã tầm mã. Hãy chơi với</span></div>\n<p class=\"body-txt\">\nnhững người mà bạn muốn trở thành&quot; là một lời khuyên thiết thực. Môi trường và\n \nnhững người xung quanh ảnh hưởng rất lớn đến suy nghĩ, cảm xúc và hành động của\n \nmỗi người. Việc chủ động tìm kiếm những mối quan hệ tích cực, có giá trị sẽ giúp ta phát\n \ntriển bản thân và đạt được thành công trong cuộc sống.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#4527a0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Có đi có lại mới toại lòng nhau.”\n \n“Họ chỉ biết cho đến khi bạn bày tỏ cho họ biết.”\n \n“Ngưu tầm ngưu, mã tầm mã. Hãy chơi với những người mà bạn muốn trở thành.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Bài 16: Phụ nữ phá hủy mối quan hệ</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Tóm tắt. Buổi giảng này dành riêng cho phụ nữ, tập trung vào ba sai lầm phổ biến mà họ</h3>\n<p class=\"body-txt\">\nthường mắc phải, gây tổn hại đến các mối quan hệ tình cảm, đặc biệt là trong hôn nhân. Diễn\n \ngiả nhấn mạnh rằng để xây dựng một mối quan hệ bền vững và hạnh phúc, phụ nữ cần tránh\n \nviệc chỉ trích, kiểm soát và đóng mình, thay vào đó hãy học cách khen ngợi, thể hiện sự quan\n \ntâm và chia sẻ một cách cởi mở, chi tiết. Bài học cũng chỉ ra sự khác biệt trong cách tư duy\n \ngiữa nam và nữ, làm rõ tầm quan trọng của việc giao tiếp trực tiếp và cụ thể.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Video này đặc biệt dành cho nữ giới, nam giới được yêu cầu không xem vì nội dung liên</span></div>\n<p class=\"body-txt\">\nquan đến các sai lầm phụ nữ thường gặp trong mối quan hệ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Buổi giảng chia sẻ về ba sai lầm phổ biến mà phụ nữ thường mắc phải, làm phá hủy mối</span></div>\n<p class=\"body-txt\">\nquan hệ tuyệt vời của họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Sai lầm 1: Chỉ trích.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Đừng bao giờ chỉ trích bất kỳ điều gì của người đàn ông. Hãy luôn nhớ rằng người đàn</span></div>\n<p class=\"body-txt\">\nông của bạn luôn làm tốt trong nguồn lực, điều kiện và cơ hội của anh ta.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Mọi người đàn ông đều cảm thấy &quot;cái danh vọng của mình&quot; và &quot;danh tiếng của mình&quot; là</span></div>\n<p class=\"body-txt\">\nđiều quan trọng nhất. Việc so sánh người đàn ông của mình với bất kỳ ai khác là đang\n \nphá hủy mối quan hệ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Thay vì chỉ trích, hãy khen ngợi. Tập trung vào những mặt tốt của người đàn ông, hãy</span></div>\n<p class=\"body-txt\">\n&quot;đóng con mắt xấu&quot; của bạn lại và khen ngợi nhiều hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Sai lầm 2: Kiểm soát.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Hầu hết phụ nữ thường xuyên kiểm soát chồng theo nhiều cách khác nhau.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Càng kiểm soát bao nhiêu, người đàn ông càng bị mất đi thứ mà anh ta tôn sùng, đó là</span></div>\n<p class=\"body-txt\">\n&quot;sự tự do&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Người đàn ông yêu thích và trân quý sự tự do. Khi bị kiểm soát và cảm thấy &quot;tù túng&quot;,</span></div>\n<p class=\"body-txt\">\nanh ta sẽ tìm đến một nơi tự do hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Thay vì kiểm soát (&quot;Anh đang ở đâu?&quot;), hãy thể hiện sự quan tâm (&quot;Cơm và canh đang</span></div>\n<p class=\"body-txt\">\nchờ ở nhà rồi.&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Sai lầm 3: Đóng mình và không chia sẻ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Khi giận dỗi, phụ nữ thường im lặng, quay mặt vào tường, hoặc bỏ về nhà mẹ đẻ. Đây là</span></div>\n<p class=\"body-txt\">\ncách nhanh chóng nhất để phá hủy mối quan hệ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Hãy mở lòng mình, hãy chia sẻ. Hãy nói rõ điều bạn đang nghĩ và mong muốn của bạn là</span></div>\n<p class=\"body-txt\">\ngì.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Diễn giả chia sẻ rằng &quot;não của đàn ông là não đơn nhiệm&quot;, trong khi &quot;não của phụ nữ là</span></div>\n<p class=\"body-txt\">\nnão đa nhiệm&quot;. Phụ nữ thông minh và nhạy cảm hơn đàn ông, nhưng đàn ông không\n \nthông minh để có thể đoán đúng điều bạn nghĩ. Do đó, bạn cần phải nói thật chi tiết và tỉ\n \nmỉ về điều mình muốn để người đàn ông có thể hiểu được.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Kết luận: Để có cuộc sống hôn nhân hạnh phúc, hãy thay &quot;chỉ trích&quot; bằng &quot;khen ngợi&quot;,</span></div>\n<p class=\"body-txt\">\n&quot;kiểm soát&quot; bằng &quot;quan tâm&quot;, và &quot;đóng mình&quot; bằng &quot;chia sẻ&quot;.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Tầm quan trọng của danh vọng và danh tiếng đối với đàn ông: &quot;Mọi người đàn ông đều</span></div>\n<p class=\"body-txt\">\ncảm thấy cái danh vọng của mình là điều quan trọng nhất. Danh tiếng của mình là điều\n \nquan trọng đối với bất kỳ người đàn ông nào.&quot; Điểm này cực kỳ quan trọng vì nó chạm\n \nđến một khía cạnh tâm lý sâu sắc của đàn ông. Bất kỳ hành động nào từ người phụ nữ\n \nlàm tổn hại đến danh dự, tự tôn của người đàn ông, đặc biệt là việc chỉ trích hay so sánh\n \nhọ với người khác, đều có thể gây ra vết rạn nứt nghiêm trọng và khó hàn gắn trong mối\n \nquan hệ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Giá trị cốt lõi của sự tự do đối với đàn ông: &quot;Càng kiểm soát bao nhiêu, người đàn ông</span></div>\n<p class=\"body-txt\">\ncàng bị mất đi một thứ mà anh ta tôn sùng, đó là sự tự do.&quot; Insight này chỉ ra rằng kiểm\n \nsoát, dù xuất phát từ ý tốt, lại là một hành vi phản tác dụng trong mối quan hệ với đàn\n \nông. Nó khiến đàn ông cảm thấy &quot;tù túng&quot;, bị tước đoạt giá trị quan trọng nhất của mình,\n \nvà có thể dẫn đến việc họ tìm kiếm &quot;sự tự do&quot; ở nơi khác, gây đổ vỡ mối quan hệ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Sự khác biệt trong tư duy não bộ và tầm quan trọng của giao tiếp chi tiết: &quot;Não của đàn</span></div>\n<p class=\"body-txt\">\nông là não đơn nhiệm... Cho nên bạn muốn người đàn ông biết điều gì phải nói thật chi\n \ntiết, thật tỉ mỉ về điều đó, người đàn ông mới hiểu được. Hãy luôn nhớ, họ không thông\n \nminh để có thể đoán đúng điều bạn nghĩ.&quot; Đây là điểm mấu chốt để giải quyết nhiều hiểu\n \nlầm trong giao tiếp giữa nam và nữ. Nó nhấn mạnh rằng phụ nữ cần chủ động và cụ thể\n \ntrong việc bày tỏ suy nghĩ, mong muốn của mình, thay vì kỳ vọng đàn ông có thể tự động\n \nthấu hiểu hay &quot;đọc suy nghĩ&quot;, bởi cách thức hoạt động não bộ của họ khác nhau.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Đừng bao giờ chỉ trích bất kỳ điều gì của người đàn ông. Hãy luôn nhớ rằng người đàn ông\n \ncủa bạn luôn làm tốt trong nguồn lực của anh ta, trong điều kiện của anh ta, trong cái cơ hội\n \ncủa anh ta.”\n \n“Càng kiểm soát bao nhiêu, người đàn ông càng bị mất đi một thứ mà anh ta tôn sùng, đó là sự\n \ntự do.”\n \n“Não của đàn ông là não đơn nhiệm. Não của phụ nữ là não đa nhiệm... Cho nên bạn muốn\n \nngười đàn ông biết điều gì phải nói thật chi tiết, thật tỉ mỉ về điều đó, người đàn ông mới hiểu\n \nđược.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Bài 17: Đàn ông phá hủy mối quan hệ</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Tóm tắt. Buổi giảng này dành riêng cho đàn ông, tập trung vào ba điều cần tránh để không</h3>\n<p class=\"body-txt\">\nphá hủy mối quan hệ vợ chồng. Đó là việc khiến người phụ nữ cảm thấy không an toàn,\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><p class=\"body-txt\">\nkhông hiện diện trong mắt nhau, và không thấu hiểu. Để xây dựng hôn nhân hạnh phúc,\n \nngười đàn ông cần chủ động mang lại sự an toàn thực sự, luôn hiện diện và cố gắng thấu\n \nhiểu bạn đời của mình, từ đó tạo ra những cảm xúc tích cực trong cuộc sống.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Ba điều đàn ông cần tránh để không làm hỏng mối quan hệ:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Tạo cảm giác không an toàn:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Phụ nữ luôn mong muốn có một bờ vai để dựa vào, được che chở.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Nỗi sợ lớn nhất của phụ nữ là cảm giác không được an toàn (về tài chính, mối quan hệ,</span></div>\n<p class=\"body-txt\">\ncuộc sống, hoặc khi ở một mình).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Việc đàn ông nói dối (dù với ý tốt) để tạo ra cảm giác an toàn giả tạo sẽ bị phụ nữ thông</span></div>\n<p class=\"body-txt\">\nminh nhận ra và dẫn đến cảm giác không an toàn thật sự, phá hủy mối quan hệ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Giải pháp: Người đàn ông cần trở nên mạnh mẽ hơn, che chở hơn và liên tục tạo ra sự an</span></div>\n<p class=\"body-txt\">\ntoàn thực sự cho người phụ nữ của mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Không hiện diện trong mắt nhau:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Phụ nữ mong muốn thấy người đàn ông của mình luôn ở ngay cạnh, dù ở đâu.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Kể cả khi đi công tác hoặc ở gần nhau, người đàn ông cần cho người phụ nữ thấy sự hiện</span></div>\n<p class=\"body-txt\">\ndiện của mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Giải pháp: Sử dụng các thiết bị điện tử như điện thoại, smartphone, Viber, Zalo,</span></div>\n<p class=\"body-txt\">\nFacebook, Messenger để liên lạc, giữ mối quan hệ, được nhìn thấy, nghe và lắng nghe\n \nnhau. Luôn ở bên cạnh cô ấy ngay cả khi đi công tác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Không thấu hiểu:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Đàn ông thường không thích lắng nghe những sự chia sẻ của người phụ nữ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Phụ nữ luôn muốn được thấu hiểu, vì vậy họ sẽ chia sẻ những câu chuyện.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Giải pháp: Người đàn ông phải tập cách lắng nghe và tập cách thấu hiểu người phụ nữ</span></div>\n<p class=\"body-txt\">\ncủa mình. Lắng nghe nhiều hơn, hỏi nhiều hơn để có thể thấu hiểu cô ấy.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Nguy hiểm của sự an toàn giả tạo: Việc đàn ông nói dối để người phụ nữ không phải lo</span></div>\n<p class=\"body-txt\">\nlắng, dù với ý tốt, lại chính là cách phá hủy mối quan hệ vì nó tạo ra cảm giác không an\n \ntoàn. Điều này quan trọng vì nó chỉ ra rằng sự chân thật và minh bạch là yếu tố then\n \nchốt, ngay cả khi sự thật có thể gây khó khăn ban đầu, thay vì che giấu để bảo vệ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Khái niệm &quot;hiện diện&quot; được mở rộng: Sự hiện diện không chỉ là ở bên cạnh về mặt vật lý</span></div>\n<p class=\"body-txt\">\nmà còn là sự kết nối về mặt tinh thần thông qua các công cụ kỹ thuật số (điện thoại,\n \nmạng xã hội). Điều này quan trọng trong thế giới hiện đại, khi khoảng cách địa lý có thể\n \nlà rào cản, nhưng sự kết nối liên tục và chủ động vẫn có thể duy trì để người phụ nữ cảm\n \nthấy được quan tâm và không bị bỏ rơi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Thấu hiểu đòi hỏi chủ động lắng nghe: Đàn ông cần chủ động &quot;tập cách lắng nghe&quot; và</span></div>\n<p class=\"body-txt\">\n&quot;hỏi nhiều hơn&quot; để thấu hiểu người phụ nữ, thay vì thụ động hoặc né tránh lắng nghe.\n \nĐây là một insight quan trọng vì nó nhấn mạnh rằng thấu hiểu không tự nhiên mà có, mà\n \ncần sự nỗ lực, kỹ năng và ý thức từ phía người đàn ông, đi ngược lại với bản năng tự\n \nnhiên của một số người.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#4527a0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Nếu bạn đang là đàn ông, tiếp tục xem video này, còn nếu bạn là phụ nữ, đừng xem video này,\n \nđóng video này lại và quay trở lại video phía trên.”\n \n“Không an toàn, không hiện diện, không thấu hiểu là ba thứ người đàn ông phá hủy mối quan\n \nhệ của mình.”\n \n“Đừng bắt phụ nữ đọc bản đồ và đừng bắt đàn ông lắng nghe.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Chương 6</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Bài 18: Phương pháp rèn luyện trạng thái cơ thể</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Tóm tắt. Buổi học này tập trung vào việc sử dụng vận động cơ thể để thay đổi nhanh chóng</h3>\n<p class=\"body-txt\">\ntrạng thái cảm xúc, dựa trên nguyên lý &quot;motion lead to emotion&quot; (chuyển động dẫn đến cảm\n \nxúc). Diễn giả hướng dẫn các bài tập đơn giản, cường độ cao chỉ trong 30 giây, giúp tăng\n \nnhịp tim, cải thiện hô hấp và lượng oxy lên não, từ đó thay đổi cảm xúc một cách hiệu quả.\n \nCác bài tập này có thể thực hiện mọi lúc, mọi nơi và khuyến khích kết hợp với âm nhạc để\n \ntăng cường hiệu quả thay đổi trạng thái.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Diễn giả nhắc lại ba thành phần quan trọng tạo nên cảm xúc của chúng ta: thân thể, điều</span></div>\n<p class=\"body-txt\">\nchúng ta tập trung và câu chuyện chúng ta kể.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Buổi học hôm nay tập trung vào phần thực hành đầu tiên liên quan đến &quot;trạng thái cơ</span></div>\n<p class=\"body-txt\">\nthể&quot; dựa trên nguyên lý &quot;motion lead to emotion&quot; (những gì khiến chúng ta chuyển động\n \nthì sẽ dẫn đến chúng ta tới cảm xúc).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Mục tiêu là chia sẻ các kỹ thuật vận động tăng tốc để có thể thay đổi nhanh chóng cảm</span></div>\n<p class=\"body-txt\">\nxúc của mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bài tập có thể sử dụng ở bất cứ đâu: văn phòng, phòng ngủ, nhà vệ sinh, trên máy bay</span></div>\n<p class=\"body-txt\">\n(ghế, hành lang, khu vực cửa nhà vệ sinh).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Chỉ cần 30 giây cho mỗi lần bài tập để đạt được kết quả tương tự những bài tập dài hơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Điều quan trọng là nhanh chóng thay đổi nhịp tim của chúng ta đi lên với cường độ cao,</span></div>\n<p class=\"body-txt\">\nsau đó quay trở lại bình thường và tiếp tục lặp lại. Điều này giúp thở mạnh hơn, nhiều\n \noxy hơn, tim và cơ bắp mạnh mẽ hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bài tập 1 (Chạy bộ tại chỗ):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bước một chân về phía trước (trái hoặc phải).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Khom người về phía trước và chạy bộ thật nhanh, tay thẳng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Tưởng tượng đang chạy nước rút và chuẩn bị về đích.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cần trụ chân thật cứng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Động tác cần nhanh, mạnh, dứt khoát trong vòng 30 giây.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Nên có sự hỗ trợ của âm nhạc.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Sau bài tập, thực hiện hít thở sâu để hồi phục.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bài tập 2 (Đẩy tay đối kháng với người khác):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Tìm một người có cùng chiều cao/cân nặng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Đan tay vào nhau, một người đẩy về phía trước, người kia giữ lại và đẩy lại.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Trụ chân vững, tăng lực lên.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Giống như tập tạ, giúp cơ bắp (ngực, vai) cứng hơn, nở nang hơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Các bài tập khác có thể áp dụng: chống đẩy (push-up) và squat (đứng lên, ngồi xuống).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Điểm quan trọng là áp dụng nhiều phương pháp sáng tạo để đưa các bài tập ngắn (1</span></div>\n<p class=\"body-txt\">\nphút, 30 giây, 5 phút) vào cuộc sống hàng ngày và quá trình làm việc, xen kẽ vào những\n \nquãng nghỉ để thay đổi trạng thái của mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Âm nhạc kết hợp cùng với việc nhảy múa cũng đem lại sự thay đổi cảm xúc rất rõ rệt.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Nguyên lý &quot;Motion lead to emotion&quot;: Đây là cốt lõi của buổi giảng, nhấn mạnh rằng sự</span></div>\n<p class=\"body-txt\">\nchuyển động vật lý có thể trực tiếp tác động và thay đổi trạng thái cảm xúc. Điều này\n \nquan trọng vì nó cung cấp một công cụ đơn giản, nhanh chóng và dễ tiếp cận để mỗi\n \nngười tự điều chỉnh cảm xúc của mình mà không cần phân tích tâm lý phức tạp. Chỉ cần\n \nthay đổi hành động thể chất, chúng ta có thể thoát khỏi trạng thái tiêu cực hoặc tạo ra\n \nnăng lượng tích cực ngay lập tức.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Hiệu quả của các bài tập cường độ cao trong 30 giây: Diễn giả khẳng định rằng chỉ 30</span></div>\n<p class=\"body-txt\">\ngiây vận động mạnh mẽ có thể mang lại kết quả tương đương với các bài tập dài hơn.\n \nĐiểm này cực kỳ quan trọng vì nó xóa bỏ rào cản về thời gian và sự ngại ngùng. Mọi\n \nngười đều có thể tìm 30 giây để vận động, giúp việc duy trì thói quen dễ dàng hơn, từ đó\n \nliên tục &quot;làm mới&quot; năng lượng và tinh thần làm việc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Tính linh hoạt, áp dụng &quot;mọi lúc mọi nơi&quot;: Khả năng thực hiện các bài tập ở bất kỳ đâu –</span></div>\n<p class=\"body-txt\">\nvăn phòng, phòng ngủ, trên máy bay – là yếu tố then chốt để duy trì trạng thái tích cực\n \nliên tục. Nó giúp người học không bị giới hạn bởi không gian hay dụng cụ, khuyến khích\n \nviệc tích hợp vận động vào các khoảng trống nhỏ trong ngày, đảm bảo cơ thể và tinh\n \nthần luôn trong trạng thái tốt nhất.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Motion lead to emotion.”\n \n“Chỉ trong vòng 30 giây chúng ta cũng có thể có được kết quả như những bài tập dài hơn.”\n \n“Động tác cần phải nhanh, mạnh, dứt khoát trong vòng 30 giây.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Bài 19: Phương pháp xác lập mục tiêu</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Tóm tắt. Buổi giảng tập trung vào phương pháp xác lập mục tiêu 4 bước để duy trì năng</h3>\n<p class=\"body-txt\">\nlượng và đạt được thành công. Cốt lõi của phương pháp là việc liên tục hỏi và hiểu rõ &quot;tại\n \nsao&quot; bạn muốn mục tiêu đó, bởi lẽ chính động lực từ lý do đủ lớn sẽ giúp bạn vượt qua khó\n \nkhăn và tìm ra cách thực hiện. Khi gặp chán nản hay muốn từ bỏ, hãy quay lại câu hỏi &quot;tại\n \nsao&quot; để khôi phục năng lượng và tiếp tục hành động. Đây là cách để giữ năng lượng ở trạng\n \nthái cao nhất và biến mục tiêu thành hiện thực.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#4527a0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Diễn giả chia sẻ về phương pháp giữ năng lượng và đạt được mục tiêu, dựa trên kinh</span></div>\n<p class=\"body-txt\">\nnghiệm đi bộ xuyên Việt.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Khi gặp khó khăn hay muốn bỏ cuộc, việc tự hỏi &quot;tại sao tôi đã bắt đầu?&quot; giúp khôi phục</span></div>\n<p class=\"body-txt\">\nnăng lượng và tiếp tục hành trình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Diễn giả giới thiệu phương pháp xác lập mục tiêu để giữ và duy trì năng lượng trong tất</span></div>\n<p class=\"body-txt\">\ncả các hoạt động, bao gồm 4 bước:\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bước 1: Xác định chính xác điều bạn thực sự muốn là gì (mục tiêu cần rõ ràng, có thể đạt</span></div>\n<p class=\"body-txt\">\nđược và tuân theo nguyên tắc SMART: Specific, Measurable, Achievable, Relevant, Time-\n \nbound).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bước 2: Trả lời câu hỏi &quot;tại sao bạn muốn điều đó?&quot;. Cần gắn cảm xúc của mình với mục</span></div>\n<p class=\"body-txt\">\ntiêu, hình dung điều gì sẽ diễn ra với cuộc đời, gia đình, tài chính, du lịch, nhà cửa, xe cộ\n \ncủa bạn khi mục tiêu đó thành hiện thực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bước 3: Liệt kê những hành động nào bạn cần phải làm và những hành động nào bạn</span></div>\n<p class=\"body-txt\">\nkhông làm để nhanh chóng đạt được mục tiêu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bước 4: Sắp xếp các hành động đã liệt kê, phân biệt đâu là những việc quan trọng bắt</span></div>\n<p class=\"body-txt\">\nbuộc phải làm và đâu là những điều bạn có thể ủy quyền cho người khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bốn bước này sẽ đem đến một bản kế hoạch hành động cụ thể và chi tiết.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Mỗi khi cảm thấy buồn chán hoặc muốn từ bỏ, hãy quay lại câu hỏi ở Bước 2: &quot;Tại sao</span></div>\n<p class=\"body-txt\">\nbạn muốn có mục tiêu đó?&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Việc bám sát vào mục tiêu và ý nghĩa của mục tiêu là cách để giữ cho năng lượng luôn ở</span></div>\n<p class=\"body-txt\">\ntrạng thái cao nhất.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">&quot;Tại sao bạn muốn điều đó&quot; quan trọng hơn &quot;cách làm thế nào để có nó&quot;.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Sức mạnh của câu hỏi &quot;Tại sao?&quot;: Đây là luận điểm xuyên suốt và mạnh mẽ nhất. Việc</span></div>\n<p class=\"body-txt\">\nliên tục đặt câu hỏi &quot;Tại sao bạn muốn điều đó?&quot; không chỉ giúp xác định động lực cốt lõi\n \nmà còn là công cụ hữu hiệu để khôi phục năng lượng và ý chí khi gặp khó khăn, chán\n \nnản. Lý do đủ lớn sẽ đơn giản hóa cách thức thực hiện, như câu nói &quot;The bigger the why,\n \nthe easy the how.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Gắn kết cảm xúc với mục tiêu: Mục tiêu không chỉ là những con số hay kết quả khô khan</span></div>\n<p class=\"body-txt\">\nmà cần được kết nối với cảm xúc và hình dung rõ ràng về cuộc sống sau khi đạt được.\n \nĐiều này tạo ra một nguồn động lực nội tại mạnh mẽ, giúp người thực hiện không bị bỏ\n \ncuộc khi gặp trở ngại, vì họ nhìn thấy giá trị lớn hơn đằng sau công việc đang làm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Quy trình 4 bước cụ thể và cơ chế &quot;tái tạo năng lượng&quot;: Bài giảng cung cấp một khung</span></div>\n<p class=\"body-txt\">\nsườn rõ ràng để thiết lập mục tiêu và hành động (xác định, lý do, hành động, sắp xếp).\n \nTuy nhiên, điểm quan trọng không chỉ là có kế hoạch, mà là cơ chế vượt qua sự chán nản\n \nbằng cách quay lại Bước 2 (lý do) để tái tạo động lực, thay vì cứng nhắc chỉ nhìn vào các\n \nbước thực hiện.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Trích dẫn</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Tại sao bạn muốn điều đó quan trọng hơn cách làm thế nào để có nó.”\n \n“The bigger the why, the easy the how.”\n \n“Bám sát vào mục tiêu, bám sát vào ý nghĩa của mục tiêu, đó chính là cách bạn giữ cho năng\n \nlượng của mình luôn ở trạng thái cao nhất.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Bài 20: Phương pháp tuyên bố</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Tóm tắt. Buổi học này giới thiệu và hướng dẫn về &quot;Phương pháp tuyên bố&quot;, một công cụ</h3>\n<p class=\"body-txt\">\nmạnh mẽ giúp kiểm soát cảm xúc và kiến tạo lại tâm trí để đạt được những mục tiêu mong\n \nmuốn. Cốt lõi của phương pháp là viết ra ba điều: &quot;Tôi là ai?&quot;, &quot;Tôi làm gì?&quot;, và &quot;Tôi có gì?&quot;,\n \nsau đó lặp đi lặp lại các tuyên bố này hàng ngày với sự kết hợp của ngôn từ, cảm xúc, và cử\n \nđộng cơ thể. Bằng cách kiên trì thực hành, những tuyên bố ban đầu có thể không tin sẽ dần\n \ntrở thành niềm tin, thúc đẩy hành động và cuối cùng hiện thực hóa điều mong muốn trong\n \ncuộc sống.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Buổi này là phần cuối của hành trình kiểm soát cảm xúc, giới thiệu một công cụ mạnh</span></div>\n<p class=\"body-txt\">\nmẽ: &quot;Phương pháp tuyên bố&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Phương pháp tuyên bố là sự kết hợp của ba yếu tố chính: cảm xúc, thân thể (cử động) và</span></div>\n<p class=\"body-txt\">\nngôn từ (sự tập trung, giọng điệu).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cách thực hiện:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Viết xuống các tuyên bố. Thậm chí có thể khắc xuống mảnh gỗ và đặt ở nơi dễ nhìn thấy.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Nội dung tuyên bố gồm 3 phần, viết ở thì hiện tại đơn giản:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">&quot;Tôi là [người bạn muốn trở thành]&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">&quot;Tôi làm [những điều bạn muốn làm]&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">&quot;Tôi có [những điều bạn muốn có]&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Viết về những điều bạn mong muốn đạt được, kể cả những điều bạn chưa có trong ngày</span></div>\n<p class=\"body-txt\">\nhôm nay.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cơ chế hoạt động: Ban đầu bạn có thể không tin vào những tuyên bố này, nhưng việc lặp</span></div>\n<p class=\"body-txt\">\nđi lặp lại, kết hợp với cử động cơ thể, âm thanh và giọng điệu, sẽ giúp bạn dần dần tin\n \ntưởng. Khi bạn bắt đầu tin vào, bạn sẽ hành xử theo những điều đó, và cuối cùng nó sẽ\n \nkiến tạo nên thực tại của bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Phương pháp tuyên bố giúp bạn tạo ra những cảm xúc tích cực, điều khiển sự tập trung</span></div>\n<p class=\"body-txt\">\nvà điều chỉnh ngôn từ theo hướng mạnh mẽ, tích cực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Thực hành:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Luyện tập hàng ngày, có thể tuyên bố một mình, trước đám đông hoặc với bạn bè.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Viết tuyên bố xuống và sửa nó cho đến khi cảm thấy thoải mái.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Đọc tuyên bố hàng ngày vào buổi sáng, buổi trưa và buổi tối trước khi đi ngủ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Khuyến khích chia sẻ bảng tuyên bố (viết hoặc video clip) lên mạng xã hội, đặc biệt là</span></div>\n<p class=\"body-txt\">\ntrong group học tập để nhận được sự theo dõi và hỗ trợ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Diễn giả nhấn mạnh rằng đây là một phương pháp kiến tạo lại tâm trí vô cùng mạnh mẽ,</span></div>\n<p class=\"body-txt\">\nbất chấp những lời nói có thể coi là &quot;ngu ngốc&quot; từ bên ngoài.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Tầm quan trọng của việc sử dụng: &quot;Dùng nó, bạn có. Không dùng, bạn mất nó.&quot; Phương</span></div>\n<p class=\"body-txt\">\npháp này đã thay đổi cuộc đời của diễn giả và hàng ngàn học viên.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Sự kết hợp đồng bộ của Thân thể – Tập trung – Ngôn từ:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">*Vì sao quan trọng:* Hầu hết mọi người chỉ chú trọng vào suy nghĩ (ngôn từ) khi muốn</span></div>\n<p class=\"body-txt\">\nthay đổi, nhưng diễn giả nhấn mạnh việc kết hợp cả cử động cơ thể, sự tập trung và âm\n \nđiệu giọng nói. Sự tổng hòa của ba yếu tố này tạo ra một trải nghiệm toàn diện và mạnh\n \nmẽ, giúp tuyên bố không chỉ là lời nói mà còn là cảm giác, hành động, từ đó ăn sâu vào\n \ntiềm thức và neo giữ cảm xúc, niềm tin hiệu quả hơn rất nhiều. Đây là chìa khóa để\n \nchuyển đổi từ ý định sang thực tế.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Nguyên lý &quot;Tuyên bố những điều bạn chưa có để kiến tạo thực tại&quot;:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">*Vì sao quan trọng:* Điểm này thách thức giới hạn niềm tin hiện tại và khuyến khích con</span></div>\n<p class=\"body-txt\">\nngười hình dung về một tương lai mong muốn, dù nó chưa tồn tại. Sự lặp đi lặp lại\n \nnhững tuyên bố này sẽ phá vỡ các rào cản tâm lý, biến điều tưởng chừng không thể\n \nthành có thể trong tâm trí, từ đó kích hoạt hành động cụ thể để biến niềm tin đó thành\n \nhiện thực. Đây là bản chất của việc &quot;lập trình lại&quot; tâm trí để vượt qua vùng an toàn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Sự lặp đi lặp lại biến đổi từ &quot;không tin&quot; thành &quot;tin&quot;, từ &quot;tin&quot; thành &quot;hành xử&quot;, và từ &quot;hành</span></div>\n<p class=\"body-txt\">\nxử&quot; thành &quot;thực tại&quot;:\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">*Vì sao quan trọng:* Đây là công thức cụ thể và lộ trình chi tiết cho quá trình thay đổi</span></div>\n<p class=\"body-txt\">\nbản thân. Nó cho thấy rằng hiệu quả của phương pháp tuyên bố không phải là phép màu\n \ntức thì mà là kết quả của sự kiên trì và kỷ luật. Việc hiểu rõ chu trình này giúp người học\n \ncó động lực để duy trì thực hành ngay cả khi ban đầu chưa thấy kết quả rõ ràng, vì họ\n \nbiết rằng mỗi lần lặp lại đang xây dựng nền tảng cho sự thay đổi lớn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Phương pháp tuyên bố là một phương pháp vô cùng mạnh mẽ để kiến tạo lại tâm trí của\n \nbạn.”\n \n“Đầu tiên bạn có thể không tin, bạn ngay cả những tuyên bố này bạn không tin, nhưng việc lặp\n \nđi lặp lại, lặp đi lặp lại, lặp đi lặp lại này nó sẽ dần dần bạn sẽ tin vào và khi bạn bắt đầu tin\n \nvào thì bạn bắt đầu hành xử theo những điều này và cuối cùng nó sẽ kiến tạo nên thực tại của\n \nbạn.”\n \n“Dùng nó, bạn có. Không dùng, bạn mất nó.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Bài 21: Chiến thắng hay thua cuộc</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Tóm tắt. Buổi giảng này giới thiệu &quot;bản đồ Chiến thắng hay Nạn nhân&quot; – một công cụ để</h3>\n<p class=\"body-txt\">\nphân tích và điều chỉnh hành vi. Diễn giả nhấn mạnh rằng chính cách chúng ta phản ứng với\n \ncác sự kiện mới quyết định cuộc đời và kết quả, chứ không phải bản thân các sự kiện. Bản đồ\n \nchia con người thành hai nhóm: người chiến thắng (luôn chủ động, chịu trách nhiệm, tìm\n \ngiải pháp) và nạn nhân (luôn đổ lỗi, phàn nàn, thấy bế tắc). Mục tiêu là sử dụng bản đồ để tự\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><p class=\"body-txt\">\nkiểm tra suy nghĩ và hành động, từ đó luôn hướng tới trạng thái tích cực và chủ động của\n \nngười chiến thắng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Hành trình của khoá học đang đi đến những bước cuối cùng, học viên cần học đi học lại</span></div>\n<p class=\"body-txt\">\nnhiều lần để nhuần nhuyễn kỹ thuật và tâm lý.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Giới thiệu &quot;bản đồ&quot; có tên gọi &quot;Chiến thắng hay Nạn nhân&quot; (Victor or Victim).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Những sự kiện xảy ra không quyết định cuộc đời, mà cách chúng ta phản ứng với những</span></div>\n<p class=\"body-txt\">\nsự kiện sẽ quyết định cuộc đời và kết quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cách phản ứng tích cực tạo nên kết quả tích cực, cách phản ứng tiêu cực tạo nên kết quả</span></div>\n<p class=\"body-txt\">\ntiêu cực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Sự lựa chọn là ở bạn, dù đôi khi ta không biết đâu là tích cực, đâu là tiêu cực.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bản đồ có một &quot;dòng kẻ ngang&quot; chia suy nghĩ và hành vi thành hai nhóm:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Nhóm trên (người chiến thắng - Victor): Không đổ lỗi, không phàn nàn, luôn có trách</span></div>\n<p class=\"body-txt\">\nnhiệm, chủ động hoàn thành công việc, tìm thấy giải pháp trong khó khăn, tạo ra cơ hội.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Nhóm dưới (nạn nhân - Victim): Luôn đổ lỗi, phàn nàn, bao biện, nhìn thấy bế tắc.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Là con người, chúng ta sẽ có lúc ở trên dòng kẻ, lúc ở dưới dòng kẻ; điều quan trọng là</span></div>\n<p class=\"body-txt\">\nnhận biết và điều chỉnh để luôn hướng tới mục tiêu và tích cực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Sơ đồ này có thể áp dụng không chỉ trong cuộc sống mà còn trong kinh doanh, bán hàng,</span></div>\n<p class=\"body-txt\">\nmarketing, huấn luyện và các mối quan hệ gia đình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Cách sử dụng bản đồ: In ra, mỗi khi có suy nghĩ hoặc hành động, hãy chấm một dấu vào</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">phần trên hoặc dưới dòng kẻ. Hàng tháng kiểm tra để điều chỉnh cuộc sống.</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">&quot;Những sự kiện xảy ra không quyết định cuộc đời của chúng ta, mà cách chúng ta phản</span></div>\n<p class=\"body-txt\">\nứng với những sự kiện sẽ quyết định cuộc đời của chúng ta.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là tư duy cốt lõi và mang tính trao quyền. Nó chuyển hướng sự</span></div>\n<p class=\"body-txt\">\ntập trung từ những yếu tố bên ngoài (mà chúng ta không thể kiểm soát) sang yếu tố bên\n \ntrong (cách phản ứng của bản thân), giúp mỗi người nhận ra mình có khả năng thay đổi\n \nvà định hình kết quả của cuộc đời mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Sự phân biệt rõ ràng giữa hành vi của &quot;người chiến thắng&quot; và &quot;nạn nhân&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Nó cung cấp một khung tham chiếu cụ thể và dễ nhận diện. Thay vì</span></div>\n<p class=\"body-txt\">\nchỉ nói chung chung về tích cực/tiêu cực, diễn giả liệt kê các hành vi cụ thể (đổ lỗi/chịu\n \ntrách nhiệm, phàn nàn/tìm giải pháp, thấy bế tắc/tạo cơ hội) giúp người nghe dễ dàng\n \ntự đánh giá mình đang thuộc nhóm nào và biết mình cần làm gì để chuyển dịch sang\n \nnhóm &quot;chiến thắng&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Phương pháp tự kiểm tra bằng cách in &quot;bản đồ&quot; và chấm điểm hàng ngày/tháng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Biến một khái niệm tâm lý thành một công cụ thực hành đơn giản, có</span></div>\n<p class=\"body-txt\">\ntính đo lường và theo dõi. Việc ghi nhận và xem xét định kỳ (chấm trên/dưới dòng kẻ)\n \ngiúp hình thành thói quen tự phản tỉnh, theo dõi sự tiến bộ và tạo động lực để điều chỉnh\n \nhành vi một cách liên tục và có ý thức.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#4527a0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Những sự kiện xảy ra không quyết định cuộc đời của chúng ta, mà cách chúng ta phản ứng\n \nvới những sự kiện sẽ quyết định cuộc đời của chúng ta.”\n \n“Sự lựa chọn là ở bạn.”\n \n“Chọn làm người chiến thắng hay chọn làm kiếp sống nạn nhân là hoàn toàn do bạn.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Bài 22: Kỹ thuật lật ngược vấn đề</h3>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Tóm tắt. Buổi học giới thiệu phương pháp &quot;The Work&quot; hay &quot;Turn Around&quot; của Byron Katie,</h3>\n<p class=\"body-txt\">\nmột kỹ thuật giúp chúng ta lật ngược những suy nghĩ và niềm tin cá nhân mà chúng ta cho là\n \nđúng, nhưng có thể không đúng trên thực tế. Bằng cách đặt 5 câu hỏi về một niềm tin và sau\n \nđó lật ngược nó, chúng ta có thể thách thức quan điểm của mình, hiểu rõ hơn về người khác\n \nvà hàn gắn các mối quan hệ. Mục tiêu cuối cùng là từ bỏ những niềm tin sai lệch để mở ra\n \nmột thế giới quan mới và cải thiện cuộc sống.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Bài học giới thiệu phương pháp &quot;The Work&quot; (tên gọi khác là &quot;Turn Around&quot;) của tác giả</span></div>\n<p class=\"body-txt\">\nByron Katie, một kỹ thuật để lật ngược mọi suy nghĩ của bản thân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Mọi suy nghĩ đối với bản thân chúng ta đều luôn đúng, nhưng trên thực tế, chúng có thể</span></div>\n<p class=\"body-txt\">\nkhông đúng khi đặt vào các hoàn cảnh, bối cảnh hoặc con người khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Ví dụ minh họa được đưa ra là việc tranh cãi về màu bàn tay (trắng/đen) tùy theo góc</span></div>\n<p class=\"body-txt\">\nnhìn, và câu chuyện &quot;diễn giả bói xem voi&quot; để nhấn mạnh rằng mỗi người chỉ cảm nhận\n \nthế giới theo cách riêng của mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Để bắt đầu phương pháp &quot;Turn Around&quot;, cần viết xuống một suy nghĩ, niềm tin, tuyên bố</span></div>\n<p class=\"body-txt\">\nhoặc nhận xét mà bạn muốn thay đổi (ví dụ: &quot;Anh A ghét tôi&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Tiếp theo, đặt 5 câu hỏi về tuyên bố đó:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Liệu điều đó có đúng không?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Liệu bạn có chắc chắn về điều đó không?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Có căn cứ nào cho thấy đó là điều đúng không?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Điều gì sẽ tiếp tục diễn ra với cuộc đời của tôi nếu tôi vẫn giữ nguyên quan điểm này?</span></div>\n<p class=\"body-txt\">\n(Phản đề &quot;Yes&quot;)\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Điều gì sẽ diễn ra nếu như tôi không còn tin vào tuyên bố này nữa? (Phản đề &quot;No&quot;)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Sau khi trả lời 5 câu hỏi để cân nhắc về niềm tin, tiến hành bước &quot;lật ngược&quot; (turn</span></div>\n<p class=\"body-txt\">\naround).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Lật ngược tuyên bố ban đầu theo hai cách:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Thay đổi chủ thể của tuyên bố thành bản thân (ví dụ: từ &quot;A ghét tôi&quot; thành &quot;Tôi ghét A&quot;).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Phủ định tuyên bố (ví dụ: từ &quot;A ghét tôi&quot; thành &quot;A không ghét tôi&quot;).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Việc lật ngược giúp đảo lộn suy nghĩ, phá vỡ những mệnh đề và niềm tin sai lầm, từ đó</span></div>\n<p class=\"body-txt\">\nthay đổi quan điểm.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #4527a0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Lợi ích của phương pháp &quot;Turn Around&quot;: cứu sống nhiều mối quan hệ, giúp thấu hiểu</span></div>\n<p class=\"body-txt\">\nngười khác hơn, thay đổi quan điểm cá nhân, và là một bước tiến mới trong quản trị cảm\n \nxúc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Điểm mấu chốt là sẵn sàng nói &quot;Tôi sai rồi, tôi xin lỗi&quot; để mở ra một thế giới quan mới.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#4527a0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Niềm tin cá nhân không đồng nghĩa với sự thật khách quan: Diễn giả nhấn mạnh rằng</span></div>\n<p class=\"body-txt\">\n&quot;mọi suy nghĩ đối với bản thân chúng ta thì nó luôn đúng&quot;, nhưng thực tế &quot;nó có thể\n \nkhông đúng&quot; khi đặt trong hoàn cảnh khác. Điều này quan trọng vì nó là gốc rễ của mọi\n \nmâu thuẫn và sự cứng nhắc trong tư duy. Nhận ra điều này mở ra khả năng thách thức\n \nchính những niềm tin sâu sắc nhất của mình, từ đó loại bỏ thành kiến và định kiến.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#4527a0\">•</span><span class=\"bul-txt\">Sức mạnh của việc đặt câu hỏi có cấu trúc để tự vấn và tìm bằng chứng: Bộ 5 câu hỏi của</span></div>\n<p class=\"body-txt\">\n&quot;The Work&quot; cung cấp một công cụ hệ thống để tự soi chiếu. Việc tìm kiếm căn cứ (câu 3)\n \nvà đặc biệt là cân nhắc hậu quả của việc giữ hay bỏ một niềm tin (câu 4 &amp; 5) buộc chúng\n \nta phải nhìn nhận vấn đề toàn diện, thoát khỏi sự chủ quan ban đầu. Điều này quan\n \ntrọng vì nó cung cấp một phương pháp thực tế để đánh giá tính đúng đắn và lợi ích của\n \nniềm tin, thay vì chỉ chấp nhận nó một cách vô điều kiện.\n</p>\n<div class=\"bullet
