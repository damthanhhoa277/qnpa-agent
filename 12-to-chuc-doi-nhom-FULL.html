<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tổ Chức Đội Nhóm</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#e8eaf0;font-family:'Segoe UI',Arial,sans-serif}
body{display:flex;flex-direction:column;align-items:center;padding:18px 10px 24px}

/* Book wrapper */
#book-wrap{width:720px;max-width:98vw;display:flex;flex-direction:column}

/* Top bar: title + page info */
#top-bar{display:flex;justify-content:space-between;align-items:center;
          margin-bottom:6px;padding:0 2px}
#book-title{font-size:13px;font-weight:600;color:#444;white-space:nowrap;
             overflow:hidden;text-overflow:ellipsis;max-width:60%}
#page-info{font-size:13px;color:#666;white-space:nowrap}

/* Progress bar */
#progress-bar{width:100%;height:3px;background:#d0d0d0;border-radius:2px;margin-bottom:10px}
#progress-fill{height:100%;border-radius:2px;transition:width .3s;background:#00695c}

/* Page */
.pg{width:100%;min-height:540px;background:#ffffff;border-radius:6px;
     box-shadow:0 2px 16px rgba(0,0,0,.12);overflow:hidden}

/* Cover */
.pg-cover{display:flex;justify-content:center;align-items:center;min-height:540px}
.cover-wrap{text-align:center;padding:60px 40px}
.cover-tag{font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;font-weight:600}
.cover-title{font-size:28px;font-weight:700;color:#1a1a1a;line-height:1.4;margin-bottom:16px}
.cover-sub{font-size:14px;font-weight:500}

/* Content page */
.pg-content{}
.pg-inner{padding:28px 36px 32px;overflow-y:auto;max-height:540px}
.pg-inner::-webkit-scrollbar{width:5px}
.pg-inner::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

/* Typography */
.sec-hdr{font-size:12px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
          margin:18px 0 8px;padding-bottom:5px;border-bottom:1px solid #eee}
.sec-hdr:first-child{margin-top:0}
.body-txt{font-size:14px;color:#2d2d2d;line-height:1.8;margin-bottom:10px;text-align:justify}
.bullet{display:flex;gap:10px;margin:5px 0}
.bul-dot{font-size:18px;line-height:1.4;flex-shrink:0;margin-top:-1px}
.bul-txt{font-size:13.5px;color:#2d2d2d;line-height:1.7}

/* Navigation */
#nav{display:flex;align-items:center;gap:14px;margin-top:12px}
.nav-btn{background:#fff;border:2px solid #00695c;color:#00695c;padding:8px 24px;
          border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;
          transition:all .15s;letter-spacing:.5px}
.nav-btn:hover{background:#00695c;color:#fff}
.nav-btn:disabled{opacity:.35;cursor:default}
#page-jump{width:52px;text-align:center;border:1px solid #ccc;border-radius:5px;
            padding:6px;font-size:13px;color:#444}
</style>
</head>
<body>
<div id="book-wrap">
  <div id="top-bar">
    <div id="book-title">Tổ Chức Đội Nhóm</div>
    <div id="page-info">1 / 36</div>
  </div>
  <div id="progress-bar"><div id="progress-fill" style="width:2.8%"></div></div>
  <div id="book"></div>
</div>
<div id="nav">
  <button class="nav-btn" id="btn-prev" onclick="prev()" disabled>◄ Trước</button>
  <input id="page-jump" type="number" min="1" max="36" value="1"
         onchange="goTo(+this.value-1)" title="Nhảy đến trang">
  <button class="nav-btn" id="btn-next" onclick="next()">Tiếp ►</button>
</div>
<script>
const pages=["<div class=\"pg pg-cover\" style=\"border-top:5px solid #00695c\">\n  <div class=\"cover-wrap\">\n    <div class=\"cover-tag\" style=\"color:#00695c\">Sổ Tay Tinh Hoa · QNPA</div>\n    <div class=\"cover-title\">Tổ Chức Đội Nhóm</div>\n    <div class=\"cover-sub\" style=\"color:#00695c\">34 trang nội dung đầy đủ</div>\n  </div>\n</div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><p class=\"body-txt\">\nTổ Chức Đội Nhóm Kinh Doanh\n \nSổ tay tinh hoa\n</p>\n<p class=\"body-txt\">\nTổng hợp 20 bài\n \nNguồn: khoá học Tổ Chức Đội Nhóm Kinh Doanh\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><p class=\"body-txt\">\nLời mở\n \nQuyển sách này tổng hợp tinh hoa khoá Tổ Chức Đội Nhóm Kinh Doanh, do AI nghe lại từng\n \nbài giảng và chắt lọc thành: tóm tắt, ý chính, điểm quan trọng nhất, và trích dẫn đáng nhớ.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><p class=\"body-txt\">\nMục lục\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Chương 1</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bài 1: Đơn giản - hệ thống - nhân bản hóa</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bài 2: Tối ưu hóa</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bài 3: Tự động hóa</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bài 4: Tell - Show - Try - Do</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Chương 2</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bài 5: Dạy - Dỗ - Doạ - Giết</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bài 6: Quan hệ 3 chiều - 3D</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bài 7: 6 Nhu cầu của con người</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Chương 3</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bài 8: Thế nào là đa cấp?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bài 9: Hệ thống hoa hồng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bài 10: Tập trung vào E</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bài 11: Phương pháp phân lợi nhuận cho thằng E cuối cùng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bài 12: Tăng doanh thu trung bình trên một đơn hàng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bài 13: Viral video</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bài 14: Xuất hiện trên mạng xã hội với tần xuất cao nhất</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bài 15: Xây dựng mô hình 5 triệu</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bài 16: Các con số để xây dựng hệ thống</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bài 17: Đãi vàng trong cát</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bài 18: Tính các mức còn lại</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Chương 4</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bài 19: Thế nào là bán phá giá?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bài 20: Chiến lược chống bán phá giá</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#00695c\">Chương 1</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Bài 1: Đơn giản - hệ thống - nhân bản hóa</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Tóm tắt. Buổi giảng này tập trung vào xây dựng hệ thống thành công trong kinh doanh,</h3>\n<p class=\"body-txt\">\ntrình bày ba bước đầu tiên trong năm bước cốt lõi. Trọng tâm là đơn giản hóa mọi quy trình\n \nvà ngôn ngữ để dễ hiểu và dễ thực hiện, tránh sự phức tạp không cần thiết. Tiếp theo, hệ\n \nthống hóa bằng cách ghi chép lại chi tiết toàn bộ các bước, yêu cầu và danh sách kiểm tra\n \ncủa từng công việc. Cuối cùng, nhân bản các quy trình đã được hệ thống hóa thông qua đào\n \ntạo để đảm bảo sự đồng bộ và hiệu quả trên toàn hệ thống.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Để xây dựng một hệ thống thành công, chúng ta cần thực hiện 5 bước.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bước 1: Đơn giản hóa</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Là điều tiên quyết để có hệ thống mạnh, phát triển nhanh và bền vững.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Đơn giản hóa tức là làm cho mọi thứ trở nên đơn giản.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Lý do không đơn giản hóa là vì ta nghĩ phải phức tạp thì nó mới hoạt động, nhưng thực</span></div>\n<p class=\"body-txt\">\ntế, đơn giản thì hệ thống mới chạy được.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Ngôn từ: Cố gắng tránh thuật ngữ chuyên ngành; nếu có, phải đảm bảo đứa trẻ học lớp 5</span></div>\n<p class=\"body-txt\">\nhoặc người có trình độ trung bình trong ngành của bạn có thể hiểu và làm được.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Nếu một việc gì đó phức tạp, hãy tách nó thành hai (hoặc nhiều) việc nhỏ hơn (ví dụ:</span></div>\n<p class=\"body-txt\">\nmarketing và sale; đánh răng; nấu cơm). Tách việc cho nhiều người với chuyên môn\n \nkhác nhau đảm nhiệm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bước 2: Hệ thống hóa</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Đây là bước mà &quot;hầu hết mọi người sẽ không làm&quot; nhưng là một yếu tố cực kỳ quan</span></div>\n<p class=\"body-txt\">\ntrọng, nếu không sẽ vô cùng khó khăn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Hệ thống hóa là ghi xuống toàn bộ những điều bạn đang làm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Ban đầu không cần hoàn hảo, có sao ghi vậy.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Cần ghi xuống các nội dung sau:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Process (Quy trình): Các bước phải làm (ví dụ: Bước 1 làm gì, Bước 2 làm gì...). Kể cả các</span></div>\n<p class=\"body-txt\">\nphương án dự phòng (ví dụ: nấu cơm khi mất điện).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Requirement (Yêu cầu): Các yêu cầu cần phải có để thực hiện bước đó (ví dụ: tài liệu gì,</span></div>\n<p class=\"body-txt\">\ncông cụ gì, vật tư ra sao).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Checklist (Danh sách kiểm tra): Danh sách công cụ, các bước phải làm, các điều kiện cần</span></div>\n<p class=\"body-txt\">\nhoàn thành công việc. &quot;Thế nào là hoàn thành cái công việc đó phải có một cái checklist.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bước 3: Nhân bản</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Sau khi đã hệ thống hóa và viết xuống tất cả các bước.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Mang ra đào tạo cho toàn bộ hệ thống.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Đảm bảo rằng &quot;mọi đại lý ở trong hệ thống của chúng ta là giống hệt nhau, cùng qua một</span></div>\n<p class=\"body-txt\">\nquy trình đào tạo giống hệt nhau.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">&quot;Ngay cả việc đào tạo cũng là một quy trình.&quot; Người đào tạo cũng phải nhận được một bộ</span></div>\n<p class=\"body-txt\">\nquy trình đơn giản để đào tạo những người khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">&quot;Bản thân quy trình đào tạo cũng rất là quan trọng.&quot;</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#00695c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Đơn giản hóa là tiên quyết cho sự phát triển mạnh mẽ và bền vững của hệ thống: Điều</span></div>\n<p class=\"body-txt\">\nnày quan trọng vì nó thách thức quan niệm phổ biến rằng sự phức tạp thường đi đôi với\n \nhiệu quả. Thay vào đó, diễn giả nhấn mạnh rằng chính sự đơn giản mới giúp hệ thống dễ\n \nvận hành, dễ mở rộng và bền vững theo thời gian. Khi mọi thứ đơn giản, khả năng mắc\n \nlỗi giảm, tốc độ triển khai tăng và việc đào tạo cũng trở nên dễ dàng hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Hệ thống hóa bằng cách &quot;ghi xuống&quot; là nền tảng cốt lõi, thường bị bỏ qua: Diễn giả chỉ ra</span></div>\n<p class=\"body-txt\">\nrằng việc ghi lại toàn bộ quy trình làm việc là điều mà &quot;hầu hết mọi người sẽ không làm&quot;,\n \nnhưng lại là yếu tố quyết định sự thành công. Việc này quan trọng bởi nó biến kiến thức\n \ncá nhân thành tài sản của tổ chức, cho phép chuẩn hóa, đo lường và nhân bản mà không\n \nphụ thuộc vào một cá nhân cụ thể, giúp doanh nghiệp phát triển vượt xa khả năng của\n \nmột người.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Tách nhỏ công việc phức tạp và chuyên môn hóa: Quan điểm &quot;nếu cái việc gì nó phức</span></div>\n<p class=\"body-txt\">\ntạp, đem tách nó thành hai việc&quot; và phân công cho những người có &quot;chuyên môn khác\n \nnhau&quot; là cực kỳ giá trị. Nó giúp tối ưu hóa hiệu suất, giảm gánh nặng nhận thức cho từng\n \ncá nhân, và cho phép đào tạo sâu hơn vào từng kỹ năng cụ thể. Điều này dẫn đến sự tinh\n \ngọn và hiệu quả cao hơn trong vận hành, như ví dụ về marketing và sale hay nấu cơm.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Nếu bạn muốn có một cái hệ thống mạnh, muốn cái hệ thống phát triển nhanh, phát triển bền\n \nvững, thì cái sự đơn giản là điều tiên quyết nhất. Lý do mà chúng ta không làm đơn giản ấy là\n \nbởi vì ta nghĩ rằng phải phức tạp thì nó mới hoạt động. Nhưng trên thực tiễn, đơn giản thì hệ\n \nthống nó mới chạy được.”\n \n“Hệ thống hóa là ghi xuống toàn bộ những điều mà bạn đang làm.”\n \n“Mọi đại lý ở trong hệ thống của chúng ta là giống hệt nhau, cùng qua một quy trình đào tạo\n \ngiống hệt nhau.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Bài 2: Tối ưu hóa</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Tóm tắt. Buổi học tập trung vào việc tối ưu hóa và chuẩn hóa quy trình đào tạo trong một hệ</h3>\n<p class=\"body-txt\">\nthống. Diễn giả nhấn mạnh sự cần thiết của việc liên tục tinh chỉnh (Kaizen) để mọi thứ trở\n \nnên đơn giản và dễ hiểu, sau đó hệ thống hóa thành tài liệu để đào tạo thống nhất. Mục tiêu\n \nlà đảm bảo mọi thành viên đều hiểu đúng, giống nhau về mọi khái niệm và quy trình, từ đó\n \ntránh sự phân mảnh và sụp đổ của hệ thống khi mở rộng. Quy trình này đòi hỏi sự thống\n \nnhất từ cấp quản lý cao nhất, không tự ý thêm bớt nội dung hay khái niệm phức tạp.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bước 4: Tối ưu hóa (Kaizen) – làm cho mọi thứ tốt hơn theo thời gian.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Khi tối ưu hóa, cần quay lại bước 1 (đơn giản hóa các quy trình).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Sau khi đơn giản hóa, phải viết xuống thành tài liệu chuẩn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Sau khi viết xuống, phải đào tạo cho toàn bộ hệ thống.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Việc tối ưu hóa phải thực hiện ở cấp đầu/cấp trên cùng, không phải cấp dưới, để đảm</span></div>\n<p class=\"body-txt\">\nbảo thống nhất.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Mục đích là để đảm bảo tất cả mọi người đều thống nhất trong cách hiểu và thực hiện.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Nếu mỗi nhánh/cấp đào tạo một kiểu, hệ thống sẽ sụp đổ, dẫn đến ly khai và &quot;chiến</span></div>\n<p class=\"body-txt\">\ntranh&quot; nội bộ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Hệ thống đào tạo và toàn bộ tài liệu phải được thống nhất từ trên xuống dưới, chỉ có một</span></div>\n<p class=\"body-txt\">\nhệ thống.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bất kỳ ai muốn đứng lên đào tạo đều phải thông qua quy trình, được phê duyệt và chứng</span></div>\n<p class=\"body-txt\">\nnhận.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Tất cả nội dung đào tạo (bao gồm slide, hình vẽ, câu chuyện cá nhân) phải được thống</span></div>\n<p class=\"body-txt\">\nnhất và phê duyệt trước, không được tự ý thêm bớt.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Các khái niệm, nội hàm sử dụng trong chương trình đào tạo phải thống nhất và được</span></div>\n<p class=\"body-txt\">\nngười đào tạo hiểu 100%.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Khái niệm cần được định nghĩa rõ ràng, đơn giản, dễ hiểu (như học sinh lớp 5); nếu</span></div>\n<p class=\"body-txt\">\nphức tạp phải có giải thích đi kèm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Phải loại bỏ hoặc đơn giản hóa các khái niệm phức tạp để tránh gây hiểu lầm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Hệ thống càng đơn giản, dễ đào tạo (kể cả cho người có trình độ thấp hơn), thì càng</span></div>\n<p class=\"body-txt\">\nnhân rộng nhanh chóng và hiệu quả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Tối ưu hóa là một vòng lặp liên tục gắn liền với đơn giản hóa và chuẩn hóa: Diễn giả</span></div>\n<p class=\"body-txt\">\nnhấn mạnh tối ưu hóa không phải là điểm dừng mà là một chu trình: tối ưu -&gt; đơn giản -\n \n&gt; viết xuống -&gt; đào tạo -&gt; lại tối ưu. Điều này quan trọng vì nó tạo ra một hệ thống học\n \ntập và cải tiến không ngừng, đảm bảo sự phù hợp và hiệu quả lâu dài của mọi quy trình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Sự thống nhất trong đào tạo và ngôn ngữ là nền tảng sống còn của một hệ thống: Diễn</span></div>\n<p class=\"body-txt\">\ngiả dùng hình ảnh &quot;mỗi nhánh đào tạo một kiểu là dấu hiệu sụp đổ&quot;, &quot;ly khai&quot;, &quot;chiến\n \ntranh&quot; để minh họa sự nghiêm trọng. Điều này cho thấy nếu không có sự đồng bộ về kiến\n \nthức, quy trình, khái niệm, hệ thống sẽ không thể vận hành trơn tru và dễ dàng dẫn đến\n \nxung đột, tan rã. Sự thống nhất từ cấp cao nhất là chìa khóa để hệ thống bền vững và\n \nphát triển.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Đơn giản hóa là yếu tố then chốt để mở rộng hệ thống nhanh chóng và hiệu quả: Quan</span></div>\n<p class=\"body-txt\">\nđiểm &quot;thằng hệ thống mình càng ngu, càng đào tạo được cho thằng ngu thì hệ thống càng\n \nnhân nhanh&quot; nghe có vẻ cực đoan nhưng rất thực tế. Nó ám chỉ việc thiết kế quy trình và\n \ntài liệu đào tạo sao cho *bất kỳ ai* cũng có thể hiểu và thực hiện được một cách dễ dàng.\n \nĐiều này loại bỏ rào cản về năng lực cá nhân, giúp việc nhân bản, mở rộng quy mô trở\n \nnên nhanh chóng và ít tốn kém hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Mỗi nhánh đào tạo một kiểu thì đấy là lúc mà hệ thống bắt đầu sụp đổ.”\n \n“Hệ thống đào tạo toàn bộ tài liệu mình phải thống nhất từ trên xuống dưới một hệ thống thôi,\n \nkhông có hai hệ thống đào tạo.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Hãy nhớ rằng là thằng hệ thống mình càng ngu, càng đào tạo được cho thằng ngu thì làm sao\n \nạ? Hệ thống nó càng nhân nhanh.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Bài 3: Tự động hóa</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Tóm tắt. Buổi giảng này trình bày 5 bước cốt lõi để xây dựng một hệ thống kinh doanh tự</h3>\n<p class=\"body-txt\">\nđộng hóa hiệu quả. Quy trình bắt đầu từ việc đơn giản hóa mọi khái niệm và công việc, sau\n \nđó hệ thống hóa bằng văn bản, đào tạo nhân sự, liên tục tối ưu từ cấp cao nhất, và cuối cùng\n \nlà tự động hóa hoàn toàn. Mục tiêu là tạo ra một hệ thống có thể tự vận hành, tự nhân bản và\n \nphát triển mà không cần sự can thiệp liên tục của người quản lý. Diễn giả nhấn mạnh rằng\n \nmỗi người học phải tự xây dựng quy trình riêng của mình.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bước 5: Tự động hóa (quan trọng nhất, vui nhất).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Tự động hóa không chỉ là công nghệ, công nghệ chỉ là công cụ giúp quá trình tự động hóa</span></div>\n<p class=\"body-txt\">\ntriển khai.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Tự động hóa là việc khi quy trình được đưa xuống, hệ thống bên dưới có thể tự đào tạo</span></div>\n<p class=\"body-txt\">\nnhau, tự tuyển dụng, tự nhân bản, tự tổ chức các hệ thống kinh doanh mới, tự mở chi\n \nnhánh, tự phát triển &quot;tổng boss&quot; mà không cần sự can thiệp của người quản lý.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Ví dụ về các công ty hệ thống phân phối tại Việt Nam có thể mở 30-40 cửa hàng mới mỗi</span></div>\n<p class=\"body-txt\">\nngày mà ông chủ không cần xuất hiện hay biết đến.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Nhắc lại các bước trước đó:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bước 1: Đơn giản hóa (đây là bước quan trọng bậc nhất, rất quan trọng, tránh làm phức</span></div>\n<p class=\"body-txt\">\ntạp vấn đề).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bước 2: Hệ thống hóa (viết xuống mọi thứ bằng văn bản, dù nó &quot;ngu, nghe&quot; cũng được).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bước 3: Đào tạo.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bước 4: Tối ưu (mọi thứ luôn có thể tốt hơn).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Chỉ tối ưu ở tầng cao nhất, không sửa ở tầng thấp nhất.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Toàn bộ tài liệu quy chuẩn của công ty phải giống hệt, không có cách hiểu khác.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Mọi khái niệm phải được hiểu rõ ràng, nếu mơ hồ phải loại bỏ hoặc thêm chú thích.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Mọi khái niệm phức tạp đều được tách nhỏ thành các khái niệm đơn giản hơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Mọi việc làm phức tạp đều được tách thành những việc dễ làm hơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Mục tiêu: để cho người có trình độ trung bình trong ngành có thể làm được.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Cuối cùng, người học phải tự xây dựng quy trình của mình, chứ không phải diễn giả nghĩ</span></div>\n<p class=\"body-txt\">\nra quy trình cho họ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Mục tiêu tối thượng là Tự động hóa, không chỉ là ứng dụng công nghệ: diễn giả nhấn</span></div>\n<p class=\"body-txt\">\nmạnh rằng công nghệ chỉ là công cụ, cốt lõi của tự động hóa là xây dựng một hệ thống có\n \nkhả năng tự vận hành, tự phát triển, tự nhân bản mà không cần sự can thiệp liên tục của\n \ncon người. Điều này quan trọng vì nó chuyển tư duy từ việc chỉ mua công cụ sang việc\n \nthiết kế quy trình và cấu trúc kinh doanh bền vững, có khả năng mở rộng.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Đơn giản hóa là nền tảng số một: &quot;Bước một (Đơn giản hóa) là bước quan trọng bậc</span></div>\n<p class=\"body-txt\">\nnhất&quot; – sự phức tạp là kẻ thù của hệ thống. Nếu quy trình và khái niệm không đơn giản\n \ntừ đầu, việc hệ thống hóa, đào tạo, tối ưu và đặc biệt là tự động hóa sẽ trở nên bất khả thi\n \nhoặc kém hiệu quả. Đây là chìa khóa để đảm bảo sự rõ ràng và khả năng thực thi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Tối ưu hóa phải từ cấp cao nhất và hướng tới người &quot;trình độ trung bình&quot;: Diễn giả chỉ</span></div>\n<p class=\"body-txt\">\nrõ rằng việc tối ưu phải được thực hiện ở &quot;tầng cao nhất&quot; để đảm bảo tính nhất quán\n \ntoàn hệ thống, tránh việc sửa chữa rời rạc ở cấp thấp. Đồng thời, mọi quy trình và khái\n \nniệm phải đủ đơn giản để &quot;người có trình độ trung bình trong ngành&quot; cũng có thể thực\n \nhiện được. Điều này cực kỳ quan trọng cho khả năng nhân rộng và giảm thiểu phụ thuộc\n \nvào cá nhân tài năng, giúp hệ thống hoạt động ổn định và có thể mở rộng nhanh chóng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Tự động hóa tức là làm sao đấy khi chúng ta đưa quy trình xuống thì hệ thống bên dưới tự\n \nđào tạo nhau, tự tuyển dụng, tự nhân bản lên, tự tổ chức những hệ thống kinh doanh mới, tự\n \nmở những chi nhánh mới, tự phát triển lên những tổng boss mới mà không cần sự can thiệp\n \ncủa ta.”\n \n“Mọi thứ luôn có thể tốt hơn.”\n \n“Để cho người có trình độ trung bình trong ngành của chúng ta có thể làm được.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Bài 4: Tell - Show - Try - Do</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Tóm tắt. Buổi giảng này trình bày về &quot;quy trình nhân bản&quot; gồm 4 bước (Nói, Biểu diễn, Thực</h3>\n<p class=\"body-txt\">\nhành, Làm) nhằm xây dựng một hệ thống đào tạo và phát triển đội ngũ bài bản, hiệu quả.\n \nMục tiêu là tạo ra sự nhất quán trong công việc, giúp người học không chỉ nắm vững lý\n \nthuyết mà còn thực hành thành thạo, có khả năng tự chịu trách nhiệm và tiếp tục nhân bản\n \nquy trình cho người khác. Quy trình này khắc phục hạn chế của phương pháp đào tạo truyền\n \nmiệng kém hiệu quả, đảm bảo sự tăng trưởng và bền vững của hệ thống.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Quy trình nhân bản bao gồm 4 bước:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bước 1: Nói (Tell): Giảng lý thuyết, nói cho học viên biết *điều gì cần làm (What)*, *làm</span></div>\n<p class=\"body-txt\">\nthế nào thì đạt (How)*, và *tại sao cần làm điều ấy (Why)*.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bước 2: Biểu diễn / Chỉ (Show): Người hướng dẫn làm mẫu, biểu diễn trực tiếp để học</span></div>\n<p class=\"body-txt\">\nviên nhìn thấy cách thực hiện. Ví dụ: làm mẫu 8 bước bán hàng, đồng thời nhắc nhở học\n \nviên đang ở bước nào. (Tương tự như lái xe nguội trong sân).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bước 3: Thực hành / Thử (Try): Cho học viên thực hành cùng với người hướng dẫn. Học</span></div>\n<p class=\"body-txt\">\nviên làm, người hướng dẫn ở bên cạnh để giám sát, rút kinh nghiệm, chia sẻ và yểm trợ\n \n(như diễn giả dạy lái xe có phanh phụ). Trong giai đoạn này, người hướng dẫn là người\n \nchịu trách nhiệm chính. Thời gian thực hành có thể kéo dài từ 1 tháng đến hàng năm tùy\n \ntheo tính chất công việc.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bước 4: Làm (Do): Cho học viên tự làm thật, chịu trách nhiệm thật, và ra kết quả thật.</span></div>\n<p class=\"body-txt\">\nSau khi đạt trình độ này, học viên có thể tiếp tục quy trình nhân bản hệ thống, tuyển\n \ndụng, và đào tạo người mới.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Tầm quan trọng của quy trình bài bản:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Hệ thống không tăng trưởng là do thiếu quy trình đầy đủ hoặc chỉ truyền miệng, dẫn đến</span></div>\n<p class=\"body-txt\">\n&quot;thiên biến vạn hóa&quot; và không nhất quán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Thiếu hệ thống đào tạo bài bản dẫn đến cách dạy kém hiệu quả kiểu &quot;mày làm đi, sao</span></div>\n<p class=\"body-txt\">\nmày ngu thế&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Việc người hướng dẫn làm cùng với học viên giúp hoàn thiện quy trình.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Người hướng dẫn chịu trách nhiệm chính trong giai đoạn Thực hành (Bước 3): Diễn giả</span></div>\n<p class=\"body-txt\">\nnhấn mạnh &quot;Cái người chịu trách nhiệm trong giai đoạn 3 này là ta chứ không phải họ.&quot;\n \nĐiều này cực kỳ quan trọng vì nó đặt trách nhiệm lên vai người đào tạo, yêu cầu họ phải\n \ngiám sát chặt chẽ, hỗ trợ kịp thời và sửa lỗi ngay lập tức. Điều này giúp học viên xây\n \ndựng nền tảng vững chắc, tránh sai lầm nghiêm trọng và đảm bảo chất lượng đầu ra\n \ntrước khi tự làm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Quy trình Nói – Biểu diễn – Thực hành – Làm (Tell – Show – Try – Do) là cốt lõi của đào</span></div>\n<p class=\"body-txt\">\ntạo hiệu quả: Đây là một phương pháp đào tạo toàn diện, từng bước giúp học viên\n \nchuyển từ hiểu biết lý thuyết sang năng lực thực hành độc lập. Nó khác biệt hoàn toàn\n \nvới cách dạy &quot;chỉ nói rồi bảo làm đi&quot; thông thường, giúp đảm bảo sự nhất quán và chất\n \nlượng công việc trong toàn hệ thống, đồng thời tránh việc thông tin bị méo mó (thiên\n \nbiến vạn hóa) khi truyền đạt.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Mục tiêu cuối cùng là để học viên tự nhân bản hệ thống (Bước 4): Việc đào tạo không chỉ</span></div>\n<p class=\"body-txt\">\ndừng lại ở việc người học làm được việc, mà còn là để họ có thể tự mình tiếp tục quy\n \ntrình này, tuyển dụng và đào tạo người mới. Đây là chìa khóa để một tổ chức có thể mở\n \nrộng quy mô (tăng trưởng) và duy trì sự bền vững mà không bị phụ thuộc vào một cá\n \nnhân hay một nhóm nhỏ lãnh đạo.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Nói cho họ biết điều gì cần phải làm, làm thế nào thì đạt, tại sao cần phải làm điều ấy.”\n \n“Cái người chịu trách nhiệm trong giai đoạn 3 này là ta chứ không phải họ.”\n \n“Hệ thống mà không tăng trưởng, đấy chính là hệ thống mà không có quy trình đầy đủ.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Chương 2</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Bài 5: Dạy - Dỗ - Doạ - Giết</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Tóm tắt. Buổi giảng tập trung vào quy trình &quot;dạy, dỗ, dọa, giết&quot; để quản lý và đào thải những</h3>\n<p class=\"body-txt\">\nngười không đạt yêu cầu trong một hệ thống kinh doanh, nhằm xây dựng đội nhóm tinh\n \nnhuệ. Diễn giả nhấn mạnh sự cần thiết của kỷ luật, tài liệu hóa rõ ràng và quyết đoán trong\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><p class=\"body-txt\">\nviệc loại bỏ nhân sự kém hiệu quả. Bên cạnh đó, buổi học còn giới thiệu mô hình &quot;mối quan\n \nhệ 3 chiều&quot; và tầm quan trọng của việc thấu hiểu các nhu cầu của bản thân, đối tác và khách\n \nhàng để tạo nên sự gắn kết và hiệu quả lâu dài.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Quy trình loại bỏ nhân sự kém hiệu quả là cần thiết để xây dựng đội nhóm tinh nhuệ,</span></div>\n<p class=\"body-txt\">\nkhông thể giữ tất cả mọi người.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Quy trình đào thải gồm 4 bước: Dạy, Dỗ, Dọa, Giết.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Dạy (Teach) (Bước 1):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Cần có một checklist/cẩm nang rõ ràng về điều kiện để giữ lại và điều kiện để loại bỏ</span></div>\n<p class=\"body-txt\">\nnhân sự trong hệ thống.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Phải dạy cho mọi người làm được cái điều mà một người trung bình trong công việc kinh</span></div>\n<p class=\"body-txt\">\ndoanh làm được.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Quy trình dạy gồm 4 bước; quy trình tạo tài liệu dạy gồm 5 bước.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Nếu không &quot;tốt nghiệp&quot; (không đạt yêu cầu sau khi dạy), thì không cấp chứng chỉ hoặc</span></div>\n<p class=\"body-txt\">\nkhông bán hàng cho họ; phải loại bỏ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Cần có những điều kiện học vấn nhất định khi tuyển đại lý, không chỉ đơn thuần là bỏ</span></div>\n<p class=\"body-txt\">\ntiền ra mua.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Dỗ (Encourage/Cajole) (Bước 2):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Đây là bước rất quan trọng, nhằm truyền cảm hứng, động viên để họ có năng lượng tiếp</span></div>\n<p class=\"body-txt\">\ntục làm việc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Phải biết được &quot;sáu nhu cầu&quot;, phương pháp &quot;trên dòng kẻ&quot; và phương pháp &quot;AB&quot; (có</span></div>\n<p class=\"body-txt\">\ntrong khóa &quot;Đánh thức giàu có&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Cần có một người mentor/cố vấn riêng (không phải quản lý trực tiếp) để nói chuyện,</span></div>\n<p class=\"body-txt\">\nchia sẻ với những người có hiệu suất thấp, tránh trường hợp họ không nghe hoặc không\n \nchia sẻ thật lòng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Dọa (Threaten) (Bước 3):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Áp dụng kỷ luật để xây dựng đội nhóm tuyệt vời. &quot;Ở đâu có kỷ luật, ở đó có đội nhóm</span></div>\n<p class=\"body-txt\">\ntuyệt vời.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">&quot;Kỷ luật chính là phương pháp để tạo nên sự tự do.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Nếu tiếp tục vi phạm, phải dọa loại trừ. Cần có hệ thống cảnh báo (lần 1, lần 2, lần 3) với</span></div>\n<p class=\"body-txt\">\ncấp độ ngôn từ khác nhau (lần 1 nhẹ nhàng, lần 2 mạnh mẽ, lần 3 sắt đá).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Tất cả các cảnh báo phải được viết xuống bằng văn bản, có quy trình ai là người gửi, ai</span></div>\n<p class=\"body-txt\">\nchịu trách nhiệm giám sát.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Người đã ra đi thì &quot;không bao giờ trở lại&quot;, dù lớn dù bé, dù mẹ dù con, dù có khổng lồ</span></div>\n<p class=\"body-txt\">\nnào đi là đi. Việc nhận lại người không tốt chứng tỏ mình không tốt và khiến người tốt\n \ncảm thấy bị xúc phạm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Giết (Eliminate) (Bước 4):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Nếu sau quá trình nhắc nhở và có bằng chứng theo vết (tức là đã trưng ra được các lần</span></div>\n<p class=\"body-txt\">\nnhắc nhở trước đó) mà vẫn vi phạm, thì chấm dứt/loại bỏ ra khỏi hệ thống.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Đối với đại lý, cần lập biên bản, thu hồi lại toàn bộ hàng và trả lại tiền để giảm thiểu việc</span></div>\n<p class=\"body-txt\">\nphải xử lý tồn kho và phá hoại sau này.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Cần xử lý mạnh tay ngay từ đầu đối với các lỗi nghiêm trọng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Lỗi nặng nhất là &quot;bán phá giá&quot; vì đó là hành vi &quot;ăn cắp tiền của cả hệ thống&quot;, cần xử phạt</span></div>\n<p class=\"body-txt\">\nnặng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Lỗi thứ hai là &quot;tham gia hai hệ thống&quot;: cần tìm hiểu nhu cầu thực sự. Nếu hệ thống của</span></div>\n<p class=\"body-txt\">\nmình ngon rồi mà họ vẫn tham gia hai hệ thống thì phải loại bỏ vì không hiệu quả. Nếu\n \nhọ hiệu quả cả hai thì mình phải xem lại danh mục sản phẩm của mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Làm thế nào để người ta làm việc với mình: Mối quan hệ 3 chiều:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Chiều 1: Mình (A) phải biết rõ họ (B) cần gì và đáp ứng nhu cầu của họ trước tiên để giữ</span></div>\n<p class=\"body-txt\">\nchân họ lại trong hệ thống.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Họ sẽ ở lại khi có 2 nhu cầu cao nhất của họ được thỏa mãn; họ sẽ &quot;nghiện&quot; nếu 4 nhu</span></div>\n<p class=\"body-txt\">\ncầu cao nhất được thỏa mãn (trong số 6 nhu cầu).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Cần thiết kế hệ thống, sản phẩm, mô hình trả thưởng, mô hình đào tạo và chính con</span></div>\n<p class=\"body-txt\">\nngười của mình để có thể đáp ứng được 4 nhu cầu này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Chiều 2: Họ (B) cũng phải đáp ứng được nhu cầu của ta (A).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Chiều 3: Cả hai (A và B) cùng đáp ứng nhu cầu của một đối tượng thứ ba (C), tức là có</span></div>\n<p class=\"body-txt\">\nmột mục tiêu chung (ví dụ: khách hàng cuối).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">6 Nhu cầu:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Nhu cầu được sống (ăn, ngủ, nghỉ, an toàn, uống, làm tình).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Nhu cầu về tiền bạc (có tiền thì họ sẽ làm hoặc không làm một việc gì đó).</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Quy trình đào thải là không thể thiếu để xây dựng đội nhóm tinh nhuệ: diễn giả khẳng</span></div>\n<p class=\"body-txt\">\nđịnh, &quot;Nếu bạn muốn có một đội nhóm tinh nhuệ thì bạn không thể giữ tất cả mọi người\n \ntrong đội nhóm của mình được.&quot; (0:31-0:34).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">*Vì sao quan trọng:* Nhiều doanh nghiệp, đặc biệt là các công ty nhỏ hoặc mới, thường e</span></div>\n<p class=\"body-txt\">\nngại việc loại bỏ nhân sự kém hiệu quả vì lo lắng về chi phí thay thế hay ảnh hưởng đến\n \ntinh thần chung. Tuy nhiên, việc giữ lại những người không đạt yêu cầu sẽ kéo lùi hiệu\n \nsuất của toàn đội, làm giảm động lực của những người giỏi và cản trở sự phát triển.\n \nĐiểm này nhấn mạnh rằng sự chọn lọc và quyết đoán là cần thiết để duy trì chất lượng\n \nvà sự tinh nhuệ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Kỷ luật chính là phương pháp để tạo nên sự tự do: &quot;Kỷ luật chính là phương pháp để tạo</span></div>\n<p class=\"body-txt\">\nnên sự tự do.&quot; (4:22-4:25).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">*Vì sao quan trọng:* Insight này thay đổi quan niệm phổ biến rằng kỷ luật là sự ràng</span></div>\n<p class=\"body-txt\">\nbuộc hay giới hạn. Thay vào đó, nó chỉ ra rằng một hệ thống có kỷ luật rõ ràng sẽ tạo ra\n \nmột khuôn khổ hoạt động hiệu quả, giúp các cá nhân và tổ chức biết rõ giới hạn, mục\n \ntiêu, từ đó có thể sáng tạo, phát triển và đạt được kết quả mà không bị cản trở bởi sự\n \nhỗn loạn, thiếu định hướng. Sự tự do thực sự đến từ việc có một cấu trúc vững chắc để\n \ndựa vào.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Không bao giờ nhận lại người đã bị loại bỏ: &quot;Nếu đã đi rồi thì không bao giờ cho quay trở</span></div>\n<p class=\"body-txt\">\nlại nhá. Dù lớn dù bé, dù mẹ dù con, dù có khổng lồ nào đi là đi, không bao giờ cho quay\n \ntrở lại.&quot; (4:42-4:48).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">*Vì sao quan trọng:* Sự kiên quyết tuyệt đối này là yếu tố then chốt để duy trì tính</span></div>\n<p class=\"body-txt\">\nnghiêm minh của kỷ luật và củng cố niềm tin trong hệ thống. Nếu một người đã bị loại\n \nbỏ có thể dễ dàng quay lại, nó sẽ làm suy yếu quyền lực của quy trình đào thải, khiến\n \nnhững người còn lại không còn nể trọng quy tắc. Hơn nữa, việc chấp nhận người không\n \ntốt quay lại sẽ làm tổn hại đến tinh thần của những người tốt và có thể tái diễn các vấn\n \nđề cũ, tạo ra một vòng luẩn quẩn không hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Thiết kế hệ thống để đáp ứng nhu cầu sâu sắc của đối tác/khách hàng: Để đối tác/khách</span></div>\n<p class=\"body-txt\">\nhàng &quot;nghiện&quot; và gắn bó, doanh nghiệp cần thiết kế &quot;hệ thống, sản phẩm, mô hình trả\n \nthưởng, mô hình đào tạo và chính con người của ta&quot; để đáp ứng 4/6 nhu cầu cao nhất\n \ncủa họ. (10:55-11:06).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">*Vì sao quan trọng:* Điểm này vượt xa việc chỉ cung cấp sản phẩm/dịch vụ. Nó đòi hỏi</span></div>\n<p class=\"body-txt\">\nmột cách tiếp cận chiến lược toàn diện, tập trung vào việc thấu hiểu và thỏa mãn các nhu\n \ncầu sâu sắc của đối tác/khách hàng ở nhiều khía cạnh, không chỉ là giao dịch bề mặt. Khi\n \ndoanh nghiệp chủ động điều chỉnh toàn bộ cấu trúc của mình để phù hợp với những nhu\n \ncầu này, nó sẽ tạo ra sự gắn kết mạnh mẽ, biến khách hàng thành đối tác trung thành và\n \nthậm chí là &quot;nghiện&quot; dịch vụ của mình.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Bạn muốn có một đội nhóm tinh nhuệ thì bạn không thể giữ tất cả mọi người trong đội nhóm\n \ncủa mình được.”\n \n“Kỷ luật chính là phương pháp để tạo nên sự tự do.”\n \n“Nếu đã đi rồi thì không bao giờ cho quay trở lại nhá. Dù lớn dù bé, dù mẹ dù con, dù có khổng\n \nlồ nào đi là đi, không bao giờ cho quay trở lại.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Bài 6: Quan hệ 3 chiều - 3D</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Tóm tắt. Buổi học này tập trung vào việc làm thế nào để xây dựng và duy trì mối quan hệ</h3>\n<p class=\"body-txt\">\nbền vững với khách hàng hoặc đối tác, thông qua việc đáp ứng nhu cầu của cả hai bên và\n \nhướng tới một mục tiêu chung. Diễn giả giới thiệu mô hình &quot;mối quan hệ 3D về nhu cầu&quot; (ba\n \nchiều), nhấn mạnh tầm quan trọng của việc hiểu rõ và thỏa mãn các cấp độ nhu cầu của đối\n \nphương để họ ở lại và gắn bó, đồng thời ta cũng cần được đáp ứng nhu cầu của mình. Khi cả\n \nhai cùng hướng đến một mục tiêu chung là đáp ứng nhu cầu của khách hàng cuối (bên thứ\n \nba), mối quan hệ sẽ trở nên bền chặt và hiệu quả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Mối quan hệ 3D về nhu cầu (ba chiều): Một mô hình mới để hiểu và xây dựng mối quan</span></div>\n<p class=\"body-txt\">\nhệ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Chiều 1 (Ta đáp ứng nhu cầu của họ):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Chúng ta (A) cần biết rõ khách hàng/đại lý (B) cần gì.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Điều tiên quyết là ta phải đáp ứng nhu cầu của họ trước để giữ họ lại trong hệ thống.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Họ sẽ ở lại khi hai nhu cầu cao nhất của họ được thỏa mãn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Họ sẽ &quot;nghiện&quot; ta khi ba hoặc bốn nhu cầu cao nhất của họ được thỏa mãn.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Để làm được điều này, ta cần thiết kế hệ thống, sản phẩm, mô hình trả thưởng, mô hình</span></div>\n<p class=\"body-txt\">\nđào tạo và cả con người của ta để có thể đáp ứng được các nhu cầu đó (ví dụ: 2/6 nhu\n \ncầu cao nhất để họ ở lại, 4/6 để họ nghiện).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Chiều 2 (Họ đáp ứng nhu cầu của ta):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Là một tổ chức kinh doanh, chúng ta cũng có sáu nhu cầu khác nhau.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Họ (khách hàng/đại lý) cũng phải đáp ứng được các nhu cầu của ta.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Chiều 3 (Cả hai cùng đáp ứng nhu cầu của một đối tượng thứ ba):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Cả hai (ta và họ) cùng đáp ứng nhu cầu của một đối tượng nào đó (ví dụ: khách hàng</span></div>\n<p class=\"body-txt\">\ncuối, gọi là C).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Khi cả hai có mục tiêu chung là đáp ứng nhu cầu của khách hàng (C), mối quan hệ sẽ đạt</span></div>\n<p class=\"body-txt\">\nđến trình độ cao hơn và bền vững hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Tầm quan trọng của việc học về nhu cầu: Hiểu rõ về nhu cầu là việc rất quan trọng trong</span></div>\n<p class=\"body-txt\">\nkinh doanh và xây dựng mối quan hệ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Mô hình &quot;mối quan hệ 3D về nhu cầu&quot;: Diễn giả chia sẻ một khung tư duy rõ ràng về cách</span></div>\n<p class=\"body-txt\">\nxây dựng mối quan hệ dựa trên sự đáp ứng nhu cầu. Nó không chỉ là chiều xuôi (ta phục\n \nvụ khách hàng) mà còn là chiều ngược (khách hàng cũng phải đáp ứng nhu cầu của ta)\n \nvà chiều thứ ba (cùng hướng tới mục tiêu chung). Điều này giúp doanh nghiệp nhìn nhận\n \nmối quan hệ một cách toàn diện, không chỉ đơn phương phục vụ mà còn tạo ra sự cân\n \nbằng và cộng tác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Cấp độ thỏa mãn nhu cầu và hành vi của đối tác: Khái niệm &quot;2 nhu cầu cao nhất được</span></div>\n<p class=\"body-txt\">\nthỏa mãn thì ở lại, 3-4 nhu cầu được thỏa mãn thì nghiện&quot; là một insight rất thực tế. Nó\n \ncho thấy việc hiểu sâu sắc và đáp ứng đúng các nhu cầu cốt lõi sẽ tạo ra mức độ gắn bó\n \nkhác nhau, từ duy trì mối quan hệ đến tạo ra đối tác trung thành, chủ động.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Tạo ra mục tiêu chung với đối tác: Việc cả hai bên cùng hướng tới đáp ứng nhu cầu của</span></div>\n<p class=\"body-txt\">\nmột đối tượng thứ ba (khách hàng cuối) là chìa khóa để xây dựng mối quan hệ đối tác\n \nbền vững và cộng hưởng. Điều này chuyển mối quan hệ từ giao dịch song phương sang\n \nhợp tác ba bên cùng có lợi, tăng cường sự tin tưởng và hiệu quả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Bước một, cái chiều đầu tiên bước một, là ta phải biết rõ họ cần gì và ta đáp ứng cái nhu cầu\n \ncủa họ trước. Đây là điều tiên quyết để giữ họ lại trong hệ thống của chúng ta.”\n \n“Họ sẽ ở lại với ta khi có được hai nhu cầu cao nhất của họ được thỏa mãn.”\n \n“Cả hai cùng đáp ứng nhu cầu của một đối tượng nào đó, hoặc chúng ta còn gọi là có mục tiêu\n \nchung.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Bài 7: 6 Nhu cầu của con người</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Tóm tắt. Buổi giảng này trình bày về 6 nhu cầu cơ bản của con người, từ những nhu cầu</h3>\n<p class=\"body-txt\">\nthiết yếu nhất đến cao cấp hơn. Diễn giả nhấn mạnh rằng việc hiểu và đáp ứng được các nhu\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><p class=\"body-txt\">\ncầu này là chìa khóa để xây dựng một hệ thống vững mạnh, thu hút và giữ chân nhân sự\n \nhoặc đối tác lâu dài. Mức độ thỏa mãn nhu cầu càng cao, hệ thống càng bền vững.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Giới thiệu về 6 nhu cầu cơ bản của con người mà một hệ thống cần đáp ứng để thu hút</span></div>\n<p class=\"body-txt\">\nvà giữ chân người khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Nhu cầu 1: Nhu cầu được sống – Bao gồm các yếu tố cơ bản như ăn, ngủ, nghỉ, an toàn,</span></div>\n<p class=\"body-txt\">\nuống và tình cảm. Đây là nhu cầu tối thiểu, ví dụ để sống được ở thủ đô cần khoảng 5\n \ntriệu đồng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Nhu cầu 2: Nhu cầu về tiền bạc – Có tiền để làm hoặc không làm một điều gì đó. Một hệ</span></div>\n<p class=\"body-txt\">\nthống cần mang lại tiền bạc thực sự cho những người tham gia.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Nhu cầu 3: Nhu cầu được yêu thương, kết nối, quan tâm – Được thuộc về một mối quan</span></div>\n<p class=\"body-txt\">\nhệ, một cộng đồng. Tình cảm và sự gắn kết là yếu tố quan trọng giữ chân con người.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Nhu cầu 4: Nhu cầu danh vọng, được khen ngợi, được công nhận – Thể hiện qua sự vinh</span></div>\n<p class=\"body-txt\">\ndanh, khen thưởng. Cần có một hệ thống khen ngợi với quy trình, tiêu chí rõ ràng (khen\n \nđúng người, đúng việc, đúng KPI).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Diễn giả nhấn mạnh rằng hệ thống nào thỏa mãn được 4 nhu cầu cơ bản này hơn thì sẽ</span></div>\n<p class=\"body-txt\">\ngiữ được nhiều người lâu hơn; người rời đi là vì các nhu cầu này không được đáp ứng\n \nhoặc không tăng trưởng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Nhu cầu 5: Nhu cầu được phát triển – Bao gồm được học tập, gia tăng trí tuệ, sự hiểu</span></div>\n<p class=\"body-txt\">\nbiết. Hệ thống nào tạo cơ hội phát triển sẽ giúp con người tăng trưởng nhanh nhất.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Nhu cầu 6: Nhu cầu được cống hiến – Đây là nhu cầu cao nhất, bậc nhất. Nếu nhu cầu này</span></div>\n<p class=\"body-txt\">\nkhông được thỏa mãn, hệ thống sẽ thiếu người giỏi, không có &quot;tướng&quot; mà chỉ toàn &quot;lính\n \nmới&quot;.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Nhu cầu là động lực cốt lõi để thu hút và giữ chân: Diễn giả lập luận rõ ràng rằng con</span></div>\n<p class=\"body-txt\">\nngười hành động và ở lại một hệ thống dựa trên việc hệ thống đó đáp ứng được các nhu\n \ncầu của họ. Điều này là nền tảng cho mọi chiến lược thu hút và giữ chân nhân tài, đối tác\n \nhay khách hàng, nếu không hiểu, mọi nỗ lực khác có thể vô nghĩa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Các nhu cầu có thứ bậc và sự khác biệt giữa các đối tượng: Không phải ai cũng có cùng</span></div>\n<p class=\"body-txt\">\nnhu cầu ưu tiên; ví dụ, người giàu có thể không cần tiền mà cần danh vọng, sự phát triển,\n \ntrong khi người mới vào cần nhu cầu sống cơ bản. Hiểu được sự khác biệt này giúp thiết\n \nkế hệ thống (sản phẩm, chính sách, văn hóa) phù hợp cho từng nhóm đối tượng, tối ưu\n \nhóa hiệu quả thu hút và giữ chân, tránh thiết kế &quot;một size fits all&quot; kém hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Duy trì sự đáp ứng nhu cầu là yếu tố sống còn của hệ thống: Diễn giả chỉ ra rằng &quot;người</span></div>\n<p class=\"body-txt\">\nta bị mất đi là vì người ta bị mất đi trong các nhu cầu này không được đáp ứng được.&quot;\n \nĐiều này nhấn mạnh rằng việc thỏa mãn nhu cầu không phải là việc làm một lần rồi thôi,\n \nmà phải là một quá trình liên tục và có sự tăng trưởng. Nếu nhu cầu về tiền không tăng\n \ntrưởng được, hoặc nhu cầu kết nối bị suy giảm, người ta sẽ rời đi, đòi hỏi hệ thống phải\n \nliên tục cải thiện và đổi mới.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#00695c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Hệ thống nào mà làm thỏa mãn được bốn cái nhu cầu này hơn thì hệ thống đấy giữ được\n \nnhiều người lâu hơn.”\n \n“Người ta bị mất đi là vì người ta bị mất đi trong các nhu cầu này không được đáp ứng được.”\n \n“Nhu cầu được cống hiến là nhu cầu cao nhất, bậc nhất. Và nếu mà nhu cầu này không được\n \nthỏa mãn thì sau một thời gian các ông không còn người tốt trong hệ thống, toàn người trẻ,\n \ntoàn người mới trong hệ thống, toàn lính, lính mới hết, không có tướng.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Chương 3</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Bài 8: Thế nào là đa cấp?</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Tóm tắt. Buổi học tập trung làm rõ ranh giới giữa mô hình kinh doanh phân phối/thương</h3>\n<p class=\"body-txt\">\nmại truyền thống và mô hình đa cấp, đặc biệt là trong bối cảnh pháp lý hiện hành. Diễn giả\n \nnhấn mạnh các tiêu chí để xác định mô hình đa cấp, đồng thời đưa ra lời khuyên về cách\n \nthiết kế hệ thống kinh doanh để tránh vướng mắc pháp lý hoặc tận dụng tối đa cơ hội nếu có\n \nthể đáp ứng các yêu cầu về đa cấp. Cốt lõi là hiểu rõ cách dòng tiền và quyền lợi được phân\n \nchia qua các cấp.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Con số 5 triệu là con số quan trọng nhất (nghe không rõ ngữ cảnh cụ thể).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Định nghĩa khách hàng: là người trực tiếp lấy hàng từ ta và trả tiền cho ta.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Mô hình kinh doanh đại lý/phân phối một cấp: ta hưởng hoa hồng/chiết khấu ở một cấp</span></div>\n<p class=\"body-txt\">\nduy nhất (ví dụ: B mua của A, bán cho C và hưởng chênh lệch, không có ai khác hưởng\n \nhoa hồng từ C). Đây là hoạt động thương mại thuần túy, hợp pháp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Mô hình đa cấp: hưởng hoa hồng từ hai cấp trở lên (ví dụ: D mua hàng từ C, nhưng B</span></div>\n<p class=\"body-txt\">\ncũng được hưởng hoa hồng từ giao dịch của D).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Một khái niệm khác của đa cấp: không làm gì cả mà vẫn có tiền (nghĩa đen theo cách</span></div>\n<p class=\"body-txt\">\ndiễn giải của diễn giả). Ví dụ: A tuyển B, B mua hàng từ công ty, nhưng A tự động được\n \ntiền mà không cần tham gia vào giao dịch của B.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Mô hình &quot;B mua hàng từ công ty, A tự động được tiền&quot; (ví dụ: affiliate marketing một</span></div>\n<p class=\"body-txt\">\ntầng) hiện tại pháp luật chưa có quy định rõ ràng, có thể là dạng nửa vời giữa đa cấp và\n \nphân phối, cần cân nhắc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Để tránh sự mập mờ, nên chuyển hết sang mô hình bán hàng/phân phối thuần túy (mày</span></div>\n<p class=\"body-txt\">\ncứ mua về, bán cho ai là việc của mày, mày bán cho ai thì mày có tiền người đấy).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Nếu muốn làm đa cấp hợp pháp ở Việt Nam, cần đáp ứng các yêu cầu pháp lý, trong đó</span></div>\n<p class=\"body-txt\">\ncó điều kiện ký quỹ 10 tỷ đồng (là điều kiện cần).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Quan trọng là phải xây dựng hệ thống nhu cầu để giữ chân người trong hệ thống, chứ</span></div>\n<p class=\"body-txt\">\nkhông chỉ dựa vào pháp lý.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Nếu con người trong hệ thống phát triển lên tầm cao mà bản thân doanh nghiệp/công ty</span></div>\n<p class=\"body-txt\">\nkhông phát triển kịp, họ sẽ rời đi (sang đối thủ hoặc tự mở công ty mới).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#00695c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Hiểu rõ định nghĩa và ranh giới giữa phân phối thương mại và đa cấp: Đây là cốt lõi để</span></div>\n<p class=\"body-txt\">\ndoanh nghiệp xây dựng mô hình kinh doanh đúng luật và bền vững. Việc nhầm lẫn hoặc\n \ncố tình lách luật có thể dẫn đến hậu quả pháp lý nghiêm trọng. Pháp luật quy định rõ\n \n&quot;hưởng hoa hồng từ hai cấp trở lên&quot; hoặc &quot;không làm gì mà vẫn có tiền từ giao dịch của\n \ntuyến dưới&quot; là đa cấp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Mô hình &quot;B mua hàng từ công ty, A được tiền&quot; (Affiliate một tầng): Diễn giả chỉ ra rằng</span></div>\n<p class=\"body-txt\">\nđây là một vùng xám pháp lý hiện tại. Điều này quan trọng vì nhiều mô hình kinh doanh\n \nonline hiện đại đang áp dụng hình thức này, và việc nắm rõ rủi ro cũng như cách điều\n \nchỉnh là cần thiết để hoạt động an toàn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Doanh nghiệp và con người cần cùng phát triển: Diễn giả cảnh báo rằng nếu nhân sự/đại</span></div>\n<p class=\"body-txt\">\nlý tuyến dưới phát triển về năng lực, kỹ năng và nhu cầu mà bản thân công ty/người\n \nlãnh đạo không phát triển tương ứng, họ sẽ rời bỏ hệ thống. Đây là bài học về tầm nhìn\n \ndài hạn và sự đầu tư liên tục vào cả bản thân và tổ chức.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Đa cấp tức là hưởng hoa hồng từ hai cấp trở lên thì là đa cấp.”\n \n“Không làm gì cả mà lại có tiền thì là đa cấp.”\n \n“Cái 10 tỷ các ông phải biết ơn cái 10 tỷ bởi vì cái 10 tỷ nó sẽ làm cho những công ty vớ vẩn\n \nđược loại ra khỏi cái danh sách những công ty đa cấp.”\n \n“Khi con người mà phát triển lên tầng cao mà bạn không phát triển được lên tầng cao thì nó\n \nđi cả hệ thống.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Bài 9: Hệ thống hoa hồng</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Tóm tắt. Buổi giảng tập trung vào việc xây dựng một hệ thống kinh doanh đa tầng bền vững,</h3>\n<p class=\"body-txt\">\nđặc biệt là hệ thống hoa hồng. Cốt lõi là phải chăm sóc &quot;gốc rễ&quot; (tầng nhỏ nhất/cuối cùng)\n \nbằng cách đảm bảo thu nhập cạnh tranh, thiết kế hệ thống dễ tham gia cho mọi đối tượng.\n \nĐiểm nhấn quan trọng nhất là tính hợp pháp và tuân thủ các quy định về thuế đầy đủ cho\n \ntừng cá nhân trong hệ thống, nhằm đảm bảo sự trường tồn và chống chịu của doanh nghiệp\n \ntrước các rủi ro pháp lý và kiểm tra.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Thảo luận về hệ thống hoa hồng với các tầng từ A đến E, trong đó E là tầng cuối cùng</span></div>\n<p class=\"body-txt\">\n(khách hàng hoặc người tham gia thấp nhất).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Tầng E được xem là &quot;gốc rễ&quot; của hệ thống; hệ thống muốn mạnh thì gốc phải mạnh.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Thu nhập tối thiểu của tầng E phải bằng hoặc cao hơn thu nhập cao nhất của đối thủ</span></div>\n<p class=\"body-txt\">\ncạnh tranh ở tầng tương ứng trong thị trường để đảm bảo tính cạnh tranh và thu hút.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Hệ thống phải được thiết kế sao cho DỄ, ĐƠN GIẢN, ai cũng có thể tham gia được (không</span></div>\n<p class=\"body-txt\">\nyêu cầu trình độ, giới tính hay ngoại hình).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Đặc biệt cần đảm bảo cả nam giới cũng có thể tham gia, vì điều này giúp họ hiểu và ủng</span></div>\n<p class=\"body-txt\">\nhộ việc người thân (vợ/chồng) tham gia, giúp hệ thống bền vững hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Các thành viên ở tầng cuối cùng (tầng E) phải có khả năng đăng ký pháp lý và tự đăng ký</span></div>\n<p class=\"body-txt\">\nkinh doanh độc lập.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Mỗi cá nhân/thành viên trong hệ thống phải tự chịu trách nhiệm nộp thuế thu nhập (qua</span></div>\n<p class=\"body-txt\">\nhóa đơn bán lẻ, thuế khoán) thay vì công ty tổng gánh vác, để tránh việc cơ quan thuế\n \ntruy thu ngược lên tầng trên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Cần có ý kiến tư vấn của luật sư để xây dựng hệ thống kinh doanh hợp pháp ngay từ đầu,</span></div>\n<p class=\"body-txt\">\ntránh rủi ro pháp lý sau này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Khai thuế đầy đủ và chính xác là điều kiện tiên quyết để công ty &quot;trường tồn&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Hướng dẫn quy trình khai thuế online cho các thành viên.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Doanh nghiệp có thể điều chỉnh giá bán để bao gồm chi phí thuế mà lợi nhuận chưa chắc</span></div>\n<p class=\"body-txt\">\nđã giảm.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Chăm sóc &quot;Gốc rễ&quot; (Tầng E) là yếu tố sống còn: Việc đảm bảo thu nhập tối thiểu và tính</span></div>\n<p class=\"body-txt\">\ncạnh tranh cho tầng thấp nhất (thường là người tham gia mới, đại lý cấp thấp) là nền\n \ntảng. Nếu &quot;bộ rễ&quot; yếu, không đủ động lực hoặc thu nhập, hệ thống sẽ không thể phát\n \ntriển mạnh mẽ và bền vững. Điều này quan trọng vì nó liên quan trực tiếp đến khả năng\n \nthu hút, giữ chân nhân tài và mở rộng mạng lưới.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Thiết kế hệ thống đơn giản, dễ tiếp cận và bao trùm: Một hệ thống càng dễ làm, dễ hiểu,</span></div>\n<p class=\"body-txt\">\nkhông yêu cầu quá nhiều về trình độ hay giới tính, thì càng có thể thu hút lượng lớn\n \nngười tham gia. Điều này giúp tối đa hóa quy mô mạng lưới, tăng khả năng lan tỏa và tạo\n \nra một cộng đồng lớn mạnh, linh hoạt.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Hợp pháp hóa và khai thuế đầy đủ là nguyên tắc không thể thỏa hiệp: Đây là điểm cực kỳ</span></div>\n<p class=\"body-txt\">\nquan trọng và được nhấn mạnh nhiều lần. Bất kỳ sự thiếu minh bạch hay gian lận thuế\n \nnào cũng tiềm ẩn rủi ro pháp lý khổng lồ, có thể dẫn đến truy thu hoặc sụp đổ toàn bộ hệ\n \nthống. Việc tuân thủ pháp luật và khai thuế đầy đủ không chỉ bảo vệ doanh nghiệp mà\n \ncòn xây dựng niềm tin, uy tín và sự trường tồn trong dài hạn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Cái cây nó muốn lớn thì cái gốc nó phải mạnh.”\n \n“Khai thuế đầy đủ thì công ty mới trường tồn.”\n \n“Nó hắt xì hơi một phát tất cả thằng không khai thuế bay hết.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Bài 10: Tập trung vào E</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Tóm tắt. Buổi giảng tập trung vào việc thiết kế một hệ thống kinh doanh hiệu quả để đảm</h3>\n<p class=\"body-txt\">\nbảo đối tác hoặc người bán hàng có thể đạt được mức lợi nhuận mong muốn, thường là 5\n \ntriệu đồng/tháng hoặc hơn, để giữ chân và tạo động lực cho họ. Diễn giả giới thiệu một công\n \nthức cốt lõi để tính toán lợi nhuận dựa trên số lượng khách hàng, tần suất mua, doanh thu\n \ntrung bình trên đơn hàng và tỷ lệ chiết khấu/lợi nhuận. Bằng cách điều chỉnh các yếu tố này,\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><p class=\"body-txt\">\ndoanh nghiệp có thể xây dựng một mô hình kinh doanh hệ thống bền vững, nơi đối tác được\n \ntrao quyền để kiếm được thu nhập hấp dẫn, vượt qua mức 1-2 triệu đồng thực tế mà nhiều\n \nngười đang đạt được, từ đó tránh tình trạng &quot;tuyển vào bao nhiêu thì rụng đi bấy nhiêu&quot;.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Xác định mục tiêu tài chính ban đầu cho công việc bán thời gian là 5 triệu đồng/tháng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Nhận định rằng việc đạt được 5 triệu lợi nhuận bằng cách chỉ tìm 5-7 khách hàng (mỗi</span></div>\n<p class=\"body-txt\">\nkhách 1 triệu lợi nhuận) là &quot;rất khó&quot; với cách làm thông thường.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Vấn đề cốt lõi là phải &quot;thiết kế&quot; sản phẩm hoặc hệ thống sao cho một giao dịch hoặc một</span></div>\n<p class=\"body-txt\">\nkhách hàng có thể đem lại lợi nhuận mong muốn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Giới thiệu công thức tính lợi nhuận: `Lợi nhuận = Số lượng khách hàng x Số lần mua x</span></div>\n<p class=\"body-txt\">\nLợi nhuận trung bình trên đơn hàng`.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Giải thích thêm `Lợi nhuận trung bình trên đơn hàng = Doanh thu (đơn giá) x Phần trăm</span></div>\n<p class=\"body-txt\">\nlợi nhuận (chiết khấu)`.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Để đạt được lợi nhuận mong muốn, cần tăng 4 yếu tố: số lượng khách hàng, số lần mua</span></div>\n<p class=\"body-txt\">\nlại, đơn giá/doanh thu cao, và tỷ lệ lợi nhuận/chiết khấu cao.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Tỷ lệ chiết khấu (tỷ lệ lợi nhuận) tối ưu cho đối tác/người bán được khuyến nghị là 25-</span></div>\n<p class=\"body-txt\">\n30% để đảm bảo họ có động lực và không phá giá. Tỷ lệ dưới 10% họ sẽ không làm, còn\n \n50% có nguy cơ phá giá.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Để đạt 5 triệu lợi nhuận với 25-30% chiết khấu, đối tác cần bán doanh số khoảng 18-20</span></div>\n<p class=\"body-txt\">\ntriệu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Thực trạng hiện tại của nhiều học viên là hệ thống kinh doanh chỉ mang lại lợi nhuận 1-2</span></div>\n<p class=\"body-txt\">\ntriệu đồng/tháng cho đối tác, dẫn đến tỷ lệ rời bỏ cao.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Mục tiêu là phải thiết kế một *hệ thống* để đối tác có thể kiếm được 5 triệu (hoặc thậm</span></div>\n<p class=\"body-txt\">\nchí 10 triệu để họ toàn tâm toàn ý), từ đó giúp doanh nghiệp &quot;bá chủ&quot; trong kinh doanh\n \nhệ thống.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Diễn giả minh họa bằng nhiều ví dụ tính toán thực tế của học viên dựa trên công thức đã</span></div>\n<p class=\"body-txt\">\ncho, chỉ ra rằng con số lợi nhuận hiện tại của nhiều người thường chỉ xoay quanh 1-2\n \ntriệu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Khẳng định lại rằng việc đối tác chỉ kiếm được 1-2 triệu là lý do &quot;tuyển vào bao nhiêu thì</span></div>\n<p class=\"body-txt\">\nnó sẽ rụng đi bấy nhiêu&quot; vì không đủ tiền giữ chân.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Thiết kế hệ thống để tạo ra lợi nhuận đủ hấp dẫn cho đối tác là chìa khóa để giữ chân và</span></div>\n<p class=\"body-txt\">\nphát triển: Diễn giả nhấn mạnh rằng việc đối tác chỉ kiếm được 1-2 triệu/tháng là\n \nnguyên nhân chính khiến họ không gắn bó lâu dài và &quot;rụng đi bấy nhiêu&quot;. Để đối tác &quot;bỏ\n \nluôn công việc hiện tại&quot; và toàn tâm toàn ý, hệ thống phải được thiết kế để mang lại mức\n \nlợi nhuận đáng kể (ví dụ: 5-10 triệu/tháng). Điều này rất quan trọng vì nó chuyển tư duy\n \ntừ chỉ bán sản phẩm sang *xây dựng sự thành công và động lực cho đối tác*, đảm bảo sự\n \nbền vững và mở rộng của mô hình kinh doanh hệ thống.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Công thức 4 yếu tố cung cấp khung phân tích và tối ưu hóa lợi nhuận: Công thức `Lợi</span></div>\n<p class=\"body-txt\">\nnhuận = Số lượng khách hàng x Số lần mua x Doanh thu trung bình x Tỷ lệ lợi nhuận\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><p class=\"body-txt\">\n(chiết khấu)` là một công cụ mạnh mẽ. Việc phân tích và chủ động điều chỉnh từng yếu tố\n \ntrong công thức này cho phép doanh nghiệp thiết kế sản phẩm, chính sách và chiến lược\n \nbán hàng một cách có chủ đích để đạt được mục tiêu lợi nhuận cụ thể cho cả công ty và\n \nđối tác. Nó cung cấp một lộ trình rõ ràng để không chỉ theo dõi mà còn cải thiện hiệu\n \nsuất kinh doanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Mức chiết khấu lý tưởng (25-30%) giúp cân bằng động lực và tránh phá giá: Diễn giả đề</span></div>\n<p class=\"body-txt\">\nxuất mức chiết khấu cho đối tác nên nằm trong khoảng 25-30%. Mức này được coi là\n \n&quot;hợp lý&quot; để đối tác có đủ động lực &quot;máu chiến&quot; mà không dẫn đến tình trạng phá giá sản\n \nphẩm/dịch vụ trên thị trường. Việc đặt đúng tỷ lệ này là rất quan trọng để duy trì cả lợi\n \nnhuận cho đối tác lẫn giá trị thương hiệu và sự ổn định của hệ thống.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Lợi nhuận = Khách hàng nhân số lần mua nhân lợi nhuận trung bình trên đơn hàng.”\n \n“25 đến 30% là con số để họ không phá giá và họ vẫn máu chiến.”\n \n“Các ông sẽ nhận ra một điều rằng là cứ tuyển vào bao nhiêu thì nó sẽ rụng đi bấy nhiêu là bởi\n \nvì nó không có tiền ở lại trong hệ thống.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Bài 11: Phương pháp phân lợi nhuận cho thằng E cuối cùng</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Tóm tắt. Buổi học này tập trung vào cách tăng số lần mua hàng của khách hàng hiện có, một</h3>\n<p class=\"body-txt\">\nyếu tố quan trọng trong công thức doanh thu. Diễn giả trình bày nhiều chiến lược đa dạng,\n \ntừ phát triển sản phẩm tiêu hao, hợp tác kinh doanh, chủ động ra mắt sản phẩm mới, đến\n \ntăng cường chăm sóc khách hàng và tái tiếp thị. Mục tiê
