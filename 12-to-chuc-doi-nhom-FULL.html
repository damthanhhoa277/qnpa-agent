u cốt lõi là duy trì mối quan hệ và\n \nkhuyến khích khách hàng tiếp tục quay lại mua sắm để tối ưu hóa doanh thu và lợi nhuận.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Công thức doanh thu bao gồm: Số lượng khách hàng x Đơn giá trên đơn x Số lần mua x</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Phần trăm lợi nhuận. Trong đó, &quot;phần trăm&quot; (tỷ lệ lợi nhuận) thường cố định hoặc có thể</h3>\n<p class=\"body-txt\">\ntăng, các yếu tố còn lại (số lượng khách hàng, đơn giá, số lần mua) có thể thay đổi được.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Để tăng số lần mua của khách hàng hiện có, có thể áp dụng các chiến lược sau:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bán sản phẩm tiêu hao: Những sản phẩm dùng rồi sẽ hết, mòn hoặc cần thay thế định kỳ,</span></div>\n<p class=\"body-txt\">\nbuộc khách hàng phải mua lại (ví dụ: máy in và mực in).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bán thêm các sản phẩm khác cùng đối tượng khách hàng: Đừng chỉ tập trung vào một</span></div>\n<p class=\"body-txt\">\nsản phẩm duy nhất.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Hợp tác kinh doanh (Join Venture): Hợp tác với các đối tác khác có sản phẩm tương tự,</span></div>\n<p class=\"body-txt\">\ncùng đối tượng thị trường để mở rộng danh mục sản phẩm, đặc biệt là sản phẩm tiêu\n \nhao.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Chiến lược hợp tác ba bên: Mình đáp ứng nhu cầu của họ trước -&gt; Họ đáp ứng nhu cầu</span></div>\n<p class=\"body-txt\">\ncủa mình -&gt; Cả hai cùng đáp ứng nhu cầu chung của thị trường.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Chủ động tung ra sản phẩm mới theo chu kỳ (chiến lược gối đầu): Ra mắt phiên bản mới</span></div>\n<p class=\"body-txt\">\nđịnh kỳ, đồng thời bán sản phẩm cũ song song và rút dần khi doanh số giảm (ví dụ: các\n \ndòng điện thoại Samsung Note, Galaxy S).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Nghiên cứu nhu cầu mới: Tìm hiểu và sáng tạo sản phẩm mới dựa trên những nhu cầu</span></div>\n<p class=\"body-txt\">\nchưa được đáp ứng của cùng một thị trường mục tiêu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Tăng cường hệ thống chăm sóc khách hàng từ trung tâm: Tự xây dựng hoặc thuê ngoài</span></div>\n<p class=\"body-txt\">\ndịch vụ chăm sóc khách hàng độc lập, thay vì để đại lý tự chăm sóc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Xây dựng hệ thống trúng thưởng: Khuyến khích khách hàng cung cấp thông tin liên hệ</span></div>\n<p class=\"body-txt\">\n(số điện thoại, email) để nhận thưởng, sau đó sử dụng thông tin này để chăm sóc họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Hệ thống thưởng nên có hai cấp: thưởng ngay (dễ nhận, tỷ lệ cao ~60%) và thưởng cao</span></div>\n<p class=\"body-txt\">\ncấp (tỷ lệ thấp, giá trị lớn, ví dụ 1/10000). Chi phí cho hệ thống này hợp lý là khoảng\n \n10% tổng lợi nhuận.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Hệ thống quảng cáo lại (Remarketing) cho khách hàng đã mua:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Phương pháp cổ điển: Gửi thư tay, thực hiện &quot;site visit&quot; (người của công ty trực tiếp đến</span></div>\n<p class=\"body-txt\">\nthăm khách hàng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Quảng cáo kỹ thuật số: Sử dụng Google Ads, Facebook Ads để bám đuổi và nhắc nhở</span></div>\n<p class=\"body-txt\">\nkhách hàng đã mua, đặc biệt là vào thời điểm sản phẩm của họ sắp hết hạn sử dụng hoặc\n \ncần thay thế.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Ứng dụng riêng (app riêng): Phát triển ứng dụng để gửi thông báo (notify/push) trực</span></div>\n<p class=\"body-txt\">\ntiếp lên màn hình điện thoại của khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Tin nhắn (SMS/Email): Gửi tin nhắn tự động với kịch bản được soạn sẵn để chăm sóc và</span></div>\n<p class=\"body-txt\">\nnhắc nhở khách hàng (ví dụ: nhắc thay lõi lọc nước định kỳ).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Tối ưu &quot;Số lần mua&quot; để tăng trưởng bền vững: Diễn giả nhấn mạnh rằng việc tăng số</span></div>\n<p class=\"body-txt\">\nlượng khách hàng mới và đơn giá thường đòi hỏi chi phí và nỗ lực lớn. Trong khi đó, việc\n \ntăng &quot;số lần mua&quot; từ khách hàng hiện có là một đòn bẩy hiệu quả, giúp giảm chi phí\n \nmarketing, xây dựng lòng trung thành và tạo ra dòng doanh thu lặp lại (recurring\n \nrevenue) ổn định.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Sản phẩm &quot;tiêu hao&quot; và mô hình hợp tác tạo lợi thế cạnh tranh: Phát triển hoặc hợp tác</span></div>\n<p class=\"body-txt\">\nđể cung cấp các sản phẩm/dịch vụ có tính &quot;tiêu hao&quot; (cần sử dụng lại, thay thế) là một\n \nchiến lược then chốt. Điều này đảm bảo khách hàng phải quay lại thường xuyên, tăng giá\n \ntrị trọn đời của khách hàng (Customer Lifetime Value - LTV) và giữ chân họ khỏi đối thủ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Chăm sóc khách hàng chủ động và tái tiếp thị thông minh là bắt buộc: Thay vì chờ đợi</span></div>\n<p class=\"body-txt\">\nkhách hàng, doanh nghiệp cần chủ động duy trì mối quan hệ và nhắc nhở họ mua lại\n \nthông qua các kênh đa dạng (từ thư tay, site visit đến app, SMS, email, quảng cáo bám\n \nđuổi). Việc này không chỉ củng cố thương hiệu mà còn đảm bảo khách hàng tái mua\n \nđúng thời điểm và không chuyển sang đối thủ cạnh tranh.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Bán máy thì rẻ, nhưng mực in thì đắt.”\n \n“6 tháng sau chồng nâng cấp, 6 tháng sau vợ nâng cấp và cứ như vậy, thì 1 năm một người\n \nđàn ông trung bình anh ta sẽ mua hai cái điện thoại.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Anh ơi, chiều nay 6 giờ hay 8 giờ thay lõi lọc của anh là hợp lý. Mình bảo lõi lọc nào? Bảo lõi\n \nlọc của anh thay 3 tháng trước, ngày hôm nay là ngày cuối cùng mà cái lõi này cần phải thay\n \nđể đảm bảo sức khỏe cho cả nhà anh.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Bài 12: Tăng doanh thu trung bình trên một đơn hàng</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Tóm tắt. Buổi học này tập trung vào các chiến lược để tăng doanh thu trung bình, đặc biệt là</h3>\n<p class=\"body-txt\">\nthông qua việc tối ưu hóa cách bán hàng. Các chiến lược chính bao gồm Up-sell (bán thêm\n \nsản phẩm cao hơn), Down-sell (bán sản phẩm thay thế giá thấp hơn), và Combo (đóng gói\n \nnhiều sản phẩm với giá ưu đãi). Diễn giả nhấn mạnh tầm quan trọng của việc xây dựng kịch\n \nbản, huấn luyện đội ngũ và liên tục kiểm tra để đạt được hiệu quả tối đa.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Tăng doanh thu trung bình: Bằng các chiến lược bán hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Up-sell (Bán thêm):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bán thêm sản phẩm chính, phải có kịch bản và huấn luyện toàn bộ hệ thống.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Câu hỏi luôn phải là &quot;Anh ăn thêm một trứng hay hai trứng?&quot; chứ không phải &quot;Anh có ăn</span></div>\n<p class=\"body-txt\">\nthêm trứng không?&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Nếu khách mua thì tiếp tục up-sell.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Mục tiêu up-sell khoảng 3 lần hoặc nhiều hơn để tăng 20% doanh thu trung bình.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Down-sell (Bán giảm giá/thay thế):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Nếu khách hàng không mua sản phẩm chính, giới thiệu một sản phẩm tương tự thay thế,</span></div>\n<p class=\"body-txt\">\nít tính năng hơn với kinh phí ít hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Combo (Đóng gói sản phẩm):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Đóng gói nhiều sản phẩm lại với nhau nhằm gia tăng doanh số.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Combo phải có giá tiết kiệm hơn so với mua lẻ từng sản phẩm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Để thực hiện combo, chủ động tách sản phẩm chính thành nhiều sản phẩm phụ với</span></div>\n<p class=\"body-txt\">\nnhiều sự thay đổi về thành phần bên trong (ví dụ: bộ dưỡng da từ 1 sản phẩm thành 5\n \nsản phẩm khác nhau: tẩy da chết, serum, giữ ẩm, se khít chân lông, kem ngày, kem đêm,\n \ncân bằng pH, thải độc, mặt nạ).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Đưa ra các lựa chọn combo hợp lý về số lượng: bộ 1, bộ 3, bộ 5, bộ 7 sản phẩm (ví dụ: giá</span></div>\n<p class=\"body-txt\">\n1tr, 2.5tr, 4.5tr, 5tr).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Thay đổi bao bì: Đầu tư thật nhiều vào bao bì sản phẩm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Thay đổi thị trường: Chủ động thay đổi thị trường để gia tăng doanh số và lợi nhuận.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Chiến lược Up-sell chủ động và liên tục: Việc chủ động đưa ra lựa chọn &quot;một hay hai&quot;</span></div>\n<p class=\"body-txt\">\nthay vì &quot;có hay không&quot; sẽ định hướng khách hàng mua thêm, tối ưu hóa cơ hội tăng\n \ndoanh thu ngay lập tức. Việc áp dụng up-sell liên tục khi khách hàng đã quyết định mua\n \nsẽ giúp tăng doanh thu đáng kể (diễn giả nói 20%) chỉ từ một giao dịch. Điều này quan\n \ntrọng vì nó khai thác tối đa giá trị từ mỗi khách hàng hiện có mà không tốn chi phí tìm\n \nkiếm khách hàng mới.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Đóng gói Combo sản phẩm phụ một cách chiến lược: Thay vì chỉ bán một sản phẩm, việc</span></div>\n<p class=\"body-txt\">\nchia nhỏ và tạo thành các gói combo từ sản phẩm phụ giúp khách hàng cảm thấy có\n \nnhiều lựa chọn, giá trị hơn và sẵn sàng chi trả nhiều hơn. Cách tiếp cận này không chỉ\n \ntăng giá trị đơn hàng mà còn có thể giúp giải quyết vấn đề tồn kho hoặc giới thiệu các\n \nsản phẩm liên quan một cách hiệu quả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Không phải là anh ăn thêm trứng hay không mà câu hỏi luôn phải là anh ăn thêm một trứng\n \nhay hai trứng.”\n \n“Nếu up-sell mà vẫn mua thì up-sell tiếp.”\n \n“Combo phải có giá tiết kiệm hơn so với sản phẩm mua lẻ từng sản phẩm.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Bài 13: Viral video</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Tóm tắt. Buổi giảng này tập trung vào chiến lược marketing &quot;Mass&quot; (quảng bá số lượng lớn)</h3>\n<p class=\"body-txt\">\nđể đưa sản phẩm đến đại lý và người tiêu dùng cuối cùng. Diễn giả nhấn mạnh tầm quan\n \ntrọng của các hoạt động tài trợ diện rộng và sản xuất video viral. Cốt lõi là đảm bảo thương\n \nhiệu xuất hiện với tần suất và thời lượng đáng kể trong các nội dung này, với lời khuyên nên\n \nsao chép, sáng tạo lại các kịch bản thành công và sản xuất số lượng lớn video viral một cách\n \nnhanh chóng, hiệu quả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Chiến lược Marketing Mass: Để sản phẩm bán tốt qua đại lý, cần tập trung vào việc</span></div>\n<p class=\"body-txt\">\nquảng bá số lượng lớn cho nhiều người biết đến thương hiệu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Hoạt động tài trợ diện rộng:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Bao gồm các hoạt động như tài trợ thể thao, thi hoa hậu, tức là những sự kiện được</span></div>\n<p class=\"body-txt\">\ntruyền thông lớn trên diện rộng, có hàng triệu người xem.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Phân biệt với các video viral nhỏ lẻ chỉ vài triệu view, vì những video đó chủ yếu bám</span></div>\n<p class=\"body-txt\">\nvào nội dung, hình ảnh thương hiệu chui vào đầu khách hàng rất ít.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Sản xuất Video Viral:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Tần suất và thời lượng xuất hiện của thương hiệu trong video viral là quan trọng, không</span></div>\n<p class=\"body-txt\">\nchỉ là số lượt view. Một video 5 phút mà thương hiệu chỉ xuất hiện 1-2 lần là không đủ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Cách đơn giản nhất để tạo video viral là xem video viral của Thái Lan (hoặc các nước</span></div>\n<p class=\"body-txt\">\nkhác), sao chép kịch bản và nhái lại (sáng tạo lại cho phù hợp với Việt Nam).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Có thể thuê các bên ngoài sản xuất với chi phí khoảng 100 triệu/video hoặc tự sản xuất</span></div>\n<p class=\"body-txt\">\n(vài triệu/video).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Cần sản xuất số lượng lớn (ví dụ: 150 video mỗi 4 tháng) với kịch bản đàng hoàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Sản xuất nhanh chóng (ví dụ: 150 video trong 3-4 ngày) và tái sử dụng chúng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Về thiết bị, không cần quá cầu kỳ, có thể dùng điện thoại để quay video ngắn (vài giây),</span></div>\n<p class=\"body-txt\">\ncác thiết bị chuyên nghiệp chỉ để giúp người quay nhàn hơn hoặc quay thời lượng dài.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">★ Điểm quan trọng nhất</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Chiến lược Mass Marketing và Tầm quan trọng của Tần suất/Thời lượng: Diễn giả nhấn</span></div>\n<p class=\"body-txt\">\nmạnh rằng việc quảng bá phải diện rộng và có tính phủ sóng cao (ví dụ: tài trợ thể\n \nthao/hoa hậu) chứ không chỉ là các video viral &quot;tự phát&quot; hoặc ít lượt xem. Quan trọng\n \nhơn, đối với video viral, không chỉ là số lượt xem mà là thương hiệu xuất hiện bao nhiêu\n \nlần và trong bao lâu trong video. Điều này quan trọng vì nó định hướng doanh nghiệp\n \nkhông nên chỉ chạy theo lượt view ảo mà phải tập trung vào hiệu quả nhận diện thương\n \nhiệu thực sự trong tâm trí khách hàng mục tiêu, đảm bảo thông điệp được khắc sâu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Sao chép, Sáng tạo lại Kịch bản thành công: Lời khuyên &quot;xem video viral của Thái Lan,</span></div>\n<p class=\"body-txt\">\nsao chép kịch bản và nhái lại&quot; là một insight rất thực tế và giá trị. Nó cho thấy con đường\n \nnhanh nhất để thành công là học hỏi từ người dẫn đầu và tối ưu hóa theo thị trường của\n \nmình, thay vì cố gắng tự tạo ra cái mới từ đầu. Điều này giúp tiết kiệm thời gian, công\n \nsức và giảm thiểu rủi ro, đồng thời tận dụng được các công thức đã được chứng minh\n \nhiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Sản xuất số lượng lớn và Nhanh chóng: Việc sản xuất 150 video trong 3-4 ngày và tái sử</span></div>\n<p class=\"body-txt\">\ndụng chúng là một chiến lược về tối ưu hóa quy trình và nội dung. Nó cho thấy tầm quan\n \ntrọng của việc có một quy trình sản xuất hiệu quả, có kịch bản rõ ràng để liên tục cung\n \ncấp nội dung, giữ chân khán giả và tạo độ phủ. Trong môi trường truyền thông số, việc\n \nduy trì sự hiện diện liên tục và dồi dào là chìa khóa để cạnh tranh.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Để cái sản phẩm của các ông mà bán cho đại lý ở phía cuối họ bán tốt ấy thì các ông phải tập\n \ntrung vào Mass. Tức là tập trung vào quảng bá số lượng lớn cho nhiều người biết đến thương\n \nhiệu của chúng ta.”\n \n“Trong cái video viral đấy thì thương hiệu của chúng ta xuất hiện với tần suất bao nhiêu và\n \nthời khoảng thời gian là bao nhiêu?”\n \n“Cách đơn giản nhất ấy để tạo ra được video viral nhá. Dễ nhất là xem video viral của Thái\n \nLan, sau đó sao chép kịch bản và nhái lại.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Bài 14: Xuất hiện trên mạng xã hội với tần xuất cao nhất</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Tóm tắt. Buổi giảng tập trung vào chiến lược xuất hiện đa kênh và liên tục trên các nền tảng</h3>\n<p class=\"body-txt\">\nmạng xã hội và blog cá nhân để xây dựng danh tiếng và vị thế lãnh đạo. Cốt lõi là nội dung\n \nphải &quot;thật&quot; và &quot;có ý nghĩa&quot;, mang lại giá trị chuyển hóa cho người xem, đồng thời phải được\n \nđo lường hiệu quả bằng các KPI phù hợp (lượt share, phút xem, lượt truy cập) thay vì các chỉ\n \nsố ảo. Mọi hoạt động online cần có kịch bản rõ ràng, liên kết với nhau và hướng tới hệ thống\n \nchăm sóc khách hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Cần sản xuất nội dung và xuất hiện trên mạng xã hội với tần suất và cường độ cao nhất.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Phải xuất hiện trên các nền tảng chính sau:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Facebook: KPI quan trọng nhất là &quot;lượt share&quot; (không phải lượt like). Tập trung phát</span></div>\n<p class=\"body-txt\">\ntriển Facebook Page, bơm tiền vào các nội dung hay để viral nhanh hơn.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">YouTube: KPI là &quot;số phút được xem&quot;. Cần tập trung đầu tư vào YouTube.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Instagram: KPI là &quot;lượt follow&quot;. Đặc biệt quan trọng đối với các sản phẩm/dịch vụ dành</span></div>\n<p class=\"body-txt\">\ncho nữ giới.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Blog riêng cá nhân: Mang tên mình, KPI là &quot;số lượt visit&quot; (lượt truy cập trang).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Tất cả các hệ thống/kênh này phải liên kết chặt chẽ với nhau và dẫn đến hệ thống chăm</span></div>\n<p class=\"body-txt\">\nsóc khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Phải xuất hiện đa kênh, trên tất cả các kênh, theo một kịch bản/chiến lược đàng hoàng,</span></div>\n<p class=\"body-txt\">\nkhông phải ngẫu hứng hay tùy tiện.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Cần có đo lường KPI cho từng bộ phận và có một media team riêng để hỗ trợ việc xuất</span></div>\n<p class=\"body-txt\">\nhiện.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Nội dung &quot;đẹp không đủ, mà phải có ý nghĩa&quot; – tức là sau khi xem hoặc đọc, người dùng</span></div>\n<p class=\"body-txt\">\nphải có sự chuyển biến hoặc chuyển hóa nào đó, nội dung phải mang lại giá trị cho họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Là một &quot;boss tổng&quot; (người đứng đầu), bạn phải trở thành một nhà lãnh đạo và có kênh</span></div>\n<p class=\"body-txt\">\nphát ngôn riêng của mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Tất cả mọi thứ làm ở trên mạng phải &quot;100% là thật&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Tuyệt đối không &quot;mua like&quot; hay sử dụng các trò lừa đảo vì sẽ làm giảm uy tín và chỉ lừa</span></div>\n<p class=\"body-txt\">\nđược những người &quot;ngu dốt&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Sự thật và ý nghĩa là hai yếu tố cốt lõi để nâng cao danh tiếng và uy tín cá nhân/doanh</span></div>\n<p class=\"body-txt\">\nnghiệp.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Chất lượng nội dung phải &quot;Thật&quot; và &quot;Có ý nghĩa&quot;: Đây là nền tảng cho mọi hoạt động</span></div>\n<p class=\"body-txt\">\ntruyền thông và marketing online. &quot;Đẹp không đủ, mà phải có ý nghĩa.&quot; và &quot;Tất cả mọi\n \nthứ làm ở trên mạng 100% phải là thật.&quot; cho thấy sự chân thành và giá trị nội dung là\n \nyếu tố sống còn để xây dựng niềm tin và mối quan hệ bền vững với khách hàng. Nó loại\n \nbỏ tư duy chạy theo số liệu ảo và tập trung vào việc tạo ra tác động thực sự.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Đo lường KPI theo tương tác thực tế: Thay vì tập trung vào &quot;lượt like&quot; phù phiếm, bài</span></div>\n<p class=\"body-txt\">\ngiảng nhấn mạnh vào &quot;lượt share&quot; trên Facebook và &quot;số phút được xem&quot; trên YouTube.\n \nĐiều này rất quan trọng vì nó định hướng việc sản xuất nội dung có giá trị lan tỏa, thu\n \nhút sự chú ý sâu sắc và giữ chân người dùng, thể hiện nội dung đó thực sự hữu ích và\n \ngây được ảnh hưởng, chứ không chỉ là tương tác hời hợt.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Xây dựng thương hiệu cá nhân của người lãnh đạo: &quot;Mình là một boss tổng thì mình phải</span></div>\n<p class=\"body-txt\">\nlà trở thành một nhà lãnh đạo và mình phải có cái kênh phát ngôn riêng của mình.&quot; Đây\n \nlà một insight đắt giá cho thấy vai trò không thể thiếu của người lãnh đạo trong việc xây\n \ndựng thương hiệu. Kênh phát ngôn riêng (blog, các mạng xã hội cá nhân) giúp thể hiện\n \ntầm nhìn, uy tín và sự chuyên nghiệp, tạo dựng ảnh hưởng cá nhân song song với\n \nthương hiệu công ty, từ đó thu hút và định vị được tệp khách hàng mục tiêu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Không phải bao nhiêu lượt like nha, bao nhiêu lượt share.”\n \n“Đẹp không đủ, mà phải có ý nghĩa.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Tất cả mọi thứ làm ở trên mạng 100% phải là thật.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Bài 15: Xây dựng mô hình 5 triệu</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Tóm tắt. Buổi này tập trung vào việc xây dựng hệ thống kinh doanh bền vững thông qua</h3>\n<p class=\"body-txt\">\nviệc xây dựng thương hiệu online và tạo ra thu nhập ổn định cho đội ngũ. Diễn giả nhấn\n \nmạnh tầm quan trọng của việc duy trì và tăng tỷ lệ khách hàng quay lại mua hàng, đồng thời\n \nkhuyến khích tạo ra một hệ thống giới thiệu khách hàng để phát triển doanh số. Cốt lõi là\n \nthay đổi tư duy từ bán hàng cho bản thân sang bán hàng để hỗ trợ đội ngũ cuối cùng, giúp họ\n \nđạt được thu nhập ổn định và tăng trưởng theo thời gian.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Không cần trực tiếp bán hàng: Các ông không nhất thiết phải là người bán, hãy để đại lý</span></div>\n<p class=\"body-txt\">\nbên dưới họ bán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Tạo hệ thống dễ truy cập: Cần có hệ thống để khách hàng dễ dàng truy cập và mua hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Đo lường tỷ lệ chuyển đổi: Cần đo lường được tỷ lệ chuyển đổi trung bình của người mới</span></div>\n<p class=\"body-txt\">\ntham gia (ví dụ: 20%).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Quan trọng khách hàng quay lại: Nếu chỉ bán một lần và khách hàng không quay lại, hệ</span></div>\n<p class=\"body-txt\">\nthống sẽ sụp đổ khi khai thác hết mối quan hệ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Hệ thống Referral Marketing: Phải có một hệ thống giới thiệu khách hàng (khách hàng</span></div>\n<p class=\"body-txt\">\ngiới thiệu khách hàng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Tập trung xây dựng thương hiệu online cho sản phẩm: Đây là cách rẻ tiền nhất.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Thay đổi tư duy xây dựng thương hiệu: Không phải cho bản thân mà là cho &quot;thằng cuối</span></div>\n<p class=\"body-txt\">\ncùng&quot; (đội ngũ bán hàng/đại lý).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Công thức thu nhập ổn định: Tìm ra công thức để xây dựng thu nhập ổn định (ví dụ: 5</span></div>\n<p class=\"body-txt\">\ntriệu/người).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Chiến lược tăng đơn giá trung bình (Upsell/Combo): Không chỉ bán sản phẩm giá thấp</span></div>\n<p class=\"body-txt\">\n(entry-level 300k), mà phải dạy cho đội ngũ cách upsell, combo, và các gói sản phẩm để\n \nnâng đơn giá trung bình (ví dụ: lên 500k).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Nỗ lực tăng tỷ lệ mua lại: Nâng tỷ lệ mua hàng lên khoảng 1.5 lần/tháng để tăng doanh</span></div>\n<p class=\"body-txt\">\nsố (ví dụ: từ 2.8 triệu lên 4.2 triệu, rồi 5-7 triệu).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Duy trì tỷ lệ khách hàng quay lại: Đảm bảo khách hàng đã mua hàng quay trở lại mua</span></div>\n<p class=\"body-txt\">\ntrong vòng 30-45 ngày (ví dụ: cứ hai người đã mua có một người mua lại).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Giới hạn số lượng khách hàng chăm sóc: Một người chỉ có thể chăm sóc tối đa 40 người,</span></div>\n<p class=\"body-txt\">\nkhuyến khích trong phạm vi 20 người để duy trì chất lượng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Mục tiêu thu nhập cho người mới: Người mới vào cần có 10-15 khách hàng. Nếu một</span></div>\n<p class=\"body-txt\">\nkhách hàng mang lại khoảng 125,000 VND (25% của 500k) thì cần 20 khách để đạt 2.5\n \ntriệu/tháng (nếu là 250k lợi nhuận/khách). Nếu đơn giá 180k/khách thì cần 40 khách\n \nđể duy trì thu nhập.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Chuyển đổi tư duy: Xây dựng cho &quot;thằng cuối cùng&quot;: Thay vì chỉ tập trung vào lợi nhuận</span></div>\n<p class=\"body-txt\">\ncá nhân hay của công ty mẹ, buổi giảng nhấn mạnh việc xây dựng hệ thống (thương hiệu,\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><p class=\"body-txt\">\nsản phẩm, chiến lược) để hỗ trợ &quot;thằng cuối cùng&quot; (đại lý, người bán hàng trực tiếp) đạt\n \nđược thu nhập ổn định và tăng trưởng. Điều này quan trọng vì nó tạo ra động lực và sự\n \nbền vững cho toàn bộ mạng lưới phân phối, đảm bảo hệ thống tự vận hành và phát triển.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Khách hàng quay lại và Referral Marketing: Diễn giả chỉ rõ rằng một hệ thống kinh</span></div>\n<p class=\"body-txt\">\ndoanh không bền vững nếu khách hàng chỉ mua một lần rồi không quay lại. Điểm mấu\n \nchốt là phải có chiến lược để khách hàng cũ liên tục mua lại (trong 30-45 ngày) và quan\n \ntrọng hơn là giới thiệu khách hàng mới (Referral Marketing). Điều này tạo ra dòng tiền\n \nvà khách hàng ổn định, giảm chi phí tìm kiếm khách hàng mới.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Tối ưu hóa đơn giá trung bình và gói sản phẩm: Việc tập trung vào chiến lược upsell,</span></div>\n<p class=\"body-txt\">\ncombo và các gói sản phẩm đa dạng để nâng đơn giá trung bình từ 300k lên 500k (hoặc\n \nhơn) là cực kỳ quan trọng. Nó giúp tăng doanh thu trên mỗi khách hàng hiện có mà\n \nkhông cần tăng số lượng khách hàng mới, từ đó tăng lợi nhuận và giúp người bán đạt\n \nđược mục tiêu thu nhập nhanh hơn và bền vững hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Nhưng mà các ông đừng không nhất thiết phải làm người bán. Hãy để cho đại lý bên dưới họ\n \nbán.”\n \n“Đây là sự thay đổi rất lớn trong nhận thức của chúng ta. Nếu anh chị em làm được điều này ví\n \ndụ mình là boss tổng, mình tập trung vào xây dựng thằng cuối cùng thì mình sẽ phát triển lên\n \nrất là nhanh.”\n \n“Cứ hai người đã mua có một người mua lại, đó là điều tuyệt vời.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Bài 16: Các con số để xây dựng hệ thống</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Tóm tắt. Buổi học này tập trung vào việc thiết lập và tối ưu hóa các con số quan trọng trong</h3>\n<p class=\"body-txt\">\nkinh doanh, đặc biệt là trong marketing và bán hàng. Diễn giả đưa ra các giới hạn và con số\n \nhợp lý cho số lượng khách hàng, giá trị đơn hàng khởi điểm và tần suất mua lặp lại để doanh\n \nnghiệp có thể phát triển bền vững và tạo động lực cho đội ngũ. Mục tiêu là để khách hàng\n \nquay vòng và đảm bảo đủ kinh phí để hoạt động, tránh tình trạng quá tải hoặc không đủ chi\n \nphí.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Các con số cần nhớ để thiết kế hệ thống:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Số lượng khách hàng tối đa: Nên nằm trong khoảng 20-40 khách hàng (bao gồm cả</span></div>\n<p class=\"body-txt\">\nkhách cũ và khách mới) cho một người quản lý/phục vụ. Vượt quá 40 khách hàng là quá\n \ntải.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Số lượng khách hàng mới tăng thêm hàng tháng: Khoảng từ 10-15 khách hàng là quá tải</span></div>\n<p class=\"body-txt\">\ncho một người.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Lý do giới hạn số lượng khách hàng mới: Khách hàng cũ có thể mất đi, nên cần bổ sung</span></div>\n<p class=\"body-txt\">\nmột lượng khách hàng mới nhưng việc bổ sung quá nhiều sẽ khó khăn. Mục tiêu là để có\n \nđộng lực mở thêm khách hàng mới.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Giá trị đơn hàng khởi điểm (entry): Lanh quanh trong khoảng từ 500 đến 700 (đơn vị</span></div>\n<p class=\"body-txt\">\ntiền tệ không xác định rõ, có thể là nghìn hoặc triệu) là hợp lý.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Nhỏ hơn 500: Không đủ kinh phí để làm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Lớn hơn 700: Khó làm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Có thể up-sell lên 2 triệu, 5 triệu, 10 triệu tùy sản phẩm/dịch vụ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Mức giá này là mức có thể làm được trên online.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Số lần mua trung bình: Đạt khoảng từ 1.2 đến 1.5 lần là hợp lý.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">1.2 lần: Tương đương 25 ngày thì hết một đơn (sản phẩm/dịch vụ được dùng hết).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">1.5 lần: Tương đương 20 ngày thì hết một đơn (sản phẩm/dịch vụ được dùng hết).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Lý do cần thiết kế để khách hàng mua lại &gt;1 lần: Để tránh việc khách hàng/đại lý bán đủ</span></div>\n<p class=\"body-txt\">\nthì dừng, không tiếp tục phát triển. Cần có những lượng khách ngắn hơn một tháng để\n \nhọ còn chăm tiếp, tức là một khách phải được chăm 2 lần một tháng để họ quay vòng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Thiết lập giới hạn số lượng khách hàng/đơn hàng để tối ưu hiệu suất: Việc giới hạn số</span></div>\n<p class=\"body-txt\">\nlượng khách hàng tối đa (20-40) và số lượng khách hàng mới tăng thêm (10-15) cho\n \nmột cá nhân/đội ngũ là cực kỳ quan trọng. Điều này giúp tránh tình trạng quá tải, đảm\n \nbảo chất lượng dịch vụ và chăm sóc khách hàng tốt, từ đó duy trì mối quan hệ lâu dài và\n \ntạo động lực cho việc tìm kiếm khách hàng mới một cách có chọn lọc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Xác định mức giá &quot;entry&quot; hợp lý: Khoảng 500-700 (đơn vị tiền tệ) cho đơn hàng đầu tiên</span></div>\n<p class=\"body-txt\">\nlà con số vàng. Nếu quá thấp, doanh nghiệp không đủ chi phí hoạt động; nếu quá cao,\n \nkhách hàng khó tiếp cận. Đây là điểm khởi đầu quan trọng để thu hút khách hàng và sau\n \nđó có thể áp dụng chiến lược up-sell để tăng giá trị trọn đời của khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Tối ưu hóa tần suất mua lặp lại (churn rate): Việc thiết kế sản phẩm/dịch vụ sao cho</span></div>\n<p class=\"body-txt\">\nkhách hàng cần mua lại trong khoảng 20-25 ngày (tức là số lần mua trung bình 1.2-1.5\n \nlần) là chìa khóa để tạo dòng tiền ổn định và tăng trưởng bền vững. Điều này không chỉ\n \ngiúp duy trì doanh thu mà còn đảm bảo khách hàng luôn có nhu cầu và gắn bó với\n \nthương hiệu, tránh tình trạng &quot;bán đủ thì dừng&quot;.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Số lượng khách hàng nên nằm ở trong khoảng 20, maximum là 40. Họ sẽ không vượt qua\n \nđược con số này.”\n \n“Một đơn hàng lanh quanh trong khoảng từ 500 đến 700 là hợp lý. Nhỏ hơn 500 thì họ không\n \ncó đủ kinh phí để làm. Lớn hơn 700 thì họ khó làm.”\n \n“Tại sao chúng ta lại phải thiết kế lớn hơn một? Bởi vì không thì khách hàng của chúng ta, đại\n \nlý của chúng ta, họ theo thói quen bán đủ họ dừng.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Bài 17: Đãi vàng trong cát</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Tóm tắt. Buổi này tập trung vào chiến lược &quot;có 20 giữ 20&quot; khách hàng, tức là làm sao để</h3>\n<p class=\"body-txt\">\ntăng trưởng và giữ chân 20 khách hàng đầu tiên, sau đó tiếp tục tìm kiếm và thăng cấp các\n \nkhách hàng tiềm năng. Mục tiêu chính là đúc kết một &quot;câu thần chú&quot; để chuyển đổi khách\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><p class=\"body-txt\">\nhàng từ việc sử dụng sản phẩm miễn phí sang khách hàng trả phí, và từ đó nâng cấp họ trở\n \nthành những người có thêm thu nhập trong hệ thống. Diễn giả nhấn mạnh việc &quot;đãi vàng\n \ntrong cát&quot; – tìm ra những nhân tố tích cực trong số đông khách hàng và đề xuất họ thăng\n \ntiến, đồng thời thưởng cho những người có công đề xuất.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Chiến lược &quot;có 20 giữ 20&quot;: Ban đầu tập trung vào việc tăng trưởng để đạt được 20 khách</span></div>\n<p class=\"body-txt\">\nhàng, sau đó tiếp tục giữ được 20 khách hàng đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Mục tiêu: Có 20 khách hàng mua hàng và giữ được 20 khách hàng mua hàng thường</span></div>\n<p class=\"body-txt\">\nxuyên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Công việc chính: Tập trung vào khách hàng, sau đó cho họ thăng tiến trên sơ đồ trả</span></div>\n<p class=\"body-txt\">\nthưởng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Câu thần chú 1: &quot;Anh có muốn dùng sản phẩm này miễn phí không?&quot; (áp dụng cho khách</span></div>\n<p class=\"body-txt\">\nhàng ban đầu).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Câu thần chú 2 (sau khi họ đã dùng miễn phí): &quot;Anh có muốn có thêm thu nhập không?&quot;</span></div>\n<p class=\"body-txt\">\n(để nâng cấp khách hàng lên level cao hơn).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Vai trò của một &quot;boss&quot;: &quot;Đãi vàng trong cát&quot; – tìm ra những nhân tố tích cực trong hệ</span></div>\n<p class=\"body-txt\">\nthống (hàng ngàn người) để promote (thăng tiến) họ lên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Cách thăng tiến: Coi việc thăng tiến của những người trong hệ thống là đương nhiên.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Khuyến khích đề xuất: Cho họ một khoản tiền thưởng nếu họ đề xuất một người khác</span></div>\n<p class=\"body-txt\">\nthăng tiến lên ngang hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Chiến lược &quot;Có 20 giữ 20&quot;: Đây là nền tảng ban đầu để xây dựng một cơ sở khách hàng</span></div>\n<p class=\"body-txt\">\nvững chắc. Nó không chỉ tập trung vào việc thu hút khách hàng mới mà còn chú trọng\n \nviệc giữ chân và phát triển mối quan hệ lâu dài, đảm bảo nguồn doanh thu ổn định và cơ\n \nhội mở rộng trong tương lai.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Sử dụng &quot;Câu thần chú&quot; để chuyển đổi khách hàng: Đây là một công cụ marketing và bán</span></div>\n<p class=\"body-txt\">\nhàng cực kỳ hiệu quả. Việc chuyển đổi từ &quot;dùng miễn phí&quot; sang &quot;có thêm thu nhập&quot; là\n \nmột lộ trình rõ ràng, tạo động lực cho khách hàng trở thành đối tác hoặc người giới\n \nthiệu, từ đó mở rộng mạng lưới kinh doanh một cách tự nhiên và bền vững.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">&quot;Đãi vàng trong cát&quot; và khuyến khích đề xuất: Đây là cách xây dựng và phát triển đội</span></div>\n<p class=\"body-txt\">\nngũ/mạng lưới một cách chủ động và có chọn lọc. Thay vì tìm kiếm ngẫu nhiên, việc tập\n \ntrung vào những &quot;nhân tố tích cực&quot; đã được chứng minh và thưởng cho người giới thiệu\n \ntạo ra một hệ thống khuyến khích mạnh mẽ, giúp doanh nghiệp tìm ra những người tài\n \nnăng và phù hợp nhất để phát triển.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Ngày xưa tôi có một cái chiến lược có tên gọi là có 20 giữ 20.”\n \n“Anh có muốn dùng sản phẩm này miễn phí không?”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Anh có muốn có thêm thu nhập không?”\n \n“Công việc của một boss là đãi vàng trong cát.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Bài 18: Tính các mức còn lại</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Tóm tắt. Buổi giảng tập trung vào việc thiết kế và tối ưu hóa hệ thống chiết khấu/hoa hồng</h3>\n<p class=\"body-txt\">\ncho đội ngũ bán hàng nhiều cấp (multi-level sales structure). Diễn giả nhấn mạnh tầm quan\n \ntrọng của việc xây dựng hệ thống từ cấp thấp nhất (&quot;ông cuối&quot;), đảm bảo họ có thu nhập tốt\n \nđể thúc đẩy doanh số, từ đó xây dựng các cấp quản lý cao hơn. Cốt lõi là tính toán doanh số\n \ncần đạt được ở mỗi cấp độ dựa trên tỷ lệ chiết khấu và mục tiêu thu nhập mong muốn, đồng\n \nthời liên tục tối ưu hóa hệ thống theo từng ngành nghề và sản phẩm cụ thể.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Hệ thống bán hàng cần được xây dựng từ &quot;ông cuối&quot; (cấp thấp nhất) lên &quot;ông trên&quot; (cấp</span></div>\n<p class=\"body-txt\">\nquản lý).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">&quot;Ông trên&quot; phải tìm được nhiều &quot;ông cuối&quot; và đảm bảo &quot;ông cuối&quot; có doanh số cao để đạt</span></div>\n<p class=\"body-txt\">\nthu nhập mong muốn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Quy tắc thông thường là khoảng 5 người ở cấp dưới thì có thể lên được một level quản</span></div>\n<p class=\"body-txt\">\nlý.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Ví dụ tính toán cụ thể cho từng cấp:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Cấp thấp nhất (&quot;anh này&quot;): Thu nhập mục tiêu 5 triệu, chiết khấu 25% =&gt; cần đạt doanh</span></div>\n<p class=\"body-txt\">\nsố 20 triệu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Cấp trên (&quot;thằng bên trên&quot;): Thu nhập mục tiêu 10 triệu, chiết khấu 10% =&gt; cần 100</span></div>\n<p class=\"body-txt\">\ntriệu doanh số (tương đương 5 &quot;anh này&quot; mỗi người 20 triệu).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Cấp trên nữa: Thu nhập mục tiêu 20 triệu, chiết khấu 7% =&gt; cần 300 triệu doanh số</span></div>\n<p class=\"body-txt\">\n(tương đương ~3 &quot;thằng bên trên&quot; mỗi người 100 triệu).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Cấp cao hơn: Thu nhập mục tiêu 50 triệu, chiết khấu 5% =&gt; cần 1 tỷ doanh số (tương</span></div>\n<p class=\"body-txt\">\nđương ~3 &quot;cấp trên nữa&quot; mỗi người 300 triệu).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Cấp cao nhất: Thu nhập mục tiêu 100 triệu, chiết khấu 5% =&gt; cần 2 tỷ doanh số (tương</span></div>\n<p class=\"body-txt\">\nđương 2 &quot;cấp cao hơn&quot; mỗi người 1 tỷ).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Quan trọng là phải làm cho mức doanh số yêu cầu của &quot;ông cuối&quot; dễ đạt được, có thể</span></div>\n<p class=\"body-txt\">\nthông qua mua buôn số lượng nhỏ hơn hoặc bán hàng thường xuyên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Không chiết khấu theo từng đơn hàng, mà nên chiết khấu theo tổng doanh thu đạt được</span></div>\n<p class=\"body-txt\">\ntrong tháng, có thể giữ lại hoa hồng đến cuối tháng khi đạt mục tiêu để khuyến khích nỗ\n \nlực liên tục.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Cần phân bổ ngân sách cho marketing (ví dụ 10% tổng doanh thu) để quảng bá số lượng</span></div>\n<p class=\"body-txt\">\nlớn và xây dựng thương hiệu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Hệ thống phải được tối ưu hóa và điều chỉnh linh hoạt tùy thuộc vào từng ngành nghề và</span></div>\n<p class=\"body-txt\">\nsản phẩm cụ thể.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Càng lên cấp cao hơn, việc quản lý và tìm được các thành viên &quot;hoạt động&quot; (active) càng</span></div>\n<p class=\"body-txt\">\nkhó hơn, không chỉ là số lượng tuyển dụng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">★ Điểm quan trọng nhất</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Thiết kế từ dưới lên và đảm bảo khả năng sinh lời cho cấp thấp nhất: Toàn bộ hệ thống</span></div>\n<p class=\"body-txt\">\nsẽ sụp đổ nếu &quot;ông cuối&quot; không bán được hàng hoặc không có đủ thu nhập hấp dẫn. Điều\n \nnày quan trọng vì nó đảm bảo tính bền vững và công bằng của mô hình, không chỉ là lợi\n \ních cho các cấp trên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Chiết khấu theo doanh thu tháng và trả hoa hồng theo mục tiêu: Thay vì chiết khấu ngay</span></div>\n<p class=\"body-txt\">\nlập tức cho từng đơn hàng, việc tổng hợp doanh thu theo tháng và trả hoa hồng khi đạt\n \nmục tiêu khuyến khích các đại lý/người bán hàng duy trì hiệu suất ổn định và tạo ra các\n \ngiao dịch lặp lại, thay vì chỉ tập trung vào một giao dịch lớn duy nhất.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Hệ thống cần tối ưu hóa liên tục cho từng ngành/sản phẩm: Các con số và tỷ lệ trong bài</span></div>\n<p class=\"body-txt\">\ngiảng chỉ là ví dụ. Việc áp dụng thành công đòi hỏi phải hiểu rõ đặc thù của sản phẩm, thị\n \ntrường và đối tượng khách hàng để điều chỉnh chính sách chiết khấu, mục tiêu doanh số\n \nsao cho phù hợp và khả thi.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Ngheo thì thằng dưới nó không bán được. Thằng dưới không bán được thì cả hệ thống không\n \nbán được.”\n \n“Đừng bao giờ gọi thằng trên là 35 [35% chiết khấu].”\n \n“Miễn là nó phải mua hàng được ít nhất 2 lần trong 1 tháng. Nhiều hơn 1 lần trong 1 tháng.”\n \n“Đây là cái thiết kế, ta phải tối ưu hóa điều chỉnh tùy từng ngành, tùy từng sản phẩm.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Chương 4</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Bài 19: Thế nào là bán phá giá?</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Tóm tắt. Buổi học này tập trung vào chiến lược chống phá giá và cách doanh nghiệp có thể</h3>\n<p class=\"body-txt\">\nkiểm soát giá bán sản phẩm của mình, thay vì bị thị trường chi phối. Diễn giả giải thích\n \nnguyên lý cung cầu cơ bản, nhấn mạnh rằng giá cao nhất đạt được khi sản phẩm mang tính\n \nđộc quyền. Để làm được điều đó, doanh nghiệp cần áp dụng tư duy sáng tạo để tìm ra thị\n \ntrường ngách không có đối thủ hoặc phát triển &quot;vũ khí bí mật&quot; mà đối thủ khó sao chép. Mục\n \ntiêu là để người bán (doanh nghiệp) có thể quyết định giá, thay vì phải hạ giá trong cạnh\n \ntranh.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Giải thích nguyên lý cung và cầu cơ bản trong kinh tế học:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Đường cung: Càng nhiều hàng hóa cung ứng ra thị trường thì hàng hóa càng giảm giá;</span></div>\n<p class=\"body-txt\">\ncàng ít hàng thì hàng hóa càng có giá cao.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Đường cầu: Cái gì mà thị trường càng cần thì giá càng tăng; càng nhiều người mua thì giá</span></div>\n<p class=\"body-txt\">\ncàng đi lên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Giá cả hàng hóa chịu ảnh hưởng bởi sự chênh lệch giữa cung và cầu, và thị trường tự</span></div>\n<p class=\"body-txt\">\nnhiên có xu hướng về điểm cân bằng.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Khi có nhiều người cùng cung ứng một loại sản phẩm giống nhau (cạnh tranh), thị</span></div>\n<p class=\"body-txt\">\ntrường thuộc về người mua, và người mua quyết định giá (buộc phải hạ giá).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Để bán được giá cao và không cần hạ giá, doanh nghiệp cần tạo ra hàng hóa độc quyền.</span></div>\n<p class=\"body-txt\">\nKhi hàng hóa độc quyền, người bán quyết định giá bán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Các chiến lược để đạt được vị thế độc quyền (từ chương trình Eagle Camp):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Chiến lược Z-lock: Mang hàng hóa từ nơi phổ biến về một nơi chưa phổ biến để trở</span></div>\n<p class=\"body-txt\">\nthành độc quyền.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Chiến lược Đại dương xanh: Sáng tạo ra những sản phẩm/dịch vụ mới trong cùng một</span></div>\n<p class=\"body-txt\">\nthị trường.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Hàng hóa/dịch vụ phải sáng tạo và liên tục sáng tạo để có thể quyết định được giá bán.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Hai ứng dụng chính từ việc hiểu nguyên lý này để kiểm soát giá:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Loại bỏ đối thủ cạnh tranh: Bằng cách áp dụng phương pháp sáng tạo để tìm ra những</span></div>\n<p class=\"body-txt\">\nthị trường/khu vực mà đối thủ *chưa đặt chân đến*.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Thêm vào những lợi thế cạnh tranh đặc biệt, hay còn gọi là &quot;vũ khí bí mật&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">&quot;Vũ khí bí mật&quot; là một thứ mà khách hàng *cần phải có*, nhưng đối thủ *khó sao chép*.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Sự độc quyền là chìa khóa để quyết định giá bán: Diễn giả nhấn mạnh rằng khi doanh</span></div>\n<p class=\"body-txt\">\nnghiệp có một sản phẩm hay dịch vụ mang tính độc quyền, doanh nghiệp hoàn toàn có\n \nthể tự quyết định giá mà không cần lo lắng về việc hạ giá để cạnh tranh. Điều này cực kỳ\n \nquan trọng vì nó thay đổi vị thế của doanh nghiệp từ người phản ứng với thị trường\n \nthành người dẫn dắt thị trường, mang lại lợi nhuận cao và sự ổn định.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Sáng tạo liên tục để tạo ra thị trường riêng hoặc &quot;vũ khí bí mật&quot; là yếu tố sống còn: Các</span></div>\n<p class=\"body-txt\">\nchiến lược như &quot;Z-lock&quot; (đi vào nơi chưa có đối thủ) hay &quot;Đại dương xanh&quot; (tạo ra sản\n \nphẩm/dịch vụ mới) đều dựa trên sự sáng tạo để né tránh cạnh tranh trực tiếp. &quot;Vũ khí bí\n \nmật&quot; (đặc điểm mà khách hàng cần nhưng đối thủ khó sao chép) chính là công cụ để duy\n \ntrì lợi thế độc quyền đó. Đây là lời khuyên hành động thiết thực giúp doanh nghiệp thoát\n \nkhỏi vòng xoáy phá giá và xây dựng một nền tảng kinh doanh bền vững.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Khi sản phẩm/dịch vụ không có sự khác biệt, thị trường sẽ thuộc về người mua và giá cả</span></div>\n<p class=\"body-txt\">\nbị ép xuống: Điểm này giải thích lý do cốt lõi của việc phá giá và cạnh tranh khốc liệt. Nó\n \ncủng cố tầm quan trọng của việc phải tạo ra giá trị độc đáo hoặc lợi thế cạnh tranh để\n \nkhông bị phụ thuộc vào quyết định của người mua và tránh bị cuốn vào cuộc chiến giá.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Cung càng lớn ra thị trường thì hàng hóa càng giảm. Càng ít hàng thì hàng hóa càng cao.”\n \n“Hạ giá khi có nhiều người cùng cung ứng một loại sản phẩm giống như nhau. Thì lúc này thị\n \ntrường thuộc về thị trường người mua, người mua quyết định giá.”\n \n“Vũ khí bí mật là một thứ mà khách hàng cần phải có, nhưng đối thủ khó sao chép.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#00695c\">Bài 20: Chiến lược chống bán phá giá</h3>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Tóm tắt. Buổi giảng này tập trung vào các chiến lược để chống phá giá sản phẩm trên thị</h3>\n<p class=\"body-txt\">\ntrường, thông qua việc điều tiết cung và kích cầu một cách hiệu quả. Cốt lõi là đo lường và\n \nkiểm soát lượng hàng tồn kho trong hệ thống, chủ động làm khan hiếm sản phẩm, đồng thời\n \nđầu tư mạnh vào xây dựng thương hiệu và quảng bá rộng khắp để tăng độ nhận diện và sự\n \ntin tưởng của khách hàng. Mục tiêu là đảm bảo sản phẩm được bán ra nhanh chóng với đúng\n \ngiá trị, tránh bị tồn đọng và phải phá giá, giúp duy trì lợi thế cạnh tranh bền vững.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Đo lường và điều tiết hàng tồn kho:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Đo lường lượng hàng tồn kho còn tồn tại trong toàn bộ hệ thống.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Tuổi của hàng hóa nên nằm trong kho không quá 20 ngày; tốt nhất là khoảng 7 ngày</span></div>\n<p class=\"body-txt\">\n(nhập về 1 tuần bán hết).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Không nên để tuổi tồn kho nhỏ hơn 7 ngày vì gần như không có hàng dự trữ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Phải có hàng dự trữ từ 7 đến 20 ngày trong hệ thống.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Không cung quá lượng hàng ra thị trường, vì cung quá sẽ dẫn đến hàng tồn đọng và bị</span></div>\n<p class=\"body-txt\">\nphá giá khi vượt quá nhu cầu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Phải điều tiết lượng hàng hóa (đặc biệt nếu sản phẩm độc quyền). Nếu không độc quyền,</span></div>\n<p class=\"body-txt\">\nsản phẩm phải có &quot;vũ khí bí mật&quot; mới điều tiết được.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Sử dụng chương trình trả thưởng để biết được bao nhiêu lượng hàng hóa được đưa ra</span></div>\n<p class=\"body-txt\">\nthị trường (thông qua mã kích hoạt).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Chiến lược về sản phẩm và giá:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Chủ động đổi hàng cũ lấy hàng mới, hoặc hủy hàng cũ, làm chiến lược truyền thông để</span></div>\n<p class=\"body-txt\">\nkiểm soát lượng hàng tồn dư.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Chủ động làm khan hiếm hàng hóa bằng chiến lược tăng giá để tăng cầu (cần điều kiện</span></div>\n<p class=\"body-txt\">\ncụ thể).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Chính sách kích cầu và xây dựng thương hiệu:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Để bán được hàng ra, phải có chính sách kích cầu.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Đầu tư vào hệ thống Internet Marketing (ví dụ: học IPS 5 ngày) là một trong những cách</span></div>\n<p class=\"body-txt\">\nkích cầu đầu tiên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Các công ty lớn (ví dụ: công ty dầu nhất Việt Nam) đều có hệ thống media riêng (kênh</span></div>\n<p class=\"body-txt\">\nbáo chí, blog, kênh báo, tỉ tỉ kênh trên mạng với triệu sub).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Xây dựng và đầu tư vào thương hiệu chính là cách để tăng cầu, khiến mọi người nhận</span></div>\n<p class=\"body-txt\">\nbiết sản phẩm là tốt, là xịn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Thực hiện toàn bộ các hoạt động quảng bá &quot;mass&quot; (số lượng lớn) để kích cầu, giúp hệ</span></div>\n<p class=\"body-txt\">\nthống đại lý tự hào và phát triển.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Quảng cáo trên Internet số lượng lớn, quảng cáo trên xe ô tô số lượng lớn, xuất hiện trên</span></div>\n<p class=\"body-txt\">\ntruyền hình với tần suất lớn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Luôn có một talk show hoặc sitcom mang tên thương hiệu.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Tham gia các hoạt động tài trợ, từ thiện xã hội có tính xã hội.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Làm bất kỳ điều gì để xuất hiện trước ống kính truyền thông (truyền thông mời là phải</span></div>\n<p class=\"body-txt\">\nxuất hiện).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Chú ý định danh thương hiệu (ví dụ: theo kiểu &quot;elegant&quot; thay vì &quot;showbiz&quot; để tránh</span></div>\n<p class=\"body-txt\">\nscandal).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Đo lường độ phủ của thương hiệu (bao nhiêu triệu người được xem sản phẩm).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Giải pháp cho hàng đã bị phá giá/tồn kho:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Giảm tuổi tồn kho (KPI phải đo lường được) để hàng hóa không bị phá giá.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Nếu sản phẩm đã bị phá giá: không thu về mà làm mã hàng khác (thay vỏ/nhãn hiệu</span></div>\n<p class=\"body-txt\">\nkhác) vì hàng bị phá giá thường là hàng giả/hàng kém chất lượng/quá đát.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Giảm thời hạn sử dụng của sản phẩm (dù có thể dùng lâu hơn) để buộc đại lý/khách</span></div>\n<p class=\"body-txt\">\nhàng đẩy hàng đi sớm, tăng chi phí sản xuất nhưng tránh tồn đọng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Cần đo lường từng chính sách để áp dụng phù hợp với từng doanh nghiệp.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Sức mạnh của &quot;Vũ khí bí mật&quot; và thương hiệu trong điều tiết thị trường:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Diễn giả nhấn mạnh &quot;Hàng hóa phải có vũ khí bí mật mới điều tiết</span></div>\n<p class=\"body-txt\">\nđược&quot; và &quot;Xây dựng và đầu tư vào thương hiệu chính là cách để tăng cầu, kích cầu.&quot; Điều\n \nnày chỉ ra rằng trong một thị trường cạnh tranh, việc kiểm soát cung cầu và tránh phá\n \ngiá không chỉ dựa vào quản lý logistics đơn thuần. Sản phẩm hoặc dịch vụ cần có một\n \nyếu tố độc đáo, khó sao chép (&quot;vũ khí bí mật&quot;) và một thương hiệu mạnh, được nhận\n \ndiện và tin cậy để tạo ra giá trị cảm nhận, từ đó cho phép doanh nghiệp định giá và quản\n \nlý thị trường một cách chủ động, không bị cuốn vào cuộc chiến giá cả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Chiến lược &quot;Tăng giá để tăng cầu&quot; và &quot;Làm khan hiếm&quot;:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là một tư duy phản trực giác nhưng cực kỳ mạnh mẽ trong</span></div>\n<p class=\"body-txt\">\nmarketing hiện đại. Thay vì giảm giá để kích cầu, diễn giả đề xuất tăng giá và tạo sự khan\n \nhiếm (ví dụ qua việc giới hạn cung, sản phẩm mới cao cấp). Điều này dựa trên tâm lý\n \nkhách hàng muốn sở hữu những sản phẩm độc quyền, có giá trị cao, tạo ra sự khao khát\n \nvà mong muốn sở hữu. Nó giúp chuyển đổi cạnh tranh từ giá thành sang giá trị và trải\n \nnghiệm, củng cố vị thế thương hiệu cao cấp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Chiến lược truyền thông &quot;Mass&quot; và &quot;Xuất hiện thường xuyên&quot;:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#00695c\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Diễn giả khuyến khích &quot;Làm bất kỳ điều gì để xuất hiện trước ống</span></div>\n<p class=\"body-txt\">\nkính truyền thông&quot; và &quot;quảng bá mass&quot; để tạo độ phủ lớn. Trong một thị trường đông\n \nđúc, việc liên tục xuất hiện trên các kênh truyền thông chính thống và rộng rãi giúp củng\n \ncố nhận diện thương hiệu, xây dựng uy tín và tạo dựng niềm tin. Khi thương hiệu có độ\n \nphủ lớn, khách hàng sẽ cảm thấy tự tin hơn khi lựa chọn, và các đối tác, đại lý cũng tự\n \nhào hơn khi hợp tác, góp phần vào việc tăng cầu và giữ vững giá trị sản phẩm.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#00695c\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Hàng hóa phải có vũ khí bí mật mới điều tiết được.”\n \n“Chủ động làm khan hiếm hàng hóa bằng chiến lược tăng giá để tăng cầu.”\n \n“Làm bất kỳ điều gì để xuất hiện trước ống kính truyền thông.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #00695c\"><div class=\"pg-inner\"><p class=\"body-txt\">\nLời kết\n \nHết khoá Tổ Chức Đội Nhóm Kinh Doanh. Đọc để LÀM, không phải để biết — biến mỗi bài\n \nhọc thành hành động cụ thể.\n</p></div></div>",
"<div class=\"pg pg-cover\" style=\"border-top:5px solid #00695c\">\n  <div class=\"cover-wrap\">\n    <div class=\"cover-title\">Tổ Chức Đội Nhóm</div>\n    <div class=\"cover-sub\" style=\"color:#00695c\">Học để ứng dụng · Áp dụng để thành công</div>\n    <div class=\"cover-tag\" style=\"color:#00695c;margin-top:24px\">QNPA Pickleball Academy</div>\n  </div>\n</div>"];
const N=pages.length;
let cur=0;
const book=document.getElementById('book');
const fill=document.getElementById('progress-fill');
const info=document.getElementById('page-info');
const jump=document.getElementById('page-jump');
const btnP=document.getElementById('btn-prev');
const btnN=document.getElementById('btn-next');
function render(){
  book.innerHTML=pages[cur];
  fill.style.width=((cur+1)/N*100)+'%';
  info.textContent=(cur+1)+' / '+N;
  jump.value=cur+1;
  btnP.disabled=cur===0;
  btnN.disabled=cur===N-1;
  window.scrollTo(0,0);
}
function next(){if(cur<N-1){cur++;render();}}
function prev(){if(cur>0){cur--;render();}}
function goTo(n){cur=Math.max(0,Math.min(N-1,n));render();}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown')next();
  else if(e.key==='ArrowLeft'||e.key==='PageUp')prev();
});
render();
</script>
</body>
