ss=\"bul-txt\">Xử lý khách hàng hủy bỏ và tái thu hút: Luôn có tỷ lệ khách hàng rời đi (churn). Cần liên</span></div>\n<p class=\"body-txt\">\ntục thêm khách hàng mới thông qua phễu bán hàng (sales funnel) và các chiến lược\n \nupsell. Nếu khách hàng hủy sau vài tháng (ví dụ 4 tháng), có thể đề xuất gói 6 tháng để\n \nkéo dài doanh thu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Phễu bán hàng: Membership site cũng là một phần của phễu bán hàng và các trang bán</span></div>\n<p class=\"body-txt\">\nhàng thông thường (sales page/video).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tầm quan trọng của Traffic: Nếu biết cách lấy traffic và xây dựng trang bán hàng hiệu</span></div>\n<p class=\"body-txt\">\nquả, việc tạo Membership site sẽ dễ dàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tạo dòng tiền ổn định và có thể dự đoán được: Membership site là công cụ mạnh mẽ để</span></div>\n<p class=\"body-txt\">\nđảm bảo doanh thu đều đặn hàng tháng/quý/năm. Điều này giúp doanh nghiệp có một\n \nnền tảng tài chính vững chắc, giảm bớt áp lực phải liên tục tìm kiếm khách hàng mới cho\n \ntừng dự án và cho phép tập trung vào các hoạt động phát triển chiến lược dài hạn, cải\n \ntiến sản phẩm/dịch vụ và mở rộng thị trường.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Khả năng tạo dòng tiền &quot;khủng&quot; với gói trọn đời: Việc cung cấp tùy chọn gói thành viên</span></div>\n<p class=\"body-txt\">\ntrọn đời (Lifetime Membership) với mức giá cao hơn đáng kể (thường gấp 2-3 lần gói\n \nhàng năm) có thể mang lại một lượng tiền mặt lớn ngay lập tức. Đây là một chiến lược\n \nhiệu quả để thu hút vốn đầu tư nhanh chóng, có thể dùng để tái đầu tư vào quảng cáo,\n \ncông nghệ, hoặc mở rộng đội ngũ, thúc đẩy sự tăng trưởng bùng nổ cho doanh nghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tối ưu hóa chuyển đổi và giữ chân khách hàng qua các tùy chọn linh hoạt: Bằng cách</span></div>\n<p class=\"body-txt\">\ncung cấp nhiều lựa chọn gói (tháng, năm, trọn đời, hoặc gói ngắn hạn 3-6 tháng) và chiến\n \nlược upsell/downsell thông minh, doanh nghiệp có thể đáp ứng nhu cầu của nhiều đối\n \ntượng khách hàng khác nhau. Điều này không chỉ tăng tỷ lệ chuyển đổi ban đầu (khắc\n \nphục tâm lý ngại cam kết dài hạn) mà còn tạo cơ hội để giữ chân khách hàng lâu hơn\n \nhoặc tái kích hoạt họ khi họ có ý định rời đi, tối đa hóa giá trị vòng đời của khách hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Tôi yêu dòng tiền.”\n \n“Đấy là massive cash flow... tiền nó vào cực kỳ nhiều.”\n \n“Dòng tiền cực lớn!”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 77: Tạo traffic cho Video</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi giảng tập trung vào chiến lược marketing qua video trên YouTube để tạo ra</h3>\n<p class=\"body-txt\">\nlưu lượng truy cập (traffic) và thu nhập, đặc biệt cho các trang thành viên (membership\n \nsites). Cốt lõi là tận dụng YouTube như một công cụ tìm kiếm mạnh mẽ bằng cách sử dụng\n \ntừ khóa hiệu quả trong tiêu đề và mô tả video, kết hợp với việc đưa liên kết đến các trang\n \nđích hoặc danh sách email. Diễn giả nhấn mạnh sự đơn giản trong sản xuất video và tính\n \nkiên định, nhất quán trong việc đăng tải nội dung.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Các trang thành viên (membership sites) có thể tạo ra thu nhập hàng tháng ổn định, bao</span></div>\n<p class=\"body-txt\">\ngồm thu nhập sáu con số mỗi năm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tạo ra lưu lượng truy cập (traffic) là yếu tố then chốt cho thành công trực tuyến.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">YouTube là một kênh hiệu quả để lấy traffic và là công cụ tìm kiếm lớn thứ hai trên thế</span></div>\n<p class=\"body-txt\">\ngiới.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Yếu tố then chốt của marketing video là đặt từ khóa (keyword) vào tiêu đề (title) của</span></div>\n<p class=\"body-txt\">\nvideo.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Ngoài tiêu đề, từ khóa cũng cần có trong phần mô tả (description) của video.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nhiều người mắc lỗi không để liên kết (link) có thể nhấp vào (clickable) đến trang đích</span></div>\n<p class=\"body-txt\">\nhoặc sản phẩm của họ trong phần mô tả. Liên kết cần được đặt khéo léo và rõ ràng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Những video đơn giản, thậm chí &quot;nhàm chán&quot; (ví dụ: chỉ có hình ảnh tĩnh và lời đọc), vẫn</span></div>\n<p class=\"body-txt\">\ncó thể tạo ra hàng trăm nghìn lượt xem và kéo traffic nếu từ khóa được tối ưu hóa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Có thể sử dụng nội dung Private Label Rights (PLR) và các công cụ chỉnh sửa video đơn</span></div>\n<p class=\"body-txt\">\ngiản như Windows Movie Maker để tạo video.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nguyên tắc quan trọng nhất trong marketing online là sự kiên định (consistency) và</span></div>\n<p class=\"body-txt\">\nnhất quán (systematic).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Không cần kỹ năng chỉnh sửa phức tạp, có thể tự quay video bằng điện thoại và tải trực</span></div>\n<p class=\"body-txt\">\ntiếp lên YouTube.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mặc dù đưa khách hàng thẳng đến trang liên kết (affiliate page) cũng hiệu quả, diễn giả</span></div>\n<p class=\"body-txt\">\nkhuyên nên đưa họ vào danh sách email/cơ sở dữ liệu của mình để tiện theo dõi và\n \nchăm sóc sau này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sử dụng công cụ như YouTube search suggestions hoặc answers.yahoo.com để tìm kiếm</span></div>\n<p class=\"body-txt\">\ncác chủ đề/câu hỏi phổ biến và từ khóa mà khách hàng đang tìm kiếm trong thị trường\n \nngách của bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nếu có nhiều câu hỏi về một chủ đề cụ thể, đó là dấu hiệu bạn nên tạo một video về chủ</span></div>\n<p class=\"body-txt\">\nđề đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tái sử dụng nội dung: Video có thể được chuyển thành văn bản (text) thông qua dịch vụ</span></div>\n<p class=\"body-txt\">\nnhư rev.com, sau đó đăng lên blog và chia sẻ trên các nền tảng khác như Pinterest,\n \nTwitter, Facebook để tạo một hệ thống marketing liên kết.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Video marketing không chỉ tạo traffic mà còn có thể dẫn đến việc phát triển sản phẩm số</span></div>\n<p class=\"body-txt\">\nliên quan đến các chủ đề phổ biến.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">&quot;Traffic chính là cái then chốt để bạn tạo nên cái thành công của mình ở trên mạng.&quot;</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">(0:55-0:59)</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là nền tảng của mọi hoạt động kinh doanh trực tuyến. Không có</span></div>\n<p class=\"body-txt\">\ntraffic, không có khách hàng, không có doanh thu. Mọi chiến lược marketing, dù phức\n \ntạp hay đơn giản, đều phải xoay quanh mục tiêu tạo ra và chuyển đổi traffic.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">&quot;Cái yếu tố then chốt của cái việc là làm marketing cho video ấy là mình phải cho cái</span></div>\n<p class=\"body-txt\">\nkeyword của mình vào cái phần tiêu đề.&quot; (2:44-2:55)\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Điểm này cung cấp một chiến lược SEO video cụ thể và dễ áp dụng.</span></div>\n<p class=\"body-txt\">\nYouTube là công cụ tìm kiếm lớn thứ hai thế giới, việc tối ưu hóa từ khóa trong tiêu đề là\n \ncách hiệu quả nhất để video của bạn được tìm thấy bởi đúng đối tượng khách hàng tiềm\n \nnăng.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">&quot;Khi nói về cái việc marketing, đặc biệt là marketing online, nó tất cả là về cái sự kiên</span></div>\n<p class=\"body-txt\">\nđịnh và nhất quán.&quot; (7:01-7:12)\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Thông điệp này nhấn mạnh tầm quan trọng của nỗ lực bền bỉ và có hệ</span></div>\n<p class=\"body-txt\">\nthống thay vì tìm kiếm những thành công chớp nhoáng. Ngay cả với nội dung đơn giản,\n \nviệc duy trì tần suất và chất lượng nhất quán sẽ xây dựng được lòng tin và sự hiện diện\n \nthương hiệu lâu dài.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Traffic chính là cái then chốt để bạn tạo nên cái thành công của mình ở trên mạng.”\n \n“Khi nói về cái việc marketing, đặc biệt là marketing online, nó tất cả là về cái sự kiên định và\n \nnhất quán.”\n \n“Luôn luôn dùng keyword!”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng danh sách email/database: Thay vì chỉ hướng khách hàng đến trang liên hệ</span></div>\n<p class=\"body-txt\">\nchung, FUTAGO có thể tạo một trang đích để khách hàng tải xuống một tài liệu hữu ích\n \n(ví dụ: &quot;Hướng dẫn chọn công ty diễn họa kiến trúc chất lượng cao&quot; hoặc &quot;Portfolio mẫu\n \ncác dự án thành công&quot;) để đổi lấy địa chỉ email, từ đó xây dựng cơ sở dữ liệu khách hàng\n \ntiềm năng để follow-up.\n \n---\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 78: Những chia sẻ của Mr. Long</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi học này tập trung giới thiệu và phân tích các công cụ internet marketing hiệu</h3>\n<p class=\"body-txt\">\nquả, đặc biệt là các nền tảng email marketing và membership site. Thầy nhấn mạnh sự khác\n \nbiệt giữa các công cụ trong cách quản lý dữ liệu (ví dụ: campaign vs tag) và chính sách tính\n \nphí, cũng như tầm quan trọng của việc lựa chọn công cụ phù hợp với thị trường và mục tiêu\n \nkinh doanh. Cuối cùng, thầy giới thiệu khái niệm Private Label Rights (PLR) như một\n \nphương pháp tạo nội dung hiệu quả và tiết kiệm thời gian.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Phân biệt quản lý theo Tag và Campaign:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Getresponse: Quản lý theo chiến dịch (campaign), tính tiền nhiều lần nếu một email nằm</span></div>\n<p class=\"body-txt\">\nở nhiều chiến dịch, nhưng không giới hạn số lần gửi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Infusionsoft: Quản lý theo tag, cơ động hơn, tính tiền theo số lần gửi email.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Aweber: Thầy đã dùng nhưng bỏ vì tỷ lệ spam bị tính chặt.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">ActiveCampaign: Công cụ mới thầy đang dùng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Đánh giá các công cụ:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tất cả các công cụ được giới thiệu (Getresponse, Infusionsoft, ActiveCampaign,</span></div>\n<p class=\"body-txt\">\nClickFunnels, FusionHQ) đều là công cụ tốt, có khả năng affiliate.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thầy khuyên không nên quá quan tâm đến việc tự chọn công cụ mà hãy dùng theo</span></div>\n<p class=\"body-txt\">\nnhững gì thầy đã dùng vì thầy đã test kỹ và dùng gói cao nhất.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thầy cung cấp quyền test thoải mái công cụ cho học viên trước khi quyết định thanh</span></div>\n<p class=\"body-txt\">\ntoán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Giới thiệu các công cụ làm trang đích (landing page): Instapage, Leadpages, Getresponse</span></div>\n<p class=\"body-txt\">\nPage.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Giới thiệu về Membership Site và Private Label Rights (PLR):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thầy đang dùng các công cụ membership site và đã mua hết bản quyền của chúng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Giới thiệu công cụ làm membership site chuyên cho video content (Kajabi - [nghe không</span></div>\n<p class=\"body-txt\">\nrõ chính tả]) có thể tích hợp affiliate, là giải pháp thay thế tốt hơn\n \nUdemy/Unica/Edumall vì không bị giữ bản quyền trọn đời và có thể tự quản lý\n \ncontinuity (liên tục).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Kajabi là công cụ đắt tiền (gói cao nhất 899 USD/tháng), cho phép nhiều người cùng</span></div>\n<p class=\"body-txt\">\nquản lý (25 người) và không giới hạn 100 domain.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Giới thiệu kho tài liệu PLR (Private Label Rights):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Là tài liệu (content, video, email) mà người mua có toàn quyền biên tập, cắt dán, dịch</span></div>\n<p class=\"body-txt\">\nsang ngôn ngữ khác, không bị vi phạm bản quyền.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Có cả video PLR (Video Private Label Rights) cho phép thêm tên của mình vào đoạn đầu</span></div>\n<p class=\"body-txt\">\nvideo.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Quá trình này không dễ dàng, cần nhiều thời gian trải nghiệm, nhưng có lộ trình rõ ràng</span></div>\n<p class=\"body-txt\">\nđể làm theo.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Niềm tin có thể cản trở việc làm vì thấy nó quá dễ dàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Giới thiệu đối tác E-Micro:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Anh Ngọc, giám đốc E-Micro, là đối tác cung cấp rất nhiều công cụ và đồ chơi internet</span></div>\n<p class=\"body-txt\">\ncho khóa học.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">E-Micro là đối tác chạy quảng cáo cho Facebook Advertising, Google Advertising, Zalo</span></div>\n<p class=\"body-txt\">\nAdvertising, Zing News, Dân Trí, các kênh 14, 17, 19, 21, GenK, CafeBiz.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thầy nhấn mạnh tiềm năng hợp tác với E-Micro để &quot;tiêu tiền tỷ&quot;.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sức mạnh của PLR (Private Label Rights) và Video PLR: Đây là một insight đắt giá vì nó</span></div>\n<p class=\"body-txt\">\ncung cấp một giải pháp hiệu quả để tạo ra nội dung chất lượng cao một cách nhanh\n \nchóng và hợp pháp. Thay vì phải tự sản xuất từ đầu hoặc lo lắng về bản quyền, doanh\n \nnghiệp có thể mua các tài liệu PLR, chỉnh sửa và tái sử dụng cho mục đích riêng, tiết\n \nkiệm đáng kể thời gian và chi phí, đồng thời xây dựng tài sản nội dung riêng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Khả năng tận dụng công cụ phù hợp với thị trường, thay vì cố gắng dùng công cụ đa</span></div>\n<p class=\"body-txt\">\nnăng: Thầy phân tích rõ ràng sự khác biệt giữa các công cụ như Getresponse (không giới\n \nhạn gửi email, phù hợp thị trường Việt Nam) và Infusionsoft (tính phí theo lần gửi). Việc\n \nhiểu rõ đặc tính và ưu nhược điểm của từng công cụ giúp lựa chọn giải pháp tối ưu,\n \ntránh lãng phí và tăng hiệu quả marketing. Đặc biệt, việc giới thiệu nền tảng Kajabi thay\n \nthế Udemy/Unica/Edumall cho thấy tầm nhìn về việc kiểm soát nội dung và xây dựng\n \nmối quan hệ lâu dài với khách hàng (continuity) thay vì chỉ bán một lần.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Học hỏi và tin tưởng vào lộ trình đã được kiểm chứng: Thầy nhấn mạnh rằng các công cụ</span></div>\n<p class=\"body-txt\">\nthầy đang dùng đều đã được kiểm tra kỹ lưỡng và có gói cao nhất. Thay vì tự mày mò,\n \nviệc đi theo lộ trình và kinh nghiệm của người đi trước (như thầy) giúp tiết kiệm thời\n \ngian, công sức và giảm rủi ro thất bại. Điều này cũng liên quan đến việc vượt qua &quot;niềm\n \ntin&quot; rằng cái gì dễ quá thì không đáng tin, mà tập trung vào kết quả thực tế.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Tôi dùng công cụ gì các ông cứ dùng công cụ đấy nhàn nhất, đỡ phải review. Bởi vì sao ạ? Bởi\n \nvì tôi có những hội để nó review cái đó rồi. Tôi cũng test chán thì tôi mới dùng.”\n \n“Ở mỗi một cái công cụ nó tồn tại được là bởi vì nó có lý do của nó.”\n \n“Niềm tin mình nó ngăn cản chúng ta.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\ncông nghệ render, hoặc các xu hướng hình ảnh 3D. Sau đó, chỉnh sửa, thêm branding của\n \nFUTAGO (logo, màu sắc, giọng điệu), và sử dụng làm nội dung miễn phí (freebie) để thu\n \nhút khách hàng tiềm năng B2B (KTS/thiết kế) vào phễu marketing. Ví dụ: &quot;Hướng dẫn\n \nnhanh 5 mẹo render nội thất ấn tượng&quot;, &quot;Xu hướng diễn họa kiến trúc 2024&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng Membership Site với Kajabi (hoặc nền tảng tương tự) cho các nội dung độc</span></div>\n<p class=\"body-txt\">\nquyền: Dù FUTAGO không bán khóa học, nhưng có thể tạo một &quot;membership site&quot; nhỏ\n \nhoặc một khu vực dành cho khách hàng thân thiết. Tại đây, FUTAGO có thể đăng tải:\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Các showcase dự án đặc biệt, portfolio chi tiết, phân tích case study về cách FUTAGO giải</span></div>\n<p class=\"body-txt\">\nquyết các yêu cầu diễn họa phức tạp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thư viện các tips &amp; tricks về cách trình bày ý tưởng kiến trúc thông qua hình ảnh (đáp</span></div>\n<p class=\"body-txt\">\nứng đúng nhu cầu của KTS/thiết kế).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Các bài viết chuyên sâu về giá trị của diễn họa 3D chất lượng cao trong quá trình thuyết</span></div>\n<p class=\"body-txt\">\nphục khách hàng cuối.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Các buổi webinar/workshop nhỏ chia sẻ kinh nghiệm chọn phong cách render phù hợp</span></div>\n<p class=\"body-txt\">\nvới từng loại dự án.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mục tiêu không phải bán khóa học, mà là xây dựng vị thế chuyên gia, cung cấp giá trị gia</span></div>\n<p class=\"body-txt\">\ntăng để củng cố mối quan hệ và tạo ra khách hàng trung thành, đồng thời thu hút thêm\n \nkhách hàng mới thông qua nội dung chất lượng cao.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tối ưu Email Marketing với công cụ phù hợp (ví dụ: ActiveCampaign): Dựa trên lời</span></div>\n<p class=\"body-txt\">\nkhuyên của thầy về ActiveCampaign, FUTAGO có thể sử dụng để gửi các bản tin\n \n(newsletter) chuyên nghiệp, cập nhật portfolio mới, chia sẻ insight ngành, hoặc gửi\n \nthông báo về các ưu đãi đặc biệt cho khách hàng B2B. Quan trọng là phân khúc danh\n \nsách email (ví dụ: theo loại khách hàng: KTS, CĐT, nhà thầu) để gửi nội dung cá nhân\n \nhóa, tăng tỷ lệ mở và chuyển đổi. Tránh bị đánh dấu spam bằng cách cung cấp giá trị\n \nthực sự cho người nhận.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Hợp tác với các kênh quảng cáo lớn: Việc biết E-Micro chạy quảng cáo cho các kênh lớn</span></div>\n<p class=\"body-txt\">\nnhư Dân Trí, Kênh 14, GenK, CafeBiz có thể mở ra cơ hội cho FUTAGO đặt quảng cáo\n \nhiển thị (banner ads) trên các trang này. Dù khách hàng của FUTAGO là B2B, nhưng KTS\n \nhay các nhà phát triển vẫn đọc tin tức, báo chí, và có thể tiếp cận được thông qua các\n \nkênh này nếu quảng cáo được nhắm mục tiêu đúng đối tượng quan tâm đến kiến trúc,\n \nthiết kế, công nghệ xây dựng.\n \n---\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Chương 10</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 79: Chọn nền tảng</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi học này của  tập trung vào &quot;7 sai lầm&quot; trong internet</h3>\n<p class=\"body-txt\">\nmarketing mà ông từng mắc phải, đặc biệt là sai lầm số 1: chọn sai nền tảng. Cốt lõi là thay vì\n \ntự xây dựng và quản lý toàn bộ hạ tầng công nghệ, doanh nghiệp nên sử dụng các nền tảng\n \ncủa bên thứ ba, trả phí, dựa trên đám mây (SaaS). Điều này giúp doanh nghiệp tập trung vào\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\nkinh doanh cốt lõi, tối ưu hóa lợi nhuận và tránh bị mắc kẹt trong các vấn đề kỹ thuật tốn\n \nkém thời gian, tiền bạc.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">chia sẻ về &quot;7 sai lầm&quot; trong internet marketing mà ông đã học được</span></div>\n<p class=\"body-txt\">\ntừ người thầy của mình cách đây khoảng 4-5 năm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sau khi nhận ra những sai lầm này, ông đã quyết định đóng cửa toàn bộ các website mà</span></div>\n<p class=\"body-txt\">\nông đang sở hữu, bao gồm cả photo.vn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Photo.vn là một website ảnh hàng đầu, được thành lập năm 2004 và do chính ông tự xây</span></div>\n<p class=\"body-txt\">\ndựng từ server, hosting, design, coding, v.v.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Ông nhận thấy rằng những người vẫn &quot;chơi ảnh&quot; và duy trì trên các nền tảng cũ sau 10</span></div>\n<p class=\"body-txt\">\nnăm vẫn dậm chân tại chỗ (&quot;đời của nó vẫn giống như đời của nó cách đây 10 năm\n \ntrước&quot;), trong khi ông (người đã đóng website và không còn &quot;chơi ảnh&quot; nữa) lại có thể\n \nmua được máy ảnh và ống kính mới nhất cho con mình chơi. Đây là bài học về việc\n \nkhông nên bị mắc kẹt vào những gì mình đã xây dựng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sai lầm số 1: Sai lầm về chọn nền tảng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Trước đây, ông từng dạy rằng WordPress là nền tảng đúng đắn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Hiện tại, nền tảng đúng nhất dành cho những người kinh doanh như chúng ta là &quot;nền</span></div>\n<p class=\"body-txt\">\ntảng của người khác&quot; (nền tảng bên thứ ba).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Các ví dụ về nền tảng đúng: Unica (trong nước), Kajabi (nước ngoài, cung cấp cloud và</span></div>\n<p class=\"body-txt\">\nhosting mọi thứ), GetResponse, AWeber, Infusionsoft.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Ông từng tự mình coding để lập website Ajax, tự xây dựng server, tự cloud hóa mọi thứ,</span></div>\n<p class=\"body-txt\">\ntự xây dựng hệ thống server S3, Amazon SES, Amazon Cloud, PHPList cho email, VPS –\n \nnhưng ông nhấn mạnh đây là những điều &quot;ngu ngốc nhất&quot; trong cuộc đời ông.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nền tảng đúng đắn vào thời điểm hiện tại là nền tảng đám mây (cloud-based), sử dụng</span></div>\n<p class=\"body-txt\">\ndịch vụ trả tiền thuê phần mềm (SaaS - Software as a Service).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Việc sử dụng nền tảng của bên thứ ba giúp doanh nghiệp không phải tập trung vào các</span></div>\n<p class=\"body-txt\">\ncông việc kỹ thuật phức tạp (quản trị, xây dựng hệ thống, xử lý server down, thuê kỹ\n \nthuật viên), mà thay vào đó tập trung vào kinh doanh và tạo ra lợi nhuận. &quot;Đầu tư nó\n \nphải đi kèm với lợi nhuận.&quot;\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chuyển đổi sang sử dụng nền tảng của bên thứ ba theo mô hình SaaS (Software as a</span></div>\n<p class=\"body-txt\">\nService) là yếu tố sống còn để phát triển kinh doanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là lời khuyên cốt lõi giúp doanh nghiệp giải phóng khỏi gánh</span></div>\n<p class=\"body-txt\">\nnặng quản lý hạ tầng kỹ thuật phức tạp, vốn tốn kém nguồn lực và không phải năng lực\n \ncốt lõi. Thay vì phải &quot;nuôi thêm mấy ông kỹ thuật trong nhà&quot; để duy trì server và hệ\n \nthống, doanh nghiệp có thể tập trung tối đa vào sản phẩm, marketing và bán hàng. Điều\n \nnày đặc biệt quan trọng cho các doanh nghiệp nhỏ và vừa, giúp họ tối ưu chi phí, tăng\n \ntốc độ triển khai và linh hoạt mở rộng theo nhu cầu thị trường.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Việc tự mình xây dựng và quản lý toàn bộ hạ tầng kỹ thuật là một sai lầm lớn, có thể kìm</span></div>\n<p class=\"body-txt\">\nhãm sự phát triển và khiến bạn &quot;nghèo đi&quot;.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Vì sao quan trọng:  dùng chính kinh nghiệm đau thương của bản thân</span></div>\n<p class=\"body-txt\">\n(đóng cửa một website hàng đầu dù đã tự tay xây dựng mọi thứ) để minh họa. Nỗ lực tự\n \nlàm mọi thứ kỹ thuật không chỉ tiêu tốn tài nguyên mà còn trói buộc bạn vào việc giải\n \nquyết các vấn đề vận hành, thay vì dành thời gian và năng lượng để đổi mới, tìm kiếm cơ\n \nhội và phát triển kinh doanh. So sánh giữa việc ông có thể mua máy ảnh mới nhất cho\n \ncon sau khi &quot;bỏ chơi ảnh&quot; và những người vẫn &quot;dậm chân tại chỗ&quot; trên nền tảng cũ, cho\n \nthấy sự giải thoát và khả năng tiến lên khi từ bỏ việc ôm đồm kỹ thuật.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Đó chính là cái cách mà tôi nghèo đi.”\n \n“Đời của nó vẫn giống như đời của nó cách đây 10 năm trước.”\n \n“Nền tảng đúng vào thời điểm này là nền tảng đám mây.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 80: Tự làm</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Thầy  nhấn mạnh sai lầm lớn nhất trong internet marketing và</h3>\n<p class=\"body-txt\">\nkinh doanh là triết lý &quot;do it yourself&quot; (tự làm mọi việc). Việc này không chỉ lãng phí thời gian\n \nmà còn khiến cá nhân/doanh nghiệp không thể tập trung vào những việc mình giỏi nhất và\n \nsáng tạo giá trị cốt lõi. Thay vào đó, chiến lược đúng đắn là chỉ làm phần việc mình thực sự\n \nchuyên môn, còn mọi tác vụ khác nên được thuê ngoài để đạt hiệu quả cao hơn, tiết kiệm chi\n \nphí và giải phóng thời gian cho cuộc sống cá nhân.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sai lầm lớn nhất trong kinh doanh online là &quot;do it yourself&quot; (tự làm mọi việc), thầy  gọi đây là điều &quot;ngu ngốc vô cùng&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thầy chia sẻ kinh nghiệm bản thân đã từng tự làm mọi thứ, từ website, email marketing,</span></div>\n<p class=\"body-txt\">\nquản trị đến giao tiếp cộng đồng, dẫn đến việc mất hết thời gian cho cuộc sống và không\n \nthể tập trung sáng tạo.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Ngay cả việc viết email marketing, thầy chỉ phác thảo ý tưởng bằng mồm hoặc bút chì,</span></div>\n<p class=\"body-txt\">\nsau đó có đội ngũ biên tập lại thành văn bản (không có email nào tự động tạo ra).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Việc tự làm quá nhiều tác vụ khiến cá nhân/doanh nghiệp mất đi khả năng sáng tạo nội</span></div>\n<p class=\"body-txt\">\ndung và phát triển những giá trị cốt lõi thực sự.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Giải pháp là chỉ nên làm phần việc mình giỏi nhất, còn mọi tác vụ hỗ trợ khác cần được</span></div>\n<p class=\"body-txt\">\nthuê ngoài.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Có thể sử dụng các nền tảng quốc tế như Fiverr hoặc tìm nhân sự thuê ngoài trong nước</span></div>\n<p class=\"body-txt\">\nvới chi phí hợp lý và chất lượng công việc thường tốt hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Việc thuê ngoài giúp tiết kiệm thời gian, nâng cao chất lượng công việc và cho phép tập</span></div>\n<p class=\"body-txt\">\ntrung vào những hoạt động có giá trị cao hơn hoặc dành cho cuộc sống cá nhân.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chuyên môn hóa và thuê ngoài: Điều này quan trọng vì nó thay đổi tư duy từ cố gắng</span></div>\n<p class=\"body-txt\">\nlàm tất cả sang tập trung vào thế mạnh cốt lõi. Khi doanh nghiệp/cá nhân chỉ làm những\n \ngì mình giỏi nhất, họ sẽ tạo ra sản phẩm/dịch vụ chất lượng cao hơn và hiệu quả hơn,\n \ntrong khi giao phó các công việc khác cho người có chuyên môn phù hợp, giúp tối ưu hóa\n \nnguồn lực.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chi phí cơ hội của việc tự làm: Nhiều người chỉ thấy chi phí trực tiếp khi thuê ngoài mà</span></div>\n<p class=\"body-txt\">\nbỏ qua chi phí cơ hội của việc tự làm. Như thầy Long chia sẻ, việc dành thời gian cho các\n \ntác vụ không phải chuyên môn (như quay phim, biên tập) sẽ lấy đi thời gian để sáng tạo\n \ncontent, là thứ tạo ra giá trị thực sự. Nhận thức được chi phí cơ hội này giúp đưa ra\n \nquyết định thuê ngoài hợp lý, giải phóng nguồn lực cho những hoạt động mang lại giá trị\n \ncao nhất.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Cái sai lầm thứ hai ấy, do it yourself, tự làm. Đây là cái điều ngu ngốc vô cùng.”\n</p></div></div>",

"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\nviệc không hiểu rõ thị trường mục tiêu và không sử dụng dữ liệu để đưa ra quyết định,\n \nđồng thời khuyến khích tìm kiếm sự trợ giúp từ chuyên gia.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Tại sao mình lại không trả tiền gấp 10 lần?”\n \n“Hiệu suất sử dụng đầu vào bao giờ nó cũng giảm dần.”\n \n“Ai mà đã quảng cáo Facebook từ 500 triệu đến 1 tỷ thì chúng ta sẽ biết được là tại sao... nó\n \ngiới hạn cái số lượng người tiếp cận cho mỗi một cái campaign.”\n \n“Chạy quảng cáo cho trang bán hàng là cái sai lầm số 7 của tôi.”\n \n“Mình là thằng không đọc báo, rồi mình lại quyết định đi quảng cáo trên báo thì mình có bị\n \nngu không?”\n \n“Mất mẹ nó hai con SH rồi vợ ơi.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 86: Mẹo Đo lường quảng cáo</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi giảng tập trung vào tầm quan trọng của việc đo lường hiệu quả các chiến dịch</h3>\n<p class=\"body-txt\">\nmarketing internet, đặc biệt trong việc thử nghiệm và tối ưu hóa các mẫu quảng cáo\n \n(squeeze page/content) và ngôn ngữ tiếp thị. Thầy trình bày các phương pháp từ thủ công\n \nđơn giản (dùng Excel, URL khác nhau) đến nâng cao hơn (Google Analytics và URL UTM) để\n \ntheo dõi nguồn traffic, hành vi người dùng và hiệu quả từng mẫu. Cốt lõi là phải liên tục thử\n \nnghiệm và điều chỉnh để tìm ra phương án tối ưu nhất cho từng đối tượng khách hàng cụ\n \nthể.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Đo lường luồng thông tin và hiệu quả: Cần biết luồng thông tin thực tế chạy như thế nào</span></div>\n<p class=\"body-txt\">\nvà đo lường được kết quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Phương pháp đo lường thủ công: Dùng Excel để ghi nhận, so sánh số liệu (gõ con số vào,</span></div>\n<p class=\"body-txt\">\nđếm, cái nào lớn thì dùng, cái nào bé thì bỏ đi) – gọi là &quot;old school marketing.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thiết kế Squeeze Page đa dạng: Tạo ra nhiều phiên bản Squeeze Page (trang đích) giống</span></div>\n<p class=\"body-txt\">\nhệt nhau, nhưng bên trong mỗi trang lại chứa nhiều &quot;option&quot; (mẫu con) khác nhau.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Testing (thử nghiệm) các mẫu content: Có ít nhất 3 hoặc 5 mẫu content khác nhau trong</span></div>\n<p class=\"body-txt\">\nmỗi Squeeze Page con (ví dụ: mẫu ngắn, dài, video, ảnh, text, hoặc kết hợp). Mục đích là\n \nđể &quot;testing xem mẫu nào ngon nhất.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tùy chỉnh ngôn ngữ theo đối tượng: Ngôn từ trong mẫu phải được &quot;target theo tuổi&quot; và</span></div>\n<p class=\"body-txt\">\nvùng miền. Ví dụ: ngôn ngữ chỉn chu, &quot;old school&quot; cho người trên 36 tuổi (hoặc trên 50),\n \nvà ngôn ngữ &quot;phá cách&quot; hay &quot;ngôn ngữ bọn teen&quot; cho giới trẻ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thuê chuyên gia bằng cách đặc biệt: Thầy gợi ý có thể nhờ con cái &quot;chuyển ngữ&quot; sang</span></div>\n<p class=\"body-txt\">\nngôn ngữ của giới trẻ và &quot;trả công&quot; bằng việc rửa bát (tức là dùng các hình thức trao đổi\n \nphù hợp với từng đối tượng để họ làm việc cho mình).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Đổ traffic vào các trang đích riêng biệt: Từ các nguồn khác nhau (Facebook, Google</span></div>\n<p class=\"body-txt\">\nAdMicro), traffic sẽ được đổ vào các trang đích có URL riêng biệt (ví dụ: 1.long.vn,\n \n2.long.vn) để theo dõi nguồn. Về cơ bản, các trang này không cần link giống nhau.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sử dụng Google Analytics và URL UTM: Đây là phương pháp đo lường nâng cao hơn. Cài</span></div>\n<p class=\"body-txt\">\nđặt Google Analytics và sử dụng công cụ URL UTM để gắn các tham số tracking (nguồn,\n \nchiến dịch, đối tượng) vào các đường dẫn, giúp theo dõi chi tiết luồng người dùng và\n \nhiệu quả của từng chiến dịch.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Vai trò của Generalist và Specialist: Thầy là một &quot;generalist&quot; (người tổng quát) nên sẽ</span></div>\n<p class=\"body-txt\">\nnhờ những &quot;specialist&quot; (người chuyên sâu) về kỹ thuật để gõ và nghiên cứu sâu hơn về\n \ncác công cụ phức tạp như URL UTM hay Google Analytics.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thử nghiệm đa dạng và liên tục (A/B testing trên nhiều mẫu): Việc tạo ra ít nhất 3-5</span></div>\n<p class=\"body-txt\">\nmẫu content khác nhau (dài, ngắn, video, ảnh, text) cho cùng một mục tiêu và liên tục\n \nthử nghiệm là cực kỳ quan trọng.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Nó giúp doanh nghiệp không dựa vào cảm tính mà dựa vào dữ liệu</span></div>\n<p class=\"body-txt\">\nthực tế để tìm ra chính xác mẫu content nào (với hình thức, độ dài, phong cách...) mang\n \nlại hiệu quả cao nhất. Điều này tối ưu hóa chi phí và tăng tỷ lệ chuyển đổi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tối ưu ngôn ngữ theo đối tượng mục tiêu: Ngôn từ trong quảng cáo không chỉ cần phù</span></div>\n<p class=\"body-txt\">\nhợp với vùng miền mà còn phải &quot;target&quot; đúng độ tuổi (chỉn chu cho người lớn tuổi, phá\n \ncách cho giới trẻ).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Ngôn ngữ là cầu nối trực tiếp và mạnh mẽ nhất để truyền tải thông</span></div>\n<p class=\"body-txt\">\nđiệp. Việc sử dụng ngôn ngữ không phù hợp có thể khiến thông điệp bị bỏ qua, gây hiểu\n \nlầm hoặc thậm chí phản cảm, dẫn đến lãng phí công sức và chi phí marketing.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Đo lường là cốt lõi, bắt đầu từ thủ công: Từ việc sử dụng Excel đơn giản để ghi nhận số</span></div>\n<p class=\"body-txt\">\nliệu, phân biệt các URL khác nhau cho từng nguồn traffic, cho đến các công cụ phức tạp\n \nhơn như Google Analytics với URL UTM.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Không đo lường thì không thể biết được cái gì đang hoạt động tốt, cái</span></div>\n<p class=\"body-txt\">\ngì cần cải thiện. Bắt đầu từ phương pháp thủ công giúp người học nắm vững nguyên lý\n \ntrước khi chuyển sang tự động hóa, đảm bảo mọi quyết định marketing đều dựa trên dữ\n \nliệu và có cơ sở.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Old school marketing.”\n \n“Mình không biết được là thị trường nào. Vì bản thân cái ngôn từ ở trong mẫu nó còn target\n \ntheo tuổi nữa.”\n \n“Không cần biết mà chỉ cần biết gõ Enter là ra.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\nđổi thành yêu cầu liên hệ/báo giá hay không. Việc này giúp FUTAGO hiểu rõ mẫu render\n \nnào, kênh quảng bá nào đang mang lại hiệu quả tốt nhất để tập trung nguồn lực.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 87: Mẹo Tối ưu hóa quảng cáo</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi học tập trung vào chiến lược tối ưu hóa các chiến dịch quảng cáo và trang</h3>\n<p class=\"body-txt\">\nđích (landing page) bằng cách chia nhỏ các chỉ số và cải thiện từng bước nhỏ, nhằm tăng\n \nhiệu suất chuyển đổi mà không cần tăng chi phí quảng cáo. Thầy nhấn mạnh tư duy &quot;Hành\n \nđộng trước, tối ưu sau&quot; (&quot;Ready! Fire! Aim!&quot;) và việc áp dụng nguyên tắc giá trị trọn đời của\n \nkhách hàng (LVC) để xây dựng lợi thế cạnh tranh, sẵn sàng &quot;bạo chi&quot; để lấn át đối thủ trên\n \ncác nền tảng quảng cáo.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Quy trình tối ưu hóa 2 bước cơ bản: Bước 1 và 2 là quan trọng nhất, sau đó các bước còn</span></div>\n<p class=\"body-txt\">\nlại sẽ tự động diễn ra.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">4 tham số đo lường chất lượng quảng cáo: Lượng xem quảng cáo (view ad), số lần mở</span></div>\n<p class=\"body-txt\">\nquảng cáo (click open), số người đọc hết quảng cáo (có thể bỏ qua), và số người click vào\n \nđường link trên quảng cáo.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tối ưu hóa quảng cáo bằng cách thay đổi:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sử dụng nhiều ảnh quảng cáo khác nhau cho cùng một nội dung để tìm ra ảnh hiệu quả</span></div>\n<p class=\"body-txt\">\nnhất.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sử dụng công cụ Power Editor để tối ưu hóa đối tượng mục tiêu theo lứa tuổi, giới tính,</span></div>\n<p class=\"body-txt\">\nđịa phương.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sức mạnh của việc chia nhỏ và tối ưu hóa: Chỉ cần tăng 10% hiệu quả ở mỗi bước trong</span></div>\n<p class=\"body-txt\">\nchuỗi các tham số sẽ mang lại mức tăng trưởng tổng thể đáng kể (ví dụ: tăng 10% ở 4\n \nbước dẫn đến tăng 50% lượt click link). Tăng 10% ở 8 bước sẽ giúp tăng gấp đôi lượng\n \nkhách hàng tiềm năng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tầm quan trọng của người vẽ đồ họa (thiết kế quảng cáo): Công cụ gợi ý là Canva để ai</span></div>\n<p class=\"body-txt\">\ncũng có thể thực hiện.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tư duy hành động &quot;Ready! Fire! Aim!&quot;: Luôn sẵn sàng thử nghiệm, bấm nút, tìm kiếm</span></div>\n<p class=\"body-txt\">\nthay vì chờ đợi hoặc sợ sai. Học cách sử dụng công cụ như trẻ con, không ngại thử cái\n \nmới.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nguyên tắc &quot;bắn nhiều&quot;: Không phải ai cũng là &quot;thiện xạ&quot; (bắn phát nào trúng phát đó),</span></div>\n<p class=\"body-txt\">\ndo đó cần &quot;bắn nhiều&quot; (thử nhiều lần) để thành công.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Quy trình tối ưu hóa trang đích (Landing Page):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Đo lường số người truy cập, thời gian ở lại, số người đọc hết nội dung (dùng &quot;nhiệt độ&quot; -</span></div>\n<p class=\"body-txt\">\nheat map).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Phân tích hành vi người dùng (mẫu hành vi D, I, C, S) để điều chỉnh nội dung.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thử nghiệm các loại trang đích khác nhau (dài, ngắn, video, hình ảnh) và thường thì</span></div>\n<p class=\"body-txt\">\ntrang đích &quot;ngu nhất&quot; (đơn giản nhất) lại có tỷ lệ chuyển đổi cao nhất (nguyên tắc KISS -\n \nKeep It Short and Stupid/Simple).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Các tham số đo lường tiếp theo: tỷ lệ điền form, tỷ lệ mở email (mail confirm opt-in), tỷ</span></div>\n<p class=\"body-txt\">\nlệ click đường link trong email.\n</p></div></div>",

nó cho thấy hiệu quả kinh doanh không đến từ một thay đổi lớn\n \nduy nhất, mà là sự tích lũy của nhiều cải tiến nhỏ, giúp tăng lợi nhuận mà không cần tăng\n \nchi phí quảng cáo.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tư duy &quot;Ready! Fire! Aim!&quot; (&quot;Luôn sẵn sàng bắn rồi nhắm&quot;): Đây là lời kêu gọi hành</span></div>\n<p class=\"body-txt\">\nđộng quyết liệt, không ngần ngại thử nghiệm. Quan trọng vì đa số mọi người thường quá\n \nchú trọng vào việc lên kế hoạch, phân tích mà quên đi bước quan trọng nhất là bắt đầu\n \nthực hiện. Thay vì chờ đợi sự hoàn hảo, hãy bắt đầu, sau đó mới tối ưu và điều chỉnh dựa\n \ntrên kết quả thực tế.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nguyên tắc KISS (Keep It Short and Stupid/Simple) cho Landing Page: Thầy nhấn mạnh</span></div>\n<p class=\"body-txt\">\nrằng trang đích càng đơn giản (thậm chí &quot;ngu nhất&quot;) đôi khi lại mang lại tỷ lệ chuyển đổi\n \ncao nhất (ví dụ 52%). Điều này quan trọng vì nhiều doanh nghiệp cố gắng làm cho trang\n \nđích quá phức tạp, chứa nhiều thông tin, điều này có thể gây phân tâm và giảm khả năng\n \nchuyển đổi của khách hàng. Giữ cho nội dung và thiết kế đơn giản, dễ hiểu sẽ hiệu quả\n \nhơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sử dụng LVC và Phễu để &quot;Bóp chết đối thủ&quot;: Đây là chiến lược cạnh tranh quyết liệt.</span></div>\n<p class=\"body-txt\">\nThầy giải thích rằng nếu bạn hiểu rõ Giá trị trọn đời của khách hàng (LVC), bạn có thể\n \nchấp nhận chi phí quảng cáo ban đầu cao hơn, thậm chí lỗ ở lần giao dịch đầu tiên để\n \n&quot;mua&quot; khách hàng. Điều này giúp bạn loại bỏ các đối thủ không thể chi trả mức đó, độc\n \nchiếm thị trường. Quan trọng vì nó thay đổi cách nhìn về chi phí quảng cáo, biến nó\n \nthành một khoản đầu tư dài hạn có chiến lược thay vì chỉ là chi phí ngắn hạn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Chưa cưới được nghĩa là chưa đủ số lượng bắn!”\n \n“Sức mạnh của việc chia nhỏ ra và tối ưu hóa từng công việc một.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Mình bây giờ phải học cái cách sử dụng Facebook, sử dụng internet, sử dụng Google, học\n \nquảng cáo theo cái cách của trẻ con trẻ nó làm đấy. Tiền nằm trong túi thì cứ thử đi đã. Nó là\n \nmiễn phí.”\n \n“Đau đầu cửa trước mà sung sướng ở cửa sau.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Theo dõi đối thủ: Nếu đối thủ cạnh tranh của FUTAGO trong ngành diễn họa kiến trúc tại</span></div>\n<p class=\"body-txt\">\nNhật chạy quảng cáo trên kênh nào (ví dụ: LinkedIn, Facebook, Instagram, Google Ads),\n \nFUTAGO có thể xem xét chạy quảng cáo trên chính kênh đó, nhưng với ngân sách và\n \nchiến lược &quot;bạo chi&quot; hơn để chiếm lĩnh thị trường.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Chương 11</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 88: Bắt đầu với Why?</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi học này tập trung vào nguyên tắc cốt lõi để thành công trên internet và trong</h3>\n<p class=\"body-txt\">\nkinh doanh: luôn bắt đầu với câu hỏi &quot;Tại sao?&quot; (WHY). Việc hiểu rõ &quot;WHY&quot; sẽ định hình\n \ncông việc kinh doanh, xác định sứ mệnh và giúp cá nhân/doanh nghiệp vượt qua mọi khó\n \nkhăn. Nếu &quot;WHY&quot; chưa đủ mạnh mẽ, việc đặt câu hỏi &quot;Tại sao không?&quot; (WHY NOT?) sẽ giúp\n \ncủng cố quyết tâm và đối diện trực tiếp với những rào cản, từ đó làm cho các bước &quot;Làm thế\n \nnào?&quot; (HOW) trở nên dễ dàng và rõ ràng hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thầy chia sẻ về các luật và quy tắc bất biến để thành công trên internet, nằm trong khóa</span></div>\n<p class=\"body-txt\">\nhọc &quot;Kinh doanh đột phá&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Luật số 1 là &quot;luôn bắt đầu với câu hỏi WHY (tại sao)&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Các câu hỏi ví dụ: Tại sao bạn kinh doanh? Tại sao const N=pages.length;
let cur=0;
const book=document.getElementById('book');
const fill=document.getElementById('progress-fill');
const info=document.getElementById('page-info');
const jump=document.getElementById('page-jump');
const btnP=document.getElementById('btn-prev');
const btnN=document.getElementById('btn-next');
function render(){
  book.innerHTML=pages[cur];
  fill.style.width=((cur+1)/N*100)+'%';
  info.textContent=(cur+1)+' / '+N;
  jump.value=cur+1;
  btnP.disabled=cur===0;
  btnN.disabled=cur===N-1;
  window.scrollTo(0,0);
}
function next(){if(cur<N-1){cur++;render();}}
function prev(){if(cur>0){cur--;render();}}
function goTo(n){cur=Math.max(0,Math.min(N-1,n));render();}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown')next();
  else if(e.key==='ArrowLeft'||e.key==='PageUp')prev();
});
render();
</script>
