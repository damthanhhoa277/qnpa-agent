 mới mà hãy kết hợp các yếu tố đang hot hoặc có nhu cầu cao theo một cách riêng,\n \nđồng thời thêm yếu tố tốc độ (&quot;10 ngày&quot;, &quot;10 giờ&quot;) và nhắm đúng đối tượng. Điều này\n \nquan trọng vì nó giúp sản phẩm vừa có tính đổi mới, vừa đáp ứng trực tiếp nhu cầu cụ\n \nthể của khách hàng, tăng khả năng bán hàng thành công.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sản phẩm đầu tiên (phễu) phải &quot;hay và rẻ&quot; để tạo tên tuổi: Đối với những người mới gia</span></div>\n<p class=\"body-txt\">\nnhập thị trường online, việc tung ra một sản phẩm chất lượng cao với giá thấp là chiến\n \nlược then chốt để thu hút sự chú ý, xây dựng niềm tin và danh tiếng. Điều này quan\n \ntrọng vì nó là bước đệm để sau này có thể bán các sản phẩm giá cao hơn, mở rộng tập\n \nkhách hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Hầu hết chúng ta đang đi bán những thứ thị trường nó không có nhu cầu cao, thì làm sao\n \nmình kiếm được tiền? Mình phải vào đây, vào xem chợ người ta bán cái gì thì mình bán cái\n \nđấy.”\n \n“Thế thì ta phải kết hợp một vài sản phẩm vào cộng với tài năng của ta trong cái khóa học...\n \nTài năng của ta kết hợp cùng với đối tượng thì nó tạo nên cái thứ mới.”\n \n“Nó hay đến mức mà ngày nào bạn cũng xem.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 37: Tìm kiếm affiliate</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi này tập trung vào chiến lược xây dựng mối quan hệ và kiếm tiền từ những</h3>\n<p class=\"body-txt\">\nngười có ảnh hưởng (influencer/affiliate) thay vì chỉ bán hàng trực tiếp. Thầy  nhấn mạnh việc thay đổi tư duy từ &quot;tôi bán hàng&quot; sang &quot;tôi tìm người khác bán hàng\n \ncho mình&quot; thông qua một quy trình 5 bước. Cốt lõi là việc tìm kiếm, kết nối, trao giá trị và\n \nhợp tác với những người có sẵn cộng đồng lớn để họ giúp mình phân phối sản phẩm/dịch\n \nvụ, giúp lan tỏa và tạo ra doanh thu hiệu quả hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thảo luận về việc chạy quảng cáo Facebook Ads, YouTube content, đọc blog/Facebook</span></div>\n<p class=\"body-txt\">\ncủa người khác hàng ngày nhưng không biết cách biến chúng thành tiền.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Giới thiệu 5 bước để xây dựng mối quan hệ và 3 chiều để duy trì mối quan hệ hiệu quả.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Bước 1: Biết điều mình cần là gì (ví dụ: danh sách khách hàng của đối tượng mục tiêu).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Bước 2: Xác định đối tượng có thể cung cấp điều mình muốn (ví dụ: blogger nổi tiếng,</span></div>\n<p class=\"body-txt\">\nYouTube channel nổi tiếng, Facebooker nổi tiếng – những người có danh sách/cộng\n \nđồng lớn).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Bước 3 (rất quan trọng): Trao giá trị cho họ trước. Chia sẻ nội dung của họ, nói chuyện</span></div>\n<p class=\"body-txt\">\nvới họ nhiều, khen ngợi họ, kêu gọi người khác khen họ, dẫn traffic đến họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Bước 4 (khác biệt): Thay vì tập trung bán hàng trực tiếp, hãy tập trung tìm *Affiliate*.</span></div>\n<p class=\"body-txt\">\nTư duy khác biệt là tìm người nổi tiếng để *họ* bán hàng cho *mình*, thay vì mình tự\n \nbán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Cách tìm Affiliate:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chạy quảng cáo để tìm Affiliate.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sử dụng công cụ tìm kiếm influencer/người có ảnh hưởng (ví dụ: tìm auto nổi tiếng,</span></div>\n<p class=\"body-txt\">\nkênh YouTube có sub lớn nhất, ClickBank, JVZoo, NotifiyPro, Long Calendar, Mass AI).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mục đích là tìm người nổi tiếng để *họ* giúp bán hàng cho mình.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chuyển đổi tư duy từ &quot;bán hàng trực tiếp&quot; sang &quot;tìm người khác bán hàng cho mình&quot;:</span></div>\n<p class=\"body-txt\">\nĐây là insight cốt lõi. Thay vì bỏ công sức chạy quảng cáo để tự mình bán sản phẩm cho\n \ntừng khách hàng, hãy đầu tư vào việc tìm và xây dựng mối quan hệ với những người có\n \nsẵn lượng khán giả/khách hàng lớn. Họ sẽ là kênh phân phối hiệu quả hơn rất nhiều.\n \nĐiều này quan trọng vì nó giúp mở rộng quy mô kinh doanh mà không cần tăng quá\n \nnhiều chi phí marketing trực tiếp, tận dụng đòn bẩy từ uy tín và cộng đồng của người\n \nkhác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Trao giá trị trước khi yêu cầu: Bước 3 – &quot;Trao giá trị cho nó trước&quot; – là chìa khóa để xây</span></div>\n<p class=\"body-txt\">\ndựng mối quan hệ bền vững với những người có ảnh hưởng. Không ai muốn làm việc với\n \nngười chỉ biết xin. Bằng cách chia sẻ, khen ngợi, hỗ trợ và dẫn traffic cho họ trước, bạn\n \ntạo ra thiện cảm và sự tin tưởng, khiến họ dễ dàng hơn trong việc hợp tác sau này. Điều\n \nnày quan trọng vì nó xây dựng nền tảng cho một mối quan hệ đối tác bền vững, mang lại\n \nlợi ích hai chiều, không phải là một giao dịch một lần.\n</p></div></div>",

"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\nnhững hình ảnh kiến trúc chất lượng cao, ấn tượng và khác biệt nhất trên thị trường\n \nNhật Bản.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Hệ thống hóa quy trình làm việc: Để phục vụ khách hàng B2B Nhật Bản với yêu cầu cao</span></div>\n<p class=\"body-txt\">\nvề chất lượng và deadline, FUTAGO cần có một quy trình làm việc cực kỳ chặt chẽ, được\n \nviết xuống, đơn giản hóa và tối ưu hóa từ khâu tiếp nhận yêu cầu, báo giá, dựng hình,\n \nrender, hậu kỳ, đến khâu chỉnh sửa theo feedback và bàn giao. Việc này giúp đảm bảo\n \nchất lượng đồng đều, giảm thiểu sai sót, tăng tốc độ hoàn thành và dễ dàng nhân bản\n \nquy trình để mở rộng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Dẫn đầu thị trường bằng cách làm sớm hơn: FUTAGO nên chủ động nghiên cứu các xu</span></div>\n<p class=\"body-txt\">\nhướng diễn họa kiến trúc mới tại Nhật Bản hoặc thế giới và triển khai áp dụng vào dịch\n \nvụ của mình sớm hơn đối thủ. Ví dụ, phát triển dịch vụ render animation, 360\n \npanorama, hoặc thậm chí các trải nghiệm VR/AR cơ bản (chỉ dừng ở việc trình bày hình\n \nảnh, không phải BIM services) cho khách hàng B2B, để mang lại giá trị vượt trội và tạo vị\n \nthế dẫn đầu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Động lực từ gia đình: Liên kết mục tiêu kinh doanh của FUTAGO với việc tạo ra một môi</span></div>\n<p class=\"body-txt\">\ntrường làm việc ổn định, phát triển, mang lại thu nhập và chất lượng cuộc sống tốt cho\n \nđội ngũ nhân viên. Khi nhân viên cảm thấy công việc giúp họ chăm sóc gia đình tốt hơn,\n \nhọ sẽ có động lực nội tại mạnh mẽ để cống hiến, nâng cao tay nghề và đảm bảo chất\n \nlượng diễn họa kiến trúc cao nhất cho khách hàng Nhật.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Chương 5</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 41: Phát triển cá nhân</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi giảng này tập trung vào lộ trình phát triển bản thân và sự nghiệp trong kinh</h3>\n<p class=\"body-txt\">\ndoanh, từ vai trò là người trực tiếp sản xuất (producer) đến người lãnh đạo (leader) và cuối\n \ncùng là chủ doanh nghiệp (owner) có khả năng tạo ra giá trị mà không cần trực tiếp làm\n \nviệc. Thầy Long nhấn mạnh tầm quan trọng của việc liên tục học hỏi, đặc biệt là đọc sách và\n \nxem video để phát triển bản thân, nhưng cũng cần nhận thức rõ về vai trò và giai đoạn phát\n \ntriển của mình để đưa ra quyết định phù hợp, tránh làm hại bản thân và giá trị của mình.\n \nBuổi giảng cũng đề cập đến tầm quan trọng của quyền sở hữu trí tuệ và xây dựng đội nhóm\n \nkế cận.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Bước 1: Phát triển cá nhân (Personal Development)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Làm gì để phát triển cá nhân: đọc sách, xem video/audio hàng ngày.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thầy chia sẻ trải nghiệm về việc tìm mua sách Business Model mà không có, phải dùng</span></div>\n<p class=\"body-txt\">\nbản photo, nhấn mạnh giá trị của sách bản quyền.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thầy khuyên không nên tải sách miễn phí vì nó làm giảm giá trị và thái độ đối xử với</span></div>\n<p class=\"body-txt\">\nquyền sở hữu trí tuệ, nên mua bản quyền.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Không nên xem/chia sẻ lậu video/nội dung có bản quyền, coi đó là sự &quot;ngu ngốc&quot; về</span></div>\n<p class=\"body-txt\">\nnhận thức quyền sở hữu trí tuệ, và sẽ ảnh hưởng đến sự phát triển của nền tảng như\n \nClickbank ở Việt Nam.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thầy nói về việc mua tài liệu của Paul (Paul cũng như thầy), khẳng định sẽ mua dù đắt vì</span></div>\n<p class=\"body-txt\">\nbản thân có tiền, đó là lý do thầy nhiều tiền hơn học viên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thầy nói về quy trình ra quyết định: không nên hỏi &quot;có nên mua không?&quot; mà phải biết rõ</span></div>\n<p class=\"body-txt\">\nmục đích mua để làm gì. Nếu không đủ nguồn lực để thực hiện rõ ràng thì không nên\n \nmua, vì mua về cũng sẽ không dùng, chỉ để &quot;cho vào xó&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Không nên sao chép, copy tài liệu vì sẽ làm hại bản thân và giá trị của sản phẩm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Bước 2: Cho đi thật nhiều giá trị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">(Phần này chỉ được nhắc đến tên, không có nội dung chi tiết trong audio đã cung cấp)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Ba nhóm người trong doanh nghiệp và lộ trình phát triển</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Producer: Người trực tiếp tạo ra sản phẩm, làm việc thủ công (ví dụ: người làm sách,</span></div>\n<p class=\"body-txt\">\nngười lên sân khấu, người làm video).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sướng nhất vì được làm, được tạo ra sản phẩm, được chăm sóc sản phẩm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nhưng là con người nghèo nhất (vì bị giới hạn bởi thời gian và khả năng của bản thân).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Leader: Người lãnh đạo, dẫn dắt đội nhóm đi theo mình.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Là người điều hành, điều phối.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Khi phát triển từ Producer lên Leader, cần giảm chuyên môn và tăng khả năng lãnh đạo.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Làm Leader dễ gặp phải tình trạng cô đơn, đau khổ, sống một mình nếu nhầm lẫn lãnh</span></div>\n<p class=\"body-txt\">\nđạo với quản lý (quát tháo, sai bảo), dẫn đến những người giỏi sẽ rời đi và cuối cùng lại\n \nphải tự làm mọi việc (quay về làm Producer).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Lãnh đạo thực sự là dẫn dắt người khác đi theo mình, chứ không phải quản lý người</span></div>\n<p class=\"body-txt\">\nkhác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Owner (Chủ doanh nghiệp/Business Owner/COO/CLO): Người không trực tiếp làm việc,</span></div>\n<p class=\"body-txt\">\nchỉ đầu tư và quản lý tổng thể.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Là người thông minh nhất (thằng khôn nhất), nhưng cũng là thằng ngu nhất (nếu không</span></div>\n<p class=\"body-txt\">\nlàm gì ngoài tiêu tiền).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Ngồi mát ăn bát vàng, không làm việc gì, nhưng sẽ nhận được lợi nhuận lớn từ hệ thống.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Lộ trình phát triển: Producer (làm mọi việc) -&gt; có tiền thuê người (kế toán, tổng đài) -&gt;</span></div>\n<p class=\"body-txt\">\nthuê thêm người -&gt; cần người quản lý đội nhóm -&gt; phát triển thành Leader -&gt; khi\n \nLeader &quot;già&quot; đi, khả năng lãnh đạo/chuyên môn giảm xuống -&gt; trở thành Owner.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Owner là người đầu tư bằng thông tin (information product), không cần vận hành hay</span></div>\n<p class=\"body-txt\">\nmarketing, chỉ cần tạo ra video (content) và để người khác bán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thầy đang dần chuyển sang vai trò Owner, thu tiền tỷ từ video mỗi tháng mà không cần</span></div>\n<p class=\"body-txt\">\ntrực tiếp làm nhiều.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Vai trò CLO (Chief Love Officer) là một chức danh quan trọng trong doanh nghiệp (người</span></div>\n<p class=\"body-txt\">\nkhông làm gì cả, nhưng là &quot;tình yêu&quot; của công ty).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Làm gì khi bắt đầu kinh doanh: phải làm mọi việc (Producer) vì không có tiền thuê</span></div>\n<p class=\"body-txt\">\nngười khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Lộ trình chuyển đổi: tuyển producer -&gt; trở thành CEO (leader) -&gt; chuyển thành CLO</span></div>\n<p class=\"body-txt\">\n(owner).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thầy chia sẻ quy trình bán hàng hiệu quả (Product Launching + Affiliate Recruiter) giúp</span></div>\n<p class=\"body-txt\">\ntăng doanh số lên tiền tỷ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thầy khuyến khích tăng cường thời gian làm video để tạo ra nhiều giá trị hơn nữa.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Lộ trình phát triển sự nghiệp cá nhân (Producer -&gt; Leader -&gt; Owner): Đây là cốt lõi của</span></div>\n<p class=\"body-txt\">\nbuổi giảng, cung cấp một tầm nhìn rõ ràng về các giai đoạn phát triển trong kinh doanh.\n \nNó quan trọng vì giúp người nghe định vị bản thân đang ở đâu, cần làm gì để tiến lên, và\n \nhiểu được vai của mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Đừng xin lời khuyên miễn phí/Đừng tải sách lậu: Thầy nhấn mạnh điều này nhiều lần.</span></div>\n<p class=\"body-txt\">\nNó quan trọng vì thái độ đối với quyền sở hữu trí tuệ và sự chủ động trong việc tìm kiếm\n \nkiến thức quyết định giá trị bạn nhận được. Việc xin lời khuyên miễn phí cho thấy sự\n \nthiếu quyết đoán và không đủ nguồn lực để thực hiện, dẫn đến việc dù có lời khuyên\n \ncũng không làm được.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Giá trị của Producer trong giai đoạn khởi nghiệp: Khi bắt đầu, bạn phải là một Producer</span></div>\n<p class=\"body-txt\">\nxuất sắc, làm mọi việc. Điều này quan trọng vì nó định hình tư duy của một người khởi\n \nnghiệp: không ngại khó, không ngại làm, và tích lũy kinh nghiệm nền tảng trước khi\n \nchuyển giao và lãnh đạo.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Viết đéo cái phải mua, địt mẹ tự mình giỏi lên thì cần đéo phải mua.”\n \n“Đừng bao giờ đi xin lời khuyên miễn phí. Mình phải tự mình ra quyết định.”\n \n“Khi mà các anh chị không mua nó là bởi vì các anh chị không đủ nguồn lực để thực hiện việc\n \nđó một cách rõ ràng. Chúng ta không đủ khả năng để ra quyết định. Thì như vậy cần cái đống\n \nấy về nhà cũng lại giống như nhặt trò khác của Pôn [Paul].”\n \n“Sướng nhất là producer... Nhưng đó là con người nghèo nhất.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Quản lý bản quyền/tài sản trí tuệ: Tuyệt đối không sử dụng/sao chép trái phép các mô</span></div>\n<p class=\"body-txt\">\nhình 3D, texture, thư viện vật liệu hoặc các nội dung có bản quyền khác trong quá trình\n \nsản xuất diễn họa. Điều này không chỉ vi phạm pháp luật mà còn ảnh hưởng đến đạo đức\n \nnghề nghiệp và uy tín lâu dài của FUTAGO trên thị trường Nhật Bản (nơi rất coi trọng\n \nbản quyền).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng đội nhóm (Leader):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Khi có nguồn lực (tiền), FUTAGO nên đầu tư thuê thêm nhân sự để mở rộng quy mô sản</span></div>\n<p class=\"body-txt\">\nxuất, thay vì một người phải làm quá nhiều việc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Khi đội ngũ lớn mạnh, cần phát triển các Leader (quản lý dự án, trưởng nhóm) để dẫn</span></div>\n<p class=\"body-txt\">\ndắt, phân công công việc, đảm bảo chất lượng và tiến độ. Leader cần biết cách dẫn dắt\n \nđội ngũ đi theo tầm nhìn chung, thay vì chỉ quản lý hay chỉ đạo.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tầm nhìn Owner:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mục tiêu cuối cùng là xây dựng FUTAGO BIM trở thành một thương hiệu mạnh về diễn</span></div>\n<p class=\"body-txt\">\nhọa kiến trúc (CG パース/render 3D) trên thị trường Nhật Bản.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Khi đạt đến giai đoạn Owner, FUTAGO có thể tập trung vào chiến lược phát triển thương</span></div>\n<p class=\"body-txt\">\nhiệu, xây dựng mối quan hệ với các kiến trúc sư/thiết kế/nhà thầu Nhật, tạo ra các sản\n \nphẩm thông tin giá trị (ví dụ: các bài blog chia sẻ kinh nghiệm về diễn họa, xu hướng\n \nthiết kế, bí quyết marketing hình ảnh) để thu hút khách hàng tiềm năng, mà không cần\n \ntrực tiếp tham gia vào từng dự án diễn họa cụ thể.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Đầu tư vào &quot;thông tin&quot; (kinh nghiệm, bí quyết, quy trình làm việc hiệu quả) để tạo ra giá</span></div>\n<p class=\"body-txt\">\ntrị bền vững và giúp thương hiệu phát triển.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 42: Bí mật chuyển từ Producer lên Leader, từ Leader lên Owner</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi giảng chia sẻ &quot;bí mật&quot; để chuyển đổi từ người sản xuất/làm công việc chuyên</h3>\n<p class=\"body-txt\">\nmôn sang vị trí lãnh đạo và cuối cùng là chủ doanh nghiệp. Phương pháp cốt lõi là vẽ sơ đồ\n \ntổ chức tập trung vào từng cá nhân, xác định rõ ai nhận thông tin/công việc từ đâu và giao\n \nlại cho ai. Từ đó, nhận diện gánh nặng công việc do nhận quá nhiều đầu việc/chỉ đạo, và tìm\n \ncách cắt bớt, giao hoặc thuê người khác làm để tối ưu hóa, nhân đôi vai trò hoặc hình thành\n \nphòng ban mới. Mục tiêu cuối cùng là xây dựng một hệ thống hoạt động hiệu quả mà người\n \nchủ không cần trực tiếp làm việc vẫn tạo ra giá trị.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mục tiêu chuyển đổi vai trò: Từ &quot;người sản xuất hoặc là người làm công việc chuyên</span></div>\n<p class=\"body-txt\">\nmôn&quot; (producer) sang &quot;người vị trí lãnh đạo&quot; (leader) và cuối cùng là &quot;chủ doanh\n \nnghiệp&quot; (owner) – người không làm gì cả mà vẫn có tiền.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Công thức/Bí mật: Sử dụng một phương pháp vẽ sơ đồ tổ chức độc đáo.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Cách vẽ sơ đồ: Bắt đầu từ một &quot;con người&quot; (gọi là &quot;nốt&quot; hay &quot;điểm&quot;), không phải từ một</span></div>\n<p class=\"body-txt\">\nvị trí chung chung.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xác định luồng thông tin/công việc:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Vẽ mũi tên thể hiện &quot;cô ấy nhận tín hiệu thông tin từ đâu.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Vẽ mũi tên thể hiện &quot;cô ấy giao lại thông tin cho ai.&quot;</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mục đích của việc vẽ sơ đồ này: Tránh trường hợp &quot;một cái người không liên quan cũng</span></div>\n<p class=\"body-txt\">\nra lệnh cho cô ấy,&quot; đảm bảo người làm việc chỉ nhận lệnh và giá trị từ đúng nguồn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Vấn đề khi nhận quá nhiều &quot;đầu vào&quot;: Khi một người nhận thông tin/chỉ đạo từ quá</span></div>\n<p class=\"body-txt\">\nnhiều nguồn (ví dụ: 14 người), họ sẽ mất rất nhiều thời gian chỉ để giao tiếp, họp hành\n \n(ví dụ: mỗi người nói 5 phút đã mất hơn 1 giờ), mà chưa làm được việc gì thực tế.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Giải pháp: &quot;Cắt bớt khu vực này ra, giao cho người khác làm&quot; để &quot;giảm tải&quot; và &quot;thuê</span></div>\n<p class=\"body-txt\">\nngười khác vào làm.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Kết quả của giải pháp: Có thể &quot;nhân đôi&quot; năng lực của một cá nhân (ví dụ: từ một &quot;Cô</span></div>\n<p class=\"body-txt\">\nTrang&quot; thành hai &quot;Cô Trang&quot;) bằng cách tuyển thêm trợ lý để xử lý phần việc được giao,\n \nđảm bảo công việc vẫn vận hành.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mở rộng giải pháp: Việc &quot;cắt bớt&quot; và giao việc có thể dẫn đến việc hình thành một phòng</span></div>\n<p class=\"body-txt\">\nban mới thay vì chỉ một cá nhân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Bản chất của &quot;tài sản&quot; được giao/nhận: Đó là &quot;thông tin&quot;, có thể là tờ giấy, biên bản hoặc</span></div>\n<p class=\"body-txt\">\nmột vật chất nào đó.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mô hình chuyển đổi vai trò từ Người làm chuyên môn -&gt; Lãnh đạo -&gt; Chủ doanh nghiệp:</span></div>\n<p class=\"body-txt\">\nĐây là lộ trình phát triển tư duy và sự nghiệp quan trọng. Thay vì chỉ mãi là người thực\n \nthi công việc, việc học cách lãnh đạo (phân công, quản lý) và sau đó là làm chủ (xây dựng\n \nhệ thống tự vận hành) là chìa khóa để mở rộng quy mô và gia tăng giá trị cá nhân/doanh\n \nnghiệp một cách bền vững.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sơ đồ tổ chức &quot;ngược&quot; tập trung vào cá nhân và luồng thông tin: Phương pháp này độc</span></div>\n<p class=\"body-txt\">\nđáo và cực kỳ hiệu quả. Thay vì chỉ nhìn vào cơ cấu tổ chức trên giấy, việc phân tích từng\n \ncá nhân nhận thông tin từ ai và chuyển giao cho ai giúp &quot;phơi bày&quot; rõ ràng các điểm\n \nnghẽn, sự chồng chéo, hoặc gánh nặng giao tiếp không cần thiết, từ đó đưa ra giải pháp\n \nthực tế để tối ưu hóa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Khối lượng &quot;đầu vào&quot; thông tin/chỉ đạo là nguyên nhân chính gây tắc nghẽn và lãng phí</span></div>\n<p class=\"body-txt\">\nthời gian: Đây là một insight sâu sắc. Nhiều người chỉ tập trung vào khối lượng công việc\n \n*đầu ra* nhưng thầy Long chỉ ra rằng số lượng nguồn *đầu vào* (những người ra lệnh,\n \ncung cấp thông tin, yêu cầu) cho một cá nhân có thể tiêu tốn toàn bộ thời gian của họ chỉ\n \nđể giao tiếp, làm giảm đáng kể thời gian thực thi công việc. Nhận diện và quản lý các\n \nnguồn &quot;đầu vào&quot; này là tối quan trọng để giải phóng năng suất.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chiến lược &quot;cắt bớt&quot; và &quot;nhân đôi&quot; để mở rộng quy mô: Khi một người quá tải, giải pháp</span></div>\n<p class=\"body-txt\">\nkhông phải là thúc ép họ làm nhiều hơn mà là chủ động phân chia, giao bớt công việc\n \nhoặc tuyển thêm người (trợ lý, nhân sự mới) để &quot;nhân đôi&quot; năng lực. Điều này cho phép\n \ndoanh nghiệp mở rộng mà không phụ thuộc quá mức vào một cá nhân, xây dựng hệ\n \nthống bền vững hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“chuyển từ người sản xuất hoặc là người làm công việc chuyên môn sang người vị trí lãnh đạo\n \nvà chuyển từ vị trí lãnh đạo sang làm chủ doanh nghiệp, chủ doanh nghiệp là người mà không\n \nlàm gì cả mà có tiền gọi là chủ doanh nghiệp.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Sơ đồ tổ chức viết theo kiểu này rất dị. Là bắt đầu từ một con người trước, xem là người đó\n \nđang làm bao nhiêu công việc.”\n \n“mỗi thằng chỉ cần ra cho mình hai lệnh thì mình mất bao nhiêu rồi? Mất bốn tiếng rồi chỉ để\n \nnói chuyện với nhau chứ chưa làm gì cả.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 43: Chuỗi giá trị - phần 1</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi học tập trung vào khái niệm &quot;chuỗi giá trị&quot; trong kinh doanh và đội nhóm,</h3>\n<p class=\"body-txt\">\nnhấn mạnh rằng mỗi giao dịch giữa người cho và người nhận phải được thực hiện hiệu quả\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\nvà rõ ràng. Thầy Long trình bày sáu loại giá trị có thể được trao đổi và năm hành động phản\n \nhồi khi nhận giá trị, trong đó hành động &quot;bỏ qua&quot; được cảnh báo là vô cùng tai hại. Cốt lõi là\n \nmỗi cá nhân trong chuỗi phải chủ động gia tăng giá trị cho thông tin/yêu cầu nhận được\n \ntrước khi bàn giao cho người tiếp theo, để đảm bảo toàn bộ hệ thống vận hành trôi chảy,\n \nhiệu quả và tránh phá hủy giá trị chung.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Khái niệm &quot;chuỗi giá trị&quot;: Một chuỗi các giao dịch cho và nhận giữa các &quot;nút mạng&quot; (cá</span></div>\n<p class=\"body-txt\">\nnhân/bộ phận) trong một hệ thống/doanh nghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Ba tiêu chí khi giao và nhận trong chuỗi giá trị:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Người giao phải giao và người nhận phải nhận.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Người giao phải kiểm tra rằng người nhận đã nhận đúng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Người nhận phải kiểm tra rằng người giao đã giao đúng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Hành động &quot;bỏ qua&quot; trong chuỗi giá trị là vô cùng nguy hiểm, phá hủy bản thân, chuỗi</span></div>\n<p class=\"body-txt\">\ngiá trị, khách hàng và công ty.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sáu loại giá trị có thể giao và nhận:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thông tin (cơ hội, nhu cầu, thách thức, vấn đề).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Yêu cầu.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Cảm xúc.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nhu cầu.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Vật chất (tài sản, nguyên vật liệu).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Quyết định/Thời hạn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Năm lựa chọn hành động khi nhận giá trị/mệnh lệnh:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nhận và hành động ngay.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Hỏi lại cho rõ (nếu không chính xác/hiểu).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Đàm phán hoặc tạo mệnh lệnh mới.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Từ chối (phải nói rõ lý do).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Bỏ qua (vô cùng thậm tệ, phá hủy mọi thứ).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Ba nhân tố quan trọng để giao/nhận hiệu quả:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chủ động.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mạch lạc, thông minh (Keep It Short and Simple - KISS).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xác nhận lại.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Quy trình gia tăng giá trị:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Khi nhận, phải gia tăng giá trị cho nó.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sau đó, bàn giao lại cho người tiếp theo.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nếu một người không gia tăng giá trị, người đó nên rời khỏi tổ chức.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Minh họa chuỗi giá trị qua ví dụ tổ chức sự kiện Money Coach Live (Money Kaline), với</span></div>\n<p class=\"body-txt\">\ncác nút là Sale Manager, Marketing Manager, Copywriter, Designer, Lead Generator,\n \nSales Team, Kế toán, Event Coordinator và Khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Hậu quả khi một &quot;nút&quot; gặp vấn đề: Chỉ cần một &quot;nút&quot; trong chuỗi làm sai, không làm</span></div>\n<p class=\"body-txt\">\nđúng, hoặc &quot;bỏ qua&quot; thì toàn bộ chuỗi sẽ bị phá vỡ, gây ra thiệt hại lớn (không chỉ chi phí\n \nquảng cáo mà còn cả giá trị trọn đời của khách hàng - LVC).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Luôn gia tăng giá trị ở mỗi bước trong chuỗi: Điều này quan trọng vì nó chuyển đổi từng</span></div>\n<p class=\"body-txt\">\ncông việc đơn lẻ thành một quy trình tích lũy, nâng cao chất lượng đầu ra cuối cùng. Nếu\n \nmỗi mắt xích chỉ chuyển tiếp mà không cải thiện, chuỗi sẽ yếu đi, không tạo ra giá trị đột\n \nphá, và cuối cùng sẽ bị phá vỡ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tuyệt đối tránh hành vi &quot;bỏ qua&quot; (ignore): Thầy Long nhấn mạnh đây là hành vi &quot;vô</span></div>\n<p class=\"body-txt\">\ncùng thậm tệ&quot; vì nó không chỉ làm đứt gãy chuỗi giá trị, phá hủy công việc của cá nhân và\n \nđồng đội mà còn gây thiệt hại tài chính lớn (mất LVC của khách hàng). Hành vi này biến\n \nmột cá nhân thành &quot;con sói cô độc&quot; trong đội nhóm và làm sụp đổ toàn bộ hệ thống.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Giao tiếp rõ ràng, chủ động và có xác nhận: Hiệu quả của chuỗi giá trị phụ thuộc vào việc</span></div>\n<p class=\"body-txt\">\ncác &quot;nút&quot; giao tiếp thông tin, yêu cầu, quyết định một cách ngắn gọn, dễ hiểu (tuân thủ\n \nnguyên tắc KISS: Keep It Short and Simple) và luôn xác nhận lại. Điều này giúp tránh\n \nhiểu lầm, tiết kiệm thời gian, đảm bảo mọi người đều hiểu rõ nhiệm vụ và mong đợi,\n \nngăn chặn sự cố ngay từ đầu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Khi mà chúng ta bỏ qua nó [mệnh lệnh/thông tin], chúng ta tự phá hủy bản thân mình, phá\n \nhủy chuỗi giá trị, phá hủy khách hàng và phá hủy công ty.”\n \n“Nếu mà chúng ta bỏ qua chúng ta thờ ơ, không bao giờ có thương hiệu, có nhân hiệu hết.”\n \n“Mỗi một con người ở trong một tổ chức, anh ta phải làm một việc gì đó gia tăng cái giá trị\n \ncho một cái chuỗi nào đó. Còn nếu một cái người nào đó mà ngồi mà không gia tăng cái chuỗi\n \nnào cả thì cái người đó nên rời khỏi tổ chức.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Giao tiếp và xác nhận rõ ràng: Mọi thông tin về yêu cầu, phong cách diễn họa, tiêu chuẩn</span></div>\n<p class=\"body-txt\">\nchất lượng, và thời gian bàn giao phải được giao tiếp &quot;mạch lạc&quot; và &quot;xác nhận lại&quot; giữa\n \ncác thành viên trong đội và với khách hàng để đảm bảo sản phẩm cuối cùng đúng ý,\n \ntránh sửa chữa tốn kém và duy trì sự chuyên nghiệp, xây dựng mối quan hệ tin cậy với\n \nkhách hàng Nhật Bản.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 44: Chuỗi giá trị - phần 2</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi giảng tập trung vào khái niệm &quot;chuỗi giá trị&quot; trong kinh doanh, nhấn mạnh</h3>\n<p class=\"body-txt\">\nviệc mỗi cá nhân hoặc bộ phận phải xác định và đóng góp giá trị cụ thể vào một chuỗi công\n \nviệc liên tục. Thầy Long minh họa cách xây dựng và tối ưu chuỗi giá trị thông qua một ví dụ\n \nchi tiết về chiến dịch marketing thư tay, cho thấy rằng dù là marketing truyền thống hay\n \ninternet, cốt lõi vẫn là quy trình kinh doanh và việc mỗi thành viên phải gia tăng giá trị. Mục\n \nđích cuối cùng là hiểu rõ vai trò của mình, tối ưu hóa quy trình để đạt hiệu quả cao nhất và\n \nsẵn sàng loại bỏ hoặc thay thế các mắt xích yếu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Khái niệm Chuỗi giá trị: Mỗi cá nhân trong công ty cần xác định mình đang nằm trong</span></div>\n<p class=\"body-txt\">\nbao nhiêu chuỗi giá trị và công việc nào thực sự tạo ra giá trị cho công ty.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Loại bỏ công việc không thuộc chuỗi giá trị: Những công việc không tạo ra giá trị cho</span></div>\n<p class=\"body-txt\">\nchuỗi cần được loại bỏ khỏi trách nhiệm của cá nhân và công ty.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Quy trình Marketing thư tay: Thầy Long minh họa một chiến dịch marketing bằng thư</span></div>\n<p class=\"body-txt\">\ntay (&quot;old school&quot; marketing) hiệu quả, bắt đầu từ Sales Manager -&gt; Marketing Manager -\n \n&gt; Copywriter -&gt; Designer -&gt; Printing House -&gt; Warehouse -&gt; Express Delivery -&gt; Khách\n \nhàng mục tiêu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chi phí và hiệu quả của Marketing thư tay: Để có 1000 khách hàng (tỷ lệ chuyển đổi</span></div>\n<p class=\"body-txt\">\n1%), cần gửi 100.000 bức thư, mỗi bức thư có chi phí khoảng 15.000 VNĐ, tổng cộng 1.5\n \ntỷ VNĐ. Tuy nhiên, nếu mang về 100 khách hàng chất lượng cao (đại bàng) có thể thu về\n \n10 tỷ VNĐ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chi tiết chiến dịch thư tay: Thư tay phải được viết bằng tay, không có tên người gửi, có</span></div>\n<p class=\"body-txt\">\ntên địa chỉ người nhận, làm phồng phong bì và nhét kẹo vào bên trong để gây tò mò, tạo\n \nsự khác biệt.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet Marketing là đòn bẩy: Internet marketing không khó, nó chỉ là công cụ (đòn</span></div>\n<p class=\"body-txt\">\nbẩy) giúp thực hiện các quy trình marketing cơ bản nhanh hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tầm quan trọng của Quy trình kinh doanh: Điều cốt lõi là phải hiểu quy trình kinh</span></div>\n<p class=\"body-txt\">\ndoanh. Nếu không hiểu, internet marketing sẽ không có tác dụng. Để hiểu internet\n \nmarketing, phải hiểu marketing; để hiểu marketing, phải hiểu kinh doanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng chuỗi giá trị từ cá nhân: Ban đầu, một người chủ doanh nghiệp sẽ làm tất cả</span></div>\n<p class=\"body-txt\">\ncác khâu. Sau đó, họ &quot;cắt ra&quot; từng công việc và &quot;nhét thằng khác vào&quot; để xây dựng các\n \nmắt xích trong chuỗi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Trách nhiệm và Linh hoạt của Chuỗi giá trị: Mỗi người trong chuỗi phải tự ý thức được</span></div>\n<p class=\"body-txt\">\nviệc mình cần làm và chịu trách nhiệm. Nếu một mắt xích bị &quot;tắc&quot; (không thực hiện được\n \nnhiệm vụ), có thể cắt bỏ mắt xích đó và nối trực tiếp mắt xích trước với mắt xích sau để\n \nđảm bảo chuỗi hoạt động liên tục.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mục tiêu là Gia tăng giá trị cho người khác: Mỗi mắt xích trong chuỗi cần tập trung vào</span></div>\n<p class=\"body-txt\">\nviệc gia tăng giá trị cho người ở mắt xích tiếp theo, đó là bản chất của trò chơi kinh\n \ndoanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Vai trò của Squeeze Page (trang thu thập thông tin): Mọi hoạt động trên Facebook (hoặc</span></div>\n<p class=\"body-txt\">\nthư tay) đều nhằm dẫn khách hàng tiềm năng đến một trang thu thập thông tin (squeeze\n \npage) để tiếp tục quy trình marketing.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Phản hồi tiêu cực (Căm thù) và Quy tắc Hoàn tiền: Thầy Long nhấn mạnh rằng nếu học</span></div>\n<p class=\"body-txt\">\nviên không hiểu bài giảng và cảm thấy &quot;căm thù&quot;, họ có quyền được hoàn tiền.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mô hình Chuỗi giá trị là nền tảng cốt lõi của mọi hoạt động kinh doanh: Thầy Long không</span></div>\n<p class=\"body-txt\">\nchỉ giới thiệu khái niệm mà còn minh họa rất chi tiết cách một quy trình kinh doanh (từ\n \ntìm kiếm khách hàng đến bán hàng và hậu mãi) được chia thành các mắt xích, mỗi mắt\n \nxích là một vai trò cụ thể. Điều này quan trọng vì nó cung cấp một khuôn khổ rõ ràng để\n \nphân tích, tối ưu hóa và quản lý bất kỳ doanh nghiệp nào, giúp chủ doanh nghiệp thoát\n \nkhỏi việc &quot;ôm đồm&quot; mọi thứ và biết cách phân công, ủy quyền hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet Marketing chỉ là CÔNG CỤ (đòn bẩy), không phải CỐT LÕI: Điểm này được thầy</span></div>\n<p class=\"body-txt\">\nLong nhấn mạnh nhiều lần. Dù là thư tay truyền thống hay quảng cáo trực tuyến, quy\n \ntrình tạo ra giá trị và chuyển đổi khách hàng vẫn phải tuân theo một chuỗi logic. Internet\n \nchỉ giúp đẩy nhanh quá trình đó. Insight này quan trọng vì nó giúp chủ doanh nghiệp\n \nkhông bị sa đà vào các công cụ hay xu hướng mới mà quên đi nền tảng về kinh doanh và\n \nmarketing.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mỗi mắt xích cần &quot;Gia tăng giá trị cho người khác&quot;: Đây là nguyên tắc vàng trong chuỗi</span></div>\n<p class=\"body-txt\">\ngiá trị. Thay vì chỉ làm công việc của mình theo mô tả, mỗi người phải hiểu rằng nhiệm\n \nvụ của họ là tạo ra giá trị để mắt xích tiếp theo có thể hoạt động tốt hơn. Điều này không\n \nchỉ tạo ra sự phối hợp hiệu quả mà còn thúc đẩy tư duy trách nhiệm và sự chủ động\n \ntrong công việc. Nó giúp xây dựng một văn hóa doanh nghiệp nơi mọi người đều hướng\n \ntới mục tiêu chung, thay vì chỉ hoàn thành &quot;phần việc của mình&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Khả năng thay thế/loại bỏ mắt xích yếu là điểm mấu chốt để duy trì hoạt động: Buổi</span></div>\n<p class=\"body-txt\">\ngiảng chỉ ra rằng nếu một người hoặc một bộ phận không hoàn thành nhiệm vụ và làm\n \n&quot;tắc&quot; chuỗi, họ có thể bị cắt bỏ hoặc thay thế ngay lập tức. Tính linh hoạt này đảm bảo\n \nrằng dòng chảy giá trị không bị gián đoạn, tối thiểu hóa rủi ro và thiệt hại cho toàn bộ hệ\n \nthống. Điều này quan trọng đối với các chủ doanh nghiệp trong việc quản lý nhân sự và\n \nphân bổ nguồn lực, đảm bảo hiệu suất liên tục.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Internet thì nó không khó, mà là là dùng internet làm việc gì nó mới là khó.”\n \n“Vấn đề là các ông có hiểu quy trình kinh doanh hay không. Nếu các ông hiểu về quy trình kinh\n \ndoanh thì internet nó mới có tác dụng.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Thằng nào không làm thì đó là họ đang bẻ gãy cái chuỗi giá trị. Và khi một người bẻ gãy cái\n \nchuỗi giá trị thì họ sẽ nhận ra rằng là trách nhiệm của mình nó đang lớn như thế nào và họ sẽ\n \ncó nghĩa vụ phải giải quyết nó.”\n \n“Mẹ có mỗi thế thôi mà nhắc đi nhắc lại mãi là nên làm điều đấy, bởi vì đấy là tiền của các ông,\n \nhiểu chưa? Không làm được ở đây tối về gửi email, gửi tin nhắn, tiền lại về tài khoản các anh\n \nchị.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sử dụng email cá nhân hóa thay vì thư giấy để tăng tốc độ và giảm chi phí, nhưng vẫn giữ</span></div>\n<p class=\"body-txt\">\nđược yếu tố &quot;viết tay&quot; thông qua giọng văn và cách trình bày.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sử dụng Facebook/Mạng xã hội để dẫn về Squeeze Page:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tạo các bài đăng về diễn họa kiến trúc, mẹo thiết kế 3D, phân tích các phong cách render</span></div>\n<p class=\"body-txt\">\nđẹp mắt, hoặc các dự án diễn họa nổi bật của FUTAGO BIM.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mỗi bài đăng đều có lời kêu gọi hành động rõ ràng và liên kết dẫn về một &quot;squeeze page&quot;</span></div>\n<p class=\"body-txt\">\n(ví dụ: một trang web nơi khách hàng có thể xem portfolio đầy đủ, yêu cầu báo giá dịch\n \nvụ diễn họa, hoặc tải về các tài liệu hữu ích như cẩm nang về các phong cách render phổ\n \nbiến).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Trang đích này phải được tối ưu hóa để thu thập thông tin khách hàng tiềm năng và dẫn</span></div>\n<p class=\"body-txt\">\ndắt họ tiếp tục vào quy trình bán hàng dịch vụ diễn họa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Đảm bảo tính linh hoạt của quy trình:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nếu một nhân viên rendering đang bị quá tải hoặc gặp vấn đề, có thể tạm thời chuyển</span></div>\n<p class=\"body-txt\">\ngiao một phần công việc cho nhân viên hậu kỳ nếu họ có kỹ năng tương tự, hoặc có quy\n \ntrình rõ ràng để người quản lý can thiệp, đảm bảo tiến độ công việc diễn họa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Điều này giúp tránh tình trạng &quot;tắc nghẽn&quot; trong quá trình sản xuất diễn họa, đặc biệt</span></div>\n<p class=\"body-txt\">\nquan trọng khi làm việc với khách hàng Nhật Bản luôn yêu cầu độ chính xác và đúng thời\n \nhạn cao.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 45: Mô hình kinh doanh - phần 1</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi giảng tập trung vào mô hình kinh doanh cơ bản 8 bước (có thể rút gọn thành</h3>\n<p class=\"body-txt\">\n5 phần chính), với trọng tâm là việc xác định rõ &quot;khách hàng mục tiêu là ai&quot; (Market/Who).\n \nThầy Long nhấn mạnh rằng việc yêu thích và hiểu sâu sắc khách hàng là chìa khóa thành\n \ncông, khác biệt so với việc chỉ yêu thích sản phẩm. Ngoài ra, tinh thần &quot;cống hiến&quot; trong kinh\n \ndoanh cũng được đề cao như một lợi thế cạnh tranh vượt trội.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mô hình kinh doanh cơ bản: Để kinh doanh thành công, ta cần hiểu rõ mô hình kinh</span></div>\n<p class=\"body-txt\">\ndoanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xác định thị trường (Market/Who): Bước đầu tiên và tối thiểu là phải tìm ra thị trường</span></div>\n<p class=\"body-txt\">\nvà xác định được &quot;Ai là khách hàng mục tiêu của mình?&quot;. Không trả lời được câu hỏi này\n \nthì không thể bắt đầu kinh doanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sự khác biệt của người thành công: Hầu hết mọi người tập trung vào &quot;bán cái gì&quot; (sản</span></div>\n<p class=\"body-txt\">\nphẩm), trong khi người thành công tập trung vào &quot;bán cho ai&quot; (khách hàng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Yêu thích khách hàng: Doanh nhân yêu thích sản phẩm thì thất bại, doanh nhân yêu</span></div>\n<p class=\"body-txt\">\nthích khách hàng thì thành công. Không thể có được tình yêu của khách hàng nếu mình\n \nkhông yêu họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thị trường ngách (Niche): Thị trường ngách là một mảnh nhỏ của thị trường lớn, được</span></div>\n<p class=\"body-txt\">\nxác định bởi những thuộc tính đặc thù. Việc tìm ra và tập trung vào thị trường ngách\n \ngiúp doanh nghiệp trở thành chuyên gia, giảm cạnh tranh. Ví dụ: Yoga (thị trường) và\n \nYoga giảm cân (thị trường ngách).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thông điệp bán hàng (Message): Sau khi xác định thị trường ngách, bước tiếp theo là</span></div>\n<p class=\"body-txt\">\nviết thông điệp quảng cáo/bán hàng. Thông điệp này có thể ở nhiều dạng: trang web bán\n \nhàng (sales page), email bán hàng, quảng cáo.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Kênh truyền thông (Medium): Chọn kênh/phương tiện mà khách hàng mục tiêu thường</span></div>\n<p class=\"body-txt\">\nxuyên xuất hiện. Không thể &quot;câu cá&quot; ở nơi không có cá. Đối với internet marketing, kênh\n \nlà internet.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Khách hàng tiềm năng (List/Leads): Việc kinh doanh tập trung vào tìm kiếm và xây dựng</span></div>\n<p class=\"body-txt\">\ndanh sách khách hàng tiềm năng (database/build list), đây là công việc cốt lõi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chuyển đổi (Sale): Chuyển đổi khách hàng tiềm năng thành khách hàng thực sự (bán</span></div>\n<p class=\"body-txt\">\nhàng). Giai đoạn này cần các thủ thuật để tăng tỷ lệ chuyển đổi. Ở Việt Nam, COD (Cost\n \non Delivery) phổ biến do thói quen thanh toán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Trải nghiệm khách hàng (Wow Experience): Cung cấp trải nghiệm dịch vụ khách hàng</span></div>\n<p class=\"body-txt\">\nvượt trội (Wow Experience). Trải nghiệm này phải &quot;đúng đối tượng&quot; mới tạo ra hiệu\n \nquả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tăng giá trị trọn đời của khách hàng (LVC - Lifetime Value Customer): Áp dụng các chiến< "body-txt\">\nkhả năng chi trả và có nhu cầu).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chuyển đổi khách hàng tiềm năng thành khách hàng mua hàng (bán cho khách hàng</span></div>\n<p class=\"body-txt\">\ntiềm năng, không phải tất cả mọi người).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sai lầm phổ biến: Đổ traffic (nguồn khách hàng) trực tiếp vào trang bán hàng (sales</span></div>\n<p class=\"body-txt\">\npage) mà không qua các bước lọc và nuôi dưỡng, dẫn đến tỷ lệ chuyển đổi thấp và không\n \nthành công.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chiến lược phễu bán hàng (Funnel/phễu bán hàng):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Bắt đầu bằng việc xây dựng một Squeeze Page (Landing Page) để thu thập thông tin</span></div>\n<p class=\"body-txt\">\nkhách hàng tiềm năng.\n</p></div></div>",
