"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Vai trò của hệ thống tự động trong kinh doanh internet: Thầy nhấn mạnh rằng hai loại</span></div>\n<p class=\"body-txt\">\ntrang này không hoạt động độc lập mà phối hợp thông qua một hệ thống tự động. Điều\n \nnày cực kỳ quan trọng vì nó cho phép doanh nghiệp vận hành quy trình marketing và\n \nbán hàng một cách hiệu quả, tự động hóa, tiết kiệm thời gian và mở rộng quy mô mà\n \nkhông cần can thiệp thủ công liên tục, tạo ra lợi thế cạnh tranh đáng kể.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Thế nào là kinh doanh trên internet?”\n \n“Bán hàng lấy tiền gọi là Sale Page.”\n \n“Cơ bản là giống nhau nhưng khác cái nội dung.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 19: Hệ thống kinh doanh trên Internet</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi giảng này trình bày về quy trình xây dựng một hệ thống marketing tự động</h3>\n<p class=\"body-txt\">\ntrên internet, từ việc thu thập thông tin khách hàng tiềm năng đến việc chăm sóc và bán\n \nhàng. Cốt lõi là việc tạo ra một chuỗi giá trị thông qua các sản phẩm thông tin (info product)\n \ngửi qua email, kết hợp giữa tự động hóa (autoresponder) và tương tác thủ công\n \n(newsletter). Thầy cũng nhấn mạnh lợi ích của việc sử dụng các nền tảng có sẵn để đơn giản\n \nhóa các công đoạn kỹ thuật phức tạp, giúp người làm marketing tập trung vào nội dung và\n \nchiến lược định giá cao để tăng doanh số.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Hệ thống cần một &quot;Squeeze Page&quot; (trang 1) để thu thập email khách hàng tiềm năng. Đây</span></div>\n<p class=\"body-txt\">\nlà điểm bắt đầu của phễu marketing.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sau khi đăng ký, khách hàng sẽ được dẫn đến &quot;Thank You Page&quot; (trang 3). Trang này có</span></div>\n<p class=\"body-txt\">\nthể đồng thời là một trang bán hàng &quot;One Time Offer&quot; (OTO).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">&quot;One Time Offer&quot; (OTO - trang 4) là một ưu đãi đặc biệt, chỉ xuất hiện một lần duy nhất</span></div>\n<p class=\"body-txt\">\nđể tạo tính cấp bách, khuyến khích khách hàng mua ngay hoặc bỏ lỡ cơ hội.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Email khách hàng được tự động xử lý và lưu trữ vào &quot;Database&quot; (hệ thống số 6).</span></div>\n<p class=\"body-txt\">\nDatabase giúp phân loại và quản lý thông tin khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Hệ thống &quot;Autoresponder&quot; (số 7) sẽ tự động gửi một chuỗi email tuần tự theo một kịch</span></div>\n<p class=\"body-txt\">\nbản đã định sẵn (được gọi là các &quot;sản phẩm thông tin&quot; - info products).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">&quot;Newsletter&quot; (số 8) là các email chăm sóc khách hàng được gửi thủ công, định kỳ hoặc</span></div>\n<p class=\"body-txt\">\nđột xuất. Nội dung cũng là &quot;sản phẩm thông tin&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Các &quot;sản phẩm thông tin&quot; (info products) không chỉ là thư chào hàng mà là những nội</span></div>\n<p class=\"body-txt\">\ndung giá trị, cung cấp thông tin hữu ích cho khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Từ Autoresponder và Newsletter, khách hàng lâu lâu sẽ được dẫn đến &quot;Sales Page&quot;</span></div>\n<p class=\"body-txt\">\n(trang 9) để giới thiệu sản phẩm chính.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Các bước 2 (Squeeze Page), 4 (OTO/Thank You Page), 6 (Database), 9 (Sales Page) là</span></div>\n<p class=\"body-txt\">\nnhững công việc thiết lập một lần. Sau khi hoàn thành, hệ thống sẽ tự động hoạt động và\n \nbạn có thể &quot;quên&quot; chúng đi (ít phải chỉnh sửa).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Các bước 7 (Autoresponder) và 8 (Newsletter) là công việc hàng ngày, tập trung vào việc</span></div>\n<p class=\"body-txt\">\ntạo nội dung để chăm sóc khách hàng liên tục.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Trong mô hình tiếp thị liên kết (affiliate marketing), người bán không cần phải tự tạo</span></div>\n<p class=\"body-txt\">\n&quot;Sales Page&quot; (số 9).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Các nền tảng như Unica, Udemy, EduMo giúp đơn giản hóa hệ thống marketing. Chúng</span></div>\n<p class=\"body-txt\">\nđảm nhiệm các công việc phức tạp như thiết kế website, landing page, hosting, domain,\n \nxử lý thanh toán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Với sự hỗ trợ của các nền tảng này, người làm marketing chỉ cần tập trung vào việc &quot;viết</span></div>\n<p class=\"body-txt\">\nmột cái email gửi đi&quot; (tức là tạo nội dung giá trị) và mọi việc còn lại được hệ thống lo.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chiến lược định giá: Bán sản phẩm/dịch vụ với giá cao hơn có thể hấp dẫn khách hàng</span></div>\n<p class=\"body-txt\">\nhơn. Thậm chí, cùng một sản phẩm, việc đổi tên và tăng giá có thể mang lại doanh số tốt\n \nhơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Phân biệt rõ công việc &quot;Thiết lập một lần&quot; và &quot;Hoạt động hàng ngày&quot;: Thầy phân chia hệ</span></div>\n<p class=\"body-txt\">\nthống marketing thành các phần cần thiết lập ban đầu (Squeeze Page, Thank You Page,\n \nDatabase, Sales Page) và các phần cần duy trì liên tục (Autoresponder, Newsletter). Điều\n \nnày quan trọng vì nó giúp nhà tiếp thị phân bổ nguồn lực hiệu quả, biết khi nào cần đầu\n \ntư công sức xây dựng nền tảng và khi nào cần tập trung vào việc tạo nội dung và tương\n \ntác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chuyển dịch từ bán hàng trực tiếp sang cung cấp &quot;Sản phẩm thông tin&quot;: Thầy nhấn mạnh</span></div>\n<p class=\"body-txt\">\nrằng nội dung của các email tự động (autoresponder) và newsletter không chỉ là chào\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\nhàng mà là &quot;sản phẩm thông tin&quot; có giá trị. Insight này rất quan trọng vì nó thay đổi tư\n \nduy marketing từ việc cố gắng bán hàng ngay lập tức sang việc xây dựng lòng tin và mối\n \nquan hệ thông qua việc chia sẻ kiến thức hữu ích. Khi khách hàng cảm thấy nhận được\n \ngiá trị, khả năng họ mua hàng sẽ cao hơn nhiều.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chiến lược &quot;Bán đắt lên thì người ta lại mua&quot;: Đây là một insight phản trực giác nhưng</span></div>\n<p class=\"body-txt\">\nrất giá trị. Thầy chia sẻ rằng việc định giá cao hơn (thậm chí gấp 4 lần so với đối thủ) có\n \nthể khiến sản phẩm/dịch vụ được mua nhiều hơn. Điều này quan trọng vì nó gợi ý rằng\n \ngiá cao có thể tạo ra cảm nhận về chất lượng, uy tín hoặc sự độc quyền, thu hút phân\n \nkhúc khách hàng sẵn sàng chi trả cho giá trị cao. Nó khuyến khích người bán thoát khỏi\n \ntư duy cạnh tranh bằng giá thấp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tối ưu hóa công việc bằng cách tận dụng nền tảng có sẵn: Thay vì tự xây dựng toàn bộ</span></div>\n<p class=\"body-txt\">\nhệ thống từ đầu (hosting, domain, thiết kế website, xử lý thanh toán), thầy chỉ ra rằng\n \ncác nền tảng như Unica, Udemy, EduMo có thể đảm nhiệm phần lớn các công việc kỹ\n \nthuật này. Điều này cực kỳ quan trọng vì nó giúp người làm marketing giảm thiểu rào\n \ncản kỹ thuật, tiết kiệm thời gian và chi phí, cho phép họ tập trung vào yếu tố quan trọng\n \nnhất: tạo ra nội dung hấp dẫn và có giá trị để thu hút khách hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Bán đắt lên ấy thì người ta lại mua. Bán rẻ không mua.”\n \n“Sản phẩm thông tin này có thể chính là các email mà ta gửi cho khách hàng.”\n \n“Mọi việc họ làm giúp hết. Việc của chúng ta bây giờ làm gì ạ? Viết một cái email gửi đi và mọi\n \nviệc chấm dứt.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sales Page (Trang dịch vụ): Các email này sẽ dẫn khách hàng đến trang dịch vụ của</span></div>\n<p class=\"body-txt\">\nFUTAGO, nơi giới thiệu rõ ràng các gói render, portfolio chất lượng cao và quy trình làm\n \nviệc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chiến lược định giá cao (Premium Pricing):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Dựa trên nguyên lý &quot;bán đắt lên thì người ta lại mua&quot;, FUTAGO nên định vị mình là một</span></div>\n<p class=\"body-txt\">\nnhà cung cấp dịch vụ diễn họa kiến trúc cao cấp, tập trung vào chất lượng, độ chính xác\n \nvà khả năng truyền tải cảm xúc. Việc đặt giá cao hơn so với thị trường chung có thể tạo\n \nấn tượng về giá trị vượt trội và thu hút phân khúc khách hàng B2B Nhật Bản sẵn sàng\n \nchi trả cho sự khác biệt.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tập trung vào nội dung và chất lượng hình ảnh:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thay vì lo lắng về hạ tầng kỹ thuật phức tạp (như các nền tảng khóa học), FUTAGO nên</span></div>\n<p class=\"body-txt\">\ntối ưu hóa việc xây dựng hệ thống email marketing đơn giản (dùng các công cụ có sẵn\n \nnhư Mailchimp, ActiveCampaign) và dồn nguồn lực vào việc tạo ra portfolio ấn tượng,\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">case study chi tiết và các &quot;sản phẩm thông tin&quot; chất lượng cao. Mục tiêu là để hình ảnh</h3>\n<p class=\"body-txt\">\nrender tự nói lên giá trị của nó.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 20: Làm &amp; Hiểu, vòng tròn Mindset - kiến thức - công cụ</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi giảng tập trung vào chu trình phát triển bản thân và doanh nghiệp &quot;Làm -&gt;</h3>\n<p class=\"body-txt\">\nKết quả -&gt; Niềm tin -&gt; Khả năng -&gt; Làm&quot;, trong đó &quot;Học&quot; đóng vai trò quan trọng như\n \n&quot;nguyên liệu&quot; để mở rộng vòng lặp này thông qua việc thay đổi tư duy (mindset), tăng kiến\n \nthức và công cụ. Thầy nhấn mạnh sự cần thiết của hành động liên tục, chấp nhận rủi ro ban\n \nđầu, và tích hợp các phương pháp mới (như internet marketing) một cách bổ sung chứ\n \nkhông phá bỏ cái cũ. Để thành công, việc xây dựng một đội ngũ hỗ trợ đa dạng (coach,\n \nmentor, consultant, technical, peer group) là không thể thiếu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chu trình phát triển: Con người/doanh nghiệp hoạt động theo chu trình &quot;Làm -&gt; Kết quả</span></div>\n<p class=\"body-txt\">\n-&gt; Niềm tin -&gt; Khả năng -&gt; Làm&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Làm và Kết quả: Khi làm, chúng ta sẽ nhận được kết quả. Không có kết quả đúng hay sai,</span></div>\n<p class=\"body-txt\">\nchỉ có kết quả (ví dụ: đánh đề lúc nào cũng đúng, chỉ là kết quả xổ số ra con số khác).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Kết quả dẫn đến Niềm tin: Kết quả (tốt hoặc xấu) sẽ dẫn đến việc củng cố niềm tin vào</span></div>\n<p class=\"body-txt\">\nbản thân hoặc quá trình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Niềm tin dẫn đến Khả năng: Có niềm tin thì khả năng sẽ tăng lên.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Khả năng thúc đẩy hành động: Càng có khả năng thì ta càng &quot;làm&quot; nhiều hơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Vai trò của &quot;Học&quot;:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">&quot;Học&quot; giúp bơm &quot;nguyên liệu&quot; vào chu trình.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nếu không học, chu trình &quot;Làm&quot; sẽ co dần lại và cuối cùng là mất hết.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Học để thay đổi tư duy (Mindset): Là yếu tố đầu tiên giúp thay đổi niềm tin.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Học để tăng kiến thức (Knowledge) và công cụ (Tools): Là yếu tố giúp tăng khả năng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Không kỳ vọng kết quả ngay lập tức: Thành công không đến sau 1-2 ngày hay 3 tháng.</span></div>\n<p class=\"body-txt\">\nNgay cả các guru cũng thường chia sẻ ít nhất 3 năm thất bại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tích hợp, không phá bỏ:</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nếu đang đi học hoặc đi làm, đừng bỏ dở mà hãy tiếp tục.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nếu có doanh nghiệp riêng, đừng phá bỏ hệ thống cũ đang ổn định. Hãy kết hợp hệ</span></div>\n<p class=\"body-txt\">\nthống cũ với internet marketing từng phần, bắt đầu từ phần marketing, theo nguyên tắc\n \n&quot;xây thêm, không phá bỏ&quot; (tương tự &quot;không bỏ vợ, chỉ có thêm con&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Bước đầu tiên quan trọng nhất là đưa Traffic: Đưa lượng người (khách hàng tiềm năng)</span></div>\n<p class=\"body-txt\">\nvào hệ thống.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chiến lược thử nghiệm và tối ưu hóa:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Dùng tất cả các cách để đưa traffic.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Cách nào có hiệu quả thì đầu tư thêm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Cách nào không hiệu quả thì bỏ đi ngay lập tức (nhưng hãy nhớ rằng việc &quot;bỏ&quot; là tùy</span></div>\n<p class=\"body-txt\">\ntheo từng campaign cụ thể, có thể dùng lại ở campaign khác).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Học từ thất bại: Khi kết quả không như mong đợi (kết quả xấu), cần phải hỏi mình đã</span></div>\n<p class=\"body-txt\">\nhọc được bài học gì để củng cố niềm tin, tăng khả năng và tiếp tục làm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Đội nhóm hỗ trợ để thành công: Để trở nên thành công, cần có một nhóm người hỗ trợ,</span></div>\n<p class=\"body-txt\">\nbao gồm:\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Coach: Người thúc giục, đẩy mình đi lên.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mentor: Người truyền cảm hứng, hỗ trợ tinh thần.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Consultant (Conzao tần): Các chuyên gia tư vấn về pháp lý, kế toán, hoặc các lĩnh vực</span></div>\n<p class=\"body-txt\">\nmới.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Technical: Người có kỹ năng kỹ thuật, có thể outsourcing (thuê ngoài).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Peer Group (Nhóm ngang hàng): Nhóm bạn ngang hàng về trình độ, khả năng, tiền bạc</span></div>\n<p class=\"body-txt\">\nđể cùng nhau học hỏi và phát triển.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chu trình &quot;Làm -&gt; Kết quả -&gt; Niềm tin -&gt; Khả năng -&gt; Làm&quot; và vai trò của &quot;Học&quot;: Đây là</span></div>\n<p class=\"body-txt\">\ncốt lõi của mọi sự phát triển, từ cá nhân đến doanh nghiệp. Nó chỉ ra rằng hành động là\n \nnguồn gốc của kết quả, kết quả tạo dựng niềm tin, niềm tin mở rộng khả năng, và khả\n \nnăng thúc đẩy hành động lớn hơn. Quan trọng nhất, &quot;Học&quot; là yếu tố thiết yếu để &quot;bơm\n \nnguyên liệu&quot; vào các thành phần Mindset, Kiến thức và Công cụ, đảm bảo chu trình này\n \nliên tục mở rộng thay vì thu hẹp dần.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nguyên tắc &quot;xây thêm, không phá bỏ&quot; khi áp dụng cái mới: Thầy Long khuyên không nên</span></div>\n<p class=\"body-txt\">\nphá bỏ những gì đang hoạt động ổn định (dù kiếm tiền ít hay nhiều) khi muốn đổi mới\n \nhoặc tích hợp công nghệ (như internet marketing). Thay vào đó, hãy &quot;xây thêm&quot;, tích\n \nhợp dần dần, bắt đầu từ những phần ít rủi ro như marketing. Điều này cực kỳ quan\n \ntrọng vì nó giúp giảm thiểu rủi ro tài chính và hoạt động, tận dụng được nguồn lực và\n \nkinh nghiệm hiện có, đồng thời cho phép doanh nghiệp phát triển bền vững và có chiều\n \nsâu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tầm quan trọng của hệ sinh thái hỗ trợ đa dạng: Để đạt được thành công lớn và bền</span></div>\n<p class=\"body-txt\">\nvững, không thể đi một mình. Việc xây dựng một đội ngũ hỗ trợ gồm Coach (thúc đẩy),\n \nMentor (truyền cảm hứng), Consultant (chuyên gia tư vấn), Technical (hỗ trợ kỹ thuật,\n \ncó thể thuê ngoài) và Peer Group (nhóm bạn ngang hàng để học hỏi) là cực kỳ cần thiết.\n \nĐội ngũ này cung cấp đầy đủ các nguồn lực từ động lực, kiến thức chuyên sâu, hỗ trợ\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\nthực tế đến môi trường phát triển, giúp cá nhân và doanh nghiệp vượt qua mọi thách\n \nthức.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Làm đi, làm đi, làm đi.”\n \n“Đánh đề thì lúc nào cũng đúng, mà không phải sai mà là do cái kết quả xổ số nó rơi vào con số\n \nkhác. Chứ không phải đánh đề sai.”\n \n“Không bỏ vợ và chỉ có thêm con.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Peer Group: Tham gia các cộng đồng designer/render artist quốc tế hoặc các nhóm kinh</span></div>\n<p class=\"body-txt\">\ndoanh chuyên về thị trường Nhật Bản để trao đổi kinh nghiệm, học hỏi và kết nối với\n \nnhững người cùng ngành.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Traffic: Tập trung vào việc thu hút lượng khách hàng tiềm năng (KTS/設計事務所/工務</span></div>\n<p class=\"body-txt\">\n店/developer) vào hệ thống của FUTAGO thông qua các chiến dịch marketing trực\n \ntuyến, quảng cáo nhắm mục tiêu, hoặc tối ưu hóa công cụ tìm kiếm cho các từ khóa &quot;CG\n \nパース,&quot; &quot;render 3D&quot; trong thị trường Nhật Bản.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Đo lường: Liên tục đo lường hiệu quả của các chiến dịch marketing, chất lượng render</span></div>\n<p class=\"body-txt\">\nqua phản hồi của khách hàng, và hiệu suất của quy trình làm việc để tối ưu hóa và liên\n \ntục cải thiện dịch vụ CG パース/render 3D.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 21: Xây dựng nhóm peer group</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt.  chia sẻ về nghệ thuật xây dựng và duy trì các mối quan hệ bền</h3>\n<p class=\"body-txt\">\nvững (peer group, kinh doanh, cá nhân) dựa trên mô hình &quot;3 chiều&quot;. Cốt lõi là việc sẵn sàng\n \ncho đi trước, biết cách yêu cầu để nhu cầu của mình được đáp ứng, và quan trọng nhất là cả\n \nhai bên phải có cùng một mục đích chung. Điều này giúp mối quan hệ phát triển sâu sắc và\n \nbền chặt, tránh sự đổ vỡ khi các yếu tố bên ngoài thay đổi và tạo ra sự phát triển đôi bên\n \ncùng có lợi. Thầy cũng nhấn mạnh tầm quan trọng của việc thực hành, thử nghiệm để tìm ra\n \nđiều &quot;tốt nhất&quot;.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chọn Peer Group: Chọn những người trong nhóm &quot;peer&quot; (người đồng cấp/bằng vai phải</span></div>\n<p class=\"body-txt\">\nlứa) có năng lực gì đó hơn mình (hoạt ngôn, giàu có, kỹ thuật) để chơi cùng, nhằm lấp\n \nđầy những thiếu sót của bản thân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nguyên tắc &quot;Cho đi&quot;: Học cách cho đi, vì &quot;người cho đi là người chiến thắng&quot; trong mọi</span></div>\n<p class=\"body-txt\">\ncuộc kinh doanh hiện nay. Ban đầu có thể chưa có năng lực cho nhưng dần dần sẽ học\n \nđược. Cho đi càng nhiều, mối quan hệ càng dễ dàng hơn và nhận được tình cảm/tình\n \nyêu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Biết nhu cầu của mình: Sau khi đã xây dựng mối quan hệ, phải biết nhu cầu của mình và</span></div>\n<p class=\"body-txt\">\nnói rõ cho đối phương biết mình cần gì từ họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Đáp ứng hai chiều: Mối quan hệ bền chặt cần có sự đáp ứng hai chiều giữa hai bên (mình</span></div>\n<p class=\"body-txt\">\ncho họ, họ cho mình). Nếu một bên không đáp ứng được thì nên chấm dứt mối quan hệ\n \nđó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sẵn sàng cho thông tin: Phải sẵn sàng cho thông tin thay vì giữ khư khư.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mối quan hệ một chiều vs. hai chiều:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mối quan hệ khách hàng - nhà cung cấp thường là một chiều (bằng tiền).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mối quan hệ peer/bạn bè phải là hai chiều (ví dụ: &quot;ông thò chai rượu thì bà phải thò</span></div>\n<p class=\"body-txt\">\nchân giò&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Giới hạn của mối quan hệ hai chiều: Mối quan hệ hai chiều có thể bị xa cách và đổ vỡ nếu</span></div>\n<p class=\"body-txt\">\nnhu cầu của một bên thay đổi và bên kia không còn đáp ứng được nữa, hoặc nếu sự đáp\n \nứng không cần thiết phải bằng nhau nhưng vẫn đảm bảo hai chiều.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chiều thứ ba: Mục đích chung: Để mối quan hệ thực sự bền vững và đi xa (ví dụ: tiến tới</span></div>\n<p class=\"body-txt\">\nhôn nhân, hợp tác kinh doanh lớn), cả hai bên phải có cùng một mục đích chung. Khi có\n \nmục đích chung, ngay cả khi nhu cầu cá nhân thay đổi, mối quan hệ vẫn có thể duy trì và\n \nphát triển. Nếu không có mục đích chung, hành động (hoặc không hành động) của một\n \nbên có thể gây tổn thương cho bên kia.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Áp dụng trong kinh doanh (Affiliate Marketing): Để xây dựng mối quan hệ với những</span></div>\n<p class=\"body-txt\">\nngười làm &quot;affiliate&quot; (đại lý/cộng tác viên), cần có ba chiều: tôi phân phối hàng của anh,\n \nanh phân phối hàng của tôi, và quan trọng nhất là chúng ta cùng phân phối hàng hóa để\n \nkiếm tiền.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Cách thức hợp tác Peer Group thực sự: Không phải tất cả học viên đều trở thành peer</span></div>\n<p class=\"body-txt\">\ngroup. Chỉ những người học, làm, có kết quả, rồi quay trở lại giúp đỡ thầy để cùng phát\n \ntriển công việc kinh doanh của nhau mới thực sự là peer group.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tìm cái &quot;tốt nhất&quot;: Học hỏi từ nhiều người, lấy những phần tốt nhất và ghép chúng lại.</span></div>\n<p class=\"body-txt\">\nĐể biết cái gì là tốt nhất thì phải &quot;làm&quot; (thực hành): cách nào hiệu quả thì giữ lại, cách\n \nnào không hiệu quả thì bỏ đi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chủ đề buổi chiều: Sẽ học về Traffic (lưu lượng truy cập), đặc biệt là ba nguồn Traffic có</span></div>\n<p class=\"body-txt\">\ntrong sách (trang 49), tập trung vào &quot;lưu lượng bạn sở hữu&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Giá trị của &quot;lưu lượng sở hữu&quot;: Lưu lượng bạn sở hữu phải lớn và phù hợp với mục tiêu</span></div>\n<p class=\"body-txt\">\nchuyển đổi (có giá trị) thì mới tạo ra tiền. 1,000 khách hàng tiềm năng chất lượng có thể\n \ntốt hơn 5,000-10,000 khách hàng không đúng nhu cầu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mô hình quan hệ &quot;3 chiều&quot; (cho đi – đáp ứng nhu cầu – mục đích chung): Thầy nhấn</span></div>\n<p class=\"body-txt\">\nmạnh đây là công thức nền tảng để xây dựng bất kỳ mối quan hệ nào (cá nhân, kinh\n \ndoanh) trở nên bền vững và phát triển lâu dài. Nếu thiếu một chiều, mối quan hệ dễ tan\n \nvỡ vì nó không tạo ra sự gắn kết sâu sắc, mà chỉ dừng lại ở giao dịch hoặc tương tác hời\n \nhợt.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mục đích chung là yếu tố cốt lõi cho sự bền chặt và đi xa: Thầy dùng ví dụ về hôn nhân</span></div>\n<p class=\"body-txt\">\nvà hợp tác kinh doanh để minh họa rằng sự tương tác hai chiều chỉ là nền tảng. Khi cả\n \nhai bên cùng hướng tới một mục tiêu lớn hơn, chung tay vì một kết quả mà cả hai đều\n \nhưởng lợi, mối quan hệ đó mới có động lực để vượt qua khó khăn và duy trì lâu dài,\n \nthậm chí là phát triển theo cấp số nhân. Nó tạo ra sự gắn kết vượt ra ngoài lợi ích cá\n \nnhân tức thời.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Triết lý &quot;Người cho đi là người chiến thắng&quot;: Đây là nguyên tắc cốt lõi để bắt đầu và nuôi</span></div>\n<p class=\"body-txt\">\ndưỡng mối quan hệ, đặc biệt trong giai đoạn đầu khi mình chưa có gì để trao đổi. Việc\n \nsẵn sàng cho đi trước thể hiện thiện chí, xây dựng lòng tin và mở đường cho việc nhận\n \nlại từ đối phương sau này, tạo ra sự khởi đầu tích cực và một nền tảng cảm xúc vững\n \nchắc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Học cách &quot;làm&quot; để tìm ra cái &quot;tốt nhất&quot;: Đây là một triết lý thực dụng quan trọng cho bất</span></div>\n<p class=\"body-txt\">\nkỳ sự phát triển cá nhân hay kinh doanh nào. Thay vì chỉ học lý thuyết hay sao chép mù\n \nquáng, thầy khuyến khích thử nghiệm. Việc tự mình làm, đánh giá hiệu quả và điều chỉnh\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\nlà con đường duy nhất để thực sự hiểu, áp dụng kiến thức một cách phù hợp nhất với\n \nbản thân và tạo ra giá trị độc đáo, bền vững.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Người cho đi là người chiến thắng.”\n \n“Cả hai thằng có cùng một mục đích chung.”\n \n“Học từ tất cả các ông thầy, lấy phần tốt nhất về, ghép nó lại. Biết thế nào là tốt nhất không?\n \nLà làm!”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Liên tục điều chỉnh quy trình giao tiếp, quản lý dự án với khách hàng Nhật dựa trên</span></div>\n<p class=\"body-txt\">\nphản hồi thực tế để tối ưu hóa trải nghiệm khách hàng và hiệu quả vận hành.\n \n---\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 22: Bí quyết để giữ cho mình Mindset tốt</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi học này tập trung vào việc xác định mục tiêu và động lực thực sự phía sau</h3>\n<p class=\"body-txt\">\nmỗi mong muốn cá nhân, vượt qua những mong muốn bề mặt để tìm ra &quot;ý nghĩa cốt lõi&quot;.\n \nThầy  trình bày một chuỗi câu hỏi để đào sâu mong muốn (tôi muốn gì, tại\n \nsao tôi muốn, tôi sẵn sàng trả giá gì), nhấn mạnh rằng mục đích chân chính (purpose) là yếu\n \ntố giữ vững sự kiên trì. Thầy minh họa bằng câu chuyện cá nhân về việc đạt tự do tài chính\n \nqua internet marketing để có thời gian chơi với con cái, cho thấy việc sẵn sàng hành động\n \nngay cả khi không hiểu rõ cách thức, miễn là có động cơ dẫn đường mạnh mẽ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Để có một mindset tốt, thầy gợi ý tham khảo các khóa học như &quot;Đánh thức sự giàu có&quot;,</span></div>\n<p class=\"body-txt\">\n&quot;Giải mã thành công&quot;, &quot;Lập trình vận mệnh&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thầy trình bày một chuỗi 5 câu hỏi để xác định điều mình thực sự muốn, theo đúng thứ</span></div>\n<p class=\"body-txt\">\ntự:\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tôi muốn cái gì? (Câu hỏi quan trọng nhất)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tôi thực sự muốn cái gì? (Để phân biệt mong muốn bề mặt với mong muốn sâu sắc, giúp</span></div>\n<p class=\"body-txt\">\nlọc bớt những điều không quan trọng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tại sao tôi lại muốn điều đó? (Xác định *purpose* – mục đích cuối cùng).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nếu tôi không có điều đó thì có làm sao không? (Đánh giá mức độ cần thiết của mong</span></div>\n<p class=\"body-txt\">\nmuốn).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tôi sẵn sàng trả giá thế nào/gì để có được điều mình muốn? (Đánh đổi, hy sinh để đạt</span></div>\n<p class=\"body-txt\">\nmục tiêu).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Ví dụ về mục tiêu trở thành triệu phú: Nhiều người muốn vì &quot;phong cách sống tốt hơn&quot;</span></div>\n<p class=\"body-txt\">\nnhưng lại thiếu mục đích sâu sắc, dễ bị cuốn theo mục tiêu lớn hơn (multi-triệu phú, tỷ\n \nphú) mà quên mất lý do ban đầu, dẫn đến chán nản và bỏ cuộc khi gặp khó khăn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Điều quan trọng là gắn ý nghĩa cá nhân vào mục tiêu, không chỉ chạy theo phong trào</span></div>\n<p class=\"body-txt\">\nhay mong muốn bề mặt của người khác. &quot;Ý nghĩa quan trọng hơn là cái điều ta muốn.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mục đích thực sự của việc thầy  làm internet marketing không phải để</span></div>\n<p class=\"body-txt\">\nkiếm tiền, mà là để có cuộc sống tự do, có nhiều thời gian chơi với con cái. Thậm chí thầy\n \nthích làm việc nhà như rửa bát, nấu cơm vì có cuộc "<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xác định rõ &quot;mục đích (purpose) thực sự&quot; đằng sau mỗi mong muốn: Thầy nhấn mạnh</span></div>\n<p class=\"body-txt\">\nsự khác biệt giữa &quot;muốn&quot; (có thể là theo phong trào, hời hợt) và &quot;thực sự muốn&quot; kèm\n \ntheo một lý do sâu sắc (purpose). Điều này quan trọng vì mục đích rõ ràng cung cấp\n \nđộng lực nội tại mạnh mẽ và định hướng lâu dài, giúp cá nhân vượt qua những giai đoạn\n \nkhó khăn (như &quot;oải quá&quot; khi đang trên đường đạt mục tiêu) mà không ai có thể giúp đỡ,\n \nđồng thời tránh việc chạy theo các mục tiêu lớn hơn mà không có ý nghĩa thực sự.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sẵn sàng &quot;trả giá&quot; cho điều mình thực sự muốn: Sau khi đã xác định rõ mục tiêu và mục</span></div>\n<p class=\"body-txt\">\nđích, bước tiếp theo là đánh giá sự sẵn lòng hy sinh hoặc nỗ lực để đạt được nó. Đây là\n \nđiểm mấu chốt để chuyển từ mong muốn sang hành động cụ thể. Nó giúp loại bỏ những\n \nmong muốn hời hợt và tập trung năng lượng vào những gì ta thực sự cam kết, hình\n \nthành sự kiên định cần thiết để biến ước mơ thành hiện thực và đối mặt với thách thức.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Hành động dựa trên &quot;động cơ dẫn đường&quot; ngay cả khi chưa hiểu rõ cách thức: Thầy</span></div>\n<p class=\"body-txt\">\nchia sẻ rằng ông sẵn sàng làm những việc mà bản thân không hiểu gì\n \ncả (&quot;tôi chẳng biết gì cả&quot;), chỉ vì ông biết chúng sẽ dẫn đến mục tiêu cuối cùng (cuộc sống\n \ntự do để chơi với con). Insight này rất mạnh mẽ vì nó vượt qua nỗi sợ hãi về sự không\n \nchắc chắn và khuyến khích hành động dựa trên niềm tin vào mục đích lớn hơn. Điều này\n \nđặc biệt quan trọng trong lĩnh vực mới hoặc phức tạp như internet marketing, nơi\n \nkhông phải lúc nào cũng có sẵn bản đồ rõ ràng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Chúng ta thường nói theo phong trào, chúng ta không biết cái điều mình muốn.”\n \n“Cái ý nghĩa quan trọng hơn là cái điều ta muốn.”\n \n“Tôi sẵn sàng làm những việc mà tôi không hiểu gì cả, tôi chẳng biết gì cả, nhưng tôi vẫn cứ\n \nlàm bởi vì nó chính là động cơ dẫn đường.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Ví dụ: Để khẳng định *danh tiếng* là đơn vị diễn họa kiến trúc hàng đầu, được các KTS</span></div>\n<p class=\"body-txt\">\nvà các studio thiết kế danh tiếng nhất Nhật Bản tin tưởng lựa chọn. Để tạo ra những tác\n \nphẩm hình ảnh vượt trội, truyền cảm hứng, giúp khách hàng kiến trúc sư/chủ đầu tư\n \nchốt dự án thành công hơn. Để đội ngũ kỹ sư và nghệ sĩ diễn họa của FUTAGO có cơ hội\n \nlàm việc với các công trình đẳng cấp quốc tế, phát triển kỹ năng và niềm đam mê. Mục\n \nđích này phải *đủ sâu sắc* để trở thành động lực nội tại cho cả công ty.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nếu FUTAGO không đạt được điều đó thì có làm sao không?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Ví dụ: Mất đi cơ hội xây dựng vị thế tiên phong, bị các đối thủ cạnh tranh khác (cả trong</span></div>\n<p class=\"body-txt\">\nvà ngoài Nhật Bản) vượt qua, đội ngũ mất động lực và thiếu định hướng phát triển rõ\n \nràng, khó thu hút nhân tài. Hoặc không thể tạo ra những tác phẩm thực sự đột phá, chỉ\n \ndậm chân tại chỗ với các dự án tầm trung, không phát huy được tối đa tiềm năng sáng\n \ntạo và kỹ thuật.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">FUTAGO sẵn sàng trả giá thế nào để có được điều mình muốn?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Ví dụ: Sẵn sàng đầu tư mạnh vào công nghệ render tiên tiến, vào đào tạo chuyên sâu về</span></div>\n<p class=\"body-txt\">\nkỹ thuật diễn họa và hiểu biết sâu sắc về văn hóa kiến trúc Nhật. Chấp nhận một thời\n \ngian đầu lợi nhuận thấp hơn để xây dựng thương hiệu và danh mục dự án chất lượng\n \ncao. Dành nhiều thời gian và nguồn lực để nghiên cứu thị trường, tìm hiểu sâu sắc nhu\n \ncầu và gu thẩm mỹ của KTS Nhật, thậm chí là chấp nhận rủi ro khi thử nghiệm các phong\n \ncách diễn họa mới lạ.\n \nViệc hiểu rõ mục đích cuối cùng (ví dụ: tạo ra những hình ảnh kiến trúc sống động, truyền\n \ncảm hứng nhất, giúp khách hàng Nhật thành công vang dội) sẽ là &quot;động cơ dẫn đường&quot; cho\n \nFUTAGO. Điều này giúp đội ngũ vượt qua những thách thức về kỹ thuật, sự cạnh tranh khốc\n \nliệt, hay sự khác biệt văn hóa, và sẵn sàng thử nghiệm các phương pháp mới ngay cả khi\n \nchưa chắc chắn hiệu quả, tập trung vào &quot;ý nghĩa quan trọng hơn là cái điều ta muốn&quot; (chất\n \nlượng hình ảnh, sự hài lòng và thành công của KTS Nhật, giá trị nghệ thuật của diễn họa)\n \nthay vì chỉ chạy theo số lượng dự án hay lợi nhuận ngắn hạn.\n \n---\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 23: Kinh doanh gì trên Internet</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi giảng này của  tập trung vào việc định nghĩa và phân loại</h3>\n<p class=\"body-txt\">\ncác loại &quot;sản phẩm&quot; mà chúng ta kinh doanh trên internet, xoay quanh khái niệm &quot;giá trị&quot;.\n \nThầy phân chia sản phẩm thành ba nhóm chính: vật lý, dịch vụ và đặc biệt nhấn mạnh sản\n \nphẩm thông tin, bao gồm cả sản phẩm số và sản phẩm live. Mục tiêu là giúp người học nhận\n \ndiện được các giá trị mà họ có thể cung cấp và monet hóa trong kỷ nguyên internet.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Định nghĩa Sản phẩm: Bất cứ thứ gì có &quot;giá trị&quot; với người dùng đều được gọi là sản</span></div>\n<p class=\"body-txt\">\nphẩm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Ba nhóm sản phẩm chính để kinh doanh trên internet:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sản phẩm vật lý:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Là những sản phẩm hữu hình, có thể sờ, nắm, cầm được (ví dụ: quần áo, thịt trâu, cá).</span></div></div></div>",

et\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sản phẩm số (Digital): Thông tin dưới dạng số.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sản phẩm Live: Thông tin được cung cấp trực tiếp (như buổi giảng đang diễn ra).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sản phẩm thông tin số và sản phẩm thông tin Live về cơ bản là giống nhau về mặt bản</span></div>\n<p class=\"body-txt\">\nchất.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mở rộng định nghĩa &quot;sản phẩm&quot; beyond vật lý: Thầy Long nhấn mạnh rằng sản phẩm</span></div>\n<p class=\"body-txt\">\nkhông chỉ giới hạn ở hàng hóa vật chất mà bao gồm cả dịch vụ và đặc biệt là thông tin.\n \nĐiều này cực kỳ quan trọng vì nó mở ra tư duy về các nguồn giá trị tiềm năng mà nhiều\n \nngười kinh doanh có thể bỏ qua, đặc biệt trong thời đại số hóa, khuyến khích họ nhìn\n \nnhận lại tài sản tri thức và kinh nghiệm của mình như một &quot;sản phẩm&quot; có thể giao dịch.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Giá trị và tiềm năng của &quot;sản phẩm thông tin&quot;: Thầy giải thích rằng bất kỳ thông tin nào</span></div>\n<p class=\"body-txt\">\nmà bạn sở hữu và người khác cần đều là sản phẩm có giá trị. Sự xuất hiện của internet và\n \ncông nghệ thông tin đã tạo ra một nền tảng khổng lồ cho việc trao đổi và kinh doanh\n \nthông tin. Insight này thúc đẩy người học suy nghĩ về cách đóng gói và bán kiến thức,\n \nkinh nghiệm, dữ liệu của họ thành các sản phẩm số hoặc live, tận dụng tối đa lợi thế của\n \ninternet.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Chúng ta kinh doanh những cái gì mà an></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mỗi người đều có một &quot;thế giới bên trong&quot; bao gồm tài năng, khả năng, kinh nghiệm, trải</span></div>\n<p class=\"body-txt\">\nnghiệm, đam mê và mục đích.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Để bán được sản phẩm, cần tìm &quot;thế giới bên ngoài&quot; (thị trường ngách) cần dùng đến</span></div>\n<p class=\"body-txt\">\n&quot;thế giới bên trong&quot; của mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nếu không có sản phẩm số của riêng mình hoặc thị trường cho nó, có thể tận dụng</span></div>\n<p class=\"body-txt\">\n&quot;Other People&#x27;s Products&quot; (OPP) hoặc &quot;Other People&#x27;s Services&quot; (OPS) - sản phẩm/dịch\n \nvụ của người khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Quy tắc &quot;My Room, My Rule&quot;: Khi bán sản phẩm/dịch vụ của người khác trong thị</span></div>\n<p class=\"body-txt\">\ntrường của mình, sản phẩm đó phải mang thương hiệu/tên của mình (ví dụ: &quot;Bác sĩ\n \nLong&quot; thay vì &quot;Bác sĩ Hiền&quot;).\n</p></div></div>",

n class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Đội ngũ kinh doanh của FUTAGO cần tự tin trong việc giới thiệu các gói dịch vụ cao cấp</span></div>\n<p class=\"body-txt\">\nvà các tùy chọn bổ sung cho khách hàng Nhật. Thay vì chỉ chờ khách hàng hỏi, hãy chủ\n \nđộng tư vấn các giải pháp diễn họa kiến trúc toàn diện hơn, giải thích rõ lợi ích mà các\n \ndịch vụ bổ sung này mang lại cho dự án kiến trúc của họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">PLR: — (Khái niệm PLR trong audio liên quan đến sản phẩm thông tin số, không trực</span></div>\n<p class=\"body-txt\">\ntiếp áp dụng cho dịch vụ diễn họa kiến trúc của FUTAGO).\n \n---\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 29: PRL - Cách nhanh nhất tạo ra sản phẩm Online</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi học này trình bày phương pháp hiệu quả để tạo ra các sản phẩm thông tin</h3>\n<p class=\"body-txt\">\n(info products) như khóa học trực tuyến. Cốt lõi của phương pháp là bắt đầu với một dàn ý\n \ncó cấu trúc rõ ràng (4 điểm chủ đề chính, mỗi điểm có 5 điểm phụ) để chống lại tình trạng bế\n \ntắc khi tạo nội dung. Điểm đặc biệt quan trọng là khả năng tái sử dụng nội dung gốc (ví dụ:\n \ntừ một bài PowerPoint) để tạo ra nhiều định dạng sản phẩm khác nhau (video, PDF, audio,\n \nbáo cáo ngắn), giúp tối đa hóa giá trị và dễ dàng nổi bật so với đối thủ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thầy chia sẻ phương pháp chính xác để tạo ra mọi sản phẩm thông tin, bắt đầu bằng một</span></div>\n<p class=\"body-txt\">\ndàn ý cơ bản.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Dàn ý cần có 4 điểm chủ đề chính (main subject points).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mỗi điểm chủ đề chính sẽ trở thành một chương (chapter).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Dưới mỗi điểm chủ đề chính, cần có thêm 5 điểm phụ (additional points).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Các điểm này nên tập trung vào những vấn đề mà mọi người đang gặp phải trong thị</span></div>\n<p class=\"body-txt\">\ntrường mục tiêu và cung cấp giải pháp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Việc có dàn ý chi tiết giúp tạo ra một bức tranh rõ ràng về nội dung cần tạo, giúp quá</span></div>\n<p class=\"body-txt\">\ntrình tạo nội dung dễ dàng hơn, giống như có một kế hoạch kinh doanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Video course (khóa học video) là một dạng sản phẩm thông tin có giá trị lớn và mang lại</span></div>\n<p class=\"body-txt\">\nlợi nhuận cao.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Các công cụ hỗ trợ tạo video course bao gồm PowerPoint, quay màn hình (screen</span></div>\n<p class=\"body-txt\">\ncapture), trình diễn trực tiếp (live demonstration).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Có thể sử dụng các phần mềm miễn phí như OpenOffice Impress (thay thế PowerPoint)</span></div>\n<p class=\"body-txt\">\nhoặc Google Slides.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Để quay video, có thể dùng Screencast-O-Matic (miễn phí, dựa trên trình duyệt).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Không cần thiết bị công nghệ phức tạp hay quá &quot;xịn sò&quot; để bắt đầu.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tập trung vào các video hướng dẫn đơn giản, chỉ cách mọi người thực hiện một điều gì</span></div>\n<p class=\"body-txt\">\nđó trực tuyến (ví dụ: sử dụng Photoshop, Excel, Quickbooks).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Khi quay video, cần đảm bảo phòng có ánh sáng tốt, ví dụ đứng trước cửa sổ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">&quot;Đóng gói sản phẩm&quot; (product packaging) hoàn hảo là tạo ra nhiều định dạng khác nhau</span></div>\n<p class=\"body-txt\">\ntừ cùng một nội dung cốt lõi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Ví dụ về tái sử dụng nội dung: từ một file PowerPoint, có thể tạo ra video, PDF, audio</span></div>\n<p class=\"body-txt\">\nMP3, và một báo cáo ngắn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tái sử dụng nội dung (repurpose content) cho phép bạn tạo ra 3-4 phần nội dung khác</span></div>\n<p class=\"body-txt\">\nnhau từ một lần tạo nội dung gốc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Có thể sử dụng nội dung PLR (Private Label Rights) – nội dung đã được tạo sẵn mà bạn</span></div>\n<p class=\"body-txt\">\ncó quyền chỉnh sửa và bán lại, giúp có sản phẩm &quot;ready-to-go&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thêm giá trị cho sản phẩm bằng cách tổ chức các buổi hỏi đáp Q&amp;A (ví dụ qua Google</span></div>\n<p class=\"body-txt\">\nHangouts).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Phương pháp dàn ý 4 chủ đề chính và 5 điểm phụ: Thầy nhấn mạnh việc bắt đầu với một</span></div>\n<p class=\"body-txt\">\ndàn ý có cấu trúc rõ ràng (4 chủ đề lớn, mỗi chủ đề 5 điểm phụ). *Vì sao quan trọng:*\n \nPhương pháp này giúp người tạo nội dung vượt qua khó khăn khi đối mặt với một màn\n \nhình trống (&quot;staring at a blank screen&quot;), cung cấp một lộ trình cụ thể để xây dựng nội\n \ndung một cách có hệ thống và đầy đủ. Nó biến quá trình tạo nội dung từ một nhiệm vụ\n \nmơ hồ thành một kế hoạch hành động chi tiết, đảm bảo sự mạch lạc và hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tái sử dụng nội dung (repurpose content) để tạo nhiều định dạng: Thầy chỉ ra rằng một</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">nội dung gốc (ví dụ như một bài thuyết trình PowerPoint) có thể được chuyển đổi thành</h3>\n<p class=\"body-txt\">\nnhiều định dạng khác nhau (video, PDF, MP3, báo cáo ngắn). *Vì sao quan trọng:* Điều\n \nnày tối đa hóa công sức bỏ ra ban đầu, cho phép tiếp cận nhiều đối tượng với các sở\n \nthích học hỏi khác nhau, tăng giá trị cảm nhận của sản phẩm và giúp người bán nổi bật\n \ntrên thị trường mà không cần tạo nội dung mới từ đầu cho từng định dạng. Đây là một\n \nchiến lược hiệu quả để mở rộng dòng sản phẩm và tăng doanh thu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tập trung vào giải quyết vấn đề của khách hàng: Các điểm trong dàn ý cần xoay quanh</span></div>\n<p class=\"body-txt\">\nviệc giải quyết những khó khăn và cung cấp giải pháp cho vấn đề của thị trường mục\n \ntiêu. *Vì sao quan trọng:* Bất kể sản phẩm thông tin là gì, giá trị cốt lõi của nó phải nằm\n \nở khả năng giải quyết một vấn đề cụ thể cho khách hàng. Điều này đảm bảo sản phẩm có\n \nnhu cầu thực sự, tăng khả năng bán hàng và xây dựng lòng tin, tạo dựng uy tín trong thị\n \ntrường.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“The reason I create my products like this is because instead of me staring at a blank screen or\n \na blank PowerPoint, what I&#x27;m actually looking at is a very clear picture of what kind of content\n \nI want to create.”\n \n“It makes my content creation that much easier because I have an outline. It&#x27;s like having a\n \nbusiness plan.”\n \n“By creating one PowerPoint slide deck, you&#x27;ve now got three to four different pieces of\n \ncontent. Is that powerful?”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 30: Chiến lược Squeeze page</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi giảng này tập trung vào các phương pháp hiệu quả để tạo ra traffic (lưu lượng</h3>\n<p class=\"body-txt\">\ntruy cập) cho website hoặc trang đích (squeeze/lead page), nhằm mục đích thu hút khách\n \nhàng tiềm năng. Diễn giả nhấn mạnh tầm quan trọng của việc xây dựng một danh sách email\n \nvà sử dụng các chiến lược như PPC, SEO, blogging, social media và video trên YouTube. Cốt\n \nlõi là phải thu thập được lead để có thể tương tác và chuyển đổi khách hàng, vì thường cần\n \nnhiều lần tiếp xúc trước khi họ ra quyết định mua.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Website Traffic Methods (Các phương pháp tạo lưu lượng truy cập website) là trọng tâm</span></div>\n<p class=\"body-txt\">\ncủa buổi giảng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Khi có sản phẩm (ví dụ: PLR product), điều quan trọng là biết cách tạo traffic đến nó.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mô hình cơ bản bao gồm: Squeeze Page/Lead Page (trang đích để thu thập thông tin), và</span></div>\n<p class=\"body-txt\">\ntraffic đổ vào trang đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Core Component (Thành phần cốt lõi): Traffic.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Các phương pháp tạo Traffic:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">PPC (Pay-Per-Click): Trả tiền cho mỗi click, ví dụ như quảng cáo Bing, Facebook Ads,</span></div>\n<p class=\"body-txt\">\nGoogle Ads. Đây là cách &quot;chi tiền để có traffic&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">SEO (Search Engine Optimization): Tối ưu hóa công cụ tìm kiếm, sử dụng Google để có</span></div>\n<p class=\"body-txt\">\nthứ hạng cao. Đây là cách rất quan trọng cho thành công để nội dung của bạn được hiển\n \nthị.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Blogging: Viết blog để tạo nội dung và thu hút traffic.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Social Media: Mạng xã hội, bao gồm Facebook, Twitter, LinkedIn, Pinterest (đây là</span></div>\n<p class=\"body-txt\">\nnhững kênh lớn).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Launches (Ra mắt sản phẩm): Khi ra mắt sản phẩm kỹ thuật số hoặc sản phẩm thông tin,</span></div>\n<p class=\"body-txt\">\ndiễn giả sử dụng Pop-up.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Pop-up: Một cửa sổ bật lên khi khách hàng chuẩn bị rời website, mời họ tải báo cáo miễn</span></div>\n<p class=\"body-txt\">\nphí để thu thập lead.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Pop-up cực kỳ mạnh mẽ vì nếu không có, khách hàng sẽ rời đi và không bao giờ quay lại.</span></div>\n<p class=\"body-txt\">\nThường cần tới 7 lần tiếp xúc (seven exposures) trước khi khách hàng mua. Nếu không\n \ndùng pop-up, bạn sẽ &quot;để mất rất nhiều tiền trên bàn&quot; (leaving a lot of money on the\n \ntable).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Free Reports (Báo cáo miễn phí): Các báo cáo miễn phí mà bạn chia sẻ (không phải thứ</span></div>\n<p class=\"body-txt\">\nbạn cho đi mà không có mục đích). Có những website cho phép bạn upload báo cáo và\n \nchia sẻ online.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">YouTube Ads: Quảng cáo trên YouTube hoặc tạo video trên YouTube cũng rất mạnh mẽ</span></div>\n<p class=\"body-txt\">\nvà có lợi nhuận.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Traffic Plan (Kế hoạch traffic): Luôn đảm bảo bạn đang xây dựng một danh sách (list)</span></div>\n<p class=\"body-txt\">\nkhách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sales Funnel (Phễu bán hàng): Diễn giả đồng ý hoàn toàn với Thầy Long về tầm quan</span></div>\n<p class=\"body-txt\">\ntrọng của phễu bán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Lead Generation (Tạo khách hàng tiềm năng): Điều cực kỳ quan trọng là phải có được</span></div>\n<p class=\"body-txt\">\nlead. Nếu không có lead, việc bạn gửi bao nhiêu traffic cũng không thành vấn đề vì bạn\n \nkhông thể liên hệ lại với họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Luôn bắt đầu với Squeeze Page, từ đó khách hàng sẽ chuyển đến trang cảm ơn (Thank</span></div>\n<p class=\"body-txt\">\nYou Page) và cơ sở dữ liệu (Database) để theo dõi và tương tác.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tầm quan trọng của việc thu thập Lead: Diễn giả nhấn mạnh &quot;If you do not get the lead,</span></div>\n<p class=\"body-txt\">\nit does not matter how much traffic you send, you can never contact those people\n \nagain.&quot; (Nếu bạn không có được khách hàng tiềm năng, việc bạn gửi bao nhiêu traffic\n \ncũng không quan trọng, bạn sẽ không bao giờ có thể liên hệ lại với những người đó).\n \nĐiều này quan trọng vì nó chuyển traffic từ một con số vô danh thành một tài sản có thể\n \ntheo dõi và chuyển đổi, là nền tảng cho mọi chiến lược marketing bền vững.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sử dụng Pop-up để không &quot;để mất tiền trên bàn&quot;: Pop-up, đặc biệt là loại Exit-Intent (bật</span></div>\n<p class=\"body-txt\">\nlên khi người dùng chuẩn bị rời trang), là công cụ mạnh mẽ để nắm bắt khách hàng tiềm\n \nnăng. Việc diễn giả khẳng định &quot;I would be leaving a lot of money on the table&quot; nếu\n \nkhông dùng pop-up cho thấy nó giúp chuyển đổi những lượt truy cập gần như mất đi\n \nthành các lead giá trị, tận dụng tối đa công sức và chi phí bỏ ra để tạo traffic.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chiến lược đa kênh và đa điểm chạm: Buổi giảng đề cập nhiều phương pháp traffic khác</span></div>\n<p class=\"body-txt\">\nnhau (PPC, SEO, Blogging, Social Media, Launches, Free Reports, YouTube Ads). Điều này\n \nquan trọng vì nó cho thấy một chiến lược marketing hiệu quả cần tích hợp nhiều kênh\n \nđể tiếp cận đối tượng rộng hơn và tăng cường số lần tiếp xúc, đặc biệt khi cần &quot;up to\n \nseven exposures before they buy&quot; (tối đa 7 lần tiếp xúc trước khi họ mua).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Because once you get products like this, it&#x27;s all about knowing how to get traffic to it.”\n \n“If you do not get the lead, it does not matter how much traffic you send, you can never contact\n \nthose people again.”\n \n“Sometimes, it takes people up to seven exposures before they buy.”\n \n“I would be leaving a lot of money on the table.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 31: Những sai lầm khi xác định khách hàng mục tiêu và Cách giải quyết</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi học này tập trung vào cách nhắm mục tiêu hiệu quả trong quảng cáo</h3>\n<p class=\"body-txt\">\nFacebook (Facebook Ads) để tăng hiệu quả và giảm chi phí. Thầy nhấn mạnh sự cần thiết\n \nphải đi sâu vào sở thích, hành vi và tâm lý của khách hàng mục tiêu, thay vì chỉ nhắm mục\n \ntiêu theo độ tuổi hay giới tính chung chung. Cốt lõi là phải hiểu &quot;tại sao&quot; khách hàng muốn\n \ngiải pháp của mình và tìm ra các kênh thông tin (tạp chí, sản phẩm, kênh YouTube) mà họ\n \nđang tương tác để nhắm đúng đối tượng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Lỗi thường gặp khi nhắm mục tiêu: Nhiều người nhắm mục tiêu không đúng, tức là</span></div>\n<p class=\"body-txt\">\nkhách hàng mục tiêu không chuẩn, hoặc quá rộng (cả nước, cả khu vực), hoặc chỉ dựa\n \nvào tuổi, giới tính.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Cần đi sâu hơn vào sở thích: Thay vì nhắm mục tiêu chung chung, cần tìm hiểu những sở</span></div>\n<p class=\"body-txt\">\nthích cụ thể, thói quen đọc tạp chí, kênh truyền thông mà khách hàng mục tiêu tương\n \ntác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Ví dụ về sản phẩm giảm cân/sức khỏe:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sản phẩm về golf, giảm cân, sức khỏe (vd: Men&#x27;s Health).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tìm kiếm tạp chí mà khách hàng quan tâm sẽ đọc (ví dụ: Men&#x27;s Health, Fitness World,</span></div>\n<p class=\"body-txt\">\nPrevention Magazine).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nhắm quảng cáo vào những người đọc các tạp chí đó, vì họ đã sẵn lòng đọc nội dung liên</span></div>\n<p class=\"body-txt\">\nquan và có nhu cầu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Khi đó, chi phí quảng cáo sẽ thấp hơn và hiệu quả tiếp cận cao hơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Ví dụ về sản phẩm làm đẹp/chăm sóc da (trị mụn):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nhắm mục tiêu vào những người quan tâm đến các thương hiệu mỹ phẩm nổi tiếng (ví</span></div>\n<p class=\"body-txt\">\ndụ: Covergirl) hoặc sản phẩm chăm sóc da.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tìm kiếm các sản phẩm và thương hiệu mà khách hàng đang sử dụng và có cùng vấn đề</span></div>\n<p class=\"body-txt\">\nmà sản phẩm của mình giải quyết.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Đi vào tâm trí khách hàng: Phải thực sự hiểu tại sao khách hàng mua hàng, tại sao họ</span></div>\n<p class=\"body-txt\">\nmuốn giải pháp này. Đóng vai khách hàng và tự hỏi &quot;Tại sao người ta lại vào trang này?&quot;,\n \n&quot;Tại sao người ta lại tìm kiếm thông tin này?&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nghiên cứu thị trường sâu hơn:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tìm kiếm các tạp chí, chương trình, sản phẩm mà khách hàng đang đọc/xem/mua.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sử dụng Amazon Best Sellers (sản phẩm bán chạy nhất trên Amazon) để nghiên cứu các</span></div>\n<p class=\"body-txt\">\nthị trường ở Mỹ, Canada...\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tìm kiếm các cụm từ như &quot;Amazon Best Sellers&quot; trên Google để xem danh sách sản</span></div>\n<p class=\"body-txt\">\nphẩm bán chạy nhất, từ đó biết thương hiệu nào được ưa chuộng, sản phẩm nào khách\n \nhàng mong muốn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tìm hiểu từ các chuyên gia/người nổi tiếng: Nếu khách hàng quan tâm phát triển cá</span></div>\n<p class=\"body-txt\">\nnhân, tìm những người họ follow (ví dụ: Tony Robbins, ) để nhắm mục\n \ntiêu.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tìm hiểu từ kênh YouTube: Xem các trang về makeup, những người nổi tiếng dạy trang</span></div>\n<p class=\"body-txt\">\nđiểm, những người có nhiều lượt xem trên Facebook/YouTube để nhắm mục tiêu vào\n \nfan của họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sự cụ thể là chìa khóa: Nhấn mạnh việc phải rất, rất cụ thể khi đặt quảng cáo Facebook.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Hiểu sâu tâm lý khách hàng và &quot;Why&quot;: &quot;Mình phải bước vào tâm trí của khách hàng để</span></div>\n<p class=\"body-txt\">\nmình thực sự hiểu xem là tại sao người ta lại mua hàng. Đấy mình phải hiểu tâm lý khách\n \nhàng.&quot; (06:56). Điều này quan trọng vì nó vượt ra ngoài các yếu tố nhân khẩu học cơ\n \nbản. Khi hiểu được động cơ sâu xa (WHY) của khách hàng, bạn không chỉ nhắm đúng đối\n \ntượng mà còn xây dựng được thông điệp quảng cáo chạm đến cảm xúc và nhu cầu cốt lõi\n \ncủa họ, từ đó tăng tỷ lệ chuyển đổi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sử dụng các nguồn thông tin sẵn có để &quot;hack&quot; mục tiêu: &quot;Phải nhìn vào những cái tạp chí</span></div>\n<p class=\"body-txt\">\nkhác nhau mà người ta đọc, những cái chương trình mà họ đọc, những cái sản phẩm mà\n \nhọ xem.&quot; (07:31) và &quot;Bạn có thể dùng Amazon Best Seller để bạn tìm ra cái sản phẩm mà\n \nkhách hàng của bạn muốn, tìm ra những cái cuốn sách mà họ mua.&quot; (09:03). Điều này\n \ncung cấp một phương pháp thực tế, ít tốn kém để nghiên cứu và tìm hiểu sâu về sở thích,\n \nhành vi của khách hàng. Thay vì cố gắng dự đoán, bạn có thể dựa vào dữ liệu có sẵn từ\n \ncác nền tảng lớn để xác định chính xác đối tượng đã có sẵn nhu cầu và sự quan tâm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sự cụ thể trong nhắm mục tiêu mang lại hiệu quả vượt trội: &quot;Bạn phải rất rất cụ thể khi</span></div>\n<p class=\"body-txt\">\nmà bạn đặt cái quảng cáo Facebook đấy, bạn đánh mục tiêu vào những cái người này rất\n \ncụ thể.&quot; (10:38). Điều này quan trọng vì nhắm mục tiêu cụ thể giúp giảm lãng phí ngân\n \nsách quảng cáo vào những đối tượng không tiềm năng. Khi bạn tập trung vào một nhóm\n \nnhỏ, có nhu cầu rõ ràng, chi phí tiếp cận sẽ thấp hơn và khả năng chuyển đổi cao hơn, tối\n \nưu hóa ROI.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Nhiều người người ta cứ có thể là người ta thiết lập quảng cáo cho cả một cái đất nước luôn\n \nhay là cho cả một khu vực luôn. Nhưng thực ra như thế thì cũng được thôi nhưng mà... Nhưng\n \nmà nếu như mà giả sử như ở Mỹ chẳng hạn nhá, những tuổi từ 23 đến 25 chẳng hạn, người ta\n \nsẽ thích một người ta sẽ có một vài cái sở thích nhất định nào đấy. Cho nên mình phải đi sâu\n \nhơn nữa.”\n \n“Mình phải bước vào tâm trí của khách hàng để mình thực sự hiểu xem là tại sao người ta lại\n \nmua hàng. Đấy mình phải hiểu tâm lý khách hàng.”\n \n“Bạn phải rất rất cụ thể khi mà bạn đặt cái quảng cáo Facebook đấy, bạn đánh mục tiêu vào\n \nnhững cái người này rất cụ thể.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div></div></div>",

"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tạo nội dung bằng cách trích dẫn:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tìm một bài báo/nội dung uy tín (ví dụ: trên CNN) nói về một chủ đề liên quan.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Viết một đoạn văn nhận xét, bình luận về bài báo đó, sau đó chèn link gốc và trích dẫn</span></div>\n<p class=\"body-txt\">\nlại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Cách này giúp tạo ra nội dung mới mẻ, thêm giá trị cho người đọc và thu hút traffic.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tầm quan trọng của Keyword:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Keyword là yếu tố then chốt để có được lượng truy cập (traffic) chất lượng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Cần tìm đúng và chuẩn các cụm từ khóa để tối ưu hóa hiệu quả.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Phương pháp tìm Keyword hiệu quả (sử dụng Google):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Bước 1: Lên Google (nên dùng bản US để có kết quả chính xác hơn).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Bước 2: Tìm kiếm một từ khóa chính/lĩnh vực (ví dụ: &quot;học tiếng Anh&quot;).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Bước 3: Cuộn xuống cuối trang kết quả tìm kiếm. Tại mục &quot;People also search for&quot;</span></div>\n<p class=\"body-txt\">\n(người ta cũng tìm kiếm những cụm này nữa), Google sẽ gợi ý một danh sách các từ\n \nkhóa liên quan.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Bước 4: Sao chép các cụm từ khóa này vào Notepad. Google thường cung cấp khoảng 10</span></div>\n<p class=\"body-txt\">\ncụm. Các cụm từ này thường là &quot;long-tail keywords&quot; (dài 3-4 từ), phản ánh ý định tìm\n \nkiếm cụ thể của người dùng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Kỹ thuật &quot;allintitle:&quot; để đánh giá mức độ cạnh tranh của keyword:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sử dụng cú pháp `allintitle: &quot;cụm từ khóa&quot;` (ví dụ: `allintitle: &quot;học tiếng Anh&quot;`).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Cú pháp này sẽ hiển thị tất cả các trang web có đúng cụm từ khóa đó trong tiêu đề bài</span></div>\n<p class=\"body-txt\">\nviết.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nếu số lượng kết quả khoảng 2000 hoặc ít hơn, đó là một cơ hội rất tốt để tạo nội dung</span></div>\n<p class=\"body-txt\">\nvà xếp hạng cao trên YouTube, blog, bài viết, vì mức độ cạnh tranh chưa quá lớn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Giá trị cốt lõi của Keyword và sự cô đọng:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Keyword là nền tảng mang lại giá trị, dù là sản phẩm, dịch vụ hay kiến thức.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" sty
