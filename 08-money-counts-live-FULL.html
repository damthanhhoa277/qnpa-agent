p class=\"body-txt\">\nlơn (relearn), ăn lơn (unlearn), rì lơn (relearn) để các anh chị thay đổi nhanh.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Trong thời đại thông tin thay đổi chóng mặt, khả năng thích nghi và</span></div>\n<p class=\"body-txt\">\nhọc hỏi liên tục (unlearn and relearn) là kỹ năng sống còn. Insight này không chỉ cung\n \ncấp một phương pháp học hiệu quả mà còn trang bị tư duy linh hoạt, giúp người học\n \nkhông bị lỗi thời và luôn dẫn đầu. Nó khẳng định giá trị của việc học chiến lược (Why)\n \nthay vì các kỹ thuật cụ thể (How) dễ bị lỗi thời.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">&quot;Tốc độ phát triển của tôi rất là nhanh là bởi vì tôi đang ở tầng sứ mệnh, sau đó thì nó</span></div>\n<p class=\"body-txt\">\nđến cái tầng tôi là ai, và cuối cùng nó mới là tại sao tôi phải làm điều đó.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là kim chỉ nam cho sự phát triển bền vững và nhanh chóng. Nó</span></div>\n<p class=\"body-txt\">\nchỉ ra một lộ trình tư duy từ cấp độ cao nhất (sứ mệnh) đến bản sắc cá nhân (tôi là ai)\n \nrồi mới đến động lực cụ thể (tại sao làm). Khi có một &quot;Why&quot; vững chắc dựa trên sứ mệnh\n \nvà bản sắc, mọi hành động sẽ có định hướng rõ ràng, tạo ra động lực mạnh mẽ và khả\n \nnăng thích ứng vượt trội, dẫn đến tốc độ phát triển không ngừng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">&quot;Trăm hay không bằng tay quen.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Câu nói này tưởng chừng đơn giản nhưng lại cực kỳ thực tế và mạnh</span></div>\n<p class=\"body-txt\">\nmẽ. Nó nhấn mạnh tầm quan trọng của việc hành động và thực hành liên tục thay vì chỉ\n \nhọc hỏi lý thuyết. Trong bối cảnh internet marketing, nơi mọi thứ thay đổi nhanh chóng,\n \nviệc bắt tay vào làm, thử nghiệm và tích lũy kinh nghiệm thực tế sẽ mang lại kết quả\n \nvượt trội so với việc chỉ giỏi lý thuyết suông.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Mọi vấn đề tôi muốn nói với các anh chị rằng là mọi vấn đề nếu các anh chị chỉ dừng ở What\n \nand How thì nó sẽ tắc, cuộc sống của anh chị nó sẽ bị bế tắc.”\n \n“Tại sao mình lại cần phải sử dụng internet? Ui dễ không? Nó chỉ có một cái lựa chọn duy nhất\n \nlà gì ạ? Là làm thôi.”\n \n“Nhiều thứ tôi không biết, nhưng mà tôi làm sao ạ? Tôi cứ làm.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Chương 8</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 61: Nhân hiệu</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi giảng của thầy  tập trung vào việc xây dựng nhân hiệu</h3>\n<p class=\"body-txt\">\n(personal brand) trên internet. Thầy trình bày 5 quy tắc cốt lõi, trong đó đặc biệt nhấn mạnh\n \ntầm quan trọng của việc xác định giá trị độc đáo mà mình mang lại (câu hỏi &quot;Tại sao?&quot;), sống\n \nchân thật và nhất quán với nhân hiệu đã xây dựng. Quảng bá chỉ là bước phụ trợ cho một\n \nnhân hiệu được xây dựng vững chắc từ bên trong.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Giá trị bạn mang lại là gì?</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Người ta mua hàng từ một thương hiệu/nhân hiệu nhiều hơn là mua hàng từ quảng cáo.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Cùng một sản phẩm, mọi người sẽ dễ dàng mua từ người có nhân hiệu trên internet hơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Để trả lời câu hỏi về lợi thế cạnh tranh, cần xác định: Bạn có thể mang đến điều gì cho thị</span></div>\n<p class=\"body-txt\">\ntrường?\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Giá trị mà bạn có thể &quot;thêm vào&quot; là gì?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Điểm khác biệt duy nhất có giá trị cao nào mà bạn có thể thêm vào sản phẩm để mang lại</span></div>\n<p class=\"body-txt\">\ncho thị trường.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Luyện tập giao tiếp một cách dễ dàng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Có giao tiếp một chiều (truyền thông) và giao tiếp nhiều chiều.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Bạn cần học cách truyền thông một cách mạch lạc và rõ ràng về nhân hiệu của mình.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Hãy cẩn trọng với những câu nói của mình trên Facebook, YouTube và các kênh khác vì</span></div>\n<p class=\"body-txt\">\nngười khác có thể xem lại lịch sử của bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nếu đã xây dựng nhân hiệu không tốt trước đây, có thể sử dụng chức năng ẩn toàn bộ</span></div>\n<p class=\"body-txt\">\nstatus cũ và chỉ cho hiển thị những status thể hiện đúng nhân hiệu mong muốn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Luôn tự hỏi bản thân: &quot;Tại sao người ta phải mua hàng/đầu tư cho tôi?&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sống cùng với nhân hiệu (Làm những điều bạn nói)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sẽ vô cùng tệ hại nếu bạn xây dựng một nhân hiệu không giống con người thật của bạn,</span></div>\n<p class=\"body-txt\">\nvì sớm hay muộn nó cũng bị thị trường lật tẩy và chính bạn sẽ phải chịu đau khổ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Để xây dựng nhân hiệu tốt không phải bằng cách truyền thông tốt về mình, mà phải</span></div>\n<p class=\"body-txt\">\nhoàn thiện con người mình, phát triển bản thân mình lên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng nhân hiệu là &quot;làm những gì bạn nói, nói những gì bạn làm&quot;, nó thống nhất,</span></div>\n<p class=\"body-txt\">\nsống đúng như con người thật của bạn (ví dụ: cách ăn mặc, ăn nói thống nhất).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Quảng bá nhân hiệu của bạn</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Bạn cần phải đầu tư tiền bạc cho việc quảng bá nhân hiệu của mình.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Điều quan trọng nhất là phải *consistent* (nhất quán, liên tục và kiên trì).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Bạn không thể hôm nay là luật sư, mai lại quảng bá mình là vận động viên đua xe nếu</span></div>\n<p class=\"body-txt\">\nkhông có sự nhất quán trong nhân hiệu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Quảng bá phải nhất quán với vai trò/lĩnh vực hiện tại của bạn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Có thể sử dụng các chiến thuật như tạo video phỏng vấn giả định (ví dụ: với CNN hoặc</span></div>\n<p class=\"body-txt\">\nkênh truyền hình tự tạo), hoặc thay tên trong các bài viết profile mẫu để quảng bá. Tuy\n \nnhiên, việc này cần tuân thủ luật pháp và tránh sự hiểu lầm (ví dụ: luật Việt Nam sẽ chặt\n \nchẽ hơn).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Hoàn thiện bản thân</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Để hoàn thiện con người mình (làm nền tảng cho các bước trên) thì phải học rất nhiều.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nhân hiệu là giá trị cốt lõi, không phải quảng cáo: Thầy  nhấn mạnh</span></div>\n<p class=\"body-txt\">\nrằng khách hàng mua hàng từ một thương hiệu/nhân hiệu nhiều hơn là từ quảng cáo.\n \nĐiều này quan trọng vì nó định hướng rằng giá trị thực sự mà một cá nhân hoặc doanh\n \nnghiệp mang lại, cùng với sự tin cậy xây dựng được, mới là yếu tố quyết định hành vi\n \nmua hàng, chứ không phải chỉ là việc chi tiền cho quảng cáo đơn thuần. Nó thay đổi\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\ntrọng tâm từ &quot;làm sao để được nhìn thấy&quot; sang &quot;làm sao để có giá trị đáng được nhìn\n \nthấy&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tính nhất quán và chân thực là nền tảng sống còn (&quot;Sống cùng với nhân hiệu&quot;): Quy tắc</span></div>\n<p class=\"body-txt\">\nsố 4 – &quot;làm những gì bạn nói, nói những gì bạn làm&quot; – được thầy coi là rất quan trọng.\n \nĐây là insight đắt giá vì nó khẳng định sự không thể tách rời giữa con người thật và nhân\n \nhiệu. Một nhân hiệu không chân thật sẽ sớm bị thị trường phát hiện và đào thải, gây ra\n \ntổn thất về uy tín và cả sự đau khổ cho chính người xây dựng. Việc này đòi hỏi sự tự\n \nnhận thức và nỗ lực hoàn thiện bản thân liên tục.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">&quot;WHY&quot; quan trọng hơn &quot;HOW&quot;: Thầy liên tục nhắc nhở về câu hỏi &quot;Tại sao người ta phải</span></div>\n<p class=\"body-txt\">\nmua hàng/đầu tư cho tôi?&quot; và khẳng định đây là câu hỏi quan trọng nhất. Điều này cực\n \nkỳ quan trọng vì nó định hướng chiến lược từ gốc rễ. Nếu không xác định được rõ giá trị\n \ncốt lõi và lý do tồn tại của mình, mọi nỗ lực quảng bá hay hành động (how to do it) đều\n \ntrở nên vô nghĩa và kém hiệu quả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Mua hàng từ một thương hiệu nhiều hơn là mua hàng từ quảng cáo.”\n \n“Xây dựng nhân hiệu là làm những gì bạn nói, nói những gì bạn làm. Nó thống nhất, nó sống\n \nđúng như con người thật của bạn.”\n \n“Đối với tôi, &#x27;Why&#x27; là quan trọng nhất. Tại sao cần phải có nó?”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\ntrung vào việc tạo ra thông tin giá trị và đáng tin cậy cho đối tượng khách hàng mục tiêu\n \ncủa mình.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 62: Các bước Email Marketing</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi giảng tập trung vào chiến lược Email Marketing hiệu quả, đặc biệt là cách xây</h3>\n<p class=\"body-txt\">\ndựng mối quan hệ với khách hàng trước khi bán hàng thông qua chuỗi email. Thầy giới thiệu\n \nchiến lược &quot;4-1&quot; (80% giá trị, 20% bán hàng), nhấn mạnh việc hiểu rõ đối tượng khách hàng\n \nmục tiêu, giá trị cốt lõi của họ, và sử dụng các câu hỏi cụ thể (What, How, Why/Why Not)\n \ntrong chuỗi email để thúc đẩy tương tác, giáo dục và xây dựng lòng tin. Mục tiêu cuối cùng là\n \nkhiến khách hàng trải nghiệm sản phẩm/giá trị trước khi họ mua hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Giới thiệu Email Marketing: Đây là phần tiếp theo của khóa học, tập trung vào email</span></div>\n<p class=\"body-txt\">\nmarketing.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Ebook miễn phí: Thầy sẽ xuất bản một ebook về email marketing và sẽ tặng miễn phí</span></div>\n<p class=\"body-txt\">\ncho học viên đăng ký sớm tại `long.vn/freebook` (hoặc `long.vn/email`).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Công cụ Email: Thầy sử dụng công cụ có tên là &quot;GetResponse&quot; (và nhắc đến đường link</span></div>\n<p class=\"body-txt\">\naffiliate của mình).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Email Marketing trong chương trình: Được trình bày ở bước 6, 7, 8 trong sách/khóa học.</span></div>\n<p class=\"body-txt\">\nKhóa học chuyên sâu &quot;Email Marketing Bom Nguyên Tử&quot; là một chương trình đắt tiền vì\n \ncó sự hỗ trợ trực tiếp từ đội ngũ của thầy.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Khái niệm &quot;Campaign&quot;: Là tập hợp của những khách hàng có cùng mục tiêu, hoặc tập</span></div>\n<p class=\"body-txt\">\nhợp các email/contact có cùng một mục tiêu. Ví dụ: email những người tập yoga, email\n \nnhững người thích thể thao.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thành phần của một Campaign:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Các contact (tên gọi của các contact).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Các chuỗi email tự động (auto responder/auto response).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Các newsletter.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chiến lược 4-1:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sử dụng 4 email &quot;cho đi&quot; (cung cấp giá trị) trước khi có 1 email &quot;được sử dụng để bán&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Ngay cả trong email bán hàng, cũng có 4 phần là giá trị và 1 phần để bán.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chiến lược này dựa trên quy tắc 80-20: 80% xây dựng quan hệ, 20% bán hàng. Áp dụng</span></div>\n<p class=\"body-txt\">\ncả trong nội dung email bán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chuỗi email đầu tiên rất quan trọng (Chiến lược 4-1 thực hành):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Email số 0 (hoặc email đầu tiên): Tặng quà. Email này dùng để tặng quà và nhắc nhở</span></div>\n<p class=\"body-txt\">\nkhách hàng về món quà đã tặng (thường nằm ở bước số 2 trong sơ đồ của thầy).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Hiểu tâm lý khách hàng Việt Nam: Người Việt Nam thường không download quà tặng</span></div>\n<p class=\"body-txt\">\nngay cả khi có trang thank you page hoặc email thông báo.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Email số 1 (tiếp theo): Nhắc lại link quà tặng và câu hỏi &quot;WHAT?&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tiếp tục gửi lại đường link quà tặng để khách hàng tải về.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sử dụng kỹ thuật đặt câu hỏi để kích thích khách hàng đọc/trải nghiệm nội dung.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Ví dụ: &quot;Trong chương X của cuốn sách, anh chị đọc có thấy thú vị không?&quot; hoặc &quot;Điều gì</span></div>\n<p class=\"body-txt\">\nanh cảm thấy hay nhất trong chương X của cuốn sách?&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Hoặc: &quot;Hôm qua bạn cũng đã tải về cuốn sách này mà chưa đọc kịp phải không? Bạn có</span></div>\n<p class=\"body-txt\">\nthể bấm vào đường link này để tải lại cuốn sách.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mục đích là giúp khách hàng trải nghiệm sản phẩm và xây dựng lòng tin.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Câu hỏi &quot;What&quot; (ví dụ: &quot;Anh biết điều gì hay nhất mà bạn đọc ở đây?&quot;) dễ trả lời hơn cho</span></div>\n<p class=\"body-txt\">\nkhách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Email số 2 (tiếp theo): Câu hỏi &quot;HOW?&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nâng cấp độ câu hỏi lên &quot;How&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Ví dụ: &quot;Trong chương X của cuốn sách, tôi đã nói đến một trong những bí kíp để giúp các</span></div>\n<p class=\"body-txt\">\nbạn tăng doanh số. Bạn đã sử dụng cái đó như thế nào trong doanh nghiệp của mình, có\n \nthể kể cho tôi nghe được không?&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Email số 3 (tiếp theo): Câu hỏi &quot;WHY?&quot; hoặc &quot;WHY NOT?&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nâng cấp độ lên câu hỏi &quot;Why&quot; hoặc &quot;Why not?&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Ví dụ: &quot;Này Hòa ơi! Sao ở chương 7 có một cái tuyệt chiêu để có thể giúp cho bạn nhanh</span></div>\n<p class=\"body-txt\">\nchóng mở rộng cửa hàng sang cửa hàng thứ 20 mà không phải 10 cửa hàng. Sao bạn vẫn\n \nkhông dùng nó à Hòa?&quot; (Thầy giả định khách hàng chưa làm vì &quot;đấy là người Việt Nam&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng kịch bản bán hàng (ví dụ cho khóa học 36 tuyệt chiêu bán hàng):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xác định đối tượng khách hàng mục tiêu (&quot;Core&quot;): Ai là người phù hợp nhất với sản</span></div>\n<p class=\"body-txt\">\nphẩm của ta?\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thầy nhắm mục tiêu chính là &quot;chủ doanh nghiệp&quot; (primary market) chứ không phải</span></div>\n<p class=\"body-txt\">\nnhân viên kinh doanh (secondary market).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Lý do: Khóa học giúp thiết kế toàn bộ hệ thống kinh doanh, điều mà nhân viên không có</span></div>\n<p class=\"body-txt\">\nquyền hạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xác định nhu cầu của đối tượng mục tiêu: Chủ doanh nghiệp cần gì? (Họ cần rất nhiều</span></div>\n<p class=\"body-txt\">\nthứ).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Bộ lọc khách hàng tiềm năng: Không phải tất cả chủ doanh nghiệp đều cần, mà là những</span></div>\n<p class=\"body-txt\">\nchủ doanh nghiệp &quot;có đặc tính gì&quot; thì mới cần khóa học này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Bí quyết của trò chơi: Nằm ở việc đặt và trả lời các câu hỏi quan trọng này để tạo sự khác</span></div>\n<p class=\"body-txt\">\nbiệt và thành công.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xác định động lực/niềm tin/giá trị của khách hàng: Khóa học dành cho chủ doanh</span></div>\n<p class=\"body-txt\">\nnghiệp có &quot;mong muốn cải thiện hệ thống kinh doanh của mình&quot;. Nhiều ông chủ không\n \nmuốn cải thiện vì niềm tin và giá trị của họ khác. Ta cần hiểu họ theo đuổi giá trị gì.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thiết kế sản phẩm để giải quyết vấn đề: Sản phẩm phải giải quyết được vấn đề cụ thể</span></div>\n<p class=\"body-txt\">\ncủa khách hàng mục tiêu (ví dụ: muốn gia tăng doanh số).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tạo tiêu đề sản phẩm hấp dẫn (Sub-title):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Ví dụ: &quot;3 tuyệt chiêu  sử dụng để gia tăng 20% lợi nhuận ngay lập tức.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Ví dụ khác: &quot;Bạn có thực sự đang rất mệt mỏi bởi vì liên tục phải tìm kiếm khách hàng</span></div>\n<p class=\"body-txt\">\nkhông? Bạn có thực sự muốn khách hàng đến với bạn hoàn toàn tự động không? Hãy đọc\n \nvà khám phá tất cả những bí quyết này để hiểu bằng cách nào mà chúng tôi xây dựng\n \nđược hệ thống khách hàng tự động và liên tục ngay cả khi tôi không cần chạm vào bàn\n \nphím.&quot;\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tạo các Landing Page cho từng &quot;Niche&quot; nhỏ: Tạo nhiều landing page với các tiêu đề, đề</span></div>\n<p class=\"body-txt\">\nnghị khác nhau để thử nghiệm xem cái nào tốt nhất.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chiến lược 4-1 (80-20 Rule) trong Email Marketing: Đây là cốt lõi của việc xây dựng mối</span></div>\n<p class=\"body-txt\">\nquan hệ và bán hàng bền vững. Thay vì bán hàng trực tiếp ngay lập tức, tập trung vào\n \nviệc cung cấp giá trị (4 email giá trị) trước khi đưa ra đề nghị bán hàng (1 email bán\n \nhàng). Ngay cả trong email bán hàng, vẫn phải đảm bảo 80% là giá trị.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Giúp xây dựng lòng tin, tạo sự gắn kết với khách hàng, giảm cảm giác</span></div>\n<p class=\"body-txt\">\nbị &quot;dụ dỗ mua hàng&quot;, từ đó tăng tỷ lệ chuyển đổi khi đề nghị bán hàng được đưa ra. Đây\n \nlà nền tảng cho marketing dài hạn, không chỉ là những giao dịch ngắn hạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Hiểu rõ và thích nghi với tâm lý khách hàng địa phương (Ví dụ: Người Việt Nam): Thầy</span></div>\n<p class=\"body-txt\">\nnhấn mạnh sự khác biệt giữa người Việt Nam và người Tây, đặc biệt là việc khách hàng\n \nthường không hành động ngay lập tức (ví dụ: không tải về quà tặng miễn phí). Điều này\n \nđòi hỏi người làm marketing phải kiên nhẫn hơn, nhắc nhở và kích thích hành động liên\n \ntục.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Mọi chiến lược marketing cần được điều chỉnh cho phù hợp với đặc</span></div>\n<p class=\"body-txt\">\nthù văn hóa, thói quen và tâm lý của đối tượng mục tiêu. Việc sao chép chiến lược nước\n \nngoài mà không có sự điều chỉnh có thể dẫn đến thất bại. Nó nhắc nhở chúng ta về tầm\n \nquan trọng của việc nghiên cứu và thấu hiểu khách hàng của chính mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chuỗi Email dựa trên câu hỏi (What, How, Why/Why Not): Việc sử dụng một chuỗi</span></div>\n<p class=\"body-txt\">\nemail có cấu trúc với các câu hỏi dẫn dắt là một phương pháp hiệu quả để giáo dục, khơi\n \ngợi tư duy và tạo sự tương tác với khách hàng. Bắt đầu bằng câu hỏi &quot;What&quot; dễ trả lời,\n \nsau đó nâng cấp lên &quot;How&quot; để khuyến khích hành động, và cuối cùng là &quot;Why/Why Not&quot;\n \nđể giải quyết các rào cản tiềm ẩn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Phương pháp này không chỉ cung cấp thông tin mà còn chủ động kéo</span></div>\n<p class=\"body-txt\">\nkhách hàng vào một hành trình khám phá và giải quyết vấn đề. Nó giúp xác định rõ hơn\n \nnhu cầu, khó khăn và động lực của khách hàng, từ đó tạo ra các đề nghị bán hàng chính\n \nxác và thuyết phục hơn, đồng thời xây dựng mối quan hệ sâu sắc hơn dựa trên sự thấu\n \nhiểu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xác định sâu sắc đối tượng mục tiêu và hệ giá trị của họ: Không chỉ dừng lại ở việc xác</span></div>\n<p class=\"body-txt\">\nđịnh đối tượng theo ngành nghề (ví dụ: chủ doanh nghiệp), mà phải đi sâu vào &quot;đặc tính&quot;\n \nvà &quot;niềm tin, giá trị&quot; mà họ theo đuổi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Việc thấu hiểu giá trị cốt lõi và niềm tin của khách hàng giúp chúng ta</span></div>\n<p class=\"body-txt\">\nthiết kế sản phẩm và thông điệp marketing phù hợp với mong muốn sâu xa nhất của họ.\n \nNó giúp lọc ra những khách hàng thực sự có nhu cầu và sẵn sàng hành động để thay\n \nđổi/cải thiện, thay vì cố gắng bán cho tất cả mọi người, tiết kiệm nguồn lực và tăng hiệu\n \nquả chuyển đổi.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“4 email cho đi mới có một email được sử dụng để bán.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Ngay cả trong email được dùng để bán thì cũng 4 phần là giá trị, một phần để bán mà thôi.”\n \n“Người Việt Nam khác người Tây.”\n \n“Cái bí quyết của trò chơi nằm ở chính cái câu hỏi quan trọng này, làm cho ta trở nên khác\n \nbiệt. Thành công hay không thành công trên kinh doanh nằm ở chỗ câu hỏi này.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\ndụng render 3D chất lượng cao vào dự án tiếp theo để đạt được hiệu quả mong muốn ra\n \nsao?&quot; (Khuyến khích họ suy nghĩ về giải pháp và hành động).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Email số 3 (Why/Why Not): &quot;FUTAGO nhận thấy anh/chị đã tải hướng dẫn về render 3D</span></div>\n<p class=\"body-txt\">\nvà quan tâm đến việc nâng cao chất lượng hình ảnh. Nhưng có vẻ anh/chị vẫn chưa liên\n \nhệ để tư vấn về giải pháp diễn họa chuyên nghiệp của chúng tôi. Điều gì đang khiến\n \nanh/chị chần chừ?&quot; hoặc &quot;Tại sao việc đầu tư vào render 3D chất lượng cao lại là một ưu\n \ntiên hoặc chưa phải ưu tiên hàng đầu của anh/chị lúc này?&quot; (Thăm dò rào cản và động\n \nlực).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Email số 4 (Bán hàng): Sau chuỗi tương tác này, FUTAGO có thể đưa ra một đề xuất cụ</span></div>\n<p class=\"body-txt\">\nthể (ví dụ: &quot;Gói render 3D cho thiết kế nội thất nhà ở Nhật Bản – từ 20.000 JPY&quot;) kèm\n \ntheo lời giải thích ngắn gọn về cách nó giải quyết các vấn đề đã được thảo luận và lợi ích\n \ntrực tiếp cho họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xác định sâu sắc đối tượng mục tiêu và hệ giá trị:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Không chỉ là &quot;kiến trúc sư&quot;, mà là &quot;những kiến trúc sư nào tại Nhật Bản?&quot; Ví dụ:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Những kiến trúc sư đang tìm cách nổi bật trong các cuộc đấu thầu cạnh tranh.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Những công ty thiết kế muốn thu hút khách hàng cao cấp hơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Những nhà phát triển (developer) muốn tăng tốc độ bán hàng dự án bất động sản.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Họ coi trọng giá trị gì nhất đối với diễn họa kiến trúc? (ví dụ: độ chính xác cao, thời gian</span></div>\n<p class=\"body-txt\">\nhoàn thành nhanh, khả năng tạo cảm xúc, sự độc đáo, hay chi phí hợp lý). FUTAGO cần\n \nthiết kế thông điệp và sản phẩm dựa trên những giá trị cốt lõi này.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 63: Ví dụ &amp; Tổng kết Email Marketing</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi học này tập trung vào chiến lược email marketing tự động hóa để xây dựng</h3>\n<p class=\"body-txt\">\nhệ thống tạo referral và gia tăng doanh số bền vững. Thầy  nhấn mạnh\n \ntầm quan trọng của việc cá nhân hóa, tạo sự tò mò và cung cấp giá trị liên tục qua chuỗi\n \nemail. Cốt lõi là thúc đẩy khách hàng hành động và cảnh báo về hậu quả nếu không áp dụng,\n \nđồng thời giới thiệu giải pháp tự động hóa giúp doanh nghiệp phát triển không ngừng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Email 1: Tặng quà và đặt câu hỏi mở: Bắt đầu bằng việc tặng quà (tài liệu/ebook) và hỏi</span></div>\n<p class=\"body-txt\">\nkhách hàng về việc họ có còn nhớ bước số 4 trong chiến lược referral hay không. Mục\n \nđích là khơi gợi sự quan tâm và kiểm tra mức độ sẵn sàng hành động của khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tạo sự chân tình và nông dân: Viết email với giọng điệu thân mật, chân tình, gần gũi như</span></div>\n<p class=\"body-txt\">\n&quot;Chào Vũ Hương Mai,  đây&quot; để tạo kết nối cảm xúc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Email 2: Thúc đẩy hành động và cảnh báo: Hỏi khách hàng đã triển khai hệ thống</span></div>\n<p class=\"body-txt\">\nreferral marketing như thế nào và thể hiện niềm tin rằng họ là một trong số ít người\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">hành động liên tục. Đặt câu hỏi về việc đã mở ebook và có bonus cho doanh nghiệp chưa.</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Khai thác tâm lý bỏ lỡ (FOMO) và đối thủ: Nhấn mạnh rằng đối thủ cũng đang nghiên</span></div>\n<p class=\"body-txt\">\ncứu và áp dụng những chiến lược này. Cảnh báo về hậu quả nếu khách hàng không hành\n \nđộng trong khi đối thủ đang phát triển.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Email 3: Đặt câu hỏi chiến lược: Yêu cầu khách hàng trả lời hai câu hỏi quan trọng: &quot;Tại</span></div>\n<p class=\"body-txt\">\nsao bạn cần làm hệ thống này?&quot; và &quot;Tại sao bạn lại không làm hệ thống này?&quot;.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Email 4: Giới thiệu giải pháp mới: Đề cập đến một khóa học mới tìm thấy giúp gia tăng</span></div>\n<p class=\"body-txt\">\ndoanh số bằng nhiều chiến lược đơn giản khác ngoài referral marketing (follow the\n \nmoney, chiến lược bể cá). Mục đích là cung cấp giải pháp cho những người chưa triển\n \nkhai được referral.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xử lý từ chối (học trực tuyến): Dự đoán khách hàng có thể không quen với học online và</span></div>\n<p class=\"body-txt\">\ntrấn an rằng khóa học này rất linh hoạt, có thể xem đi xem lại nhiều lần, khác với học\n \ntrực tiếp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tạo động lực hành động khẩn cấp: Giới thiệu ưu đãi giảm giá (mã coupon) và cảnh báo</span></div>\n<p class=\"body-txt\">\nrằng ưu đãi có thể bị hủy bất cứ lúc nào.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Email 5: Tự động hóa và bí mật thành công: Tiết lộ bí mật thành công là &quot;Automation&quot;</span></div>\n<p class=\"body-txt\">\n(tự động hóa). Hệ thống sẽ tự động làm việc sau khi được xây dựng, giúp doanh số tăng\n \ntrưởng liên tục theo thời gian.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Công thức email bán hàng hiệu quả: Tất cả các email quan trọng đều có phần &quot;PS&quot;</span></div>\n<p class=\"body-txt\">\n(Postscript) để thêm những thông tin giá trị hoặc lời kêu gọi hành động cuối cùng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chiến lược Email Marketing Tự động hóa liên tục (Automation): Đây là cốt lõi của bài</span></div>\n<p class=\"body-txt\">\ngiảng, giúp doanh nghiệp xây dựng một hệ thống bán hàng và nuôi dưỡng khách hàng\n \ntiềm năng hoạt động 24/7 mà không cần sự can thiệp thủ công liên tục. Điều này quan\n \ntrọng vì nó giải phóng thời gian, tăng hiệu quả và đảm bảo doanh số được tạo ra đều đặn\n \ntheo thời gian.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sử dụng yếu tố tâm lý để thúc đẩy hành động: Thầy Long áp dụng rất nhiều kỹ thuật tâm</span></div>\n<p class=\"body-txt\">\nlý như: tạo sự chân thành (email &quot;nông dân&quot;), khơi gợi tò mò (hỏi về &quot;bước 4&quot;), tạo động\n \nlực (tin rằng khách hàng là người hành động), khai thác nỗi sợ bỏ lỡ (FOMO) và nỗi sợ bị\n \nđối thủ vượt mặt, đồng thời tạo cảm giác khẩn cấp (coupon có thể hết hạn). Điều này\n \nquan trọng vì nó chuyển đổi từ việc gửi thông tin thụ động sang việc kích thích khách\n \nhàng hành động, tạo ra kết quả thực tế.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Cung cấp giá trị và giải pháp theo từng giai đoạn: Chuỗi email không chỉ đơn thuần bán</span></div>\n<p class=\"body-txt\">\nhàng mà còn cung cấp giá trị thông qua tài liệu miễn phí, nhận diện vấn đề của khách\n \nhàng và đưa ra các giải pháp phù hợp. Quan trọng là nhận diện được khách hàng chưa\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">hành động vì không biết phải làm gì (không có kiến thức nền) và cung cấp khóa</h3>\n<p class=\"body-txt\">\nhọc/công cụ để giải quyết vấn đề đó, từ đó mở rộng tệp khách hàng tiềm năng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Chào Mai, Long đây. Bao trong số anh chị đọc thì cái mail nó vô cùng chân thành ạ. Rất đơn\n \ngiản, nhưng mà phải dùng văn của tôi thì các anh chị sẽ thấy là lại đi sao chép ông  rồi. Các anh chị phải sáng tạo ra văn phong của mình.”\n \n“Nếu bạn tiếp tục không làm mà đối thủ bạn đang sử dụng chiến lược này, hãy hình dung kỹ về\n \nđiều này nhé Hương Mai. Ngay bây giờ, vào lúc này đối thủ của bạn đang dùng. Hoặc là bạn\n \ndùng nó, hoặc là bạn mất nó.”\n \n“Đó chính là bí mật của thành công trong kinh doanh. Tôi sẽ còn quay lại với email ngày mai.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Việt Nam nó thế, mẹ. Có đúng không? Bao nhiêu trong số anh chị biết rằng là mình đọc xong\n \nmình chả bao giờ mình làm ạ.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#1565c0\">Chương 9</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 64: Giới thiệu Automation và công cụ Auto - Responders</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi giảng này tập trung vào khái niệm và ứng dụng của tự động hóa (automation)</h3>\n<p class=\"body-txt\">\ntrong kinh doanh, đặc biệt là trong lĩnh vực email marketing. Cốt lõi là thiết lập các chiến\n \ndịch email tự động bằng công cụ autoresponder để doanh nghiệp có thể vận hành và chăm\n \nsóc khách hàng liên tục, ngay cả khi chủ doanh nghiệp không trực tiếp làm việc. Diễn giả\n \nnhấn mạnh việc truyền tải giá trị trong các email theo dõi để xây dựng lòng tin và thói quen\n \nmở email của khách hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tự động hóa (Automation) là chìa khóa thành công trong kinh doanh, giúp doanh nghiệp</span></div>\n<p class=\"body-txt\">\nvận hành tự động (&quot;autopilot&quot;) ngay cả khi bạn không làm việc trực tiếp (ví dụ: đang\n \nngủ).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mục tiêu của tự động hóa là để doanh nghiệp của bạn vẫn chạy và tạo ra kết quả ngay cả</span></div>\n<p class=\"body-txt\">\nkhi bạn không tác động thủ công.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Buổi giảng tập trung vào cách tự động hóa các chiến dịch email marketing (email</span></div>\n<p class=\"body-txt\">\ncampaigns).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Công cụ chính để tự động hóa email marketing là Autoresponder (hệ thống trả lời tự</span></div>\n<p class=\"body-txt\">\nđộng).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Các nền tảng Autoresponder phổ biến được đề cập:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">AWeber</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">GetResponse</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">ActiveCampaign (diễn giả rất thích)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Infusionsoft ( cũng nhắc đến)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Quy trình thiết lập Autoresponder: Khi ai đó đăng ký vào danh sách email của bạn, họ sẽ</span></div>\n<p class=\"body-txt\">\ntự động nhận được một chuỗi email được lên lịch sẵn từ Autoresponder.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thời lượng chiến dịch email có thể đa dạng: 4 ngày, 7 ngày, hoặc thậm chí 100 ngày.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Điều quan trọng nhất trong các email follow-up là phải truyền tải giá trị (delivering</span></div>\n<p class=\"body-txt\">\nvalue) cho người nhận.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Cấu trúc chuỗi email ví dụ:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Email đầu tiên: Gửi quà tặng miễn phí mà người đăng ký đã chọn (ví dụ: tài liệu PDF,</span></div>\n<p class=\"body-txt\">\nvideo).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Email thứ hai: Nêu bật/tóm tắt một điểm quan trọng từ quà tặng miễn phí đó. Mục tiêu</span></div>\n<p class=\"body-txt\">\nlà giúp người nhận tiếp thu thông tin và hình thành thói quen mở email của bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Diễn giả khuyên nên chuẩn bị sẵn ít nhất 4-5 email cho chuỗi ban đầu.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mục tiêu là xây dựng thói quen cho người nhận để họ thường xuyên xem tên bạn và mở</span></div>\n<p class=\"body-txt\">\nemail của bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Các email tiếp theo (ví dụ: Email thứ ba trở đi): Tiếp tục bổ sung giá trị và có thể giới</span></div>\n<p class=\"body-txt\">\nthiệu (upsell) sản phẩm/dịch vụ của bạn.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Có thể chuẩn bị sẵn một chuỗi email dài (ví dụ: 10 email trong 10 ngày) để khi có người</span></div>\n<p class=\"body-txt\">\nđăng ký, họ sẽ nhận được liên tục các thông điệp giá trị và được chăm sóc tự động trong\n \nmột khoảng thời gian nhất định.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tự động hóa giúp doanh nghiệp hoạt động &quot;trên chế độ lái tự động&quot; ngay cả khi bạn</span></div>\n<p class=\"body-txt\">\nkhông trực tiếp làm việc. Đây là nền tảng để chủ doanh nghiệp mở rộng quy mô kinh\n \ndoanh mà không bị giới hạn bởi thời gian và sức lực cá nhân. Nó giải phóng bạn khỏi các\n \ntác vụ lặp đi lặp lại, cho phép bạn tập trung vào chiến lược, đổi mới, hoặc đơn giản là có\n \nthêm thời gian cá nhân, trong khi doanh nghiệp vẫn tạo ra doanh thu và duy trì tương\n \ntác với khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Yếu tố then chốt của các email theo dõi là &quot;truyền tải giá trị&quot; (delivering value). Thay vì</span></div>\n<p class=\"body-txt\">\nchỉ gửi email quảng cáo hoặc spam, mỗi email cần cung cấp thông tin hữu ích, kiến thức,\n \nhoặc giải pháp cho vấn đề của khách hàng. Điều này giúp xây dựng lòng tin, củng cố vị\n \nthế chuyên gia của bạn, và khiến khách hàng mong muốn mở các email tiếp theo, từ đó\n \ntăng tỷ lệ chuyển đổi khi bạn giới thiệu sản phẩm/dịch vụ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng thói quen mở email ở người nhận. Bằng cách gửi những email có giá trị và hữu</span></div>\n<p class=\"body-txt\">\ních ngay từ đầu, bạn khuyến khích khách hàng thường xuyên mở và đọc thư của mình.\n \nThói quen này là vô cùng quan trọng vì nó đảm bảo rằng khi bạn gửi các thông điệp quan\n \ntrọng hơn hoặc các lời chào hàng, tỷ lệ mở và tương tác sẽ cao hơn, giúp thông điệp của\n \nbạn luôn được tiếp cận hiệu quả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“The key to success with your business is to get it to run for you on autopilot.”\n \n“Automation means your business can run while you are sleeping, while you&#x27;re not working on\n \nyour business.”\n \n“But really the main key is that you&#x27;re delivering value in those follow-up messages.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Email 1 (Ngay lập tức): Tự động gửi tài nguyên miễn phí mà họ đã đăng ký (ví dụ: PDF</span></div>\n<p class=\"body-txt\">\nhướng dẫn, link video).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Email 2 (Ngày 2-3): Nêu bật một mẹo hoặc insight giá trị từ tài liệu đã gửi, kèm theo một</span></div>\n<p class=\"body-txt\">\nhoặc hai hình ảnh render chất lượng cao của FUTAGO để minh họa. Mục tiêu là củng cố\n \nthông điệp giá trị và giúp khách hàng làm quen với chất lượng công việc của FUTAGO.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Email 3 (Ngày 4-5): Chia sẻ một trường hợp nghiên cứu (case study) ngắn gọn về cách</span></div>\n<p class=\"body-txt\">\nFUTAGO đã giúp một khách hàng cụ thể (ví dụ: một công ty kiến trúc hoặc nhà phát\n \ntriển) thành công trong việc hình dung và tiếp thị dự án của họ nhờ các hình ảnh render\n \nchuyên nghiệp. Kèm theo nhiều hình ảnh render đẹp mắt từ dự án đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Email 4 (Ngày 6-7): Cung cấp thêm giá trị, ví dụ: &quot;Xu hướng hình ảnh kiến trúc 3D nổi</span></div>\n<p class=\"body-txt\">\nbật trong ngành xây dựng Nhật Bản&quot; hoặc &quot;Cách chọn phong cách render phù hợp nhất\n \nvới loại hình dự án của bạn&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Các email tiếp theo: Có thể mời khách hàng đặt lịch tư vấn miễn phí 15-30 phút để thảo</span></div>\n<p class=\"body-txt\">\nluận về yêu cầu render của họ, hoặc giới thiệu các gói render đặc biệt/ưu đãi cho khách\n \nhàng mới. Luôn kèm theo portfolio ấn tượng và nhấn mạnh lợi ích kinh doanh mà hình\n \nảnh diễn họa chất lượng cao mang lại cho dự án của họ (ví dụ: giúp bán hàng nhanh hơn,\n \nthu hút nhà đầu tư, tăng tính thuyết phục trong đấu thầu).\n \nQuan trọng là tất cả các nội dung email đều phải tập trung vào giá trị và lợi ích của dịch vụ\n \ndiễn họa kiến trúc/render 3D mà FUTAGO cung cấp, giúp khách hàng B2B Nhật Bản hình\n \ndung và tiếp thị dự án của họ một cách hiệu quả nhất.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 65: Tagging trong Infusionsoft và thực hành mẫu Email đầu tiên</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi giảng tập trung vào việc sử dụng tính năng &quot;tagging&quot; và xây dựng chuỗi email</h3>\n<p class=\"body-txt\">\ntự động (auto-responder sequence) hiệu quả trong internet marketing. Cốt lõi là cá nhân\n \nhóa và tự động hóa việc gửi nội dung giá trị đến từng khách hàng tiềm năng dựa trên hành vi\n \nvà sở thích của họ, từ đó xây dựng lòng tin, tạo thói quen tương tác và tối đa hóa tỷ lệ\n \nchuyển đổi. Thầy cũng nhấn mạnh tầm quan trọng của việc sắp xếp các email theo một thứ\n \ntự logic và tạo động lực để khách hàng luôn mở email tiếp theo.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thầy  giới thiệu tính năng &quot;tagging&quot; (gắn thẻ) trong các nền tảng email</span></div>\n<p class=\"body-txt\">\nmarketing như Infusionsoft, AWeber, ActiveCampaign.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">&quot;Tagging&quot; là việc xác định và đánh dấu những người dùng có hành động cụ thể (ví dụ:</span></div>\n<p class=\"body-txt\">\nmở email, click vào link nào đó, đăng ký nhận tài liệu).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mục đích của tagging là để tự động gửi những tin nhắn cá nhân hóa, đúng đối tượng và</span></div>\n<p class=\"body-txt\">\nnhu cầu của từng người.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Việc này giúp chiến dịch email marketing trở nên hiệu quả hơn rất nhiều, đảm bảo tin</span></div>\n<p class=\"body-txt\">\nnhắn đến những người thực sự quan tâm hoặc có nhu cầu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Cần thiết lập một chuỗi auto-responder (hồi đáp tự động) có thứ tự rõ ràng, với các</span></div>\n<p class=\"body-txt\">\nemail đã được viết sẵn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nội dung email phải được gửi theo thứ tự mà khách hàng đã tương tác (ví dụ: đăng ký</span></div>\n<p class=\"body-txt\">\nnhận lời khuyên về mối quan hệ thì gửi các email liên quan đến mối quan hệ).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Email cần cung cấp giá trị thực sự (ví dụ: tài liệu hay, blog post, video hữu ích).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mục tiêu là xây dựng lòng tin cho khách hàng bằng cách liên tục cung cấp giá trị một</span></div>\n<p class=\"body-txt\">\ncách tự động.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Phải tạo thói quen cho khách hàng mở email, hành động (click, học hỏi) và &quot;off-in&quot; vào</span></div>\n<p class=\"body-txt\">\ndanh sách của mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Khi khách hàng đã được &quot;tag&quot;, hệ thống sẽ gửi những tin nhắn tự động được cá nhân hóa</span></div>\n<p class=\"body-txt\">\nsâu hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thầy trình bày cấu trúc của email tự động đầu tiên (welcome email):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chào mừng và cảm ơn họ đã đăng ký.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Giới thiệu bản thân mình là ai.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Cung cấp một tài liệu miễn phí (free download/tài liệu giá trị).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">&quot;Làm công tác tư tưởng trước&quot; / &quot;nhắc nhở&quot; để họ biết và mở email tiếp theo vào ngày</span></div>\n<p class=\"body-txt\">\nmai, vì ngày mai sẽ có một mẹo hay hoặc video giá trị khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Kết thúc bằng lời cảm ơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tầm quan trọng của tiêu đề email hấp dẫn để khách hàng quyết định mở email (có thể</span></div>\n<p class=\"body-txt\">\nsử dụng các tiêu đề từ &quot;cookbook&quot; - tài liệu khóa học).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chuỗi email tiếp theo cũng cần tiếp tục cung cấp giá trị và khuyến khích hành động.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Cá nhân hóa chiến dịch email bằng &quot;tagging&quot; để tăng hiệu quả: Thay vì gửi hàng loạt,</span></div>\n<p class=\"body-txt\">\ntagging cho phép bạn phân loại người nhận dựa trên hành vi cụ thể (mở email nào, click\n \nlink gì). Điều này cực kỳ quan trọng vì nó giúp bạn gửi đúng nội dung cho đúng người,\n \ntăng đáng kể tỷ lệ mở, tỷ lệ click và cuối cùng là tỷ lệ chuyển đổi. Bạn chuyển từ việc &quot;nói\n \nchung chung&quot; sang &quot;nói riêng&quot; với từng cá nhân, tạo cảm giác được quan tâm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng chuỗi auto-responder mang lại giá trị liên tục và có tính chiến lược: Không chỉ</span></div>\n<p class=\"body-txt\">\nlà gửi email tự động, mà phải là một hệ thống được thiết kế để liên tục cung cấp nội\n \ndung hữu ích theo một trình tự logic. Điều này bao gồm việc giới thiệu bản thân, cung\n \ncấp tài liệu miễn phí, và đặc biệt là &quot;pre-frame&quot; (nhắc nhở trước) về nội dung giá trị của\n \nemail tiếp theo. Chiến lược này giúp xây dựng lòng tin, vị thế chuyên gia và tạo ra thói\n \nquen mong chờ và mở email từ bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tạo thói quen tương tác và sự kỳ vọng cho người nhận: Việc &quot;làm công tác tư tưởng</span></div>\n<p class=\"body-txt\">\ntrước&quot; (pre-framing) bằng cách gợi ý về giá trị của email tiếp theo là một kỹ thuật tâm lý\n \nmạnh mẽ. Nó không chỉ đảm bảo tỷ lệ mở email cao hơn mà còn giúp người nhận hình\n \nthành thói quen tương tác với nội dung của bạn. Khi họ biết rằng mỗi email đều mang lại\n \nđiều gì đó hữu ích, họ sẽ chủ động mở và tìm kiếm thông tin, biến họ từ người đăng ký\n \nthụ động thành một đối tượng tiềm năng tích cực.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Tagging tuyệt vời!”\n \n“Mình phải đảm bảo rằng là mình dùng cái tagging.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Mình cũng phải làm công tác tư tưởng trước. Đấy đảm bảo là ngày mai bạn cũng kiểm tra\n \nemail. Bởi vì ngày mai sẽ có một cái mẹo rất là hay hay là một cái video rất là hay mà tôi sẽ\n \ngửi cho bạn chẳng hạn, mình nhắc trước như thế.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 66: Thực hành Email 2</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi giảng tập trung vào chức năng &quot;tracking&quot; (theo dõi) trong email marketing</h3>\n<p class=\"body-txt\">\nnhư một công cụ thiết yếu để tự động hóa và tối ưu hóa chiến dịch. Cốt lõi là việc sử dụng\n \ntracking để hiểu hành vi và sở thích của khách hàng, từ đó phân loại, cá nhân hóa nội dung\n \nvà nhắm mục tiêu chính xác. Mục tiêu cuối cùng là tăng tỷ lệ mở email, giảm chi phí\n \nmarketing, nâng cao tỷ lệ chuyển đổi và đảm bảo email không bị rơi vào hộp thư rác.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nội dung hứa hẹn (ví dụ: ebook, video) trong email phải cực kỳ giá trị để khuyến khích</span></div>\n<p class=\"body-txt\">\nngười nhận mở thư.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chức năng &quot;tracking&quot; cho phép theo dõi ai đã mở email, ai không, và tỷ lệ mở email.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Các nền tảng email marketing chuyên nghiệp (ví dụ: Infusionsoft) cho phép đi sâu hơn:</span></div>\n<p class=\"body-txt\">\ntự động kích hoạt các sự kiện hoặc chuyển người dùng sang chiến dịch email khác dựa\n \ntrên hành vi click chuột vào các liên kết cụ thể.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Việc phân loại khách hàng vào các danh sách email khác nhau dựa trên sự quan tâm và</span></div>\n<p class=\"body-txt\">\nhành vi tương tác giúp cá nhân hóa nội dung.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">&quot;Tracking&quot; là một quy trình đơn giản nhưng có thể tự động hóa công việc kinh doanh</span></div>\n<p class=\"body-txt\">\nmột cách hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Học viên nên tập trung vào *ý tưởng* và *khái niệm* của tracking, các vấn đề kỹ thuật có</span></div>\n<p class=\"body-txt\">\nthể tự tìm hiểu qua tài liệu hướng dẫn của các nhà cung cấp nền tảng (ActiveCampaign,\n \nGetResponse, AWeber, Infusionsoft).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Biết khách hàng mục tiêu ở đâu và nhắm đúng đối tượng giúp giảm chi phí và tăng tỷ lệ</span></div>\n<p class=\"body-txt\">\nchuyển đổi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sử dụng tracking để gửi email phù hợp cho từng phân khúc khách hàng giúp tránh trùng</span></div>\n<p class=\"body-txt\">\nlặp đối tượng, giảm nguy cơ email rơi vào hộp thư rác và xây dựng niềm tin, từ đó nâng\n \ncao tỷ lệ mở thư.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Marketing hiệu quả cần biết rõ khách hàng cụ thể nào cần nhắm tới và họ quan tâm đến</span></div>\n<p class=\"body-txt\">\nđiều gì.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Phân loại và cá nhân hóa chiến dịch dựa trên hành vi thực tế của khách hàng: Việc sử</span></div>\n<p class=\"body-txt\">\ndụng tracking để biết chính xác khách hàng đã click vào liên kết nào, thể hiện sự quan\n \ntâm đến chủ đề gì (ví dụ: marketing Facebook, PR, webinar, các phong cách thiết kế cụ\n \nthể), cho phép người gửi email phân loại và tạo ra các chiến dịch tiếp theo siêu cá nhân\n \nhóa. Điều này quan trọng vì nó chuyển từ việc gửi tin nhắn chung chung sang việc cung\n \ncấp giá trị *đúng* cho *đúng* người, làm tăng đáng kể sự liên quan và hiệu quả của\n \nemail.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tự động hóa thông minh để tối ưu hiệu suất và giảm chi phí: Chức năng tracking không</span></div>\n<p class=\"body-txt\">\nchỉ dừng lại ở việc thu thập dữ liệu mà còn là cơ sở để tự động kích hoạt các hành động\n \ntiếp theo (ví dụ: chuyển khách hàng sang một danh sách email khác, gửi một chuỗi email\n \ncụ thể). Điều này giúp tiết kiệm thời gian, công sức, đảm bảo mọi khách hàng đều nhận\n \nđược thông tin phù hợp một cách kịp thời, đồng thời giảm thiểu chi phí marketing\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\nkhông hiệu quả bằng cách loại bỏ việc gửi email đến những người không quan tâm hoặc\n \ntrùng lặp đối tượng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nâng cao khả năng gửi email thành công và tăng tỷ lệ chuyển đổi: Khi email được cá</span></div>\n<p class=\"body-txt\">\nnhân hóa và nhắm mục tiêu chính xác dựa trên tracking, chúng ít có khả năng bị đánh\n \ndấu là spam và có tỷ lệ mở cao hơn đáng kể. Email đến được đúng đối tượng quan tâm\n \nsẽ có khả năng chuyển đổi cao hơn, mang lại hiệu quả kinh doanh rõ rệt hơn so với việc\n \ngửi email hàng loạt.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Cái tài liệu đấy nó phải cực kỳ cực kỳ giá trị để cho họ mở ra.”\n \n“Bạn phải biết là khách hàng của mình ở đâu, phải target đúng, phải nhắm khách hàng đúng\n \nthì như thế thì sẽ tốn ít chi phí hơn.”\n \n“Khi mà mình tagging những cái người như thế thì mình rất là thông minh bởi vì mình đang\n \nnhắm trúng những cái người đấy.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 67: Membership Site</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi học này tập trung vào chiến lược tạo ra thu nhập định kỳ (recurring revenue)</h3>\n<p class=\"body-txt\">\nbền vững thông qua việc xây dựng và vận hành các trang thành viên (membership sites).\n \nThầy  trình bày cách cung cấp giá trị liên tục cho khách hàng bằng các\n \nbuổi hỏi đáp trực tuyến, tài liệu đào tạo độc quyền, và cách khéo léo giới thiệu membership\n \nsite trong phễu bán hàng để đảm bảo dòng tiền ổn định mỗi tháng. Ông cũng nhấn mạnh tầm\n \nquan trọng của việc gia tăng giá trị trọn đời cho khách hàng thông qua mô hình này và gợi ý\n \ntận dụng các công cụ miễn phí để triển khai hiệu quả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Giới thiệu PR Underground.com để tăng traffic và uy tín:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">PR Underground.com là một trang web cho phép đăng tải các thông cáo báo chí (press</span></div>\n<p class=\"body-txt\">\nrelease).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Đảm bảo thông cáo báo chí được đưa lên Google News, giúp xây dựng liên kết và tăng độ</span></div>\n<p class=\"body-txt\">\ntin cậy cho doanh nghiệp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chi phí thấp: khoảng $39 cho một thông cáo hoặc $75 cho một vài thông cáo, giúp thông</span></div>\n<p class=\"body-txt\">\ncáo của bạn xuất hiện trên nhiều trang tin tức.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tầm quan trọng và tiềm năng của Membership Sites:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Membership site là cách hiệu quả để tạo thu nhập thường xuyên và ổn định hàng tháng</span></div>\n<p class=\"body-txt\">\n(residual income).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Ví dụ: Với 10 thành viên trả $50/tháng, doanh nghiệp có $500/tháng; với 100 thành</span></div>\n<p class=\"body-txt\">\nviên trả $91/tháng, doanh nghiệp có $9100/tháng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mỗi chương trình kinh doanh online nên có nguồn thu nhập định kỳ hàng tháng để đảm</span></div>\n<p class=\"body-txt\">\nbảo sự ổn định tài chính, vì các kênh khác như email marketing hoặc bán sản phẩm một\n \nlần có thể không tạo ra dòng tiền đều đặn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Với chỉ khoảng 2 giờ làm việc mỗi tháng, một membership site có thể tạo ra doanh thu</span></div>\n<p class=\"body-txt\">\ntừ $21.000 đến $50.000.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Cách xây dựng Membership Site:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nội dung cung cấp:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tổ chức các buổi hỏi đáp trực tuyến (Q&amp;A session): ví dụ 2 lần/tháng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Cung cấp các video huấn luyện/đào tạo độc quyền.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Đăng tải tài liệu học tập hoặc các sản phẩm số sẵn có.</span></div>\n<div class=\"bullet\"
