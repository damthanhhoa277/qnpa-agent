r:#1565c0\">•</span><span class=\"bul-txt\">Bài 89: Phàn nàn, đổ lỗi là nguyên nhân của thất bại</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Bài 90: Hãy trở thành người học tập không ngừng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Bài 91: Không bỏ bê gia đình</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Bài 92: Trở thành người mà mọi người đều muốn làm việc cùng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Bài 93: Đừng bỏ công việc hiện tại (sớm)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Bài 94: Không copy-cut công việc kinh doanh</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Bài 95: Tập trung vào thiết kế mô hình kinh doanh</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Chương 12</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Bài 96: Phần mềm iWriter.com</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Bài 97: Phần mềm Membership Site</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Bài 98: Chiến lược Webinar</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#1565c0\">Chương 1</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 1: Giới thiệu - Câu chuyện của tôi</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi giảng tập trung vào tầm quan trọng của việc thích nghi liên tục trong kinh</h3>\n<p class=\"body-txt\">\ndoanh internet, đặc biệt nhấn mạnh ba khái niệm cốt lõi: Internet Business, Information\n \nProducts và Edutainment. Thầy Long chia sẻ rằng thành công đến từ việc không ngừng\n \n&quot;unlearn&quot; (xóa bỏ) kiến thức cũ và &quot;relearn&quot; (học lại) kiến thức mới, cũng như hành động\n \nnhanh chóng mà không nhất thiết phải hiểu tường tận mọi thứ. Bài học chính là sự nguy\n \nhiểm của tư duy &quot;tôi biết rồi&quot; và việc bám víu vào những gì đã cũ trong một thế giới internet\n \nthay đổi tốc độ chóng mặt.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thầy Long giới thiệu ba khái niệm cốt lõi đã làm thay đổi cuộc đời và công việc kinh</span></div>\n<p class=\"body-txt\">\ndoanh của ông: Internet Business, Information Products, và Edutainment.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">&quot;Internet Business&quot; không đơn thuần là sử dụng điện thoại để lên mạng hay Facebook,</span></div>\n<p class=\"body-txt\">\nmà là một khái niệm sâu rộng hơn cần được làm rõ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Ông nhấn mạnh những kỹ thuật mà ông từng dành rất nhiều thời gian để học và làm</span></div>\n<p class=\"body-txt\">\n(như domain, server, MySQL, PHP, HTML, WordPress, bảo mật, quản trị) giờ đây là\n \nnhững điều không cần biết, thậm chí là &quot;trò chơi vô cùng ngu ngốc&quot; vì chúng không trực\n \ntiếp mang lại hiệu quả kinh doanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Người không biết về những chi tiết kỹ thuật phức tạp (ví dụ &quot;tờ giấy bên phải&quot;) lại có thể</span></div>\n<p class=\"body-txt\">\nkiếm tiền nhanh hơn vì họ không bị sa đà vào những thứ không tạo ra giá trị.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Điểm mấu chốt là &quot;không cần hiểu, chỉ cần làm thôi&quot; – khuyến khích hành động thực tế</span></div>\n<p class=\"body-txt\">\nthay vì chờ đợi sự hiểu biết tường tận.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet thay đổi với tốc độ nhanh chóng; kiến thức mới ngày hôm nay có thể trở nên lạc</span></div>\n<p class=\"body-txt\">\nhậu vào ngày mai.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Để thành công, cần liên tục thực hiện quá trình &quot;unlearn&quot; (xóa bỏ kiến thức cũ) và</span></div>\n<p class=\"body-txt\">\n&quot;relearn&quot; (học kiến thức mới).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Các ví dụ về sự thay đổi của các kênh marketing online (Yahoo Index, DMOZ, Google</span></div>\n<p class=\"body-txt\">\nSEO/AdWords, Facebook Ads) minh họa việc cần phải liên tục tìm kiếm &quot;công cụ bí mật\n \nnào đó mà thiên hạ không thể biết được.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Câu chuyện về học viên Dũng Châu cho thấy một người không có nhiều tiền, chỉ đổi &quot;một</span></div>\n<p class=\"body-txt\">\ncân thịt trâu&quot; để đi học, nhưng đã áp dụng và thay đổi cách kinh doanh hoàn toàn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Cần &quot;dùng hết, không bỏ bất cứ cái gì cả&quot; những gì học được và liên tục &quot;đào sâu&quot; chúng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sự khác biệt giữa người lớn (biết chữ, thích radio cũ) và trẻ nhỏ (không biết chữ, dùng</span></div>\n<p class=\"body-txt\">\nremote tìm video nhanh chóng) minh họa việc người lớn dễ bị mắc kẹt bởi kiến thức cũ\n \nvà sự &quot;biết rồi,&quot; trong khi trẻ nhỏ dễ dàng tiếp nhận cái mới bằng hành động.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">&quot;Những gì mang bạn đến [A] thì không thể mang bạn đến [B] được&quot; – chiến lược thành</span></div>\n<p class=\"body-txt\">\ncông ở giai đoạn này không đảm bảo thành công ở giai đoạn kế tiếp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Từ khóa &quot;tôi biết rồi&quot; là &quot;vô cùng nguy hiểm&quot; vì nó ngăn cản sự học hỏi và phát triển.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Có những nguyên lý chung và nguyên lý riêng trong kinh doanh internet; cần tập trung</span></div>\n<p class=\"body-txt\">\nvào việc áp dụng những nguyên lý chung và không ngại thuê người khác làm những việc\n \nchi tiết (đơn giản đối với người chuyên môn).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chủ động &quot;Unlearn&quot; và &quot;Relearn&quot;: Đây là cốt lõi để tồn tại và phát triển trong kỷ nguyên</span></div>\n<p class=\"body-txt\">\nsố. Thầy Long nhấn mạnh rằng tốc độ thay đổi trên internet là yếu tố quyết định cuộc\n \nchơi, và việc bám víu vào kiến thức, công cụ, hay phương pháp cũ sẽ nhanh chóng dẫn\n \nđến lạc hậu. Việc chủ động xóa bỏ những gì đã biết và ngay lập tức học hỏi, áp dụng cái\n \nmới là chìa khóa để giữ vững lợi thế cạnh tranh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Hành động quan trọng hơn sự hiểu biết hoàn hảo: Câu nói &quot;Không cần hiểu, chỉ cần làm</span></div>\n<p class=\"body-txt\">\nthôi&quot; là một lời khuyên cực kỳ đắt giá. Trong môi trường internet marketing tốc độ cao,\n \nviệc chờ đợi để hiểu tường tận mọi khía cạnh trước khi hành động sẽ khiến bạn bỏ lỡ cơ\n \nhội. Khuyến khích tư duy thử nghiệm, chấp nhận rủi ro và học hỏi từ thực tế thay vì lý\n \nthuyết suông, giống như cách những đứa trẻ vô tư sử dụng công nghệ mà không cần đọc\n \nhướng dẫn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thoát khỏi cái bẫy &quot;Tôi biết rồi&quot;: &quot;Tôi biết rồi là một từ khóa vô cùng nguy hiểm.&quot; Tư duy</span></div>\n<p class=\"body-txt\">\nnày là rào cản lớn nhất cho sự đổi mới và học hỏi. Nó khiến cá nhân và doanh nghiệp trở\n \nnên tự mãn, đóng cửa với những ý tưởng, công nghệ hay phương pháp mới. Trong khi\n \ninternet không ngừng phát triển, một tư duy &quot;biết rồi&quot; sẽ dẫn đến sự trì trệ và cuối cùng\n \nlà bị bỏ lại phía sau.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Hôm nay thông báo với các anh chị biết tin mừng là chúng ta không cần biết những điều\n \ntuyệt vời này nữa. Đây là trò chơi mà tôi vô cùng ngu ngốc.”\n \n“Không cần phải hiểu nó. Bao nhiêu trong số các anh chị cần sẽ không cần hiểu, chỉ cần làm\n \nthôi ạ?”\n \n“Những gì mang bạn đến đây thì không thể mang bạn đến đây được.”\n \n“Tôi biết rồi là một từ khóa vô cùng nguy hiểm.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\nnhanh hơn, hoặc một công nghệ hiển thị thời gian thực (real-time rendering) trở nên\n \nphổ biến, cần sẵn sàng loại bỏ các quy trình làm việc chậm chạp hiện tại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Relearn: Nhanh chóng học hỏi và áp dụng các công nghệ mới (ví dụ: các engine render</span></div>\n<p class=\"body-txt\">\nmới, công cụ AI tạo hình ảnh/render, các plugin tăng tốc workflow), các phong cách diễn\n \nhọa hiện đại và kỹ thuật hậu kỳ tiên tiến. Đồng thời, không ngừng tìm hiểu về thị hiếu\n \nthẩm mỹ và kỳ vọng của khách hàng Nhật để điều chỉnh sản phẩm hình ảnh cho phù\n \nhợp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Hành động nhanh chóng, không chờ hiểu rõ hoàn toàn:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Khi có phần mềm mới hoặc kỹ thuật render mới xuất hiện (ví dụ: các công cụ AI hỗ trợ</span></div>\n<p class=\"body-txt\">\ntạo bối cảnh, cây cối, con người), thay vì chờ đợi tài liệu hướng dẫn hoàn chỉnh hay hiểu\n \nhết mọi chức năng, FUTAGO nên nhanh chóng thử nghiệm, áp dụng vào các dự án nhỏ\n \nhoặc thử nghiệm nội bộ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thử nghiệm các định dạng trình bày mới (ví dụ: ảnh 360 độ, tour walkthrough đơn giản)</span></div>\n<p class=\"body-txt\">\nmà không cần phải chờ đợi để nắm vững toàn bộ quy trình sản xuất phức tạp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tránh cái bẫy &quot;Tôi biết rồi&quot; về thị trường và khách hàng Nhật:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thị hiếu ki "<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet Marketing là triển khai các hoạt động marketing có sử dụng trên internet.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Quan niệm phổ biến rằng Internet Marketing chỉ là làm website và quảng cáo để thu hút</span></div>\n<p class=\"body-txt\">\nngười dùng là không đúng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet Business không phải là Marketing.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Marketing được định nghĩa đơn giản là &quot;tìm khách hàng, tìm đúng khách hàng và mang</span></div>\n<p class=\"body-txt\">\nhọ về cho doanh nghiệp của ta&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sau khi Marketing hoàn thành việc mang khách hàng về, công việc tiếp theo thuộc về bộ</span></div>\n<p class=\"body-txt\">\nphận Sale.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Phân biệt rõ Internet Marketing và các bộ phận khác (Sale, Chăm sóc khách hàng, Quản</span></div>\n<p class=\"body-txt\">\ntrị): Điều này quan trọng vì nó giúp doanh nghiệp xác định đúng vai trò, mục tiêu và\n \nnguồn lực cần tập trung cho từng mảng. Rất nhiều doanh nghiệp, đặc biệt là SME,\n \nthường gộp chung tất cả vào một, dẫn đến thiếu hiệu quả và lãng phí nguồn lực. Khi hiểu\n \nrõ ranh giới, họ có thể xây dựng quy trình và đội ngũ chuyên môn hóa hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Định nghĩa cốt lõi của Marketing: &quot;Tìm khách hàng, tìm đúng khách hàng và mang họ về</span></div>\n<p class=\"body-txt\">\ncho doanh nghiệp&quot;: Đây là một định nghĩa cực kỳ thực tế và hành động, khác xa với\n \nnhững lý thuyết marketing phức tạp. Nó giúp người học/doanh nghiệp tập trung vào\n \nmục tiêu cuối cùng và quan trọng nhất của marketing là thu hút đúng đối tượng khách\n \nhàng tiềm năng, thay vì chỉ làm các hoạt động marketing một cách vô định.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Hầu hết mọi người nghĩ là chúng ta làm một website, quảng cáo để cho mọi người vào, đó là\n \nkinh doanh trên là marketing, không phải, không phải như vậy.”\n \n“Marketing là tìm khách hàng, tìm đúng khách hàng và mang họ về cho doanh nghiệp của ta.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 5: Tại sao chúng ta phải sử dụng Internet?</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi chia sẻ này tập trung vào việc làm thế nào để sử dụng internet hiệu quả để</h3>\n<p class=\"body-txt\">\nphát triển công việc kinh doanh và đạt được lối sống tự do. Thầy  đã trình\n \nbày hành trình thay đổi cuộc sống của mình, từ khó khăn ban đầu đến thành công hiện tại,\n \nnhờ việc áp dụng internet không chỉ trong marketing mà còn trong quản trị nội bộ và giao\n \ntiếp. Cốt lõi là internet không chỉ là công cụ tiếp thị mà là nền tảng giúp chủ động kiểm soát\n \nmọi khía cạnh của công việc và cuộc sống, từ đó mang lại sự tự do về thời gian và địa điểm.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Cuộc sống trước đây: Thầy Long chia sẻ về cuộc sống khó khăn cách đây 40-45 năm, với</span></div>\n<p class=\"body-txt\">\ncăn nhà 8m2 dột nát, tài sản lớn nhất là chiếc xe máy, và phải sang nhà hàng xóm mượn\n \ntường để chụp ảnh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Cuộc sống hiện tại: Thầy giới thiệu về căn biệt thự tại Nha Trang (333m2 trên đảo), nhà</span></div>\n<p class=\"body-txt\">\nở Hà Nội, phòng làm việc đầy đủ tiện nghi với công nghệ cao và tủ sách.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tầm quan trọng của tủ sách: Thầy khẳng định &quot;Trong mỗi một căn nhà của một triệu</span></div>\n<p class=\"body-txt\">\nphú, chắc chắn có một tủ sách&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Cách làm việc của triệu phú internet:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thường xuyên làm việc tại văn phòng hoặc từ xa với luật sư, sales team, marketing team,</span></div>\n<p class=\"body-txt\">\nevent team...\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet giúp làm việc từ mọi nơi, đi khắp mọi nơi trên toàn thế giới.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Phong cách ăn mặc thoải mái vì thường ngồi sau máy tính, chỉ cần ảnh mặc vest chỉnh tề</span></div>\n<p class=\"body-txt\">\nđể sử dụng đi sử dụng lại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Hầu hết những người như thầy rất lười tắm, lười đánh răng vì ngủ không đủ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet mang lại sự tự do: Internet không chỉ là công cụ marketing mà còn là hệ thống</span></div>\n<p class=\"body-txt\">\nquản trị nội bộ và giao tiếp, giúp kết nối với mọi người từ mọi nơi mà không tốn chi phí\n \nđiện thoại (gần như miễn phí với 3G/4G).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Lối sống tự do của triệu phú internet: Thầy có thể đi du lịch, bay máy bay riêng, chơi</span></div>\n<p class=\"body-txt\">\ngame lái máy bay bắn nhau trên sa mạc vì cuộc sống của họ là ở đâu đó trên máy bay\n \nhoặc khách sạn, ít khi ngồi ở nhà.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Định nghĩa lại Internet Business: Internet Business không còn là công việc kinh doanh</span></div>\n<p class=\"body-txt\">\nthông thường nữa mà cần phải chủ động trong mọi khâu của công việc kinh doanh.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet là nền tảng cho sự tự do toàn diện, không chỉ marketing: Thầy Long nhấn mạnh</span></div>\n<p class=\"body-txt\">\nrằng internet không chỉ là công cụ để tiếp thị mà còn là hệ thống quản trị nội bộ và giao\n \ntiếp, giúp kiểm soát mọi khía cạnh của công việc từ xa. Điều này quan trọng vì nó mở\n \nrộng tư duy về vai trò của internet, từ một kênh bán hàng đơn thuần thành một xương\n \nsống vận hành doanh nghiệp, cho phép chủ doanh nghiệp không bị gò bó về địa lý hay\n \nthời gian.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Triệu phú internet tạo ra lối sống tự do dựa trên sự chủ động và công nghệ: Việc thầy</span></div>\n<p class=\"body-txt\">\nmô tả cuộc sống làm việc mọi lúc mọi nơi, từ Nha Trang đến Hà Nội, trên máy bay hay\n \ntrong khách sạn, cho thấy internet cho phép cá nhân tự kiến tạo một lối sống linh hoạt,\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\nkhông bị ràng buộc bởi văn phòng truyền thống. Điều này quan trọng vì nó truyền cảm\n \nhứng về một mục tiêu không chỉ là tiền bạc mà còn là sự tự chủ, tự do trải nghiệm cuộc\n \nsống.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thói quen đọc sách là nền tảng của thành công: Câu nói &quot;Trong mỗi một căn nhà của một</span></div>\n<p class=\"body-txt\">\ntriệu phú, chắc chắn có một tủ sách&quot; là một insight đắt giá. Nó không chỉ là một quan sát\n \nmà còn là lời khẳng định về tầm quan trọng của việc học hỏi liên tục và tích lũy kiến\n \nthức, cho thấy sự giàu có về vật chất thường đi đôi với sự giàu có về tri thức.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Trong mỗi một căn nhà của một triệu phú, chắc chắn có một tủ sách.”\n \n“Internet không chỉ là marketing, internet giúp cho tôi có hệ thống quản trị nội bộ và giúp cho\n \ntôi có thể communicate, có thể liên lạc với tất cả mọi người.”\n \n“Internet Business cần phải được thay đổi một cách rõ ràng hơn, đó không phải là một công\n \nviệc kinh doanh thông thường nữa, mà bạn cần phải chủ động trong mọi khâu của công việc\n \nkinh doanh.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 6: Công dân toàn cầu</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 7: Những việc cần làm để trở thành công dân toàn cầu</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi học tập trung vào việc áp dụng tư duy toàn cầu và tận dụng sức mạnh của</h3>\n<p class=\"body-txt\">\ninternet để phát triển cá nhân và kinh doanh. Thầy Long nhấn mạnh sự cần thiết phải đa\n \ndạng hóa nguồn thu nhập, liên tục đầu tư vào tài sản, và mở rộng tầm nhìn cùng các mối\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\nquan hệ trên phạm vi toàn cầu. Cốt lõi là thích nghi với thế giới thay đổi không ngừng và\n \nluôn tìm kiếm cơ hội mới, đồng thời duy trì thái độ tích cực.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sử dụng đòn bẩy công nghệ Internet: Phải tận dụng triệt để các nền tảng và ứng dụng</span></div>\n<p class=\"body-txt\">\ntrên internet để đem lại hiệu quả kinh doanh. Thậm chí các thiết bị trong nhà như chiếu\n \nsáng, tưới cây, âm thanh đều có thể điều khiển qua internet.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Đa dạng hóa nguồn thu nhập: Không biết trước điều gì sẽ thay đổi, nên cần đa dạng hóa</span></div>\n<p class=\"body-txt\">\nnguồn thu nhập, đặc biệt là từ internet (ví dụ: eBay đã từng phát triển nhưng giờ vắng\n \nbóng, Uber/Airbnb xuất hiện và phát triển mạnh mẽ).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tập trung vào tài sản: Tài sản là những thứ có thể tạo ra thu nhập. Cần chuyển các nguồn</span></div>\n<p class=\"body-txt\">\nlực bạn có thành tài sản.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thường xuyên tưởng thưởng cho bản thân: Dùng một phần trăm nhất định của thu nhập</span></div>\n<p class=\"body-txt\">\nđể tự thưởng hoặc đầu tư, tùy theo mục tiêu và tuổi tác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thường xuyên đi lại nhiều hơn để mở rộng tầm nhìn: Học hỏi từ sự phát triển vượt bậc</span></div>\n<p class=\"body-txt\">\ncủa ngành hàng không sau 100 năm. Nếu chưa có điều kiện đi lại, sử dụng internet để\n \nmở rộng tầm nhìn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sử dụng internet để mở rộng tầm nhìn (thay vì dùng Facebook/YouTube quá nhiều):</span></div>\n<p class=\"body-txt\">\nTránh &quot;ếch ngồi đáy giếng&quot; bằng cách đọc tin tức từ các trang web quốc tế uy tín (ví dụ:\n \nBusiness Insider, Forbes, Flipboard) thay vì chỉ đọc thông tin từ bạn bè trên mạng xã\n \nhội. Việc này cũng giúp cải thiện tiếng Anh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Liên tục tìm kiếm những cơ hội kinh doanh trên phạm vi toàn cầu.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sử dụng nguồn hỗ trợ toàn cầu.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mở rộng mạng lưới mối quan hệ trên phạm vi toàn cầu: Xem xét lại các mối quan hệ trên</span></div>\n<p class=\"body-txt\">\nFacebook, đừng chỉ giới hạn ở người Việt Nam.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Đầu tư vào tài sản (lặp lại): Nhấn mạnh tầm quan trọng của việc đầu tư tài sản. Tránh sai</span></div>\n<p class=\"body-txt\">\nlầm của người trẻ là kiếm tiền rồi cho đi hết; phải đầu tư để phát triển kinh doanh bền\n \nvững.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Hãy luôn vui vẻ: Duy trì thái độ tích cực trong kinh doanh và cuộc sống.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tận dụng Internet để mở rộng tầm nhìn và tìm kiếm cơ hội toàn cầu: Điều này cực kỳ</span></div>\n<p class=\"body-txt\">\nquan trọng vì thế giới đang thay đổi nhanh chóng (ví dụ sự trỗi dậy của Uber, Airbnb và\n \nsự suy yếu của eBay). Việc chỉ giới hạn tầm nhìn trong phạm vi hẹp hoặc sử dụng\n \ninternet chỉ cho mục đích giải trí (như Facebook) sẽ khiến cá nhân và doanh nghiệp bỏ\n \nlỡ những cơ hội lớn và không kịp thích nghi với sự phát triển. Thầy Long nhấn mạnh\n \nviệc đọc các nguồn tin quốc tế uy tín là cách hiệu quả để học hỏi và cập nhật.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Đa dạng hóa nguồn thu nhập và tập trung đầu tư vào tài sản: Đây là nền tảng cho sự phát</span></div>\n<p class=\"body-txt\">\ntriển bền vững. Trong một thế giới đầy biến động, việc phụ thuộc vào một nguồn thu\n \nnhập duy nhất là rủi ro. Hơn nữa, việc biến nguồn lực thành tài sản (thứ tạo ra thu nhập)\n \nthay vì tiêu xài hay cho đi hết là chìa khóa để tích lũy và phát triển tài chính lâu dài. Lời\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\nkhuyên về việc người trẻ kiếm tiền cần đầu tư trước khi cho đi là một bài học đắt giá về\n \nquản lý tài chính.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mở rộng mạng lưới quan hệ và tư duy kinh doanh trên phạm vi toàn cầu: Trong kỷ</span></div>\n<p class=\"body-txt\">\nnguyên số, việc chỉ giới hạn các mối quan hệ và cơ hội kinh doanh trong nước là một hạn\n \nchế lớn. Thầy Long khuyến khích nhìn ra thế giới để tìm kiếm đối tác, khách hàng và\n \nnguồn hỗ trợ, từ đó nâng cao quy mô và tầm vóc của doanh nghiệp.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Nếu bạn không tham gia vào trong các chuyến bay thì các bạn sẽ làm mình lúc nào cũng nhỏ\n \nnhư con ếch ngồi trong giếng vậy.”\n \n“Nếu bạn đang dùng Facebook rất nhiều trong ngày thì bạn sẽ rơi vào một cái kịch bản là bạn\n \nchỉ xem được thông tin của những người bạn của mình thôi.”\n \n“Tôi muốn nó trùng [điểm”\n \n“] là bởi vì tôi muốn các bạn ghi nhớ rõ hơn cái điều đó.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 8: 3 Nền tảng thành công khi kinh doanh trên Internet</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi giảng này tập trung vào ba yếu tố cốt lõi để làm chủ bất kỳ công việc kinh</h3>\n<p class=\"body-txt\">\ndoanh nào, đặc biệt là kinh doanh trên Internet (Internet Business hay IP). Thầy  nhấn mạnh rằng để thành công, chúng ta cần có tư duy đúng, kiến thức đúng và\n \ncông cụ đúng. Trong đó, tư duy đúng (mindset) là nền tảng quan trọng nhất, giúp chúng ta\n \nkhông chỉ áp dụng kiến thức và công cụ hiệu quả mà còn có khả năng phát triển và tìm kiếm\n \nnhững phương pháp mới.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Để làm chủ bất kỳ công việc gì, cần có ba yếu tố: Tư duy đúng, Kiến thức đúng và Công cụ</span></div>\n<p class=\"body-txt\">\nđúng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Buổi học này tập trung vào Internet Business (IP).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tư duy đúng (Mindset) là nền tảng đầu tiên và quan trọng nhất.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Kiến thức đúng (Right Knowledge) là yếu tố thứ hai; kiến thức có thể tìm kiếm dễ dàng</span></div>\n<p class=\"body-txt\">\nqua các từ khóa trên Google.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Công cụ đúng (Right Vehicle) là yếu tố thứ ba, hỗ trợ thực hiện công việc kinh doanh.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thầy sẽ tập trung chủ yếu vào tư duy (mindset) trong kinh doanh Internet.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Kiến thức và công cụ được coi là hai nền tảng bổ trợ, giúp phát triển công việc kinh</span></div>\n<p class=\"body-txt\">\ndoanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nếu chỉ dạy về công cụ, người học chỉ làm được điều đó, nhưng với mindset đúng, có thể</span></div>\n<p class=\"body-txt\">\nphát triển và tìm kiếm thêm nhiều công cụ hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nếu chỉ có kiến thức mà thiếu mindset, kiến thức có thể không được dùng hoặc dần mai</span></div>\n<p class=\"body-txt\">\nmột đi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mindset chính là phần quan trọng nhất.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tư duy đúng (Mindset) là nền tảng cốt lõi, quan trọng hơn kiến thức và công cụ: Thầy</span></div>\n<p class=\"body-txt\">\nnhấn mạnh rằng nếu có tư duy đúng, chúng ta có thể tự phát triển, tìm kiếm và áp dụng\n \nhiệu quả kiến thức và công cụ. Ngược lại, nếu thiếu mindset, dù có kiến thức và công cụ\n \ncũng khó thành công hoặc kiến thức sẽ bị lãng phí. Điều này quan trọng vì nó định\n \nhướng người học tập trung vào việc phát triển nội lực và cách nghĩ, thay vì chỉ chạy theo\n \ncác công cụ hay kiến thức bề nổi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Khả năng tự phát triển và tìm kiếm giải pháp mới dựa trên Mindset: Một mindset đúng</span></div>\n<p class=\"body-txt\">\nđắn cho phép người học không chỉ làm theo những gì được dạy mà còn chủ động tìm\n \nkiếm, sáng tạo và thích nghi với những thay đổi. Điều này cực kỳ quan trọng trong môi\n \ntrường kinh doanh Internet luôn biến động, nơi kiến thức và công cụ có thể nhanh\n \nchóng lỗi thời.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Để làm chủ bất kỳ một công việc gì thì chúng ta cần có ba thứ sau đây.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Tư duy đúng trong tất cả các khóa học của tôi kể cả ngày hôm nay thì các anh chị cũng phải\n \nhọc rất nhiều về tư duy kinh doanh trên Internet chứ không phải chỉ về kiến thức kinh doanh\n \ntrên Internet.”\n \n“Vì vậy, mindset chính là phần quan trọng nhất.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Chương 2</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 9: Why not?</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi chia sẻ này tập trung vào tư duy của nhà vô địch trong kinh doanh và cuộc</h3>\n<p class=\"body-txt\">\nsống. Diễn giả nhấn mạnh tầm quan trọng của việc hỏi &quot;Tại sao không?&quot; và đối mặt với rủi\n \nro, không để nỗi sợ hãi hay hoàn cảnh tiêu cực định nghĩa bản thân. Thay vào đó, hãy luôn\n \ntìm kiếm giải pháp và kiên trì tiến lên để vượt qua mọi thách thức, vì thành công là 80% từ\n \ntinh thần và 20% là hành động.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Diễn giả giới thiệu bản thân (Paul Counts từ Mỹ) và bày tỏ tình yêu Việt Nam.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chủ đề chính của buổi nói chuyện là &quot;tư duy của nhà vô địch&quot; (mindset of a champion).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thách thức đầu tiên mà diễn giả chia sẻ khi đến Việt Nam là học cách ăn phở bằng đũa.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Ba yếu tố then chốt để thành công (three keys to success):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Bước 1: Luôn đặt câu hỏi &quot;Tại sao không?&quot; (Why not?)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Khi đối mặt với việc phải làm gì đó trong kinh doanh hay cuộc sống mà cảm thấy khó</span></div>\n<p class=\"body-txt\">\nchịu, hãy hỏi &quot;Tại sao không? Điều tồi tệ nhất có thể xảy ra là gì?&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Rất nhiều lần trong kinh doanh, những rủi ro nhỏ có thể chấp nhận được.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chia sẻ câu chuyện bản thân năm 23 tuổi được đề nghị bán một doanh nghiệp internet</span></div>\n<p class=\"body-txt\">\ntrong 30 ngày, ban đầu nói không nhưng sau đó chấp nhận thách thức và bán thành công\n \ntrong 28 ngày với giá 780.000 USD.\n</p>\n<div class=\"bullet\"><span class "<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\nĐiều này quan trọng vì nó đảo ngược suy nghĩ thông thường về việc chỉ tập trung vào lợi\n \ních bản thân, khuyến khích tư duy phụng sự và tạo ra một vòng tròn tích cực, bền vững\n \ntrong các mối quan hệ và kinh doanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thành công bắt đầu từ sự kết nối chân thật và thấu hiểu sâu sắc: Bằng cách mỉm cười,</span></div>\n<p class=\"body-txt\">\nbắt tay, giao tiếp bằng mắt và đặt những câu hỏi cơ bản về cuộc sống, công việc của đối\n \nphương, diễn giả cho thấy cách xây dựng mối quan hệ và sự tin tưởng. Điều này quan\n \ntrọng vì nó là bước đầu tiên để hiểu nhu cầu thực sự của người khác, từ đó biết cách\n \ncung cấp giá trị phù hợp nhất, thay vì chỉ đơn thuần bán sản phẩm/dịch vụ một cách hời\n \nhợt.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Giúp người khác đạt được mục tiêu của họ để đạt được mục tiêu của mình: Câu nói của</span></div>\n<p class=\"body-txt\">\nZig Ziglar tóm gọn triết lý này một cách mạnh mẽ (&quot;You will get all you want in life if you\n \nhelp other people get what they want&quot;). Đây là một insight đắt giá bởi nó biến hành\n \nđộng giúp đỡ người khác không chỉ là lòng tốt mà còn là một chiến lược hiệu quả để đạt\n \nđược ước muốn cá nhân, tạo ra một động lực mạnh mẽ để phục vụ và giải quyết vấn đề\n \ncho thị trường.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Successful people, they are givers.”\n \n“You will get all you want in life if you help other people get what they want.”\n \n“When you help other people get what they want in life, success will follow you.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tư vấn về mặt hình ảnh: Đưa ra lời khuyên chuyên môn về cách sử dụng hình ảnh hiệu</span></div>\n<p class=\"body-txt\">\nquả nhất trong bối cảnh cụ thể của khách hàng, ví dụ như cách bố trí trong brochure,\n \nwebsite hoặc bảng trình bày.\n \nMục tiêu cuối cùng là làm cho khách hàng cảm thấy các sản phẩm diễn họa của FUTAGO là\n \ncông cụ đắc lực giúp họ thành công hơn trong công việc kinh doanh của mình, không chỉ là\n \nmột chi phí mà là một khoản đầu tư sinh lời.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 13: Những nỗi sợ lớn nhất của bạn</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi giảng này tập trung vào việc vượt qua những nỗi sợ hãi phổ biến khi kinh</h3>\n<p class=\"body-txt\">\ndoanh online, đặc biệt là các vấn đề kỹ thuật và rào cản ngôn ngữ. Thầy nhấn mạnh rằng các\n \nvấn đề kỹ thuật hiện nay có thể dễ dàng được giải quyết nhờ công nghệ tiên tiến, và việc học\n \ntiếng Anh là chìa khóa để tiếp cận thị trường toàn cầu, từ đó gia tăng doanh thu và mở rộng\n \ntầm ảnh hưởng. Cốt lõi là sự tự tin vào giá trị bản thân và khả năng thích nghi với công nghệ\n \nđể đạt được thành công.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Vấn đề kỹ thuật (Technical issues):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nhiều người sợ các vấn đề kỹ thuật như WordPress, tên miền, v.v., khi kinh doanh</span></div>\n<p class=\"body-txt\">\nonline.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thầy khẳng định các vấn đề kỹ thuật &quot;can easily be overcome&quot; (có thể dễ dàng vượt qua)</span></di hẩm của mình sang các ngôn ngữ khác để tiếp cận nhiều</span></div>\n<p class=\"body-txt\">\nngười hơn, vì có sức mạnh khi bạn có được nhiều người theo dõi (&quot;more of a following&quot;).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">&quot;Technical issues can easily be overcome now.&quot; (Các vấn đề kỹ thuật hiện nay có thể dễ</span></div>\n<p class=\"body-txt\">\ndàng được vượt qua.)\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là lời trấn an trực tiếp cho nhiều người khởi nghiệp kinh doanh</span></div>\n<p class=\"body-txt\">\nonline thường bị các rào cản kỹ thuật làm nản lòng. Nó cho thấy không cần phải là\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\nchuyên gia công nghệ để thành công, mà quan trọng là khả năng tận dụng công nghệ có\n \nsẵn và sự thay đổi của nó. Điều này giải phóng tâm lý sợ hãi, cho phép tập trung vào giá\n \ntrị cốt lõi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">&quot;When you learn English, you&#x27;re able to market to the world. You&#x27;re able to reach a lot</span></div>\n<p class=\"body-txt\">\nmore people.&quot; (Khi bạn học tiếng Anh, bạn có thể tiếp thị ra thế giới. Bạn có thể tiếp cận\n \nnhiều người hơn rất nhiều.)\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là một chiến lược kinh doanh toàn cầu rõ ràng. Tiếng Anh được</span></div>\n<p class=\"body-txt\">\ncoi là ngôn ngữ kinh doanh quốc tế, mở ra cánh cửa tiếp cận một thị trường lớn hơn gấp\n \nnhiều lần so với thị trường nội địa. Điều này trực tiếp liên quan đến tiềm năng tăng\n \ntrưởng doanh thu và mở rộng quy mô kinh doanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">&quot;You can make so much more money when you can sell all over the world.&quot; (Bạn có thể</span></div>\n<p class=\"body-txt\">\nkiếm được nhiều tiền hơn rất nhiều khi bạn có thể bán hàng ra toàn thế giới.)\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Điểm này củng cố trực tiếp lợi ích tài chính của việc vượt qua rào cản</span></div>\n<p class=\"body-txt\">\nngôn ngữ và kỹ thuật để vươn ra toàn cầu. Nó nhấn mạnh mục tiêu cuối cùng của kinh\n \ndoanh là lợi nhuận, và việc mở rộng thị trường là con đường hiệu quả nhất để đạt được\n \nmục tiêu đó.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Technical issues, especially now, can easily be overcome.”\n \n“There&#x27;s technology on the internet that lets you point and click to success. So you don&#x27;t have\n \nto know complicated things in order to achieve.”\n \n“When you learn English, you&#x27;re able to market to the world. You&#x27;re able to reach a lot more\n \npeople.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tiếp thị toàn cầu (market to the world): Mặc dù hiện tại FUTAGO chỉ nhắm đến khách</span></div>\n<p class=\"body-txt\">\nNhật, nhưng việc chuẩn bị sẵn sàng (qua việc nâng cao khả năng tiếng Anh và kỹ năng\n \ncông nghệ) có thể mở ra cơ hội &quot;market to the world&quot; trong tương lai. Có thể tạo ra\n \nportfolio/website song ngữ (Nhật-Anh) để tiếp cận thêm các đối tác quốc tế hoặc khách\n \nhàng nước ngoài đang hoạt động tại Nhật, hoặc chuẩn bị cho việc mở rộng sang các thị\n \ntrường nói tiếng Anh tiềm năng. Từ đó, tăng khả năng &quot;reach a lot more people&quot; và\n \n&quot;make so much more money&quot;.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 14: Cách vượt qua nỗi sợ - Phần 1</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi giảng nhấn mạnh tầm quan trọng của tư duy tích cực và niềm tin vào bản</h3>\n<p class=\"body-txt\">\nthân để đạt được thành công. Thầy Long khuyến khích học viên thay đổi lối suy nghĩ tiêu\n \ncực, chấp nhận sai lầm như một phần của quá trình học hỏi và luôn tiến lên từng bước nhỏ.\n \nCốt lõi là ngừng lo lắng – vì lo lắng giống như chiếc ghế bập bênh, chỉ tốn công sức mà không\n \nđưa ta đến đâu, đồng thời làm mất đi sức mạnh hiện tại của chúng ta.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sử dụng &quot;positive self-talk&quot; (tự nói chuyện tích cực với bản thân) để định hướng tư duy:</span></div>\n<p class=\"body-txt\">\nThay vì nói &quot;tôi không thể làm được&quot;, hãy nói &quot;tôi có thể và tôi sẽ thành công&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Cho phép bản thân mắc lỗi (&quot;give yourself permission to make mistakes&quot;): Hiểu rằng sai</span></div>\n<p class=\"body-txt\">\nlầm là một phần không thể tránh khỏi trong hành trình kinh doanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thừa nhận rằng điều không mong muốn sẽ xảy ra trong kinh doanh: Nó không phải để</span></div>\n<p class=\"body-txt\">\nkhiến bạn nản lòng, mà chỉ là một sự thật.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Hiểu rằng không phải 100% mọi người sẽ mua sản phẩm của bạn: Việc chuyển đổi khách</span></div>\n<p class=\"body-txt\">\nhàng không phải lúc nào cũng hoàn hảo, và đó là điều bình thường.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Duy trì tinh thần cải thiện (&quot;keep trying to improve&quot;): Luôn cố gắng cải thiện những gì</span></div>\n<p class=\"body-txt\">\nbạn có.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Quyết tâm không từ bỏ cho đến khi đạt được mục tiêu: Cam kết với bản thân rằng bạn sẽ</span></div>\n<p class=\"body-txt\">\nkhông bỏ cuộc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Thay đổi những gì bạn nói có thể thay đổi cách tâm trí bạn hoạt động: Chỉ cần suy nghĩ</span></div>\n<p class=\"body-txt\">\ntích cực, bạn có thể thay đổi tư duy của mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tin tưởng vào bản thân (&quot;believing in yourself&quot;): Tin vào khả năng, món quà và tài năng</span></div>\n<p class=\"body-txt\">\nđộc đáo của bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mỗi người đều đã thành công ở một điều gì đó: Thậm chí chỉ là việc còn sống đến hiện tại</span></div>\n<p class=\"body-txt\">\nđã là một thành công.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tập trung vào những chiến thắng trong quá khứ (&quot;focus on previous victories&quot;): Nhớ lại</span></div>\n<p class=\"body-txt\">\nnhững điều bạn đã làm tốt để củng cố niềm tin vào bản thân.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tư duy đúng đắn (&quot;proper mindset&quot;) kết hợp với niềm tin vào bản thân (&quot;belief in</span></div>\n<p class=\"body-txt\">\nyourself&quot;) dẫn đến thành công lớn lao (&quot;massive success&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Luôn tiến một bước về phía trước (&quot;always be making a step forward&quot;): Đừng quan tâm</span></div>\n<p class=\"body-txt\">\nđiều bạn làm là gì, hãy luôn đảm bảo bạn đang tiến về phía trước.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Ngừng lo lắng (&quot;stop worrying&quot;): Lo lắng giống như chiếc ghế bập bênh, cho bạn điều gì</span></div>\n<p class=\"body-txt\">\nđó để làm nhưng không đưa bạn đến bất cứ đâu.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Lo lắng lấy đi sức mạnh của bạn từ ngày hôm nay: &quot;Worry does not empty tomorrow of</span></div>\n<p class=\"body-txt\">\nits sorrow. It empties today of its strength.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mọi thành công đều bắt nguồn từ một tư duy tích cực.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Chấp nhận và cho phép bản thân mắc lỗi (&quot;Give yourself permission to make mistakes.&quot;):</span></div>\n<p class=\"body-txt\">\nĐiều này cực kỳ quan trọng vì nỗi sợ thất bại thường là rào cản lớn nhất ngăn cản chúng\n \nta hành động và thử nghiệm. Khi chúng ta hiểu rằng sai lầm là một phần không thể tránh\n \nkhỏi của quá trình học hỏi và phát triển, chúng ta sẽ tự tin hơn để dấn thân và đổi mới.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Lo lắng là vô ích và tiêu hao năng lượng: Thầy Long ví von &quot;Worrying is just like a</span></div>\n<p class=\"body-txt\">\nrocking chair. It gives you something to do but it doesn&#x27;t get you anywhere.&quot; Đây là một\n \nẩn dụ rất mạnh mẽ và dễ hình dung. Nó giúp học viên nhận ra sự lãng phí thời gian và\n \nnăng lượng khi chỉ lo lắng mà không hành động, từ đó thúc đẩy chuyển từ trạng thái thụ\n \nđộng sang chủ động giải quyết vấn đề.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tư duy tích cực là nền tảng của mọi thành công: Khái niệm &quot;positive mindset&quot; được nhắc</span></div>\n<p class=\"body-txt\">\nđi nhắc lại và kết luận là mọi thành công &quot;all stems from the fact that we have a positive\n \nmindset.&quot; Đây là cốt lõi vì nó định hình cách chúng ta đối diện với thử thách, phục hồi\n \nsau thất bại và nhìn nhận cơ hội, từ đó ảnh hưởng trực tiếp đến kết quả kinh doanh và\n \ncuộc sống.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Give yourself permission to make mistakes.”\n \n“Worrying is just like a rocking chair. It gives you something to do but it doesn&#x27;t get you\n \nanywhere.”\n \n“Worry does not empty tomorrow of its sorrow. It empties today of its strength.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><p class=\"body-txt\">\nquá trình sáng tạo sẽ giúp đội ngũ không ngại đổi mới, thử nghiệm để nâng cao chất\n \nlượng sản phẩm cuối cùng, thay vì chỉ làm theo lối mòn an toàn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Luôn tiến một bước về phía trước trong chất lượng dịch vụ: Thay vì lo lắng về việc</span></div>\n<p class=\"body-txt\">\nkhông đạt được sự hoàn hảo ngay lập tức, hãy tập trung vào việc cải thiện từng chút\n \nmột. Ví dụ, mỗi ngày nghiên cứu một kỹ thuật render mới, tối ưu hóa một bước trong\n \nquy trình làm việc (workflow) để tăng hiệu quả, hoặc cải thiện kỹ năng giao tiếp với\n \nkhách hàng Nhật để hiểu rõ hơn về ý đồ thiết kế. Mỗi &quot;bước tiến&quot; nhỏ này đều đóng góp\n \nvào việc nâng cao chất lượng diễn họa và sự hài lòng của khách hàng B2B.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Ngừng lo lắng về phản hồi tiêu cực hoặc áp lực thời gian: Lo lắng về việc khách hàng</span></div>\n<p class=\"body-txt\">\nNhật khó tính sẽ không hài lòng hay áp lực deadline sẽ chỉ làm giảm khả năng tập trung\n \nvà sáng tạo của đội ngũ. Thay vào đó, hãy chuyển năng lượng thành hành động: chủ\n \nđộng gửi các bản nháp để lấy phản hồi sớm, quản lý thời gian hiệu quả, và tối ưu hóa quy\n \ntrình để đảm bảo sản phẩm diễn họa được hoàn thành đúng hạn với chất lượng tốt nhất.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 15: Cách vượt qua nỗi sợ - Phần 2</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi giảng nhấn mạnh tầm quan trọng của việc tận dụng các nguồn lực sẵn có, đặc</h3>\n<p class=\"body-txt\">\nbiệt là mạng lưới quan hệ và sự hỗ trợ từ cố vấn (coaching, mentoring) và nhóm đồng đẳng\n \n(peer group), để đạt được thành công. Cốt lõi của bài học là tinh thần &quot;overcomer&quot; – người\n \nvượt lên mọi khó khăn, thông qua việc nghiên cứu sâu vấn đề và tìm kiếm giải pháp liên tục,\n \nkhông bao giờ bỏ cuộc, đồng thời duy trì niềm vui trong công việc.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tận dụng nguồn lực có sẵn: Sử dụng các nguồn lực hiện có để trở thành người vượt qua</span></div>\n<p class=\"body-txt\">\nkhó khăn (overcomer).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Mạng lưới quan hệ (network of people): Rất quan trọng, như việc gặp gỡ và xây dựng</span></div>\n<p class=\"body-txt\">\nmối quan hệ mạnh mẽ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Coaching và mentoring: Cố vấn và hướng dẫn là những nguồn lực vô cùng giá trị.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Peer group (nhóm đồng đẳng): Nhóm bạn bè, đồng nghiệp cùng chí hướng cũng rất giá</span></div>\n<p class=\"body-txt\">\ntrị.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sức mạnh của số đông (strength in numbers): Có sức mạnh khi nhiều người cùng hợp</span></div>\n<p class=\"body-txt\">\ntác, hỗ trợ nhau.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Nghiên cứu vấn đề của bạn (research your problem): Khi gặp vấn đề không biết cách giải</span></div>\n<p class=\"body-txt\">\nquyết, không nên bỏ cuộc mà phải tập trung hoàn toàn vào việc nghiên cứu và tìm hiểu\n \nsâu về vấn đề đó.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Học hỏi liên tục: Mua tài liệu đào tạo (training), sách điện tử (ebooks), sách, video</span></div>\n<p class=\"body-txt\">\ntraining, tìm kiếm trên YouTube, v.v. để học hỏi và giải quyết vấn đề.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tinh thần &quot;overcomer&quot;: Là người luôn tìm cách vượt qua khó khăn, không bỏ cuộc, luôn</span></div>\n<p class=\"body-txt\">\nmuốn tiến xa hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Vui vẻ (have fun): Người vượt khó (overcomer) biết tận hưởng niềm vui. Nếu không thể</span></div>\n<p class=\"body-txt\">\nvui vẻ với công việc kinh doanh của mình thì sẽ rất khó khăn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">★ Điểm quan trọng nhất</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Sức mạnh của Network và Peer Group: &quot;Your network of people is so important&quot;, &quot;Peer</span></div>\n<p class=\"body-txt\">\ngroup, your peer group is so valuable&quot;. Điều này quan trọng vì trong kinh doanh B2B,\n \nmối quan hệ và sự tín nhiệm là tối thượng. Một mạng lưới tốt giúp mở rộng cơ hội, học\n \nhỏi kinh nghiệm từ người khác và nhận được sự hỗ trợ khi cần thiết, đặc biệt là từ\n \nnhững người cùng ngành.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Tư duy không bỏ cuộc và nghiên cứu sâu vấn đề: &quot;You don&#x27;t want to just give up and say,</span></div>\n<p class=\"body-txt\">\n&#x27;I give up&#x27;. You need to focus entirely on researching your problem&quot;. Đây là chìa khóa để\n \ngiải quyết mọi thách thức. Thay vì nản chí, việc dành thời gian và nỗ lực để tìm hiểu cặn\n \nkẽ nguyên nhân và các giải pháp khả thi sẽ giúp doanh nghiệp vượt qua mọi rào cản và\n \nđổi mới không ngừng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Học hỏi từ nhiều nguồn đa dạng: &quot;I bought training, I bought ebooks, I bought books, I</span></div>\n<p class=\"body-txt\">\nbought video training, I looked at YouTube&quot;. Việc chủ động tìm kiếm kiến thức từ nhiều\n \nđịnh dạng và kênh khác nhau (khóa học, sách, video, online) là cần thiết để luôn cập\n \nnhật, nâng cao năng lực và tìm ra các giải pháp sáng tạo cho công việc.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Take advantage of resources available to you.”\n \n“There&#x27;s strength in numbers.”\n \n“If you cannot have fun with your business, then it is not going to be very fun. You should be\n \nable to enjoy it.”\n</p>\n<h3 class "<div class=\"pg pg-content\" style=\"border-top:4px solid #1565c0\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#1565c0\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“A good plan is like a roadmap. It shows the final destination and usually the best way to get\n \nthere.”\n \n“You&#x27;ll achieve what you seek when you keep moving forward.”\n \n“As long as you keep moving forward, I can tell you that success is right around the corner.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Áp dụng cho QNPA Pickleball</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây hệ thống kiếm tiền online cho QNPA: bán khóa học pickleball online, hội viên cộng đồng, affiliate thiết bị</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Internet marketing QNPA: SEO website, Facebook Ads, TikTok — mỗi kênh có mục tiêu và ngân sách riêng</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#1565c0\">•</span><span class=\"bul-txt\">Xây dựng phễu bán hàng online: nội dung miễn phí → email list → webinar → bán gói học cao cấp</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Bài 17: Triết lý thành công</h3>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Tóm tắt. Buổi giảng tập trung vào ba chìa khóa dẫn đến thành công: tư duy tích cực với câu</h3>\n<p class=\"body-txt\">\nhỏi &quot;Tại sao không?&quot; và câu trả lời &quot;Có!&quot;, phớt lờ những ý kiến tiêu cực, và sự kiên trì không\n \nngừng nghỉ. Diễn giả nhấn mạnh rằng mọi người đều có quỹ thời gian như nhau (168\n \ngiờ/tuần), và sự khác biệt nằm ở cách chúng ta sử dụng nó để biến ước mơ thành hiện thực,\n \ntránh để chúng chết đi vì sợ hãi hoặc thiếu hành động. Ông chia sẻ kinh nghiệm cá nhân từ\n \nviệc bán doanh nghiệp đến làm phim để minh chứng cho sức mạnh của ý chí và sự bền bỉ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#1565c0\">Ý chính</h3>\n<div class=\"
