n class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">&quot;Bơm tiếp tiền&quot; (chạy quảng cáo) cho những video này để tăng cường độ phủ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tiếp tục &quot;đào sâu&quot; ngách đó bằng cách làm thêm 10 video nữa tập trung vào các khía</span></div>\n<p class=\"body-txt\">\ncạnh khác nhau của chủ đề đã được chứng minh là hiệu quả (ví dụ: video rửa mặt dẫn\n \nđến rửa mặt bằng cái này, cái kia, lúc này, lúc kia).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bước 3: Mở rộng và lặp lại.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Cần khoảng 140 video khác nhau để thực sự tìm được hướng đi đúng cho kênh.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tiếp tục quy trình: Làm video mới -&gt; Tìm video hiệu quả -&gt; Bơm tiền -&gt; Đào sâu chủ đề.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bước 4: Xây dựng đối tượng tiềm năng từ người tương tác video.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Đối với các trang (page) có dưới 100.000 lượt theo dõi, đây là một điều bí mật.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Khi người xem bấm like video (do quảng cáo hoặc tự nhiên), họ đã là đối tượng tiềm</span></div>\n<p class=\"body-txt\">\nnăng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Kiểm tra danh sách những người đã like video nhưng chưa like trang/page.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Sử dụng nút &quot;Mời&quot; để mời họ like trang/page của mình.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bước 5: Lý do chiến lược &quot;mời like page&quot; hiệu quả.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Quảng cáo video đã hướng đến đúng đối tượng, nên người like video chắc chắn là đối</span></div>\n<p class=\"body-txt\">\ntượng tiềm năng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Khi trang còn mới hoặc chưa lớn (thị trường lạnh), việc mời những người đã tương tác</span></div>\n<p class=\"body-txt\">\nvới nội dung cụ thể sẽ tăng khả năng họ thích thú và theo dõi trang.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Đảm bảo 100% người like page là &quot;page thật&quot; và là đối tượng tiềm năng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chi phí và mục tiêu cuối cùng:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Với 140 video ban đầu, chi phí ước tính khoảng 700 USD (15 triệu đồng) để &quot;thực sự tìm</span></div>\n<p class=\"body-txt\">\nxem đâu là cái ngách của chúng ta.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Mục tiêu sau một thời gian là có khoảng 100.000 lượt người theo dõi trên fanpage.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Sau khi có lượng follower lớn, bạn có thể bán bất kỳ sản phẩm/dịch vụ nào.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Có thể thuê người làm hoặc tự làm nhiều kênh cùng lúc, hoặc tập trung vào một kênh.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chiến lược &quot;Test - Đầu tư - Đào sâu&quot;: Thay vì cố gắng làm một video hoàn hảo, hãy làm</span></div>\n<p class=\"body-txt\">\nnhiều video đa dạng (10 video) để tìm ra đâu là nội dung thực sự thu hút. Sau đó, tập\n \ntrung nguồn lực (tiền và thời gian) vào việc quảng bá và phát triển sâu hơn những chủ\n \nđề đã được chứng minh là hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Giúp giảm rủi ro lãng phí tài nguyên vào nội dung không hiệu quả, tối</span></div>\n<p class=\"body-txt\">\nưu hóa ROI (Return on Investment) và nhanh chóng tìm ra &quot;ngách&quot; thị trường có nhu\n \ncầu thực sự, thay vì phỏng đoán. Đây là cách làm dựa trên dữ liệu, không phải cảm tính.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chuyển đổi người tương tác video thành người theo dõi fanpage (đối với page &lt; 100k</span></div>\n<p class=\"body-txt\">\nfollower): Tận dụng tính năng &quot;Mời&quot; những người đã like video nhưng chưa like trang\n \ncủa bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là cách xây dựng tệp đối tượng chất lượng cao và có tính tương</span></div>\n<p class=\"body-txt\">\ntác thật. Những người đã thích video của bạn (thường là kết quả của quảng cáo đúng đối\n \ntượng) có nhiều khả năng sẽ trở thành follower trung thành, và sau này là khách hàng.\n \nĐiều này đặc biệt hiệu quả cho các trang mới hoặc nhỏ khi họ cần &quot;làm ấm&quot; thị trường\n \nmục tiêu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chi phí đầu tư ban đầu để tìm ngách (140 video, 700 USD): Diễn giả chỉ rõ rằng để &quot;thực</span></div>\n<p class=\"body-txt\">\nsự tìm xem đâu là cái ngách&quot; cần một sự đầu tư nhất định về thời gian và tiền bạc.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Cung cấp một con số cụ thể về mức độ cam kết cần thiết để bắt đầu.</span></div>\n<p class=\"body-txt\">\nNó nhấn mạnh rằng việc xây dựng kênh không phải là miễn phí hay dễ dàng, nhưng cũng\n \ncho thấy một lộ trình có thể đạt được với chi phí tương đối hợp lý để xác định chiến lược\n \nlâu dài.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Video nào có lượt tương tác cao bơm tiếp tiền cho nó, không cần nhiều.”\n \n“140 video thì bạn mất khoảng 700 đô la là khoảng 15 triệu để chúng ta thực sự tìm xem đâu\n \nlà cái ngách của chúng ta.”\n \n“Sau khi mà đã có lượt follower lớn rồi, thì bạn có thể bán bất kỳ cái điều gì ở trên trang của\n \nmình.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Bài 12: Cách tìm nội dung cho fanpage</h3>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Tóm tắt. Buổi giảng tập trung vào cách tạo và quản lý nội dung video hiệu quả trên các nền</h3>\n<p class=\"body-txt\">\ntảng mạng xã hội, đặc biệt là Facebook, để thu hút tương tác và phục vụ mục tiêu kinh\n \ndoanh. Cốt lõi là phải tạo nội dung có ích, mang lại giá trị cho khán giả bằng cách giải quyết\n \nnỗi đau và mang lại sự sung sướng cho họ. Ngoài ra, việc thường xuyên theo dõi các chỉ số\n \nhoạt động của trang là rất quan trọng để điều chỉnh chiến lược và đạt được hiệu quả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Ý chính</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Yêu cầu của Facebook khi tạo nội dung: Cần là người chia sẻ những điều có ích với khán</span></div>\n<p class=\"body-txt\">\ngiả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Ba tính chất quan trọng của nội dung:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Có ích (hữu dụng, sử dụng được, có kết quả cho họ): Ưu tiên hàng đầu, đặc biệt khi làm</span></div>\n<p class=\"body-txt\">\nvideo để kinh doanh, vì nó liên quan trực tiếp đến sản phẩm giải quyết nỗi đau và đem\n \nlại sự sung sướng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Vui (giải trí): Nếu vui thì tốt, nếu không vui nhưng có ích vẫn chấp nhận được.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Mới: Nội dung tự làm đảm bảo tính mới.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Mọi người quan tâm đến nỗi đau và sự sung sướng của họ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Sai lầm phổ biến: Nói quá nhiều về bản thân khi làm video.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Thay vì nói về mình, hãy nói về khán giả và thực sự quan tâm đến họ. Chia sẻ những điều</span></div>\n<p class=\"body-txt\">\nmình biết để giúp họ giải quyết vấn đề, điều này sẽ tăng tương tác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Không nên bán hàng ngay lập tức: Đừng bán gì cả cho đến khi trang đạt 100.000 (lượt</span></div>\n<p class=\"body-txt\">\ntheo dõi/tương tác - ngụ ý). Khi đã có đủ tương tác, bạn sẽ biết loại video nào hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Các loại video cần quan tâm để tạo hiệu ứng cao:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Kể câu chuyện: Loại video dễ tăng tương tác nhất.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Cách xây dựng câu chuyện:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Điểm mà mọi người mong muốn/Nỗi đau mà họ đang trải qua là gì?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bạn có nỗi đau/sung sướng/thành tựu nào giống họ đã trải qua/đạt được?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Điều gì đã khiến bạn thoát khỏi nỗi đau và đạt được điều sung sướng đó?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Những khó khăn/thách thức nào cần vượt qua khi áp dụng những điều sung</span></div>\n<p class=\"body-txt\">\nsướng/chiến lược đó?\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Câu chuyện bây giờ là gì?</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Nên kể nhiều câu chuyện, đặc biệt là những câu chuyện &quot;biến gà thành công, vịt thành</span></div>\n<p class=\"body-txt\">\nthiên nga&quot; (chuyển đổi, truyền cảm hứng từ không có gì thành có gì).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Câu chuyện tích cực: Truyền cảm hứng, tạo ra cảm xúc.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chia sẻ kinh nghiệm chuyên môn riêng mình có: Đừng giấu diếm, hãy cho đi tất cả.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Thông tin hài hước: Nên ít thôi vì kênh kinh doanh không phải kênh giải trí.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Kết hợp thông tin và giải trí/hài hước: Đây là cách phù hợp nhất.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Thông tin gây tranh cãi: Không khuyến khích nhưng có thể có.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Những điều không nên làm trên page trong giai đoạn này:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bán hàng liên tục trên page.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Thông tin nhiễu loạn, không liên quan: Không liên quan đến ngách, nỗi đau hay sự sung</span></div>\n<p class=\"body-txt\">\nsướng của thị trường.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bài viết rỗng: Không có thông tin, không có giá trị.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chỉ trích, bóc phốt người khác: Sẽ tạo ra kẻ thù và những gì mình cho đi sẽ nhận lại.</span></div>\n<p class=\"body-txt\">\nKênh kinh doanh không nên tham gia.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Thông tin không thuộc về nỗi đau và sự sung sướng của thị trường: Ví dụ, kênh về phụ</span></div>\n<p class=\"body-txt\">\nnữ lại nói về thời trang đàn ông.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Công cụ quản lý trang:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Phần mềm &quot;page.fm&quot; (dành cho đội nhóm).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Ứng dụng &quot;Page&quot; màu vàng trên điện thoại (biểu tượng lá cờ màu vàng).</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Theo dõi thường xuyên các chỉ số hoạt động của trang: Hầu hết mọi người không làm.</span></div>\n<p class=\"body-txt\">\nCần theo dõi để biết điều gì đang diễn ra và quản lý được nó.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tập trung vào &quot;Có ích&quot; (Useful) và &quot;Thực sự quan tâm đến họ&quot; (Caring): Đây là kim chỉ</span></div>\n<p class=\"body-txt\">\nnam cho mọi nội dung video. Thay vì chỉ chăm chăm quảng bá bản thân hay sản phẩm,\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">nội dung phải mang lại giá trị thực sự, giải quyết vấn đề và đáp ứng mong muốn của</h3>\n<p class=\"body-txt\">\nkhán giả. Điều này quan trọng vì nó xây dựng lòng tin, sự gắn kết và cuối cùng là chuyển\n \nđổi thành khách hàng. Nếu nội dung không có ích, khán giả sẽ không tương tác và mọi nỗ\n \nlực khác đều vô nghĩa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Kể chuyện là công cụ hiệu quả nhất để tăng tương tác: Con người bị thu hút bởi các câu</span></div>\n<p class=\"body-txt\">\nchuyện. Việc xây dựng những câu chuyện xoay quanh nỗi đau, khát vọng của khách\n \nhàng, và hành trình vượt qua khó khăn để đạt được thành công (của bản thân hoặc\n \nngười khác) sẽ tạo ra sự đồng cảm và kết nối sâu sắc. Nó không chỉ cung cấp thông tin\n \nmà còn chạm đến cảm xúc, giúp khán giả hình dung bản thân trong câu chuyện và tin\n \ntưởng vào giải pháp được đưa ra.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Không bán hàng liên tục và tránh nội dung tiêu cực/không liên quan: Buổi giảng nhấn</span></div>\n<p class=\"body-txt\">\nmạnh những điều *không nên làm*. Bán hàng quá thường xuyên khiến khán giả cảm\n \nthấy bị làm phiền. Nội dung tiêu cực (chỉ trích, bóc phốt) tạo ra hình ảnh xấu và kẻ thù.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Nội dung không liên quan đến nỗi đau/sung sướng của thị trường sẽ làm loãng thông</h3>\n<p class=\"body-txt\">\nđiệp và giảm hiệu quả của trang. Việc tuân thủ những nguyên tắc này giúp duy trì một\n \nmôi trường tích cực, tập trung, xây dựng thương hiệu uy tín và thu hút khách hàng tiềm\n \nnăng một cách bền vững.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Thay vì nói về mình, hãy thực sự quan tâm đến họ.”\n \n“Sharing and caring.”\n \n“Những gì mà chúng ta theo dõi thì chúng ta sẽ quản lý được nó.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Bài 13: Demo cửa hàng bánh mỳ</h3>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Tóm tắt. Buổi giảng tập trung vào việc chuyển đổi tư duy kinh doanh từ bán sản phẩm đơn</h3>\n<p class=\"body-txt\">\nlẻ sang bán &quot;giải pháp kiếm tiền&quot; hoặc hệ thống để tạo ra lợi nhuận khổng lồ. Diễn giả nhấn\n \nmạnh tầm quan trọng của chiến lược tiếp cận thị trường, định giá linh hoạt và hợp tác với\n \nđối tác để mở rộng quy mô, thay vì chỉ tập trung vào chất lượng sản phẩm hay kỹ năng\n \nchuyên môn. Diễn giả cũng chỉ ra các rào cản tư duy phổ biến như &quot;tôi biết rồi&quot; hoặc &quot;tính\n \ntoán quá nhiều&quot; đã cản trở việc áp dụng kiến thức và khuyến khích hành động nhanh chóng\n \nđể đạt được thành công tài chính.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chuyển đổi từ bán sản phẩm sang bán giải pháp: Không bán bánh mì trực tiếp (lãi</span></div>\n<p class=\"body-txt\">\n2.000đ/ổ) mà bán &quot;giải pháp kiếm tiền từ việc bán bánh mì&quot; (chuỗi cửa hàng, xe đẩy).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">So sánh hiệu quả tài chính với chuyên môn: Dù người khác (ông Đức) có trình độ</span></div>\n<p class=\"body-txt\">\nFacebook giỏi hơn gấp vạn lần, diễn giả vẫn kiếm được nhiều tiền hơn vì ông tập trung vào\n \nquy mô và chiến lược.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">&quot;Nỗi đau&quot; và &quot;Sự sung sướng&quot;: Nỗi đau là giỏi mà không có tiền, sự sung sướng là ít giỏi</span></div>\n<p class=\"body-txt\">\nnhưng làm ít mà kiếm được nhiều tiền.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Phương pháp học và tạo giáo trình của diễn giả: Học hỏi từ chính học trò, mượn bài ghi chép</span></div>\n<p class=\"body-txt\">\ncủa học viên để tổng hợp thành giáo trình của mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Các rào cản tư duy khi học và áp dụng:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">&quot;Tôi biết rồi.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">&quot;Cái này có cái đéo gì đâu mà làm.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">&quot;Chắc nó đéo hiệu quả bằng cách của mình làm đâu.&quot;</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Kỹ năng quan trọng nhất: Quan sát thị trường để tìm ra vấn đề và đưa ra giải pháp cho</span></div>\n<p class=\"body-txt\">\nkhách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Quá trình thay đổi cá nhân: Từ việc không hiểu, đến hiểu hơn một chút, và cuối cùng</span></div>\n<p class=\"body-txt\">\nnghiêm túc học khi cảm thấy &quot;quá nhục&quot; thì cuộc đời mới &quot;bừng sáng.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bản địa hóa kiến thức: Kiến thức từ Mỹ mang về Việt Nam không chạy ngay mà phải mất</span></div>\n<p class=\"body-txt\">\nthời gian mày mò để nó chạy.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Kiếm tiền từ điều mình không biết: diễn giả kiếm được hàng tỷ đồng bằng cách dạy những</span></div>\n<p class=\"body-txt\">\nđiều thậm chí mình không biết, thông qua &quot;kỹ thuật điều khiển sân khấu&quot; và &quot;lấy kiến\n \nthức từ đám đông&quot; rồi biến thành của mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Thực trạng của người bán sản phẩm ngon nhưng không giàu: Ví dụ bánh mì 15.000đ rất</span></div>\n<p class=\"body-txt\">\nngon nhưng người bán vẫn nghèo, trong khi bánh mì 40.000đ không ngon bằng lại\n \nthành công hơn nhờ tiếp cận thị trường tốt hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tầm quan trọng của việc tiếp cận thị trường: Phải tìm mọi cách để tiếp cận thị trường,</span></div>\n<p class=\"body-txt\">\nkhông chờ đợi khách hàng đến mua theo cách truyền thống.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Giảm chi phí và tận dụng đối tác:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Giảm bớt cửa hàng để tiết kiệm chi phí cố định.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Áp dụng mô hình đối tác: giao bánh mì 15.000đ cho đối tác, đối tác bán 40.000đ. Nhờ đó,</span></div>\n<p class=\"body-txt\">\nngười sản xuất có thể bán được hàng nghìn/chục nghìn cái mà không cần làm\n \nmarketing.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chiến lược định giá và thương hiệu:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tạo một thương hiệu mới với giá cao hơn (ví dụ: bánh mì &quot;For-Four&quot; giá 44.000đ thay vì</span></div>\n<p class=\"body-txt\">\n&quot;One-One&quot; giá 11.000đ).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Giảm giá cho đối tác (ví dụ: bán 11.000đ) để họ có biên lợi nhuận, hoặc giảm giá cho</span></div>\n<p class=\"body-txt\">\nkhách hàng cuối theo chương trình khuyến mãi (ví dụ: giảm 50% còn 22.000đ &quot;Tu-Tu&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Cản trở lớn nhất là việc &quot;tính toán&quot; và &quot;biết nhưng không làm&quot;: Việc tính toán quá kỹ</span></div>\n<p class=\"body-txt\">\nlưỡng và trì hoãn hành động vì cho rằng mình đã biết hoặc lo sợ không hiệu quả sẽ ngăn\n \ncản thành công. Hành động ngay lập tức là chìa khóa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Ứng dụng nhanh: Ngay lập tức liên hệ với đối tác tiềm năng (ví dụ: GrabFood).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Công thức định giá nhanh: Nhập hàng 10đ, nâng giá niêm yết lên 50đ, giao cho đại lý</span></div>\n<p class=\"body-txt\">\n12đ, đại lý bán 25đ. Người sản xuất vẫn có lợi nhuận tốt và số lượng lớn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">★ Điểm quan trọng nhất</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chuyển đổi tư duy từ bán sản phẩm sang bán giải pháp hoặc hệ thống: Đây là điểm cốt</span></div>\n<p class=\"body-txt\">\nlõi nhất. Thay vì chỉ tập trung vào việc tạo ra một sản phẩm tốt (bánh mì ngon), diễn giả\n \nkhuyến khích tư duy về cách tạo ra một &quot;giải pháp kiếm tiền&quot; từ sản phẩm đó (chuỗi cửa\n \nhàng, xe đẩy, mô hình nhượng quyền, đối tác phân phối). Điều này quan trọng vì nó mở\n \nrộng quy mô kinh doanh từ cấp độ cá nhân lên cấp độ doanh nghiệp, mang lại tiềm năng\n \nlợi nhuận gấp nhiều lần so với việc chỉ bán trực tiếp từng sản phẩm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tầm quan trọng của tiếp cận thị trường, chiến lược định giá và đối tác vượt trội so với</span></div>\n<p class=\"body-txt\">\nchất lượng sản phẩm đơn thuần: Diễn giả chứng minh rằng dù sản phẩm của bạn có\n \nngon hơn hay kỹ năng của bạn có giỏi hơn đối thủ, nếu không có chiến lược tiếp cận thị\n \ntrường hiệu quả, định giá thông minh và mạng lưới đối tác rộng, bạn vẫn có thể thua lỗ.\n \nĐiều này cực kỳ quan trọng vì nó đòi hỏi doanh nghiệp phải nhìn ra ngoài sản phẩm của\n \nmình, tập trung vào việc thấu hiểu và tiếp cận khách hàng tiềm năng, cũng như xây dựng\n \ncác mối quan hệ đối tác để tối ưu hóa phân phối và tăng trưởng doanh thu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Vượt qua các rào cản tư duy như &quot;tôi biết rồi&quot; và &quot;tính toán quá nhiều&quot;: Những rào cản</span></div>\n<p class=\"body-txt\">\nnày ngăn cản doanh nghiệp tiếp thu cái mới và hành động. Diễn giả cho rằng việc tự mãn\n \nvới kiến thức hiện có, nghi ngờ tính hiệu quả của phương pháp mới, hoặc quá sa đà vào\n \nviệc tính toán chi tiết nhỏ nhặt mà không dám thực thi sẽ giết chết mọi cơ hội. Insight\n \nnày quan trọng vì nó nhấn mạnh hành động và sự linh hoạt trong tư duy là yếu tố then\n \nchốt để áp dụng thành công các chiến lược kinh doanh mới.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Ông làm video bán bánh mì ông không bao giờ giàu được mà là bán cái gì mới giàu được?\n \nĐừng bao giờ vị kỷ, đừng bao giờ chỉ quan tâm đến mình, mình đang nói bán bánh mì thì mình\n \nbán bánh mì cái đã. Đúng rồi. Bán cái giải pháp kiếm tiền từ việc bán bánh mì ấy thì ông sẽ\n \nbán được nhiều tiền.”\n \n“Nỗi đau ở đây là gì ạ? Là giỏi mà đéo có tiền. Sự sung sướng là ít độ giỏi, làm ít kiếm được\n \nnhiều tiền.”\n \n“Không cần nghĩ, địt mẹ. Hãng bánh mì Four-Four chính thức được thành lập. Xin chúc mừng\n \nông!”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Bài 14: Cách tạo đội nhóm phát triển</h3>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Tóm tắt. Buổi học này tập trung vào việc xây dựng một đội nhóm hiệu quả để sản xuất nội</h3>\n<p class=\"body-txt\">\ndung video marketing, đặc biệt là cho Facebook và YouTube. Diễn giả trình bày chi tiết về 7\n \nvai trò cốt lõi trong đội ngũ, từ người nghiên cứu thị trường đến người quảng cáo, cùng với\n \nvai trò quản lý dự án. Cốt lõi là mỗi thành viên phải có kỹ năng chuyên môn rõ ràng và làm\n \nviệc theo quy trình chặt chẽ để đảm bảo chất lượng và hiệu quả của nội dung.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Để thành công, không thể làm việc một mình, cần có đội nhóm để làm Facebook/video.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Người đầu tiên: Người nghiên cứu nhu cầu thị trường.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Xác định thị trường, nỗi đau, sự sung sướng của khách hàng.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Sử dụng công cụ từ khóa (VID IQ/ViQ, Keyword Everywhere).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tập hợp các từ khóa liên quan.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Người thứ hai: Người soạn kịch bản (biên kịch).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Viết ra 6 khung kịch bản.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Diễn viên chính là người tự xây dựng thương hiệu cá nhân (người nói/diễn giả).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Cần người quay phim hỗ trợ, hoặc tự quay nếu cần.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Người thứ ba: Người bóc âm (transcriber).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Nên thuê ngoài để tiết kiệm chi phí.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chuyển lời nói thành văn bản.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Người thứ tư: Người biên tập nội dung text.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Thường là người đầu tiên (người nghiên cứu).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Biên tập lại nội dung từ bản bóc âm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Người thứ năm: Người biên tập phim (video editor).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Không nên là người quay phim.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chỉnh sửa, dựng, cắt theo nội dung của người biên tập text.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Thêm hiệu ứng, chữ (text) vào video.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Người thứ sáu: Người quản lý Fanpage/kênh (social media manager).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Upload video lên các nền tảng (YouTube, Facebook).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tối ưu hóa nội dung trên từng nền tảng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Người thứ bảy: Người quảng cáo.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Vận hành trang quảng cáo, chạy quảng cáo.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Biên tập, tối ưu hóa nội dung quảng cáo.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Đo lường, tối ưu, đưa ra kết quả trả về để người số một tiếp tục khai thác.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Thường có hai loại quảng cáo: tăng tương tác và bán hàng (nên là hai nhóm khác nhau).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Người quản lý dự án (Project Manager).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Quản lý chung toàn bộ dự án, có tầm nhìn tổng thể.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Lập kế hoạch, quản lý tiến trình (timeline), thời hạn (deadline).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Lên lịch xuất bản nội dung cho social media (giờ nào, kênh nào).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Đảm bảo đội nhóm chạy đúng tiến trình, dữ liệu được lên kênh đúng giờ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Cập nhật tiến trình và dữ liệu.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Rút kinh nghiệm từ thành công và thất bại cho từng dự án.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chi tiết về người biên kịch/viết nội dung:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Viết nội dung cho kịch bản quay phim.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Viết các bài viết dài trên các mạng xã hội, blog.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Viết trích dẫn, câu nói.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chi tiết về người quay phim:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Có khả năng ghi hình dựa trên kịch bản (biết đọc kịch bản và quay phim).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Lên kế hoạch quay phim.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Sản xuất ra được phim (video content/nội dung).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Vận chuyển, thiết lập, vận hành hệ thống quay phim (máy quay, ánh sáng, microphone).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Quản lý chất lượng video (hình ảnh rõ nét, ánh sáng, âm thanh, màu sắc, bố cục).</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Lưu trữ và đảm bảo an toàn dữ liệu (sao lưu 2 bản, sách 2 vali, ổ cứng khác nhau, ổ cứng</span></div>\n<p class=\"body-txt\">\nnằm trong pelican chống cháy, chống ẩm).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chi tiết về người biên tập video (Video Editor):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Ghép nối các dữ liệu video raw (gốc).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Xuất dữ liệu video cho các nền tảng khác nhau (YouTube, Facebook, Instagram) với kích</span></div>\n<p class=\"body-txt\">\nthước và độ dài chuẩn (ví dụ: YouTube 5 phút, Facebook/Instagram story 14-15 giây,\n \nhình ảnh 720x720).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Yêu cầu biết sử dụng các phần mềm chuyên nghiệp: Adobe Premiere hoặc Final Cut Pro</span></div>\n<p class=\"body-txt\">\n(không nên dùng Canva/Viva Video cho chuyên nghiệp).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chỉnh sửa nội dung video theo kịch bản biên tập.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Đưa phụ đề (lời nói thành chữ) vào video, đặc biệt quan trọng trên Facebook vì người</span></div>\n<p class=\"body-txt\">\ndùng thường không nghe tiếng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Thêm khung, hiệu ứng để tăng tính tương tác.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Định dạng và xuất các dạng dữ liệu khác nhau tùy theo yêu cầu.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Người thiết kế đồ họa (Graphic Designer):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Biến ý tưởng thành hình ảnh, tranh.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tạo ra các ấn phẩm trực quan chứa nhiều thông tin.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Sử dụng Adobe Illustrator, Photoshop, InDesign (nếu dùng MacBook). Đối với người</span></div>\n<p class=\"body-txt\">\nkhông chuyên nghiệp thì dùng Canva/DesignBold.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Công việc: thiết kế logo, đồ họa, ấn phẩm, ảnh quảng cáo, ảnh cho blog, ảnh cho</span></div>\n<p class=\"body-txt\">\nYouTube, trang bìa video, fanpage, ảnh trên timeline, ảnh trích dẫn (quote card).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Có khả năng &quot;nói chuyện bằng hình ảnh&quot;.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Mô hình đội nhóm chuyên biệt hóa vai trò: Diễn giả phân chia rất rõ ràng 7 vai trò cốt lõi</span></div>\n<p class=\"body-txt\">\n(nghiên cứu, biên kịch, bóc âm, biên tập text, biên tập phim, quản lý kênh, quảng cáo)\n \ncùng với vai trò quản lý dự án và thiết kế đồ họa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là blueprint cho bất kỳ doanh nghiệp nào muốn sản xuất nội</span></div>\n<p class=\"body-txt\">\ndung marketing hiệu quả và bền vững. Việc chuyên môn hóa giúp tối ưu hóa từng khâu,\n \nđảm bảo chất lượng đầu ra và tăng tốc độ triển khai. Nếu một người ôm đồm quá nhiều\n \nviệc, chất lượng sẽ giảm sút và dễ bị quá tải.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tầm quan trọng của dữ liệu và tối ưu hóa liên tục: Vai trò của người nghiên cứu thị</span></div>\n<p class=\"body-txt\">\ntrường (số 1) và người quảng cáo (số 7) không chỉ dừng lại ở lần đầu mà cần liên tục đo\n \nlường, tối ưu và đưa ra kết quả để người số 1 &quot;làm lại từ đầu&quot; (lặp lại quy trình).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Marketing online là một quá trình thử nghiệm và cải tiến không</span></div>\n<p class=\"body-txt\">\nngừng. Việc phân tích dữ liệu và tối ưu liên tục giúp doanh nghiệp hiểu rõ hơn về khách\n \nhàng, sản xuất nội dung phù hợp hơn, và đạt được hiệu quả ROI (Return on Investment)\n \ntốt hơn theo thời gian.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chiến lược nội dung đa nền tảng và tương tác: Video cần được xuất bản phù hợp với</span></div>\n<p class=\"body-txt\">\ntừng nền tảng (YouTube, Facebook, Instagram) về độ dài, kích thước và cách hiển thị (ví\n \ndụ: phụ đề trên Facebook).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Mỗi nền tảng có đặc điểm và hành vi người dùng khác nhau. Việc tùy</span></div>\n<p class=\"body-txt\">\nchỉnh nội dung giúp tăng khả năng tiếp cận, tương tác và giữ chân khán giả trên từng\n \nkênh, tối đa hóa hiệu quả của nội dung video.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Lưu trữ dữ liệu an toàn và quy củ: Diễn giả nhấn mạnh việc sao lưu 2 bản, sách ở 2 vali</span></div>\n<p class=\"body-txt\">\nkhác nhau, ổ cứng riêng biệt trong pelican chống cháy/ẩm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Dữ liệu nội dung là tài sản quý giá của doanh nghiệp. Việc lưu trữ an</span></div>\n<p class=\"body-txt\">\ntoàn, có hệ thống giúp tránh rủi ro mất mát dữ liệu do sự cố kỹ thuật hoặc thiên tai, đảm\n \nbảo hoạt động kinh doanh không bị gián đoạn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Để cho một đội chúng ta làm được ấy thì chúng ta cần có những người như sau. Thứ nhất là\n \nngười... Đây là người đầu tiên là người quan trọng nhất.”\n \n“Nếu mà không có chó thì bắt mèo ăn cứt.”\n \n“Cuối cùng là một dàn máy gồm có 7 con máy quay khác nhau. Cuối cùng ông diễn giả quay\n \nbằng điện thoại di động. Thế cho nên các ông phải nhớ rằng là đôi khi máy quay đéo quan\n \ntrọng. Người quay quan trọng hơn.”\n \n“Tức là tại sao lại như vậy, hiểu rằng là các cái video ấy ở trên Facebook ấy là người ta không\n \nnghe mà nó tự chạy. Cho nên cái chữ nó phải chạy thì người ta mới xem được.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Bài 15: Cách chạy quảng cáo hiệu quả</h3>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Tóm tắt. Buổi giảng tập trung vào chiến lược quảng cáo hiệu quả trên Facebook, đặc biệt là</h3>\n<p class=\"body-txt\">\ncách xây dựng đối tượng mục tiêu chính xác. Cốt lõi là không quảng cáo trực tiếp cho khách\n \nhàng đã mua hàng, mà sử dụng dữ liệu của họ để tạo ra đối tượng &quot;Lookalike&quot; (người tương\n \ntự) hoặc dẫn dắt khách hàng tiềm năng qua một chuỗi nội dung có chủ đích (chiến lược 4\n \nvideo) trước khi đưa ra lời chào bán hàng trực tiếp. Phương pháp này giúp tiếp cận đúng đối\n \ntượng, xây dựng lòng tin và tăng tỷ lệ chuyển đổi.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Luôn bắt đầu với Video: Định dạng video được Facebook yêu cầu và ưu tiên nhiều nhất.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tạo ra Đối tượng (Audience):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Đối tượng hỗn loạn ban đầu: Là đối tượng rộng, không rõ ràng (ví dụ: tuổi, giới tính, sở</span></div>\n<p class=\"body-txt\">\nthích chung). Dùng để bắt đầu khi chưa có dữ liệu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Đối tượng từ danh sách khách hàng: Tải lên Facebook danh sách những người đã mua</span></div>\n<p class=\"body-txt\">\nhàng. Đây là đối tượng &quot;vàng&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Không quảng cáo cho đối tượng đã mua hàng: Vì họ đã mua rồi, quảng cáo thêm sẽ lãng</span></div>\n<p class=\"body-txt\">\nphí.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tạo đối tượng &quot;Lookalike&quot;: Sử dụng danh sách khách hàng hiện có để Facebook tìm</span></div>\n<p class=\"body-txt\">\nkiếm những người có hành vi, sở thích tương tự. Đây là đối tượng mục tiêu chính xác\n \nnhất và hiệu quả nhất để quảng cáo.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tỷ lệ Lookalike phụ thuộc vào ngân sách: 1% (70-100 triệu VND cho một chiến dịch)</span></div>\n<p class=\"body-txt\">\ntương đương khoảng 650.000 người Việt Nam giống với khách hàng hiện có. Có thể tăng\n \nlên 2% (200-250 triệu VND) hoặc 3% (400-500 triệu VND).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Đối tượng Lookalike này là &quot;nhanh nhất, dễ nhất, thủ công nhất, đơn giản nhất&quot; để bắt</span></div>\n<p class=\"body-txt\">\nđầu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chiến lược 4 Bước Nội dung có chủ đích (4 Video):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Đây là cách tạo đối tượng thứ hai, thông qua việc theo dõi mức độ tương tác với nội</span></div>\n<p class=\"body-txt\">\ndung. Mỗi &quot;video&quot; có thể là một chuỗi các video, bài viết, email, PR trên báo, v.v.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Video 1 (Tại sao): Nói về lý do tại sao khách hàng cần giải quyết vấn đề của họ (vấn đề,</span></div>\n<p class=\"body-txt\">\nnỗi đau), không nói về sản phẩm. Ví dụ: tại sao cần giảm cân (để sống lâu, làm tình dễ\n \nhơn, có con...).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Video 2 (Giải pháp): Đưa ra các giải pháp chung để giải quyết vấn đề (cách làm thế nào -</span></div>\n<p class=\"body-txt\">\n&quot;How-to&quot;), không tập trung vào sản phẩm cụ thể. Ví dụ: cách giảm cân (phẫu thuật, ăn\n \nkiêng, tập thể dục, thực phẩm hỗ trợ giảm cân). Phân tích ưu nhược điểm của từng giải\n \npháp chung.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Video 3 (Kết quả): Phân tích các trường hợp điển hình, kể chuyện về trải nghiệm và kết</span></div>\n<p class=\"body-txt\">\nquả đạt được sau khi giải quyết vấn đề. Không nói về việc giảm cân mà nói về cuộc sống\n \nvà trải nghiệm sau khi giảm cân. Ví dụ: sau giảm cân có con, linh hoạt hơn, vận động\n \nnhiều hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Video 4 (Cái gì): Giới thiệu &quot;cái gì&quot; (what) giúp giải quyết vấn đề. Đây là lúc bắt đầu gợi ý</span></div>\n<p class=\"body-txt\">\nvề sản phẩm/dịch vụ cụ thể của bạn mà không trực tiếp chào bán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Quảng cáo bán hàng chỉ sau khi xem đủ chuỗi nội dung: Chỉ quảng cáo trang bán hàng</span></div>\n<p class=\"body-txt\">\n(&quot;mua nó ở đâu&quot;) cho những người đã xem hoặc tương tác với một phần đáng kể (ví dụ:\n \n50% hoặc 75% tùy ngân sách) của *cả bốn* loại nội dung trên. Đây là &quot;bước bán hàng&quot;.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Sức mạnh của Đối tượng &quot;Lookalike&quot;: Thay vì đoán định hay quảng cáo tràn lan, việc tạo</span></div>\n<p class=\"body-txt\">\nđối tượng &quot;Lookalike&quot; dựa trên những khách hàng đã mua hàng là cực kỳ hiệu quả. Nó\n \ngiúp bạn tìm kiếm những người có tiềm năng mua hàng cao nhất, tiết kiệm chi phí và\n \ntăng tỷ lệ chuyển đổi vì bạn đang tiếp cận những người *tương tự* với tệp khách hàng\n \nthành công hiện có của mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chiến lược nội dung nhiều bước (4 video) để xây dựng lòng tin và giáo dục khách hàng:</span></div>\n<p class=\"body-txt\">\nKhông vội vàng bán sản phẩm ngay lập tức. Thay vào đó, hãy dẫn dắt khách hàng qua\n \nmột hành trình nội dung từ nhận diện vấn đề, tìm hiểu giải pháp, hình dung kết quả, đến\n \ngợi ý sản phẩm. Điều này giúp khách hàng tiềm năng tự nhận thức vấn đề, tin tưởng vào\n \ngiải pháp và tự thuyết phục bản thân trước khi mua hàng, biến khách hàng lạnh thành\n \nkhách hàng nóng một cách tự nhiên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tập trung vào &quot;Tại sao&quot; và &quot;Kết quả&quot; thay vì &quot;Cái gì&quot; (ở giai đoạn đầu): Các nội dung ban</span></div>\n<p class=\"body-txt\">\nđầu không nên trực tiếp nói về sản phẩm mà tập trung vào nỗi đau, mong muốn của\n \nkhách hàng và những lợi ích sâu sắc mà họ nhận được khi vấn đề được giải quyết. Đây là\n \nyếu tố thu hút cảm xúc, tạo sự đồng cảm và làm nền tảng vững chắc cho quá trình bán\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><p class=\"body-txt\">\nhàng sau này, bởi khách hàng mua giải pháp cho vấn đề của họ và những trải nghiệm tốt\n \nđẹp, chứ không chỉ là một sản phẩm đơn thuần.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Luôn luôn bắt đầu từ video.”\n \n“Bạn muốn kiếm được tiền ấy thì bạn quảng cáo cho đối tượng này [khách hàng đã mua hàng]\n \nthì bạn sẽ không kiếm được tiền.”\n \n“Bạn cứ quảng cáo tới 1% những người giống như bạn, giống như khách hàng đã mua hàng\n \nthì cái nhóm này hiện nay là nhanh nhất, dễ nhất. Không cần nhiều chi tiết nhất. Ai cũng làm\n \nđược. Thủ công nhất, nhanh nhất, đơn giản nhất.”\n \n“Đừng nói bán thực phẩm giảm cân mà chỉ cần nói là tại sao họ phải giảm cân.”\n \n“Không nói về việc giảm cân mà nói về cái cuộc sống, trải nghiệm cái việc giảm cân đó như thế\n \nnào.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Bài 16: Nội dung tăng tương tác P1</h3>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Tóm tắt. Buổi học này tập trung vào các chiến lược tăng tương tác hiệu quả cho fanpage</h3>\n<p class=\"body-txt\">\nFacebook. Cốt lõi là tạo ra nội dung độc đáo, mang tính tương tác cao và liên tục đo lường\n \nhiệu quả. Các phương pháp chính bao gồm sản xuất video trực tiếp, livestream ngắn gọn và\n \nhấp dẫn, sử dụng câu hỏi tương tác, tạo phim hoạt hình từ hình ảnh/văn bản và đăng tải các\n \ncâu trích dẫn truyền cảm hứng. Mục tiêu cuối cùng là xây dựng một cộng đồng tích cực và\n \nthu hút những người có cùng tinh thần.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Mục tiêu: Tăng tương tác fanpage để tăng lượng 100 ngàn lên nhanh hơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Cốt lõi: Tạo ra một nội dung *duy nhất* và kêu gọi họ hành động cùng với ta.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Việc quan trọng: Thường xuyên theo dõi để đo lường sự tương tác.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Mẹo để tăng tương tác:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">1. Sản xuất video:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Mục tiêu: Khoảng 140 video (bắt đầu với 10, sau đó nhân bản).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chi phí: 5-10 đô la cho mỗi video.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Đẩy mạnh các video có tương tác cao.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Quan trọng: Post video *trực tiếp* lên Facebook, không post ở nơi khác rồi link về</span></div>\n<p class=\"body-txt\">\n(Facebook ưu tiên video native hơn link).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Cách tăng tương tác video:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Sử dụng tính năng &quot;feature video&quot; (video highlight).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tạo danh sách phát (playlist) cho những chủ đề khác nhau (giống YouTube).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">2. Live stream tương tác ngắn:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Không phải livestream bán hàng mà là livestream tăng tương tác.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tạo nội dung *duy nhất*, chưa từng có (không tìm thấy trong sách vở hay báo).</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Nội dung phải xoay quanh sản phẩm chính và giải quyết/tạo tương tác trực tiếp với</span></div>\n<p class=\"body-txt\">\nkhán giả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Lưu ý khi làm livestream:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Soạn thảo tiêu đề kỹ lưỡng, vì &quot;tiêu đề là thứ duy nhất mà chúng ta có thể kéo khán giả</span></div>\n<p class=\"body-txt\">\nđến được&quot; (nhất là khi page chưa có gì).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Trong lúc livestream, thường xuyên cảm ơn và chào hỏi khán giả.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Khi biên tập lại livestream để tái sử dụng trên các nền tảng khác, cắt bỏ đoạn chào hỏi.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Test độ dài livestream: Thường khúc đầu tương tác tăng vọt rồi giảm dần. Nên dừng</span></div>\n<p class=\"body-txt\">\nđúng đoạn cao nhất (ví dụ: Diễn giả gợi ý khoảng 15 phút).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Cắt livestream dài thành nhiều livestream ngắn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Mỗi livestream đều kết thúc bằng kêu gọi hành động (share, like, comment).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">3. Chạy một câu hỏi lựa chọn (Poll/Vote):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Đặt các câu hỏi thăm dò ý kiến để tạo sự tương tác (ví dụ: &quot;đàn ông hay đàn bà&quot;, &quot;lấy</span></div>\n<p class=\"body-txt\">\nchồng già hay chồng trẻ&quot;).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">4. Tạo phim hoạt hình (Animated video):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Biến một video hoặc một chuỗi ảnh thành phim hoạt hình. Có thể làm bằng điện thoại.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Công cụ gợi ý: Animoto, Lumen5.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Lumen5: Rất đơn giản, chỉ cần thả nội dung (ví dụ: một bài báo) vào, công cụ sẽ tự động</span></div>\n<p class=\"body-txt\">\ntìm hình ảnh và tạo ra video (có nhạc, ảnh có sẵn hoặc có thể tải lên). Video thường dài\n \nkhoảng 1 phút.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Video cũng có Call To Action ở cuối.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Phiên bản trả phí của Lumen5 cho phép xuất video 720p, bản miễn phí là 480p.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">5. Câu trích dẫn truyền cảm hứng:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Lấy ảnh của mình hoặc ảnh khác, chèn những câu nói truyền cảm hứng vào.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Đây là công việc của graphic designer (kết hợp người chụp ảnh/quay video và người</span></div>\n<p class=\"body-txt\">\nbiên tập nội dung text).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Nên post 3-4 bức/ngày (ví dụ: 8h sáng, 10h sáng, 2h chiều, 6h tối).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Lý do cần làm:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Khi cả thế giới đang phát ngôn tiêu cực, việc post nội dung tích cực sẽ làm cuộc đời đẹp</span></div>\n<p class=\"body-txt\">\nhơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Thu hút được những người đẹp (người có tinh thần đẹp) đến với mình.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Câu trích dẫn có thể lấy từ những video hay, bài viết.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Kết hợp ảnh về cuộc sống hàng ngày, công việc/kinh doanh với câu nói của mình.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">&quot;Tạo ra một nội dung duy nhất và kêu gọi họ hành động cùng với ta.&quot; (0:13-0:16)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là kim chỉ nam cho mọi chiến lược nội dung. Nội dung độc đáo</span></div>\n<p class=\"body-txt\">\ngiúp bạn nổi bật giữa hàng ngàn thông tin khác, còn kêu gọi hành động là yếu tố then\n \nchốt để chuyển hóa người xem thành người tương tác, tạo ra giá trị cho fanpage.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">&quot;Video post trực tiếp lên Facebook, không post ở nơi khác rồi link về.&quot; (0:49-0:54)</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Facebook ưu tiên hiển thị nội dung được tải trực tiếp lên nền tảng của</span></div>\n<p class=\"body-txt\">\nhọ. Việc này giúp tăng phạm vi tiếp cận (reach) và tương tác tự nhiên, thay vì bị bóp\n \ntương tác khi người dùng phải rời khỏi Facebook để xem nội dung.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">&quot;Tiêu đề là thứ duy nhất mà chúng ta có thể kéo khán giả đến được.&quot; (2:02-2:05)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đặc biệt trong giai đoạn đầu khi fanpage chưa có nhiều người theo</span></div>\n<p class=\"body-txt\">\ndõi, tiêu đề hấp dẫn là &quot;cần câu&quot; duy nhất để thu hút sự chú ý. Ngay cả với những page\n \nlớn, tiêu đề vẫn là yếu tố quyết định người dùng có nhấp vào xem nội dung hay không\n \ntrong môi trường thông tin quá tải.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tập trung vào nội dung tích cực và truyền cảm hứng. (1:00:51-1:01:03)</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Diễn giả nhấn mạnh rằng việc tạo ra nội dung tích cực không chỉ làm</span></div>\n<p class=\"body-txt\">\nđẹp thêm cuộc sống mà còn hấp dẫn những người có &quot;tinh thần đẹp&quot; đến với fanpage\n \ncủa bạn. Điều này giúp xây dựng một cộng đồng chất lượng, bền vững và có giá trị cao,\n \nthay vì chỉ chạy theo số lượng tương tác hời hợt.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Tạo ra một nội dung duy nhất và kêu gọi họ hành động cùng với ta.”\n \n“Tiêu đề là thứ duy nhất mà chúng ta có thể kéo khán giả đến được.”\n \n“Cả thế giới này đang đang phát ngôn tiêu cực. Ông cứ lên Facebook toàn tiêu cực. Mình post\n \nnhững cái tích cực này thì mình đang làm cho cuộc đời đẹp hơn.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Bài 17: Nội dung tăng tương tác P2</h3>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Tóm tắt. Buổi học này tập trung vào các loại nội dung (content) cần thiết để tăng tương tác</h3>\n<p class=\"body-txt\">\ntrên mạng xã hội, đặc biệt là Facebook. Diễn giả trình bày 15 loại bài viết khác nhau, từ hoạt\n \nđộng cá nhân, kỷ niệm, chia sẻ thông tin chuyên gia đến các kỹ thuật gây tương tác như đặt\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">câu hỏi, điền vào chỗ trống, đào mộ bài viết cũ và tạo meme. Mục tiêu cốt lõi là tạo ra nội</h3>\n<p class=\"body-txt\">\ndung đa dạng, tự nhiên và thu hút sự chú ý của người dùng để tăng reach và engagement.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Hoạt động cá nhân (0:01): Tạo sự khác biệt cho trang cá nhân bằng cách chia sẻ các hoạt</span></div>\n<p class=\"body-txt\">\nđộng thường ngày (đi máy bay, chạy bộ, uống nước, du lịch, v.v.). Điều này giúp tăng\n \ntương tác một cách tự nhiên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chia sẻ hoạt động kinh doanh (0:57): Đăng tải về đội nhóm, công ty, sản phẩm, quá trình</span></div>\n<p class=\"body-txt\">\nsản xuất/kinh doanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chia sẻ blog (1:06): Chia sẻ các bài viết blog hoặc link liên quan về trang của mình.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Sử dụng nút tương tác (1:11): Nút tương tác (ví dụ: trên Facebook) sẽ hiện ra nếu người</span></div>\n<p class=\"body-txt\">\ndùng trả lời nhanh (dưới 15 giây hoặc 15 phút - [nghe không rõ] phút) câu hỏi của bạn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Kỷ niệm/Sự kiện (1:35): Chia sẻ về các ngày kỷ niệm cá nhân, ngày phụ nữ, ngày đàn</span></div>\n<p class=\"body-txt\">\nông, các ngày lễ quốc gia như Giỗ Tổ Hùng Vương, Quốc Khánh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chia sẻ bài viết chuyên gia (2:01): Chia sẻ các bài viết hay, thông tin có giá trị liên quan</span></div>\n<p class=\"body-txt\">\nđến lĩnh vực của mình với vai trò chuyên gia. Facebook sẽ ưu tiên thông tin có giá trị.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Hậu kỳ (2:22): Chia sẻ những khoảnh khắc hậu trường, sự thật phía sau những công việc</span></div>\n<p class=\"body-txt\">\nđang làm (ví dụ: sân khấu chuẩn bị, làm việc muộn, bữa ăn, quá trình chạy).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Đặt câu hỏi (2:37): Đặt các câu hỏi liên quan đến &quot;nỗi đau và sự sung sướng&quot; của người</span></div>\n<p class=\"body-txt\">\nđọc để tạo tương tác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Đặt tên cho chuyện/ảnh (3:22): Tạo tiêu đề hấp dẫn, gây tò mò cho các câu chuyện hoặc</span></div>\n<p class=\"body-txt\">\nhình ảnh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Nhắc nhở ngày kỷ niệm (3:29): Facebook thường có tính năng nhắc nhở kỷ niệm 1 năm,</span></div>\n<p class=\"body-txt\">\n2 năm, 7 năm quen nhau, cũng là một cách tốt để tương tác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Viết bài cảm ơn (3:37): Bài viết cảm ơn là một loại nội dung hiếm gặp trên mạng xã hội,</span></div>\n<p class=\"body-txt\">\ncó tác dụng tăng tương tác cực kỳ cao.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Viết cho cộng đồng (4:12): Dành thời gian trả lời các câu hỏi, tương tác với các fan cứng</span></div>\n<p class=\"body-txt\">\ncủa mình trong phần comment hoặc các bài viết riêng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Điền vào chỗ trống (4:42): Tạo ra các câu hỏi hoặc câu chuyện có chỗ trống để người đọc</span></div>\n<p class=\"body-txt\">\ncomment điền vào, tăng tương tác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">&quot;Đào mộ&quot; bài viết cũ (5:20): Chia sẻ lại các bài viết cũ đã có tương tác cao nhưng đã lâu</span></div>\n<p class=\"body-txt\">\nbị quên lãng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chào hỏi, chúc ngủ ngon, hỏi giờ giấc (5:42): Các bài viết đơn giản như &quot;Chào buổi sáng&quot;,</span></div>\n<p class=\"body-txt\">\n&quot;Chúc ngủ ngon&quot;, &quot;Bạn đã ngủ chưa?&quot;, &quot;Dậy rồi à?&quot;, &quot;Chạy thôi!&quot; vào các khung giờ cụ thể\n \nsẽ tạo tương tác. Có thể lên lịch đăng bài này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tiêu đề hấp dẫn (7:24): Sử dụng các cấu trúc tiêu đề như &quot;Điều này sẽ giúp bạn đạt</span></div>\n<p class=\"body-txt\">\nđược...&quot;, &quot;Đây là lý do tại sao...&quot;, &quot;Bạn có thể đoán xem tại sao...&quot;, &quot;Đây là cách đơn giản\n \nđể...&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Video vận hành/Cách thức hoạt động (8:00): Các tiêu đề dạng &quot;Đây là cách thức mà nó</span></div>\n<p class=\"body-txt\">\nhoạt động/tạo ra kết quả&quot; hoặc &quot;Đây là cách thức mà cô ấy/anh ấy làm được...&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Khuyên người đọc nên làm gì (8:46): Sử dụng các tiêu đề &quot;Bạn nên sử dụng...&quot;, &quot;Bạn nên</span></div>\n<p class=\"body-txt\">\nlàm cái này, nên làm cái kia.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bám theo trend (9:01): Tạo nội dung xoay quanh các chủ đề, sự kiện đang hot (ví dụ:</span></div>\n<p class=\"body-txt\">\nChâm Anh) để thu hút sự chú ý.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Giải pháp cho đám đông (1:00:10): Tìm kiếm và tạo nội dung giải quyết các vấn đề, nỗi</span></div>\n<p class=\"body-txt\">\nđau của đám đông. Sử dụng từ khóa &quot;làm thế nào để...&quot; để tìm ý tưởng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Meme/ảnh châm biếm (1:23:40): Tạo các ảnh meme hoặc châm biếm liên quan đến xu</span></div>\n<p class=\"body-txt\">\nhướng hiện tại (sử dụng công cụ như Mimigenerator.net).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Đa dạng hóa nội dung cá nhân và chuyên nghiệp một cách tự nhiên: Diễn giả nhấn mạnh</span></div>\n<p class=\"body-txt\">\nviệc kết hợp các hoạt động cá nhân, kỷ niệm, hậu kỳ với nội dung chuyên gia và kinh\n \ndoanh. Điều này rất quan trọng vì nó xây dựng một hình ảnh chân thực, gần gũi và đáng\n \ntin cậy, giúp tăng tương tác tự nhiên hơn so với chỉ đăng bài bán hàng hoặc nội dung khô\n \nkhan.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tập trung vào &quot;nỗi đau và sự sung sướng&quot; của khách hàng thông qua câu hỏi và giải</span></div>\n<p class=\"body-txt\">\npháp: Việc đặt câu hỏi liên quan đến nỗi đau và sự sung sướng là cách trực tiếp nhất để\n \nkhơi gợi tương tác và sự quan tâm. Các bài viết giải pháp (&quot;Làm thế nào để...&quot;) trực tiếp\n</p></div></div>",

"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tổ chức đội nhóm biên tập nội dung (tự làm, thuê ngoài, hoặc xây dựng đội nhóm</span></div>\n<p class=\"body-txt\">\nchuyên nghiệp).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Khi đạt được 100,000 lượt thích (like) fanpage: Bắt đầu tổ chức bán hàng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Sản xuất một chuỗi 4 video nội dung để ra mắt sản phẩm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tạo một đối tượng khách hàng (audience) gồm những người đã xem 25%, 50%, 75%</span></div>\n<p class=\"body-txt\">\nhoặc cả 4 video ra mắt sản phẩm để đo lường và tiếp thị lại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Sau khi đã có khách hàng mua, tải danh sách khách hàng lên để tạo &quot;đối tượng đã mua&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tạo &quot;đối tượng tương tự&quot; (Look-alike audience) 1%, 2%, 3% dựa trên &quot;đối tượng đã</span></div>\n<p class=\"body-txt\">\nmua&quot; và quảng cáo bán hàng cho họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bán tiếp các sản phẩm tương tự cho nhóm khách hàng đã mua.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Thường xuyên &quot;hoán đổi các dạng nội dung&quot; nhưng phải xoay quanh nỗi đau và sự sung</span></div>\n<p class=\"body-txt\">\nsướng của đối tượng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Một vài gợi ý:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Không nên tự làm mọi việc.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Không cần biết mọi việc, cứ làm khắc biết (thực ra những cái sai lại là những cái hay</span></div>\n<p class=\"body-txt\">\nnhất).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Nên đi học các khóa học chuyên sâu (ví dụ: lớp Facebook của anh Đức).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Điều quan trọng nhất: Phải kiếm được tiền.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Lý do cần tạo fanpage: Chi phí chạy quảng cáo trực tiếp quá đắt; fanpage giúp khai thác</span></div>\n<p class=\"body-txt\">\nkhách hàng lâu dài.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Lưu ý: Chiến lược này khó đo lường hiệu suất ngay lập tức và chỉ phù hợp với người</span></div>\n<p class=\"body-txt\">\nkinh doanh lâu dài, không &quot;ăn xổi&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chìa khóa thành công: Đội nhóm (đội nhóm làm nội dung là Back-office, độc lập với đội</span></div>\n<p class=\"body-txt\">\nkinh doanh, không cần lộ diện ra bên ngoài).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Khuyến nghị tham gia khóa học: Internet Power System (IPS) nếu đang kinh doanh</span></div>\n<p class=\"body-txt\">\nonline có thu nhập từ 7-10 triệu VNĐ/tháng (hoặc 10-15 triệu VNĐ/tháng từ bất kỳ lĩnh\n \nvực nào).\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Đầu tư dài hạn vào Fanpage thay vì chỉ chạy quảng cáo trực tiếp: Diễn giả nhấn mạnh</span></div>\n<p class=\"body-txt\">\nrằng việc tạo fanpage và xây dựng nội dung đều đặn là một chiến lược đầu tư lâu dài,\n \nbền vững hơn so với việc liên tục chi tiền cho quảng cáo đơn thuần. Điều này quan trọng\n \nvì nó giúp doanh nghiệp xây dựng tài sản số, giảm thiểu chi phí quảng cáo về lâu dài và\n \ntạo dựng mối quan hệ tin cậy với khách hàng, mà đôi khi khách hàng chỉ mua sau nhiều\n \nnăm theo dõi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Mọi nội dung phải xoay quanh &quot;nỗi đau và sự sung sướng&quot; của đối tượng mục tiêu: Đây</span></div>\n<p class=\"body-txt\">\nlà kim chỉ nam xuyên suốt mọi hoạt động sáng tạo nội dung và tiếp thị. Việc hiểu rõ và\n \ngiải quyết được các vấn đề (nỗi đau) hoặc đáp ứng các mong muốn (sự sung sướng) của\n \nkhách hàng là yếu tố quyết định sự thành công và tương tác của nội dung, đảm bảo nó\n \nluôn có giá trị và liên quan đến người xem.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tầm quan trọng của đội nhóm content chuyên biệt (back-office): Để thực hiện chiến</span></div>\n<p class=\"body-txt\">\nlược nội dung quy mô và dài hạn một cách hiệu quả, việc có một đội ngũ chuyên trách\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><p class=\"body-txt\">\ncho sản xuất và biên tập nội dung là không thể thiếu. Đội nhóm này hoạt động độc lập\n \nvới đội kinh doanh, đảm bảo sự chuyên nghiệp, ổn định và liên tục của quá trình sản\n \nxuất nội dung, giúp doanh nghiệp tập trung vào thế mạnh cốt lõi.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Không cần biết mọi việc, cứ làm khắc biết.”\n \n“Bởi vì thực ra những cái sai lại là những cái hay nhất.”\n \n“Điều quan trọng: Phải kiếm được tiền.”\n \n“Đội nhóm, đội nhóm và đội nhóm.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><p class=\"body-txt\">\nLời kết\n \nHết khoá Xây Dựng Thương Hiệu Cá Nhân. Đọc để LÀM, không phải để biết — biến mỗi bài\n \nhọc thành hành động cụ thể.\n</p></div></div>",
"<div class=\"pg pg-cover\" style=\"border-top:5px solid #6a1b9a\">\n  <div class=\"cover-wrap\">\n    <div class=\"cover-title\">Xây Dựng Thương Hiệu Cá Nhân</div>\n    <div class=\"cover-sub\" style=\"color:#6a1b9a\">Học để ứng dụng · Áp dụng để thành công</div>\n    <div class=\"cover-tag\" style=\"color:#6a1b9a;margin-top:24px\">QNPA Pickleball Academy</div>\n  </div>\n</div>"];
const N=pages.length;
let cur=0;
const book=document.getElementById('book');
const fill=document.getElementById('progress-fill');
const info=document.getElementById('page-info');
const jump=document.getElementById('page-jump');
const btnP=document.getElementById('btn-prev');
const btnN=document.getElementById('btn-next');
function render(){
  book.innerHTML=pages[cur];
  fill.style.width=((cur+1)/N*100)+'%';
  info.textContent=(cur+1)+' / '+N;
  jump.value=cur+1;
  btnP.disabled=cur===0;
  btnN.disabled=cur===N-1;
  window.scrollTo(0,0);
}
function next(){if(cur<N-1){cur++;render();}}
function prev(){if(cur>0){cur--;render();}}
function goTo(n){cur=Math.max(0,Math.min(N-1,n));render();}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown')next();
  else if(e.key==='ArrowLeft'||e.key==='PageUp')prev();
});
render();
</script>
