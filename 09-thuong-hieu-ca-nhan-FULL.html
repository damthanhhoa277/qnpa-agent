<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Xây Dựng Thương Hiệu Cá Nhân</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#e8eaf0;font-family:'Segoe UI',Arial,sans-serif}
body{display:flex;flex-direction:column;align-items:center;padding:18px 10px 24px}

/* Book wrapper */
#book-wrap{width:720px;max-width:98vw;display:flex;flex-direction:column}

/* Top bar: title + page info */
#top-bar{display:flex;justify-content:space-between;align-items:center;
          margin-bottom:6px;padding:0 2px}
#book-title{font-size:13px;font-weight:600;color:#444;white-space:nowrap;
             overflow:hidden;text-overflow:ellipsis;max-width:60%}
#page-info{font-size:13px;color:#666;white-space:nowrap}

/* Progress bar */
#progress-bar{width:100%;height:3px;background:#d0d0d0;border-radius:2px;margin-bottom:10px}
#progress-fill{height:100%;border-radius:2px;transition:width .3s;background:#6a1b9a}

/* Page */
.pg{width:100%;min-height:540px;background:#ffffff;border-radius:6px;
     box-shadow:0 2px 16px rgba(0,0,0,.12);overflow:hidden}

/* Cover */
.pg-cover{display:flex;justify-content:center;align-items:center;min-height:540px}
.cover-wrap{text-align:center;padding:60px 40px}
.cover-tag{font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;font-weight:600}
.cover-title{font-size:28px;font-weight:700;color:#1a1a1a;line-height:1.4;margin-bottom:16px}
.cover-sub{font-size:14px;font-weight:500}

/* Content page */
.pg-content{}
.pg-inner{padding:28px 36px 32px;overflow-y:auto;max-height:540px}
.pg-inner::-webkit-scrollbar{width:5px}
.pg-inner::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

/* Typography */
.sec-hdr{font-size:12px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
          margin:18px 0 8px;padding-bottom:5px;border-bottom:1px solid #eee}
.sec-hdr:first-child{margin-top:0}
.body-txt{font-size:14px;color:#2d2d2d;line-height:1.8;margin-bottom:10px;text-align:justify}
.bullet{display:flex;gap:10px;margin:5px 0}
.bul-dot{font-size:18px;line-height:1.4;flex-shrink:0;margin-top:-1px}
.bul-txt{font-size:13.5px;color:#2d2d2d;line-height:1.7}

/* Navigation */
#nav{display:flex;align-items:center;gap:14px;margin-top:12px}
.nav-btn{background:#fff;border:2px solid #6a1b9a;color:#6a1b9a;padding:8px 24px;
          border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;
          transition:all .15s;letter-spacing:.5px}
.nav-btn:hover{background:#6a1b9a;color:#fff}
.nav-btn:disabled{opacity:.35;cursor:default}
#page-jump{width:52px;text-align:center;border:1px solid #ccc;border-radius:5px;
            padding:6px;font-size:13px;color:#444}
</style>
</head>
<body>
<div id="book-wrap">
  <div id="top-bar">
    <div id="book-title">Xây Dựng Thương Hiệu Cá Nhân</div>
    <div id="page-info">1 / 38</div>
  </div>
  <div id="progress-bar"><div id="progress-fill" style="width:2.6%"></div></div>
  <div id="book"></div>
</div>
<div id="nav">
  <button class="nav-btn" id="btn-prev" onclick="prev()" disabled>◄ Trước</button>
  <input id="page-jump" type="number" min="1" max="38" value="1"
         onchange="goTo(+this.value-1)" title="Nhảy đến trang">
  <button class="nav-btn" id="btn-next" onclick="next()">Tiếp ►</button>
</div>
<script>
const pages=["<div class=\"pg pg-cover\" style=\"border-top:5px solid #6a1b9a\">\n  <div class=\"cover-wrap\">\n    <div class=\"cover-tag\" style=\"color:#6a1b9a\">Sổ Tay Tinh Hoa · QNPA</div>\n    <div class=\"cover-title\">Xây Dựng Thương Hiệu Cá Nhân</div>\n    <div class=\"cover-sub\" style=\"color:#6a1b9a\">36 trang nội dung đầy đủ</div>\n  </div>\n</div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><p class=\"body-txt\">\nXây Dựng Thương Hiệu Cá\n \nNhân\n \nSổ tay tinh hoa\n</p>\n<p class=\"body-txt\">\nTổng hợp 18 bài\n \nNguồn: khoá học Xây Dựng Thương Hiệu Cá Nhân\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><p class=\"body-txt\">\nLời mở\n \nQuyển sách này tổng hợp tinh hoa khoá Xây Dựng Thương Hiệu Cá Nhân, do AI nghe lại từng\n \nbài giảng và chắt lọc thành: tóm tắt, ý chính, điểm quan trọng nhất, và trích dẫn đáng nhớ.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><p class=\"body-txt\">\nMục lục\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Chương 1</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bài 1: Cách ghi chép học bài hiệu quả</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bài 2: Nghiên cứu thị trường</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bài 3: Tạo nội dung cho thị trường</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bài 4: Kịch bản video hấp dẫn thị trường mục tiêu</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bài 5: Một vài kịch bản video mẫu</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bài 6: Chữa bài kịch bản video</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bài 7: Các bước thực hành quay video</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bài 8: Học viên thực hành quay video</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bài 9: Chữa bài quay video</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bài 10: Cách tăng follow fanpage P1</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bài 11: Cách tăng follow fanpage P2</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bài 12: Cách tìm nội dung cho fanpage</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bài 13: Demo cửa hàng bánh mỳ</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bài 14: Cách tạo đội nhóm phát triển</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bài 15: Cách chạy quảng cáo hiệu quả</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bài 16: Nội dung tăng tương tác P1</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bài 17: Nội dung tăng tương tác P2</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bài 18: Tổng kết bài học và việc cần làm</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Chương 1</h3>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Bài 1: Cách ghi chép học bài hiệu quả</h3>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Tóm tắt. Buổi học giới thiệu một phương pháp ghi chép hiệu quả và có hệ thống, giúp biến</h3>\n<p class=\"body-txt\">\ncác ý tưởng thành hành động cụ thể. Phương pháp này bao gồm việc sử dụng sổ ghi chép A4\n \nvà A5 với cấu trúc cột rõ ràng (tiêu đề, nội dung, hành động), khuyến khích sử dụng bút chì,\n \nghi chép cách dòng để dễ sửa đổi, và đặc biệt là kỹ thuật &quot;cắt dán&quot; để tinh lọc, chọn lọc\n \nnhững thông tin quan trọng nhất vào một cuốn sổ cá nhân hành động. Mục tiêu cốt lõi là\n \nkhông chỉ ghi nhận thông tin mà phải biến nó thành các bước hành động cụ thể và có thể\n \nthực hiện được.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Sử dụng hai loại sổ: Sổ A4 để ghi chép hàng ngày và sổ A5 để mang theo bên mình (hoặc</span></div>\n<p class=\"body-txt\">\nsổ A5 cắt dán).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Cấu trúc sổ A4:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Có lề trái 3.5cm, lề phải 3.5cm, phần giữa khoảng 14cm.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Cột trái để ghi các tiêu đề chính.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Cột giữa để ghi nội dung.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Cột phải để ghi các hành động cần thực hiện.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Công cụ ghi chép: Sử dụng bút chì (đặc biệt là loại 2B) vì hiệu quả gấp &quot;nghìn lần&quot; bút bi</span></div>\n<p class=\"body-txt\">\ntẩy được.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Cách ghi chép:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Ghi cách dòng, không ghi liền dòng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Lý do cách dòng là để sửa, chỉnh sửa.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Khi có ý tưởng sai: gạch ngang ý đó và ghi phần sửa lên trên, không xóa (trừ khi sai</span></div>\n<p class=\"body-txt\">\nchính tả).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Thời gian đọc lại: Mỗi tờ giấy (ghi theo phương pháp này) nên đọc lại được trong vòng 1</span></div>\n<p class=\"body-txt\">\nphút.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tần suất ghi chép: Không chỉ ghi trong lớp học mà bất kỳ khi nào có ý tưởng đều ghi</span></div>\n<p class=\"body-txt\">\nxuống.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Nguyên tắc cốt lõi: Ý tưởng phải đi kèm với hành động. Hành động là cái quan trọng nhất</span></div>\n<p class=\"body-txt\">\nđể tạo ra kết quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Sử dụng giấy nháp: Dùng giấy nháp thay vì giấy trắng để viết.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chỉ viết một mặt: Viết một mặt giấy để tiện cho việc cắt dán.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Phương pháp cắt dán: Nếu một tờ giấy chỉ có một đoạn hay/quan trọng, hãy cắt đoạn đó</span></div>\n<p class=\"body-txt\">\nra và dán vào sổ A5. Sổ A5 sẽ trở thành một cuốn &quot;sổ cắt dán&quot; của những nội dung chắt\n \nlọc nhất.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Công cụ bổ sung: Kéo và hồ dán khô.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tầm quan trọng của sổ cắt dán: Giúp tinh lọc tài liệu, loại bỏ những phần không cần thiết</span></div>\n<p class=\"body-txt\">\nvà giữ lại những nội dung giá trị, tạo nên một cuốn sổ được &quot;cá nhân hóa&quot; và chất lượng\n \ncao.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Đề xuất sách: Cuốn &quot;Khoa học về sự đơn giản&quot;.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">(Đề cập sơ lược) Sử dụng bút dạ bốn màu: xanh, đỏ, tím, vàng.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chuyển đổi Ý tưởng thành Hành động: Điểm cốt lõi nhất là sự nhấn mạnh vào việc mọi ý</span></div>\n<p class=\"body-txt\">\ntưởng, dù là nhỏ nhất, đều phải đi kèm với một hành động cụ thể. Điều này cực kỳ quan\n \ntrọng vì nó chuyển hóa việc học tập và tiếp thu thông tin từ thụ động sang chủ động,\n \nđảm bảo rằng kiến thức được áp dụng vào thực tế để tạo ra kết quả, thay vì chỉ dừng lại\n \nở mặt lý thuyết.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Hệ thống ghi chép &quot;Cắt Dán&quot; có chọn lọc: Phương pháp sử dụng giấy nháp, chỉ viết một</span></div>\n<p class=\"body-txt\">\nmặt và đặc biệt là &quot;cắt dán&quot; những phần nội dung đắt giá nhất vào sổ A5, thể hiện tư duy\n \ntinh gọn và tối ưu hóa thông tin. Nó giúp người học liên tục sàng lọc, loại bỏ những cái\n \nkhông quan trọng, và tập trung vào những &quot;viên ngọc&quot; kiến thức thực sự có giá trị, tạo ra\n \nmột kho tài liệu cá nhân hóa, dễ dàng tra cứu và hành động.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Ghi chép với tư duy liên tục cải tiến: Việc sử dụng bút chì, ghi cách dòng và gạch bỏ khi</span></div>\n<p class=\"body-txt\">\ncó sửa đổi thay vì xóa bỏ, khuyến khích một tư duy linh hoạt, không ngại mắc lỗi và luôn\n \nsẵn sàng điều chỉnh, cải tiến. Điều này quan trọng vì nó phản ánh thực tế rằng ý tưởng\n \nvà hành động cần được kiểm thử, đánh giá và điều chỉnh liên tục để đạt được hiệu quả\n \ntốt nhất.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Ý tưởng phải đi kèm với hành động.”\n \n“Hành động là cái quan trọng nhất ở đây.”\n \n“Như vậy thì sổ chúng ta sẽ là sổ cắt dán.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Bài 2: Nghiên cứu thị trường</h3>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Tóm tắt. Buổi giảng này cốt lõi về việc xây dựng thương hiệu và thu hút khách hàng trên</h3>\n<p class=\"body-txt\">\nFacebook mà không cần chạy quảng cáo trực tiếp, vì quảng cáo hiện tại hầu hết đều lỗ. Thay\n \nvào đó, chiến lược tập trung vào việc định vị &quot;nhân hiệu&quot; (thương hiệu cá nhân/doanh\n \nnghiệp) bằng cách thấu hiểu sâu sắc đối tượng mục tiêu, bao gồm các vấn đề họ đang gặp\n \nphải và những điều mang lại niềm sung sướng cho họ. Bằng cách ghi chép, phân tích các xu\n \nhướng và &quot;case study&quot; trên mạng xã hội, người kinh doanh có thể tìm ra những &quot;giải pháp&quot;\n \nđể cung cấp sản phẩm/dịch vụ phù hợp, từ đó xây dựng ảnh hưởng và tạo ra doanh thu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Quảng cáo trên Facebook (qua profile cá nhân hoặc chạy quảng cáo trả phí) hiện nay hầu</span></div>\n<p class=\"body-txt\">\nnhư không còn hiệu quả, 100% là lỗ, bất kể ngành nghề nào.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Thay vì chạy quảng cáo, mục tiêu là định vị &quot;nhân hiệu&quot; (thương hiệu cá nhân/doanh</span></div>\n<p class=\"body-txt\">\nnghiệp) phù hợp với ngành kinh doanh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Để làm được điều này, cần trải qua 4 bước:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Xác định số tiền mình muốn kiếm: Cần xác định rõ mục tiêu tài chính (tổng số tiền, trong</span></div>\n<p class=\"body-txt\">\n1 năm, hay 1 tháng).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Xác định đối tượng mà mình định phục vụ (Mô tả đối tượng):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bắt đầu với các yếu tố cơ bản như tuổi, giới tính (tuổi đặc biệt quan trọng vì liên quan</span></div>\n<p class=\"body-txt\">\nđến khả năng chi trả và giá bán). Nhóm 23-28 tuổi thường chi tiêu cho sản phẩm dưới 1\n \ntriệu, còn nhóm 28 tuổi trở lên có khả năng chi trả cho sản phẩm trên 1 triệu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Các yếu tố khác như tình trạng hôn nhân, con cái có thể không quan trọng bằng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Điểm quan trọng nhất: Sở thích và hành vi của đối tượng. Có thể target đối tượng dựa</span></div>\n<p class=\"body-txt\">\ntrên việc họ thích ai (đối thủ, diễn giả của mình, bạn bè của mình, tác giả có phong cách\n \ntương tự).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Cần thử nghiệm nhiều lần với mọi tính năng của Facebook và chia nhỏ đối tượng ra để</span></div>\n<p class=\"body-txt\">\ntìm ra nhóm thu được tiền.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Địa điểm cũng quan trọng đối với khả năng cung ứng sản phẩm/dịch vụ, nhưng với môi</span></div>\n<p class=\"body-txt\">\ntrường internet thì có thể không còn quá quan trọng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Lưu ý: &quot;Mô tả đối tượng&quot; cần được điều chỉnh thường xuyên, không cố định và phải liên</span></div>\n<p class=\"body-txt\">\ntục thử nghiệm (testing). Ban đầu quan trọng nhưng không quyết định việc mua hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Xác định vấn đề mà đối tượng gặp phải hoặc những điều sung sướng mà đối tượng này</span></div>\n<p class=\"body-txt\">\nmuốn:\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tìm hiểu bằng cách tham gia các hội nhóm, câu lạc bộ trên mạng và đọc/ghi chép lại tất</span></div>\n<p class=\"body-txt\">\ncả các lời than vãn, câu hỏi, comment của họ liên quan đến lĩnh vực của mình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Ghi chép cả những điều họ hỏi &quot;làm thế nào để đạt được điều này/điều kia&quot;, vì đó chính</span></div>\n<p class=\"body-txt\">\nlà sự sung sướng họ mong muốn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Phân tích những &quot;nhân tố bên ngoài&quot; mà họ thường đổ lỗi cho vấn đề của mình (mặc dù</span></div>\n<p class=\"body-txt\">\nthực tế có thể không phải vậy). Ví dụ về &quot;dịch vụ oánh ghen online&quot; để giải quyết vấn đề\n \nngoại tình, mang lại niềm sung sướng cho khách hàng một cách gián tiếp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Theo dõi và ghi chép tất cả các &quot;vụ&quot; (scandal, sự kiện nổi bật) trên mạng xã hội (ví dụ: vụ</span></div>\n<p class=\"body-txt\">\nTrâm Anh, vụ Nựng, vụ Rain Coffee từ chối Shark Tank) như những &quot;case study&quot; cụ thể,\n \nđiển hình, có kết quả. Ghi lại những gì họ làm, bài báo xuất hiện, tác giả, nội dung viết –\n \nvì đó là những &quot;giải pháp&quot; và insights có giá trị.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tìm ra những sản phẩm/dịch vụ có thể giải quyết được vấn đề đó: Cung cấp các giải</span></div>\n<p class=\"body-txt\">\npháp giúp khách hàng giải quyết nỗi đau và mang lại niềm sung sướng cho họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tất cả các từ khóa liên quan đến &quot;nỗi đau&quot; hay &quot;sự sung sướng&quot; của đối tượng, khi đi</span></div>\n<p class=\"body-txt\">\nkèm với một giải pháp, chính là một bài viết hay trên Facebook, góp phần xây dựng\n \nthương hiệu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chuyển dịch tư duy từ quảng cáo trực tiếp sang xây dựng ảnh hưởng và cung cấp giải</span></div>\n<p class=\"body-txt\">\npháp: Diễn giả nhấn mạnh rằng quảng cáo Facebook truyền thống hiện nay 100% là lỗ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Điểm quan trọng là không phải bán hàng trực tiếp mà là xây dựng &quot;nhân hiệu&quot; và ảnh</h3>\n<p class=\"body-txt\">\nhưởng bằng cách cung cấp giá trị, giải quyết vấn đề cho đối tượng mục tiêu. Điều này tạo\n \nra một mối quan hệ bền vững hơn với khách hàng và là cách duy nhất để tồn tại trong kỷ\n \nnguyên marketing internet hiện tại.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Định vị đối tượng mục tiêu dựa trên &quot;sở thích&quot; và &quot;hành vi&quot; thay vì chỉ nhân khẩu học:</span></div>\n<p class=\"body-txt\">\nMặc dù tuổi tác và địa điểm có vai trò ban đầu, diễn giả khẳng định &quot;sở thích là quan\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><p class=\"body-txt\">\ntrọng nhất&quot; vì nó liên quan trực tiếp đến hành vi. Khả năng nhắm mục tiêu dựa trên việc\n \nkhách hàng thích đối thủ, diễn giả giáo, bạn bè, hoặc tác giả cùng phong cách là một\n \nchiến lược mạnh mẽ để tiếp cận những người đã có sẵn sự quan tâm đến một lĩnh vực cụ\n \nthể, giúp tăng hiệu quả marketing mà không cần chi phí lớn cho quảng cáo.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Thu thập và phân tích sâu sắc &quot;nỗi đau&quot; và &quot;sự sung sướng&quot; của đối tượng mục tiêu</span></div>\n<p class=\"body-txt\">\nthông qua lắng nghe và ghi chép có hệ thống: Việc lắng nghe chủ động những lời than\n \nphiền, câu hỏi, mong muốn của khách hàng trên các diễn đàn, hội nhóm trực tuyến là vô\n \ncùng quý giá. Diễn giả không chỉ dừng lại ở việc ghi nhận vấn đề bề mặt mà còn khuyến\n \nkhích tìm hiểu cả những &quot;nhân tố bên ngoài&quot; mà họ đổ lỗi, để từ đó khám phá ra những\n \nnhu cầu sâu kín, thậm chí &quot;thầm kín&quot; mà họ muốn được giải quyết (ví dụ &quot;dịch vụ oánh\n \nghen&quot;). Đây là chìa khóa để tạo ra các sản phẩm, dịch vụ hoặc nội dung thực sự chạm\n \nđến cảm xúc và nhu cầu cốt lõi của khách hàng.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Nếu mà quảng cáo thì 100% là lỗ, bất kể ngành gì.”\n \n“Sở thích là quan trọng nhất... Vì vì nó liên quan đến hành vi.”\n \n“Dịch vụ &#x27;oánh ghen&#x27; online có phải là một dịch vụ rất là tuyệt vời không?”\n \n“Tất cả những cái đấy là những cái case study cụ thể, điển hình, có kết quả thì mình phải ghi\n \nxuống mình theo dõi.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Bài 3: Tạo nội dung cho thị trường</h3>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Tóm tắt. Buổi giảng này tập trung vào quy trình sản xuất và phân phối nội dung video một</h3>\n<p class=\"body-txt\">\ncách có hệ thống trên các nền tảng mạng xã hội. Diễn giả trình bày một quy trình chi tiết từ\n \nviệc tạo fanpage mới cho từng ngách, đến việc chuyển video thành văn bản, biên tập kỹ\n \nlưỡng, xuất video ở nhiều định dạng khác nhau và lên lịch đăng tải. Cốt lõi của chiến lược là\n \ntập trung giải quyết vấn đề cụ thể của từng nhóm đối tượng, thậm chí sử dụng cùng một nội\n \ndung gốc nhưng thay đổi cách trình bày để phù hợp với từng ngách thị trường, từ đó tối ưu\n \nhóa sự hấp dẫn và hiệu quả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bắt đầu với nghiên cứu vấn đề thị trường và tạo nội dung phù hợp.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bước 1: Tạo Fanpage mới cho đúng ngách thị trường (dù đã có trang cũ), vì trang mới dễ</span></div>\n<p class=\"body-txt\">\nlàm hơn, sạch hơn và phát triển nhanh hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Mục tiêu 100.000 follower có thể đạt được trong 3 tuần (có team), hoặc 3 ngày (rất</span></div>\n<p class=\"body-txt\">\nnhanh) nếu làm đúng quy trình. Amateur có thể mất từ 3 tháng đến 30 năm.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Quy trình sản xuất video hiệu quả:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bước 1: Làm video.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bước 2: Chuyển video thành text (transcript), có đánh dấu thời gian mỗi 30 giây để dễ</span></div>\n<p class=\"body-txt\">\ndàng cho việc biên tập.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bước 3: Biên tập text sử dụng chức năng &quot;track changes&quot; (đánh dấu xóa, thêm comment)</span></div>\n<p class=\"body-txt\">\nđể làm sạch nội dung, loại bỏ từ thừa, câu thừa, và xác định các câu nói hay, câu trích dẫn\n \ngiá trị.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bước 4: Biên tập video dựa trên file text đã được chỉnh sửa và đánh dấu thời gian, bao</span></div>\n<p class=\"body-txt\">\ngồm việc cắt ghép cảnh, thêm hình ảnh phù hợp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bước 5: Xuất video với nhiều định dạng khác nhau để phù hợp với từng nền tảng:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Video vuông (720x720) dài khoảng 5 phút cho Fanpage.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Video ngắn 14-15 giây (dạng TikTok) cho những câu nói hay, câu trích dẫn đắt giá, vì</span></div>\n<p class=\"body-txt\">\nFacebook sẽ sao chép tính năng này.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Video dài khoảng 5-10 phút, định dạng HD (1080x720 hoặc 720p) cho YouTube.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Story: 15 giây (Facebook), 59 giây (Instagram).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">*Lưu ý về màu sắc:* Đối với video vuông, nền màu đen hoặc màu vàng có tương tác cao</span></div>\n<p class=\"body-txt\">\nhơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Lưu trữ và đăng tải:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Lưu video đã biên tập lên một thư mục trên Google Drive (ban đầu cho Facebook, sau đó</span></div>\n<p class=\"body-txt\">\nlà YouTube, Instagram, Blog).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Người quản lý Fanpage sẽ tải video lên Fanpage ở chế độ &quot;unpublish&quot; (chưa công khai)</span></div>\n<p class=\"body-txt\">\nvà hẹn giờ đăng tải (publish).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tất cả bài viết phải được lên lịch trước hàng tuần, hàng tháng, thậm chí hàng năm;</span></div>\n<p class=\"body-txt\">\nkhông có nội dung ngẫu nhiên mà phải theo kịch bản đã định.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chiến lược nội dung quan trọng:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tập trung vào ngách nhỏ và giải quyết vấn đề cụ thể của từng đối tượng. Ví dụ: Yoga cho</span></div>\n<p class=\"body-txt\">\nbà bầu, yoga cho phụ nữ cô đơn, yoga cho đàn ông, yoga cho các cặp đôi. Mỗi ngách đều\n \ncó vấn đề riêng cần giải quyết.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Sử dụng cùng một nội dung video gốc nhưng thay đổi cách đặt tên, câu chữ để phù hợp</span></div>\n<p class=\"body-txt\">\nvới vấn đề của từng ngách khán giả. Điều này giúp một video có thể phục vụ nhiều đối\n \ntượng khác nhau, tối ưu hóa nội dung.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chiến lược &quot;Ngách hóa vấn đề&quot; (Niche Problem-Solving): Diễn giả nhấn mạnh việc không</span></div>\n<p class=\"body-txt\">\nchỉ tạo nội dung cho một đối tượng chung chung mà phải đi sâu vào từng ngách nhỏ và\n \nxác định vấn đề *cụ thể* mà họ đang gặp phải. Sau đó, sử dụng cùng một nội dung cốt lõi\n \n(ví dụ video yoga) nhưng thay đổi cách trình bày, tiêu đề, và câu chữ để trực tiếp giải\n \nquyết &quot;nỗi đau&quot; của từng ngách. Điều này cực kỳ quan trọng vì nó giúp nội dung trở nên\n \ncực kỳ liên quan, cá nhân hóa, từ đó tăng cường sự tương tác và khả năng chuyển đổi\n \ncao hơn rất nhiều so với cách tiếp cận đại trà.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Quy trình sản xuất nội dung video có hệ thống và đa dạng định dạng: Việc tuân thủ một</span></div>\n<p class=\"body-txt\">\nquy trình chặt chẽ từ khi quay video, chuyển đổi sang text, biên tập text chuyên nghiệp\n \n(sử dụng tính năng track changes, đánh dấu thời gian), đến việc biên tập video dựa trên\n \nbản text đã chuẩn hóa, và cuối cùng là xuất bản ra nhiều định dạng (vuông, ngắn, dài,\n \nstory) phù hợp với từng nền tảng. Điều này quan trọng vì nó không chỉ đảm bảo chất\n \nlượng và tính chuyên nghiệp của nội dung mà còn tối ưu hóa hiệu quả sử dụng một\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><p class=\"body-txt\">\nnguồn nội dung duy nhất cho nhiều kênh, gia tăng độ phủ và khả năng tiếp cận khách\n \nhàng tiềm năng một cách bền vững.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Hoạch định và lên lịch trình đăng tải nội dung bài bản, không ngẫu nhiên: Diễn giả khẳng</span></div>\n<p class=\"body-txt\">\nđịnh rằng tất cả nội dung trên fanpage và các kênh truyền thông khác phải được lên lịch\n \ntrước hàng tuần, hàng tháng, thậm chí hàng năm theo một kịch bản rõ ràng. Điểm này\n \ncực kỳ quan trọng để xây dựng sự nhất quán, chuyên nghiệp và đáng tin cậy cho thương\n \nhiệu. Việc chủ động trong quản lý nội dung giúp doanh nghiệp duy trì tần suất đăng bài\n \ntối ưu, đảm bảo nội dung luôn có sẵn và đúng thời điểm, tránh tình trạng bị động hoặc\n \nthiếu chuyên nghiệp.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Không có gì là ngẫu nhiên hết mà phải chạy theo kịch bản.”\n \n“Vẫn là cái video đó, mình xuất ở kênh này, xong mình lại làm lại cái định dạng mình thêm vài\n \ncâu chữ vào, mình xuất ở video bên kia.”\n \n“Vẫn là video thư giãn nhưng giải quyết những vấn đề khác nhau của thị trường.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Bài 4: Kịch bản video hấp dẫn thị trường mục tiêu</h3>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Tóm tắt. Buổi giảng này tập trung vào hướng dẫn cách tạo kịch bản video marketing hiệu</h3>\n<p class=\"body-txt\">\nquả để thu hút sự chú ý và kiếm tiền trên internet. Diễn giả trình bày một cấu trúc video 6\n \nbước đơn giản, nhấn mạnh tầm quan trọng của tiêu đề gây chú ý trong 5 giây đầu tiên và\n \ncách trình bày nội dung dưới dạng liệt kê các bước giải quyết vấn đề, cuối cùng là kêu gọi\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">hành động cụ thể. Cốt lõi là tạo video không chỉ để có nhiều lượt xem mà quan trọng hơn là</h3>\n<p class=\"body-txt\">\nđể kiếm được tiền.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Kịch bản video đơn giản: Kẻ giấy A4 thành 6 ô nội dung cho mỗi video.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tiêu đề (5 giây):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Phải gây được sự chú ý (AIDA: Attention, Interest, Desire, Action).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chỉ dài khoảng 5 giây, nếu dài hơn sẽ không bán được.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Yêu cầu: Nêu bật được một lợi ích lớn mà thị trường cần phải có.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Có thể tạo nhiều tiêu đề khác nhau với các phong cách khác nhau (mạnh mẽ, đáng yêu,</span></div>\n<p class=\"body-txt\">\ngần gũi, hài hước).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Nghiên cứu các video có nhiều triệu view để học hỏi cách gây chú ý.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Video nhiều triệu view nhưng không kiếm được tiền thì vô nghĩa. Mục tiêu là kiếm tiền,</span></div>\n<p class=\"body-txt\">\nkhông phải lượt xem.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Cách thể hiện tiêu đề: Kết hợp âm thanh (to, nhỏ, lên, xuống) và ngôn ngữ cơ thể, hoặc</span></div>\n<p class=\"body-txt\">\nđồ họa hỗ trợ (effect/hiệu ứng) từ các phần mềm (ví dụ: Viva Video trên điện thoại).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Giới thiệu bạn là ai &amp; tại sao làm công việc này (5-10 giây): Rất ngắn gọn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Nỗi đau (Pain Point): Chia sẻ những nỗi đau mà người xem đang gặp phải nếu họ không</span></div>\n<p class=\"body-txt\">\nbiết điều bạn sắp chia sẻ.\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Sự sung sướng (Pleasure Point): Chia sẻ họ sẽ sung sướng như thế nào nếu họ biết và áp</span></div>\n<p class=\"body-txt\">\ndụng những điều bạn chia sẻ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Giải pháp (3-5 điều họ cần làm/dạng checklist):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Trình bày dưới dạng liệt kê các bước, công cụ, kỹ thuật.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Ví dụ: &quot;3 bước để thoát khỏi nỗi đau và đạt được sự sung sướng&quot;, &quot;5 điều bạn cần làm&quot;,</span></div>\n<p class=\"body-txt\">\n&quot;6 công cụ bạn cần sưu tầm&quot;, &quot;3 kỹ thuật bạn cần nắm rõ&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Phải cụ thể, hướng dẫn từng bước nhỏ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Lấy ví dụ cụ thể về kinh doanh online, rửa mặt đúng cách, làm nước ép cỏ lúa mì.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Kêu gọi hành động (Call to Action - CTA):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Yêu cầu cụ thể người xem làm điều gì đó.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Video Facebook: kêu gọi chia sẻ.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Video YouTube: đề nghị subscribe (đăng ký).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tự làm hay thuê: Nếu tự làm thì chú ý các bước trên, nếu thuê thì &quot;đừng quan tâm đến</span></div>\n<p class=\"body-txt\">\nđiều này&quot;, để họ tự làm.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tiêu đề phải gây chú ý trong 5 giây và nêu bật lợi ích lớn: &quot;Mọi thứ chỉ có thể bán được</span></div>\n<p class=\"body-txt\">\ntrong 5 giây, dài hơn không bán được.&quot; Điều này cực kỳ quan trọng vì trong môi trường\n \ninternet đầy rẫy thông tin, 5 giây là thời gian vàng để níu giữ người xem, nếu không,\n \nvideo sẽ bị bỏ qua. Việc tập trung vào một lợi ích cốt lõi sẽ trực tiếp đánh vào nhu cầu\n \ncủa khán giả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Mục tiêu của video là kiếm tiền, không phải lượt xem: &quot;13 triệu view nhưng mình không</span></div>\n<p class=\"body-txt\">\nkiếm được tiền khác với việc chúng ta chỉ cần có 2000 lượt xem mà chúng ta muốn kiếm\n \ntiền.&quot; Đây là một insight rất thực tế và quan trọng. Nhiều người làm marketing online\n \nthường chạy theo số lượng view ảo mà quên đi mục đích kinh doanh. Diễn giả nhấn\n \nmạnh rằng lượng tương tác ít nhưng đúng đối tượng khách hàng tiềm năng, chuyển đổi\n \nthành doanh thu mới là thước đo thành công thực sự.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Cấu trúc video đơn giản, giải quyết vấn đề và có kêu gọi hành động rõ ràng: Cấu trúc 6</span></div>\n<p class=\"body-txt\">\nbước (Tiêu đề -&gt; Giới thiệu -&gt; Nỗi đau -&gt; Sung sướng -&gt; Giải pháp -&gt; Kêu gọi hành động)\n \ngiúp người làm video dễ dàng xây dựng nội dung logic, thu hút và dẫn dắt người xem từ\n \nviệc nhận diện vấn đề đến giải pháp cụ thể và cuối cùng là hành động theo mong muốn\n \ncủa người tạo video. Điều này tạo ra một quy trình marketing hiệu quả, không lan man.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Mọi thứ chỉ có thể bán được trong 5 giây, dài hơn không bán được.”\n \n“13 triệu view nhưng mình không kiếm được tiền khác với việc chúng ta chỉ cần có 2000 lượt\n \nxem mà chúng ta muốn kiếm tiền.”\n \n“Khi mình kiếm được tiền rồi mình có muốn lượt xem dễ không à? Mình lại bỏ tiền ra mua lượt\n \nxem thì dễ. Nhưng mà kiếm được lượt xem mà không kiếm được lượt tiền thì rất nhục.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Bài 5: Một vài kịch bản video mẫu</h3>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Tóm tắt. Buổi học tập trung vào việc xác định và khai thác nỗi đau (pain point) của khách</h3>\n<p class=\"body-txt\">\nhàng trong marketing online, đặc biệt là cách nỗi đau này thay đổi theo thời gian. Diễn giả\n \nnhấn mạnh rằng doanh nghiệp cần liên tục lắng nghe thị trường, không bám vào những\n \nquan niệm cũ về giá trị (ví dụ: số điện thoại đẹp là dễ nhớ). Cốt lõi là thay đổi góc nhìn về giá\n \ntrị của sản phẩm/dịch vụ để chạm đúng vào mong muốn sâu xa và tiềm ẩn của khách hàng,\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">ví dụ từ &quot;số điện thoại dễ nhớ&quot; sang &quot;số điện thoại hợp phong thủy&quot; hay &quot;số tiến lên&quot; mang ý</h3>\n<p class=\"body-txt\">\nnghĩa thăng tiến. Việc này giúp doanh nghiệp tạo ra chiến lược marketing hiệu quả và đạt\n \nđược thành công bền vững.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Buổi học giới thiệu về ba bí mật để kinh doanh thành công trên internet.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Nêu vấn đề: Nhiều người kinh doanh online không bán được hàng hoặc video không có</span></div>\n<p class=\"body-txt\">\nlượt xem, trong khi nội dung nhảm nhí lại thu hút hàng triệu lượt xem.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Nỗi đau của những người kinh doanh: Thấy người khác không xinh đẹp, không tài năng</span></div>\n<p class=\"body-txt\">\nbằng, hàng hóa kém hơn nhưng vẫn bán được hàng và thành công.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Ví dụ nỗi đau cụ thể về &quot;số điện thoại đẹp&quot;: Người có số điện thoại &quot;lởm chởm&quot; bị coi</span></div>\n<p class=\"body-txt\">\nthường, không ai nhớ số.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Diễn giả hỏi và thảo luận về nỗi đau thực sự của việc không có số điện thoại đẹp; học</span></div>\n<p class=\"body-txt\">\nviên cho rằng đó là &quot;không đẳng cấp&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Diễn giả phản biện: Diễn giả có 200 ngàn người theo dõi trên Facebook nhưng không</span></div>\n<p class=\"body-txt\">\ndùng số điện thoại đẹp, thậm chí không dùng điện thoại, nên không thể nói là không\n \nđẳng cấp.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Khẳng định: Nỗi đau &quot;số không đẳng cấp&quot; là nỗi đau của người nói (học viên) chứ không</span></div>\n<p class=\"body-txt\">\nphải là nỗi đau chung của thị trường.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Giải pháp: Thay vì số đẹp dễ nhớ, hãy tìm hiểu về &quot;số hợp mệnh, số hợp phong thủy&quot;</span></div>\n<p class=\"body-txt\">\nhoặc các yếu tố khác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Lý giải: Nỗi đau thay đổi theo thời gian; ví dụ, ngày nay không còn ai nhớ nhiều số điện</span></div>\n<p class=\"body-txt\">\nthoại hay tên miền dễ nhớ nữa.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Nỗi đau phải đúng là nỗi đau của thị trường tại thời điểm hiện tại, cần lắng nghe để xác</span></div>\n<p class=\"body-txt\">\nđịnh.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Ví dụ về sự thay đổi của nỗi đau: Thay vì nói về &quot;số đẹp&quot; (dễ nhớ), hãy nói về &quot;số điện</span></div>\n<p class=\"body-txt\">\nthoại sai phong thủy&quot; ảnh hưởng đến cuộc sống của họ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Định nghĩa lại &quot;số đẹp&quot;: Không phải số nhảy lên nhảy xuống (lên voi xuống chó) mà là số</span></div>\n<p class=\"body-txt\">\n&quot;tiến lên, tiến lên, tiến tiến lên&quot; (ví dụ: 3456789).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Phân tích: Số &quot;tứ quý 8&quot; (8888) chỉ mang ý nghĩa &quot;bằng bằng&quot; (giàu mãi) nhưng không</span></div>\n<p class=\"body-txt\">\nthể hiện sự thăng tiến, trong khi số &quot;3456789&quot; (tiến lên) mới là số đắt tiền và giá trị hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Phản biện về số 88888: Dù có ý nghĩa &quot;phát&quot; trong phong thủy nhưng khi đọc thành</span></div>\n<p class=\"body-txt\">\n&quot;tám tám tám tám tám&quot; thì lại có thể bị liên tưởng đến &quot;bốc phét&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Kỹ thuật marketing: &quot;Biến cái sự sung sướng thành nỗi đau và biến cái nỗi đau thành sự</span></div>\n<p class=\"body-txt\">\nsung sướng.&quot;\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Nỗi đau của khách hàng không cố định mà luôn thay đổi theo thời gian và bối cảnh thị</span></div>\n<p class=\"body-txt\">\ntrường.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Nhiều doanh nghiệp thất bại vì bám víu vào những giả định cũ về vấn</span></div>\n<p class=\"body-txt\">\nđề của khách hàng. Việc nhận thức rằng nỗi đau là một thực thể động đòi hỏi doanh\n \nnghiệp phải liên tục nghiên cứu, lắng nghe và cập nhật để tìm ra những vấn đề thực sự\n \nmà khách hàng đang đối mặt, từ đó đưa ra giải pháp phù hợp. Nếu không, thông điệp\n \nmarketing sẽ lạc hậu và không chạm được vào tâm lý khách hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Giá trị thực sự của sản phẩm/dịch vụ nằm ở khả năng giải quyết nỗi đau *sâu xa và tiềm</span></div>\n<p class=\"body-txt\">\nẩn* của khách hàng, chứ không chỉ là các đặc tính bề ngoài hay tiện ích hiển nhiên.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Insight này khuyến khích doanh nghiệp tư duy lại về cách định vị sản</span></div>\n<p class=\"body-txt\">\nphẩm. Thay vì chỉ bán những thứ khách hàng &quot;cần&quot; một cách rõ ràng (ví dụ: số dễ nhớ),\n \nhãy bán những thứ chạm đến niềm tin, mong muốn về vận mệnh, sự nghiệp, hoặc địa vị\n \nxã hội (ví dụ: số hợp phong thủy, số &quot;tiến lên&quot;). Điều này giúp tạo ra giá trị gia tăng, sự\n \nkhác biệt hóa mạnh mẽ, và cho phép định giá sản phẩm/dịch vụ cao hơn, thu hút đúng\n \nphân khúc khách hàng mục tiêu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Khả năng &quot;biến cái sự sung sướng thành nỗi đau và biến cái nỗi đau thành sự sung</span></div>\n<p class=\"body-txt\">\nsướng&quot; là kỹ năng marketing cốt lõi.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là nghệ thuật tạo ra nhu cầu và định hình lại nhận thức của thị</span></div>\n<p class=\"body-txt\">\ntrường. Một điều tưởng chừng tốt đẹp (sung sướng) có thể được chỉ ra những điểm yếu\n \nhoặc nguy cơ (nỗi đau) mà sản phẩm của bạn giải quyết. Ngược lại, một vấn đề (nỗi đau)\n \ncó thể được xoay chuyển thành cơ hội hoặc lợi thế độc đáo (sung sướng) thông qua giải\n \npháp của bạn. Kỹ năng này cho phép doanh nghiệp không chỉ đáp ứng nhu cầu hiện có\n \nmà còn tạo ra nhu cầu mới, dẫn đầu thị trường.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Đừng kinh doanh nữa nếu bạn không có thương hiệu trên internet.”\n \n“Nỗi đau nó bị thay đổi theo thời gian. Cho nên là đừng có mang cái nỗi đau của 10 năm trước\n \nra đây để dọa cái ngày năm nay.”\n \n“Biến cái sự sung sướng thành nỗi đau và biến cái nỗi đau thành sự sung sướng.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Bài 6: Chữa bài kịch bản video</h3>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Tóm tắt. Buổi học tập trung vào việc tạo ra các thông điệp marketing hiệu quả thông qua</h3>\n<p class=\"body-txt\">\nviệc thấu hiểu nỗi đau và sự sung sướng của khách hàng. Diễn giả nhấn mạnh rằng việc bán\n \nhàng thành công phụ thuộc vào việc người bán có &quot;trải nghiệm&quot; giống như khách hàng của\n \nmình hay không. Điều quan trọng nhất là phải tạo và thử nghiệm nhiều kịch bản (video, nội\n \ndung), vì hiệu quả thực tế chỉ có thể được xác định qua tương tác thị trường, chứ không phải\n \nqua phán đoán cá nhân hay việc &quot;sửa&quot; kịch bản theo ý muốn. Cuối cùng, không có kịch bản\n \ndở hay hay, chỉ có kịch bản chạy và không chạy.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Ý chính</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Diễn giả đưa ra bài tập: Soạn kịch bản marketing 60 giây bao gồm 6 phần: Tiêu đề, Bạn</span></div>\n<p class=\"body-txt\">\nlà ai, Nỗi đau, Sự sung sướng, Các bước cần làm, Kêu gọi hành động. Mỗi phần 10 giây.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Để tạo tiêu đề hiệu quả, cần xác định được &quot;nỗi đau lớn nhất&quot; của khách hàng mà bạn</span></div>\n<p class=\"body-txt\">\ngiải quyết.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Nhiều người không bán được hàng vì thiếu hiểu biết về vấn đề và sự sung sướng của</span></div>\n<p class=\"body-txt\">\nkhách hàng, tức là họ &quot;không có cái trải nghiệm giống như họ&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Diễn giả minh họa bằng ví dụ về &quot;nước hoa xe hơi cho xe sang&quot;:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Người hỏi chưa hiểu rõ phân khúc khách hàng mục tiêu: xe sang thường không có mùi</span></div>\n<p class=\"body-txt\">\nkhó chịu như xe cũ, và việc thêm bất cứ thứ gì vào xe sang (như nước hoa phổ thông) có\n \nthể làm giảm độ sang của xe.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Định nghĩa &quot;xe sang&quot; của người hỏi và diễn giả khác nhau; nước hoa vài trăm nghìn</span></div>\n<p class=\"body-txt\">\nkhông dùng cho xe vài chục tỷ.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Lời khuyên: Cần &quot;tăng cái trải nghiệm khách hàng lên&quot; hoặc &quot;tăng cái trải nghiệm giống</span></div>\n<p class=\"body-txt\">\nkhách hàng lên&quot; để hiểu rõ hơn về đối tượng mục tiêu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Cách sửa kịch bản đơn giản và hiệu quả nhất là &quot;làm nhiều kịch bản lên&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Sau khi có nhiều kịch bản, cần &quot;đưa lên&quot; (phát hành/đăng tải) để thử nghiệm. Kịch bản</span></div>\n<p class=\"body-txt\">\nnào có tương tác thì là tốt, kịch bản nào không có tương tác thì &quot;xóa mẹ video đi&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Đừng bao giờ hỏi người không liên quan hoặc dựa vào phán đoán cục bộ; kết quả thực tế</span></div>\n<p class=\"body-txt\">\ntừ thị trường là yếu tố quyết định.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Hiệu quả của video/kịch bản phụ thuộc vào rất nhiều yếu tố và không thể đoán trước</span></div>\n<p class=\"body-txt\">\nđược. Có những ý tưởng &quot;vớ vẩn nhất&quot; lại có thể đạt triệu view, trong khi những video\n \n&quot;hay&quot; lại ít người xem.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Không có kịch bản &quot;dở&quot; hay &quot;hay&quot; tuyệt đối; quan trọng là đúng cấu trúc để có hiệu quả,</span></div>\n<p class=\"body-txt\">\nnhưng mức độ hiệu quả đến đâu thì tùy thuộc vào việc thử nghiệm.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Thấu hiểu nỗi đau và trải nghiệm của khách hàng là chìa khóa để bán hàng: Diễn giả liên</span></div>\n<p class=\"body-txt\">\ntục nhấn mạnh rằng việc không bán được hàng là do người bán &quot;thiếu cái vấn đề và cái\n \nsự sung sướng&quot; của khách hàng, tức là &quot;không có cái trải nghiệm giống như họ&quot;. Điều\n \nnày quan trọng vì nó chuyển trọng tâm từ việc chỉ giới thiệu sản phẩm/dịch vụ sang việc\n \nđặt mình vào vị trí của khách hàng để thực sự hiểu động lực, nhu cầu và mong muốn sâu\n \nxa của họ. Nếu không có trải nghiệm tương đồng, mọi nỗ lực marketing và bán hàng có\n \nthể định vị sai và không hiệu quả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Phương pháp thử nghiệm (testing) liên tục thay vì phán đoán chủ quan: Diễn giả minh</span></div>\n<p class=\"body-txt\">\nhọa rõ ràng bằng câu chuyện về những ý tưởng của chính mình &quot;đều đéo chạy&quot; và những\n \nvideo &quot;nhảm nhất&quot; lại đạt hàng triệu view. Điều này cực kỳ quan trọng vì nó bác bỏ việc\n \ndựa vào cảm tính, kinh nghiệm cá nhân hay ý kiến của người không liên quan để đánh\n \ngiá hiệu quả marketing. Thay vào đó, chiến lược thành công là tạo ra nhiều &quot;kịch bản&quot;\n \n(nội dung, thông điệp) khác nhau, đưa chúng ra thị trường để thử nghiệm, đo lường\n \ntương tác thực tế, và sẵn sàng loại bỏ những cái không hiệu quả để tập trung vào những\n \ncái có kết quả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Trích dẫn</h3></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Tiêu đề thì là cái bây giờ mình trước khi mình đi tiêu đề mình phải viết cái nỗi đau của họ,\n \nxong tìm ra cái nỗi đau lớn nhất. Mà ngày hôm đó mình giải quyết thì đấy chính là tiêu đề.”\n \n“Hầu hết mọi người trong chúng ta ở đây không bán được hàng là vì thiếu cái vấn đề và và cái\n \nsự sung sướng... là mình không có cái trải nghiệm giống như họ.”\n \n“Bởi vì tất cả những ý tưởng của tôi đưa lên mạng ấy, nó đều đéo chạy. Mà những cái vớ vẩn\n \nnhất... Cái video mà nhảm nhất ấy thì nó được 13 triệu view.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Bài 7: Các bước thực hành quay video</h3>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Tóm tắt. Đoạn âm thanh này rất ngắn gọn, chỉ thông báo về việc bắt đầu phần thực hành</h3>\n<p class=\"body-txt\">\nquay video trong buổi học. Do đó, không đủ nội dung để tóm tắt thành 3-4 câu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Diễn giả giáo thông báo bước tiếp theo của khoá học là thực hành quay video.</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">★ Điểm quan trọng nhất</h3>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Nội dung âm thanh quá ngắn để có thể rút ra 2-4 insight đắt giá.</h3>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Sau đây là bước mà chúng ta sẽ thực hành quay video.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Bài 8: Học viên thực hành quay video</h3>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Tóm tắt. Buổi học này tập trung vào hướng dẫn thực hành quay video cơ bản bằng điện</h3>\n<p class=\"body-txt\">\nthoại để khởi đầu quá trình kiếm tiền trực tuyến. Diễn giả nhấn mạnh tầm quan trọng của\n \nviệc bắt tay vào làm video, dù ban đầu có thể &quot;ngu ngốc,&quot; và cung cấp các kỹ thuật cốt lõi về\n \ncách cầm máy, bố cục hình ảnh theo quy tắc 1/3, và đặc biệt là cải thiện chất lượng âm thanh\n \nbằng cách biến tai nghe thành micro giấu kín trên áo. Mục tiêu là giúp học viên tạo ra những\n \nvideo đơn giản nhưng hiệu quả để kết nối với khán giả.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chuẩn bị quay video:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Yêu cầu học viên lấy điện thoại ra để quay một đoạn video dài 3 phút.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Khuyến khích đọc theo kịch bản đã chuẩn bị.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Nhấn mạnh đây sẽ là &quot;đoạn video ngu ngốc nhưng sẽ là đoạn video khởi động cho quá</span></div>\n<p class=\"body-txt\">\ntrình kiếm tiền của bạn.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Thiết lập camera và ánh sáng:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bật chế độ camera, không quan trọng đúng sai ban đầu.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Kiểm tra nguồn sáng trong phòng, chọn nguồn sáng thuận lợi (ví dụ: bật các nguồn sáng</span></div>\n<p class=\"body-txt\">\nkhác nếu cần).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Kỹ thuật cầm và bố cục:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Mắt của nhân vật phải nằm ở đường 1/3 trên khung hình.</span></div></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Hướng dẫn cách cầm điện thoại chắc chắn để tránh rung lắc (có hai cách cầm cho tay</span></div>\n<p class=\"body-txt\">\nnhỏ/to).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Camera nên nằm ở phía xa, các nút điều khiển nằm ở phía gần.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bố cục lại: nhân vật cần nằm ở đường 1/3, mắt nhân vật ở đường 1/3.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Khi quay:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Yêu cầu dừng quay sau khi nghe tiếng &quot;Dừng!&quot; và một đoạn hội thoại ồn ào.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chỉ đạo nhìn thẳng vào camera, không nhìn vào màn hình điện thoại. Thỉnh thoảng có</span></div>\n<p class=\"body-txt\">\nthể liếc nhanh để kiểm tra bố cục 1/3.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Cải thiện chất lượng âm thanh:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Nếu đang đeo tai nghe (có micro), phải rút tai nghe ra khỏi tai.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Hướng dẫn cách giấu tai nghe làm micro: nhét phần tai nghe vào cổ áo, luồn dây qua tay</span></div>\n<p class=\"body-txt\">\náo, để camera (điện thoại) nằm ở khu vực cổ. Cách này giúp âm thanh rõ hơn mà micro\n \nkhông bị lộ.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">&quot;Đoạn video ngu ngốc nhưng sẽ là đoạn video khởi động cho quá trình kiếm tiền của</span></div>\n<p class=\"body-txt\">\nbạn.&quot;\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Đây là một lời khẳng định mạnh mẽ giúp người học vượt qua nỗi sợ</span></div>\n<p class=\"body-txt\">\nhãi ban đầu về sự hoàn hảo. Thay vì trì hoãn vì lo lắng về chất lượng, diễn giả khuyến\n \nkhích hành động ngay lập tức. Việc tạo ra video đầu tiên, dù chưa hoàn hảo, là bước đệm\n \nquan trọng nhất để bắt đầu hành trình kiếm tiền và phát triển kỹ năng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Kỹ thuật quay cơ bản nhưng cực kỳ quan trọng (cầm chắc, nhìn vào camera, cài đặt</span></div>\n<p class=\"body-txt\">\nmicro):\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Vì sao quan trọng: Những kỹ thuật này là nền tảng để tạo ra video chuyên nghiệp hơn</span></div>\n<p class=\"body-txt\">\nmà không cần thiết bị đắt tiền.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Cầm chắc điện thoại: Giúp video không bị rung, dễ xem hơn.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Nhìn vào camera: Tạo sự kết nối trực tiếp, chân thực với người xem, rất quan trọng để</span></div>\n<p class=\"body-txt\">\nxây dựng niềm tin và sự tương tác.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Cài đặt tai nghe làm micro: Chất lượng âm thanh thường bị bỏ qua nhưng lại quyết định</span></div>\n<p class=\"body-txt\">\nrất lớn đến trải nghiệm người xem. Mẹo giấu tai nghe vào cổ áo là một giải pháp đơn\n \ngiản, tiết kiệm chi phí nhưng hiệu quả đáng kinh ngạc để cải thiện âm thanh, giúp người\n \nnói rõ ràng và dễ nghe hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Đoạn video ngu ngốc nhưng sẽ là đoạn video khởi động cho quá trình kiếm tiền của bạn.”\n \n“Nhìn vào camera, bất chấp cái hình nó làm sao, thỉnh thoảng liếc xem mình có nằm ở 1/3\n \nkhông và nhìn vào camera.”\n \n“Tai nghe không phải để nhét vào tai, tai nghe phải nhét vào chỗ khác nó mới sướng.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Bài 9: Chữa bài quay video</h3>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Tóm tắt. Buổi giảng này tập trung vào việc nhận diện và khắc phục các lỗi cơ bản khi quay</h3>\n<p class=\"body-txt\">\nvideo để tạo ra sản phẩm chất lượng hơn, đặc biệt là video phục vụ mục đích bán hàng. Diễn\n \ngiả nhấn mạnh tầm quan trọng của việc nhìn vào camera, chọn góc máy phù hợp, đảm bảo\n \nánh sáng thuận lợi và làm sạch ống kính. Ngoài ra, việc lựa chọn phông nền phù hợp cũng\n \nđược đề cập để tránh làm phân tán sự chú ý và tạo cảm giác chuyên nghiệp.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Lỗi 1: Không nhìn vào camera. Người quay nhìn vào màn hình thay vì camera làm mất</span></div>\n<p class=\"body-txt\">\nkết nối với khán giả.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Lỗi 2: Góc máy quay đặt thấp quá. Khi camera đặt thấp, người nói trông giống như</span></div>\n<p class=\"body-txt\">\n&quot;người khổng lồ&quot; nhìn xuống, tạo cảm giác thiếu tương tác và không thuận tình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Gợi ý khắc phục lỗi góc máy thấp: Đặt góc máy ngang với mặt hoặc thấp hơn mặt một</span></div>\n<p class=\"body-txt\">\nchút (vào khoảng từ cổ đến môi) là hợp lý. Nếu camera cố định góc thấp do không\n \ngian/thiết bị, cần có giải pháp thay thế.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Lỗi 3: Ánh sáng đèn sai. Đèn để ngược so với mặt làm cho chủ thể bị tối, background</span></div>\n<p class=\"body-txt\">\nsáng quá và bị &quot;rác&quot;.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Khắc phục lỗi ánh sáng: Quay ngược camera lại để ánh sáng thuận chiều hơn và nền</span></div>\n<p class=\"body-txt\">\nđằng sau sạch sẽ hơn.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Lỗi 4: Camera để bên trên. Khi camera đặt trên cao, người được quay sẽ trông nhỏ bé lại,</span></div>\n<p class=\"body-txt\">\ntạo vị thế bị coi thường và khó bán hàng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Lỗi 5: Mất vai / chỉ thấy mỗi cái thủ (đầu). Khi quay cận mặt quá mà thiếu phần vai,</span></div>\n<p class=\"body-txt\">\ntrông sẽ mất tự nhiên và không chuyên nghiệp. Cần có thêm phần vai trong khung hình.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Lỗi 6: Camera bẩn. Ống kính bị bẩn làm hình ảnh không rõ nét.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Khắc phục lỗi camera bẩn: Lau sạch camera trước khi quay. Nên dùng khăn lau kính</span></div>\n<p class=\"body-txt\">\nchuyên dụng, tránh lau bằng áo vì có dầu sẽ làm xước/hỏng ống kính.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Lỗi 7: Hậu cảnh (background) có &quot;rác&quot; / không sạch. Background có nhiều vật thể gây</span></div>\n<p class=\"body-txt\">\nmất tập trung, đặc biệt là các vật thể sáng màu hoặc có hình dáng nổi bật hơn chủ thể.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Khắc phục lỗi hậu cảnh: Chọn bối cảnh sạch sẽ, đơn giản ở đằng sau lưng.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Giải pháp phông nền: Sử dụng các loại phông nền chuyên dụng có thể mua với giá vài</span></div>\n<p class=\"body-txt\">\ntrăm ngàn đến 2 triệu.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Phông xanh (chromakey): Dùng khi muốn lồng hình, đòi hỏi kỹ năng dựng cảnh.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Phông trắng: Dùng khi muốn làm nổi bật vật thể cần quay.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Phông xám (trung tính): Cách ghi hình dễ nhất và phổ biến nhất, tạo nền trung tính</span></div>\n<p class=\"body-txt\">\nkhông gây phân tán.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Các màu khác: Phông đen, phông hoa (tùy nhu cầu).</span></div>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Góc máy và ánh sáng quyết định vị thế và tương tác: &quot;Góc máy đặt ngang với mặt thấp</span></div>\n<p class=\"body-txt\">\nhơn mặt một chút, tức là nó nằm vào trong khoảng khu vực từ cổ đến môi là hợp lý.&quot; và\n \n&quot;Ánh sáng đèn sai, đèn để ngược so với mặt&quot; cùng với &quot;Camera để bên trên thì làm cho\n \ncon người của mình nhỏ bé lại. Nó sẽ tạo nên cái vị thế bị coi thường và cũng khó để có\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><p class=\"body-txt\">\nthể bán được hàng.&quot; Đây là những yếu tố then chốt ảnh hưởng trực tiếp đến tâm lý và\n \nnhận thức của người xem về chủ thể, từ đó tác động đến hiệu quả truyền tải thông điệp\n \nvà khả năng bán hàng. Việc tạo ra một vị thế chủ động, tự tin và thiện cảm là cực kỳ quan\n \ntrọng trong mọi hoạt động kinh doanh, đặc biệt là qua video.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Hậu cảnh và phông nền ảnh hưởng đến sự chuyên nghiệp và tập trung: &quot;Cái video chúng</span></div>\n<p class=\"body-txt\">\nta làm ấy thì chúng ta chú ý đến cái hậu cảnh... tất cả các cái tông màu nó đều xám như\n \nnhau trừ một cái gì ạ? Cái vali và cái túi, cái vali và cái túi trở thành vật phẩm chính nếu\n \nvideo này dùng để bán cái vali và cái túi...&quot; Điều này cho thấy bất kỳ vật thể nào trong\n \nhậu cảnh cũng có thể trở thành yếu tố gây phân tâm, chuyển sự chú ý của người xem\n \nkhỏi chủ thể chính. Việc kiểm soát hậu cảnh và sử dụng phông nền trung tính, sạch sẽ là\n \ncần thiết để đảm bảo thông điệp chính được truyền tải hiệu quả, tạo ấn tượng chuyên\n \nnghiệp cho thương hiệu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Góc máy đặt ngang với mặt thấp hơn mặt một chút, tức là nó nằm vào trong khoảng khu vực\n \ntừ cổ đến môi là hợp lý.”\n \n“Camera để bên trên thì làm cho con người của mình nhỏ bé lại. Nó sẽ tạo nên cái vị thế bị coi\n \nthường và cũng khó để có thể bán được hàng.”\n \n“Cái video chúng ta làm ấy thì chúng ta chú ý đến cái hậu cảnh... tất cả các cái tông màu nó\n \nđều xám như nhau trừ một cái gì ạ? Cái vali và cái túi, cái vali và cái túi trở thành vật phẩm\n \nchính nếu video này dùng để bán cái vali và cái túi...”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Bài 10: Cách tăng follow fanpage P1</h3>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Tóm tắt. Buổi giảng này hướng dẫn chi tiết cách quảng cáo video hiệu quả trên Facebook,</h3>\n<p class=\"body-txt\">\ntập trung vào việc tạo 10 video giải quyết vấn đề của khách hàng và chạy quảng cáo lượt\n \nxem với chi phí thấp. Cốt lõi là nhắm mục tiêu đối tượng chính xác bằng cách lọc theo độ\n \ntuổi, địa điểm và sở thích cụ thể, cùng với việc tối ưu hóa &quot;Call to Action&quot; là &quot;like&quot; video thay\n \nvì like trang. Mục tiêu cuối cùng là thu hút đúng khách hàng tiềm năng với chi phí quảng cáo\n \ntối ưu.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Yêu cầu 10 video: Học viên cần dựng tối thiểu 10 video, mỗi video dùng để giải quyết</span></div>\n<p class=\"body-txt\">\nmột vấn đề cụ thể, hướng dẫn người xem.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tải video lên và quảng cáo: Sau khi làm xong 10 video, tải toàn bộ lên và bắt đầu chạy</span></div>\n<p class=\"body-txt\">\nquảng cáo.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chi phí quảng cáo: Quảng cáo mỗi video với chi phí khoảng 5-10 đô la (100.000 -</span></div>\n<p class=\"body-txt\">\n200.000 VNĐ) cho toàn thời gian hoặc theo ngày.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Nhắm mục tiêu đối tượng: Quảng cáo vào *đúng đối tượng* chúng ta mong muốn, thay</span></div>\n<p class=\"body-txt\">\nvì quảng cáo fanpage chung chung. Quảng cáo lượt xem video sẽ hiệu quả và rẻ hơn (ví\n \ndụ: 10-30 đồng/lượt xem).\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Mục tiêu của video là &quot;like&quot;: &quot;Call to action&quot; (CTA) của video là kêu gọi người xem &quot;like&quot;</span></div>\n<p class=\"body-txt\">\nvideo nếu họ thấy hữu ích, thay vì &quot;like page&quot; hoặc &quot;share&quot; ở giai đoạn đầu. Share không\n \nđược khuyến khích ban đầu vì có thể làm target sai đối tượng.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tối ưu hóa target (đối tượng mục tiêu):</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Độ tuổi: Chỉnh sửa độ tuổi phù hợp (ví dụ: 28-35 tuổi).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Địa điểm: Chọn địa điểm cụ thể (ví dụ: Hà Nội, TP.HCM/Sài Gòn - lưu ý nhạy cảm về từ</span></div>\n<p class=\"body-txt\">\nngữ).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Sở thích: Lọc thêm sở thích cụ thể của đối tượng (ví dụ: thích Tony Robbins, Brian Tracy,</span></div>\n<p class=\"body-txt\">\nSơn Tùng, hoặc các chủ đề như làm đẹp, kinh doanh).\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Cách thức thực hiện:</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Tải video lên.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bấm vào &quot;quảng cáo bài viết&quot;.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Thiết lập target (độ tuổi, địa điểm, sở thích).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Xác định ngân sách (ví dụ: 10 đô la cho 7 ngày).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Thiết lập mục tiêu hành động (gửi tin nhắn, nói chuyện).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Lưu đối tượng và chạy quảng cáo.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Kinh nghiệm: Làm 10 video sẽ giúp có kinh nghiệm trong việc nhắm mục tiêu và tối ưu</span></div>\n<p class=\"body-txt\">\nquảng cáo.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">★ Điểm quan trọng nhất</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chiến lược quảng cáo video thay vì fanpage: Thay vì quảng cáo trực tiếp fanpage, hãy</span></div>\n<p class=\"body-txt\">\ntập trung vào quảng cáo từng video cụ thể, đặc biệt là video giải quyết vấn đề. Điều này\n \nquan trọng vì quảng cáo video có chi phí rẻ hơn đáng kể (có thể chỉ 10-30 đồng/lượt\n \nxem) và dễ dàng hơn trong việc tiếp cận đúng đối tượng mục tiêu đang có nhu cầu, giúp\n \ntối ưu hóa hiệu quả chi phí.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Nhắm mục tiêu sâu sắc và cụ thể: Việc kết hợp nhiều tiêu chí để nhắm mục tiêu (độ tuổi,</span></div>\n<p class=\"body-txt\">\nđịa điểm, sở thích của diễn giả/chủ đề cụ thể như &quot;làm đẹp&quot;, &quot;kinh doanh&quot;) là cực kỳ\n \nquan trọng. Nó giúp thu hẹp đối tượng đến những người có khả năng quan tâm cao nhất\n \nđến nội dung của bạn, từ đó tăng tỷ lệ chuyển đổi và giảm lãng phí ngân sách quảng cáo.\n</p>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">CTA là &quot;like&quot; video thay vì &quot;like page&quot;: Ở giai đoạn đầu, mục tiêu chính là thu hút sự</span></div>\n<p class=\"body-txt\">\ntương tác với nội dung video thông qua nút &quot;like&quot;, chứ không phải kêu gọi &quot;like page&quot;\n \nhay &quot;share&quot;. Lý do là &quot;like&quot; video cho thấy người xem thực sự quan tâm đến nội dung,\n \ncòn &quot;share&quot; có thể làm phân tán đối tượng mục tiêu không chính xác, và &quot;like page&quot; có\n \nthể chưa phải là hành động đầu tiên mà khách hàng tiềm năng thực hiện.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Trích dẫn</h3>\n<p class=\"body-txt\">\n“Video dùng để giải quyết những vấn đề, hướng dẫn họ giải quyết những vấn đề.”\n \n“Nếu bây giờ bạn quảng cáo fanpage thì sẽ rất đắt tiền, nên bạn quảng cáo video bằng hình\n \nthức là lượt xem video.”\n</p></div></div>",
"<div class=\"pg pg-content\" style=\"border-top:4px solid #6a1b9a\"><div class=\"pg-inner\"><p class=\"body-txt\">\n“Mục tiêu của video là lấy like. Nên trong Call to Action CTA... là chúng ta yêu cầu nếu bạn\n \nthích video này của tôi hoặc là nếu video này có hiệu quả với bạn, hãy bấm vào nút like.”\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Bài 11: Cách tăng follow fanpage P2</h3>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Tóm tắt. Buổi giảng tập trung vào chiến lược tìm kiếm và khai thác ngách thị trường hiệu</h3>\n<p class=\"body-txt\">\nquả trên nền tảng video (như YouTube, Facebook) để xây dựng đối tượng khách hàng tiềm\n \nnăng. Diễn giả đề xuất một quy trình thử nghiệm nội dung lặp đi lặp lại: sản xuất số lượng\n \nlớn video để tìm ra những video có hiệu quả cao, sau đó tập trung &quot;bơm tiền&quot; (chạy quảng\n \ncáo) và đào sâu khai thác chủ đề đó, đồng thời chuyển đổi người xem video thành người\n \ntheo dõi trang fanpage để xây dựng một cộng đồng đối tượng tiềm năng chất lượng cao, từ\n \nđó dễ dàng bán hàng hơn.\n</p>\n<h3 class=\"sec-hdr\" style=\"color:#6a1b9a\">Ý chính</h3>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bước 1: Thử nghiệm diện rộng để tìm ngách.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Làm 10 video đa dạng về các chủ đề khác nhau.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Theo dõi và phân tích để tìm ra video nào có hiệu quả cao (lượt tương tác cao).</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Bước 2: Đào sâu và đầu tư vào ngách hiệu quả.</span></div>\n<div class=\"bullet\"><span class=\"bul-dot\" style=\"color:#6a1b9a\">•</span><span class=\"bul-txt\">Chọn ra khoảng 3-5 video có lượt tương tác cao nhất.</span></div>\n<div class=\"bullet\"><spa
